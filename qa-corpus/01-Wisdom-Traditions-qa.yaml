  question: 谷物的核心要点是什么？
  answer: '具体食物: 大米、小麦、燕麦、小米、藜麦；品质: 新鲜、全谷；效果: 持久能量、稳定情绪'
  source: 01-Wisdom-Traditions/yoga/Yoga_Nutrition_Lifestyle.md
  section: 三Guṇa食物分类体系
