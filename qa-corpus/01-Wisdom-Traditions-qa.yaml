  question: 基督教人文主义的核心要点是什么？
  answer: '原文: **Christian Humanism**；解释: 将人文主义的学术方法与基督教信仰相结合。；影响: 确立了文艺复兴时期宗教改革的思想基础。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/early-modern/renaissance/Erasmus.md
