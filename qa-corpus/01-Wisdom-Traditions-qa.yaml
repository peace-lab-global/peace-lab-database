  question: 纯意识的核心要点是什么？
  answer: '英文术语: Purusha；梵语术语: पुरुष (Puruṣa)；词源/定义: "居住于城中者"，纯粹的观察性意识；哲学意义: 不变的见证者，一切经验的终极主体'
  source: 01-Wisdom-Traditions/yoga/Yoga_Philosophy.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 原质/自然的核心要点是什么？
  answer: '英文术语: Prakriti；梵语术语: प्रकृति (Prakṛti)；词源/定义: "原初创造力"，物质世界的根源；哲学意义: 由三德 (Gunas) 构成的动态物质基础'
  source: 01-Wisdom-Traditions/yoga/Yoga_Philosophy.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 心智场的核心要点是什么？
  answer: '英文术语: Chitta；梵语术语: चित्त (Citta)；词源/定义: 心识的整体：思维 (Manas) + 智性 (Buddhi) + 我执 (Ahamkara)；哲学意义: 瑜伽修行的直接对象'
  source: 01-Wisdom-Traditions/yoga/Yoga_Philosophy.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 什么是数论哲学基础 (Samkhya Philosophy Foundation)？
  answer: 数论派 (Samkhya) 是瑜伽哲学的形而上学基础，由仙人迦毗罗 (Kapila) 创立。它通过 25 个"谛" (Tattva) 的演化体系解释了意识与物质的关系。
  source: 01-Wisdom-Traditions/yoga/Yoga_Philosophy.md
  section: 数论哲学基础 (Samkhya Philosophy Foundation)
- type: concept
  question: 6-10的核心要点是什么？
  answer: '中文名: 五知觉根；梵文/英文: Jnanendriyas (ज्ञानेन्द्रिय)；类别: 认知器官；演化关系: Ahamkara (悦性方面) →；功能说明: 听/触/视/味/嗅'
  source: 01-Wisdom-Traditions/yoga/Yoga_Philosophy.md
  section: 二十五谛演化表 (25 Tattvas Evolution)
- type: concept
  question: 11-15的核心要点是什么？
  answer: '中文名: 五行动根；梵文/英文: Karmendriyas (कर्मेन्द्रिय)；类别: 行动器官；演化关系: Ahamkara (变性方面) →；功能说明: 说/取/行/排泄/生殖'
  source: 01-Wisdom-Traditions/yoga/Yoga_Philosophy.md
  section: 二十五谛演化表 (25 Tattvas Evolution)
- type: concept
  question: 16-20的核心要点是什么？
  answer: '中文名: 五唯；梵文/英文: Tanmatras (तन्मात्र)；类别: 精微元素；演化关系: Ahamkara (惰性方面) →；功能说明: 声/触/色/味/香 (精微形式)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Philosophy.md
  section: 二十五谛演化表 (25 Tattvas Evolution)
- type: concept
  question: 本质的核心要点是什么？
  answer: '悦性 Sattva (सत्त्व): 光明、和谐、知识；变性 Rajas (रजस्): 活动、激情、躁动；惰性 Tamas (तमस्): 黑暗、惰性、遮蔽'
  source: 01-Wisdom-Traditions/yoga/Yoga_Philosophy.md
  section: 三德 (Gunas) 详解表
- type: concept
  question: 六派哲学的核心要点是什么？
  answer: '英文术语: Six Darśanas；梵语术语: षड्दर्शन (Ṣaḍ Darśana)；定义: 印度正统六大哲学体系；哲学意义: 承认吠陀权威'
