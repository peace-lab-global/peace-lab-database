  question: 政治现实主义的核心要点是什么？
  answer: '原文: **Political Realism**；解释: 政治决策应基于现实考量而非理想道德标准。；影响: 确立了现代政治学的现实主义传统。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/early-modern/renaissance/Machiavelli.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 权力理论的核心要点是什么？
  answer: '原文: **Theory of Power**；解释: 权力是政治的核心，统治者必须掌握维护权力的技巧。；影响: 影响了现代权力政治和国际关系理论。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/early-modern/renaissance/Machiavelli.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 君主论的核心要点是什么？
  answer: '原文: **The Prince**；解释: 统治者应以国家利益为最高原则，必要时可以不择手段。；影响: 开创了现代政治伦理学的讨论。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/early-modern/renaissance/Machiavelli.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《君主论》(The Prince)的核心要点是什么？
  answer: '出版年份: 1532年；核心内容: 系统阐述君主统治的策略和技巧；重要性: 政治现实主义的经典文献'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/early-modern/renaissance/Machiavelli.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《论李维》(Discourses on Livy)的核心要点是什么？
  answer: '出版年份: 1531年；核心内容: 基于李维史学阐述共和政治理论；重要性: 共和主义政治思想的重要著作'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/early-modern/renaissance/Machiavelli.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《佛罗伦萨史》(History of Florence)的核心要点是什么？
  answer: '出版年份: 1525年；核心内容: 记述佛罗伦萨共和国的政治历史；重要性: 历史政治学的经典作品'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/early-modern/renaissance/Machiavelli.md
