- type: concept
  question: 灌顶的核心要点是什么？
  answer: '英文名 (English): Empowerment / Initiation；藏语 (Tibetan): *དབང* (dBang)；梵语 (Sanskrit): *Abhiṣeka* (अभिषेक)；精确定义: 上师授予修法权力的仪式；疗愈意义:
    开启疗愈力量；专业视角: 进入密法的门槛'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Ritual_Healing.md
  section: 表1.1 藏传仪式核心术语 (Ritual Core Terms)
- type: concept
  question: 加持的核心要点是什么？
  answer: '英文名 (English): Blessing；藏语 (Tibetan): *བྱིན་རླབས* (Byin-rlabs)；梵语 (Sanskrit): *Adhiṣṭhāna* (अधिष्ठान)；精确定义: 上师或本尊的灵性力量传递；疗愈意义:
    疗愈能量的传递；专业视角: 仪式的核心作用'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Ritual_Healing.md
  section: 表1.1 藏传仪式核心术语 (Ritual Core Terms)
- type: concept
  question: 身密的核心要点是什么？
  answer: '藏语: *ལུས་གསང* (Lus-gsang)；梵语: *Kāya-guhya*；仪式元素: 手印、姿势、身体动作；功能: 身体能量导引；心理机制: 躯体化、具身认知'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Ritual_Healing.md
  section: 表1.2 仪式的三密结构 (Three Secrets Structure)
- type: concept
  question: 语密的核心要点是什么？
  answer: '藏语: *ངག་གསང* (Ngag-gsang)；梵语: *Vāk-guhya*；仪式元素: 真言、咒语、祈祷文；功能: 声音振动疗愈；心理机制: 声音治疗、自我暗示'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Ritual_Healing.md
  section: 表1.2 仪式的三密结构 (Three Secrets Structure)
- type: concept
  question: 意密的核心要点是什么？
  answer: '藏语: *ཡིད་གསང* (Yid-gsang)；梵语: *Manas-guhya*；仪式元素: 观想、专注、空性见；功能: 心理转化；心理机制: 意象工作、认知重构'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Ritual_Healing.md
  section: 表1.2 仪式的三密结构 (Three Secrets Structure)
- type: concept
  question: 净化仪式的核心要点是什么？
  answer: '藏语: *སྦྱངས་ཆོག* (sByangs-chog)；英文: Purification；主要目的: 净化业障、负能量；适应症: 业障病、心理污染；典型持续时间: 数小时至数天'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Ritual_Healing.md
  section: 表2.1 藏传疗愈仪式分类 (Classification of Healing Rituals)
- type: concept
  question: 治病仪式的核心要点是什么？
  answer: '藏语: *ནད་སེལ་ཆོག* (Nad-sel chog)；英文: Healing；主要目的: 治愈身心疾病；适应症: 各种疾病；典型持续时间: 数小时至数天'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Ritual_Healing.md
  section: 表2.1 藏传疗愈仪式分类 (Classification of Healing Rituals)
- type: concept
  question: 宗派的核心要点是什么？
  answer: '藏语 (Tibetan): ཆོས་ལུགས (Chö-luk)；梵语 (Sanskrit): —；英文 (English): School/Tradition；定义: 佛教传承体系；说明: 也称"派别"'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Schools_Detailed.md
  section: 表1.1 四大宗派核心术语 (Core Terms)
- type: concept
  question: 传承的核心要点是什么？
  answer: '藏语 (Tibetan): བརྒྱུད་པ (Gyü-pa)；梵语 (Sanskrit): *Paramparā*；英文 (English): Lineage；定义: 师徒相续的教法传承；说明: 藏传核心概念'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Schools_Detailed.md
  section: 表1.1 四大宗派核心术语 (Core Terms)
- type: concept
  question: 活佛/祖古的核心要点是什么？
  answer: '藏语 (Tibetan): སྤྲུལ་སྐུ (Tulku)；梵语 (Sanskrit): *Nirmāṇakāya*；英文 (English): Incarnate Lama；定义: 转世的证悟者；说明: 藏传特色制度'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Schools_Detailed.md
  section: 表1.1 四大宗派核心术语 (Core Terms)
- type: concept
  question: 前弘期的核心要点是什么？
  answer: '年代: 7-9世纪；主要事件: 佛教首传入藏；关键人物: 松赞干布、莲花生、寂护；宗派形成: 宁玛派源头'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Schools_Detailed.md
  section: 表1.2 藏传佛教历史分期 (Historical Periods)
- type: concept
  question: 朗达玛灭佛的核心要点是什么？
  answer: '年代: 838-842；主要事件: 佛教遭受迫害；关键人物: 朗达玛王；宗派形成: 断层期'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Schools_Detailed.md
  section: 表1.2 藏传佛教历史分期 (Historical Periods)
- type: concept
  question: 后弘期的核心要点是什么？
  answer: '年代: 978年后；主要事件: 佛教复兴；关键人物: 阿底峡、仁钦桑波；宗派形成: 噶当派兴起'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Schools_Detailed.md
  section: 表1.2 藏传佛教历史分期 (Historical Periods)
- type: concept
  question: 藏语名的核心要点是什么？
  answer: '宁玛派 (Nyingma): རྙིང་མ；噶举派 (Kagyu): བཀའ་བརྒྱུད；萨迦派 (Sakya): ས་སྐྱ；格鲁派 (Gelug): དགེ་ལུགས'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Schools_Detailed.md
  section: 表1.3 四大宗派总览比较 (Four Schools Overview)
- type: concept
  question: 意思的核心要点是什么？
  answer: '宁玛派 (Nyingma): 古老派；噶举派 (Kagyu): 口传派；萨迦派 (Sakya): 灰土派；格鲁派 (Gelug): 善规派'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Schools_Detailed.md
  section: 表1.3 四大宗派总览比较 (Four Schools Overview)
- type: concept
  question: 颂钵/藏钵的核心要点是什么？
  answer: '英文名 (English): Singing Bowl / Tibetan Bowl；藏语/梵语 (Tibetan/Sanskrit): 藏: *Drilbu* (དྲིལ་བུ)；精确定义: 金属制钵状乐器，敲击或摩擦产生持续振动音；疗愈意义:
    振动疗愈核心工具；专业视角: 最古老的声音疗愈工具之一'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Singing_Bowl.md
  section: 表1.1 颂钵核心术语 (Singing Bowl Core Terms)
- type: concept
  question: 泛音的核心要点是什么？
  answer: '英文名 (English): Overtone / Harmonic；藏语/梵语 (Tibetan/Sanskrit): 梵: *Nāda* (नाद) = 声音；精确定义: 基音之上的多重谐波频率；疗愈意义: 丰富的频率刺激；专业视角:
    泛音是颂钵的灵魂'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Singing_Bowl.md
  section: 表1.1 颂钵核心术语 (Singing Bowl Core Terms)
- type: concept
  question: 振动的核心要点是什么？
  answer: '英文名 (English): Vibration；藏语/梵语 (Tibetan/Sanskrit): 梵: *Spanda* (स्पन्द) = 脉动；精确定义: 物体周期性往复运动；疗愈意义: 物质层面的声音效应；专业视角:
    一切皆振动'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Singing_Bowl.md
  section: 表1.1 颂钵核心术语 (Singing Bowl Core Terms)
- type: concept
  question: 古董藏钵的核心要点是什么？
  answer: '产地/时期: 西藏/尼泊尔；材质特点: 手工锻造、多种金属；音色特征: 复杂泛音、温暖深沉；疗愈特质: 最佳疗愈品质；价值范围: 高价值'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Singing_Bowl.md
  section: 表1.2 颂钵类型分类 (Types of Singing Bowls)
- type: concept
  question: 尼泊尔手工钵的核心要点是什么？
  answer: '产地/时期: 尼泊尔当代；材质特点: 手工锻造、铜合金；音色特征: 丰富泛音、较厚重；疗愈特质: 传统品质；价值范围: 中高价值'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Singing_Bowl.md
  section: 表1.2 颂钵类型分类 (Types of Singing Bowls)
- type: concept
  question: 印度机制钵的核心要点是什么？
  answer: '产地/时期: 印度；材质特点: 机器制造、标准化；音色特征: 单一泛音、较薄；疗愈特质: 入门级；价值范围: 较低价值'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Singing_Bowl.md
  section: 表1.2 颂钵类型分类 (Types of Singing Bowls)
- type: concept
  question: 频率的核心要点是什么？
  answer: '定义: 每秒振动次数(Hz)；在颂钵中的表现: 颂钵产生多重频率；疗愈意义: 不同频率影响不同脑波/脏器'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Singing_Bowl.md
  section: 表2.1 颂钵振动的物理学 (Physics of Singing Bowl Vibration)
- type: concept
  question: 基频的核心要点是什么？
  answer: '定义: 最低主导频率；在颂钵中的表现: 颂钵的主音；疗愈意义: 决定钵的基本音高'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Singing_Bowl.md
  section: 表2.1 颂钵振动的物理学 (Physics of Singing Bowl Vibration)
- type: concept
  question: 密续/怛特罗的核心要点是什么？
  answer: '梵语 (Sanskrit): *Tantra* (तन्त्र)；藏语 (Tibetan): རྒྱུད (Gyü)；英文 (English): Tantra/Continuum；精确定义: 相续不断的修行体系；修行意义:
    核心经典'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Tantra_Classification.md
  section: 表1.1 密续基础术语 (Basic Tantra Terms)
- type: concept
  question: 金刚乘的核心要点是什么？
  answer: '梵语 (Sanskrit): *Vajrayāna* (वज्रयान)；藏语 (Tibetan): རྡོ་རྗེ་ཐེག་པ (Dorje Thegpa)；英文 (English): Diamond Vehicle；精确定义:
    以金刚为喻的快速道；修行意义: 密教总称'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Tantra_Classification.md
  section: 表1.1 密续基础术语 (Basic Tantra Terms)
- type: concept
  question: 密咒乘的核心要点是什么？
  answer: '梵语 (Sanskrit): *Mantrayāna* (मन्त्रयान)；藏语 (Tibetan): སྔགས་ཀྱི་ཐེག་པ (Ngak-kyi Thegpa)；英文 (English): Mantra Vehicle；精确定义:
    以真言为方便；修行意义: 另一名称'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Tantra_Classification.md
  section: 表1.1 密续基础术语 (Basic Tantra Terms)
- type: concept
  question: 修行时间的核心要点是什么？
  answer: '显教 (Sūtra): 三大阿僧祇劫；密教 (Tantra): 即身成佛(一生或数生)'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Tantra_Classification.md
  section: 表1.2 密续与显教比较 (Tantra vs. Sūtra)
- type: concept
  question: 方便的核心要点是什么？
  answer: '显教 (Sūtra): 六度万行；密教 (Tantra): 三密相应'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Tantra_Classification.md
  section: 表1.2 密续与显教比较 (Tantra vs. Sūtra)
- type: concept
  question: 转化对象的核心要点是什么？
  answer: '显教 (Sūtra): 压制烦恼；密教 (Tantra): 转化烦恼为智慧'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Tantra_Classification.md
  section: 表1.2 密续与显教比较 (Tantra vs. Sūtra)
- type: concept
  question: 事续的核心要点是什么？
  answer: '梵语: *Kriyātantra*；藏语: བྱ་རྒྱུད (Ja Gyü)；英文: Action Tantra；特征: 外在仪轨为主；代表本尊: 观音、度母；修行重点: 净化、仪式'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Tantra_Classification.md
  section: 表2.1 四续总览 (Overview of Four Tantras)
- type: concept
  question: 行续的核心要点是什么？
  answer: '梵语: *Caryātantra*；藏语: སྤྱོད་རྒྱུད (Chö Gyü)；英文: Performance Tantra；特征: 内外平衡；代表本尊: 大日如来；修行重点: 平衡修持'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Tantra_Classification.md
  section: 表2.1 四续总览 (Overview of Four Tantras)
- type: concept
  question: 伏藏的核心要点是什么？
  answer: '英文: Terma/Treasure；藏文: གཏེར་མ་ (gter ma)；定义说明: 隐藏的法教或圣物'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Terma_Tradition.md
  section: 1.1 基本概念
- type: concept
  question: 伏藏师的核心要点是什么？
  answer: '英文: Treasure Revealer；藏文: གཏེར་སྟོན་ (gter ston)；定义说明: 取出伏藏者'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Terma_Tradition.md
  section: 1.1 基本概念
- type: concept
  question: 埋藏者的核心要点是什么？
  answer: '英文: Treasure Concealer；藏文: གཏེར་སྦས་མཁན་；定义说明: 隐藏伏藏者（莲师等）'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Terma_Tradition.md
  section: 1.1 基本概念
- type: concept
  question: 地伏藏的核心要点是什么？
  answer: '英文: Earth Terma；藏文: ས་གཏེར་ (sa gter)；特性说明: 埋于土石中的伏藏'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Terma_Tradition.md
  section: 1.2 伏藏类型术语
- type: concept
  question: 意伏藏的核心要点是什么？
  answer: '英文: Mind Terma；藏文: དགོངས་གཏེར་ (dgongs gter)；特性说明: 心意传承的伏藏'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Terma_Tradition.md
  section: 1.2 伏藏类型术语
- type: concept
  question: 净相伏藏的核心要点是什么？
  answer: '英文: Pure Vision Terma；藏文: དག་སྣང་གཏེར་མ་；特性说明: 禅定净相中显现'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Terma_Tradition.md
  section: 1.2 伏藏类型术语
- type: concept
  question: 莲花生大士的核心要点是什么？
  answer: '藏文: པདྨ་འབྱུང་གནས་；时代: 8世纪；埋藏内容: 大量法教、圣物；重要性: 最主要埋藏者'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Terma_Tradition.md
  section: 2.1 伏藏的埋藏者
- type: concept
  question: 益西措嘉的核心要点是什么？
  answer: '藏文: ཡེ་ཤེས་མཚོ་རྒྱལ་；时代: 8世纪；埋藏内容: 协助埋藏、独立埋藏；重要性: 莲师明妃'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Terma_Tradition.md
  section: 2.1 伏藏的埋藏者
- type: concept
  question: 转世活佛的核心要点是什么？
  answer: '英文: Tulku/Incarnate Lama；藏文: སྤྲུལ་སྐུ་ (sprul sku)；梵文: Nirmāṇakāya；定义说明: 高僧转世者'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Tulku_System.md
  section: 1.1 基本概念
- type: concept
  question: 化身的核心要点是什么？
  answer: '英文: Emanation Body；藏文: སྤྲུལ་སྐུ་；梵文: Nirmāṇakāya；定义说明: 佛的应化身'
  source: 01-Wisdom-Traditions/religions/tibetan-buddhism/Tibetan_Tulku_System.md
  section: 1.1 基本概念
- type: concept
  question: 仁波切的核心要点是什么？
  answer: '英文: Rinpoche；藏文: རིན་པོ་ཆེ་；梵文: —；定义说明: 尊称"珍宝"'
