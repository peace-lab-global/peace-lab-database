  question: 《基督教君主的教育》(The Education of a Christian Prince)的核心要点是什么？
  answer: '出版年份: 1516年；核心内容: 阐述理想君主应有的品德和治国理念；重要性: 政治哲学和教育理论的重要文献'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/early-modern/renaissance/Erasmus.md
