  question: 上善若水的核心要点是什么？
  answer: '老子原句: “水善利万物而不争”。；现代解析: 兼容并包，向下扎根，以利他实现利己。；职场场景: 赋能团队 (Servant Leadership)；柔性扩张。；专业视角 (Professional Perspective):
