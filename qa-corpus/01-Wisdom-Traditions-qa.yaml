- type: concept
  question: 第七末那识的核心要点是什么？
  answer: '梵语: *Manas*；转化后智慧: **平等性智**；梵语: *Samatā-jñāna* (समताज्ञान)；藏语: *མཉམ་ཉིད་ཡེ་ཤེས*；功能转化: 从我执→平等慈悲；心理学意义: 超越自恋'
  source: 01-Wisdom-Traditions/religions/buddhism/vasana/Vasana_Mind_Transformation.md
