  question: 六字诀的核心要点是什么？
  answer: '英文名: Six Healing Sounds；核心动作/意念逻辑: 通过特定发音产生的振动来平衡脏腑。；功能指向: 情绪调节；加速代谢废气排出。；专业视角 (Professional Perspective): 声音疗愈频率与内脏共振的古老模型。；推荐场景:
