  question: 佛陀的核心要点是什么？
  answer: '英文名 (English): Buddha；梵语 (Sanskrit): *Buddha* (बुद्ध)；巴利语 (Pāli): *Buddha*；精确定义: 觉悟者，彻底觉醒的人，了知一切法实相；疗愈意义: 人人皆有觉醒潜能；专业视角:
    历史上的释迦牟尼与理想的觉悟状态'
  source: 01-Wisdom-Traditions/religions/buddhism/foundations/Buddhism_Core_Overview.md
  section: 表1.1 佛教核心术语 (Buddhist Core Terms)
- type: concept
  question: 法/达摩的核心要点是什么？
  answer: '英文名 (English): Dharma；梵语 (Sanskrit): *Dharma* (धर्म)；巴利语 (Pāli): *Dhamma*；精确定义: 佛陀所说的教法、宇宙真理、一切存在；疗愈意义: 疗愈的理论基础；专业视角:
    多义词：教法、规律、现象'
  source: 01-Wisdom-Traditions/religions/buddhism/foundations/Buddhism_Core_Overview.md
  section: 表1.1 佛教核心术语 (Buddhist Core Terms)
- type: concept
  question: 僧伽的核心要点是什么？
  answer: '英文名 (English): Sangha；梵语 (Sanskrit): *Saṃgha* (संघ)；巴利语 (Pāli): *Saṅgha*；精确定义: 修行者团体，四人以上出家众构成僧团；疗愈意义: 社区支持的疗愈力量；专业视角:
    狭义出家众，广义含居士'
  source: 01-Wisdom-Traditions/religions/buddhism/foundations/Buddhism_Core_Overview.md
  section: 表1.1 佛教核心术语 (Buddhist Core Terms)
