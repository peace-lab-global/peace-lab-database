- type: concept
  question: 什么是综合评分？
  answer: '**总评**：数论哲学是理解佛教思想形成与发展的不可或缺的参照系。两者之间的对话与对立，构成了印度哲学史上最深刻的思想交锋之一。从佛法视角审视数论，不仅能加深对数论本身的理解，更能反过来照亮佛教核心教义——无我、缘起、性空——的独特性和深刻性。对佛教学者而言，数论是不可绕过的研究领域；对学佛修行者而言，数论是检验自身理解深度的一面镜子。'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/samkhya/Buddhist_Perspective_Reviews.md
  section: 综合评分
