- type: concept
  question: 什么是三、文艺复兴与佛法：跨越时空的对话？
  answer: 文艺复兴标志着西方思想从中世纪神学的"襁褓"中觉醒，开始以人的眼光重新审视世界。佛教虽然起源于两千五百年前的印度，但其对人性、道德、政治与终极真理的思考，至今仍具有强大的解释力。当马基雅维利的冷酷现实与佛教的慈悲智慧相遇，当伊拉斯谟的温润理想与佛教的中道精神对话，我们看到的不是文明的冲突，而是一种更深层的可能性：人类的智慧传统虽然路径不同，但面对的问题——如何在充满苦难与不确定的世界中找到行动的准则——始终是共同的。
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/early-modern/renaissance/Buddhist_Perspective_Reviews.md
  section: 三、文艺复兴与佛法：跨越时空的对话
- type: concept
  question: 核心关切的核心要点是什么？
  answer: '马基雅维利: 权力的获取与维持；佛教对应: 正命、业力因果；伊拉斯谟: 信仰的纯化与普及；佛教对应: 平常心是道'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/early-modern/renaissance/Buddhist_Perspective_Reviews.md
  section: 三、文艺复兴与佛法：跨越时空的对话
- type: concept
  question: 人性观的核心要点是什么？
  answer: '马基雅维利: 自私、善变；佛教对应: 无始贪嗔痴；伊拉斯谟: 可被教育改善；佛教对应: 本具佛性（Tathāgatagarbha）'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/early-modern/renaissance/Buddhist_Perspective_Reviews.md
  section: 三、文艺复兴与佛法：跨越时空的对话
- type: concept
  question: 方法的核心要点是什么？
  answer: '马基雅维利: 权谋与强制；佛教对应: 四摄法、善巧方便；伊拉斯谟: 反讽与对话；佛教对应: 爱语、慈悲'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/early-modern/renaissance/Buddhist_Perspective_Reviews.md
  section: 三、文艺复兴与佛法：跨越时空的对话
