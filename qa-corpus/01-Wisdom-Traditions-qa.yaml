- type: concept
  question: 无为的核心要点是什么？
  answer: '原文: **Wu Wei/Non-action**；解释: 顺应自然，不强求，以无为达到无不为。；影响: 为治理哲学和人生智慧提供了独特的东方视角。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/taoism/Laozi.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 柔弱胜刚强的核心要点是什么？
  answer: '原文: **Softness Overcomes Hardness**；解释: 柔弱具有生命力，能战胜表面的强大。；影响: 影响了中国的战略思维和处世哲学。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/taoism/Laozi.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 知足的核心要点是什么？
  answer: '原文: **Contentment**；解释: 懂得知足，避免过度追求带来痛苦。；影响: 为现代幸福学和简约生活提供了古代智慧。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/taoism/Laozi.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《道德经》(Dao De Jing)的核心要点是什么？
  answer: '成书年代: 公元前6世纪；核心内容: 道家思想的核心经典，阐述道、德、无为等概念；重要性: 中国哲学史上最重要的经典之一'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/taoism/Laozi.md
  section: 主要著作 (Major Works)
- type: concept
  question: 传说中的其他著作的核心要点是什么？
  answer: '成书年代: 公元前6世纪；核心内容: 关于修身养性、治国理政的智慧；重要性: 多已失传，只有零星记载'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/taoism/Laozi.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **早期生活**：相传为周朝守藏室之史，掌管图书典籍

    - **思想形成**：通过对历史和自然的观察，形成道的哲学

    - **西出函谷**：传说中骑青牛西出函谷关，应关令尹喜之请著书

    - **隐居传道**：著书后隐居，继续传播道家思想

    - **后世影响**：思想通过庄子等后学得到发扬光大'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/taoism/Laozi.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 压力管理的核心要点是什么？
  answer: '关联概念: 无为而治；实践方法: 培养顺应自然、不强求的心理态度；现代应用: 正念减压和压力应对训练'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/taoism/Laozi.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 情绪调节的核心要点是什么？
  answer: '关联概念: 知足常乐；实践方法: 发展满足感和内心平静的情绪管理能力；现代应用: 积极心理学和幸福感研究'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/taoism/Laozi.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 贵虚的核心要点是什么？
  answer: '原文: **Valuing Emptiness**；解释: 重视虚无、清静的状态，认为这是道的根本特征。；影响: 为道家虚无主义思想提供了重要发展。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/taoism/Liezi.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 顺化的核心要点是什么？
  answer: '原文: **Following Transformation**；解释: 顺应自然的变化，不强求，不抗拒。；影响: 体现了道家顺应自然的核心理念。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/taoism/Liezi.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 生死观的核心要点是什么？
  answer: '原文: **View on Life and Death**；解释: 生死是自然变化的过程，应当坦然面对。；影响: 为道家生死哲学提供了深刻的思考。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/taoism/Liezi.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《列子》(Liezi)的核心要点是什么？
  answer: '成书年代: 公元前4-5世纪；核心内容: 列子及其学派的哲学著作，包含大量寓言故事；重要性: 道家思想的重要文献，文学价值很高'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/taoism/Liezi.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《冲虚经》的核心要点是什么？
  answer: '成书年代: 道教称谓；核心内容: 《列子》的道教经典称谓；重要性: 体现了列子思想在宗教领域的影响'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/taoism/Liezi.md
  section: 主要著作 (Major Works)
- type: concept
  question: 八篇内容的核心要点是什么？
  answer: '成书年代: 战国时期；核心内容: 《天瑞》《黄帝》《周穆王》等八个篇章；重要性: 系统展现了列子的哲学思想体系'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/taoism/Liezi.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **时代背景**：战国时期郑国人，生活在百家争鸣的时代

    - **思想渊源**：继承老子道家思想，在虚无主义方面有所发展

    - **学术特色**：善于运用寓言故事表达哲学思想

    - **学派传承**：形成了独特的列子学派，影响后世道家发展

    - **文献流传**：经历秦火后部分内容散佚，后人有所增补'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/taoism/Liezi.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 生死焦虑的核心要点是什么？
  answer: '关联概念: 生死观；实践方法: 通过哲学思辨化解对死亡的恐惧；现代应用: 死亡教育和临终关怀'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/taoism/Liezi.md
