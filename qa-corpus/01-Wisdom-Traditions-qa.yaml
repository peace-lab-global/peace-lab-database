  answer: '出版年份: 公元前325年；核心内容: 讨论城邦和政治制度；重要性: 西方政治哲学的奠基之作'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Aristotle.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **早期思想**：受柏拉图影响，研究理念论和形而上学

    - **中期发展**：逐渐形成自己的实体论和四因说，批判柏拉图的理念论

    - **晚期成熟**：建立了完整的哲学体系，涵盖形而上学、伦理学、政治学、自然科学等多个领域'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Aristotle.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 心理学的核心要点是什么？
  answer: '关联概念: 灵魂层级；实践方法: 分析不同层次的心理功能；现代应用: 现代心理学的分类体系'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Aristotle.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 本体论的核心要点是什么？
  answer: '柏拉图: 理念（eidos）是永恒实在；佛教（中观应成派）: 一切法无自性（nihsvabhāva）；差异的哲学意义: 实在论 vs 反实在论'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 认识论的核心要点是什么？
  answer: '柏拉图: 灵魂回忆（anamnesis）先天知识；佛教（中观应成派）: 闻思修+现量比量；差异的哲学意义: 先天论 vs 经验论'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 伦理学的核心要点是什么？
  answer: '柏拉图: 德性是灵魂的和谐；佛教（中观应成派）: 戒定慧三学，善恶业报；差异的哲学意义: 德性伦理 vs 业力伦理'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 快乐主义的核心要点是什么？
  answer: '原文: **Hedonism**；解释: 最高的善是快乐，但真正的快乐是心灵的宁静。；影响: 奠定了享乐主义哲学的基础，影响了后来的幸福学说。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Epicurus.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 原子论的核心要点是什么？
  answer: '原文: **Atomism**；解释: 宇宙由原子和虚空组成，一切现象都是原子运动的结果。；影响: 发展了德谟克利特的原子论，影响了后来的物质主义哲学。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Epicurus.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 心灵宁静的核心要点是什么？
  answer: '原文: **Ataraxia**；解释: 通过消除恐惧和欲望达到内心的平静状态。；影响: 成为心理治疗和压力管理的重要概念。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Epicurus.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《致美诺西斯的信》(Letter to Menoeceus)的核心要点是什么？
  answer: '出版年份: 公元前3世纪；核心内容: 阐述伊壁鸠鲁的基本哲学原理；重要性: 了解伊壁鸠鲁思想的核心文献'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Epicurus.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《主要信条》(Principal Doctrines)的核心要点是什么？
  answer: '出版年份: 公元前3世纪；核心内容: 40条哲学格言，涵盖伦理学和物理学；重要性: 伊壁鸠鲁哲学的精华总结'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Epicurus.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《论自然》(On Nature)的核心要点是什么？
  answer: '出版年份: 公元前3世纪；核心内容: 关于物理学和宇宙论的著作；重要性: 已失传，只有片段保存下来'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Epicurus.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **早期学习**：师从柏拉图学派的潘菲劳斯，接触柏拉图主义

    - **思想形成**：受到德谟克利特原子论和昔兰尼学派快乐主义的影响

    - **创立学园**：在雅典创立"花园"学园，招收男女学生

    - **理论完善**：发展出独特的快乐主义伦理学和原子物理学体系'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Epicurus.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 压力管理的核心要点是什么？
  answer: '关联概念: 心灵宁静(Ataraxia)；实践方法: 通过减少不必要的欲望和恐惧来达到内心平静；现代应用: 正念减压疗法(MBSR)的理论基础'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Epicurus.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
