- type: concept
  question: 转识成智的核心要点是什么？
  answer: '英文名 (English): Transforming Consciousness into Wisdom；梵语 (Sanskrit): *Vijñāna-pariṇāma-jñāna*；藏语 (Tibetan): *རྣམ་ཤེས་ཡེ་ཤེས་སུ་འགྱུར*；精确定义:
    八识转为四智；疗愈意义: 认知系统的质变'
  source: 01-Wisdom-Traditions/religions/buddhism/vasana/Vasana_Mind_Transformation.md
  section: 表1.1 转识成智核心术语 (Core Terminology)
- type: concept
  question: 无分别智的核心要点是什么？
  answer: '英文名 (English): Non-discriminating Wisdom；梵语 (Sanskrit): *Nirvikalpa-jñāna* (निर्विकल्पज्ञान)；藏语 (Tibetan): *རྣམ་པར་མི་རྟོག་པའི་ཡེ་ཤེས*；精确定义:
    离概念分别的智慧；疗愈意义: 超越二元对立'
  source: 01-Wisdom-Traditions/religions/buddhism/vasana/Vasana_Mind_Transformation.md
  section: 表1.1 转识成智核心术语 (Core Terminology)
- type: concept
  question: 第八阿赖耶识的核心要点是什么？
  answer: '梵语: *Ālayavijñāna*；转化后智慧: **大圆镜智**；梵语: *Ādarśa-jñāna* (आदर्शज्ञान)；藏语: *མེ་ལོང་ཡེ་ཤེས*；功能转化: 从染污存储→清净映照；心理学意义:
    无意识的彻底净化'
