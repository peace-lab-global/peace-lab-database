- type: concept
  question: 什么是萨特（Jean-Paul Sartre, 1905–1980）？
  answer: '代表作：《存在与虚无》《存在主义是一种人道主义》

    > 核心命题：存在先于本质、绝对自由与责任、恶心、他人的凝视、自欺'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/existentialists/Buddhist_Perspective_Reviews.md
  section: 萨特（Jean-Paul Sartre, 1905–1980）
- type: concept
  question: 存在先于本质的核心要点是什么？
  answer: '佛法概念: 缘起无自性；结构相似性: 都否定预设的固定本质；核心差异: 萨特推出自由，龙树推出空性'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/existentialists/Buddhist_Perspective_Reviews.md
  section: 视角一：专业书评人
- type: concept
  question: 绝对自由的核心要点是什么？
  answer: '佛法概念: 业力（karma）；结构相似性: 都强调人的行为选择；核心差异: 萨特：无条件自由；佛法：因果制约下的选择'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/existentialists/Buddhist_Perspective_Reviews.md
  section: 视角一：专业书评人
- type: concept
  question: 恶心（nausée）的核心要点是什么？
  answer: '佛法概念: 苦（dukkha）；结构相似性: 都是对存在状况的本体论感受；核心差异: 恶心是荒诞的入口，苦是解脱的入口'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/existentialists/Buddhist_Perspective_Reviews.md
  section: 视角一：专业书评人
- type: concept
  question: 对"本质"的态度的核心要点是什么？
  answer: '萨特存在主义: 否定预设本质；佛法: 否定自性；评价: 结构一致'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/existentialists/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 对"自我"的理解的核心要点是什么？
  answer: '萨特存在主义: 意识是虚无化；佛法: 五蕴无我；评价: 结论一致，论证路径不同'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/existentialists/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
