  question: 嬉皮运动的核心要点是什么？
  answer: '年代: 1960s-1970s；关键人物: Swami Vishnu-devananda、Swami Satchidananda；贡献: 瑜伽与反文化运动结合；影响: 瑜伽大众化'
  source: 01-Wisdom-Traditions/yoga/Yoga_Modern_Styles.md
  section: 从古典到现代的转型
