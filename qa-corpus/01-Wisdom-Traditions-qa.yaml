  question: 安那般那数息法的核心要点是什么？
  answer: '英文名: Breath Counting；梵语/巴利术语: 巴利: *Ānāpānasati*；理论基础: 《安般守意经》；操作步骤: 1.静坐调身 2.自然呼吸 3.数呼吸1-10 4.反复循环；身心效应: 降低焦虑、提升专注、调节自律神经；适应人群:
    初学者、焦虑症；循证基础: A级（大量RCT支持正念呼吸）；南师特别开示: "不要压制妄想，只管数息"'
  source: 01-Wisdom-Traditions/religions/buddhism/nan-huaijin/Nan_Huaijin_Teachings.md
  section: 南师核心实修方法表 (Core Practice Methods)
- type: concept
  question: 观呼吸随息法的核心要点是什么？
  answer: '英文名: Breath Following；梵语/巴利术语: 梵: *Prāṇa-Anupaśyanā*；理论基础: 《六妙法门》；操作步骤: 1.数息熟练后 2.放弃计数 3.细微觉察气息 4.身心合一；身心效应: 深度放松、进入禅定前行；适应人群:
    有禅修基础者；循证基础: B级；南师特别开示: "随息如影随形，不离不即"'
  source: 01-Wisdom-Traditions/religions/buddhism/nan-huaijin/Nan_Huaijin_Teachings.md
  section: 南师核心实修方法表 (Core Practice Methods)
- type: concept
  question: 正念的核心要点是什么？
