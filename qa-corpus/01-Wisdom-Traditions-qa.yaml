- type: concept
  question: 第六意识的核心要点是什么？
  answer: '梵语: *Mano-vijñāna*；转化后智慧: **妙观察智**；梵语: *Pratyavekṣaṇā-jñāna* (प्रत्यवेक्षणाज्ञान)；藏语: *སོ་སོར་རྟོག་ཡེ་ཤེས*；功能转化:
    从分别→善巧观察；心理学意义: 智慧的分辨力'
