  section: 表1.2 华严宗历史传承 (Historical Lineage)
- type: concept
  question: 法藏的核心要点是什么？
  answer: '朝代: 唐；生卒: 643-712；主要贡献: 集大成；代表著作: 《华严探玄记》《华严金狮子章》；地位: 三祖(贤首)'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Huayan_Philosophy.md
  section: 表1.2 华严宗历史传承 (Historical Lineage)
- type: concept
  question: 事法界的核心要点是什么？
  answer: '中文含义: 现象界；英文: Realm of Phenomena；定义: 千差万别的现象世界；认知层次: 分别认知；心理学对应: 日常经验；修行境界: 凡夫境'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Huayan_Philosophy.md
  section: 表2.1 四法界详表 (Four Dharmadhātus in Detail)
- type: concept
  question: 理法界的核心要点是什么？
  answer: '中文含义: 本体界；英文: Realm of Principle；定义: 一切法的空性本体；认知层次: 超越分别；心理学对应: 本质洞察；修行境界: 见空性'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Huayan_Philosophy.md
  section: 表2.1 四法界详表 (Four Dharmadhātus in Detail)
- type: concept
  question: 生卒年代的核心要点是什么？
  answer: '内容: 约150-250年；补充说明: 学术界有争议，大致在这个范围'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Nagarjuna_Works.md
  section: 表1.1 龙树菩萨生平 (Biographical Overview)
- type: concept
  question: 出生地的核心要点是什么？
  answer: '内容: 南印度维达婆国(今安得拉邦)；补充说明: 婆罗门种姓出身'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Nagarjuna_Works.md
  section: 表1.1 龙树菩萨生平 (Biographical Overview)
- type: concept
  question: 出家因缘的核心要点是什么？
  answer: '内容: 据传年少时与友人以隐身术入王宫，友人被杀，他由此出家；补充说明: 传说成分较多'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Nagarjuna_Works.md
  section: 表1.1 龙树菩萨生平 (Biographical Overview)
- type: concept
  question: 哲学的核心要点是什么？
  answer: '龙树之前: 部派佛教各说各话；龙树的贡献: 统一在"空性"下；龙树之后: 中观、唯识两大学派形成'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Nagarjuna_Works.md
  section: 表1.2 龙树在佛教史上的位置 (Position in Buddhist History)
- type: concept
  question: 般若思想的核心要点是什么？
  answer: '龙树之前: 般若经存在但缺乏系统论证；龙树的贡献: 用逻辑把般若义理论证清楚；龙树之后: 中观成为大乘的理论基础'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Nagarjuna_Works.md
  section: 表1.2 龙树在佛教史上的位置 (Position in Buddhist History)
- type: concept
  question: 修行的核心要点是什么？
  answer: '龙树之前: 偏重个人解脱；龙树的贡献: 空性与菩萨道结合；龙树之后: 菩萨道成为大乘主流'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Nagarjuna_Works.md
  section: 表1.2 龙树在佛教史上的位置 (Position in Buddhist History)
- type: concept
  question: 什么是2. 龙树六论 (Nāgārjuna's Six Logical Treatises)？
  answer: 藏传佛教传统把龙树最重要的论著归为"理聚六论"，这六部论涵盖了中观哲学的方方面面。
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Nagarjuna_Works.md
  section: 2. 龙树六论 (Nāgārjuna's Six Logical Treatises)
- type: concept
  question: 中论的核心要点是什么？
  answer: '梵语: *Madhyamaka-kārikā*；卷/偈数: 27品446偈；核心主题: 全面论证空性；论证方式: 以破为立；在六论中的位置: 总论，根本论'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Nagarjuna_Works.md
  section: 表2.1 六论总览 (Overview of Six Treatises)
- type: concept
  question: 中观/中道的核心要点是什么？
  answer: '英文名 (English): Middle Way；梵语 (Sanskrit): *Madhyama-pratipad* (मध्यमप्रतिपद्)；精确定义: 远离常断二边的正见；心理学意义: 避免极端认知；专业视角:
    非中间立场，而是超越二边'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Philosophy.md
  section: 表1.1 中观学基本术语 (Basic Terms)
- type: concept
  question: 空/空性的核心要点是什么？
  answer: '英文名 (English): Emptiness；梵语 (Sanskrit): *Śūnyatā* (शून्यता)；精确定义: 无自性、缘起；心理学意义: 去执着的根基；专业视角: 非虚无，而是无固有性'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Philosophy.md
  section: 表1.1 中观学基本术语 (Basic Terms)
- type: concept
  question: 自性的核心要点是什么？
  answer: '英文名 (English): Inherent Existence；梵语 (Sanskrit): *Svabhāva* (स्वभाव)；精确定义: 独立、不变、自成的存在；心理学意义: 执着的对象；专业视角: 中观否定的核心'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Philosophy.md
  section: 表1.1 中观学基本术语 (Basic Terms)
- type: concept
  question: 不生的核心要点是什么？
  answer: '梵语: *An-utpāda*；英文: Non-arising；所否定内容: 否定从自/他/共/无因生；哲学意义: 无绝对开始；心理学意义: 不执着于起源'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Philosophy.md
  section: 表1.2 八不中道 (Eight Negations)
- type: concept
  question: 不灭的核心要点是什么？
  answer: '梵语: *An-irodha*；英文: Non-ceasing；所否定内容: 否定绝对的消灭；哲学意义: 无绝对终结；心理学意义: 不执着于终结'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Philosophy.md
  section: 表1.2 八不中道 (Eight Negations)
- type: concept
  question: 不常的核心要点是什么？
  answer: '梵语: *An-uccheda*；英文: Non-permanence；所否定内容: 否定恒常不变；哲学意义: 非永恒论；心理学意义: 接受无常'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Philosophy.md
  section: 表1.2 八不中道 (Eight Negations)
- type: concept
  question: 创立期的核心要点是什么？
  answer: '年代: 2-3世纪；代表人物: 龙树；主要发展: 创立中观学；代表著作: 《中论》《十二门论》《大智度论》；特点: 以破为立'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Philosophy.md
  section: 表2.1 中观学历史发展 (Historical Development)
- type: concept
  question: 提婆的核心要点是什么？
  answer: '年代: 继承发展；代表人物: 《百论》《四百论》；主要发展: 破斥外道'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Philosophy.md
  section: 表2.1 中观学历史发展 (Historical Development)
- type: concept
  question: 初期的核心要点是什么？
  answer: '人物: 龙树菩萨；梵语名: *Nāgārjuna*；主要贡献: 创立中观体系；代表著作: 《中论》、《十二门论》；哲学特色: 八不中道'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Philosophy_System.md
  section: 表1.1 中观学派的重要人物 (Key Figures)
- type: concept
  question: 初期的核心要点是什么？
  answer: '人物: 提婆菩萨；梵语名: *Āryadeva*；主要贡献: 发展中观思想；代表著作: 《四百论》；哲学特色: 破斥外道'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Philosophy_System.md
  section: 表1.1 中观学派的重要人物 (Key Figures)
- type: concept
  question: 中期的核心要点是什么？
  answer: '人物: 佛护论师；梵语名: *Buddhapālita*；主要贡献: 应成派奠基；代表著作: 《中论佛护释》；哲学特色: 应成论证'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Philosophy_System.md
  section: 表1.1 中观学派的重要人物 (Key Figures)
- type: concept
  question: 应成派的核心要点是什么？
  answer: '梵语名: *Prāsaṅgika*；创始人: 佛护、月称；核心观点: 一切皆无自性；论证方法: 应成论证法；哲学特色: 彻底否定'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Philosophy_System.md
  section: 表1.2 中观学派的主要分支 (Main Branches)
- type: concept
  question: 自续派的核心要点是什么？
  answer: '梵语名: *Svātantrika*；创始人: 清辨、智藏；核心观点: 世俗有自性；论证方法: 自立量论证；哲学特色: 相对肯定'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Philosophy_System.md
  section: 表1.2 中观学派的主要分支 (Main Branches)
- type: concept
  question: 瑜伽行中观派的核心要点是什么？
  answer: '梵语名: *Yogācāra-Mādhyamika*；创始人: 无著、世亲后学；核心观点: 空有不二；论证方法: 唯识中观；哲学特色: 综合统一'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Philosophy_System.md
  section: 表1.2 中观学派的主要分支 (Main Branches)
- type: concept
  question: 不生的核心要点是什么？
  answer: '梵语: *Na jāyate*；英文: Not born；含义: 非自生；破斥对象: 常见实有论；哲学创新: 破生因谬误'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Philosophy_System.md
  section: 表2.1 八不中道详表 (Detailed Eight Negations)
- type: concept
  question: 不灭的核心要点是什么？
  answer: '梵语: *Na nirudhyate*；英文: Not destroyed；含义: 非断灭；破斥对象: 断见虚无论；哲学创新: 破灭因谬误'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Philosophy_System.md
  section: 表2.1 八不中道详表 (Detailed Eight Negations)
- type: concept
  question: 创立** (2-3世纪)的核心要点是什么？
  answer: '人物: 龙树；贡献: 建立中观，但没有明确区分论证方式；白话一句话: 把桌子上的东西都推掉了'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Prasangika_Tradition.md
  section: 表1.1 从龙树到月称 (From Nāgārjuna to Candrakīrti)
- type: concept
  question: 继承** (3世纪)的核心要点是什么？
  answer: '人物: 提婆；贡献: 发展论辩技术；白话一句话: 帮龙树把残余的碎片也扫了'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Prasangika_Tradition.md
  section: 表1.1 从龙树到月称 (From Nāgārjuna to Candrakīrti)
- type: concept
  question: 分歧起点** (5世纪)的核心要点是什么？
  answer: '人物: 佛护；贡献: 注释中论时只用归谬法；白话一句话: "我不说我是对的，只说你是错的"'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Prasangika_Tradition.md
  section: 表1.1 从龙树到月称 (From Nāgārjuna to Candrakīrti)
- type: concept
  question: 什么是2. 月称《入中论》详解 (Candrakīrti's Madhyamakāvatāra)？
  answer: 《入中论》是应成中观最重要的著作，用十地菩萨的修行阶位来展开中观哲学。
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Prasangika_Tradition.md
  section: 2. 月称《入中论》详解 (Candrakīrti's Madhyamakāvatāra)
- type: concept
  question: 初地的核心要点是什么？
  answer: '地名: 极喜地；梵语: *Pramuditā*；对应波罗蜜: 布施；核心修行: 初见空性，极大欢喜；白话解释: 终于看到了！开心得不得了'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Prasangika_Tradition.md
  section: 表2.1 入中论十地对应十波罗蜜 (Ten Bhūmis & Pāramitās)
- type: concept
  question: 二地的核心要点是什么？
  answer: '地名: 离垢地；梵语: *Vimalā*；对应波罗蜜: 持戒；核心修行: 戒行清净；白话解释: 行为开始跟智慧配套了'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Prasangika_Tradition.md
  section: 表2.1 入中论十地对应十波罗蜜 (Ten Bhūmis & Pāramitās)
- type: concept
  question: 三地的核心要点是什么？
  answer: '地名: 发光地；梵语: *Prabhākarī*；对应波罗蜜: 忍辱；核心修行: 禅定光明；白话解释: 内心开始发光，不再被外境动摇'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Prasangika_Tradition.md
  section: 表2.1 入中论十地对应十波罗蜜 (Ten Bhūmis & Pāramitās)
- type: concept
  question: 人无我的核心要点是什么？
  answer: '论证内容: 我非五蕴，非蕴合，非蕴外；白话解释: 在身体和心理活动里找不到"我"，在它们外面也找不到；破的是谁: 破凡夫的我执'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Madhyamaka_Prasangika_Tradition.md
  section: 表2.2 入中论第六品(般若品)核心论证 (Key Arguments in Chapter 6)
- type: concept
  question: 缘起的核心要点是什么？
  answer: '梵语: *Pratītyasamutpāda*；巴利语: *Paṭiccasamuppāda*；英文: Dependent Origination；精确定义: 一切法依因缘条件和合而生起；哲学意义: 关系性存在论；现代表达:
    系统论、网络思维'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Pratiyasamutpada_Emptiness.md
  section: 表1.1 缘起法的核心定义 (Core Definitions)
- type: concept
  question: 10的核心要点是什么？
  answer: '因缘: **有**；梵语: *Bhava*；巴利语: *Bhava*；英文: Becoming；内容说明: 存在状态、业力形成；心理学对应: 身份认同；现代理解: 存在模式固化'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Pratiyasamutpada_Emptiness.md
  section: 表1.2 十二因缘链 (Twelve Links of Dependent Origination)
- type: concept
  question: 11的核心要点是什么？
  answer: '因缘: **生**；梵语: *Jāti*；巴利语: *Jāti*；英文: Birth；内容说明: 新的生命诞生；心理学对应: 新周期开始；现代理解: 系统重启'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Pratiyasamutpada_Emptiness.md
  section: 表1.2 十二因缘链 (Twelve Links of Dependent Origination)
- type: concept
  question: 12的核心要点是什么？
  answer: '因缘: **老死**；梵语: *Jarāmaraṇa*；巴利语: *Jarāmaraṇa*；英文: Aging & Death；内容说明: 衰老死亡；心理学对应: 周期终结；现代理解: 系统终止'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Pratiyasamutpada_Emptiness.md
  section: 表1.2 十二因缘链 (Twelve Links of Dependent Origination)
- type: concept
  question: 刹那缘起的核心要点是什么？
  answer: '描述: 同一时刹那中因果关系；梵语术语: *Kṣaṇika-pratītyasamutpāda*；心理学意义: 瞬间心理变化；现代表达: 认知加工过程'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Pratiyasamutpada_Emptiness.md
  section: 表1.3 缘起法的时间维度 (Temporal Dimensions)
- type: concept
  question: 连缚缘起的核心要点是什么？
  answer: '描述: 前后相续的因果链条；梵语术语: *Sāṃbandhika-pratītyasamutpāda*；心理学意义: 行为模式延续；现代表达: 习惯形成机制'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Pratiyasamutpada_Emptiness.md
  section: 表1.3 缘起法的时间维度 (Temporal Dimensions)
- type: concept
  question: 分位缘起的核心要点是什么？
  answer: '描述: 人生不同阶段的因果；梵语术语: *Avasthā-pratītyasamutpāda*；心理学意义: 发展心理学阶段；现代表达: 生命周期理论'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Pratiyasamutpada_Emptiness.md
  section: 表1.3 缘起法的时间维度 (Temporal Dimensions)
- type: concept
