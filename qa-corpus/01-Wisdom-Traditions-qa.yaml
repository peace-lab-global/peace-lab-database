  question: 阿含/尼柯耶的核心要点是什么？
  answer: '核心术语: 随眠；梵语/巴利语: *Anuśaya* (अनुशय)；定义: 潜伏的烦恼倾向；与熏习的关系: 熏习的前身概念；现代心理学对应: 潜意识倾向'
