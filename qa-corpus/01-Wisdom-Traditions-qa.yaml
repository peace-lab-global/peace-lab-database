- type: concept
  question: 什么是导论：为何要以佛法视角重读辛格？？
  answer: 彼得·辛格的功利主义伦理学与佛教伦理传统之间存在着令人惊叹的亲和性。两者都强调**减少痛苦**、都主张**众生平等**、都呼吁**超越自我中心的伦理实践**。然而，两者在哲学基础、论证路径和终极目标上存在深刻差异。本篇三方书评试图在佛教思想的映照下，重新审视辛格的核心论证，揭示两种传统之间的共鸣与张力。
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/contemporary/applied-ethics/Buddhist_Perspective_Reviews.md
  section: 导论：为何要以佛法视角重读辛格？
