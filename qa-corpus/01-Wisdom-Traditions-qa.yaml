- type: concept
  question: 目标的核心要点是什么？
  answer: '瑜伽课 (Group Yoga): 一般性健康和健身；瑜伽理疗 (Yoga Therapy): 特定健康问题的治疗/管理；传统医学 (Medicine): 诊断和治疗疾病'
  source: 01-Wisdom-Traditions/yoga/Yoga_Therapy.md
  section: 1.1 瑜伽理疗 vs. 瑜伽课 vs. 传统医学
- type: concept
  question: 定制化的核心要点是什么？
  answer: '瑜伽课 (Group Yoga): 统一课程(一对多)；瑜伽理疗 (Yoga Therapy): 高度个性化(一对一为主)；传统医学 (Medicine): 个体化处方'
  source: 01-Wisdom-Traditions/yoga/Yoga_Therapy.md
  section: 1.1 瑜伽理疗 vs. 瑜伽课 vs. 传统医学
- type: concept
  question: 评估的核心要点是什么？
  answer: '瑜伽课 (Group Yoga): 无或简单问卷；瑜伽理疗 (Yoga Therapy): 系统评估(五鞘模型)；传统医学 (Medicine): 临床检查/影像/实验室'
  source: 01-Wisdom-Traditions/yoga/Yoga_Therapy.md
  section: 1.1 瑜伽理疗 vs. 瑜伽课 vs. 传统医学
- type: concept
  question: 物质层的核心要点是什么？
  answer: '鞘 (Kośa): Annamaya；评估内容: ROM、力量、柔韧性、姿势、疼痛位置；工具/方法: 功能运动筛查(FMS)、疼痛量表(VAS)、姿势照片；目标: 识别结构性限制和疼痛模式'
  source: 01-Wisdom-Traditions/yoga/Yoga_Therapy.md
  section: 1.2 瑜伽理疗的评估模型 (Assessment)
- type: concept
  question: 能量层的核心要点是什么？
  answer: '鞘 (Kośa): Prāṇamaya；评估内容: 呼吸模式、呼吸速率、ANS指标；工具/方法: 呼吸评估、HRV、呼吸保持时间(Kumbhaka test)；目标: 识别呼吸功能障碍和自主神经失衡'
  source: 01-Wisdom-Traditions/yoga/Yoga_Therapy.md
  section: 1.2 瑜伽理疗的评估模型 (Assessment)
- type: concept
  question: 心理层的核心要点是什么？
  answer: '鞘 (Kośa): Manomaya；评估内容: 情绪状态、思维模式、睡眠质量；工具/方法: PHQ-9(抑郁)、GAD-7(焦虑)、PSQI(睡眠)；目标: 识别心理健康需求'
  source: 01-Wisdom-Traditions/yoga/Yoga_Therapy.md
  section: 1.2 瑜伽理疗的评估模型 (Assessment)
- type: concept
  question: 广泛性焦虑 (GAD)的核心要点是什么？
  answer: '治疗目标: 接地与下调(Down-regulation)；核心练习: 缓慢腹式呼吸(1:2比)；前屈；修复瑜伽；机制: GABA↑；杏仁核反应性↓；专业视角: 将ANS从交感主导转为副交感主导；提供躯体"安全"信号；引用:
    Streeter et al. (2010)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Therapy.md
  section: 二、心理健康瑜伽理疗 (Yoga Therapy for Mental Health)
- type: concept
  question: 重度抑郁 (MDD)的核心要点是什么？
  answer: '治疗目标: 动员与连接；核心练习: 拜日式；后弯；唱诵(Kīrtana)；机制: HRV↑；情绪上调；专业视角: Tamas型需要运动(Brahmana)；Rajas型需要镇静(Langhana)；引用: Uebelacker
    et al. (2010)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Therapy.md
  section: 二、心理健康瑜伽理疗 (Yoga Therapy for Mental Health)
- type: concept
  question: 月经期的核心要点是什么？
  answer: '天数(约): Day 1-5；激素特征: 雌/孕激素最低；能量特征: 内在(Vāta↑)——需要休息；推荐练习: 修复瑜伽；温和前屈；Yoga Nidrā；避免: 倒立(传统观点)；强力核心；强力Kumbhaka'
  source: 01-Wisdom-Traditions/yoga/Yoga_Women_Health.md
  section: 1.1 月经周期四阶段的瑜伽调整
- type: concept
  question: 卵泡期的核心要点是什么？
  answer: '天数(约): Day 6-13；激素特征: 雌激素渐升；能量特征: 上升——能量和自信增加；推荐练习: 流瑜伽；力量序列；后弯；避免: 无特殊禁忌'
  source: 01-Wisdom-Traditions/yoga/Yoga_Women_Health.md
  section: 1.1 月经周期四阶段的瑜伽调整
- type: concept
  question: 排卵期的核心要点是什么？
  answer: '天数(约): Day 14(约)；激素特征: 雌激素峰值；LH激增；能量特征: 巅峰——最高能量；推荐练习: 高峰练习；挑战体式；Brahmana序列；避免: 过度训练(松弛素已↑)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Women_Health.md
  section: 1.1 月经周期四阶段的瑜伽调整
- type: concept
  question: 倒立的核心要点是什么？
  answer: '传统: 禁止——逆转Apāna Vāyu(下行气)；现代: 缺乏科学证据证明有害；建议: 尊重个人感受；不强制'
  source: 01-Wisdom-Traditions/yoga/Yoga_Women_Health.md
  section: 1.2 经期练习的传统观点与现代争议
- type: concept
  question: 强力核心的核心要点是什么？
  answer: '传统: 不建议——增加腹内压；现代: 可能加重痉挛；建议: 经痛重时避免'
  source: 01-Wisdom-Traditions/yoga/Yoga_Women_Health.md
  section: 1.2 经期练习的传统观点与现代争议
- type: concept
  question: 修复瑜伽的核心要点是什么？
  answer: '传统: 高度推荐；现代: 减少痛经(PNS激活)；建议: 仰卧束角式、倒箭式'
  source: 01-Wisdom-Traditions/yoga/Yoga_Women_Health.md
  section: 1.2 经期练习的传统观点与现代争议
- type: concept
  question: 备孕的核心要点是什么？
  answer: '挑战: 压力→HPA轴干扰排卵；瑜伽策略: 减压冥想；温和瑜伽；Yoga Nidrā；机制: 皮质醇↓→GnRH正常化；证据: ★★★ Darbandi (2018)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Women_Health.md
  section: 二、生育与瑜伽 (Fertility & Yoga)
- type: concept
  question: 辅助生殖(IVF)期的核心要点是什么？
  answer: '挑战: 极高压力+荷尔蒙波动；瑜伽策略: 修复瑜伽(取卵后温和)；正念；机制: ANS调节；情绪支持；证据: ★★★'
  source: 01-Wisdom-Traditions/yoga/Yoga_Women_Health.md
