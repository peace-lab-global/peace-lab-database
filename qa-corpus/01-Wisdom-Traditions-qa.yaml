- type: concept
  question: 什么是一、为什么读哲学经典？？
  answer: 哲学经典之所以值得阅读，并非因为它们提供标准答案，而是因为它们教会我们如何提问。每一部伟大的哲学著作都是一位思想家与人类根本困境的搏斗记录——如何面对死亡、如何理解幸福、如何在不确定中找到立足点。对于关注个人成长与身心健康的现代读者而言，哲学经典提供了一种超越流行心理学的深层资源：它们帮助我们审视那些我们甚至不知道自己持有的假设。
  source: 01-Wisdom-Traditions/philosophy/book-reviews/INDEX.md
  section: 一、为什么读哲学经典？
- type: concept
  question: 什么是二、书评导航？
  answer: 本专栏的书评分为三大板块，每篇书评均包含以下结构：作者简介、核心论证摘要、对个人成长的关键洞见、批评与局限、推荐读者群。
  source: 01-Wisdom-Traditions/philosophy/book-reviews/INDEX.md
  section: 二、书评导航
