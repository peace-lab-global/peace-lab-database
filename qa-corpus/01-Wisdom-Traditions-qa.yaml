- type: concept
  question: 逍遥游的核心要点是什么？
  answer: '原文: **Free and Easy Wandering**；解释: 追求绝对的精神自由，超越世俗束缚和价值判断。；影响: 确立了道家自由精神的核心理念，影响中国文学和艺术。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/taoism/Zhuangzi.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 齐物论的核心要点是什么？
  answer: '原文: **Equality of Things**；解释: 万物本质上是平等的，差别只是人为的分别和执着。；影响: 提供了超越二元对立的哲学视角，影响后世思辨哲学。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/taoism/Zhuangzi.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 心斋的核心要点是什么？
  answer: '原文: **Fasting of the Mind**；解释: 通过内心的清净达到与道合一的精神境界。；影响: 为道家修养工夫论提供了重要的实践方法。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/taoism/Zhuangzi.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《庄子》(Zhuangzi)的核心要点是什么？
  answer: '成书年代: 公元前4-3世纪；核心内容: 庄子及其后学的哲学著作，分为内篇、外篇、杂篇；重要性: 道家思想的重要经典，文学和哲学价值都很高'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/taoism/Zhuangzi.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《南华经》的核心要点是什么？
  answer: '成书年代: 后世称谓；核心内容: 《庄子》的别称，道教将其列为经典；重要性: 体现了庄子思想在宗教领域的影响力'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/taoism/Zhuangzi.md
  section: 主要著作 (Major Works)
- type: concept
  question: 内篇七篇的核心要点是什么？
  answer: '成书年代: 公元前4世纪；核心内容: 《逍遥游》《齐物论》《养生主》等核心篇章；重要性: 庄子思想的精髓所在，最具原创性'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/taoism/Zhuangzi.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **学术背景**：战国时期蒙地人，曾为漆园吏，接触各种思想流派

    - **思想形成**：在老子思想基础上，发展出道家哲学的独特体系

    - **文学创作**：运用寓言、重言、卮言等形式表达哲学思想

    - **学派传承**：通过弟子和后学传承庄子思想，形成庄学传统

    - **后世影响**：思想通过郭象等注释家得到进一步阐释和传播'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/taoism/Zhuangzi.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 心理自由的核心要点是什么？
  answer: '关联概念: 逍遥游；实践方法: 培养超越世俗束缚的精神自由度；现代应用: 心理解放和压力缓解'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/taoism/Zhuangzi.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 什么是综合对照总览？
  answer: '**总结**：《易经》与佛教的对话，本质上是"世间智慧"与"出世智慧"的对话。《易经》教人在变化中找到通达之道，佛教教人从变化中获得究竟解脱。二者并不矛盾——一个是在世间法层面的最高智慧，一个是在出世间法层面的终极真理。如天台宗所言："一色一香，无非中道"——若能以佛法之慧眼观之，《易经》中无处不是缘起的示现。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/yijing/Buddhist_Perspective_Reviews.md
  section: 综合对照总览
- type: concept
  question: 变易的核心要点是什么？
  answer: '佛教对应概念: 无常（anicca）；相似度: ★★★★☆；根本差异: 变易有规律可循，无常强调不可执取；启发性: ★★★★★'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/yijing/Buddhist_Perspective_Reviews.md
