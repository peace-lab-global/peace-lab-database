  answer: '愿名: 悉皆金色愿；内容: 设我得佛，国中天人不悉真金色者，不取正觉'
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Pure_Land_Five_Sutras.md
  section: 四十八大愿
- type: concept
  question: 什么是行愿功德？
  answer: 善男子！是为菩萨摩诃萨十种大愿，具足圆满。若诸菩萨，于此大愿，随顺趣入，则能成熟一切众生，则能随顺阿耨多罗三藐三菩提，则能成满普贤菩萨诸行愿海。
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Samantabhadra_Vows.md
  section: 行愿功德
