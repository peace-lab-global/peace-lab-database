  section: 延伸阅读
- type: concept
  question: 什么是第一篇 脏腑经络先后病脉证（节选）？
  answer: 问曰：上工治未病，何也？师曰：夫治未病者，见肝之病，知肝传脾，当先实脾，四季脾旺不受邪，即勿补之。中工不晓相传，见肝之病，不解实脾，惟治肝也。
  source: 01-Wisdom-Traditions/tcm-neijing/classics/Jinkui_Yaolue.md
