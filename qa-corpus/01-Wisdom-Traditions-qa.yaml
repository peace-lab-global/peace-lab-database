  question: 分别我执的核心要点是什么？
  answer: '梵语: *Parikalpita-ātmagraha*；定义: 学习而来的我执；生起来源: 意识分别计度；心理学对应: 后天自我概念、社会自我；治疗重点: 认知重构'
  source: 01-Wisdom-Traditions/religions/buddhism/vasana/Vasana_Mechanisms.md
