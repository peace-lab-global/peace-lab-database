  question: 第一步的核心要点是什么？
  answer: '中文术语: 炼精化气；核心过程 (Core Process): 调理生理平衡，积累原始能量。；关键技术/意守点: 下丹田；凝神入气穴。；现代心理生理描述: 自主神经系统调优；激素平衡。；专业视角 (Professional
    Perspective): 这是一个“补亏”的过程，为心智提升奠定生物学基础。；引用来源 (Citation): *Xiuzhen Tu*.'
