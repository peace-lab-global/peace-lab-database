  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **早期学习**：在莱比锡大学学习法学和哲学，展现出非凡的学术天赋

    - **学术游历**：游历欧洲各地，与各国学者交流，吸收不同思想传统

    - **巴黎时期**：在巴黎期间接触到数学和自然科学，发展出独特思想体系

    - **汉诺威服务**：长期服务于汉诺威选帝侯家族，从事学术和外交工作

    - **体系建构**：晚年致力于建构完整的哲学体系，留下大量手稿'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/early-modern/rationalism/Leibniz.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 认知科学的核心要点是什么？
  answer: '关联概念: 单子论；实践方法: 理解意识的多层次结构和信息处理机制；现代应用: 认知心理学和人工智能研究'
