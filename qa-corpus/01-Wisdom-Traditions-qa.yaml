  section: 1. Core Terminology (核心术语表)
- type: concept
  question: 恩典的核心要点是什么？
  answer: '英文/拉丁文: Grace / Gratia；神学内涵: 神不计代价的爱与接纳；心理学映射: **无条件积极关注** (UPR)；疗愈性功能: 彻底消除因过失带来的被抛弃感；专业视角: 打破"功利性自我"的行为枷锁，建立由于被爱而生的动力'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Wisdom_Christianity_Inner_Healing.md
  section: 2.1 Grace Dynamics (恩典动力学)
- type: concept
  question: 救赎的核心要点是什么？
  answer: '英文/拉丁文: Redemption；神学内涵: 从罪与死亡中被买赎；心理学映射: **自我的重构与修复**；疗愈性功能: 提供全新的身份认同，覆盖受损的历史叙事；专业视角: 强调"过往已矣"的终极解离'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Wisdom_Christianity_Inner_Healing.md
  section: 2.1 Grace Dynamics (恩典动力学)
- type: concept
  question: 道成肉身的核心要点是什么？
  answer: '英文/拉丁文: Incarnation；神学内涵: 神进入人的痛苦处境；心理学映射: **具身认知与共情**；疗愈性功能: 确认神性在肉身中的临在，接纳身体的脆弱；专业视角: 为身心连接提供神性的合法化解释'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Wisdom_Christianity_Inner_Healing.md
  section: 2.1 Grace Dynamics (恩典动力学)
- type: concept
  question: 圣父的核心要点是什么？
  answer: '疗愈角色: 创造者、供应者；心理学对应: 安全依恋对象；临床功能: 提供基本安全感与归属感'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Wisdom_Christianity_Inner_Healing.md
