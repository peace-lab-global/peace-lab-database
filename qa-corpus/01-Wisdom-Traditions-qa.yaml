  section: 表2.1 苦的三分类 (Three Types of Dukkha)
- type: concept
  question: 坏苦的核心要点是什么？
  answer: '梵语: *Vipariṇāma-duḥkhatā*；巴利语: *Vipariṇāma-dukkhatā*；英文: Suffering of Change；定义: 快乐转变为痛苦；具体例子: 享乐结束、关系破裂、健康衰退；心理学对应:
