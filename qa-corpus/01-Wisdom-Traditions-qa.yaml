  question: 西传先驱的核心要点是什么？
  answer: '年代: 1940s-1960s；关键人物: B.K.S. Iyengar、Pattabhi Jois、Indra Devi；贡献: 各创独特教学系统，传播至西方；影响: 三大流派成形'
  source: 01-Wisdom-Traditions/yoga/Yoga_Modern_Styles.md
  section: 从古典到现代的转型
