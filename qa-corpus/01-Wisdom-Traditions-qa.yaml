  question: 终极实在的核心要点是什么？
  answer: '奥义书（不二吠檀多）: 梵（Brahman）——纯粹觉知；佛教（中观）: 空性（śūnyatā）——否定任何终极实在；分歧性质: 实体论 vs 非实体论'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/scriptures/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 个体自我的核心要点是什么？
  answer: '奥义书（不二吠檀多）: 阿特曼（Ātman）——永恒不变；佛教（中观）: 无我（anātman）——五蕴和合的假名；分歧性质: 根本对立'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/scriptures/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 世界的核心要点是什么？
  answer: '奥义书（不二吠檀多）: 梵的幻现（māyā）；佛教（中观）: 缘起的显现（pratītyasamutpāda）；分歧性质: 一元论 vs 缘起论'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/scriptures/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 业的定义的核心要点是什么？
  answer: '《薄伽梵歌》: 基于达摩（dharma）的行动；佛教: 基于意图（cetanā）的行为；差异: 义务论 vs 意图论'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/scriptures/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 解脱后是否还有业的核心要点是什么？
  answer: '《薄伽梵歌》: 不再有——克里希纳说"将一切行为献给我即得解脱"；佛教: 阿罗汉的业已尽，但佛菩萨以愿力而非业力继续行动；差异: 不同机制'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/scriptures/Buddhist_Perspective_Reviews.md
