  question: 缘起性空的核心要点是什么？
  answer: '相关概念: 三法印、中观哲学；交叉引用文件: [缘起性空详论](../core-philosophy/Buddhism_Pratiyasamutpada_Emptiness.md) [中观体系](../core-philosophy/Buddhism_Madhyamaka_Philosophy_System.md)；理论地位:
