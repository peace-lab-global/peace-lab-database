- type: concept
  question: 打坐时的烦躁的核心要点是什么？
  answer: '宗萨仁波切说的"解药"角度: 不对抗烦躁，观察它——烦躁的本质是什么？；我的新理解: 烦躁不是修行的障碍，它就是修行的对境'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/poison-is-medicine/Multi_Perspective_Reviews.md
  section: '"毒药即解药"在修行中的理解'
- type: concept
  question: 对同修的嫉妒的核心要点是什么？
  answer: '宗萨仁波切说的"解药"角度: 嫉妒的背后是"我想要"——认出这个"我"；我的新理解: 嫉妒是自我在说话，听到它就放下了'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/poison-is-medicine/Multi_Perspective_Reviews.md
  section: '"毒药即解药"在修行中的理解'
- type: concept
  question: 修行中的昏沉的核心要点是什么？
  answer: '宗萨仁波切说的"解药"角度: 昏沉是身体的信号——不要跟它对抗；我的新理解: 不是每一次打坐都要"精神抖擞"'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/poison-is-medicine/Multi_Perspective_Reviews.md
  section: '"毒药即解药"在修行中的理解'
