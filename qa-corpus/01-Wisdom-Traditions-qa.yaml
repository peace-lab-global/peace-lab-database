- type: concept
  question: 什么是奥古斯丁（Augustine of Hippo, 354-430）？
  answer: '**核心著作：**《忏悔录》（*Confessiones*）、《上帝之城》（*De Civitate Dei*）、《论三位一体》（*De Trinitate*）、《论自由意志》（*De Libero Arbitrio*）'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Multi_Perspective_Reviews.md
  section: 奥古斯丁（Augustine of Hippo, 354-430）
- type: concept
  question: 思想原创性的核心要点是什么？
  answer: '分值(5): 5；说明: 发明了"内在性转向"，将哲学从外部世界拉回心灵深处，开创了整个西方主体性传统'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Multi_Perspective_Reviews.md
  section: 视角一：专业书评人
- type: concept
  question: 可读性的核心要点是什么？
  answer: '分值(5): 4.5；说明: 《忏悔录》文笔惊艳；《上帝之城》部分章节冗长，但整体仍具可读性'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Multi_Perspective_Reviews.md
  section: 视角一：专业书评人
- type: concept
  question: 历史影响的核心要点是什么？
  answer: '分值(5): 5；说明: 对基督教神学、西方哲学、文学、心理学的影响无出其右，直到今天仍在被重新解读'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Multi_Perspective_Reviews.md
  section: 视角一：专业书评人
- type: concept
  question: 《忏悔录》的核心要点是什么？
  answer: '推荐拉丁文本: CCSL 27 (Verheijen, 1981)；推荐英译本: Chadwick 译本（Oxford, 1991）；推荐中译本: 周士良译本（商务印书馆）'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Multi_Perspective_Reviews.md
  section: 视角三：哲学学者
- type: concept
  question: 《上帝之城》的核心要点是什么？
  answer: '推荐拉丁文本: CCSL 47-48 (Dombart/Kalb, 1955)；推荐英译本: Dyson 译本（Cambridge, 1998）；推荐中译本: 吴飞译注本（华东师范大学出版社）'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Multi_Perspective_Reviews.md
  section: 视角三：哲学学者
- type: concept
  question: 《论三位一体》的核心要点是什么？
  answer: '推荐拉丁文本: CCSL 50/50A (Mountain, 1968)；推荐英译本: McKenna 译本（Fathers of the Church）；推荐中译本: 周伟驰译本（商务印书馆）'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Multi_Perspective_Reviews.md
  section: 视角三：哲学学者
- type: concept
  question: 什么是托马斯·阿奎那（Thomas Aquinas, 1225-1274）？
  answer: '**核心著作：**《神学大全》（*Summa Theologiae*）、《反异教大全》（*Summa Contra Gentiles*）、《论存在与本质》（*De Ente et Essentia*）、《论真理》（*De
    Veritate*）'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Multi_Perspective_Reviews.md
  section: 托马斯·阿奎那（Thomas Aquinas, 1225-1274）
- type: concept
  question: 奥卡姆剃刀的核心要点是什么？
  answer: '原文: **Ockham''s Razor**；解释: 如无必要，勿增实体(Entia non sunt multiplicanda praeter necessitatem)。；影响: 成为科学方法论和逻辑学的重要原则。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Ockham.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 唯名论的核心要点是什么？
  answer: '原文: **Nominalism**；解释: 普遍概念仅仅是名称，没有独立的实在性。；影响: 推动了中世纪后期哲学向现代哲学的转变。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Ockham.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 认识论批判的核心要点是什么？
  answer: '原文: **Epistemological Critique**；解释: 质疑经院哲学的抽象概念和复杂的形而上学体系。；影响: 为现代经验主义和实证主义奠定了基础。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Ockham.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《箴言书注》(Commentary on the Sentences)的核心要点是什么？
  answer: '成书年代: 14世纪；核心内容: 对彼得·伦巴德《箴言四书》的注释；重要性: 奥卡姆哲学思想的系统阐述'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Ockham.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《逻辑大全》(Summa Logicae)的核心要点是什么？
  answer: '成书年代: 1323年；核心内容: 系统阐述逻辑学理论和方法；重要性: 中世纪逻辑学的重要著作'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Ockham.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《辩论集》(Quodlibetal Questions)的核心要点是什么？
  answer: '成书年代: 1320年代；核心内容: 神学和哲学问题的辩论集；重要性: 体现了奥卡姆的辩证思维方法'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Ockham.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **学术背景**：出生于英格兰，在牛津大学学习经院哲学

    - **方济各会**：加入方济各会，接受严格的神学训练

    - **巴黎求学**：在巴黎大学师从邓斯·司各脱学习哲学

    - **思想转向**：逐渐从实在论转向唯名论立场

    - **学术争议**：因思想观点与教会权威产生冲突，被迫离开巴黎'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Ockham.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 认知简化的核心要点是什么？
  answer: '关联概念: 奥卡姆剃刀；实践方法: 培养简化的思维方式，避免过度复杂化；现代应用: 认知行为疗法中的思维简化技术'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Ockham.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 怀疑主义转向的核心要点是什么？
  answer: '阿拉伯语: **الشكوك** (*Ash-Shukūk*)；解释: 通过对理性主义的系统质疑，转向神秘主义认识论。；影响: 开创了伊斯兰哲学的内省转向，影响苏菲主义发展。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/islamic/Al-Ghazali.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 心灵净化的核心要点是什么？
  answer: '阿拉伯语: **تزكية النفس** (*Tazkiyat al-Nafs*)；解释: 通过道德修养和精神修炼净化灵魂，达到与真主合一。；影响: 建立了系统的伊斯兰心理学和精神修炼体系。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/islamic/Al-Ghazali.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 信仰与理性的核心要点是什么？
  answer: '阿拉伯语: **العقيدة والعقل** (*Al-''Aqīda wa al-''Aql*)；解释: 区分宗教信仰的确定性和哲学思辨的不确定性。；影响: 重新确立了伊斯兰教义学的权威地位。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/islamic/Al-Ghazali.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《哲学家的矛盾》的核心要点是什么？
  answer: '阿拉伯语: **تهافت الفلاسفة** (*Tahāfut al-Falāsifa*)；写作时期: 1095年；内容概要: 系统批判亚里士多德主义和新柏拉图主义哲学。；学术价值: 伊斯兰哲学史上的里程碑式批判著作。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/islamic/Al-Ghazali.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《化学家的拯救》的核心要点是什么？
  answer: '阿拉伯语: **إحياء علوم الدين** (*Ihyā'' ''Ulūm al-Dīn*)；写作时期: 1096-1106年；内容概要: 综合性的宗教实践指南，涵盖信仰、礼仪、道德等。；学术价值: 伊斯兰苏菲主义和实践神学的经典。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/islamic/Al-Ghazali.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《目的的知识》的核心要点是什么？
  answer: '阿拉伯语: **مقاصد العلماء** (*Maqāṣid al-Falāsifa*)；写作时期: 早期；内容概要: 阐述真正的哲学应该指向精神拯救。；学术价值: 连接哲学与宗教实践的桥梁作品。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/islamic/Al-Ghazali.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **早期教育**：在呼罗珊接受传统伊斯兰教育，精通法学和神学

    - **哲学探索**：深入研究希腊哲学和伊斯兰理性主义传统

    - **精神危机**：经历严重的怀疑主义危机，质疑纯粹理性的作用

    - **苏菲转向**：通过神秘体验找到信仰的确证，转向苏菲主义

    - **综合创新**：将正统神学、苏菲主义和批判哲学有机结合'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/islamic/Al-Ghazali.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 认知重构的核心要点是什么？
  answer: '关联概念: 怀疑主义方法；实践方法: 系统质疑负面思维模式；现代应用: 认知行为疗法'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/islamic/Al-Ghazali.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: fanāʾ（消我）的核心要点是什么？
  answer: '佛教对应概念: anātman（无我）；对话张力: 本体论基础不同，修行效果可比较'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/islamic/Buddhist_Perspective_Reviews.md
  section: 一、对照框架总览
- type: concept
  question: ʿāda（神的习惯/因果）的核心要点是什么？
  answer: '佛教对应概念: pratyaya（缘起）；对话张力: 偶然论 vs 条件论'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/islamic/Buddhist_Perspective_Reviews.md
  section: 一、对照框架总览
- type: concept
  question: maʿrifa（灵知）的核心要点是什么？
  answer: '佛教对应概念: prajñā（般若）；对话张力: 一神神秘体验 vs 空性直观'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/islamic/Buddhist_Perspective_Reviews.md
  section: 一、对照框架总览
- type: concept
  question: 所缘的核心要点是什么？
  answer: '苏菲 fanāʾ: 真主（绝对实在）；佛教 samādhi: 空性（无自性）'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/islamic/Buddhist_Perspective_Reviews.md
  section: 关键差异
- type: concept
  question: 本体前提的核心要点是什么？
  answer: '苏菲 fanāʾ: 一元论：唯有神真实；佛教 samādhi: 缘起论：一切法无自性'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/islamic/Buddhist_Perspective_Reviews.md
  section: 关键差异
- type: concept
  question: 终极状态的核心要点是什么？
  answer: '苏菲 fanāʾ: 在神中的持续存在（bqāʾ）；佛教 samādhi: 无住涅槃，不执取任何状态'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/islamic/Buddhist_Perspective_Reviews.md
  section: 关键差异
