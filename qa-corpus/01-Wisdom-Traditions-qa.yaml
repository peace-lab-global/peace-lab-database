- type: concept
  question: 无选择的觉察的核心要点是什么？
  answer: '英文名 (English Term): Choiceless Awareness；梵语术语: *Anāsakti* (无执)；精确定义: 不带评判、选择、认同的纯粹觉知；疗愈意义: 跳出思维二元对立，解构心理冲突；专业视角
    (Professional Perspective): 存在主义心理学的核心'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Krishnamurti_Teachings.md
  section: 核心术语与概念表 (Core Terminology)
- type: concept
  question: 思维者与思想的核心要点是什么？
  answer: '英文名 (English Term): Thinker and Thought；梵语术语: *Dhyātṛ-Dhyeya* (冥想者-对象)；精确定义: 思维者是思想的产物，非独立实体；疗愈意义: 解构自我认同，终止内在分裂；专业视角
    (Professional Perspective): 佛教"无我"的现代表述'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Krishnamurti_Teachings.md
  section: 核心术语与概念表 (Core Terminology)
- type: concept
  question: 关系即镜子的核心要点是什么？
  answer: '英文名 (English Term): Relationship as Mirror；梵语术语: *Pratibimba* (映像)；精确定义: 所有关系反映自我的心理状态；疗愈意义: 自我觉察的最佳实验室；专业视角 (Professional
    Perspective): 关系心理学的核心洞见'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Krishnamurti_Teachings.md
  section: 核心术语与概念表 (Core Terminology)
- type: concept
  question: 自我的本质的核心要点是什么？
  answer: '核心洞见: 自我是思想、记忆、经验的累积，非永恒实体；实践方法: 观察自我运作而不认同；心理学对应: 佛教无我、建构主义自我；疗愈应用: 解构病理性自我认同；常见误解: 误以为否定自我；专业评价: 指向自我的流动性'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Krishnamurti_Teachings.md
  section: 核心教导体系表 (Core Teachings Framework)
- type: concept
  question: 觉察的力量的核心要点是什么？
  answer: '核心洞见: 觉察本身即转化，无需努力改变；实践方法: 无选择的觉察；心理学对应: 正念、元认知；疗愈应用: 接纳承诺疗法(ACT)；常见误解: 觉察≠分析；专业评价: 观察者效应的心理应用'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Krishnamurti_Teachings.md
  section: 核心教导体系表 (Core Teachings Framework)
- type: concept
  question: 恐惧与欲望的核心要点是什么？
  answer: '核心洞见: 恐惧与欲望是同一硬币的两面；实践方法: 直面恐惧不逃避不压抑；心理学对应: 暴露疗法、辩证行为疗法；疗愈应用: 焦虑障碍治疗；常见误解: 以为克服恐惧；专业评价: 与恐惧共处而非对抗'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Krishnamurti_Teachings.md
  section: 核心教导体系表 (Core Teachings Framework)
- type: concept
  question: 无选择的觉察的核心要点是什么？
  answer: '心理学派别: 正念疗法(MBSR/MBCT)；核心共鸣: 非评判觉察；差异: K反对方法，正念有技术；整合可能性: 高；专业评价: K的理论，正念的实践'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Krishnamurti_Teachings.md
  section: 克氏教导与现代心理学对照表 (K's Teachings vs Modern Psychology)
- type: concept
  question: 思维者即思想的核心要点是什么？
  answer: '心理学派别: 佛教心理学、认知科学；核心共鸣: 自我是过程非实体；差异: K更激进的去中心化；整合可能性: 高；专业评价: 解构主义自我理论'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Krishnamurti_Teachings.md
  section: 克氏教导与现代心理学对照表 (K's Teachings vs Modern Psychology)
- type: concept
  question: 苦谛的核心要点是什么？
  answer: '梵文/巴利文 (Skt/Pali): Duhkha / Dukkha；对应医学逻辑: 诊断 (Diagnosis)；心理/精神内涵: 识别生命的普遍痛苦与不满。；专业视角 (Professional Perspective):
    类似于心理学中的“主诉”，承认创伤与痛苦的真实存在。'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Wisdom_Buddhism_Healing_Psychology.md
  section: 'The Four Noble Truths: Clinical Diagnosis System (四圣谛：临床诊断系统表)'
- type: concept
  question: 集谛的核心要点是什么？
  answer: '梵文/巴利文 (Skt/Pali): Samudaya；对应医学逻辑: 病因 (Etiology)；心理/精神内涵: 发现痛苦的根源：贪、嗔、痴（三毒）。；专业视角 (Professional Perspective):
    探寻潜意识中的依恋、驱动力与认知偏见。'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Wisdom_Buddhism_Healing_Psychology.md
  section: 'The Four Noble Truths: Clinical Diagnosis System (四圣谛：临床诊断系统表)'
- type: concept
  question: 灭谛的核心要点是什么？
  answer: '梵文/巴利文 (Skt/Pali): Nirodha；对应医学逻辑: 预后 (Prognosis)；心理/精神内涵: 确认痛苦熄灭的可能性；涅槃。；专业视角 (Professional Perspective): 建立自我效能感，确认人格可以达到无染的健康态。'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Wisdom_Buddhism_Healing_Psychology.md
  section: 'The Four Noble Truths: Clinical Diagnosis System (四圣谛：临床诊断系统表)'
- type: concept
  question: 八识的核心要点是什么？
  answer: '术语 (Term): Eight Consciousnesses；全称/定义 (Definition): 眼、耳、鼻、舌、身、意、末那、阿赖耶。；心理功能: 从感官映射到深层潜意识的信息流转。；专业视角 (Professional
    Perspective): 阿赖耶识 (Alaya) 类似于集体潜意识与经验种子的容器。'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Wisdom_Buddhism_Healing_Psychology.md
  section: 'Abhidharma Psychology: Structures of Mind (阿毗达摩心理学：心法结构表)'
- type: concept
  question: 五蕴的核心要点是什么？
  answer: '术语 (Term): Five Aggregates (Skandhas)；全称/定义 (Definition): 色、受、想、行、识。；心理功能: 自我意识的建构过程；认知的五个维度。；专业视角 (Professional
    Perspective): 揭示“自我”是一个动态的、非实有的过程（无我论）。'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Wisdom_Buddhism_Healing_Psychology.md
  section: 'Abhidharma Psychology: Structures of Mind (阿毗达摩心理学：心法结构表)'
- type: concept
  question: 遍行心所的核心要点是什么？
  answer: '术语 (Term): Universal Mental Factors；全称/定义 (Definition): 作意、触、受、想、思。；心理功能: 任何心理活动都必须具备的基础处理单元。；专业视角 (Professional
    Perspective): 用于分析由于注意力受损或感觉统合失调引起的认知偏差。'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Wisdom_Buddhism_Healing_Psychology.md
  section: 'Abhidharma Psychology: Structures of Mind (阿毗达摩心理学：心法结构表)'
- type: concept
  question: 慈心禅的核心要点是什么？
  answer: '核心特征 (Features): Metta Bhavana；心理/生理机制: 持续生起慈悲心，向自他发送祝福。；针对性诉求: 激活共情神经网络；降低催乳素与皮质醇。；专业建议: 根治自我批判、厌世及社交孤立感。'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Wisdom_Buddhism_Healing_Psychology.md
  section: Buddhist Meditative Therapies (佛教禅修疗法详表)
- type: concept
  question: 止观双运的核心要点是什么？
  answer: '核心特征 (Features): Shamatha & Vipashyana；心理/生理机制: 专注力训练结合对外物空性的深度洞察。；针对性诉求: 提升前额叶控制力；打破认知的“实在论”错觉。；专业建议: 彻底终结焦虑、强迫与认知固化。'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Wisdom_Buddhism_Healing_Psychology.md
  section: Buddhist Meditative Therapies (佛教禅修疗法详表)
- type: concept
  question: 内在医治的核心要点是什么？
  answer: '英文/拉丁文: Inner Healing；希腊文: θεραπεία (therapeia)；定义: 通过祷告和圣灵工作医治心灵创伤；神学背景: 源于五旬节/灵恩运动'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Wisdom_Christianity_Inner_Healing.md
