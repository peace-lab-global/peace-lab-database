  section: 第三章：神通品（Vibhūti Pāda）— 56颂
- type: concept
  question: 禁制的核心要点是什么？
  answer: '梵文: Yama；经文出处: 2.30；核心内容: 非暴力、真实、不偷、梵行、不贪'
