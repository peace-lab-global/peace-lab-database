  answer: '英文名 (English): Higher Doctrine；巴利语 (Pāli): *Abhidhamma*；精确定义: 对法的深入分析，论藏；心理学意义: 精密心理学；专业视角: 佛教哲学与心理学'
  source: 01-Wisdom-Traditions/religions/buddhism/theravada/Buddhism_Theravada_Abhidhamma.md
