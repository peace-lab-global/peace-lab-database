  section: 'The Three Treasures: San Bao (三宝：精气神详细参数表)'
- type: concept
  question: 神** (Shen)的核心要点是什么？
  answer: '英文名: Spirit；物质基础/关联: 超级意识；前额叶与高级感知。；心理/精神功能: 洞察力；定力；自我身份感。；亏损表现: 健忘、恍惚、决策困难。；充盈表现: 目光有神、智慧透彻、临危不乱。；专业视角 (Professional
    Perspective): 表征大脑的高级执行控制与元认知能力。'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Internal_Alchemy_Neidan.md
  section: 'The Three Treasures: San Bao (三宝：精气神详细参数表)'
