  question: 1-6章的核心要点是什么？
  answer: '主要教导: 行动与自我知识；对应瑜伽: Karma Yoga + Sāṃkhya'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/scriptures/Multi_Perspective_Reviews.md
  section: 视角三：哲学学者
- type: concept
  question: 7-12章的核心要点是什么？
  answer: '主要教导: 虔信与神圣显现；对应瑜伽: Bhakti Yoga'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/scriptures/Multi_Perspective_Reviews.md
  section: 视角三：哲学学者
