  question: 什么是概述 (Overview)？
  answer: 提鲁马莱·克里希那马查亚（Tirumalai Krishnamacharya, 1888年11月18日—1989年2月28日）是20世纪最具影响力的瑜伽大师，被公认为"现代瑜伽之父"（Father of Modern Yoga）。他出生于印度卡纳塔克邦的穆奇昆德拉姆（Muchukundapuram），出身于笃信毗湿奴派的婆罗门家庭，血统可追溯至9世纪的瑜伽士圣人纳塔穆尼（Nāthamuni）。
  source: 01-Wisdom-Traditions/yoga/masters/modern-pioneers/Krishnamacharya.md
