  question: 心所的核心要点是什么？
  answer: '巴利语: *Cetasika*；英文: Mental Factors；定义: 与心相应的心理因素；细分数量: 52；特征: 伴随心生起；例子: 受、想、贪、慧'
  source: 01-Wisdom-Traditions/religions/buddhism/theravada/Theravada_Abhidhamma.md
