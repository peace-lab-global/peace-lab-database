    (Expert Insight): “无修之修”是核心特征，强调非努力的自然安住。'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Wisdom_Mahamudra_Great_Seal.md
  section: 'The Triad of Mahamudra: Ground, Path, and Fruit (大手印之基、道、果深度解析表)'
