  question: 《圣学复苏》的核心要点是什么？
  answer: '阿拉伯文: Iḥyāʾ ʿUlūm al-Dīn；性质: 系统神学–苏菲集成'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/islamic/Multi_Perspective_Reviews.md
  section: 一、所选著作
- type: concept
  question: 因果性的核心要点是什么？
  answer: '哲学视角: 习惯论，非必然；神学视角: 神的全能之表达；苏菲视角: 神在每刻的直接给予'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/islamic/Multi_Perspective_Reviews.md
  section: 三方对话：核心议题对照
- type: concept
  question: 世界的起源的核心要点是什么？
  answer: '哲学视角: 可能永恒，也可能被造；神学视角: 被造，由神意志决定；苏菲视角: 被造是恩典的显现'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/islamic/Multi_Perspective_Reviews.md
  section: 三方对话：核心议题对照
- type: concept
  question: 知识的基础的核心要点是什么？
  answer: '哲学视角: 逻辑+直觉光照；神学视角: 启示+凯拉姆论证；苏菲视角: 直接体验（dhawq）'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/islamic/Multi_Perspective_Reviews.md
  section: 三方对话：核心议题对照
- type: concept
  question: 什么是综合评价？
  answer: 安萨里的三部著作构成了一个完整的思想弧线：**批判（矛盾）→ 寻找（指津）→ 重建（复苏）**。他既非简单的反哲学保守派，也非盲目的神秘主义者，而是一位在怀疑的深渊中重新找到确定性的思想家。其遗产至今仍在伊斯兰思想中发挥着结构性的作用——无论是被拥抱还是被争论。
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/islamic/Multi_Perspective_Reviews.md
  section: 综合评价
- type: concept
  question: 核心方法的核心要点是什么？
  answer: '否定神学: 否定上帝的一切肯定属性；中观空性: 否定一切法的自性'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/jewish/Buddhist_Perspective_Reviews.md
  section: 否定神学与中观空性——两个"不可说"的伟大传统
- type: concept
  question: 语言观的核心要点是什么？
  answer: '否定神学: 语言无法描述终极实在；中观空性: 语言是"假名施设"（prajñapti）'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/jewish/Buddhist_Perspective_Reviews.md
  section: 否定神学与中观空性——两个"不可说"的伟大传统
- type: concept
  question: 终极立场的核心要点是什么？
  answer: '否定神学: 上帝超越一切概念；中观空性: 空性超越"有"与"无"的二分'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/jewish/Buddhist_Perspective_Reviews.md
  section: 否定神学与中观空性——两个"不可说"的伟大传统
- type: concept
  question: 否定范围的核心要点是什么？
  answer: '四句破: 否定四个角（有、无、亦有亦无、非有非无）；否定神学: 否定一切肯定属性'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/jewish/Buddhist_Perspective_Reviews.md
  section: 否定之路与四句破——比较哲学的方法论反思
- type: concept
  question: 否定后的剩余的核心要点是什么？
  answer: '四句破: 空性（但空性亦空）；否定神学: 上帝的存在（不可被概念把握）'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/jewish/Buddhist_Perspective_Reviews.md
  section: 否定之路与四句破——比较哲学的方法论反思
- type: concept
  question: 否定的目的的核心要点是什么？
  answer: '四句破: 破除一切执着，揭示缘起性空；否定神学: 保护上帝的超越性，避免偶像化'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/jewish/Buddhist_Perspective_Reviews.md
  section: 否定之路与四句破——比较哲学的方法论反思
- type: concept
  question: 核心理念的核心要点是什么？
  answer: '寓言解经法: 经文表面之下有更深层含义；方便法门: 教法因应听众而施设'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/jewish/Buddhist_Perspective_Reviews.md
  section: 否定之路与四句破——比较哲学的方法论反思
- type: concept
  question: 对"字面意义"的态度的核心要点是什么？
  answer: '寓言解经法: 字面意义可能是"外衣"；方便法门: 字面意义是渡河的筏'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/jewish/Buddhist_Perspective_Reviews.md
  section: 否定之路与四句破——比较哲学的方法论反思
- type: concept
  question: 负神学的核心要点是什么？
  answer: '希伯来语: **תאולוגיה שלילית** (*Theologia Negativa*)；解释: 通过否定属性来理解上帝，认为上帝超越所有人类概念。；影响: 开创了犹太哲学的理性神学传统，影响基督教经院哲学。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/jewish/Maimonides.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 律法理性化的核心要点是什么？
  answer: '希伯来语: **רציונליזציה של ההלכה** (*Halakhic Rationalization*)；解释: 用理性解释犹太律法，证明其符合理性要求。；影响: 建立了犹太教理性主义的基础，协调信仰与理性。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/jewish/Maimonides.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 中间道路的核心要点是什么？
  answer: '希伯来语: **הדרך התיכונה** (*Ha-Derekh ha-Tikhonah*)；解释: 在各种极端之间寻求平衡，包括道德品格和宗教实践。；影响: 提供了犹太伦理学的实用指导原则。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/jewish/Maimonides.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《迷误指南》的核心要点是什么？
  answer: '希伯来语: **מורה נבוכים** (*Moreh Nevukhim*)；写作时期: 1190年；内容概要: 用亚里士多德哲学解释犹太教义，解决信仰与理性冲突。；学术价值: 中世纪犹太哲学的巅峰之作，影响深远。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/jewish/Maimonides.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《米示拿托拉》的核心要点是什么？
  answer: '希伯来语: **משנה תורה** (*Mishneh Torah*)；写作时期: 1170-1180年；内容概要: 系统整理犹太律法的权威法典，涵盖所有法律领域。；学术价值: 犹太法学史上最重要的法典汇编之一。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/jewish/Maimonides.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《十三条信仰原则》的核心要点是什么？
  answer: '希伯来语: **שלש עשרה אמונות** (*Shlosh Esreh Ikkarim*)；写作时期: 1165年；内容概要: 确立犹太教的基本信仰原则，成为正统犹太教信条。；学术价值: 犹太教义学的基石文献。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/jewish/Maimonides.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **多元文化背景**：在穆斯林统治下的安达卢西亚成长，接触阿拉伯、希腊和犹太文化

    - **医学训练**：学习医学并成为宫廷御医，体现了科学与宗教的结合

    - **哲学探索**：深入研究亚里士多德、新柏拉图主义和伊斯兰哲学

    - **律法编纂**：致力于整理和系统化复杂的犹太律法体系

    - **综合创新**：成功融合希腊理性主义与犹太传统'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/jewish/Maimonides.md
  section: 思想发展 (Intellectual Development)
- type: concept
