  question: 总部的核心要点是什么？
  answer: '内容: 印度Mysore，KPJAYI (K. Pattabhi Jois Ashtanga Yoga Institute)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Modern_Styles.md
  section: 1. Ashtanga Vinyasa Yoga (阿斯汤加串联瑜伽)
- type: concept
  question: 迷走神经刺激的核心要点是什么？
  answer: '瑜伽实践: Ujjāyī、唱诵OṂ、延长呼气；神经通路: 迷走传入→NTS→蓝斑核→前额叶；测量方法: HRV(RMSSD)；关键发现: 迷走张力↑=情绪调节↑+炎症↓；代表研究: Gerritsen & Band (2018)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Neuroscience_Modern_Research.md
  section: 一、瑜伽影响大脑的核心机制
- type: concept
  question: GABA系统上调的核心要点是什么？
  answer: '瑜伽实践: 体式练习(60分钟)；神经通路: 丘脑GABA释放↑；测量方法: MRS(磁共振波谱)；关键发现: 瑜伽后丘脑GABA↑27%(vs.步行)；代表研究: Streeter et al. (2010)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Neuroscience_Modern_Research.md
  section: 一、瑜伽影响大脑的核心机制
- type: concept
  question: HPA轴调节的核心要点是什么？
  answer: '瑜伽实践: 冥想+体式+调息；神经通路: 下丘脑CRH↓→ACTH↓→皮质醇↓；测量方法: 唾液/血浆皮质醇；关键发现: 8周MBSR后皮质醇显著↓；代表研究: Pascoe et al. (2017)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Neuroscience_Modern_Research.md
  section: 一、瑜伽影响大脑的核心机制
- type: concept
  question: 专注冥想 (FA)的核心要点是什么？
  answer: '主要激活脑区: dlPFC、ACC、顶叶；主要抑制脑区: DMN(PCC、mPFC)；功能效应: 持续注意力↑；走神↓；研究方法: fMRI'
  source: 01-Wisdom-Traditions/yoga/Yoga_Neuroscience_Modern_Research.md
  section: 二、不同瑜伽练习的脑区影响图谱
- type: concept
  question: 开放觉察 (OM)的核心要点是什么？
  answer: '主要激活脑区: 前岛叶、ACC、TPJ；主要抑制脑区: dlPFC(活动变化)；功能效应: 元觉察↑；内感受↑；研究方法: fMRI'
  source: 01-Wisdom-Traditions/yoga/Yoga_Neuroscience_Modern_Research.md
  section: 二、不同瑜伽练习的脑区影响图谱
- type: concept
  question: 慈悲冥想的核心要点是什么？
  answer: '主要激活脑区: 前岛叶、TPJ、纹状体；主要抑制脑区: 杏仁核(部分)；功能效应: 共情↑；利他动机↑；研究方法: fMRI'
  source: 01-Wisdom-Traditions/yoga/Yoga_Neuroscience_Modern_Research.md
  section: 二、不同瑜伽练习的脑区影响图谱
- type: concept
  question: 炎症因子(IL-6, TNF-α, CRP)的核心要点是什么？
  answer: '瑜伽干预的效应: 显著降低(Meta-analysis)；机制: HPA轴调节→皮质醇↓→NF-κB↓；临床意义: 慢性炎症疾病(心脏病、糖尿病、抑郁)；引用: Bower & Irwin (2016)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Neuroscience_Modern_Research.md
  section: 三、瑜伽的神经免疫学 (Neuroimmunology)
- type: concept
  question: 自然杀伤(NK)细胞的核心要点是什么？
  answer: '瑜伽干预的效应: 活性↑；机制: 减压→免疫监视恢复；临床意义: 癌症辅助治疗；引用: Fang et al. (2010)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Neuroscience_Modern_Research.md
  section: 三、瑜伽的神经免疫学 (Neuroimmunology)
- type: concept
  question: 瑜伽休息术的核心要点是什么？
  answer: '英文术语: Yoga Nidra；梵语术语: योगनिद्रा (Yoga Nidrā)；词源/定义: Yoga(瑜伽) + Nidrā(睡眠) = 瑜伽睡眠；临床意义: 系统化放松与意识训练'
