  section: 表1.2 四圣谛的三转十二行相 (Three Turnings & Twelve Aspects)
- type: concept
  question: 劝转的核心要点是什么？
  answer: '梵语: *Pravartana*；巴利语: *Pavattana*；含义: 指出应做；苦谛: 苦应遍知；集谛: 集应永断；灭谛: 灭应作证；道谛: 道应修习'
