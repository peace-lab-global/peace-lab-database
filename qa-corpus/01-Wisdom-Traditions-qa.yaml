- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **早年经历**：出身卫国，早年求学但家道中落

    - **军事生涯**：先后在鲁国、魏国、楚国担任军事要职

    - **改革实践**：在魏国创立武卒制，在楚国推行变法

    - **战绩辉煌**：一生大小七十余战，未尝败绩

    - **悲剧结局**：楚悼王去世后被贵族报复杀害'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/other-schools/WuQi.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 领导力的核心要点是什么？
  answer: '关联概念: 爱兵如子；实践方法: 培养关爱下属和建立信任关系的领导风格；现代应用: 现代领导力发展和团队建设'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/other-schools/WuQi.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 五德终始的核心要点是什么？
  answer: '原文: **Five Phases Succession**；解释: 提出五行相克的历史循环理论，解释朝代更替规律。；影响: 确立了阴阳家在历史哲学方面的独特贡献。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/other-schools/ZouYan.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 大九州的核心要点是什么？
  answer: '原文: **Great Nine Provinces**；解释: 认为天下分为九个大州，中国只是其中之一。；影响: 开阔了古代中国的地理观念和世界观。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/other-schools/ZouYan.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 阴阳五行的核心要点是什么？
  answer: '原文: **Yin-Yang and Five Elements**；解释: 系统阐述阴阳消长和五行生克的宇宙运行规律。；影响: 为古代自然哲学和宇宙论提供了理论框架。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/other-schools/ZouYan.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《邹子》的核心要点是什么？
  answer: '成书年代: 战国时期；核心内容: 邹衍的阴阳五行理论和历史哲学著作；重要性: 阴阳家思想的核心文献，可惜已散佚'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/other-schools/ZouYan.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《邹子终始》的核心要点是什么？
  answer: '成书年代: 战国时期；核心内容: 系统阐述五德终始理论的专著；重要性: 体现了邹衍历史哲学的理论深度'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/other-schools/ZouYan.md
  section: 主要著作 (Major Works)
- type: concept
  question: 相关记载的核心要点是什么？
  answer: '成书年代: 汉代以后；核心内容: 散见于《史记》《汉书》等史籍中的思想片段；重要性: 了解邹衍思想的重要二手资料'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/other-schools/ZouYan.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **学术背景**：战国时期齐国人，稷下学宫的重要学者

    - **思想形成**：在综合各家思想基础上，形成独特的阴阳五行体系

    - **学术地位**：被誉为"谈天衍"，在当时享有极高声誉

    - **政治影响**：其理论被各诸侯国用来论证政权合法性

    - **学派传承**：培养了一批阴阳家学者，延续学派传统'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/other-schools/ZouYan.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 系统思维的核心要点是什么？
  answer: '关联概念: 五行生克；实践方法: 培养整体性思维和系统性认知能力；现代应用: 系统思维训练和复杂问题分析'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/other-schools/ZouYan.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 本体论含义的核心要点是什么？
  answer: '老子的"无": "无"是道的本质状态；佛教的"空": "空"是否定自性，不是一种状态；异同评价: **不同**'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/taoism/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 生成论的核心要点是什么？
  answer: '老子的"无": "天下万物生于有，有生于无"；佛教的"空": 万法因缘和合而生，不从"无"生；异同评价: **根本不同**'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/taoism/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 认识论的核心要点是什么？
  answer: '老子的"无": "为学日益，为道日损"；佛教的"空": 闻思修+般若（非"日损"可概括）；异同评价: **有共鸣但不同**'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/taoism/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
