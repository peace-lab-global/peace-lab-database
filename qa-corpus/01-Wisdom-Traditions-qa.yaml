- type: concept
  question: 存在主义的核心要点是什么？
  answer: '原文: **Existentialism**；解释: 强调个体存在的重要性，反对抽象的系统哲学。；影响: 确立了现代存在主义哲学的基础。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Kierkegaard.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 主观真理的核心要点是什么？
  answer: '原文: **Subjective Truth**；解释: 真理是主观的，必须通过个人的选择和承诺来实现。；影响: 影响了后来的存在主义认识论。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Kierkegaard.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 飞跃的核心要点是什么？
  answer: '原文: **Leap**；解释: 信仰需要超越理性的跳跃，不能通过逻辑证明。；影响: 为现代宗教哲学提供了新的思路。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Kierkegaard.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《恐惧与战栗》(Fear and Trembling)的核心要点是什么？
  answer: '出版年份: 1843年；核心内容: 通过亚伯拉罕献祭以撒的故事探讨信仰的悖论；重要性: 克尔凯郭尔最重要的宗教哲学著作'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Kierkegaard.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《重复》(Repetition)的核心要点是什么？
  answer: '出版年份: 1843年；核心内容: 探讨个体如何通过重复找回失去的自我；重要性: 存在主义心理学的重要文献'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Kierkegaard.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《焦虑的概念》(The Concept of Anxiety)的核心要点是什么？
  answer: '出版年份: 1844年；核心内容: 系统阐述焦虑理论和人类心理机制；重要性: 现代焦虑研究的经典文献'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Kierkegaard.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **早期学习**：在哥本哈根大学学习神学，深受黑格尔哲学影响

    - **个人危机**：与雷吉娜·奥尔森的恋爱和分手经历深刻影响其思想

    - **创作爆发期**：1843-1846年间密集出版多部重要哲学著作

    - **宗教转向**：后期更加关注宗教问题和基督教真理

    - **社会批评**：批判丹麦国教会的形式主义和制度化'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Kierkegaard.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 存在主义治疗的核心要点是什么？
  answer: '关联概念: 焦虑理论；实践方法: 帮助患者理解和接纳存在性焦虑；现代应用: 存在主义心理治疗的核心技术'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Kierkegaard.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 思想原创性的核心要点是什么？
  answer: '分值(5): 5；说明: 将康德认识论与印度哲学融合，开创非理性主义传统'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Multi_Perspective_Reviews.md
  section: 视角一：专业书评人
- type: concept
  question: 可读性的核心要点是什么？
  answer: '分值(5): 3.5；说明: 第一卷需要康德背景，第二卷容易得多'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Multi_Perspective_Reviews.md
  section: 视角一：专业书评人
- type: concept
  question: 文学质量的核心要点是什么？
  answer: '分值(5): 5；说明: 哲学书中罕见的文学杰作（德文原文尤其震撼）'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Multi_Perspective_Reviews.md
  section: 视角一：专业书评人
- type: concept
  question: 可读性的核心要点是什么？
  answer: '分值(5): 3.5；说明: 比其他哲学书有趣，但隐喻密集、逻辑跳跃'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Multi_Perspective_Reviews.md
  section: 视角一：专业书评人
- type: concept
  question: 权力意志的核心要点是什么？
  answer: '原文: **Wille zur Macht**；解释: 认为权力意志是生命的本质和驱动力，是一切存在的基础。；影响: 影响了后来的存在主义、精神分析和后现代主义思想。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Nietzsche.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 超人的核心要点是什么？
  answer: '原文: **Übermensch**；解释: 提出超人的概念，认为超人是超越传统道德和宗教束缚的人，是未来人类的理想类型。；影响: 影响了后来的存在主义和个人主义思想。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Nietzsche.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 上帝已死的核心要点是什么？
  answer: '原文: **Gott ist tot**；解释: 宣布“上帝已死”，认为传统的基督教道德和价值观念已经失去了生命力，需要重新评估价值。；影响: 影响了后来的无神论、存在主义和后现代主义思想。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Nietzsche.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 什么是主要著作 (Major Works)？
  answer: '尼采的主要著作包括：

    - 《悲剧的诞生》(The Birth of Tragedy)：讨论希腊悲剧的本质和意义

    - 《人性的，太人性的》(Human, All Too Human)：讨论道德、宗教和哲学的本质

    - 《查拉图斯特拉如是说》(Thus Spoke Zarathustra)：阐述他的核心思想，包括超人、权力意志和永恒轮回

    - 《善恶的彼岸》(Beyond Good and Evil)：批判传统道德和哲学，提出新的价值观念

    - 《道德的谱系》(On the Genealogy of Morals)：分析道德的起源和发展

    - 《偶像的黄昏》(Twilight of the Idols)：批判传统哲学和宗教

    - 《反基督》(The Antichrist)：批判基督教

    - 《看哪这人》(Ecce Homo)：尼采的自传'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Nietzsche.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: 尼采的思想发展主要体现在他对传统道德、宗教和哲学的批判上。他受到叔本华意志哲学的影响，但反对叔本华的悲观主义，发展了权力意志的概念。他批判基督教道德，认为它是奴隶道德，压抑了人的生命力。他宣布“上帝已死”，呼吁重新评估一切价值。他提出超人的概念，认为超人是超越传统束缚的人，是未来人类的理想类型。他还提出永恒轮回的概念，认为宇宙中的一切事物都会无限次地重复发生。
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Nietzsche.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 自我超越的核心要点是什么？
  answer: '具体应用: 强调超人的概念，教导人们超越传统道德和宗教的束缚，实现自我超越和自我创造。；现代价值: 帮助人们突破自我限制，发掘潜能，实现个人成长。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Nietzsche.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 价值重估的核心要点是什么？
  answer: '具体应用: 呼吁重新评估一切价值，教导人们不要盲目接受传统的道德和价值观念，而是要根据自己的生命力和创造力创造新的价值。；现代价值: 帮助人们摆脱过时价值观念的束缚，建立符合自己真实需求的价值体系。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Nietzsche.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 直面苦难的核心要点是什么？
  answer: '具体应用: 认为苦难是生命的一部分，是成长和超越的机会，教导人们勇敢面对苦难，而不是逃避或否定它。；现代价值: 帮助人们培养心理韧性，更好地应对生活中的挫折和困难。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Nietzsche.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 意志哲学的核心要点是什么？
  answer: '原文: **Philosophy of Will**；解释: 意志是世界的本质和驱动力，表现为盲目的冲动。；影响: 开创了现代非理性主义哲学传统。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Schopenhauer.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 表象理论的核心要点是什么？
  answer: '原文: **Theory of Representation**；解释: 世界作为表象是我们认识的唯一对象。；影响: 影响了后来的现象学和分析哲学。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Schopenhauer.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 悲观主义的核心要点是什么？
  answer: '原文: **Pessimism**；解释: 生命本质上是痛苦的，因为意志永远无法得到满足。；影响: 深刻影响了现代存在主义和悲观主义思潮。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Schopenhauer.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《作为意志和表象的世界》(Die Welt als Wille und Vorstellung)的核心要点是什么？
  answer: '出版年份: 1818年；核心内容: 系统阐述意志哲学体系；重要性: 叔本华最重要的哲学著作'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Schopenhauer.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《论充足理由律的四重根》(Über die vierfache Wurzel des Satzes vom zureichenden Grunde)的核心要点是什么？
  answer: '出版年份: 1813年；核心内容: 探讨认识论基础问题；重要性: 早期重要哲学著作'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Schopenhauer.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《论意志的自由》(Über die Freiheit des menschlichen Willens)的核心要点是什么？
  answer: '出版年份: 1839年；核心内容: 分析意志自由问题；重要性: 获得挪威皇家科学院奖的作品'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Schopenhauer.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **早期学习**：在哥廷根大学和柏林大学学习，深受康德、柏拉图影响

    - **体系建构**：花费多年时间建构完整的意志哲学体系

    - **学术挫折**：《作为意志和表象的世界》初版反响冷淡

    - **晚年声誉**：70岁后才获得广泛认可，成为著名哲学家

    - **持续创作**：直到去世前仍在修改和完善自己的哲学体系'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Schopenhauer.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 深度心理学的核心要点是什么？
  answer: '关联概念: 意志理论；实践方法: 理解潜意识驱动和本能冲动的心理机制；现代应用: 精神分析和分析心理学'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Schopenhauer.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 什么是维特根斯坦 (Wittgenstein)？
  answer: '"凡不可说的，必须保持沉默。" ——《逻辑哲学论》最后命题

    >

    > "我的语言的界限，意味着我的世界的界限。"'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/analytic/Buddhist_Perspective_Reviews.md
  section: 维特根斯坦 (Wittgenstein)
- type: concept
  question: 语言的界限的核心要点是什么？
  answer: '维特根斯坦: 逻辑图像论划定可说与不可说；后期转向意义即使用；佛教（中观/唯识）: 世俗谛(saṃvṛti-satya)与胜义谛(paramārtha-satya)二谛框架；语言属世俗施设；差异的哲学意义: 维氏的界限是逻辑-句法的；佛教的二谛是认识论-解脱论的双重架构。佛教在世俗谛内部做了细致的安立，而非简单划界'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/analytic/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 本质主义批判的核心要点是什么？
  answer: '维特根斯坦: 家族相似取代共同本质；反本质主义；佛教（中观/唯识）: 中观：一切法无自性(ṣūnyatā)；诸法但有假名(prajñapti)；差异的哲学意义: 维氏否定的是抽象的"共同本质"，佛教否定的是"自性"(svabhāva)即任何形式的独立存在。佛教的空性是全面的存有论批判'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/analytic/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 意义的来源的核心要点是什么？
  answer: '维特根斯坦: 意义在于语言游戏中的使用；根植于生活形式；佛教（中观/唯识）: 意义由因缘和合的施设所成；依他起性(para-tantra-svabhāva)；差异的哲学意义: 维氏的"生活形式"是社会-人类学的；唯识的"依他起"是意识结构性的。后者提供了一套更为系统的意识哲学基础'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/analytic/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 什么是内容索引 | Contents？
  answer: '- [Wittgenstein](Wittgenstein.md)

    - [WittgensteinLater](WittgensteinLater.md)'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/analytic/INDEX.md
  section: 内容索引 | Contents
- type: concept
  question: 思想原创性的核心要点是什么？
  answer: '分值(5): 5；说明: 图像论和"不可说"的边界划定了全新的哲学地图'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/analytic/Multi_Perspective_Reviews.md
  section: 视角一：专业书评人
- type: concept
  question: 论证严密性的核心要点是什么？
  answer: '分值(5): 4.5；说明: 用编号系统（1, 1.1, 1.11...）构建了近乎数学的结构'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/analytic/Multi_Perspective_Reviews.md
  section: 视角一：专业书评人
- type: concept
  question: 可读性的核心要点是什么？
  answer: '分值(5): 2.5；说明: 句子简短但极度浓缩——每个命题都需要数倍篇幅的注释'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/analytic/Multi_Perspective_Reviews.md
  section: 视角一：专业书评人
- type: concept
  question: 标准诠释（逻辑实证主义）的核心要点是什么？
  answer: '核心主张: 《逻辑哲学论》主张只有经验命题有意义，形而上学是废话；代表学者: A.J. Ayer, Carnap'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/analytic/Multi_Perspective_Reviews.md
  section: 视角三：哲学学者
- type: concept
  question: 非正统诠释（新维特根斯坦）的核心要点是什么？
  answer: '核心主张: 《逻辑哲学论》不是在主张图像论，是在展示图像论的荒谬，从而"治疗"哲学；代表学者: Cora Diamond, James Conant'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/analytic/Multi_Perspective_Reviews.md
  section: 视角三：哲学学者
- type: concept
  question: 形而上学诠释的核心要点是什么？
  answer: '核心主张: 《逻辑哲学论》有严肃的形而上学承诺——简素对象和逻辑空间；代表学者: P.M.S. Hacker, David Pears'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/analytic/Multi_Perspective_Reviews.md
  section: 视角三：哲学学者
- type: concept
  question: 语言游戏的核心要点是什么？
  answer: '原文: **Language Games**；解释: 语言的意义在于其使用，不同的语言游戏有不同的规则。；影响: 确立了语言哲学的新范式，影响了后来的语言分析哲学。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/analytic/Wittgenstein.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 私人语言论证的核心要点是什么？
  answer: '原文: **Private Language Argument**；解释: 不存在真正的私人语言，语言本质上是公共的。；影响: 深刻影响了心灵哲学和认知科学。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/analytic/Wittgenstein.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 家族相似性的核心要点是什么？
  answer: '原文: **Family Resemblance**；解释: 概念通过家族相似性联系，而非共同本质。；影响: 影响了后来的概念理论和分类学。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/analytic/Wittgenstein.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《逻辑哲学论》(Tractatus Logico-Philosophicus)的核心要点是什么？
  answer: '出版年份: 1921年；核心内容: 早期哲学体系，探讨语言、逻辑与世界的逻辑结构；重要性: 维特根斯坦早期思想的经典表述'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/analytic/Wittgenstein.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《哲学研究》(Philosophical Investigations)的核心要点是什么？
  answer: '出版年份: 1953年；核心内容: 后期哲学思想，批判早期理论，发展语言游戏理论；重要性: 维特根斯坦后期思想的代表作'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/analytic/Wittgenstein.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《蓝皮书和棕皮书》(The Blue and Brown Books)的核心要点是什么？
  answer: '出版年份: 1958年；核心内容: 关于意义、理解、规则遵循等问题的讲座笔记；重要性: 体现了哲学方法论的重要发展'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/analytic/Wittgenstein.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **早期学习**：在维也纳接受工程技术教育，后转向哲学

    - **剑桥时期**：师从罗素，发展出《逻辑哲学论》的逻辑原子主义

    - **第一次转变**：战后教学实践中反思早期理论的局限性

    - **后期发展**：在剑桥和爱尔兰期间发展出语言游戏理论

    - **思想成熟**：通过教学和讨论不断完善后期哲学思想'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/analytic/Wittgenstein.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 认知治疗的核心要点是什么？
  answer: '关联概念: 概念混乱治疗；实践方法: 通过澄清概念使用来解决心理困惑；现代应用: 认知行为疗法的概念重构技术'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/analytic/Wittgenstein.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 语言游戏的核心要点是什么？
  answer: '原文: **Language Games**；解释: 语言的意义在于其使用，如同游戏有不同的规则。；影响: 革命性地改变了语言哲学和分析哲学的方向。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/analytic/WittgensteinLater.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 家族相似的核心要点是什么？
  answer: '原文: **Family Resemblance**；解释: 概念之间通过重叠的相似性联系，而非共同本质。；影响: 挑战了传统的概念定义理论。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/analytic/WittgensteinLater.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 生活形式的核心要点是什么？
  answer: '原文: **Forms of Life**；解释: 语言和意义根植于具体的生活实践和社会背景。；影响: 为理解语言的社会文化维度提供了框架。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/analytic/WittgensteinLater.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《哲学研究》(Philosophical Investigations)的核心要点是什么？
  answer: '出版年份: 1953年；核心内容: 系统阐述后期语言哲学和哲学方法论；重要性: 20世纪最重要的哲学著作之一'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/analytic/WittgensteinLater.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《论确实性》(On Certainty)的核心要点是什么？
  answer: '出版年份: 1969年；核心内容: 探讨知识、怀疑和确定性的哲学问题；重要性: 认识论研究的重要文献'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/analytic/WittgensteinLater.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《蓝皮书和棕皮书》(The Blue and Brown Books)的核心要点是什么？
  answer: '出版年份: 1958年；核心内容: 早期讲座和思想发展的记录；重要性: 了解思想转变过程的重要资料'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/analytic/WittgensteinLater.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **早期成就**：《逻辑哲学论》的成功和维也纳学派的影响

    - **思想危机**：对早期理论的深刻反思和批判

    - **方法转向**：从逻辑分析转向语言的实际使用研究

    - **剑桥时期**：在剑桥大学的教学和思想成熟期

    - **后期整合**：形成完整的后期哲学体系和方法论'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/analytic/WittgensteinLater.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 心理治疗的核心要点是什么？
  answer: '关联概念: 语言游戏分析；实践方法: 通过分析患者的语言使用理解其心理状态；现代应用: 叙事治疗和话语分析疗法'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/analytic/WittgensteinLater.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 死亡是此在"最本己的可能性"的核心要点是什么？
  answer: '佛教: 死亡是一切有为法的必然归宿；共鸣点: 都将死亡视为理解存在的关键'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/continental/Buddhist_Perspective_Reviews.md
  section: 视角一：专业书评人
- type: concept
  question: 面对死亡使此在从"沉沦"中觉醒的核心要点是什么？
  answer: '佛教: 念死使修行者从放逸中觉醒；共鸣点: 都认为直面死亡是一种觉醒的力量'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/continental/Buddhist_Perspective_Reviews.md
  section: 视角一：专业书评人
- type: concept
  question: 本真地存在 = 不逃避自己的有限性的核心要点是什么？
  answer: '佛教: 正知无常 = 不执著于恒常的幻觉；共鸣点: 都指向一种"不自我欺骗"的生存方式'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/continental/Buddhist_Perspective_Reviews.md
  section: 视角一：专业书评人
- type: concept
  question: 此在（Dasein）的核心要点是什么？
  answer: '佛教对应概念: 有情（sattva）；比较价值: ★★★★★ 两者都在分析"存在者的存在方式"'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/continental/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 在世存在（In-der-Welt-sein）的核心要点是什么？
  answer: '佛教对应概念: 缘起（pratītyasamutpāda）；比较价值: ★★★★ 都否定孤立主体'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/continental/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 烦/畏（Angst）的核心要点是什么？
  answer: '佛教对应概念: 苦/焦虑（duḥkha/utpāda）；比较价值: ★★★★ 都揭示了存在的深层不安'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/continental/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 此在分析的核心要点是什么？
  answer: '原文: **Dasein Analysis**；解释: 对人的存在结构进行现象学分析，揭示存在的基本结构。；影响: 确立了存在主义现象学的基本方法。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/continental/Heidegger.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 在世存在的核心要点是什么？
  answer: '原文: **Being-in-the-World**；解释: 人的存在本质上是在世界中的存在，与世界不可分割。；影响: 影响了后来的环境哲学和生态心理学。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/continental/Heidegger.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 向死而生的核心要点是什么？
  answer: '原文: **Being-towards-Death**；解释: 死亡是存在的终极可能性，面对死亡才能获得本真性。；影响: 深刻影响了存在主义心理学和死亡哲学。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/continental/Heidegger.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《存在与时间》(Sein und Zeit)的核心要点是什么？
  answer: '出版年份: 1927年；核心内容: 系统阐述此在现象学分析，探讨存在问题；重要性: 海德格尔最重要的哲学著作'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/continental/Heidegger.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《形而上学导论》(Einführung in die Metaphysik)的核心要点是什么？
  answer: '出版年份: 1935年；核心内容: 探讨西方形而上学传统和存在问题；重要性: 存在哲学的重要文献'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/continental/Heidegger.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《林中路》(Holzwege)的核心要点是什么？
  answer: '出版年份: 1950年；核心内容: 收录多篇重要论文，涉及艺术、技术、语言等主题；重要性: 体现了海德格尔思想的丰富性'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/continental/Heidegger.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **早期学习**：在弗赖堡大学学习神学和哲学，师从胡塞尔

    - **现象学阶段**：深受胡塞尔现象学影响，发展出此在分析方法

    - **存在问题转向**：从认识论转向存在问题，批判西方形而上学传统

    - **政治争议期**：1933-1934年担任弗赖堡大学校长期间的政治选择

    - **后期思想**：转向对技术、语言、艺术的思考，发展出"四重整体"理论'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/continental/Heidegger.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 存在主义治疗的核心要点是什么？
  answer: '关联概念: 向死而生；实践方法: 帮助个体面对存在焦虑，获得生命意义；现代应用: 存在主义心理治疗的核心技术'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/continental/Heidegger.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 现象学的核心要点是什么？
  answer: '原文: **Phenomenology**；解释: 研究意识现象的本质结构，回到事物本身。；影响: 开创了现象学运动，影响了20世纪哲学发展。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/continental/Husserl.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 意向性的核心要点是什么？
  answer: '原文: **Intentionality**；解释: 意识总是关于某物的意识，具有指向性特征。；影响: 为意识研究提供了重要的理论框架。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/continental/Husserl.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 现象学还原的核心要点是什么？
  answer: '原文: **Phenomenological Reduction**；解释: 通过悬置自然态度，纯粹描述意识现象。；影响: 提供了独特的哲学研究方法。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/continental/Husserl.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《逻辑研究》(Logical Investigations)的核心要点是什么？
  answer: '出版年份: 1900-1901年；核心内容: 系统阐述现象学方法和逻辑理论；重要性: 现象学运动的奠基之作'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/continental/Husserl.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《纯粹现象学和现象学哲学观念》(Ideas)的核心要点是什么？
  answer: '出版年份: 1913年；核心内容: 阐述纯粹现象学的理论体系；重要性: 现象学哲学的经典文献'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/continental/Husserl.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《欧洲科学的危机》(The Crisis of European Sciences)的核心要点是什么？
  answer: '出版年份: 1936年；核心内容: 分析现代科学的根基问题和生活世界理论；重要性: 晚期重要著作，影响深远'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/continental/Husserl.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **早期学习**：在维也纳和柏林学习数学、哲学和心理学

    - **学术转向**：从数学转向哲学，师从弗朗兹·布伦塔诺

    - **现象学创立**：在《逻辑研究》中正式提出现象学方法

    - **哥廷根时期**：在哥廷根大学建立现象学研究中心

    - **后期发展**：在弗莱堡大学继续发展生活世界理论'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/continental/Husserl.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 心理治疗的核心要点是什么？
  answer: '关联概念: 现象学方法；实践方法: 通过描述性分析理解患者经验；现代应用: 人本主义心理学和存在主义治疗'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/20th-century/continental/Husserl.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
