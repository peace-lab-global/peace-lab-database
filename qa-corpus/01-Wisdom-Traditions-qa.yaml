  question: 什么是一、总体评价？
  answer: 这本书是宗萨蒋扬钦哲仁波切在不同场合的开示和演讲的合集。如果《正见》是精心构思的"作品"，《八万四千问》是即兴的"对话"，那《人间是剧场》就是他在不同时间、不同地点、面对不同听众时说出的那些话——被收集在一起。
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/world-is-a-playground/Book_Review.md
