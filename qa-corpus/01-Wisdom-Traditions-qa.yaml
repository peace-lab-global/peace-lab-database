- type: concept
  question: 三法印的核心要点是什么？
  answer: '相关概念: 无常、苦、无我；交叉引用文件: [三法印解析](../core-philosophy/Buddhism_Three_Seals_One_Reality.md)；理论地位: 认证标准；实践意义: 正见建立；现代整合:
    变化接纳、无常心理学'
