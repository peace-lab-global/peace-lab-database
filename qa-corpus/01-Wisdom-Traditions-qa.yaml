  question: 实体一元论的核心要点是什么？
  answer: '原文: **Substance Monism**；解释: 只存在一个实体，即上帝或自然，思维和广延是其属性。；影响: 奠定了现代一元论哲学的基础。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/early-modern/rationalism/Spinoza.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 决定论的核心要点是什么？
  answer: '原文: **Determinism**；解释: 一切事物都按照必然的因果律发生，包括人类行为。；影响: 影响了后来的科学哲学和心理学。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/early-modern/rationalism/Spinoza.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 心灵平行论的核心要点是什么？
  answer: '原文: **Psychophysical Parallelism**；解释: 心灵和身体是同一实体的两个方面，彼此平行不相互作用。；影响: 影响了现代心身问题研究。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/early-modern/rationalism/Spinoza.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《伦理学》(Ethica Ordine Geometrico Demonstrata)的核心要点是什么？
  answer: '出版年份: 1677年；核心内容: 用几何学方法证明伦理学和形而上学原理；重要性: 斯宾诺莎最重要的哲学著作'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/early-modern/rationalism/Spinoza.md
