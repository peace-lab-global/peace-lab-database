  section: 八、参考文献
- type: concept
  question: 运动的核心要点是什么？
  answer: '阳 (Yang): 动态、外向、上升；阴 (Yin): 静态、内守、下降'
  source: 01-Wisdom-Traditions/tcm-neijing/YinYang_Five_Elements.md
  section: 1.1 阴阳学说概述
- type: concept
  question: 五脏的核心要点是什么？
  answer: '木 (Wood): 肝 (Liver)；火 (Fire): 心 (Heart)；土 (Earth): 脾 (Spleen)；金 (Metal): 肺 (Lung)；水 (Water): 肾 (Kidney)'
  source: 01-Wisdom-Traditions/tcm-neijing/YinYang_Five_Elements.md
  section: 3.1 五行系统对应总表
- type: concept
  question: 六腑的核心要点是什么？
  answer: '木 (Wood): 胆 (Gallbladder)；火 (Fire): 小肠 (SI)；土 (Earth): 胃 (Stomach)；金 (Metal): 大肠 (LI)；水 (Water): 膀胱 (Bladder)'
  source: 01-Wisdom-Traditions/tcm-neijing/YinYang_Five_Elements.md
  section: 3.1 五行系统对应总表
- type: concept
  question: 五季的核心要点是什么？
  answer: '木 (Wood): 春 (Spring)；火 (Fire): 夏 (Summer)；土 (Earth): 长夏 (Late Summer)；金 (Metal): 秋 (Autumn)；水 (Water): 冬 (Winter)'
  source: 01-Wisdom-Traditions/tcm-neijing/YinYang_Five_Elements.md
  section: 3.1 五行系统对应总表
- type: concept
  question: 母病及子的核心要点是什么？
  answer: '五行关系: 相生关系；临床举例: 肾(水)虚→肝(木)虚(水不涵木)；治疗原则: 滋水涵木'
  source: 01-Wisdom-Traditions/tcm-neijing/YinYang_Five_Elements.md
  section: 4.2 五行理论指导临床
- type: concept
  question: 子病及母的核心要点是什么？
  answer: '五行关系: 相生关系；临床举例: 心(火)旺→肝(木)旺(心肝火旺)；治疗原则: 清心平肝'
  source: 01-Wisdom-Traditions/tcm-neijing/YinYang_Five_Elements.md
  section: 4.2 五行理论指导临床
- type: concept
  question: 心 (Heart)的核心要点是什么？
  answer: '主要功能: 主血脉、主神明；在志: 喜；在液: 汗；在体: 脉；在窍: 舌；在华: 面；五行归属: 火'
  source: 01-Wisdom-Traditions/tcm-neijing/ZangFu_Meridians.md
  section: 1.2 五脏系统
- type: concept
  question: 肝 (Liver)的核心要点是什么？
  answer: '主要功能: 主疏泄、主藏血；在志: 怒；在液: 泪；在体: 筋；在窍: 目；在华: 爪；五行归属: 木'
  source: 01-Wisdom-Traditions/tcm-neijing/ZangFu_Meridians.md
  section: 1.2 五脏系统
- type: concept
  question: 脾 (Spleen)的核心要点是什么？
  answer: '主要功能: 主运化、主统血；在志: 思；在液: 涎；在体: 肉；在窍: 口；在华: 唇；五行归属: 土'
  source: 01-Wisdom-Traditions/tcm-neijing/ZangFu_Meridians.md
  section: 1.2 五脏系统
- type: concept
  question: 胆 (Gallbladder)的核心要点是什么？
  answer: '主要功能: 贮藏排泄胆汁、决断；配合五脏: 肝；特殊地位: 中精之府、奇恒之府'
  source: 01-Wisdom-Traditions/tcm-neijing/ZangFu_Meridians.md
  section: 1.3 六腑系统
- type: concept
  question: 胃 (Stomach)的核心要点是什么？
  answer: '主要功能: 受纳腐熟水谷；配合五脏: 脾；特殊地位: 水谷之海、太仓'
  source: 01-Wisdom-Traditions/tcm-neijing/ZangFu_Meridians.md
  section: 1.3 六腑系统
- type: concept
  question: 小肠 (Small Intestine)的核心要点是什么？
  answer: '主要功能: 受盛化物、泌别清浊；配合五脏: 心；特殊地位: ——'
  source: 01-Wisdom-Traditions/tcm-neijing/ZangFu_Meridians.md
  section: 1.3 六腑系统
- type: concept
  question: 手太阴肺经的核心要点是什么？
  answer: '缩写: LU；配属脏腑: 肺；五行: 金；循行概要: 胸→上肢内侧前→拇指'
  source: 01-Wisdom-Traditions/tcm-neijing/ZangFu_Meridians.md
  section: 3.2 十二正经
- type: concept
  question: 手阳明大肠经的核心要点是什么？
  answer: '缩写: LI；配属脏腑: 大肠；五行: 金；循行概要: 食指→上肢外侧前→面'
  source: 01-Wisdom-Traditions/tcm-neijing/ZangFu_Meridians.md
  section: 3.2 十二正经
- type: concept
  question: 什么是第一篇 九针十二原（节选）？
  answer: 黄帝问于岐伯曰：余子万民，养百姓而收其租税，余哀其不给而属有疾病。余欲勿使被毒药，无用砧石，欲以微针通其经脉，调其血气，营其逆顺出入之会。令可传于后世，必明为之法。
  source: 01-Wisdom-Traditions/tcm-neijing/classics/Huangdi_Neijing_Lingshu.md
  section: 第一篇 九针十二原（节选）
- type: concept
  question: 什么是第八篇 本神（节选）？
  answer: 黄帝问于岐伯曰：凡刺之法，先必本于神。血、脉、营、气、精神，此五脏之所藏也。至其淫泄离脏则精失，魂魄飞扬，志意恍乱，智虑去身者，何因而然乎？
  source: 01-Wisdom-Traditions/tcm-neijing/classics/Huangdi_Neijing_Lingshu.md
  section: 第八篇 本神（节选）
- type: concept
  question: 什么是第一篇 上古天真论（全文）？
  answer: 昔在黄帝，生而神灵，弱而能言，幼而循齐，长而敦敏，成而登天。
  source: 01-Wisdom-Traditions/tcm-neijing/classics/Huangdi_Neijing_Suwen.md
  section: 第一篇 上古天真论（全文）
- type: concept
  question: 什么是第二篇 四气调神大论（全文）？
  answer: 春三月，此谓发陈，天地俱生，万物以荣，夜卧早起，广步于庭，被发缓形，以使志生，生而勿杀，予而勿夺，赏而勿罚，此春气之应，养生之道也。逆之则伤肝，夏为寒变，奉长者少。
  source: 01-Wisdom-Traditions/tcm-neijing/classics/Huangdi_Neijing_Suwen.md
  section: 第二篇 四气调神大论（全文）
- type: concept
  question: 养生防病的核心要点是什么？
  answer: '对应篇章: 素问·上古天真论、素问·四气调神大论、素问·生气通天论'
