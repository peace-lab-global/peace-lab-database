  question: 色法的核心要点是什么？
  answer: '英文名 (English): Matter；巴利语 (Pāli): *Rūpa*；定义: 物质现象；数量: 28种；专业视角: 物质分析'
  source: 01-Wisdom-Traditions/religions/buddhism/theravada/Buddhism_Theravada_Abhidhamma.md
  section: 表1.2 阿毗达摩核心术语 (Abhidhamma Core Terms)
