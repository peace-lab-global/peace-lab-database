  section: 表1.1 熏习核心术语 (Vāsanā Core Terms)
- type: concept
  question: 种子的核心要点是什么？
  answer: '英文名 (English): Seed；梵语 (Sanskrit): *Bīja* (बीज)；藏语 (Tibetan): *ས་བོན* (Sa-bon)；精确定义: 存储于阿赖耶识的潜在功能；疗愈意义: 行为结果的潜在因素；专业视角:
    待缘而生'
