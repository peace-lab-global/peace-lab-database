  question: 睡眠科学的核心要点是什么？
  answer: '核心概念: YN在清醒与睡眠之间；梵语术语: स्वप्न (Svapna)；理论解释: 利用入睡过渡期的可塑性；科学对应: Hypnagogic state'
  source: 01-Wisdom-Traditions/yoga/Yoga_Nidra.md
  section: Yoga Nidra理论基础表
- type: concept
  question: 悦性食物的核心要点是什么？
  answer: '英文术语: Sattvic Food；梵语术语: सात्त्विक आहार (Sāttvika Āhāra)；定义: 纯净、轻盈、给予生命力的食物；应用: 瑜伽推荐饮食'
