  question: 心/识的核心要点是什么？
  answer: '英文名 (English): Consciousness；巴利语 (Pāli): *Citta*；定义: 了知对象的心识；数量: 89/121种；专业视角: 阿毗达摩核心'
  source: 01-Wisdom-Traditions/religions/buddhism/theravada/Buddhism_Theravada_Abhidhamma.md
