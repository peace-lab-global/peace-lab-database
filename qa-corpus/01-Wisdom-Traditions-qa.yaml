  question: 公元前565/623年的核心要点是什么？
  answer: '事件: **佛陀诞生** — 释迦牟尼出生于古印度迦毗罗卫国（今尼泊尔境内），为净饭王太子'
  source: 01-Wisdom-Traditions/religions/buddhism/history/Buddhist_History_Timeline.md
  section: 一、佛陀时期（公元前6-5世纪）
- type: concept
  question: 公元前531/588年的核心要点是什么？
  answer: '事件: **佛陀成道** — 35岁时于菩提伽耶菩提树下证悟无上正等正觉'
  source: 01-Wisdom-Traditions/religions/buddhism/history/Buddhist_History_Timeline.md
  section: 一、佛陀时期（公元前6-5世纪）
- type: concept
  question: 公元前528/585年的核心要点是什么？
  answer: '事件: **初转法轮** — 佛陀在鹿野苑（Sarnath）为五比丘说法，开示四圣谛、八正道，佛教僧团正式成立'
  source: 01-Wisdom-Traditions/religions/buddhism/history/Buddhist_History_Timeline.md
  section: 一、佛陀时期（公元前6-5世纪）
- type: concept
  question: 公元前386年的核心要点是什么？
  answer: '事件: **第二次结集** — 耶舍（Yasa）主持，于毗舍离（Vaishali）举行，讨论戒律争议，上座部与大众部分歧初现'
  source: 01-Wisdom-Traditions/religions/buddhism/history/Buddhist_History_Timeline.md
  section: 二、部派佛教时期（公元前4世纪-公元1世纪）
- type: concept
  question: 公元前3世纪的核心要点是什么？
  answer: '事件: **上座部与大众部分裂** — 佛教首次分裂为根本二部，此后逐渐形成十八部派（或说二十部）'
  source: 01-Wisdom-Traditions/religions/buddhism/history/Buddhist_History_Timeline.md
  section: 二、部派佛教时期（公元前4世纪-公元1世纪）
- type: concept
  question: 公元前250年的核心要点是什么？
  answer: '事件: **第三次结集** — 阿育王（Ashoka）支持，目犍连子帝须（Moggaliputta Tissa）主持，于华氏城（Pataliputra）举行，编纂《论事》（Kathavatthu），确定上座部正统'
  source: 01-Wisdom-Traditions/religions/buddhism/history/Buddhist_History_Timeline.md
  section: 二、部派佛教时期（公元前4世纪-公元1世纪）
- type: concept
  question: 公元1世纪的核心要点是什么？
  answer: '事件: **初期大乘经典出现** — 《般若经》《法华经》《无量寿经》等大乘经典开始流通，提倡菩萨道与普度众生'
  source: 01-Wisdom-Traditions/religions/buddhism/history/Buddhist_History_Timeline.md
  section: 三、大乘佛教兴起（公元1-6世纪）
- type: concept
  question: 150-250年的核心要点是什么？
  answer: '事件: **龙树菩萨与中观学派** — 龙树（Nagarjuna）著《中论》，阐述缘起性空思想，创立中观学派（Madhyamaka），弟子提婆（Aryadeva）继承发扬'
  source: 01-Wisdom-Traditions/religions/buddhism/history/Buddhist_History_Timeline.md
  section: 三、大乘佛教兴起（公元1-6世纪）
