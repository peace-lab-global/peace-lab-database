- type: concept
  question: 止/奢摩他的核心要点是什么？
  answer: '巴利语 (Pāli): *Samatha*；梵语 (Sanskrit): *Śamatha*；英文 (English): Calm/Tranquility；精确定义: 心的寂止与专注；功能: 降伏五盖、培养定力；专业视角:
    四十业处'
  source: 01-Wisdom-Traditions/religions/buddhism/theravada/Theravada_Meditation_Stages.md
  section: 表1.1 止观核心术语 (Samatha-Vipassanā Core Terms)
- type: concept
  question: 观/毗婆舍那的核心要点是什么？
  answer: '巴利语 (Pāli): *Vipassanā*；梵语 (Sanskrit): *Vipaśyanā*；英文 (English): Insight；精确定义: 如实照见三法印；功能: 断除烦恼、证得解脱；专业视角: 十六观智'
  source: 01-Wisdom-Traditions/religions/buddhism/theravada/Theravada_Meditation_Stages.md
  section: 表1.1 止观核心术语 (Samatha-Vipassanā Core Terms)
- type: concept
  question: 禅那/禅定的核心要点是什么？
  answer: '巴利语 (Pāli): *Jhāna*；梵语 (Sanskrit): *Dhyāna*；英文 (English): Absorption；精确定义: 深度专注状态；功能: 止禅成就；专业视角: 四禅八定'
  source: 01-Wisdom-Traditions/religions/buddhism/theravada/Theravada_Meditation_Stages.md
  section: 表1.1 止观核心术语 (Samatha-Vipassanā Core Terms)
- type: concept
  question: 目标的核心要点是什么？
  answer: '止 (Samatha): 心的寂止、禅定；观 (Vipassanā): 如实知见、智慧解脱'
  source: 01-Wisdom-Traditions/religions/buddhism/theravada/Theravada_Meditation_Stages.md
  section: 表1.2 止与观比较 (Samatha vs. Vipassanā)
- type: concept
  question: 所缘的核心要点是什么？
  answer: '止 (Samatha): 概念法(paññatti)；观 (Vipassanā): 究竟法(paramattha)'
  source: 01-Wisdom-Traditions/religions/buddhism/theravada/Theravada_Meditation_Stages.md
  section: 表1.2 止与观比较 (Samatha vs. Vipassanā)
- type: concept
  question: 业处的核心要点是什么？
  answer: '止 (Samatha): 40种业处；观 (Vipassanā): 四念处'
  source: 01-Wisdom-Traditions/religions/buddhism/theravada/Theravada_Meditation_Stages.md
  section: 表1.2 止与观比较 (Samatha vs. Vipassanā)
