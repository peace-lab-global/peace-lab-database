  question: 什么是概述 (Overview)？
  answer: 帕坦伽利（Patañjali，约公元2-4世纪，一说公元前2世纪）是印度古典时期最重要的瑜伽理论家，《瑜伽经》（Yoga Sūtra）的编纂者。他被尊为"瑜伽之祖"（Yogeśvara），其身份至今仍是学术界争论的焦点——他可能是一位历史人物，也可能是一个集体智慧的代名词，甚至可能与写了梵文语法巨著《大疏》（Mahābhāṣya）的同名语法学家是同一人或不同的人。
  source: 01-Wisdom-Traditions/yoga/masters/ancient/Patanjali.md
  section: 概述 (Overview)
- type: concept
  question: 无明的核心要点是什么？
  answer: '梵文: Avidyā；定义: 将非永恒视为永恒，将不净视为净，将痛苦视为快乐，将非我视为我；现代心理学对应: 认知偏差（Cognitive Bias）'
  source: 01-Wisdom-Traditions/yoga/masters/ancient/Patanjali.md
  section: 2. 五种烦恼（Pañca Kleśa）——痛苦的根源地图
- type: concept
  question: 我执的核心要点是什么？
  answer: '梵文: Asmitā；定义: 将观照者（Puruṣa）与被观照的工具（Citta）混同；现代心理学对应: 过度认同（Over-identification）'
  source: 01-Wisdom-Traditions/yoga/masters/ancient/Patanjali.md
  section: 2. 五种烦恼（Pañca Kleśa）——痛苦的根源地图
- type: concept
