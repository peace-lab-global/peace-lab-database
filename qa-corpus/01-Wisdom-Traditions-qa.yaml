- type: concept
  question: 什么是《薄伽梵歌》？
  answer: 三方书评详见 [印度哲学经典三方书评](../scriptures/Multi_Perspective_Reviews.md#薄伽梵歌)
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/vedanta/Multi_Perspective_Reviews.md
  section: 《薄伽梵歌》
- type: concept
  question: 不二论（Advaita）的核心要点是什么？
  answer: '代表人物: 商羯罗（Śaṅkara）；对《薄伽梵歌》的核心诠释: 黑天即梵，阿周那的个体意识最终要融入梵——虔信是通向知识的手段'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/vedanta/Multi_Perspective_Reviews.md
  section: 附加视角：吠檀多传统内部的解读
- type: concept
  question: 限定不二论（Viśiṣṭādvaita）的核心要点是什么？
  answer: '代表人物: 罗摩奴阇（Rāmānuja）；对《薄伽梵歌》的核心诠释: 个体灵魂与梵永远不同但又不可分离——虔信是核心路径'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/vedanta/Multi_Perspective_Reviews.md
  section: 附加视角：吠檀多传统内部的解读
- type: concept
  question: 二元论（Dvaita）的核心要点是什么？
  answer: '代表人物: 摩陀婆（Madhva）；对《薄伽梵歌》的核心诠释: 个体灵魂与梵永远不同——克里希纳是至高神，虔信是唯一道路'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/vedanta/Multi_Perspective_Reviews.md
  section: 附加视角：吠檀多传统内部的解读
- type: concept
  question: 奥义书的核心要点是什么？
  answer: '梵文: Upanishad；含义: "坐近"（upa-ni-shad）— 秘密传授的师徒教学'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/vedanta/Upanishads_Wisdom.md
