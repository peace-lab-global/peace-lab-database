- type: concept
  question: 数论哲学的核心要点是什么？
  answer: '梵语: **सांख्य** (*Sāṃkhya*)；解释: 通过理性分析宇宙构成要素，建立二元论哲学体系。；影响: 奠定了印度古典哲学中数论派的理论基础。'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/samkhya/Kapila.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 二十五谛的核心要点是什么？
  answer: '梵语: **पञ्चविंशति तत्त्व** (*Pañcaviṃśati Tattva*)；解释: 系统阐述宇宙由二十五个基本要素构成的理论。；影响: 为印度哲学提供了精密的本体论分析框架。'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/samkhya/Kapila.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 神我原质的核心要点是什么？
  answer: '梵语: **पुरुष-प्रकृति** (*Puruṣa-Prakṛti*)；解释: 宇宙由纯粹意识(神我)和原初物质(原质)两种根本实体构成。；影响: 开创了印度哲学中重要的二元论传统。'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/samkhya/Kapila.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《数论颂》的核心要点是什么？
  answer: '梵语名称: **सांख्यकारिका** (*Sāṃkhyakārikā*)；传统归属: 传统归属于迦羅底；内容概要: 系统阐述数论派基本教义的哲学诗颂。；学术价值: 数论派最重要的经典文献，影响深远。'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/samkhya/Kapila.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《数论经》的核心要点是什么？
  answer: '梵语名称: **सांख्यसूत्र** (*Sāṃkhyasūtra*)；传统归属: 部分传统认为是其著作；内容概要: 以经文形式阐述数论派哲学体系。；学术价值: 数论派理论的重要文献来源。'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/samkhya/Kapila.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **传说起源**：在印度传统中被视为数论派的创始人和化身

    - **哲学创新**：在吠陀传统基础上发展出系统的理性哲学体系

    - **理论建构**：建立了完整的二十五谛宇宙论体系

    - **学术传承**：其思想通过弟子和后学得以传承和发展

    - **历史影响**：对后世印度哲学和宗教思想产生深远影响'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/samkhya/Kapila.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 意识研究的核心要点是什么？
  answer: '关联概念: 神我理论；实践方法: 理解纯粹意识与心理活动的区别；现代应用: 意识科学和冥想研究'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/samkhya/Kapila.md
