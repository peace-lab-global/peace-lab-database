  section: 表1.1 三种熏习总览 (Three Vāsanās Overview)
- type: concept
  question: 我执熏习的核心要点是什么？
  answer: '梵语: *Ātmagrāha-vāsanā* (आत्मग्राहवासना)；藏语: *བདག་འཛིན་བག་ཆགས*；定义: 执著有我所熏成的习气；所熏种子: 我执种子；生起功能: 令有情执有自我；心理学对应: 自我概念、自恋结构'
  source: 01-Wisdom-Traditions/religions/buddhism/vasana/Vasana_Mechanisms.md
  section: 表1.1 三种熏习总览 (Three Vāsanās Overview)
- type: concept
  question: 有支熏习的核心要点是什么？
  answer: '梵语: *Bhavāṅga-vāsanā* (भवाङ्गवासना)；藏语: *སྲིད་པའི་ཡན་ལག་བག་ཆགས*；定义: 三有业力所熏成的习气；所熏种子: 业种子；生起功能: 引生三界生死；心理学对应: 生存本能、业力果报'
  source: 01-Wisdom-Traditions/religions/buddhism/vasana/Vasana_Mechanisms.md
  section: 表1.1 三种熏习总览 (Three Vāsanās Overview)
- type: concept
  question: 表义名言的核心要点是什么？
