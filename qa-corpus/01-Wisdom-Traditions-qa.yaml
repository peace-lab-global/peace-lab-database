  question: 三大因素的核心要点是什么？
  answer: '藏文/英文 (Tib/Eng): Three Humors (Nyes pa)；核心概念 (Core Concept): 隆 (rlung - 风)、赤巴 (mkhris pa - 火)、培根 (bad kan - 土/水)。；对健康的影响:
