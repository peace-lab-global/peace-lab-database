  question: 惰性食物的核心要点是什么？
  answer: '英文术语: Tamasic Food；梵语术语: तामसिक आहार (Tāmasika Āhāra)；定义: 陈腐、过度加工、使人昏沉的食物；应用: 瑜伽建议避免'
