  question: 早期佛教的核心要点是什么？
  answer: '代表文献: 《杂阿含经》《相应部》；主要贡献: 随眠(Anuśaya)概念；核心论点: 烦恼有潜伏状态；理论意义: 奠定种子思想基础'
