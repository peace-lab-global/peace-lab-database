  question: 清静无为的核心要点是什么？
  answer: '含义 (Meaning): 保持内心的宁静与少欲。；实践要求: 限制信息/情感过载；定期“数字排毒”。；疗愈益处: 降低皮质醇水平；缓解现代性疲劳。；专业视角 (Professional Perspective): 通过降低感官输入的熵，维持中枢神经系统的低功耗稳态。；引用来源
    (Citation): *Dao De Jing*.'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Health_Yangsheng_Qigong.md
