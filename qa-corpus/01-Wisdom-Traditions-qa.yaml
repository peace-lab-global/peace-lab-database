- type: concept
  question: 什么是三、ISKCON 关联？
  answer: '- Wai Lana 与国际奎师那知觉协会（ISKCON / Hare Krishna 运动）有长期关联

    - 她的教学中融入了 Bhakti Yoga（虔诚瑜伽）元素

    - 这一宗教背景在中国语境下通常被淡化

    - 她的中国影响主要通过体式和生活方式瑜伽，而非宗教传播'
  source: 01-Wisdom-Traditions/yoga/masters/east-asian/Wai_Lana.md
  section: 三、ISKCON 关联
- type: concept
  question: 什么是四、在中国瑜伽史上的位置？
  answer: '- 被尊为"中国瑜伽的播种者"

    - 虽然现代中国瑜伽产业的直接建设者是后来的创业者和培训师

    - 但 Wai Lana 在 1985 年打开的大门是不可替代的历史第一步

    - 证明了媒体在瑜伽传播中的巨大力量'
  source: 01-Wisdom-Traditions/yoga/masters/east-asian/Wai_Lana.md
