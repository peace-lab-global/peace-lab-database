- type: concept
  question: 阴阳的核心要点是什么？
  answer: '佛教对应概念: 缘起法；相似度: ★★★☆☆；根本差异: 阴阳是基本力量，缘起是条件关系；启发性: ★★★★☆'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/yijing/Buddhist_Perspective_Reviews.md
  section: 综合对照总览
- type: concept
  question: 天人合一的核心要点是什么？
  answer: '佛教对应概念: 依正不二；相似度: ★★★★☆；根本差异: 合一保留主体性，不二消解主客对立；启发性: ★★★★★'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/yijing/Buddhist_Perspective_Reviews.md
  section: 综合对照总览
