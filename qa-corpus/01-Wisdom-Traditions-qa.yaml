- type: concept
  question: 先验感性论的核心要点是什么？
  answer: '德文原文 (Original): **Transzendentale Ästhetik**；现代解析 (Modern Interpretation): 时间和空间是人类认知的先天形式，而非事物本身的属性。；心理/治疗效果:
    打破对外部世界的绝对化执着，建立认知边界意识。；专家建议 (Expert Perspective): 认识到我们感知的世界是经过认知结构过滤的，减少对“客观真理”的盲目追求。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/practical-philosophy/Philosophy_Western_Kantian_Schopenhauer.md
  section: 'I. Immanuel Kant: The Critique of Pure Reason (伊曼努尔·康德：纯粹理性批判)'
- type: concept
  question: 先验分析论的核心要点是什么？
  answer: '德文原文 (Original): **Transzendentale Analytik**；现代解析 (Modern Interpretation): 范畴是人类理解的先天形式，通过它们我们组织经验材料。；心理/治疗效果:
    理解思维的结构性，培养清晰的概念思维能力。；专家建议 (Expert Perspective): 意识到理性的局限性，避免过度推理导致的焦虑。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/practical-philosophy/Philosophy_Western_Kantian_Schopenhauer.md
  section: 'I. Immanuel Kant: The Critique of Pure Reason (伊曼努尔·康德：纯粹理性批判)'
- type: concept
  question: 二律背反的核心要点是什么？
  answer: '德文原文 (Original): **Antinomie**；现代解析 (Modern Interpretation): 当理性超越经验界限时，会产生相互矛盾但同样合理的命题。；心理/治疗效果: 接受认知的局限性，减少因无法解决终极问题而产生的痛苦。；专家建议
    (Expert Perspective): 学会在矛盾中保持平衡，培养辩证思维能力。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/practical-philosophy/Philosophy_Western_Kantian_Schopenhauer.md
  section: 'I. Immanuel Kant: The Critique of Pure Reason (伊曼努尔·康德：纯粹理性批判)'
- type: concept
  question: 世界作为表象的核心要点是什么？
  answer: '德文原文 (Original): **Die Welt als Vorstellung**；现代解析 (Modern Interpretation): 我们所感知的世界是通过我们的表象能力构建的。；心理/治疗效果: 减少对外部世界的执着，认识到感知的主观性。；专家建议
    (Expert Perspective): 意识到我们的痛苦往往源于对表象世界的错误理解。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/practical-philosophy/Philosophy_Western_Kantian_Schopenhauer.md
  section: 'II. Arthur Schopenhauer: The World as Will and Representation (亚瑟·叔本华：作为意志和表象的世界)'
- type: concept
  question: 世界作为意志的核心要点是什么？
  answer: '德文原文 (Original): **Die Welt als Wille**；现代解析 (Modern Interpretation): 表象背后的本质是盲目的、无目的的生存意志。；心理/治疗效果: 理解人类行为的深层动机，减少对欲望的盲目追求。；专家建议
    (Expert Perspective): 认识到意志的盲目性是痛苦的根源，培养对欲望的觉知。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/practical-philosophy/Philosophy_Western_Kantian_Schopenhauer.md
  section: 'II. Arthur Schopenhauer: The World as Will and Representation (亚瑟·叔本华：作为意志和表象的世界)'
- type: concept
  question: 痛苦与无聊的核心要点是什么？
  answer: '德文原文 (Original): **Leiden und Langeweile**；现代解析 (Modern Interpretation): 人生如同钟摆，在痛苦（欲望未满足）和无聊（欲望满足后）之间摇摆。；心理/治疗效果:
    接受人生的基本状态，减少对完美状态的追求。；专家建议 (Expert Perspective): 通过艺术、哲学和冥想等活动超越欲望的循环。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/practical-philosophy/Philosophy_Western_Kantian_Schopenhauer.md
  section: 'II. Arthur Schopenhauer: The World as Will and Representation (亚瑟·叔本华：作为意志和表象的世界)'
- type: concept
  question: 先验反思的核心要点是什么？
  answer: '术语 (Original): **Transzendentale Reflexion**；操作技术: 定期反思自己的认知过程，分析哪些是经验材料，哪些是先天形式。；针对性困境: 过度主观判断、认知僵化。；预期现象学特征:
    产生对认知过程的觉知，减少绝对化思维。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/practical-philosophy/Philosophy_Western_Kantian_Schopenhauer.md
  section: 'III. Practical Exercises: Kantian & Schopenhauerian Techniques (实操练习矩阵)'
- type: concept
  question: 道德自律的核心要点是什么？
  answer: '术语 (Original): **Moralische Autonomie**；操作技术: 每天选择一件小事，出于纯粹的义务感去做，而非为了回报。；针对性困境: 道德困惑、功利主义倾向。；预期现象学特征: 培养内在的道德价值感，增强自我认同。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/practical-philosophy/Philosophy_Western_Kantian_Schopenhauer.md
  section: 'III. Practical Exercises: Kantian & Schopenhauerian Techniques (实操练习矩阵)'
- type: concept
  question: 悬置 (括注)的核心要点是什么？
  answer: '德文/法文 (Original): **Epoché**；现象学定义: 悬置对外部世界的自然态度（存在判定）。；现代心理对照: 终极的“认知解离”。；专家建议 (Expert Perspective): 它是进入不二认知的前置技术：停止对“真实性”的辩论。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/practical-philosophy/Philosophy_Western_Phenomenology_Metaphysics.md
  section: 'I. Phenomenology: The Mechanics of Perception (现象学：意识的解构机制)'
- type: concept
  question: 还原的核心要点是什么？
  answer: '德文/法文 (Original): **Reduktion**；现象学定义: 从经验内容回归到先验意识结构。；现代心理对照: 回归到“观察者”背景。；专家建议 (Expert Perspective): 有助于识别出所有心理内容都是“被构造”的。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/practical-philosophy/Philosophy_Western_Phenomenology_Metaphysics.md
  section: 'I. Phenomenology: The Mechanics of Perception (现象学：意识的解构机制)'
- type: concept
  question: 意向性的核心要点是什么？
  answer: '德文/法文 (Original): **Intentionalität**；现象学定义: 意识总是“关于”某物的。；现代心理对照: 注意力的定向能。；专家建议 (Expert Perspective): 揭示了心智的动态本性：意识不是静态的容器。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/practical-philosophy/Philosophy_Western_Phenomenology_Metaphysics.md
  section: 'I. Phenomenology: The Mechanics of Perception (现象学：意识的解构机制)'
- type: concept
  question: 本体论差异的核心要点是什么？
  answer: '术语 (Term): **Ontologische Differenz**；德文/拉丁文 (Original): 存在者 (Seiende) 与存在 (Sein) 的区别。；形而上学蕴意: 识别出背景与前景的差异。；疗愈/灵性转化:
    防止将“灵性体验”物化为一个具体的“存在者”。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/practical-philosophy/Philosophy_Western_Phenomenology_Metaphysics.md
  section: 'II. Metaphysical Structures: Being & Time (形而上学：存在与时间的拓扑)'
- type: concept
  question: 向死而生的核心要点是什么？
  answer: '术语 (Term): **Sein-zum-Tode**；德文/拉丁文 (Original): 存在的终极有限性锚定了存在的本真性。；形而上学蕴意: 死亡是存在的积极力量。；疗愈/灵性转化: 斯多葛 Memento Mori
    的深刻现象学版。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/practical-philosophy/Philosophy_Western_Phenomenology_Metaphysics.md
  section: 'II. Metaphysical Structures: Being & Time (形而上学：存在与时间的拓扑)'
- type: concept
  question: 被抛性的核心要点是什么？
