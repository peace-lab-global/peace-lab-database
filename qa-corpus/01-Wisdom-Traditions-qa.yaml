  source: 01-Wisdom-Traditions/yoga/Yoga_Nidra.md
  section: Yoga Nidra历史发展表
- type: concept
  question: 意识层次论的核心要点是什么？
  answer: '核心概念: 意识从粗到细的层次；梵语术语: कोश (Kośa)；理论解释: 五层鞘理论：食物鞘→能量鞘→意识鞘→智慧鞘→喜乐鞘；科学对应: 神经层级'
  source: 01-Wisdom-Traditions/yoga/Yoga_Nidra.md
