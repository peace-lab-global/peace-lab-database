  answer: 本专题系统梳理数字化正念疗法（Digital Mindfulness Interventions, DMI）与人工智能（AI）在佛教心理健康领域的应用现状、研究证据、伦理挑战与未来方向，为研究者、技术开发者和临床工作者提供跨学科参考。
