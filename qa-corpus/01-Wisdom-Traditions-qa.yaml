  question: 什么是《周易》整体评分？
  answer: '**阅读建议**：初学者建议先读《系辞传》建立整体框架，再配合注释选读乾、坤、泰、否、复、剥、既济、未济等关键卦象，最后系统研读全文。进阶读者可参阅朱熹《周易本义》、王弼《周易注》、程颐《伊川易传》等经典注本。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/yijing/Multi_Perspective_Reviews.md
