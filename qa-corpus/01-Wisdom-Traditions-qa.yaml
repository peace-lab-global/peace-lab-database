- type: concept
  question: 什么是导论：詹姆斯与佛陀的跨时空相遇？
  answer: 威廉·詹姆斯从未系统研究过佛教哲学，但他的思想轨迹与佛法核心义理之间存在着令人惊叹的结构性共鸣。这种共鸣不是表面上的术语相似，而是两条独立的思想河流在最深处汇入了同一片存在之海——对经验的忠实、对教条的警惕、对实际解脱（无论是哲学意义上的还是宗教意义上的）的承诺。
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/modern/pragmatism/Buddhist_Perspective_Reviews.md
  section: 导论：詹姆斯与佛陀的跨时空相遇
- type: concept
  question: 真理观的核心要点是什么？
  answer: '詹姆斯: 有用即真理：经验后果为标准；佛法: 善巧方便：导向苦灭为标准；共鸣: 真理指向实践后果；差异: 佛法指向超越性解脱'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/modern/pragmatism/Buddhist_Perspective_Reviews.md
  section: 总结对照表
- type: concept
  question: 宗教经验的核心要点是什么？
  answer: '詹姆斯: 现象学描述，四项标准；佛法: 禅定次第，系统训练；共鸣: 尊重经验的自主性；差异: 佛教有精确的修证地图'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/modern/pragmatism/Buddhist_Perspective_Reviews.md
  section: 总结对照表
- type: concept
  question: 多元宇宙的核心要点是什么？
  answer: '詹姆斯: 有限的多元论；佛法: 缘起法界，事事无碍；共鸣: 反对一元封闭宇宙；差异: 华严圆融超越多元-一元对立'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/modern/pragmatism/Buddhist_Perspective_Reviews.md
  section: 总结对照表
- type: concept
  question: 什么是结语：从实用主义到如实知见？
  answer: 威廉·詹姆斯的实用主义哲学与佛陀的教导在精神气质上有着深层的亲和：两者都拒绝教条，尊重经验，关注实践后果，警惕概念的遮蔽力量。詹姆斯如果有机会系统地接触佛教哲学——特别是中观的空性智慧、唯识的精微心识理论和华严的圆融无碍观——他可能会发现，他毕生探索的许多核心问题，在两千五百年前的东方已经有了更为精深、更为系统的回应。
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/modern/pragmatism/Buddhist_Perspective_Reviews.md
  section: 结语：从实用主义到如实知见
