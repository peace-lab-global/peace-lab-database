- type: concept
  question: 梵经编纂的核心要点是什么？
  answer: '年代: 约前200；关键事件: 跋陀罗衍那（Badarayana）系统化吠檀多'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/vedanta/Vedanta_Philosophy_Overview.md
  section: 1.3 历史发展
- type: concept
  question: 权力意志的核心要点是什么？
  answer: '原文: **Wille zur Macht**；解释: 生命的本质是追求权力和自我超越的意志。；影响: 挑战了传统的形而上学和道德观，影响了后来的存在主义。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/Nietzsche.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 永恒轮回的核心要点是什么？
  answer: '原文: **Ewige Wiederkunft**；解释: 宇宙中的一切事件都会无限重复地发生。；影响: 强调了生命的瞬间性和重要性，影响了后来的存在主义。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/Nietzsche.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 上帝已死的核心要点是什么？
  answer: '原文: **Gott ist tot**；解释: 传统基督教的上帝观念已经失去了对现代社会的影响力。；影响: 宣告了传统价值体系的崩溃，开启了价值重估的时代。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/Nietzsche.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《悲剧的诞生》(The Birth of Tragedy)的核心要点是什么？
  answer: '出版年份: 1872年；核心内容: 探讨希腊悲剧的起源和本质；重要性: 尼采的第一部哲学著作'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/Nietzsche.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《人性的，太人性的》(Human, All Too Human)的核心要点是什么？
  answer: '出版年份: 1878年；核心内容: 批判传统道德和形而上学；重要性: 尼采中期思想的代表作'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/Nietzsche.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《查拉图斯特拉如是说》(Thus Spoke Zarathustra)的核心要点是什么？
  answer: '出版年份: 1883-1885年；核心内容: 阐述超人哲学和永恒轮回；重要性: 尼采最著名的哲学著作'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/Nietzsche.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **早期思想**：受叔本华和瓦格纳影响，研究悲剧和艺术哲学

    - **中期发展**：批判传统形而上学和道德，发展出权力意志的初步思想

    - **晚期成熟**：形成完整的哲学体系，包括超人、永恒轮回和价值重估'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/Nietzsche.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 存在主义疗法的核心要点是什么？
  answer: '关联概念: 权力意志和自我超越；实践方法: 帮助个体发现自身的生命动力和潜能；现代应用: 存在主义心理治疗'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/Nietzsche.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 世界的本质是"意志"——盲目的冲动的核心要点是什么？
  answer: '佛教: 世界的本质是"苦"——不满足的轮回；对应程度: ★★★☆ 结构相似，内容不同'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Buddhist_Perspective_Reviews.md
  section: 视角二：学佛爱好者
- type: concept
  question: 欲望满足后是空虚，空虚后是新欲望的核心要点是什么？
  answer: '佛教: 坏苦（vipariṇāma-duḥkha）——快乐消退后的苦；对应程度: ★★★★ 高度相似'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Buddhist_Perspective_Reviews.md
  section: 视角二：学佛爱好者
- type: concept
  question: 通过审美暂时忘我的核心要点是什么？
  answer: '佛教: 通过禅定暂时止息分别心；对应程度: ★★★☆ 方式不同，效果类似'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Buddhist_Perspective_Reviews.md
  section: 视角二：学佛爱好者
- type: concept
  question: 意志"= 宇宙本体的核心要点是什么？
  answer: '佛教的实际教导: "业力"= 因果律，"无明"= 认知错误；误读的性质: 将过程本体化'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 佛教 = 悲观主义的核心要点是什么？
  answer: '佛教的实际教导: 佛教 = 实在论（如实观察苦，不是悲观）；误读的性质: 将"如实"误解为"悲观"'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 涅槃 = 意志的否定的核心要点是什么？
  answer: '佛教的实际教导: 涅槃 = 无明的消除，苦的止息；误读的性质: 将"消极"误解为"否定"'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/19th-century/existential-precursors/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
