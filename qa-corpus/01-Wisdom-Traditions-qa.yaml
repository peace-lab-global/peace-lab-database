  question: 一切种子识的核心要点是什么？
  answer: '英文名 (English): All-Seed Consciousness；梵语 (Sanskrit): *Sarvabījaka-vijñāna* (सर्वबीजकविज्ञान)；藏语 (Tibetan): *ཐམས་ཅད་ས་བོན་རྣམ་ཤེས*；精确定义:
    阿赖耶识含藏一切种子的功能；疗愈意义: 无意识的存储功能；专业视角: 阿赖耶识的因相'
