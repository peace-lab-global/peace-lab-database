  answer: '职业伦理应用: 诚实宣传；正面行为: 真实描述资质、循证表述疗效；违反行为: 夸大疗效、伪造资质、虚假宣传'
  source: 01-Wisdom-Traditions/yoga/Yoga_Ethics_Business_Professional.md
  section: Yama与Niyama作为职业伦理基础
