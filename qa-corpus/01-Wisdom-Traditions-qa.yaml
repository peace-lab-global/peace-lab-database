  section: 六妙门概述
- type: concept
  question: 什么是一、证信序？
  answer: 如是我闻。一时佛在室罗筏城祇桓精舍，与大比丘众千二百五十人俱，皆是无漏大阿罗汉，佛子住持，善超诸有。能于国土，成就威仪。从佛转轮，妙堪遗嘱。严净毗尼，弘范三界。应身无量，度脱众生。拔济未来，越诸尘累。其名曰：大智舍利弗、摩诃目犍连、摩诃拘絺罗、富楼那弥多罗尼子、须菩提、优波尼沙陀等而为上首。复有无量辟支无学，并其初心，同来佛所，属诸比丘，休夏自恣。十方菩萨，咨决心疑，钦奉慈严，将求密义。即时如来敷座宴安，为诸会中，宣示深奥，法筵清众，得未曾有。迦陵仙音，遍十方界。恒沙菩萨，来聚道场，文殊师利而为上首。
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Surangama_Sutra.md
  section: 一、证信序
- type: concept
  question: 什么是二、发起序——阿难遇摩登伽女之难？
  answer: 尔时阿难，因乞食次，经历淫室，遭大幻术。摩登伽女，以娑毗迦罗先梵天咒，摄入淫席。淫躬抚摩，将毁戒体。如来知彼，淫术所加，斋毕旋归，王及大臣、长者居士，俱来随佛，愿闻法要。于时世尊，顶放百宝无畏光明，光中出生千叶宝莲，有佛化身，结跏趺坐，宣说神咒，敕文殊师利，将咒往护。恶咒消灭，提奖阿难及摩登伽，归来佛所。
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Surangama_Sutra.md
  section: 二、发起序——阿难遇摩登伽女之难
- type: concept
  question: 什么是三、请法？
  answer: 阿难见佛，顶礼悲泣，恨无始来，一向多闻，未全道力。殷勤启请，十方如来得成菩提，妙奢摩他、三摩、禅那，最初方便。于时复有恒沙菩萨，及诸十方大阿罗汉、辟支佛等，俱愿乐闻。退坐默然，承受圣旨。
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Surangama_Sutra.md
  section: 三、请法
- type: concept
  question: 什么是四、示圆满菩提真心？
  answer: 佛告阿难："汝我同气，情均天伦。当初发心，于我法中，见何胜相，顿舍世间深重恩爱？"
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Surangama_Sutra.md
  section: 四、示圆满菩提真心
- type: concept
  question: 什么是一、密续经典（金刚界）？
  answer: 密续（Tantra）是密宗修行的根本依据，阐述本尊瑜伽、曼荼罗、灌顶等核心教法。
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Vajrayana_Sutras.md
  section: 一、密续经典（金刚界）
- type: concept
  question: 梵文名称的核心要点是什么？
  answer: '内容: Mahavairocana Sutra / Mahavairocana Abhisambodhi Tantra'
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Vajrayana_Sutras.md
  section: 1. 大日经
- type: concept
  question: 译者的核心要点是什么？
  answer: '内容: 善无畏（Subhakarasiṃha）、金刚智（Vajrabodhi）、一行（译语）'
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Vajrayana_Sutras.md
  section: 1. 大日经
- type: concept
  question: 梵文名称的核心要点是什么？
  answer: '内容: Sarvatathagata Tattvasamgraha Mahayanabhisamaya Mahakalaraja Tantra'
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Vajrayana_Sutras.md
  section: 2. 金刚顶经
- type: concept
  question: 什么是概述？
  answer: 密乘瑜伽（Vajrayana Yoga）是藏传佛教的核心修行法门，以**即身成佛**为目标，通过**身、口、意**三密的修持，速证佛果。
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Vajrayana_Yoga.md
  section: 概述
- type: concept
  question: 事部的核心要点是什么？
  answer: '名称: Kriya Yoga；特点: 重外事，轻内观；主要法门: 清净、供养、念诵'
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Vajrayana_Yoga.md
  section: 四部瑜伽
- type: concept
  question: 行部的核心要点是什么？
  answer: '名称: Carya Yoga；特点: 外事内观并重；主要法门: 五相成身、本尊观'
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Vajrayana_Yoga.md
  section: 四部瑜伽
- type: concept
  question: 瑜伽部的核心要点是什么？
  answer: '名称: Yoga Yoga；特点: 重内观，轻外事；主要法门: 入我我入、本尊瑜伽'
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Vajrayana_Yoga.md
  section: 四部瑜伽
- type: concept
  question: 身密的核心要点是什么？
  answer: '佛之密: 佛身；众生之密: 手印、身姿；修法: 结手印、本尊观'
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Vajrayana_Yoga.md
  section: 三密相应
- type: concept
  question: 意密的核心要点是什么？
  answer: '佛之密: 佛意；众生之密: 观想、入定；修法: 观想本尊、入定'
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Vajrayana_Yoga.md
  section: 三密相应
- type: concept
  question: 中脉的核心要点是什么？
  answer: '位置: 脊柱中央；颜色: 蓝色；功能: 智慧气通行，证悟之本'
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Vajrayana_Yoga.md
  section: 气脉明点
- type: concept
  question: 什么是方便品第二？
  answer: 尔时毗耶离大城中有长者，名维摩诘，已曾供养无量诸佛，深植善本，得无生忍；辩才无碍，游戏神通，逮诸总持；获无所畏，降魔劳怨；入深法门，善于智度，通达方便，大愿成就；明了众生心之所趣，又能分别诸根利钝，久于佛道，心已纯淑，决定大乘；诸有所作，能善思量；住佛威仪，心大如海，诸佛咨嗟！弟子、释、梵、世主所敬。欲度人故，以善方便，居毗耶离；资财无量，摄诸贫民；奉戒清净，摄诸毁禁；以忍调行，摄诸恚怒；以大精进，摄诸懈怠；一心禅寂，摄诸乱意；以决定慧，摄诸无智；虽为白衣，奉持沙门清净律行；虽处居家，不着三界；示有妻子，常修梵行；现有眷属，常乐远离；虽服宝饰，而以相好严身；虽复饮食，而以禅悦为味；若至博弈戏处，辄以度人；受诸异道，不毁正信；虽明世典，常乐佛法；一切见敬，为供养中最；执持正法，摄诸长幼；一切治生谐偶，虽获俗利，不以喜悦；游诸四衢，饶益众生；入治政法，救护一切；入讲论处，导以大乘；入诸学堂，诱开童蒙；入诸淫舍，示欲之过；入诸酒肆，能立其志；若在长者，长者中尊，为说胜法；若在居士，居士中尊，断其贪着；若在刹利，刹利中尊，教以忍辱；若在婆罗门，婆罗门中尊，除其我慢；若在大臣，大臣中尊，教以正法
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Vimalakirti_Sutra.md
  section: 方便品第二
- type: concept
  question: 什么是不思议品第六？
  answer: 尔时舍利弗见此室中无有床座，作是念："斯诸菩萨、大弟子众，当于何坐？"
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Vimalakirti_Sutra.md
  section: 不思议品第六
- type: concept
  question: 什么是概述？
  answer: 禅宗以「**直指人心，见性成佛**」为宗旨，修行法门众多，但皆以明心见性为究竟目的。
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Zen_Meditation_Methods.md
  section: 概述
- type: concept
  question: 「念佛是谁？」的核心要点是什么？
  answer: '出处: 最常用的起疑话头；疑情重点: 念佛的是谁？能念者是谁？'
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Zen_Meditation_Methods.md
  section: 常见话头
- type: concept
  question: 昏沉的核心要点是什么？
  answer: '原因: 睡眠不足、饭后即修；对治: 经行、睁开眼睛、观想光明'
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Zen_Meditation_Methods.md
  section: 常见问题
- type: concept
  question: 上座部的核心要点是什么？
  answer: '英文名 (English): Theravāda；巴利语 (Pāli): *Theravāda*；精确定义: 长老们的教导，最古老的佛教传承；心理学意义: 保守传统；专业视角: 巴利语系佛教'
