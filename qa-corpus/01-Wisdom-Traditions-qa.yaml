  question: 名言熏习的核心要点是什么？
  answer: '梵语: *Nāmābhilāpa-vāsanā* (नामाभिलापवासना)；藏语: *མིང་བརྗོད་བག་ཆགས*；定义: 语言概念活动所熏成的习气；所熏种子: 名言种子；生起功能: 变现诸法自体相；心理学对应:
    语言图式、概念系统'
