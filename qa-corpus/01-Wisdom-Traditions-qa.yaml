- type: concept
  question: 存在是一的核心要点是什么？
  answer: '原文: **Being is One**；解释: 巴门尼德认为存在是唯一的、不变的、永恒的。；影响: 开创了西方形而上学的存在论传统，影响了后来的本体论。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/pre-socratics/Parmenides.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 存在与非存在的核心要点是什么？
  answer: '原文: **Being and Non-Being**；解释: 巴门尼德认为存在是存在的，非存在是不存在的，我们只能思考和言说存在。；影响: 奠定了西方哲学中的逻辑基础，影响了后来的逻辑学。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/pre-socratics/Parmenides.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 真理之路 vs 意见之路的核心要点是什么？
  answer: '原文: **Path of Truth vs Path of Opinion**；解释: 真理之路是关于存在的知识，意见之路是关于现象的信念。；影响: 建立了西方哲学中的真理与意见的区分，影响了后来的认识论。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/pre-socratics/Parmenides.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《论自然》(On Nature)的核心要点是什么？
  answer: '出版年份: 公元前485年左右；核心内容: 阐述巴门尼德的哲学思想；重要性: 巴门尼德的主要著作，仅存残篇'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/pre-socratics/Parmenides.md
  section: 主要著作 (Major Works)
- type: concept
  question: 亚里士多德《形而上学》的核心要点是什么？
  answer: '出版年份: 公元前335年；核心内容: 引用和讨论了巴门尼德的思想；重要性: 了解巴门尼德思想的重要来源'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/pre-socratics/Parmenides.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **早期思想**：巴门尼德最初研究自然现象，关注存在的本质

    - **中期发展**：提出存在是一的理论，区分了真理之路和意见之路

    - **晚期成熟**：形成了以存在论为核心的完整哲学体系'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/pre-socratics/Parmenides.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 认知疗法的核心要点是什么？
  answer: '关联概念: 思想与存在的同一；实践方法: 帮助个体识别和改变非理性信念；现代应用: 认知行为疗法和理性情绪疗法'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/pre-socratics/Parmenides.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 数本原说的核心要点是什么？
  answer: '原文: **Number as Arche**；解释: 数是万物的本原，宇宙的和谐基于数学比例。；影响: 奠定了数学哲学的基础，影响了柏拉图主义。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/pre-socratics/Pythagoras.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 宇宙和谐的核心要点是什么？
