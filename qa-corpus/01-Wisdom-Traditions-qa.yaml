- type: concept
  question: 什么是忉利天宫神通品第一？
  answer: 如是我闻。一时佛在忉利天，为母说法。尔时十方无量世界，不可说不可说一切诸佛及大菩萨摩诃萨，皆来集会。赞叹释迦牟尼佛，能于五浊恶世，现不可思议大智慧神通之力，调伏刚强众生，知苦乐法。各遣侍者，问讯世尊。
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Ksitigarbha_Sutra.md
  section: 忉利天宫神通品第一
- type: concept
  question: 什么是分身集会品第二？
  answer: 尔时，百千万亿不可思不可议不可量不可说无量阿僧祇世界，所有地狱处，分身地藏菩萨，俱来集在忉利天宫...
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Ksitigarbha_Sutra.md
  section: 分身集会品第二
- type: concept
  question: 什么是地狱名号品第五？
  answer: 地藏菩萨告普贤菩萨：「仁者，阎浮提东方有山，号曰铁围...有大地狱，号极无间，又有地狱名大阿鼻。复有地狱，名曰四角、飞刀、火箭、夹山、通枪、铁车、铁床、铁牛、铁衣、千刃、铁驴、烊铜、抱柱、流火、耕舌、剉首、烧脚、啖眼、铁丸、诤论...」
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Ksitigarbha_Sutra.md
  section: 地狱名号品第五
- type: concept
  question: 什么是阎罗王众赞叹品第八？
  answer: 主命鬼王白佛言：「一切众生临命终时，若得闻一佛名、一菩萨名，或大乘经典一句一偈。我观如是辈人，除五无间杀害之罪，小小恶业，合堕恶趣者，寻即解脱。」
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Ksitigarbha_Sutra.md
  section: 阎罗王众赞叹品第八
- type: concept
  question: 什么是地神护法品第十一？
  answer: 坚牢地神白佛言：「世尊，是地藏菩萨于阎浮提有大因缘...若未来世，有善男子、善女人，于所住处，作此菩萨像，烧香供养，瞻礼赞叹，是人居处，即得十种利益：
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Ksitigarbha_Sutra.md
  section: 地神护法品第十一
- type: concept
  question: 什么是正文？
  answer: 如是我闻。一时薄伽梵游化诸国，至广严城，住乐音树下，与大苾刍众八千人俱，菩萨摩诃萨三万六千，及国王、大臣、婆罗门、居士、天龙、药叉、人非人等，无量大众，恭敬围绕，而为说法。
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Medicine_Buddha_Sutra.md
  section: 正文
- type: concept
  question: 什么是药师佛十二大愿？
  answer: '**第一大愿**：愿我来世得阿耨多罗三藐三菩提时，自身光明炽然，照耀无量无数无边世界，以三十二大丈夫相、八十随形，庄严其身；令一切有情，如我无异。'
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Medicine_Buddha_Sutra.md
  section: 药师佛十二大愿
- type: concept
  question: 什么是药师佛净土功德？
  answer: 曼殊室利，是为彼世尊药师琉璃光如来、应正等觉，行菩萨道时，所发十二微妙上愿。
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Medicine_Buddha_Sutra.md
  section: 药师佛净土功德
- type: concept
  question: 什么是药师佛名号功德？
  answer: 复次，曼殊室利，若诸有情悭贪嫉妒，自赞毁他，当堕三恶趣中，无量千岁受诸剧苦。受剧苦已，从彼命终，来生人间，作牛马驼驴，恒被鞭挞，饥渴逼恼，又常负重随路而行。或得为人，生居下贱，作人奴婢，受他驱役，恒不自在。若昔人中，曾闻世尊药师琉璃光如来名号，由此善因，今复忆念，至心归依，以佛神力，众苦解脱，诸根聪利，智慧多闻，恒求胜法，常遇善友，永断魔罥，破无明壳，竭烦恼河，解脱一切生老病死忧愁苦恼。
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Medicine_Buddha_Sutra.md
  section: 药师佛名号功德
- type: concept
  question: 什么是药师灌顶真言？
  answer: '**南谟薄伽伐帝 鞞杀社窭噜 薜琉璃 钵喇婆 喝啰阇也 怛他揭多耶 阿啰喝帝 三藐三勃陀耶 怛侄他 唵 鞞杀逝 鞞杀逝 鞞杀社 三没揭帝莎诃**'
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Medicine_Buddha_Sutra.md
  section: 药师灌顶真言
- type: concept
  question: 什么是行由品第一？
  answer: 时，大师至宝林，韶州韦刺史与官僚入山，请师出。于城中大梵寺讲堂，为众开缘说法。师升座次，刺史官僚三十余人、儒宗学士三十余人、僧尼道俗一千余人，同时作礼，愿闻法要。
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Platform_Sutra.md
  section: 行由品第一
- type: concept
  question: 什么是般若品第二？
  answer: 次日，韦使君请益，师升座，告大众曰：「总净心念摩诃般若波罗蜜多。」复云：「善知识，菩提般若之智，世人本自有之，只缘心迷，不能自悟，须假大善知识，示导见性。当知愚人智人，佛性本无差别，只缘迷悟不同，所以有愚有智。吾今为说摩诃般若波罗蜜法，使汝等各得智慧，志心谛听，吾为汝说。
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Platform_Sutra.md
  section: 般若品第二
- type: concept
  question: 什么是疑问品第三？
  answer: 一日，韦刺史为师设大会斋，斋讫，刺史请师升座，同官僚士庶，肃容再拜，问曰：「弟子闻和尚说法，实不可思议，今有少疑，愿大慈悲，特为解说。」师曰：「有疑即问，吾当为说。」
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Platform_Sutra.md
  section: 疑问品第三
- type: concept
  question: 什么是定慧品第四？
  answer: 师示众云：「善知识，我此法门，以定慧为本，大众勿迷，言定慧别，定慧一体，不是二，定是慧体，慧是定用，即慧之时定在慧，即定之时慧在定，若识此义，即是定慧等学。诸学道人，莫言先定发慧，先慧发定，各别作此见者，法有二相，口说善语，心中不善，空有定慧，定慧不等，若心口俱善，内外一如，定慧即等。自悟修行，不在于诤，若诤先后，即同迷人，不断胜负，却增我法，不离四相。善知识，定慧犹如何等？犹如灯光，有灯即光，无灯即暗，灯是光之体，光是灯之用，名虽有二，体本同一，此定慧法，亦复如是。」
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Platform_Sutra.md
  section: 定慧品第四
- type: concept
  question: 什么是坐禅品第五？
  answer: 师示众云：「此门坐禅，元不著心，亦不著净，亦不是不动。若言著心，心原是妄，知心如幻，故无所著也。若言著净，人性本净，由妄念故，盖覆真如，但无妄想，性自清净，起心著净，却生净妄，妄无处所，著者是妄，净无形相，却立净相，言是工夫，作此见者，障自本性，却被净缚。善知识，若修不动者，但见一切人时，不见人之是非善恶过患，即是自性不动。善知识，迷人身虽不动，开口便说他人是非长短好恶，与道违背，若著心著净，即障道也。」
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Platform_Sutra.md
  section: 坐禅品第五
- type: concept
  question: 第一的核心要点是什么？
  answer: '愿名: 无三恶趣愿；内容: 设我得佛，国有地狱饿鬼畜生者，不取正觉'
