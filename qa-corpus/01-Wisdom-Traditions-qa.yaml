- type: concept
  question: 修身层面的核心要点是什么？
  answer: '儒家侧重: 克己复礼、正心诚意；道家侧重: 养生长生、炼精化气；佛家侧重: 持戒修福、调伏身心；南师整合视角: 身体是修行的载体，健康是基础；现代心理学对照: 躯体心理学、生物反馈；实修应用: 静坐、导引、饮食调理'
  source: 01-Wisdom-Traditions/religions/buddhism/nan-huaijin/Nan_Huaijin_Teachings.md
  section: 南怀瑾三教整合体系表 (Synthesis of Three Teachings)
- type: concept
  question: 治心层面的核心要点是什么？
  answer: '儒家侧重: 格物致知、明心见性；道家侧重: 心斋坐忘、虚静无为；佛家侧重: 观心念佛、明心见性；南师整合视角: 心是万法根源，觉察是关键；现代心理学对照: 正念、元认知、洞察疗法；实修应用: 观呼吸、观心念、参话头'
  source: 01-Wisdom-Traditions/religions/buddhism/nan-huaijin/Nan_Huaijin_Teachings.md
  section: 南怀瑾三教整合体系表 (Synthesis of Three Teachings)
- type: concept
  question: 立命层面的核心要点是什么？
  answer: '儒家侧重: 修齐治平、内圣外王；道家侧重: 性命双修、长生久视；佛家侧重: 了生脱死、涅槃解脱；南师整合视角: 生命意义与终极关怀；现代心理学对照: 存在主义疗法、超个人心理学；实修应用: 发菩提心、修福报、社会实践'
  source: 01-Wisdom-Traditions/religions/buddhism/nan-huaijin/Nan_Huaijin_Teachings.md
