- type: concept
  question: 什么是持诵方法？
  answer: '1. **发心** - 发广大菩提心，誓度一切众生

    2. **持戒** - 身持斋戒，于诸众生起平等心

    3. **环境** - 住于净室，澡浴清净，著净衣服

    4. **供养** - 悬旛然灯，香华百味饮食，以用供养

    5. **持诵** - 制心一处，更莫异缘，如法诵持'
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Great_Compassion_Mantra.md
