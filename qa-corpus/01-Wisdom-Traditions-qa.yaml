  question: 增加每篇开示的背景说明的核心要点是什么？
  answer: '原因: 什么时候、在哪里、面对什么听众——这些信息有助于理解'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/world-is-a-playground/Multi_Perspective_Reviews.md
  section: 编辑建议
- type: concept
  question: 出离心的核心要点是什么？
  answer: '为什么值得反复读: 它重新定义了"出离"——不是离开，是不被绑架；我从中得到的: 我终于理解为什么我出家三个月后又回来了——因为我的"出离"是逃避'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/world-is-a-playground/Multi_Perspective_Reviews.md
  section: 哪几篇值得反复读
- type: concept
  question: 菩提心的核心要点是什么？
  answer: '为什么值得反复读: 它让我看到"为一切众生"不是口号，是具体的修行方法；我从中得到的: 我开始每天早上做一个简短的"愿一切众生安乐"的回向'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/world-is-a-playground/Multi_Perspective_Reviews.md
  section: 哪几篇值得反复读
- type: concept
  question: 金刚经解读的核心要点是什么？
  answer: '为什么值得反复读: 它把一部我觉得高深莫测的经典变得可以亲近；我从中得到的: 我开始每天读一品金刚经'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/world-is-a-playground/Multi_Perspective_Reviews.md
  section: 哪几篇值得反复读
- type: concept
  question: 出离心的核心要点是什么？
  answer: '传统归属: 共通教法（大乘/小乘共通）；宗萨仁波切的公开化策略: 完全公开，无保密需求；学术评价: 准确、善巧'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/world-is-a-playground/Multi_Perspective_Reviews.md
  section: 关键教法的学术定位
- type: concept
  question: 菩提心的核心要点是什么？
  answer: '传统归属: 大乘共通；宗萨仁波切的公开化策略: 完全公开；学术评价: 准确，但偏重"愿菩提心"，对"行菩提心"涉及较少'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/world-is-a-playground/Multi_Perspective_Reviews.md
  section: 关键教法的学术定位
- type: concept
  question: 戒律的核心要点是什么？
  answer: '梵语/巴利语: *Śīla* / *Sīla*；英文: Ethics/Morality；定义: 行为规范，防止恶行，培养善行；伦理意义: 道德基础；现代应用: 行为准则'
  source: 01-Wisdom-Traditions/religions/buddhism/ethics/Buddhism_Ethics_Comprehensive.md
  section: 表1.1 佛教伦理学核心概念 (Core Ethical Concepts)
- type: concept
  question: 业力的核心要点是什么？
  answer: '梵语/巴利语: *Karma* / *Kamma*；英文: Action/Deed；定义: 行为及其果报法则；伦理意义: 责任承担；现代应用: 因果思维'
  source: 01-Wisdom-Traditions/religions/buddhism/ethics/Buddhism_Ethics_Comprehensive.md
  section: 表1.1 佛教伦理学核心概念 (Core Ethical Concepts)
- type: concept
  question: 慈悲的核心要点是什么？
  answer: '梵语/巴利语: *Karunā* / *Karunā*；英文: Compassion；定义: 拔苦予乐的利他情怀；伦理意义: 道德动力；现代应用: 同理心'
  source: 01-Wisdom-Traditions/religions/buddhism/ethics/Buddhism_Ethics_Comprehensive.md
  section: 表1.1 佛教伦理学核心概念 (Core Ethical Concepts)
- type: concept
  question: 因果律的核心要点是什么？
  answer: '梵语: *Karma-vipāka*；巴利语: *Kamma-vipāka*；英文: Law of Cause & Effect；核心内容: 善恶必有果报；现代表达: 责任伦理'
  source: 01-Wisdom-Traditions/religions/buddhism/ethics/Buddhism_Ethics_Comprehensive.md
  section: 表1.2 佛教伦理学基本原则 (Fundamental Principles)
- type: concept
  question: 无害原则的核心要点是什么？
  answer: '梵语: *Ahimsā*；巴利语: *Avihimsā*；英文: Non-violence；核心内容: 不伤害一切众生；现代表达: 非暴力'
  source: 01-Wisdom-Traditions/religions/buddhism/ethics/Buddhism_Ethics_Comprehensive.md
  section: 表1.2 佛教伦理学基本原则 (Fundamental Principles)
- type: concept
  question: 慈悲原则的核心要点是什么？
  answer: '梵语: *Maitrī-Karuṇā*；巴利语: *Mettā-Karuṇā*；英文: Loving-kindness；核心内容: 慈悲为怀；现代表达: 利他主义'
  source: 01-Wisdom-Traditions/religions/buddhism/ethics/Buddhism_Ethics_Comprehensive.md
  section: 表1.2 佛教伦理学基本原则 (Fundamental Principles)
- type: concept
  question: 波罗夷的核心要点是什么？
  answer: '数量: 4条；内容: 杀人、偷盗、邪淫、大妄语；违犯后果: 永弃逐出僧团；适用对象: 比丘；现代意义: 绝对底线'
  source: 01-Wisdom-Traditions/religions/buddhism/ethics/Buddhism_Ethics_Comprehensive.md
  section: 表2.1 比丘戒律层次 (Bhikkhu Precepts Hierarchy)
- type: concept
  question: 僧残的核心要点是什么？
  answer: '数量: 13条；内容: 严重违规行为；违犯后果: 严厉忏悔程序；适用对象: 比丘；现代意义: 重大过失'
  source: 01-Wisdom-Traditions/religions/buddhism/ethics/Buddhism_Ethics_Comprehensive.md
  section: 表2.1 比丘戒律层次 (Bhikkhu Precepts Hierarchy)
- type: concept
  question: 持戒的核心要点是什么？
  answer: '英文名 (English): Observing Precepts；梵语 (Sanskrit): *Śīla-saṃvara*；巴利语 (Pāli): *Sīla-saṃvara*；精确定义: 守护戒律；心理学意义: 自我控制；专业视角:
    戒学核心'
  source: 01-Wisdom-Traditions/religions/buddhism/ethics/Buddhism_Vinaya_Ethics.md
  section: 表1.1 戒律基本术语 (Basic Terms)
- type: concept
  question: 犯戒的核心要点是什么？
  answer: '英文名 (English): Transgression；梵语 (Sanskrit): *Śīla-vipatti*；巴利语 (Pāli): *Sīla-vipatti*；精确定义: 违犯戒律；心理学意义: 越界；专业视角:
    需忏悔'
  source: 01-Wisdom-Traditions/religions/buddhism/ethics/Buddhism_Vinaya_Ethics.md
  section: 表1.1 戒律基本术语 (Basic Terms)
- type: concept
  question: 忏悔的核心要点是什么？
  answer: '英文名 (English): Confession；梵语 (Sanskrit): *Deśanā*；巴利语 (Pāli): *Desanā*；精确定义: 对过失的忏悔；心理学意义: 心理净化；专业视角: 恢复清净'
  source: 01-Wisdom-Traditions/religions/buddhism/ethics/Buddhism_Vinaya_Ethics.md
  section: 表1.1 戒律基本术语 (Basic Terms)
- type: concept
  question: 防护功能的核心要点是什么？
  answer: '巴利语: *Saṃvara*；英文: Restraint；内容: 防止恶行；心理学意义: 行为抑制'
  source: 01-Wisdom-Traditions/religions/buddhism/ethics/Buddhism_Vinaya_Ethics.md
  section: 表1.2 戒的功能与特性 (Functions & Characteristics of Śīla)
- type: concept
  question: 清净功能的核心要点是什么？
  answer: '巴利语: *Suddhi*；英文: Purification；内容: 净化身心；心理学意义: 心理净化'
  source: 01-Wisdom-Traditions/religions/buddhism/ethics/Buddhism_Vinaya_Ethics.md
  section: 表1.2 戒的功能与特性 (Functions & Characteristics of Śīla)
- type: concept
  question: 庄严功能的核心要点是什么？
  answer: '巴利语: *Alaṅkāra*；英文: Adornment；内容: 庄严人格；心理学意义: 人格提升'
  source: 01-Wisdom-Traditions/religions/buddhism/ethics/Buddhism_Vinaya_Ethics.md
  section: 表1.2 戒的功能与特性 (Functions & Characteristics of Śīla)
- type: concept
  question: 不杀生的核心要点是什么？
  answer: '梵语: *Prāṇātipāta-virati*；巴利语: *Pāṇātipātā veramaṇī*；英文: Non-killing；戒相: 不伤害有情生命；开缘(例外): 无意、自卫；心理功能: 减少攻击性；社会功能:
    尊重生命'
  source: 01-Wisdom-Traditions/religions/buddhism/ethics/Buddhism_Vinaya_Ethics.md
  section: 表2.1 五戒详表 (Five Precepts - Pañca-sīla)
- type: concept
  question: 不偷盗的核心要点是什么？
  answer: '梵语: *Adattādāna-virati*；巴利语: *Adinnādānā veramaṇī*；英文: Non-stealing；戒相: 不取非己物；开缘(例外): 以为己有；心理功能: 减少贪欲；社会功能: 尊重财产'
  source: 01-Wisdom-Traditions/religions/buddhism/ethics/Buddhism_Vinaya_Ethics.md
