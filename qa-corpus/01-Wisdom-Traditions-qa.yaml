- type: concept
  question: 缘起因果的核心要点是什么？
  answer: '因果的含义: 一切现象因缘和合而生；宗萨仁波切的侧重: 主要侧重'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/eighty-four-thousand-questions/Multi_Perspective_Reviews.md
  section: 教理表述中的学术争议点
- type: concept
  question: 业力因果的核心要点是什么？
  answer: '因果的含义: 意业驱动行为的循环机制；宗萨仁波切的侧重: 偶尔涉及'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/eighty-four-thousand-questions/Multi_Perspective_Reviews.md
  section: 教理表述中的学术争议点
- type: concept
  question: 结构的核心要点是什么？
  answer: '《正见》: 系统性；《八万四千问》: 碎片化；互补效果: 后者填补前者的空白'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/eighty-four-thousand-questions/Multi_Perspective_Reviews.md
  section: 与正见的互补关系
- type: concept
  question: 深度的核心要点是什么？
  answer: '《正见》: 深入几个核心概念；《八万四千问》: 浅但广；互补效果: 后者扩展前者的范围'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/eighty-four-thousand-questions/Multi_Perspective_Reviews.md
  section: 与正见的互补关系
- type: concept
  question: 什么是一、总体评价？
  answer: 这是宗萨蒋扬钦哲仁波切最"沉重"的一本书。他做的不是教你"不怕死"——那是心灵鸡汤的工作。他做的是：**让你正眼看着死亡，然后发现"活着"和"死着"之间的界限，比你以为的要模糊得多。**
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/living-is-dying/Book_Review.md
  section: 一、总体评价
- type: concept
  question: 此生中阴的核心要点是什么？
  answer: '藏文: *Skye gnas bar do*；时段: 从出生到死亡的整个过程；核心状态: 日常意识；修行要点: 建立正见、修行'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/living-is-dying/Book_Review.md
  section: 关于中阴（Bardo）
- type: concept
  question: 临终中阴的核心要点是什么？
  answer: '藏文: *''Chi kha bar do*；时段: 死亡过程开始到呼吸停止；核心状态: 身体分解、四大消融；修行要点: 放下执著、安住本性'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/living-is-dying/Book_Review.md
  section: 关于中阴（Bardo）
- type: concept
  question: 法性中阴的核心要点是什么？
  answer: '藏文: *Chos nyid bar do*；时段: 呼吸停止后；核心状态: 本觉光明显现；修行要点: 认出光明即自性'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/living-is-dying/Book_Review.md
  section: 关于中阴（Bardo）
- type: concept
  question: 原著的核心要点是什么？
  answer: '内容: 《活着即是迈向死亡》(Living Is Dying)'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/living-is-dying/INDEX.md
  section: 基本信息
- type: concept
  question: 作者的核心要点是什么？
  answer: '内容: 宗萨蒋扬钦哲仁波切 (Dzongsar Jamyang Khyentse Rinpoche)'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/living-is-dying/INDEX.md
  section: 基本信息
- type: concept
  question: 什么是关联知识？
  answer: '- [正见：佛陀的证悟](../what-makes-you-not-a-buddhist/) - 同作者核心入门作

    - [中观哲学](../../core-philosophy/Buddhism_Madhyamaka_Philosophy_System.md) - 空性见地基础

    - [藏传佛教心理学](../../../tibetan-buddhism/Tibetan_Buddhist_Psychology.md) - 心识结构

    - [大圆满](../../dzogchen/Dzogchen_Great_Perfection.md) - 中阴教法的最高背景'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/living-is-dying/INDEX.md
  section: 关联知识
- type: concept
  question: 篇幅的核心要点是什么？
  answer: '《西藏生死书》: 约500页，厚重；《活着即是迈向死亡》: 约200页，精炼'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/living-is-dying/Multi_Perspective_Reviews.md
  section: 与《西藏生死书》的文本对比
- type: concept
  question: 语气的核心要点是什么？
  answer: '《西藏生死书》: 温暖、叙事、陪伴；《活着即是迈向死亡》: 冷峻、直接、刺痛'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/living-is-dying/Multi_Perspective_Reviews.md
  section: 与《西藏生死书》的文本对比
- type: concept
  question: 结构的核心要点是什么？
  answer: '《西藏生死书》: 按死亡过程展开（生→临终→死亡→重生）；《活着即是迈向死亡》: 按"活着→认识→准备→面对"展开'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/living-is-dying/Multi_Perspective_Reviews.md
  section: 与《西藏生死书》的文本对比
- type: concept
  question: 临终中阴的核心要点是什么？
  answer: '我原来的理解: "快死的那段时间"；读完后的理解: 身体分解的过程，四大（地水火风）逐一消融'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/living-is-dying/Multi_Perspective_Reviews.md
  section: 中阴修法的理解
- type: concept
  question: 法性中阴的核心要点是什么？
  answer: '我原来的理解: 完全不知道；读完后的理解: 呼吸停止后，本觉光明显现——如果你认出它，就解脱了'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/living-is-dying/Multi_Perspective_Reviews.md
  section: 中阴修法的理解
- type: concept
  question: 什么是一、总体评价？
  answer: 如果说《正见》是给你看地图，《不是为了快乐》就是把你推上路。这本书讲的是金刚乘加行（Ngöndro）——藏传佛教中最著名也最让人望而生畏的一套"基础修行"。但宗萨仁波切在书的一开头就把话说死了：**这不是为了让你快乐。**
    如果你在找快乐，去看喜剧片。如果你在找真相，继续读。
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/not-for-happiness/Book_Review.md
  section: 一、总体评价
- type: concept
  question: 1. 皈依大礼拜的核心要点是什么？
  answer: '修法: 皈依三宝 + 全身匍伏；次数: 十万次；核心目的: 建立正确方向、破除傲慢；常见误解: 以为是在"锻炼身体"'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/not-for-happiness/Book_Review.md
  section: 什么是加行（Ngöndro）？
- type: concept
  question: 2. 金刚萨埵百字明的核心要点是什么？
  answer: '修法: 忏悔净化；次数: 十万遍；核心目的: 清净业障；常见误解: 以为念够数就"没罪了"'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/not-for-happiness/Book_Review.md
  section: 什么是加行（Ngöndro）？
- type: concept
  question: 3. 曼达拉供的核心要点是什么？
  answer: '修法: 供养宇宙；次数: 十万次；核心目的: 积累福慧资粮；常见误解: 以为是在"攒积分"'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/not-for-happiness/Book_Review.md
  section: 什么是加行（Ngöndro）？
- type: concept
  question: 语言风格的核心要点是什么？
  answer: '《不是为了快乐》: 现代口语；《普贤上师言教》(巴珠仁波切): 19世纪藏文经典；《大圆满前行》(华智仁波切): 19世纪藏文经典'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/not-for-happiness/Book_Review.md
  section: 四、与其他加行指南的对比
- type: concept
  question: 原著的核心要点是什么？
  answer: '内容: 《不是为了快乐》(Not for Happiness: A Guide to the So-Called Preliminary Practices)'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/not-for-happiness/INDEX.md
  section: 基本信息
- type: concept
  question: 作者的核心要点是什么？
  answer: '内容: 宗萨蒋扬钦哲仁波切 (Dzongsar Jamyang Khyentse Rinpoche)'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/not-for-happiness/INDEX.md
  section: 基本信息
