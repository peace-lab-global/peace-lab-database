- type: concept
  question: 七种体质精华的核心要点是什么？
  answer: '藏文/英文 (Tib/Eng): Seven Bodily Sustenances；核心概念 (Core Concept): 饮食精华、血液、肌肉、脂肪、骨、骨髓、精液。；对健康的影响: 生命物质的演化链条，反映了脏腑的营养状态。；临床应用指南:
    评估虚实、强弱的主要指标。'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Wisdom_Tibetan_Healing_Arts.md
  section: 'Sowa Rigpa: The Science of Healing (藏医五大基础理论表)'
- type: concept
  question: 隆 (Lung)的核心要点是什么？
  answer: '对应的“三毒”: 贪 (Attachment)；心理特质 (Positive/Negative): 灵活性、创造力 / 焦虑、失眠、散乱。；典型失衡表现: 对声音敏感、心慌、脊柱疼痛。；专业视角 (Professional
    Perspective): 类似于神经系统的亢奋或虚弱。'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Wisdom_Tibetan_Healing_Arts.md
  section: 'The Three Humors: Psychology & Pathology (三因心理病理对应分析表)'
- type: concept
  question: 赤巴 (Tripa)的核心要点是什么？
  answer: '对应的“三毒”: 嗔 (Anger)；心理特质 (Positive/Negative): 智慧、决断力 / 愤怒、傲慢、易燃。；典型失衡表现: 消化不良、皮肤问题、反复发热。；专业视角 (Professional Perspective):
    类似于代谢亢进与炎症反应。'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Wisdom_Tibetan_Healing_Arts.md
  section: 'The Three Humors: Psychology & Pathology (三因心理病理对应分析表)'
- type: concept
  question: 培根 (Beken)的核心要点是什么？
  answer: '对应的“三毒”: 痴 (Ignorance)；心理特质 (Positive/Negative): 稳重、包容 / 迟钝、抑郁、过度嗜睡。；典型失衡表现: 水肿、体重增加、关节僵硬。；专业视角 (Professional Perspective):
    类似于淋巴与代谢迟缓。'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Wisdom_Tibetan_Healing_Arts.md
  section: 'The Three Humors: Psychology & Pathology (三因心理病理对应分析表)'
- type: concept
  question: 深度脉的核心要点是什么？
  answer: '技术描述: 深沉且隐匿的搏动。；代表的病理信号: 指向骨骼、肾脏及深层慢性积郁。；检查要领 (Technical Tips): 按压需深至骨。；专业视角: 反映了一个人长期的生命韧性（根基）。'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Wisdom_Tibetan_Healing_Arts.md
  section: 'Tibetan Pulse: The Art of Diagnosis (藏医脉诊技术详表)'
- type: concept
  question: 浅表脉的核心要点是什么？
  answer: '技术描述: 浮且易感的搏动。；代表的病理信号: 指向皮肤、头部及急性隆/赤巴波动。；检查要领 (Technical Tips): 轻轻触碰即可。；专业视角: 反映了当下的情绪压力水平。'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Wisdom_Tibetan_Healing_Arts.md
  section: 'Tibetan Pulse: The Art of Diagnosis (藏医脉诊技术详表)'
- type: concept
  question: 事续的核心要点是什么？
  answer: '梵文 (Sanskrit): Kriya Tantra；核心特质与修行重点: 强调外部清净、仪式和洗涤。；心理/精神隐喻: 通过行为的规范引导内心秩序。；专业视角 (Professional Perspective): 旨在建立基础的敬畏感与纪律性。'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Wisdom_Vajrayana_Tantra_Core.md
  section: The Four Classes of Tantra (密宗四续部详表)
- type: concept
  question: 行续的核心要点是什么？
  answer: '梵文 (Sanskrit): Charya Tantra；核心特质与修行重点: 内外平衡；将行为与禅定结合。；心理/精神隐喻: 将神圣性融入日常互动。；专业视角 (Professional Perspective): 是从外在转向内在观想的过渡阶段。'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Wisdom_Vajrayana_Tantra_Core.md
  section: The Four Classes of Tantra (密宗四续部详表)
- type: concept
  question: 瑜伽续的核心要点是什么？
  answer: '梵文 (Sanskrit): Yoga Tantra；核心特质与修行重点: 强调内在的禅定与空性观想。；心理/精神隐喻: 深度的心理整合与原型共振。；专业视角 (Professional Perspective): 核心是通过“五相成身”实现身口意的本尊化。'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Wisdom_Vajrayana_Tantra_Core.md
  section: The Four Classes of Tantra (密宗四续部详表)
- type: concept
  question: 明点的核心要点是什么？
  answer: '梵文/藏文 (Skt/Tib): Bindu / thig le；定义与功能: 能量的精华；认知的载体。；心理/生理对应: 意识最细微的种子；遗传与智慧的汇聚。；专业视角 (Professional Perspective):
    红色与白色明点的平衡决定了深层生理的和谐。'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Wisdom_Vajrayana_Tantra_Core.md
  section: 'The Vajra Body: Nadi, Prana, Bindu (金刚身：脉、气、明点系统表)'
- type: concept
  question: 成就位的核心要点是什么？
  answer: '梵文/藏文 (Skt/Tib): Chakras；定义与功能: 脉的交汇中心。；心理/生理对应: 能量与认知的交叉节点；特定的能量泵。；专业视角 (Professional Perspective): 不同脉轮的开启对应不同的心理功能提升。'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Wisdom_Vajrayana_Tantra_Core.md
  section: 'The Vajra Body: Nadi, Prana, Bindu (金刚身：脉、气、明点系统表)'
- type: concept
  question: 生起次第的核心要点是什么？
  answer: '过程描述 (Process): Generation Stage；心理学效应: 详尽地观想本尊、坛城及咒蔓。；目的 (Goal): 训练极度的精神集中力与创造性想象。；备注: 彻底打破平庸的凡夫见。'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Wisdom_Vajrayana_Tantra_Core.md
  section: Deity Yoga & Archetypal Realization (本尊瑜伽与原型成就表)
- type: concept
  question: 圆满次第的核心要点是什么？
  answer: '过程描述 (Process): Completion Stage；心理学效应: 融摄观想进入气脉，现证大乐空性。；目的 (Goal): 触发大脑最深层的生化平衡：内啡肽、多巴胺的极致融合。；备注: 实现意识的自性解脱。'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Wisdom_Vajrayana_Tantra_Core.md
  section: Deity Yoga & Archetypal Realization (本尊瑜伽与原型成就表)
- type: concept
  question: 自生本尊的核心要点是什么？
  answer: '过程描述 (Process): Self-Generation；心理学效应: 观想自己即是本尊。；目的 (Goal): 构建一种神圣、完整且无畏的自我认同。；备注: 对抗由自卑、创伤引起的自我否定。'
  source: 01-Wisdom-Traditions/religions/wisdom-traditions/Wisdom_Vajrayana_Tantra_Core.md
  section: Deity Yoga & Archetypal Realization (本尊瑜伽与原型成就表)
