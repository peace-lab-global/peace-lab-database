  answer: '作者/时代: 魏伯阳 (东汉)；核心哲学模型: 以易经卦象模拟炼丹过程。；关键贡献: 丹道之祖，奠定了外丹隐喻内丹的传统。；专业视角 (Expert Perspective): 提供了一套完备的“时间学”，将人与天时对标。'
