  answer: '巴利语 (Pāli): *Paramattha-dhamma*；梵语 (Sanskrit): *Paramārtha-dharma*；英文 (English): Ultimate Reality；精确定义: 真实存在的最小单位；专业视角:
    四种：心、心所、色、涅槃'
  source: 01-Wisdom-Traditions/religions/buddhism/theravada/Theravada_Abhidhamma.md
