  question: 现行的核心要点是什么？
  answer: '英文名 (English): Manifestation；梵语 (Sanskrit): *Samudācāra* (समुदाचार)；藏语 (Tibetan): *མངོན་འགྱུར* (mNgon-''gyur)；精确定义:
    种子遇缘生起的显在活动；疗愈意义: 心理活动的显现；专业视角: 与种子互为因果'
  source: 01-Wisdom-Traditions/religions/buddhism/vasana/Vasana_Seed_Theory.md
  section: 表1.1 种子基本术语表 (Basic Seed Terms)
