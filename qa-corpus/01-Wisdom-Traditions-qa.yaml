  question: 证转的核心要点是什么？
  answer: '梵语: *Pratyavekṣaṇa*；巴利语: *Paccavekkhana*；含义: 已经完成；苦谛: 苦已遍知；集谛: 集已永断；灭谛: 灭已作证；道谛: 道已修习'
  source: 01-Wisdom-Traditions/religions/buddhism/foundations/Buddhism_Four_Noble_Truths.md
  section: 表1.2 四圣谛的三转十二行相 (Three Turnings & Twelve Aspects)
- type: concept
  question: 苦苦的核心要点是什么？
  answer: '梵语: *Duḥkha-duḥkhatā*；巴利语: *Dukkha-dukkhatā*；英文: Suffering of Suffering；定义: 明显的身心痛苦；具体例子: 病痛、丧失、恐惧、悲伤；心理学对应: 急性负面情绪；专业视角:
    最容易识别的苦'
