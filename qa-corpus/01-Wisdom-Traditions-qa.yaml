- type: concept
  question: 不均齐的核心要点是什么？
  answer: '日文名: Fukinsei；核心含义: 不对称，不完美。；心理/空间应用: 减少完美主义焦虑；接纳残缺。；专业视角 (Professional Perspective): 动感与自然性的来源，打破生硬的逻辑控制。；引用来源
    (Citation): Shin''ichi Hisamatsu, *Zen and the Fine Arts*.'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Aesthetics_Culture.md
  section: Zen Aesthetic Principles (禅宗美学七原则 - 7 Pillars)
- type: concept
  question: 简素的核心要点是什么？
  answer: '日文名: Kanso；核心含义: 剥离非本质，纯化核心。；心理/空间应用: 极简主义生活；减少信息过载。；专业视角 (Professional Perspective): 通过极度简化来增加表达的强度和广度。；引用来源 (Citation):
    -'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Aesthetics_Culture.md
  section: Zen Aesthetic Principles (禅宗美学七原则 - 7 Pillars)
- type: concept
  question: 枯高的核心要点是什么？
  answer: '日文名: Koko；核心含义: 沧桑，孤高，去除了肉欲。；心理/空间应用: 培养超然和长期主义观。；专业视角 (Professional Perspective): 代表了一种经过洗练后的成熟，类似老干劲。；引用来源 (Citation):
    -'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Aesthetics_Culture.md
  section: Zen Aesthetic Principles (禅宗美学七原则 - 7 Pillars)
- type: concept
  question: 茶道** (Chadō)的核心要点是什么？
  answer: '核心禅修指向: 一期一会 (Ichi-go ichi-e)。；关键概念: **和敬清寂**。；职场/生活益处: 极为珍视当下的沟通与社交；极致专注。；专业视角 (Professional Perspective): 仪式化的感官觉知训练。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Aesthetics_Culture.md
  section: 'Zen Arts: The Way of Practice (禅宗艺术：以艺入道表)'
- type: concept
  question: 水墨画** (Sumi-e)的核心要点是什么？
  answer: '核心禅修指向: 留白 (Ma) 与无心之笔。；关键概念: **墨分五色**。；职场/生活益处: 允许空间与留白，不塞满。；专业视角 (Professional Perspective): 一种动作轨迹的禅修，笔触即心迹。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Aesthetics_Culture.md
  section: 'Zen Arts: The Way of Practice (禅宗艺术：以艺入道表)'
- type: concept
  question: 禅园/枯山水的核心要点是什么？
  answer: '核心禅修指向: 冥想空间的实体化。；关键概念: **石、砂、苔**。；职场/生活益处: 营造支持性的工作/休养场所。；专业视角 (Professional Perspective): 视觉极简主义对自主神经系统的镇静作用。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Aesthetics_Culture.md
  section: 'Zen Arts: The Way of Practice (禅宗艺术：以艺入道表)'
- type: concept
  question: 神经科学的核心要点是什么？
  answer: '整合点: 禅定与 DMN。；机制驱动 (Driver): 抑制默认模式网络 (Default Mode Network)。；专业视角 (Professional Perspective): 坐禅能显著改变长期修行者的大脑岛叶和前额叶结构。；引用来源
    (Citation): Tang, Y. Y., et al. (2015). *Nature Reviews Neuroscience*.'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Aesthetics_Culture.md
  section: Zen & Modern Psychology/Science (禅宗与现代科学整合表)
- type: concept
  question: 临床心理学的核心要点是什么？
  answer: '整合点: 辩证行为疗法 (DBT)。；机制驱动 (Driver): 接纳 (Acceptance) 与 改变 (Change) 的平衡。；专业视角 (Professional Perspective): 禅的“不二”思想是辩证思维的源头，用于治疗边缘性人格障碍。；引用来源
    (Citation): Linehan, M. (1993).'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Aesthetics_Culture.md
  section: Zen & Modern Psychology/Science (禅宗与现代科学整合表)
- type: concept
  question: 饮食 (Eating)的核心要点是什么？
  answer: '术语 (Term/Verse): **应量器 (Oryoki)**；核心行为要点: 三德六味；食存五观；三匙愿。；心理/存在主义价值: 彻底的契约感与感恩心；纠正贪欲。；专业视角 (Expert Perspective):
    将生理本能转化为神圣的奉献仪式，解决成瘾/暴食心理。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Daily_Life_Practice.md
  section: 'Zen in the Ten Directions: Applied Mindfulness (生活十向禅修表)'
- type: concept
  question: 劳作 (Working)的核心要点是什么？
  answer: '术语 (Term/Verse): **作务 (Samu)**；核心行为要点: 既然在工作，就全然是工作；不择地而修。；心理/存在主义价值: 打破“工作”与“生活”的二元割裂。；专业视角 (Expert Perspective):
    提升职场心流 (Flow) 的实战技术。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Daily_Life_Practice.md
  section: 'Zen in the Ten Directions: Applied Mindfulness (生活十向禅修表)'
- type: concept
  question: 睡眠 (Sleeping)的核心要点是什么？
  answer: '术语 (Term/Verse): **吉祥卧 (Lion Posture)**；核心行为要点: 狮子而卧；临终演习；醒梦一如。；心理/存在主义价值: 管理潜意识与梦境；培养警觉。；专业视角 (Expert Perspective):
    优化睡眠结构，降低夜间焦虑。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Daily_Life_Practice.md
  section: 'Zen in the Ten Directions: Applied Mindfulness (生活十向禅修表)'
- type: concept
  question: 典座的核心要点是什么？
  answer: '术语 (Original): Tenzo (Head Cook)；核心精神描述: 用心照顾每一粒米、每一根菜。；管理/职场启示: 极端责任感；细节决定成败。；专业视角 (Expert Perspective): 典座本身即是禅道，是后勤力量的觉悟。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Daily_Life_Practice.md
  section: 'Zen Kitchen: Tenzo Protocols (典座/厨房禅意表)'
- type: concept
  question: 三心的核心要点是什么？
  answer: '术语 (Original): Three Minds；核心精神描述: 喜心 (Joy)、老心 (Compassion)、大心 (Magnanimity)。；管理/职场启示: 为他人的幸福感到快乐；像母亲护子；博大胸怀。；专业视角
    (Expert Perspective): 团队领导力的完美心理画像。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Daily_Life_Practice.md
  section: 'Zen Kitchen: Tenzo Protocols (典座/厨房禅意表)'
- type: concept
  question: 平等的核心要点是什么？
  answer: '术语 (Original): Non-discrimination；核心精神描述: 不因食材贵贱而生捡择心。；管理/职场启示: 资源的完全动态平衡。；专业视角 (Expert Perspective): 在资源匮乏环境中依然能稳定产出。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Daily_Life_Practice.md
  section: 'Zen Kitchen: Tenzo Protocols (典座/厨房禅意表)'
- type: concept
  question: 晨起的核心要点是什么？
  answer: '偈颂 (Gatha): 睡眠始寤，当愿众生，一切智觉，周顾十方。；核心心理暗示: **开启觉知**。；专家建议用法: 睁眼第一时间默诵，防止被自动化思维抓走。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Daily_Life_Practice.md
  section: Zen Gathas for Daily Transitions (日用偈咒精选表)
- type: concept
  question: 刷牙的核心要点是什么？
  answer: '偈颂 (Gatha): 嚼杨枝时，当愿众生，其心调净，咀嚼烦恼。；核心心理暗示: **清理心理秽物**。；专家建议用法: 结合清洁动作进行压力清除。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Daily_Life_Practice.md
  section: Zen Gathas for Daily Transitions (日用偈咒精选表)
- type: concept
  question: 1. 寻牛的核心要点是什么？
  answer: '标题 (Title): Search for the Bull；状态描述 (Psychological State): 觉察到内在的缺失或不安；开始寻求真理。；修行要点: 建立正见；寻找导师。；专业视角 (Professional
    Perspective): 最初的危机或动力的产生；识别出“虚假的自我”。；引用来源 (Citation): *The Ten Bulls* (Kuoan Shiyuan).'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Enlightenment_Stages.md
  section: The Ten Bulls (十牛图 - 十个阶段详解表)
- type: concept
  question: 2. 见迹的核心要点是什么？
  answer: '标题 (Title): Seeing the Traces；状态描述 (Psychological State): 通过研读或初阶练习，看到觉悟的可能性迹象。；修行要点: 研读经典；观察思绪的模式。；专业视角 (Professional
    Perspective): 建立理论框架，将散乱的经验归纳为可分析的路径。；引用来源 (Citation): D.T. Suzuki, *Essays in Zen*.'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Enlightenment_Stages.md
  section: The Ten Bulls (十牛图 - 十个阶段详解表)
- type: concept
  question: 3. 见牛的核心要点是什么？
  answer: '标题 (Title): Seeing the Bull；状态描述 (Psychological State): 第一次真实地、直接地窥见自性的本质。；修行要点: 直接经验而非逻辑推理。；专业视角 (Professional
    Perspective): **见性 (Kensho)** 的发生；主客体界限首次松动。；引用来源 (Citation): *The gateless gate*.'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Enlightenment_Stages.md
  section: The Ten Bulls (十牛图 - 十个阶段详解表)
- type: concept
  question: 见性的核心要点是什么？
  answer: '英文/日文名: Kenshō；状态特征: 瞬间看到本性 (Seeing nature)。；持续性: 短暂体验，如闪电。；专业视角 (Professional Perspective): 认知的“高峰体验” (Peak Experience)，改变了对身份的定义。；引用来源
    (Citation): *Zen Training* (Katsuki Sekida).'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Enlightenment_Stages.md
  section: Degrees of Awakening (觉悟的深度与类型表)
- type: concept
  question: 大悟/悟的核心要点是什么？
  answer: '英文/日文名: Satori；状态特征: 彻底的破裂与重组。；持续性: 深刻且持久。；专业视角 (Professional Perspective): 全脑神经通路的全局重组；从“寻求”到“存在”的身份转换。；引用来源 (Citation):
    *Zen Mind, Beginner''s Mind*.'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Enlightenment_Stages.md
  section: Degrees of Awakening (觉悟的深度与类型表)
- type: concept
  question: 无上菩提的核心要点是什么？
  answer: '英文/日文名: Anuttara Samyak Sambodhi；状态特征: 圆满觉悟。；持续性: 永久。；专业视角 (Professional Perspective): 人类意识进化的理想极限。；引用来源 (Citation):
    *Diamond Sutra*.'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Enlightenment_Stages.md
  section: Degrees of Awakening (觉悟的深度与类型表)
- type: concept
  question: 寻牛-见迹的核心要点是什么？
  answer: '南传内观 (Vipassana): 戒学 (Sila)；现代心理学阶段 (Psychology): 认知重构 (CR) / 心理辅导；共同特征: 构建道德与规则。；专业视角 (Professional Perspective):
    任何深度转化的首要步骤是建立稳定的行为准则。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Enlightenment_Stages.md
  section: Cross-Tradition Map Comparison (跨传统觉悟地图对比表)
- type: concept
  question: 得牛-牧牛的核心要点是什么？
  answer: '南传内观 (Vipassana): 定学 (Samadhi)；现代心理学阶段 (Psychology): 专注力训练 (Attention Training)；共同特征: 强化执行控制。；专业视角 (Professional
    Perspective): 提升抗干扰能力是神经重塑的物理基础。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Enlightenment_Stages.md
  section: Cross-Tradition Map Comparison (跨传统觉悟地图对比表)
- type: concept
  question: 临济宗的核心要点是什么？
  answer: '创始人 (Founder): 临济义玄 (Rinzai)；核心传承逻辑: 继百丈、黄檗。；宗风特点 (Zen Style): **临济棒喝**：雷霆万钧，单刀直入。；施设手段 (Upaya): 临济四喝、临济四宾主、三玄三要。；专业视角
    (Expert Perspective): 强调极端的认知震荡，迫使意识停止逻辑运作。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Five_Houses_Lineage.md
  section: 'The Five Houses of Zen: Lineage & Style (五家宗风详表)'
- type: concept
  question: 曹洞宗的核心要点是什么？
  answer: '创始人 (Founder): 洞山良价 (Sōtō)；核心传承逻辑: 继药山、云岩。；宗风特点 (Zen Style): **默照绵密**：如水长流，稳健细致。；施设手段 (Upaya): 五位君臣、偏正五位、敲唱俱齐。；专业视角
    (Expert Perspective): 强调“修证一如”，即行住坐卧的当下即是实相。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Five_Houses_Lineage.md
  section: 'The Five Houses of Zen: Lineage & Style (五家宗风详表)'
- type: concept
  question: 沩仰宗的核心要点是什么？
  answer: '创始人 (Founder): 沩山灵祐 (Guiyang)；核心传承逻辑: 南岳下。；宗风特点 (Zen Style): **体用圆融**：父子一家，委曲婉转。；施设手段 (Upaya): 九十六种圆相（密语符号）。；专业视角
    (Expert Perspective): 宗风温厚，注重规矩仪轨与心性的微妙配合。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Five_Houses_Lineage.md
  section: 'The Five Houses of Zen: Lineage & Style (五家宗风详表)'
- type: concept
  question: 杨岐派** (临济)的核心要点是什么？
  answer: '核心人物 (Key Figure): 杨岐方会 (Yangqi)；分野点 (Point of Departure): 继石霜。；禅法特色 (Specialization): 宗风较宽，兼容并蓄。；历史影响: 后来演变为中国禅宗的主干。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Five_Houses_Lineage.md
  section: 'The "Seven Schools": Expansion & Variation (七宗变迁与分野)'
- type: concept
  question: 黄龙派** (临济)的核心要点是什么？
  answer: '核心人物 (Key Figure): 黄龙慧南 (Huanglong)；分野点 (Point of Departure): 继石霜。；禅法特色 (Specialization): **黄龙三关**：死结、生路、转身。；历史影响:
    对宋代文人修禅影响极大。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Five_Houses_Lineage.md
  section: 'The "Seven Schools": Expansion & Variation (七宗变迁与分野)'
- type: concept
  question: 正中偏的核心要点是什么？
  answer: '关系 (Relationship): 君视臣；哲学内涵 (Ontological Meanings): 体中起用；从绝对走向相对。；认知状态 (Cognitive State): 觉察到万物中的共性。；备注: 类似于“理随事变”。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Five_Houses_Lineage.md
  section: 'Strategic Interaction: The Five Ranks of Soto Zen (曹洞五位君臣图)'
- type: concept
  question: 偏中正的核心要点是什么？
  answer: '关系 (Relationship): 臣向君；哲学内涵 (Ontological Meanings): 舍用归体；从现象回归本质。；认知状态 (Cognitive State): 看到森罗万象中的空性。；备注: 专注于源头的静止力。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Five_Houses_Lineage.md
  section: 'Strategic Interaction: The Five Ranks of Soto Zen (曹洞五位君臣图)'
- type: concept
  question: 正中来的核心要点是什么？
  answer: '关系 (Relationship): 君为主；哲学内涵 (Ontological Meanings): 体用互见；不出位而自显。；认知状态 (Cognitive State): 非二元性的初步整合。；备注: 智慧在空性中自然涌现。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Five_Houses_Lineage.md
  section: 'Strategic Interaction: The Five Ranks of Soto Zen (曹洞五位君臣图)'
- type: concept
  question: 拈花微笑的核心要点是什么？
  answer: '术语 (Original): The Flower Sermon；场景描述 (Context): 灵山会上，梵天献花，佛陀拈花示众。；关键机锋 (Turning Point): 唯迦叶破颜微笑。；心理/认知解析: **非语言传递**：打破逻辑链条的直接心智同步。；专业视角
    (Expert Perspective): 表征禅宗“教外别传”的起源，强调直观体验胜于教理。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Koan_Anthropology.md
  section: 'Strategic Cognitive Dissonance: Classic Koans (经典公案深度辨析表)'
- type: concept
  question: 赵州无字的核心要点是什么？
  answer: '术语 (Original): Joshu''s Dog；场景描述 (Context): 学人问：狗子还有佛性也无？；关键机锋 (Turning Point): 赵州云：**“无！”**；心理/认知解析: **认知僵局**：彻底否定二元对立的判断（有或无）。；专业视角
    (Expert Perspective): 这是看话禅的核心，旨在累积“大疑”以促成“大悟”。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Koan_Anthropology.md
  section: 'Strategic Cognitive Dissonance: Classic Koans (经典公案深度辨析表)'
- type: concept
  question: 南泉斩猫的核心要点是什么？
  answer: '术语 (Original): Nansen Kills the Cat；场景描述 (Context): 东西两堂争猫，南泉提起云：道得即不斩。；关键机锋 (Turning Point): 众无对，南泉斩之。；心理/认知解析:
    **行为悖论**：强制打破对道德/形式的死板执著。；专业视角 (Expert Perspective): 测试修行者在突发暴力/极端情境下的不乱之心与本质洞察。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Koan_Anthropology.md
  section: 'Strategic Cognitive Dissonance: Classic Koans (经典公案深度辨析表)'
- type: concept
  question: 起疑的核心要点是什么？
  answer: '术语 (Term): Generating Doubt；状态描述: 对公案产生极大的不解与困惑。；神经机制猜想: 激活背侧注意力网络，监控严重冲突。；专家解析: 必须是真诚的困惑，而非智力游戏。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Koan_Anthropology.md
  section: Dialectics of the Koan Practice (看话禅操作逻辑表)
- type: concept
  question: 参究的核心要点是什么？
  answer: '术语 (Term): Investigation；状态描述: 全神贯注于该“疑情”，排除杂念。；神经机制猜想: 抑制默认模式网络 (DMN)，强化执行控制。；专家解析: 将整个生命力聚焦于一个点。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Koan_Anthropology.md
  section: Dialectics of the Koan Practice (看话禅操作逻辑表)
- type: concept
  question: 疑团的核心要点是什么？
  answer: '术语 (Term): The Ball of Doubt；状态描述: 疑情成团，心如死灰，完全失去逻辑抓手。；神经机制猜想: 大脑进入高熵状态，处于相变边缘。；专家解析: “如吞了热铁丸”，吐不出、咽不下。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Koan_Anthropology.md
  section: Dialectics of the Koan Practice (看话禅操作逻辑表)
- type: concept
  question: 直截了当的核心要点是什么？
  answer: '表现形式: 喝、打、推、拽。；心理意图: 跳过大脑，物理反馈。；备注: 速度极快。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Koan_Anthropology.md
  section: Taxonomy of Zen Responses (禅机反应分类表)
- type: concept
  question: 答非所问的核心要点是什么？
  answer: '表现形式: “麻三斤”、“干屎橛”。；心理意图: 解构“意义”本身。；备注: 打碎对神圣化的执著。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Koan_Anthropology.md
  section: Taxonomy of Zen Responses (禅机反应分类表)
- type: concept
  question: 典座的核心要点是什么？
  answer: '英文/日文名: Tenzo (Head Cook)；核心职责: 负责全寺膳食；将做饭视为修行。；象征意义: 在平凡生产中显现觉悟。；专业视角 (Professional Perspective): 对抗“厌恶琐碎”的心理；培养在服务中的专注。；引用来源
    (Citation): Dogen, *Tenzo Kyokun* (Instructions to the Cook).'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Monastic_Rituals.md
  section: Zen Monastic Roles & Responsibilities (禅门执事与职责表)
- type: concept
  question: 维那的核心要点是什么？
  answer: '英文/日文名: Ino (Rector)；核心职责: 维持禅堂秩序，领众唱诵。；象征意义: 整体节奏的协调者。；专业视角 (Professional Perspective): 训练社会同步性和群体动力的引导技巧。；引用来源
    (Citation): *Standard Monastic Rules*.'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Monastic_Rituals.md
  section: Zen Monastic Roles & Responsibilities (禅门执事与职责表)
- type: concept
  question: 直日的核心要点是什么？
  answer: '英文/日文名: Jiki-jitsu；核心职责: 监禅，负责响板和铃声计时。；象征意义: 严格的时间与纪律化身。；专业视角 (Professional Perspective): 训练极高的时间觉察和执行力。；引用来源 (Citation):
    -'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Monastic_Rituals.md
  section: Zen Monastic Roles & Responsibilities (禅门执事与职责表)
- type: concept
  question: 无分别心的核心要点是什么？
  answer: '实践描述 (Practice): 不论是打扫茅厕还是抄经，皆一视同仁。；心理目标: 消除任务歧视 (Selective Attention Bias)。；专业视角 (Professional Perspective): 减少因任务性质产生的厌恶或执着，建立一致性的心理流。；引用来源
    (Citation): *The Platform Sutra*.'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Monastic_Rituals.md
  section: 'Samu: Work as Meditation (作务：工作中禅修表)'
- type: concept
  question: 当下一念的核心要点是什么？
  answer: '实践描述 (Practice): 锄地时只有锄地，心不外游。；心理目标: 减少多任务干扰下的焦虑。；专业视角 (Professional Perspective): 解决“认知分心”，培养任务特定的深度专注能力。；引用来源
    (Citation): *Zen and the Art of...*.'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Monastic_Rituals.md
  section: 'Samu: Work as Meditation (作务：工作中禅修表)'
- type: concept
  question: 报恩意识的核心要点是什么？
  answer: '实践描述 (Practice): 将工作视为对世界的回馈。；心理目标: 建立自我效能感与归属感。；专业视角 (Professional Perspective): 生态心理学视角下，个体通过奉献与系统重新建立连接。；引用来源
    (Citation): *Mindfully Working*.'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Monastic_Rituals.md
  section: 'Samu: Work as Meditation (作务：工作中禅修表)'
- type: concept
  question: 铺钵的核心要点是什么？
  answer: '技术与意向 (Intention): 布置餐具；如法如律。；心理效益: 建立秩序感，安抚神经。；专业视角 (Professional Perspective): 一种强力的正念启动程序 (Priming)，减少冲动饮食。；引用来源
    (Citation): *Zen Ritual*.'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Monastic_Rituals.md
  section: 'Oryoki: Ritual of Formal Eating (应量器：正式用斋规制表)'
- type: concept
  question: 五观想的核心要点是什么？
  answer: '技术与意向 (Intention): 进餐前的五条思考（反思来源、勤苦、自省等）。；心理效益: 培养感恩心和“食为良药”观。；专业视角 (Professional Perspective): 重新审视食物作为燃料和社会联结的功能，抑制享乐主义贪求。；引用来源
    (Citation): *Aitken, Taking the Path of Zen*.'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Monastic_Rituals.md
  section: 'Oryoki: Ritual of Formal Eating (应量器：正式用斋规制表)'
- type: concept
  question: 默认模式网络 (DMN)的核心要点是什么？
  answer: '功能描述 (Function): 自传体记忆、白日梦、自我中心思考。；禅修干扰效应 (Zen Impact): **显著抑制**。；对应的禅法状态: 只管打坐 (Kensho 入口)；专业视角 (Expert Perspective):
    减少“我执”相关的散乱思维，是心理健康的关键。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Neuroscience_Psychology.md
  section: Neuro-biological Architecture of Zen (禅修的神经生物学地图)
- type: concept
  question: 前扣带回 (ACC)的核心要点是什么？
  answer: '功能描述 (Function): 执行控制、冲突监控。；禅修干扰效应 (Zen Impact): **灰质密度增加**。；对应的禅法状态: 参话头 (疑情累积)；专业视角 (Expert Perspective): 强化了对冲突信息的处理能力，表现为更高的心理灵活性。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Neuroscience_Psychology.md
  section: Neuro-biological Architecture of Zen (禅修的神经生物学地图)
- type: concept
  question: 杏仁核 (Amygdala)的核心要点是什么？
  answer: '功能描述 (Function): 恐惧反应、情绪警报。；禅修干扰效应 (Zen Impact): **反应性降低**。；对应的禅法状态: 觉察/不反应；专业视角 (Expert Perspective): 面对压力不再产生过度的物理性瘫痪或冲动。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Neuroscience_Psychology.md
  section: Neuro-biological Architecture of Zen (禅修的神经生物学地图)
- type: concept
  question: ACT (接纳承诺疗法)的核心要点是什么？
  answer: '禅学对应概念: 不执著、随缘。；整合逻辑 (Logic): 强调心理灵活性 (Flexibility)，不纠缠于负面思维。；针对性症状: 焦虑、抑郁、强迫思维。；备注: 禅宗是其“接纳”维度的理论源泉。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Neuroscience_Psychology.md
  section: 'Zen & Clinical Psychology: Integration Model (禅宗与临床心理学整合表)'
- type: concept
  question: DBT (辩证行为疗法)的核心要点是什么？
  answer: '禅学对应概念: 中道、正念。；整合逻辑 (Logic): 在“接纳”与“改变”之间寻找平衡。；针对性症状: 边缘性人格、自伤行为。；备注: 创始人 Marsha Linehan 也是资深禅修者。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Neuroscience_Psychology.md
  section: 'Zen & Clinical Psychology: Integration Model (禅宗与临床心理学整合表)'
- type: concept
  question: MBCT (正念认知疗法)的核心要点是什么？
  answer: '禅学对应概念: 观呼吸、去中心化。；整合逻辑 (Logic): 建立“我不等于我的念头”的认知。；针对性症状: 反复性抑郁、反刍思考 (Rumination)。；备注: 现代压力管理的黄金标准。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Neuroscience_Psychology.md
  section: 'Zen & Clinical Psychology: Integration Model (禅宗与临床心理学整合表)'
- type: concept
  question: 多巴胺 (Dopamine)的核心要点是什么？
  answer: '变化趋势: 稳态化。；心理表现: 减少对刺激的成瘾性渴求。；长期获益: 获得一种“深层满足感”而非瞬时快感。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Neuroscience_Psychology.md
  section: Neurochemistry of Zen States (禅修态的神经化学表)
- type: concept
  question: 血清素 (Serotonin)的核心要点是什么？
  answer: '变化趋势: 提升。；心理表现: 情绪稳定，感到安全。；长期获益: 建立更强大的精神防御韧性。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Neuroscience_Psychology.md
  section: Neurochemistry of Zen States (禅修态的神经化学表)
- type: concept
  question: 盘腿坐姿的核心要点是什么？
  answer: '英文/梵文/日文名: Kekka-fuza (Full Lotus) / Śāsana；具体参数与步骤: 1. 坐垫抬高臀部；2. 右足置左腿，左足置右腿；3. 脊柱中值对齐。；心理效应: 极高的物理稳定性；诱导警觉放松。；专业视角
    (Professional Perspective): 最有利于维持长时间静止的骨骼力学结构；限制肢体动作以减少神经输入。；引用来源 (Citation): Deshimaru, T. (1985). *The Heart of Zen*.'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Practice_Methodology.md
  section: Zazen Technical Foundation (坐禅技术基础表)
- type: concept
  question: 法界定印的核心要点是什么？
  answer: '英文/梵文/日文名: Hokkai-join / Dharmadhātu Mudrā；具体参数与步骤: 1. 左手置于右手上；2. 拇指尖轻触形成椭圆；3. 置于肚脐下方。；心理效应: 建立中央能量环路；反馈紧张度（拇指塌陷说明昏沉）。；专业视角
    (Professional Perspective): 通过精细运动反馈机制，协助前额叶监控唤醒水平。；引用来源 (Citation): *Dogen''s Fukanzazengi*.'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Practice_Methodology.md
  section: Zazen Technical Foundation (坐禅技术基础表)
- type: concept
  question: 数息观的核心要点是什么？
  answer: '英文/梵文/日文名: Susokukan / Śvāsānusmṛti；具体参数与步骤: 1. 默数呼气；2. 从一数到十；3. 分心即重头开始。；心理效应: 开发初始定力 (Samadhi)；稳定思绪。；专业视角 (Professional
    Perspective): 占用语音回路和中央执行功能，有效抑制默认模式网络 (DMN) 的散乱。；引用来源 (Citation): Hakuin Zenji, *The Embossed Tea Kettle*.'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Practice_Methodology.md
  section: Zazen Technical Foundation (坐禅技术基础表)
- type: concept
  question: 只管打坐的核心要点是什么？
  answer: '流派背景: 曹洞宗 (Soto)；核心指令: **Shikantaza**: 毫不费力地坐着，不求开悟，不关注特定对象。；难点与对策: **难点**: 极易陷入无聊或隐蔽的昏沉。**对策**: 保持脊柱绝对挺拔和警觉感。；专业视角
    (Professional Perspective): 强调“修证一如”，即坐禅本身就是佛性的显现，而非通往佛性的手段。；引用来源 (Citation): Dogen Zenji, *Bendowa*.'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Practice_Methodology.md
  section: Specialized Zen Techniques (特定禅宗流派技术表)
- type: concept
  question: 看话禅 (公案)的核心要点是什么？
  answer: '流派背景: 临济宗 (Rinzai)；核心指令: **Koan / Hua Tou**: 专注于一个逻辑无法解决的问题（如“无？”）。；难点与对策: **难点**: 试图用大脑逻辑分析。**对策**: 累积“疑情”，直到底层意识突围。；专业视角
    (Professional Perspective): 通过人为制造严重的认知失调，强迫大脑跳出常规回路。；引用来源 (Citation): Hakuin Zenji, *Wild Ivy*.'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Practice_Methodology.md
  section: Specialized Zen Techniques (特定禅宗流派技术表)
- type: concept
  question: 默照禅的核心要点是什么？
  answer: '流派背景: 宏智正觉 (Hongzhi)；核心指令: **Silent Illumination**: 宁静地观照，如同明镜照物。；难点与对策: **难点**: 缺乏动力的寂静。**对策**: 强调内心的“照”字，即高度敏锐。；专业视角
    (Professional Perspective): 是一种开放监控冥想 (Open Monitoring)，旨在培养全息觉察。；引用来源 (Citation): Sheng Yen, *The Method of No-Method*.'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Practice_Methodology.md
  section: Specialized Zen Techniques (特定禅宗流派技术表)
- type: concept
  question: 经行 (慢速)的核心要点是什么？
  answer: '英文/日文名: Kinhin (Slow)；技术要点: 1. 双手叠于胸前 (Isshu)；2. 配合半次呼吸走半步；3. 极度缓慢平稳。；疗愈与整合益处: 在动态中维持禅定；改善下肢循环。；专业视角 (Professional
    Perspective): 注意力平衡理论的应用，将专注力从静坐过渡到日常动作。；引用来源 (Citation): *Soto Zen Liturgy*.'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Practice_Methodology.md
  section: Kinhin & Somatic Zen (经行与动态禅修表)
- type: concept
  question: 经行 (快速)的核心要点是什么？
  answer: '英文/日文名: Kinhin (Fast)；技术要点: 1. 临济特色；2. 小跑或快速行走；3. 全神贯注于步伐。；疗愈与整合益处: 快速打破长坐造成的瘀滞；训练在剧烈活动中的不乱感。；专业视角 (Professional
    Perspective): 激活交感神经系统的同时维持内心的副交感主导状态。；引用来源 (Citation): *The Rinzai Zen Tradition*.'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Practice_Methodology.md
  section: Kinhin & Somatic Zen (经行与动态禅修表)
- type: concept
  question: 自我观 (Self)的核心要点是什么？
  answer: '《金刚经》 (Vajracchedikā): **无我相**。去除四相（我、人、众生、寿者）。；《心经》 (Hṛdaya): **五蕴皆空**。观照五种建构过程的空性。；《六祖坛经》 (Platform Sutra): **不思善不思恶**。回归直下的本来面目。；《楞严经》
    (Śūraṅgama): **常住真心**。区分客尘烦恼与不灭的本体。；现代心理学对标: 解构自传体记忆与固化的身份认同。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Sutras_In_Depth.md
  section: 'Comparative Thematic Matrix: Core Sutras (根本经典对比矩阵)'
- type: concept
  question: 认知工具的核心要点是什么？
  answer: '《金刚经》 (Vajracchedikā): **不住**。心不落于任何特定对象。；《心经》 (Hṛdaya): **照见**。深度元认知的穿透力。；《六祖坛经》 (Platform Sutra): **一行三昧**。于一切处，行住坐卧，常行一直心。；《楞严经》
    (Śūraṅgama): **反闻闻自性**。将感知力回转、溯源。；现代心理学对标: 提升认知灵活性 (Flexibility) 与解离能力。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Sutras_In_Depth.md
  section: 'Comparative Thematic Matrix: Core Sutras (根本经典对比矩阵)'
- type: concept
  question: 现实本质的核心要点是什么？
  answer: '《金刚经》 (Vajracchedikā): **如幻泡影**。看到现象的瞬时与不实。；《心经》 (Hṛdaya): **色即是空**。形式与空性的无二互即。；《六祖坛经》 (Platform Sutra): **万法在自性**。世界是心性的投影。；《楞严经》
    (Śūraṅgama): **根尘同源**。主体与客体的终和整合。；现代心理学对标: 打破感官实在论，理解主观构建性。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Sutras_In_Depth.md
  section: 'Comparative Thematic Matrix: Core Sutras (根本经典对比矩阵)'
- type: concept
  question: 色 (Form)的核心要点是什么？
  answer: '构成要素 (Components): 身体、五根、外界物质。；错觉形式 (Illusion): 认为肉体是坚固、永恒、独立的。；空观洞察 (Insight): 身体是细胞、原子与能量的瞬时聚集。；疗愈价值: 缓解死亡焦虑；接纳身体的老病死。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Sutras_In_Depth.md
  section: 'Dialectics of the Heart Sutra: The Process (《心经》五蕴空观图)'
- type: concept
  question: 受 (Feeling)的核心要点是什么？
  answer: '构成要素 (Components): 苦、乐、忧、喜、舍。；错觉形式 (Illusion): 认为情绪是“我”的感官。；空观洞察 (Insight): 情绪仅是生理对刺激的自动反馈信号。；疗愈价值: 提升情绪调节能力；减少情绪化的冲动行为。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Sutras_In_Depth.md
  section: 'Dialectics of the Heart Sutra: The Process (《心经》五蕴空观图)'
- type: concept
  question: 想 (Perception)的核心要点是什么？
  answer: '构成要素 (Components): 概念化、辨别、标签。；错觉形式 (Illusion): 认为标签即是事实。；空观洞察 (Insight): 标签是心智为了简化世界而发明的速记。；疗愈价值: 减少偏见；建立更客观的认知地图。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Sutras_In_Depth.md
  section: 'Dialectics of the Heart Sutra: The Process (《心经》五蕴空观图)'
- type: concept
  question: 破相的核心要点是什么？
  answer: '核心名句 (Original): “凡所有相，皆是虚妄。”；现代解析: 不要被表象、名声、暂时的得失所困。；职场应用: 建立长远的战略定力。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Sutras_In_Depth.md
  section: Diamond Sutra Management Principles (金刚经管理智慧表)
- type: concept
  question: 不住的核心要点是什么？
  answer: '核心名句 (Original): “应无所住而生其心。”；现代解析: 在每一个当下全然投入，但不执著于产出。；职场应用: 激发最高的创造力与敏捷度。'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Sutras_In_Depth.md
  section: Diamond Sutra Management Principles (金刚经管理智慧表)
- type: concept
  question: 释迦牟尼佛的核心要点是什么？
  answer: '英文/梵文/日文名: Siddhartha Gautama / Śākyamuni；核心贡献与地位: 禅宗初祖（西天初祖）。；关键教法: 拈花微笑 (The Flower Sermon)；以心传心。；专业视角 (Professional
    Perspective): 禅宗作为“教外别传”，其起源强调直指心源而非文字教条。；引用来源 (Citation): *The Denkoroku* (Transmission of Light).'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Wisdom_Lineage.md
  section: Zen Historical Lineage (禅宗历史传承脉络表)
- type: concept
  question: 大迦叶尊者的核心要点是什么？
  answer: '英文/梵文/日文名: Mahākāśyapa；核心贡献与地位: 西天初祖。；关键教法: 密付心印。；专业视角 (Professional Perspective): 代表了禅宗第一代心法的传承，确立了不立文字的传统。；引用来源
    (Citation): *Wumenguan* (The Gateless Barrier).'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Wisdom_Lineage.md
  section: Zen Historical Lineage (禅宗历史传承脉络表)
- type: concept
  question: 菩提达摩的核心要点是什么？
  answer: '英文/梵文/日文名: Bodhidharma；核心贡献与地位: 中国禅宗初祖（东土初祖）。；关键教法: 二入四行；壁观；面壁九年。；专业视角 (Professional Perspective): 达摩将印度大乘瑜伽行派与如来藏思想带入中国，开启了汉传禅宗。；引用来源
    (Citation): *The Zen Teaching of Bodhidharma*.'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Wisdom_Lineage.md
  section: Zen Historical Lineage (禅宗历史传承脉络表)
- type: concept
  question: 空性的核心要点是什么？
  answer: '英文/梵文 (English/Sanskrit): Emptiness (Śūnyatā)；核心定义 (Key Definition): 诸法因缘生，无固定不变的本质。；心理/存在主义应用: 打破对自我和事物的偏执；缓解依恋焦虑。；专业视角
    (Professional Perspective): 并非虚无主义，而是强调事物间的流动性与相互依存。；引用来源 (Citation): *The Heart Sutra* (Prajñāpāramitā Hṛdaya).'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Wisdom_Lineage.md
  section: Core Zen Philosophical Frameworks (禅宗核心哲学框架)
- type: concept
  question: 如来藏的核心要点是什么？
  answer: '英文/梵文 (English/Sanskrit): Buddha-nature (Tathāgatagarbha)；核心定义 (Key Definition): 众生皆具觉悟的潜能；佛性本自具足。；心理/存在主义应用: 建立内在自尊；消除本质上的匮乏感。；专业视角
    (Professional Perspective): 强调开悟不是获得某种新东西，而是剥离遮蔽本性的尘埃。；引用来源 (Citation): *The Lankavatara Sutra*.'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Wisdom_Lineage.md
  section: Core Zen Philosophical Frameworks (禅宗核心哲学框架)
- type: concept
  question: 般若智慧的核心要点是什么？
  answer: '英文/梵文 (English/Sanskrit): Wisdom (Prajñā)；核心定义 (Key Definition): 超越逻辑思维的直觉性洞察。；心理/存在主义应用: 突破线性思维瓶颈；获得大局观。；专业视角
    (Professional Perspective): 区别于知识 (Vijnana)，般若是对实相的无中介体验。；引用来源 (Citation): *Diamond Sutra* (Vajracchedikā Prajñāpāramitā).'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Wisdom_Lineage.md
  section: Core Zen Philosophical Frameworks (禅宗核心哲学框架)
- type: concept
  question: 《正法眼藏》的核心要点是什么？
  answer: '主要内容/主旨: 道元禅师的巨著，阐述坐禅哲学。；关键金句: “学习佛法即是学习自我；学习自我即是忘记自我。”；职场/现代价值: 深度自我审视。；专业视角 (Professional Perspective): 日本曹洞宗最深奥的哲学文库。；引用来源
    (Citation): Dogen, *Shobogenzo*.'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Wisdom_Lineage.md
  section: Fundamental Zen Texts (禅宗根本文献/经典表)
- type: concept
  question: 《无门关》的核心要点是什么？
  answer: '主要内容/主旨: 48个禅宗公案集。；关键金句: “大道无门，千差有路。”；职场/现代价值: 培养突破性思维；应对悖论。；专业视角 (Professional Perspective): 临济宗看话禅的经典教材，充满认知挑战。；引用来源
    (Citation): Wumen Huikai, *Wumenguan*.'
  source: 01-Wisdom-Traditions/religions/zen/Zen_Wisdom_Lineage.md
  section: Fundamental Zen Texts (禅宗根本文献/经典表)
