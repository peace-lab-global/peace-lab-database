  answer: 将马基雅维利与伊拉斯谟并置阅读，能够揭示文艺复兴思想的核心张力：
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/early-modern/renaissance/Multi_Perspective_Reviews.md
  section: 三、两位思想家的对话
- type: concept
  question: 人性观的核心要点是什么？
  answer: '马基雅维利: 人性自私、善变；伊拉斯谟: 人性可被教育与改善'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/early-modern/renaissance/Multi_Perspective_Reviews.md
  section: 三、两位思想家的对话
- type: concept
  question: 认识的主体的核心要点是什么？
  answer: '康德: 先验统觉（transcendental apperception）；佛教（唯识/中观）: 末那识（manas-vijñāna）执持"我"；学术对话价值: 极高——两者都在分析"统一的自我意识"如何可能'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/enlightenment/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 认识的结构的核心要点是什么？
  answer: '康德: 12范畴（因果、实体等）先天赋予经验；佛教（唯识/中观）: 遍计所执性（parikalpita）将概念投射于经验；学术对话价值: 极高——都在讨论"概念化"的认识论功能'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/enlightenment/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 认识的局限的核心要点是什么？
  answer: '康德: 理性不能超越经验界；佛教（唯识/中观）: 分别心（vikalpa）不能触及实相；学术对话价值: 高——但佛教允许"非概念化"的现量认知'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/enlightenment/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 经验主义的核心要点是什么？
  answer: '原文: **Empiricism**；解释: 所有知识来源于感官经验，反对天赋观念论。；影响: 确立了现代经验主义认识论的基础。'
