- type: concept
  question: 心法的核心要点是什么？
  answer: '梵语: *Citta*；英文: Mind；数量: 8；比喻: 公司老板；核心要点: 八识心王，能了别、能认知的主体'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Yogacara_Hundred_Dharmas.md
  section: 表1.1 五位百法分类总表 (Five Categories Summary)
- type: concept
  question: 心所法的核心要点是什么？
  answer: '梵语: *Caitasika*；英文: Mental Factors；数量: 51；比喻: 员工团队；核心要点: 跟老板配合干活的心理因素'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Yogacara_Hundred_Dharmas.md
  section: 表1.1 五位百法分类总表 (Five Categories Summary)
- type: concept
  question: 色法的核心要点是什么？
  answer: '梵语: *Rūpa*；英文: Form；数量: 11；比喻: 办公场地和设备；核心要点: 物质现象，身体和外在世界'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Yogacara_Hundred_Dharmas.md
  section: 表1.1 五位百法分类总表 (Five Categories Summary)
- type: concept
  question: 心法第一的核心要点是什么？
  answer: '依据: 识为主导；道理: 你看到一朵花，是你的"看"先启动；生活中的例子: 做梦时没有真花，但你照样"看到"'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Yogacara_Hundred_Dharmas.md
  section: 表1.2 为什么排这个顺序？(Why This Order?)
- type: concept
  question: 心所法第二的核心要点是什么？
  answer: '依据: 不离心王；道理: 老板到哪，员工跟到哪；生活中的例子: 你一动心，喜怒哀乐就跟上来'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Yogacara_Hundred_Dharmas.md
  section: 表1.2 为什么排这个顺序？(Why This Order?)
- type: concept
  question: 色法第三的核心要点是什么？
  answer: '依据: 依识变现；道理: 办公室是给人用的；生活中的例子: 身体和世界是心识的"投影"'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Yogacara_Hundred_Dharmas.md
  section: 表1.2 为什么排这个顺序？(Why This Order?)
- type: concept
  question: 世界的本质的核心要点是什么？
  answer: '唯识学(Yogācāra): 一切是心识的变现；中观学(Mādhyamaka): 一切无自性、缘起性空；白话翻译: 唯识："都是你心里想出来的"；中观："什么都不是固定的"'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Yogacara_Madhyamaka_Dialogue.md
  section: 表1.1 核心主张对照 (Core Claims)
- type: concept
  question: 心识的地位的核心要点是什么？
  answer: '唯识学(Yogācāra): 心识是真实的(依他起性)；中观学(Mādhyamaka): 心识也是空的；白话翻译: 唯识："心是真的"；中观："连心也是空的"'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Yogacara_Madhyamaka_Dialogue.md
  section: 表1.1 核心主张对照 (Core Claims)
- type: concept
  question: 外境存在吗的核心要点是什么？
  answer: '唯识学(Yogācāra): 没有外境，只有识；中观学(Mādhyamaka): 外境和内心都空；白话翻译: 唯识："外面没东西"；中观："外面和里面都没有固定的东西"'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Yogacara_Madhyamaka_Dialogue.md
  section: 表1.1 核心主张对照 (Core Claims)
- type: concept
  question: 建设还是拆除的核心要点是什么？
  answer: '唯识学: 建设——搭建八识体系；中观学: 拆除——破一切自性见；各自的好处: 唯识给你地图，中观让你不迷路'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Yogacara_Madhyamaka_Dialogue.md
  section: 表1.2 方法论对比 (Methodological Comparison)
- type: concept
  question: 正面还是反面的核心要点是什么？
  answer: '唯识学: 正面告诉你"是什么"；中观学: 反面告诉你"不是什么"；各自的好处: 唯识像写教材，中观像做考卷'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Yogacara_Madhyamaka_Dialogue.md
  section: 表1.2 方法论对比 (Methodological Comparison)
- type: concept
  question: 分析方向的核心要点是什么？
  answer: '唯识学: 由外向内——从现象到心识；中观学: 由内向外——从执着到解脱；各自的好处: 唯识从底层看，中观从顶层看'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Yogacara_Madhyamaka_Dialogue.md
  section: 表1.2 方法论对比 (Methodological Comparison)
- type: concept
  question: 有没有自证分的核心要点是什么？
  answer: '唯识这边说: 有。你看花的时候，你知道自己在看——这个"知道"就是自证分；中观这边说: 没有。灯能照亮别的东西，但灯不需要照亮自己；争论的实质: 认知需不需要一个"自我确认"的功能；谁赢了？: 各说各理，至今没定论'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Yogacara_Madhyamaka_Dialogue.md
  section: 表2.1 主要争论焦点 (Key Debate Topics)
- type: concept
  question: 阿赖耶识存不存在的核心要点是什么？
  answer: '唯识这边说: 必须有。不然轮回、因果、记忆怎么解释？；中观这边说: 不需要。用"假名相续"就够了；争论的实质: 需不需要一个"终极存储器"；谁赢了？: 唯识体系离不开，中观用不着'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Yogacara_Madhyamaka_Dialogue.md
  section: 表2.1 主要争论焦点 (Key Debate Topics)
- type: concept
  question: 大圆满的核心要点是什么？
  answer: '英文名 (English): Great Perfection / Dzogchen；藏语 (Tibetan): *རྫོགས་ཆེན* (rDzogs-chen)；梵语 (Sanskrit): *Mahāsandhi*
    / *Atiyoga*；精确定义: 认出心之本性——本初清净与任运圆满——的最高教法；疗愈意义: 最彻底的心理解脱；专业视角: 九乘之巅，超越因果修行'
  source: 01-Wisdom-Traditions/religions/buddhism/dzogchen/Dzogchen_Great_Perfection.md
  section: 表1.1 大圆满核心术语 (Dzogchen Core Terms)
- type: concept
  question: 本觉/明觉的核心要点是什么？
  answer: '英文名 (English): Awareness / Rigpa；藏语 (Tibetan): *རིག་པ* (Rig-pa)；梵语 (Sanskrit): *Vidyā* (विद्या)；精确定义: 本然的、未被概念染污的纯粹觉知；疗愈意义:
    内在健康的终极源泉；专业视角: 大圆满的核心——认出Rigpa'
  source: 01-Wisdom-Traditions/religions/buddhism/dzogchen/Dzogchen_Great_Perfection.md
  section: 表1.1 大圆满核心术语 (Dzogchen Core Terms)
- type: concept
  question: 无明心的核心要点是什么？
  answer: '英文名 (English): Unawareness / Ma-rigpa；藏语 (Tibetan): *མ་རིག་པ* (Ma-rig-pa)；梵语 (Sanskrit): *Avidyā* (अविद्या)；精确定义:
    不认识本觉，迷失于二元概念的状态；疗愈意义: 一切痛苦的根源；专业视角: 与Rigpa是同一心的两面'
  source: 01-Wisdom-Traditions/religions/buddhism/dzogchen/Dzogchen_Great_Perfection.md
  section: 表1.1 大圆满核心术语 (Dzogchen Core Terms)
- type: concept
  question: 基/根基的核心要点是什么？
  answer: '藏语: *གཞི* (gZhi)；英文: Ground；定义: 众生本具的佛性，本初清净与任运圆满的统一；心理学对应: 内在健康、真我；专业视角: 基是修行的前提，不是创造的'
  source: 01-Wisdom-Traditions/religions/buddhism/dzogchen/Dzogchen_Great_Perfection.md
  section: 表1.2 基道果三位 (Ground, Path, Fruit)
- type: concept
  question: 道/道路的核心要点是什么？
  answer: '藏语: *ལམ* (Lam)；英文: Path；定义: 认出本觉并安住于其中的修行；心理学对应: 觉察与转化过程；专业视角: 道不是渐次修行，而是认出'
  source: 01-Wisdom-Traditions/religions/buddhism/dzogchen/Dzogchen_Great_Perfection.md
  section: 表1.2 基道果三位 (Ground, Path, Fruit)
- type: concept
  question: 果/果位的核心要点是什么？
  answer: '藏语: *འབྲས་བུ* (''Bras-bu)；英文: Fruit；定义: 圆满觉悟，三身任运；心理学对应: 完全心理健康、自我实现；专业视角: 果即是基的显露'
  source: 01-Wisdom-Traditions/religions/buddhism/dzogchen/Dzogchen_Great_Perfection.md
  section: 表1.2 基道果三位 (Ground, Path, Fruit)
- type: concept
  question: 法身传承的核心要点是什么？
  answer: '时期: 无始；核心人物: 普贤王如来；藏语名: *ཀུན་ཏུ་བཟང་པོ* (Kun-tu bzang-po)；主要贡献: 原始觉性的象征，大圆满的法身源头；专业视角: 超越历史的象征性根源'
  source: 01-Wisdom-Traditions/religions/buddhism/dzogchen/Dzogchen_Great_Perfection.md
  section: 表2.1 大圆满传承世系 (Dzogchen Lineage)
- type: concept
  question: 报身传承的核心要点是什么？
  answer: '时期: —；核心人物: 金刚萨埵；藏语名: *རྡོ་རྗེ་སེམས་དཔའ* (rDo-rje sems-dpa'')；主要贡献: 报身佛，传授大圆满于持明者；专业视角: 连接法身与化身'
  source: 01-Wisdom-Traditions/religions/buddhism/dzogchen/Dzogchen_Great_Perfection.md
