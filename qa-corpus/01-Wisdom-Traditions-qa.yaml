  source: 01-Wisdom-Traditions/philosophy/western-philosophy/early-modern/rationalism/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 我思故我在的核心要点是什么？
  answer: '原文: **Cogito, ergo sum**；解释: 通过怀疑一切，发现唯一不可怀疑的是正在怀疑的自己。；影响: 确立了主体性的核心地位，成为现代哲学的起点。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/early-modern/rationalism/Descartes.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 方法论怀疑的核心要点是什么？
  answer: '原文: **Methodological doubt**；解释: 系统性地怀疑所有信念，直到找到不可怀疑的基础。；影响: 开创了现代哲学的批判方法，影响了后来的认识论。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/early-modern/rationalism/Descartes.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 二元论的核心要点是什么？
  answer: '原文: **Substance dualism**；解释: 世界由物质实体（res extensa）和精神实体（res cogitans）组成。；影响: 建立了心物二元论的框架，影响了后来的哲学和科学。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/early-modern/rationalism/Descartes.md
  section: 核心思想 (Core Ideas)
