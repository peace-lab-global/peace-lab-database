  question: 什么是1. 三量——你是怎么知道的？ (Three Means of Knowledge)？
  answer: 唯识学把人类获取知识的方式分为三种，就像你获取信息有三个渠道。
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Yogacara_Epistemology.md
  section: 1. 三量——你是怎么知道的？ (Three Means of Knowledge)
- type: concept
  question: 现量的核心要点是什么？
  answer: '梵语: *Pratyakṣa*；白话解释: 直接感知，没有概念加工；生活例子: 舌头碰到辣椒的那一瞬间——就是"辣"，还没来得及想"这是辣椒"；可靠程度: 最可靠；对应认知类型: 感性直觉'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Yogacara_Epistemology.md
  section: 表1.1 三量详解 (Three Pramāṇas)
- type: concept
  question: 比量的核心要点是什么？
  answer: '梵语: *Anumāna*；白话解释: 通过推理得出结论；生活例子: 看到远处有烟，推断那边有火；可靠程度: 基本可靠(前提对的话)；对应认知类型: 理性推理'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Yogacara_Epistemology.md
  section: 表1.1 三量详解 (Three Pramāṇas)
- type: concept
  question: 非量的核心要点是什么？
  answer: '梵语: *Abhāsa-pramāṇa*；白话解释: 搞错了的认知；生活例子: 远远看到一根绳子以为是蛇；可靠程度: 不可靠；对应认知类型: 错误认知'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Yogacara_Epistemology.md
  section: 表1.1 三量详解 (Three Pramāṇas)
- type: concept
  question: 五俱意识现量的核心要点是什么？
  answer: '梵语: *Indriya-pratyakṣa*；白话解释: 五官直接感知；具体怎么回事: 眼睛看到颜色、耳朵听到声音——在还没开始"想"之前；谁具备: 凡夫'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Yogacara_Epistemology.md
  section: 表1.2 现量的四种类型 (Four Types of Direct Perception)
- type: concept
  question: 意识现量的核心要点是什么？
  answer: '梵语: *Mānasa-pratyakṣa*；白话解释: 意识的直接觉知；具体怎么回事: 突然灵光一现、直觉判断——不是推理出来的；谁具备: 凡夫及圣者'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Yogacara_Epistemology.md
  section: 表1.2 现量的四种类型 (Four Types of Direct Perception)
- type: concept
  question: 自证现量的核心要点是什么？
  answer: '梵语: *Svasaṃvedana-pratyakṣa*；白话解释: 自己知道自己在认知；具体怎么回事: 你知道你在看花，同时也知道"我知道我在看"；谁具备: 一切有情'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Yogacara_Epistemology.md
  section: 表1.2 现量的四种类型 (Four Types of Direct Perception)
- type: concept
  question: 离分别的核心要点是什么？
  answer: '梵语: *Kalpanā-apoḍha*；白话解释: 没有概念参与；反面例子: 如果你看到花想到"这是玫瑰"，那已经不是纯粹现量了'
  source: 01-Wisdom-Traditions/religions/buddhism/core-philosophy/Buddhism_Yogacara_Epistemology.md
