- type: concept
  question: 文本批判的核心要点是什么？
  answer: '原文: **Textual Criticism**；解释: 通过严格的文本考证恢复古代文献的原始面貌。；影响: 为现代圣经研究和古典学奠定了方法论基础。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/early-modern/renaissance/Erasmus.md
