  question: 性恶论的核心要点是什么？
  answer: '原文: **Theory of Innate Evil**；解释: 认为人天生具有恶的本性，需要通过教育和礼法来改造。；影响: 提出了与孟子相对的人性论观点，丰富了儒家思想的理论维度。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/confucianism/Xunzi.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 礼法并重的核心要点是什么？
  answer: '原文: **Ritual and Law Combined**；解释: 强调礼制和法制相结合，以维护社会秩序。；影响: 为儒家政治哲学提供了更加现实的操作方案。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/confucianism/Xunzi.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 化性起伪的核心要点是什么？
  answer: '原文: **Transforming Nature Through Artifice**；解释: 通过人为的努力改变人的本性，培养道德品格。；影响: 系统阐述了儒家教育和修养理论。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/confucianism/Xunzi.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《荀子》(Xunzi)的核心要点是什么？
