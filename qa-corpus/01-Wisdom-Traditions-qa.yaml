  question: 气** (Qi)的核心要点是什么？
  answer: '英文名: Vital Breath；物质基础/关联: 呼吸系统；组织氧合与电磁场。；心理/精神功能: 情感的承载者；日常活力的流转。；亏损表现: 气短、郁闷、易受惊。；充盈表现: 呼吸深长、情绪稳定、气场强大。；专业视角
