  question: 什么是关联知识？
  answer: '- [正见：佛陀的证悟](../what-makes-you-not-a-buddhist/) - 同作者核心入门作

    - [佛教历史年表](../../history/Buddhist_History_Timeline.md) - 佛陀生平历史背景

    - [佛教经论系统](../../history/Buddhist_Canon_System.md) - 经典文献体系'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/pilgrimage/INDEX.md
  section: 关联知识
- type: concept
  question: 在每个圣地静坐至少五分钟的核心要点是什么？
  answer: '我的理解: 不是为了"吸收能量"，是为了让你的心跟这个地方产生真实的连接'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/pilgrimage/Multi_Perspective_Reviews.md
  section: 最实用的建议
- type: concept
  question: 本质神圣论的核心要点是什么？
  answer: '圣地神圣性的来源: 圣地本身具有"加持力"；经典依据: 《大涅槃经》等'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/pilgrimage/Multi_Perspective_Reviews.md
  section: 佛教朝圣学的现代诠释
- type: concept
  question: 缘起神圣论的核心要点是什么？
  answer: '圣地神圣性的来源: 圣地因"发生过的事件"和"众生的信心"而神圣；经典依据: 宗萨仁波切的立场'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/pilgrimage/Multi_Perspective_Reviews.md
  section: 佛教朝圣学的现代诠释
- type: concept
  question: 什么是一、总体评价？
  answer: 这是宗萨蒋扬钦哲仁波切最新（2021）的一本书，也是他最"哲学"的一本。如果说之前的书都在用通俗语言讲佛法的"是什么"和"怎么做"，这本书在追问一个更根本的问题：**当你认为你在修佛法的时候，你是不是在给自己制造更大的牢笼？**
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/poison-is-medicine/Book_Review.md
  section: 一、总体评价
- type: concept
  question: 贪欲的核心要点是什么？
  answer: '本质（解药）: 妙观察智；转化条件: 不压抑、不追随，而是认出它的本质'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/poison-is-medicine/Book_Review.md
  section: 核心悖论：毒药 = 解药
- type: concept
  question: 嗔恨的核心要点是什么？
  answer: '本质（解药）: 大圆镜智；转化条件: 不消灭、不放纵，而是看清它的空性'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/poison-is-medicine/Book_Review.md
  section: 核心悖论：毒药 = 解药
- type: concept
  question: 愚痴的核心要点是什么？
