  question: 天性的核心要点是什么？
  answer: '阿拉伯文: Fiṭrah (فطرة)；核心内涵: 每个人与生俱来的纯洁、神圣的原始状态；心理/精神内涵: 心理健康的基石；指向最初的和谐；专业视角: 类似于马斯洛的"自我实现"潜能，但具有神性维度'
