  question: 政治立场的核心要点是什么？
  answer: '争论焦点: 孔子是保守派（恢复周礼）还是改革者（以"仁"重新定义礼）？；当代共识倾向: 两者兼有——他的保守中蕴含了激进的道德标准'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/confucianism/Multi_Perspective_Reviews.md
  section: 视角三：哲学学者
- type: concept
  question: 心即理的核心要点是什么？
  answer: '原文: **Mind Is Principle**；解释: 心就是理，理不在心外，真理存在于人的内心之中。；影响: 提出了心学的核心命题，开启了儒学发展的新方向。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/confucianism/WangYangming.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 知行合一的核心要点是什么？
  answer: '原文: **Unity of Knowledge and Action**；解释: 知识和行动是统一的，真正的知必然表现为行，不行不能算真知。；影响: 为儒家实践哲学提供了重要的方法论指导。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/confucianism/WangYangming.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 致良知的核心要点是什么？
  answer: '原文: **Extend Innate Moral Knowledge**；解释: 发挥和扩充人内心固有的良知，以此指导道德实践。；影响: 确立了心学的修养工夫论和道德实践原则。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/confucianism/WangYangming.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《传习录》的核心要点是什么？
  answer: '成书年代: 16世纪；核心内容: 王阳明与其弟子问答语录和书信集；重要性: 心学思想的核心文献，了解王阳明思想最重要资料'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/confucianism/WangYangming.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《大学问》的核心要点是什么？
  answer: '成书年代: 1527年；核心内容: 对《大学》的系统阐释和发挥；重要性: 体现了王阳明对经典的独特理解和创新阐释'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/confucianism/WangYangming.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《王文成公全书》的核心要点是什么？
  answer: '成书年代: 明代；核心内容: 王阳明的全部著作汇编；重要性: 研究王阳明思想的完整文献资料'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/confucianism/WangYangming.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **早期经历**：出身官宦家庭，接受传统儒学教育

    - **思想转折**：经历贬谪贵州的人生低谷，顿悟心学真谛

    - **理论建构**：在龙场悟道基础上，逐步完善心学理论体系

    - **实践验证**：通过平定叛乱等政治军事活动检验理论

    - **学术传承**：培养众多弟子，形成影响深远的阳明学派'
