  question: 什么是一、中观派论典（Mādhyamaka）？
  answer: 中观派由龙树（Nāgārjuna）创立，以《中论》为核心，主张一切法缘起性空，为印度大乘佛教两大主流之一。
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Abhidharma_Treatises.md
  section: 一、中观派论典（Mādhyamaka）
- type: concept
  question: 译者的核心要点是什么？
  answer: '内容: 鸠摩罗什（Kumārajīva）于后秦弘始四年至七年（402-405年）译出'
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Abhidharma_Treatises.md
  section: 1. 大智度论（Mahāprajñāpāramitāśāstra）
- type: concept
  question: 核心内容的核心要点是什么？
  answer: '内容: 本论为《摩诃般若波罗蜜经》的释论，详释般若波罗蜜多的深义，广明菩萨道修行阶位、六波罗蜜、诸法实相、十八空等义理。内容博大精深，涵盖显密教法，被誉为"论中之王"。'
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Abhidharma_Treatises.md
  section: 1. 大智度论（Mahāprajñāpāramitāśāstra）
- type: concept
  question: 作者的核心要点是什么？
  answer: '内容: 龙树（Nāgārjuna，约150-250年）菩萨造'
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Abhidharma_Treatises.md
  section: 2. 中论（Mūlamadhyamakakārikā）
- type: concept
  question: 什么是基本信息？
  answer: 四阿含经是佛教最早期的经典结集，记录了佛陀及其直接弟子们的言教，被公认为最接近佛陀本怀的教法。南传佛教将相应经典称为"尼柯耶"（Nikāya），北传佛教则称为"阿含"（Āgama，意为"传承"或"结集"）。
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Agama_Sutras.md
  section: 基本信息
- type: concept
  question: 什么是参考来源？
  answer: '1. **大正新修大藏经** 第 12 册 No. 366《佛说阿弥陀经》

    2. **乾隆大藏经** 第 30 册《佛说阿弥陀经》

    3. **中华大藏经**（汉文部分）第 18 册'
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Amitabha_Sutra.md
  section: 参考来源
