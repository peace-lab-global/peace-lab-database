  question: 性善论的核心要点是什么？
  answer: '原文: **Theory of Innate Goodness**；解释: 认为人天生具有善良的本性，具备仁、义、礼、智的萌芽。；影响: 确立了儒家人性论的基础，影响了中国教育和道德哲学。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/confucianism/Mencius.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 民贵君轻的核心要点是什么？
  answer: '原文: **People Are More Important Than Ruler**；解释: 强调民众的重要性超过君主，提出"民为贵，社稷次之，君为轻"。；影响: 为儒家民本思想奠定了理论基础，影响政治哲学发展。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/confucianism/Mencius.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 仁政的核心要点是什么？
  answer: '原文: **Benevolent Government**；解释: 主张以仁爱之心治理国家，反对苛政和暴政。；影响: 影响了中国传统政治理念和治国方略。'
