  question: 什么是附：玄奘大师与《心经》？
  answer: 据《大慈恩寺三藏法师传》记载，玄奘法师西行取经途中，经过绵延八百里的戈壁沙漠（莫贺延碛）时，常诵读此经，默念观音菩萨，得以免除危难。此经虽短，却浓缩了《大般若经》六百卷的精华，是佛教般若思想的精髓所在。
  source: 01-Wisdom-Traditions/religions/buddhism/sutras/Heart_Sutra.md
