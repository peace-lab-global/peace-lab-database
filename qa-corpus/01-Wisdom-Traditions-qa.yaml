  question: Kapha过盛的核心要点是什么？
  answer: 'Doṣa过盛指标: 痰多、鼻塞、嗜睡、体重增加、消化迟缓；推荐的Ṣaṭkarma: Neti、Kapālabhāti、Dhauti(Vamana)；不推荐: Basti(Kapha已有足够水分)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Shatkarma_Cleansing.md
  section: 1.2 净化法的适用评估
- type: concept
  question: Pitta过盛的核心要点是什么？
  answer: 'Doṣa过盛指标: 胃酸过多、皮肤炎症、易怒、口苦；推荐的Ṣaṭkarma: Basti(冷水)、Śītalī呼吸；不推荐: Kapālabhāti(加热)、Nauli(过度刺激Agni)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Shatkarma_Cleansing.md
  section: 1.2 净化法的适用评估
- type: concept
  question: Vāta过盛的核心要点是什么？
  answer: 'Doṣa过盛指标: 便秘、焦虑、皮肤干燥、失眠、胀气；推荐的Ṣaṭkarma: Basti(油性)、温和Nauli；不推荐: 强烈Kapālabhāti(进一步干燥)、Dhauti(刺激)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Shatkarma_Cleansing.md
  section: 1.2 净化法的适用评估
- type: concept
  question: 盐水洗鼻的核心要点是什么？
  answer: '梵文 (IAST): Jala Neti；方法: 温盐水(0.9%生理盐水)从一侧鼻孔灌入，另一侧流出；材料: Neti壶(陶瓷/不锈钢)；不含碘的盐；频率: 每日1次(早晨)；感冒/鼻炎时增加；益处: 清除鼻黏液→改善呼吸→优化Nāḍī
    Śodhana；减少鼻窦感染；禁忌: 严重鼻中隔偏曲；急性中耳炎；鼻息肉(先咨询)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Shatkarma_Cleansing.md
  section: 2.1 Neti (鼻腔净化)
- type: concept
  question: 跌倒预防的核心要点是什么？
  answer: '核心问题: 平衡能力下降；本体感觉退化；瑜伽策略: 树式(扶墙)；Tandem站立；提踵；调整方法: 总有支撑物可用；证据: ★★★★ Oken (2006)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Specific_Populations.md
  section: 一、老年人瑜伽 (Senior Yoga / 60+)
- type: concept
  question: 少肌症的核心要点是什么？
  answer: '核心问题: 肌肉量和力量下降；瑜伽策略: 椅子战士；等长保持；靠墙蹲；调整方法: 低冲击力量；渐进负荷；证据: ★★★ Bell (2017)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Specific_Populations.md
  section: 一、老年人瑜伽 (Senior Yoga / 60+)
- type: concept
  question: 骨质疏松的核心要点是什么？
  answer: '核心问题: 骨密度下降→骨折风险；瑜伽策略: 站立位(轴向负荷)；手部承重；调整方法: 避免脊柱屈曲+扭转组合；证据: ★★★★ Fishman (2010)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Specific_Populations.md
  section: 一、老年人瑜伽 (Senior Yoga / 60+)
- type: concept
  question: 3-5岁的核心要点是什么？
  answer: '发展特点: 想象力丰富；注意力短；瑜伽重点: 动物体式(猫、狗、蛇)；故事瑜伽；教学风格: 游戏化；5-15分钟；音乐；注意事项: 不做静止冥想；安全第一'
  source: 01-Wisdom-Traditions/yoga/Yoga_Specific_Populations.md
  section: 二、儿童与青少年瑜伽 (Children & Adolescents)
- type: concept
  question: 6-9岁的核心要点是什么？
  answer: '发展特点: 规则感增强；社交需求；瑜伽重点: 合作体式；简单呼吸游戏；教学风格: 小组活动；清晰规则；注意事项: 不追求体式"正确性"'
  source: 01-Wisdom-Traditions/yoga/Yoga_Specific_Populations.md
  section: 二、儿童与青少年瑜伽 (Children & Adolescents)
- type: concept
  question: 10-12岁的核心要点是什么？
  answer: '发展特点: 逻辑思维；身份探索；瑜伽重点: 平衡挑战；简单调息；正念；教学风格: 尊重自主权；提供选择；注意事项: 注意青春期早期身体变化'
  source: 01-Wisdom-Traditions/yoga/Yoga_Specific_Populations.md
  section: 二、儿童与青少年瑜伽 (Children & Adolescents)
- type: concept
  question: 注意力改善(ADHD)的核心要点是什么？
  answer: '机制: 持续注意力训练+自我调节；证据: ★★★ Birdee et al. (2009)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Specific_Populations.md
  section: 儿童/青少年瑜伽的循证益处
- type: concept
  question: 考试焦虑减少的核心要点是什么？
  answer: '机制: ANS调节+认知解融；证据: ★★★ Khalsa et al. (2012)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Specific_Populations.md
  section: 儿童/青少年瑜伽的循证益处
- type: concept
  question: 瑜伽的核心要点是什么？
  answer: '英文术语: Yoga；梵语术语: योग (Yoga)；词源/定义: 词根 yuj = 联结、驾驭；在瑜伽经中的地位: 经文 1.2 的核心定义对象'
  source: 01-Wisdom-Traditions/yoga/Yoga_Sutra_Philosophical_Deep_Dive.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 心识波动的核心要点是什么？
  answer: '英文术语: Mental Modifications；梵语术语: वृत्ति (Vṛtti)；词源/定义: 心识中的涟漪/模式；在瑜伽经中的地位: 瑜伽要止息的对象'
  source: 01-Wisdom-Traditions/yoga/Yoga_Sutra_Philosophical_Deep_Dive.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 止息的核心要点是什么？
  answer: '英文术语: Cessation / Restraint；梵语术语: निरोध (Nirodha)；词源/定义: ni(彻底) + rodha(阻止)；在瑜伽经中的地位: 瑜伽的核心操作'
  source: 01-Wisdom-Traditions/yoga/Yoga_Sutra_Philosophical_Deep_Dive.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 第一品的核心要点是什么？
  answer: '梵文名: Samādhi Pāda (三摩地品)；经文数: 51 条；核心主题: 瑜伽的定义、心识波动分类、修行方法、三摩地阶次；面向修行者: 高级修行者——已有冥想基础；关键经文: 1.2 (定义)、1.12 (练习+不执着)、1.23
    (臣服)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Sutra_Philosophical_Deep_Dive.md
  section: 四品结构总览 (The Four Padas)
- type: concept
  question: 第二品的核心要点是什么？
  answer: '梵文名: Sādhana Pāda (修行品)；经文数: 55 条；核心主题: 烦恼 (Kleshas)、业力、苦谛、克里亚瑜伽、八支前五支；面向修行者: 初中级修行者——需要实践路径；关键经文: 2.1 (克里亚瑜伽)、2.29
    (八支列举)、2.46 (体式定义)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Sutra_Philosophical_Deep_Dive.md
  section: 四品结构总览 (The Four Padas)
- type: concept
  question: 第三品的核心要点是什么？
  answer: '梵文名: Vibhūti Pāda (神通品)；经文数: 56 条；核心主题: 三耶摩 (Samyama)、超常能力 (Siddhis)、辨别智；面向修行者: 高级修行者——面对超常体验；关键经文: 3.4 (三耶摩定义)、3.56
    (辨别智即解脱)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Sutra_Philosophical_Deep_Dive.md
  section: 四品结构总览 (The Four Padas)
- type: concept
  question: YS 1.1的核心要点是什么？
  answer: '梵文原文 (IAST): Atha yogānuśāsanam；逐词解析: atha(此刻) yoga(瑜伽) anuśāsanam(教导/阐释)；中文翻译: 此刻，瑜伽的教导开始。；多传统注释: Vyasa：atha 暗示先决条件已满足（渴望
    + 能力）。现代：任何时刻都可以开始。'
  source: 01-Wisdom-Traditions/yoga/Yoga_Sutra_Philosophical_Deep_Dive.md
  section: 第一品 (Samadhi Pada) 核心经文
- type: concept
  question: YS 1.2的核心要点是什么？
  answer: '梵文原文 (IAST): Yogaś citta-vṛtti-nirodhaḥ；逐词解析: yogaḥ(瑜伽是) citta(心识) vṛtti(波动) nirodhaḥ(止息)；中文翻译: 瑜伽是心识波动的止息。；多传统注释:
    Vyasa：止息意味着所有心理活动的终止。Vivekananda：更像是"控制"而非"完全停止"。现代神经科学：DMN 活动的降低。'
  source: 01-Wisdom-Traditions/yoga/Yoga_Sutra_Philosophical_Deep_Dive.md
  section: 第一品 (Samadhi Pada) 核心经文
- type: concept
  question: 生命力的核心要点是什么？
  answer: '瑜伽/阿育吠陀: Prāṇa(气)；中医: 气(Qì)；交叉点: 均指生命维持的精微能量'
  source: 01-Wisdom-Traditions/yoga/Yoga_TCM_Integration.md
  section: 一、体系对照总表
- type: concept
  question: 能量通道的核心要点是什么？
  answer: '瑜伽/阿育吠陀: Nāḍī(脉)；中医: 经络(Jīngluò)；交叉点: 能量流动的通道网络'
  source: 01-Wisdom-Traditions/yoga/Yoga_TCM_Integration.md
  section: 一、体系对照总表
- type: concept
  question: 能量中心的核心要点是什么？
  answer: '瑜伽/阿育吠陀: Cakra(脉轮)；中医: 丹田(Dāntián)；交叉点: 能量汇聚/储存的关键点'
  source: 01-Wisdom-Traditions/yoga/Yoga_TCM_Integration.md
  section: 一、体系对照总表
- type: concept
  question: 上行气的核心要点是什么？
  answer: '瑜伽(Pañca Prāṇa): Prāṇa Vāyu(心→喉)；中医(五脏之气): 宗气(胸中)；功能对应: 呼吸、语言、心脏功能'
  source: 01-Wisdom-Traditions/yoga/Yoga_TCM_Integration.md
  section: 二、Prāṇa与气的深度对照
- type: concept
  question: 下行气的核心要点是什么？
  answer: '瑜伽(Pañca Prāṇa): Apāna Vāyu(脐→盆底)；中医(五脏之气): 肾气(下焦)；功能对应: 排泄、生殖、排毒'
  source: 01-Wisdom-Traditions/yoga/Yoga_TCM_Integration.md
  section: 二、Prāṇa与气的深度对照
- type: concept
  question: 均行气的核心要点是什么？
  answer: '瑜伽(Pañca Prāṇa): Samāna Vāyu(脐区)；中医(五脏之气): 脾胃之气(中焦)；功能对应: 消化、同化、转化'
  source: 01-Wisdom-Traditions/yoga/Yoga_TCM_Integration.md
  section: 二、Prāṇa与气的深度对照
- type: concept
  question: Suṣumnā(中脉)的核心要点是什么？
  answer: '中医经络: 督脉+任脉(中线)；路径对照: 均沿脊柱/中线走行；整合应用: 后弯(督脉)+前屈(任脉)交替'
  source: 01-Wisdom-Traditions/yoga/Yoga_TCM_Integration.md
  section: 三、经络与Nāḍī的对照
- type: concept
  question: Iḍā(左脉)的核心要点是什么？
  answer: '中医经络: 阴经系统(肝/肾/脾)；路径对照: 左侧、冷却、滋养；整合应用: 左鼻呼吸=滋阴'
  source: 01-Wisdom-Traditions/yoga/Yoga_TCM_Integration.md
  section: 三、经络与Nāḍī的对照
