  question: 变性食物的核心要点是什么？
  answer: '英文术语: Rajasic Food；梵语术语: राजसिक आहार (Rājasika Āhāra)；定义: 刺激性、产生躁动的食物；应用: 适量摄入'
  source: 01-Wisdom-Traditions/yoga/Yoga_Nutrition_Lifestyle.md
  section: 核心术语表 (Core Terminology)
