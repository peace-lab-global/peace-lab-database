  answer: '英文术语: Non-violence；梵语术语: अहिंसा (Ahiṃsā)；定义: 不伤害——身体、言语、心理层面；应用: 教学互动的基础'
  source: 01-Wisdom-Traditions/yoga/Yoga_Ethics_Business_Professional.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 真实的核心要点是什么？
  answer: '英文术语: Truthfulness；梵语术语: सत्य (Satya)；定义: 思想、言语、行为的一致性；应用: 诚实宣传、真实教学'
  source: 01-Wisdom-Traditions/yoga/Yoga_Ethics_Business_Professional.md
  section: 核心术语表 (Core Terminology)
