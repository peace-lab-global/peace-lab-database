  answer: '英文名 (English): Pāli Canon；巴利语 (Pāli): *Tipiṭaka*；精确定义: 经(Sutta)、律(Vinaya)、论(Abhidhamma)；心理学意义: 权威经典；专业视角: 最完整的早期佛典'
  source: 01-Wisdom-Traditions/religions/buddhism/theravada/Buddhism_Theravada_Abhidhamma.md
