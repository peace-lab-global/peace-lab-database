  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/poison-is-medicine/Multi_Perspective_Reviews.md
  section: 哲学谱系
- type: concept
  question: 什么是一、总体评价？
  answer: 这是宗萨蒋扬钦哲仁波切最大胆的一本书。他做了一件几乎所有藏传佛教导师都不敢做的事：**公开讨论上师-弟子关系中的黑暗面——精神虐待、权力失衡、盲目崇拜、性丑闻。**
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/the-guru-drinks-bourbon/Book_Review.md
  section: 一、总体评价
