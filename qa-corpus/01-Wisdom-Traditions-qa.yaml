- type: concept
  question: 示转的核心要点是什么？
  answer: '梵语: *Darśana*；巴利语: *Dassana*；含义: 指出存在；苦谛: 此是苦；集谛: 此是集；灭谛: 此是灭；道谛: 此是道'
