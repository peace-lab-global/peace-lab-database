- type: concept
  question: 第二步的核心要点是什么？
  answer: '中文术语: 炼气化神；核心过程 (Core Process): 能量向高层意识转化；开启中轴。；关键技术/意守点: 中丹田；黄庭。；现代心理生理描述: 增强脑部血流；整合边缘系统。；专业视角 (Professional Perspective):
    标志着从生理导向转向意识导向的修行转化。；引用来源 (Citation): *The Secret of the Golden Flower*.'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Internal_Alchemy_Neidan.md
  section: Stages of Neidan Transformation (内丹修炼阶次表)
- type: concept
  question: 第三步的核心要点是什么？
  answer: '中文术语: 炼神还虚；核心过程 (Core Process): 解构自我执着；融入虚空。；关键技术/意守点: 上丹田；泥丸宫。；现代心理生理描述: 抑制默认模式网络 (DMN)；非二元觉醒。；专业视角 (Professional
    Perspective): 典型的超个人心理学过程，实现主客体融合。；引用来源 (Citation): *Daozang*.'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Internal_Alchemy_Neidan.md
  section: Stages of Neidan Transformation (内丹修炼阶次表)
- type: concept
  question: 下丹田的核心要点是什么？
  answer: '类别: 丹田；功能描述 (Function): 能量之海；生产与储存精气。；现代关联: 肠神经系统；引力中心。；专业视角 (Professional Perspective): 生命能的储存库 (Storage)，相当于生物电系统的电容。；引用来源
    (Citation): *Zhong-Lu Chuan Dao Ji*.'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Internal_Alchemy_Neidan.md
  section: Inner Energy Circuitry (内气运化：经络与丹田表)
- type: concept
  question: 小周天的核心要点是什么？
  answer: '类别: 回路；功能描述 (Function): 气过督脉（升）与任脉（降）的循环。；现代关联: 脊髓与副交感神经的能量循环。；专业视角 (Professional Perspective): 通过微小的意识引导，重塑身体的能量流动模式，防止郁滞。；引用来源
    (Citation): *Microcosmic Orbit*.'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Internal_Alchemy_Neidan.md
  section: Inner Energy Circuitry (内气运化：经络与丹田表)
- type: concept
  question: 正一道** (Zhengyi)的核心要点是什么？
  answer: '创始人/关键人物: 张道陵；核心地域/祖庭: 龙虎山 (大虎山)；核心教法特征: 强调符箓、斋醮、世袭传承；出家不必全茹素。；专业视角 (Professional Perspective): 较多保留了早期原始道教的仪式感和民间社会性。；历史地位:
    即“天师道”，是中国社会影响力最广的宗派之一。'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Lineage_Ritual_Tradition.md
  section: Major Taoist Schools & Lineages (道教主要宗派传承表)
- type: concept
  question: 全真道** (Quanzhen)的核心要点是什么？
  answer: '创始人/关键人物: 王重阳；核心地域/祖庭: 终南山、北京白云观；核心教法特征: 性命双修；禁欲斋戒；禅道佛三教合一。；专业视角 (Professional Perspective): 引入了大量的禅宗规制，将道教推向高度哲学化与精英化。；历史地位:
    元代以后北方道教的主力，诞生了丘处机等名师。'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Lineage_Ritual_Tradition.md
  section: Major Taoist Schools & Lineages (道教主要宗派传承表)
- type: concept
  question: 上清派** (Shangqing)的核心要点是什么？
  answer: '创始人/关键人物: 魏华存 (魏夫人)；核心地域/祖庭: 茅山；核心教法特征: 强调存思 (Visualization)、诵经；追求个人灵性飞升。；专业视角 (Professional Perspective): 丰富了道教的意象学与内在景观，是美学层次最高的门派。；历史地位:
    魏晋时期的士大夫阶层主要的精神寄托。'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Lineage_Ritual_Tradition.md
  section: Major Taoist Schools & Lineages (道教主要宗派传承表)
- type: concept
  question: 武当山的核心要点是什么？
  answer: '地位: 内家武学之巅。；特征: 宏伟的明代建筑群；太极功夫中心。；关联神祇/祖师: 真武大帝、张三丰。；精神价值: 刚柔相济的精神发源地。'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Lineage_Ritual_Tradition.md
  section: Sacred Taoist Geography (道教名山与动态景观表)
- type: concept
  question: 龙虎山的核心要点是什么？
  answer: '地位: 符箓之宗。；特征: 丹霞地貌；张天师世家。；关联神祇/祖师: 张道陵。；精神价值: 神秘主义与超自然秩序的符号中心。'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Lineage_Ritual_Tradition.md
  section: Sacred Taoist Geography (道教名山与动态景观表)
- type: concept
  question: 终南山的核心要点是什么？
  answer: '地位: 隐逸文化中心。；特征: 修行者聚集地；人地和谐。；关联神祇/祖师: 老子（经台）、王重阳。；精神价值: 代表了中国文心深处的“终南捷径”与世外桃源理想。'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Lineage_Ritual_Tradition.md
  section: Sacred Taoist Geography (道教名山与动态景观表)
- type: concept
  question: 符箓的核心要点是什么？
  answer: '英文/拼音 (Name): Fu-Lu (Talismans)；象征意义 (Symbolism): 宇宙能量的指令集。；现代应用/隐喻: 符号疗愈 (Symbol Healing)；意志的外部投射。；专业视角 (Professional
    Perspective): 通过特定的图形节奏诱导观察者进入高度集中的催眠态。'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Lineage_Ritual_Tradition.md
  section: 'Ritual Symbols & Tools: Fu-Lu (道教符箓与法器表)'
- type: concept
  question: 道剑的核心要点是什么？
  answer: '英文/拼音 (Name): Sword；象征意义 (Symbolism): 智慧，斩断情丝与外魔。；现代应用/隐喻: 认知边界的建立；决断力。；专业视角 (Professional Perspective): 并非杀生之器，而是破除认知扭曲的工具。'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Lineage_Ritual_Tradition.md
  section: 'Ritual Symbols & Tools: Fu-Lu (道教符箓与法器表)'
- type: concept
  question: 无为的核心要点是什么？
  answer: '英文/拼音 (English/Pinyin): Wu-Wei / Non-action；核心定义 (Key Definition): 不妄为，不逆自然而动；高效的顺应。；心理/存在主义应用: 减少多余的控制欲；进入“心流”状态。；专业视角
    (Professional Perspective): 并非坐以待毙，而是“为而不恃”，动态平衡中的自发性。；引用来源 (Citation): *Zhuangzi*, "Internal Chapters".'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Philosophy_Cosmology.md
  section: Core Taoist Ontological Concepts (道家核心本体论概念表)
- type: concept
  question: 阴阳的核心要点是什么？
  answer: '英文/拼音 (English/Pinyin): Yin-Yang；核心定义 (Key Definition): 相互对立、转化且统一的两种基本力量。；心理/存在主义应用: 平衡心理极端；接纳生活的周期逻辑。；专业视角 (Professional
    Perspective): 二元对立的互补模型，动态稳态 (Homeostasis) 的古代表达。；引用来源 (Citation): *I Ching* (Book of Changes).'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Philosophy_Cosmology.md
  section: Core Taoist Ontological Concepts (道家核心本体论概念表)
- type: concept
  question: 自然的核心要点是什么？
  answer: '英文/拼音 (English/Pinyin): Zi-ran / Self-so-ness；核心定义 (Key Definition): 自发、原本的样子；非外力强加。；心理/存在主义应用: 压力管理中的“放手”；恢复本能智慧。；专业视角
    (Professional Perspective): 最高的审美与存在境界，强调“道法自然”。；引用来源 (Citation): *Dao De Jing*, Ch. 25.'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Philosophy_Cosmology.md
  section: Core Taoist Ontological Concepts (道家核心本体论概念表)
- type: concept
  question: 无极的核心要点是什么？
  answer: '描述 (Description): Wuji；状态特征 (Characteristics): 原始的虚空；无边际、无形状。；现代科学对应: 奇点前的量子真空 (Quantum Vacuum)。；专业视角 (Professional
    Perspective): 一切可能性的叠加态，零点能的隐喻。；引用来源 (Citation): *Liezi*, "Questions of Tang".'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Philosophy_Cosmology.md
  section: Taoist Cosmological Models (道家宇宙生成模型表)
- type: concept
  question: 太极的核心要点是什么？
  answer: '描述 (Description): Taiji；状态特征 (Characteristics): 混沌初开，动静之机；阴阳之母。；现代科学对应: 宇宙大爆炸后的有序演化。；专业视角 (Professional Perspective):
    区分的开始，对称性破缺 (Symmetry Breaking) 的起点。；引用来源 (Citation): *Taiji Tu Shuo* (Zhou Dunyi).'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Philosophy_Cosmology.md
  section: Taoist Cosmological Models (道家宇宙生成模型表)
- type: concept
  question: 三生万物的核心要点是什么？
  answer: '描述 (Description): The Three；状态特征 (Characteristics): 道生一，一生二，二生三，三生万物。；现代科学对应: 复杂系统的涌现 (Emergence)。；专业视角 (Professional
    Perspective): 描述了从简单性向复杂性演化的数学/本体逻辑。；引用来源 (Citation): *Dao De Jing*, Ch. 42.'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Philosophy_Cosmology.md
  section: Taoist Cosmological Models (道家宇宙生成模型表)
- type: concept
  question: 《道德经》的核心要点是什么？
  answer: '核心主旨 (Core Theme): 阐述道的运行规律与处世智慧。；关键观念/术语: 柔弱胜刚强；知足常乐。；疗愈/心理益处: 解决权力焦虑；学习退后策略。；专业视角 (Professional Perspective):
    世界上被翻译次数最多的中国典籍，极具悖论之美。；推荐读本: 陈鼓应《老子今注今译》'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Philosophy_Cosmology.md
  section: Foundational Taoist Classics (道家核心经籍表)
- type: concept
  question: 《庄子》的核心要点是什么？
  answer: '核心主旨 (Core Theme): 追求绝对的心理自由与齐物观。；关键观念/术语: 逍遥游；齐物论；坐忘；心斋。；疗愈/心理益处: 消除社会比较；解构自我执着。；专业视角 (Professional Perspective):
    充满奇诡想象力，是文学与哲学的巅峰，具“狂禅”先声。；推荐读本: 郭象《庄子注》'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Philosophy_Cosmology.md
  section: Foundational Taoist Classics (道家核心经籍表)
- type: concept
  question: 符头 (Header)的核心要点是什么？
  answer: '术语 (Term): Talisman Header；象征意义 (Symbolism): 通常为三笔（代表三清）或特定的点。；心理干预机制: **神圣授权感**：建立超越个人的背景。；专业视角 (Expert Perspective):
    赋予符号以绝对的合法性，降低受众的怀疑屏障。'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Talisman_Ritual_Healing.md
  section: 'Semiotics of the Sacred: Daoist Talismans (符咒符号学详表)'
- type: concept
  question: 符腹 (Core)的核心要点是什么？
  answer: '术语 (Term): Core Script；象征意义 (Symbolism): 经由特定的咒语注入的指令（讳字）。；心理干预机制: **针对性意向**：聚焦于病灶或焦虑点。；专业视角 (Expert Perspective):
    是一种视觉化的“安慰剂”加上高强度的暗示引导。'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Talisman_Ritual_Healing.md
  section: 'Semiotics of the Sacred: Daoist Talismans (符咒符号学详表)'
- type: concept
  question: 符脚 (Tail)的核心要点是什么？
  answer: '术语 (Term): Talisman Foot；象征意义 (Symbolism): 合拢或特定的顿笔。；心理干预机制: **封锁与结算**：心理上的完成感 (Closure)。；专业视角 (Expert Perspective):
    确立“疗愈已完成”的心理状态。'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Talisman_Ritual_Healing.md
  section: 'Semiotics of the Sacred: Daoist Talismans (符咒符号学详表)'
- type: concept
  question: 步罡踏斗的核心要点是什么？
  answer: '术语 (Term): Pacing the Dipper；行为描述: 按照特定星斗轨迹行走。；心理学效应: **动态地理锚定**：在混乱中建立秩序。；专家解析: 通过精确的踱步，建立起微观身体与宏观宇宙的连接感。'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Talisman_Ritual_Healing.md
  section: Ritual as Therapeutic Landscape (仪式作为治疗场域表)
- type: concept
  question: 焚香启奏的核心要点是什么？
  answer: '术语 (Term): Incense Offering；行为描述: 焚香并宣告意图。；心理学效应: **嗅觉神经引导**：进入特殊的意识状态 (ASC)。；专家解析: 香气作为嗅觉锚点，能迅速调动长期记忆中的神圣感。'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Talisman_Ritual_Healing.md
  section: Ritual as Therapeutic Landscape (仪式作为治疗场域表)
- type: concept
  question: 斋戒 (Fast)的核心要点是什么？
  answer: '术语 (Term): Ritual Fasting；行为描述: 身体与精神的净化期。；心理学效应: **防御性消解**：通过物理剥夺增强接收力。；专家解析: 建立对疗愈过程的极度重视与投入感。'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Talisman_Ritual_Healing.md
  section: Ritual as Therapeutic Landscape (仪式作为治疗场域表)
- type: concept
  question: 安魂符的核心要点是什么？
  answer: '针对场景: 极度惊吓、创伤。；操作核心: 建立沉稳的视觉中轴。；专家解析: 对应心理学中的“重返中心”练习。'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Talisman_Ritual_Healing.md
  section: Typology of Talismanic Healing (符箓疗愈分类表)
- type: concept
  question: 开智符的核心要点是什么？
  answer: '针对场景: 学生、智力劳动者。；操作核心: 清爽、上扬的线条。；专家解析: 旨在解除前额叶的紧张与拥塞。'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Talisman_Ritual_Healing.md
  section: Typology of Talismanic Healing (符箓疗愈分类表)
- type: concept
  question: 金 (Metal)的核心要点是什么？
  answer: '关联内脏 (Organ): 肺 (Lung)；情绪平衡 (Emotion): 悲 vs. 爽。；味性 (Taste): 辛 (Pungent)；药草/食物示例: 黄芪、雪梨。；养生核心 (Core logic): 气体的交换效率与皮肤防御力。'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Yangsheng_Herbology.md
  section: The Five Elements & Metabolic Balance (五行与代谢平衡表)
- type: concept
  question: 木 (Wood)的核心要点是什么？
  answer: '关联内脏 (Organ): 肝 (Liver)；情绪平衡 (Emotion): 怒 vs. 仁。；味性 (Taste): 酸 (Sour)；药草/食物示例: 枸杞、青梅。；养生核心 (Core logic): 能量的疏泄与解毒代谢。'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Yangsheng_Herbology.md
  section: The Five Elements & Metabolic Balance (五行与代谢平衡表)
- type: concept
  question: 水 (Water)的核心要点是什么？
  answer: '关联内脏 (Organ): 肾 (Kidney)；情绪平衡 (Emotion): 恐 vs. 智。；味性 (Taste): 咸 (Salty)；药草/食物示例: 黑豆、熟地。；养生核心 (Core logic): 先天资本（激素与干细胞）的储存。'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Yangsheng_Herbology.md
  section: The Five Elements & Metabolic Balance (五行与代谢平衡表)
- type: concept
  question: 子时 (23-01)的核心要点是什么？
  answer: '经络 (Meridian): 胆 (Gallbladder)；最佳生理活动: 深度睡眠。；禁忌/建议: 忌熬夜；此为引阳入阴的关键。；养生专家解析 (Expert Insight): 胆汁代谢与一天的“生机”重启。'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Yangsheng_Herbology.md
  section: 'Daoist Chrono-biology: The 12 Horary Branches (子午流注：生物钟管理)'
- type: concept
  question: 丑时 (01-03)的核心要点是什么？
  answer: '经络 (Meridian): 肝 (Liver)；最佳生理活动: 深度睡眠。；禁忌/建议: 忌饮酒；肝血回流排毒。；养生专家解析 (Expert Insight): 肝脏修复期，如果不睡会损害血液质量。'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Yangsheng_Herbology.md
  section: 'Daoist Chrono-biology: The 12 Horary Branches (子午流注：生物钟管理)'
- type: concept
  question: 寅时 (03-05)的核心要点是什么？
  answer: '经络 (Meridian): 肺 (Lung)；最佳生理活动: 深度呼吸/入静。；禁忌/建议: 忌吸烟；肺气分配。；养生专家解析 (Expert Insight): 身体正处于将静止状态切换为运动状态的准备。'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Yangsheng_Herbology.md
  section: 'Daoist Chrono-biology: The 12 Horary Branches (子午流注：生物钟管理)'
- type: concept
  question: 上品 (Upper)的核心要点是什么？
  answer: '核心功能: 延年益寿，轻身。；哲学隐喻: **君 (Divine)**：调节整体系统。；代表性药材: 灵芝、茯苓、地黄。；养生策略: 长期服用，重在微调。'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Yangsheng_Herbology.md
  section: Daoist Herbology Category (神农本草：药性逻辑)
- type: concept
  question: 中品 (Middle)的核心要点是什么？
