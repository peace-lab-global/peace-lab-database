  section: 表1.3 佛教核心概念网络 (Core Concept Network)
- type: concept
  question: 佛陀时代的核心要点是什么？
  answer: '年代: 约前563-前483；重要事件: 佛陀成道、初转法轮、入灭；代表人物: 释迦牟尼佛；主要发展: 教法建立、僧团形成；专业视角: 原始佛教核心确立'
  source: 01-Wisdom-Traditions/religions/buddhism/foundations/Buddhism_Core_Overview.md
  section: 表2.1 佛教重要历史阶段 (Major Historical Periods)
- type: concept
  question: 部派分裂的核心要点是什么？
  answer: '年代: 前383-前100；重要事件: 第二次结集、根本分裂；代表人物: 上座部、大众部；主要发展: 分为18-20部派；专业视角: 教义细化与争论'
  source: 01-Wisdom-Traditions/religions/buddhism/foundations/Buddhism_Core_Overview.md
  section: 表2.1 佛教重要历史阶段 (Major Historical Periods)
- type: concept
  question: 四无量心的核心要点是什么？
  answer: '英文名 (English): Four Immeasurables；梵语 (Sanskrit): *Catvāri Apramāṇāni* (चत्वारि अप्रमाणानि)；巴利语 (Pāli): *Cattāro
    Appamaññā*；精确定义: 慈悲喜舍四种无限延伸至一切众生的心态；疗愈意义: 人际关系的究竟疗愈；专业视角: 又称四梵住、四等心'
  source: 01-Wisdom-Traditions/religions/buddhism/foundations/Buddhism_Four_Immeasurables.md
  section: 表1.1 四无量心核心术语 (Four Immeasurables Core Terms)
- type: concept
  question: 四梵住的核心要点是什么？
  answer: '英文名 (English): Four Divine Abodes；梵语 (Sanskrit): *Catvāri Brahmavihārāṇi* (ब्रह्मविहार)；巴利语 (Pāli): *Cattāro Brahmavihārā*；精确定义:
    与梵天相应的四种崇高心境；疗愈意义: 心灵居所的最高境界；专业视角: 音译"梵摩罗住"'
  source: 01-Wisdom-Traditions/religions/buddhism/foundations/Buddhism_Four_Immeasurables.md
  section: 表1.1 四无量心核心术语 (Four Immeasurables Core Terms)
- type: concept
  question: 无量/无边的核心要点是什么？
  answer: '英文名 (English): Immeasurable/Boundless；梵语 (Sanskrit): *Apramāṇa* (अप्रमाण)；巴利语 (Pāli): *Appamaññā*；精确定义: 不可限量、无有边际；疗愈意义:
    打破心量限制；专业视角: 指对象无边、心量无限'
  source: 01-Wisdom-Traditions/religions/buddhism/foundations/Buddhism_Four_Immeasurables.md
  section: 表1.1 四无量心核心术语 (Four Immeasurables Core Terms)
- type: concept
  question: 慈 (Mettā)的核心要点是什么？
  answer: '巴利语: *Mettā*；定义: 愿众生得乐及乐因；近敌 (伪装): 有条件的爱、执着之爱；远敌 (对立): 嗔恨、恶意 (*Vyāpāda*)；对治烦恼: 对治嗔恨；圆满特征: 无条件、无差别'
  source: 01-Wisdom-Traditions/religions/buddhism/foundations/Buddhism_Four_Immeasurables.md
  section: '表1.2 四无量心与近敌远敌 (Four Immeasurables: Enemies & Antidotes)'
- type: concept
  question: 悲 (Karuṇā)的核心要点是什么？
  answer: '巴利语: *Karuṇā*；定义: 愿众生离苦及苦因；近敌 (伪装): 悲悯的同情、居高临下的怜悯；远敌 (对立): 残忍、伤害 (*Vihiṃsā*)；对治烦恼: 对治残忍；圆满特征: 不因他苦而苦'
  source: 01-Wisdom-Traditions/religions/buddhism/foundations/Buddhism_Four_Immeasurables.md
  section: '表1.2 四无量心与近敌远敌 (Four Immeasurables: Enemies & Antidotes)'
- type: concept
  question: 喜 (Muditā)的核心要点是什么？
  answer: '巴利语: *Muditā*；定义: 随喜他人幸福成功；近敌 (伪装): 世俗的兴奋、浅薄的乐观；远敌 (对立): 嫉妒、羡慕 (*Issā*)；对治烦恼: 对治嫉妒；圆满特征: 真诚无染'
  source: 01-Wisdom-Traditions/religions/buddhism/foundations/Buddhism_Four_Immeasurables.md
  section: '表1.2 四无量心与近敌远敌 (Four Immeasurables: Enemies & Antidotes)'
- type: concept
  question: 慈心定义的核心要点是什么？
  answer: '梵语/巴利语: *Mettā*；英文: Loving-kindness；定义: 希望自他获得快乐与安乐；心理学对应: 无条件积极关注 (Rogers)；修行要点: 从自身开始扩展'
  source: 01-Wisdom-Traditions/religions/buddhism/foundations/Buddhism_Four_Immeasurables.md
  section: 2.1 慈无量心 (Mettā Bhāvanā)
- type: concept
  question: 慈心特相的核心要点是什么？
  answer: '梵语/巴利语: *Lakkhaṇa*；英文: Characteristic；定义: 促进众生利益安乐；心理学对应: 亲社会动机；修行要点: 真诚的善意'
  source: 01-Wisdom-Traditions/religions/buddhism/foundations/Buddhism_Four_Immeasurables.md
  section: 2.1 慈无量心 (Mettā Bhāvanā)
- type: concept
  question: 苦谛的核心要点是什么？
  answer: '梵语: *Duḥkha-satya* (दुःखसत्य)；巴利语: *Dukkha-sacca*；英文: Truth of Suffering；核心含义: 生命的不圆满性；医学比喻: 病症；心理治疗对应: 问题评估；修行任务:
    应知（遍知）'
  source: 01-Wisdom-Traditions/religions/buddhism/foundations/Buddhism_Four_Noble_Truths.md
  section: 表1.1 四圣谛基本结构 (Basic Structure)
- type: concept
  question: 集谛的核心要点是什么？
