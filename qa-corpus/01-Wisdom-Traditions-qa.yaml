  question: 非物质主义的核心要点是什么？
  answer: '原文: **Immaterialism**；解释: 否认物质实体的存在，认为只有心灵和观念存在。；影响: 影响了后来的现象主义和概念分析哲学。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/early-modern/empiricism/Berkeley.md
  section: 核心思想 (Core Ideas)
