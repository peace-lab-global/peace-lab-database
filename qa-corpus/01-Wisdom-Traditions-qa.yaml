  question: 功成弗居的核心要点是什么？
  answer: '老子原句: “功成而弗居”。；现代解析: 不贪功，成就归于团队。；职场场景: 团队激励；建立心理安全感。；专业视角 (Professional Perspective): 减少因权力傲慢导致的决策盲点、团队分裂。'
