  answer: '名称: 曼都迦；梵文: Mandukya；所属吠陀: 阿闼婆；核心主题: Om分析、四意识状态；估计年代: 前500-前200'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/vedanta/Upanishads_Wisdom.md
  section: 1.3 十三部主要奥义书
- type: concept
  question: 11的核心要点是什么？
  answer: '名称: 白净；梵文: Shvetashvatara；所属吠陀: 夜柔；核心主题: 人格神、摩耶、瑜伽；估计年代: 前400-前200'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/vedanta/Upanishads_Wisdom.md
  section: 1.3 十三部主要奥义书
- type: concept
  question: 吠檀多的核心要点是什么？
  answer: '梵文: Vedanta；含义: "吠陀之终"，指奥义书（Upanishads）的哲学精髓'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/vedanta/Vedanta_Philosophy_Overview.md
  section: 1.1 名称与含义
- type: concept
  question: 乌特拉弥曼差的核心要点是什么？
  answer: '梵文: Uttara Mimamsa；含义: "后弥曼差"，与仪式弥曼差（Purva Mimamsa）相对'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/vedanta/Vedanta_Philosophy_Overview.md
