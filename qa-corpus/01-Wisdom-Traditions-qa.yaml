  answer: '作者/时代: 张伯端 (北宋)；核心哲学模型: 先命后性，强调肉身转化的重要性。；关键贡献: 南宗祖经，调和了禅宗与丹道。；专业视角 (Expert Perspective): 将“爱”与“情感之力”转化为修持动力的典范。'
  source: 01-Wisdom-Traditions/religions/dao/Dao_Advanced_Internal_Alchemy.md
