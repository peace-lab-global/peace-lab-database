- type: concept
  question: 说一切有部的核心要点是什么？
  answer: '核心术语: 随眠种子；梵语/巴利语: *Anuśaya-bīja*；定义: 烦恼的潜在形式；与熏习的关系: 种子论的早期形态；现代心理学对应: 习惯性倾向'
  source: 01-Wisdom-Traditions/religions/buddhism/vasana/Vasana_Overview.md
  section: 表1.2 熏习相关古典术语对照 (Classical Term Comparisons)
