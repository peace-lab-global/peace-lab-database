  answer: '梵文: Rāga；定义: 对愉悦体验的执着追求；现代心理学对应: 趋近动机（Approach Motivation）'
  source: 01-Wisdom-Traditions/yoga/masters/ancient/Patanjali.md
  section: 2. 五种烦恼（Pañca Kleśa）——痛苦的根源地图
