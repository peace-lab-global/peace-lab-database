  section: 表1.3 佛教核心概念网络 (Core Concept Network)
- type: concept
  question: 戒定慧的核心要点是什么？
  answer: '相关概念: 三学、八正道；交叉引用文件: [戒律伦理](../ethics/Buddhism_Ethics_Comprehensive.md) [禅修体系](../meditation/Buddhism_Meditation_Practice_System.md)；理论地位:
    修行路径；实践意义: 实践框架；现代整合: 行为治疗、注意力训练'
