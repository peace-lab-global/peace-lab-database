  question: 什么是第十一篇 孤愤？
  answer: 智术之士，必远见而明察，不明察不能烛私；能法之士，必强毅而劲直，不劲直不能矫奸。人臣循令而从事，案法而治官，非谓重人也。重人也者，无令而擅为，亏法以利私，耗国以便家，力能得其君，此所谓重人也。智术之士明察，听用，且烛重人之阴情；能法之士劲直，听用，且矫重人之奸行。故智术能法之士用，则贵重之臣必在绳之外矣。是智法之士与当涂之人，不可两存之仇也。
  source: 01-Wisdom-Traditions/religions/legalist/classics/Han_Feizi.md
  section: 第十一篇 孤愤
- type: concept
  question: 什么是第十二篇 说难（全文）？
  answer: 凡说之难：非吾知之有以说之之难也，又非吾辨之能明吾意之难也，又非吾敢横失而能尽之难也。凡说之难：在知所说之心，可以吾说当之。
  source: 01-Wisdom-Traditions/religions/legalist/classics/Han_Feizi.md
  section: 第十二篇 说难（全文）
