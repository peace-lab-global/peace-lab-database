  question: 经量部的核心要点是什么？
  answer: '核心术语: 相续；梵语/巴利语: *Saṃtāna* (संतान)；定义: 心识流的连续性；与熏习的关系: 强调种子在心流中延续；现代心理学对应: 意识流'
