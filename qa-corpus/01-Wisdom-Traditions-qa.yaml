- type: concept
  question: 俱生我执的核心要点是什么？
  answer: '梵语: *Sahaja-ātmagraha*；定义: 与生俱来的我执；生起来源: 末那识恒常执着；心理学对应: 先天自我感、基本自恋；治疗重点: 深度觉察'
  source: 01-Wisdom-Traditions/religions/buddhism/vasana/Vasana_Mechanisms.md
