- type: concept
  question: 《自然哲学体系初稿》(Erster Entwurf eines Systems der Naturphilosophie)的核心要点是什么？
  answer: '出版年份: 1799年；核心内容: 建构系统的自然哲学理论；重要性: 自然哲学思想的经典表述'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/german-idealism/Schelling.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《论世界灵魂》(Über die Weltseele)的核心要点是什么？
  answer: '出版年份: 1798年；核心内容: 探讨自然的有机统一性和动力学原理；重要性: 早期自然哲学的重要文献'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/german-idealism/Schelling.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **早期学习**：在图宾根神学院学习神学和哲学，与黑格尔、荷尔德林同学

    - **费希特影响**：受到费希特知识学深刻影响，但很快发展出独特思想

    - **自然哲学阶段**：强调自然的理性和创造性，与浪漫主义运动密切联系

    - **同一哲学时期**：提出思维与存在同一的哲学原理

    - **后期转向**：转向宗教哲学和启示哲学，关注历史和实践问题'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/german-idealism/Schelling.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 深度心理学的核心要点是什么？
  answer: '关联概念: 自然哲学；实践方法: 理解人类心理的自然根源和创造性潜能；现代应用: 分析心理学和原型理论'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/german-idealism/Schelling.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 自然神学的核心要点是什么？
  answer: '原文: **Natural Theology**；解释: 通过理性论证上帝存在和属性的神学方法。；影响: 确立了理性与信仰结合的中世纪神学范式。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Aquinas.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 五路论证的核心要点是什么？
  answer: '原文: **Five Ways**；解释: 证明上帝存在的五个理性论证：运动、因果、必然性、完善性、目的性。；影响: 成为经院哲学的经典论证方法。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Aquinas.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 双重真理说的核心要点是什么？
  answer: '原文: **Double Truth**；解释: 哲学真理与神学真理可以并存，理性与信仰各有领域。；影响: 影响了后来的宗教哲学和科学哲学。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Aquinas.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《神学大全》(Summa Theologiae)的核心要点是什么？
  answer: '出版年份: 1265-1274年；核心内容: 系统阐述基督教神学的百科全书式著作；重要性: 阿奎那最重要的神学哲学著作'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Aquinas.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《反异教大全》(Summa Contra Gentiles)的核心要点是什么？
  answer: '出版年份: 1259-1265年；核心内容: 为向非基督徒传教而写的护教学著作；重要性: 体现了理性护教的方法'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Aquinas.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《论存在与本质》(De Ente et Essentia)的核心要点是什么？
  answer: '出版年份: 1252-1256年；核心内容: 探讨存在与本质关系的形而上学著作；重要性: 早期重要哲学作品'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Aquinas.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **早期学习**：在那不勒斯腓特烈二世大学学习，接触亚里士多德哲学

    - **多明我会**：加入多明我会，接受严格的经院哲学训练

    - **巴黎求学**：在巴黎大学师从大阿尔伯特，深入研究亚里士多德

    - **学术生涯**：在巴黎、罗马等地任教，创作主要哲学神学著作

    - **体系建构**：致力于整合亚里士多德哲学与基督教神学'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Aquinas.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 道德心理学的核心要点是什么？
  answer: '关联概念: 自然法伦理学；实践方法: 培养基于理性的人格完善；现代应用: 品格教育和价值观澄清'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Aquinas.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 原罪论的核心要点是什么？
  answer: '原文: **Doctrine of Original Sin**；解释: 人类因亚当堕落而继承罪性，需要神恩拯救。；影响: 确立了基督教人性论的基础。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Augustine.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 恩典与自由意志的核心要点是什么？
  answer: '原文: **Grace and Free Will**；解释: 救恩完全依赖神的恩典，但人有选择接受的自由。；影响: 影响了后来的救恩神学和道德哲学。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Augustine.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 内在光照说的核心要点是什么？
  answer: '原文: **Theory of Divine Illumination**；解释: 理性认识需要神的光照才能获得真理。；影响: 为中世纪认识论提供了神学基础。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Augustine.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《忏悔录》(Confessions)的核心要点是什么？
  answer: '出版年份: 397-400年；核心内容: 自传体灵性回忆录，描述皈依历程；重要性: 奥古斯丁最具影响力的个人著作'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Augustine.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《上帝之城》(City of God)的核心要点是什么？
  answer: '出版年份: 413-426年；核心内容: 为基督教辩护，阐述历史哲学；重要性: 中世纪政治神学的经典文献'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Augustine.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《论三位一体》(De Trinitate)的核心要点是什么？
  answer: '出版年份: 399-413年；核心内容: 系统阐述三位一体教义的神学著作；重要性: 基督教神学的重要文献'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Augustine.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **早期生活**：在北非塔加斯特出生，接受古典教育

    - **摩尼教时期**：青年时期信仰摩尼教，寻求理性解答

    - **新柏拉图主义阶段**：在米兰接触新柏拉图主义，为皈依做准备

    - **皈依基督教**：386年在米兰皈依，387年受洗

    - **主教生涯**：回到北非希波担任主教，从事神学写作和牧养'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Augustine.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 内在探索的核心要点是什么？
  answer: '关联概念: 忏悔传统；实践方法: 通过自我审视和坦诚面对内心；现代应用: 心理治疗中的自我觉察技术'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Augustine.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 恶的根源的核心要点是什么？
  answer: '奥古斯丁: 原罪（亚当的堕落）；佛教: 无明（avidyā）；学术评价: 结构相似但内容不同'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 人性状态的核心要点是什么？
  answer: '奥古斯丁: 完全堕落，需要上帝恩典；佛教: 本具佛性，被无明遮蔽；学术评价: 悲观 vs 乐观的人性论'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 救赎路径的核心要点是什么？
  answer: '奥古斯丁: 恩典→信仰→善行；佛教: 闻思修→戒定慧→解脱；学术评价: 他力 vs 自力（但净土宗也是他力）'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 第一路（运动）的核心要点是什么？
  answer: '阿奎那: 一切运动需要一个推动者，追溯到不动的推动者；佛教的反驳: 缘起无第一因——运动是循环的相互依存'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 第二路（因果）的核心要点是什么？
  answer: '阿奎那: 因果链需要一个第一因；佛教的反驳: 因果是缘起的网状结构，不是线性链条'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/medieval/christian/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
