  question: 10的核心要点是什么？
  answer: '梵文 (天城体): अष्टाङ्ग；IAST: Aṣṭāṅga；中文: 八支；English: Eight Limbs；分类: 体系；详见文件: [Yoga_Philosophy](Yoga_Philosophy.md)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Glossary_Master.md
  section: 术语总表
- type: concept
  question: 11的核心要点是什么？
  answer: '梵文 (天城体): आश्रम；IAST: Āśrama；中文: 静修所；English: Ashram / Hermitage；分类: 传承；详见文件: [Yoga_History_Tradition](Yoga_History_Tradition.md)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Glossary_Master.md
  section: 术语总表
- type: concept
  question: 12的核心要点是什么？
  answer: '梵文 (天城体): आत्मन्；IAST: Ātman；中文: 自性 / 真我；English: Self / Soul；分类: 哲学；详见文件: [Yoga_Philosophy](Yoga_Philosophy.md)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Glossary_Master.md
  section: 术语总表
- type: concept
  question: 仙人的核心要点是什么？
  answer: '英文术语: Sage / Seer；梵语术语: ऋषि (Ṛṣi)；词源/定义: "看见者"——通过冥想直接感知真理的圣者；历史意义: 吠陀经文的传承者和瑜伽智慧的最初持有者'
  source: 01-Wisdom-Traditions/yoga/Yoga_History_Tradition.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 上师的核心要点是什么？
  answer: '英文术语: Guru / Teacher；梵语术语: गुरु (Guru)；词源/定义: gu(黑暗) + ru(驱散) = 驱散黑暗者；历史意义: 传统瑜伽的核心传授机制'
  source: 01-Wisdom-Traditions/yoga/Yoga_History_Tradition.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 师承传统的核心要点是什么？
  answer: '英文术语: Lineage；梵语术语: परम्परा (Paramparā)；词源/定义: "一个接一个"——不间断的传承链；历史意义: 保证教义从创始人纯正传递到后代'
  source: 01-Wisdom-Traditions/yoga/Yoga_History_Tradition.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 印度河谷的核心要点是什么？
  answer: '年代: c. 3300-1500 BCE；关键发展: 出土苦行者坐姿印章（"帕舒帕蒂印章"）；代表人物/文本: 未知；考古/文献证据: 摩亨佐达罗/哈拉帕遗址；历史意义: 最早的"瑜伽姿势"图像证据（存在争议）'
  source: 01-Wisdom-Traditions/yoga/Yoga_History_Tradition.md
  section: 从起源到古典时期
- type: concept
  question: 吠陀时期的核心要点是什么？
  answer: '年代: c. 1500-800 BCE；关键发展: "Yoktra"(结合/轭)概念出现；仪式性苦行 (Tapas)；代表人物/文本: 吠陀仙人们；考古/文献证据: 《梨俱吠陀》；历史意义: 瑜伽概念的萌芽——仪式中的专注与苦行'
  source: 01-Wisdom-Traditions/yoga/Yoga_History_Tradition.md
  section: 从起源到古典时期
- type: concept
  question: 奥义书时期的核心要点是什么？
  answer: '年代: c. 800-400 BCE；关键发展: 从外在仪式转向内在冥想；Atman-Brahman 思想；代表人物/文本: 耶若瓦克亚 (Yajnavalkya)；考古/文献证据: 《卡塔奥义书》《什韦塔什瓦塔拉奥义书》；历史意义:
    首次系统论述瑜伽冥想与呼吸控制'
  source: 01-Wisdom-Traditions/yoga/Yoga_History_Tradition.md
  section: 从起源到古典时期
- type: concept
  question: 哈他瑜伽的核心要点是什么？
  answer: '年代: c. 1000-1500 CE；关键发展: 体式、调息、净化法、收束法的系统化；代表人物/文本: 戈拉克纳特 (Gorakhnath)、斯瓦特马拉马 (Svatmarama)；影响: 《哈他瑜伽之光》《格朗达本集》《希瓦本集》问世'
  source: 01-Wisdom-Traditions/yoga/Yoga_History_Tradition.md
  section: 从哈他瑜伽到现代
- type: concept
  question: 殖民时期的核心要点是什么？
  answer: '年代: 1800s；关键发展: 瑜伽被边缘化；苦行者被殖民者视为怪异；代表人物/文本: —；影响: 瑜伽的社会地位跌至谷底'
  source: 01-Wisdom-Traditions/yoga/Yoga_History_Tradition.md
  section: 从哈他瑜伽到现代
- type: concept
  question: 10的核心要点是什么？
  answer: '梵文 (Devanāgarī): माला；IAST: Mālā；中文: 念珠；English: Rosary/Prayer Beads；简释: 108颗+1(Guru bead)的计数工具'
  source: 01-Wisdom-Traditions/yoga/Yoga_Mantra_Nada_Chanting.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 11的核心要点是什么？
  answer: '梵文 (Devanāgarī): अनाहत नाद；IAST: Anāhata Nāda；中文: 无击之音；English: Unstruck Sound；简释: 不依赖外在碰撞而自发产生的内在声音'
  source: 01-Wisdom-Traditions/yoga/Yoga_Mantra_Nada_Chanting.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 至上之声的核心要点是什么？
  answer: '梵文 (IAST): Parā Vāk；位置: 超越位置；描述: 未分化的宇宙声音——纯粹的意向(Saṅkalpa)尚未成形；对应意识状态: Turīya(第四态)；对应脉轮: Sahasrāra以上'
  source: 01-Wisdom-Traditions/yoga/Yoga_Mantra_Nada_Chanting.md
  section: 1.1 声音的四个层次 (Catvāri Vāk)
- type: concept
  question: 可视之声的核心要点是什么？
  answer: '梵文 (IAST): Paśyantī；位置: 心轮区域；描述: 声音以意象/直觉形式存在——"看见"声音；对应意识状态: 深度冥想/梦境；对应脉轮: Anāhata'
  source: 01-Wisdom-Traditions/yoga/Yoga_Mantra_Nada_Chanting.md
  section: 1.1 声音的四个层次 (Catvāri Vāk)
- type: concept
  question: 中间之声的核心要点是什么？
  answer: '梵文 (IAST): Madhyamā；位置: 喉轮区域；描述: 内在的心理语言——我们"想"的声音；对应意识状态: 清醒的思维；对应脉轮: Viśuddha'
  source: 01-Wisdom-Traditions/yoga/Yoga_Mantra_Nada_Chanting.md
  section: 1.1 声音的四个层次 (Catvāri Vāk)
- type: concept
  question: A (अ)的核心要点是什么？
  answer: '发音: "啊"——口腔大开；对应状态: 清醒(Jāgrat)；对应身体区域: 腹部→胸部；对应Guṇa: Rajas；对应神: Brahmā(创造)；引用: *Māṇḍūkya Upaniṣad* 1-7'
  source: 01-Wisdom-Traditions/yoga/Yoga_Mantra_Nada_Chanting.md
  section: 1.2 OṂ (唵) 深度解析
- type: concept
  question: U (उ)的核心要点是什么？
  answer: '发音: "乌"——口腔收缩；对应状态: 梦境(Svapna)；对应身体区域: 胸部→喉部；对应Guṇa: Sattva；对应神: Viṣṇu(维持)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Mantra_Nada_Chanting.md
  section: 1.2 OṂ (唵) 深度解析
- type: concept
  question: M (म)的核心要点是什么？
  answer: '发音: "嗯"——双唇闭合；对应状态: 深睡(Suṣupti)；对应身体区域: 喉部→颅顶；对应Guṇa: Tamas；对应神: Śiva(转化)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Mantra_Nada_Chanting.md
  section: 1.2 OṂ (唵) 深度解析
- type: concept
  question: 10的核心要点是什么？
  answer: '梵文 (Devanāgarī): विपश्यना；IAST: Vipaśyanā；中文: 内观；English: Insight；简释: 如实观察身心现象的智慧'
  source: 01-Wisdom-Traditions/yoga/Yoga_Meditation_Dharana_Dhyana.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 11的核心要点是什么？
  answer: '梵文 (Devanāgarī): प्रत्यय；IAST: Pratyaya；中文: 心之内容物；English: Mental Content；简释: 冥想中被觉察的对象'
  source: 01-Wisdom-Traditions/yoga/Yoga_Meditation_Dharana_Dhyana.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 12的核心要点是什么？
  answer: '梵文 (Devanāgarī): अभ्यास；IAST: Abhyāsa；中文: 练习/修习；English: Practice；简释: 持续不断的努力(YS 1.12)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Meditation_Dharana_Dhyana.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 第六支的核心要点是什么？
  answer: '梵文 (IAST): Dhāraṇā；定义(经典): Deśa Bandhaś Cittasya — 将心智绑定于一处(YS 3.1)；心智状态: 注意力反复拉回同一焦点；有明显的"走神-回来"循环；类比: 将水倒入杯中——断续的注入；关键经文:
    YS 3.1'
  source: 01-Wisdom-Traditions/yoga/Yoga_Meditation_Dharana_Dhyana.md
  section: '1.1 八支瑜伽中的内三支 (Antaraṅga: Inner Limbs)'
- type: concept
  question: 第七支的核心要点是什么？
  answer: '梵文 (IAST): Dhyāna；定义(经典): Tatra Pratyaya Ekatānatā — 对该处意识内容的不间断流动(YS 3.2)；心智状态: 注意力自然安住；走神极少；时间感消失；类比: 水从杯中持续流出——不断流；关键经文:
    YS 3.2'
  source: 01-Wisdom-Traditions/yoga/Yoga_Meditation_Dharana_Dhyana.md
  section: '1.1 八支瑜伽中的内三支 (Antaraṅga: Inner Limbs)'
- type: concept
  question: 第八支的核心要点是什么？
  answer: '梵文 (IAST): Samādhi；定义(经典): Tad Eva Arthamātra Nirbhāsaṃ — 仅对象本质闪耀，自身形式似乎空了(YS 3.3)；心智状态: 主客体边界消融；纯粹的知觉；类比: 阳光直接照射——没有容器的阻隔；关键经文:
    YS 3.3'
  source: 01-Wisdom-Traditions/yoga/Yoga_Meditation_Dharana_Dhyana.md
  section: '1.1 八支瑜伽中的内三支 (Antaraṅga: Inner Limbs)'
- type: concept
  question: 有寻三摩地的核心要点是什么？
  answer: '梵文 (IAST): Savitarka；描述: 对粗大对象的有概念冥想；冥想对象: 外在形态(名称、形式、意义混合)；心智特征: 仍有语言思维参与；对应脑波(推测): α→θ过渡'
  source: 01-Wisdom-Traditions/yoga/Yoga_Meditation_Dharana_Dhyana.md
  section: 1.2 Samādhi阶段详表
- type: concept
  question: 无寻三摩地的核心要点是什么？
  answer: '梵文 (IAST): Nirvitarka；描述: 对粗大对象的无概念冥想；冥想对象: 仅对象本质，无名称/概念覆盖；心智特征: 语言思维消失；直接感知；对应脑波(推测): θ主导'
  source: 01-Wisdom-Traditions/yoga/Yoga_Meditation_Dharana_Dhyana.md
  section: 1.2 Samādhi阶段详表
- type: concept
  question: 自下而上 (Bottom-Up)的核心要点是什么？
  answer: '瑜伽干预: 体式、调息、Bandha；生理通路: 迷走神经刺激→PNS激活→HPA轴调节；心理效应: 身体安全信号→减少过度警觉；关键研究: Streeter et al. (2012)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Mental_Health_Clinical.md
  section: 一、瑜伽治疗心理疾病的机制模型
- type: concept
  question: 自上而下 (Top-Down)的核心要点是什么？
  answer: '瑜伽干预: 冥想、正念、Dhāraṇā；生理通路: 前额叶激活→杏仁核抑制；心理效应: 元认知增强→反应性降低；关键研究: Holzel et al. (2011)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Mental_Health_Clinical.md
  section: 一、瑜伽治疗心理疾病的机制模型
- type: concept
  question: 关系性 (Relational)的核心要点是什么？
  answer: '瑜伽干预: 集体练习、Kīrtana；生理通路: 催产素↑→镜像神经元→共情；心理效应: 社会连接→孤立感减少；关键研究: Porges (2011)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Mental_Health_Clinical.md
  section: 一、瑜伽治疗心理疾病的机制模型
- type: concept
  question: 广泛性焦虑 (GAD)的核心要点是什么？
  answer: '核心机制: ANS过度激活+认知反刍；瑜伽处方: 延长呼气(1:2)；前屈；修复瑜伽；Yoga Nidrā；避免: 快速Vinyāsa；Kumbhaka(初期)；证据: ★★★★ Cramer (2018)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Mental_Health_Clinical.md
  section: 2.1 焦虑谱系障碍
- type: concept
  question: 恐慌障碍的核心要点是什么？
  answer: '核心机制: CO₂过敏+灾难性解释；瑜伽处方: 渐进式呼吸延长；接地练习；温和Ujjāyī；避免: Kapālabhāti；Bhastrikā；止息；证据: ★★★ Meuret (2010)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Mental_Health_Clinical.md
  section: 2.1 焦虑谱系障碍
- type: concept
  question: 社交焦虑的核心要点是什么？
  answer: '核心机制: 自我聚焦+回避；瑜伽处方: 集体温和瑜伽(小组)；Mettā冥想；避免: 大型公开课；竞争性练习；证据: ★★★'
  source: 01-Wisdom-Traditions/yoga/Yoga_Mental_Health_Clinical.md
  section: 2.1 焦虑谱系障碍
- type: concept
  question: 迟滞型 (Tamas主导)的核心要点是什么？
  answer: '瑜伽辨证: 低能量、嗜睡、社会退缩；处方: 拜日式(早晨)；后弯(开胸)；Kapālabhāti；机制: SNS适度激活→能量↑→多巴胺↑；证据: ★★★'
  source: 01-Wisdom-Traditions/yoga/Yoga_Mental_Health_Clinical.md
  section: 2.2 抑郁谱系障碍
- type: concept
  question: 激越型 (Rajas主导)的核心要点是什么？
  answer: '瑜伽辨证: 焦虑性抑郁、失眠、易怒；处方: 修复瑜伽；Nāḍī Śodhana；Yoga Nidrā；机制: PNS激活→过度觉醒↓→GABA↑；证据: ★★★'
  source: 01-Wisdom-Traditions/yoga/Yoga_Mental_Health_Clinical.md
  section: 2.2 抑郁谱系障碍
- type: concept
  question: 流派的核心要点是什么？
  answer: '英文术语: Style / School；梵语术语: सम्प्रदाय (Sampradāya)；定义: 具有独特教学方法与哲学的瑜伽体系；备注: 现代流派多源于20世纪'
  source: 01-Wisdom-Traditions/yoga/Yoga_Modern_Styles.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 传承的核心要点是什么？
  answer: '英文术语: Lineage；梵语术语: परम्परा (Paramparā)；定义: 师徒传授链；备注: 保证教学纯正性'
  source: 01-Wisdom-Traditions/yoga/Yoga_Modern_Styles.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 序列的核心要点是什么？
  answer: '英文术语: Sequence；梵语术语: क्रम (Krama)；定义: 体式编排顺序；备注: 固定序列vs自由编排'
  source: 01-Wisdom-Traditions/yoga/Yoga_Modern_Styles.md
