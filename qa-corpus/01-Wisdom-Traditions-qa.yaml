  section: 核心术语表 (Core Terminology)
- type: concept
  question: 粗身 (Sthūla)的核心要点是什么？
  answer: '鞘 (Kośa): 食物鞘(Annamaya)；层次: 物质身体；对应功能: 解剖、生理；克里亚干预: Āsana + Śatkarma(六净化)；觉醒标志: 身体轻盈、疾病减少'
  source: 01-Wisdom-Traditions/yoga/Yoga_Advanced_Kriya_Kundalini.md
  section: 1.1 三身五鞘模型 (Tri-Śarīra & Pañca Kośa)
- type: concept
  question: 细身 (Sūkṣma)的核心要点是什么？
  answer: '鞘 (Kośa): 气鞘(Prāṇamaya)；层次: 能量体；对应功能: 呼吸、ANS、生物电磁；克里亚干预: Prāṇāyāma + Bandha；觉醒标志: 呼吸自动延长、能量感知增强'
  source: 01-Wisdom-Traditions/yoga/Yoga_Advanced_Kriya_Kundalini.md
  section: 1.1 三身五鞘模型 (Tri-Śarīra & Pañca Kośa)
- type: concept
  question: 意鞘(Manomaya)的核心要点是什么？
  answer: '鞘 (Kośa): 心理体；层次: 情绪、思维模式；对应功能: Pratyāhāra + Dhāraṇā；克里亚干预: 思维平静、情绪稳定'
  source: 01-Wisdom-Traditions/yoga/Yoga_Advanced_Kriya_Kundalini.md
  section: 1.1 三身五鞘模型 (Tri-Śarīra & Pañca Kośa)
- type: concept
  question: 脉 (Nāḍī)的核心要点是什么？
  answer: '英文/梵文: Energy Channel；核心特征: 能量流转通道，总量约72,000条；对应生理/心理功能: 神经系统与循环系统的精微并行通路；专业视角: 脉的"净化"是所有高阶能量练习的基础；净化方法: Nāḍī Śodhana、Śatkarma'
  source: 01-Wisdom-Traditions/yoga/Yoga_Advanced_Kriya_Kundalini.md
  section: 1.2 能量通道系统 (Nāḍī System)
- type: concept
  question: 中脉 (Suṣumnā)的核心要点是什么？
  answer: '英文/梵文: Central Channel；核心特征: 中央轴线，贯穿脊柱底部至顶部；对应生理/心理功能: 脑脊液系统与中枢神经轴；专业视角: 象征超越二元对立的"中道"；Kuṇḍalinī上升的唯一通路；净化方法: 三锁联合(Mahā
    Bandha)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Advanced_Kriya_Kundalini.md
  section: 1.2 能量通道系统 (Nāḍī System)
- type: concept
  question: 脊柱 (Vertebral Column)的核心要点是什么？
  answer: '瑜伽中的作用: 中轴支撑；保护脊髓；六方向运动；核心体式应用: 轴向伸展、屈曲、伸展、侧弯、旋转；损伤风险: 椎间盘突出(前屈+扭转)；过伸(Hyperextension)；专业视角: 理解"压缩"(Compression)与"张力"(Tension)限制的区别对安全练习至关重要；引用:
    *Your Body, Your Yoga* (Clark, 2016)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Anatomy_Physiology.md
  section: 1.1 核心关节系统深度解析
- type: concept
  question: 髋关节 (Ball & Socket)的核心要点是什么？
  answer: '瑜伽中的作用: 灵活性与稳定性的基础；核心体式应用: 开髋(鸽子式)、站立位(战士)；损伤风险: 盂唇撕裂(强迫旋转)；撞击综合征(FAI)；专业视角: 髋臼/股骨头角度的骨骼差异(前倾角/颈干角)决定ROM极限；引用:
    *Functional Anatomy of Yoga* (Keil, 2014)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Anatomy_Physiology.md
  section: 1.1 核心关节系统深度解析
- type: concept
  question: 肩带 (Shoulder Girdle)的核心要点是什么？
  answer: '瑜伽中的作用: 最大灵活性关节；核心体式应用: 下犬式、四柱支撑、倒立；损伤风险: 冈上肌腱炎；肩峰撞击综合征；专业视角: 肩肱节律(Scapulohumeral Rhythm)：肩胛骨必须旋转上移以支撑手臂上举；引用:
    *Yoga Anatomy* (Kaminoff, 2011)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Anatomy_Physiology.md
  section: 1.1 核心关节系统深度解析
- type: concept
  question: 颈椎 (C1-C7)的核心要点是什么？
  answer: '椎体数: 7；自然曲度: 前凸(Lordosis)；主要运动: 屈伸、侧弯、旋转(最灵活)；关键体式: 肩倒立、犁式、鱼式；常见问题: 颈椎过屈(肩倒立)、过伸(鱼式)；保护策略: 用毯子垫高肩膀(肩倒立)；不将头完全后仰'
  source: 01-Wisdom-Traditions/yoga/Yoga_Anatomy_Physiology.md
  section: 1.2 脊柱节段与体式运动
- type: concept
  question: 胸椎 (T1-T12)的核心要点是什么？
  answer: '椎体数: 12；自然曲度: 后凸(Kyphosis)；主要运动: 旋转为主；伸展受限；关键体式: 后弯(主要目标)、扭转；常见问题: 胸椎僵硬→代偿性腰椎过度运动；保护策略: 后弯强调"打开胸椎"而非折叠腰椎'
  source: 01-Wisdom-Traditions/yoga/Yoga_Anatomy_Physiology.md
  section: 1.2 脊柱节段与体式运动
- type: concept
  question: 腰椎 (L1-L5)的核心要点是什么？
  answer: '椎体数: 5；自然曲度: 前凸(Lordosis)；主要运动: 屈伸为主；旋转极少(5°)；关键体式: 前屈、后弯；常见问题: 椎间盘突出(L4-L5最常见)；保护策略: 从髋折叠(前屈)；通过核心启动保护腰椎'
  source: 01-Wisdom-Traditions/yoga/Yoga_Anatomy_Physiology.md
  section: 1.2 脊柱节段与体式运动
- type: concept
  question: 深层核心的核心要点是什么？
  answer: '主要肌肉: 腹横肌(TrA)、多裂肌、盆底肌、膈肌；瑜伽功能: 脊柱节段稳定；内部压力调控；激活体式: 所有体式(Uḍḍīyāna)、船式(Nāvāsana)；拉伸体式: 鱼式(膈肌释放)、仰卧扭转；失衡表现: 腰痛、骨盆不稳、呼吸浅表'
  source: 01-Wisdom-Traditions/yoga/Yoga_Anatomy_Physiology.md
  section: 1.3 核心肌肉系统的瑜伽功能
- type: concept
  question: 表层腹肌的核心要点是什么？
  answer: '主要肌肉: 腹直肌、腹内/外斜肌；瑜伽功能: 躯干屈曲、旋转、侧弯；激活体式: 船式、腿上举、扭转类；拉伸体式: 后弯(骆驼式、轮式)；失衡表现: 过度激活→呼吸受限；不足→脊柱保护缺失'
  source: 01-Wisdom-Traditions/yoga/Yoga_Anatomy_Physiology.md
  section: 1.3 核心肌肉系统的瑜伽功能
- type: concept
  question: 10的核心要点是什么？
  answer: '梵文 (Devanāgarī): दृष्टि；IAST: Dṛṣṭi；中文: 凝视点；English: Gazing Point；简释: Ashtanga 体系的九个凝视点'
  source: 01-Wisdom-Traditions/yoga/Yoga_Asana_Pranayama.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 11的核心要点是什么？
  answer: '梵文 (Devanāgarī): उज्जायी；IAST: Ujjāyī；中文: 胜利呼吸；English: Victorious Breath；简释: 喉部收缩产生的呼吸法'
  source: 01-Wisdom-Traditions/yoga/Yoga_Asana_Pranayama.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 12的核心要点是什么？
  answer: '梵文 (Devanāgarī): नाडी शोधन；IAST: Nāḍī Śodhana；中文: 经脉净化；English: Channel Purification；简释: 交替鼻孔呼吸法'
  source: 01-Wisdom-Traditions/yoga/Yoga_Asana_Pranayama.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 《瑜伽经》2.46的核心要点是什么？
  answer: '定义: Sthira Sukham Āsanam（体式是稳定且舒适的）；核心精神: 稳定(Sthira)与放松(Sukha)的动态平衡；现代诠释: 不追求极端柔韧或力量，而是在当下的身体条件中找到平衡'
  source: 01-Wisdom-Traditions/yoga/Yoga_Asana_Pranayama.md
  section: 1.1 体式的经典定义与现代诠释
- type: concept
  question: 《瑜伽经》2.47的核心要点是什么？
  answer: '定义: Prayatna Śaithilya Ananta Samāpattibhyām（通过放松努力与冥想无限）；核心精神: 减少不必要的用力；现代诠释: 最小必要肌肉激活(Minimum Effective Dose)原则'
  source: 01-Wisdom-Traditions/yoga/Yoga_Asana_Pranayama.md
  section: 1.1 体式的经典定义与现代诠释
- type: concept
  question: 《瑜伽经》2.48的核心要点是什么？
  answer: '定义: Tataḥ Dvandvānabhighātaḥ（于是不再受二元对立困扰）；核心精神: 超越冷/热、苦/乐的对立；现代诠释: 发展对不适的非反应性觉察(Non-reactive Awareness)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Asana_Pranayama.md
  section: 1.1 体式的经典定义与现代诠释
- type: concept
  question: 站立位 (Standing)的核心要点是什么？
  answer: '核心体式 (8-10个): 山式(Tāḍāsana)、战士I/II/III(Vīrabhadrāsana)、三角式(Trikoṇāsana)、侧角式(Pārśvakoṇāsana)、半月式(Ardha Candrāsana)、树式(Vṛkṣāsana)、鹰式(Garuḍāsana)、幻椅式(Utkaṭāsana)；主要肌群:
    股四头肌、臀大肌、核心稳定肌群；能量效应: Brahmana(充能)+接地；心理效应: 建立自信、稳定感、本体感觉；禁忌注意: 膝关节损伤者注意对齐；高血压者避免长时间上举手臂'
  source: 01-Wisdom-Traditions/yoga/Yoga_Asana_Pranayama.md
  section: 1.2 体式六大分类深度解析
- type: concept
  question: 前屈位 (Forward Bends)的核心要点是什么？
  answer: '核心体式 (8-10个): 坐姿前屈(Paścimottānāsana)、站姿前屈(Uttānāsana)、头碰膝式(Jānu Śīrṣāsana)、坐角式(Upviṣṭha Koṇāsana)、龟式(Kūrmāsana)、大身印(Mahā
    Mudrā)、半前屈(Ardha Uttānāsana)、宽距前屈(Prasārita Pādottānāsana)；主要肌群: 腘绳肌、竖脊肌(离心收缩)、腹肌；能量效应: Langhana(镇静)——副交感激活；心理效应: 内省、臣服、释放控制；禁忌注意:
    腰椎间盘突出者保持腰椎曲度；孕晚期避免深度闭合前屈'
  source: 01-Wisdom-Traditions/yoga/Yoga_Asana_Pranayama.md
  section: 1.2 体式六大分类深度解析
- type: concept
  question: 10的核心要点是什么？
  answer: '梵文 (Devanāgarī): पञ्चकर्म；IAST: Pañcakarma；中文: 五业疗法；English: Five Purifications；简释: 阿育吠陀核心排毒疗法(催吐/泻下/灌肠/鼻疗/放血)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Ayurvedic_Therapy_Integration.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 元素的核心要点是什么？
  answer: 'Vāta (风型): 风(Vāyu)+空(Ākāśa)；Pitta (火型): 火(Tejas)+水(Ap)；Kapha (水土型): 水(Ap)+土(Pṛthvī)'
  source: 01-Wisdom-Traditions/yoga/Yoga_Ayurvedic_Therapy_Integration.md
  section: 1.1 体质特性全表
- type: concept
  question: 品质(Guṇa)的核心要点是什么？
  answer: 'Vāta (风型): 轻、冷、干、动、粗、细；Pitta (火型): 热、锐、轻、油、液、流；Kapha (水土型): 重、冷、油、慢、滑、稳'
  source: 01-Wisdom-Traditions/yoga/Yoga_Ayurvedic_Therapy_Integration.md
  section: 1.1 体质特性全表
- type: concept
  question: 体型的核心要点是什么？
  answer: 'Vāta (风型): 瘦长或矮小；骨突明显；关节易响；Pitta (火型): 中等；肌肉匀称；体温偏高；Kapha (水土型): 宽大；肌肉丰满；骨骼粗壮'
  source: 01-Wisdom-Traditions/yoga/Yoga_Ayurvedic_Therapy_Integration.md
  section: 1.1 体质特性全表
- type: concept
  question: Vāta的核心要点是什么？
  answer: '推荐体式风格: 舒缓、稳定、接地、温暖；推荐体式: 站立平衡(树式)、前屈、修复体式、挺尸式；调息法: Nāḍī Śodhana(温和)、Ujjāyī；冥想重点: 基于稳定物体(烛焰/呼吸)；So''ham；禁忌: 忌快速跳跃；忌寒冷环境；忌过度伸展'
  source: 01-Wisdom-Traditions/yoga/Yoga_Ayurvedic_Therapy_Integration.md
  section: 1.2 基于体质的瑜伽处方
- type: concept
  question: Pitta的核心要点是什么？
  answer: '推荐体式风格: 温和、非竞争、冷却、趣味性；推荐体式: 扭转(排毒)、前屈、月光序列、修复；调息法: Śītalī/Śītkārī(冷却)、Candra Bhedana；冥想重点: 慈悲(Mettā)冥想；水元素观想；禁忌:
    忌热瑜伽(Hot Yoga)；忌竞争性练习；忌正午练习'
  source: 01-Wisdom-Traditions/yoga/Yoga_Ayurvedic_Therapy_Integration.md
  section: 1.2 基于体质的瑜伽处方
- type: concept
  question: Kapha的核心要点是什么？
  answer: '推荐体式风格: 活力、动态、加热、多样；推荐体式: 拜日式、倒立、后弯、流瑜伽；调息法: Kapālabhāti、Bhastrikā、Sūrya Bhedana；冥想重点: 活力观想；Trāṭaka(烛焰)；禁忌: 忌长时间静止；忌过度修复瑜伽'
  source: 01-Wisdom-Traditions/yoga/Yoga_Ayurvedic_Therapy_Integration.md
  section: 1.2 基于体质的瑜伽处方
- type: concept
  question: 春季 (Vasanta)的核心要点是什么？
  answer: '主导Doṣa: Kapha积累释放；养生重点: 排除冬日积藏；瑜伽练习调整: 强力流瑜伽+后弯+拜日式；调息重点: Kapālabhāti、Bhastrikā；饮食建议: 减甜；增辛/苦/涩味；蜂蜜水；生活建议: 早起；增加户外运动'
  source: 01-Wisdom-Traditions/yoga/Yoga_Ayurvedic_Therapy_Integration.md
  section: '二、季节养生与瑜伽 (Ṛtucaryā: Seasonal Regimen)'
