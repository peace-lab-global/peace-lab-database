  question: 伦理的核心要点是什么？
  answer: '英文术语: Ethics；梵语术语: धर्म (Dharma)；定义: 行为准则与道德规范；应用: 教学中的行为底线'
  source: 01-Wisdom-Traditions/yoga/Yoga_Ethics_Business_Professional.md
