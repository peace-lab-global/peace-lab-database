- type: concept
  question: 转依的核心要点是什么？
  answer: '英文名 (English): Transformation of the Basis；梵语 (Sanskrit): *Āśraya-parāvṛtti* (आश्रयपरावृत्ति)；藏语 (Tibetan): *གནས་གྱུར*
    (gNas-gyur)；精确定义: 意识根本转化，从染转净；疗愈意义: 彻底的人格转化'
  source: 01-Wisdom-Traditions/religions/buddhism/vasana/Vasana_Mind_Transformation.md
