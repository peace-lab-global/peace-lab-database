  source: 01-Wisdom-Traditions/philosophy/south-asian/india/scriptures/Upanishads.md
  section: 曼都卡奥义书（Māṇḍūkya Upaniṣad）全文
- type: concept
  question: M（摩）的核心要点是什么？
  answer: '梵文: Makāra；对应意识态: 深睡位（Prājña）；性质: 度量，归灭'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/scriptures/Upanishads.md
  section: 曼都卡奥义书（Māṇḍūkya Upaniṣad）全文
