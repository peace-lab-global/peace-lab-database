  answer: '年代: 1900s-1930s；关键人物: T. Krishnamacharya；贡献: 在迈索尔(Mysore)创立现代体式练习系统；影响: "现代瑜伽之父"'
  source: 01-Wisdom-Traditions/yoga/Yoga_Modern_Styles.md
