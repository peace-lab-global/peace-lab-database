  question: 《人类理智新论》(Nouveaux Essais sur l'Entendement Humain)的核心要点是什么？
  answer: '出版年份: 1704年；核心内容: 批评洛克经验主义的对话体著作；重要性: 理性主义认识论的重要文献'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/early-modern/rationalism/Leibniz.md
