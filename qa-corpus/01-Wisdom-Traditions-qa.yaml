  question: 什么是内篇第一 逍遥游？
  answer: 北冥有鱼，其名为鲲。鲲之大，不知其几千里也。化而为鸟，其名为鹏。鹏之背，不知其几千里也。怒而飞，其翼若垂天之云。是鸟也，海运则将徙于南冥。南冥者，天池也。
  source: 01-Wisdom-Traditions/religions/dao/classics/Zhuangzi.md
  section: 内篇第一 逍遥游
- type: concept
  question: 什么是内篇第二 齐物论？
  answer: 南郭子綮隐机而坐，仰天而嘘，荅焉似丧其偶。颜成子游立侍乎前，曰：“何居乎？形固可使如槁木，而心固可使如死灰乎？今之隐机者，非昔之隐机者也。”子綮曰：“偶，不亦善乎而问之也！今者吾丧我，汝知之乎？女闻人籁而未闻地籁，女闻地籁而未闻天籁夫！”
  source: 01-Wisdom-Traditions/religions/dao/classics/Zhuangzi.md
  section: 内篇第二 齐物论
