  question: 奥义书时期的核心要点是什么？
  answer: '年代: 约前800-前200；关键事件: 核心概念形成：梵、自我、轮回、解脱'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/vedanta/Vedanta_Philosophy_Overview.md
