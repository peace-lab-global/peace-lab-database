- type: concept
  question: 单子论的核心要点是什么？
  answer: '原文: **Monadology**；解释: 宇宙由无数不可分割的精神实体(单子)构成。；影响: 开创了独特的形而上学体系。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/early-modern/rationalism/Leibniz.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 预定和谐的核心要点是什么？
  answer: '原文: **Pre-established Harmony**；解释: 上帝预先安排所有单子的协调运作。；影响: 为心身问题提供了独特的解决方案。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/early-modern/rationalism/Leibniz.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 充足理由律的核心要点是什么？
  answer: '原文: **Principle of Sufficient Reason**；解释: 任何事物都必须有充分的理由或原因。；影响: 影响了后来的逻辑学和科学方法论。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/early-modern/rationalism/Leibniz.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《单子论》(Monadologie)的核心要点是什么？
