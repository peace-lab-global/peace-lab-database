  question: 精** (Jing)的核心要点是什么？
  answer: '英文名: Essence；物质基础/关联: 肾驱动；内分泌/生殖液。；心理/精神功能: 生命的原动力；情绪基调。；亏损表现: 疲劳、早衰、意志消沉。；充盈表现: 精力充沛、皮肤光泽。；专业视角 (Professional
