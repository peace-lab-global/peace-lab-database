  section: 2.1 三部分六章结构
- type: concept
  question: 什么是一、奥义书（Upanishads）— 梵我同一的建立？
  answer: '**核心文本**: 广林奥义书、唱赞奥义书、曼都迦奥义书等十三部主要奥义书

    > **核心命题**: 梵（Brahman）与自我（Ātman）本质同一；四大名句；四意识状态'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/vedanta/Buddhist_Perspective_Reviews.md
  section: 一、奥义书（Upanishads）— 梵我同一的建立
- type: concept
  question: 意识即梵的核心要点是什么？
  answer: '梵文: Prajñānam Brahma；奥义书含义: 纯粹意识即终极实在；佛法对照: 佛法：意识（viññāṇa）是缘起法，非终极实在'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/vedanta/Buddhist_Perspective_Reviews.md
  section: 视角一：专业书评人
- type: concept
  question: 我即梵的核心要点是什么？
  answer: '梵文: Aham Brahmāsmi；奥义书含义: 个体本质即宇宙本体；佛法对照: 佛法："我"是五蕴和合的假名，无实体可"即"'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/vedanta/Buddhist_Perspective_Reviews.md
  section: 视角一：专业书评人
- type: concept
  question: 你即那的核心要点是什么？
  answer: '梵文: Tat Tvam Asi；奥义书含义: 个体与梵无二；佛法对照: 佛法：一切法无自性，不存在可"即"的实体'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/vedanta/Buddhist_Perspective_Reviews.md
  section: 视角一：专业书评人
- type: concept
  question: 本体论的核心要点是什么？
  answer: '奥义书梵我论: 存在永恒不变的"我"（Ātman）；佛教无我论: 一切法无自性（anātman）；分歧本质: 实体论 vs 缘起论'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/vedanta/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 认识论的核心要点是什么？
  answer: '奥义书梵我论: 通过"闻思修"直接认知"我即梵"；佛教无我论: 通过观照发现"我"不可得；分歧本质: 直证实体 vs 分析消解'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/vedanta/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 解脱论的核心要点是什么？
  answer: '奥义书梵我论: 认知梵我同一即解脱（Mokṣa）；佛教无我论: 破除我执即解脱（Nirvāṇa）；分歧本质: 真知即解脱 vs 离执即解脱'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/vedanta/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 性质的核心要点是什么？
  answer: '第四境（Turīya）: 纯意识的终极状态；涅槃（Nirvāṇa）: 烦恼熄灭、执着脱落'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/vedanta/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 瑜伽哲学的核心要点是什么？
  answer: '路径: [01-Wisdom-Traditions/yoga/](../../../../yoga/)；关联点: 数论-瑜伽体系与吠檀多互补'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/vedanta/INDEX.md
  section: 交叉引用
