- type: concept
  question: 什么是系辞传上？
  answer: 系辞传是《易传》的核心，阐述《易》的哲学原理与宇宙观，为易学之总纲。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/yijing/Yi_Zhuan.md
  section: 系辞传上
- type: concept
  question: 什么是系辞传下？
  answer: 系辞下传着重阐述变化之道与忧患意识，是易学实践哲学的集中表达。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/yijing/Yi_Zhuan.md
  section: 系辞传下
- type: concept
  question: 什么是彖传上（节选）？
  answer: 彖传解释各卦卦辞之义，为《周易》引入天地之道的哲学视野。节选乾坤两卦彖传。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/yijing/Yi_Zhuan.md
  section: 彖传上（节选）
- type: concept
  question: 什么是象传上（节选）？
  answer: 象传释各卦卦象之义，分大象（释全卦）与小象（释各爻）。节选重要大象传。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/yijing/Yi_Zhuan.md
  section: 象传上（节选）
- type: concept
  question: 什么是文言传（全文）？
  answer: 文言传专释乾坤两卦的德性与义理，是《易传》中义理哲学最精密的篇章。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/china/yijing/Yi_Zhuan.md
  section: 文言传（全文）
- type: concept
  question: 什么是主题：铃木大拙的"禅"——西方化包装 vs 传统禅宗？
  answer: 铃木大拙向西方世界呈现的"Zen"究竟是正法传播还是文化再创造？本篇从佛教内部视角审视这一核心问题。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/buddhism/Buddhist_Perspective_Reviews.md
  section: 主题：铃木大拙的"禅"——西方化包装 vs 传统禅宗
- type: concept
  question: 什么是一、专业书评人视角？
  answer: 铃木大拙的禅学著作在出版市场上取得了巨大成功，但佛教内部对这一"成功"的评价始终存在分歧。从书评人的角度看，铃木的写作策略是一种高度自觉的跨文化翻译：他选择了禅宗中最具普适性的元素——直觉体验、当下觉知、非二元智慧——将其从庞大的佛教教义体系中提取出来，以西方读者能够接受的方式重新包装。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/buddhism/Buddhist_Perspective_Reviews.md
  section: 一、专业书评人视角
- type: concept
  question: 什么是二、学佛爱好者视角？
  answer: 作为一个对佛法有实践兴趣的读者，读铃木大拙的体验是既兴奋又不安的。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/buddhism/Buddhist_Perspective_Reviews.md
  section: 二、学佛爱好者视角
- type: concept
  question: 什么是三、佛教学者视角？
  answer: 从佛教研究的学术角度来看，铃木大拙的禅学阐释需要放在特定的历史脉络中理解。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/buddhism/Buddhist_Perspective_Reviews.md
  section: 三、佛教学者视角
- type: concept
  question: 什么是主题：铃木大拙 (D.T. Suzuki) — 禅与日本文化？
  answer: 铃木大拙（1870–1966）是二十世纪最具国际影响力的日本佛教思想家之一。他以英文向西方世界系统介绍禅宗，深刻影响了垮掉的一代、深度生态学乃至现代心理学。代表作包括《禅宗导论》《禅与日本文化》《禅佛教随笔》等。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/buddhism/Multi_Perspective_Reviews.md
  section: 主题：铃木大拙 (D.T. Suzuki) — 禅与日本文化
- type: concept
  question: 什么是一、专业书评人视角？
  answer: 铃木大拙的著作在跨文化传播史上占据独特位置。从书评角度来看，他的写作兼具学术性与文学性，这是极少见的组合。《禅与日本文化》以优雅的英文将禅与剑道、茶道、俳句等文化实践勾连起来，为西方读者提供了一幅完整的"禅意日本"图景。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/buddhism/Multi_Perspective_Reviews.md
  section: 一、专业书评人视角
- type: concept
  question: 什么是二、哲学爱好者视角？
  answer: 作为哲学爱好者，读铃木大拙最大的感受是"醍醐灌顶"。他用极其简洁的语言——有时候近乎文学化的笔触——传达了禅的核心体验：非二元、当下、直指人心。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/buddhism/Multi_Perspective_Reviews.md
  section: 二、哲学爱好者视角
- type: concept
  question: 什么是三、哲学学者视角？
  answer: 从学术哲学的角度审视铃木大拙，需要同时承认他的开创性贡献与严重的学术局限。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/buddhism/Multi_Perspective_Reviews.md
  section: 三、哲学学者视角
- type: concept
  question: 禅的直觉的核心要点是什么？
  answer: '原文: **Zen Intuition**；解释: 超越逻辑思维的直接领悟，瞬间的觉悟体验。；影响: 为西方理解东方智慧提供了重要的阐释框架。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/buddhism/Suzuki.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 不立文字的核心要点是什么？
  answer: '原文: **No Dependency on Words**；解释: 真理超越语言文字，需要直接体验才能把握。；影响: 影响了现代对语言局限性的哲学思考。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/buddhism/Suzuki.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 公案研究的核心要点是什么？
  answer: '原文: **Koan Study**；解释: 通过矛盾性问题打破常规思维模式，激发创造性洞察。；影响: 为现代创造性思维训练提供了方法论启示。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/buddhism/Suzuki.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《禅学入门》(Introduction to Zen Buddhism)的核心要点是什么？
  answer: '出版年份: 1934年；核心内容: 系统介绍禅宗历史、思想和修行方法；重要性: 西方了解禅宗的经典入门读物'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/buddhism/Suzuki.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《禅与日本文化》(Zen and Japanese Culture)的核心要点是什么？
  answer: '出版年份: 1938年；核心内容: 探讨禅宗对日本文化艺术的深刻影响；重要性: 文化哲学和比较文化研究的重要文献'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/buddhism/Suzuki.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《禅宗三柱》(The Three Pillars of Zen)的核心要点是什么？
  answer: '出版年份: 1960年；核心内容: 阐述信心、理解、修行的禅宗核心要素；重要性: 禅宗修行的系统指导手册'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/buddhism/Suzuki.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **早期学习**：在镰仓圆觉寺学习禅宗，接受严格的传统训练

    - **西方接触**：在美国哥伦比亚大学学习，开始东西方思想对话

    - **学术生涯**：长期在欧美大学任教，传播禅宗思想

    - **著作丰硕**：用英文撰写大量禅宗研究著作，影响深远

    - **文化使者**：成为东西方文化交流的重要桥梁人物'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/buddhism/Suzuki.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 意识研究的核心要点是什么？
  answer: '关联概念: 禅的直觉；实践方法: 通过冥想训练开发非概念性认知能力；现代应用: 认知科学和意识研究'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/buddhism/Suzuki.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 什么是主题：家永三郎的和平主义 vs 佛教和平主义；历史反思 vs 正念？
  answer: 家永三郎以历史学家的身份践行和平主义，与佛教的和平传统有何异同？历史反思能否被视为一种"世俗正念"？
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/historiography/Buddhist_Perspective_Reviews.md
  section: 主题：家永三郎的和平主义 vs 佛教和平主义；历史反思 vs 正念
- type: concept
  question: 什么是一、专业书评人视角？
  answer: 家永三郎的和平主义史学与佛教和平主义传统之间存在着有趣的平行与差异。从平行面看，两者都强调"如实观照"——家永坚持历史事实的客观呈现，佛教强调"如实知见"（yathābhūta-ñāṇadassana）对缘起实相的洞察。在方法上，两者都要求放下自我执取：历史学家需要克服民族自恋，佛教修行者需要克服我执。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/historiography/Buddhist_Perspective_Reviews.md
  section: 一、专业书评人视角
- type: concept
  question: 什么是二、学佛爱好者视角？
  answer: 作为一个学佛者读家永三郎，最深的感触是他对"如实面对历史"的坚持与佛教"正念"修行之间的深层呼应。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/historiography/Buddhist_Perspective_Reviews.md
  section: 二、学佛爱好者视角
- type: concept
  question: 什么是三、佛教学者视角？
  answer: 从佛教研究的学术视角看，家永三郎的史学实践提出了一个重要的理论问题：佛教的"历史反思"应当是什么形态？
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/historiography/Buddhist_Perspective_Reviews.md
  section: 三、佛教学者视角
- type: concept
  question: 历史真实的核心要点是什么？
  answer: '日语: **歴史の真実** (*Rekishi no Shinjitsu*)；解释: 历史叙述必须忠实于事实真相，拒绝政治干预。；影响: 确立了日本史学的客观性和独立性原则。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/historiography/Ienaga.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 和平主义史观的核心要点是什么？
  answer: '日语: **平和主義史観** (*Heiwashugi Shikan*)；解释: 从和平主义立场重新审视战争和历史事件。；影响: 开创了批判性的战争史研究传统。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/historiography/Ienaga.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 教育良心的核心要点是什么？
  answer: '日语: **教育の良心** (*Kyōiku no Ryōshin*)；解释: 教育工作者应坚持学术良心，抵制不当政治压力。；影响: 为教育工作者树立了道德标杆。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/historiography/Ienaga.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《太平洋战争史》的核心要点是什么？
  answer: '日语标题: **太平洋戦争史** (*Taiheiyō Sensōshi*)；出版年份: 1969年；内容概要: 客观记录太平洋战争全过程，着重分析战争责任。；学术价值: 日本战争史研究的权威著作。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/historiography/Ienaga.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《日本史》的核心要点是什么？
  answer: '日语标题: **日本史** (*Nihonshi*)；出版年份: 1977年；内容概要: 从批判视角重新书写日本历史，强调民众史观。；学术价值: 影响深远的历史教科书，多次修订出版。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/historiography/Ienaga.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《南京大屠杀》的核心要点是什么？
  answer: '日语标题: **南京虐殺** (*Nankin Gyakusatsu*)；出版年份: 1987年；内容概要: 基于史料考证南京大屠杀的历史真相。；学术价值: 侵华日军暴行研究的重要文献。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/historiography/Ienaga.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **早期教育**：东京帝国大学东洋史学专业毕业

    - **战时经历**：亲身经历战争，形成强烈的反战思想

    - **教科书诉讼**：为历史真实性与政府进行长达30年的法律斗争

    - **学术坚持**：始终坚持史学的客观性和独立性原则

    - **公民教育**：致力于通过历史教育培养公民意识'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/historiography/Ienaga.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 创伤历史研究的核心要点是什么？
  answer: '关联概念: 历史真实原则；实践方法: 通过历史真相促进集体创伤的认知和疗愈；现代应用: 历史创伤治疗'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/historiography/Ienaga.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 什么是主题：家永三郎 (Ienaga Saburō) — 《日本文化史》、历史教育斗争、和平主义史学？
  answer: 家永三郎（1913–2002）是日本最具良知的历史学家之一。他以学术为战场，通过三次"家永诉讼"挑战日本政府对历史教科书的审查制度，捍卫了学术自由与历史真相。其代表作《日本文化史》是理解日本精神史的必读之作。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/historiography/Multi_Perspective_Reviews.md
  section: 主题：家永三郎 (Ienaga Saburō) — 《日本文化史》、历史教育斗争、和平主义史学
- type: concept
  question: 什么是一、专业书评人视角？
  answer: 家永三郎的《日本文化史》是一部兼具学术深度与叙事魅力的作品。与一般通史类著作不同，家永选择以"文化"为线索，将日本从古代到近现代的精神演变呈现为一条有内在逻辑的思想长河。他对佛教传入、儒学接受、国学运动的叙述尤其精彩，展现了外来思想与本土传统之间的张力与融合。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/historiography/Multi_Perspective_Reviews.md
  section: 一、专业书评人视角
- type: concept
  question: 什么是二、哲学爱好者视角？
  answer: 读家永三郎，最大的震撼来自他对"历史与道德"关系的坚持。在很多历史学家追求"价值中立"的时代，家永明确主张：历史写作不可能也不应该回避道德判断。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/historiography/Multi_Perspective_Reviews.md
  section: 二、哲学爱好者视角
- type: concept
  question: 什么是三、哲学学者视角？
  answer: 家永三郎的史学思想值得从哲学角度深入审视。他的方法论立场可以概括为"批判的实在论"——他相信历史事实是客观存在的，而历史学家的责任就是尽可能忠实地呈现这些事实，同时对它们进行道德上的反思。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/historiography/Multi_Perspective_Reviews.md
  section: 三、哲学学者视角
- type: concept
  question: 用西方哲学框架表达佛教"是否扭曲了佛教？的核心要点是什么？
  answer: '批评方: 传统佛教学者认为佛教有自己的概念体系，不需要西方框架；京都学派的回应: 佛教思想必须在当代语境中重新表达才能保持生命力'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/kyoto-school/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 纯粹经验"是否真的是"无我"？的核心要点是什么？
  answer: '批评方: "纯粹经验"仍隐含一个"体验者"；京都学派的回应: 纯粹经验恰恰是体验者与被体验者消融的状态'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/kyoto-school/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 京都学派是否是"哲学"还是"宗教"？的核心要点是什么？
  answer: '批评方: 西方哲学界质疑其论证的严谨性；京都学派的回应: 它试图超越"哲学vs宗教"的二元对立'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/kyoto-school/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 场所逻辑的核心要点是什么？
  answer: '原文: **Basho Logic/Place Logic**；解释: 现象发生的场所是绝对的，超越主客二元对立。；影响: 开创了独特的日本哲学方法论，影响了现代日本思想。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/kyoto-school/Nishida.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 纯经验的核心要点是什么？
  answer: '原文: **Pure Experience**；解释: 未被概念分割的直接经验，是认识的原初状态。；影响: 为现代现象学和意识研究提供了东方视角。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/kyoto-school/Nishida.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 绝对无的核心要点是什么？
  answer: '原文: **Absolute Nothingness**；解释: 通过否定达到的绝对肯定，空性的积极意义。；影响: 整合了佛教空观与西方哲学的创新概念。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/kyoto-school/Nishida.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《善的研究》(Study of Good)的核心要点是什么？
  answer: '出版年份: 1911年；核心内容: 系统阐述场所逻辑和纯经验理论；重要性: 西田哲学的奠基之作，日本现代哲学的里程碑'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/kyoto-school/Nishida.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《从动的要求看自觉》(Intelligibility and the Philosophy of Nothingness)的核心要点是什么？
  answer: '出版年份: 1949年；核心内容: 发展绝对无概念，探讨存在与虚无的关系；重要性: 京都学派哲学的成熟表达'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/kyoto-school/Nishida.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《场所与自我规定》(Place and Self-Determination)的核心要点是什么？
  answer: '出版年份: 1950年；核心内容: 深化场所理论，探讨主体性的哲学基础；重要性: 体现了西田思想的后期发展'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/kyoto-school/Nishida.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **早期学习**：在京都帝国大学学习哲学，接触西方哲学和佛教思想

    - **思想融合**：尝试整合德国唯心主义、现象学与东方佛教智慧

    - **学术创新**：提出场所逻辑，开创独特的日本哲学方法论

    - **学派建立**：形成京都学派，培养众多杰出哲学家弟子

    - **后期发展**：深化绝对无理论，关注战争与和平的哲学思考'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/kyoto-school/Nishida.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 意识研究的核心要点是什么？
  answer: '关联概念: 纯经验理论；实践方法: 理解直接经验的心理结构和认知机制；现代应用: 认知科学和意识研究'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/kyoto-school/Nishida.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 什么是主题："间"(aidā) vs "空"(śūnyatā)；风土哲学 vs 缘起；和辻对佛教的理解？
  answer: 和辻哲郎不仅是风土哲学的创始人，还是日本现代哲学家中对佛教研究最深的一位。他早年著有《原始佛教的实践哲学》，对佛教有深入的理解。本篇从佛教视角审视其哲学。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/watsuji/Buddhist_Perspective_Reviews.md
  section: 主题："间"(aidā) vs "空"(śūnyatā)；风土哲学 vs 缘起；和辻对佛教的理解
- type: concept
  question: 什么是一、专业书评人视角？
  answer: 和辻哲郎与佛教的关系是多层次的：他既是佛教的研究者，又是佛教的批判者，最终又是以哲学方式重新吸收佛教思想的创造者。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/watsuji/Buddhist_Perspective_Reviews.md
  section: 一、专业书评人视角
- type: concept
  question: 什么是二、学佛爱好者视角？
  answer: 作为一个对佛法有实践兴趣的读者，读和辻哲郎的体验是既亲切又疏离。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/watsuji/Buddhist_Perspective_Reviews.md
  section: 二、学佛爱好者视角
- type: concept
  question: 什么是三、佛教学者视角？
  answer: 从佛教学术的角度看，和辻哲郎与佛教的关系需要放在更广阔的思想史脉络中理解。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/watsuji/Buddhist_Perspective_Reviews.md
  section: 三、佛教学者视角
- type: concept
  question: 什么是主题：和辻哲郎 (Watsuji Tetsurō) — 《风土》《伦理学》、"间"(aida)的概念、风土哲学？
  answer: 和辻哲郎（1889–1960）是日本最具原创性的哲学家之一，京都学派的重要成员（虽然他与西田几多郎的关系复杂）。他的核心贡献在于以"风土"和"间"（aidā）两个概念重新思考人与环境、个体与他者的关系。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/watsuji/Multi_Perspective_Reviews.md
  section: 主题：和辻哲郎 (Watsuji Tetsurō) — 《风土》《伦理学》、"间"(aida)的概念、风土哲学
- type: concept
  question: 什么是一、专业书评人视角？
  answer: 和辻哲郎的《风土》（1935）是二十世纪日本哲学最具可读性的著作之一。他在书中将世界文化分为季风型、沙漠型和牧场型三种风土类型，并论证了不同风土如何塑造了不同的文化性格与精神气质。这一框架虽然不免有过度概括之嫌，但在比较文化研究领域提出了一个极具启发性的问题：自然环境如何深刻地塑造人类的精神世界？
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/watsuji/Multi_Perspective_Reviews.md
  section: 一、专业书评人视角
- type: concept
  question: 什么是二、哲学爱好者视角？
  answer: 初读和辻哲郎，最容易被打动的就是"间"这个概念。在西方哲学中，我们习惯了从"个体"出发思考一切——个体的自由、个体的权利、个体的存在。和辻却告诉我们：个体本身就是一个抽象，真正具体的人总是"在之间"存在的。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/watsuji/Multi_Perspective_Reviews.md
  section: 二、哲学爱好者视角
- type: concept
  question: 什么是三、哲学学者视角？
  answer: 和辻哲郎的哲学在学术上需要被置于京都学派与德国哲学的双重语境中理解。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/watsuji/Multi_Perspective_Reviews.md
  section: 三、哲学学者视角
- type: concept
  question: 人间关系的核心要点是什么？
  answer: '日语: **人間関係** (*Ningen Kankei*)；解释: 人与人之间的伦理关系构成了人的本质存在。；影响: 奠定了日本存在主义伦理学的基础，影响现代日本伦理思想。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/watsuji/Watsuji.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 风土论的核心要点是什么？
  answer: '日语: **風土論** (*Fūdo Ron*)；解释: 地理环境和气候条件塑造了民族文化性格和哲学思维。；影响: 开创了文化哲学的新视角，将地理因素纳入哲学分析。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/watsuji/Watsuji.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 场所逻辑的核心要点是什么？
  answer: '日语: **場所の論理** (*Basho no Ronri*)；解释: 真理存在于具体的场所和情境中，而非抽象的普遍性。；影响: 挑战西方抽象理性主义，强调具体性和情境性。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/watsuji/Watsuji.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《伦理学》的核心要点是什么？
  answer: '日语标题: **倫理学** (*Rinrigaku*)；出版年份: 1934年；内容概要: 系统阐述基于人际关系的伦理学体系，批判西方个人主义伦理。；学术价值: 日本现代伦理学的奠基之作，影响深远。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/watsuji/Watsuji.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《风土》的核心要点是什么？
  answer: '日语标题: **風土** (*Fūdo*)；出版年份: 1935年；内容概要: 分析地理环境对民族文化和哲学思维的影响。；学术价值: 文化哲学和比较哲学的经典文献。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/watsuji/Watsuji.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《锁国日本的文化》的核心要点是什么？
  answer: '日语标题: **鎖国日本の文化** (*Sakoku Nihon no Bunka*)；出版年份: 1941年；内容概要: 探讨江户时代锁国政策对日本文化发展的影响。；学术价值: 日本文化史研究的重要著作。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/watsuji/Watsuji.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **早期学习**：东京帝国大学哲学系毕业，深受西田幾多郎影响

    - **欧洲留学**：在德国和法国学习西方哲学，接触存在主义和现象学

    - **思想融合**：将西方哲学与中国、日本传统思想相结合

    - **京都学派**：成为京都学派第二代核心成员

    - **战后反思**：对日本军国主义进行深刻反思，重建伦理学体系'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/watsuji/Watsuji.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 人际关系治疗的核心要点是什么？
  answer: '关联概念: 人间关系理论；实践方法: 重视治疗中的人际互动和关系建立；现代应用: 人际关系疗法和团体治疗'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/japan/watsuji/Watsuji.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 什么是主题：韩国儒佛之争的历史；退溪/栗谷对佛教的批判；从佛教视角看"主敬"修养？
  answer: 韩国儒学与佛教的关系是东亚思想史中最激烈的儒佛互动之一。从新罗、高丽的佛教鼎盛到朝鲜王朝的崇儒抑佛，韩国思想史经历了剧烈的转折。退溪与栗谷作为朝鲜儒学的巅峰人物，对佛教都有深刻的批判。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/korea/confucianism/Buddhist_Perspective_Reviews.md
  section: 主题：韩国儒佛之争的历史；退溪/栗谷对佛教的批判；从佛教视角看"主敬"修养
- type: concept
  question: 什么是一、专业书评人视角？
  answer: 韩国的儒佛之争有其独特的历史脉络。在高丽王朝时期，佛教是国教，僧侣享有崇高的社会地位。但到了高丽末期，佛教界的腐败引发了知识精英的不满，以郑道传为代表的改革者积极推动"斥佛扬儒"。朝鲜建国后，儒学成为官方意识形态，佛教遭到系统性压制。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/korea/confucianism/Buddhist_Perspective_Reviews.md
  section: 一、专业书评人视角
- type: concept
  question: 什么是二、学佛爱好者视角？
  answer: 作为学佛者读韩国儒学，最强烈的感受是：退溪和栗谷对佛教的批判，很多是基于对佛教的误解。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/korea/confucianism/Buddhist_Perspective_Reviews.md
  section: 二、学佛爱好者视角
- type: concept
  question: 什么是三、佛教学者视角？
  answer: 从佛教学术的角度审视韩国儒佛之争，需要超越简单的对错判断，进入更深层的思想结构分析。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/korea/confucianism/Buddhist_Perspective_Reviews.md
  section: 三、佛教学者视角
- type: concept
  question: 什么是内容索引 | Contents？
  answer: '- [YiHwang](YiHwang.md)

    - [YiI](YiI.md)'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/korea/confucianism/INDEX.md
  section: 内容索引 | Contents
- type: concept
  question: 什么是主题：李滉（退溪）与李珥（栗谷）— 韩国儒学双璧、理气四七之辩？
  answer: 李滉（1501–1570，号退溪）与李珥（1536–1584，号栗谷）是朝鲜王朝最伟大的两位儒学家。他们的思想辩论——尤其是关于"四端"与"七情"孰主孰从的争论——构成了韩国儒学史上最精彩的篇章，也使韩国儒学在整个东亚儒学传统中占据了独特的理论高度。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/korea/confucianism/Multi_Perspective_Reviews.md
  section: 主题：李滉（退溪）与李珥（栗谷）— 韩国儒学双璧、理气四七之辩
- type: concept
  question: 什么是一、专业书评人视角？
  answer: 退溪与栗谷的思想对话是东亚儒学史上一座丰碑。两人的核心分歧在于对"四端"（恻隐、羞恶、辞让、是非）与"七情"（喜、怒、哀、惧、爱、恶、欲）关系的理解。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/korea/confucianism/Multi_Perspective_Reviews.md
  section: 一、专业书评人视角
- type: concept
  question: 什么是二、哲学爱好者视角？
  answer: 读退溪与栗谷的辩论，最令人印象深刻的不是结论，而是辩论本身所展现的思想热情与严谨精神。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/korea/confucianism/Multi_Perspective_Reviews.md
  section: 二、哲学爱好者视角
- type: concept
  question: 什么是三、哲学学者视角？
  answer: 退溪与栗谷的理气四七之辩需要放在整个东亚儒学的学术脉络中才能充分理解其意义。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/korea/confucianism/Multi_Perspective_Reviews.md
  section: 三、哲学学者视角
- type: concept
  question: 理气二元论的核心要点是什么？
  answer: '韩语: **이기이원론** (*Igi-iwonron*)；解释: 理(形而上原理)与气(形而下材质)是构成宇宙的两个基本要素。；影响: 奠定了朝鲜朱子学的理论基础，影响东亚儒学发展。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/korea/confucianism/YiHwang.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 主理主义的核心要点是什么？
  answer: '韩语: **주리주의** (*Juri-juui*)；解释: 理是宇宙的根本原理，气只是理的表现形式。；影响: 确立了朝鲜儒学中理学派的主导地位。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/korea/confucianism/YiHwang.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 四端七情论的核心要点是什么？
  answer: '韩语: **사단칠정론** (*Sadanchiljeongron*)；解释: 四端(仁义礼智)发于理，七情(喜怒哀惧爱恶欲)发于气。；影响: 系统阐述了人性论和情感理论，影响朝鲜心性学。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/korea/confucianism/YiHwang.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《退溪集》的核心要点是什么？
  answer: '韩语标题: **퇴계집** (*Toegye-jip*)；写作时期: 16世纪；内容概要: 收录李滉的主要哲学著作和书信往来。；学术价值: 朝鲜儒学最重要的文献汇编。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/korea/confucianism/YiHwang.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《圣学十图》的核心要点是什么？
  answer: '韩语标题: **성학십도** (*Seonghak-sip-do*)；写作时期: 1560年代；内容概要: 以图解方式阐述儒学核心概念和修养方法。；学术价值: 儒学教育的经典教材，影响深远。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/korea/confucianism/YiHwang.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《朱子学的展开》的核心要点是什么？
  answer: '韩语标题: **주자학의전개** (*Jujahak-ui jeongae*)；写作时期: 晚年；内容概要: 系统整理和发展朱熹的理学思想。；学术价值: 朝鲜朱子学的集大成之作。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/korea/confucianism/YiHwang.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **早期学习**：出身贵族家庭，接受传统儒学教育

    - **学术转向**：深入研究朱熹理学，形成独特的哲学体系

    - **书院创办**：创办陶山书院，培养大批儒学人才

    - **朝廷任职**：多次在朝为官，但因政治斗争屡遭贬谪

    - **学术传承**：建立退溪学派，影响朝鲜儒学数百年'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/korea/confucianism/YiHwang.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 人格发展的核心要点是什么？
  answer: '关联概念: 理气二元论；实践方法: 理解人格中的理性与感性双重结构；现代应用: 人格心理学和自我认知'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/korea/confucianism/YiHwang.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 气一元论的核心要点是什么？
  answer: '韩语: **기일원론** (*Gi-ilwonron*)；解释: 气是构成宇宙的唯一本原，理存在于气之中。；影响: 提出了与退溪李滉不同的宇宙论观点，丰富了朝鲜儒学。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/korea/confucianism/YiI.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 四端七情论的核心要点是什么？
  answer: '韩语: **사단칠정론** (*Sadanchiljeongron*)；解释: 四端七情都发于气，但在本质上有所区别。；影响: 发展了情感理论，深化了心性学研究。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/korea/confucianism/YiI.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 经世致用的核心要点是什么？
  answer: '韩语: **경세치용** (*Gyengse-chiyong*)；解释: 学以致用，将儒学理论应用于社会治理和民生改善。；影响: 开创了朝鲜实学的先河，影响后世经世学派。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/korea/confucianism/YiI.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《栗谷全书》的核心要点是什么？
  answer: '韩语标题: **율곡전서** (*Yulgok Jeonseo*)；写作时期: 16世纪末；内容概要: 收录李珥的主要哲学、政治、经济著作。；学术价值: 朝鲜实学思想的重要文献汇编。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/korea/confucianism/YiI.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《经筵日记》的核心要点是什么？
  answer: '韩语标题: **경연일기** (*Gyeongyeon Ilgi*)；写作时期: 1570年代；内容概要: 记录在经筵讲学时的政治见解和社会改革建议。；学术价值: 了解其政治思想和经世理念的重要资料。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/korea/confucianism/YiI.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《圣学辑要》的核心要点是什么？
  answer: '韩语标题: **성학집요** (*Seonghak Jipyo*)；写作时期: 晚年；内容概要: 整理儒学核心思想，强调实用性和可操作性。；学术价值: 儒学通俗化和实用化的代表作。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/korea/confucianism/YiI.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **学术背景**：出身书香门第，自幼聪颖好学

    - **理论创新**：在继承朱子学基础上，提出气一元论的独特观点

    - **政治参与**：积极参与政治改革，提出多项惠民政策

    - **学术辩论**：与退溪李滉就理气关系展开学术争论

    - **教育事业**：致力于教育普及和社会教化工作'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/korea/confucianism/YiI.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 实用心理学的核心要点是什么？
  answer: '关联概念: 经世致用思想；实践方法: 将心理学理论应用于实际问题解决；现代应用: 应用心理学和社会心理学'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/korea/confucianism/YiI.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 第一：格物的核心要点是什么？
  answer: '原文术语: **Ge Wu**；认知/行为要求: 穷究事物的原理，客观观察。；现代应用: 事实核对、CBT 中的客观化。；专家解析: 第一步是打破主观妄想，直面事实。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/overview/Philosophy_Eastern_Classical_Confucianism.md
  section: II. The "Great Learning" Protocol (大学修持阶次图)
- type: concept
  question: 第二：致知的核心要点是什么？
  answer: '原文术语: **Zhi Zhi**；认知/行为要求: 扩充知识，达成认知的清晰。；现代应用: 深入理解因果链条。；专家解析: 在格物的基础上形成洞见。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/overview/Philosophy_Eastern_Classical_Confucianism.md
  section: II. The "Great Learning" Protocol (大学修持阶次图)
- type: concept
  question: 第三：诚意的核心要点是什么？
  answer: '原文术语: **Cheng Yi**；认知/行为要求: 使动机纯粹，不自欺。；现代应用: 解决内在冲突，达成一致。；专家解析: 特别强调“慎独”：在无人处也保持真实。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/overview/Philosophy_Eastern_Classical_Confucianism.md
  section: II. The "Great Learning" Protocol (大学修持阶次图)
- type: concept
  question: 懦弱 (Cowardice)的核心要点是什么？
  answer: '中道 (The Mean - Zhongyong): **勇敢 (Yong)**；极端 B (Excess): 鲁莽 (Rashness)；调节逻辑 (Regulative Logic): 义之理也。；专家视角: 勇敢是经过理性调适的恐惧。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/overview/Philosophy_Eastern_Classical_Confucianism.md
  section: III. The Psychology of "Zhongyong" (中庸心理学：动态平衡矩阵)
- type: concept
  question: 刻薄 (Niggardliness)的核心要点是什么？
  answer: '中道 (The Mean - Zhongyong): **宽厚 (Shu)**；极端 B (Excess): 纵容 (Leniency)；调节逻辑 (Regulative Logic): 仁之推也。；专家视角: 推己及人，但保留底线。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/overview/Philosophy_Eastern_Classical_Confucianism.md
  section: III. The Psychology of "Zhongyong" (中庸心理学：动态平衡矩阵)
- type: concept
  question: 呆滞 (Dullness)的核心要点是什么？
  answer: '中道 (The Mean - Zhongyong): **敏捷 (Min)**；极端 B (Excess): 浮躁 (Impatience)；调节逻辑 (Regulative Logic): 时中 (Timeliness)。；专家视角:
    在合适的时间做合宜的事。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/overview/Philosophy_Eastern_Classical_Confucianism.md
  section: III. The Psychology of "Zhongyong" (中庸心理学：动态平衡矩阵)
- type: concept
  question: 主一的核心要点是什么？
  answer: '术语 (Term): **Zhu Yi**；具体操作: 意念集中于一处，无杂念。；心理/生理效应: 提高专注力，进入流向状态。；专家建议: 朱熹倡导的：整容端坐，心不外驰。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/overview/Philosophy_Eastern_Classical_Confucianism.md
  section: 'IV. Confucian Meditation: Jing-Zuo & Shen-Du (儒家冥想：静坐与慎独)'
- type: concept
  question: 整齐严肃的核心要点是什么？
  answer: '术语 (Term): **Zheng Qi Yan Su**；具体操作: 仪态的庄重反向影响心智。；心理/生理效应: 通过生理调节心理（Bottom-up）。；专家建议: 姿势即意志。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/overview/Philosophy_Eastern_Classical_Confucianism.md
  section: 'IV. Confucian Meditation: Jing-Zuo & Shen-Du (儒家冥想：静坐与慎独)'
- type: concept
  question: 什么是主题：越南儒佛共存传统；阮廌时代的儒佛关系；一行禅师与越南佛教的人间性？
  answer: 越南是东亚世界中儒佛关系最为和谐的地区之一。与韩国的"崇儒抑佛"和日本的"神佛儒分离"不同，越南发展出了一种独特的"儒佛共存"传统，许多知识分子同时接受儒学和佛教的教育。这种传统为理解阮廌的思想提供了一个重要的宗教文化背景。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/vietnam/confucianism/Buddhist_Perspective_Reviews.md
  section: 主题：越南儒佛共存传统；阮廌时代的儒佛关系；一行禅师与越南佛教的人间性
- type: concept
  question: 什么是一、专业书评人视角？
  answer: 越南的儒佛关系有其独特的历史根源。在越南独立之前的一千年"北属时期"，佛教是越南知识分子对抗中国文化同化的重要精神资源。越南佛教的早期高僧如毗尼多流支（Vinitaruci）将禅宗传入越南，比达摩到中国还早。这使得佛教在越南不仅是宗教信仰，更是民族文化认同的一部分。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/vietnam/confucianism/Buddhist_Perspective_Reviews.md
  section: 一、专业书评人视角
- type: concept
  question: 什么是二、学佛爱好者视角？
  answer: 作为学佛者，越南的儒佛共存传统令人深思。在大多数东亚社会中，儒学与佛教的关系是竞争性的，但在越南，两者更像互补。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/vietnam/confucianism/Buddhist_Perspective_Reviews.md
  section: 二、学佛爱好者视角
- type: concept
  question: 什么是三、佛教学者视角？
  answer: 从佛教学术的角度看，越南儒佛共存传统提出了一个重要的理论问题：佛教与儒学的"和谐共存"究竟是一种深层的思想融合，还是仅仅是实用主义的妥协？
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/vietnam/confucianism/Buddhist_Perspective_Reviews.md
  section: 三、佛教学者视角
- type: concept
  question: 什么是主题：阮廌 (Nguyễn Trãi) — 《平吴大诰》、越南儒学独立传统、爱国主义与儒学？
  answer: 阮廌（1380–1442）是越南历史上最伟大的政治家、军事战略家和文学家之一。他辅佐黎利击败明朝占领军，建立后黎朝，其《平吴大诰》被誉为越南的"独立宣言"。阮廌的思想代表了越南儒学的独特传统：将儒家的仁政理想与民族独立的实践紧密结合。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/vietnam/confucianism/Multi_Perspective_Reviews.md
  section: 主题：阮廌 (Nguyễn Trãi) — 《平吴大诰》、越南儒学独立传统、爱国主义与儒学
- type: concept
  question: 什么是一、专业书评人视角？
  answer: 阮廌的《平吴大评》是越南文学史和思想史上的里程碑。这篇文章以骈文写成，气势磅礴地宣告了越南独立的合法性：越南"自尧舜以来即为南国"，有独立的文化传统和政治主权，明朝的占领是对天理的违背。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/vietnam/confucianism/Multi_Perspective_Reviews.md
  section: 一、专业书评人视角
- type: concept
  question: 什么是三、哲学学者视角？
  answer: 阮廌的思想在东亚儒学的比较研究中占据一个独特位置，因为它代表了儒学在"边缘"地区的创造性转化。
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/vietnam/confucianism/Multi_Perspective_Reviews.md
  section: 三、哲学学者视角
- type: concept
  question: 民本思想的核心要点是什么？
  answer: '越南语: **Dân bản tư tưởng**；解释: 以人民为国家的根本，君主应以民为本。；影响: 奠定了越南政治哲学中民本主义的基础。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/vietnam/confucianism/NguyenTrai.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 儒佛融合的核心要点是什么？
  answer: '越南语: **Nho Phật dung hợp**；解释: 将儒家伦理与佛教慈悲精神相结合。；影响: 开创了越南独特的文化融合传统。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/vietnam/confucianism/NguyenTrai.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 和平主义的核心要点是什么？
  answer: '越南语: **Chủ nghĩa hòa bình**；解释: 通过文德感化而非武力征服实现国家统一。；影响: 影响了越南外交和军事思想的发展。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/vietnam/confucianism/NguyenTrai.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《平吴大诰》的核心要点是什么？
  answer: '越南语标题: **Bình Ngô đại cáo**；写作时期: 1428年；内容概要: 宣告越南从明朝统治下获得独立的政治宣言。；学术价值: 越南政治文献的经典之作，体现民族独立精神。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/vietnam/confucianism/NguyenTrai.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《抑斋诗集》的核心要点是什么？
  answer: '越南语标题: **Ức Trai thi tập**；写作时期: 15世纪；内容概要: 收录反映儒家思想和爱国情怀的诗歌作品。；学术价值: 越南汉诗的重要代表，文学与哲学并重。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/vietnam/confucianism/NguyenTrai.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《军中词命集》的核心要点是什么？
  answer: '越南语标题: **Quân trung từ mệnh tập**；写作时期: 1427年；内容概要: 军事文书汇编，体现儒将的治军理念。；学术价值: 军事哲学和政治修辞学的重要文献。'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/vietnam/confucianism/NguyenTrai.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **文化背景**：出身书香门第，接受深厚的中华传统文化教育

    - **政治实践**：辅佐黎利抗明，参与越南独立战争的策划和实施

    - **学术融合**：在儒家思想基础上融入佛教和本土文化元素

    - **文学成就**：既是政治家也是文学家，诗文并茂

    - **历史地位**：被越南后世尊为民族英雄和文化巨人'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/vietnam/confucianism/NguyenTrai.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 爱国主义教育的核心要点是什么？
  answer: '关联概念: 民族独立精神；实践方法: 培养民族自豪感和文化认同；现代应用: 民族心理建设和文化自信'
  source: 01-Wisdom-Traditions/philosophy/east-asian-philosophy/vietnam/confucianism/NguyenTrai.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 神我的核心要点是什么？
  answer: '梵文 (Sanskrit): **Purusha**；哲学定义: 纯粹意识、见者、永恒不变的主体。；心理/能量意义: 不动、不参与、照明。；专家建议 (Expert Perspective): 对应的就是“觉知”本身，它不参与物质演化。'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/Philosophy_Eastern_Indian_Schools.md
  section: 'I. Samkhya: The Dualistic Cosmology (数论派：二元论宇宙观详表)'
- type: concept
  question: 原质的核心要点是什么？
  answer: '梵文 (Sanskrit): **Prakriti**；哲学定义: 原始物质、显现、变动不居的根因。；心理/能量意义: 所有的念头、情绪、身体感受皆在此。；专家建议 (Expert Perspective): 它是物质世界的潜能态，具有三种性质
    (Gunas)。'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/Philosophy_Eastern_Indian_Schools.md
  section: 'I. Samkhya: The Dualistic Cosmology (数论派：二元论宇宙观详表)'
- type: concept
  question: 三德的核心要点是什么？
  answer: '梵文 (Sanskrit): **Gunas**；哲学定义: 萨埵 (Sattva/明)、罗阇 (Rajas/动)、答摩 (Tamas/暗)。；心理/能量意义: 控制心智波动的三个维度。；专家建议 (Expert Perspective):
    临床上可视为：清晰态、激越态、迟钝态。'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/Philosophy_Eastern_Indian_Schools.md
  section: 'I. Samkhya: The Dualistic Cosmology (数论派：二元论宇宙观详表)'
- type: concept
  question: 量论的核心要点是什么？
  answer: '核心概念 (Term): **Pramanas**；具体描述: 获取真知的四种方法：现量、比量、譬喻量、声量。；认知价值: 建立知识的确定性边界。；专家解析: 指向严密、科学的认知过程。'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/Philosophy_Eastern_Indian_Schools.md
  section: 'II. Nyaya & Vaisheshika: Logic & Atomism (正理派与胜论派：逻辑与原子论)'
- type: concept
  question: 五分论证的核心要点是什么？
  answer: '核心概念 (Term): **Syllogism**；具体描述: 宗 (Thesis)、因 (Reason)、喻 (Example)、合 (Application)、结 (Conclusion)。；认知价值: 逻辑推理的闭环训练。；专家解析:
    比亚里士多德三段论多出“实例”，由于它侧重实践。'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/Philosophy_Eastern_Indian_Schools.md
  section: 'II. Nyaya & Vaisheshika: Logic & Atomism (正理派与胜论派：逻辑与原子论)'
- type: concept
  question: 句义的核心要点是什么？
  answer: '核心概念 (Term): **Padartha**；具体描述: 万物的六种范畴：实、德、业、同、异、和合。；认知价值: 世界的分类学、本体论结构。；专家解析: 胜论派的贡献在于其极端的原子论分析。'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/Philosophy_Eastern_Indian_Schools.md
  section: 'II. Nyaya & Vaisheshika: Logic & Atomism (正理派与胜论派：逻辑与原子论)'
- type: concept
  question: 吠陀天启的核心要点是什么？
  answer: '术语 (Term): **Apaurusheyatva**；哲学主张: 圣典非人造，是宇宙原初的振动。；修持意义: 赋予声音、真言 (Mantra) 以客观力量。；专家视角: 重视声音的波动性高于语言的语义性。'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/Philosophy_Eastern_Indian_Schools.md
  section: 'III. Mimamsa: The Philosophy of Ritual & Word (弥曼差：祭祀与言词哲学)'
- type: concept
  question: 劝令词的核心要点是什么？
  answer: '术语 (Term): **Vidhi**；哲学主张: 经文的核心在于指令，而非描述。；修持意义: 强调行动 (Action) 的优先性。；专家视角: 真理不在于“想”，而在于如何“行”。'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/Philosophy_Eastern_Indian_Schools.md
  section: 'III. Mimamsa: The Philosophy of Ritual & Word (弥曼差：祭祀与言词哲学)'
- type: concept
  question: 自我的本质的核心要点是什么？
  answer: '数论(Sāṃkhya): 神我(purusha)——永恒、不变的纯粹意识；佛教(Buddhism): 无我(anātman)——无永恒不变的自我；核心分歧: **根本对立**'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/samkhya/Buddhist_Perspective_Reviews.md
  section: 佛法与数论：核心概念对照表
- type: concept
  question: 物质的本原的核心要点是什么？
  answer: '数论(Sāṃkhya): 自性(prakṛti)——永恒的物质实体；佛教(Buddhism): 缘起(pratītyasamutpāda)——无独立自性；核心分歧: **根本对立**'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/samkhya/Buddhist_Perspective_Reviews.md
  section: 佛法与数论：核心概念对照表
- type: concept
  question: 宇宙生成的核心要点是什么？
  answer: '数论(Sāṃkhya): 因中有果论(satkāryavāda)——果预存于因中；佛教(Buddhism): 缘起论——诸法因缘和合而生；核心分歧: **根本对立**'
  source: 01-Wisdom-Traditions/philosophy/south-asian/india/samkhya/Buddhist_Perspective_Reviews.md
  section: 佛法与数论：核心概念对照表
