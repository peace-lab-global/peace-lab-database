- type: concept
  question: 皈依大礼拜的核心要点是什么？
  answer: '我以前的理解: 对三宝的信仰+锻炼身体；读完这本书后的理解: 皈依是找到方向，礼拜是放下傲慢——你的额头碰到地面的那一刻，"我"也碰到地面了'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/not-for-happiness/Multi_Perspective_Reviews.md
  section: 对四加行的新理解
- type: concept
  question: 金刚萨埵的核心要点是什么？
  answer: '我以前的理解: 忏悔过去做的坏事；读完这本书后的理解: 不是"认罪"，是认识到一切恶业都源于无明——理解了这个，净化自然发生'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/not-for-happiness/Multi_Perspective_Reviews.md
  section: 对四加行的新理解
- type: concept
  question: 曼达供养的核心要点是什么？
  answer: '我以前的理解: 给佛菩萨送礼；读完这本书后的理解: 不是佛菩萨需要你的供养——是你需要通过"给予"来放下"拥有"的执念'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/not-for-happiness/Multi_Perspective_Reviews.md
  section: 对四加行的新理解
- type: concept
  question: 皈依大礼拜的核心要点是什么？
  answer: '主要经典来源: 《普贤上师言教》《大圆满前行》；所属传承侧重: 宁玛/噶举；宗萨仁波切的取径: 侧重皈依的"方向性"含义'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/not-for-happiness/Multi_Perspective_Reviews.md
  section: 四加行的教理溯源
- type: concept
  question: 金刚萨埵的核心要点是什么？
  answer: '主要经典来源: 《金刚萨埵意镜续》；所属传承侧重: 宁玛/萨迦；宗萨仁波切的取径: 侧重"净化"而非"对治"'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/not-for-happiness/Multi_Perspective_Reviews.md
  section: 四加行的教理溯源
- type: concept
  question: 曼达供养的核心要点是什么？
  answer: '主要经典来源: 《时轮续》《密集续》；所属传承侧重: 萨迦/格鲁；宗萨仁波切的取径: 侧重"放下"而非"给予"'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/not-for-happiness/Multi_Perspective_Reviews.md
  section: 四加行的教理溯源
- type: concept
  question: 利/衰的核心要点是什么？
  answer: '人们追逐的: ✓ 追求利益，避免损失；佛法说的: 两者都是无常的'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/not-for-happiness/Multi_Perspective_Reviews.md
  section: '"不是为了快乐"的哲学谱系'
- type: concept
  question: 誉/毁的核心要点是什么？
  answer: '人们追逐的: ✓ 追求赞誉，避免毁谤；佛法说的: 两者都是空的'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/not-for-happiness/Multi_Perspective_Reviews.md
  section: '"不是为了快乐"的哲学谱系'
- type: concept
  question: 什么是一、总体评价？
  answer: 这是一本很小众的书，但可能是所有佛教朝圣指南里最特别的一本。宗萨蒋扬钦哲仁波切不是在写旅游攻略——他是在告诉你：**当你站在佛陀曾经站过的地方时，你的心应该做什么。**
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/pilgrimage/Book_Review.md
  section: 一、总体评价
- type: concept
  question: 蓝毗尼 (Lumbini)的核心要点是什么？
  answer: '事件: 佛陀诞生；佛法意义: 慈悲的起点；宗萨仁波切的特别提示: 想想你自己"诞生"的因缘'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/pilgrimage/Book_Review.md
  section: 四大圣地
- type: concept
  question: 菩提伽耶 (Bodh Gaya)的核心要点是什么？
  answer: '事件: 佛陀证悟；佛法意义: 智慧的巅峰；宗萨仁波切的特别提示: 不要只盯着那棵菩提树，要想想你自己能不能在"那棵树下坐下来"'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/pilgrimage/Book_Review.md
  section: 四大圣地
- type: concept
  question: 鹿野苑 (Sarnath)的核心要点是什么？
  answer: '事件: 初转法轮；佛法意义: 教法的开端；宗萨仁波切的特别提示: 感恩有人愿意把这道理说出来'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/pilgrimage/Book_Review.md
  section: 四大圣地
- type: concept
  question: 忆念佛陀的生平的核心要点是什么？
  answer: '不应该做: 只关注建筑和遗迹；原因: 圣地的价值在于"发生过什么"而不是"还剩什么"'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/pilgrimage/Book_Review.md
  section: 朝圣中应该做的事
- type: concept
  question: 什么是四、推荐指数？
  answer: '**适合人群：**

    - 计划去印度佛教圣地朝圣的人

    - 对佛教圣地有好奇心但暂时无法前往的人（可以"心诚则灵"地虚拟朝圣）

    - 想理解"朝圣"到底意味着什么的佛教徒'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/pilgrimage/Book_Review.md
  section: 四、推荐指数
- type: concept
  question: 作者的核心要点是什么？
  answer: '内容: 宗萨蒋扬钦哲仁波切 (Dzongsar Jamyang Khyentse Rinpoche)'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/pilgrimage/INDEX.md
  section: 基本信息
