- type: concept
  question: Eudaimonia是"包容性"的还是"统治性"的？的核心要点是什么？
  answer: '正方: 包含所有有价值活动的总汇；反方: 以思辨(theōria)为最高活动的单一目标'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Multi_Perspective_Reviews.md
  section: 视角三：哲学学者
- type: concept
  question: 中道"是相对的还是客观的？的核心要点是什么？
  answer: '正方: 因人而异、因情境而异；反方: 有客观标准（理性的人会怎么做）'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Multi_Perspective_Reviews.md
  section: 视角三：哲学学者
- type: concept
  question: 第十卷的"思辨生活"与前九卷的"实践生活"是否矛盾？的核心要点是什么？
  answer: '正方: 不矛盾，思辨是实践的最高形式；反方: 矛盾，亚里士多德在末卷改变了立场'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Multi_Perspective_Reviews.md
  section: 视角三：哲学学者
- type: concept
  question: 理念论的核心要点是什么？
  answer: '原文: **eidos/idea**；解释: 永恒不变的理念是真实的存在，可感世界只是理念的影子。；影响: 奠定了西方形而上学的基础，影响了后来的唯心主义哲学。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Plato.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 回忆说的核心要点是什么？
  answer: '原文: **anamnesis**；解释: 知识是灵魂对前世所知的回忆。；影响: 为先天知识论提供了基础，影响了后来的认识论。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Plato.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 三分灵魂的核心要点是什么？
  answer: '原文: **psyche**；解释: 灵魂由理性、激情和欲望三部分组成。；影响: 建立了心理学的最早模型，影响了后来的人格理论。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Plato.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《申辩篇》(Apology)的核心要点是什么？
  answer: '出版年份: 公元前399年；核心内容: 苏格拉底在审判中的自我辩护；重要性: 记录了苏格拉底的哲学使命和死亡'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Plato.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《克力同篇》(Crito)的核心要点是什么？
  answer: '出版年份: 公元前399年；核心内容: 讨论公民义务和服从法律；重要性: 探讨了个人与国家的关系'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Plato.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《斐多篇》(Phaedo)的核心要点是什么？
  answer: '出版年份: 公元前399年；核心内容: 讨论灵魂不朽；重要性: 阐述了柏拉图的形而上学思想'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Plato.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **早期对话**：主要记录苏格拉底的思想，如《申辩篇》、《克力同篇》

    - **中期对话**：发展出自己的理念论，如《理想国》、《会饮篇》

    - **晚期对话**：对早期思想进行批判和修正，如《巴门尼德篇》、《法律篇》'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Plato.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 认知心理学的核心要点是什么？
  answer: '关联概念: 回忆说；实践方法: 挖掘潜意识中的知识和记忆；现代应用: 精神分析和深度心理学'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Plato.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 太一的核心要点是什么？
  answer: '原文: **The One**；解释: 绝对的一，超越存在和思维的最高本原。；影响: 确立了新柏拉图主义的核心本体论概念。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Plotinus.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 流溢说的核心要点是什么？
  answer: '原文: **Emanation**；解释: 太一流溢出理智、灵魂和物质世界的过程。；影响: 提供了独特的宇宙生成论解释。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Plotinus.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 理智的核心要点是什么？
  answer: '原文: **Nous**；解释: 太一的第一个流溢，包含所有理念的形式。；影响: 连接了柏拉图理念论和新柏拉图主义体系。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Plotinus.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《九章集》(Enneads)的核心要点是什么？
  answer: '成书年代: 3世纪；核心内容: 普罗提诺哲学思想的完整汇编；重要性: 新柏拉图主义的经典文献，共6卷54章'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Plotinus.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《论美》(On Beauty)的核心要点是什么？
  answer: '成书年代: 3世纪；核心内容: 探讨美的本质和审美体验的哲学著作；重要性: 美学理论的重要文献'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Plotinus.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《论灵魂》(On the Soul)的核心要点是什么？
  answer: '成书年代: 3世纪；核心内容: 系统阐述灵魂理论和心理学观点；重要性: 心灵哲学的重要著作'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Plotinus.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **学术背景**：出生于埃及，师从阿摩尼乌斯·萨卡斯学习哲学

    - **思想融合**：综合柏拉图主义、亚里士多德哲学和东方神秘主义

    - **雅典时期**：在雅典建立哲学学校，传授新柏拉图主义思想

    - **理论建构**：系统阐述太一流溢说和灵魂回归理论

    - **学派传承**：通过弟子波菲利等人传承和发展学派传统'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Plotinus.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 自我实现的核心要点是什么？
  answer: '关联概念: 灵魂回归；实践方法: 通过内在修炼实现精神升华；现代应用: 人本主义心理学和自我实现理论'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Plotinus.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 怀疑主义的核心要点是什么？
  answer: '原文: **Skepticism**；解释: 对所有知识主张保持悬置判断，不做出确定性结论。；影响: 开创了古代怀疑主义传统，影响了后来的认识论发展。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Pyrrho.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 悬置判断的核心要点是什么？
  answer: '原文: **Epoché**；解释: 暂停对事物的判断，保持心灵的宁静状态。；影响: 为心理治疗和压力管理提供了重要的哲学方法。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Pyrrho.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 无差异论证的核心要点是什么？
  answer: '原文: **Equipollence Argument**；解释: 对于任何命题，都能找到同样有力的反对论证。；影响: 揭示了知识确定性的困难，推动了逻辑学发展。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Pyrrho.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《皮浪学说》(Pyrrhonean Discourses)的核心要点是什么？
  answer: '成书年代: 公元前4-3世纪；核心内容: 皮浪怀疑主义哲学的核心著作；重要性: 古代怀疑主义的经典文献，可惜已失传'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Pyrrho.md
  section: 主要著作 (Major Works)
- type: concept
  question: 相关记录的核心要点是什么？
  answer: '成书年代: 公元前3世纪；核心内容: 通过弟子和后学的记录保存思想；重要性: 了解皮浪思想的主要资料来源'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Pyrrho.md
  section: 主要著作 (Major Works)
- type: concept
  question: 哲学对话的核心要点是什么？
  answer: '成书年代: 公元前4世纪；核心内容: 与各派学者的辩论和讨论记录；重要性: 体现了怀疑主义的实践方法'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Pyrrho.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **早期经历**：出生于埃利斯，在雅典学习各种哲学流派

    - **印度影响**：随亚历山大大帝远征印度，受到当地哲学启发

    - **学派创立**：回到希腊后创立皮浪主义怀疑学派

    - **理论建构**：系统阐述怀疑主义认识论和实践方法

    - **学派传承**：通过弟子传承和发展怀疑主义传统'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Pyrrho.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 认知疗法的核心要点是什么？
  answer: '关联概念: 悬置判断；实践方法: 学会暂停对负面想法的认同和反应；现代应用: 认知行为疗法中的思维暂停技术'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Pyrrho.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 苏格拉底方法的核心要点是什么？
  answer: '原文: **elenchus**；解释: 通过对话和提问来揭示对方观点中的矛盾，引导对方自己发现真理。；影响: 成为西方哲学和教育的基础方法，强调批判性思维和自我反思。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Socrates.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 自知无知的核心要点是什么？
  answer: '原文: **gnothi seauton**；解释: 认识到自己的无知是智慧的开始。；影响: 培养谦逊的求知态度，防止教条主义和盲目自信。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Socrates.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 德性即知识的核心要点是什么？
  answer: '原文: **arete**；解释: 道德美德基于知识，没有人会故意作恶。；影响: 建立了道德与知识的内在联系，影响了后来的伦理哲学。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Socrates.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《申辩篇》(Apology)的核心要点是什么？
  answer: '出版年份: 公元前399年；核心内容: 苏格拉底在审判中的自我辩护；重要性: 记录了苏格拉底的哲学使命和死亡原因'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Socrates.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《克力同篇》(Crito)的核心要点是什么？
  answer: '出版年份: 公元前399年；核心内容: 讨论公民义务和服从法律；重要性: 探讨了个人与国家的关系'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Socrates.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **早期思想**：苏格拉底最初研究自然哲学，后来转向对人类事务的研究

    - **中期发展**：发展出苏格拉底方法，专注于伦理和道德问题

    - **晚期成熟**：形成了完整的德性伦理体系，强调知识与美德的统一'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Socrates.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 认知疗法的核心要点是什么？
  answer: '关联概念: 苏格拉底方法；实践方法: 通过提问帮助患者发现自己思维中的矛盾；现代应用: 认知行为疗法(CBT)的前身'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Socrates.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 斯多葛主义的核心要点是什么？
  answer: '原文: **Stoicism**；解释: 哲学体系强调理性、自律和接受命运。；影响: 成为古代最重要的哲学流派之一，影响深远。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Zeno.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 控制二分法的核心要点是什么？
  answer: '原文: **Dichotomy of Control**；解释: 区分可控和不可控的事物，专注于可控的部分。；影响: 现代认知行为疗法的核心原则。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Zeno.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 理性统治的核心要点是什么？
  answer: '原文: **Reason as Ruler**；解释: 理性应当统治情感和欲望。；影响: 影响了后来的理性主义传统。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Zeno.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《共和国》(Politeia)的核心要点是什么？
  answer: '出版年份: 公元前3世纪；核心内容: 描述理想的斯多葛式社会；重要性: 体现了芝诺的政治哲学思想'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Zeno.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《论激情》(Peri Pathon)的核心要点是什么？
  answer: '出版年份: 公元前3世纪；核心内容: 分析各种情感和激情；重要性: 奠定了斯多葛心理学基础'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Zeno.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **早期经历**：出生于塞浦路斯基提翁，在雅典学习哲学

    - **思想融合**：结合苏格拉底伦理学、赫拉克利特物理学和犬儒派实践

    - **创立学派**：在雅典创立斯多葛学派，因其在画廊(stoa poikile)讲学而得名

    - **理论建构**：建立了完整的逻辑学、物理学和伦理学体系'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Zeno.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 认知疗法的核心要点是什么？
  answer: '关联概念: 控制二分法；实践方法: 帮助患者区分可控和不可控因素；现代应用: 认知行为疗法的基础技术'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/classical/Zeno.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 上坡路和下坡路是同一条路"的核心要点是什么？
  answer: '佛教: 不二/中道（madhyamā pratipad）；对应: ★★★★'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/pre-socratics/Buddhist_Perspective_Reviews.md
  section: 视角二：学佛爱好者
- type: concept
  question: 变化的本原的核心要点是什么？
  answer: '赫拉克利特: 火（一种物质元素）；佛教: 无本原——缘起即无第一因；分歧性质: 本体论分歧'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/pre-socratics/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 变化的法则的核心要点是什么？
  answer: '赫拉克利特: 逻各斯（一种理性秩序）；佛教: 缘起（一种因果律）；分歧性质: 可比较但有差异'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/pre-socratics/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 对"对立面"的态度的核心要点是什么？
  answer: '赫拉克利特: 对立面是统一的（辩证法前身）；佛教: 超越对立面（不二/中道）；分歧性质: 不同策略'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/pre-socratics/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 原子论的核心要点是什么？
  answer: '原文: **Atomism**；解释: 宇宙由不可分割的原子和虚空组成。；影响: 奠定了现代物质主义哲学的基础。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/pre-socratics/Democritus.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 影像说的核心要点是什么？
  answer: '原文: **Images/Eidola**；解释: 物体发出的薄膜状影像作用于感官产生感觉。；影响: 影响了后来的认识论和感知理论。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/pre-socratics/Democritus.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 快乐主义伦理学的核心要点是什么？
  answer: '原文: **Ethics of Pleasure**；解释: 适度的快乐是人生的合理目标。；影响: 为伊壁鸠鲁的快乐主义提供了理论基础。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/pre-socratics/Democritus.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《小宇宙秩序》(Little World Order)的核心要点是什么？
  answer: '出版年份: 公元前5世纪；核心内容: 关于宇宙论和物理学的著作；重要性: 原子论思想的主要载体'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/pre-socratics/Democritus.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《大宇宙秩序》(Great World Order)的核心要点是什么？
  answer: '出版年份: 公元前5世纪；核心内容: 更广泛的宇宙论和形而上学著作；重要性: 已失传，内容通过引用了解'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/pre-socratics/Democritus.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **早期学习**：师从留基伯，继承和发展了原子论思想

    - **广泛游学**：游历埃及、巴比伦、印度等地，吸收各地知识

    - **理论创新**：在留基伯基础上完善原子论体系

    - **学科整合**：将原子论应用于伦理学、心理学等多个领域'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/pre-socratics/Democritus.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 认知科学的核心要点是什么？
  answer: '关联概念: 影像说；实践方法: 理解感知过程中的主观建构机制；现代应用: 认知心理学和神经科学'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/pre-socratics/Democritus.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 万物流变的核心要点是什么？
  answer: '希腊语: **Πάντα ῥεῖ** (*Panta rhei*)；解释: 一切皆流，无物常驻。万物处于永恒的变化之中。；影响: 奠定了变化哲学的基础，影响后来的存在主义和过程哲学。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/pre-socratics/Heraclitus.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 对立统一的核心要点是什么？
  answer: '希腊语: **ἕν καὶ πᾶν** (*Hen kai pan*)；解释: 对立面的统一和斗争是万物变化的根源。；影响: 提供了辩证法的思想萌芽，影响黑格尔等后来哲学家。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/pre-socratics/Heraclitus.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 火本原说的核心要点是什么？
  answer: '希腊语: **πῦρ** (*Pyr*)；解释: 火是万物的本原，世界按照一定的尺度燃烧和熄灭。；影响: 开创了朴素唯物主义的宇宙观。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/pre-socratics/Heraclitus.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: DK 22B1的核心要点是什么？
  answer: '内容: "这个秩序(宇宙)对万物都是相同的，它既不是神也不是人所创造的..."；哲学意义: 强调自然法则的客观性和普遍性；现代解读: 客观规律性思想'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/pre-socratics/Heraclitus.md
  section: 主要残篇 (Key Fragments)
- type: concept
  question: DK 22B2的核心要点是什么？
  answer: '内容: "你不能两次踏进同一条河流"；哲学意义: 变化是绝对的，稳定性是相对的；现代解读: 永恒变化观'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/pre-socratics/Heraclitus.md
  section: 主要残篇 (Key Fragments)
- type: concept
  question: DK 22B93的核心要点是什么？
  answer: '内容: "上升的道路和下降的道路是同一条道路"；哲学意义: 对立面的相互转化和统一；现代解读: 辩证思维'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/pre-socratics/Heraclitus.md
  section: 主要残篇 (Key Fragments)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **早期探索**：出生于以弗所贵族家庭，早年游历各地观察自然现象

    - **哲学转向**：从自然观察转向哲学思辨，关注宇宙的本质和规律

    - **隐居写作**：晚年隐居山林，专心著述《论自然》等哲学作品

    - **思想传播**：通过学生和追随者传播其哲学思想

    - **历史影响**：虽然原著失传，但思想通过其他古代作家得以保存'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/pre-socratics/Heraclitus.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 变化适应的核心要点是什么？
  answer: '关联概念: 万物流变思想；实践方法: 培养对变化的接受能力和适应性；现代应用: 变革管理心理学'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/ancient/pre-socratics/Heraclitus.md
