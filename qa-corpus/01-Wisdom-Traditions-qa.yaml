- type: concept
  question: 誓句的条件的核心要点是什么？
  answer: '传统设计意图: 需要双方都具格（上师具德、弟子具器）；现代实践中可能出现的问题: 条件部分常被忽略，"灌顶"变成了形式'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/the-guru-drinks-bourbon/Multi_Perspective_Reviews.md
  section: '"三昧耶"的制度分析'
- type: concept
  question: 什么是一、总体评价？
  answer: 这本书可能是当代用最通俗的语言讲清楚"什么是佛教"的最好的一本。宗萨蒋扬钦哲仁波切做了一件几乎所有佛教导师都做不到的事——他用极其日常的语言，把佛教最核心的见地说得像跟朋友聊天一样自然，同时没有任何简化或歪曲。
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/what-makes-you-not-a-buddhist/Book_Review.md
  section: 一、总体评价
- type: concept
  question: 诸行无常的核心要点是什么？
  answer: '梵文: *Anitya*；核心含义: 一切和合事物皆无常；日常理解: 任何事情都会变化，没有例外'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/what-makes-you-not-a-buddhist/Book_Review.md
  section: 四法印——全书的骨架
- type: concept
  question: 诸漏皆苦的核心要点是什么？
  answer: '梵文: *Duḥkha*；核心含义: 一切情绪皆苦；日常理解: 你以为的快乐，本质是痛苦'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/what-makes-you-not-a-buddhist/Book_Review.md
  section: 四法印——全书的骨架
- type: concept
  question: 诸法无我的核心要点是什么？
  answer: '梵文: *Anātman*；核心含义: 一切事物皆无自性；日常理解: 没有"永恒不变的自我"这回事'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/what-makes-you-not-a-buddhist/Book_Review.md
  section: 四法印——全书的骨架
- type: concept
  question: 苦苦的核心要点是什么？
  answer: '梵文: *Dukkha-dukkha*；含义: 明显的痛苦；举例: 生病、受伤、失去亲人'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/what-makes-you-not-a-buddhist/Book_Review.md
  section: 第二章：情绪与痛苦
- type: concept
  question: 坏苦的核心要点是什么？
  answer: '梵文: *Vipariṇāma-dukkha*；含义: 变化带来的苦；举例: 快乐消退、青春逝去'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/what-makes-you-not-a-buddhist/Book_Review.md
  section: 第二章：情绪与痛苦
- type: concept
  question: 行苦的核心要点是什么？
  answer: '梵文: *Saṃskāra-dukkha*；含义: 存在本身的苦；举例: "我"的存在就是一种不满足'
  source: 01-Wisdom-Traditions/religions/buddhism/dzongsar-khyentse/what-makes-you-not-a-buddhist/Book_Review.md
