- type: concept
  question: 什么是综合评述？
  answer: 威廉·詹姆斯的哲学不是体系化的封闭建筑，而是一条奔腾不息的思想之河。他以心理学家的精细观察、哲学家的概念创造力、以及人文主义者对人类精神生活的深切关怀，开创了一种至今仍在生长的哲学传统。实用主义提醒我们：哲学的终极价值不在于建造完美无缺的概念宫殿，而在于帮助人类更好地、更充分地、更勇敢地生活在经验世界之中。
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/modern/pragmatism/Multi_Perspective_Reviews.md
  section: 综合评述
- type: concept
  question: 真理观的核心要点是什么？
  answer: '核心贡献: 真理即经验中可验证的效用；主要争议: "有用即真理"易被误解为功利主义'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/modern/pragmatism/Multi_Perspective_Reviews.md
  section: 综合评述
- type: concept
  question: 经验论的核心要点是什么？
  answer: '核心贡献: 回到经验本身，尊重直接给予；主要争议: 纯粹经验概念的操作性存疑'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/modern/pragmatism/Multi_Perspective_Reviews.md
  section: 综合评述
- type: concept
  question: 宗教哲学的核心要点是什么？
  answer: '核心贡献: 以经验后果为标准评估宗教假设；主要争议: 难以区分深层灵性与心理安慰剂'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/modern/pragmatism/Multi_Perspective_Reviews.md
  section: 综合评述
- type: concept
  question: 实用主义的核心要点是什么？
  answer: '原文: **Pragmatism**；解释: 真理的价值在于其实用效果和实际后果。；影响: 奠定了美国实用主义哲学的基础，影响心理学和教育学发展。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/modern/pragmatism/WilliamJames.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 彻底经验主义的核心要点是什么？
  answer: '原文: **Radical Empiricism**；解释: 经验不仅包括感觉材料，还包括关系和联系。；影响: 扩展了经验主义的范围，为现代认知科学提供哲学基础。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/modern/pragmatism/WilliamJames.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 意识流的核心要点是什么？
  answer: '原文: **Stream of Consciousness**；解释: 意识是一个连续流动的过程，而非离散元素的集合。；影响: 革命性地改变了对心理现象的理解，影响文学和心理学。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/modern/pragmatism/WilliamJames.md
  section: 核心思想 (Core Ideas)
- type: concept
  question: 《心理学原理》的核心要点是什么？
  answer: '出版年份: 1890年；内容概要: 系统阐述心理学的科学基础，提出意识流理论。；学术价值: 现代心理学的奠基性著作，影响持续至今。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/modern/pragmatism/WilliamJames.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《实用主义》的核心要点是什么？
  answer: '出版年份: 1907年；内容概要: 系统阐述实用主义哲学，提出著名的"现金价值"理论。；学术价值: 美国哲学的里程碑，确立实用主义主流地位。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/modern/pragmatism/WilliamJames.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《宗教经验之种种》的核心要点是什么？
  answer: '出版年份: 1902年；内容概要: 从心理学角度分析宗教经验，强调个人体验的重要性。；学术价值: 宗教心理学的开创性研究，跨学科经典。'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/modern/pragmatism/WilliamJames.md
  section: 主要著作 (Major Works)
- type: concept
  question: 什么是思想发展 (Intellectual Development)？
  answer: '- **医学背景**：哈佛医学院毕业，兼具科学训练和人文关怀

    - **心理学开拓**：建立美国第一个心理学实验室，推动心理学科学化

    - **哲学转向**：从生理学到心理学再到哲学，形成独特思想体系

    - **实用主义形成**：与皮尔士等人共同创立实用主义学派

    - **宗教研究**：晚年专注于宗教心理学和超个人心理学研究'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/modern/pragmatism/WilliamJames.md
  section: 思想发展 (Intellectual Development)
- type: concept
  question: 认知行为疗法的核心要点是什么？
  answer: '关联概念: 实用主义原则；实践方法: 关注想法的实际效果而非抽象真理；现代应用: 现代CBT的核心理念'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/modern/pragmatism/WilliamJames.md
  section: 与心理学/疗愈的关联 (Psychological/Healing Implications)
- type: concept
  question: 被人侮辱的核心要点是什么？
  answer: '斯多葛的建议: "侮辱只在你同意时才伤害你"（爱比克泰德）；佛法的建议: 观察嗔心生起的因缘，不认同它；效果比较: 同样有效'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/practical-philosophy/Buddhist_Perspective_Reviews.md
  section: 视角二：学佛爱好者
- type: concept
  question: 失去工作的核心要点是什么？
  answer: '斯多葛的建议: "区分你能控制的和不能控制的"；佛法的建议: 观察无常——来去都是因缘；效果比较: 同样有效'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/practical-philosophy/Buddhist_Perspective_Reviews.md
  section: 视角二：学佛爱好者
- type: concept
  question: 面对焦虑的核心要点是什么？
  answer: '斯多葛的建议: "最坏会发生什么？你能承受。"；佛法的建议: "焦虑是对未来的投射——回到当下"；效果比较: 佛教更温和'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/practical-philosophy/Buddhist_Perspective_Reviews.md
  section: 视角二：学佛爱好者
- type: concept
  question: 形而上学的核心要点是什么？
  answer: '斯多葛哲学: 逻各斯（Logos）——理性秩序；佛教: 缘起——无目的的因果律；比较评价: **根本不同**'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/practical-philosophy/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 人的本质的核心要点是什么？
  answer: '斯多葛哲学: 理性动物；佛教: 无我——五蕴和合；比较评价: **根本不同**'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/practical-philosophy/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
- type: concept
  question: 苦的来源的核心要点是什么？
  answer: '斯多葛哲学: 错误的判断（prohairesis）；佛教: 无明+执著；比较评价: 高度相似'
  source: 01-Wisdom-Traditions/philosophy/western-philosophy/practical-philosophy/Buddhist_Perspective_Reviews.md
  section: 视角三：佛教学者
