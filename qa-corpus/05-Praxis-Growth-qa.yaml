  question: 自我实现的核心要点是什么？
  answer: '英文: Self-Actualization；梵语/源头语言: आत्मसाक्षात्कार (Ātmasākṣātkāra)；词源解释: 希腊语 *autos* (自我) + *entelecheia* (完善)；核心定义:
