- type: concept
  question: 什么是一、领域概述？
  answer: 政治心理学融合了政治学、心理学、社会学和国际关系学的理论视角，研究个体和群体的心理过程如何塑造政治行为和国际关系格局。认知偏差（Cognitive Bias）在政治决策中扮演重要角色——确认偏差（Confirmation Bias）使人们选择性接受符合既有信念的信息，群体极化（Group
    Polarization）导致团队决策趋向极端，框架效应（Framing Effect）影响公众对政策的感知。在国际关系层面，Jonathan Haidt的道德基础理论（Moral Foundations Theory）揭示了不同文化和政治阵营之间的道德直觉差异如何引发深层分歧。理解这些心理机制对于促进跨文化对话、和平解决冲突以及建立更有效的国际合作机制至关重要。
  source: 05-Praxis-Growth/talks/ted-talks/Political_Psychology_International_Relations.md
  section: 一、领域概述
- type: concept
  question: 什么是三、核心观点？
  answer: '- **道德直觉优先**：政治立场的形成往往先于理性论证，道德直觉（Moral Intuition）驱动政治偏好，事后推理（Post-hoc Reasoning）为立场提供合理化解释

    - **群体认同与内群体偏好**（In-group Favoritism）：人们倾向于偏袒"我们"而非"他们"，这种心理机制在国家间关系和民族主义运动中表现尤为突出

    - **威胁感知与安全困境**（Security Dilemma）：在国际关系中，一方为增加安全感采取的措施往往被他方解读为威胁，形成螺旋升级

    - **叙事权力**（Narrative Power）：控制话语权的一方能够塑造公众对国际事件的认知框架，进而影响外交政策走向

    - **接触假说**（Contact Hypothesis）：跨文化直接接触在适当条件下能有效减少偏见和敌意，这为国际交流项目提供了心理学基础'
  source: 05-Praxis-Growth/talks/ted-talks/Political_Psychology_International_Relations.md
  section: 三、核心观点
- type: concept
  question: 什么是四、实践启示？
  answer: '1. **跨文化对话**：在国际交流中实践"侦察兵思维"，保持对异见的好奇心而非防御心

    2. **媒体批判**：识别国际新闻中的叙事框架（Narrative Frame），警惕被"单一叙事"主导对国家和民族的认知

    3. **冲突调解**：运用道德基础理论理解冲突各方的深层关切，寻找超越零和博弈的解决方案

    4. **公民教育**：在公民教育中纳入政治心理学知识，培养选民的认知自我意识和批判性思维

    5. **和平建设**：基于接触假说设计国际青年交流项目，通过人际接触打破国家间的刻板印象'
  source: 05-Praxis-Growth/talks/ted-talks/Political_Psychology_International_Relations.md
  section: 四、实践启示
- type: concept
  question: 什么是五、推荐资源？
  answer: '- 📚 **书籍**：《正义之心》（Jonathan Haidt 著）、《侦察兵思维》（Julia Galef 著）、《群体冲突心理学》（Henri Tajfel 著）

    - 🎥 **TED系列**：TED 全球政治专题（TED Global Politics）

    - 📖 **学术期刊**：《Political Psychology》、《Journal of Peace Research》

    - 🌐 **机构**：Stockholm International Peace Research Institute（SIPRI）、Carnegie Endowment for International Peace'
