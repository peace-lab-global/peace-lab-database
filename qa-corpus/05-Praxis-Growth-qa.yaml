  section: 五、推荐资源
- type: concept
  question: 什么是一、领域概述？
  answer: 在社交媒体和算法推荐主导的信息环境中，传统新闻媒体、社交平台和恶意行为者共同塑造了一个复杂而脆弱的信息生态系统。假新闻（Fake News）的传播速度是真相的六倍，算法优先推送激化情绪的内容，深度伪造（Deepfake）技术使视频和音频的真实性面临挑战。媒体素养教育——教授公民如何批判性地消费、分析和创建媒体内容——已成为数字时代民主社会的关键基础设施。TED演讲中的记者、研究者和教育者将媒体素养的复杂性转化为可理解和可操作的实践。
  source: 05-Praxis-Growth/talks/ted-talks/Framework_Media_Literacy.md
  section: 一、领域概述
- type: concept
  question: 什么是三、核心观点？
  answer: '1. **假新闻的系统性威胁**：虚假信息不仅误导个体，更系统性地侵蚀社会信任和民主制度。

    2. **算法的结构性影响**：社交媒体算法通过优先推送激化情绪的内容，分裂社会共识。

    3. **验证能力的重要性**：基本的事实核查技能应成为每个公民的数字素养核心。

    4. **注意力是一种资源**：有意识地管理注意力分配是信息时代的重要生存技能。

    5. **透明与问责**：要求平台算法的透明度和用户对信息环境的选择权。'
  source: 05-Praxis-Growth/talks/ted-talks/Framework_Media_Literacy.md
  section: 三、核心观点
- type: concept
  question: 什么是四、实践启示？
  answer: '- **教育整合**：将媒体素养教育纳入学校课程体系，从小学开始培养批判性信息消费习惯。

    - **个人实践**：定期审核信息来源，使用事实核查工具，避免冲动分享。

    - **平台责任**：要求社交媒体平台提供算法透明度和用户控制机制。

    - **新闻素养**：理解新闻生产的过程和编辑决策，区分新闻报道、评论和广告。

    - **社区参与**：支持本地新闻和社区媒体，维护信息多样性。'
  source: 05-Praxis-Growth/talks/ted-talks/Framework_Media_Literacy.md
  section: 四、实践启示
- type: concept
  question: 什么是五、推荐资源？
  answer: '- **书籍**：《真相》（Bill Kovach & Tom Rosenstiel）——新闻素养指南

    - **工具**：Snopes、FactCheck.org——事实核查网站

    - **课程**：Coursera "Fake News, Facts, and Alternative Facts"——媒体素养课程

    - **组织**：News Literacy Project——新闻素养教育项目

    - **纪录片**：《The Social Dilemma》——社交媒体算法的影响

    - **书籍**：《过滤气泡》（Eli Pariser）——算法个性化推荐的危险'
  source: 05-Praxis-Growth/talks/ted-talks/Framework_Media_Literacy.md
  section: 五、推荐资源
- type: concept
  question: 什么是一、领域概述？
  answer: 心理健康是一种健康状态，在这种状态下个体能够认识自身能力、应对正常生活压力、高效工作并对社区做出贡献。全球心理健康面临严峻挑战：抑郁症是致残的首要原因，焦虑症影响超过3亿人，每年约80万人死于自杀。在低收入和中等收入国家，75%以上的精神健康需求未得到满足。心理健康问题的根源是多层次的——生物学因素（基因、神经化学）、心理因素（认知模式、应对策略）和社会因素（贫困、歧视、创伤、社会隔离）交互作用。污名化（Stigma）和歧视是最持久的障碍——在许多文化中，心理健康问题仍被视为软弱或道德缺陷，导致人们不愿求助。COVID-19大流行进一步加剧了全球心理健康危机，特别是在青少年和一线工作者群体中。然而，有效且可扩展的干预措施——从认知行为疗法（CBT）的数字化交付到社区心理健康工作者的培训——正在为心理健康服务的普及化带来希望。
  source: 05-Praxis-Growth/talks/ted-talks/Framework_Mental_Health.md
  section: 一、领域概述
- type: concept
  question: 什么是三、核心观点？
  answer: '- **生物-心理-社会模型**（Biopsychosocial Model）：心理健康问题的产生和康复涉及生物学、心理学和社会学三个层面的交互作用，有效的干预需要整合这三个维度

    - **污名化的消除**：公开谈论心理健康经历是减少污名最有效的方式——当人们看到"正常人"也有心理健康问题时，污名就会瓦解

    - **全球心理健康差距**（Mental Health Gap）：低收入和中等收入国家75%以上的心理健康需求未得到满足，需要大规模培养社区心理健康工作者

    - **预防胜于治疗**：学校中的社会情感学习（SEL）、职场中的心理安全文化、社区中的社交连接建设是最具成本效益的心理健康策略

    - **数字化心理健康**：AI驱动的心理健康聊天机器人、在线认知行为疗法和远程咨询正在扩大心理健康服务的可及性'
  source: 05-Praxis-Growth/talks/ted-talks/Framework_Mental_Health.md
  section: 三、核心观点
- type: concept
  question: 什么是四、实践启示？
  answer: '1. **个人层面**：建立"情感急救"习惯——关注孤独、拒绝和失败对心理的影响，学习基本的自我关怀和心理调适技能

    2. **社交层面**：在人际关系中创造安全空间，让朋友和家人能够坦诚分享心理挣扎而不被评判

    3. **职场层面**：推动组织建立心理健康支持体系——包括员工帮助计划（EAP）、心理健康假和反污名化培训

    4. **社区层面**：支持社区心理健康中心的建设，参与或发起心理健康互助小组

    5. **社会层面**：倡导增加心理健康公共投资，推动心理健康保险覆盖的平等化'
  source: 05-Praxis-Growth/talks/ted-talks/Framework_Mental_Health.md
  section: 四、实践启示
