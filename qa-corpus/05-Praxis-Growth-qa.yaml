- type: concept
  question: 入门级的核心要点是什么？
  answer: '名称: 缓慢正念行走；时长: 10-15分钟；核心要点: 极慢速(每步3-5秒),专注双脚触地感、重心转移、腿部肌肉；适用场景: 室内/花园安全环境,作为正式练习；进阶要素: 可闭眼(在安全前提下)增强本体感觉；专业提示:
    适合初学者、焦虑者、需要躯体锚定者'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Daily_Living.md
  section: 正念走路的练习层级表 (Levels of Mindful Walking Practice)
- type: concept
  question: 生活化的核心要点是什么？
  answer: '名称: 日常行走正念；时长: 5-10分钟；核心要点: 正常步速,觉察脚步、呼吸、周围声音、身体感受；适用场景: 上班路上、散步、购物；进阶要素: 可加入"标记":脚触地时默念"左""右"或"触地""抬起"；专业提示: 最实用,可融入每日通勤,不需额外时间'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Daily_Living.md
  section: 正念走路的练习层级表 (Levels of Mindful Walking Practice)
- type: concept
  question: 感官丰富型的核心要点是什么？
  answer: '名称: 多感官行走；时长: 15-30分钟；核心要点: 除脚步外,依次觉察:视觉(光影/色彩)、听觉(鸟鸣/车声)、嗅觉(花香/空气)、触觉(风/温度)、味觉(如含一颗糖)；适用场景: 公园/自然环境；进阶要素: 每5分钟切换一个主导感官,最后整合所有感官；专业提示:
    对抑郁/快感缺乏者有效,重建感官敏感度'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Daily_Living.md
  section: 正念走路的练习层级表 (Levels of Mindful Walking Practice)
