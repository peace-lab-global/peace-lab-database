  question: 睡眠改善的核心要点是什么？
  answer: '涉及领域: 心理学/禅修/瑜伽；推荐实践组合: 渐进放松 + 坐禅 + 尸式；详细计划: 睡前1小时：渐进放松10min；禅坐5min觉察；结束尸式5min。；预期疗愈效果: 更快入睡，减少夜醒。；自我评估方法: 睡眠App追踪时长/质量。；专业视角
    (Professional Perspective): 针对过度觉醒 (Hyperarousal) 模型，通过降低生理唤醒水平促进睡眠。；引用来源 (Citation): Morin, C. M., et al. (2006).'
  source: 05-Praxis-Growth/personal-development/practice/Daily_Advanced_Practices.md
  section: 整合实践表
- type: concept
  question: 情绪调节的核心要点是什么？
  answer: '涉及领域: 心理学/冥想；推荐实践组合: EI练习 + 慈心冥想；详细计划: 每日：EI反思情绪5min；每周3次慈心15min扩展到同事。；预期疗愈效果: 更好控制反应，减少爆发。；自我评估方法: 情绪日记，追踪触发事件。；专业视角
    (Professional Perspective): 提升与情绪相关的皮质调节能力，减少杏仁核劫持。；引用来源 (Citation): Goleman, D. (1995).'
  source: 05-Praxis-Growth/personal-development/practice/Daily_Advanced_Practices.md
  section: 整合实践表
- type: concept
  question: 中级的核心要点是什么？
  answer: '挑战名称: 长坐耐；要求: 无断坐40min；时长/频率: 日1次，周5；益处: 定力深，体耐。；专业视角 (Professional Perspective): 突破生理不适的临界点，加深"定" (Samadhi)。；引用来源
    (Citation): Suzuki, S. (1970).'
  source: 05-Praxis-Growth/personal-development/practice/Daily_Advanced_Practices.md
  section: 禅修进阶挑战表
- type: concept
  question: 中级的核心要点是什么？
  answer: '挑战名称: 沉默日；要求: 全日无语觉察；时长/频率: 周1日；益处: 内省升，觉深。；专业视角 (Professional Perspective): 减少语言处理带来的认知负荷，增强内感受。；引用来源 (Citation):
    Thich Nhat Hanh. (1991).'
  source: 05-Praxis-Growth/personal-development/practice/Daily_Advanced_Practices.md
  section: 禅修进阶挑战表
- type: concept
  question: 高级的核心要点是什么？
  answer: '挑战名称: 公案周；要求: 日一公案深思；时长/频率: 周全；益处: 顿悟促，智开。；专业视角 (Professional Perspective): 绕过逻辑思维，直接冲击直觉顿悟。；引用来源 (Citation): Kapleau,
    P. (1965).'
  source: 05-Praxis-Growth/personal-development/practice/Daily_Advanced_Practices.md
  section: 禅修进阶挑战表
- type: concept
  question: 晨会启动的核心要点是什么？
  answer: '禅修活动: 团体息坐；实施步骤: 1. 圈椅坐；2. 导息觉3min；3. 分享一觉；4. 开会。；益处: 专注统，团队连。；专业视角 (Professional Perspective): 建立共同调节 (Co-regulation)
    机制，同步团队状态。；引用来源 (Citation): Goleman, D. & Boyatzis, R. (2008).'
  source: 05-Praxis-Growth/personal-development/practice/Daily_Advanced_Practices.md
  section: 禅修在职场团队中的应用表
- type: concept
  question: 脑暴前的核心要点是什么？
  answer: '禅修活动: 默坐禅；实施步骤: 1. 室坐；2. 默觉5min；3. 清脑；4. 暴。；益处: 创意涌，思清。；专业视角 (Professional Perspective): 诱导 Alpha 波，促进发散性思维。；引用来源
    (Citation): Colzato, L. S., et al. (2012).'
  source: 05-Praxis-Growth/personal-development/practice/Daily_Advanced_Practices.md
  section: 禅修在职场团队中的应用表
- type: concept
  question: 早晨活力的核心要点是什么？
  answer: '目标益处: 能量提升；体式1: 山式 (1min)；体式2: 太阳致敬 (5轮)；体式3: 战士I (30s/侧)；时长/频率: 15min/每日；自助提示: 空腹；窗边光。；专业视角 (Professional Perspective):
    激活交感神经系统，提升唤醒水平。；引用来源 (Citation): Mody, B. S. (2011).'
  source: 05-Praxis-Growth/personal-development/practice/Daily_Routine_Protocols.md
  section: 瑜伽序列设计表
- type: concept
  question: 午后重置的核心要点是什么？
  answer: '目标益处: 专注恢复；体式1: 前弯 (1min)；体式2: 扭转坐 (30s/侧)；体式3: 尸式 (3min)；时长/频率: 10min/工作日；自助提示: 椅变体；深息。；专业视角 (Professional Perspective):
    前弯激活副交感，缓解日间压力。；引用来源 (Citation): Field, T. (2011).'
  source: 05-Praxis-Growth/personal-development/practice/Daily_Routine_Protocols.md
  section: 瑜伽序列设计表
- type: concept
  question: 晚间放松的核心要点是什么？
  answer: '目标益处: 睡眠促；体式1: 蝴蝶式 (3min)；体式2: 腿墙上 (2min)；体式3: 倒箭式 (1min)；时长/频率: 10min/每晚；自助提示: 柔光；毯盖。；专业视角 (Professional Perspective):
    倒立位增加压力反射，降低心率。；引用来源 (Citation): Khatri, D. et al. (2014).'
  source: 05-Praxis-Growth/personal-development/practice/Daily_Routine_Protocols.md
  section: 瑜伽序列设计表
- type: concept
  question: 职场高压的核心要点是什么？
  answer: '主要需求: 压力管理；领域组合: 心理学 + 冥想；周计划: 周1-5: CBT10min + 正念15min；周末瑜伽。；预期效果: Stress降。；自助追踪: 日志分。；专业视角 (Professional Perspective):
    高压下需要情绪调节与认知重构结合。；引用来源 (Citation): Lazarus, R. S. (1999).'
  source: 05-Praxis-Growth/personal-development/practice/Daily_Routine_Protocols.md
  section: 个性化计划模板表
- type: concept
  question: 初学者的核心要点是什么？
  answer: '主要需求: 基础建；领域组合: 瑜伽 + 禅修；周计划: 日山式5min + 坐禅10min；周日志。；预期效果: 习惯成。；自助追踪: App提醒。；专业视角 (Professional Perspective): 微习惯策略降低启动阻力。；引用来源
    (Citation): Fogg, B. J. (2009).'
  source: 05-Praxis-Growth/personal-development/practice/Daily_Routine_Protocols.md
  section: 个性化计划模板表
- type: concept
  question: 情绪波动的核心要点是什么？
  answer: '主要需求: 稳定调；领域组合: 心理学 + 瑜伽；周计划: EI反思日 + Pranayama；周Metta。；预期效果: Mood衡。；自助追踪: 情绪图。；专业视角 (Professional Perspective):
    情绪粒度训练与生理调节结合。；引用来源 (Citation): Barrett, L. F. (2017).'
  source: 05-Praxis-Growth/personal-development/practice/Daily_Routine_Protocols.md
  section: 个性化计划模板表
