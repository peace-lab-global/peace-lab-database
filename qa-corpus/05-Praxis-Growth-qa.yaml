  section: 拖延与心理健康的双向模型
- type: concept
  question: 广泛性焦虑（GAD）的核心要点是什么？
  answer: '与拖延的关联: 过度担忧任务结果导致回避；典型表现: 反复思考"如果出错怎么办"而无法开始'
  source: 05-Praxis-Growth/personal-development/procrastination/04_拖延与心理健康.md
