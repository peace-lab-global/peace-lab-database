  question: 什么是九、何时应尽快寻求专业帮助？
  answer: '如果涉及以下情况，建议尽快咨询律师、劳动顾问或当地正式支持渠道：

    - 非法解雇争议

    - 工资、补偿、社保或竞业限制争议

    - 明显的歧视、骚扰、霸凌或报复行为

