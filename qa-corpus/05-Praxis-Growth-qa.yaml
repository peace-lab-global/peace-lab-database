  question: 什么是三、设计原则？
  answer: '- **事实优先**：所有处理都围绕时间线、证据链、制度依据展开，而非围绕情绪站队

    - **场景化分流**：不同争议类型使用不同核查清单、调查模板和解决方案库

    - **最小必要知情**：谁该看什么、看到什么程度，必须严格按角色与权限控制

    - **留痕可审计**：关键动作、结论、审批、导出、删除都应有日志

    - **自动预警前置**：在争议升级前识别风险信号，减少事后补救成本

    - **建议不替代判断**：系统可推荐处理路径，但最终结论由授权角色作出

    - **兼顾员工体验**：界面简洁、表单短路径、状态透明，避免二次伤害'
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Exception_Case_Management_System_Design.md
