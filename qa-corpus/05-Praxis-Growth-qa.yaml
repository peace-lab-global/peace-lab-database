- type: concept
  question: 什么是一、领域概述？
  answer: 领导力是影响他人实现共同目标的能力，它不仅存在于企业高管层，更渗透到每个团队、社区和组织中。在VUCA（易变性、不确定性、复杂性、模糊性）时代，传统的命令-控制型领导模式日益失效，取而代之的是强调信任、赋能和适应性的新型领导范式。TED演讲中的领导力思想家和管理实践者从军事、企业、非营利组织和学术研究等不同领域汲取智慧，提出了从"安全圈"（Circle
    of Safety）到"无限游戏"（Infinite Game）的创新领导理念。这些演讲不仅改变了无数管理者的思维方式，更推动了组织文化的深层变革。
  source: 05-Praxis-Growth/talks/ted-talks/Framework_Leadership_Management.md
  section: 一、领域概述
- type: concept
  question: 什么是三、核心观点？
  answer: '1. **使命驱动**：伟大的领导力始于清晰的"为什么"，使命和价值观比策略和产品更重要。

    2. **心理安全**：创造信任和安全的环境是领导者的首要责任，这是团队协作的基础。

    3. **脆弱性的力量**：承认不完美和不确定性是真实领导力的标志，而非弱点。

    4. **适应性**：在不断变化的环境中，领导力需要持续学习和适应的能力。

    5. **赋能而非控制**：最好的领导者释放他人的潜力，而非控制他人的行为。'
  source: 05-Praxis-Growth/talks/ted-talks/Framework_Leadership_Management.md
  section: 三、核心观点
- type: concept
  question: 什么是四、实践启示？
  answer: '- **组织文化**：将心理安全感作为团队文化的核心指标，鼓励真实的沟通和建设性的冲突。

    - **领导力发展**：从技能培训转向思维模式培养，强调自我认知和同理心。

    - **决策过程**：主动寻求多元视角，避免"回音室"决策。

    - **个人实践**：培养定期反思习惯，关注"为什么"而非仅关注"做什么"。

    - **反馈文化**：建立双向反馈机制，让领导者也能收到真实的信息。'
  source: 05-Praxis-Growth/talks/ted-talks/Framework_Leadership_Management.md
  section: 四、实践启示
- type: concept
  question: 什么是五、推荐资源？
  answer: '- **书籍**：《从"为什么"开始》（Simon Sinek）——黄金圈理论详解

    - **书籍**：《 daring greatly 》（Brené Brown）——脆弱性领导的实践

    - **书籍**：《第五项修炼》（Peter Senge）——学习型组织理论

    - **播客**：TED WorkLife with Adam Grant——工作心理学与领导力

    - **课程**：Coursera "Leading People and Teams"——领导力系统课程

    - **评估工具**：360度反馈工具——全面领导力评估方法'
