- type: concept
  question: 什么是一、领域概述？
  answer: 青少年心理学（Adolescent Psychology）研究12至25岁个体的认知、情感、社会性与身份发展。传统观点将青春期简单地视为"暴风骤雨期"，但现代神经科学研究揭示了更复杂的图景：青少年前额叶皮层（Prefrontal
    Cortex）尚未成熟，而边缘系统（Limbic System）已高度活跃，这种"时间差"解释了青少年追求刺激、情绪强烈以及风险评估能力不足的特征。Sarah-Jayne Blakemore等学者的研究表明，社会脑（Social Brain）在青春期持续发育，青少年对社会评价的敏感性显著高于成人。理解这些科学机制有助于我们以更加包容和科学的态度面对青少年成长中的挑战。
  source: 05-Praxis-Growth/talks/ted-talks/Adolescent_Psychology_Overview.md
  section: 一、领域概述
- type: concept
  question: 什么是三、核心观点？
  answer: '- **大脑发育时间线**：青少年前额叶皮层至25岁左右才趋成熟，这解释了冲动控制和长期规划能力的不足，但同时也意味着巨大的可塑性和学习潜力

    - **社会脑假说**：青少年对社会排斥和同龄人评价的高度敏感性源于社会脑网络的持续发育，这具有进化适应意义

    - **身份探索期**：青春期是自我认同（Identity Formation）形成的关键阶段，Erikson的心理社会发展理论将"身份 vs. 角色混乱"列为核心任务

    - **冒险的双面性**：青少年的风险偏好既有消极面（危险行为），也有积极面（创新精神、学习新技能），关键在于引导

    - **睡眠与节律**：青少年生物钟（Circadian Rhythm）自然偏移至更晚的入睡时间，学校上学时间的科学调整可显著改善学业表现和心理健康'
  source: 05-Praxis-Growth/talks/ted-talks/Adolescent_Psychology_Overview.md
  section: 三、核心观点
- type: concept
  question: 什么是四、实践启示？
  answer: '1. **教育实践**：学校应将青少年大脑发育科学纳入课程设计，适当增加社会情感学习（SEL）内容，减少单纯的知识灌输

    2. **家庭沟通**：家长应避免将青少年的情绪波动归因为"不懂事"，而应理解为大脑发育阶段的正常表现，保持耐心与开放对话

    3. **心理健康**：重视青少年心理健康筛查，建立同伴支持系统（Peer Support System），降低求助的心理门槛

    4. **政策建议**：基于青少年大脑发育证据，推动延迟上学时间、调整刑事责任年龄等公共政策的科学化

    5. **自我认知**：青少年自身应了解大脑发育规律，接纳情绪波动的同时学会科学管理，善用高可塑性期发展核心能力'
  source: 05-Praxis-Growth/talks/ted-talks/Adolescent_Psychology_Overview.md
  section: 四、实践启示
- type: concept
  question: 什么是五、推荐资源？
  answer: '- 📚 **书籍**：《青春期大脑》（Sarah-Jayne Blakemore 著）、《The Whole-Brain Child》（Dan Siegel 著）

    - 🎥 **TED系列**：TED-Ed 青少年心理学专题动画

    - 📖 **学术期刊**：《Child Development》、《Journal of Research on Adolescence》

    - 🌐 **在线资源**：UCL Developmental Cognitive Neuroscience 实验室网站、Greater Good Science Center 青少年专题'
