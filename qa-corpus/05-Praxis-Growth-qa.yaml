- type: concept
  question: 什么是一、领域概述？
  answer: 媒体心理学作为心理学与传播学的交叉领域，关注媒体内容、媒介形式和使用方式对人类心理过程的影响。在数字化时代，这一领域的重要性前所未有地凸显：全球超过40亿社交媒体用户每天平均花费2.5小时在社交平台上；算法推荐（Algorithmic
    Recommendation）系统主导了信息获取方式；短视频、无限滚动（Infinite Scroll）等交互设计深刻改变了注意力模式。研究显示，频繁使用社交媒体与焦虑、抑郁和孤独感的增加存在关联，但媒体同时也具有连接社区、传播知识和赋能社会运动的积极潜力。理解媒体心理学有助于我们在享受技术便利的同时，维护心理健康和自主性。
  source: 05-Praxis-Growth/talks/ted-talks/Media_Psychology_Overview.md
  section: 一、领域概述
- type: concept
  question: 什么是三、核心观点？
  answer: '- **注意力经济**：当代数字媒体商业模式的核心是争夺用户注意力，广告收入驱动的激励机制导致平台设计偏向成瘾性和情绪刺激

    - **社会比较理论**（Social Comparison Theory）：社交媒体上的精心展示（Curated Display）引发向上社会比较，导致自尊下降和焦虑增加

    - **信息茧房**（Information Cocoon）：算法推荐系统基于用户偏好过滤信息，限制了接触多元观点的机会

    - **数字共情缺失**：屏幕中介的交流缺乏面对面互动中的非语言线索（Non-verbal Cues），削弱共情能力

    - **媒体多任务处理**（Media Multitasking）：频繁在不同媒体间切换损害深度注意力和认知效率'
  source: 05-Praxis-Growth/talks/ted-talks/Media_Psychology_Overview.md
  section: 三、核心观点
- type: concept
  question: 什么是四、实践启示？
  answer: '1. **数字排毒**（Digital Detox）：定期安排"断联"时间，恢复独处和深度思考的能力

    2. **信息饮食**：像关注食物营养一样关注信息质量，主动订阅多元信息源，避免算法单一推荐

    3. **时间管理**：使用屏幕时间追踪工具设定每日社交媒体使用上限，关闭非必要推送通知

    4. **媒介素养教育**：在中小学教育中纳入媒体心理学知识，培养青少年识别虚假信息和理解算法偏见的能力

    5. **设计伦理倡导**：支持"人道科技"运动，鼓励科技公司采用尊重用户福祉的设计原则'
  source: 05-Praxis-Growth/talks/ted-talks/Media_Psychology_Overview.md
