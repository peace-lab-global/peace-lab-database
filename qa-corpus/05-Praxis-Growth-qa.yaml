  question: 正念饮水的核心要点是什么？
  answer: '英文名: Mindful Drinking；原始语言/术语: 巴利: *Sati-pāna*; 梵: *Smṛti-pāna*；词源含义: 以正念觉察饮水全过程；精确定义: 有意识地、非评判地觉察饮水中的视觉、触觉、嗅觉、味觉、内感受全过程；区分与备注:
    不是"喝健康饮料"或"饮水疗法"，而是对饮水行为本身的觉察训练；专业视角: 最易获取的感官锚定正念微练习，可作为MBSR/MBCT非正式练习'
