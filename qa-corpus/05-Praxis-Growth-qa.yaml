  question: 什么是五、推荐资源？
  answer: '- 📚 **书籍**：《安静》（Susan Cain 著）、《坚毅》（Angela Duckworth 著）、《终身成长》（Carol Dweck 著）

    - 🎥 **TED系列**：TED 人格与身份专题

