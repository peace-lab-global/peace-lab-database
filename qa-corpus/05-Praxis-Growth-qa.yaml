  question: 什么是五、需要尽快寻求专业支持的信号？
  answer: '如出现以下情况，建议尽快寻求心理或医疗支持：

    - 持续失眠、惊恐、心悸、呕吐

    - 明显不能上班或进入工作状态

    - 强烈自责、绝望或反复闪回

    - 出现自伤或轻生想法

    - 对特定人或工作场景产生明显创伤性回避'
