  question: 什么是八、背调与关系管理提醒？
  answer: '- 即使关系紧张，也尽量避免在最后阶段公开失控

    - 保留至少一位可提供客观评价的同事或合作方联系人

    - 离职后如需说明离开原因，优先使用客观、克制、可验证的表达'
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Pre_Exit_Risk_Protection_Checklist.md
  section: 八、背调与关系管理提醒
