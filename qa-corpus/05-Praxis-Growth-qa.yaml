- type: concept
  question: 什么是一、领域概述？
  answer: AI经济学的核心问题在于：AI将如何改变经济增长、就业和收入分配？历史上每一次技术革命都伴随就业结构的剧变，但AI的特殊之处在于其替代认知劳动的能力——此前技术革命主要替代体力劳动。Erik Brynjolfsson和Andrew
    McAfee提出的"第二个机器时代"（Second Machine Age）论断认为，AI正在进入人类认知能力的领域。当前AI经济学的主要议题包括：AI对生产力的"索洛悖论"（Solow Paradox）——为什么AI投资高速增长但生产力增速却放缓；自动化与增强（Automation
    vs. Augmentation）的权衡——AI将创造还是消灭更多岗位；AI驱动的产业集中（Market Concentration）——拥有数据和算力优势的科技巨头是否正在形成新的垄断；以及AI时代的税收和社会保障体系改革。经济合作与发展组织（OECD）估计，约14%的现有工作面临被AI完全自动化的风险，而32%的工作将经历重大变革。
  source: 05-Praxis-Growth/talks/ted-talks/Framework_AI_Economics.md
  section: 一、领域概述
- type: concept
  question: 什么是三、核心观点？
  answer: '- **生产力悖论**：AI对经济增长的贡献尚未完全体现在传统生产力指标中——数字化转型存在"实现滞后"（Implementation Lag）

    - **技能偏向型技术变革**（SBTC）：AI正在增加对高技能劳动力的需求，同时减少对中等技能工作的需求，导致劳动力市场的"两极化"

    - **平台经济效应**：AI驱动的平台经济具有强大的网络效应（Network Effects），导致市场高度集中

    - **数字基础设施**：算力、数据和算法正在成为新型经济基础设施——谁控制了这些资源，谁就拥有了巨大的经济权力

    - **政策创新需求**：传统的经济政策工具（税收、教育、社会保障）需要创新以应对AI时代的独特挑战'
  source: 05-Praxis-Growth/talks/ted-talks/Framework_AI_Economics.md
  section: 三、核心观点
- type: concept
  question: 什么是四、实践启示？
  answer: '1. **终身学习投资**：政府和企业应大幅增加在职培训和技能更新的投入

    2. **社会保障改革**：探索全民基本收入（UBI）、负所得税和可转移福利等新型社会保障机制

    3. **竞争政策更新**：更新反垄断法规以应对数据垄断和算法合谋等新型竞争问题

    4. **数据权利**：建立清晰的数据产权框架，保护个人数据权利同时促进数据流通

    5. **全球协调**：在AI税收、贸易规则和劳工标准方面加强国际协调'
  source: 05-Praxis-Growth/talks/ted-talks/Framework_AI_Economics.md
  section: 四、实践启示
- type: concept
  question: 什么是五、推荐资源？
  answer: '- 📚 **书籍**：《第二个机器时代》（Brynjolfsson & McAfee 著）、《不设限的科技》（Rana Foroohar 著）、《AI Superpowers》（Kai-Fu Lee 著）

    - 🎥 **在线课程**：MIT OpenCourseWare 经济学课程、Coursera 数字经济学

    - 📖 **研究机构**：NBER AI经济工作组、OECD数字经济学部、Brookings AI治理中心

    - 🌐 **报告**：World Economic Forum 未来就业报告、McKinsey 全球研究院AI报告'
