  question: 什么是Sharon Strand Ellison非防御性沟通体系？
  answer: Sharon Strand Ellison在其开创性著作《Taking the War Out of Our Words》(中文版《非防御性沟通》)中系统阐述了一套完整的非防御沟通方法论。她的体系基于一个核心洞察:传统沟通模式中隐藏着"权力斗争"(Power
    Struggle)的基本结构,而非防御性沟通旨在彻底移除这种结构。
  source: 05-Praxis-Growth/communication/non-defensive-communication/Non_Defensive_Communication_Overview.md
  section: Sharon Strand Ellison非防御性沟通体系
- type: concept
  question: 什么是关键对话技术？
  answer: Kerry Patterson等人在《Crucial Conversations》中定义关键对话为同时具备三个特征的对话:高风险(结果很重要)、不同观点(双方意见分歧)、强烈情绪(双方有强烈感受)。这类对话极易失控,但掌握技术可以大幅提升成功率。
  source: 05-Praxis-Growth/communication/non-defensive-communication/Non_Defensive_Communication_Overview.md
  section: 关键对话技术
