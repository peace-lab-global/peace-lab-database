  answer: '主要适用问题: 劳动保护、工资、工作条件、休息休假；可支持的主张方向: 作为基础劳动权益保护依据'
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Verbal_Bullying_PUA_Legal_References.md
  section: 二、核心法律法规清单
