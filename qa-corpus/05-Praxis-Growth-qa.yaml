  question: 什么是六、什么时候必须升级或考虑离开？
  answer: '出现以下情况时，不建议只靠“再努力沟通”解决：

    - 长期、重复、明显的人格贬低

    - 持续制造恐惧，让团队不敢说真话

    - 明知标准不清仍反复追责

    - 用羞辱逼迫你接受不合理或不合规要求

    - 已明显影响睡眠、健康、自尊和工作功能'
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Anti_PUA_Leadership.md
  section: 六、什么时候必须升级或考虑离开
- type: concept
  question: 什么是八、自我保护与恢复建议？
  answer: '- 找可信任同事或朋友做现实校准，防止长期被扭曲认知

    - 保持工作记录，减少被煤气灯效应影响

    - 若身心症状明显，优先考虑心理咨询、医学支持或短期休整

    - 如果组织长期纵容此类行为，尽早评估转岗或离开成本'
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Anti_PUA_Leadership.md
