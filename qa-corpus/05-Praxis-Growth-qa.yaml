  question: 什么是一、先明确：PIP不是法律概念，而是企业管理工具？
  answer: 'PIP本身不是法定程序，而是公司常见的绩效改进机制。它可能有三种真实用途：

    - **真改进型**：希望你在明确标准、资源支持和复盘机制下改善表现

    - **观察淘汰型**：通过一段观察期，为后续低绩效处理准备材料

    - **谈判施压型**：用PIP制造心理压力，促使你主动离职或接受低补偿方案'
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_PIP_Response_Guide.md
  section: 一、先明确：PIP不是法律概念，而是企业管理工具
- type: concept
  question: 什么是2.2 你要特别盯住的五个关键字段？
  answer: '拿到PIP后，重点看：

    - **起止时间**：从哪天开始，到哪天结束

    - **目标指标**：是否具体、可衡量、可验证

    - **支持条件**：培训、资源、协作人、权限是否明确

    - **复盘机制**：多久review一次，谁参加，谁定结论

    - **结案标准**：达到什么程度算通过，未通过会怎样'
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_PIP_Response_Guide.md
  section: 2.2 你要特别盯住的五个关键字段
