  question: 什么是七、账号、资料与设备自查？
  answer: '- 清理个人设备上的公司登录状态

    - 区分个人资料与公司资料

    - 按规定归还电脑、门禁卡、令牌、测试机等资产

    - 对个人账号中的工作资料，按公司流程迁移而不是私自保留

    - 保留自己提交交接和归还的书面记录'
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Pre_Exit_Risk_Protection_Checklist.md
  section: 七、账号、资料与设备自查
