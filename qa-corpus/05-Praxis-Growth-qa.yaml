- type: concept
  question: 什么是一、社会学视角的基本判断？
  answer: '在职场中，语言霸凌和PUA往往不是单纯“一个人说话难听”，而是以下结构共同作用的结果：

    - **正式权力**：考核权、晋升权、分工权、资源分配权

    - **非正式权力**：声誉控制、圈层排斥、信息封锁、站队文化

    - **制度缺口**：申诉渠道不可信、HR弱势、规章模糊、追责不透明

    - **文化放大器**：服从崇拜、结果至上、羞辱式激励被合理化'
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Verbal_Bullying_PUA_Sociology.md
  section: 一、社会学视角的基本判断
- type: concept
  question: 上对下的核心要点是什么？
  answer: '典型控制资源: 绩效、晋升、项目、评价权；常见控制方式: 贬低、模糊标准、撤资源、劝退施压；风险点: 受害者依赖度高，反击成本大'
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Verbal_Bullying_PUA_Sociology.md
  section: 二、关键权力关系模型
- type: concept
  question: 同级围猎的核心要点是什么？
  answer: '典型控制资源: 信息、协作接口、舆论场；常见控制方式: 冷处理、集体孤立、甩锅；风险点: 外表像“配合问题”，实则排斥'
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Verbal_Bullying_PUA_Sociology.md
  section: 二、关键权力关系模型
- type: concept
  question: 跨部门施压的核心要点是什么？
  answer: '典型控制资源: 流程卡点、交付评价、领导背书；常见控制方式: 公共否定、反复拉扯、责任外包；风险点: 容易被包装成协作冲突'
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Verbal_Bullying_PUA_Sociology.md
  section: 二、关键权力关系模型
- type: concept
  question: 什么是六、从社会学角度识别高风险组织信号？
  answer: '出现以下信号时，往往不只是单一事件，而是结构性风险：

    - 同一团队多人出现失眠、离职、调岗、长期低自信

    - 经理在公开场合频繁通过羞辱建立权威

    - 投诉后常见反噬，而非改善

    - 绩效口径高度弹性、难以追溯

    - 组织对明星管理者形成“免责保护”'
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Verbal_Bullying_PUA_Sociology.md
  section: 六、从社会学角度识别高风险组织信号
- type: concept
  question: 什么是八、研究与实践结合的判断框架？
  answer: '可以用以下三问判断一个问题是否已进入社会学意义上的组织风险：

    1. 这是不是重复发生，而非一次情绪冲突？

    2. 这种行为是否依赖职位、资源或声誉权来维持？

    3. 旁观者是否已因害怕后果而不敢发声？'
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Verbal_Bullying_PUA_Sociology.md
  section: 八、研究与实践结合的判断框架
