  question: 什么是2.1 案例A：周会公开羞辱建立权威？
  answer: "- **场景类型**：会议现场\n- **权力关系**：上对下\n- **主要行为模式**：公开贬低、比较羞辱、群体规训\n- **典型话术**：\n  - “你这点能力也配带项目？”\n  - “大家都看看，这就是不做准备的下场。”\n\
    - **心理机制**：羞耻诱导、创伤性警觉\n- **关键证据**：会议纪要、在场证人、会后确认邮件\n- **主要风险**：团队沉默、受害者不敢继续表达风险\n- **推荐路径**：现场降温 + 会后书面确认 + 观察重复性 + 必要时升级\n\
    - **交叉引用**：\n  - [心理学机制文档](Workplace_Verbal_Bullying_PUA_Psychology.md)\n  - [高压会议现场应对手册](Workplace_High_Pressure_Meeting_Handbook.md)"
