  question: 什么是八、极端场景下的底线？
  answer: '如果会议中出现持续羞辱、人格攻击、诱导违规、强迫背不属于你的责任等情况：

    - 不要在现场情绪性反击

    - 及时转入事实、纪要和书面确认

    - 必要时在会后启动隔级沟通或HR支持'
