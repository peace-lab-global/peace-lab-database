  question: 什么是一、法律适用的基本思路？
  answer: '职场语言霸凌和PUA往往不是单独以“PUA”名义进入法律处理，而是通过以下路径进入正式规则：

    - **人格权侵害**：侮辱、名誉、隐私、健康、性骚扰等

    - **劳动权益侵害**：违法调岗、降薪、违法解除、未尽劳动保护义务

    - **平等就业与反歧视**：性别、婚育、孕产、残障等差别待遇

    - **争议处理程序**：内部申诉、劳动仲裁、诉讼、监察投诉'
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Verbal_Bullying_PUA_Legal_References.md
  section: 一、法律适用的基本思路
- type: concept
