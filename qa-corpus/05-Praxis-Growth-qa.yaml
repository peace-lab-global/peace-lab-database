- type: concept
  question: 什么是1.1 常见职场霸凌表现？
  answer: '职场霸凌通常不是一次普通冲突，而是**持续、重复、带有权力失衡**的伤害性行为，例如：

    - 公开羞辱、长期讽刺、人格贬低

    - 刻意孤立、排斥、边缘化

    - 反复甩锅、恶意否定、制造恐惧

    - 故意不给信息、不给资源，再据此追责

    - 以威胁、羞辱、报复方式逼你离开'
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Bullying_Discrimination_Evidence_and_Complaint_Guide.md
  section: 1.1 常见职场霸凌表现
- type: concept
  question: 什么是1.2 常见歧视表现？
  answer: '歧视通常表现为基于与岗位无关或不应成为差别对待依据的因素，对员工进行不公平对待，例如：

    - 因性别、婚育状态、怀孕哺乳而限制录用、晋升或调薪

    - 因年龄、地域、民族、宗教、残障、疾病史等区别对待

    - 以“你以后要结婚生孩子”“你年纪大了抗压不行”为理由压价或排除机会

    - 对同岗同责员工做明显不合理差别待遇'
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Bullying_Discrimination_Evidence_and_Complaint_Guide.md
  section: 1.2 常见歧视表现
- type: concept
  question: 什么是1.3 严格管理不等于霸凌？
  answer: '以下情形不必然构成霸凌：

    - 对结果不达标做直接批评

    - 要求补交付、补说明、补复盘

    - 在明确标准前提下做绩效考核'
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Bullying_Discrimination_Evidence_and_Complaint_Guide.md
  section: 1.3 严格管理不等于霸凌
- type: concept
  question: 什么是2.1 先判断是否存在人身或安全风险？
  answer: '如果出现以下情况，优先考虑安全与外部支持：

    - 肢体冲突、威胁、非法限制人身自由

    - 强迫饮酒、猥亵、性骚扰、跟踪

    - 严重失眠、惊恐、无法正常工作'
