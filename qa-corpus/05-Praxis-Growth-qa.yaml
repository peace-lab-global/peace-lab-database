  section: 五、推荐资源
- type: concept
  question: 什么是一、领域概述？
  answer: 国际经济学的理论根基可以追溯到亚当·斯密的绝对优势理论（Absolute Advantage）和大卫·李嘉图的比较优势理论（Comparative Advantage）。赫克歇尔-俄林模型（Heckscher-Ohlin Model）进一步解释了要素禀赋差异如何驱动国际贸易。20世纪后半叶，全球贸易自由化在关贸总协定（GATT）和世界贸易组织（WTO）的推动下持续深化。然而，2008年全球金融危机、英国脱欧和美中贸易摩擦标志着"超全球化"（Hyperglobalization）时代的终结。当前国际经济学的核心议题包括：全球供应链重构（Supply
    Chain Reshoring）、数字贸易规则（Digital Trade Rules）、发展中国家债务危机、气候变化对国际经济秩序的影响、以及多边主义与区域主义的博弈。国际收支平衡（Balance of Payments）、购买力平价（Purchasing
    Power Parity）和最优货币区理论（Optimum Currency Area）等经典概念仍然为理解当代国际经济现象提供了重要的分析框架。
  source: 05-Praxis-Growth/talks/ted-talks/Framework_International_Economics.md
  section: 一、领域概述
- type: concept
  question: 什么是三、核心观点？
  answer: '- **全球化的不对称性**：全球化创造了巨大的总体收益，但收益分配极不均匀——赢家与输家的分化是当前国际政治经济紧张的根本原因

    - **贸易与发展**：国际贸易是发展的重要引擎，但贸易开放需要辅以适当的产业政策、社会保护和能力建设

    - **全球治理缺口**（Global Governance Gap）：现有的国际经济治理机构（IMF、世界银行、WTO）面临合法性危机和改革压力

    - **数字贸易新规则**：数字经济正在重塑国际贸易的规则——数据跨境流动、数字税和平台监管成为新的政策焦点

    - **供应链韧性**（Supply Chain Resilience）：新冠疫情和地缘政治冲突暴露了全球供应链的脆弱性，"效率"与"韧性"的权衡成为新议题'
  source: 05-Praxis-Growth/talks/ted-talks/Framework_International_Economics.md
  section: 三、核心观点
- type: concept
  question: 什么是四、实践启示？
  answer: '1. **政策层面**：在制定贸易政策时平衡效率与公平，建立有效的贸易调整援助（Trade Adjustment Assistance）机制

    2. **企业战略**：在全球化运营中采用"中国+1"（China Plus One）等多元化供应链策略，降低地缘政治风险

    3. **多边合作**：支持WTO改革和多边贸易规则的现代化，特别是数字贸易和环境产品的规则制定

    4. **发展中国家视角**：在国际经济分析中纳入发展中国家的视角和需求，避免"西方中心主义"的盲点

    5. **金融稳定**：加强全球金融安全网（Global Financial Safety Net），防范跨境资本流动带来的系统性风险'
  source: 05-Praxis-Growth/talks/ted-talks/Framework_International_Economics.md
  section: 四、实践启示
- type: concept
  question: 什么是五、推荐资源？
  answer: '- 📚 **书籍**：《经济学：用户指南》（Ha-Joon Chang 著）、《世界3.0》（Pankaj Ghemawat 著）、《全球化悖论》（Dani Rodrik 著）

    - 🎥 **在线课程**：MIT OpenCourseWare 国际经济学课程、edX 发展经济学专项课程

    - 📖 **数据来源**：世界银行开放数据、IMF世界经济展望、WTO年度报告

    - 🌐 **机构**：彼得森国际经济研究所（PIIE）、布鲁金斯学会、国际贸易中心（ITC）'
  source: 05-Praxis-Growth/talks/ted-talks/Framework_International_Economics.md
