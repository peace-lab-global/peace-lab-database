  answer: '缓解期状态: 潜伏的消极信念(如"我不够好")；复发触发过程: 轻微情绪低落激活图式；MBCT干预点: 去中心化:看到信念只是想法'
  source: 05-Praxis-Growth/personal-development/mindfulness/Mindfulness_Based_Cognitive_Therapy.md
  section: 抑郁复发的认知模型
- type: concept
  question: 自动思维的核心要点是什么？
  answer: '缓解期状态: 平时不活跃；复发触发过程: 消极自动思维涌现；MBCT干预点: 元认知觉察:注意到想法'
  source: 05-Praxis-Growth/personal-development/mindfulness/Mindfulness_Based_Cognitive_Therapy.md
  section: 抑郁复发的认知模型
- type: concept
  question: 正念减压疗法的核心要点是什么？
  answer: '英文术语: Mindfulness-Based Stress Reduction (MBSR)；源头语言: English；定义: 由Jon Kabat-Zinn开发的8周正念训练课程,用于应对压力、疼痛和疾病；临床意义:
    将正念引入主流医学的开创性课程'
  source: 05-Praxis-Growth/personal-development/mindfulness/Mindfulness_Based_Stress_Reduction.md
  section: 核心术语表 (Core Terminology)
