  section: 2.1 案例A：周会公开羞辱建立权威
- type: concept
  question: 什么是2.2 案例B：私下长期否定导致自我怀疑？
  answer: "- **场景类型**：一对一谈话\n- **权力关系**：上对下\n- **主要行为模式**：人格化评价、模糊否定、情感抽离\n- **典型话术**：\n  - “你最大的问题是人不行。”\n  - “我已经懒得教你了。”\n\
    - **心理机制**：煤气灯效应、习得性无助\n- **关键证据**：聊天记录、录音、任务反馈对照\n- **主要风险**：受害者把问题全部内化，逐步丧失判断力\n- **推荐路径**：要求具体标准 + 建立任务对照表 + 引入第三方"
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Verbal_Bullying_PUA_Case_Library.md
  section: 2.2 案例B：私下长期否定导致自我怀疑
- type: concept
  question: 什么是2.3 案例C：忽冷忽热式认可控制？
  answer: "- **场景类型**：日常管理\n- **权力关系**：上对下\n- **主要行为模式**：间歇性强化、情绪操纵、奖惩不稳定\n- **典型表现**：\n  - 一天内先夸“你最可靠”，后又说“你什么都做不好”\n  -\
    \ 在资源和认可上反复拉扯\n- **心理机制**：关系成瘾、外部评价依赖\n- **关键证据**：连续时间线、消息截图、任务分配变化\n- **主要风险**：受害者持续追逐认可，越来越难退出\n- **推荐路径**：看长期模式，不看单次夸奖；减少情绪性解释依赖"
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Verbal_Bullying_PUA_Case_Library.md
  section: 2.3 案例C：忽冷忽热式认可控制
- type: concept
  question: 什么是2.4 案例D：申诉后遭遇报复性低绩效？
  answer: "- **场景类型**：绩效管理\n- **权力关系**：上对下 + 组织中介失灵\n- **主要行为模式**：报复、标签化、程序不透明\n- **典型表现**：\n  - 提交投诉后突然被打低绩效\n  - 绩效标准与过往版本明显不一致\n\
    - **心理机制**：恐惧强化、沉默驯化\n- **关键证据**：申诉时间点、历史绩效记录、面谈纪要、周报\n- **主要风险**：从管理问题升级为劳动争议\n- **推荐路径**：固定申诉前后变化、申请绩效复核、准备维权材料\n- **交叉引用**：\n\
    \  - [PIP应对指南](Workplace_PIP_Response_Guide.md)\n  - [职场维权申诉邮件与仲裁请求模板](Workplace_Complaint_Email_and_Arbitration_Request_Templates.md)"
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Verbal_Bullying_PUA_Case_Library.md
  section: 2.4 案例D：申诉后遭遇报复性低绩效
- type: concept
  question: 什么是2.5 案例E：孕产节点下的语言压迫与边缘化？
  answer: "- **场景类型**：返岗、晋升、项目分配\n- **权力关系**：上对下 + 组织偏见\n- **主要行为模式**：婚育偏见、机会剥夺、柔性打压\n- **典型话术**：\n  - “你现在还有精力带核心项目吗？”\n\
    \  - “团队也要考虑稳定性。”\n- **心理机制**：身份污名化、角色去能力化\n- **关键证据**：返岗前后职责变化、晋升口径变化、对比样本\n- **主要风险**：歧视被包装成“业务安排”\n- **推荐路径**：做差别对待对照、固定返岗前后变化、必要时同步法规路径"
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Verbal_Bullying_PUA_Case_Library.md
  section: 2.5 案例E：孕产节点下的语言压迫与边缘化
- type: concept
  question: 什么是2.6 案例F：违法调岗被包装成“给你新机会”？
  answer: "- **场景类型**：组织调整\n- **权力关系**：上对下\n- **主要行为模式**：角色剥离、模糊协商、柔性施压\n- **典型话术**：\n  - “这次调岗是公司对你的培养。”\n  - “你不接受就是不顾大局。”\n\
    - **心理机制**：道德绑架、顺从压力\n- **关键证据**：劳动合同、岗位说明、调岗通知、薪酬变化\n- **主要风险**：被迫接受实质性不利变更\n- **推荐路径**：区分合理调配与实质变更，不轻易口头同意"
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Verbal_Bullying_PUA_Case_Library.md
  section: 2.6 案例F：违法调岗被包装成“给你新机会”
- type: concept
  question: 什么是2.7 案例G：劝退协商中的软性恐吓？
  answer: "- **场景类型**：离职协商\n- **权力关系**：管理者 + HR\n- **主要行为模式**：暗示性威胁、未来损害预告、逼签\n- **典型话术**：\n  - “主动走对你简历好看。”\n  - “如果走到正式流程，对你不会有好处。”\n\
    - **心理机制**：预期恐惧、声誉控制\n- **关键证据**：会议录音、离职协议版本、催签记录\n- **主要风险**：员工在高压下签下不利文件\n- **推荐路径**：申请冷静期、书面确认、法务或外部咨询后再决定"
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Verbal_Bullying_PUA_Case_Library.md
  section: 2.7 案例G：劝退协商中的软性恐吓
