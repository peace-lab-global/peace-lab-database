- type: concept
  question: 正念开会的核心要点是什么？
  answer: '英文名 (English Term): Mindful Meeting；原始语言/术语: —；词源含义: 将正念觉察融入会议全过程；精确定义: 以有意识、非评判的觉察态度参与会议的每一个环节——倾听、表达、决策、互动；区分与备注:
    不是"沉默会议"或"冥想代替会议"，而是在正常会议流程中嵌入觉察品质；专业视角 (Professional Perspective): 整合正念减压(MBSR)与组织心理学，为职场最常见的人际交互场景提供正念干预'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Meeting_Practice.md
  section: 核心术语与词源表
- type: concept
  question: 正念倾听的核心要点是什么？
  answer: '英文名 (English Term): Mindful Listening；原始语言/术语: 巴利: *Sati* + 梵: *Śravaṇa* (श्रवण, 聆听)；词源含义: 带着全然临在与非评判态度的深度聆听；精确定义:
    在会议中暂停内心对话，全部注意力投入说话者的语音、内容、情绪与非言语信号；区分与备注: 与"等待发言"式假听不同；与"选择性听取"不同；专业视角 (Professional Perspective): 激活颞上沟(STS)与镜像神经元，提升共情准确度(Decety
    & Ickes, 2009)'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Meeting_Practice.md
  section: 核心术语与词源表
- type: concept
  question: Zoom疲劳的核心要点是什么？
  answer: '英文名 (English Term): Zoom Fatigue；原始语言/术语: —；词源含义: 视频会议导致的认知与情绪耗竭；精确定义: 因持续自我监控、非言语信号缺失、注视压力导致的疲劳综合症；区分与备注: 与一般会议疲劳不同，特指视频通讯特有的疲劳机制；专业视角
    (Professional Perspective): Stanford研究：Zoom疲劳涉及镜像焦虑、物理束缚、认知负荷与自我监控四维度(Bailenson, 2021)'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Meeting_Practice.md
  section: 核心术语与词源表
- type: concept
  question: 核心定义的核心要点是什么？
  answer: '内容: 正念开会是将正念原则——有意识觉察、非评判接纳、当下临在——系统性地融入会议全过程（会前准备、会中互动、会后反思）的结构化实践方法'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Meeting_Practice.md
  section: 2.1 操作定义
- type: concept
  question: 关键要素的核心要点是什么？
  answer: '内容: 1. 觉察(Awareness)：觉知自己和他人的身心状态<br>2. 专注(Attention)：将注意力锚定在会议内容与互动过程上<br>3. 接纳(Acceptance)：非评判地接纳不同观点与情绪反应<br>4.
    意图(Intention)：带着清晰目的与开放态度进入会议'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Meeting_Practice.md
  section: 2.1 操作定义
- type: concept
  question: 范畴界定的核心要点是什么？
  answer: '内容: 正念开会不是"冥想会议"——不取消议程、不要求沉默；而是在常规会议框架中提升参与者的觉察品质，改善互动质量'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Meeting_Practice.md
  section: 2.1 操作定义
- type: concept
  question: 注意调节** (Self-regulation of attention)的核心要点是什么？
  answer: '会议中的表现: 持续关注发言者内容，觉察分心并温柔拉回；抑制对下一话题的精细化加工；训练目标: 提升会议中的深度倾听能力'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Meeting_Practice.md
