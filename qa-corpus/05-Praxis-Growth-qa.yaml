  question: 什么是一、适用场景？
  answer: '本手册适用于以下会议情境：

    - 被领导在会上突然点名追问

    - 项目延期、事故、客户投诉后的追责会议

    - 上级情绪明显升高，会议氛围紧绷

    - 跨部门互相推责，焦点开始失控

    - 你尚未准备充分，却被要求立即表态'
