- type: concept
  question: 正念的核心要点是什么？
  answer: '英文名 (English Term): Mindfulness；原始语言/术语 (Original Language): 巴利: *Sati* (念); 梵: *Smṛti* (स्मृति, 记忆/忆念)；词源含义: "记得当下",持续觉察此时此刻的身心状态；精确定义:
    不评判地觉察当下体验(感受/思维/情绪/感官)；区分与备注: 不是"专注"或"放空",而是"觉察一切正在发生的"；专业视角 (Professional Perspective): 源自佛教禅修,经Kabat-Zinn世俗化为MBSR,成为循证心理干预'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Daily_Living.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 正念日常生活的核心要点是什么？
  answer: '英文名 (English Term): Mindful Daily Living；原始语言/术语 (Original Language): -；词源含义: 将正念原则融入日常活动(走路/吃饭/喝水/工作),而非仅在坐禅时练习；精确定义:
    强调"生活即修行",打破"正念=打坐"的局限；区分与备注: 与"非正式正念练习"同义；专业视角 (Professional Perspective): 对无法长时间打坐者更可及,研究显示日常正念同样有效'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Daily_Living.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 初心的核心要点是什么？
  answer: '英文名 (English Term): Beginner''s Mind；原始语言/术语 (Original Language): 日: *初心* (Shoshin)；词源含义: 以"第一次遇见"的新鲜感看待熟悉事物；精确定义:
    放下先入为主的判断与期待,保持好奇与开放；区分与备注: 与"专家心"相对,后者自动化、评判、无趣；专业视角 (Professional Perspective): 可对抗习惯化与自动驾驶模式,恢复感官敏感度'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Daily_Living.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
