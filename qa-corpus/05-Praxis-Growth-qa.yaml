  section: 五、推荐资源
- type: concept
  question: 什么是一、领域概述？
  answer: AI基础理论研究如何使机器表现出智能行为——从感知、学习、推理到决策。AI的理论根基可追溯到1950年Alan Turing提出的"图灵测试"（Turing Test）和1956年Dartmouth会议。经过数次"AI寒冬"（AI
    Winters）后，深度学习的突破在2012年ImageNet竞赛中由AlexNet标志性地开启了AI革命。当代AI理论的核心议题包括：如何从数据中学习有效表征（Representation Learning）、如何构建能理解自然语言的模型（Large
    Language Models）、如何实现通用人工智能（AGI）的理论路径、以及AI安全与对齐（AI Safety and Alignment）的理论基础。AI理论不仅是技术学科，还涉及认知科学、哲学和伦理学的深层问题：什么是智能？机器能拥有真正的理解力吗？AI应该具有什么样的价值观？
  source: 05-Praxis-Growth/talks/ted-talks/Framework_AI_Theory.md
  section: 一、领域概述
- type: concept
  question: 什么是三、核心观点？
  answer: '- **数据驱动的学习范式**：当代AI的核心突破在于从"人工设计特征"转向"数据自动学习特征"——深度神经网络通过反向传播（Backpropagation）自动发现数据中的层级化表征

    - **规模法则**（Scaling Laws）：模型参数量和训练数据的增加持续带来性能提升，这被称为"规模法则"——但单纯扩大规模是否足以实现AGI仍是开放问题

    - **Transformer革命**：2017年提出的Transformer架构通过自注意力机制（Self-Attention）彻底改变了NLP，并扩展到视觉、音频和多模态领域

    - **强化学习的力量**：通过试错和延迟奖励学习策略，强化学习在游戏、机器人控制和科学优化中展现了超越人类的能力

    - **AI对齐与安全**：如何确保AI系统的目标与人类价值观一致是AI理论中最重要的未解问题之一，涉及博弈论、逆向强化学习和可解释性研究'
  source: 05-Praxis-Growth/talks/ted-talks/Framework_AI_Theory.md
  section: 三、核心观点
- type: concept
  question: 什么是四、实践启示？
  answer: '1. **教育层面**：在计算机科学教育中加强AI伦理和安全的理论训练，培养不仅"能构建AI"而且"能负责任地构建AI"的新一代研究者

    2. **研究策略**：在追求规模扩展的同时，加大对因果推理、常识学习和可解释AI（Explainable AI）等基础理论的投资

    3. **跨学科合作**：AI理论的发展需要与认知科学、神经科学和哲学深度对话，从人类智能中汲取设计灵感

    4. **安全优先**：在AI系统中嵌入安全设计原则——包括可中断性（Corrigibility）、可解释性和不确定性量化

    5. **开放与共享**：支持AI研究的开放科学（Open Science）实践，确保AI知识的广泛可及性，避免技术垄断'
  source: 05-Praxis-Growth/talks/ted-talks/Framework_AI_Theory.md
  section: 四、实践启示
