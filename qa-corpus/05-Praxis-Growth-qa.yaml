  question: 正念行走的核心要点是什么？
  answer: '英文名: Mindful Walking；原始语言/术语: -；词源含义: 将正念觉察应用于行走全过程；精确定义: 有意识地、非评判地觉察行走中的运动觉、触觉、空间感与本体感觉的动态冥想形式；区分与备注: 不是"散步"或"健身走"，而是对行走行为本身的深度觉察训练；专业视角:
    最具身心整合性的正念练习，同时激活运动系统与觉察网络'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Walking_Practice.md
  section: 1. 核心术语与词源表
- type: concept
  question: 经行的核心要点是什么？
  answer: '英文名: Walking Meditation；原始语言/术语: 巴利: *Caṅkama* (चङ्कम); 梵: *Caṅkrama*；词源含义: 在固定路径上来回步行的禅修形式；精确定义: 在15-30米直线路径上以极缓慢至正常速度来回行走，全程觉察步态各阶段；区分与备注:
    与"散步正念"不同，经行是正式禅修形式，通常与坐禅交替；专业视角: 南传佛教核心修行方式之一，佛陀本人常在饭后经行'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Walking_Practice.md
  section: 1. 核心术语与词源表
- type: concept
  question: 本体感觉的核心要点是什么？
  answer: '英文名: Proprioception；原始语言/术语: 拉丁: *proprius* (自身的) + *capere* (感知)；词源含义: 对身体在空间中位置与运动的感知；精确定义: 通过肌梭、腱器官、关节受体感知肢体位置、运动速度与力量；区分与备注:
    与内感受(interoception, 内脏信号)和外感受(exteroception, 外部刺激)区分；专业视角: 正念行走是训练本体感觉觉察的理想载体，与平衡能力、跌倒预防正相关'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Walking_Practice.md
  section: 1. 核心术语与词源表
- type: concept
  question: 身念处的核心要点是什么？
  answer: '巴利语: *Kāyānupassanā*；在行走中的具体觉察: 脚底触感、重心转移、腿部肌肉收缩与释放、膝盖弯曲角度、脊椎直立、呼吸节律随步伐变化；照见真理: 身为无常过程，非"我"在行走；心理学对应: 本体感觉与运动觉整合'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Walking_Practice.md
  section: 2.1 佛教经行传统与四念处
- type: concept
  question: 受念处的核心要点是什么？
  answer: '巴利语: *Vedanānupassanā*；在行走中的具体觉察: 脚底触地的舒适感(乐受)、腿部酸痛(苦受)、中性的步伐感(不苦不乐受)、微风拂面的愉悦；照见真理: 感受刹那生灭，无固定主体；心理学对应: 情感觉察与效价辨识'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Walking_Practice.md
  section: 2.1 佛教经行传统与四念处
- type: concept
  question: 心念处的核心要点是什么？
  answer: '巴利语: *Cittānupassanā*；在行走中的具体觉察: 行走时的心理状态：急躁想走快、厌烦想停下、平静安住、贪恋户外风景、排斥嘈杂环境；照见真理: 心态刹那变化，无永恒自我；心理学对应: 元认知监测'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Walking_Practice.md
