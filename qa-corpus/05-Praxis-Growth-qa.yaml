- type: concept
  question: 什么是一、为什么很多管理者会变得情绪化？
  answer: '常见原因包括：

    - 上层压力直接下传，没有做缓冲与翻译

    - 自己对风险、失控和不确定性容忍度低

    - 缺乏结构化反馈能力，只会用情绪推动执行

    - 把“高要求”误当成“高压威慑”

    - 长期过劳，导致情绪调节能力下降'
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Manager_Emotional_Self_Check.md
  section: 一、为什么很多管理者会变得情绪化
- type: concept
  question: 什么是二、情绪化管理的早期信号？
  answer: '如果你开始出现以下表现，就需要警惕：

    - 开会时经常打断、提高音量、讽刺人

    - 遇到问题先找人背责，而不是先找事实

    - 对同一问题今天一个标准，明天一个标准

    - 喜欢在公开场合给人难堪，认为这样更有效

    - 觉得“他们就是要被骂才会动”'
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Manager_Emotional_Self_Check.md
  section: 二、情绪化管理的早期信号
- type: concept
  question: 什么是六、管理者自检清单？
  answer: '每周至少问自己一次：

    - 我最近是在用标准带团队，还是用情绪带团队？

    - 我的批评是否足够具体、可执行？

    - 团队现在是因为清楚要求而行动，还是因为害怕我而行动？

    - 我是否允许团队尽早暴露风险，而不是把坏消息藏起来？

    - 如果别人用我对待下属的方式来对待我，我会接受吗？'
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Manager_Emotional_Self_Check.md
  section: 六、管理者自检清单
- type: concept
  question: 什么是七、给高压管理者的底线提醒？
  answer: '- 高标准不等于高羞辱

    - 结果导向不等于忽视人

    - 提高效率不等于制造恐惧

    - 权威来自清晰、稳定和可信，不来自不可预测的爆发'
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Manager_Emotional_Self_Check.md
