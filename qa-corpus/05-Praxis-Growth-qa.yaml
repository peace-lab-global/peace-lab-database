  question: 明觉的核心要点是什么？
  answer: '英文名: Clear Comprehension；原始语言/术语: 巴利: *Sampajañña* (正知)；词源含义: 对当下行为的清晰了知；精确定义: 在每个动作中保持对目的、适宜性、领域、真实性的四重觉知；区分与备注:
    "正念"(sati)是觉察，"明觉"(sampajañña)是理解所觉察的；专业视角: 正念饮水从"觉察"进阶为"明觉"的关键概念'
