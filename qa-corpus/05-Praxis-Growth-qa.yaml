- type: concept
  question: 内感受觉察的核心要点是什么？
  answer: '英文名: Interoception；原始语言/术语: 拉丁: *interocipere* (内部感知)；词源含义: 对身体内部信号的感知能力；精确定义: 觉察口渴、饱足、温度变化、胃部感受等内源信号；区分与备注: 与外感受(exteroception)和本体感觉(proprioception)区分；专业视角:
    正念饮水是训练内感受觉察的理想载体，与情绪调节能力正相关'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Drinking_Practice.md
  section: 1. 核心术语与词源表
- type: concept
  question: 身念处的核心要点是什么？
  answer: '巴利语: *Kāyānupassanā*；在饮水中的具体觉察: 口渴感、手臂动作、嘴唇触感、吞咽运动、水的温度与质地、胃部充盈感；照见真理: 身为物质过程，非"我"在喝水；心理学对应: 本体感觉与内感受整合'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Drinking_Practice.md
  section: 2.1 佛教四念处与饮水觉察的关联
- type: concept
  question: 受念处的核心要点是什么？
  answer: '巴利语: *Vedanānupassanā*；在饮水中的具体觉察: 口渴缓解的愉悦感(乐受)、冷水刺激的不适感(苦受)、中性饮水(不苦不乐受)；照见真理: 感受是无常的、缘起的；心理学对应: 情感觉察与效价辨识'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Drinking_Practice.md
  section: 2.1 佛教四念处与饮水觉察的关联
- type: concept
  question: 心念处的核心要点是什么？
  answer: '巴利语: *Cittānupassanā*；在饮水中的具体觉察: 饮水时的心理状态：急躁、散乱、平静、满足、贪恋(想再喝)、厌恶(不喜此味)；照见真理: 心态不断变化，无固定主体；心理学对应: 元认知监测'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Drinking_Practice.md
  section: 2.1 佛教四念处与饮水觉察的关联
- type: concept
  question: 非评判的核心要点是什么？
  answer: '英文: Non-judging；在饮水中的体现: 不评价"这水好不好喝"，只觉察味觉本身；常见违背: "这水太温了""应该喝更多""我不该喝含糖饮料"；练习要点: 觉察评判出现，标记"评判"，回到感受本身'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Drinking_Practice.md
  section: 2.2 Kabat-Zinn七种正念态度在饮水中的体现
