- type: concept
  question: 什么是一、领域概述？
  answer: 创伤心理学关注个体在经历战争、暴力、事故、自然灾害、虐待等威胁生命或严重危害身心完整性的事件后，产生的心理和生理反应。Bessel van der Kolk在其开创性著作《身体从未忘记》中指出，创伤的核心不在于事件本身，而在于它如何在神经系统中留下印记。创伤影响大脑的多个区域：杏仁核（Amygdala）过度活跃导致警觉性增高，海马体（Hippocampus）功能受损导致记忆碎片化，前额叶皮层（Prefrontal
    Cortex）功能抑制导致情绪调节困难。研究表明，约70%的成年人在一生中至少经历过一次创伤事件，其中约20%会发展为PTSD。创伤的治疗已经从传统的谈话治疗发展到包括EMDR（眼动脱敏与再加工）、体感治疗（Somatic Therapy）和神经反馈（Neurofeedback）在内的多元化方法。
  source: 05-Praxis-Growth/talks/ted-talks/Trauma_Overview.md
  section: 一、领域概述
- type: concept
  question: 什么是三、核心观点？
  answer: '- **创伤的神经生物学**：创伤导致杏仁核过度激活、前额叶功能抑制和海马体体积缩小，形成"过度警觉-回避-侵入性记忆"的症状三角

    - **创伤的代际传递**（Intergenerational Trauma）：创伤的影响可以通过表观遗传机制和行为模式跨代传递，大屠杀幸存者后代和原住民社区的研究均证实了这一点

    - **创伤后成长**（Post-Traumatic Growth, PTG）：约50%的创伤幸存者在恢复过程中报告了积极变化——更深的人际关系、更强的自我认知、更清晰的生活优先级

    - **身体为中心的治疗**：EMDR、体感体验疗法（Somatic Experiencing）和躯体整合方法越来越被证实对创伤治疗有效

    - **集体创伤与社会愈合**：种族创伤、历史创伤和社区创伤需要集体层面的承认、纪念和修复性正义'
  source: 05-Praxis-Growth/talks/ted-talks/Trauma_Overview.md
  section: 三、核心观点
- type: concept
  question: 什么是四、实践启示？
  answer: '1. **创伤知情实践**：在学校、医院和社区组织中推广"创伤知情"原则——假设每个人都可能经历过创伤，以安全、信任和赋权的方式互动

    2. **身体觉察**：培养正念（Mindfulness）和身体扫描（Body Scan）习惯，增强对躯体创伤信号的觉察

    3. **安全关系**：创伤的疗愈发生在安全的人际关系中，建立至少一段稳定的、可信赖的信任关系是恢复的基础

    4. **叙事整合**：通过写作、艺术治疗或专业治疗帮助将碎片化的创伤记忆整合为连贯的生命叙事

    5. **社会倡导**：推动对儿童保护、家庭暴力和社区安全的公共投资，从源头预防创伤的发生'
  source: 05-Praxis-Growth/talks/ted-talks/Trauma_Overview.md
  section: 四、实践启示
