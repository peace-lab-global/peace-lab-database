  question: 社交焦虑（SAD）的核心要点是什么？
  answer: '与拖延的关联: 担心他人评价而推迟社交或公开任务；典型表现: 推迟演讲、推迟回复邮件'
  source: 05-Praxis-Growth/personal-development/procrastination/04_拖延与心理健康.md
  section: 拖延与焦虑（Anxiety）
- type: concept
  question: 表现焦虑的核心要点是什么？
  answer: '与拖延的关联: 害怕在评价情境中表现不佳；典型表现: 考试前无法开始复习'
  source: 05-Praxis-Growth/personal-development/procrastination/04_拖延与心理健康.md
  section: 拖延与焦虑（Anxiety）
- type: concept
  question: 动机缺失（Anhedonia）的核心要点是什么？
  answer: '对任务执行的影响: 对任务失去兴趣和价值感；机制: 多巴胺系统功能低下'
