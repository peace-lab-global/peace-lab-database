  question: 什么是一、总原则？
  answer: '- 口径统一：简历、面试、离职证明、证明人说法尽量一致

    - 信息克制：回答真实、简洁、可验证

    - 风险前置：提前准备好证明人、证明材料和解释模板

    - 不主动扩写争议：不在背调场景主动讲过多冲突细节'
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Background_Check_Risk_Control_Guide.md
  section: 一、总原则
