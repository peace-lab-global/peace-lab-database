- type: concept
  question: 开场站立的核心要点是什么？
  answer: '时长: 1-2分钟；操作指导: 站在路径起点，双脚与肩同宽；闭眼3次深呼吸；觉察身体重量如何落在双脚上；觉察锚点: 脚底压力分布、重力感；指导语脚本: *"站在这里。感受你的体重——所有的重量——穿过双腿、双脚，落在大地上。大地在接住你。"*'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Walking_Protocols.md
  section: 1.1 室内正式经行 (Indoor Formal Walking Meditation)
- type: concept
  question: 意图设定的核心要点是什么？
  answer: '时长: 30秒；操作指导: 内心设定修行意图：不是"走好"，而是"觉察"；睁开眼睛，注视前方地面1-2米处；觉察锚点: 从''做模式''到''觉察模式''的切换；指导语脚本: *"在接下来的时间里，行走就是全部。没有目的地，没有成败。只有这一步。"*'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Walking_Protocols.md
  section: 1.1 室内正式经行 (Indoor Formal Walking Meditation)
- type: concept
  question: 六段觉察行走的核心要点是什么？
  answer: '时长: 15-45分钟；操作指导: 每一步分解为六个微阶段，每阶段2-3秒：① 意图(想要迈步的冲动) → ② 抬起(脚跟→脚掌→脚趾离地) → ③ 移动(脚在空中向前) → ④ 降下(脚开始向地面降落) → ⑤ 触地(脚跟→脚掌→脚趾着地)
    → ⑥ 压实(体重完全转移到这只脚)；觉察锚点: 每阶段对应一个独特的躯体感觉；指导语脚本: *"意图……抬起……感受脚底离开地面的那个瞬间……移动……脚在空中……降下……接近大地……触地……重新回家……压实……稳稳地在这里……"*'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Walking_Protocols.md
  section: 1.1 室内正式经行 (Indoor Formal Walking Meditation)
- type: concept
  question: 走着走着不自觉加速的核心要点是什么？
  answer: '现场处理: 每走10步有意识停顿1秒；长期调整: 设外部提醒(每2分钟一次轻铃声)'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Walking_Protocols.md
  section: 1.1 室内正式经行 (Indoor Formal Walking Meditation)
- type: concept
  question: 身体左右摇晃不稳的核心要点是什么？
  answer: '现场处理: 稍微加快步速，或轻触墙壁；长期调整: 先练站立平衡觉察1周'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Walking_Protocols.md
  section: 1.1 室内正式经行 (Indoor Formal Walking Meditation)
- type: concept
  question: 强烈想坐下/想停止的核心要点是什么？
  answer: '现场处理: 允许自己缩短练习；感受"想停"的冲动本身；长期调整: 从5分钟起步，每周增加2分钟'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Walking_Protocols.md
  section: 1.1 室内正式经行 (Indoor Formal Walking Meditation)
- type: concept
  question: 入口仪式的核心要点是什么？
  answer: '时长: 3分钟；操作指导: 在自然环境入口处停下；闭眼3次深呼吸；依次打开五感：听(远处声音→近处声音)→嗅(空气味道)→触(风/温度)→睁眼看(光影/色彩)；感官焦点: 五感从关闭→逐一打开；季节性调整: 冬季：重点觉察寒冷空气进入鼻腔的清凉感'
  source: 05-Praxis-Growth/personal-development/mindfulness/mindful-daily-living/Mindful_Walking_Protocols.md
  section: 1.2 户外自然正念行走 (Outdoor Nature Walking Meditation)
