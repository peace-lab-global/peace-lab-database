  question: 什么是九、面对情绪化上级时的汇报微调？
  answer: '- 把长解释改成短结论

    - 把“问题很多”改成“当前最大风险是X”

    - 把“我觉得”改成“目前事实是”

    - 把“我做不了”改成“在现有资源下可交付的是”

