  question: 什么是七、风险自查清单？
  answer: '- 我的离职原因说法是否简洁、一致、可验证？

    - 我的证明人是否已提前沟通？

    - 我的薪资证明材料是否齐全？

    - 我的空窗期解释是否真实、不过度？

    - 是否有高风险表述需要统一调整？'
