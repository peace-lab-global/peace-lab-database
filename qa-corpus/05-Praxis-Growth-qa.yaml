  question: 什么是六、为什么旁人常常看不出来？
  answer: '- 语言霸凌很多发生在灰色地带，外人只看到“领导很严格”

    - 对方善于在公开场合保持体面，在私下施加压力

    - 受害者出于羞耻感，不愿意完整描述遭遇

    - 组织更容易理解“结果不好”，不容易理解“精神控制”'
