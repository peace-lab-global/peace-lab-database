  question: 什么是五、推荐资源？
  answer: '- 📚 **书籍**：《学会如何学习》（Barbara Oakley 著）、《终身成长》（Carol Dweck 著）、《认知天性》（Peter Brown 等著）

    - 🎥 **在线课程**：Coursera "Learning How to Learn"（Barbara Oakley）、edX "The Science of Everyday Thinking"

    - 📖 **学术期刊**：*Journal of Educational Psychology*、*Learning and Instruction*、*Cognitive Science*

    - 🌐 **机构**：国际学习科学学会（ISLS）、美国教育研究协会（AERA）、Deans for Impact'
