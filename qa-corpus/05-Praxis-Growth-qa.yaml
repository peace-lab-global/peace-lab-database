- type: concept
  question: 什么是一、领域概述？
  answer: 流行病学的奠基可以追溯到1854年John Snow通过绘制霍乱病例地图发现伦敦宽街水井是霍乱传播源头——这一"自然实验"被视为流行病学的起源。当代流行病学已经发展出多个分支：传染病流行病学（研究病原体传播动态和防控策略）、慢性病流行病学（研究癌症、心血管疾病和糖尿病的风险因素）、遗传流行病学（研究基因-环境交互作用）、以及社会流行病学（研究社会因素对健康的影响）。流行病学的核心方法包括：队列研究（Cohort
    Study）、病例对照研究（Case-Control Study）、横断面研究（Cross-Sectional Study）和随机对照试验（RCT）。2020年新冠疫情将流行病学推向了全球关注的中心——基本再生数（R0）、血清流行病学（Seroepidemiology）、接触者追踪（Contact
    Tracing）和疫苗有效性评估等流行病学概念进入了公众词汇。大数据、基因组测序和数学建模正在革新流行病学的工具箱。
  source: 05-Praxis-Growth/talks/ted-talks/Framework_Epidemiology.md
  section: 一、领域概述
- type: concept
  question: 什么是三、核心观点？
  answer: '- **监测先行**：有效的疾病防控始于高质量的流行病学监测——早期发现和快速响应是遏制疫情的关键

    - **社会决定因素**：疾病的分布不仅受生物因素影响，更受社会不平等的深刻塑造

    - **数学建模**：流行病学模型（如SIR模型）在预测疫情走势和评估干预措施效果中发挥着核心作用

    - **全球协作**：传染病不分国界——有效的流行病学实践需要超越政治分歧的全球合作

    - **数据革命**：基因组测序、数字接触者追踪和大数据分析正在革新流行病学的工具和方法'
  source: 05-Praxis-Growth/talks/ted-talks/Framework_Epidemiology.md
  section: 三、核心观点
- type: concept
  question: 什么是四、实践启示？
  answer: '1. **投资监测系统**：加强全球疾病监测网络的基础设施建设，特别是在资源有限地区

    2. **数据透明**：在公共卫生危机中确保流行病学数据的及时公开和透明共享

    3. **跨学科协作**：流行病学需要与数学建模、基因组学、社会科学和数据科学深度协作

    4. **公众沟通**：培养流行病学家与公众有效沟通的能力——在危机中清晰传达风险和不确定性

    5. **公平导向**：确保流行病学干预措施惠及最脆弱的人群，避免加剧健康不平等'
  source: 05-Praxis-Growth/talks/ted-talks/Framework_Epidemiology.md
  section: 四、实践启示
- type: concept
  question: 什么是五、推荐资源？
  answer: '- 📚 **书籍**：《流行病学原理》（Kenneth Rothman 著）、《下一个大流行》（Nathan Wolfe 著）、《事实》（Hans Rosling 著）

    - 🎥 **在线课程**：Coursera 流行病学导论（UNC）、edX 全球卫生流行病学

    - 📖 **学术期刊**：*Epidemiology*、*American Journal of Epidemiology*、*The Lancet Infectious Diseases*

    - 🌐 **机构**：WHO流行病学部门、美国CDC流行病情报服务（EIS）、Epidemic Intelligence Initiative'
