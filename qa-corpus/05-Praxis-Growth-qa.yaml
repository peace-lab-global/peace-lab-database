  question: 什么是一、哪些情况下应提前进入“离职前自保模式”？
  answer: '- 持续公开羞辱、PUA、甩锅或越界管理

    - 已多次直接沟通、升级沟通仍无改善

    - 存在明显合规风险、造假风险或不当指令

    - 自己的睡眠、健康、情绪和工作功能已受明显影响

    - 你已经准备转岗、离职或等待新机会落地'
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Pre_Exit_Risk_Protection_Checklist.md
  section: 一、哪些情况下应提前进入“离职前自保模式”
- type: concept
  question: 什么是五、离职前检查清单？
  answer: '- 我是否已整理好关键时间线？

    - 我是否保留了与本人劳动关系直接相关的合法记录？

    - 我是否避免带走不该带走的公司机密或敏感数据？

    - 我是否明确了交接对象、截止时间和交付边界？

    - 我是否对电脑、账号、权限和个人资料做了必要区分？

    - 我是否为离职后的推荐、背调和关系管理预留空间？'
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Pre_Exit_Risk_Protection_Checklist.md
  section: 五、离职前检查清单
