- type: concept
  question: 什么是一、什么是向上管理？
  answer: 向上管理（Upward Management）是指员工或中层管理者主动理解上级的目标、压力、偏好和决策方式，并通过更有效的信息组织、节奏控制、预期管理和边界维护，提升协作效率、降低误解成本与执行风险。
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Upward_Management.md
  section: 一、什么是向上管理
- type: concept
  question: 什么是二、为什么尤其要在“情绪化上级”场景中练习向上管理？
  answer: '面对喜怒无常、易焦躁、反复改口或公开施压的上级，团队经常出现以下问题：

    - 信息只在情绪高点被动传递，导致决策质量下降

    - 下属为了避责而延迟暴露风险，问题越拖越大

    - 上级的临时指令频繁改变优先级，执行成本飙升

    - 公开批评或情绪宣泄破坏心理安全感，团队开始沉默、防御或躺平

    - 责任边界模糊，事后容易出现“我不是这个意思”'
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Upward_Management.md
  section: 二、为什么尤其要在“情绪化上级”场景中练习向上管理
- type: concept
  question: 什么是八、每周一次的向上管理检查清单？
  answer: '- 我是否清楚上级本周最关注的三个目标？

    - 我是否提前暴露了关键风险，而不是等出事后再解释？

    - 我是否在汇报中提供了结论、影响和建议，而不是只有细节？

    - 我是否对关键决策做了书面确认？

    - 我是否区分了“正常高压”与“不可接受的越界行为”？

    - 我是否在保护合作关系的同时，也保护了自己的专业边界？'
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_Upward_Management.md
  section: 八、每周一次的向上管理检查清单
