  section: 一、适用场景
- type: concept
  question: 什么是二、会议前的最低准备？
  answer: '即使只有5分钟，也建议先准备四件事：

    - **当前结论**：现在最重要的状态是什么

    - **关键事实**：2-3条最不能错的事实

    - **最大风险**：如果不处理，会出什么问题

    - **下一步动作**：你建议现在先做什么'
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_High_Pressure_Meeting_Handbook.md
  section: 二、会议前的最低准备
- type: concept
  question: 什么是四、现场应对结构？
  answer: '推荐使用以下四步：

    1. **接球**：先表示收到问题

    2. **结论**：用一句话说当前判断

    3. **事实**：补两三条关键事实

    4. **动作**：说清下一步和所需支持'
  source: 05-Praxis-Growth/personal-development/workplace-expression/Workplace_High_Pressure_Meeting_Handbook.md
  section: 四、现场应对结构
