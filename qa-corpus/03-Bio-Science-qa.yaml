  question: 阿尔茨海默病的核心要点是什么？
  answer: '英文名: Alzheimer''s Disease (AD)；词源/来源: Alois Alzheimer, 1906；精确定义: 最常见的失智症类型，占60-70%'
  source: 03-Bio-Science/death/Death_Dementia_End_of_Life.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 漫长的告别的核心要点是什么？
  answer: '英文名: The Long Goodbye；词源/来源: 文学/临床术语；精确定义: 失智症家属经历的渐进式丧失过程'
  source: 03-Bio-Science/death/Death_Dementia_End_of_Life.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 轻度（早期）的核心要点是什么？
  answer: '认知状态: 近期记忆受损；自知力保留；死亡意识特征: 能意识到自己患病；可能对死亡有焦虑；临床意义: 最佳沟通窗口；应尽早讨论临终意愿'
  source: 03-Bio-Science/death/Death_Dementia_End_of_Life.md
  section: 1.1 死亡意识的变化轨迹
- type: concept
  question: 中度（中期）的核心要点是什么？
  answer: '认知状态: 远期记忆受损；定向障碍；语言困难；死亡意识特征: 可能遗忘患病诊断；死亡焦虑可能减轻（因遗忘）；临床意义: 持续的定向与安抚；注意患者情绪变化'
  source: 03-Bio-Science/death/Death_Dementia_End_of_Life.md
  section: 1.1 死亡意识的变化轨迹
- type: concept
  question: 重度（晚期）的核心要点是什么？
  answer: '认知状态: 基本功能丧失；可能无法认出家人；死亡意识特征: 无明确死亡概念；但仍可能有情绪反应；临床意义: 舒适照护优先；非语言沟通'
  source: 03-Bio-Science/death/Death_Dementia_End_of_Life.md
  section: 1.1 死亡意识的变化轨迹
