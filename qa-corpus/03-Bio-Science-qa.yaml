  question: Markdown格式的核心要点是什么？
  answer: '符合程度: 100%符合；认证结果: AAA级；技术说明: 严格的Markdown语法规范'
  source: 03-Bio-Science/biology/std/STD_Quality_Certification_Report.md
  section: 技术质量认证 (Technical Quality Certification)
- type: concept
  question: 文档结构的核心要点是什么？
  answer: '符合程度: 100%符合；认证结果: AAA级；技术说明: 统一的章节结构和编号'
  source: 03-Bio-Science/biology/std/STD_Quality_Certification_Report.md
  section: 技术质量认证 (Technical Quality Certification)
- type: concept
  question: 疾病种类覆盖的核心要点是什么？
  answer: '覆盖程度: 全面；评分(1-5): 5；详细说明: 涵盖主要性传播疾病：细菌性、病毒性、真菌性、寄生虫性'
  source: 03-Bio-Science/biology/std/STD_Quality_Report.md
  section: 文档结构完整性 (Document Structure Completeness)
- type: concept
  question: 专业领域覆盖的核心要点是什么？
  answer: '覆盖程度: 完整；评分(1-5): 5；详细说明: 临床、预防、公共卫生、特殊人群管理四大领域'
  source: 03-Bio-Science/biology/std/STD_Quality_Report.md
  section: 文档结构完整性 (Document Structure Completeness)
- type: concept
  question: 技术层次覆盖的核心要点是什么？
  answer: '覆盖程度: 深度；评分(1-5): 5；详细说明: 从基础概念到前沿技术，从理论到实践'
  source: 03-Bio-Science/biology/std/STD_Quality_Report.md
  section: 文档结构完整性 (Document Structure Completeness)
- type: concept
  question: 孕妇群体的核心要点是什么？
  answer: '主要特征: 生理变化、胎儿影响、激素波动；健康风险: 垂直传播、妊娠并发症；管理挑战: 用药安全、依从性管理；干预重点: 母婴安全保障'
  source: 03-Bio-Science/biology/std/STD_Special_Populations.md
  section: 人群分类与特点 (Population Classification and Characteristics)
- type: concept
  question: 青少年群体的核心要点是什么？
  answer: '主要特征: 生理发育、心理脆弱、知识缺乏；健康风险: 感染风险高、羞耻感强；管理挑战: 沟通障碍、服务可及性；干预重点: 健康教育优先'
  source: 03-Bio-Science/biology/std/STD_Special_Populations.md
  section: 人群分类与特点 (Population Classification and Characteristics)
- type: concept
  question: HIV感染者的核心要点是什么？
  answer: '主要特征: 免疫缺陷、机会性感染、药物相互作用；健康风险: 重症感染、耐药风险；管理挑战: 复杂治疗、依从性挑战；干预重点: 综合管理策略'
  source: 03-Bio-Science/biology/std/STD_Special_Populations.md
  section: 人群分类与特点 (Population Classification and Characteristics)
- type: concept
  question: 性传播疾病的核心要点是什么？
  answer: '英文标准术语: Sexually Transmitted Diseases；缩写/简称: STD；精确定义: 通过性接触为主要传播途径的感染性疾病，可引起泌尿生殖系统及其他器官病变；使用场景: 临床诊断、流行病学调查；相关术语:
    STI, 性传播感染'
  source: 03-Bio-Science/biology/std/STD_Terminology_Dictionary.md
  section: 基础概念术语 (Basic Concept Terms)
- type: concept
  question: 性传播感染的核心要点是什么？
  answer: '英文标准术语: Sexually Transmitted Infections；缩写/简称: STI；精确定义: 性接触传播的病原体感染状态，可能有或无临床症状；使用场景: 现代医学文献、公共卫生；相关术语: STD, 无症状感染'
  source: 03-Bio-Science/biology/std/STD_Terminology_Dictionary.md
  section: 基础概念术语 (Basic Concept Terms)
- type: concept
  question: 泌尿生殖道感染的核心要点是什么？
  answer: '英文标准术语: Urogenital Tract Infections；缩写/简称: UGTI；精确定义: 影响泌尿系统和生殖器官的感染性疾病；使用场景: 临床分类、解剖学描述；相关术语: 尿道炎, 宫颈炎'
  source: 03-Bio-Science/biology/std/STD_Terminology_Dictionary.md
  section: 基础概念术语 (Basic Concept Terms)
- type: concept
  question: 细菌性病原体的核心要点是什么？
  answer: '中文名称: 细菌性STD；英文标准名称: Bacterial STDs；主要代表疾病: 淋病、梅毒、衣原体感染；传播特点: 传播力强，潜伏期短；治疗特点: 抗生素可治愈'
  source: 03-Bio-Science/biology/std/STD_Terminology_Dictionary.md
  section: 病原体分类术语 (Pathogen Classification Terms)
- type: concept
  question: 病毒性病原体的核心要点是什么？
  answer: '中文名称: 病毒性STD；英文标准名称: Viral STDs；主要代表疾病: HIV、HSV、HPV、HBV；传播特点: 持续感染，易复发；治疗特点: 抗病毒治疗控制'
  source: 03-Bio-Science/biology/std/STD_Terminology_Dictionary.md
  section: 病原体分类术语 (Pathogen Classification Terms)
- type: concept
  question: 真菌性病原体的核心要点是什么？
  answer: '中文名称: 真菌性STD；英文标准名称: Fungal STDs；主要代表疾病: 念珠菌病、皮肤癣菌感染；传播特点: 条件致病，局部感染；治疗特点: 抗真菌药物治疗'
  source: 03-Bio-Science/biology/std/STD_Terminology_Dictionary.md
  section: 病原体分类术语 (Pathogen Classification Terms)
- type: concept
  question: 无症状感染的核心要点是什么？
  answer: '中文标准术语: Asymptomatic Infection；英文标准术语: Asymptomatic Infection；临床意义: 无明显临床症状的病原体感染；诊断标准: 实验室检查阳性；相关检查: 核酸检测, 血清学检查'
  source: 03-Bio-Science/biology/std/STD_Terminology_Dictionary.md
  section: 临床诊断术语 (Clinical Diagnostic Terms)
- type: concept
  question: 潜伏感染的核心要点是什么？
  answer: '中文标准术语: Latent Infection；英文标准术语: Latent Infection；临床意义: 病原体持续存在但不引起明显症状；诊断标准: 特异性检测阳性；相关检查: 病毒载量, 特异性抗体'
  source: 03-Bio-Science/biology/std/STD_Terminology_Dictionary.md
  section: 临床诊断术语 (Clinical Diagnostic Terms)
- type: concept
  question: 早期诊断、及时治疗的核心要点是什么？
  answer: '具体要求: 症状出现后尽快就诊；临床意义: 防止并发症、减少传播；实施要点: 提高公众就诊意识'
  source: 03-Bio-Science/biology/std/STD_Treatment_Management.md
  section: 循证医学治疗原则 (Evidence-Based Treatment Principles)
- type: concept
  question: 规范用药、足量足疗程的核心要点是什么？
  answer: '具体要求: 严格按照指南推荐剂量和疗程；临床意义: 确保疗效、防止耐药；实施要点: 医患沟通、用药监督'
  source: 03-Bio-Science/biology/std/STD_Treatment_Management.md
  section: 循证医学治疗原则 (Evidence-Based Treatment Principles)
- type: concept
  question: 个体化治疗的核心要点是什么？
  answer: '具体要求: 根据患者具体情况调整治疗；临床意义: 提高依从性、减少副作用；实施要点: 详细评估、方案调整'
  source: 03-Bio-Science/biology/std/STD_Treatment_Management.md
  section: 循证医学治疗原则 (Evidence-Based Treatment Principles)
- type: concept
  question: 治愈目标的核心要点是什么？
  answer: '具体内容: 病原体完全清除、症状消失；时间节点: 急性期治疗结束；评估指标: 临床症状、实验室检查'
  source: 03-Bio-Science/biology/std/STD_Treatment_Management.md
  section: 治疗目标分层 (Treatment Goal Stratification)
- type: concept
  question: 预防目标的核心要点是什么？
  answer: '具体内容: 防止并发症、避免再感染；时间节点: 治疗全程及随访期；评估指标: 并发症发生率、再感染率'
  source: 03-Bio-Science/biology/std/STD_Treatment_Management.md
  section: 治疗目标分层 (Treatment Goal Stratification)
- type: concept
  question: 康复目标的核心要点是什么？
  answer: '具体内容: 功能恢复、生活质量改善；时间节点: 长期管理阶段；评估指标: 生活质量评分、心理状态'
  source: 03-Bio-Science/biology/std/STD_Treatment_Management.md
  section: 治疗目标分层 (Treatment Goal Stratification)
