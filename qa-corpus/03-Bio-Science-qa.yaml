  question: 1960s的核心要点是什么？
  answer: '理论/模型: 心理应激模型；提出者: Richard Lazarus；核心概念: 认知评估决定应激反应；贡献: 引入心理过程；局限: 生物机制弱'
  source: 03-Bio-Science/biology/hpa-axis/HPA_Axis_Stress_Response.md
  section: 表1.1 应激概念演变 (Evolution of Stress Concept)
