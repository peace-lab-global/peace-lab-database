  question: 抵抗期的核心要点是什么？
  answer: '英文名称: Resistance Stage；时间: 持续(天-周-月)；HPA轴状态: 持续激活；皮质醇水平: 持续升高；机体状态: 适应性调整；代偿；结局: 成功适应或进入衰竭'
