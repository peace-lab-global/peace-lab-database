- type: concept
  question: 肌纤维 (肌腹)的核心要点是什么？
  answer: '英文名: Muscle Fibers (Belly)；力学特性: 粘弹性;可收缩;弹性模量较低 (~10 kPa)；拉伸响应: 初期延长来自肌小节串联排列;长期训练增加肌小节数量；训练效应: 拉伸训练可使肌小节增加 (Serial
    Sarcomere Addition)；专业视角 (Professional Perspective): 肌肉的长度改变主要是神经适应(短期)与结构重塑(长期)的结合'
  source: 03-Bio-Science/biology/stretch/Stretch_Biomechanics_Physiology.md
  section: Muscle-Tendon Unit (MTU) Mechanics (肌肉-肌腱单元力学表)
- type: concept
  question: 肌腱的核心要点是什么？
  answer: '英文名: Tendon；力学特性: 高度有序的I型胶原纤维;弹性模量高 (~1-2 GPa)；拉伸响应: 仅在高负荷下产生微小形变 (~4%);主要储存并释放弹性能；训练效应: 负荷训练(而非拉伸)增加胶原密度与刚度；专业视角
    (Professional Perspective): 肌腱刚度适中对运动表现最优;过软或过硬均不利'
  source: 03-Bio-Science/biology/stretch/Stretch_Biomechanics_Physiology.md
  section: Muscle-Tendon Unit (MTU) Mechanics (肌肉-肌腱单元力学表)
- type: concept
  question: 肌筋膜的核心要点是什么？
  answer: '英文名: Myofascia；力学特性: 包裹肌肉的结缔组织;含III型与I型胶原；拉伸响应: 时间依赖性蠕变 (Creep);温度敏感；训练效应: 持续拉伸(>90秒)可改变粘弹性;增加透明质酸水化；专业视角 (Professional
    Perspective): 筋膜是"张拉整体"的关键,其形变影响整个动力链'
  source: 03-Bio-Science/biology/stretch/Stretch_Biomechanics_Physiology.md
  section: Muscle-Tendon Unit (MTU) Mechanics (肌肉-肌腱单元力学表)
- type: concept
  question: 牵张反射的核心要点是什么？
  answer: '英文名: Stretch Reflex (Myotatic Reflex)；涉及结构: 肌梭 (Muscle Spindle) → Ia感觉纤维 → α运动神经元；生理过程: 快速拉伸触发同侧肌肉收缩 (单突触反射)；功能意义:
    保护肌肉免受过度拉伸损伤；临床应用: 快速弹振拉伸会激活此反射导致抵抗;需缓慢拉伸以避免；专业视角 (Professional Perspective): 膝跳反射是经典示例;静态拉伸通过慢速延展来抑制此反射'
  source: 03-Bio-Science/biology/stretch/Stretch_Biomechanics_Physiology.md
  section: Neurophysiology of Stretching (拉伸神经生理学机制表)
- type: concept
  question: 高尔基腱器官 (GTO) 抑制的核心要点是什么？
  answer: '英文名: Autogenic Inhibition；涉及结构: 高尔基腱器官 (Golgi Tendon Organ) → Ib纤维 → 抑制性中间神经元；生理过程: 肌腱张力过高时,GTO激活并抑制α运动神经元,导致肌肉放松；功能意义:
    防止肌腱撕裂;调节肌肉张力；临床应用: PNF拉伸的核心机制;通过等长收缩激活GTO后迅速拉伸；专业视角 (Professional Perspective): GTO是"张力传感器",对肌腱负荷极度敏感 (~50-100 N)'
  source: 03-Bio-Science/biology/stretch/Stretch_Biomechanics_Physiology.md
  section: Neurophysiology of Stretching (拉伸神经生理学机制表)
- type: concept
  question: 交互抑制的核心要点是什么？
  answer: '英文名: Reciprocal Inhibition；涉及结构: Ia抑制性中间神经元连接拮抗肌；生理过程: 主动肌收缩时,拮抗肌被神经性抑制以减少阻力；功能意义: 实现流畅协调运动;减少能量浪费；临床应用: 主动孤立拉伸
    (AIS) 的基础;主动收缩拮抗肌以放松目标肌；专业视角 (Professional Perspective): Sherrington的交互神经支配定律:屈肌收缩时伸肌自动放松'
  source: 03-Bio-Science/biology/stretch/Stretch_Biomechanics_Physiology.md
  section: Neurophysiology of Stretching (拉伸神经生理学机制表)
- type: concept
  question: 粘弹性 (Viscoelasticity)的核心要点是什么？
  answer: '英文名: Viscoelasticity；定义: 兼具固体弹性与液体粘性的特性；拉伸响应: 拉伸速度影响响应:快速拉伸时表现硬(粘性主导);慢速拉伸时表现软(弹性主导)；临床意义: 解释为何阴瑜伽需长时间保持(3-5分钟)以达到筋膜层；专业视角
    (Professional Perspective): 筋膜的"时间常数"约90-120秒;短于此时间主要延展肌肉'
  source: 03-Bio-Science/biology/stretch/Stretch_Biomechanics_Physiology.md
  section: Fascial Biomechanics (筋膜生物力学表)
- type: concept
  question: 蠕变 (Creep)的核心要点是什么？
  answer: '英文名: Creep；定义: 恒定负荷下,材料随时间逐渐延长的现象；拉伸响应: 静态拉伸保持时,初期阻力大,后期逐渐减小；临床意义: 解释为何拉伸需要"耐心等待"而非强力推进；专业视角 (Professional Perspective):
    蠕变是筋膜适应的主要机制;过快加载会导致损伤而非适应'
  source: 03-Bio-Science/biology/stretch/Stretch_Biomechanics_Physiology.md
  section: Fascial Biomechanics (筋膜生物力学表)
- type: concept
  question: 下腰痛 (非特异性)的核心要点是什么？
  answer: '英文名: Non-Specific Low Back Pain；病理机制: 髂腰肌缩短;竖脊肌过度紧张;核心稳定性不足；拉伸目标肌群: 髂腰肌、腘绳肌、腰方肌、梨状肌；推荐技术: 低弓步拉伸;婴儿式;仰卧膝至胸;配合核心强化；禁忌:
    避免腰椎过度屈曲;急性期避免拉伸；预期效果: 4-6周可显著改善疼痛与功能；专业视角 (Professional Perspective): 70-80%的下腰痛与髂腰肌短缩相关;单纯拉伸效果有限,需结合运动控制训练'
  source: 03-Bio-Science/biology/stretch/Stretch_Clinical_Applications.md
  section: Pathology-Specific Stretch Prescriptions (病理专项拉伸处方表)
- type: concept
  question: 颈源性头痛的核心要点是什么？
  answer: '英文名: Cervicogenic Headache；病理机制: 上交叉综合征;颈椎小关节功能障碍;肌筋膜触发点；拉伸目标肌群: 上斜方肌、提肩胛肌、胸锁乳突肌、枕下肌群；推荐技术: 温和静态拉伸;神经松动术;筋膜释放；禁忌:
    避免颈椎过度活动;椎动脉供血不足者慎用；预期效果: 配合手法治疗,可减少头痛频率50-70%；专业视角 (Professional Perspective): 需同时强化深层颈屈肌 (Deep Neck Flexors);单纯拉伸浅层肌无法根治'
  source: 03-Bio-Science/biology/stretch/Stretch_Clinical_Applications.md
  section: Pathology-Specific Stretch Prescriptions (病理专项拉伸处方表)
- type: concept
  question: 足底筋膜炎的核心要点是什么？
  answer: '英文名: Plantar Fasciitis；病理机制: 足底筋膜微撕裂与炎症;小腿肌群紧张；拉伸目标肌群: 腓肠肌、比目鱼肌、足底筋膜；推荐技术: 墙壁小腿拉伸 (膝伸直与屈曲两种);足底滚球按摩;夜间夹板；禁忌: 急性疼痛期避免过度拉伸；预期效果:
    8-12周约70%患者症状改善；专业视角 (Professional Perspective): 小腿紧张是主要诱因;拉伸需持续3-6个月以防复发'
  source: 03-Bio-Science/biology/stretch/Stretch_Clinical_Applications.md
  section: Pathology-Specific Stretch Prescriptions (病理专项拉伸处方表)
- type: concept
  question: 老年人 (65岁以上)的核心要点是什么？
  answer: '生理特点: 肌肉弹性下降;关节退变;平衡能力减弱;本体感觉下降；拉伸调整原则: 延长热身时间;降低强度 (4-5/10);增加保持时间 (30-60秒);重视平衡与安全；推荐方法: 椅子辅助拉伸;墙壁支撑;温和静态拉伸;太极、瑜伽；禁忌动作:
    避免弹振拉伸;避免头低于心的倒置;避免深度扭转；专业视角 (Professional Perspective): 柔韧性训练可显著改善老年人跌倒风险 (-37%) 与日常功能;强调"安全第一"'
  source: 03-Bio-Science/biology/stretch/Stretch_Clinical_Applications.md
  section: Special Population Stretch Guidelines (特殊人群拉伸指南表)
- type: concept
  question: 孕期女性的核心要点是什么？
  answer: '生理特点: 松弛素分泌增加;关节韧带松弛;重心前移;骨盆底压力增加；拉伸调整原则: 避免过度拉伸 (关节不稳风险);侧重髋屈肌、胸肌、小腿;加强骨盆底意识；推荐方法: 温和瑜伽;侧卧拉伸;呼吸配合;孕妇球辅助；禁忌动作:
    避免仰卧位 (孕中后期);避免深度腹部扭转;避免跳跃弹振；专业视角 (Professional Perspective): 孕期柔韧性增加是暂时的;产后需重建核心稳定性;拉伸需结合盆底康复'
  source: 03-Bio-Science/biology/stretch/Stretch_Clinical_Applications.md
  section: Special Population Stretch Guidelines (特殊人群拉伸指南表)
- type: concept
  question: 青少年运动员的核心要点是什么？
  answer: '生理特点: 生长板未闭合;肌肉-骨骼生长不同步;柔韧性高但力量不足；拉伸调整原则: 强调动态热身;避免过度静态拉伸影响爆发力;重视力量-柔韧平衡；推荐方法: 动态拉伸;运动专项模式;FRC移动性训练；禁忌动作: 避免极端柔韧性训练
    (如竞技体操强度);避免负重过度拉伸；专业视角 (Professional Perspective): 青春期"生长痛"常与肌肉-骨骼不匹配相关;拉伸可缓解但不根治'
  source: 03-Bio-Science/biology/stretch/Stretch_Clinical_Applications.md
  section: Special Population Stretch Guidelines (特殊人群拉伸指南表)
- type: concept
  question: 急性肌肉痛的核心要点是什么？
  answer: '拉伸作用机制: 改善局部血流;减少代谢废物堆积;降低肌张力；推荐拉伸方式: 温和静态拉伸;避免过度；辅助策略: 冷敷 (24-48小时);后转热敷;NSAID；循证证据等级: 中等 (B级)；专业视角 (Professional
    Perspective): 急性期拉伸需谨慎;过度拉伸可能加重损伤'
  source: 03-Bio-Science/biology/stretch/Stretch_Clinical_Applications.md
  section: Stretching for Pain Management (拉伸疼痛管理机制表)
- type: concept
  question: 慢性肌筋膜痛的核心要点是什么？
  answer: '拉伸作用机制: 释放触发点;改善筋膜滑动;降低中枢敏化；推荐拉伸方式: MFR;静态拉伸;PNF;神经松动术；辅助策略: 干针、注射;认知行为疗法;压力管理；循证证据等级: 中等至高 (B-A级)；专业视角 (Professional
    Perspective): 需多模态治疗;单纯拉伸效果有限;结合手法与心理干预'
  source: 03-Bio-Science/biology/stretch/Stretch_Clinical_Applications.md
  section: Stretching for Pain Management (拉伸疼痛管理机制表)
- type: concept
  question: 哈他瑜伽的核心要点是什么？
  answer: '梵文名: Hatha Yoga；拉伸特点: 静态保持;"稳定而舒适" (Sthira Sukham);呼吸配合；保持时间: 30-90秒；目标组织: 肌肉+筋膜；适用人群: 所有水平;基础入门；专业视角 (Professional
    Perspective): 最古老的拉伸体系;强调"不暴力" (Ahimsa) 原则;避免过度强迫'
  source: 03-Bio-Science/biology/stretch/Stretch_Integration_Movement.md
  section: Stretching in Yoga Systems (瑜伽体系中的拉伸应用表)
- type: concept
  question: 阴瑜伽的核心要点是什么？
  answer: '梵文名: Yin Yoga；拉伸特点: 极长时间被动保持;重力辅助;针对结缔组织；保持时间: 3-5分钟 (甚至10分钟)；目标组织: 深层筋膜、韧带、关节囊；适用人群: 柔韧性良好者;需要深度放松者；专业视角 (Professional
    Perspective): Paul Grilley结合解剖学与道家理论;作用于"阴性组织" (结缔组织) 而非肌肉'
  source: 03-Bio-Science/biology/stretch/Stretch_Integration_Movement.md
  section: Stretching in Yoga Systems (瑜伽体系中的拉伸应用表)
- type: concept
  question: 阿斯汤加的核心要点是什么？
  answer: '梵文名: Ashtanga Vinyasa；拉伸特点: 动态流动;严格序列;热度产生中深化拉伸；保持时间: 5个呼吸 (~25秒)；目标组织: 肌肉为主;筋膜次之；适用人群: 体能良好;追求挑战者；专业视角 (Professional
    Perspective): Pattabhi Jois传承;强调"Tristhana"(姿势-呼吸-凝视);热度使组织更可延展'
  source: 03-Bio-Science/biology/stretch/Stretch_Integration_Movement.md
  section: Stretching in Yoga Systems (瑜伽体系中的拉伸应用表)
- type: concept
  question: 太极拳的核心要点是什么？
  answer: '拉伸目的: 增加"听劲"灵敏度;改善气血流通;维持关节活动度；典型拉伸动作: 云手;单鞭;白鹤亮翅;缓慢动态全范围移动；拉伸时机: 练习前后;融入套路；独特理念: "松"(Song) 而非"软";拉伸是"放松"而非"拉长"；专业视角
    (Professional Perspective): 太极的柔韧性强调"连续性"与"整体性";局部拉伸违背整体原则'
  source: 03-Bio-Science/biology/stretch/Stretch_Integration_Movement.md
  section: Stretching in Martial Arts & Oriental Movement (武术与东方运动中的拉伸表)
- type: concept
  question: 八卦掌的核心要点是什么？
  answer: '拉伸目的: 适应快速旋转与变向;维持躯干灵活性；典型拉伸动作: 走圈中的自然拉伸;拧旋动作;大幅度转身；拉伸时机: 融入练习过程；独特理念: 拉伸在动态中完成;无独立静态拉伸；专业视角 (Professional Perspective):
    行走即拉伸;强调"变化中的延展"'
  source: 03-Bio-Science/biology/stretch/Stretch_Integration_Movement.md
  section: Stretching in Martial Arts & Oriental Movement (武术与东方运动中的拉伸表)
- type: concept
  question: 易筋经的核心要点是什么？
  answer: '拉伸目的: 强化筋膜;疏通经络;增强力量-柔韧结合；典型拉伸动作: 韦驮献杵;摘星换斗;九鬼拔马刀;倒拽九牛尾；拉伸时机: 独立训练;晨练；独特理念: 拉伸与力量同步训练;强调"内外兼修"；专业视角 (Professional
    Perspective): 中国最古老的拉伸-力量整合体系;现代研究证实其筋膜效应'
  source: 03-Bio-Science/biology/stretch/Stretch_Integration_Movement.md
  section: Stretching in Martial Arts & Oriental Movement (武术与东方运动中的拉伸表)
- type: concept
  question: 跑步/耐力的核心要点是什么？
  answer: '热身目标: 提升核心温度;激活髋屈/伸肌群;改善步态；动态拉伸序列: 腿部摆动;高抬腿;臀踢;弓步行走;A-Skip/B-Skip；持续时间: 5-10分钟；神经肌肉效应: 激活运动单元;提升神经传导速度；专业视角 (Professional
    Perspective): 避免静态拉伸;研究显示会降低跑步经济性'
  source: 03-Bio-Science/biology/stretch/Stretch_Integration_Movement.md
  section: Dynamic Warm-Up Sequences (动态热身拉伸序列表)
- type: concept
  question: 力量训练的核心要点是什么？
  answer: '热身目标: 激活目标肌群;关节预备;神经唤醒；动态拉伸序列: 深蹲模式;硬拉模式;推拉模式;带阻抗的关节活动；持续时间: 10-15分钟；神经肌肉效应: 激活特定运动模式;建立动作记忆；专业视角 (Professional
    Perspective): 专项热身至关重要;如深蹲前的空杠深蹲12-15次'
  source: 03-Bio-Science/biology/stretch/Stretch_Integration_Movement.md
  section: Dynamic Warm-Up Sequences (动态热身拉伸序列表)
- type: concept
  question: 保持-放松 (HR)的核心要点是什么？
  answer: '英文名: Hold-Relax；操作步骤: 1. 被动拉伸至终末;2. 等长收缩目标肌6-10秒;3. 放松;4. 立即被动拉伸更深；神经机制: 高尔基腱器官激活后自发性抑制 (Autogenic Inhibition)；典型应用:
    腘绳肌、髋屈肌拉伸；注意事项: 收缩时不产生关节运动;避免过度用力；专业视角 (Professional Perspective): 最经典的PNF技术;适合大肌群'
  source: 03-Bio-Science/biology/stretch/Stretch_Methods_Protocols.md
  section: PNF Stretching Techniques (PNF拉伸技术详解表)
- type: concept
  question: 收缩-放松 (CR)的核心要点是什么？
  answer: '英文名: Contract-Relax；操作步骤: 1. 被动拉伸至终末;2. 向心收缩目标肌对抗阻力;3. 放松;4. 被动拉伸更深；神经机制: 与HR类似,但有动作产生；典型应用: 需要较大力量输出的部位；注意事项:
    需要伙伴提供足够阻力;关节需稳定；专业视角 (Professional Perspective): 比HR更强烈;需更好的控制'
  source: 03-Bio-Science/biology/stretch/Stretch_Methods_Protocols.md
  section: PNF Stretching Techniques (PNF拉伸技术详解表)
- type: concept
  question: 保持-放松-拮抗收缩 (CRAC)的核心要点是什么？
  answer: '英文名: Contract-Relax-Agonist-Contract；操作步骤: 1. 被动拉伸;2. 目标肌等长收缩6-10秒;3. 放松;4. 主动收缩拮抗肌进入更深拉伸；神经机制: 自发性抑制 + 交互抑制 (Reciprocal
    Inhibition) 双重作用；典型应用: 需要最大ROM增加的情况；注意事项: 技术要求最高;疲劳度大；专业视角 (Professional Perspective): 研究显示CRAC比单纯静态拉伸效果提升20-30%'
  source: 03-Bio-Science/biology/stretch/Stretch_Methods_Protocols.md
  section: PNF Stretching Techniques (PNF拉伸技术详解表)
- type: concept
  question: 保持时间的核心要点是什么？
  answer: '传统静态拉伸: 15-60秒；AIS (Aaron Mattes 方法): 仅2秒；科学依据: 避免触发牵张反射 (Stretch Reflex);2秒内不会激活保护性收缩；专业视角 (Professional Perspective):
    2秒是牵张反射的"盲区";超过此时间肌梭开始激活'
  source: 03-Bio-Science/biology/stretch/Stretch_Methods_Protocols.md
  section: Active Isolated Stretching (AIS) (主动孤立拉伸技术表)
- type: concept
  question: 重复次数的核心要点是什么？
  answer: '传统静态拉伸: 1-3次；AIS (Aaron Mattes 方法): 8-12次；科学依据: 多次重复通过渐进性抑制累积效应；专业视角 (Professional Perspective): 神经适应需要重复刺激;单次拉伸无法充分降低肌梭敏感度'
  source: 03-Bio-Science/biology/stretch/Stretch_Methods_Protocols.md
  section: Active Isolated Stretching (AIS) (主动孤立拉伸技术表)
- type: concept
  question: 肌肉状态的核心要点是什么？
  answer: '传统静态拉伸: 被动放松；AIS (Aaron Mattes 方法): 主动收缩拮抗肌；科学依据: 交互抑制:拮抗肌收缩时目标肌自动神经性放松；专业视角 (Professional Perspective): Sherrington定律的直接应用;比被动放松更深层'
  source: 03-Bio-Science/biology/stretch/Stretch_Methods_Protocols.md
  section: Active Isolated Stretching (AIS) (主动孤立拉伸技术表)
- type: concept
  question: 直接法 (深层组织)的核心要点是什么？
  answer: '英文名: Direct MFR；操作方式: 垂直于筋膜方向施加深层持续压力；目标组织: 筋膜粘连点、触发点；保持时间: 30-90秒/点；生理效应: 机械性破坏粘连;增加局部血流；专业视角 (Professional Perspective):
    可能产生强烈不适;需精确定位限制点'
  source: 03-Bio-Science/biology/stretch/Stretch_Methods_Protocols.md
  section: Myofascial Release (MFR) Techniques (肌筋膜释放技术表)
- type: concept
  question: 间接法 (顺势释放)的核心要点是什么？
  answer: '英文名: Indirect MFR；操作方式: 顺着组织"易动方向"轻柔牵引,等待自发释放；目标组织: 整体筋膜张力模式；保持时间: 3-5分钟；生理效应: 利用组织本身的"自我纠正"机制;无痛技术；专业视角 (Professional
    Perspective): John Barnes发展;强调"倾听组织" (Listening to Tissue)'
  source: 03-Bio-Science/biology/stretch/Stretch_Methods_Protocols.md
  section: Myofascial Release (MFR) Techniques (肌筋膜释放技术表)
- type: concept
  question: 拉伸的核心要点是什么？
  answer: '英文名 (English Term): Stretching；原始语言/术语 (Sanskrit/Greek/Latin): 拉: *Extensio*; 梵: **Prasāraṇa** (प्रसारण)；精确定义:
    通过外力或主动力使肌肉-肌腱单元延长,增加关节活动范围 (ROM) 的技术；区分与备注: 与"牵引"(Traction)不同,拉伸强调软组织延展而非关节分离；专业视角 (Professional Perspective): 拉伸不仅是物理延长,更是神经-肌肉系统的重新编程
    (Neuroplastic Reprogramming)'
  source: 03-Bio-Science/biology/stretch/Stretch_Therapy_Overview.md
  section: Core Terminology of Stretching (拉伸核心术语总览表)
- type: concept
  question: 柔韧性的核心要点是什么？
  answer: '英文名 (English Term): Flexibility；原始语言/术语 (Sanskrit/Greek/Latin): 拉: *Flexibilitas*; 梵: **Niraṅkuśatā** (निरङ्कुशता)；精确定义:
    关节在被动力量下能达到的最大运动范围；区分与备注: 柔韧性是被动的,可能存在但无法主动控制；专业视角 (Professional Perspective): 高柔韧性不等于高功能性,需结合力量形成"主动控制的移动性"'
  source: 03-Bio-Science/biology/stretch/Stretch_Therapy_Overview.md
  section: Core Terminology of Stretching (拉伸核心术语总览表)
- type: concept
  question: 移动性的核心要点是什么？
  answer: '英文名 (English Term): Mobility；原始语言/术语 (Sanskrit/Greek/Latin): 拉: *Mobilitas*；精确定义: 关节在主动肌肉控制下的可用运动范围；区分与备注: 移动性=柔韧性+力量+神经控制;是功能性指标；专业视角
    (Professional Perspective): 真正的运动表现取决于移动性而非单纯柔韧性'
  source: 03-Bio-Science/biology/stretch/Stretch_Therapy_Overview.md
  section: Core Terminology of Stretching (拉伸核心术语总览表)
- type: concept
  question: 静态拉伸的核心要点是什么？
  answer: '英文名: Static Stretching；技术特征: 缓慢延展至终末范围并保持15-60秒；神经生理机制: 抑制牵张反射;激活高尔基腱器官 (GTO)；主要应用场景: 运动后冷却;日常维护;放松；优势: 安全性高;易学;降低肌张力；局限性:
    运动前过度使用会暂时降低爆发力；专业视角 (Professional Perspective): 最经典的拉伸模式,但需在正确时机使用以避免性能损失'
  source: 03-Bio-Science/biology/stretch/Stretch_Therapy_Overview.md
  section: Typology of Stretching Methods (拉伸方法分类总览表)
- type: concept
  question: 动态拉伸的核心要点是什么？
  answer: '英文名: Dynamic Stretching；技术特征: 控制性的主动运动通过全幅度范围；神经生理机制: 激活运动单元;提升核心温度;神经唤醒；主要应用场景: 运动前热身;动作准备；优势: 提升运动表现;功能性转移；局限性:
    需要技术指导;过快会触发牵张反射；专业视角 (Professional Perspective): 现代运动科学推荐的热身金标准,将拉伸与运动模式整合'
  source: 03-Bio-Science/biology/stretch/Stretch_Therapy_Overview.md
  section: Typology of Stretching Methods (拉伸方法分类总览表)
- type: concept
  question: 弹振拉伸的核心要点是什么？
  answer: '英文名: Ballistic Stretching；技术特征: 利用弹跳惯性反复达到终末范围；神经生理机制: 高速牵张可能触发强烈保护性收缩；主要应用场景: 特定运动项目(体操/武术)训练；优势: 可突破传统柔韧性极限；局限性:
    损伤风险高;不适合初学者；专业视角 (Professional Perspective): 曾被主流否定,但在专业运动员的受控环境下有其价值'
  source: 03-Bio-Science/biology/stretch/Stretch_Therapy_Overview.md
  section: Typology of Stretching Methods (拉伸方法分类总览表)
- type: concept
  question: 哈他瑜伽 (Hatha Yoga)的核心要点是什么？
  answer: '地域/时期: 印度/公元10-15世纪；核心拉伸理念: 通过体式 (Asana) 延展身体,为冥想准备;"稳定而舒适" (Sthira Sukham)；代表技术: 阴瑜伽、Iyengar精准顺位；现代科学对应: 静态拉伸
    + 筋膜释放;多迷走神经理论；专业视角 (Professional Perspective): 最古老的系统化拉伸体系,强调呼吸-延展-觉知的三位一体'
  source: 03-Bio-Science/biology/stretch/Stretch_Therapy_Overview.md
  section: Historical Lineages of Stretching (拉伸传承谱系表)
- type: concept
  question: 道家导引术的核心要点是什么？
  answer: '地域/时期: 中国/战国至汉代；核心拉伸理念: "导气令和,引体令柔";通过拉伸疏通经络、调和气血；代表技术: 易筋经、八段锦；现代科学对应: 动态拉伸 + 功能性运动模式；专业视角 (Professional Perspective):
    将拉伸与气机流动、内脏按摩结合,体现整体医学观'
  source: 03-Bio-Science/biology/stretch/Stretch_Therapy_Overview.md
  section: Historical Lineages of Stretching (拉伸传承谱系表)
