  question: 性偏离障碍的核心要点是什么？
  answer: '英文名 (English Term): Paraphilic Disorders；原始语言/术语 (Original Language): 希腊: *Para* (异常) + *Philos* (爱)；精确定义 (Technical
    Definition): 一类以非典型性唤起模式为特征的精神障碍，包括恋物癖、露阴癖、窥阴癖等多种类型。；区分与备注 (Differentiation & Notes): 包含paraphilia(性偏离倾向)和paraphilic disorder(性偏离障碍)两个概念层次。；专业视角
    (Professional Perspective): 现代诊断强调痛苦(distress)和损害(harm)双重标准。'
