  question: 山药的核心要点是什么？
  answer: '英文/拉丁名 (English/Latin): Yam / Dioscoreae Rhizoma；性味 (Property/Flavor): 甘，平。；归经 (Channel): 脾、肺、肾。；核心功效 (Key Benefits):
    健脾益胃，生津益肺，补肾涩精。；资深专家建议 (Professional Advice): 气阴双补之佳品，长期食用可建立稳固的“后天之本”。；推荐配伍 (Combinations): 搭配芡实以固肾；搭配百合润肺。'
  source: 03-Bio-Science/foods/Bio_Dietary_Pharmacy.md
  section: TCM Food Pharmacy (中医食疗药膳：性味归经详表)
- type: concept
  question: 百合的核心要点是什么？
  answer: '英文/拉丁名 (English/Latin): Lily Bulb / Lilii Bulbus；性味 (Property/Flavor): 甘，微寒。；归经 (Channel): 心、肺。；核心功效 (Key Benefits):
    养阴润肺，清心安神。；资深专家建议 (Professional Advice): 针对现代焦虑型失眠（心肺阴虚）具有显著的神经安抚作用。；推荐配伍 (Combinations): 搭配酸枣仁安神；搭配银耳润燥。'
  source: 03-Bio-Science/foods/Bio_Dietary_Pharmacy.md
  section: TCM Food Pharmacy (中医食疗药膳：性味归经详表)
- type: concept
  question: 枸杞的核心要点是什么？
  answer: '英文/拉丁名 (English/Latin): Goji Berry / Lycii Fructus；性味 (Property/Flavor): 甘，平。；归经 (Channel): 肝、肾。；核心功效 (Key Benefits):
    滋补肝肾，益精明目。；资深专家建议 (Professional Advice): 含有丰富的类胡萝卜素，不仅护眼，更通过调节轴神经保护神经元。；推荐配伍 (Combinations): 搭配菊花清肝明目；搭配熟地补血。'
  source: 03-Bio-Science/foods/Bio_Dietary_Pharmacy.md
  section: TCM Food Pharmacy (中医食疗药膳：性味归经详表)
- type: concept
  question: 甜 (Sweet)的核心要点是什么？
  answer: '元素 (Elements): 土 + 水；对 Dosha 的影响: 减 Vata, Pitta; 增 Kapha；心理效应: 滋养、稳定、满足。；适用体质: 极度疲劳、消瘦者。；专业视角 (Professional Perspective):
    这里的甜指谷物、牛奶中的天然糖分，而非精制糖；是 Ojas (活力) 的来源。；引用来源 (Citation): *Charaka Samhita*.'
  source: 03-Bio-Science/foods/Bio_Dietary_Pharmacy.md
  section: Ayurvedic Dietetics (阿育吠陀饮食能量平衡表)
- type: concept
  question: 酸 (Sour)的核心要点是什么？
  answer: '元素 (Elements): 土 + 火；对 Dosha 的影响: 减 Vata; 增 Pitta, Kapha；心理效应: 刺激、锐利、加速。；适用体质: 食欲不振、消化冷感者。；专业视角 (Professional Perspective):
    适度酸味能促进 Agni (胃火)，过量则导致愤怒和身体发热。；引用来源 (Citation): *Ashtanga Hridaya*.'
  source: 03-Bio-Science/foods/Bio_Dietary_Pharmacy.md
  section: Ayurvedic Dietetics (阿育吠陀饮食能量平衡表)
- type: concept
  question: 咸 (Salty)的核心要点是什么？
  answer: '元素 (Elements): 水 + 火；对 Dosha 的影响: 减 Vata; 增 Pitta, Kapha；心理效应: 软化、镇静、固着。；适用体质: 心理长期漂浮不实者。；专业视角 (Professional Perspective):
    具有良好的 Grounding (接地) 效果，但过量会引起水肿和依恋执着。；引用来源 (Citation): -'
  source: 03-Bio-Science/foods/Bio_Dietary_Pharmacy.md
  section: Ayurvedic Dietetics (阿育吠陀饮食能量平衡表)
- type: concept
  question: 姜黄素的核心要点是什么？
  answer: '来源 (Source): 姜黄；分子机制 (Mechanism): 抑制 NF-kB 炎症通路；提升 BDNF 水平。；心理/认知益处: 抗抑郁；预防神经退行性疾病。；临床转化建议: 配合黑胡椒素 (Piperine) 显著提升生物利用度。；专业视角
    (Professional Perspective): 被称为“脑部消防员”，通过缓解系统性低度炎症改善情绪。'
  source: 03-Bio-Science/foods/Bio_Dietary_Pharmacy.md
  section: Functional Food Science for Mental Health (现代功能性营养与脑健康表)
- type: concept
  question: 花青素的核心要点是什么？
  answer: '来源 (Source): 蓝莓、紫薯；分子机制 (Mechanism): 清除血脑屏障内的自由基；改善微血管循环。；心理/认知益处: 提升长期记忆力；视神经修复。；临床转化建议: 每日保持 100g 蓝紫色蔬菜摄入，维持大脑年轻态。；专业视角
    (Professional Perspective): 强效抗氧化剂，对维持神经突触的完整性至关重要。'
  source: 03-Bio-Science/foods/Bio_Dietary_Pharmacy.md
  section: Functional Food Science for Mental Health (现代功能性营养与脑健康表)
- type: concept
  question: Microbiome-Gut-Brain Axis的核心要点是什么？
  answer: '概念 (中文): 微生物-肠-脑轴；描述 (Description): 肠道微生物群与中枢神经系统 (CNS) 之间的双向通信。；心理健康作用 (Role in Mental Health): 调节神经递质（例如 95%
    的血清素在肠道产生）。；专业视角 (Professional Perspective): 肠道正日益被视为“第二大脑”（肠神经系统 ENS）。；引用来源 (Citation): Mayer, E. A. (2011). *Nature
    Reviews Neuroscience*.'
  source: 03-Bio-Science/foods/Bio_Nutrition_Gut.md
  section: The Gut-Brain Axis & Vagus Nerve (肠脑轴与迷走神经)
- type: concept
  question: Vagus Nerve的核心要点是什么？
  answer: '概念 (中文): 迷走神经；描述 (Description): 连接肠道和大脑的主要“高速公路”。；心理健康作用 (Role in Mental Health): 80% 的迷走神经纤维是传入的（肠到脑），向大脑发送身体状态信号。；专业视角
    (Professional Perspective): 通过肠道健康刺激迷走神经可以降低系统性炎症和焦虑。；引用来源 (Citation): Porges, S. W. (2011). *The Polyvagal Theory*.'
  source: 03-Bio-Science/foods/Bio_Nutrition_Gut.md
  section: The Gut-Brain Axis & Vagus Nerve (肠脑轴与迷走神经)
- type: concept
  question: Short-Chain Fatty Acids (SCFAs)的核心要点是什么？
  answer: '概念 (中文): 短链脂肪酸；描述 (Description): 肠道细菌发酵纤维的副产品（如丁酸盐）。；心理健康作用 (Role in Mental Health): 影响脑源性神经营养因子 (BDNF) 和血脑屏障的完整性。；专业视角
    (Professional Perspective): SCFAs 对神经保护和减少神经炎症至关重要。；引用来源 (Citation): Cryan, J. F., et al. (2019). *Physiological Reviews*.'
  source: 03-Bio-Science/foods/Bio_Nutrition_Gut.md
  section: The Gut-Brain Axis & Vagus Nerve (肠脑轴与迷走神经)
- type: concept
  question: Mediterranean Diet的核心要点是什么？
  answer: '机制 (Mechanism): 地中海饮食；关键食物 (Key Foods): 富含抗氧化剂和多酚；降低 C-反应蛋白。；情绪影响 (Impact on Mood): 橄榄油、坚果、豆类、绿叶蔬菜、野外鱼类。；专业视角 (Professional
    Perspective): 持续减轻抑郁症状（SMILES 临床试验）。；引用来源 (Citation): Jacka, F. N., et al. (2017). *BMC Medicine*.'
  source: 03-Bio-Science/foods/Bio_Nutrition_Gut.md
  section: Anti-Inflammatory Diet for Depression (抗炎饮食与抑郁)
- type: concept
  question: Omega-3 Fatty Acids的核心要点是什么？
  answer: '机制 (Mechanism): Omega-3 脂肪酸；关键食物 (Key Foods): 替换脑细胞膜中的促炎脂肪。；情绪影响 (Impact on Mood): 肥鱼（三文鱼、沙丁鱼）、核桃、亚麻籽。；专业视角 (Professional
    Perspective): 改善神经递质信号传导并减少神经炎症。；引用来源 (Citation): Grosso, G., et al. (2014). *PLOS ONE*.'
  source: 03-Bio-Science/foods/Bio_Nutrition_Gut.md
  section: Anti-Inflammatory Diet for Depression (抗炎饮食与抑郁)
- type: concept
  question: Polyphenols的核心要点是什么？
  answer: '机制 (Mechanism): 多酚；关键食物 (Key Foods): 调节肠道菌群并保护神经元免受氧化应激。；情绪影响 (Impact on Mood): 浆果、黑巧克力 (85%+)、绿茶、姜黄。；专业视角 (Professional
    Perspective): 增强认知功能和情感韧性。；引用来源 (Citation): Gomez-Pinilla, F. (2008). *Nature Reviews Neuroscience*.'
  source: 03-Bio-Science/foods/Bio_Nutrition_Gut.md
  section: Anti-Inflammatory Diet for Depression (抗炎饮食与抑郁)
- type: concept
  question: Magnesium的核心要点是什么？
  answer: '大脑功能 (Function in Brain): 镁；缺乏迹象 (Deficiency Signs): 调节 HPA 轴；“放松矿物质”。；食物来源 (Food Sources): 失眠、肌肉紧张、经前综合征、易怒。；专业视角
    (Professional Perspective): 南瓜子、菠菜、黑巧克力、杏仁。；引用来源 (Citation): 甘氨酸镁具有极高的生物利用度，对焦虑/睡眠有效。'
  source: 03-Bio-Science/foods/Bio_Nutrition_Gut.md
  section: Key Nutrients for Mental Health (心理健康关键营养素)
- type: concept
  question: Vitamin D的核心要点是什么？
  answer: '大脑功能 (Function in Brain): 维生素 D；缺乏迹象 (Deficiency Signs): 神经类固醇；影响多巴胺/血清素合成。；食物来源 (Food Sources): 季节性抑郁 (SAD)、免疫力低下、疲劳。；专业视角
    (Professional Perspective): 阳光、鳕鱼肝油、蘑菇（受紫外线照射）。；引用来源 (Citation): 维生素 D 受体广泛存在于涉及抑郁的大脑区域。'
  source: 03-Bio-Science/foods/Bio_Nutrition_Gut.md
  section: Key Nutrients for Mental Health (心理健康关键营养素)
