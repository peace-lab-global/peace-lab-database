  question: MC2R激活的核心要点是什么？
  answer: '分子组分: 黑皮质素2型受体(MC2R)；功能: ACTH专一性受体；调控机制: MRAP辅助蛋白必需；效应时间: 秒；临床意义: MC2R突变致家族性糖皮质激素缺乏'
  source: 03-Bio-Science/biology/hpa-axis/HPA_Axis_Neuroscience.md
  section: 表1.2 ACTH信号通路 (ACTH Signaling in Adrenal)
- type: concept
  question: Gs-cAMP-PKA的核心要点是什么？
  answer: '分子组分: 与CRH信号类似；功能: 类固醇合成酶激活；调控机制: PKA磷酸化；效应时间: 秒-分钟；临床意义: —'
  source: 03-Bio-Science/biology/hpa-axis/HPA_Axis_Neuroscience.md
  section: 表1.2 ACTH信号通路 (ACTH Signaling in Adrenal)
- type: concept
  question: StAR蛋白激活的核心要点是什么？
  answer: '分子组分: 类固醇急性调节蛋白；功能: 胆固醇跨线粒体膜转运(限速步骤)；调控机制: PKA磷酸化StAR；效应时间: 分钟；临床意义: StAR突变致脂质样先天性肾上腺增生'
  source: 03-Bio-Science/biology/hpa-axis/HPA_Axis_Neuroscience.md
  section: 表1.2 ACTH信号通路 (ACTH Signaling in Adrenal)
- type: concept
  question: 经典基因组效应的核心要点是什么？
  answer: '时间尺度: 小时-天；机制: GR-配体复合物入核→GRE结合→转录调控；主要效应: 抗炎基因诱导；促炎基因抑制；介导受体: 胞质GR；临床意义: 大多数皮质醇效应'
  source: 03-Bio-Science/biology/hpa-axis/HPA_Axis_Neuroscience.md
  section: 表1.3 糖皮质激素受体信号 (Glucocorticoid Receptor Signaling)
- type: concept
  question: 转录激活(Transactivation)的核心要点是什么？
  answer: '时间尺度: 小时；机制: GR二聚体结合正向GRE；主要效应: 代谢酶、抗炎蛋白诱导；介导受体: GR；临床意义: 代谢效应'
  source: 03-Bio-Science/biology/hpa-axis/HPA_Axis_Neuroscience.md
  section: 表1.3 糖皮质激素受体信号 (Glucocorticoid Receptor Signaling)
- type: concept
  question: 下丘脑-垂体-肾上腺轴的核心要点是什么？
  answer: '英文术语: Hypothalamic-Pituitary-Adrenal Axis (HPA Axis)；拉丁/希腊词源: 希: *Hypo* (下) + *Thalamos* (内室); 拉: *Pituita* (黏液);
    拉: *Ad* (靠近) + *Renes* (肾)；定义: 连接下丘脑、垂体和肾上腺的神经内分泌系统，是机体对应激的核心调节通路；临床意义: 应激相关疾病的核心病理生理机制；专家备注: HPA轴是"应激的主交响乐团"，协调全身对威胁的反应'
  source: 03-Bio-Science/biology/hpa-axis/HPA_Axis_Overview.md
  section: 表1.1 HPA轴基础术语 (Fundamental HPA Axis Terms)
- type: concept
  question: 下丘脑的核心要点是什么？
  answer: '英文术语: Hypothalamus；拉丁/希腊词源: 希: *Hypo* (下) + *Thalamos* (内室/卧室)；定义: 间脑腹侧结构，是神经系统与内分泌系统的交汇枢纽；临床意义: HPA轴的启动中心；专家备注:
    仅占脑重1%，却调控全身内分泌'
  source: 03-Bio-Science/biology/hpa-axis/HPA_Axis_Overview.md
  section: 表1.1 HPA轴基础术语 (Fundamental HPA Axis Terms)
- type: concept
  question: 垂体的核心要点是什么？
  answer: '英文术语: Pituitary Gland；拉丁/希腊词源: 拉: *Pituita* (黏液/痰)；定义: "主腺体"，位于蝶鞍，分前叶和后叶；临床意义: HPA轴的中继站；专家备注: 古人误认为分泌鼻涕，故名"痰腺"'
  source: 03-Bio-Science/biology/hpa-axis/HPA_Axis_Overview.md
  section: 表1.1 HPA轴基础术语 (Fundamental HPA Axis Terms)
- type: concept
  question: 促肾上腺皮质激素释放激素的核心要点是什么？
  answer: '英文术语: Corticotropin-Releasing Hormone；缩写: CRH/CRF；拉丁/希腊词源: 拉: *Cortex* (皮层) + 希: *Tropos* (转向)；分泌部位: 下丘脑室旁核(PVN)；主要功能:
    启动HPA轴级联反应；半衰期: 约60分钟；专家备注: 又称CRF(因子)，1981年分离鉴定(Vale)'
  source: 03-Bio-Science/biology/hpa-axis/HPA_Axis_Overview.md
  section: 表1.2 HPA轴激素术语 (HPA Axis Hormone Terms)
- type: concept
  question: 促肾上腺皮质激素的核心要点是什么？
  answer: '英文术语: Adrenocorticotropic Hormone；缩写: ACTH；拉丁/希腊词源: 希: *Adren* (腺) + *Cortex* (皮层) + *Tropos* (转向)；分泌部位: 垂体前叶促皮质激素细胞；主要功能:
    刺激肾上腺皮质分泌皮质醇；半衰期: 约10分钟；专家备注: 39个氨基酸的多肽，源自POMC'
  source: 03-Bio-Science/biology/hpa-axis/HPA_Axis_Overview.md
  section: 表1.2 HPA轴激素术语 (HPA Axis Hormone Terms)
- type: concept
  question: 皮质醇的核心要点是什么？
  answer: '英文术语: Cortisol；缩写: —；拉丁/希腊词源: 拉: *Cortex* (皮层)；分泌部位: 肾上腺皮质束状带；主要功能: 代谢调节、抗炎、免疫调节；半衰期: 60-90分钟；专家备注: 人类主要的糖皮质激素，"应激激素"'
  source: 03-Bio-Science/biology/hpa-axis/HPA_Axis_Overview.md
  section: 表1.2 HPA轴激素术语 (HPA Axis Hormone Terms)
- type: concept
  question: 糖皮质激素受体的核心要点是什么？
  answer: '英文术语: Glucocorticoid Receptor；缩写: GR (NR3C1)；类型: 核受体/配体激活转录因子；分布: 全身广泛分布；功能: 介导皮质醇多数效应；负反馈；亲和力: 低亲和力(Kd≈20-30nM)；临床意义:
    抑郁症中GR功能受损'
  source: 03-Bio-Science/biology/hpa-axis/HPA_Axis_Overview.md
  section: 表1.3 HPA轴受体与结合蛋白 (Receptors & Binding Proteins)
- type: concept
  question: 盐皮质激素受体的核心要点是什么？
  answer: '英文术语: Mineralocorticoid Receptor；缩写: MR (NR3C2)；类型: 核受体；分布: 海马、杏仁核、心肾；功能: 调节基础HPA活性；昼夜节律；亲和力: 高亲和力(Kd≈0.5nM)；临床意义:
    情绪调节与应激易感性'
  source: 03-Bio-Science/biology/hpa-axis/HPA_Axis_Overview.md
  section: 表1.3 HPA轴受体与结合蛋白 (Receptors & Binding Proteins)
- type: concept
  question: 有氧运动(中等强度)的核心要点是什么？
  answer: '急性效应: 皮质醇短暂升高→正常化；慢性适应(>8周): 基线皮质醇↓；负反馈增强；最佳剂量: 150min/周；50-70% HRmax；机制: BDNF↑；海马保护；证据等级: A级；专家建议: 抑郁/焦虑一线推荐'
  source: 03-Bio-Science/biology/hpa-axis/HPA_Axis_Regulation_Interventions.md
  section: 表1.1 运动对HPA轴的影响 (Exercise Effects on HPA Axis)
- type: concept
  question: 高强度间歇(HIIT)的核心要点是什么？
  answer: '急性效应: 皮质醇显著升高；慢性适应(>8周): 应激适应；HPA轴反应性↓；最佳剂量: 2-3次/周；恢复充分；机制: 应激适应；证据等级: B级；专家建议: 健康人群；慢性应激者谨慎'
  source: 03-Bio-Science/biology/hpa-axis/HPA_Axis_Regulation_Interventions.md
  section: 表1.1 运动对HPA轴的影响 (Exercise Effects on HPA Axis)
- type: concept
  question: 抗阻训练的核心要点是什么？
  answer: '急性效应: 皮质醇↑(取决于强度)；慢性适应(>8周): 睾酮/皮质醇比↑；最佳剂量: 2-3次/周；机制: 合成代谢环境；证据等级: B级；专家建议: 与有氧结合'
  source: 03-Bio-Science/biology/hpa-axis/HPA_Axis_Regulation_Interventions.md
  section: 表1.1 运动对HPA轴的影响 (Exercise Effects on HPA Axis)
- type: concept
  question: 慢性应激/高皮质醇的核心要点是什么？
  answer: '运动类型: 中低强度有氧、瑜伽；强度: RPE 3-5/10；频率: 5-7次/周；持续时间: 20-60min；注意事项: 避免过度训练'
  source: 03-Bio-Science/biology/hpa-axis/HPA_Axis_Regulation_Interventions.md
  section: 表1.2 运动处方设计原则 (Exercise Prescription Principles for HPA)
- type: concept
  question: 疲劳/低皮质醇的核心要点是什么？
  answer: '运动类型: 轻度开始逐渐增加；强度: RPE 2-4/10起；频率: 3-5次/周；持续时间: 15-30min起；注意事项: 渐进增量；避免耗竭'
  source: 03-Bio-Science/biology/hpa-axis/HPA_Axis_Regulation_Interventions.md
  section: 表1.2 运动处方设计原则 (Exercise Prescription Principles for HPA)
- type: concept
  question: 抑郁症的核心要点是什么？
  answer: '运动类型: 中等有氧+瑜伽；强度: RPE 5-6/10；频率: 3-5次/周；持续时间: 30-45min；注意事项: 社交运动更佳'
  source: 03-Bio-Science/biology/hpa-axis/HPA_Axis_Regulation_Interventions.md
  section: 表1.2 运动处方设计原则 (Exercise Prescription Principles for HPA)
- type: concept
  question: 睡眠剥夺(急性)的核心要点是什么？
  answer: '对HPA轴影响: 次日皮质醇↑↑；机制: 应激反应；干预策略: 补觉(但不完全恢复)；证据等级: A级'
  source: 03-Bio-Science/biology/hpa-axis/HPA_Axis_Regulation_Interventions.md
  section: 表1.3 睡眠与HPA轴 (Sleep & HPA Axis)
- type: concept
  question: 慢性睡眠不足的核心要点是什么？
  answer: '对HPA轴影响: 基线皮质醇↑；节律扁平；机制: 慢性应激；干预策略: 延长睡眠时间；证据等级: A级'
  source: 03-Bio-Science/biology/hpa-axis/HPA_Axis_Regulation_Interventions.md
  section: 表1.3 睡眠与HPA轴 (Sleep & HPA Axis)
