  question: 黄烷醇（Flavanols）的核心要点是什么？
  answer: '代表化合物: 儿茶素、表儿茶素；富含水果: 苹果、葡萄、桃子；主要健康效应: 心血管保护、认知功能'
  source: 03-Bio-Science/foods/fruit-nutrition/Fruit_Nutrition_Science.md
  section: 主要植物营养素分类
