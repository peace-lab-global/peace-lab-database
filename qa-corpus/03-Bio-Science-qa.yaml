  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: Replika的核心要点是什么？
  answer: '技术基础: 大型语言模型(LLM)；功能: 可训练为特定人物性格;不限于逝者；费用: 订阅制；伦理争议: 情感依赖;隐私'
