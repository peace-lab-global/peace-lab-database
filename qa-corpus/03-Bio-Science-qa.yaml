  section: 1.2 AI 纪念的心理动力学
- type: concept
  question: 道德伤害的核心要点是什么？
  answer: '英文名: Moral Injury；词源/来源: Jonathan Shay (1994) / Brett Litz (2009)；精确定义: 因目睹、参与或未能阻止违反深层道德信念的行为而产生的心理创伤'
