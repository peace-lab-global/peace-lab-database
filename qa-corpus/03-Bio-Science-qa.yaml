  question: 什么是研究与证据？
  answer: '- 性满意度与关系质量呈显著相关，沟通训练可提升满意度。

    - 表现焦虑的认知重构对勃起稳定性和高潮体验有改善。'
  source: 03-Bio-Science/sexuality/male-sexual-health/Psychological_Relationship_Factors.md
  section: 研究与证据
- type: concept
  question: 什么是概述？
  answer: 性传播感染（STI）与性行为模式、伴侣数量与防护实践密切相关。男性性健康需要结合筛查、疫苗和安全性行为教育。
  source: 03-Bio-Science/sexuality/male-sexual-health/STI_Prevention_and_Safety.md
  section: 概述
- type: concept
  question: 淋病/衣原体的核心要点是什么？
  answer: '主要传播途径: 体液接触；典型症状: 尿痛、分泌物；推荐筛查要点: 有症状或高风险行为人群'
  source: 03-Bio-Science/sexuality/male-sexual-health/STI_Prevention_and_Safety.md
  section: 常见STI与传播特点
- type: concept
  question: 梅毒的核心要点是什么？
  answer: '主要传播途径: 皮肤/黏膜接触；典型症状: 溃疡、皮疹；推荐筛查要点: RPR/TPPA联合'
  source: 03-Bio-Science/sexuality/male-sexual-health/STI_Prevention_and_Safety.md
  section: 常见STI与传播特点
- type: concept
  question: HPV的核心要点是什么？
  answer: '主要传播途径: 皮肤接触；典型症状: 生殖器疣；推荐筛查要点: 疫苗与定期检查'
  source: 03-Bio-Science/sexuality/male-sexual-health/STI_Prevention_and_Safety.md
  section: 常见STI与传播特点
- type: concept
  question: 什么是临床与实践要点？
  answer: '- **预防组合**：安全套 + 定期筛查 + 疫苗（HPV、乙肝）。

    - **风险评估**：结合伴侣数量、避孕方式、性行为类型。

    - **暴露后措施**：高风险暴露需评估PEP时间窗。'
  source: 03-Bio-Science/sexuality/male-sexual-health/STI_Prevention_and_Safety.md
  section: 临床与实践要点
- type: concept
  question: 什么是风险、伦理与注意事项？
  answer: '- **污名化风险**：应减少“道德化”表达，强调公共卫生视角。

    - **隐私与告知**：筛查与伴侣告知需尊重隐私与法律规范。

    - **药物耐药性**：淋病耐药提示需遵循最新治疗指南。'
  source: 03-Bio-Science/sexuality/male-sexual-health/STI_Prevention_and_Safety.md
  section: 风险、伦理与注意事项
