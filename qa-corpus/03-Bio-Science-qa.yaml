- type: concept
  question: 中高的核心要点是什么？
  answer: '职业: 肿瘤科医护、安宁疗护团队、社工、心理咨询师；死亡暴露类型: 长期面对临终/死亡；深度情感投入；暴露频率: 持续'
  source: 03-Bio-Science/death/Death_High_Risk_Occupations.md
  section: 1.1 死亡暴露的层级
- type: concept
  question: 中等的核心要点是什么？
  answer: '职业: 记者（灾难/战争报道）、人权工作者、法官/律师（刑事案件）；死亡暴露类型: 接触死亡叙事/影像；暴露频率: 不定期'
  source: 03-Bio-Science/death/Death_High_Risk_Occupations.md
  section: 1.1 死亡暴露的层级
- type: concept
  question: 急诊科的核心要点是什么？
  answer: '死亡暴露特点: 突发死亡；创伤；抢救无效；特殊风险: "如果我当时…"的反刍；肾上腺素崩溃后的空虚'
  source: 03-Bio-Science/death/Death_High_Risk_Occupations.md
  section: 2.1 不同科室的死亡暴露特点
- type: concept
  question: ICU的核心要点是什么？
  answer: '死亡暴露特点: 长期目睹缓慢的器官衰竭；特殊风险: 与家属的反复沟通；撤除生命支持的决策'
  source: 03-Bio-Science/death/Death_High_Risk_Occupations.md
  section: 2.1 不同科室的死亡暴露特点
- type: concept
  question: 少数群体压力的核心要点是什么？
  answer: '英文名: Minority Stress；来源: Meyer (2003)；精确定义: 因处于社会污名化群体而产生的额外心理压力'
  source: 03-Bio-Science/death/Death_LGBTQ_Death_Grief.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 结构性污名的核心要点是什么？
  answer: '英文名: Structural Stigma；来源: 社会心理学；精确定义: 制度层面的歧视（法律、医疗、宗教）'
  source: 03-Bio-Science/death/Death_LGBTQ_Death_Grief.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: HIV/AIDS历史创伤的核心要点是什么？
  answer: '英文名: HIV/AIDS Historical Trauma；来源: 创伤研究；精确定义: 1980s-90s HIV/AIDS危机对LGBTQ+社区（尤其男同性恋）造成的集体创伤'
  source: 03-Bio-Science/death/Death_LGBTQ_Death_Grief.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 男同性恋（40+岁）的核心要点是什么？
  answer: '特殊死亡焦虑: HIV/AIDS 幸存者内疚；"为什么是我活下来了？"；对感染的持续恐惧；来源: 1980s-90s AIDS 危机'
  source: 03-Bio-Science/death/Death_LGBTQ_Death_Grief.md
  section: 1.2 不同亚群体的特殊死亡焦虑
- type: concept
  question: 跨性别者的核心要点是什么？
  answer: '特殊死亡焦虑: 害怕死后被"错误性别化"（墓碑、讣告、遗体处理）；来源: 社会性别二元论'
  source: 03-Bio-Science/death/Death_LGBTQ_Death_Grief.md
  section: 1.2 不同亚群体的特殊死亡焦虑
- type: concept
  question: 女同性恋的核心要点是什么？
  answer: '特殊死亡焦虑: 害怕在伴侣去世后失去共同财产、子女抚养权；来源: 法律不平等（部分地区）'
  source: 03-Bio-Science/death/Death_LGBTQ_Death_Grief.md
  section: 1.2 不同亚群体的特殊死亡焦虑
- type: concept
  question: 错误的讣告的核心要点是什么？
  answer: '说明: "他们会写我的旧名字；会称我为''儿子''而不是''女儿''"；临床意义: 跨性别者需要法律文件的提前准备'
  source: 03-Bio-Science/death/Death_LGBTQ_Death_Grief.md
  section: 1.3 "错误地死去"的恐惧
- type: concept
  question: 错误的葬礼的核心要点是什么？
  answer: '说明: "我的血亲会排除我的伴侣；会请反LGBTQ的牧师"；临床意义: 预立指示中明确葬礼安排'
  source: 03-Bio-Science/death/Death_LGBTQ_Death_Grief.md
  section: 1.3 "错误地死去"的恐惧
- type: concept
  question: 白骨观的核心要点是什么？
  answer: '英文名: White-Bone Contemplation；原始语言/词源: 巴: *Aṭṭhika-saññā*; 梵: *Asthi-saṃjñā*；精确定义: 观想尸体腐败至白骨，体悟无常、不净与无我；所属传统: 佛教（上座部/大乘）'
  source: 03-Bio-Science/death/Death_Meditation_Practices.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 不净观的核心要点是什么？
  answer: '英文名: Contemplation of Impurity；原始语言/词源: 巴: *Asubha-bhāvanā*; 梵: *Aśubha-bhāvanā*；精确定义: 观想身体三十六物/九相不净，调伏贪欲；所属传统:
    佛教'
  source: 03-Bio-Science/death/Death_Meditation_Practices.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 念死的核心要点是什么？
  answer: '英文名: Mindfulness of Death；原始语言/词源: 巴: *Maraṇasati*; 梵: *Maraṇa-smṛti*；精确定义: 持续忆念"我必死亡、时日未知"，激发精进；所属传统: 佛教（南传核心修行）'
  source: 03-Bio-Science/death/Death_Meditation_Practices.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 《大念处经》** (*Mahāsatipaṭṭhāna Sutta*)的核心要点是什么？
  answer: '时代: 公元前5世纪；死亡冥想相关内容: 墓墟观（Sīvathikā）：观察膨胀、青瘀、溃烂、白骨等九相；修行地位: 四念处身念处的核心修法'
  source: 03-Bio-Science/death/Death_Meditation_Practices.md
  section: 1.1 南传佛教：从阿含到清净道论的系统
- type: concept
  question: 《念住经》** (*Satipaṭṭhāna Sutta*)的核心要点是什么？
  answer: '时代: 同上；死亡冥想相关内容: 同上，略本；修行地位: 同上'
  source: 03-Bio-Science/death/Death_Meditation_Practices.md
  section: 1.1 南传佛教：从阿含到清净道论的系统
- type: concept
  question: 《增支部》** (*Aṅguttara Nikāya*)的核心要点是什么？
  answer: '时代: 同上；死亡冥想相关内容: 念死篇章：比丘应于日夜六时忆念死亡；修行地位: 被列为日常必修'
  source: 03-Bio-Science/death/Death_Meditation_Practices.md
  section: 1.1 南传佛教：从阿含到清净道论的系统
- type: concept
  question: 第一阶：死亡如杀手的核心要点是什么？
  answer: '巴利名: *Maraṇa-upatthāna*；修习内容: 忆念"死亡必然来临，如杀手紧随"；心理目标: 打破"死亡遥远"的幻觉；现代心理对应: 概率矫正；时间感知调整'
  source: 03-Bio-Science/death/Death_Meditation_Practices.md
  section: 1.1 南传佛教：从阿含到清净道论的系统
- type: concept
  question: 第二阶：生命脆弱的核心要点是什么？
  answer: '巴利名: *Jīvita-aniyata*；修习内容: 忆念"生命无保障，呼吸之间即可能死亡"；心理目标: 认识生命的脆弱性；现代心理对应: 内感受敏感性训练'
  source: 03-Bio-Science/death/Death_Meditation_Practices.md
  section: 1.1 南传佛教：从阿含到清净道论的系统
- type: concept
  question: 决策能力的核心要点是什么？
  answer: '英文名: Decisional Capacity；词源/来源: 医学伦理；精确定义: 做出特定医疗决定所需的理解、欣赏、推理、表达能力'
  source: 03-Bio-Science/death/Death_Mental_Illness_End_of_Life.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 代理决策的核心要点是什么？
  answer: '英文名: Substituted Judgment；词源/来源: 医学伦理；精确定义: 代理人在患者无能力时，基于患者已知价值观做出决定'
  source: 03-Bio-Science/death/Death_Mental_Illness_End_of_Life.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 最佳利益的核心要点是什么？
  answer: '英文名: Best Interest Standard；词源/来源: 医学伦理；精确定义: 当患者意愿未知时，基于客观福祉做出决定'
  source: 03-Bio-Science/death/Death_Mental_Illness_End_of_Life.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 死因的核心要点是什么？
  answer: '说明: 心血管疾病、糖尿病、癌症、呼吸系统疾病（与普通人相同，但诊断更晚、治疗更差）'
  source: 03-Bio-Science/death/Death_Mental_Illness_End_of_Life.md
  section: 1.2 数据
- type: concept
  question: 自杀的核心要点是什么？
  answer: '说明: 约5-10%的精神分裂症患者死于自杀；抑郁症患者的自杀风险是普通人群的20倍'
  source: 03-Bio-Science/death/Death_Mental_Illness_End_of_Life.md
  section: 1.2 数据
- type: concept
  question: 理解的核心要点是什么？
  answer: '评估问题: 患者是否理解病情和治疗选项？；精神疾病的特殊挑战: 妄想可能影响对病情的理解'
  source: 03-Bio-Science/death/Death_Mental_Illness_End_of_Life.md
  section: 2.1 能力评估的四要素
- type: concept
  question: 欣赏的核心要点是什么？
  answer: '评估问题: 患者是否理解这些信息适用于自己？；精神疾病的特殊挑战: 疾病失认（Anosognosia）常见'
  source: 03-Bio-Science/death/Death_Mental_Illness_End_of_Life.md
  section: 2.1 能力评估的四要素
- type: concept
  question: 死亡咖啡馆的核心要点是什么？
  answer: '英文名: Death Cafe；来源: 英国(2011)；词源/含义: 直译；精确定义: 在轻松环境(咖啡馆)中公开讨论死亡的社区聚会;无议程、无专家、无收费'
  source: 03-Bio-Science/death/Death_Modern_Applications.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 死亡陪护师的核心要点是什么？
  answer: '英文名: Death Doula / End-of-Life Doula；来源: 美国(2000s)；词源/含义: 希腊: *Doula* (女性仆人/陪伴者)；精确定义: 非医疗专业人员,为临终者及家属提供情感、实务、灵性陪伴'
  source: 03-Bio-Science/death/Death_Modern_Applications.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 生前预嘱平台的核心要点是什么？
  answer: '英文名: Advance Care Planning Platform；来源: 全球；词源/含义: -；精确定义: 数字化工具,帮助个人记录医疗意愿、指定代理人、存储重要文件'
  source: 03-Bio-Science/death/Death_Modern_Applications.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 创始人的核心要点是什么？
  answer: '内容: Jon Underwood (英国,2011),受瑞士社会学家Bernard Crettaz启发'
  source: 03-Bio-Science/death/Death_Modern_Applications.md
  section: 1.1 起源与发展
- type: concept
  question: 核心理念的核心要点是什么？
  answer: '内容: "以提高对死亡的认识为目的,同时让人们更充分地享受生活"'
  source: 03-Bio-Science/death/Death_Modern_Applications.md
  section: 1.1 起源与发展
- type: concept
  question: 全球规模的核心要点是什么？
  answer: '内容: 截至2024年,全球超过100个国家举办过Death Cafe,累计超过15,000场'
  source: 03-Bio-Science/death/Death_Modern_Applications.md
  section: 1.1 起源与发展
- type: concept
  question: 场地的核心要点是什么？
  answer: '操作指南: 咖啡馆、书店、社区中心;避免医院、殡仪馆等"死亡专属"空间；原理: 环境的日常化降低防御'
  source: 03-Bio-Science/death/Death_Modern_Applications.md
  section: 1.2 Death Cafe 的操作框架
- type: concept
  question: 人数的核心要点是什么？
  answer: '操作指南: 通常8-15人;围坐圆桌；原理: 小型团体促进亲密感'
  source: 03-Bio-Science/death/Death_Modern_Applications.md
  section: 1.2 Death Cafe 的操作框架
- type: concept
  question: 数字永生的核心要点是什么？
  answer: '英文名 (English Term): Digital Immortality；原始语言/词源: -；精确定义: 通过数字技术(数据上传、AI模拟、数字遗产)在生物死亡后继续存在；区分要点: 不同于"生物永生":数字永生保留的是信息/人格模拟,而非生物体；专业视角:
    涉及AI伦理、人格同一性、隐私、继承法'
  source: 03-Bio-Science/death/Death_Modern_Issues.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 意识上传的核心要点是什么？
  answer: '英文名 (English Term): Mind Uploading / Whole Brain Emulation (WBE)；原始语言/词源: -；精确定义: 将大脑的全部信息结构扫描并上传到计算 substrate；区分要点:
    仍属理论/科幻范畴;技术障碍巨大；专业视角: 哲学问题:上传后的"你"还是你吗?(人格同一性)'
  source: 03-Bio-Science/death/Death_Modern_Issues.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 医助死亡的核心要点是什么？
  answer: '英文名 (English Term): Medical Assistance in Dying (MAiD)；原始语言/词源: -；精确定义: 在严格规范下,由医生提供药物帮助患者结束生命；区分要点: 区别于"安乐死":MAiD需患者自行服用;安乐死可由他人执行；专业视角:
    法律高度因地区而异;需区分自愿/非自愿、主动/被动'
  source: 03-Bio-Science/death/Death_Modern_Issues.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 数字遗产存档的核心要点是什么？
  answer: '技术描述: 将社交媒体、邮件、照片、视频系统性保存；当前状态: 已普及(Google Inactive Account Manager, Apple Legacy Contact)；核心哲学问题: 谁拥有死者的数字身份?'
  source: 03-Bio-Science/death/Death_Modern_Issues.md
  section: 2.1 技术路径概览
- type: concept
  question: AI 人格模拟的核心要点是什么？
  answer: '技术描述: 用机器学习训练逝者的语言模型,创建可对话的"数字化身"；当前状态: 早期应用(Replika, HereAfter AI,  Microsoft''s chatbot patents)；核心哲学问题: 模拟是"纪念"还是"冒充"?'
  source: 03-Bio-Science/death/Death_Modern_Issues.md
  section: 2.1 技术路径概览
- type: concept
  question: 全脑仿真 (WBE)的核心要点是什么？
  answer: '技术描述: 纳米级扫描大脑,在计算机中重建神经连接组；当前状态: 理论阶段;距离实现数十年至数百年；核心哲学问题: 仿真是"你"还是"你的副本"?'
  source: 03-Bio-Science/death/Death_Modern_Issues.md
  section: 2.1 技术路径概览
- type: concept
  question: 心理连续性理论的核心要点是什么？
  answer: '核心观点: 只要记忆、性格、信念的连续性得以保持,就是同一人；对意识上传的意义: 上传若保持心理连续性,可视为同一人的延续'
  source: 03-Bio-Science/death/Death_Modern_Issues.md
  section: 2.2 人格同一性问题
- type: concept
  question: 身体理论的核心要点是什么？
  answer: '核心观点: 人格同一性依赖于生物身体的连续性；对意识上传的意义: 上传创造的是"副本"而非"延续";原人仍死亡'
  source: 03-Bio-Science/death/Death_Modern_Issues.md
  section: 2.2 人格同一性问题
- type: concept
  question: 濒死体验的核心要点是什么？
  answer: '英文名 (English Term): Near-Death Experience (NDE)；原始语言/词源: -；精确定义: 在临床医学死亡(心跳/呼吸停止)或接近死亡状态下发生的意识体验；区分要点: 与"临终幻觉"不同:NDE发生在心跳停止期间,而非临终前数天；专业视角:
    跨学科现象:涉及神经科学、心脏病学、精神病学、宗教学'
  source: 03-Bio-Science/death/Death_NDE_Near_Death_Experience.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 临终幻觉的核心要点是什么？
  answer: '英文名 (English Term): End-of-Life Dreams/Visions；原始语言/词源: -；精确定义: 临终前数天至数周出现的生动梦境或视觉幻象,常涉及已故亲人；区分要点: 发生在意识清醒但身体衰退期,与NDE的时间窗不同；专业视角:
    更多属于心理-灵性现象,而非心脏骤停相关'
  source: 03-Bio-Science/death/Death_NDE_Near_Death_Experience.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 回光返照的核心要点是什么？
  answer: '英文名 (English Term): Terminal Lucidity；原始语言/词源: 拉丁: *Luciditas terminalis*；精确定义: 临终前突然出现的意识清醒、精神振奋、记忆恢复；区分要点: 可能持续数分钟至数小时,之后迅速死亡；专业视角:
    神经科学机制不明;在痴呆患者中亦有报道'
  source: 03-Bio-Science/death/Death_NDE_Near_Death_Experience.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 1. 难以言喻的核心要点是什么？
  answer: '典型描述: 体验到无法用语言描述的"另外的现实"；出现频率: 普遍；可能的神经机制: 意识状态改变;默认模式网络重组'
  source: 03-Bio-Science/death/Death_NDE_Near_Death_Experience.md
  section: 2.1 Raymond Moody 阶段模型 (1975)
- type: concept
  question: 2. 听到消息的核心要点是什么？
  answer: '典型描述: 听到医生宣布自己死亡的声音；出现频率: 常见；可能的神经机制: 听觉皮层在心脏停搏早期的残余活动'
  source: 03-Bio-Science/death/Death_NDE_Near_Death_Experience.md
  section: 2.1 Raymond Moody 阶段模型 (1975)
- type: concept
  question: 3. 平和安宁的核心要点是什么？
  answer: '典型描述: 极度的平静、无痛苦、脱离恐惧；出现频率: 非常常见；可能的神经机制: 内啡肽大量释放;GABA系统激活'
  source: 03-Bio-Science/death/Death_NDE_Near_Death_Experience.md
  section: 2.1 Raymond Moody 阶段模型 (1975)
- type: concept
  question: 认知的核心要点是什么？
  answer: '内容: 思维加速、时间扭曲、人生回顾、边界感；典型条目: "我的思维比平常快得多"；心理学关联: 时间感知与海马/前额叶功能'
  source: 03-Bio-Science/death/Death_NDE_Near_Death_Experience.md
  section: 2.2 Bruce Greyson 濒死体验量表维度
- type: concept
  question: 情感的核心要点是什么？
  answer: '内容: 平和、喜悦、脱离身体、与宇宙合一；典型条目: "我感受到极大的平静"；心理学关联: 情绪调节系统;内源性阿片系统'
