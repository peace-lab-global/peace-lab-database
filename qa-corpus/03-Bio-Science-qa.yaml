  question: 生物利用度的核心要点是什么？
  answer: '内容: 口服生物利用度高(约98%)；详细说明: 30-60分钟达峰,半衰期约1-2小时；临床意义: 起效快,需持续摄入维持效果；专业视角: 与食物同服不显著影响吸收'
  source: 03-Bio-Science/foods/tea/Tea_Neuroscience_Pharmacology.md
  section: L-茶氨酸药理学详表 (L-Theanine Pharmacology)
