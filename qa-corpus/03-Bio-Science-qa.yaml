  question: 死亡准备的核心要点是什么？
  answer: '英文名: Death Preparation / Death Readiness；词源/来源: 老年心理学；精确定义: 老年人通过心理、社会、实际准备来面对死亡的过程'
  source: 03-Bio-Science/death/Death_Aging_End_of_Life.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 生命回顾的核心要点是什么？
  answer: '英文名: Life Review；词源/来源: Robert Butler, 1963；精确定义: 老年人自然发生的对整个人生的回顾与整合过程'
  source: 03-Bio-Science/death/Death_Aging_End_of_Life.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 自我超越的核心要点是什么？
  answer: '英文名: Ego Integrity；词源/来源: Erik Erikson；精确定义: 老年期心理社会发展任务：接受自己的生命历程，获得智慧'
  source: 03-Bio-Science/death/Death_Aging_End_of_Life.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 焦点的核心要点是什么？
  answer: '儿童/青少年: 分离焦虑、未知恐惧；成年期: 未完成的事务、责任；老年期: 过程恐惧、痛苦恐惧、孤独死'
  source: 03-Bio-Science/death/Death_Aging_End_of_Life.md
  section: 1.1 老年死亡焦虑 vs. 其他年龄段
- type: concept
  question: 时间框架的核心要点是什么？
  answer: '儿童/青少年: "遥远"；成年期: "可能发生"；老年期: "近在眼前"'
  source: 03-Bio-Science/death/Death_Aging_End_of_Life.md
  section: 1.1 老年死亡焦虑 vs. 其他年龄段
- type: concept
  question: 可控感的核心要点是什么？
  answer: '儿童/青少年: 低（不理解）；成年期: 中（可以努力避免）；老年期: 低（身体衰退不可逆）'
  source: 03-Bio-Science/death/Death_Aging_End_of_Life.md
  section: 1.1 老年死亡焦虑 vs. 其他年龄段
- type: concept
  question: 痛苦恐惧的核心要点是什么？
  answer: '描述: 害怕死亡过程的痛苦；比例（研究估计）: 极高（>80%）'
  source: 03-Bio-Science/death/Death_Aging_End_of_Life.md
  section: 1.2 老年死亡焦虑的核心内容
- type: concept
  question: 成为负担的核心要点是什么？
  answer: '描述: 害怕成为家人的负担；比例（研究估计）: 高（~60-70%）'
  source: 03-Bio-Science/death/Death_Aging_End_of_Life.md
  section: 1.2 老年死亡焦虑的核心内容
- type: concept
  question: 死亡焦虑的核心要点是什么？
  answer: '英文名 (English Term): Death Anxiety；原始语言/词源 (Original Language): -；词源含义: 综合性术语；精确定义: 对死亡及其相关议题的恐惧、担忧与不安；区分要点: 涵盖多维度：死亡过程、死后、不存在、丧亲；专业视角
    (Professional Perspective): 正常范围内可激发生命意义感；过度则致病理'
  source: 03-Bio-Science/death/Death_Anxiety_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 死亡恐惧症的核心要点是什么？
  answer: '英文名 (English Term): Thanatophobia；原始语言/词源 (Original Language): 希腊语: *Thanatos* (Θάνατος, 死神) + *Phobos* (φόβος,
    恐惧)；词源含义: "对死神的恐惧"；精确定义: 对死亡或濒死的病理性、过度的恐惧；区分要点: 超出正常担忧，导致显著功能损害；专业视角 (Professional Perspective): DSM-5归入特定恐惧症"其他型"'
  source: 03-Bio-Science/death/Death_Anxiety_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 死亡恐惧的核心要点是什么？
  answer: '英文名 (English Term): Mṛtyu-bhaya；原始语言/词源 (Original Language): 梵语: *Mṛtyu* (मृत्यु, 死亡) + *Bhaya* (भय, 恐惧)；词源含义:
    印度哲学传统对死亡恐惧的描述；精确定义: 《瑜伽经》列为五种烦恼(Kleśa)之一：对死亡/消亡的执着；区分要点: 被视为无明(Avidyā)的表现；专业视角 (Professional Perspective): 瑜伽与吠檀多传统中的核心修行障碍'
  source: 03-Bio-Science/death/Death_Anxiety_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 对死亡过程的恐惧的核心要点是什么？
  answer: '中文名称: 濒死恐惧；英文名: Fear of Dying Process；恐惧焦点: 疼痛、窒息、失控、丧失尊严；典型表现: "我怕死得很痛苦"；回避医疗话题；相关理论: 疼痛恐惧、控制需求；临床关联: 临终焦虑、预立医嘱阻抗'
  source: 03-Bio-Science/death/Death_Anxiety_Overview.md
  section: 表2.1 死亡焦虑的核心维度 (Core Dimensions of Death Anxiety)
- type: concept
  question: 对不存在的恐惧的核心要点是什么？
  answer: '中文名称: 虚无恐惧；英文名: Fear of Non-Existence；恐惧焦点: 意识终止、自我消散、永恒虚无；典型表现: "我无法想象不存在是什么感觉"；相关理论: 存在主义：Being vs. Non-Being；临床关联:
    存在性焦虑、虚无主义危机'
  source: 03-Bio-Science/death/Death_Anxiety_Overview.md
  section: 表2.1 死亡焦虑的核心维度 (Core Dimensions of Death Anxiety)
- type: concept
  question: 对未知的恐惧的核心要点是什么？
  answer: '中文名称: 死后未知恐惧；英文名: Fear of the Unknown；恐惧焦点: 死后发生什么？是否有来世？；典型表现: "没人知道死后会怎样"；相关理论: 不确定性不耐受；临床关联: 宗教焦虑、灵性危机'
  source: 03-Bio-Science/death/Death_Anxiety_Overview.md
  section: 表2.1 死亡焦虑的核心维度 (Core Dimensions of Death Anxiety)
- type: concept
  question: 正常性死亡焦虑的核心要点是什么？
  answer: '中文名称: 存在性觉知；英文名: Normal/Normative Death Anxiety；核心特征: 对死亡的适度关注与担忧，激发意义感；易感人群: 普遍人群；功能影响: 适应性：促进价值澄清；干预重点: 无需干预；可利用以促进成长'
  source: 03-Bio-Science/death/Death_Anxiety_Overview.md
  section: 表2.2 死亡焦虑的类型学 (Typology of Death Anxiety)
- type: concept
  question: 神经质性死亡焦虑的核心要点是什么？
  answer: '中文名称: 过度死亡恐惧；英文名: Neurotic Death Anxiety；核心特征: 不成比例的恐惧、回避、侵入性死亡思维；易感人群: 焦虑障碍、强迫人格；功能影响: 显著功能损害；干预重点: CBT、暴露治疗'
  source: 03-Bio-Science/death/Death_Anxiety_Overview.md
  section: 表2.2 死亡焦虑的类型学 (Typology of Death Anxiety)
- type: concept
  question: 猝死恐惧的核心要点是什么？
  answer: '英文名 (English Term): Sudden Death Fear；原始语言/词源 (Original Language): 拉丁语: *Subitus* (突然) + *Mors* (死亡)；词源含义: 对突然死亡的恐惧；精确定义:
    对无预警、突然发生的死亡(尤其心脏相关)的强烈恐惧；区分要点: 与慢性疾病恐惧区分：强调"突然性"与"不可预测性"；专业视角 (Professional Perspective): 惊恐障碍核心认知成分'
  source: 03-Bio-Science/death/Death_Anxiety_Sudden_Death_Fear.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 心脏恐惧症的核心要点是什么？
  answer: '英文名 (English Term): Cardiophobia；原始语言/词源 (Original Language): 希腊语: *Kardia* (καρδία, 心脏) + *Phobos* (φόβος, 恐惧)；词源含义:
    "对心脏的恐惧"；精确定义: 持续担忧心脏疾病/心脏骤停，尽管医学检查正常；区分要点: 非DSM正式诊断；归入疾病焦虑障碍或特定恐惧症；专业视角 (Professional Perspective): 心身医学重要概念'
  source: 03-Bio-Science/death/Death_Anxiety_Sudden_Death_Fear.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 心脏焦虑的核心要点是什么？
  answer: '英文名 (English Term): Cardiac Anxiety；原始语言/词源 (Original Language): -；词源含义: 综合术语；精确定义: 围绕心脏功能/症状的焦虑，包括对心悸、胸痛、猝死的恐惧；区分要点:
    可见于健康人群、心脏病患者、惊恐障碍；专业视角 (Professional Perspective): 心脏康复的重要靶点'
  source: 03-Bio-Science/death/Death_Anxiety_Sudden_Death_Fear.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 核心恐惧信念的核心要点是什么？
  answer: '表现: "我随时会心脏骤停而死"；典型内容: "我的心脏有问题"；"下一次心悸就是心脏病发作"；功能影响: 持续恐惧状态'
  source: 03-Bio-Science/death/Death_Anxiety_Sudden_Death_Fear.md
  section: 表2.1 猝死恐惧的认知-情绪-行为模式 (Cognitive-Affective-Behavioral Patterns)
- type: concept
  question: 灾难化认知的核心要点是什么？
  answer: '表现: 将正常躯体感觉解释为致命征兆；典型内容: "心跳加速=心脏病"；"左胸刺痛=心肌梗死"；功能影响: 恐惧升级'
  source: 03-Bio-Science/death/Death_Anxiety_Sudden_Death_Fear.md
  section: 表2.1 猝死恐惧的认知-情绪-行为模式 (Cognitive-Affective-Behavioral Patterns)
- type: concept
  question: 不确定性不耐受的核心要点是什么？
  answer: '表现: 无法忍受"可能没事"的不确定；典型内容: "医生说没事，但他可能漏诊了"；功能影响: 反复就医'
  source: 03-Bio-Science/death/Death_Anxiety_Sudden_Death_Fear.md
  section: 表2.1 猝死恐惧的认知-情绪-行为模式 (Cognitive-Affective-Behavioral Patterns)
- type: concept
  question: 心脏性猝死恐惧的核心要点是什么？
  answer: '英文: Cardiac Sudden Death Fear；核心特征: 恐惧心脏骤停/心肌梗死；典型触发: 心悸、胸痛、左臂不适；常见人群: 惊恐障碍、疾病焦虑；鉴别要点: 聚焦心脏'
  source: 03-Bio-Science/death/Death_Anxiety_Sudden_Death_Fear.md
  section: 表2.2 猝死恐惧的亚型 (Subtypes of Sudden Death Fear)
- type: concept
  question: 脑血管性猝死恐惧的核心要点是什么？
  answer: '英文: Cerebrovascular Sudden Death Fear；核心特征: 恐惧脑卒中/脑溢血；典型触发: 头痛、头晕、麻木；常见人群: 高血压担忧者；鉴别要点: 聚焦大脑'
  source: 03-Bio-Science/death/Death_Anxiety_Sudden_Death_Fear.md
  section: 表2.2 猝死恐惧的亚型 (Subtypes of Sudden Death Fear)
- type: concept
  question: 存在疗法的核心要点是什么？
  answer: '英文名 (English Term): Existential Therapy；原始语言/词源 (Original Language): 拉丁语: *Existere* (存在、出现)；词源含义: "关于存在的治疗"；精确定义:
    帮助来访者面对存在核心议题(死亡、自由、孤独、意义)的心理治疗取向；专业视角 (Professional Perspective): Yalom、May、Frankl等发展'
  source: 03-Bio-Science/death/Death_Anxiety_Treatment.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 意义疗法的核心要点是什么？
  answer: '英文名 (English Term): Logotherapy；原始语言/词源 (Original Language): 希腊语: *Logos* (λόγος, 意义/道/逻辑) + Therapy；词源含义: "通过意义的治疗"；精确定义:
    Frankl创立的治疗取向，核心是帮助人找到生命意义以超越苦难；专业视角 (Professional Perspective): 第三维也纳学派'
  source: 03-Bio-Science/death/Death_Anxiety_Treatment.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 向死而生的核心要点是什么？
  answer: '英文名 (English Term): Being-toward-Death；原始语言/词源 (Original Language): 德语: *Sein zum Tode*；词源含义: 海德格尔术语；精确定义: 通过面对自身必死性而更真实地活着；专业视角
    (Professional Perspective): 存在疗法核心目标'
  source: 03-Bio-Science/death/Death_Anxiety_Treatment.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
