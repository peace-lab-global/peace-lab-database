  source: 03-Bio-Science/sexuality/masturbation-psychology/Masturbation_Individual_Differences.md
  section: 自慰行为的性别差异全景
- type: concept
  question: 进化心理学的核心要点是什么？
  answer: '核心主张: 亲代投资差异导致择偶策略分化；对自慰差异的解释: 男性更高的性驱力与性幻想频率；支持证据: 跨文化一致性(Schmitt, 2005)；局限性: 过度简化，忽视文化变异；代表学者: Trivers, Buss'
  source: 03-Bio-Science/sexuality/masturbation-psychology/Masturbation_Individual_Differences.md
  section: 性别差异的理论解释
- type: concept
  question: 社会角色理论的核心要点是什么？
  answer: '核心主张: 性别角色社会化差异塑造行为；对自慰差异的解释: 女性受到更多"性脚本"约束；支持证据: 世代效应与文化差异支持社会建构；局限性: 难以完全解释生物因素；代表学者: Eagly, Wood'
  source: 03-Bio-Science/sexuality/masturbation-psychology/Masturbation_Individual_Differences.md
  section: 性别差异的理论解释
- type: concept
  question: 自慰的核心要点是什么？
  answer: '术语 (English): Masturbation；精确定义: 通过自我刺激生殖器官以获得性快感的行为；相关神经系统: 躯体感觉系统、奖赏回路；区分与备注: 与"自体性行为(autoerotic behavior)"概念重叠但不等同；临床关联:
    正常性行为谱系的组成部分'
  source: 03-Bio-Science/sexuality/masturbation-psychology/Masturbation_Neuroscience_Physiology.md
  section: 核心术语表 | Key Terminology
- type: concept
  question: 性反应周期的核心要点是什么？
  answer: '术语 (English): Sexual Response Cycle；精确定义: 从性唤起到消退的生理变化序列；相关神经系统: 自主神经系统、中枢神经系统；区分与备注: Masters & Johnson四阶段 vs Kaplan三阶段模型；临床关联:
    性功能障碍的评估框架'
  source: 03-Bio-Science/sexuality/masturbation-psychology/Masturbation_Neuroscience_Physiology.md
  section: 核心术语表 | Key Terminology
- type: concept
  question: 性高潮的核心要点是什么？
  answer: '术语 (English): Orgasm；精确定义: 以骨盆肌肉节律性收缩为特征的性快感高峰体验；相关神经系统: 脊髓反射弧、边缘系统；区分与备注: 自慰高潮 vs 伴侣性行为高潮存在神经激活差异；临床关联: 高潮障碍的诊断参照'
  source: 03-Bio-Science/sexuality/masturbation-psychology/Masturbation_Neuroscience_Physiology.md
  section: 核心术语表 | Key Terminology
- type: concept
  question: 欲望期的核心要点是什么？
  answer: '核心激活脑区: 下丘脑视前区、前扣带回、岛叶；神经递质变化: 多巴胺↑、睾酮调节；自主神经参与: 交感初步激活；主观体验特征: 性幻想、性动机增强；fMRI研究证据: Stoléru et al., 2012: 下丘脑激活与主观性欲显著正相关(r=0.67)'
  source: 03-Bio-Science/sexuality/masturbation-psychology/Masturbation_Neuroscience_Physiology.md
  section: 自慰性反应的中枢神经激活模式
- type: concept
  question: 兴奋期的核心要点是什么？
  answer: '核心激活脑区: 丘脑、感觉皮层、杏仁核；神经递质变化: 多巴胺持续↑、NA↑；自主神经参与: 副交感主导→血管充血；主观体验特征: 生殖器充血、感觉敏感化；fMRI研究证据: Georgiadis et al., 2006:
    体感皮层激活强度随唤起水平线性增加'
  source: 03-Bio-Science/sexuality/masturbation-psychology/Masturbation_Neuroscience_Physiology.md
  section: 自慰性反应的中枢神经激活模式
- type: concept
  question: 平台期的核心要点是什么？
  answer: '核心激活脑区: 基底节、小脑、前额叶去激活；神经递质变化: 多巴胺峰值、5-HT抑制性作用；自主神经参与: 交感-副交感协同；主观体验特征: 快感积累、注意力聚焦；fMRI研究证据: Komisaruk et al., 2004:
    前额叶去激活与"自我消融"体验相关'
  source: 03-Bio-Science/sexuality/masturbation-psychology/Masturbation_Neuroscience_Physiology.md
  section: 自慰性反应的中枢神经激活模式
- type: concept
  question: 前额叶活动的核心要点是什么？
  answer: '自慰时神经模式: 部分区域保持激活（自我监控）；伴侣性行为时神经模式: 更广泛的前额叶去激活；差异机制: 伴侣情境中社会认知抑制更强；研究来源: Georgiadis & Kringelbach, 2012；临床意义: 自慰时的认知控制保留可能解释部分体验差异'
  source: 03-Bio-Science/sexuality/masturbation-psychology/Masturbation_Neuroscience_Physiology.md
  section: 自慰特异性神经激活特征
- type: concept
  question: 催产素释放的核心要点是什么？
  answer: '自慰时神经模式: 中等水平升高；伴侣性行为时神经模式: 显著升高(约为自慰时的2-3倍)；差异机制: 皮肤接触与社会纽带的催产素效应叠加；研究来源: Carmichael et al., 1987；临床意义: 伴侣互动的独特神经化学贡献'
  source: 03-Bio-Science/sexuality/masturbation-psychology/Masturbation_Neuroscience_Physiology.md
  section: 自慰特异性神经激活特征
