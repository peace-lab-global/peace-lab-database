  question: 愤怒情绪的核心要点是什么？
  answer: '典型表现: 对不公正待遇的强烈不满和反抗冲动；生理反应: 血压升高，肌肉紧张，肾上腺素分泌增加；认知评价: "为什么是我？"、"这不公平！"；行为后果: 攻击行为，关系破裂，身心耗竭'
  source: 03-Bio-Science/sexuality/gender-discrimination/Psychological_Trauma_Intergenerational.md
