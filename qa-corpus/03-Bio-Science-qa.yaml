- type: concept
  question: '[24小时断食指南](extended-fasting/Extended_Fasting_24h.md)的核心要点是什么？'
  answer: '时长/类型: 24小时；难度: 入门；核心收益: 轻度自噬、减脂、代谢灵活性'
  source: 03-Bio-Science/foods/fasting/INDEX.md
  section: 3. 延长断食专题 (Extended Fasting) **[NEW]**
- type: concept
  question: 24小时断食的核心要点是什么？
  answer: '英文: 24-Hour Fast / OMAD (One Meal A Day)；定义: 连续24小时内不摄入任何含热量的食物或饮品，仅允许水、黑咖啡或无糖茶。；专业视角: 是进入"扩展断食"领域的入门级协议，安全性高，适合大多数健康成人。'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Extended_Fasting_24h.md
  section: 1.1 定义与核心概念
- type: concept
  question: OMAD的核心要点是什么？
  answer: '英文: One Meal A Day；定义: 每天只进食一餐，其余时间禁食，是24小时断食的常见形式。；专业视角: 可作为长期生活方式，但需注意单餐营养密度。'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Extended_Fasting_24h.md
  section: 1.1 定义与核心概念
- type: concept
  question: 进食窗口的核心要点是什么？
  answer: '英文: Eating Window；定义: 24小时中允许进食的时间段（通常1-2小时）。；专业视角: 建议固定在每天相同时间，配合昼夜节律。'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Extended_Fasting_24h.md
  section: 1.1 定义与核心概念
- type: concept
  question: 禁食时长的核心要点是什么？
  answer: '16:8 间歇断食: 16小时；**24小时断食**: **24小时**；48小时断食: 48小时；72小时断食: 72小时'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Extended_Fasting_24h.md
  section: 1.2 与其他断食模式对比
- type: concept
  question: 自噬激活程度的核心要点是什么？
  answer: '16:8 间歇断食: 轻度；**24小时断食**: **中度**；48小时断食: 显著；72小时断食: 强烈'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Extended_Fasting_24h.md
  section: 1.2 与其他断食模式对比
- type: concept
  question: 酮症深度的核心要点是什么？
  answer: '16:8 间歇断食: 浅度/无；**24小时断食**: **浅-中度**；48小时断食: 中度；72小时断食: 深度'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Extended_Fasting_24h.md
  section: 1.2 与其他断食模式对比
- type: concept
  question: 0-4小时的核心要点是什么？
  answer: '主要代谢变化: 餐后状态：消化吸收、血糖升高、胰岛素分泌。；生理指标变化: 血糖↑，胰岛素↑，生长激素↓；主观体验: 饱腹感，能量稳定'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Extended_Fasting_24h.md
  section: 2.1 代谢时间线 (Metabolic Timeline)
- type: concept
  question: 4-8小时的核心要点是什么？
  answer: '主要代谢变化: 后吸收期：肝糖原开始分解，血糖缓慢下降。；生理指标变化: 血糖→正常范围，胰岛素↓；主观体验: 正常状态'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Extended_Fasting_24h.md
  section: 2.1 代谢时间线 (Metabolic Timeline)
- type: concept
  question: 48小时断食的核心要点是什么？
  answer: '英文: 48-Hour Fast / Two-Day Fast；定义: 连续48小时内不摄入任何含热量的食物，仅允许水、电解质、黑咖啡或无糖茶。；专业定位: 属于"延长断食"范畴，代谢效应显著增强，建议有24小时断食经验后再尝试。'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Extended_Fasting_48h.md
  section: 1.1 定义与核心定位
- type: concept
  question: 延长断食的核心要点是什么？
  answer: '英文: Extended Fasting / Prolonged Fasting；定义: 通常指超过24小时的断食，从48小时开始进入更深层的代谢适应与自噬状态。；专业定位: 与间歇断食不同，延长断食带来更强的细胞修复与代谢重编程效应。'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Extended_Fasting_48h.md
  section: 1.1 定义与核心定位
- type: concept
  question: 自噬深度的核心要点是什么？
  answer: '相比24小时断食的增强效应: 自噬活性在24-48小时间持续攀升，48小时时达到显著水平。；科学依据: Alirezaei et al. (2010): 神经元自噬在断食24小时后显著增强。'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Extended_Fasting_48h.md
  section: 1.2 48小时断食的独特价值
- type: concept
  question: 酮症程度的核心要点是什么？
  answer: '相比24小时断食的增强效应: 血酮浓度可达1.0-2.5 mmol/L，进入营养性酮症。；科学依据: 脑部获得稳定的酮体供能，认知清晰度常见提升。'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Extended_Fasting_48h.md
  section: 1.2 48小时断食的独特价值
- type: concept
  question: 干细胞激活的核心要点是什么？
  answer: '相比24小时断食的增强效应: 48小时标志着免疫系统再生过程的启动。；科学依据: Cheng et al. (2014): 延长断食促进造血干细胞再生。'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Extended_Fasting_48h.md
  section: 1.2 48小时断食的独特价值
- type: concept
  question: 代谢风险的核心要点是什么？
  answer: '48小时断食评级: 中等；说明: 电解质失衡风险增加，需主动补充。'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Extended_Fasting_48h.md
  section: 1.3 风险等级评估
- type: concept
  question: 心血管风险的核心要点是什么？
  answer: '48小时断食评级: 低-中等；说明: 需监测血压与心率，尤其在服用降压药者。'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Extended_Fasting_48h.md
  section: 1.3 风险等级评估
- type: concept
  question: 低血糖风险的核心要点是什么？
  answer: '48小时断食评级: 中等；说明: 尤其糖尿病用药者，需医疗指导。'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Extended_Fasting_48h.md
  section: 1.3 风险等级评估
- type: concept
  question: 什么是重要安全声明？
  answer: '**72小时（3天）断食属于高级延长断食范畴，代谢与生理影响显著。强烈建议：**

    > 1. **仅适合有丰富断食经验者**（已成功完成多次24-48小时断食）

    > 2. **首次尝试应在医疗专业人员指导下进行**

    > 3. **有任何慢性疾病或用药者必须获得医疗许可**

    > 4. **严格遵循复食协议，不当复食可能导致严重后果**'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Extended_Fasting_72h.md
  section: 重要安全声明
- type: concept
  question: 72小时断食的核心要点是什么？
  answer: '英文: 72-Hour Fast / 3-Day Fast；定义: 连续72小时内不摄入任何含热量的食物，仅允许水、电解质和无热量饮品。；专业定位: 是延长断食的标志性时长，研究表明此时干细胞再生与免疫重启效应显著启动。'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Extended_Fasting_72h.md
  section: 1.1 定义与科学定位
- type: concept
  question: 水断食的核心要点是什么？
  answer: '英文: Water Fast；定义: 最严格的断食形式，仅摄入水与必要电解质。；专业定位: 72小时水断食是自噬与细胞再生研究的黄金标准时长。'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Extended_Fasting_72h.md
  section: 1.1 定义与科学定位
- type: concept
  question: 干细胞激活峰值的核心要点是什么？
  answer: '科学意义: 72小时断食触发造血干细胞从静息态进入再生态，免疫系统开始"重启"。；关键研究: Cheng et al. (2014), *Cell Stem Cell*'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Extended_Fasting_72h.md
  section: 1.2 为什么是72小时？——科学里程碑
- type: concept
  question: 自噬最大化的核心要点是什么？
  answer: '科学意义: 自噬活性在72小时内持续攀升并达到高峰平台期。；关键研究: 细胞清除衰老与受损组分的效率达到最高'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Extended_Fasting_72h.md
  section: 1.2 为什么是72小时？——科学里程碑
- type: concept
  question: IGF-1最低点的核心要点是什么？
  answer: '科学意义: 胰岛素样生长因子-1降至低点，被认为与抗癌和抗衰老相关。；关键研究: 减少促细胞增殖信号，有利于损伤修复'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Extended_Fasting_72h.md
  section: 1.2 为什么是72小时？——科学里程碑
- type: concept
  question: 代谢风险的核心要点是什么？
  answer: '72小时断食评级: **高**；详细说明: 电解质失衡、低血糖风险显著增加'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Extended_Fasting_72h.md
  section: 1.3 风险等级评估
- type: concept
  question: 心血管风险的核心要点是什么？
  answer: '72小时断食评级: **中-高**；详细说明: 需密切监测血压与心率'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Extended_Fasting_72h.md
  section: 1.3 风险等级评估
- type: concept
  question: 什么是专题概述？
  answer: 延长断食（Extended Fasting）是指超过24小时的断食实践，相比日常间歇断食（如16:8），延长断食能够触发更深层的代谢适应、自噬激活与细胞再生效应。本专题提供从入门到高级的完整指南。
  source: 03-Bio-Science/foods/fasting/extended-fasting/INDEX.md
  section: 专题概述
- type: concept
  question: 24小时断食的核心要点是什么？
  answer: '文档: [Extended_Fasting_24h.md](Extended_Fasting_24h.md)；难度: 入门级；核心收益: 轻度自噬、代谢灵活性、减脂；建议人群: 健康成人、断食新手'
  source: 03-Bio-Science/foods/fasting/extended-fasting/INDEX.md
  section: 1. 按时间长度分类
- type: concept
  question: 48小时断食的核心要点是什么？
  answer: '文档: [Extended_Fasting_48h.md](Extended_Fasting_48h.md)；难度: 中级；核心收益: 显著自噬、深度酮症、免疫调节；建议人群: 有24h断食经验者'
  source: 03-Bio-Science/foods/fasting/extended-fasting/INDEX.md
  section: 1. 按时间长度分类
- type: concept
  question: 72小时断食的核心要点是什么？
  answer: '文档: [Extended_Fasting_72h.md](Extended_Fasting_72h.md)；难度: 高级；核心收益: 干细胞激活、免疫重启、最大化自噬；建议人群: 有丰富经验者，建议医疗监督'
  source: 03-Bio-Science/foods/fasting/extended-fasting/INDEX.md
  section: 1. 按时间长度分类
- type: concept
  question: 液断/液体断食的核心要点是什么？
  answer: '文档: [Liquid_Fasting.md](Liquid_Fasting.md)；特点: 温和过渡、允许液体营养；适合人群: 断食新手、需要消化休息者'
  source: 03-Bio-Science/foods/fasting/extended-fasting/INDEX.md
  section: 2. 按断食形式分类
- type: concept
  question: 0-12h的核心要点是什么？
  answer: '主要代谢状态: 后吸收期，糖原动员；血酮水平: <0.5 mmol/L；自噬程度: 轻微'
  source: 03-Bio-Science/foods/fasting/extended-fasting/INDEX.md
  section: 代谢时间线
- type: concept
  question: 12-24h的核心要点是什么？
  answer: '主要代谢状态: 代谢转换，脂肪动员启动；血酮水平: 0.5-1.0 mmol/L；自噬程度: 启动'
  source: 03-Bio-Science/foods/fasting/extended-fasting/INDEX.md
  section: 代谢时间线
- type: concept
  question: 24-48h的核心要点是什么？
  answer: '主要代谢状态: 稳定酮症，自噬上调；血酮水平: 1.0-2.0 mmol/L；自噬程度: 显著'
  source: 03-Bio-Science/foods/fasting/extended-fasting/INDEX.md
  section: 代谢时间线
- type: concept
  question: 液断/液体断食的核心要点是什么？
  answer: '英文: Liquid Fasting / Liquid Fast；定义: 在特定时间内避免固体食物，仅摄入液体形式的营养（包括水、茶、果汁、蔬菜汁、清汤、奶昔等）。；专业定位: 介于完全断食与正常饮食之间的温和过渡方案，适合断食初学者或需要消化系统休息者。'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Liquid_Fasting.md
  section: 1.1 定义与核心概念
- type: concept
  question: 果汁断食的核心要点是什么？
  answer: '英文: Juice Fasting / Juice Cleanse；定义: 液断的一种，仅摄入新鲜果蔬汁。；专业定位: 常用于"排毒"目的，但存在高糖风险，需谨慎选择。'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Liquid_Fasting.md
  section: 1.1 定义与核心概念
- type: concept
  question: 清汤断食的核心要点是什么？
  answer: '英文: Broth Fasting；定义: 液断的一种，以骨汤或蔬菜汤为主。；专业定位: 蛋白质与矿物质相对丰富，较果汁断食更温和。'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Liquid_Fasting.md
  section: 1.1 定义与核心概念
- type: concept
  question: 允许摄入的核心要点是什么？
  answer: '液断: 各类液体（含热量或不含热量）；水断食: 仅水与无热量饮品；间歇断食 (16:8): 进食窗口内不限'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Liquid_Fasting.md
  section: 1.2 液断 vs 水断食 vs 间歇断食对比
- type: concept
  question: 热量摄入的核心要点是什么？
  answer: '液断: 低至中等（200-800 kcal/天）；水断食: 接近零；间歇断食 (16:8): 正常或略低'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Liquid_Fasting.md
  section: 1.2 液断 vs 水断食 vs 间歇断食对比
- type: concept
  question: 自噬激活的核心要点是什么？
  answer: '液断: 部分激活（取决于液体类型）；水断食: 显著激活；间歇断食 (16:8): 轻度激活'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Liquid_Fasting.md
  section: 1.2 液断 vs 水断食 vs 间歇断食对比
- type: concept
  question: 温和过渡的核心要点是什么？
  answer: '详细说明: 比水断食更容易坚持，是断食初学者的理想入门方案。'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Liquid_Fasting.md
  section: 1.3 液断的独特价值
- type: concept
  question: 消化休息的核心要点是什么？
  answer: '详细说明: 消化系统无需处理固体食物，可获得部分休息与恢复。'
  source: 03-Bio-Science/foods/fasting/extended-fasting/Liquid_Fasting.md
  section: 1.3 液断的独特价值
