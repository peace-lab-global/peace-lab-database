  question: 权威情结的核心要点是什么？
  answer: '英文名 (English Term): Authority Complex；原始语言/术语 (Original Language): 拉丁: *Auctoritas* (权威) + 希腊: *Plexus* (情结)；精确定义
    (Technical Definition): 个体对权威人物（父母、教师、领导者）产生强烈的依恋、崇拜或恐惧等复杂情感反应的心理模式。；区分与备注 (Differentiation & Notes): 包含积极的恋慕和消极的恐惧两种极性，可能表现为适应性或病理性。；专业视角
    (Professional Perspective): 需要在发展背景中理解，区分正常发展阶段与病理固着。'
  source: 03-Bio-Science/sexuality/authority-complex/Authority_Complex_Overview.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 俄狄浦斯情结的核心要点是什么？
  answer: '英文名 (English Term): Oedipus Complex；原始语言/术语 (Original Language): 希腊: *Oidípous* (俄狄浦斯)；精确定义 (Technical Definition):
    弗洛伊德提出的儿童性心理发展阶段理论，描述3-6岁儿童对异性父母的性吸引和对同性父母的竞争心理。；区分与备注 (Differentiation & Notes): 现代观点认为这是正常发展过程的一部分，过度固着才成为问题。；专业视角 (Professional
    Perspective): 重要的发展里程碑，涉及性别认同和道德内化。'
  source: 03-Bio-Science/sexuality/authority-complex/Authority_Complex_Overview.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 权威移情的核心要点是什么？
  answer: '英文名 (English Term): Authority Transference；原始语言/术语 (Original Language): 德: *Übertragung* (移情)；精确定义 (Technical Definition):
    在治疗或教育关系中，来访者将对早期权威人物（父母、老师）的情感和态度转移到当前权威人物身上。；区分与备注 (Differentiation & Notes): 不同于一般移情，专门指向权威角色的复杂情感转移。；专业视角 (Professional
    Perspective): 治疗中的重要现象，需要专业处理以促进成长。'
  source: 03-Bio-Science/sexuality/authority-complex/Authority_Complex_Overview.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 恋父情结的核心要点是什么？
