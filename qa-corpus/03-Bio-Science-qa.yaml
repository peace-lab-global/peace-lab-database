- type: concept
  question: 血缘关系的核心要点是什么？
  answer: '类型: 直系血亲乱伦；核心特征: 父母-子女、祖孙间性行为；心理机制: 权力滥用、创伤性依恋；社会影响: 极度严重的社会禁忌；干预复杂度: 极高'
  source: 03-Bio-Science/sexuality/incest/Incest_Research_Framework.md
  section: 乱伦类型学分类
- type: concept
  question: 血缘关系的核心要点是什么？
  answer: '类型: 旁系血亲乱伦；核心特征: 兄弟姐妹、叔侄间性行为；心理机制: 情感边界模糊、探索性行为；社会影响: 严重社会谴责；干预复杂度: 高'
  source: 03-Bio-Science/sexuality/incest/Incest_Research_Framework.md
  section: 乱伦类型学分类
- type: concept
  question: 拟制关系的核心要点是什么？
  answer: '类型: 养父母-养子女；核心特征: 法律认定的亲子关系；心理机制: 信任背叛、角色混淆；社会影响: 法律后果严重；干预复杂度: 高'
  source: 03-Bio-Science/sexuality/incest/Incest_Research_Framework.md
  section: 乱伦类型学分类
- type: concept
  question: 安全感建立的核心要点是什么？
  answer: '正常发展: 稳定的照顾者关系；乱伦创伤影响: 照顾者成为威胁源；长期后果: 持续的不安全感'
  source: 03-Bio-Science/sexuality/incest/Incest_Research_Framework.md
  section: 创伤发展理论模型
- type: concept
  question: 边界认知的核心要点是什么？
  answer: '正常发展: 清晰的身体和情感边界；乱伦创伤影响: 边界被系统性侵犯；长期后果: 边界模糊或过度防御'
  source: 03-Bio-Science/sexuality/incest/Incest_Research_Framework.md
  section: 创伤发展理论模型
- type: concept
  question: 信任模式的核心要点是什么？
  answer: '正常发展: 基于经验的安全感；乱伦创伤影响: 信任被根本性破坏；长期后果: 人际信任困难'
  source: 03-Bio-Science/sexuality/incest/Incest_Research_Framework.md
  section: 创伤发展理论模型
- type: concept
  question: 复杂性PTSD的核心要点是什么？
  answer: '核心特征: 多维度创伤反应；发生率: 60-80%；影响机制: 持续性创伤暴露；治疗重点: 情绪调节训练'
  source: 03-Bio-Science/sexuality/incest/Incest_Research_Framework.md
  section: 心理症状谱系
- type: concept
  question: 抑郁症的核心要点是什么？
  answer: '核心特征: 持续的悲伤和绝望；发生率: 40-60%；影响机制: 自我价值感丧失；治疗重点: 认知行为重构'
  source: 03-Bio-Science/sexuality/incest/Incest_Research_Framework.md
  section: 心理症状谱系
- type: concept
  question: 乱伦的核心要点是什么？
  answer: '英文名 (English Term): Incest；学科领域: 性学/心理学；精确定义 (Technical Definition): 具有血缘关系或拟制血缘关系的家庭成员之间发生的性行为，通常涉及权力不对等和伦理禁忌的违背。；区分要点
    (Differentiation Points): 区别于一般的家庭性行为，强调关系的禁忌性和权力不平等性。；应用场景 (Application Context): 学术研究、临床诊断、法律界定'
  source: 03-Bio-Science/sexuality/incest/Incest_Terminology_Dictionary.md
  section: 基础定义类术语
- type: concept
  question: 血缘乱伦的核心要点是什么？
  answer: '英文名 (English Term): Consanguineous Incest；学科领域: 遗传学/性学；精确定义 (Technical Definition): 基于生物学血缘关系的乱伦行为，包括直系血亲和旁系血亲。；区分要点
    (Differentiation Points): 与拟制血亲乱伦相区别，强调生物学关系的存在。；应用场景 (Application Context): 遗传咨询、风险评估、法律判定'
  source: 03-Bio-Science/sexuality/incest/Incest_Terminology_Dictionary.md
  section: 基础定义类术语
- type: concept
  question: 拟制血亲乱伦的核心要点是什么？
  answer: '英文名 (English Term): Affinal Incest；学科领域: 法学/社会学；精确定义 (Technical Definition): 基于法律或社会认定的亲属关系发生的乱伦行为，如养父母-养子女、继父母-继子女。；区分要点
    (Differentiation Points): 区别于血缘关系，强调法律和社会建构的亲属关系。；应用场景 (Application Context): 法律案件、社会工作、家庭治疗'
  source: 03-Bio-Science/sexuality/incest/Incest_Terminology_Dictionary.md
  section: 基础定义类术语
- type: concept
  question: 乱伦创伤的核心要点是什么？
  answer: '英文名 (English Term): Incest Trauma；理论基础: 创伤理论；精确定义 (Technical Definition): 由家庭成员性侵犯造成的复杂性心理创伤，具有长期性和多维度影响特征。；临床特征
    (Clinical Features): 持续的恐惧、羞耻感、自我价值感低下、人际关系困难。；诊断标准 (Diagnostic Criteria): 符合复杂性PTSD诊断标准，伴有特定的依恋障碍表现。'
  source: 03-Bio-Science/sexuality/incest/Incest_Terminology_Dictionary.md
  section: 心理创伤类术语
- type: concept
  question: 乱伦后应激障碍的核心要点是什么？
  answer: '英文名 (English Term): Post-Incest Traumatic Stress Disorder；理论基础: PTSD理论；精确定义 (Technical Definition): 因乱伦经历而发展出的创伤后应激障碍，具有独特的症状表现和病程特点。；临床特征
    (Clinical Features): 创伤重现、回避行为、过度警觉、情感麻木。；诊断标准 (Diagnostic Criteria): DSM-5 PTSD诊断标准，结合乱伦特有的临床表现。'
  source: 03-Bio-Science/sexuality/incest/Incest_Terminology_Dictionary.md
  section: 心理创伤类术语
- type: concept
  question: 乱伦相关羞耻感的核心要点是什么？
  answer: '英文名 (English Term): Incest-Related Shame；理论基础: 社会心理学；精确定义 (Technical Definition): 受害者因乱伦经历而产生的深度羞耻感，涉及自我认同和身体感知的扭曲。；临床特征
    (Clinical Features): 身体羞耻、道德羞耻、存在性羞耻的复合体验。；诊断标准 (Diagnostic Criteria): 临床访谈评估，羞耻量表测量。'
  source: 03-Bio-Science/sexuality/incest/Incest_Terminology_Dictionary.md
  section: 心理创伤类术语
