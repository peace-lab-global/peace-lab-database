- type: concept
  question: Holotropic Breathwork的核心要点是什么？
  answer: 'Key Figure: Stanislav Grof；Primary Technique: Rapid, deep, rhythmic breathing.；Goal (目标): ASC; Trauma release.；Mechanism
    (可用机制): Respiratory Alkalosis; Altered CO2 levels.；Professional Perspective (专业视角): Used as a drug-free alternative to
    psychedelics for deep subconscious work.；Citation (引用来源): Grof, S. (1988). *The Adventure of Self-Discovery*.'
  source: 03-Bio-Science/biology/breathwork/Bio_Breathwork_Biohack.md
  section: Modern Breathwork Modalities (现代呼吸法流派)
