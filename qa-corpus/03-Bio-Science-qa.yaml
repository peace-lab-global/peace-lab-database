  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 丧失之丧失的核心要点是什么？
  answer: '英文名: Disenfranchised Grief；词源/来源: Doka (1989)；精确定义: 不被社会承认或支持的哀伤（宠物丧失是典型例子）'
