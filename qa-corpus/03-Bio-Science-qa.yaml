  question: 慢性腰痛的核心要点是什么？
  answer: '病理机制: 肌筋膜紧张、姿势异常；SPA治疗原理: 肌肉松弛、力学平衡重建；核心技术: 扳机点释放+核心稳定训练+姿势矫正；疗效评估: 功能障碍评分↓50-65%；治疗方案: 每周1-2次×8周'
