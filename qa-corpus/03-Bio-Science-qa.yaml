  question: Wim Hof Method的核心要点是什么？
  answer: 'Key Figure: Wim Hof；Primary Technique: Hyperventilation + Breath Retention + Cold.；Goal (目标): Resilience; Immunity.；Mechanism
    (可用机制): Intermittent Hypoxia; Adrenaline release.；Professional Perspective (专业视角): Induces a controlled stress response
    to retrain the autonomic nervous system.；Citation (引用来源): Kox, M., et al. (2014). *PNAS*.'
  source: 03-Bio-Science/biology/breathwork/Bio_Breathwork_Biohack.md
