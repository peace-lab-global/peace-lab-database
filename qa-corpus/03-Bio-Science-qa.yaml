- type: concept
  question: 自杀意念的核心要点是什么？
  answer: '英文名: Suicidal Ideation (SI)；词源: 拉丁: *Sui* (自己) + *Caedere* (杀死)；精确定义: 关于结束自己生命的想法，从被动愿望到主动计划；临床重要性: 自杀风险评估的核心维度'
  source: 03-Bio-Science/death/Death_Suicidology_Boundary.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 自杀计划的核心要点是什么？
  answer: '英文名: Suicide Plan；词源: -；精确定义: 关于如何、何时、何地实施自杀的具体想法；临床重要性: 风险升级的关键标志'
  source: 03-Bio-Science/death/Death_Suicidology_Boundary.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 自杀未遂的核心要点是什么？
  answer: '英文名: Suicide Attempt；词源: -；精确定义: 实施了旨在结束生命但未导致死亡的行为；临床重要性: 最强的自杀预测因子之一'
  source: 03-Bio-Science/death/Death_Suicidology_Boundary.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 死亡焦虑作为保护因素的核心要点是什么？
  answer: '描述: 害怕死亡本身阻止自杀；临床表现: "我想死但害怕疼/害怕地狱/害怕未知"；风险评估要点: 死亡恐惧减弱时，自杀风险可能上升'
  source: 03-Bio-Science/death/Death_Suicidology_Boundary.md
  section: 1.1 四种关系模式
- type: concept
  question: 死亡焦虑与自杀意念共存的核心要点是什么？
  answer: '描述: 同时存在强烈死亡恐惧和自杀念头；临床表现: 极端痛苦："既怕死又想死"；风险评估要点: 高度痛苦状态；需要紧急评估'
  source: 03-Bio-Science/death/Death_Suicidology_Boundary.md
  section: 1.1 四种关系模式
- type: concept
  question: 习得自杀能力的核心要点是什么？
  answer: '描述: 反复暴露于死亡/疼痛降低恐惧；临床表现: 自杀未遂史、职业暴露（医护/军人）、自伤史；风险评估要点: 获得能力是自杀三因素模型的关键'
  source: 03-Bio-Science/death/Death_Suicidology_Boundary.md
  section: 1.1 四种关系模式
- type: concept
  question: 受挫的归属感的核心要点是什么？
  answer: '定义: "我不属于任何地方；没有人真正关心我"；与死亡焦虑的关系: 死亡焦虑中的"关系性死亡焦虑"可能是其前身'
  source: 03-Bio-Science/death/Death_Suicidology_Boundary.md
  section: 1.2 Joiner 的自杀人际-心理模型
- type: concept
  question: 知觉到的累赘感的核心要点是什么？
  answer: '定义: "我死了对家人更好；我是负担"；与死亡焦虑的关系: 与低自尊、抑郁高度相关'
  source: 03-Bio-Science/death/Death_Suicidology_Boundary.md
  section: 1.2 Joiner 的自杀人际-心理模型
- type: concept
  question: 轮回的核心要点是什么？
  answer: '英文名 (English Term): Samsara；原始语言/术语: 梵: *Saṃsāra* (संसार)；词源含义: "流转、漫游"；精确定义: 众生在六道中生死相续的循环；专业视角: 佛教核心世界观;死亡不是终点而是转换'
  source: 03-Bio-Science/death/Death_Traditional_Views_Deep_Dive.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 涅槃的核心要点是什么？
  answer: '英文名 (English Term): Nirvana；原始语言/术语: 梵: *Nirvāṇa* (निर्वाण); 巴: *Nibbāna*；词源含义: "吹灭"(烦恼之火)；精确定义: 轮回的止息,苦的彻底终结；专业视角:
    非"天堂",而是苦的止息;非断灭,而是超越二元'
  source: 03-Bio-Science/death/Death_Traditional_Views_Deep_Dive.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 中阴的核心要点是什么？
  answer: '英文名 (English Term): Bardo；原始语言/术语: 藏: *Bar-do* (间隔); 梵: *Antarābhava*；词源含义: "中间状态"；精确定义: 死亡与再生之间的意识状态；专业视角: 《西藏度亡经》的核心框架;可辅助临终心理照护'
  source: 03-Bio-Science/death/Death_Traditional_Views_Deep_Dive.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 无明** → **行** → **识** → **名色** → **六入** → **触** → **受** → **爱** → **取** → **有** → **生** → **老死的核心要点是什么？
  answer: '含义: 轮回的因果链；死亡哲学关联: 死亡(老死)不是偶然,而是整个因果链的必然结果'
  source: 03-Bio-Science/death/Death_Traditional_Views_Deep_Dive.md
  section: 1.1 十二因缘中的"老死" (Jarāmaraṇa)
- type: concept
  question: 关键洞察的核心要点是什么？
  answer: '含义: 若切断"爱取有"(对存在的贪爱),即可切断生死轮回；死亡哲学关联: 死亡焦虑的深层根源是对"存在/自我"的贪爱'
  source: 03-Bio-Science/death/Death_Traditional_Views_Deep_Dive.md
  section: 1.1 十二因缘中的"老死" (Jarāmaraṇa)
- type: concept
  question: 无常 (Anicca)的核心要点是什么？
  answer: '含义: 一切现象都在变化；对死亡观的转化: 死亡不是异常,而是无常的自然表现;抗拒无常导致痛苦'
  source: 03-Bio-Science/death/Death_Traditional_Views_Deep_Dive.md
  section: 1.2 三法印与死亡
