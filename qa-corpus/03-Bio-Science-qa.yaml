  question: 茶道的核心要点是什么？
  answer: '英文名 (English Term): Tea Ceremony / Way of Tea；原始语言/术语 (Original Language): 日: *Chadō* (茶道) / *Sadō* (茶道); 中: 茶艺；词源含义:
    "茶之道",通过泡茶、品茶的仪式性实践,体悟当下、和敬清寂与生命美学；精确定义: 不仅是技术,更是心性修养与审美教育；区分与备注: 日本茶道强调"和敬清寂"(わけいせいじゃく),中国茶艺偏重"品茗论道"；专业视角 (Professional
    Perspective): 茶道可作为正念实践、感官训练与人际连接的载体,具有冥想与社交双重功能'
  source: 03-Bio-Science/foods/tea/Tea_Ceremony_Therapy.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 茶疗/茶治疗的核心要点是什么？
  answer: '英文名 (English Term): Tea Therapy / Therapeutic Tea Practice；原始语言/术语 (Original Language): -；词源含义: 利用茶叶的药理成分与饮茶仪式的心理效应进行身心调节；精确定义:
    包括药理层面(茶多酚、L-茶氨酸等)与心理层面(仪式感、正念)；区分与备注: 与一般"保健喝茶"不同,茶疗强调有意识的治疗性使用；专业视角 (Professional Perspective): 需区分传统本草学中的"茶为药"与现代循证茶疗,避免夸大疗效'
  source: 03-Bio-Science/foods/tea/Tea_Ceremony_Therapy.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 茶多酚的核心要点是什么？
  answer: '英文名 (English Term): Tea Polyphenols；原始语言/术语 (Original Language): 化学: *Polyphenols*；词源含义: 茶叶中的主要生物活性化合物,以儿茶素(EGCG)为代表；精确定义:
    具有抗氧化、抗炎、神经保护作用；区分与备注: 不同茶类(绿茶/红茶/乌龙)含量与构成不同；专业视角 (Professional Perspective): 绿茶儿茶素含量最高,红茶因发酵转化为茶黄素/茶红素'
  source: 03-Bio-Science/foods/tea/Tea_Ceremony_Therapy.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 绿茶的核心要点是什么？
  answer: '中文名: 绿茶；英文名: Green Tea；发酵程度: 不发酵；主要活性成分: 高儿茶素(EGCG)、中等茶氨酸、低咖啡因；身心效应: 抗氧化强、轻度提神、促进α波、改善认知；适用场景: 需要清醒专注但不希望过度兴奋时；注意事项:
    空腹大量饮用可能刺激胃,铁吸收敏感者避免餐时饮用'
  source: 03-Bio-Science/foods/tea/Tea_Ceremony_Therapy.md
  section: 茶类与身心效应对照表 (Tea Types & Psychophysiological Effects)
- type: concept
  question: 白茶的核心要点是什么？
  answer: '中文名: 白茶；英文名: White Tea；发酵程度: 微发酵；主要活性成分: 极高抗氧化物、低咖啡因；身心效应: 温和镇静、皮肤与免疫支持；适用场景: 需要极度温和放松、敏感体质；注意事项: 通常价格较高,需注意品质'
  source: 03-Bio-Science/foods/tea/Tea_Ceremony_Therapy.md
  section: 茶类与身心效应对照表 (Tea Types & Psychophysiological Effects)
- type: concept
  question: 黄茶的核心要点是什么？
  answer: '中文名: 黄茶；英文名: Yellow Tea；发酵程度: 轻发酵；主要活性成分: 介于绿茶与白茶之间；身心效应: 温和提神、健脾和胃；适用场景: 消化敏感但需适度清醒者；注意事项: 产量稀少,市场上真品较少'
  source: 03-Bio-Science/foods/tea/Tea_Ceremony_Therapy.md
  section: 茶类与身心效应对照表 (Tea Types & Psychophysiological Effects)
- type: concept
  question: 正念与当下的核心要点是什么？
  answer: '茶道仪式元素: 专注于水温、茶色、香气、口感的细微变化；对应心理机制: 感官锚定(sensory anchoring)、注意力训练；治疗性功能: 打断自动化思维、减少反刍；现代应用: 正念饮茶练习:每口茶停顿5秒,觉察味道层次'
  source: 03-Bio-Science/foods/tea/Tea_Ceremony_Therapy.md
  section: 茶道仪式的心理机制表 (Psychological Mechanisms of Tea Ceremony)
- type: concept
  question: 仪式性与可预测性的核心要点是什么？
  answer: '茶道仪式元素: 固定的泡茶步骤、茶具摆放、动作顺序；对应心理机制: 仪式为焦虑提供结构与控制感；治疗性功能: 减少不确定性焦虑、建立安全感；现代应用: 对强迫/焦虑个案,可设计个人化茶仪式作为稳定化工具'
  source: 03-Bio-Science/foods/tea/Tea_Ceremony_Therapy.md
  section: 茶道仪式的心理机制表 (Psychological Mechanisms of Tea Ceremony)
- type: concept
  question: 茶树的核心要点是什么？
  answer: '英文名 (English Term): Tea Plant；原始语言/术语 (Original Language): 拉丁: *Camellia sinensis*；词源含义: 由植物学家林奈命名,Camellia纪念传教士Georg
    Kamel；精确定义: 山茶科常绿灌木或小乔木,原产中国云南及周边地区；区分与备注: 两大变种:中国种(*C. sinensis var. sinensis*)与阿萨姆种(*C. sinensis var. assamica*)；专业视角
    (Professional Perspective): 中国种适合制作细腻茶类(绿茶、乌龙),阿萨姆种适合制作浓郁红茶'
  source: 03-Bio-Science/foods/tea/Tea_Core_Overview.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: L-茶氨酸的核心要点是什么？
  answer: '英文名 (English Term): L-Theanine；原始语言/术语 (Original Language): 化学: γ-谷氨酰乙胺; 日: *テアニン*；词源含义: 1949年日本学者酒�的�的三从玉露茶中分离命名；精确定义:
    茶叶特有的非蛋白质氨基酸,约占干茶重量1-2%；区分与备注: 茶树独有成分,其他植物几乎不含;可穿越血脑屏障；专业视角 (Professional Perspective): 产生"清醒的放松"(Alert Relaxation)状态,与咖啡因协同优于单独咖啡因'
  source: 03-Bio-Science/foods/tea/Tea_Core_Overview.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 茶多酚的核心要点是什么？
  answer: '英文名 (English Term): Tea Polyphenols；原始语言/术语 (Original Language): 化学: *Polyphenols*；词源含义: 多酚类化合物的统称,以儿茶素为代表；精确定义:
    茶叶中主要生物活性物质群,占干茶重量18-36%；区分与备注: 包括儿茶素(EGCG/ECG/EGC/EC)、茶黄素、茶红素等；专业视角 (Professional Perspective): 抗氧化能力超过维生素C/E,是茶叶健康效应的核心物质基础'
  source: 03-Bio-Science/foods/tea/Tea_Core_Overview.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 神话起源的核心要点是什么？
  answer: '年代: 约公元前2737年；关键事件: 神农尝百草,发现茶叶解毒；地点: 中国；文化意涵: 茶与"疗愈""自然"的原初联结；专业视角: 虽为传说,但反映茶最早作为药用植物的定位'
  source: 03-Bio-Science/foods/tea/Tea_Core_Overview.md
  section: 茶的历史与文化演变表 (History & Cultural Evolution)
- type: concept
  question: 文字记载的核心要点是什么？
  answer: '年代: 公元前59年；关键事件: 西汉王褒《僮约》首次明确记载"烹茶"与"买茶"；地点: 四川；文化意涵: 茶从药用向日常饮品过渡；专业视角: 证明西汉时茶已成为商品与日常消费品'
  source: 03-Bio-Science/foods/tea/Tea_Core_Overview.md
  section: 茶的历史与文化演变表 (History & Cultural Evolution)
- type: concept
  question: 陆羽茶经的核心要点是什么？
  answer: '年代: 公元760-780年；关键事件: 陆羽著《茶经》,系统化茶学知识；地点: 唐代中国；文化意涵: "茶圣"奠基,茶从饮品升华为文化艺术；专业视角: 世界第一部茶学专著,确立品茶标准与精神追求'
  source: 03-Bio-Science/foods/tea/Tea_Core_Overview.md
  section: 茶的历史与文化演变表 (History & Cultural Evolution)
- type: concept
  question: 儿茶素类的核心要点是什么？
  answer: '中文名: 表没食子儿茶素没食子酸酯；英文名: EGCG；化学分类: 黄烷-3-醇类多酚；含量范围(干茶%): 7-13%；主要作用: 最强抗氧化儿茶素,神经保护,抗炎抗癌；健康影响: 降低心血管风险,认知保护；加工变化:
    发酵氧化后大幅降低'
  source: 03-Bio-Science/foods/tea/Tea_Core_Overview.md
  section: 茶叶核心化学成分表 (Key Chemical Compounds)
- type: concept
  question: 表儿茶素没食子酸酯的核心要点是什么？
  answer: '中文名: ECG；英文名: 黄烷-3-醇类多酚；化学分类: 3-6%；含量范围(干茶%): 抗氧化,抗菌,脂肪代谢调节；主要作用: 降血脂,抗龋齿；健康影响: 发酵后转化'
  source: 03-Bio-Science/foods/tea/Tea_Core_Overview.md
  section: 茶叶核心化学成分表 (Key Chemical Compounds)
- type: concept
  question: 焦虑障碍(GAD)的核心要点是什么？
  answer: '茶的潜在益处: 减轻焦虑,促进放松；关键机制: L-茶氨酸增加α波,GABA调节；证据级别: B级(中)；推荐茶类: 绿茶/抹茶/高茶氨酸茶；注意事项: 避免过量咖啡因;严重焦虑需专业治疗；专业建议: 可作为辅助,不能替代CBT/药物'
  source: 03-Bio-Science/foods/tea/Tea_Mental_Health_Applications.md
  section: 茶与精神障碍关系总表 (Tea & Psychiatric Disorders Overview)
- type: concept
  question: 抑郁障碍(MDD)的核心要点是什么？
  answer: '茶的潜在益处: 降低风险,改善情绪；关键机制: 多巴胺调节,抗炎,BDNF；证据级别: B级(中)；推荐茶类: 绿茶/红茶/乌龙；注意事项: 不能替代抗抑郁药;注意药物相互作用；专业建议: 生活方式干预的一部分'
  source: 03-Bio-Science/foods/tea/Tea_Mental_Health_Applications.md
  section: 茶与精神障碍关系总表 (Tea & Psychiatric Disorders Overview)
- type: concept
  question: 双相障碍的核心要点是什么？
  answer: '茶的潜在益处: 有限证据,需谨慎；关键机制: -；证据级别: C级(弱)；推荐茶类: 低咖啡因选项；注意事项: 咖啡因可能诱发躁狂;药物相互作用；专业建议: 咨询精神科医生;稳定期可适量'
  source: 03-Bio-Science/foods/tea/Tea_Mental_Health_Applications.md
  section: 茶与精神障碍关系总表 (Tea & Psychiatric Disorders Overview)
