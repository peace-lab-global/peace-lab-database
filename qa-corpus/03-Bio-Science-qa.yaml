- type: concept
  question: 羞耻感的核心要点是什么？
  answer: '典型表现: 因性别身份而产生的深层自卑和自我厌恶；生理反应: 面部潮红，心跳加速，回避眼神接触；认知评价: "我不够好"、"我应该更像男性"；行为后果: 社交退缩，自我封闭，抑郁倾向'
  source: 03-Bio-Science/sexuality/gender-discrimination/Psychological_Trauma_Intergenerational.md
  section: 情绪调节障碍的表现 (Manifestations of Emotional Regulation Disorders)
- type: concept
  question: 焦虑情绪的核心要点是什么？
  answer: '典型表现: 对未来不确定性的过度担忧和恐惧；生理反应: 皮质醇水平持续升高，睡眠质量下降；认知评价: "我会不会又被歧视？"、"我能应对吗？"；行为后果: 回避行为，完美主义倾向，身心疲惫'
  source: 03-Bio-Science/sexuality/gender-discrimination/Psychological_Trauma_Intergenerational.md
  section: 情绪调节障碍的表现 (Manifestations of Emotional Regulation Disorders)
