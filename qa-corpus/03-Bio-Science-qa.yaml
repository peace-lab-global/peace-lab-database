  question: 化学结构的核心要点是什么？
  answer: '内容: γ-谷氨酰乙胺 (γ-glutamylethylamide)；详细说明: 非蛋白质氨基酸,与谷氨酸结构相似但多乙基；临床意义: 结构相似性使其可与谷氨酸受体相互作用；专业视角: 1949年由日本学者酒�的�的三从玉露茶中首次分离'
