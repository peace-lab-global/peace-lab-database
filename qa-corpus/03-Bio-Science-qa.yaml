  question: 替代性创伤的核心要点是什么？
  answer: '英文名: Vicarious Trauma；词源/来源: McCann & Pearlman (1990)；精确定义: 因长期接触他人的创伤故事而产生的心理转变'
  source: 03-Bio-Science/death/Death_High_Risk_Occupations.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
