- type: concept
  question: 咖啡的核心要点是什么？
  answer: '英文名 (English Term): Coffee；原始语言/术语 (Original Language): 阿拉伯: *Qahwa* (قهوة) → 土耳其: *Kahve* → 意大利: *Caffè*；词源含义:
    "令人精神振奋的饮品",原指一种使人不困倦的酒或植物汁液；精确定义: 以咖啡豆(咖啡树果实的种子)为原料,经烘焙、研磨、萃取制成的饮品；区分与备注: 与茶不同,咖啡因含量更高,风味谱系更复杂；专业视角 (Professional Perspective):
    咖啡是全球第二大贸易商品,具有深远的社会、文化与心理影响'
  source: 03-Bio-Science/foods/coffee/Coffee_Core_Overview.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 咖啡因的核心要点是什么？
  answer: '英文名 (English Term): Caffeine；原始语言/术语 (Original Language): 德: *Kaffein* (1819年由Friedlieb Runge分离命名)；词源含义: 以咖啡(Kaffee)命名的生物碱；精确定义:
    嘌呤类生物碱(1,3,7-三甲基黄嘌呤),中枢神经系统兴奋剂；区分与备注: 茶中亦含咖啡因(旧称茶碱/Theine),实为同一化合物；专业视角 (Professional Perspective): 最广泛使用的精神活性物质,需理解其药理学双刃剑效应'
  source: 03-Bio-Science/foods/coffee/Coffee_Core_Overview.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 萃取的核心要点是什么？
  answer: '英文名 (English Term): Extraction；原始语言/术语 (Original Language): 拉: *Extrahere* (拉出、提取)；词源含义: 用溶剂(水)将咖啡豆中的可溶性物质溶解出来的过程；精确定义:
    萃取率(18-22%为理想)决定风味:过萃苦涩,欠萃酸薄；区分与备注: 与"冲煮"(Brewing)相关但更精确指化学过程；专业视角 (Professional Perspective): 萃取变量(研磨度、水温、时间、压力)是咖啡风味控制的核心'
  source: 03-Bio-Science/foods/coffee/Coffee_Core_Overview.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 传说起源的核心要点是什么？
  answer: '年代: 约9世纪；关键事件: 牧羊人Kaldi发现山羊吃咖啡果后异常兴奋；地点: 埃塞俄比亚高原；文化意涵: 咖啡与"觉醒"的原初联结；专业视角: 虽为传说,但反映了咖啡最初作为"能量来源"的功能性定位'
  source: 03-Bio-Science/foods/coffee/Coffee_Core_Overview.md
  section: 咖啡的历史与文化演变表 (History & Cultural Evolution)
- type: concept
  question: 苏菲神秘主义的核心要点是什么？
  answer: '年代: 15世纪；关键事件: 也门苏菲派修士用咖啡保持夜间祈祷的清醒；地点: 也门摩卡港；文化意涵: 咖啡作为灵性实践的辅助工具；专业视角: 这一传统延续至今,反映咖啡与"专注"、"觉察"的深层关联'
  source: 03-Bio-Science/foods/coffee/Coffee_Core_Overview.md
  section: 咖啡的历史与文化演变表 (History & Cultural Evolution)
- type: concept
  question: 奥斯曼咖啡馆的核心要点是什么？
  answer: '年代: 16-17世纪；关键事件: 伊斯坦布尔出现世界第一批咖啡馆(Kahvehane)；地点: 奥斯曼帝国；文化意涵: "公共客厅"与思想交流空间；专业视角: 咖啡馆作为社交民主化的载体,打破阶层界限'
  source: 03-Bio-Science/foods/coffee/Coffee_Core_Overview.md
  section: 咖啡的历史与文化演变表 (History & Cultural Evolution)
- type: concept
  question: 咖啡因的核心要点是什么？
  answer: '中文名: 咖啡因；英文名: Caffeine；化学分类: 嘌呤生物碱；含量(每杯约240ml): 80-200mg；主要作用: 腺苷受体拮抗、中枢兴奋、多巴胺调节；健康影响: 提神、认知增强;过量致焦虑、失眠；专业提示:
    个体代谢差异大(CYP1A2基因),半衰期3-7小时'
