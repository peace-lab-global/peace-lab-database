  question: 认知重构的核心要点是什么？
  answer: '具体方法: 性相关负性自动思维识别与挑战；适用障碍: 性焦虑、性表现担忧；治疗机制: 改变性认知图式，减少焦虑预期；实施要点: 使用思维记录表，苏格拉底式提问'
