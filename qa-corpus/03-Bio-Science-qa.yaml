  section: 风险、伦理与注意事项
- type: concept
  question: 什么是研究与证据？
  answer: '- 大型流行病学研究显示，性功能障碍在男性中常见且随年龄上升。

    - 多维度干预在改善满意度方面优于单一药物治疗。'
  source: 03-Bio-Science/sexuality/male-sexual-health/Sexual_Dysfunction_Common_Issues.md
  section: 研究与证据
- type: concept
  question: 强迫性性行为障碍的核心要点是什么？
  answer: '术语 (English): Compulsive Sexual Behavior Disorder (CSBD)；精确定义: 持续无法控制强烈重复性冲动或冲动导致的性行为模式；诊断系统: ICD-11 (6C72)；区分与备注:
    归类为冲动控制障碍，非成瘾；需持续≥6个月；临床应用: 包含但不限于强迫性自慰'
  source: 03-Bio-Science/sexuality/masturbation-psychology/Masturbation_Assessment_Intervention.md
  section: 核心术语表 | Key Terminology
- type: concept
  question: 问题性自慰的核心要点是什么？
  answer: '术语 (English): Problematic Masturbation；精确定义: 引起显著个人困扰或功能损害的自慰模式；诊断系统: 非正式诊断术语；区分与备注: 困扰可源于行为本身或道德不一致；临床应用: 功能性评估是关键'
  source: 03-Bio-Science/sexuality/masturbation-psychology/Masturbation_Assessment_Intervention.md
  section: 核心术语表 | Key Terminology
- type: concept
  question: 感觉集中训练的核心要点是什么？
  answer: '术语 (English): Sensate Focus；精确定义: Masters & Johnson开发的渐进式触觉觉察练习序列；诊断系统: 性治疗标准方案；区分与备注: 包含自慰作为治疗组成部分；临床应用: 性功能障碍的核心干预'
  source: 03-Bio-Science/sexuality/masturbation-psychology/Masturbation_Assessment_Intervention.md
  section: 核心术语表 | Key Terminology
