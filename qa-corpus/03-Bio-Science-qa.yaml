  question: 膝盖内扣 (Valgus)的核心要点是什么？
  answer: '可能原因: 臀中肌无力/踝内翻；筛查方法: 单腿蹲测试；矫正策略: 侧向弹力带走、蚌式'
  source: 03-Bio-Science/biology/exercise-science/Functional_Movement_Screening.md
