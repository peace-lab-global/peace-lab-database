- type: concept
  question: 按侵入性的核心要点是什么？
  answer: '类型名称: 侵入式BCI；英文名: Invasive BCI；技术特征: 电极植入大脑皮层内；优势: 极高信号质量、高带宽；劣势: 手术风险、感染、排异；适用场景: 瘫痪、ALS、锁定综合征；代表系统: Utah Array,
    Neuralink'
  source: 03-Bio-Science/biology/brain/Brain_BCI_Systems.md
  section: BCI分类体系表 (BCI Classification)
- type: concept
  question: 半侵入式BCI的核心要点是什么？
  answer: '类型名称: Semi-Invasive BCI；英文名: 电极置于硬脑膜下；技术特征: 信号质量高、风险较低；优势: 仍需手术、维护复杂；劣势: 癫痫监测、运动控制；适用场景: ECoG系统'
  source: 03-Bio-Science/biology/brain/Brain_BCI_Systems.md
  section: BCI分类体系表 (BCI Classification)
- type: concept
  question: 非侵入式BCI的核心要点是什么？
  answer: '类型名称: Non-Invasive BCI；英文名: 头皮EEG、MEG、fNIRS；技术特征: 安全、无手术、可逆；优势: 信号弱、空间分辨率低；劣势: 消费级应用、康复训练；适用场景: Emotiv, Muse, OpenBCI'
  source: 03-Bio-Science/biology/brain/Brain_BCI_Systems.md
  section: BCI分类体系表 (BCI Classification)
- type: concept
  question: P300事件相关电位的核心要点是什么？
  answer: '英文名: P300 Event-Related Potential；信号特征: 刺激后300ms正向波；频率范围: 时域信号；诱发方式: 视觉/听觉罕见刺激；准确率: 80-95%；信息传输率: 15-25 bits/min；训练需求:
    低(数分钟)；典型应用: P300 Speller打字、选择界面'
  source: 03-Bio-Science/biology/brain/Brain_BCI_Systems.md
  section: BCI信号范式表 (BCI Paradigms)
- type: concept
  question: 稳态视觉诱发电位的核心要点是什么？
  answer: '英文名: Steady-State Visual Evoked Potential (SSVEP)；信号特征: 视觉刺激频率的倍频；频率范围: 刺激频率±2Hz；诱发方式: 闪烁视觉刺激(6-75Hz)；准确率: 85-98%；信息传输率:
    30-60 bits/min；训练需求: 极低(即时)；典型应用: 高速打字、轮椅控制'
  source: 03-Bio-Science/biology/brain/Brain_BCI_Systems.md
  section: BCI信号范式表 (BCI Paradigms)
- type: concept
  question: 运动想象(MI)的核心要点是什么？
  answer: '英文名: Motor Imagery；信号特征: ERD(事件相关去同步)/ERS(同步)；频率范围: Alpha(8-13Hz), Beta(13-30Hz)；诱发方式: 想象手/脚运动；准确率: 60-85%；信息传输率:
    5-15 bits/min；训练需求: 高(数周)；典型应用: 肢体康复、轮椅控制、神经假肢'
  source: 03-Bio-Science/biology/brain/Brain_BCI_Systems.md
  section: BCI信号范式表 (BCI Paradigms)
- type: concept
  question: 线性判别分析的核心要点是什么？
  answer: '英文名: Linear Discriminant Analysis (LDA)；核心原理: 线性超平面分类；优势: 简单、快速、鲁棒；劣势: 非线性数据表现差；适用范式: MI, P300；典型实现: Matlab LDA；准确率:
    70-85%'
  source: 03-Bio-Science/biology/brain/Brain_BCI_Systems.md
  section: BCI解码算法表 (Decoding Algorithms)
- type: concept
  question: 支持向量机的核心要点是什么？
  answer: '英文名: Support Vector Machine (SVM)；核心原理: 最大间隔超平面；优势: 泛化能力强、适应非线性；劣势: 参数调优复杂；适用范式: MI, P300, SSVEP；典型实现: libSVM；准确率:
    75-90%'
  source: 03-Bio-Science/biology/brain/Brain_BCI_Systems.md
  section: BCI解码算法表 (Decoding Algorithms)
- type: concept
  question: ADHD的核心要点是什么？
  answer: '神经反馈协议: Theta/Beta比值训练(Fz)，SMR上调(C3/C4)；tDCS协议: 前额叶阳极(F3)+顶叶阴极(Pz)；TMS协议: 10Hz右DLPFC(抑制)；BCI应用: 注意力监测反馈；循证等级: A级(神经反馈)；整合建议:
    神经反馈为主，tDCS辅助；专业洞察: Theta/Beta比值降低是核心生物标志物'
  source: 03-Bio-Science/biology/brain/Brain_Clinical_Applications.md
  section: 病理专项脑波方案表 (Pathology-Specific Protocols)
- type: concept
  question: 抑郁症的核心要点是什么？
  answer: '神经反馈协议: Alpha不对称(F3/F4)，LORETA前扣带回；tDCS协议: 双侧前额叶(F3阳极+F4阴极)；TMS协议: 10Hz左DLPFC或iTBS；BCI应用: 情绪状态监测；循证等级: A级(rTMS)；整合建议:
    rTMS急性期，神经反馈维持；专业洞察: 左额激活不足是核心病理'
  source: 03-Bio-Science/biology/brain/Brain_Clinical_Applications.md
  section: 病理专项脑波方案表 (Pathology-Specific Protocols)
- type: concept
  question: 焦虑障碍的核心要点是什么？
  answer: '神经反馈协议: Alpha上调(Pz)，SMR训练(C3/C4)；tDCS协议: 右DLPFC阴极(抑制)；TMS协议: 1Hz右DLPFC(抑制)；BCI应用: 焦虑水平实时反馈；循证等级: B级(神经反馈)；整合建议:
    神经反馈+正念效果最佳；专业洞察: 降低过度激活的焦虑网络'
  source: 03-Bio-Science/biology/brain/Brain_Clinical_Applications.md
  section: 病理专项脑波方案表 (Pathology-Specific Protocols)
- type: concept
  question: 儿童(6-12岁)的核心要点是什么？
  answer: '年龄范围: 6-12；协议调整: 缩短训练时长(15-20分钟)，游戏化反馈；安全注意事项: 避免过度刺激，家长陪同；效果预期: ADHD效果显著(70%+)；依从性策略: 使用游戏、奖励积分；专业建议: 神经反馈是儿童ADHD首选非药物治疗'
  source: 03-Bio-Science/biology/brain/Brain_Clinical_Applications.md
  section: 特殊人群应用指南表 (Special Populations)
- type: concept
  question: 青少年(13-17岁)的核心要点是什么？
  answer: '年龄范围: 13-17；协议调整: 标准协议，关注动机与自主性；安全注意事项: 筛查药物使用、情绪波动；效果预期: 焦虑、抑郁改善40-60%；依从性策略: 强调自主控制感；专业建议: 青春期大脑可塑性强，效果好'
  source: 03-Bio-Science/biology/brain/Brain_Clinical_Applications.md
  section: 特殊人群应用指南表 (Special Populations)
- type: concept
  question: 老年人(65+)的核心要点是什么？
  answer: '年龄范围: 65+；协议调整: 降低刺激强度(1.5mA tDCS)，延长疗程；安全注意事项: 筛查痴呆、心血管病、金属植入；效果预期: 认知改善20-40%；依从性策略: 简化界面，耐心指导；专业建议: 神经可塑性仍存在但需更长时间'
  source: 03-Bio-Science/biology/brain/Brain_Clinical_Applications.md
  section: 特殊人群应用指南表 (Special Populations)
- type: concept
  question: 认知行为疗法(CBT)的核心要点是什么？
  answer: '整合方式: CBT认知重构+神经反馈调控脑波；脑波/脑机角色: 实时监测认知任务时的脑波变化；协同机制: 认知改变→脑波正常化→症状缓解；临床案例: ADHD：CBT+Theta/Beta训练；专业洞察: 神经反馈提供生理层面的改变证据'
  source: 03-Bio-Science/biology/brain/Brain_Clinical_Applications.md
  section: 脑波疗法整合表 (Therapy Integration)
- type: concept
  question: 正念认知疗法(MBCT)的核心要点是什么？
  answer: '整合方式: 正念练习+Alpha/Theta反馈；脑波/脑机角色: 深化正念状态，实时反馈冥想深度；协同机制: 正念→Alpha/Theta增强→情绪调节；临床案例: 焦虑：正念+Alpha训练；专业洞察: 神经反馈加速正念技能习得'
  source: 03-Bio-Science/biology/brain/Brain_Clinical_Applications.md
  section: 脑波疗法整合表 (Therapy Integration)
- type: concept
  question: 默认模式网络的核心要点是什么？
  answer: '英文名 (English Term): Default Mode Network (DMN)；原始语言/术语 (Original Language): 拉丁: *Modus Defectus* (默认模式)；精确定义: 大脑在静息状态（非任务导向）下激活的一组高度协同的脑区网络,主要包括内侧前额叶、后扣带回、楔前叶、角回等；发现历史:
    Raichle等2001年通过PET/fMRI发现"任务负激活"现象；专业视角 (Professional Perspective): DMN不是"什么都不做",而是进行自我指涉加工、心理模拟、记忆整合等高级认知功能'
  source: 03-Bio-Science/biology/brain/Brain_DMN_Default_Mode_Network.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 任务正网络的核心要点是什么？
  answer: '英文名 (English Term): Task-Positive Network (TPN)；原始语言/术语 (Original Language): -；精确定义: 与DMN反相关的脑网络,在外部任务执行时激活,主要包括背外侧前额叶、后顶叶等；发现历史:
    也称中央执行网络(CEN)；专业视角 (Professional Perspective): DMN与TPN的动态平衡是认知灵活性的基础'
  source: 03-Bio-Science/biology/brain/Brain_DMN_Default_Mode_Network.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 反相关的核心要点是什么？
  answer: '英文名 (English Term): Anticorrelation；原始语言/术语 (Original Language): -；精确定义: DMN与TPN在激活时呈现负相关关系,一个激活时另一个抑制；发现历史: Fox等2005年发现静息态反相关；专业视角
    (Professional Perspective): 反相关失调与多种精神障碍相关(抑郁、ADHD、自闭症等)'
  source: 03-Bio-Science/biology/brain/Brain_DMN_Default_Mode_Network.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 内侧前额叶 (mPFC)的核心要点是什么？
  answer: '解剖位置 (Brodmann分区): BA 9/10/32 (前额叶内侧面)；主要功能: 自我评价、社会认知、情绪调节、价值判断；连接特征: DMN前端枢纽,连接边缘系统与PCC；损伤后果: 自我意识障碍、社会认知缺陷、情感淡漠；临床意义:
    抑郁症mPFC过度激活→反刍;正念冥想降低mPFC活动；专业视角: mPFC的"自我参照"功能是抑郁认知模型的核心,CBT/正念通过"去中心化"调节mPFC'
  source: 03-Bio-Science/biology/brain/Brain_DMN_Default_Mode_Network.md
  section: DMN 核心脑区与功能表 (Core Brain Regions & Functions)
- type: concept
  question: 后扣带回 (PCC)的核心要点是什么？
  answer: '解剖位置 (Brodmann分区): BA 23/31 (扣带回后部)；主要功能: 自传体记忆提取、意识维持、场景构建；连接特征: DMN核心枢纽,连接mPFC与海马、楔前叶；损伤后果: 意识水平下降、情节记忆障碍、空间定向障碍；临床意义:
    PCC是"自我连续性"的神经基础;麻醉/昏迷时代谢显著降低；专业视角: PCC被称为"意识的后哨",其活动强度与自我意识深度正相关'
  source: 03-Bio-Science/biology/brain/Brain_DMN_Default_Mode_Network.md
  section: DMN 核心脑区与功能表 (Core Brain Regions & Functions)
- type: concept
  question: 楔前叶 (Precuneus)的核心要点是什么？
  answer: '解剖位置 (Brodmann分区): BA 7 (顶叶内侧)；主要功能: 视空间意象、第一人称视角、自我意识的"视觉自我"；连接特征: 高度中心化节点,连接DMN与视觉网络；损伤后果: 视空间障碍、自我身体意象障碍、离人症；临床意义:
    冥想/迷幻剂降低楔前叶活动→"自我解体"体验；专业视角: 楔前叶是"自我中心"的解剖学基础,其抑制是超个人体验的神经机制'
  source: 03-Bio-Science/biology/brain/Brain_DMN_Default_Mode_Network.md
  section: DMN 核心脑区与功能表 (Core Brain Regions & Functions)
- type: concept
  question: 1. 自我构建 (Self-Construction)的核心要点是什么？
  answer: '子功能: 自我参照、自传体记忆、人格连续性；神经机制: mPFC-PCC-海马回路；主观体验: "我是谁?""我的故事"；适应性价值: 维持自我同一性、整合生命经验；失调表现: 抑郁症:过度负面自我参照;精神分裂:自我边界模糊；干预靶点:
    正念:观察自我而非认同自我;ACT:自我作为背景；专业视角: DMN构建的"叙事自我"是心理治疗的核心议题,从弗洛伊德到现代CBT都在重构"自我故事"'
  source: 03-Bio-Science/biology/brain/Brain_DMN_Default_Mode_Network.md
  section: DMN 的三大核心功能与机制表 (Three Core Functions & Mechanisms)
- type: concept
  question: 自我评价的核心要点是什么？
  answer: '子功能: 自我价值判断、社会比较；神经机制: mPFC腹侧部；主观体验: "我好吗?""别人如何看我?"；适应性价值: 社会适应、自尊维持；失调表现: 社交焦虑:过度负面自我评价；干预靶点: CBT认知重构;慈悲聚焦疗法；专业视角:
    mPFC的自我评价回路在青春期过度激活,解释青少年的自我意识敏感'
  source: 03-Bio-Science/biology/brain/Brain_DMN_Default_Mode_Network.md
  section: DMN 的三大核心功能与机制表 (Three Core Functions & Mechanisms)
- type: concept
  question: SMR训练的核心要点是什么？
  answer: '英文名: SMR Training；目标脑波: 提升SMR(12-15Hz)；训练部位: C3/C4(感觉运动皮层)；作用机制: 增强皮层抑制减少运动冲动；适用症状: 癫痫、ADHD、失眠、焦虑；循证等级: A级(癫痫)；典型疗程:
    20-40节'
  source: 03-Bio-Science/biology/brain/Brain_EEG_Biofeedback.md
  section: EEG神经反馈协议类型表 (Neurofeedback Protocol Types)
- type: concept
  question: Alpha/Theta训练的核心要点是什么？
  answer: '英文名: Alpha/Theta Training；目标脑波: 提升Alpha(8-12Hz)和Theta(4-8Hz)；训练部位: Pz(顶中)；作用机制: 促进深度放松进入潜意识；适用症状: PTSD、成瘾、创意、冥想深化；循证等级:
    B级(PTSD)；典型疗程: 30-50节'
  source: 03-Bio-Science/biology/brain/Brain_EEG_Biofeedback.md
  section: EEG神经反馈协议类型表 (Neurofeedback Protocol Types)
- type: concept
  question: Beta上调训练的核心要点是什么？
  answer: '英文名: Beta Uptraining；目标脑波: 提升Beta(15-20Hz)；训练部位: Cz或Fz(中央/额中)；作用机制: 增强注意力执行功能；适用症状: ADHD、抑郁、认知模糊；循证等级: A级(ADHD)；典型疗程:
    30-60节'
  source: 03-Bio-Science/biology/brain/Brain_EEG_Biofeedback.md
  section: EEG神经反馈协议类型表 (Neurofeedback Protocol Types)
- type: concept
  question: 绝对功率 (Absolute Power)的核心要点是什么？
  answer: '英文名: Absolute Power；测量指标: 各频段微伏平方(μV²)；临床意义: 反映神经元群激活强度；病理模式: 额叶Beta过高→焦虑；Theta过高→ADHD；训练目标: 规范化异常频段功率；专业工具: Neuroguide,
    BrainAvatar'
  source: 03-Bio-Science/biology/brain/Brain_EEG_Biofeedback.md
  section: QEEG评估与分析表 (QEEG Assessment)
- type: concept
  question: 相对功率 (Relative Power)的核心要点是什么？
  answer: '英文名: Relative Power；测量指标: 各频段占总功率百分比；临床意义: 频段间平衡关系；病理模式: Alpha相对功率过低→压力；训练目标: 优化频段平衡；专业工具: NeuroNavigator'
  source: 03-Bio-Science/biology/brain/Brain_EEG_Biofeedback.md
  section: QEEG评估与分析表 (QEEG Assessment)
- type: concept
  question: 脑波比值 (Ratios)的核心要点是什么？
  answer: '英文名: Brainwave Ratios；测量指标: Theta/Beta、Alpha/Beta等；临床意义: ADHD核心生物标志物；病理模式: Theta/Beta>2.0→ADHD可能；训练目标: 降低病理比值；专业工具:
    NeuroGuide'
  source: 03-Bio-Science/biology/brain/Brain_EEG_Biofeedback.md
  section: QEEG评估与分析表 (QEEG Assessment)
- type: concept
  question: 1.基线评估的核心要点是什么？
  answer: '英文名: Baseline Assessment；时间跨度: 1-2节；生理变化: QEEG建立基线图谱；心理体验: 无明显感受；临床目标: 识别脑波异常模式；训练师任务: 解读QEEG制定方案；常见挑战: 伪迹干扰、数据质量'
  source: 03-Bio-Science/biology/brain/Brain_EEG_Biofeedback.md
  section: 神经反馈训练阶段表 (Training Stages)
- type: concept
  question: 2.初步学习的核心要点是什么？
  answer: '英文名: Initial Learning；时间跨度: 3-8节；生理变化: 脑波开始微调；心理体验: 困惑、不确定感；临床目标: 学会产生目标脑波；训练师任务: 调整参数找到"甜点"；常见挑战: 挫败感、期望过高'
  source: 03-Bio-Science/biology/brain/Brain_EEG_Biofeedback.md
  section: 神经反馈训练阶段表 (Training Stages)
- type: concept
  question: 神经反馈的核心要点是什么？
  answer: '英文名 (English Term): Neurofeedback；原始语言/术语 (Original Language): 希: *Neuroanatrophē* (νευροανατροφή)；精确定义: 通过实时监测脑电活动并提供反馈，训练个体自我调节脑波状态的生物反馈技术；区分与备注:
    不同于传统生物反馈，专注于大脑神经活动；专业视角 (Professional Perspective): 神经反馈是"大脑健身房"，通过操作条件化改变神经回路'
  source: 03-Bio-Science/biology/brain/Brain_Neurofeedback_Overview.md
  section: 核心术语总览表 (Core Terminology)
- type: concept
  question: 脑电图的核心要点是什么？
  answer: '英文名 (English Term): Electroencephalography (EEG)；原始语言/术语 (Original Language): 希: *Enkephalographia* (εγκεφαλογραφία)；精确定义:
    通过头皮电极记录大脑神经元集群同步电活动的非侵入性技术；区分与备注: 时间分辨率极高(毫秒级)，但空间分辨率较低；专业视角 (Professional Perspective): EEG是"大脑的心电图"，捕捉神经网络的"电交响乐"'
  source: 03-Bio-Science/biology/brain/Brain_Neurofeedback_Overview.md
  section: 核心术语总览表 (Core Terminology)
- type: concept
  question: 脑机接口的核心要点是什么？
  answer: '英文名 (English Term): Brain-Computer Interface (BCI)；原始语言/术语 (Original Language): 拉: *Interfacies Cerebro-Computatrices*；精确定义:
    建立大脑与外部设备之间的直接通信通道，绕过传统肌肉-神经路径；区分与备注: 侵入式vs非侵入式；单向vs双向；专业视角 (Professional Perspective): BCI是人类增强的终极形态，从治疗走向增强'
  source: 03-Bio-Science/biology/brain/Brain_Neurofeedback_Overview.md
  section: 核心术语总览表 (Core Terminology)
- type: concept
  question: 1875-脑电发现的核心要点是什么？
  answer: '代表事件/发现: Richard Caton首次记录动物脑电；理论突破: 大脑电活动可被测量；技术里程碑: 动物脑电记录；临床应用: 无；专业意义: 开启神经电生理学时代'
  source: 03-Bio-Science/biology/brain/Brain_Neurofeedback_Overview.md
  section: 历史发展表 (Historical Development)
- type: concept
  question: 1924-人类脑电的核心要点是什么？
  answer: '代表事件/发现: Hans Berger首次记录人类EEG；理论突破: 发现Alpha波(8-12Hz)；技术里程碑: 人类EEG记录技术；临床应用: 癫痫诊断；专业意义: 证明人脑存在节律性电活动'
  source: 03-Bio-Science/biology/brain/Brain_Neurofeedback_Overview.md
  section: 历史发展表 (Historical Development)
- type: concept
  question: 1958-神经反馈诞生的核心要点是什么？
  answer: '代表事件/发现: Joe Kamiya的Alpha波意识实验；理论突破: 人可学会控制脑波；技术里程碑: 实时EEG反馈系统；临床应用: 冥想研究；专业意义: 证明脑波可被操作条件化训练'
  source: 03-Bio-Science/biology/brain/Brain_Neurofeedback_Overview.md
  section: 历史发展表 (Historical Development)
- type: concept
  question: Delta (δ波)的核心要点是什么？
  answer: '英文名: Delta；频率范围: 0.5-4 Hz；主要来源脑区: 额叶、深部结构；心理状态: 深度睡眠、无梦睡眠、无意识；功能意义: 细胞修复、免疫增强、HGH释放；病理关联: 过高→昏迷、脑损伤；过低→失眠；神经反馈目标:
    提升：睡眠障碍；降低：清醒专注任务'
  source: 03-Bio-Science/biology/brain/Brain_Neurofeedback_Overview.md
  section: 脑波频段分类表 (Brainwave Frequency Bands)
- type: concept
  question: Theta (θ波)的核心要点是什么？
  answer: '英文名: Theta；频率范围: 4-8 Hz；主要来源脑区: 海马、颞叶、前额叶；心理状态: 深度冥想、创意、记忆整合、浅睡眠；功能意义: 长期记忆巩固、潜意识联结、直觉；病理关联: 过高→ADHD、注意力涣散；过低→焦虑、刚性思维；神经反馈目标:
    提升：创意、冥想；降低：ADHD、执行功能'
  source: 03-Bio-Science/biology/brain/Brain_Neurofeedback_Overview.md
  section: 脑波频段分类表 (Brainwave Frequency Bands)
- type: concept
  question: 经颅直流电刺激的核心要点是什么？
  answer: '英文全称: Transcranial Direct Current Stimulation (tDCS)；拉丁术语: *Stimulatio Electrica Directa Transcranialis*；刺激类型:
    持续直流电；强度范围: 1-2 mA；时空分辨率: 低空间/持续时间；作用机制: 改变神经元静息膜电位；FDA批准: 部分(抑郁)；循证等级: B级(抑郁、疼痛)'
  source: 03-Bio-Science/biology/brain/Brain_Neuromodulation.md
  section: 神经调控技术分类表 (Neuromodulation Classification)
- type: concept
  question: 经颅交流电刺激的核心要点是什么？
  answer: '英文全称: Transcranial Alternating Current Stimulation (tACS)；拉丁术语: *Stimulatio Electrica Alternans Transcranialis*；刺激类型:
    正弦交流电；强度范围: 1-2 mA；时空分辨率: 低空间/频率特异；作用机制: 夹带内源性振荡；FDA批准: 否；循证等级: C级(研究中)'
  source: 03-Bio-Science/biology/brain/Brain_Neuromodulation.md
  section: 神经调控技术分类表 (Neuromodulation Classification)
- type: concept
  question: 经颅随机噪声刺激的核心要点是什么？
  answer: '英文全称: Transcranial Random Noise Stimulation (tRNS)；拉丁术语: *Stimulatio Rumoris Aleatorii Transcranialis*；刺激类型: 随机频率电流；强度范围:
    1-2 mA；时空分辨率: 低空间/宽频；作用机制: 随机共振增强信号；FDA批准: 否；循证等级: C级(早期证据)'
  source: 03-Bio-Science/biology/brain/Brain_Neuromodulation.md
  section: 神经调控技术分类表 (Neuromodulation Classification)
- type: concept
  question: 左前额叶阳极的核心要点是什么？
  answer: '英文名: Left DLPFC Anodal；阳极位置: F3；阴极位置: 右肩/眶上；电流强度: 2 mA；刺激时长: 20-30分钟；作用机制: 提升左DLPFC兴奋性；适应症: 抑郁症、动机缺乏；循证等级: B级；专业备注:
    Davidson模型，提升接近动机'
  source: 03-Bio-Science/biology/brain/Brain_Neuromodulation.md
  section: tDCS核心协议表 (tDCS Protocols)
- type: concept
  question: 右前额叶阴极的核心要点是什么？
  answer: '英文名: Right DLPFC Cathodal；阳极位置: 左肩；阴极位置: F4；电流强度: 2 mA；刺激时长: 20-30分钟；作用机制: 抑制右DLPFC过度激活；适应症: 焦虑、反刍思维；循证等级: C级；专业备注:
    降低回避动机'
  source: 03-Bio-Science/biology/brain/Brain_Neuromodulation.md
  section: tDCS核心协议表 (tDCS Protocols)
- type: concept
  question: 双侧前额叶的核心要点是什么？
  answer: '英文名: Bilateral DLPFC；阳极位置: F3阳极；阴极位置: F4阴极；电流强度: 2 mA；刺激时长: 20-30分钟；作用机制: 同时提升左侧抑制右侧；适应症: 抑郁症；循证等级: A级；专业备注: FDA批准Flow设备协议'
  source: 03-Bio-Science/biology/brain/Brain_Neuromodulation.md
  section: tDCS核心协议表 (tDCS Protocols)
- type: concept
  question: 4-8 Hz (Theta)的核心要点是什么？
  answer: '脑波频段: Theta；目标脑区: 前额叶-海马；作用机制: 夹带θ振荡促进记忆巩固；预期效果: 增强长期记忆、创意；适应症: 记忆障碍、创意工作；循证等级: C级；专业洞察: 睡眠时θ-tACS效果最佳'
  source: 03-Bio-Science/biology/brain/Brain_Neuromodulation.md
  section: tACS频率协议表 (tACS Frequency Protocols)
- type: concept
  question: 8-12 Hz (Alpha)的核心要点是什么？
  answer: '脑波频段: Alpha；目标脑区: 枕叶-顶叶；作用机制: 同步α节律降低皮层兴奋；预期效果: 放松、焦虑缓解；适应症: 焦虑、失眠；循证等级: C级；专业洞察: 闭环反馈增强效果'
  source: 03-Bio-Science/biology/brain/Brain_Neuromodulation.md
  section: tACS频率协议表 (tACS Frequency Protocols)
- type: concept
  question: 1. 初次咨询的核心要点是什么？
  answer: '时间: 30-60分钟；操作内容: 病史采集临床访谈症状评估治疗目标设定；注意事项: 排查禁忌症癫痫史金属植入物；工具/设备: 临床访谈表症状量表；专业技巧: 建立信任关系管理期望'
  source: 03-Bio-Science/biology/brain/Brain_Protocols_Training.md
  section: 神经反馈训练流程表 (Neurofeedback Workflow)
- type: concept
  question: 2. QEEG评估的核心要点是什么？
  answer: '时间: 60-90分钟；操作内容: 19导联EEG记录眼开/眼闭各5分钟认知任务时EEG；注意事项: 去除伪迹肌电干扰最小化；工具/设备: QEEG设备NeuroGuide软件；专业技巧: 环境安静确保数据质量'
  source: 03-Bio-Science/biology/brain/Brain_Protocols_Training.md
  section: 神经反馈训练流程表 (Neurofeedback Workflow)
- type: concept
  question: 3. QEEG分析的核心要点是什么？
  answer: '时间: 30-60分钟；操作内容: 数据库常模比较识别异常脑波模式制定个性化方案；注意事项: 参考年龄常模结合临床表现；工具/设备: NeuroGuide数据库；专业技巧: 不唯QEEG论结合症状'
  source: 03-Bio-Science/biology/brain/Brain_Protocols_Training.md
  section: 神经反馈训练流程表 (Neurofeedback Workflow)
- type: concept
  question: Theta/Beta比值(Fz)的核心要点是什么？
  answer: '正常范围: <2.0；异常模式: >2.5；临床意义: ADHD核心标志物；训练目标: 降低至<2.0；专业洞察: ADHD儿童80%比值过高'
  source: 03-Bio-Science/biology/brain/Brain_Protocols_Training.md
  section: QEEG报告解读表 (QEEG Report Interpretation)
- type: concept
  question: 前额Alpha不对称(F3-F4)的核心要点是什么？
  answer: '正常范围: 对称或左侧略高；异常模式: 左侧显著高于右侧；临床意义: 抑郁倾向回避动机；训练目标: 左侧降Alpha或右侧升Alpha；专业洞察: Davidson抑郁模型核心'
  source: 03-Bio-Science/biology/brain/Brain_Protocols_Training.md
  section: QEEG报告解读表 (QEEG Report Interpretation)
- type: concept
  question: Alpha绝对功率(Pz)的核心要点是什么？
  answer: '正常范围: 年龄常模±1SD；异常模式: 过低；临床意义: 焦虑压力过度警觉；训练目标: 提升Alpha功率；专业洞察: Alpha是"空挡"，过低是"油门踩太紧"'
  source: 03-Bio-Science/biology/brain/Brain_Protocols_Training.md
  section: QEEG报告解读表 (QEEG Report Interpretation)
- type: concept
  question: 光照的核心要点是什么？
  answer: '标准要求: 柔和自然光或暖白光；不良影响: 强光/闪烁光→Alpha抑制；优化建议: 可调光灯避免日光直射；专业备注: 光线影响枕叶Alpha'
  source: 03-Bio-Science/biology/brain/Brain_Protocols_Training.md
  section: 训练环境设置表 (Training Environment Setup)
- type: concept
  question: 噪音的核心要点是什么？
  answer: '标准要求: <40分贝环境噪音；不良影响: 噪音→注意力分散Beta升高；优化建议: 隔音房间白噪声屏蔽；专业备注: 听觉反馈需安静环境'
  source: 03-Bio-Science/biology/brain/Brain_Protocols_Training.md
  section: 训练环境设置表 (Training Environment Setup)
