  question: 什么是研究与证据？
  answer: '- 系统性筛查与疫苗接种被证明能显著降低群体传播率。

    - PrEP在高风险人群中对降低HIV感染具有高质量证据。'
  source: 03-Bio-Science/sexuality/male-sexual-health/STI_Prevention_and_Safety.md
  section: 研究与证据
- type: concept
  question: 什么是概述？
  answer: 男性性功能障碍涵盖性欲、勃起、射精、高潮与疼痛等维度。多数问题由生物-心理-社会因素共同作用。
  source: 03-Bio-Science/sexuality/male-sexual-health/Sexual_Dysfunction_Common_Issues.md
  section: 概述
- type: concept
  question: 勃起功能障碍的核心要点是什么？
  answer: '典型表现: 硬度不足/维持困难；主要机制: 血管内皮与神经通路；关键风险因素: 糖尿病、高血压、吸烟'
  source: 03-Bio-Science/sexuality/male-sexual-health/Sexual_Dysfunction_Common_Issues.md
  section: 常见障碍类型与核心机制
- type: concept
  question: 早泄的核心要点是什么？
  answer: '典型表现: 缺乏射精控制；主要机制: 神经兴奋阈值偏低；关键风险因素: 焦虑、过度刺激'
  source: 03-Bio-Science/sexuality/male-sexual-health/Sexual_Dysfunction_Common_Issues.md
  section: 常见障碍类型与核心机制
- type: concept
  question: 延迟/无射精的核心要点是什么？
  answer: '典型表现: 射精困难或缺失；主要机制: 中枢抑制或神经损伤；关键风险因素: SSRI、神经病变'
  source: 03-Bio-Science/sexuality/male-sexual-health/Sexual_Dysfunction_Common_Issues.md
  section: 常见障碍类型与核心机制
- type: concept
  question: 什么是临床与实践要点？
  answer: '- **评估框架**：症状持续时间、情境性/广泛性、伴侣关系与药物史。

    - **分层干预**：生活方式、药物治疗、心理与伴侣治疗联合。

    - **共病筛查**：心血管、代谢、焦虑抑郁。'
  source: 03-Bio-Science/sexuality/male-sexual-health/Sexual_Dysfunction_Common_Issues.md
  section: 临床与实践要点
- type: concept
  question: 什么是风险、伦理与注意事项？
  answer: '- **污名化风险**：应以功能与满意度为中心，避免羞耻化语言。

    - **非正规药物风险**：网络“壮阳”产品存在严重安全隐患。

    - **隐私保护**：临床访谈需强调保密与尊重。'
  source: 03-Bio-Science/sexuality/male-sexual-health/Sexual_Dysfunction_Common_Issues.md
  section: 风险、伦理与注意事项
