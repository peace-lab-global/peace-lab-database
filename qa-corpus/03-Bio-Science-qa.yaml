  question: 外生殖器的核心要点是什么？
  answer: '常见疾病: 淋病、梅毒、生殖器疱疹、软下疳；典型症状: 溃疡、丘疹、分泌物；体征特点: 局部红肿、疼痛；诊断要点: 病史采集、体格检查'
  source: 03-Bio-Science/biology/std/STD_Clinical_Features.md
  section: 按解剖部位分类 (Anatomical Site Classification)
- type: concept
  question: 尿道的核心要点是什么？
  answer: '常见疾病: 淋病、衣原体感染、支原体感染；典型症状: 尿道分泌物、排尿困难；体征特点: 尿道口红肿、压痛；诊断要点: 分泌物检查、PCR检测'
  source: 03-Bio-Science/biology/std/STD_Clinical_Features.md
  section: 按解剖部位分类 (Anatomical Site Classification)
- type: concept
  question: 宫颈的核心要点是什么？
  answer: '常见疾病: 衣原体、淋病、HPV感染；典型症状: 接触性出血、异常分泌物；体征特点: 宫颈糜烂、接触性出血；诊断要点: 宫颈涂片、HPV检测'
  source: 03-Bio-Science/biology/std/STD_Clinical_Features.md
  section: 按解剖部位分类 (Anatomical Site Classification)
- type: concept
  question: 急性症状的核心要点是什么？
  answer: '临床特征: 起病急骤，症状明显；相关疾病: 淋病、梅毒一期、HSV感染；严重程度: 中-重度；处理原则: 紧急处理、及时治疗'
  source: 03-Bio-Science/biology/std/STD_Clinical_Features.md
  section: 按症状性质分类 (Symptom Nature Classification)
- type: concept
  question: 慢性症状的核心要点是什么？
  answer: '临床特征: 症状持续，反复发作；相关疾病: HPV感染、慢性PID；严重程度: 中度；处理原则: 长期管理、定期随访'
  source: 03-Bio-Science/biology/std/STD_Clinical_Features.md
  section: 按症状性质分类 (Symptom Nature Classification)
- type: concept
  question: 无症状感染的核心要点是什么？
  answer: '临床特征: 无明显临床表现；相关疾病: 衣原体、HPV潜伏感染；严重程度: 轻度；处理原则: 筛查发现、预防性治疗'
  source: 03-Bio-Science/biology/std/STD_Clinical_Features.md
  section: 按症状性质分类 (Symptom Nature Classification)
- type: concept
  question: 附睾炎的核心要点是什么？
  answer: '病因: 淋病、衣原体感染；临床表现: 阴囊疼痛肿胀；长期影响: 不育风险增加'
  source: 03-Bio-Science/biology/std/STD_Clinical_Features.md
  section: 生殖系统并发症 (Reproductive System Complications)
- type: concept
  question: 前列腺炎的核心要点是什么？
  answer: '病因: 上行感染；临床表现: 会阴部疼痛；长期影响: 慢性盆腔疼痛综合征'
  source: 03-Bio-Science/biology/std/STD_Clinical_Features.md
  section: 生殖系统并发症 (Reproductive System Complications)
- type: concept
  question: 初次筛查的核心要点是什么？
  answer: '推荐检测项目: HIV抗体、梅毒血清学、淋病/衣原体核酸；检测时机: 就诊时立即；注意事项: 空腹与否不影响结果'
  source: 03-Bio-Science/biology/std/STD_Clinical_Toolkit.md
  section: 检测项目选择矩阵 (Test Selection Matrix)
- type: concept
  question: 有症状患者的核心要点是什么？
  answer: '推荐检测项目: 根据症状选择针对性检测；检测时机: 症状出现时；注意事项: 急性期检测敏感性高'
  source: 03-Bio-Science/biology/std/STD_Clinical_Toolkit.md
  section: 检测项目选择矩阵 (Test Selection Matrix)
- type: concept
  question: 高危暴露后的核心要点是什么？
  answer: '推荐检测项目: HIV病毒载量、p24抗原；检测时机: 暴露后2-4周；注意事项: 早期诊断窗口期考虑'
  source: 03-Bio-Science/biology/std/STD_Clinical_Toolkit.md
  section: 检测项目选择矩阵 (Test Selection Matrix)
- type: concept
  question: 病史采集的核心要点是什么？
  answer: '评估内容: 流行病学史、症状史、性行为史；方法工具: 标准化问卷、访谈技巧；临床意义: 确定风险因素、指导检测；质量控制: 培训考核、质量监控'
  source: 03-Bio-Science/biology/std/STD_Diagnosis_Assessment.md
  section: 综合诊断模式 (Comprehensive Diagnostic Approach)
- type: concept
  question: 体格检查的核心要点是什么？
  answer: '评估内容: 全身检查、局部检查、系统评估；方法工具: 标准化检查流程、图示记录；临床意义: 发现客观体征、定位病变；质量控制: 检查者资质、互检机制'
  source: 03-Bio-Science/biology/std/STD_Diagnosis_Assessment.md
  section: 综合诊断模式 (Comprehensive Diagnostic Approach)
- type: concept
  question: 实验室检测的核心要点是什么？
  answer: '评估内容: 病原学检测、血清学检测、分子诊断；方法工具: 自动化设备、质量控制品；临床意义: 确诊依据、疗效监测；质量控制: 室间质评、内部质控'
  source: 03-Bio-Science/biology/std/STD_Diagnosis_Assessment.md
  section: 综合诊断模式 (Comprehensive Diagnostic Approach)
- type: concept
  question: 多性伴侣的核心要点是什么？
  answer: '评分标准: 1个=1分，2-3个=2分，>3个=3分；风险等级: 低(<3分)/中(3-5分)/高(>5分)'
  source: 03-Bio-Science/biology/std/STD_Diagnosis_Assessment.md
  section: 标准化问诊工具 (Standardized Interview Tools)
- type: concept
  question: 梅毒硬下疳的核心要点是什么？
  answer: '病原体: 梅毒螺旋体；潜伏期: 10-90天；溃疡特点: 圆形、软骨样硬度、无痛；伴随症状: 局部淋巴结肿大；实验室检查: 暗视野、血清学阳性'
  source: 03-Bio-Science/biology/std/STD_Diagnosis_Assessment.md
  section: 常见鉴别诊断表 (Common Differential Diagnosis Table)
- type: concept
  question: 软下疳的核心要点是什么？
  answer: '病原体: 杜克雷嗜血杆菌；潜伏期: 1-14天；溃疡特点: 疼痛性、边缘不整、基底污秽；伴随症状: 痛性淋巴结肿大；实验室检查: 培养阳性'
  source: 03-Bio-Science/biology/std/STD_Diagnosis_Assessment.md
  section: 常见鉴别诊断表 (Common Differential Diagnosis Table)
- type: concept
  question: 性传播疾病的核心要点是什么？
  answer: '英文名 (English Term): Sexually Transmitted Diseases (STD)；原始语言/术语 (Original Language): 英: STD；精确定义 (Technical Definition):
    通过性接触为主要传播途径的感染性疾病，可引起泌尿生殖系统及其他器官病变。；区分与备注 (Differentiation & Notes): 包括细菌性、病毒性、真菌性、寄生虫性病原体感染。；专业视角 (Professional Perspective):
    需要综合预防、诊断、治疗和管理策略。'
  source: 03-Bio-Science/biology/std/STD_Overview.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 性传播感染的核心要点是什么？
  answer: '英文名 (English Term): Sexually Transmitted Infections (STI)；原始语言/术语 (Original Language): 英: STI；精确定义 (Technical Definition):
    性接触传播的病原体感染状态，可能有或无临床症状。；区分与备注 (Differentiation & Notes): STI是更广泛的术语，包含无症状感染；STD强调疾病状态。；专业视角 (Professional Perspective):
    现代医学倾向于使用STI，强调无症状感染的重要性。'
  source: 03-Bio-Science/biology/std/STD_Overview.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 泌尿生殖道感染的核心要点是什么？
  answer: '英文名 (English Term): Urogenital Tract Infections；原始语言/术语 (Original Language): 英: Urogenital Infections；精确定义 (Technical
    Definition): 影响泌尿系统和生殖器官的感染性疾病。；区分与备注 (Differentiation & Notes): 包括性传播和非性传播感染，如尿路感染、前列腺炎等。；专业视角 (Professional Perspective):
    需要鉴别诊断以确定传播途径和治疗策略。'
  source: 03-Bio-Science/biology/std/STD_Overview.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 细菌性STD的核心要点是什么？
  answer: '代表疾病: 淋病、梅毒、衣原体感染、支原体感染；传播特点: 传播力强，潜伏期短；治疗特点: 抗生素可治愈；预后特点: 早期治疗预后良好'
  source: 03-Bio-Science/biology/std/STD_Overview.md
  section: 按病原体类型分类 (Pathogen-Based Classification)
- type: concept
  question: 病毒性STD的核心要点是什么？
  answer: '代表疾病: HIV、HSV、HPV、HBV、HCV；传播特点: 持续感染，易复发；治疗特点: 抗病毒治疗控制；预后特点: 多需长期管理'
  source: 03-Bio-Science/biology/std/STD_Overview.md
  section: 按病原体类型分类 (Pathogen-Based Classification)
- type: concept
  question: 真菌性STD的核心要点是什么？
  answer: '代表疾病: 念珠菌病、皮肤癣菌感染；传播特点: 条件致病，局部感染为主；治疗特点: 抗真菌药物治疗；预后特点: 局部治疗效果好'
  source: 03-Bio-Science/biology/std/STD_Overview.md
  section: 按病原体类型分类 (Pathogen-Based Classification)
- type: concept
  question: 高危型的核心要点是什么？
  answer: '疾病特征: 可导致死亡或严重后遗症；典型疾病: HIV、梅毒晚期、淋病播散；并发症风险: 极高；公共卫生意义: 需强制报告和干预'
  source: 03-Bio-Science/biology/std/STD_Overview.md
  section: 按临床严重程度分类 (Severity-Based Classification)
- type: concept
  question: 中危型的核心要点是什么？
  answer: '疾病特征: 可导致不孕不育等严重后果；典型疾病: 衣原体、盆腔炎性疾病；并发症风险: 高；公共卫生意义: 需积极筛查和治疗'
  source: 03-Bio-Science/biology/std/STD_Overview.md
  section: 按临床严重程度分类 (Severity-Based Classification)
- type: concept
  question: 一级预防的核心要点是什么？
  answer: '核心策略: 健康促进、风险行为干预、疫苗接种；目标人群: 全人群、高危人群；实施主体: 教育部门、卫生部门、社区组织；效果评估指标: 知识知晓率、安全行为率、疫苗接种率'
  source: 03-Bio-Science/biology/std/STD_Prevention_Strategies.md
  section: 综合预防模式 (Comprehensive Prevention Model)
- type: concept
  question: 二级预防的核心要点是什么？
  answer: '核心策略: 早期筛查、及时诊断、规范治疗；目标人群: 性活跃人群、重点人群；实施主体: 医疗机构、疾控中心；效果评估指标: 筛查覆盖率、早期诊断率、治疗及时性'
  source: 03-Bio-Science/biology/std/STD_Prevention_Strategies.md
  section: 综合预防模式 (Comprehensive Prevention Model)
- type: concept
  question: 三级预防的核心要点是什么？
  answer: '核心策略: 并发症管理、康复服务、防止再感染；目标人群: 已确诊患者；实施主体: 专科医院、社区卫生服务中心；效果评估指标: 治愈率、复发率、生活质量改善'
  source: 03-Bio-Science/biology/std/STD_Prevention_Strategies.md
  section: 综合预防模式 (Comprehensive Prevention Model)
