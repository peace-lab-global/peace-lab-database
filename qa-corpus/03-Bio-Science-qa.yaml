- type: concept
  question: 古希腊罗马的核心要点是什么？
  answer: '代表作品/主题: 石棺雕刻、墓室壁画；核心象征: 英雄化死亡；神话场景；社会心理功能: 美德的永恒化'
  source: 03-Bio-Science/death/Death_Art_Death.md
  section: 1.1 西方艺术中的死亡
- type: concept
  question: 中世纪的核心要点是什么？
  answer: '代表作品/主题: *Danse Macabre*（死亡舞蹈）壁画；核心象征: 死亡面前人人平等；社会心理功能: 宗教教化；降低社会紧张'
  source: 03-Bio-Science/death/Death_Art_Death.md
  section: 1.1 西方艺术中的死亡
- type: concept
  question: 中国的核心要点是什么？
  answer: '代表作品/主题: 马王堆T型帛画；核心象征: 死后升天；仙界旅程；社会心理功能: 引导灵魂；宇宙观的表达'
  source: 03-Bio-Science/death/Death_Art_Death.md
  section: 1.2 东方艺术中的死亡
- type: concept
  question: 中国的核心要点是什么？
  answer: '代表作品/主题: 敦煌壁画《尸毗王割肉贸鸽》；核心象征: 舍身布施；社会心理功能: 佛教慈悲的教化'
  source: 03-Bio-Science/death/Death_Art_Death.md
  section: 1.2 东方艺术中的死亡
- type: concept
  question: 死亡焦虑的核心要点是什么？
  answer: '英文名: Death Anxiety；词源/来源: 心理学；精确定义: 对死亡及其相关议题（过程、死后状态、不存在）的恐惧与担忧'
  source: 03-Bio-Science/death/Death_Assessment_Measures.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 死亡恐惧的核心要点是什么？
  answer: '英文名: Fear of Death；词源/来源: 心理学；精确定义: 对死亡本身的情绪反应（死亡焦虑的子维度）'
  source: 03-Bio-Science/death/Death_Assessment_Measures.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 死亡回避的核心要点是什么？
  answer: '英文名: Death Avoidance；词源/来源: 心理学；精确定义: 回避死亡话题与相关情境的倾向'
  source: 03-Bio-Science/death/Death_Assessment_Measures.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 恐惧死亡的核心要点是什么？
  answer: '条目数: 7；核心内容: 对死亡本身的情绪反应；临床意义: 核心死亡焦虑'
  source: 03-Bio-Science/death/Death_Assessment_Measures.md
  section: 1.2 死亡态度描绘-修订版 (Death Attitude Profile-Revised, DAP-R)
- type: concept
  question: 死亡回避的核心要点是什么？
  answer: '条目数: 5；核心内容: 回避死亡话题与情境；临床意义: 防御机制评估'
  source: 03-Bio-Science/death/Death_Assessment_Measures.md
  section: 1.2 死亡态度描绘-修订版 (Death Attitude Profile-Revised, DAP-R)
- type: concept
  question: 生物伦理学的核心要点是什么？
  answer: '英文名: Bioethics；词源/来源: 希腊: *Bios* (生命) + *Ethos* (习俗/道德)；精确定义: 研究生命科学和医学中的道德问题的学科'
  source: 03-Bio-Science/death/Death_Bioethics.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 预立医疗指示的核心要点是什么？
  answer: '英文名: Advance Directive (AD)；词源/来源: 医学伦理；精确定义: 个人在意识清醒时对未来医疗决策的预先安排'
  source: 03-Bio-Science/death/Death_Bioethics.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 医疗持久授权书的核心要点是什么？
  answer: '英文名: Medical Power of Attorney (MPOA)；词源/来源: 法律；精确定义: 指定某人在自己无决策能力时代为做出医疗决定'
  source: 03-Bio-Science/death/Death_Bioethics.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 传统的核心要点是什么？
  answer: '死亡标准: 心跳/呼吸停止；判定依据: 临床观察；哲学问题: "灵魂何时离开身体？"'
  source: 03-Bio-Science/death/Death_Bioethics.md
  section: 1.1 死亡标准的演进
- type: concept
  question: 1968年的核心要点是什么？
  answer: '死亡标准: 哈佛脑死亡标准；判定依据: 全脑功能不可逆丧失（包括脑干）；哲学问题: 脑死亡=人死吗？'
  source: 03-Bio-Science/death/Death_Bioethics.md
  section: 1.1 死亡标准的演进
- type: concept
  question: 1981年的核心要点是什么？
  answer: '死亡标准: 美国统一死亡判定法（UDDA）；判定依据: 循环呼吸功能或全脑功能不可逆停止；哲学问题: 两种标准的并存'
  source: 03-Bio-Science/death/Death_Bioethics.md
  section: 1.1 死亡标准的演进
- type: concept
  question: 脑死亡=死亡的核心要点是什么？
  answer: '核心论证: 脑是整合器官；脑死亡后身体只是"有机体的集合"；代表: 多数西方国家医学界'
  source: 03-Bio-Science/death/Death_Bioethics.md
  section: 1.2 脑死亡的争议
- type: concept
  question: 脑死亡≠死亡的核心要点是什么？
  answer: '核心论证: 脑死亡患者仍有体温、生长、伤口愈合；家属难以接受；代表: 部分宗教团体、日本文化、某些家庭'
  source: 03-Bio-Science/death/Death_Bioethics.md
  section: 1.2 脑死亡的争议
- type: concept
  question: 死亡概念发展的核心要点是什么？
  answer: '英文名: Concept of Death Development；词源/来源: 发展心理学；精确定义: 儿童从婴幼儿期到青春期逐步理解死亡的本质属性的过程'
  source: 03-Bio-Science/death/Death_Children_Adolescents.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 永久性的核心要点是什么？
  answer: '英文名: Permanence / Irreversibility；词源/来源: 发展心理学；精确定义: 死亡一旦发生，无法逆转，死者不会回来'
  source: 03-Bio-Science/death/Death_Children_Adolescents.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 普遍性的核心要点是什么？
  answer: '英文名: Universality；词源/来源: 发展心理学；精确定义: 所有生物都会死亡，无人例外'
  source: 03-Bio-Science/death/Death_Children_Adolescents.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 第一阶段：死亡是暂时的的核心要点是什么？
  answer: '年龄: 3-5岁；核心特征: 将死亡理解为分离或睡眠；死亡理解: "死亡像睡觉，醒来就好了" "爷爷去远行了"；典型表现: 期待死者回来；在游戏中让"死者"复活；成人常见误解: "孩子还小，不懂"→ 实际上需要诚实解释'
  source: 03-Bio-Science/death/Death_Children_Adolescents.md
  section: 1.1 Maria Nagy 的三阶段模型（1948，匈牙利）
- type: concept
  question: 第二阶段：死亡是 personified的核心要点是什么？
  answer: '年龄: 5-9岁；核心特征: 将死亡拟人化（死神、怪物）；死亡理解: "死亡是一个人，来抓走坏人/老人"；典型表现: 怕黑、怕怪物；认为"好小孩不会死"；成人常见误解: "孩子在胡说"→ 拟人化是正常发展阶段'
  source: 03-Bio-Science/death/Death_Children_Adolescents.md
  section: 1.1 Maria Nagy 的三阶段模型（1948，匈牙利）
- type: concept
  question: 第三阶段：死亡是普遍的、不可逆的的核心要点是什么？
  answer: '年龄: 9+岁；核心特征: 抽象理解死亡的本质；死亡理解: "所有人都会死，包括我；死后不会回来"；典型表现: 存在性思考；对死亡的真实恐惧可能出现；成人常见误解: "孩子想太多了"→ 这是认知成熟的标志'
  source: 03-Bio-Science/death/Death_Children_Adolescents.md
  section: 1.1 Maria Nagy 的三阶段模型（1948，匈牙利）
- type: concept
  question: 前概念期的核心要点是什么？
  answer: '年龄: 0-3岁；Nagy对应: 无；现代补充: 无死亡概念；仅有分离焦虑；关键发展任务: 建立安全依恋'
  source: 03-Bio-Science/death/Death_Children_Adolescents.md
  section: 1.2 现代扩展：四/五阶段模型
- type: concept
  question: 暂时性死亡的核心要点是什么？
  answer: '年龄: 3-5岁；Nagy对应: 第一阶段；现代补充: 混淆死亡与睡眠/分离；关键发展任务: 理解"不会回来"'
  source: 03-Bio-Science/death/Death_Children_Adolescents.md
  section: 1.2 现代扩展：四/五阶段模型
- type: concept
  question: 案例A的核心要点是什么？
  answer: '核心议题: 中年存在危机；涉及文件: 存在主义心理、西方哲学、意义疗法；适用读者: 临床心理工作者'
  source: 03-Bio-Science/death/Death_Clinical_Casebook.md
  section: 使用指南
- type: concept
  question: 案例B的核心要点是什么？
  answer: '核心议题: 丧偶后死亡焦虑；涉及文件: 哀伤桥接、评估量表、正念冥想；适用读者: 临床心理工作者'
  source: 03-Bio-Science/death/Death_Clinical_Casebook.md
  section: 使用指南
- type: concept
  question: 案例C的核心要点是什么？
  answer: '核心议题: 癌症晚期自杀意念；涉及文件: 自杀学边界、尊严疗法、灵性评估；适用读者: 安宁疗护团队'
  source: 03-Bio-Science/death/Death_Clinical_Casebook.md
  section: 使用指南
- type: concept
  question: 主诉的核心要点是什么？
  answer: '内容: 近3个月来频繁的死亡恐惧，夜间惊醒，害怕"一睡不醒"'
  source: 03-Bio-Science/death/Death_Clinical_Casebook.md
  section: 背景
- type: concept
  question: 死亡焦虑的核心要点是什么？
  answer: '工具/方法: DAP-R；结果: 恐惧死亡维度高分；死亡回避中等；中性接纳低'
  source: 03-Bio-Science/death/Death_Clinical_Casebook.md
  section: 评估
- type: concept
  question: 存在焦虑的核心要点是什么？
  answer: '工具/方法: EAQ；结果: 死亡焦虑高；无意义焦虑中高；自由焦虑中等'
  source: 03-Bio-Science/death/Death_Clinical_Casebook.md
  section: 评估
- type: concept
  question: 安宁疗护团队的核心要点是什么？
  answer: '英文名: Palliative Care Team / MDT；来源: WHO/现代医疗；精确定义: 多学科团队(Multidisciplinary Team),为临终患者提供全人照护'
  source: 03-Bio-Science/death/Death_Clinical_Workplace_Applications.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 预立照护计划的核心要点是什么？
  answer: '英文名: Advance Care Planning (ACP)；来源: 现代医学伦理；精确定义: 具有行为能力的成年人在健康或疾病早期阶段,与家属和医护讨论未来医疗意愿的过程'
  source: 03-Bio-Science/death/Death_Clinical_Workplace_Applications.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 哀伤假的核心要点是什么？
  answer: '英文名: Bereavement Leave / Compassionate Leave；来源: 劳动法规；精确定义: 员工因直系亲属去世而获得的带薪休假'
  source: 03-Bio-Science/death/Death_Clinical_Workplace_Applications.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 安宁专科医生的核心要点是什么？
  answer: '核心职责: 症状管理、预后判断、医疗决策指导；协作频率: 每日查房'
  source: 03-Bio-Science/death/Death_Clinical_Workplace_Applications.md
  section: 1.1 多学科团队(MDT)标准配置
- type: concept
  question: 安宁专科护士的核心要点是什么？
  answer: '核心职责: 症状监测、给药、患者/家属教育、协调；协作频率: 24/7值班'
  source: 03-Bio-Science/death/Death_Clinical_Workplace_Applications.md
  section: 1.1 多学科团队(MDT)标准配置
- type: concept
  question: 临床心理师/精神科的核心要点是什么？
  answer: '核心职责: 情绪评估、哀伤支持、精神症状处理；协作频率: 按需;至少每周1次'
  source: 03-Bio-Science/death/Death_Clinical_Workplace_Applications.md
  section: 1.1 多学科团队(MDT)标准配置
- type: concept
  question: 症状变化的核心要点是什么？
  answer: '内容: 疼痛、呼吸困难、谵妄等新发/变化；负责人: 值班医生'
  source: 03-Bio-Science/death/Death_Clinical_Workplace_Applications.md
  section: 1.2 团队会议结构与流程
- type: concept
  question: 集体创伤的核心要点是什么？
  answer: '英文名: Collective Trauma；词源: 创伤研究；精确定义: 影响整个群体（社区、民族、国家）的创伤事件及其长期心理社会影响'
  source: 03-Bio-Science/death/Death_Collective_Trauma.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 大规模死亡的核心要点是什么？
  answer: '英文名: Mass Mortality；词源: 流行病学；精确定义: 短时间内大量人口死亡的事件（战争、瘟疫、自然灾害、种族灭绝）'
  source: 03-Bio-Science/death/Death_Collective_Trauma.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 模糊丧失的核心要点是什么？
  answer: '英文名: Ambiguous Loss；词源: Pauline Boss；精确定义: 死亡缺乏确定性（失踪、遗体未找到、身份不明），阻碍哀伤 closure'
  source: 03-Bio-Science/death/Death_Collective_Trauma.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 直接战斗人员的核心要点是什么？
  answer: '核心创伤: 杀戮的道德伤害；目睹战友死亡；自身的濒死体验；特殊性: 道德伤害（moral injury）是核心；传统PTSD框架不足'
  source: 03-Bio-Science/death/Death_Collective_Trauma.md
  section: 1.1 战争死亡的心理影响层级
- type: concept
  question: 平民幸存者的核心要点是什么？
  answer: '核心创伤: 目睹家人被杀；家园被毁；流离失所；特殊性: 丧失一切安全基础；无助感极端'
  source: 03-Bio-Science/death/Death_Collective_Trauma.md
  section: 1.1 战争死亡的心理影响层级
- type: concept
  question: 难民与流离失所者的核心要点是什么？
  answer: '核心创伤: 文化断裂；身份丧失；持续的不确定；特殊性: 创伤持续激活（无"战后"的安全环境）'
  source: 03-Bio-Science/death/Death_Collective_Trauma.md
  section: 1.1 战争死亡的心理影响层级
- type: concept
  question: 作为伤害的道德伤害的核心要点是什么？
  answer: '描述: 自己做了违反道德的事（如杀害平民）；临床表现: 深度内疚、羞耻、自我厌恶'
  source: 03-Bio-Science/death/Death_Collective_Trauma.md
  section: 1.2 道德伤害（Moral Injury）
- type: concept
  question: 见证伤害的道德伤害的核心要点是什么？
  answer: '描述: 目睹他人做违反道德的事（如酷刑、战争罪行）；临床表现: 愤怒、无力感、对人性的绝望'
  source: 03-Bio-Science/death/Death_Collective_Trauma.md
  section: 1.2 道德伤害（Moral Injury）
- type: concept
  question: 未知生焉知死的核心要点是什么？
  answer: '英文名: Not knowing life, how can one know death?；来源传统: 儒家（孔子）；词源/精确定义: 《论语》："未知生，焉知死？"——将焦点从死亡转向生命的道德实践'
  source: 03-Bio-Science/death/Death_Comparative_Philosophy.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 杀身成仁的核心要点是什么？
  answer: '英文名: To die for benevolence；来源传统: 儒家（孔子/孟子）；词源/精确定义: 在仁义与生命冲突时，选择仁义'
  source: 03-Bio-Science/death/Death_Comparative_Philosophy.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 朝闻道夕死可矣的核心要点是什么？
  answer: '英文名: Having heard the Way in the morning, one may die content in the evening；来源传统: 儒家（孔子）；词源/精确定义: 真理/道的价值超越生命长度'
  source: 03-Bio-Science/death/Death_Comparative_Philosophy.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 核心态度的核心要点是什么？
  answer: '孔子: "未知生，焉知死"——将焦点放在生者的道德实践；苏格拉底: "哲学就是预习死亡"——直面死亡以净化灵魂'
  source: 03-Bio-Science/death/Death_Comparative_Philosophy.md
  section: 1.1 孔子的"不语怪力乱神"
- type: concept
  question: 死亡观的核心要点是什么？
  answer: '孔子: 敬鬼神而远之；重视丧葬礼仪的社会功能；苏格拉底: 死亡是灵魂的解放；死后可能更好'
  source: 03-Bio-Science/death/Death_Comparative_Philosophy.md
  section: 1.1 孔子的"不语怪力乱神"
- type: concept
  question: 临终的核心要点是什么？
  answer: '孔子: 弟子记录孔子临终前的歌与叹息；苏格拉底: 苏格拉底在狱中平静地饮下毒酒，继续哲学对话'
  source: 03-Bio-Science/death/Death_Comparative_Philosophy.md
  section: 1.1 孔子的"不语怪力乱神"
- type: concept
  question: 核心论证的核心要点是什么？
  answer: '庄子: 生死如昼夜交替；气化聚散；鼓盆而歌；伊壁鸠鲁: "死亡与我们无关"——我们在时不死，死时不在'
  source: 03-Bio-Science/death/Death_Comparative_Philosophy.md
  section: 2.1 庄子：鼓盆而歌
- type: concept
  question: 情感目标的核心要点是什么？
  answer: '庄子: 逍遥——超越生死对立的自由；伊壁鸠鲁: Ataraxia——心灵的宁静'
  source: 03-Bio-Science/death/Death_Comparative_Philosophy.md
  section: 2.1 庄子：鼓盆而歌
- type: concept
  question: 白骨观的核心要点是什么？
  answer: '英文名 (English Term): White-Bone Contemplation；原始语言/术语 (Original Language): 巴利/梵: *Asubha-bhāvanā* (不净修), 相关: *Sivathikā-manasikāra*
    (墓场作意)；词源含义: 通过观想或直观尸体逐步腐败直至白骨,体悟身体无常、不净与无我；精确定义: 经典中属于“不净观”系列,多见于巴利《念处经》《清净道论》；区分与备注: 传统用于调伏欲望、减轻对肉体的执着,现代需严格注意心理安全与适应人群'
  source: 03-Bio-Science/death/Death_Contemplation_Overview.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 不净观的核心要点是什么？
  answer: '英文名 (English Term): Contemplation of Impurity；原始语言/术语 (Original Language): 巴利: *Asubha*, 梵: *Aśubha*；词源含义: “非可爱、非清净”的观照对象；精确定义:
    广义包括观身三十六物、不净九相(胀、坏、血涌、残碎等)；区分与备注: 白骨观可视为不净观的高级形式/后期阶段；专业视角 (Professional Perspective): 对成瘾、性冲动、身体执着具有脱敏与解构效果,但不等于羞辱身体'
  source: 03-Bio-Science/death/Death_Contemplation_Overview.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 死随念/念死的核心要点是什么？
  answer: '英文名 (English Term): Mindfulness of Death；原始语言/术语 (Original Language): 巴利: *Maraṇasati*; 梵: *Maraṇa-smṛti*；词源含义:
    持续忆念“我必死亡、时日未知”,以激发精进与价值澄清；精确定义: 与病态“死亡焦虑”不同,其强调清醒、温柔而现实地承认有限性；区分与备注: 在南传与藏传中皆为核心修行,可视为存在主义意义疗法的宗教版本'
  source: 03-Bio-Science/death/Death_Contemplation_Overview.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 上座部佛教的核心要点是什么？
  answer: '核心死亡观: 生死轮回因缘而起,涅槃为出离之道；代表术语: *Saṃsāra* (轮回), *Nibbāna/Nirvāṇa* (涅槃)；对“自我”的理解: 无我(Anatta),五蕴和合过程；对死亡的功能性意义: 死亡是业力流转的一环,非绝对终点；可能的心理影响:
    既可降低对单一生命的执着,也可能被“业报恐惧”绑架；治疗/实践启发: 通过白骨观、念死等练习,训练与无常和平共处,激发精进与伦理责任'
  source: 03-Bio-Science/death/Death_Contemplation_Overview.md
  section: 死亡观跨传统对照表 (Cross-Tradition Views of Death)
- type: concept
  question: 大乘佛教的核心要点是什么？
  answer: '核心死亡观: 生死即涅槃,空性中无生无灭；代表术语: *Śūnyatā* (空性), *Bodhicitta* (菩提心)；对“自我”的理解: 自我是缘起和合,最终为空；对死亡的功能性意义: 死亡是“幻象的转化”,也是菩萨行的契机；可能的心理影响:
    对已具备一定见地者有解放感,对初学者可能过于抽象；治疗/实践启发: 强调在当下活出“无常与慈悲”,减轻死亡焦虑,增强利他动机'
  source: 03-Bio-Science/death/Death_Contemplation_Overview.md
  section: 死亡观跨传统对照表 (Cross-Tradition Views of Death)
- type: concept
  question: 道家/中国哲学的核心要点是什么？
  answer: '核心死亡观: 生死如昼夜,顺应自然之变；代表术语: “与道合真”、“生死一如”；对“自我”的理解: 自我是“气”的聚散；对死亡的功能性意义: 死亡是“归根复命”,回到更大整体；可能的心理影响: 可减弱对死亡的抗拒,强化随顺与安然；治疗/实践启发:
    适合与呼吸、导引、自然观照结合,辅助临终安宁疗护'
  source: 03-Bio-Science/death/Death_Contemplation_Overview.md
  section: 死亡观跨传统对照表 (Cross-Tradition Views of Death)
- type: concept
  question: 存在性死亡焦虑的核心要点是什么？
  answer: '中文名称: 存在性恐惧；英文名: Existential Death Anxiety；核心担忧焦点: 生命意义、遗忘、虚无感；临床表现: 夜间思考“活着究竟有什么意义”“我终将被遗忘”；常见误诊/混淆: 容易被当作抑郁或强迫简单处理；干预方向:
    需整合向死而生框架、意义疗法(Logotherapy)、价值澄清与存在性对话'
  source: 03-Bio-Science/death/Death_Contemplation_Overview.md
  section: 死亡焦虑类型与临床表现表 (Types of Death Anxiety)
- type: concept
  question: 神经质性死亡焦虑的核心要点是什么？
  answer: '中文名称: 过度化的死亡恐惧；英文名: Neurotic Death Anxiety；核心担忧焦点: 自身症状、疾病、意外；临床表现: 反复体检、恐癌、惊恐发作、与躯体化/疾病焦虑交织；常见误诊/混淆: 易与惊恐障碍、IAD混淆,见前“疑病症”模块；干预方向:
    结合 CBT(对灾难化思维与安全行为工作) + 死亡教育,慎用强刺激性死亡观想'
  source: 03-Bio-Science/death/Death_Contemplation_Overview.md
  section: 死亡焦虑类型与临床表现表 (Types of Death Anxiety)
- type: concept
  question: 亡灵节的核心要点是什么？
  answer: '英文名: Día de Muertos；来源文化: 墨西哥；词源/含义: 西: *Día* (日) + *Muertos* (亡者)；精确定义: 每年11月1-2日纪念逝者的节日,核心信念是"死者与生者在此时重聚"'
  source: 03-Bio-Science/death/Death_Cultural_Rituals_Comparison.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 善终的核心要点是什么？
  answer: '英文名: Zenō / Good Death；来源文化: 日本；词源/含义: 日: *善* (好的) + *終* (结束)；精确定义: 有尊严、无痛苦、被家人围绕、完成告别的死亡'
  source: 03-Bio-Science/death/Death_Cultural_Rituals_Comparison.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 看取的核心要点是什么？
  answer: '英文名: Mikitori；来源文化: 日本；词源/含义: 日: *見* (看) + *取* (接纳)；精确定义: 家人或护理者陪伴临终者直到最后一口气,确认死亡'
  source: 03-Bio-Science/death/Death_Cultural_Rituals_Comparison.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 时间的核心要点是什么？
  answer: '内容: 11月1日(幼灵节,纪念夭折儿童) + 11月2日(亡灵节,纪念成人逝者)'
  source: 03-Bio-Science/death/Death_Cultural_Rituals_Comparison.md
  section: 1.1 核心信念：死亡不是终点,而是重聚
- type: concept
  question: 起源的核心要点是什么？
  answer: '内容: 阿兹特克传统(纪念死神Mictēcacihuātl) + 西班牙天主教(诸圣节、炼灵节)的融合'
  source: 03-Bio-Science/death/Death_Cultural_Rituals_Comparison.md
  section: 1.1 核心信念：死亡不是终点,而是重聚
- type: concept
  question: 核心隐喻的核心要点是什么？
  answer: '内容: 死亡是生命循环的一部分;坟墓是"第二个家";每年有一天,死者会回来探望生者'
  source: 03-Bio-Science/death/Death_Cultural_Rituals_Comparison.md
  section: 1.1 核心信念：死亡不是终点,而是重聚
- type: concept
  question: Ofrenda(祭坛)的核心要点是什么？
  answer: '形式: 在家中搭建多层祭坛,摆放逝者照片、喜欢的食物、香烟、龙舌兰酒；象征意义: 邀请死者回来享用;"我们记得你,我们还在乎你"；心理功能: 持续的连接感;哀伤不被要求"结束"'
  source: 03-Bio-Science/death/Death_Cultural_Rituals_Comparison.md
  section: 1.2 仪式元素解析
- type: concept
  question: Cempasúchil(万寿菊)的核心要点是什么？
  answer: '形式: 橙黄色的万寿菊花瓣铺成道路,从家门口到祭坛再到墓地；象征意义: 花瓣的颜色和香味引导亡灵回家；心理功能: 感官的、具体的、可操作的哀悼'
  source: 03-Bio-Science/death/Death_Cultural_Rituals_Comparison.md
  section: 1.2 仪式元素解析
