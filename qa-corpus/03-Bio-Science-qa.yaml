  question: 苦 (Dukkha)的核心要点是什么？
  answer: '含义: 不圆满、不稳固；对死亡观的转化: 有生必有死,有聚必有散;执着于"不死"本身就是苦'
  source: 03-Bio-Science/death/Death_Traditional_Views_Deep_Dive.md
  section: 1.2 三法印与死亡
- type: concept
  question: 无我 (Anattā)的核心要点是什么？
  answer: '含义: 没有恒常不变的自我；对死亡观的转化: 既然没有"我"在死,何来"我"的恐惧?——最高级的死亡焦虑解药'
