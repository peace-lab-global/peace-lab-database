  question: 一指禅推法的核心要点是什么？
  answer: '英文术语: One-Finger Meditation Pushing；动作特点: 拇指指端着力，腕部摆动；力学机制: 前臂主动摆动带动腕关节屈伸；适应病症: 头面部疾病、内脏疾病；操作要点: 沉肩坠肘、悬腕、掌虚指实'
  source: 03-Bio-Science/biology/tuina/Tuina_Techniques_Standards.md
  section: 基本手法分类 (Basic Technique Classification)
- type: concept
  question: 㨰法的核心要点是什么？
  answer: '英文术语: Rolling Technique；动作特点: 手背尺侧着力，前臂旋转；力学机制: 前臂旋转带动腕关节屈伸；适应病症: 颈肩腰腿痛、软组织损伤；操作要点: 吸定、拖动、移动三点连一线'
  source: 03-Bio-Science/biology/tuina/Tuina_Techniques_Standards.md
  section: 基本手法分类 (Basic Technique Classification)
- type: concept
  question: 揉法的核心要点是什么？
  answer: '英文术语: Kneading Technique；动作特点: 掌指或鱼际着力，腕关节回旋；力学机制: 腕关节为主动关节的回旋运动；适应病症: 腹部疾病、软组织扭伤；操作要点: 轻柔节律、带动皮下组织'
  source: 03-Bio-Science/biology/tuina/Tuina_Techniques_Standards.md
  section: 基本手法分类 (Basic Technique Classification)
- type: concept
  question: 推法的核心要点是什么？
