  question: 性欲障碍的核心要点是什么？
  answer: '诊断标准 (DSM-5): 持续或反复缺乏性幻想和性欲望至少6个月，引起显著痛苦；核心症状: 性兴趣缺失、性念头稀少；流行病学数据: 终生患病率:男性15-20%，女性25-30%；性别差异: 女性患病率高于男性，随年龄增长上升'
  source: 03-Bio-Science/sexuality/Sexuality_Clinical_Applications.md
  section: DSM-5性功能障碍诊断框架
- type: concept
  question: 性唤起障碍的核心要点是什么？
  answer: '诊断标准 (DSM-5): 持续无法获得或维持足够的性兴奋，表现为生殖器反应不足；核心症状: 男性:勃起困难；女性:润滑不足、感觉缺失；流行病学数据: 男性终生患病率20-30%，女性30-40%；性别差异: 女性症状更为复杂，涉及主观和客观双重维度'
  source: 03-Bio-Science/sexuality/Sexuality_Clinical_Applications.md
  section: DSM-5性功能障碍诊断框架
- type: concept
  question: 性高潮障碍的核心要点是什么？
  answer: '诊断标准 (DSM-5): 显著延迟或无法达到性高潮，尽管有充分性刺激；核心症状: 性高潮阈值过高、快感强度降低；流行病学数据: 男性终生患病率5-10%，女性10-15%；性别差异: 女性延迟性高潮更常见，男性早泄相对多见'
  source: 03-Bio-Science/sexuality/Sexuality_Clinical_Applications.md
  section: DSM-5性功能障碍诊断框架
- type: concept
  question: GA10.0的核心要点是什么？
  answer: '疾病名称: 性功能障碍；核心特征: 性反应周期任一阶段异常；诊断要点: 排除器质性疾病、药物副作用、关系问题；治疗原则: 生物心理社会综合干预'
