  source: 03-Bio-Science/sexuality/masturbation-psychology/Masturbation_Assessment_Intervention.md
  section: 自慰态度与行为评估量表
- type: concept
  question: CPUI-9(色情使用问题感知量表)的核心要点是什么？
  answer: '开发者/年份: Grubbs et al., 2015；维度/因子: 感知强迫性、情绪困扰、道德不一致；题目数: 9题；信度(α): α=0.82-0.93；测重测(r): r=0.78；适用人群: 成人；评估内容: 色情使用/自慰的主观问题感知'
  source: 03-Bio-Science/sexuality/masturbation-psychology/Masturbation_Assessment_Intervention.md
  section: 自慰态度与行为评估量表
- type: concept
  question: 频率的核心要点是什么？
  answer: '评估内容: 自慰次数/周；关键问题: 频率是否干扰日常功能？；正常范围指标: 个体差异极大；无"正常"频率标准；临床关注信号: 频率本身不构成诊断；关注功能影响；评估方法: 自我报告日记'
  source: 03-Bio-Science/sexuality/masturbation-psychology/Masturbation_Assessment_Intervention.md
  section: 功能性评估框架
- type: concept
  question: 控制感的核心要点是什么？
  answer: '评估内容: 是否能自主选择是否自慰；关键问题: 尝试减少时是否成功？；正常范围指标: 主观控制感良好；临床关注信号: 反复失控感+显著困扰；评估方法: 半结构化访谈'
  source: 03-Bio-Science/sexuality/masturbation-psychology/Masturbation_Assessment_Intervention.md
  section: 功能性评估框架
- type: concept
  question: 自体刺激的核心要点是什么？
  answer: '术语 (English): Self-stimulation；精确定义: 婴幼儿对自身生殖器的触摸探索行为；发展阶段关联: 婴幼儿期(0-3岁)；区分与备注: 属正常感觉运动探索，非成人意义上的"自慰"；评估意义: 需区分正常发展与创伤后反应'
  source: 03-Bio-Science/sexuality/masturbation-psychology/Masturbation_Development_Lifespan.md
  section: 核心术语表 | Key Terminology
- type: concept
  question: 身体发现的核心要点是什么？
  answer: '术语 (English): Body Discovery；精确定义: 儿童认识和探索自身身体各部位的过程；发展阶段关联: 幼儿期(2-5岁)；区分与备注: 包括但不限于生殖器区域的探索；评估意义: 性教育的适龄起点'
  source: 03-Bio-Science/sexuality/masturbation-psychology/Masturbation_Development_Lifespan.md
  section: 核心术语表 | Key Terminology
- type: concept
  question: 青春期自慰的核心要点是什么？
  answer: '术语 (English): Pubertal Masturbation；精确定义: 伴随性成熟出现的有意识性自我刺激行为；发展阶段关联: 青春期(10-18岁)；区分与备注: 首次自慰是重要的性发展里程碑；评估意义: 高频率属正常发展表现'
  source: 03-Bio-Science/sexuality/masturbation-psychology/Masturbation_Development_Lifespan.md
  section: 核心术语表 | Key Terminology
- type: concept
  question: 0-12月的核心要点是什么？
  answer: '行为表现: 偶尔触摸生殖器(换尿布时)；发生率: 普遍(>50%)；发展意义: 感觉运动阶段的身体探索；触发情境: 裸露时、洗澡时；家长/照护者指导要点: 不需干预，属正常感觉探索'
  source: 03-Bio-Science/sexuality/masturbation-psychology/Masturbation_Development_Lifespan.md
  section: 正常发展行为特征
- type: concept
  question: 1-3岁的核心要点是什么？
  answer: '行为表现: 有意识触摸生殖器，可能出现节律性摩擦；发生率: 约15-20%明显可观察(Mallants & Casteels, 2008)；发展意义: 发现特定区域的愉悦感觉；触发情境: 无聊、疲倦、安抚时；家长/照护者指导要点:
    不责骂，引导适当场合意识'
  source: 03-Bio-Science/sexuality/masturbation-psychology/Masturbation_Development_Lifespan.md
  section: 正常发展行为特征
- type: concept
  question: 3-5岁的核心要点是什么？
  answer: '行为表现: 可能增加频率，伴随身体好奇；发生率: 约20-30%有规律行为；发展意义: 性别意识萌芽，身体自主权发展；触发情境: 安静独处、入睡前；家长/照护者指导要点: 正常化回应，引入"私密"概念'
  source: 03-Bio-Science/sexuality/masturbation-psychology/Masturbation_Development_Lifespan.md
  section: 正常发展行为特征
- type: concept
  question: 频率的核心要点是什么？
  answer: '正常发展范围: 偶尔至每日，不影响日常活动；需要关注的信号: 过于频繁，干扰进食/睡眠/社交；可能的临床指向: 焦虑、感觉调节困难；评估工具: CSBI(Friedrich et al., 1992)；干预建议: 情绪调节策略教学'
  source: 03-Bio-Science/sexuality/masturbation-psychology/Masturbation_Development_Lifespan.md
  section: 需要关注的信号 vs 正常行为
- type: concept
  question: 情境的核心要点是什么？
  answer: '正常发展范围: 限于安静/私密时刻；需要关注的信号: 在公共场合频繁出现；可能的临床指向: 社会规范理解延迟；评估工具: 行为观察；干预建议: 社交技能训练，场合教育'
  source: 03-Bio-Science/sexuality/masturbation-psychology/Masturbation_Development_Lifespan.md
  section: 需要关注的信号 vs 正常行为
- type: concept
  question: 个体差异的核心要点是什么？
  answer: '术语 (English): Individual Differences；精确定义: 个体间在行为、认知与情感维度上的系统性变异；研究领域: 差异心理学；区分与备注: 非病理意义上的"偏差"；测量方式: 标准化量表、频率报告'
