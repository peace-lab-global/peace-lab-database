  question: 训练刺激的核心要点是什么？
  answer: '时间窗: 0h；生理过程: 急性疲劳、组织微损伤；训练建议: —'
  source: 03-Bio-Science/biology/exercise-science/Recovery_Regeneration.md
  section: 1.1 恢复的本质
- type: concept
  question: 恢复期的核心要点是什么？
  answer: '时间窗: 0-24h；生理过程: 炎症反应、清理废物；训练建议: 轻度活动恢复'
  source: 03-Bio-Science/biology/exercise-science/Recovery_Regeneration.md
  section: 1.1 恢复的本质
- type: concept
  question: 修复期的核心要点是什么？
  answer: '时间窗: 24-48h；生理过程: 蛋白质合成↑、糖原恢复；训练建议: 充足睡眠与营养'
  source: 03-Bio-Science/biology/exercise-science/Recovery_Regeneration.md
  section: 1.1 恢复的本质
- type: concept
  question: 睡眠的核心要点是什么？
  answer: '英文: Sleep；核心内容: 生长激素释放、蛋白质合成、记忆巩固；优先级: ⭐⭐⭐⭐⭐'
  source: 03-Bio-Science/biology/exercise-science/Recovery_Regeneration.md
  section: 1.2 恢复的多维度框架
- type: concept
  question: 营养的核心要点是什么？
  answer: '英文: Nutrition；核心内容: 蛋白质摄入、碳水补充、水合状态；优先级: ⭐⭐⭐⭐⭐'
  source: 03-Bio-Science/biology/exercise-science/Recovery_Regeneration.md
  section: 1.2 恢复的多维度框架
- type: concept
  question: 主动恢复的核心要点是什么？
  answer: '英文: Active Recovery；核心内容: 低强度有氧、促进血流；优先级: ⭐⭐⭐⭐'
  source: 03-Bio-Science/biology/exercise-science/Recovery_Regeneration.md
  section: 1.2 恢复的多维度框架
- type: concept
  question: 充足睡眠 (8-10h)的核心要点是什么？
  answer: '对运动表现/恢复的影响: 反应时间↑、冲刺速度↑ 5%、准确性↑ 9%；参考: Mah et al., 2011'
  source: 03-Bio-Science/biology/exercise-science/Recovery_Regeneration.md
  section: 2.1 睡眠对运动恢复的影响
- type: concept
  question: 睡眠不足 (<6h)的核心要点是什么？
  answer: '对运动表现/恢复的影响: 力量↓、有氧能力↓、损伤风险↑ 1.7倍；参考: Milewski et al., 2014'
  source: 03-Bio-Science/biology/exercise-science/Recovery_Regeneration.md
  section: 2.1 睡眠对运动恢复的影响
- type: concept
  question: 肌力** (Strength)的核心要点是什么？
  answer: '负荷 (%1RM): 85-100%；组数: 3-6；次数: 1-5；组间休息: 3-5 min；适用人群: 运动员/进阶'
  source: 03-Bio-Science/biology/exercise-science/Strength_Training_Fundamentals.md
  section: 1.1 定义与核心原理
- type: concept
  question: 肌肥大** (Hypertrophy)的核心要点是什么？
  answer: '负荷 (%1RM): 65-85%；组数: 3-5；次数: 6-12；组间休息: 60-90 s；适用人群: 一般健身者'
  source: 03-Bio-Science/biology/exercise-science/Strength_Training_Fundamentals.md
  section: 1.1 定义与核心原理
- type: concept
  question: 肌耐力** (Endurance)的核心要点是什么？
  answer: '负荷 (%1RM): 50-65%；组数: 2-3；次数: 15-25；组间休息: 30-60 s；适用人群: 初学者/康复'
  source: 03-Bio-Science/biology/exercise-science/Strength_Training_Fundamentals.md
  section: 1.1 定义与核心原理
- type: concept
  question: 向心收缩的核心要点是什么？
  answer: '英文: Concentric；定义: 肌肉缩短产生力；示例: 二头弯举上举；特点: 力量输出最低'
  source: 03-Bio-Science/biology/exercise-science/Strength_Training_Fundamentals.md
  section: 1.2 肌肉收缩类型 (Types of Muscle Contraction)
- type: concept
  question: 离心收缩的核心要点是什么？
  answer: '英文: Eccentric；定义: 肌肉延长控制阻力；示例: 二头弯举下放；特点: 力量输出最高 (~120-140%)'
  source: 03-Bio-Science/biology/exercise-science/Strength_Training_Fundamentals.md
  section: 1.2 肌肉收缩类型 (Types of Muscle Contraction)
- type: concept
  question: 等长收缩的核心要点是什么？
  answer: '英文: Isometric；定义: 肌肉长度不变；示例: 平板支撑；特点: 角度特异性'
  source: 03-Bio-Science/biology/exercise-science/Strength_Training_Fundamentals.md
  section: 1.2 肌肉收缩类型 (Types of Muscle Contraction)
- type: concept
  question: 全身训练** (Full Body)的核心要点是什么？
  answer: '频率: 3次/周；适用人群: 初学者/时间有限者；优势: 高频刺激、恢复充分；劣势: 单次训练量大'
  source: 03-Bio-Science/biology/exercise-science/Strength_Training_Fundamentals.md
  section: 3.1 主要分化方案对比
- type: concept
  question: 上下分化** (Upper/Lower)的核心要点是什么？
  answer: '频率: 4次/周；适用人群: 中级训练者；优势: 平衡频率与容量；劣势: 需要更多时间'
  source: 03-Bio-Science/biology/exercise-science/Strength_Training_Fundamentals.md
  section: 3.1 主要分化方案对比
- type: concept
  question: 什么是术语标准化词汇表？
  answer: '- **飞蚊症** (Floaters)：患者主观感受到视野中出现点状、丝状、网状等移动性阴影的现象

    - **玻璃体混浊** (Vitreous Opacities)：飞蚊症的医学术语表述

    - **后玻璃体脱离** (Posterior Vitreous Detachment, PVD)：玻璃体后皮质与视网膜内界膜分离的现象

    - **Weiss环**：后玻璃体脱离时形成的环形混浊物

    - **OCT**：光学相干断层扫描

    - **FFA**：荧光素眼底血管造影

    - **ICGA**：吲哚菁绿血管造影

    - **PRO**：患者报告结局'
  source: 03-Bio-Science/biology/floaters/Bio_Floaters_Clinical_Management.md
