  question: Beattie et al. (2004）的核心要点是什么？
  answer: '发现: 晚期患者可能通过非语言行为（如紧握亲人的手）表达对分离的恐惧'
  source: 03-Bio-Science/death/Death_Dementia_End_of_Life.md
  section: 1.2 失智症患者能否理解死亡？
- type: concept
  question: 安宁疗护的核心要点是什么？
  answer: '英文名 (English Term): Palliative Care；原始语言/词源: 拉丁: *Palliare* (遮盖、 cloak)；精确定义: 为危及生命疾病的患者提供身体、心理、社会、灵性层面的全人照护,以提高生活质量；区分要点:
    不等于"临终关怀":安宁疗护可在疾病任何阶段介入,与治愈性治疗并行；专业视角: WHO定义为基本人权'
  source: 03-Bio-Science/death/Death_Dignity_Therapy_Palliative_Care.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 临终关怀的核心要点是什么？
  answer: '英文名 (English Term): Hospice Care；原始语言/词源: 拉丁: *Hospitium* (待客之所)；精确定义: 针对预期生存期≤6个月患者的安宁疗护专向服务；区分要点: 更狭义的终端期照护;在部分国家需医生预后证明；专业视角:
    强调"家"的氛围而非医院机构感'
  source: 03-Bio-Science/death/Death_Dignity_Therapy_Palliative_Care.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 尊严疗法的核心要点是什么？
  answer: '英文名 (English Term): Dignity Therapy；原始语言/词源: -；精确定义: Harvey Chochinov开发的短程心理治疗,通过结构化访谈帮助临终患者记录人生故事与遗产文件；区分要点: 区别于一般生命回顾:有明确的遗产文档产出；专业视角:
    RCT证明有效提升尊严感与生命意义'
  source: 03-Bio-Science/death/Death_Dignity_Therapy_Palliative_Care.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 全人的核心要点是什么？
  answer: '核心内容: 身体 + 心理 + 社会 + 灵性；具体实践: 疼痛管理 + 情绪支持 + 家庭关系 + 意义探索'
  source: 03-Bio-Science/death/Death_Dignity_Therapy_Palliative_Care.md
  section: 2.1 WHO 安宁疗护定义与原则
- type: concept
  question: 全家的核心要点是什么？
  answer: '核心内容: 患者与家属为一个照护单位；具体实践: 家属哀伤预防、家庭会议、亲子沟通'
  source: 03-Bio-Science/death/Death_Dignity_Therapy_Palliative_Care.md
  section: 2.1 WHO 安宁疗护定义与原则
- type: concept
  question: 全程的核心要点是什么？
  answer: '核心内容: 从确诊到丧亲后的哀伤辅导；具体实践: 早期介入 + 临终陪伴 + 居丧期随访'
  source: 03-Bio-Science/death/Death_Dignity_Therapy_Palliative_Care.md
  section: 2.1 WHO 安宁疗护定义与原则
- type: concept
  question: 目标的核心要点是什么？
  answer: '治愈性医疗: 治愈疾病、延长生命；安宁疗护: 舒适、尊严、生活质量'
  source: 03-Bio-Science/death/Death_Dignity_Therapy_Palliative_Care.md
