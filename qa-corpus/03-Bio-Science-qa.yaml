- type: concept
  question: 死亡清洁的核心要点是什么？
  answer: '英文名: Death Cleaning (Swedish: *Döstädning*)；词源/来源: Margareta Magnusson, 2017；精确定义: 在人生后期或任何年龄，主动清理物品以减轻死后家人的负担'
  source: 03-Bio-Science/death/Death_Preparation_Life.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 终活的核心要点是什么？
  answer: '英文名: 終活 (Shūkatsu)；词源/来源: 日本社会运动 (2000s-)；精确定义: 为临终做准备的全面生活实践，包括整理、关系修复、财务安排'
  source: 03-Bio-Science/death/Death_Preparation_Life.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 遗物整理的核心要点是什么？
  answer: '英文名: Bereavement Decluttering；词源/来源: 哀伤研究；精确定义: 丧亲后对逝者物品的整理过程'
  source: 03-Bio-Science/death/Death_Preparation_Life.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 创始人的核心要点是什么？
  answer: '内容: Margareta Magnusson，瑞典艺术家，80+岁开始实践并著书'
  source: 03-Bio-Science/death/Death_Preparation_Life.md
  section: 1.1 起源与理念
- type: concept
  question: 核心理念的核心要点是什么？
  answer: '内容: "当你离开这个世界时，你的家人不应该被迫为你的物品做出痛苦的决定"'
  source: 03-Bio-Science/death/Death_Preparation_Life.md
  section: 1.1 起源与理念
- type: concept
  question: 1. 从简单开始的核心要点是什么？
  answer: '操作: 从衣服、厨房用品开始；照片和信件留到最后；心理原则: 渐进暴露；避免情感过载'
  source: 03-Bio-Science/death/Death_Preparation_Life.md
  section: 1.2 死亡清洁的七步法
- type: concept
  question: 2. 触摸每一件物品的核心要点是什么？
  answer: '操作: 拿在手中；问自己"我会想念它吗？"；心理原则: 身体记忆；情感连接'
  source: 03-Bio-Science/death/Death_Preparation_Life.md
