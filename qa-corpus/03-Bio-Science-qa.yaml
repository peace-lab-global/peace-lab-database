  answer: '英文名 (English Term): Denial of Death；原始语言/词源: -；精确定义: 人类通过文化、宗教、性格来无意识逃避死亡意识；代表哲学家: Ernest Becker；专业视角: 文明、神经症、英雄主义的共同心理根源'
