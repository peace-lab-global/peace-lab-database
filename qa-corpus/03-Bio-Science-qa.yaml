  question: 水洗处理的核心要点是什么？
  answer: '中文名: 水洗/湿处理；英文名: Washed / Wet Process；原理: 去皮→发酵去胶→水洗→干燥；典型产区: 中南美洲、东非；风味特点: 干净、明亮、酸度清晰、风土表达；优点: 一致性高、品质稳定；缺点: 用水量大、成本高；适用正念体验:
    适合专注品鉴酸度层次'
  source: 03-Bio-Science/foods/coffee/Coffee_Varieties_Sensory.md
  section: 咖啡处理法与风味影响表 (Processing Methods & Flavor Impact)
- type: concept
  question: 日晒处理的核心要点是什么？
  answer: '中文名: 日晒/干处理；英文名: Natural / Dry Process；原理: 整颗果实直接干燥；典型产区: 埃塞俄比亚、巴西；风味特点: 浓郁果香、发酵感、醇厚、蓝莓/草莓；优点: 用水少、环保；缺点: 品控难、易瑕疵；适用正念体验:
    适合探索复杂果香'
  source: 03-Bio-Science/foods/coffee/Coffee_Varieties_Sensory.md
  section: 咖啡处理法与风味影响表 (Processing Methods & Flavor Impact)
