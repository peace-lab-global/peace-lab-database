  question: 即时安全的核心要点是什么？
  answer: '低风险(1分): 环境安全，有保护者；中风险(2分): 环境基本安全；高风险(3分): 环境存在隐患；极高风险(4分): 立即危险'
  source: 03-Bio-Science/sexuality/incest/Incest_Clinical_Toolkit.md
  section: 2. 安全风险评估矩阵
- type: concept
  question: 家庭支持的核心要点是什么？
  answer: '低风险(1分): 家庭功能良好；中风险(2分): 家庭功能一般；高风险(3分): 家庭功能受损；极高风险(4分): 家庭功能严重障碍'
  source: 03-Bio-Science/sexuality/incest/Incest_Clinical_Toolkit.md
  section: 2. 安全风险评估矩阵
- type: concept
  question: 创伤严重度的核心要点是什么？
  answer: '低风险(1分): 单次轻微接触；中风险(2分): 反复轻度接触；高风险(3分): 严重或持续接触；极高风险(4分): 极端暴力接触'
  source: 03-Bio-Science/sexuality/incest/Incest_Clinical_Toolkit.md
  section: 2. 安全风险评估矩阵
- type: concept
  question: 创伤史采集的核心要点是什么？
  answer: '评估内容: 详细的侵犯经历、频率、持续时间；评估工具: 创伤史结构化访谈；时间要求: 2-3小时分期进行；注意事项: 创造安全环境，避免二次创伤'
  source: 03-Bio-Science/sexuality/incest/Incest_Clinical_Treatment.md
  section: 初始评估流程
- type: concept
  question: 心理症状评估的核心要点是什么？
  answer: '评估内容: PTSD症状、抑郁、焦虑水平；评估工具: CAPS-5, PHQ-9, GAD-7；时间要求: 1-2小时；注意事项: 使用创伤知情的方法'
  source: 03-Bio-Science/sexuality/incest/Incest_Clinical_Treatment.md
  section: 初始评估流程
- type: concept
  question: 功能损害评估的核心要点是什么？
  answer: '评估内容: 日常功能、人际关系、工作学习；评估工具: GAF, WHO-DAS 2.0；时间要求: 45-60分钟；注意事项: 关注具体的功能障碍'
  source: 03-Bio-Science/sexuality/incest/Incest_Clinical_Treatment.md
  section: 初始评估流程
- type: concept
  question: 创伤相关症状的核心要点是什么？
  answer: '首选药物: SSRIs(舍曲林、帕罗西汀)；替代药物: SNRIs(文拉法辛)；使用原则: 低剂量开始，缓慢增量；监测要点: 情绪改善、副作用监测'
  source: 03-Bio-Science/sexuality/incest/Incest_Clinical_Treatment.md
  section: 精神药理学干预
- type: concept
  question: 焦虑症状的核心要点是什么？
  answer: '首选药物: 普瑞巴林、加巴喷丁；替代药物: 苯二氮卓类(短期)；使用原则: 避免长期依赖；监测要点: 成瘾风险、认知影响'
  source: 03-Bio-Science/sexuality/incest/Incest_Clinical_Treatment.md
  section: 精神药理学干预
