  question: 价值自我的核心要点是什么？
  answer: '正常发展轨迹: 认识到自身独特价值和贡献；歧视影响下的偏离: 内化性别等级观念，自我价值感低下；心理机制: 社会比较理论，相对剥夺感；修复路径: 价值多元化认知，内在价值肯定'
