  question: 绿原酸的核心要点是什么？
  answer: '中文名: 绿原酸；英文名: Chlorogenic Acid (CGA)；化学分类: 多酚类；含量(每杯约240ml): 70-350mg；主要作用: 抗氧化、抗炎、血糖调节；健康影响: 降低2型糖尿病风险;抗炎保护；专业提示:
    浅焙含量高,深焙大幅降解'
