- type: concept
  question: 蛋白质的核心要点是什么？
  answer: '英文名: Protein；每日推荐摄入量: 0.8-1.2g/kg体重；主要功能: 组织修复、酶与激素合成、免疫抗体产生、神经递质前体；主要食物来源: 肉类、鱼类、蛋类、豆类、乳制品；消化吸收机制: 胃蛋白酶（Pepsin）和胰蛋白酶（Trypsin）水解为氨基酸，经小肠绒毛吸收入血；缺乏后果:
    肌肉萎缩、免疫力下降、水肿、伤口愈合延迟；过量风险: 肾脏负担增加（已有肾病者）、脱水、钙流失'
  source: 03-Bio-Science/foods/nutritional/Nutrition_Fundamentals.md
  section: 宏量营养素概览表 (Macronutrients Overview)
- type: concept
  question: 碳水化合物的核心要点是什么？
  answer: '英文名: Carbohydrates；每日推荐摄入量: 占总能量45-65%；主要功能: 主要能量来源（尤其大脑）、糖原储备、膳食纤维促进肠道健康；主要食物来源: 全谷物、薯类、水果、蔬菜、豆类；消化吸收机制: 淀粉酶（Amylase）水解为单糖（葡萄糖），经小肠吸收；纤维不被消化但促进蠕动；缺乏后果:
    低血糖、疲劳、脑功能下降、酮体生成；过量风险: 肥胖、胰岛素抵抗、2型糖尿病、龋齿'
  source: 03-Bio-Science/foods/nutritional/Nutrition_Fundamentals.md
  section: 宏量营养素概览表 (Macronutrients Overview)
- type: concept
  question: 脂肪的核心要点是什么？
  answer: '英文名: Lipids / Fats；每日推荐摄入量: 占总能量20-35%；主要功能: 能量储备、细胞膜构成、脂溶性维生素吸收、激素合成、神经髓鞘；主要食物来源: 植物油、坚果、鱼类、牛油果、黄油；消化吸收机制: 胆汁乳化→脂肪酶（Lipase）水解为脂肪酸和甘油→经淋巴系统吸收入血；缺乏后果:
    皮肤干燥、脂溶性维生素缺乏、激素紊乱、体温调节障碍；过量风险: 心血管疾病、肥胖、脂肪肝、慢性炎症'
  source: 03-Bio-Science/foods/nutritional/Nutrition_Fundamentals.md
  section: 宏量营养素概览表 (Macronutrients Overview)
- type: concept
  question: 水溶性维生素的核心要点是什么？
  answer: '代表营养素: 维生素B1；英文名: Thiamine (B1)；每日推荐量（成人）: 1.1-1.2mg；核心功能: 糖代谢辅酶、神经传导；主要来源: 全谷物、猪肉、豆类；缺乏症状: 脚气病、韦尼克脑病（Wernicke''s
    Encephalopathy）；心理健康关联: 缺乏致认知障碍、情绪不稳'
  source: 03-Bio-Science/foods/nutritional/Nutrition_Fundamentals.md
  section: 微量营养素概览表 (Micronutrients Overview)
- type: concept
  question: 维生素B6的核心要点是什么？
  answer: '代表营养素: Pyridoxine (B6)；英文名: 1.3-1.7mg；每日推荐量（成人）: 氨基酸代谢、神经递质合成（血清素、多巴胺、GABA）；核心功能: 禽肉、鱼类、香蕉、土豆；主要来源: 贫血、皮炎、抑郁；缺乏症状:
    直接参与血清素合成，缺乏与抑郁密切相关'
  source: 03-Bio-Science/foods/nutritional/Nutrition_Fundamentals.md
  section: 微量营养素概览表 (Micronutrients Overview)
- type: concept
  question: 维生素B12的核心要点是什么？
  answer: '代表营养素: Cobalamin (B12)；英文名: 2.4μg；每日推荐量（成人）: DNA合成、髓鞘形成、同型半胱氨酸代谢；核心功能: 动物性食物（肉、蛋、奶）；主要来源: 巨幼红细胞贫血、神经损伤；缺乏症状: 缺乏致抑郁、认知下降、周围神经病变'
  source: 03-Bio-Science/foods/nutritional/Nutrition_Fundamentals.md
  section: 微量营养素概览表 (Micronutrients Overview)
- type: concept
  question: RDA的核心要点是什么？
  answer: '英文全称: Recommended Dietary Allowance；定义: 满足97-98%健康人群需求的每日摄入量；用途: 个体膳食规划的黄金标准；注意事项: 不适用于特殊疾病状态'
  source: 03-Bio-Science/foods/nutritional/Nutrition_Fundamentals.md
  section: 膳食参考摄入量体系表 (Dietary Reference Intakes)
- type: concept
  question: EAR的核心要点是什么？
  answer: '英文全称: Estimated Average Requirement；定义: 满足50%健康人群需求的平均摄入量；用途: 群体营养评估与政策制定；注意事项: 不能直接用于个体评估'
  source: 03-Bio-Science/foods/nutritional/Nutrition_Fundamentals.md
  section: 膳食参考摄入量体系表 (Dietary Reference Intakes)
- type: concept
  question: 营养精神病学的核心要点是什么？
  answer: '英文名: Nutritional Psychiatry；定义: 研究饮食与心理健康关系的学科分支，强调"食物即精神药物"（Food is Mental Medicine）；研究证据: 2017年SMILES试验首次RCT证明地中海饮食改善抑郁；临床意义:
    饮食干预可作为抑郁症的辅助或预防手段'
  source: 03-Bio-Science/foods/nutritional/Nutrition_Mental_Health.md
  section: 营养精神病学核心术语表 (Nutritional Psychiatry Key Terms)
- type: concept
  question: 肠-脑轴的核心要点是什么？
  answer: '英文名: Gut-Brain Axis；定义: 肠道与大脑之间的双向通讯系统，涉及神经（迷走神经）、免疫、内分泌与微生物通路；研究证据: 动物模型与人类研究均证实菌群影响情绪与行为；临床意义: 肠道菌群调节成为心理健康干预新靶点'
  source: 03-Bio-Science/foods/nutritional/Nutrition_Mental_Health.md
  section: 营养精神病学核心术语表 (Nutritional Psychiatry Key Terms)
- type: concept
  question: 肠道菌群的核心要点是什么？
  answer: '英文名: Gut Microbiota；定义: 栖息于人体消化道的数万亿微生物群落，参与消化、免疫调节与神经递质合成；研究证据: 多项研究显示抑郁症患者菌群多样性降低；临床意义: 益生菌（Psychobiotics）干预是新兴治疗方向'
  source: 03-Bio-Science/foods/nutritional/Nutrition_Mental_Health.md
  section: 营养精神病学核心术语表 (Nutritional Psychiatry Key Terms)
- type: concept
  question: 迷走神经的核心要点是什么？
  answer: '方向: 肠→脑（主要）；机制描述: 肠道感觉神经元通过迷走神经（Vagus Nerve）将信号传递至脑干孤束核，影响情绪与压力反应；影响因素: 肠道菌群代谢产物、机械刺激、化学刺激；心理健康关联: 迷走神经刺激（VNS）已被FDA批准用于难治性抑郁；干预手段:
    深呼吸、冥想可增强迷走神经张力（HRV提升）'
  source: 03-Bio-Science/foods/nutritional/Nutrition_Mental_Health.md
  section: 肠-脑轴通讯通路表 (Gut-Brain Axis Communication Pathways)
- type: concept
  question: 神经递质合成的核心要点是什么？
  answer: '方向: 肠→局部→脑；机制描述: 肠道菌群与肠嗜铬细胞合成约95%的血清素（5-HT前体）、GABA、多巴胺等；影响因素: 菌群组成、饮食成分、应激状态；心理健康关联: 肠道血清素虽不直接入脑，但通过迷走神经和血小板转运影响中枢；干预手段:
    益生菌、膳食纤维（益生元）支持菌群平衡'
  source: 03-Bio-Science/foods/nutritional/Nutrition_Mental_Health.md
  section: 肠-脑轴通讯通路表 (Gut-Brain Axis Communication Pathways)
- type: concept
  question: 短链脂肪酸的核心要点是什么？
  answer: '方向: 肠→全身→脑；机制描述: 肠道菌群发酵膳食纤维产生丁酸（Butyrate）、丙酸（Propionate）、乙酸（Acetate）；影响因素: 膳食纤维摄入量、菌群多样性；心理健康关联: 丁酸具有抗炎、组蛋白去乙酰化酶抑制（HDAC
    inhibition）功能，可穿越血脑屏障；干预手段: 增加膳食纤维摄入（25-35g/d）'
  source: 03-Bio-Science/foods/nutritional/Nutrition_Mental_Health.md
  section: 肠-脑轴通讯通路表 (Gut-Brain Axis Communication Pathways)
- type: concept
  question: 抗炎作用的核心要点是什么？
  answer: '英文名: Anti-inflammatory Effect；具体过程: EPA竞争性抑制花生四烯酸（AA）代谢，减少促炎前列腺素和白三烯产生；证据等级: 高（多项meta-analysis）；临床应用提示: EPA对抑郁的疗效优于DHA；推荐EPA≥1g/d'
  source: 03-Bio-Science/foods/nutritional/Nutrition_Mental_Health.md
  section: ω-3脂肪酸与抑郁机制表 (Omega-3 and Depression Mechanisms)
- type: concept
  question: 神经膜稳定的核心要点是什么？
  answer: '英文名: Neuronal Membrane Fluidity；具体过程: DHA占大脑磷脂的40%，维持膜流动性以保障受体功能与信号传导；证据等级: 中-高；临床应用提示: DHA对认知功能的益处更显著'
  source: 03-Bio-Science/foods/nutritional/Nutrition_Mental_Health.md
  section: ω-3脂肪酸与抑郁机制表 (Omega-3 and Depression Mechanisms)
- type: concept
  question: 食疗/饮食疗法的核心要点是什么？
  answer: '英文名 (English Term): Nutritional Therapy / Dietary Therapy；原始语言/术语 (Original Language): 希: *Diaita* (生活方式)；词源含义:
    通过调整饮食结构、营养素配比与进食方式,达到预防疾病与促进康复的目的；精确定义: 不仅是"吃什么",还包括"怎么吃""何时吃""与谁吃"；区分与备注: 与营养学(Nutrition)不同,食疗强调治疗性应用；专业视角 (Professional
    Perspective): 需循证支持,避免夸大或替代必要医疗'
  source: 03-Bio-Science/foods/nutritional/Nutritional_Natural_Therapy.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 本草食疗的核心要点是什么？
  answer: '英文名 (English Term): Herbal Dietary Therapy；原始语言/术语 (Original Language): 中: 药食同源；词源含义: 中医传统中"药食同源"理念,利用药性温和的本草作为日常食材；精确定义:
    如枸杞、山药、红枣、生姜等；区分与备注: 与西方植物疗法(Phytotherapy)有重叠但理论体系不同；专业视角 (Professional Perspective): 需注意药物相互作用与个体体质差异'
  source: 03-Bio-Science/foods/nutritional/Nutritional_Natural_Therapy.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 自然疗法的核心要点是什么？
  answer: '英文名 (English Term): Naturopathy / Natural Medicine；原始语言/术语 (Original Language): 拉: *Natura* (自然) + *Pathos* (疾病)；词源含义:
    强调利用自然手段(饮食、草本、水疗、日光、运动)激发人体自愈力；精确定义: 19世纪末欧美兴起,强调"自然之力即医疗之力"；区分与备注: 与循证医学有张力,需谨慎区分"辅助"与"替代"；专业视角 (Professional Perspective):
    可作为整合医学(Integrative Medicine)的一部分,但不应排斥必要的现代医疗'
  source: 03-Bio-Science/foods/nutritional/Nutritional_Natural_Therapy.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: ω-3脂肪酸(EPA/DHA)的核心要点是什么？
  answer: '英文名: Omega-3 Fatty Acids；主要食物来源: 深海鱼(三文鱼/沙丁鱼/鲭鱼)、亚麻籽、核桃；神经/心理机制: 抗炎、神经膜稳定、神经递质合成；缺乏/失衡后果: 增加抑郁/焦虑风险、认知下降；干预证据:
    EPA≥1g/d改善抑郁(meta-analysis)；专业提示: 素食者需补充藻油DHA,注意EPA:DHA比例'
  source: 03-Bio-Science/foods/nutritional/Nutritional_Natural_Therapy.md
  section: 营养精神病学核心关系表 (Nutritional Psychiatry Core Links)
- type: concept
  question: B族维生素(B6/B9/B12)的核心要点是什么？
  answer: '英文名: B Vitamins；主要食物来源: B12:动物性食物; B9(叶酸):绿叶菜、豆类; B6:全谷物；神经/心理机制: 甲基化循环、同型半胱氨酸代谢、神经递质合成；缺乏/失衡后果: B12缺乏致抑郁、认知障碍;
    叶酸缺乏致神经管缺陷与情绪障碍；干预证据: 叶酸强化与B12补充改善部分抑郁个案；专业提示: 长期素食者、老年人、胃肠疾病患者高风险,需定期检测'
  source: 03-Bio-Science/foods/nutritional/Nutritional_Natural_Therapy.md
  section: 营养精神病学核心关系表 (Nutritional Psychiatry Core Links)
- type: concept
  question: 维生素D的核心要点是什么？
  answer: '英文名: Vitamin D；主要食物来源: 日光、蛋黄、强化奶制品、深海鱼；神经/心理机制: 神经保护、免疫调节、血清素合成；缺乏/失衡后果: 缺乏与抑郁、季节性情绪障碍(SAD)相关；干预证据: 补充改善SAD与部分抑郁(中等证据)；专业提示:
    需检测血清25(OH)D水平,目标>30ng/mL,过量有毒性'
  source: 03-Bio-Science/foods/nutritional/Nutritional_Natural_Therapy.md
  section: 营养精神病学核心关系表 (Nutritional Psychiatry Core Links)
- type: concept
  question: 抑郁障碍的核心要点是什么？
  answer: '饮食模式建议: 地中海饮食、DASH饮食；关键营养素: ω-3、叶酸、B12、维生素D、锌；避免/限制: 高糖、加工食品、反式脂肪；循证等级: 中-高(SMILES研究:地中海饮食显著改善抑郁)；临床整合要点: 不能替代药物/心理治疗,作为辅助干预;需数周-数月见效'
  source: 03-Bio-Science/foods/nutritional/Nutritional_Natural_Therapy.md
  section: 心理障碍的食疗干预路径表 (Dietary Interventions for Mental Disorders)
- type: concept
  question: 焦虑障碍的核心要点是什么？
  answer: '饮食模式建议: 低咖啡因、高镁、复杂碳水化合物；关键营养素: 镁、B6、ω-3、益生菌；避免/限制: 咖啡因、酒精、高糖；循证等级: 低-中(部分营养素有小样本支持)；临床整合要点: 与CBT/正念结合,强调"饮食-焦虑日记"识别个体触发食物'
  source: 03-Bio-Science/foods/nutritional/Nutritional_Natural_Therapy.md
  section: 心理障碍的食疗干预路径表 (Dietary Interventions for Mental Disorders)
- type: concept
  question: 素食/纯素的核心要点是什么？
  answer: '英文名: Vegetarian / Vegan；核心原则: 不食肉（素食）或不食任何动物制品（纯素）；起源/背景: 宗教（佛教/耆那教）、伦理、环保、健康；主要变体: 蛋奶素（Lacto-Ovo）、鱼素（Pescatarian）、弹性素食（Flexitarian）；适用场景:
    伦理信念、心血管疾病预防、代谢综合征'
  source: 03-Bio-Science/foods/nutritional/Special_Diets_Guide.md
  section: 特殊饮食模式分类表 (Classification of Special Dietary Patterns)
- type: concept
  question: 生酮饮食的核心要点是什么？
  answer: '英文名: Ketogenic Diet (Keto)；核心原则: 极低碳水（<50g/d）、高脂肪（70-80%）、适量蛋白质；起源/背景: 1920年代用于儿童癫痫治疗，近年扩展至减重与代谢；主要变体: 标准生酮（SKD）、周期生酮（CKD）、靶向生酮（TKD）；适用场景:
    癫痫（儿童）、2型糖尿病、肥胖、PCOS'
  source: 03-Bio-Science/foods/nutritional/Special_Diets_Guide.md
  section: 特殊饮食模式分类表 (Classification of Special Dietary Patterns)
- type: concept
  question: 间歇性断食的核心要点是什么？
  answer: '英文名: Intermittent Fasting (IF)；核心原则: 限制进食时间窗口，而非限制热量；起源/背景: 古代宗教禁食传统→现代科学研究；主要变体: 16:8、5:2、隔日断食（ADF）、限时进食（TRE）；适用场景:
    减重、代谢改善、认知增强、抗衰老'
  source: 03-Bio-Science/foods/nutritional/Special_Diets_Guide.md
  section: 特殊饮食模式分类表 (Classification of Special Dietary Patterns)
- type: concept
  question: 维生素B12的核心要点是什么？
  answer: '素食者风险: 中风险；纯素者风险: 极高风险；植物来源: 几乎无可靠植物来源（螺旋藻/海藻含假B12）；吸收率问题: 优先使用氰钴胺（Cyanocobalamin）或甲钴胺（Methylcobalamin）补充；补充策略:
    纯素者必须补充（1000μg/周或每日小剂量）；检测建议: 每年检测血清B12与同型半胱氨酸'
  source: 03-Bio-Science/foods/nutritional/Special_Diets_Guide.md
  section: 素食饮食营养管理表 (Vegetarian/Vegan Nutrition Management)
- type: concept
  question: ω-3脂肪酸（EPA/DHA）的核心要点是什么？
  answer: '素食者风险: 中风险；纯素者风险: 高风险；植物来源: 亚麻籽、核桃、奇亚籽（仅含ALA）；吸收率问题: ALA→EPA转化率仅5-10%，ALA→DHA转化率<5%；补充策略: 纯素者补充藻油DHA（Algal DHA,
    200-300mg/d）；检测建议: ω-3指数检测（目标>8%）'
  source: 03-Bio-Science/foods/nutritional/Special_Diets_Guide.md
  section: 素食饮食营养管理表 (Vegetarian/Vegan Nutrition Management)
- type: concept
  question: 蛋白质的核心要点是什么？
  answer: '素食者风险: 低风险；纯素者风险: 低-中风险；植物来源: 大豆、豆类、藜麦、坚果、种子；吸收率问题: 植物蛋白多为不完全蛋白，需搭配；补充策略: 大豆蛋白是完全蛋白；多样化搭配可互补氨基酸；检测建议: 一般不需额外检测'
  source: 03-Bio-Science/foods/nutritional/Special_Diets_Guide.md
  section: 素食饮食营养管理表 (Vegetarian/Vegan Nutrition Management)
- type: concept
  question: 生酮原理的核心要点是什么？
  answer: '内容: 碳水摄入<50g/d→肝糖原耗竭（2-3天）→肝脏将脂肪酸转化为酮体（β-羟基丁酸BHB、乙酰乙酸AcAc、丙酮）→酮体替代葡萄糖成为大脑和肌肉的主要能源'
  source: 03-Bio-Science/foods/nutritional/Special_Diets_Guide.md
  section: 生酮饮食机制与实践表 (Ketogenic Diet Mechanisms and Practice)
- type: concept
  question: 神经保护机制的核心要点是什么？
  answer: '内容: 酮体作为高效燃料（每克产ATP多于葡萄糖）；抑制谷氨酸兴奋性毒性；增加GABA合成；提升BDNF；线粒体生物发生增强'
  source: 03-Bio-Science/foods/nutritional/Special_Diets_Guide.md
  section: 生酮饮食机制与实践表 (Ketogenic Diet Mechanisms and Practice)
