  answer: '参数设置: 90-94°C；风味特点: 平衡萃取，避免烫伤娇嫩豆；专业提示: 高海拔豆可用稍高温度'
  source: 03-Bio-Science/foods/coffee/Coffee_Brewing_Techniques.md
  section: 2.1 手冲咖啡 (Pour Over Coffee)
