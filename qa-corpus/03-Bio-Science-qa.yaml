- type: concept
  question: 推拿的核心要点是什么？
  answer: '英文名 (English Term): Tuina Massage；原始语言/术语 (Original Language): 古汉语: 推者往也，拿者举也；精确定义 (Technical Definition): 以手法作用于人体体表特定部位，通过力学刺激调节脏腑功能、疏通经络、调和气血的中医外治疗法。；区分与备注
    (Differentiation & Notes): 区别于单纯按摩，强调中医理论指导下的系统性治疗。；专业视角 (Professional Perspective): 需要扎实的中医基础理论和经络腧穴知识。'
  source: 03-Bio-Science/biology/tuina/Tuina_Overview.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 手法的核心要点是什么？
  answer: '英文名 (English Term): Manipulation Technique；原始语言/术语 (Original Language): 中医术语；精确定义 (Technical Definition): 推拿治疗中运用的各种手部动作技巧，包括摆动、摩擦、挤压、叩击、振动等基本手法类别。；区分与备注
    (Differentiation & Notes): 手法的力度、频率、方向都有严格的规范要求。；专业视角 (Professional Perspective): 手法是推拿治疗效果的关键技术要素。'
  source: 03-Bio-Science/biology/tuina/Tuina_Overview.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 经络的核心要点是什么？
  answer: '英文名 (English Term): Meridian System；原始语言/术语 (Original Language): 中医理论；精确定义 (Technical Definition): 运行气血、联络脏腑肢节、沟通上下内外的通路系统，包括十二正经、奇经八脉及其分支。；区分与备注
    (Differentiation & Notes): 经络是推拿取穴和传导治疗效应的理论基础。；专业视角 (Professional Perspective): 经络理论是中医推拿区别于其他按摩疗法的核心特色。'
  source: 03-Bio-Science/biology/tuina/Tuina_Overview.md
  section: 核心术语表 (Core Terminology)
