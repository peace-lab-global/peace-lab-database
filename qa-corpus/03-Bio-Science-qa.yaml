  question: 1936的核心要点是什么？
  answer: '理论/模型: 一般适应综合征(GAS)；提出者: Hans Selye；核心概念: 警觉-抵抗-衰竭三阶段；非特异性反应；贡献: 应激医学奠基；HPA轴核心地位；局限: 过于机械'
