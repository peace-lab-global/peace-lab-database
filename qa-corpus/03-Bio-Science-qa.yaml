  question: 什么是临床与实践要点？
  answer: '- **评估流程**：症状 + 多次晨间激素测定 + 伴随疾病评估。

    - **生活方式干预**：阻力训练、体重管理、充足睡眠可改善症状。

    - **激素治疗**：需严格指征，评估前列腺与心血管风险。'
