  question: 什么是风险、伦理与注意事项？
  answer: '- **避免“青春回春”营销**：非指征性使用睾酮存在风险。

    - **监测与随访**：治疗期间需监测血红蛋白、PSA、心血管状态。

    - **心理层面**：将性健康与整体生活质量结合，而非单一表现。'
  source: 03-Bio-Science/sexuality/male-sexual-health/Aging_Androgen_Changes.md
