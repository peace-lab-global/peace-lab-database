  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 社会认可的核心要点是什么？
  answer: '人类丧亲: 通常被认可和支持；宠物丧失: 常被轻视（"只是只动物""再养一只就好了"）'
