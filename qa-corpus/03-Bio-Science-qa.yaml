  question: 随机对照试验(RCT)的核心要点是什么？
  answer: '核心特征: 随机分配到实验组/对照组，严格控制变量；优势: 因果推断最强，内部效度高；局限性: 外部效度受限，伦理复杂性高；伦理考量: 需要充分知情同意，最小风险原则；典型应用: 药物疗效验证、治疗方法比较'
  source: 03-Bio-Science/sexuality/Sexuality_Research_Methods.md
  section: 实验研究设计矩阵
- type: concept
  question: 准实验设计的核心要点是什么？
  answer: '核心特征: 无法随机分配，使用匹配或统计控制；优势: 现实可行性高，伦理障碍较少；局限性: 选择偏差风险，因果推断较弱；伦理考量: 需要仔细控制混杂变量；典型应用: 社区干预效果评估'
  source: 03-Bio-Science/sexuality/Sexuality_Research_Methods.md
  section: 实验研究设计矩阵
