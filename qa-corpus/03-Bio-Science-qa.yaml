  question: 咖啡仪式的核心要点是什么？
  answer: '英文名 (English Term): Coffee Ceremony；原始语言/术语 (Original Language): 埃塞俄比亚阿姆哈拉语: *Buna* (ቡና) 仪式；词源含义: "Buna"即咖啡,仪式称为"Buna
    Tetu"(喝咖啡)；精确定义: 源于埃塞俄比亚的传统社交-灵性仪式,包含烘焙、研磨、三轮冲煮、焚香、祝福；治疗意涵: 社交连接、时间馈赠、正念锚定、灵性表达；专业视角 (Professional Perspective): 非洲版"茶道",历时1-3小时,体现"慢"与"共在"的价值'
  source: 03-Bio-Science/foods/coffee/Coffee_Ritual_Mindfulness.md
  section: 咖啡仪式核心术语表 (Coffee Ritual Core Terminology)
- type: concept
  question: 正念咖啡的核心要点是什么？
  answer: '英文名 (English Term): Mindful Coffee；原始语言/术语 (Original Language): -；词源含义: 将正念觉察原则应用于咖啡制作与品饮；精确定义: 有意识地觉察咖啡制作与品饮的每一步骤,作为冥想练习载体；治疗意涵:
    锚定当下、感官训练、打断自动化；专业视角 (Professional Perspective): 将日常行为转化为正念练习的典型应用'
  source: 03-Bio-Science/foods/coffee/Coffee_Ritual_Mindfulness.md
  section: 咖啡仪式核心术语表 (Coffee Ritual Core Terminology)
- type: concept
  question: 咖啡冥想的核心要点是什么？
  answer: '英文名 (English Term): Coffee Meditation；原始语言/术语 (Original Language): -；词源含义: 以咖啡为冥想对象或辅助的冥想形式；精确定义: 可以是专注于咖啡的香气/味道(定境),或开放觉察咖啡体验(观境)；治疗意涵:
    入定门槛低、感官愉悦、易于坚持；专业视角 (Professional Perspective): 对传统冥想困难者的"入门斜坡"'
