  source: 03-Bio-Science/death/Death_Grief_Technology.md
  section: 1.1 主要平台与技术
- type: concept
  question: 持续的对话感的核心要点是什么？
  answer: 'AI纪念的满足方式: "我还可以问他意见"；潜在风险: 可能阻碍哀伤 closure;混淆现实与模拟'
