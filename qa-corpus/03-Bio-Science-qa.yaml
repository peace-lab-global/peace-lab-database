  answer: '典型表现: "如果生了女儿，我的人生就完了"；核心信念: 性别结果与人生成败等同；焦虑强化效应: 极度恐惧，回避检查'
  source: 03-Bio-Science/sexuality/gender-discrimination/birth-gender-anxiety/Birth_Gender_Anxiety_Psychological_Mechanisms.md
  section: 认知歪曲模式 (Cognitive Distortion Patterns)
- type: concept
  question: 非黑即白的核心要点是什么？
  answer: '典型表现: "不是儿子就是失败"；核心信念: 只有两种结果，无中间地带；焦虑强化效应: 排斥多元可能性'
  source: 03-Bio-Science/sexuality/gender-discrimination/birth-gender-anxiety/Birth_Gender_Anxiety_Psychological_Mechanisms.md
  section: 认知歪曲模式 (Cognitive Distortion Patterns)
- type: concept
  question: 过度概括的核心要点是什么？
  answer: '典型表现: "我家族就是生女儿的命"；核心信念: 个别经验推广为普遍规律；焦虑强化效应: 宿命感，无力感'
  source: 03-Bio-Science/sexuality/gender-discrimination/birth-gender-anxiety/Birth_Gender_Anxiety_Psychological_Mechanisms.md
  section: 认知歪曲模式 (Cognitive Distortion Patterns)
- type: concept
  question: 初级评估的核心要点是什么？
  answer: '评估内容: 性别结果的威胁性；典型思维: "生女儿会威胁我的婚姻/地位"；情绪反应: 恐惧、担忧'
  source: 03-Bio-Science/sexuality/gender-discrimination/birth-gender-anxiety/Birth_Gender_Anxiety_Psychological_Mechanisms.md
  section: 认知评估过程 (Cognitive Appraisal Process)
- type: concept
  question: 次级评估的核心要点是什么？
  answer: '评估内容: 自身应对资源；典型思维: "我没有能力控制性别结果"；情绪反应: 无力感、绝望'
  source: 03-Bio-Science/sexuality/gender-discrimination/birth-gender-anxiety/Birth_Gender_Anxiety_Psychological_Mechanisms.md
  section: 认知评估过程 (Cognitive Appraisal Process)
- type: concept
  question: 再评估的核心要点是什么？
  answer: '评估内容: 情境的可改变性；典型思维: "即使努力也无法改变"；情绪反应: 习得性无助'
  source: 03-Bio-Science/sexuality/gender-discrimination/birth-gender-anxiety/Birth_Gender_Anxiety_Psychological_Mechanisms.md
  section: 认知评估过程 (Cognitive Appraisal Process)
- type: concept
  question: 潜伏期的核心要点是什么？
  answer: '时间节点: 备孕阶段；情绪特征: 隐性担忧，模糊不安；行为表现: 搜索"生男秘方"，询问有经验者'
