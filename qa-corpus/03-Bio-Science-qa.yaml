- type: concept
  question: 剂量的核心要点是什么？
  answer: '药物处方: mg/次；运动处方: 强度 (%HRmax/RPE)、时间 (min)'
  source: 03-Bio-Science/biology/exercise-science/Exercise_Prescription_Clinical.md
  section: 1.1 "运动即良药" (Exercise is Medicine, EIM)
- type: concept
  question: 频率的核心要点是什么？
  answer: '英文: Frequency；临床考量: 慢性病患者起步 2-3 次/周'
