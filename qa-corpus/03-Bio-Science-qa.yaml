  section: 焦虑情绪的发展轨迹 (Developmental Trajectory of Anxiety)
- type: concept
  question: 激活期的核心要点是什么？
  answer: '时间节点: 确认怀孕后；情绪特征: 焦虑被激活，期待与恐惧并存；行为表现: 频繁检查，解读胎动'
  source: 03-Bio-Science/sexuality/gender-discrimination/birth-gender-anxiety/Birth_Gender_Anxiety_Psychological_Mechanisms.md
  section: 焦虑情绪的发展轨迹 (Developmental Trajectory of Anxiety)
