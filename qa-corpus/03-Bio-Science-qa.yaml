- type: concept
  question: 向死而生的核心要点是什么？
  answer: '英文名 (English Term): Being-toward-Death；原始语言/术语 (Original Language): 德: *Sein zum Tode*；词源/哲学背景: 海德格尔《存在与时间》中的关键概念；精确定义:
    人通过对自身必死性的清醒觉知,而非逃避,反而活得更真实、更有决断；专业视角 (Professional Perspective): 在心理治疗中,对应"有限性意识 + 真实选择 + 责任承担",是存在疗法的核心'
  source: 03-Bio-Science/death/Death_Existential_Psychology.md
  section: 核心术语与词源表 (Core Concepts & Etymology)
- type: concept
  question: 此在的核心要点是什么？
  answer: '英文名 (English Term): Dasein；原始语言/术语 (Original Language): 德: *Da-sein* (在那里存在)；词源/哲学背景: 人不是抽象实体,而是"在世界中的存在"；精确定义:
    每个人总在具体情境与时间中作出选择,无法抽离；专业视角 (Professional Perspective): 死亡使此在的选择具有不可替代性,构成"我的人生"而非任何人的复制'
  source: 03-Bio-Science/death/Death_Existential_Psychology.md
  section: 核心术语与词源表 (Core Concepts & Etymology)
- type: concept
  question: 本真性的核心要点是什么？
  answer: '英文名 (English Term): Authenticity；原始语言/术语 (Original Language): 德: *Eigentlichkeit* (出自 *eigen*, 自己的)；词源/哲学背景: 非道德意义上的"诚实",而是对自身可能性的清醒承担；精确定义:
    不随波逐流,在理解有限性的前提下主动选择；专业视角 (Professional Perspective): 治疗目标不是"快乐",而是"真实"'
  source: 03-Bio-Science/death/Death_Existential_Psychology.md
  section: 核心术语与词源表 (Core Concepts & Etymology)
- type: concept
  question: 向死而生的核心要点是什么？
  answer: '德文原文: *Sein zum Tode*；含义: 死亡不是外在于生命的事件,而是内在于此在存在的结构;人从始至终都以"会死"的方式存在；治疗转化: 帮助来访者体验:死亡不是未来的某个点,而是此刻选择的背景条件'
  source: 03-Bio-Science/death/Death_Existential_Psychology.md
  section: 1.1 核心命题表
- type: concept
  question: 先行到死中去的核心要点是什么？
  answer: '德文原文: *Vorlaufen in den Tod*；含义: 不是悲观地等待死亡,而是在思想上"先行"进入死亡,从而回收生命的整体可能性；治疗转化: 墓志铭练习、剩余时间练习的理论根源'
  source: 03-Bio-Science/death/Death_Existential_Psychology.md
  section: 1.1 核心命题表
- type: concept
  question: 畏揭示虚无的核心要点是什么？
  answer: '德文原文: *Angst offenbart das Nichts*；含义: 在畏中,此在体验到世界整体意义的崩塌,但这种"无"同时召唤出"有"——即自由创造意义的可能；治疗转化: 焦虑发作、存在危机可被重新框架为觉醒的窗口期'
  source: 03-Bio-Science/death/Death_Existential_Psychology.md
  section: 1.1 核心命题表
- type: concept
  question: 时间观的核心要点是什么？
  answer: '非本真态度 (常人): "来日方长"——把死亡推延到遥远未来；本真态度 (向死而生): "随时可能"——死亡使此刻成为不可重复的决断时机'
  source: 03-Bio-Science/death/Death_Existential_Psychology.md
  section: 1.2 本真性 vs. 非本真性的死亡态度
- type: concept
  question: 选择观的核心要点是什么？
  answer: '非本真态度 (常人): 随波逐流,选择"大家都选的"；本真态度 (向死而生): 主动选择,明知有限仍承担后果'
  source: 03-Bio-Science/death/Death_Existential_Psychology.md
  section: 1.2 本真性 vs. 非本真性的死亡态度
- type: concept
  question: 预感性哀伤的核心要点是什么？
  answer: '英文名: Anticipatory Grief；词源: 哀伤研究；精确定义: 在丧亲实际发生前（如亲人被诊断绝症）提前经历的哀伤反应'
  source: 03-Bio-Science/death/Death_Grief_Bridge.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 发展性哀伤的核心要点是什么？
  answer: '英文名: Developmental Grief；词源: 儿童哀伤；精确定义: 哀伤随个体认知发展阶段而重新出现和转化'
  source: 03-Bio-Science/death/Death_Grief_Bridge.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 存在性哀伤的核心要点是什么？
  answer: '英文名: Existential Grief；词源: 存在主义心理学；精确定义: 因意识到存在的有限性、无意义性而产生的深层哀伤'
  source: 03-Bio-Science/death/Death_Grief_Bridge.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 时间的核心要点是什么？
  answer: '预感性哀伤: 丧亲前（如亲人绝症诊断后）；事后哀伤: 丧亲后'
  source: 03-Bio-Science/death/Death_Grief_Bridge.md
  section: 1.1 定义与特征
- type: concept
  question: 情感内容的核心要点是什么？
  answer: '预感性哀伤: 悲伤、预期性丧失、内疚（"我是不是已经放弃了？"）、对未来的恐惧；事后哀伤: 悲伤、空虚、对过去的怀念'
  source: 03-Bio-Science/death/Death_Grief_Bridge.md
  section: 1.1 定义与特征
- type: concept
  question: 功能影响的核心要点是什么？
  answer: '预感性哀伤: 可能影响照护质量；也可能帮助提前完成心理调整；事后哀伤: 社会功能下降'
  source: 03-Bio-Science/death/Death_Grief_Bridge.md
  section: 1.1 定义与特征
- type: concept
  question: 数字哀伤的核心要点是什么？
  answer: '英文名: Digital Grief；来源: 学术/产业；精确定义: 通过数字技术进行的哀悼行为,包括社交媒体发帖、AI聊天、虚拟纪念等'
  source: 03-Bio-Science/death/Death_Grief_Technology.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: AI 纪念聊天的核心要点是什么？
  answer: '英文名: AI Memorial Chatbot；来源: 产业；精确定义: 用逝者生前的数字足迹训练的对话AI,家属可与其"对话"'
  source: 03-Bio-Science/death/Death_Grief_Technology.md
