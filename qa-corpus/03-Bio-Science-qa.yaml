- type: concept
  question: 什么是核心概念 (Core Concept)？
  answer: '**生育性别焦虑 (Birth Gender Anxiety, BGA)** 是指准父母或备孕家庭成员因对胎儿/新生儿性别的期望与现实或预期结果不符而产生的持续性心理困扰状态。该焦虑通常根植于传统文化观念（尤其是"重男轻女"思想）、家族压力、经济考量及社会期待的复合作用。'
  source: 03-Bio-Science/sexuality/gender-discrimination/birth-gender-anxiety/INDEX.md
  section: 核心概念 (Core Concept)
