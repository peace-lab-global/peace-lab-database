  question: 自慰态度量表(ATMS)的核心要点是什么？
  answer: '开发者/年份: Abramson & Mosher, 1975；维度/因子: 正面体验、负面态度；题目数: 30题；信度(α): α=0.87-0.93；测重测(r): r=0.85；适用人群: 成人；评估内容: 对自慰的认知与情感态度'
  source: 03-Bio-Science/sexuality/masturbation-psychology/Masturbation_Assessment_Intervention.md
  section: 自慰态度与行为评估量表
- type: concept
  question: Mosher性罪疚量表(MRSS)的核心要点是什么？
  answer: '开发者/年份: Mosher, 1966; 修订1998；维度/因子: 性罪疚感总分；题目数: 50题(完整)/28题(简版)；信度(α): α=0.90-0.95；测重测(r): r=0.82；适用人群: 成人；评估内容:
