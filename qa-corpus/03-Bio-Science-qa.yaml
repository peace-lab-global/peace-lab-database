  section: 1.2 三法印与死亡
- type: concept
  question: 宁静的核心要点是什么？
  answer: '英文名 (English Term): Ataraxia；原始语言/词源: 希腊: *Ataraxia* (ἀταραξία, "不受扰动")；精确定义: 心灵的完全平静,不受恐惧与欲望扰动；代表哲学家: Epicurus；专业视角:
    死亡哲学的终极目标:通过理性克服死亡恐惧'
