  question: 约束型文化的核心要点是什么？
  answer: '核心特征: 强调性道德纯洁性，婚前贞操重视；性规范特点: 严格的性行为规范，异性恋婚姻中心化；社会控制机制: 宗教教义、家庭教育为主要控制手段；典型代表地区: 中东、北非、部分亚洲国家；现代变迁趋势: 全球化进程带来观念冲突与融合'
  source: 03-Bio-Science/sexuality/Sexuality_Cultural_Variations.md
  section: 霍尔斯特德性文化四象限模型
