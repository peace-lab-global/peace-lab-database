- type: concept
  question: 强度的核心要点是什么？
  answer: '英文: Intensity；临床考量: 从低强度开始，渐进增加'
  source: 03-Bio-Science/biology/exercise-science/Exercise_Prescription_Clinical.md
  section: 1.2 运动处方的 FITT-VP 框架
- type: concept
  question: 时间的核心要点是什么？
  answer: '英文: Time；临床考量: 可分段累积 (如 3×10 min)'
  source: 03-Bio-Science/biology/exercise-science/Exercise_Prescription_Clinical.md
  section: 1.2 运动处方的 FITT-VP 框架
- type: concept
  question: 有氧运动的核心要点是什么？
  answer: '推荐: 150 min/周中等强度 或 75 min/周高强度；证据/注意事项: 降低 HbA1c 0.5-0.7%'
  source: 03-Bio-Science/biology/exercise-science/Exercise_Prescription_Clinical.md
  section: 2.1 2 型糖尿病 (Type 2 Diabetes Mellitus)
- type: concept
  question: 抗阻训练的核心要点是什么？
  answer: '推荐: ≥2 次/周，8-10 个动作，2-3 组×10-15 次；证据/注意事项: 改善胰岛素敏感性'
  source: 03-Bio-Science/biology/exercise-science/Exercise_Prescription_Clinical.md
  section: 2.1 2 型糖尿病 (Type 2 Diabetes Mellitus)
- type: concept
  question: 生理学** (Physiology)的核心要点是什么？
  answer: '核心关注: 运动时的能量代谢、心肺适应、肌肉收缩；代表学科: 运动生理学'
