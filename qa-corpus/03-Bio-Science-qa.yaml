  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 人类-动物纽带的核心要点是什么？
  answer: '英文名: Human-Animal Bond (HAB)；词源/来源: 人类动物互动研究；精确定义: 人类与动物之间的情感连接；对双方健康都有影响'
