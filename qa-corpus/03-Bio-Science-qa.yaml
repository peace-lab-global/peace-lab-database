  question: 紧张型头痛的核心要点是什么？
  answer: '临床特征: 双侧压迫感，颈肩部紧张；SPA治疗机制: 肌肉松弛、血管扩张；核心技术组合: 瑞典式按摩+热敷+芳香疗法；疗效预期: 疼痛强度↓50-70%；治疗频次: 每周2-3次×4周'
