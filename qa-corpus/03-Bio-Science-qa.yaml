  question: 1915的核心要点是什么？
  answer: '理论/模型: 战斗-逃跑反应；提出者: Walter Cannon；核心概念: 交感-肾上腺髓质激活；应激紧急反应；贡献: 首次描述急性生理应激反应；局限: 忽略HPA轴'
