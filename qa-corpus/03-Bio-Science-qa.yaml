  section: 遗传学研究发现
- type: concept
  question: 性学的核心要点是什么？
  answer: '英文名 (English Term): Sexology；原始语言/术语 (Original Language): 希腊: *Sexologia* (σεξουαλισμός)；精确定义 (Technical Definition):
    研究人类性行为、性身份、性取向、性功能及相关社会文化现象的跨学科科学领域。；区分与备注 (Differentiation & Notes): 不同于性教育(侧重实践指导)和色情学(侧重商业应用)，性学采用科学研究方法。；专业视角 (Professional
    Perspective): 融合生物学、心理学、社会学、医学等多学科视角的综合性学科。'
  source: 03-Bio-Science/sexuality/Sexuality_Overview.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 性取向的核心要点是什么？
  answer: '英文名 (English Term): Sexual Orientation；原始语言/术语 (Original Language): 英: Sexual Orientation；精确定义 (Technical Definition):
    个体对特定性别产生持久情感、浪漫或性吸引的模式。；区分与备注 (Differentiation & Notes): 包括异性恋、同性恋、双性恋、泛性恋、无性恋等多种类别。；专业视角 (Professional Perspective):
    是连续光谱而非二元分类，具有生物-心理-社会多重决定因素。'
  source: 03-Bio-Science/sexuality/Sexuality_Overview.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 性别认同的核心要点是什么？
  answer: '英文名 (English Term): Gender Identity；原始语言/术语 (Original Language): 英: Gender Identity；精确定义 (Technical Definition):
    个体对自己性别的内在感知和体验，可能与出生时指定性别一致或不一致。；区分与备注 (Differentiation & Notes): 与生理性别(sex)、社会性别(gender roles)、性别表达(gender expression)相区分。；专业视角
    (Professional Perspective): 核心身份认同，涉及神经发育、激素影响和社会文化建构。'
  source: 03-Bio-Science/sexuality/Sexuality_Overview.md
  section: 核心术语表 (Core Terminology)
