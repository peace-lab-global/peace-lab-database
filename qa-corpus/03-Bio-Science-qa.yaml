- type: concept
  question: 身体羞耻的核心要点是什么？
  answer: '英文标准术语: Body Shame；精确定义: 个体对自己身体形态、功能或特征产生的强烈负面情感体验，伴随自我贬低和厌恶感；临床特征: 持续性羞耻感、社交回避、情绪痛苦；测量方法: BSSI量表、临床访谈'
  source: 03-Bio-Science/biology/body-shame/terminology/Body_Shame_Terminology_Standards.md
  section: 基础概念术语体系
- type: concept
  question: 身体不满的核心要点是什么？
  answer: '英文标准术语: Body Dissatisfaction；精确定义: 对自己身体外观或功能的不满意态度和感受；临床特征: 负面身体评价、改善欲望；测量方法: BDQ问卷'
  source: 03-Bio-Science/biology/body-shame/terminology/Body_Shame_Terminology_Standards.md
  section: 基础概念术语体系
- type: concept
  question: 身体形象的核心要点是什么？
  answer: '英文标准术语: Body Image；精确定义: 个体对自己身体的感知、想法、情感和行为的整体心理建构；临床特征: 多维心理结构、动态变化；测量方法: BIQ量表'
  source: 03-Bio-Science/biology/body-shame/terminology/Body_Shame_Terminology_Standards.md
  section: 基础概念术语体系
- type: concept
  question: 身体图式的核心要点是什么？
  answer: '英文标准术语: Body Schema；精确定义: 关于自己身体的内隐知识结构，指导运动和空间行为；认知机制: 感知-运动整合系统；临床意义: 影响身体使用和体验'
  source: 03-Bio-Science/biology/body-shame/terminology/Body_Shame_Terminology_Standards.md
  section: 基础概念术语体系
- type: concept
  question: 身体意象的核心要点是什么？
  answer: '英文标准术语: Body Image；精确定义: 对自己身体的意识表征和主观体验；认知机制: 认知-情感综合结构；临床意义: 核心心理症状表现'
  source: 03-Bio-Science/biology/body-shame/terminology/Body_Shame_Terminology_Standards.md
  section: 基础概念术语体系
- type: concept
  question: 完美主义的核心要点是什么？
  answer: '英文标准术语: Perfectionism；精确定义: 对自己或他人设定不现实高标准的倾向；认知机制: 认知评价模式异常；临床意义: 维持因素和治疗靶点'
  source: 03-Bio-Science/biology/body-shame/terminology/Body_Shame_Terminology_Standards.md
  section: 基础概念术语体系
- type: concept
  question: 身体羞耻障碍的核心要点是什么？
  answer: '标准术语: Body Shame Disorder；诊断标准要点: 持续的身体羞耻体验伴显著功能损害；鉴别要点: 与BDD、社交焦虑的区分；ICD-11编码: QC50-ZZ'
  source: 03-Bio-Science/biology/body-shame/terminology/Body_Shame_Terminology_Standards.md
  section: 临床诊断术语标准
- type: concept
  question: 回避性身体障碍的核心要点是什么？
  answer: '标准术语: Avoidant Body Disorder；诊断标准要点: 以身体相关回避行为为主要特征；鉴别要点: 回避行为的特异性；ICD-11编码: QC51-ZZ'
  source: 03-Bio-Science/biology/body-shame/terminology/Body_Shame_Terminology_Standards.md
  section: 临床诊断术语标准
