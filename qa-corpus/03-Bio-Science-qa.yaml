  section: 按疾病系统分类 (System-Based Classification)
- type: concept
  question: SPA的核心要点是什么？
  answer: '英文名 (English Term): Spa；原始语言/术语 (Original Language): 拉丁语: Sanus Per Aquam；精确定义 (Technical Definition): 基于水疗原理的综合性身心健康管理体系，通过专业的护理技术和环境营造促进身心平衡。；区分与备注
    (Differentiation & Notes): 强调专业化、系统化的健康管理服务，区别于简单的洗浴或按摩。；专业视角 (Professional Perspective): 需要专业培训、标准化流程和严格的质量控制。'
  source: 03-Bio-Science/biology/spa/SPA_Overview.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 水疗的核心要点是什么？
  answer: '英文名 (English Term): Hydrotherapy；原始语言/术语 (Original Language): 希腊语: hydōr (水) + therapeia (治疗)；精确定义 (Technical Definition):
    利用水的物理特性（温度、压力、浮力等）进行疾病治疗和健康促进的方法体系。；区分与备注 (Differentiation & Notes): 包含温泉疗法、海水疗法、淡水疗法等多种形式。；专业视角 (Professional Perspective):
    是SPA的核心技术基础之一。'
  source: 03-Bio-Science/biology/spa/SPA_Overview.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 芳香疗法的核心要点是什么？
  answer: '英文名 (English Term): Aromatherapy；原始语言/术语 (Original Language): 法语: aromathérapie；精确定义 (Technical Definition): 使用植物精油及其芳香化合物通过嗅觉和皮肤吸收途径影响人体生理和心理状态的治疗方法。；区分与备注
    (Differentiation & Notes): 需要纯天然精油，避免合成香精；浓度和使用方法有严格要求。；专业视角 (Professional Perspective): SPA中重要的辅助治疗手段。'
  source: 03-Bio-Science/biology/spa/SPA_Overview.md
  section: 核心术语表 (Core Terminology)
