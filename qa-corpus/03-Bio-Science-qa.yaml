  answer: '认证等级: AAA级；保护措施: 医学伦理审查机制；合规性: 符合医学伦理规范'
  source: 03-Bio-Science/biology/std/STD_Quality_Certification_Report.md
  section: 内容质量评估 (Content Quality Assessment)
