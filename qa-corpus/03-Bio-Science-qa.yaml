  section: 按疾病系统分类 (System-Based Classification)
- type: concept
  question: 偏头痛的核心要点是什么？
  answer: '临床特征: 单侧搏动性疼痛，伴恶心；SPA治疗机制: 神经调节、血管舒缩平衡；核心技术组合: 深层组织按摩+冷热交替+冥想；疗效预期: 发作频率↓40-60%；治疗频次: 每周1-2次×6周'
  source: 03-Bio-Science/biology/spa/SPA_Clinical_Applications.md
  section: 按疾病系统分类 (System-Based Classification)
- type: concept
  question: 丛集性头痛的核心要点是什么？
  answer: '临床特征: 剧烈单侧眼眶周围疼痛；SPA治疗机制: 三叉神经调节、内啡肽释放；核心技术组合: 指压疗法+氧气疗法+放松训练；疗效预期: 急性期缓解70-80%；治疗频次: 每日1次×急性期'
  source: 03-Bio-Science/biology/spa/SPA_Clinical_Applications.md
  section: 按疾病系统分类 (System-Based Classification)
- type: concept
  question: 入睡困难的核心要点是什么？
  answer: '症状特点: 入睡时间>30分钟；SPA干预重点: 副交感神经激活；技术方案: 薰衣草香薰+温水浴+渐进性肌肉放松；改善指标: 入睡时间缩短40-60%；治疗周期: 4-6周'
  source: 03-Bio-Science/biology/spa/SPA_Clinical_Applications.md
  section: 按疾病系统分类 (System-Based Classification)
- type: concept
  question: 睡眠维持障碍的核心要点是什么？
  answer: '症状特点: 夜间频繁觉醒；SPA干预重点: 深度放松、压力缓解；技术方案: 热石按摩+冥想+足浴；改善指标: 夜间觉醒次数↓50%；治疗周期: 6-8周'
  source: 03-Bio-Science/biology/spa/SPA_Clinical_Applications.md
  section: 按疾病系统分类 (System-Based Classification)
- type: concept
  question: 早醒的核心要点是什么？
  answer: '症状特点: 比预期时间早醒≥30分钟；SPA干预重点: 生物钟调节、深度睡眠促进；技术方案: 按摩疗法+光疗+呼吸训练；改善指标: 总睡眠时间↑60-90分钟；治疗周期: 8-12周'
  source: 03-Bio-Science/biology/spa/SPA_Clinical_Applications.md
  section: 按疾病系统分类 (System-Based Classification)
- type: concept
  question: 纤维肌痛综合征的核心要点是什么？
  answer: '病理机制: 中枢敏化、广泛性疼痛；SPA治疗原理: 疼痛闸门控制、内啡肽释放；核心技术: 深层组织按摩+温热疗法+水中运动；疗效评估: 疼痛指数↓40-55%；治疗方案: 每周2次×12周'
