  question: 伦理遗嘱的核心要点是什么？
  answer: '英文名: Ethical Will；词源/来源: 犹太传统 / Barry Baines；精确定义: 书面或录制的文件，传递价值观、人生教训、宽恕请求、对家人的期望，而非财产分配'
  source: 03-Bio-Science/death/Death_Ethical_Will_Life_Review_Guide.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 生命回顾的核心要点是什么？
  answer: '英文名: Life Review；词源/来源: Robert Butler, 1963；精确定义: 老年人自然发生的（或治疗引导的）对整个人生的回顾过程'
