  question: 抗阻训练** (Resistance)的核心要点是什么？
  answer: '类型: 等张/等长/等速；代表运动: 自由重量、器械、自体重；主要效益: 肌力、骨密度、代谢率'
  source: 03-Bio-Science/biology/exercise-science/Exercise_Science_Overview.md
  section: 2.2 运动分类体系 (Exercise Classification)
- type: concept
  question: 脚跟离地的核心要点是什么？
  answer: '可能原因: 踝背屈受限；筛查方法: 膝过墙测试；矫正策略: 踝关节松动术、小腿拉伸'
