  answer: '正常发展轨迹: 基于实际表现形成稳定的自信；歧视影响下的偏离: 能力被系统性低估，产生习得性无助；心理机制: 负面反馈循环，自我效能感下降；修复路径: 积极体验积累，成功经验重建'
