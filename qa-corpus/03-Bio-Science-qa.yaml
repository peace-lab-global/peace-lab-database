- type: concept
  question: 肥胖与超重的核心要点是什么？
  answer: '英文名 (English Condition): Obesity & Overweight；证据等级 (Evidence Level): 中–高：多项随机对照试验 (RCT) 与系统综述；推荐断食模式: 16:8 IF、5:2
    Diet、14:10 TRF。；典型疗程 (Duration): 至少 12 周以上持续执行。；主要获益 (Benefits): 降低体脂、改善胰岛素敏感性、减小腰围。；风险与禁忌 (Risks & Contraindications):
    易出现“周末暴食”与体重反复；体像扭曲者慎用。；专家建议 (Expert Notes): 首先稳定作息与饮食质量，再用断食调整时间结构；避免与极端低碳/生酮叠加过猛。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Clinical_Applications.md
  section: Evidence-Based Indications (基于证据的断食适应证总览表)
- type: concept
  question: 代谢综合征的核心要点是什么？
  answer: '英文名 (English Condition): Metabolic Syndrome；证据等级 (Evidence Level): 中–高：多中心临床研究；推荐断食模式: 16:8 IF + 抗炎饮食；周期性 FMD。；典型疗程
    (Duration): 3–6 个月。；主要获益 (Benefits): 改善血压、腰围、甘油三酯与空腹血糖。；风险与禁忌 (Risks & Contraindications): 与既有降压、降糖药物可能交互，导致低血糖或低血压。；专家建议
    (Expert Notes): 建议由内分泌或心内科团队评估，并建立实验室指标与家庭血压/血糖监测计划。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Clinical_Applications.md
  section: Evidence-Based Indications (基于证据的断食适应证总览表)
- type: concept
  question: 2 型糖尿病 (早中期)的核心要点是什么？
  answer: '英文名 (English Condition): Type 2 Diabetes (Early/Moderate)；证据等级 (Evidence Level): 中：小样本 RCT 与临床队列；推荐断食模式: 医师监督下的
    16:8 或 18:6；部分病例可采用 5:2。；典型疗程 (Duration): 3–12 个月，视病程与药物而定。；主要获益 (Benefits): 降低 HbA1c、部分患者可减少甚至停用胰岛素。；风险与禁忌 (Risks & Contraindications):
    低血糖、脱水、电解质紊乱；进食障碍史为禁忌。；专家建议 (Expert Notes): 任何药物减量或停用必须由主治医师决定；断食是“生活方式药物”，不是自行减药的理由。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Clinical_Applications.md
  section: Evidence-Based Indications (基于证据的断食适应证总览表)
- type: concept
  question: 轻中度抑郁的核心要点是什么？
  answer: '英文名 (English Term): Mild/Moderate Depression；潜在作用 (Potential Effects): 可能通过炎症下降与 BDNF 上升改善情绪与动力。；安全级别 (Safety Level):
    中等：需个体化评估。；推荐/禁忌模式: 温和 14:10 或 16:8 + 抗炎饮食。；专家建议 (Expert Notes): 首要干预仍是药物与心理治疗；断食可作为“第三支柱”，但不应取代前两者。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Clinical_Applications.md
  section: Mental Health & Fasting (心理健康与断食交互表)
- type: concept
  question: 广泛性焦虑的核心要点是什么？
  answer: '英文名 (English Term): Generalized Anxiety Disorder；潜在作用 (Potential Effects): 部分人因血糖稳定与肠脑轴改善体验到焦虑下降。；安全级别 (Safety
    Level): 中等：部分人反而因饥饿触发焦虑。；推荐/禁忌模式: 温和 TRF，避免长时间水断食。；专家建议 (Expert Notes): 应在心理治疗师协助下，把断食视为练习“容纳轻度不适”的机会，而非自我惩罚。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Clinical_Applications.md
  section: Mental Health & Fasting (心理健康与断食交互表)
- type: concept
  question: 强迫进食/暴食倾向的核心要点是什么？
  answer: '英文名 (English Term): Binge Eating / Food Addiction；潜在作用 (Potential Effects): 可能短期内通过结构化时间窗减少随意进食。；安全级别 (Safety Level):
    低：总体风险 > 潜在获益。；推荐/禁忌模式: 建议暂不使用 IF 作主要工具。；专家建议 (Expert Notes): 优先采用 CBT-E、DBT 等进食障碍专门疗法；断食可能加重“控制-失控”循环，应极度谨慎。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Clinical_Applications.md
  section: Mental Health & Fasting (心理健康与断食交互表)
- type: concept
  question: Level 1：自助生活方式的核心要点是什么？
  answer: '场景描述: 健康成人为改善体重、精力与睡眠而使用的基础断食。；适用断食强度: 14:10、16:8 TRF；偶尔 24 小时断食。；主要参与专业: 营养师、健康教练、家庭医生。；监测要求: 体重、腰围、血压、主观状态。；专家视角
    (Expert Perspective): 关键在于长期可持续性与心理健康，而非追求极端时长或体重下降速度。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Clinical_Applications.md
  section: Levels of Clinical Implementation (临床实施层级表)
- type: concept
  question: Level 2：门诊功能医学/代谢门诊的核心要点是什么？
  answer: '场景描述: 以代谢综合征、2 型糖尿病、脂肪肝等为主的门诊管理。；适用断食强度: 16:8、18:6、5:2、周期性 FMD。；主要参与专业: 内分泌科、营养科、功能医学医师。；监测要求: 实验室指标（血糖、血脂、肝肾功能）、药物剂量调整。；专家视角
    (Expert Perspective): 此层级应视断食为标准治疗方案的组成部分，需与药物与运动同等重视。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Clinical_Applications.md
  section: Levels of Clinical Implementation (临床实施层级表)
- type: concept
  question: 胰岛素的核心要点是什么？
  answer: '英文名 (English): Insulin；原始术语/词源 (Greek/Latin/Sanskrit): 拉: *Insula*（岛，源自胰岛）；断食中的典型变化: 禁食数小时后逐步下降，长期 IF 可降低基础胰岛素水平。；临床意义
    (Clinical Significance): 降低胰岛素有助于动员脂肪、逆转胰岛素抵抗。；专家提示 (Expert Notes): 任何已经使用降糖药或胰岛素者调整饮食前必须与主治医师沟通。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Mechanisms.md
  section: Hormonal & Metabolic Pathways (激素与代谢通路总览表)
- type: concept
  question: 胰高血糖素的核心要点是什么？
  answer: '英文名 (English): Glucagon；原始术语/词源 (Greek/Latin/Sanskrit): 拉: *Glucos* (糖) + *Agon* (驱动)；断食中的典型变化: 随胰岛素下降而上升，促进肝糖原分解与葡萄糖新生。；临床意义
    (Clinical Significance): 保护大脑获得稳定葡萄糖供应，防止低血糖。；专家提示 (Expert Notes): 过度长期断食+剧烈运动可能导致胰高血糖素过高，引发应激反应。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Mechanisms.md
  section: Hormonal & Metabolic Pathways (激素与代谢通路总览表)
- type: concept
  question: 瘦素的核心要点是什么？
  answer: '英文名 (English): Leptin；原始术语/词源 (Greek/Latin/Sanskrit): 希: *Leptos*（瘦）；断食中的典型变化: 脂肪减少时瘦素下降，影响饥饿与能量感。；临床意义 (Clinical
    Significance): 瘦素敏感性改善是长期减重成功的关键之一。；专家提示 (Expert Notes): 极端断食会急剧降低瘦素，引发暴食反弹，需循序渐进。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Mechanisms.md
  section: Hormonal & Metabolic Pathways (激素与代谢通路总览表)
- type: concept
  question: 细胞自噬的核心要点是什么？
  answer: '英文名 (English): Autophagy；原始术语/词源: 同上；触发时间窗 (典型): 18–36 小时；主要相关器官/细胞: 全身各组织，尤其肝脏与免疫细胞。；益处 (Benefits): 清除蛋白聚集与受损细胞器，延缓衰老。；潜在风险
    (Risks): 在营养极度匮乏与基础状态不良时，可能加重衰弱。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Mechanisms.md
  section: Cellular Processes in Fasting (细胞过程与器官层面表)
- type: concept
  question: 线粒体自噬的核心要点是什么？
  answer: '英文名 (English): Mitophagy；原始术语/词源: 希: *Mito* (线粒体) + *Phagein*；触发时间窗 (典型): 24–72 小时，视个体与运动负荷而定。；主要相关器官/细胞: 高能耗组织如心肌、骨骼肌与脑组织。；益处
    (Benefits): 删除功能不良线粒体，升级“能量工厂”。；潜在风险 (Risks): 若同时高度压力与睡眠不足，可能造成短期疲劳与心率变化。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Mechanisms.md
  section: Cellular Processes in Fasting (细胞过程与器官层面表)
- type: concept
  question: 免疫重启的核心要点是什么？
  answer: '英文名 (English): Immune Reset；原始术语/词源: -；触发时间窗 (典型): 多见于≥72 小时水断食或重复 FMD 周期。；主要相关器官/细胞: 白细胞、造血干细胞、淋巴细胞。；益处 (Benefits):
    清除老化免疫细胞，促进新生群体，改善炎症表型。；潜在风险 (Risks): 在免疫抑制或感染期启动高强度断食存在严重风险。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Mechanisms.md
  section: Cellular Processes in Fasting (细胞过程与器官层面表)
- type: concept
  question: 注意力与工作记忆的核心要点是什么？
  answer: '关键机制 (中文/English): BDNF 上升；前额叶皮层能量利用效率提升。；相关术语 (多语言): 脑源性神经营养因子 **BDNF** (*Brain-Derived Neurotrophic Factor*)；证据概览
    (Evidence Summary): 动物与小样本人体研究显示，适度断食可提升突触可塑性。；推荐人群/目标: 需要持续高认知负荷的知识工作者。；专家观点 (Expert Perspective): 将断食窗口安排在创作与深度工作时段，但不可牺牲睡眠。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Mechanisms.md
  section: Brain & Mood Mechanisms (大脑与情绪机制表)
- type: concept
  question: 情绪稳定与焦虑的核心要点是什么？
  answer: '关键机制 (中文/English): 炎症因子 (IL-6, TNF-α) 下降；GABA/谷氨酸平衡改善。；相关术语 (多语言): γ-氨基丁酸 **GABA**, *Gamma-Aminobutyric Acid*；证据概览
    (Evidence Summary): IF 与地中海饮食的组合对轻中度抑郁有积极信号。；推荐人群/目标: 轻中度情绪困扰，无进食障碍史者。；专家观点 (Expert Perspective): 对重度抑郁、双相或精神病性障碍者，断食只可在精神科团队知情下尝试。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Mechanisms.md
  section: Brain & Mood Mechanisms (大脑与情绪机制表)
- type: concept
  question: 间歇性断食的核心要点是什么？
  answer: '英文名: Intermittent (IF)；操作细节 (Operational Details): 16:8 (16小时禁食) 或 18:6。；核心目标 (Primary Goal): 调节胰岛素敏感性；控制摄入。；适用人群/频率:
    日常、长期维持。；专业视角 (Professional Perspective): 最易执行的模式，能有效改善代谢灵活性。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Metabolic.md
  section: 'Modalities of Fasting: A Spectrum of Intensity (断食模式与强度光谱表)'
- type: concept
  question: 一日一餐的核心要点是什么？
  answer: '英文名: OMAD；操作细节 (Operational Details): 每天仅进食一次（23:1）。；核心目标 (Primary Goal): 简化生活；深度空腹。；适用人群/频率: 进阶减脂；时间焦虑者。；专业视角
    (Professional Perspective): 营养密度要求极高，需防止暴饮暴食补偿。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Metabolic.md
  section: 'Modalities of Fasting: A Spectrum of Intensity (断食模式与强度光谱表)'
- type: concept
  question: 模拟断食的核心要点是什么？
  answer: '英文名: FMD；操作细节 (Operational Details): 每月连续5天极低热量植物膳食。；核心目标 (Primary Goal): 诱导细胞自噬，同时保持安全性。；适用人群/频率: 每季度一次；慢性病风险干预。；专业视角
    (Professional Perspective): 瓦尔特·隆戈博士的研究成果，具有抗衰老潜力。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Metabolic.md
  section: 'Modalities of Fasting: A Spectrum of Intensity (断食模式与强度光谱表)'
- type: concept
  question: 4-8 小时的核心要点是什么？
  answer: '代谢状态名称: 后进食期；核心生理变化: 血糖开始下降；胰岛素随之降低。；心理/主观感受: 饥饿感周期性波动。；专业视角 (Professional Perspective): 决定了下一餐后的胰岛素反应强度。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Metabolic.md
  section: Metabolic Milestones During Fasting (断食期间的代谢里程碑表)
- type: concept
  question: 12-16 小时的核心要点是什么？
  answer: '代谢状态名称: 糖异生启动；核心生理变化: 肝糖原耗尽，身体寻找非糖能源。；心理/主观感受: 所谓的“能量低谷期”。；专业视角 (Professional Perspective): 脑源性神经营养因子 (BDNF) 开始小幅上升。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Metabolic.md
  section: Metabolic Milestones During Fasting (断食期间的代谢里程碑表)
- type: concept
  question: 18-24 小时的核心要点是什么？
  answer: '代谢状态名称: **自噬作用** (Autophagy)；核心生理变化: 溶酶体开始清理细胞内受损蛋白及废弃物。；心理/主观感受: 感觉精神开始清明，饥饿感逐渐退却。；专业视角 (Professional Perspective):
    2016年诺贝尔奖课题：细胞层面的“大扫除”。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Metabolic.md
  section: Metabolic Milestones During Fasting (断食期间的代谢里程碑表)
- type: concept
  question: 道家的核心要点是什么？
  answer: '名称 (Tradition): 辟谷；原始语言术语: 中: 辟谷 (Bigu)；仪式特征: 配合服气、导引、吞津。；核心修持目的: 追求长生,转化为神圣的"气"态生命。；专业视角 (Professional Perspective):
    不仅仅是挨饿,而是通过生理调节实现"气满不思食"。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Metabolic.md
  section: Spiritual & Historical Traditions of Fasting (全球断食传统的精神内核表)
- type: concept
  question: 佛教的核心要点是什么？
  answer: '名称 (Tradition): 过午不食；原始语言术语: 梵/巴: **Vikāla-bhojana**；仪式特征: 每日仅进食两餐,或每半月布萨。；核心修持目的: 减少贪欲,防止昏沉,利于打坐。；专业视角 (Professional
    Perspective): 保持肠胃的"虚灵"状态,有助于提高禅修觉知。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Metabolic.md
  section: Spiritual & Historical Traditions of Fasting (全球断食传统的精神内核表)
- type: concept
  question: 断食的核心要点是什么？
  answer: '英文名 (English Term): Fasting；原始语言/术语 (Sanskrit/Arabic/Latin): 梵: **Upavāsa** (उपवास)；精确定义 (Technical Definition):
    在限定时间内自愿停止能量性食物与含热量饮品的摄入，以触发代谢与精神层面的重组。；区分与备注 (Differentiation & Notes): 与"节食"不同，断食强调时间窗口与代谢状态，而非仅仅减少总热量。；专业视角 (Professional
    Perspective): 应视为一种代谢干预与心智训练工具，而不是惩罚性节食。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Overview.md
  section: Core Terminology of Fasting (断食核心术语总览表)
- type: concept
  question: 间歇性断食的核心要点是什么？
  answer: '英文名 (English Term): Intermittent Fasting (IF)；原始语言/术语 (Sanskrit/Arabic/Latin): -；精确定义 (Technical Definition): 周期性在进食与禁食之间切换的总称，包括16:8、18:6、5:2等模式。；区分与备注
    (Differentiation & Notes): 不是单一方法，而是一系列时间结构的家族概念。；专业视角 (Professional Perspective): 对现代久坐人群最可行的长期基础方案，有丰富临床与流行病学数据支持。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Overview.md
  section: Core Terminology of Fasting (断食核心术语总览表)
- type: concept
  question: 时间限制进食的核心要点是什么？
  answer: '英文名 (English Term): Time-Restricted Feeding (TRF)；原始语言/术语 (Sanskrit/Arabic/Latin): -；精确定义 (Technical Definition):
    在24小时内将进食限制在固定窗口（如8小时内），不必刻意降低总热量。；区分与备注 (Differentiation & Notes): TRF 是 IF 的一个子类，强调昼夜节律 (Circadian Rhythm)。；专业视角 (Professional
    Perspective): 更接近生物钟医学，将“何时吃”置于与“吃什么”同等重要的地位。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Overview.md
  section: Core Terminology of Fasting (断食核心术语总览表)
- type: concept
  question: 按时间结构的核心要点是什么？
  answer: '子类型名称 (中文): 14:10 轻度时间窗；English Name: 14:10 TRF；典型时间结构 (Fasting:Feeding): 连续禁食 14 小时，进食窗 10 小时。；能量/营养规则: 不刻意限量，只限制进食时间。；主要目标
    (Primary Goal): 温和改善胰岛素敏感性与睡眠。；适用人群: 初学者、体重正常但有代谢风险者。；专业视角 (Professional Perspective): 常作为所有断食计划的入门级“适应期”，降低失败率。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Overview.md
  section: Typology of Fasting Modes (断食模式分型与适配表)
- type: concept
  question: 16:8 经典模式的核心要点是什么？
  answer: '子类型名称 (中文): 16:8 IF；English Name: 禁食 16 小时，进食窗 8 小时。；典型时间结构 (Fasting:Feeding): 建议在进食窗内 2–3 餐，避免持续性零食。；能量/营养规则:
    减脂、改善代谢综合征。；主要目标 (Primary Goal): BMI 略高、生活节奏规律者。；适用人群: 目前证据最丰富的模式之一，可视作“代谢重置”的基础方案。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Overview.md
  section: Typology of Fasting Modes (断食模式分型与适配表)
- type: concept
  question: 18:6 深度时间窗的核心要点是什么？
  answer: '子类型名称 (中文): 18:6 IF；English Name: 禁食 18 小时，进食窗 6 小时。；典型时间结构 (Fasting:Feeding): 需提高每餐营养密度与蛋白质比例。；能量/营养规则: 强化脂肪动员与生酮。；主要目标
    (Primary Goal): 有一定 IF 经验者、胰岛素抵抗明显者。；适用人群: 建议配合阻力训练与电解质补充，以防肌肉流失与低血压。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Overview.md
  section: Typology of Fasting Modes (断食模式分型与适配表)
- type: concept
  question: 体重与组成的核心要点是什么？
  answer: '主要目标 (Primary Goals): 降低体脂、保持肌肉。；关键机制 (中文/English): 能量负平衡 (Energy Deficit)、提高代谢灵活性 (Metabolic Flexibility)。；推荐模式:
    16:8 IF + 每周 2–3 次阻力训练。；监测指标 (Biomarkers): 体重、腰围、体脂率、主观精力。；专家建议 (Expert Tips): 相比极端节食，以断食+高蛋白+力量训练更容易保护瘦体重。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Overview.md
  section: Goals & Mechanisms Overview (断食目标与机制一览表)
- type: concept
  question: 血糖与胰岛素的核心要点是什么？
  answer: '主要目标 (Primary Goals): 改善胰岛素敏感性，逆转早期 2 型糖尿病。；关键机制 (中文/English): 减少胰岛素分泌负担；AMPK 激活；GLUT4 上调。；推荐模式: 医师监督下的 16:8 或
    18:6 + 碳水集中在进食窗前半段。；监测指标 (Biomarkers): 空腹血糖、空腹胰岛素、HOMA-IR、糖化血红蛋白 (HbA1c)。；专家建议 (Expert Tips): 药物（尤其胰岛素与磺脲类）需动态调整剂量，严禁自行停药。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Overview.md
  section: Goals & Mechanisms Overview (断食目标与机制一览表)
- type: concept
  question: 代谢重启的核心要点是什么？
  answer: '协议名称 (中文): 14:10 适应期协议；英文名 (English Name): 14:10 Adaptation Protocol；结构 (Fasting:Feeding): 禁食 14 小时，进食窗 10 小时。；周期长度
    (Cycle Length): 2–4 周。；标准操作流程 SOP: 第 1 周仅将早餐推迟 1–2 小时；第 2 周再逐步提前晚餐时间。；预期时间线 (Expected Timeline): 1–2 周内饥饿感波动，3–4 周后多半稳定。；专家建议
    (Expert Tips): 将该阶段视为“学习阶段”而非减重阶段，重点是观察身体节律与心理反应。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Protocols.md
  section: Foundational Protocols for Healthy Adults (健康成人基础断食协议表)
- type: concept
  question: 基础减脂的核心要点是什么？
  answer: '协议名称 (中文): 16:8 经典协议；英文名 (English Name): 16:8 Standard Protocol；结构 (Fasting:Feeding): 禁食 16 小时，进食窗 8 小时。；周期长度 (Cycle
    Length): 至少 8–12 周。；标准操作流程 SOP: 中午首餐以高蛋白+高纤维为主；晚餐尽量在睡前 3 小时前完成。；预期时间线 (Expected Timeline): 4 周后体重与腰围出现稳定下降趋势。；专家建议 (Expert
    Tips): 每日总蛋白目标约 1.2–1.6 g/kg 体重，可有效保护肌肉。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Protocols.md
  section: Foundational Protocols for Healthy Adults (健康成人基础断食协议表)
- type: concept
  question: 体重维持与精神清晰的核心要点是什么？
  answer: '协议名称 (中文): 轻度 TRF 维护协议；英文名 (English Name): Light TRF Maintenance；结构 (Fasting:Feeding): 12–14 小时禁食，其余时间正常三餐。；周期长度
    (Cycle Length): 长期、终身。；标准操作流程 SOP: 保持固定起床与就寝时间，避免夜宵与随机零食。；预期时间线 (Expected Timeline): 1–2 周内主观能量提高，长期有助延缓代谢老化。；专家建议 (Expert
    Tips): 对体重已经合适、但想提升能量与睡眠者，这是最安全的长期方案。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Protocols.md
  section: Foundational Protocols for Healthy Adults (健康成人基础断食协议表)
- type: concept
  question: 胰岛素抵抗/代谢综合征的核心要点是什么？
  answer: '协议名称 (中文): 周期性模拟断食；英文名 (English Name): Fasting-Mimicking Diet (FMD) Cycles；结构与能量摄入: 每月连续 5 天，能量约为基础代谢的 30–50%，以植物脂肪与蔬菜为主。；适用人群:
    有肥胖或代谢综合征、但基础状态尚可者。；监测项目: 体重、血糖、血压、电解质、肝肾功能。；主要风险: 低血糖、头晕、体力下降。；专业建议: 应由熟悉 FMD 的营养师/医师设计餐单，并在断食结束后逐步复食。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Protocols.md
  section: Therapeutic Protocols (需专业监督的强化断食协议表)
- type: concept
  question: 脂肪肝与高血脂的核心要点是什么？
  answer: '协议名称 (中文): 5:2 强化代谢协议；英文名 (English Name): 5:2 Intensive Protocol；结构与能量摄入: 每周 2 天能量控制在 500–600 kcal，其余 5 天正常饮食。；适用人群:
    脂肪肝、血脂异常且工作日节奏规律者。；监测项目: 体重、腰围、血脂谱、肝脏超声。；主要风险: 断食日情绪波动、暴食补偿。；专业建议: 断食日尽量安排在工作压力较轻的日子，并预先计划菜单避免随意零食。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Protocols.md
  section: Therapeutic Protocols (需专业监督的强化断食协议表)
- type: concept
  question: 免疫与自身炎症调节的核心要点是什么？
  answer: '协议名称 (中文): 医疗级水断食；英文名 (English Name): Medically Supervised Water Fasting；结构与能量摄入: 连续 3–7 天仅饮水与电解质，之后进入渐进复食期。；适用人群:
    部分自身免疫疾病或难治性高血压患者。；监测项目: 心电图、电解质、尿量、血压、症状报告。；主要风险: 低血压、心律失常、急性肾损伤、再喂养综合征。；专业建议: 必须在具有经验的医疗中心进行，且需要详细的入组与排除标准。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Protocols.md
  section: Therapeutic Protocols (需专业监督的强化断食协议表)
- type: concept
  question: ≤24 小时的核心要点是什么？
  answer: '复食阶段: 单阶段复食；建议食物 (中文/English): 清淡正常餐，避免高糖高脂暴食。；关键原则: 饭量略少于平时，细嚼慢咽。；风险预防: 防止血糖与胰岛素骤升。；专家建议: 可先以蔬菜汤或少量水果开胃，再进正常主餐。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Protocols.md
  section: Refeeding Protocols (复食流程与再喂养安全表)
- type: concept
  question: 24–72 小时的核心要点是什么？
  answer: '复食阶段: 二阶段复食；建议食物 (中文/English): 第 1 阶段：清汤、骨头汤、煮熟蔬菜；第 2 阶段：小份高蛋白餐。；关键原则: 每 2–3 小时少量多餐，逐渐增加蛋白与脂肪。；风险预防: 预防再喂养综合征与胃肠不适。；专家建议:
    绝不以油炸、甜点作为第一餐；可在医生指导下补充硫胺素 (Vit B1)。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Protocols.md
  section: Refeeding Protocols (复食流程与再喂养安全表)
- type: concept
  question: 磷与硫胺素的核心要点是什么？
  answer: '英文名 (English Term): Phosphate & Thiamine (Vit B1)；原始术语/词源: -；作用与风险: 在长期饥饿后复食时快速下降，诱发再喂养综合征。；推荐补充方式: 长程断食前后在医生指导下补充。；专家建议
    (Expert Notes): 再喂养综合征的核心是电解质内移，不是“吃太多”本身。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Safety.md
  section: Electrolytes, Hydration & Support (电解质与水合支持表)
- type: concept
  question: 水合状态的核心要点是什么？
  answer: '英文名 (English Term): Hydration；原始术语/词源: -；作用与风险: 断食期利尿增加，若只喝白水易出现低钠血症。；推荐补充方式: 水中加入少量电解质；避免一次性大量喝水。；专家建议 (Expert
    Notes): 观察尿色（淡黄色为宜）、体重变化与头晕情况，是成本最低的监测方式。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Safety.md
  section: Electrolytes, Hydration & Support (电解质与水合支持表)
- type: concept
  question: 孕妇及哺乳期妇女的核心要点是什么？
  answer: '英文名 (English Category): Pregnancy & Lactation；禁忌理由 (Rationale): 需要持续高质量能量与营养以支持胎儿/婴儿发育。；典型风险: 胎儿宫内生长受限、乳量减少、电解质紊乱。；专家建议:
    严禁主动断食；仅可在妇产科医生指导下调整饮食结构。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Safety.md
  section: Absolute Contraindications (绝对禁忌证扩展表)
- type: concept
  question: 处于发育期的儿童与青少年的核心要点是什么？
  answer: '英文名 (English Category): Children & Adolescents；禁忌理由 (Rationale): 断食可能干扰生长激素轴与骨骼发育。；典型风险: 身高生长减缓、骨量不足、饮食行为障碍。；专家建议:
    不应使用任何形式的 IF 作为“减肥工具”；如有肥胖，应在儿科与营养科共同管理。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Safety.md
  section: Absolute Contraindications (绝对禁忌证扩展表)
- type: concept
  question: 活动性进食障碍患者的核心要点是什么？
  answer: '英文名 (English Category): Active Eating Disorders (AN, BN, BED)；禁忌理由 (Rationale): 断食会强化“控制–失控”的心理模式。；典型风险: 病情复燃、心律失常、严重电解质紊乱。；专家建议:
    IF 对此类患者属于明确禁忌，应主要使用专门的心理治疗 (CBT-E, DBT 等)。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Safety.md
  section: Absolute Contraindications (绝对禁忌证扩展表)
- type: concept
  question: 一线高压工作者的核心要点是什么？
  answer: '主要顾虑: 长期睡眠不足与高精神负荷。；可行的安全下限: 尽量不超过 14:10，避免长程水断食。；建议监测: 睡眠时长、心率变异 HRV、主观疲劳度。；专家建议: 先修复睡眠与工作节奏，再考虑提升断食强度。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Safety.md
  section: Relative Contraindications & Caution (相对禁忌与谨慎人群表)
- type: concept
  question: 老年人 (>65 岁)的核心要点是什么？
  answer: '主要顾虑: 肌少症与骨质疏松风险。；可行的安全下限: 温和 12–14 小时 TRF，强调蛋白与阻力训练。；建议监测: 体重、握力、步速、跌倒史。；专家建议: 老年人的核心目标是“功能维持”而非“体重最低”。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Safety.md
  section: Relative Contraindications & Caution (相对禁忌与谨慎人群表)
- type: concept
  question: 高强度运动员的核心要点是什么？
  answer: '主要顾虑: 训练时期能量需求高。；可行的安全下限: 谨慎使用 14:10 或 16:8，并在训练前后充分补给。；建议监测: 训练表现、恢复时间、伤病发生率。；专家建议: 比赛季与增肌期不推荐激进断食，可在淡季用于代谢调整。'
  source: 03-Bio-Science/foods/fasting/Bio_Fasting_Safety.md
  section: Relative Contraindications & Caution (相对禁忌与谨慎人群表)
- type: concept
  question: 什么是专题概述？
  answer: 断食（Fasting）是一种有意识地在特定时间内限制食物摄入的实践，涵盖从日常间歇断食到多日延长断食的多种形式。本专题提供从基础概念到高级实践的系统性指南。
  source: 03-Bio-Science/foods/fasting/INDEX.md
  section: 专题概述
