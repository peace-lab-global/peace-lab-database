  question: 失智症的核心要点是什么？
  answer: '英文名: Dementia；词源/来源: 拉丁: *De* (丧失) + *Mens* (心智)；精确定义: 以认知功能衰退为核心特征的综合征，影响记忆、思维、行为、日常功能'
  source: 03-Bio-Science/death/Death_Dementia_End_of_Life.md
