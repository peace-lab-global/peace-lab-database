  question: 花斑癣的核心要点是什么？
  answer: '英文名 (English Term): Pityriasis Versicolor；原始语言/词源: 希腊语: *Pityrias* (鳞屑) + 拉丁语: *Versicolor* (变色)；词源含义: "多彩的鳞屑性皮肤病"；精确定义:
    由马拉色菌引起的慢性表皮角质层感染，表现为色素改变的鳞屑性斑片；区分要点: 与白癜风、白色糠疹等色素性疾病鉴别；专业视角: 属于机会性真菌感染，免疫功能正常者也可发病'
  source: 03-Bio-Science/biology/skin-diseases/Pityriasis_Versicolor_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 马拉色菌的核心要点是什么？
  answer: '英文名 (English Term): Malassezia；原始语言/词源: 法国医生: *Malassez* (1842)命名；词源含义: 以发现者命名；精确定义: 一类嗜脂性酵母样真菌，是人体正常菌群组成部分；区分要点:
    常驻菌群vs致病菌的区别；专业视角: 条件致病菌，特定条件下过度增殖致病'
  source: 03-Bio-Science/biology/skin-diseases/Pityriasis_Versicolor_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 汗斑的核心要点是什么？
  answer: '英文名 (English Term): Tinea Versicolor (俗称)；原始语言/词源: 拉丁语: *Tinea* (癣)；词源含义: 传统分类归属；精确定义: 花斑癣的民间称呼；区分要点: 避免与真菌性癣病混淆；专业视角:
    现代医学已明确其真菌分类地位'
  source: 03-Bio-Science/biology/skin-diseases/Pityriasis_Versicolor_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 卵形马拉色菌的核心要点是什么？
  answer: '学名: *Malassezia furfur*；特征: 椭圆形酵母细胞；致病性: 最常见致病菌种；分布特点: 全球分布，占病例70-80%'
  source: 03-Bio-Science/biology/skin-diseases/Pityriasis_Versicolor_Overview.md
  section: 表2.1 马拉色菌属分类 (Malassezia Species Classification)
- type: concept
  question: 糠秕马拉色菌的核心要点是什么？
  answer: '学名: *Malassezia sympodialis*；特征: 芽生孢子较多；致病性: 中等致病性；分布特点: 北欧地区较为常见'
  source: 03-Bio-Science/biology/skin-diseases/Pityriasis_Versicolor_Overview.md
  section: 表2.1 马拉色菌属分类 (Malassezia Species Classification)
- type: concept
  question: 球形马拉色菌的核心要点是什么？
  answer: '学名: *Malassezia globosa*；特征: 圆形细胞为主；致病性: 重要致病菌；分布特点: 亚洲人群中检出率高'
  source: 03-Bio-Science/biology/skin-diseases/Pityriasis_Versicolor_Overview.md
  section: 表2.1 马拉色菌属分类 (Malassezia Species Classification)
- type: concept
  question: 定植与粘附的核心要点是什么？
  answer: '具体过程: 马拉色菌粘附于角质细胞表面；关键分子: 脂磷壁酸、凝集素样蛋白；临床意义: 定植是感染的第一步'
  source: 03-Bio-Science/biology/skin-diseases/Pityriasis_Versicolor_Overview.md
  section: 表2.2 发病机制 (Pathogenesis Mechanisms)
- type: concept
  question: 脂质代谢的核心要点是什么？
  answer: '具体过程: 分解皮脂中甘油三酯产生游离脂肪酸；关键分子: 脂酶、磷脂酶；临床意义: 脂肪酸积累导致炎症反应'
  source: 03-Bio-Science/biology/skin-diseases/Pityriasis_Versicolor_Overview.md
  section: 表2.2 发病机制 (Pathogenesis Mechanisms)
- type: concept
  question: 准确诊断的核心要点是什么？
  answer: '具体内容: 详细病史采集、全面体格检查、必要的实验室检查；实施要点: 三级诊断流程：临床→实验室→病理；临床意义: 避免误诊误治'
  source: 03-Bio-Science/biology/skin-diseases/Skin_Diseases_Professional_Guide.md
