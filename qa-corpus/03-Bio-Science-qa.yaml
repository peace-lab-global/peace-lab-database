- type: concept
  question: 身心能量的核心要点是什么？
  answer: '英文名 (English Term): Body-Mind Energy；原始语言/术语 (Original Language): 梵文: *Prāṇa* (प्राण, 生命力); 中文: 气；精确定义: 生理学上指细胞ATP储备、神经递质可用性、荷尔蒙平衡状态的综合;心理学上指完成认知与情绪任务的可用资源容量；发现历史:
    Loehr & Schwartz 2003系统化为四维能量模型；专业视角 (Professional Perspective): 能量不是抽象概念,而是可测量的生理-心理状态:皮质醇、血糖、HRV、认知表现均为客观指标'
  source: 03-Bio-Science/biology/energy-restoration/Energy_Restoration_Overview.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 全情投入的核心要点是什么？
  answer: '英文名 (English Term): Full Engagement；原始语言/术语 (Original Language): -；精确定义: Jim Loehr提出的表现状态,指身体、情绪、心智、精神四维能量同时处于最佳可用状态；发现历史:
    源自对职业运动员的研究,后应用于企业高管；专业视角 (Professional Perspective): 与"工作-生活平衡"不同,强调能量的"脉冲式消耗与恢复"而非时间分配'
  source: 03-Bio-Science/biology/energy-restoration/Energy_Restoration_Overview.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 能量振荡的核心要点是什么？
  answer: '英文名 (English Term): Energy Oscillation；原始语言/术语 (Original Language): -；精确定义: 能量消耗与恢复的周期性节律,类似肌肉训练的"压力-恢复"循环；发现历史:
    Loehr从运动训练学引入；专业视角 (Professional Perspective): 持续消耗无恢复导致耗竭;仅恢复无挑战导致萎缩;最佳状态是有节律的振荡'
  source: 03-Bio-Science/biology/energy-restoration/Energy_Restoration_Overview.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 身体能量的核心要点是什么？
  answer: '生理指标: 血糖、皮质醇、睾酮、炎症标志物(CRP)、HRV、静息心率、血压；心理指标: 疲劳感、身体舒适度、活力感；行为指标: 运动表现、反应时、握力'
  source: 03-Bio-Science/biology/energy-restoration/Energy_Restoration_Overview.md
  section: 能量的可测量性
- type: concept
  question: 情绪能量的核心要点是什么？
  answer: '生理指标: 皮质醇、催产素、血清素代谢物、HRV、前额叶-杏仁核连接；心理指标: PANAS量表(正负情绪)、社会连接感、情绪稳定性；行为指标: 社交参与度、笑容频率、冲突反应'
  source: 03-Bio-Science/biology/energy-restoration/Energy_Restoration_Overview.md
  section: 能量的可测量性
- type: concept
  question: 心智能量的核心要点是什么？
  answer: '生理指标: 前额叶血流(fMRI)、脑电图β波、瞳孔扩张(认知负荷)、血糖；心理指标: Stroop任务表现、工作记忆测试、注意力持续时间；行为指标: 决策质量、创造力测试、错误率'
  source: 03-Bio-Science/biology/energy-restoration/Energy_Restoration_Overview.md
  section: 能量的可测量性
- type: concept
  question: 身体能量的核心要点是什么？
  answer: '核心要素: ATP储备、氧合、血糖、神经递质、荷尔蒙平衡、肌肉张力；消耗因素: 睡眠不足、久坐、营养不良、慢性疼痛、疾病、过度训练；补充策略: 7-9h睡眠、战略性小憩、有氧运动、力量训练、抗炎饮食、充足水分、呼吸练习；最佳状态标志:
    清晨自然醒、持续精力、快速恢复、免疫强健、静息心率低、HRV高；耗竭状态标志: 慢性疲劳、频繁感冒、肌肉酸痛、睡眠障碍、代谢紊乱、体重失控；专业视角: Matthew Walker: "睡眠是认知与情绪的瑞士军刀";运动悖论:消耗能量反而增加总储备'
  source: 03-Bio-Science/biology/energy-restoration/Energy_Restoration_Overview.md
  section: 四维能量详细解析表 (Four Energy Dimensions in Detail)
- type: concept
  question: 情绪能量的核心要点是什么？
  answer: '核心要素: 正向情绪比例、情绪调节能力、社会连接、心理韧性、乐观倾向；消耗因素: 人际冲突、孤独、社交焦虑、情绪抑制、创伤、慢性压力；补充策略: 感恩练习、社会支持、自然暴露、慈悲冥想、心理治疗、情绪表达、宠物陪伴；最佳状态标志:
    情绪稳定、快速复原、社交愉悦、乐观现实、共情能力、幽默感；耗竭状态标志: 情绪波动大、社交退缩、悲观、易怒、麻木、共情疲劳；专业视角: Barbara Fredrickson的"拓展建构理论":正向情绪拓展认知视野,建构资源;3:1黄金比例(正性:负性情绪)'
  source: 03-Bio-Science/biology/energy-restoration/Energy_Restoration_Overview.md
  section: 四维能量详细解析表 (Four Energy Dimensions in Detail)
- type: concept
