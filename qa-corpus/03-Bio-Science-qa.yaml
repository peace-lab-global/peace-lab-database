  question: 警觉期的核心要点是什么？
  answer: '英文名称: Alarm Reaction；时间: 急性(分钟-小时)；HPA轴状态: 急剧激活；皮质醇水平: 急升；机体状态: 战斗-逃跑反应；能量动员；结局: 应对或进入下一阶段'
  source: 03-Bio-Science/biology/hpa-axis/HPA_Axis_Stress_Response.md
