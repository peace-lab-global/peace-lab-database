  question: 达峰时间(Tmax)的核心要点是什么？
  answer: '数值/描述: 15-45分钟；影响因素: 空腹vs餐后/个体差异；茶vs咖啡对比: 与咖啡相似；专业提示: 空腹吸收更快'
  source: 03-Bio-Science/foods/tea/Tea_Neuroscience_Pharmacology.md
  section: 茶叶咖啡因药代动力学表 (Tea Caffeine Pharmacokinetics)
- type: concept
  question: CYP1A2*1A/*1A的核心要点是什么？
  answer: '代谢表型: 快代谢型(Fast Metabolizer)；人群比例: 约40-50%；咖啡因半衰期: 3-4小时；茶饮用建议: 可较自由饮用,下午茶影响睡眠较小；临床意义: 咖啡因清除快,较少积累'
  source: 03-Bio-Science/foods/tea/Tea_Neuroscience_Pharmacology.md
  section: CYP1A2基因多态性与茶/咖啡因代谢表 (CYP1A2 Polymorphism)
- type: concept
  question: CYP1A2*1A/*1F的核心要点是什么？
  answer: '代谢表型: 中等代谢型(Intermediate)；人群比例: 约30-40%；咖啡因半衰期: 4-6小时；茶饮用建议: 下午后减少饮用,注意睡眠影响；临床意义: 个体差异大,需自我观察'
  source: 03-Bio-Science/foods/tea/Tea_Neuroscience_Pharmacology.md
  section: CYP1A2基因多态性与茶/咖啡因代谢表 (CYP1A2 Polymorphism)
- type: concept
  question: 绿茶的核心要点是什么？
  answer: '中文名: 绿茶；英文名: Green Tea；发酵程度: 不发酵(0%)；代表品种: 龙井/碧螺春/毛峰/煎茶；主要产区: 中国/日本；核心工艺特点: 杀青(炒/蒸)→揉捻→干燥；风味光谱: 鲜爽/清香/豆香/海苔；茶氨酸/儿茶素特点:
    儿茶素最高,茶氨酸中等'
  source: 03-Bio-Science/foods/tea/Tea_Varieties_Processing.md
  section: 六大茶类基础分类表 (Six Major Tea Categories)
- type: concept
  question: 白茶的核心要点是什么？
  answer: '中文名: 白茶；英文名: White Tea；发酵程度: 微发酵(5-10%)；代表品种: 白毫银针/白牡丹/寿眉；主要产区: 福建福鼎/政和；核心工艺特点: 萎凋→干燥(最简工艺)；风味光谱: 清甜/毫香/花香/蜜韵；茶氨酸/儿茶素特点:
    儿茶素高,工艺保留原始风味'
  source: 03-Bio-Science/foods/tea/Tea_Varieties_Processing.md
  section: 六大茶类基础分类表 (Six Major Tea Categories)
- type: concept
  question: 黄茶的核心要点是什么？
  answer: '中文名: 黄茶；英文名: Yellow Tea；发酵程度: 轻发酵(10-20%)；代表品种: 君山银针/蒙顶黄芽/霍山黄芽；主要产区: 湖南/四川/安徽；核心工艺特点: 杀青→闷黄→干燥；风味光谱: 甘醇/栗香/嫩香；茶氨酸/儿茶素特点:
    闷黄降低刺激性,更温和'
  source: 03-Bio-Science/foods/tea/Tea_Varieties_Processing.md
  section: 六大茶类基础分类表 (Six Major Tea Categories)
- type: concept
  question: 炒青绿茶的核心要点是什么？
  answer: '杀青方式: 高温铁锅炒制；代表产区/品种: 龙井/碧螺春/信阳毛尖；工艺特点: 高温快速钝化酶活性,香气炒香；风味特征: 豆香/栗香/炒制香,滋味浓醇；专业视角: 中国主流杀青方式,香气高扬'
  source: 03-Bio-Science/foods/tea/Tea_Varieties_Processing.md
  section: 按杀青方式分类
- type: concept
  question: 蒸青绿茶的核心要点是什么？
  answer: '杀青方式: 蒸汽杀青；代表产区/品种: 日本煎茶/玉露/中国恩施玉露；工艺特点: 蒸汽穿透快速杀青,色泽翠绿；风味特征: 海苔/青草/鲜爽,颜色更绿；专业视角: 日本主流,保留更多叶绿素与茶氨酸'
  source: 03-Bio-Science/foods/tea/Tea_Varieties_Processing.md
  section: 按杀青方式分类
- type: concept
  question: 烘青绿茶的核心要点是什么？
  answer: '杀青方式: 热风烘干为主；代表产区/品种: 黄山毛峰/太平猴魁/六安瓜片；工艺特点: 烘干温度较低,香气清新；风味特征: 花香/嫩香/清雅；专业视角: 香气清高但不如炒青浓郁'
  source: 03-Bio-Science/foods/tea/Tea_Varieties_Processing.md
  section: 按杀青方式分类
- type: concept
  question: 西湖龙井的核心要点是什么？
  answer: '产地: 浙江杭州；采摘标准: 一芽一叶/一芽二叶初展；关键工艺: 手工炒制"十大手法",辉锅定型；风味描述: 豆香/栗香,色绿/香郁/味甘/形美；等级划分: 特级/一级/二级(按采摘时间与外形)；冲泡要点: 80-85°C,玻璃杯,上投法/中投法'
  source: 03-Bio-Science/foods/tea/Tea_Varieties_Processing.md
  section: 中国十大名茶(绿茶部分)详表
- type: concept
  question: 碧螺春的核心要点是什么？
  answer: '产地: 江苏苏州洞庭山；采摘标准: 一芽一叶(极细嫩)；关键工艺: 手工炒制,果香茶混植；风味描述: 花果香(与果树间种),鲜爽；等级划分: 特级(满披白毫)起；冲泡要点: 75-80°C,玻璃杯,上投法'
  source: 03-Bio-Science/foods/tea/Tea_Varieties_Processing.md
  section: 中国十大名茶(绿茶部分)详表
- type: concept
  question: 花草茶的核心要点是什么？
  answer: '英文名 (English Term): Herbal Tea / Tisane；原始语言/术语 (Original Language): 法: *Tisane* (浸泡饮品); 希: *Ptisanē* (大麦水)；精确定义:
    以茶树以外的植物(花/叶/根/果/种子)为原料,经干燥、冲泡制成的饮品；区分与备注: 严格来说不是"茶"(Tea),因不含茶树成分；专业视角 (Professional Perspective): 无咖啡因是核心优势;需关注药物相互作用与过敏'
  source: 03-Bio-Science/foods/tea/herbal-tea/Herbal_Tea_Comprehensive.md
  section: 花草茶核心术语与定义表 (Core Terminology & Definitions)
- type: concept
  question: 花茶(窨制)的核心要点是什么？
  answer: '英文名 (English Term): Scented Tea / Flower Tea；原始语言/术语 (Original Language): 中: *Huā Chá* (花茶)；精确定义: 以茶叶为基底,通过窨制工艺吸附花香的茶；区分与备注:
    与花草茶不同:花茶含茶叶成分(咖啡因)；专业视角 (Professional Perspective): 茉莉花茶是最著名代表;兼具茶与花香功效'
  source: 03-Bio-Science/foods/tea/herbal-tea/Herbal_Tea_Comprehensive.md
  section: 花草茶核心术语与定义表 (Core Terminology & Definitions)
- type: concept
  question: 药草/草药的核心要点是什么？
  answer: '英文名 (English Term): Herb；原始语言/术语 (Original Language): 拉: *Herba* (草本植物)；精确定义: 具有药用、烹饪或芳香价值的草本植物；区分与备注: 广义包含木本植物的叶/花/根；专业视角
    (Professional Perspective): 西方Herbalism与中国本草学均有深厚传统'
  source: 03-Bio-Science/foods/tea/herbal-tea/Herbal_Tea_Comprehensive.md
