  question: 向死而生的核心要点是什么？
  answer: '英文名 (English Term): Being-toward-Death；原始语言/词源: 德: *Sein zum Tode*；精确定义: 死亡不是未来的事件,而是构成此在存在的结构性要素；代表哲学家: Heidegger；专业视角:
    存在主义哲学的核心;理解有限性是自由的前提'
  source: 03-Bio-Science/death/Death_Western_Philosophy_Classics.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
