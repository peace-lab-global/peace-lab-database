  question: 第三层：存在性整合的核心要点是什么？
  answer: '目标: 面对必死性、寻找意义、活出真实；主要干预: 存在疗法、意义疗法；适用人群: 存在性死亡焦虑'
  source: 03-Bio-Science/death/Death_Anxiety_Treatment.md
  section: 表2.1 死亡焦虑治疗的层次模型 (Hierarchical Treatment Model)
