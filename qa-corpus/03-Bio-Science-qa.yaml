  question: 沙漏造型的核心要点是什么？
  answer: '操作要点: 长颈设计，控制流速；风味结果: 萃取时间长(4-6分钟)；适用场景: 适合深焙豆，减少苦涩'
  source: 03-Bio-Science/foods/coffee/Coffee_Brewing_Techniques.md
