  question: 什么是1. Cham-Seon 参禅完整流程？
  answer: Cham-Seon（参禅）是韩国禅宗（Seon/선）的核心修行方式。一场标准的参禅从入堂到出堂约90分钟，包含礼佛、坐禅、行禅、喝茶、对话等多个环节，形成完整的修行循环。
  source: 02-Mind-Psychology/meditation/korean-seon/Korean_Seon_Practical.md
