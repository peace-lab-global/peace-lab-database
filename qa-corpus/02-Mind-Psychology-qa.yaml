  section: 内容索引 | Contents
- type: concept
  question: 免疫测定法的核心要点是什么？
  answer: '英文术语: Immunoassay；拉丁/希腊词源: *Immuno-* (拉丁语 *immunis* = 免疫) + *assay*；定义与说明: 利用抗原-抗体反应检测分析物的方法'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Assessment.md
  section: 核心术语与词源 (Core Terminology & Etymology)
- type: concept
  question: 液相色谱-质谱联用的核心要点是什么？
  answer: '英文术语: LC-MS/MS；拉丁/希腊词源: *Liquid Chromatography-Mass Spectrometry*；定义与说明: 分离和检测皮质醇的金标准方法'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Assessment.md
  section: 核心术语与词源 (Core Terminology & Etymology)
- type: concept
  question: 游离皮质醇的核心要点是什么？
  answer: '英文术语: Free Cortisol；拉丁/希腊词源: —；定义与说明: 未与蛋白结合的活性皮质醇，约占总量3-5%'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Assessment.md
  section: 核心术语与词源 (Core Terminology & Etymology)
- type: concept
  question: 血清/血浆的核心要点是什么？
  answer: '反映内容: 总皮质醇 (游离+结合)；优点: 临床标准、广泛可及；缺点: 有创、受CBG影响、单点采样；主要应用: 临床诊断、动态试验'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Assessment.md
  section: 皮质醇检测样本类型比较 (Sample Types Comparison)
- type: concept
  question: 唾液的核心要点是什么？
  answer: '反映内容: 游离皮质醇；优点: 无创、多点采样方便、反映活性形式；缺点: 标准化变异、口腔污染风险；主要应用: 研究、昼夜节律、CAR'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Assessment.md
  section: 皮质醇检测样本类型比较 (Sample Types Comparison)
- type: concept
  question: 24h尿液的核心要点是什么？
  answer: '反映内容: 日总游离皮质醇；优点: 避免昼夜节律影响、整合指标；缺点: 收集依从性、肾功能影响；主要应用: 库欣综合征筛查'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Assessment.md
  section: 皮质醇检测样本类型比较 (Sample Types Comparison)
- type: concept
  question: 化学发光免疫分析 (CLIA)的核心要点是什么？
  answer: '原理: 抗体-抗原反应+化学发光；优点: 自动化、高通量、广泛可及；缺点: 交叉反应、方法间差异；临床应用: 常规临床'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Assessment.md
  section: 检测方法比较
- type: concept
  question: 电化学发光 (ECLIA)的核心要点是什么？
  answer: '原理: 电化学发光检测；优点: 灵敏度高、自动化；缺点: 交叉反应；临床应用: 常规临床'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Assessment.md
  section: 检测方法比较
- type: concept
  question: 精神神经内分泌学的核心要点是什么？
  answer: '英文术语: Psychoneuroendocrinology；拉丁/希腊词源: *Psycho-* (希腊语 ψυχή = 心灵) + *neuro-* + *endo-* + *-crine*；定义与说明: 研究心理、神经与内分泌系统交互的学科'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Mental_Health.md
  section: 核心术语与词源 (Core Terminology & Etymology)
- type: concept
  question: 应激素质模型的核心要点是什么？
  answer: '英文术语: Diathesis-Stress Model；拉丁/希腊词源: *Diathesis* (希腊语 διάθεσις = 倾向) + *Stress*；定义与说明: 遗传/早年素质+环境应激→疾病发生'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Mental_Health.md
  section: 核心术语与词源 (Core Terminology & Etymology)
- type: concept
  question: 等位负荷的核心要点是什么？
  answer: '英文术语: Allostatic Load；拉丁/希腊词源: *Allo-* (希腊语 ἄλλος = 其他) + *stasis* (稳定)；定义与说明: 慢性应激累积的生理代价'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Mental_Health.md
  section: 核心术语与词源 (Core Terminology & Etymology)
- type: concept
  question: 重性抑郁障碍的核心要点是什么？
  answer: '典型皮质醇模式: 高皮质醇、CAR异常；HPA轴特征: 负反馈受损、曲线扁平化；主要发现: DST不抑制、海马萎缩；证据强度: 强'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Mental_Health.md
  section: 皮质醇与精神障碍总表 (Overview Table)
- type: concept
  question: 创伤后应激障碍的核心要点是什么？
  answer: '典型皮质醇模式: 低/正常皮质醇；HPA轴特征: 负反馈增强、HPA轴钝化；主要发现: 增强DST抑制、皮质醇低反应；证据强度: 强'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Mental_Health.md
  section: 皮质醇与精神障碍总表 (Overview Table)
- type: concept
  question: 广泛性焦虑障碍的核心要点是什么？
  answer: '典型皮质醇模式: 高/正常、节律紊乱；HPA轴特征: 持续激活、恢复延迟；主要发现: CAR改变、日内曲线异常；证据强度: 中'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Mental_Health.md
  section: 皮质醇与精神障碍总表 (Overview Table)
- type: concept
  question: 基础皮质醇升高的核心要点是什么？
  answer: '具体表现: 晨起、夜间皮质醇均升高；检测方法: 血清/唾液皮质醇；临床意义: 约50%患者存在'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Mental_Health.md
  section: 重性抑郁障碍 (Major Depressive Disorder, MDD)
- type: concept
  question: DST不抑制的核心要点是什么？
  answer: '具体表现: 地塞米松后皮质醇不下降；检测方法: 地塞米松抑制试验；临床意义: 负反馈受损指标'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Mental_Health.md
  section: 重性抑郁障碍 (Major Depressive Disorder, MDD)
- type: concept
  question: 神经内分泌学的核心要点是什么？
  answer: '英文术语: Neuroendocrinology；拉丁/希腊词源: *Neuro-* (希腊语 νεῦρον = 神经) + *endo-* (内) + *-crine* (分泌)；定义与说明: 研究神经系统与内分泌系统交互作用的学科'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Neuroscience.md
  section: 核心术语与词源 (Core Terminology & Etymology)
- type: concept
  question: 下丘脑-垂体-肾上腺轴的核心要点是什么？
  answer: '英文术语: HPA Axis；拉丁/希腊词源: *Hypothalamic-Pituitary-Adrenal*；定义与说明: 调控皮质醇分泌的核心神经内分泌系统'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Neuroscience.md
  section: 核心术语与词源 (Core Terminology & Etymology)
- type: concept
  question: 糖皮质激素受体的核心要点是什么？
  answer: '英文术语: Glucocorticoid Receptor (GR)；拉丁/希腊词源: *Gluco-* (糖) + *cortex* (皮层) + *receptor*；定义与说明: 皮质醇的主要细胞内受体，NR3C1基因编码'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Neuroscience.md
  section: 核心术语与词源 (Core Terminology & Etymology)
- type: concept
  question: 脂溶性的核心要点是什么？
  answer: '具体内容: 皮质醇为类固醇激素，高度脂溶性；临床意义: 可自由扩散穿越BBB'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Neuroscience.md
  section: 血脑屏障与皮质醇
- type: concept
  question: 无需转运体的核心要点是什么？
  answer: '具体内容: 被动扩散为主要进入方式；临床意义: 血浆皮质醇水平直接反映脑内浓度'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Neuroscience.md
  section: 血脑屏障与皮质醇
- type: concept
  question: 11β-HSD1的核心要点是什么？
  answer: '具体内容: 脑内存在，将可的松转化为皮质醇；临床意义: 局部放大皮质醇作用'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Neuroscience.md
  section: 血脑屏障与皮质醇
- type: concept
  question: 11β-HSD1活性的核心要点是什么？
  answer: '机制说明: 脑区特异性表达 (海马、皮层、小脑)；功能意义: 局部皮质醇放大'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Neuroscience.md
  section: 脑内皮质醇浓度调节
- type: concept
  question: GR/MR表达密度的核心要点是什么？
  answer: '机制说明: 不同脑区受体分布差异；功能意义: 决定皮质醇敏感性'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Neuroscience.md
  section: 脑内皮质醇浓度调节
- type: concept
  question: 皮质醇的核心要点是什么？
  answer: '英文术语: Cortisol；拉丁/希腊词源: *Cortisol* (拉丁语 *cortex* = 皮层 + *-ol* = 醇类)；定义与说明: 由肾上腺皮质束状带分泌的主要糖皮质激素，化学式C₂₁H₃₀O₅，分子量362.46
    g/mol'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Overview.md
  section: 核心术语与词源 (Core Terminology & Etymology)
- type: concept
  question: 氢化可的松的核心要点是什么？
  answer: '英文术语: Hydrocortisone；拉丁/希腊词源: *Hydro-* (希腊语 ὕδωρ = 水) + *cortisone*；定义与说明: 皮质醇的药用名称，用于区分内源性与外源性'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Overview.md
  section: 核心术语与词源 (Core Terminology & Etymology)
- type: concept
  question: 糖皮质激素的核心要点是什么？
  answer: '英文术语: Glucocorticoid；拉丁/希腊词源: *Gluco-* (希腊语 γλυκύς = 甜) + *cortex* + *-oid*；定义与说明: 肾上腺皮质分泌的影响糖代谢的类固醇激素总称'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Overview.md
  section: 核心术语与词源 (Core Terminology & Etymology)
- type: concept
  question: 化学分类的核心要点是什么？
  answer: '具体内容: 类固醇激素 (Steroid Hormone)，C21类固醇；临床意义: 脂溶性，可穿透细胞膜与胞内受体结合'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Overview.md
  section: 化学结构与性质
- type: concept
  question: 活化 (皮质酮→皮质醇)的核心要点是什么？
  answer: '酶系统: 11β-HSD1；代谢产物: 皮质醇 (活性)；组织分布: 肝、脂肪、脑'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Overview.md
  section: 皮质醇代谢与灭活
- type: concept
  question: 灭活 (皮质醇→可的松)的核心要点是什么？
  answer: '酶系统: 11β-HSD2；代谢产物: 可的松 (无活性)；组织分布: 肾、结肠、唾液腺'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Overview.md
  section: 皮质醇代谢与灭活
- type: concept
  question: 应激管理的核心要点是什么？
  answer: '英文术语: Stress Management；拉丁/希腊/梵语词源: *Stress* (拉丁语 *stringere* = 拉紧)；定义与说明: 通过各种策略降低应激反应和皮质醇水平'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Regulation.md
  section: 核心术语与词源 (Core Terminology & Etymology)
- type: concept
  question: 放松反应的核心要点是什么？
  answer: '英文术语: Relaxation Response；拉丁/希腊/梵语词源: *Relaxare* (拉丁语 = 松开)；定义与说明: Herbert Benson提出的与应激反应相反的生理状态'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Regulation.md
  section: 核心术语与词源 (Core Terminology & Etymology)
- type: concept
  question: 副交感激活的核心要点是什么？
  answer: '英文术语: Parasympathetic Activation；拉丁/希腊/梵语词源: *Para-* (希腊语 = 旁边) + *sympathetikos*；定义与说明: 激活副交感神经系统，降低皮质醇'
  source: 02-Mind-Psychology/psychology/stress-hpa/cortisol/Cortisol_Regulation.md
  section: 核心术语与词源 (Core Terminology & Etymology)
