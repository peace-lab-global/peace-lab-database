  question: 什么是概述 (Overview)？
  answer: 艾克哈特·托利（Eckhart Tolle，1948-）是21世纪全球最具影响力的灵性教师之一。他的两部核心著作——《当下的力量》(The Power of Now, 1997) 和《新世界：灵性的觉醒》(A New Earth,
    2005)——全球销量超过5000万册，被翻译成50多种语言。2008年，奥普拉·温弗瑞（Oprah Winfrey）选择《新世界》作为她读书俱乐部的推荐书目，在线网络课程吸引了3500万人参与，这是人类历史上规模最大的灵性教学事件之一。
  source: 02-Mind-Psychology/meditation/masters/contemporary-spiritual/Eckhart_Tolle.md
