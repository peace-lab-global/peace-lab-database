- type: concept
  question: '[Treatment-Resistant Depression](Depression_Treatment_Resistant.md)的核心要点是什么？'
  answer: '内容概要: 假难治性排查清单（8维度）、TRD严重程度分级（Maudsley分期）、综合生物学评估、换药/增效/联合用药策略详表、物理治疗循证汇总（ECT/rTMS/DBS/VNS/tDCS/光照/睡眠剥夺）、氯胺酮/艾氯胺酮快速抗抑郁、Psilocybin等新型实验治疗、心理治疗在TRD中的应用、整合治疗路径与测量为本照护；适用读者:
    精神科医生、研究者、难治性患者；体量: 350行'
  source: 02-Mind-Psychology/psychology/clinical/depression/INDEX.md
  section: 难治性与复杂病例
- type: concept
  question: '[Depression & Sleep Comorbidity](Depression_Sleep_Comorbidity.md)的核心要点是什么？'
  answer: '内容概要: 睡眠-抑郁双向因果关系与流行病学、共享神经环路（5-HT/NE/食欲素/DMN/HPA轴/褪黑素）、睡眠剥夺快速抗抑郁效应、整合评估框架（PSG/体动仪/节律）、抗抑郁药对睡眠的影响详表、CBT-I在抑郁中的应用、昼夜节律干预（光照/褪黑素/阿戈美拉汀/SRT）、特定人群睡眠管理、睡眠作为复发预测指标；适用读者:
