  question: 什么是概述 (Overview)？
  answer: 一行禅师（Thích Nhất Hạnh, 1926年10月11日—2022年1月22日）是越南禅宗僧侣、和平运动家、诗人和作家，20世纪至21世纪最具国际影响力的佛教精神领袖之一，仅次于达赖喇嘛的全球知名佛教人物。他创立了"入世佛教"（Engaged
    Buddhism）运动，将冥想修行与社会行动结合，并在法国建立了梅村（Plum Village）修行社区——全球最大的佛教修行中心之一。
