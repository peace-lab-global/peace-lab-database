  question: Pranayama的核心要点是什么？
  answer: '内容: 详细描述了对唤醒Kundalini至关重要的呼吸控制技术，包括Kumbhaka（悬息）、Nadi Shodhana（经脉净化）'
  source: 02-Mind-Psychology/meditation/kundalini-meditation/Kundalini_Meditation_Overview.md
