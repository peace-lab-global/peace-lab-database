  question: 什么是一、跨文化历史渊源？
  answer: 自然冥想并非现代发明——人类在自然中寻求转化与治愈的历史，几乎与人类文明本身一样古老。不同文化以各自的语言和框架，描述了在森林、山川、水流与天空之下所发生的深层心理与灵性体验。
  source: 02-Mind-Psychology/meditation/nature-meditation/Nature_Meditation_Overview.md
