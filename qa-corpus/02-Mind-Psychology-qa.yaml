- type: concept
  question: 第三相：明性圆满的核心要点是什么？
  answer: '藏文原名: Rig-pa tshad-phebs；英文译名: Awareness Reaching Fullness；现象学特征: 觉知无处不在，一切皆明性；神经对应: 全脑整合态；跨频率耦合；生活表现: 觉知渗透睡眠与梦境；现代评估标准:
    NADA-T>=4.0；24小时觉知连续报告；9LM: L6'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Assessment_Stages.md
