  question: 第二相：觉受增长的核心要点是什么？
  answer: '藏文原名: Nyams-snang gong-''phel；英文译名: Increase of Experience；现象学特征: 觉知体验的深度与广度增加；神经对应: gamma波持续增强；全脑连接重塑；生活表现: 负面情境中保持觉知；现代评估标准:
    NADA-T>=3.5；可在困难中维持数小时；9LM: L5'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Assessment_Stages.md
