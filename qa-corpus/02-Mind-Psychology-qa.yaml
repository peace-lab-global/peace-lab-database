- type: concept
  question: 精神发育迟滞的核心要点是什么？
  answer: '英文名 (English Term): Mental Retardation (旧称) / Intellectual Disability (现用)；原始语言/词源 (Original Language): 拉丁语: *Intellectus*
    (理解力) + *Dis-* (缺乏) + *Abilitas* (能力)；词源含义: "理解能力的缺失"；精确定义: 智力功能和适应功能的显著限制，发生在发育期（18岁前）；历史演变: 术语从"白痴/低能"→"精神发育迟滞"→"智力障碍"演变；专业视角
    (Professional Perspective): DSM-5已改用"智力障碍(ID)"；强调适应功能而非IQ分数'
  source: 02-Mind-Psychology/psychology/clinical/disorder/intellectual-disability-psychosis/Intellectual_Disability_Psychosis_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 诊断遮蔽的核心要点是什么？
  answer: '英文名 (English Term): Diagnostic Overshadowing；原始语言/词源 (Original Language): -；词源含义: 一个诊断遮蔽另一个；精确定义: 临床医生将精神障碍症状错误地归因于智力障碍本身；历史演变:
    Reiss (1982) 首次描述；专业视角 (Professional Perspective): 导致ID患者的精神病显著漏诊'
  source: 02-Mind-Psychology/psychology/clinical/disorder/intellectual-disability-psychosis/Intellectual_Disability_Psychosis_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 行为等价物的核心要点是什么？
  answer: '英文名 (English Term): Behavioral Equivalents；原始语言/词源 (Original Language): -；词源含义: 行为替代症状表达；精确定义: ID患者因沟通限制，以行为变化（攻击、退缩、自伤）表达精神痛苦；历史演变:
    对传统诊断标准的适应性修改；专业视角 (Professional Perspective): 需要观察行为变化而非依赖言语报告'
  source: 02-Mind-Psychology/psychology/clinical/disorder/intellectual-disability-psychosis/Intellectual_Disability_Psychosis_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 轻度的核心要点是什么？
  answer: 'IQ参考范围: 50-69；概念域: 学龄前不明显；学业困难；成人抽象思维受限；社会域: 社交判断不成熟；易受利用；沟通较具体；实用域: 可独立生活；需复杂任务支持；占ID人群比例: ~85%；精神病共病风险: 与一般人群相近-略高'
  source: 02-Mind-Psychology/psychology/clinical/disorder/intellectual-disability-psychosis/Intellectual_Disability_Psychosis_Overview.md
  section: 表2.1 DSM-5 智力障碍严重度分级 (Severity Levels)
- type: concept
  question: 中度的核心要点是什么？
  answer: 'IQ参考范围: 35-49；概念域: 学业进展缓慢；成人停留在小学水平；社会域: 社会判断和决策能力有限；需支持；实用域: 基本生活自理可能；需监督和协助；占ID人群比例: ~10%；精神病共病风险: 明显升高'
  source: 02-Mind-Psychology/psychology/clinical/disorder/intellectual-disability-psychosis/Intellectual_Disability_Psychosis_Overview.md
  section: 表2.1 DSM-5 智力障碍严重度分级 (Severity Levels)
- type: concept
  question: 重度的核心要点是什么？
  answer: 'IQ参考范围: 20-34；概念域: 概念理解有限；对语言和数量理解受限；社会域: 言语有限；理解简单语言和手势；实用域: 所有日常活动需协助；占ID人群比例: ~3-4%；精神病共病风险: 高'
  source: 02-Mind-Psychology/psychology/clinical/disorder/intellectual-disability-psychosis/Intellectual_Disability_Psychosis_Overview.md
  section: 表2.1 DSM-5 智力障碍严重度分级 (Severity Levels)
- type: concept
  question: 任何精神障碍的核心要点是什么？
  answer: 'ID患者患病率: 30-40%；一般人群患病率: 15-20%；比值: 2倍'
  source: 02-Mind-Psychology/psychology/clinical/disorder/intellectual-disability-psychosis/Intellectual_Disability_Psychosis_Overview.md
  section: 表2.2 ID 患者精神障碍患病率 (Prevalence of Mental Disorders in ID)
- type: concept
  question: 精神病性障碍的核心要点是什么？
  answer: 'ID患者患病率: 3-10%；一般人群患病率: 0.7-1%；比值: 3-10倍'
  source: 02-Mind-Psychology/psychology/clinical/disorder/intellectual-disability-psychosis/Intellectual_Disability_Psychosis_Overview.md
  section: 表2.2 ID 患者精神障碍患病率 (Prevalence of Mental Disorders in ID)
- type: concept
  question: 言语报告受限的核心要点是什么？
  answer: '原因: 多数中度-重度ID患者无法清晰描述主观体验；应对策略: 依赖行为观察和照护者报告'
  source: 02-Mind-Psychology/psychology/clinical/disorder/intellectual-disability-psychosis/Intellectual_Disability_Psychosis_Self_Assessment.md
  section: 表1.1 ID 人群精神病评估面临的挑战
- type: concept
  question: 诊断遮蔽的核心要点是什么？
  answer: '原因: 症状被误归因于"就是智力低"；应对策略: 培训评估者意识到ID患者可以且会有精神障碍'
  source: 02-Mind-Psychology/psychology/clinical/disorder/intellectual-disability-psychosis/Intellectual_Disability_Psychosis_Self_Assessment.md
  section: 表1.1 ID 人群精神病评估面临的挑战
- type: concept
  question: 行为等价物的核心要点是什么？
  answer: '原因: 精神病性症状以行为改变形式呈现；应对策略: 学习识别行为等价物'
  source: 02-Mind-Psychology/psychology/clinical/disorder/intellectual-disability-psychosis/Intellectual_Disability_Psychosis_Self_Assessment.md
  section: 表1.1 ID 人群精神病评估面临的挑战
- type: concept
  question: 自言自语明显增加（超出基线）的核心要点是什么？
  answer: '☐: ☐新出现/增加 ☐无变化；与基线对比: 之前：___ 现在：___；出现频率: 每天/每周'
  source: 02-Mind-Psychology/psychology/clinical/disorder/intellectual-disability-psychosis/Intellectual_Disability_Psychosis_Self_Assessment.md
  section: 表2.1 精神病性症状行为等价物清单
- type: concept
  question: 低起始，慢滴定的核心要点是什么？
  answer: '内涵: ID患者对药物更敏感；实践要点: 起始剂量为一般人群的1/4-1/2；每次加量更少；常见误区: 使用标准成人剂量'
  source: 02-Mind-Psychology/psychology/clinical/disorder/intellectual-disability-psychosis/Intellectual_Disability_Psychosis_Treatment.md
  section: 表1.1 核心治疗原则
- type: concept
  question: 排除躯体原因优先的核心要点是什么？
  answer: '内涵: 行为变化首先排除疼痛/感染/便秘等；实践要点: 全面体格检查在药物治疗前；常见误区: 直接用抗精神病药控制行为'
  source: 02-Mind-Psychology/psychology/clinical/disorder/intellectual-disability-psychosis/Intellectual_Disability_Psychosis_Treatment.md
  section: 表1.1 核心治疗原则
- type: concept
  question: 行为支持优先的核心要点是什么？
  answer: '内涵: 非药物干预应先于或伴随药物；实践要点: 功能行为分析；环境调整；常见误区: 仅靠药物"控制行为"'
  source: 02-Mind-Psychology/psychology/clinical/disorder/intellectual-disability-psychosis/Intellectual_Disability_Psychosis_Treatment.md
  section: 表1.1 核心治疗原则
- type: concept
  question: 利培酮的核心要点是什么？
  answer: '起始剂量: 0.25-0.5mg/d；治疗剂量: 1-4mg/d；优势: 液态剂型可用；证据最多；ID人群特殊风险: 催乳素↑↑；EPS（ID患者更敏感）'
  source: 02-Mind-Psychology/psychology/clinical/disorder/intellectual-disability-psychosis/Intellectual_Disability_Psychosis_Treatment.md
  section: 表2.1 抗精神病药在ID+精神病中的应用
- type: concept
  question: 阿立哌唑的核心要点是什么？
  answer: '起始剂量: 2-5mg/d；治疗剂量: 5-15mg/d；优势: 代谢风险低；部分激动机制；ID人群特殊风险: 静坐不能'
  source: 02-Mind-Psychology/psychology/clinical/disorder/intellectual-disability-psychosis/Intellectual_Disability_Psychosis_Treatment.md
  section: 表2.1 抗精神病药在ID+精神病中的应用
- type: concept
  question: 奥氮平的核心要点是什么？
  answer: '起始剂量: 2.5-5mg/d；治疗剂量: 5-15mg/d；优势: 镇静；口溶片可用；ID人群特殊风险: 体重↑↑↑（ID人群本就肥胖率高）'
  source: 02-Mind-Psychology/psychology/clinical/disorder/intellectual-disability-psychosis/Intellectual_Disability_Psychosis_Treatment.md
  section: 表2.1 抗精神病药在ID+精神病中的应用
- type: concept
  question: 血液检查的核心要点是什么？
  answer: '特殊挑战: 患者可能恐惧/不配合抽血；应对策略: 行为预备（社交故事、脱敏）；EMLA局麻贴'
  source: 02-Mind-Psychology/psychology/clinical/disorder/intellectual-disability-psychosis/Intellectual_Disability_Psychosis_Treatment.md
  section: 表2.2 药物监测特殊考量 (Monitoring in ID)
- type: concept
  question: 体重/BMI的核心要点是什么？
  answer: '特殊挑战: 可能已有肥胖；配合度差；应对策略: 简化流程；照护者协助'
  source: 02-Mind-Psychology/psychology/clinical/disorder/intellectual-disability-psychosis/Intellectual_Disability_Psychosis_Treatment.md
  section: 表2.2 药物监测特殊考量 (Monitoring in ID)
