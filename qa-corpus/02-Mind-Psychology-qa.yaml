  section: 1.1 术语与定义
- type: concept
  question: 留守妇女的核心要点是什么？
  answer: '英文: Left-Behind Women；定义: 丈夫外出务工，独自留在农村承担家庭责任的女性；中国标准: 丈夫外出≥6个月；全球对应现象: 移民工人配偶'
  source: 02-Mind-Psychology/psychology/social/rural-psychology/Rural_Left_Behind_Psychology.md
  section: 1.1 术语与定义
