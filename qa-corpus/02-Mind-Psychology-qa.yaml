  section: 五种沟通姿态核心对照表
- type: concept
  question: 定义的核心要点是什么？
  answer: '内容: 一种忽略自己感受与需求，过度关注他人与情境的沟通模式；专业视角 (Professional Perspective): 表面是照顾他人，实际是恐惧冲突与被抛弃'
  source: 02-Mind-Psychology/meditation/satir-model/Satir_Communication_Stances.md
  section: 讨好姿态(Placating)深度分析表
