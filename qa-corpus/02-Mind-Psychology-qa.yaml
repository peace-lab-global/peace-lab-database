- type: concept
  question: 纳入标准的核心要点是什么？
  answer: '英文: Inclusion Criteria；原始语言/词源: 拉丁语: includere (包含)；定义: 满足诊断的必要条件'
  source: 02-Mind-Psychology/psychology/stress-hpa/cfs/CFS_Diagnosis_Assessment.md
  section: 1.1 核心诊断术语
- type: concept
  question: 排除标准的核心要点是什么？
  answer: '英文: Exclusion Criteria；原始语言/词源: 拉丁语: excludere (排除)；定义: 需排除的其他疾病'
  source: 02-Mind-Psychology/psychology/stress-hpa/cfs/CFS_Diagnosis_Assessment.md
  section: 1.1 核心诊断术语
- type: concept
  question: 问卷的核心要点是什么？
  answer: '英文: Questionnaire；定义: 自评或他评测量表'
  source: 02-Mind-Psychology/psychology/stress-hpa/cfs/CFS_Diagnosis_Assessment.md
  section: 1.2 评估工具术语
- type: concept
  question: 功能状态的核心要点是什么？
  answer: '英文: Functional Status；定义: 日常活动能力评估'
  source: 02-Mind-Psychology/psychology/stress-hpa/cfs/CFS_Diagnosis_Assessment.md
  section: 1.2 评估工具术语
- type: concept
  question: Holmes/CDC的核心要点是什么？
  answer: '年份: 1988；制定机构: CDC；特点: 首个正式标准，过于宽泛；主要用途: 历史意义'
  source: 02-Mind-Psychology/psychology/stress-hpa/cfs/CFS_Diagnosis_Assessment.md
  section: 2.1 诊断标准演变概览
- type: concept
  question: Oxford的核心要点是什么？
  answer: '年份: 1991；制定机构: 英国研究者；特点: 仅要求疲劳，最宽松；主要用途: 研究(已不推荐)'
  source: 02-Mind-Psychology/psychology/stress-hpa/cfs/CFS_Diagnosis_Assessment.md
  section: 2.1 诊断标准演变概览
- type: concept
  question: 免疫失调的核心要点是什么？
  answer: '英文: Immune Dysregulation；原始语言/词源: 拉丁语: immunis (豁免) + dysregulare (失调)；定义与ME/CFS关联: 免疫系统平衡紊乱，ME/CFS核心病理特征'
  source: 02-Mind-Psychology/psychology/stress-hpa/cfs/CFS_Etiology_Mechanisms.md
  section: 1.1 免疫系统术语
- type: concept
  question: 细胞因子风暴的核心要点是什么？
  answer: '英文: Cytokine Storm；原始语言/词源: 希腊语: κύτος (kytos, 细胞) + κίνησις (kinesis, 运动)；定义与ME/CFS关联: 炎症因子过度释放，急性期可见'
  source: 02-Mind-Psychology/psychology/stress-hpa/cfs/CFS_Etiology_Mechanisms.md
  section: 1.1 免疫系统术语
- type: concept
  question: 慢性低度炎症的核心要点是什么？
  answer: '英文: Chronic Low-Grade Inflammation；原始语言/词源: 拉丁语: chronicus + inflammare；定义与ME/CFS关联: 持续的亚临床炎症状态'
  source: 02-Mind-Psychology/psychology/stress-hpa/cfs/CFS_Etiology_Mechanisms.md
  section: 1.1 免疫系统术语
- type: concept
  question: 神经炎症的核心要点是什么？
  answer: '英文: Neuroinflammation；原始语言/词源: 希腊语: νεῦρον + 拉丁语: inflammare；定义与ME/CFS关联: 中枢神经系统炎症，ME核心命名依据'
  source: 02-Mind-Psychology/psychology/stress-hpa/cfs/CFS_Etiology_Mechanisms.md
  section: 1.2 神经系统术语
- type: concept
  question: 小胶质细胞激活的核心要点是什么？
  answer: '英文: Microglial Activation；原始语言/词源: 希腊语: μικρός (mikros, 小) + γλία (glia, 胶)；定义与ME/CFS关联: 脑内免疫细胞异常激活'
  source: 02-Mind-Psychology/psychology/stress-hpa/cfs/CFS_Etiology_Mechanisms.md
  section: 1.2 神经系统术语
- type: concept
  question: 血脑屏障的核心要点是什么？
  answer: '英文: Blood-Brain Barrier (BBB)；原始语言/词源: —；定义与ME/CFS关联: ME/CFS中可能通透性增加'
  source: 02-Mind-Psychology/psychology/stress-hpa/cfs/CFS_Etiology_Mechanisms.md
  section: 1.2 神经系统术语
- type: concept
  question: 线粒体功能障碍的核心要点是什么？
  answer: '英文: Mitochondrial Dysfunction；原始语言/词源: 希腊语: μίτος (mitos, 线) + χόνδρος (chondros, 颗粒)；定义与ME/CFS关联: 细胞能量工厂受损'
  source: 02-Mind-Psychology/psychology/stress-hpa/cfs/CFS_Etiology_Mechanisms.md
  section: 1.3 代谢与能量术语
- type: concept
  question: 氧化应激的核心要点是什么？
  answer: '英文: Oxidative Stress；原始语言/词源: 拉丁语: oxidare (氧化)；定义与ME/CFS关联: 自由基与抗氧化失衡'
  source: 02-Mind-Psychology/psychology/stress-hpa/cfs/CFS_Etiology_Mechanisms.md
  section: 1.3 代谢与能量术语
- type: concept
  question: 慢性疲劳综合征的核心要点是什么？
  answer: '英文: Chronic Fatigue Syndrome (CFS)；原始语言/词源: 拉丁语: chronicus (χρονικός 希腊语, 长期的) + fatigare (使疲倦) + 希腊语: σύνδρομον
    (syndromos, 综合征)；定义: 以持续6个月以上不可解释疲劳为主要特征的临床综合征'
  source: 02-Mind-Psychology/psychology/stress-hpa/cfs/CFS_Overview.md
  section: 1.1 主要术语详表
- type: concept
  question: 肌痛性脑脊髓炎的核心要点是什么？
  answer: '英文: Myalgic Encephalomyelitis (ME)；原始语言/词源: 希腊语: μῦς (mys, 肌肉) + ἄλγος (algos, 疼痛) + ἐγκέφαλος (enkephalos, 脑)
    + μυελός (myelos, 脊髓) + -itis (炎症)；定义: 强调神经炎症病理的命名'
  source: 02-Mind-Psychology/psychology/stress-hpa/cfs/CFS_Overview.md
  section: 1.1 主要术语详表
- type: concept
  question: 系统性劳作不耐受疾病的核心要点是什么？
  answer: '英文: Systemic Exertion Intolerance Disease (SEID)；原始语言/词源: 拉丁语: systema (系统) + exertio (劳作) + intolerantia (不耐受)；定义:
    2015年IOM提出的替代命名，强调PEM特征'
  source: 02-Mind-Psychology/psychology/stress-hpa/cfs/CFS_Overview.md
  section: 1.1 主要术语详表
- type: concept
  question: 1750s的核心要点是什么？
  answer: '名称: 神经衰弱 (Neurasthenia)；语境与特点: George Beard提出，希腊语: νεῦρον + ἀσθένεια (虚弱)，强调神经耗竭'
  source: 02-Mind-Psychology/psychology/stress-hpa/cfs/CFS_Overview.md
  section: 1.2 历史命名演变
- type: concept
  question: 1934的核心要点是什么？
  answer: '名称: 洛杉矶病 (Los Angeles Disease)；语境与特点: 因洛杉矶County医院爆发而命名'
  source: 02-Mind-Psychology/psychology/stress-hpa/cfs/CFS_Overview.md
  section: 1.2 历史命名演变
- type: concept
  question: 1955的核心要点是什么？
  answer: '名称: 皇家自由病 (Royal Free Disease)；语境与特点: 伦敦皇家自由医院流行病命名'
  source: 02-Mind-Psychology/psychology/stress-hpa/cfs/CFS_Overview.md
  section: 1.2 历史命名演变
- type: concept
