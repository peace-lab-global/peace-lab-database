- type: concept
  question: 核心情绪的核心要点是什么？
  answer: '儿童期: 易激惹 > 悲伤；青春期: 悲伤 + 易激惹 + 焦虑；成年期: 悲伤/空虚为主；临床意义: 青春期易激惹和焦虑常是抑郁的"面具"'
  source: 02-Mind-Psychology/psychology/clinical/depression/adolescent-depression/Adolescent_Depression.md
  section: 表1.1 青少年抑郁的特殊性
- type: concept
  question: 表达模式的核心要点是什么？
  answer: '儿童期: 躯体主诉；行为问题；青春期: 情绪波动大；社交退缩；自伤；网络沉溺；成年期: 认知症状突出；临床意义: 青少年表达更行为化'
  source: 02-Mind-Psychology/psychology/clinical/depression/adolescent-depression/Adolescent_Depression.md
  section: 表1.1 青少年抑郁的特殊性
- type: concept
  question: 自杀风险的核心要点是什么？
  answer: '儿童期: 较低；青春期: **急剧升高**（尤其15岁后）；成年期: 高；临床意义: 青春期是自杀风险突增期'
  source: 02-Mind-Psychology/psychology/clinical/depression/adolescent-depression/Adolescent_Depression.md
  section: 表1.1 青少年抑郁的特殊性
- type: concept
  question: 生物的核心要点是什么？
  answer: '因素: 遗传易感性（家族史）；OR/RR: RR 2-4；机制: 多基因风险；HPA轴遗传；可干预性: 低'
  source: 02-Mind-Psychology/psychology/clinical/depression/adolescent-depression/Adolescent_Depression.md
  section: 表2.1 青少年抑郁风险因素
- type: concept
  question: 女性性别的核心要点是什么？
  answer: '因素: RR 2-3（青春期后）；OR/RR: 激素；社会性别角色；反刍倾向；机制: 低'
  source: 02-Mind-Psychology/psychology/clinical/depression/adolescent-depression/Adolescent_Depression.md
  section: 表2.1 青少年抑郁风险因素
- type: concept
  question: 青春期发育时机的核心要点是什么？
  answer: '因素: 早发育者风险↑；OR/RR: 社会比较；身份压力；机制: 低'
  source: 02-Mind-Psychology/psychology/clinical/depression/adolescent-depression/Adolescent_Depression.md
  section: 表2.1 青少年抑郁风险因素
- type: concept
  question: 核心表现的核心要点是什么？
  answer: '女性青少年: 悲伤、反刍、焦虑、自伤、进食问题；男性青少年: 易激惹、愤怒、行为问题、物质使用、冒险'
  source: 02-Mind-Psychology/psychology/clinical/depression/adolescent-depression/Adolescent_Depression.md
  section: 表2.2 性别差异
- type: concept
  question: 行为的核心要点是什么？
  answer: '信号: 自伤（NSSI）；学业骤降；网络沉溺；风险行为；物质使用'
  source: 02-Mind-Psychology/psychology/clinical/depression/adolescent-depression/INDEX.md
  section: 青少年抑郁关键信号（非典型）
- type: concept
  question: 氟西汀**（≥8岁，FDA批准）的核心要点是什么？
  answer: '次选: **艾司西酞普兰**（≥12岁，FDA批准）；避免: 帕罗西汀（撤药重；自杀风险数据不佳）'
  source: 02-Mind-Psychology/psychology/clinical/depression/adolescent-depression/INDEX.md
  section: 青少年抗抑郁药首选
