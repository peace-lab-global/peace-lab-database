  question: 广泛性焦虑障碍的核心要点是什么？
  answer: 'DSM-5分类: F41.1；坛城冥想适用性: ★★★★★；推荐技术: 坛城涂色、凝视、简单几何观想；循证等级: A级；禁忌/注意: 无明显禁忌；治疗整合建议: 可作为CBT辅助、放松训练补充；专业视角: 最强适应症,多项RCT支持'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Clinical.md
  section: 精神障碍应用指南 (Mental Disorder Applications)
- type: concept
  question: 惊恐障碍的核心要点是什么？
  answer: 'DSM-5分类: F41.0；坛城冥想适用性: ★★★★☆；推荐技术: 结构化涂色、安全地观想；循证等级: B级；禁忌/注意: 避免过于复杂的坛城；治疗整合建议: 配合呼吸训练、暴露疗法；专业视角: 规则结构提供可预测性'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Clinical.md
  section: 精神障碍应用指南 (Mental Disorder Applications)
- type: concept
  question: 社交焦虑障碍的核心要点是什么？
  answer: 'DSM-5分类: F40.10；坛城冥想适用性: ★★★☆☆；推荐技术: 独处坛城创作、渐进到团体分享；循证等级: C级；禁忌/注意: 团体分享需渐进式；治疗整合建议: 配合暴露、社交技能训练；专业视角: 坛城作为非言语沟通桥梁'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Clinical.md
  section: 精神障碍应用指南 (Mental Disorder Applications)
- type: concept
  question: 儿童 (6-12岁)的核心要点是什么？
  answer: '特殊考量: 注意力时长短、精细运动发展中；推荐调整: 简化坛城、缩短时间(10-15分钟)、大尺寸；潜在风险: 挫败感、无聊；干预重点: 创造性表达、情绪识别；专业视角: 玩中学,避免过度结构化'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Clinical.md
  section: 特殊人群应用指南 (Special Populations)
- type: concept
  question: 青少年 (13-18岁)的核心要点是什么？
  answer: '特殊考量: 身份探索、同侪影响、情绪波动；推荐调整: 允许个性化、可团体创作、数字选项；潜在风险: 评判性比较；干预重点: 自我认同、情绪表达；专业视角: 尊重自主性,提供选择'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Clinical.md
  section: 特殊人群应用指南 (Special Populations)
- type: concept
  question: 老年人 (65+)的核心要点是什么？
  answer: '特殊考量: 精细运动下降、视力问题、认知变化；推荐调整: 大尺寸坛城、粗笔、高对比度；潜在风险: 挫败感、疲劳；干预重点: 认知刺激、生命回顾；专业视角: 调整难度,强调过程而非结果'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Clinical.md
  section: 特殊人群应用指南 (Special Populations)
- type: concept
  question: 认知行为疗法 (CBT)的核心要点是什么？
  answer: '整合方式: 思维记录可视化、认知重构图像化；具体技术: "思维坛城"(不同区域放置不同思维类型)；增强效果: 增强认知觉察、降低抽象性；实施时机: 认知重构阶段；专业视角: 将认知技术具象化,适合视觉型患者'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Clinical.md
  section: 坛城冥想与主流疗法整合表 (Integration with Major Therapies)
- type: concept
  question: 辩证行为疗法 (DBT)的核心要点是什么？
  answer: '整合方式: 痛苦耐受技能、情绪调节技能；具体技术: "TIPP坛城"(温度变化用颜色表示)、情绪温度计坛城；增强效果: 提供非言语的技能练习；实施时机: 技能训练模块；专业视角: DBT的视觉化扩展'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Clinical.md
  section: 坛城冥想与主流疗法整合表 (Integration with Major Therapies)
- type: concept
  question: 初级视觉皮层的核心要点是什么？
  answer: '英文名: Primary Visual Cortex (V1)；解剖位置: 枕叶后部(Brodmann 17区)；主要功能: 基础视觉加工、边缘检测；在坛城冥想中的作用: 处理坛城的线条、形状、对比度；相关研究发现: 凝视冥想激活增强；专业视角:
    坛城几何结构直接激活视觉加工起点'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Neuroscience.md
  section: 坛城冥想相关脑区详表 (Brain Regions in Mandala Meditation)
- type: concept
  question: 次级视觉皮层的核心要点是什么？
  answer: '英文名: Secondary Visual Cortex (V2-V4)；解剖位置: 枕叶(Brodmann 18-19区)；主要功能: 颜色加工、形状识别、运动检测；在坛城冥想中的作用: 处理坛城的色彩、复杂图案；相关研究发现:
    彩色坛城比黑白坛城激活更广；专业视角: V4专门负责色彩,对坛城涂色高度敏感'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Neuroscience.md
  section: 坛城冥想相关脑区详表 (Brain Regions in Mandala Meditation)
- type: concept
  question: 顶叶后皮层的核心要点是什么？
  answer: '英文名: Posterior Parietal Cortex (PPC)；解剖位置: 顶叶后部(Brodmann 5,7区)；主要功能: 空间认知、注意力导向、视觉-运动整合；在坛城冥想中的作用: 坛城的空间关系处理、从外到内的注意力移动；相关研究发现:
    坛城凝视时显著激活；专业视角: 坛城的中心化结构引导空间注意力'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Neuroscience.md
  section: 坛城冥想相关脑区详表 (Brain Regions in Mandala Meditation)
- type: concept
  question: 背侧注意网络的核心要点是什么？
  answer: '组成脑区: 顶内沟(IPS)、额眼区(FEF)；功能特征: 自上而下的注意力控制、目标导向注意；在坛城冥想中的状态: 凝视坛城时强烈激活；训练效应: 长期练习增强网络效率；专业视角: 坛城中心的凝视训练选择性注意'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Neuroscience.md
  section: 坛城冥想神经网络图谱 (Neural Network Map)
- type: concept
  question: 腹侧注意网络的核心要点是什么？
  answer: '组成脑区: 颞顶联合区(TPJ)、腹侧前额叶；功能特征: 自下而上的注意捕获、突显检测；在坛城冥想中的状态: 初期坛城探索时活跃；训练效应: 学会忽略分心刺激；专业视角: 从"被吸引"到"主动聚焦"的转变'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Neuroscience.md
  section: 坛城冥想神经网络图谱 (Neural Network Map)
- type: concept
  question: 执行控制网络的核心要点是什么？
  answer: '组成脑区: DLPFC、ACC、顶叶；功能特征: 认知控制、决策、冲突解决；在坛城冥想中的状态: 复杂坛城观想/绘制时激活；训练效应: 增强执行功能；专业视角: 坛城创作需要持续的认知控制'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Neuroscience.md
  section: 坛城冥想神经网络图谱 (Neural Network Map)
- type: concept
  question: Delta (δ)的核心要点是什么？
  answer: '频率范围: 0.5-4 Hz；意识状态: 深睡、无意识；坛城冥想中的变化: 深度坛城冥想可能出现清醒δ；关联体验: 极深的宁静、"无念"状态；测量研究: 高阶禅修者有清醒δ波；专业视角: 罕见,代表意识的"底层清扫"'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Neuroscience.md
  section: 坛城冥想脑波特征表 (EEG Patterns in Mandala Meditation)
- type: concept
  question: Theta (θ)的核心要点是什么？
  answer: '频率范围: 4-8 Hz；意识状态: 浅睡、梦境、深度放松；坛城冥想中的变化: 坛城观想时θ波增加；关联体验: 鲜活的内在意象、创造性洞见；测量研究: 创意坛城时前额θ增加；专业视角: 与潜意识内容的浮现相关'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Neuroscience.md
  section: 坛城冥想脑波特征表 (EEG Patterns in Mandala Meditation)
- type: concept
  question: 坛城/曼陀罗的核心要点是什么？
  answer: '英文名 (English Term): Mandala；梵文/藏文 (Sanskrit/Tibetan): 梵: *Maṇḍala* (मण्डल, 圆/圆满)；精确定义: 象征宇宙秩序与精神完整性的几何图形，通常以同心圆与方形为基础结构，代表宇宙与意识的缩影；历史渊源:
    源自吠陀仪式(约前1500年)，后发展于印度教密宗与佛教密乘；专业视角 (Professional Perspective): 是人类最古老的整合性符号之一，荣格称其为"自性的原型象征"'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Overview.md
  section: 核心术语表 (Core Terms)
- type: concept
  question: 坛城冥想的核心要点是什么？
  answer: '英文名 (English Term): Mandala Meditation；梵文/藏文 (Sanskrit/Tibetan): 梵: *Maṇḍala Dhyāna* (मण्डल ध्यान)；精确定义: 以坛城为所缘境(对象)的冥想修持，包括观想、绘制、凝视等多种方式；历史渊源:
    佛教密乘生起次第(Utpattikrama)的核心修法；专业视角 (Professional Perspective): 结合专注冥想(FA)与观想冥想(Visualization)，激活视觉皮层与想象力网络'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Overview.md
  section: 核心术语表 (Core Terms)
- type: concept
  question: 中心点/种子点的核心要点是什么？
  answer: '英文名 (English Term): Bindu；梵文/藏文 (Sanskrit/Tibetan): 梵: *Bindu* (बिन्दु, 点/滴)；精确定义: 坛城中央的核心点，象征本源、空性、无限潜能的汇聚处；历史渊源:
    源自密宗哲学，代表宇宙创造的起源点；专业视角 (Professional Perspective): 荣格心理学中对应"自性"(Self)的核心，是人格整合的中心'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Overview.md
  section: 核心术语表 (Core Terms)
- type: concept
  question: 原始时期** (前3000-前1500年)的核心要点是什么？
  answer: '地理区域: 美索不达米亚、印度河流域；发展阶段: 几何象征萌芽；核心特征: 圆形与方形的神圣组合出现在祭坛、印章、陶器；代表形式: 印度河文明印章、苏美尔星盘；关键转折: 人类首次将几何形式赋予宇宙意义；专业视角: 跨文化研究显示圆形是人类普遍的"完整性"原型'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Overview.md
  section: 坛城历史发展表 (Historical Development)
- type: concept
  question: 吠陀时期** (前1500-前500年)的核心要点是什么？
  answer: '地理区域: 印度次大陆；发展阶段: 仪式功能确立；核心特征: 坛城作为祭祀空间的精确设计，火祭坛(Agni-hotra)；代表形式: 湿婆林伽(Śiva-liṅga)、火祭坛几何；关键转折: 从自然崇拜到仪式科学化；专业视角:
    印度数学与几何的起源与坛城建造密切相关'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Overview.md
  section: 坛城历史发展表 (Historical Development)
- type: concept
  question: 古典时期** (前500-500年)的核心要点是什么？
  answer: '地理区域: 印度、佛教传播区；发展阶段: 佛教初传整合；核心特征: 佛塔(Stūpa)作为三维坛城，佛足印、法轮图案；代表形式: 桑奇大塔、阿旃陀石窟；关键转折: 坛城从仪式空间转向象征性冥想对象；专业视角: 佛塔的宇宙论象征：圆顶(天界)、方座(地界)、中轴(宇宙轴)'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Overview.md
  section: 坛城历史发展表 (Historical Development)
- type: concept
  question: 宇宙同构论的核心要点是什么？
  answer: '来源传统: 印度密宗(Tantra)；核心概念: 人体是宇宙的缩影(*Piṇḍa-Brahmāṇḍa*)；对坛城的解释: 坛城是宇宙结构的二维投影，修行者通过观想"进入"坛城即进入宇宙本源；临床应用价值: 提供整体性(Wholeness)体验，对抗碎片化自我感；专业视角:
    "如其在上，如其在下"(As above, so below)的具象化'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Overview.md
  section: 坛城理论基础表 (Theoretical Foundations)
- type: concept
  question: 空性中观的核心要点是什么？
  answer: '来源传统: 佛教龙树中观派；核心概念: 一切现象缘起性空(*Śūnyatā*)；对坛城的解释: 坛城的建造与解散象征"缘起无自性"，圆满即空、空即圆满；临床应用价值: 降低对永恒性的执着，处理丧失与无常焦虑；专业视角: 彩砂坛城的仪式性解散是"无常"的最具力量的教学'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Overview.md
  section: 坛城理论基础表 (Theoretical Foundations)
- type: concept
  question: 第一阶段的核心要点是什么？
  answer: '技术名称: 外相观想；梵/藏术语: *Bāhya-dhyāna* (外禅)；操作要点: 凝视实体坛城图像5-10分钟，闭眼复现；时长建议: 10-15分钟；常见障碍: 图像模糊、快速消失；解决方法: 反复开闭眼交替练习；专业视角:
    建立视觉记忆基础，激活视觉皮层'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Techniques.md
  section: 基础观想进阶表 (Basic Visualization Progression)
- type: concept
  question: 第二阶段的核心要点是什么？
  answer: '技术名称: 轮廓建构；梵/藏术语: *Rūpa-nirmāṇa* (形相造作)；操作要点: 先观想坛城外围圆形/方形边界；时长建议: 15-20分钟；常见障碍: 形状不稳定、变形；解决方法: 从简单几何形开始；专业视角:
    "先搭框架再填细节"的认知策略'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Techniques.md
  section: 基础观想进阶表 (Basic Visualization Progression)
- type: concept
  question: 第三阶段的核心要点是什么？
  answer: '技术名称: 色彩填充；梵/藏术语: *Varṇa-pūraṇa* (色彩充满)；操作要点: 在轮廓中逐层添加色彩；时长建议: 20-30分钟；常见障碍: 颜色混淆、难以保持；解决方法: 每次只专注一种颜色；专业视角: 色彩激活情感中枢，增加观想生动性'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Techniques.md
  section: 基础观想进阶表 (Basic Visualization Progression)
- type: concept
  question: 清净空性的核心要点是什么？
  answer: '藏文术语: *སྟོང་པ་ཉིད* (stong-pa-nyid)；操作要点: 一切融入空性，无一物可得；心理功能: 放下日常自我认同；配合咒语: OM ŚŪNYATĀ...；注意事项: 不是"什么都没有"，而是"无限可能"；专业视角:
    对应心理治疗中的"悬置"(Epoché)'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Techniques.md
  section: 藏传佛教生起次第观想表 (Tibetan Generation Stage Visualization)
- type: concept
  question: 种子字生起的核心要点是什么？
  answer: '藏文术语: *ས་བོན* (sa-bon)；操作要点: 从空中显现种子字(如HUM、HRIH)；心理功能: 从空性中生起形相的第一步；配合咒语: 相应本尊种子咒；注意事项: 种子字需清晰、稳定、发光；专业视角: 声音符号的视觉化，跨模态整合'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Techniques.md
  section: 藏传佛教生起次第观想表 (Tibetan Generation Stage Visualization)
- type: concept
  question: 三昧耶形的核心要点是什么？
  answer: '藏文术语: *དམ་ཚིག་གི་ཕྱག་རྒྱ* (dam-tshig)；操作要点: 种子字转化为本尊的象征物(如莲花、金刚杵)；心理功能: 象征向形象的过渡；配合咒语: 持续持咒；注意事项: 三昧耶形是本尊的"标志"；专业视角:
    原型象征的具象化'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Techniques.md
  section: 藏传佛教生起次第观想表 (Tibetan Generation Stage Visualization)
- type: concept
  question: 清晰度的核心要点是什么？
  answer: '理想状态: 如高清照片般细节分明；发展中状态: 轮廓清楚但细节模糊；困难状态: 整体模糊或碎片化；改善策略: 缩小观想范围，逐部分练习；专业视角: 与视觉工作记忆容量相关'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Techniques.md
  section: 观想质量评估表 (Visualization Quality Assessment)
- type: concept
  question: 稳定性的核心要点是什么？
  answer: '理想状态: 长时间保持不变形；发展中状态: 偶尔变形但可恢复；困难状态: 持续变形或消失；改善策略: 增加"锚点"(如种子字)；专业视角: 与注意力持续性相关'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Techniques.md
  section: 观想质量评估表 (Visualization Quality Assessment)
- type: concept
  question: 事续的核心要点是什么？
  answer: '梵文 (Sanskrit): *Kriyā Tantra* (क्रिया तन्त्र)；核心坛城类型: 诸佛菩萨寂静相坛城；修持特征: 外在清净为主：沐浴、着净衣、素食、仪轨严谨；本尊特质: 本尊如主、行者如仆；适用根器:
    偏重外在仪式者；专业视角: 建立敬畏与纪律，适合初入密法或强迫倾向者'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Traditions.md
  section: 四续部坛城详表 (Four Tantra Classes Mandalas)
- type: concept
  question: 行续的核心要点是什么？
  answer: '梵文 (Sanskrit): *Caryā Tantra* (चर्या तन्त्र)；核心坛城类型: 毗卢遮那坛城、大日如来坛城；修持特征: 内外平衡：禅定与仪式并重；本尊特质: 本尊如友；适用根器: 内外兼修者；专业视角:
    过渡阶段，从外在形式转向内在体验'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Traditions.md
  section: 四续部坛城详表 (Four Tantra Classes Mandalas)
- type: concept
  question: 瑜伽续的核心要点是什么？
  answer: '梵文 (Sanskrit): *Yoga Tantra* (योग तन्त्र)；核心坛城类型: 金刚界曼荼罗、五方佛坛城；修持特征: 内在禅定为主：五相成身观想；本尊特质: 本尊如己；适用根器: 禅定力强者；专业视角:
    核心技术"五相成身"：空性→种子字→三昧耶形→圆满身→放光利生'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Traditions.md
  section: 四续部坛城详表 (Four Tantra Classes Mandalas)
- type: concept
  question: 中央的核心要点是什么？
  answer: '佛尊名: 毗卢遮那佛(大日如来)；梵文 (Sanskrit): *Vairocana* (वैरोचन)；藏文 (Tibetan): *རྣམ་པར་སྣང་མཛད* (rnam-par snang-mdzad)；烦恼转智:
    痴→法界体性智；对应元素: 空(Ākāśa)；对应蕴: 色蕴；对应脉轮: 顶轮；心理功能映射: 意识的统合与清明；专业视角: 中央是整合点，将散乱的心理功能归于统一'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Traditions.md
  section: 五方佛坛城体系 (Five Buddha Families Mandala System)
- type: concept
  question: 东方的核心要点是什么？
  answer: '佛尊名: 阿閦佛(不动如来)；梵文 (Sanskrit): *Akṣobhya* (अक्षोभ्य)；藏文 (Tibetan): *མི་བསྐྱོད་པ* (mi-bskyod-pa)；烦恼转智: 嗔→大圆镜智；对应元素:
    水(Āpas)；对应蕴: 识蕴；对应脉轮: 心轮；心理功能映射: 镜映现实而不扭曲；专业视角: 镜智能如实反映，不因愤怒而歪曲认知'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Traditions.md
  section: 五方佛坛城体系 (Five Buddha Families Mandala System)
- type: concept
  question: 南方的核心要点是什么？
  answer: '佛尊名: 宝生如来；梵文 (Sanskrit): *Ratnasambhava* (रत्नसम्भव)；藏文 (Tibetan): *རིན་ཆེན་འབྱུང་ལྡན* (rin-chen ''byung-ldan)；烦恼转智:
    慢→平等性智；对应元素: 地(Pṛthivī)；对应蕴: 受蕴；对应脉轮: 脐轮；心理功能映射: 消除评判与等级感；专业视角: 平等智超越"我高你低"的自恋防御'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Traditions.md
  section: 五方佛坛城体系 (Five Buddha Families Mandala System)
- type: concept
  question: 时轮金刚坛城的核心要点是什么？
  answer: '梵文/藏文: *Kālacakra* (कालचक्र) / *དུས་ཀྱི་འཁོར་ལོ*；核心本尊: 时轮金刚双身；主要功能: 内外密三时轮整合、世界和平；神圣数字: 722尊；传承来源: 香巴拉传承；修持要求:
    时轮金刚灌顶；专业视角: 最复杂坛城，象征时间与意识的终极整合'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Traditions.md
  section: 重要藏传坛城详表 (Major Tibetan Mandalas)
- type: concept
  question: 大威德金刚坛城的核心要点是什么？
  answer: '梵文/藏文: *Yamāntaka* (यमान्तक) / *གཤིན་རྗེ་གཤེད*；核心本尊: 大威德金刚(降阎魔尊)；主要功能: 降伏死亡恐惧、断除我执；神圣数字: 13尊/49尊；传承来源: 格鲁派主修；修持要求:
    大威德灌顶；专业视角: "降阎魔"即战胜死亡焦虑，处理存在性恐惧'
  source: 02-Mind-Psychology/meditation/mandala-meditation/Mandala_Meditation_Traditions.md
