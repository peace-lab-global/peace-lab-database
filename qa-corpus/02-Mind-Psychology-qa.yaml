- type: concept
  question: 渐进性肌肉放松的核心要点是什么？
  answer: '英文术语: Progressive Muscle Relaxation (PMR)；原始语言/词源: 拉丁语 *progressus* (前进) + *musculus* (肌肉) + *relaxare* (松弛)；专业定义:
    通过系统性地交替收紧和释放特定肌肉群来诱导深度放松的技术'
  source: 02-Mind-Psychology/psychology/somatic-body/relaxation/Relaxation_PMR.md
  section: 一、PMR核心术语表 (Core Terminology)
- type: concept
  question: 张力-释放循环的核心要点是什么？
  answer: '英文术语: Tension-Release Cycle；原始语言/词源: —；专业定义: PMR的核心机制：先主动收紧肌肉（5-10秒），然后突然释放并觉察放松感（15-30秒）'
  source: 02-Mind-Psychology/psychology/somatic-body/relaxation/Relaxation_PMR.md
  section: 一、PMR核心术语表 (Core Terminology)
- type: concept
  question: 残余张力的核心要点是什么？
  answer: '英文术语: Residual Tension；原始语言/词源: 拉丁语 *residuus* (剩余的)；专业定义: 日常生活中无意识保持的慢性肌肉紧张状态'
  source: 02-Mind-Psychology/psychology/somatic-body/relaxation/Relaxation_PMR.md
  section: 一、PMR核心术语表 (Core Terminology)
- type: concept
  question: 1908的核心要点是什么？
  answer: '事件: 哈佛生理学研究；代表人物: Edmund Jacobson；核心贡献: 开始研究肌肉紧张与情绪的关系'
  source: 02-Mind-Psychology/psychology/somatic-body/relaxation/Relaxation_PMR.md
  section: 2.1 发展里程碑 (Key Milestones)
- type: concept
  question: 1929的核心要点是什么？
  answer: '事件: 《渐进性放松》出版；代表人物: Edmund Jacobson；核心贡献: 首次系统化描述PMR方法，原始版本需200+小时训练'
  source: 02-Mind-Psychology/psychology/somatic-body/relaxation/Relaxation_PMR.md
  section: 2.1 发展里程碑 (Key Milestones)
- type: concept
  question: 1934的核心要点是什么？
  answer: '事件: 《你必须放松》出版；代表人物: Edmund Jacobson；核心贡献: 面向大众的PMR普及版本'
  source: 02-Mind-Psychology/psychology/somatic-body/relaxation/Relaxation_PMR.md
  section: 2.1 发展里程碑 (Key Milestones)
- type: concept
  question: 中枢神经反馈回路的核心要点是什么？
  answer: '描述: 肌肉张力信号传入大脑→维持焦虑/唤醒状态；减少肌肉张力→减少神经兴奋'
  source: 02-Mind-Psychology/psychology/somatic-body/relaxation/Relaxation_PMR.md
  section: 2.2 Jacobson原始理论 (Jacobson's Original Theory)
- type: concept
  question: 残余张力假说的核心要点是什么？
  answer: '描述: 日常生活中无意识累积的肌肉微张力是慢性紧张的生理基础'
  source: 02-Mind-Psychology/psychology/somatic-body/relaxation/Relaxation_PMR.md
  section: 2.2 Jacobson原始理论 (Jacobson's Original Theory)
- type: concept
  question: Stage 1 (Light)的核心要点是什么？
  answer: '持续时间 (Duration): 第一阶段（浅睡）；大脑功能 (Function): 门户；入睡前状态。；心理健康影响 (Impact): 转换期；生动图景。；专业视角 (Professional Perspective):
    从交感神经向副交感神经主导地位转变的关键时刻。；引用来源 (Citation): Walker, M. (2017). *Why We Sleep*.'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Bio_Sleep_Dreams.md
  section: Sleep Architecture & Mental Restoration (睡眠结构与心理修复)
- type: concept
  question: Stage 2 (Spindles)的核心要点是什么？
  answer: '持续时间 (Duration): 第二阶段（睡眠纺锤波）；大脑功能 (Function): 运动学习；记忆整合。；心理健康影响 (Impact): “清理”海马体。；专业视角 (Professional Perspective):
    睡眠纺锤波是神经塑造性和代谢废物清除的标志。；引用来源 (Citation): Diekelmann, S., & Born, J. (2010). *Nature Reviews Neuroscience*.'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Bio_Sleep_Dreams.md
  section: Sleep Architecture & Mental Restoration (睡眠结构与心理修复)
- type: concept
  question: Deep Sleep (SWS)的核心要点是什么？
  answer: '持续时间 (Duration): 深度睡眠；大脑功能 (Function): GABA/生长激素；解毒。；心理健康影响 (Impact): 身体愈合；类淋巴系统 (Glymphatic)。；专业视角 (Professional
    Perspective): “生物冲洗”：类淋巴流量增加 60% 以清除 β-淀粉样蛋白。；引用来源 (Citation): Xie, L., et al. (2013). *Science*.'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Bio_Sleep_Dreams.md
  section: Sleep Architecture & Mental Restoration (睡眠结构与心理修复)
- type: concept
  question: Stimulus Control的核心要点是什么？
  answer: '技术 (Technique): 刺激控制；主要目标 (Goal): 打破条件反射性觉醒。；黄金准则 (Rule of Thumb): 床 = 仅用于睡眠。；专业视角 (Professional Perspective):
    “只有困时才上床；如果20分钟没睡着，请离开床。”；引用来源 (Citation): 针对慢性失眠最有效的非药物干预措施。'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Bio_Sleep_Dreams.md
  section: CBT-I (Cognitive Behavioral Therapy for Insomnia) Protocols (失眠认知行为疗法)
- type: concept
  question: Sleep Restriction的核心要点是什么？
  answer: '技术 (Technique): 睡眠限制；主要目标 (Goal): 增加“睡眠压力”。；黄金准则 (Rule of Thumb): 限制在床上的总时长。；专业视角 (Professional Perspective): 使在床上的时间
    (TIB) 与实际总睡眠时间 (TST) 相匹配。；引用来源 (Citation): 通过合并睡眠窗口来驱动更深的睡眠。'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Bio_Sleep_Dreams.md
  section: CBT-I (Cognitive Behavioral Therapy for Insomnia) Protocols (失眠认知行为疗法)
- type: concept
  question: Cognitive Restructuring的核心要点是什么？
  answer: '技术 (Technique): 认知重构；主要目标 (Goal): 挑战关于睡眠的误区。；黄金准则 (Rule of Thumb): 减少灾难化思考。；专业视角 (Professional Perspective): “即使今晚睡不好，明天我也能活下去。”；引用来源
    (Citation): 解决导致过度警觉循环的“睡眠恐惧”。'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Bio_Sleep_Dreams.md
  section: CBT-I (Cognitive Behavioral Therapy for Insomnia) Protocols (失眠认知行为疗法)
- type: concept
  question: Morning Lark** (晨型/百灵鸟)的核心要点是什么？
  answer: '能量巅峰时间: 6:00 AM - 10:00 AM；策略建议 (Advice): 一早完成困难任务。；“社交时差”风险: 低。；专业视角 (Professional Perspective): 天生契合传统的 9-5 工作时间表。；引用来源
    (Citation): Breus, M. (2016). *The Power of When*.'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Bio_Sleep_Dreams.md
  section: Chronotypes & Rhythm Optimization (生物钟类型与节律优化)
- type: concept
  question: Night Owl** (夜型/猫头鹰)的核心要点是什么？
  answer: '能量巅峰时间: 6:00 PM - 10:00 PM；策略建议 (Advice): 保护深夜的工作流。；“社交时差”风险: 高（早起对其实质上有害）。；专业视角 (Professional Perspective): 猫头鹰型面临更高的代谢综合征风险，主要源于长期的节律不齐。；引用来源
    (Citation): Roenneberg, T. (2012). *Internal Time*.'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Bio_Sleep_Dreams.md
  section: Chronotypes & Rhythm Optimization (生物钟类型与节律优化)
- type: concept
  question: Stage N1的核心要点是什么？
  answer: '阶段名称: 入睡期 (Light Sleep)；脑电波特征: Alpha & Theta 波。；生理/心理功能: 觉察力消失，入睡启动。；疗愈关键点: 决定入睡的顺利度；容易被惊醒。；专业视角 (Professional
    Perspective): 许多催眠与深度冥想状态定位于此阈值。'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Bio_Sleep_Science.md
  section: Neurobiology of Sleep Stages (睡眠阶段的神经生物学详表)
- type: concept
  question: Stage N2的核心要点是什么？
  answer: '阶段名称: 浅睡期；脑电波特征: 睡眠纺锤波 (Spindle) & K复合波。；生理/心理功能: 心率减慢，体温下降；记忆整合。；疗愈关键点: 占总睡眠时间约50%，是运动技能整合的关键。；专业视角 (Professional
    Perspective): 保护大脑免受外界干扰的过滤机制。'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Bio_Sleep_Science.md
  section: Neurobiology of Sleep Stages (睡眠阶段的神经生物学详表)
- type: concept
  question: Stage N3的核心要点是什么？
  answer: '阶段名称: 深睡期 (SWS)；脑电波特征: Delta 波 (慢波)。；生理/心理功能: 生长激素分泌；废物代谢 (Glymphatic System)。；疗愈关键点: 身体修复与物理疲劳恢复的巅峰。；专业视角 (Professional
    Perspective): 类淋巴系统此时最活跃，负责清除脑内 Beta-淀粉样蛋白。'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Bio_Sleep_Science.md
  section: Neurobiology of Sleep Stages (睡眠阶段的神经生物学详表)
- type: concept
  question: 褪黑素的核心要点是什么？
  answer: '核心功能 (Function): 启动睡眠信号；强效抗氧化。；峰值时间 (Peak): 凌晨 2-4 AM。；干扰因素 (Interference): 蓝光、夜间强光；晚间进食。；修复策略: 傍晚低照度环境；口服小剂量补充。；专业视角
    (Professional Perspective): 被称为“黑暗荷尔蒙”，是细胞层面的“总开关”。'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Bio_Sleep_Science.md
  section: Circadian Hormones & Bio-Clocks (昼夜节律激素与生物钟调节表)
- type: concept
  question: 皮质醇的核心要点是什么？
  answer: '核心功能 (Function): 启动觉醒；调节压力。；峰值时间 (Peak): 晨间 6-8 AM。；干扰因素 (Interference): 慢性压力；晚睡。；修复策略: 晨间阳光照射（15分钟）；规律起居。；专业视角
    (Professional Perspective): “清晨苏醒反应” (CAR) 是衡量肾上腺健康的金标准。'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Bio_Sleep_Science.md
  section: Circadian Hormones & Bio-Clocks (昼夜节律激素与生物钟调节表)
- type: concept
  question: 腺苷** (Adenosine)的核心要点是什么？
  answer: '核心功能 (Function): 产生“睡眠压力”。；峰值时间 (Peak): 随着清醒时间的延长逐渐积累。；干扰因素 (Interference): 咖啡因（阻断腺苷受体）。；修复策略: 规律的睡眠周期；有效的午间“能量觉”。；专业视角
    (Professional Perspective): 咖啡因不消除疲劳，只是延迟了疲劳信号的传递。'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Bio_Sleep_Science.md
  section: Circadian Hormones & Bio-Clocks (昼夜节律激素与生物钟调节表)
- type: concept
  question: 刺激控制的核心要点是什么？
  answer: '英文全称: Stimulus Control；操作细节 (Implementation): 床仅用于睡眠和性；20分钟不入睡即离开。；心理学效应: 切断“床 = 焦虑/清醒”的条件反射。；专业建议 (Professional
    Tips): 重点在于打破在床上进行非睡眠活动的习惯。'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Bio_Sleep_Science.md
  section: Clinical Sleep Hygiene & CBTI Protocols (临床睡眠卫生与失眠干预表)
- type: concept
  question: 睡眠限制的核心要点是什么？
  answer: '英文全称: Sleep Restriction；操作细节 (Implementation): 根据实际睡眠效率限制在床时间。；心理学效应: 提升睡眠驱动力 (Sleep Drive)。；专业建议 (Professional
    Tips): 有效集中散乱的睡眠片段；初期可能导致白天嗜睡。'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Bio_Sleep_Science.md
  section: Clinical Sleep Hygiene & CBTI Protocols (临床睡眠卫生与失眠干预表)
