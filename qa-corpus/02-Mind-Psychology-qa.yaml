  question: 什么是概述 (Overview)？
  answer: 迈克尔·塔梅兹（Michael Tamez）是新一代冥想行业企业家和教育者的代表人物，致力于将冥想带入以往难以触及的社区——包括拉丁裔社区、低收入人群、以及对传统灵性语言持排斥态度的年轻一代。他的工作代表了冥想产业"后APP时代"的发展方向：从技术驱动转向社区驱动，从精英化转向大众化，从个人修行转向社会影响。
