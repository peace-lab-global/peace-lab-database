  question: 心流体验 (Flow)的核心要点是什么？
  answer: '英文名: Flow State；理论基础: Csikszentmihalyi心流理论；神经生物学: 前额叶中度激活多巴胺释放时间知觉扭曲；治疗应用: 对抗抑郁提升专注恢复掌控感；专业视角 (Professional Perspective):
    游戏是心流工厂;挑战与技能完美平衡'
