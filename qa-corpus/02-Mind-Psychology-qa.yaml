  question: 什么是1. 正念核心三要素框架？
  answer: 正念（Mindfulness）的操作性定义由 Bishop 等人（2004）提出，包含两个核心维度：**自我调焦的注意力**与**对当下体验的好奇与接纳态度**。在冥想练习中，可将其提炼为三个相互支撑的要素：
  source: 02-Mind-Psychology/meditation/overview/Meditation_Practice_Techniques.md
  section: 1. 正念核心三要素框架
- type: concept
  question: 意图 (Intention)的核心要点是什么？
  answer: '定义: 练习的动机与方向；在练习中的体现: 每天固定时间入座、明确"我为什么要练习"；常见障碍: 动机摇摆、功利心、将冥想视为任务'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Practice_Techniques.md
  section: 1. 正念核心三要素框架
- type: concept
  question: 注意力 (Attention)的核心要点是什么？
  answer: '定义: 对当下体验的有意识关注；在练习中的体现: 锚定于呼吸/身体/声音等对象，觉察走神并带回；常见障碍: 思维游荡（Mind Wandering）、昏沉、亢奋'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Practice_Techniques.md
  section: 1. 正念核心三要素框架
- type: concept
  question: 态度 (Attitude)的核心要点是什么？
  answer: '定义: 以何种品质面对体验；在练习中的体现: 非评判、耐心、接纳、好奇、不费力；常见障碍: 评判自己走神、急躁、追求完美体验'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Practice_Techniques.md
  section: 1. 正念核心三要素框架
- type: concept
  question: 脊柱中正的核心要点是什么？
  answer: '说明: 脊柱自然延展，是意识清明的物理基础；常见误区: 过度挺背或塌腰；正确做法: 想象头顶有细线轻提，下颌微收'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Practice_Techniques.md
  section: 姿势选择核心原则
- type: concept
  question: 稳定与放松平衡的核心要点是什么？
  answer: '说明: 身体保持"紧而不僵、松而不懈"；常见误区: 完全松弛瘫坐或过度用力；正确做法: 找到安稳支点，让重力自然沉降'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Practice_Techniques.md
  section: 姿势选择核心原则
- type: concept
  question: 意识状态适配的核心要点是什么？
  answer: '说明: 姿势应配合当下意识状态选择；常见误区: 昏沉时仍保持静态；正确做法: 昏沉选动态站姿，亢奋选静态放松'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Practice_Techniques.md
  section: 姿势选择核心原则
- type: concept
  question: 血清素（5-HT）的核心要点是什么？
  answer: '变化趋势: 增加；心理效应: 情绪稳定、抑郁减少；冥想类型: 正念、内观'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Practitioner_QA.md
  section: 二、冥想的作用机制
- type: concept
  question: 多巴胺（DA）的核心要点是什么？
  answer: '变化趋势: 基线增加 65%（瑜伽尼德拉）；心理效应: 内在奖赏、动机增强；冥想类型: 瑜伽尼德拉、禅定'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Practitioner_QA.md
  section: 二、冥想的作用机制
- type: concept
  question: GABA（γ-氨基丁酸）的核心要点是什么？
  answer: '变化趋势: 增加 27%；心理效应: 焦虑减少、放松；冥想类型: 瑜伽、冥想'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Practitioner_QA.md
  section: 二、冥想的作用机制
- type: concept
  question: 焦虑减少的核心要点是什么？
  answer: '具体表现: GAD 症状显著改善；循证等级: A级（多项 RCT）；关键研究: Goyal et al. (2014) JAMA'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Practitioner_QA.md
  section: 三、冥想的实际效果
- type: concept
  question: 抑郁预防的核心要点是什么？
  answer: '具体表现: MBCT 预防复发效果与抗抑郁药相当；循证等级: A级；关键研究: Segal et al. (2010)'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Practitioner_QA.md
  section: 三、冥想的实际效果
- type: concept
  question: 疼痛管理的核心要点是什么？
  answer: '具体表现: 慢性疼痛不愉快感减少 40%；循证等级: A级；关键研究: Zeidan et al. (2011)'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Practitioner_QA.md
  section: 三、冥想的实际效果
- type: concept
  question: 看见的核心要点是什么？
  answer: '课程核心内容: 觉察心念惯性，在杏仁核劫持前额叶的0.08秒窗口中创造停顿；对应知识库分类: 专注型冥想（FA）；神经科学对应: 前扣带回（ACC）激活'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Practitioner_QA.md
  section: 一、培训项目的理论框架分析
- type: concept
  question: 了解的核心要点是什么？
  answer: '课程核心内容: 抽离旁观内在模式，不用思维分析思维；对应知识库分类: 开放监控（OM）；神经科学对应: 默认模式网络（DMN）下调'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Practitioner_QA.md
  section: 一、培训项目的理论框架分析
