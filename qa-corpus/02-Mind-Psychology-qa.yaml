  question: 冰山隐喻的核心要点是什么？
  answer: '英文术语: Iceberg Metaphor；词源/其他语言: 德语: *Eisberg* (冰山)；定义: 将人的内在经验比作冰山，可见的行为只是水面上的小部分，下面有多层次的内在世界；专业视角 (Professional
    Perspective): 萨提亚最著名的概念工具，整合了心理动力学、人本主义与系统观'
