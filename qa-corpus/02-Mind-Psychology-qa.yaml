  source: 02-Mind-Psychology/psychology/special-topics/masturbation-psychology/Masturbation_Cultural_History.md
  section: 病理化时代 (18-19世纪)
- type: concept
  question: 1760的核心要点是什么？
  answer: '关键人物/事件: Tissot《论自慰》；核心主张: 自慰导致"精液损失"→全身衰竭→精神病；所谓"证据": 临床观察(确认偏差)；社会影响: 医学权威背书→全欧洲恐慌；遗留效应: 被称为"最具影响力的性学伪科学"'
  source: 02-Mind-Psychology/psychology/special-topics/masturbation-psychology/Masturbation_Cultural_History.md
  section: 病理化时代 (18-19世纪)
- type: concept
  question: 手淫的核心要点是什么？
  answer: '术语 (English/Latin): Masturbation (拉丁语: manu stuprare)；历史时期: 18世纪起广泛使用；含义与色彩: 词源含"用手污染"之意，带病理化色彩；当前学术地位: 国际学术标准术语(中性化使用)；使用建议:
    学术写作首选，需去除负面联想'
  source: 02-Mind-Psychology/psychology/special-topics/masturbation-psychology/Masturbation_Psychology_Overview.md
  section: 核心术语表与术语演变 | Key Terminology & Evolution
- type: concept
  question: 自渎的核心要点是什么？
  answer: '术语 (English/Latin): Self-pollution；历史时期: 宗教时代；含义与色彩: 强烈道德贬义，"玷污自身"；当前学术地位: 已废弃；使用建议: 仅在历史语境中引用'
  source: 02-Mind-Psychology/psychology/special-topics/masturbation-psychology/Masturbation_Psychology_Overview.md
  section: 核心术语表与术语演变 | Key Terminology & Evolution
- type: concept
  question: 自慰的核心要点是什么？
  answer: '术语 (English/Latin): Self-comfort / Self-pleasuring；历史时期: 现代；含义与色彩: 中性至正面，"自我安慰/愉悦"；当前学术地位: 中文学术界正式替代"手淫"；使用建议:
    中文语境推荐用语'
  source: 02-Mind-Psychology/psychology/special-topics/masturbation-psychology/Masturbation_Psychology_Overview.md
  section: 核心术语表与术语演变 | Key Terminology & Evolution
- type: concept
  question: 精神分析的核心要点是什么？
  answer: '时期: 1900s-；对自慰的基本立场: 正常发展阶段；过度固着可能病理；核心概念应用: 性心理发展阶段(口腔→肛门→性器→潜伏→生殖)；自恋力比多；代表人物: Freud, 1905；当代评价: 理论框架有历史价值；具体主张多已过时；临床影响:
    曾导致过度病理化倾向'
  source: 02-Mind-Psychology/psychology/special-topics/masturbation-psychology/Masturbation_Psychology_Overview.md
  section: 主要心理学理论对自慰的阐释
- type: concept
  question: 后精神分析的核心要点是什么？
  answer: '时期: 1950s-；对自慰的基本立场: 正常的自我功能；具有调节作用；核心概念应用: 客体关系理论：自慰伴随的幻想反映内部客体关系；代表人物: Winnicott, Laufer；当代评价: 更平衡的发展视角；临床影响:
    青少年自慰作为发展评估窗口'
  source: 02-Mind-Psychology/psychology/special-topics/masturbation-psychology/Masturbation_Psychology_Overview.md
  section: 主要心理学理论对自慰的阐释
- type: concept
  question: 行为主义的核心要点是什么？
  answer: '时期: 1920s-；对自慰的基本立场: 习得行为，受强化规律控制；核心概念应用: 操作性条件作用：自慰→高潮(强化物)→行为维持；代表人物: Skinner, Wolpe；当代评价: 解释行为维持机制有效；忽视认知与文化；临床影响:
    行为技术(停-启法)治疗基础'
  source: 02-Mind-Psychology/psychology/special-topics/masturbation-psychology/Masturbation_Psychology_Overview.md
  section: 主要心理学理论对自慰的阐释
- type: concept
  question: Freud (1905)的核心要点是什么？
  answer: '核心观点: 婴儿自慰属正常发展；过度自慰可能与神经症相关；理论位置: 性心理发展理论；临床含义: 曾被误读为"自慰导致精神疾病"；当代反思: 开创性地将自慰纳入正常发展'
  source: 02-Mind-Psychology/psychology/special-topics/masturbation-psychology/Masturbation_Psychology_Overview.md
  section: 精神分析传统中的自慰观念演变
- type: concept
  question: Deutsch (1944)的核心要点是什么？
  answer: '核心观点: 女性自慰是"阳具嫉妒"的表现；理论位置: 女性心理学；临床含义: 病理化女性自慰；当代反思: 已被批判为性别歧视'
  source: 02-Mind-Psychology/psychology/special-topics/masturbation-psychology/Masturbation_Psychology_Overview.md
  section: 精神分析传统中的自慰观念演变
