  answer: '推荐核心配方 (Blend Logic): 薰衣草 (2) + 佛手柑 (3) + 岩兰草 (1)；作用机制 (Psychological Mechanism): **建立边界**：岩兰草提供重力感，佛手柑打开心境。；使用场景/方式:
