  question: 认知性障碍的核心要点是什么？
  answer: '具体表现: 不知道心理疾病是病、不知如何求助；影响程度: ★★★★★；破解策略: 健康教育、社区宣传'
  source: 02-Mind-Psychology/psychology/social/rural-psychology/Rural_Mental_Health_Service.md
  section: 1.2 服务利用的多层障碍
- type: concept
  question: 态度性障碍的核心要点是什么？
  answer: '具体表现: 病耻感、"精神病"污名；影响程度: ★★★★★；破解策略: 去污名化运动、正常化语言'
  source: 02-Mind-Psychology/psychology/social/rural-psychology/Rural_Mental_Health_Service.md
  section: 1.2 服务利用的多层障碍
- type: concept
  question: 村级（一级）的核心要点是什么？
  answer: '机构: 村卫生室；核心职能: 筛查、随访、转介、健康教育；人员配置: 村医（接受心理培训）；覆盖范围: 1个行政村'
