  question: 自杀意念的核心要点是什么？
  answer: '适合自助: 无；需谨慎并配合专业治疗: 被动意念（"不想活了"）；不适合自助，需立即就医: 主动意念/计划/手段'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Self_Help_Guide.md
  section: 表0.1 自助适用性快速评估
- type: concept
  question: 功能损害的核心要点是什么？
  answer: '适合自助: 轻微；能维持基本生活；需谨慎并配合专业治疗: 中等；工作效率明显下降；不适合自助，需立即就医: 严重；无法工作/自理'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Self_Help_Guide.md
  section: 表0.1 自助适用性快速评估
- type: concept
  question: 什么是1. 行为激活自助方案 (Behavioral Activation Self-Help)？
  answer: 行为激活（BA）是轻中度抑郁循证最强的心理自助技术，其核心假设：**抑郁不是先有低落情绪才不想动，而是先停止活动才导致情绪低落**。
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Self_Help_Guide.md
  section: 1. 行为激活自助方案 (Behavioral Activation Self-Help)
- type: concept
  question: 'Step 1: 活动监测的核心要点是什么？'
  answer: '行动: 记录当前活动与情绪；具体操作: 使用活动-情绪日志，每小时记录所做之事和情绪评分（0-10）；时间: 1周；预期效果: 识别"抑郁陷阱"活动（如躺床刷手机）和"提升活动"'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Self_Help_Guide.md
  section: 表1.1 行为激活核心步骤
- type: concept
  question: 'Step 2: 愉悦/掌控评估的核心要点是什么？'
  answer: '行动: 评估活动的愉悦感和掌控感；具体操作: 对每项活动打分：愉悦感（P）0-10，掌控感（M）0-10；时间: 同步；预期效果: 发现被忽略的正向活动'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Self_Help_Guide.md
  section: 表1.1 行为激活核心步骤
- type: concept
  question: 'Step 3: 活动计划的核心要点是什么？'
  answer: '行动: 安排提升情绪的活动；具体操作: 每日安排2-3项"提升活动"，优先低门槛、高愉悦/掌控比的活动；时间: 持续；预期效果: 重建"行动→奖赏"循环'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Self_Help_Guide.md
  section: 表1.1 行为激活核心步骤
- type: concept
  question: 极低能量** (躺床也能做)的核心要点是什么？
  answer: '活动示例: 深呼吸5次；听一首喜欢的歌；喝一口温水；给植物浇水；开窗通风；预期愉悦/掌控感: P: 3-5, M: 4-6；适用情境: 严重无力感；连起床都困难时'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Self_Help_Guide.md
  section: 表1.2 行为激活活动库（按能量需求分级）
- type: concept
  question: 失眠障碍的核心要点是什么？
  answer: '在抑郁患者中的发生率: 70-90%；在一般人群中的发生率: 10-15%；相对风险 (RR): RR 2.5-3.5；双向关系强度: ⭐⭐⭐⭐⭐'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Sleep_Comorbidity.md
  section: 表1.1 抑郁与睡眠障碍的共病率
- type: concept
  question: 早醒 (Terminal Insomnia)的核心要点是什么？
  answer: '在抑郁患者中的发生率: 40-60%；在一般人群中的发生率: 5-10%；相对风险 (RR): RR 3-5；双向关系强度: ⭐⭐⭐⭐⭐'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Sleep_Comorbidity.md
  section: 表1.1 抑郁与睡眠障碍的共病率
- type: concept
  question: 入睡困难 (Initial Insomnia)的核心要点是什么？
  answer: '在抑郁患者中的发生率: 50-70%；在一般人群中的发生率: 15-20%；相对风险 (RR): RR 2-3；双向关系强度: ⭐⭐⭐⭐'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Sleep_Comorbidity.md
  section: 表1.1 抑郁与睡眠障碍的共病率
- type: concept
  question: 失眠 → 抑郁的核心要点是什么？
  answer: '机制: 睡眠剥夺致HPA轴激活、情绪调节受损、认知偏向负性化；证据等级: **A级**；时间框架: 慢性失眠者抑郁风险增加 3 倍；失眠是抑郁发作前驱症状'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Sleep_Comorbidity.md
  section: 表1.2 双向因果关系模型
- type: concept
  question: 抑郁 → 失眠的核心要点是什么？
  answer: '机制: 5-HT/NE调节睡眠-觉醒；反刍思维阻止入睡；昼夜节律基因表达改变；证据等级: **A级**；时间框架: 急性期即出现；可持续至缓解后（残留症状）'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Sleep_Comorbidity.md
  section: 表1.2 双向因果关系模型
- type: concept
  question: OSA → 抑郁的核心要点是什么？
  answer: '机制: 睡眠片段化、缺氧致炎症和HPA轴激活；日间嗜睡致功能下降；证据等级: **A级**；时间框架: OSA患者中抑郁患病率 20-40%'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Sleep_Comorbidity.md
  section: 表1.2 双向因果关系模型
- type: concept
  question: 中缝核 (5-HT)的核心要点是什么？
  answer: '正常睡眠功能: 促进觉醒；抑制REM；抑郁中的改变: 5-HT↓；睡眠障碍中的改变: REM潜伏期缩短；REM密度增加；治疗靶点: SSRIs/SNRIs'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Sleep_Comorbidity.md
  section: 表2.1 睡眠-抑郁共享的神经环路
- type: concept
  question: 蓝斑核 (NE)的核心要点是什么？
  answer: '正常睡眠功能: 促进觉醒；维持注意力；抑郁中的改变: NE↓；睡眠障碍中的改变: 觉醒度下降/过度觉醒；治疗靶点: SNRIs；α2激动'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Sleep_Comorbidity.md
  section: 表2.1 睡眠-抑郁共享的神经环路
- type: concept
  question: 早期干预的核心要点是什么？
  answer: '英文: Early Intervention；内涵: 尽早识别和治疗可改善预后；实践要点: 初级保健筛查；降低就医障碍；常见误区: 等待"自然好转"'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Treatment.md
  section: 表1.1 抑郁症治疗核心原则 (Core Treatment Principles)
- type: concept
  question: 个体化治疗的核心要点是什么？
  answer: '英文: Individualized Treatment；内涵: 根据患者特征选择最适合的治疗；实践要点: 考虑亚型、共病、偏好、既往反应；常见误区: "一刀切"方案'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Treatment.md
  section: 表1.1 抑郁症治疗核心原则 (Core Treatment Principles)
- type: concept
  question: 足量足疗程的核心要点是什么？
  answer: '英文: Adequate Dose & Duration；内涵: 药物需达治疗剂量并维持足够时间；实践要点: 急性期8-12周；维持期6-24个月；常见误区: 过早减药或停药'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Treatment.md
  section: 表1.1 抑郁症治疗核心原则 (Core Treatment Principles)
- type: concept
  question: 急性期的核心要点是什么？
  answer: '英文: Acute Phase；时间框架: 0-12周；主要目标: 达到临床反应或缓解；评估指标: PHQ-9≤9(反应)或≤4(缓解)；治疗策略: 初始治疗选择；剂量优化；疗效监测'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Treatment.md
  section: 表1.2 治疗阶段与目标 (Treatment Phases & Goals)
- type: concept
  question: 巩固期的核心要点是什么？
  answer: '英文: Continuation Phase；时间框架: 4-9个月；主要目标: 防止复燃，巩固疗效；评估指标: 维持缓解状态；治疗策略: 维持有效剂量；心理治疗巩固'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Treatment.md
  section: 表1.2 治疗阶段与目标 (Treatment Phases & Goals)
- type: concept
  question: 维持期的核心要点是什么？
  answer: '英文: Maintenance Phase；时间框架: 1-3年或更长；主要目标: 预防复发；评估指标: 无新发作；治疗策略: 长期用药或心理治疗维持'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Treatment.md
  section: 表1.2 治疗阶段与目标 (Treatment Phases & Goals)
- type: concept
  question: 亚阈值抑郁的核心要点是什么？
  answer: 'PHQ-9分数: <5；一线治疗: 心理教育；自助；观察等待；二线治疗: 如持续则积极干预；治疗场所: 初级保健；备注: 关注进展'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Treatment.md
  section: 表1.3 分层治疗策略 (Stepped Care Model)
- type: concept
  question: 轻度抑郁的核心要点是什么？
  answer: 'PHQ-9分数: 5-9；一线治疗: 心理治疗；自助干预；二线治疗: 药物治疗；治疗场所: 初级保健；备注: 心理治疗优先'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Treatment.md
  section: 表1.3 分层治疗策略 (Stepped Care Model)
- type: concept
  question: 治疗抵抗的核心要点是什么？
  answer: '英文: Treatment Resistance；定义: 经过足量足疗程的至少两种不同类抗抑郁药治疗后仍未达到临床缓解；临床意义: 需重新评估诊断与治疗策略'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Treatment_Resistant.md
  section: 表1.1 TRD 相关术语精确定义
- type: concept
  question: 治疗无效的核心要点是什么？
  answer: '英文: Treatment Failure；定义: 对特定治疗完全无反应；临床意义: 需考虑误诊、共病或生物学异质性'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Treatment_Resistant.md
  section: 表1.1 TRD 相关术语精确定义
- type: concept
  question: 部分反应的核心要点是什么？
  answer: '英文: Partial Response；定义: 治疗后有改善但未达缓解标准（症状减少 25-49%）；临床意义: 可考虑增效策略而非换药'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Treatment_Resistant.md
  section: 表1.1 TRD 相关术语精确定义
- type: concept
  question: 诊断准确性的核心要点是什么？
  answer: '具体问题: 是否为双相抑郁？是否伴边缘型人格？是否为适应障碍？是否为躯体疾病所致？；发生率: 15-25%；解决方法: 重新全面评估；使用 MDQ、HCL-32 筛查双相'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Treatment_Resistant.md
  section: 表1.2 假难治性原因排查清单
- type: concept
  question: 治疗依从性的核心要点是什么？
  answer: '具体问题: 是否规律服药？是否自行减量/停药？是否理解用药方案？；发生率: 30-50%；解决方法: 药片计数；血药浓度监测；动机访谈'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Treatment_Resistant.md
  section: 表1.2 假难治性原因排查清单
- type: concept
  question: 剂量与疗程的核心要点是什么？
  answer: '具体问题: 是否达到足量？是否持续足够时间（≥6-8周）？；发生率: 20-30%；解决方法: 优化剂量；确保足疗程再判断无效'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Treatment_Resistant.md
  section: 表1.2 假难治性原因排查清单
- type: concept
  question: 1级抵抗的核心要点是什么？
  answer: '定义: 1种SSRI/SNRI足量足疗程无效；估算比例: ~30%；治疗策略: 换药（不同类别）；联合心理治疗'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Treatment_Resistant.md
  section: 表2.1 TRD 严重程度分级（基于治疗失败次数）
- type: concept
  question: 2级抵抗的核心要点是什么？
  answer: '定义: 2种不同类别药物足量足疗程无效；估算比例: ~15-20%；治疗策略: 增效策略；换药至TCA/MAOI；TMS'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Treatment_Resistant.md
  section: 表2.1 TRD 严重程度分级（基于治疗失败次数）
- type: concept
  question: 什么是⚠️ 安全提示？
  answer: '如果你或你身边的人正在经历严重的抑郁症状，特别是有自杀想法或计划，请立即寻求专业帮助。

    > - **心理危机援助热线**：12355 / 12320（中国各地）

    > - **紧急医疗救助**：120（中国）或前往最近医院急诊科

    > - **生命热线**：400-161-9995（北京回龙观医院心理危机干预中心）'
  source: 02-Mind-Psychology/psychology/clinical/depression/INDEX.md
  section: ⚠️ 安全提示
