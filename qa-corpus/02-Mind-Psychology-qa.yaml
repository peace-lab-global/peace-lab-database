- type: concept
  question: 掌控感 (Agency)的核心要点是什么？
  answer: '英文名: Sense of Control；理论基础: 自我决定理论SDT；神经生物学: 腹内侧前额叶掌控感神经回路；治疗应用: 恢复创伤后掌控感习得性无助逆转；专业视角 (Professional Perspective):
    游戏让你成为主角;现实中被动游戏中主动'
  source: 02-Mind-Psychology/therapy/game-therapy/Game_Therapy.md
  section: Core Gaming Psychology (游戏核心心理学表)
- type: concept
  question: 即时反馈 (Instant Feedback)的核心要点是什么？
  answer: '英文名: Immediate Feedback；理论基础: 操作性条件反射强化理论；神经生物学: 多巴胺奖赏系统快速学习回路；治疗应用: 行为塑造自我效能提升ADHD注意力训练；专业视角 (Professional Perspective):
    现实反馈延迟游戏反馈即时;满足大脑需求'
