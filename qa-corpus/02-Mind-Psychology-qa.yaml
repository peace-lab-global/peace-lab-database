- type: concept
  question: 什么是谈谈你对冥想的理解是什么？？
  answer: '冥想的本质：心念管理

    冥想的方法论：看见、了解、接纳、转化

    冥想的认知论基础：通过止息散乱心念、培育深度定力，让认知从间接的、被信念覆盖的，变为直接的、如实的。这就是课程中所说的直接认知，也是冥想的终极目标

    冥想的科学实证：冥想对认知的重塑不是隐喻，而是可测量的神经学的可塑性事实'
  source: 02-Mind-Psychology/meditation/course/C1-0-homework.md
  section: 谈谈你对冥想的理解是什么？
- type: concept
  question: 什么是你为什么要学习冥想？？
  answer: 我学习冥想是为了不冥想，不冥想也可以过平静的生活。就像学游泳不是为了永远待在泳池里，而是为了在任何水域都不会溺亡。冥想是脚手架，不是建筑本身，把觉察内化为本能，把定力融入呼吸，让转变不再需要闭眼盘腿才能发生，冥想就完成了它的使命。直接认知冥想的终极，恰恰是不需要冥想的状态。所以，我学冥想，是为了有一天，睁着眼走在菜市场里，也能拥有坐在蒲团上的那份清明
  source: 02-Mind-Psychology/meditation/course/C1-0-homework.md
  section: 你为什么要学习冥想？
- type: concept
  question: 什么是谈谈你对冥想的理解是什么？？
  answer: 冥想不是放松术，不是心灵鸡汤，更不是某种神秘主义的仪式。它是人类已知最古老、最严肃的认知校准工程——用3500年的实践验证，从《梨俱吠陀》到现代神经科学的fMRI扫描，指向同一个结论：**我们日常所感知的世界，不是世界本身，而是心念加工后的投影。**
  source: 02-Mind-Psychology/meditation/course/C1-0-homework.md
  section: 谈谈你对冥想的理解是什么？
- type: concept
  question: 什么是C0-4 呼吸的科学 · 核心要点？
  answer: '* 呼吸是零成本、随时随地可练的基础疗愈方法，不需要任何道具和场地

    * 东西方创世传说都把生命起源归于"吹气"，气就是生命本源；中文"息"=自心，知息者知心，知心者知命

    * 一呼一吸就是阴阳变化，《道德经》讲"冲气以为和"，呼吸本身就是吐故纳新、阴阳调和的过程

    * 掌握呼吸就能掌握生活质量、把握生命本质、从容面对生死，贯通生活、生命、生死三个层面

    * 呼吸频率和寿命直接挂钩：呼吸越慢越长，寿命越长

    * 现代人的习惯性呼吸其实是错的，把后天的错误习惯当成了正确，需要重新调回先天的自然呼吸

    * 呼吸打通内外：吸入新鲜空气排出浊气，帮助疏通身体淤堵，现代常见的小结节本质就是气机不通

    * 呼吸连接身心：在物质身体和精神意识之间，气是连接二者的桥梁，打通身心就能实现身心合一

    * 现代科学已经证实：呼吸可以改变基因表达、改造大脑结构，这不是玄学是可测量的事实

    * 呼吸的清洁渗透力比水还强，能到达身体所有细微之处，相当于给五脏六腑做内部清洁

    * 健康呼吸总要求：深长绵细、轻匀平松，让呼吸从粗重的风相进入平静的息相

    * 心息相依：心静则息静，息静则心定，生气时呼吸乱，呼吸乱时情绪更差，调呼吸就是调情绪'
  source: 02-Mind-Psychology/meditation/course/C1-0-homework.md
  section: C0-4 呼吸的科学 · 核心要点
- type: concept
  question: 什么是C0-5 瑜伽与冥想 · 核心要点？
  answer: '* OM由A（创造/醒）、U（维持/梦）、M（毁灭/睡）三个音节融合，加上结尾的静默共四个部分

    * OM唱诵最重要的是第四音节——唱完之后的静默留白，不急着吸气，停在空白里，那个状态就是冥想的目的地

    * 憋气胸闷的核心原因是对呼吸有刻意要求，放下要求气息才会自然流动

    * 每个音节对应不同身体锚点，以自身感受为准，不需要强行匹配标准位置

    * 冥想的本质就是找到一个锚点（声音、身体、呼吸、意象、符号都行），把所有注意力稳定放上去

    * 五层身理论：身体层→呼吸能量层→心意情绪层→智性理解层→真吾喜乐层，冥想目标是把五层整合在一起

    * "冥"字的意思是隔绝外界干扰、回归内在，自己成为照亮内在的光源

    * "想"字的意思是观察事物在心上呈现的样子，每个人的镜子上沾着不同的"我"的印记，照出来的不一样

    * 直接认知就是去掉"我"的扭曲后看到的事物本来面目，间接认知是被信念偏好预设扭曲后的认知

    * 默认模式网络DMN是杂念反刍、内耗焦虑的神经基础，专注任务模式TPN和DMN交互抑制

    * 冥想训练的不是消灭杂念，而是获得注意力的自主控制权：想让它工作就工作，想让它停就能停

    * 冥想四步骤：回收注意力→锚'
  source: 02-Mind-Psychology/meditation/course/C1-0-homework.md
  section: C0-5 瑜伽与冥想 · 核心要点
- type: concept
  question: 什么是C0-7 沐言老师直接认知冥想理论与实践 · 核心要点？
  answer: '* 认知决定世界：同样凿石头，一个人觉得是苦役，一个人觉得是手艺，一个人觉得是建造教堂，最后人生走向完全不同

    * 间接认知：基于已有经验和概念，通过逻辑分析判断事物，本质是用旧地图找新路

    * 间接认知三大局限：被自己或别人的经验框住跳不出来、习惯给事物贴标签搞分别、形成固定模式不愿质疑自己

    * 直接认知：不靠概念不靠经验，直接感知事物本身，在概念产生之前就已经认知到了，无分别、无执着、无我的直接照见

    * 两种认知都有用，间接认知帮你借鉴经验少走弯路，直接认知帮你突破经验的局限，关键是知道什么时候用哪个

    * 过桥洞的故事：第一个人掉下去了，第二个人听了警告绕了三里路，第三个人听完警告自己走过去看，发现洞只有半米深一步就跨过去了——间接认知让你不掉坑，直接认知让你不绕路

    * 吃梨的比喻：别人说梨甜、水分多，你会用吃过的西瓜去想象，只有自己咬一口才知道梨的甜和西瓜根本不一样，还多了一个脆

    * 认知的三个世界：个人经验构成的主观世界、科学验证过的公共概念世界、广阔无限的真实世界，前两个都比真实世界窄得多

    * 冥想的科学依据：DMN（默认模式网络）活跃时人焦虑反刍，TPN（任务正性网络）活跃时人'
  source: 02-Mind-Psychology/meditation/course/C1-0-homework.md
  section: C0-7 沐言老师直接认知冥想理论与实践 · 核心要点
- type: concept
  question: 什么是C0-9 家庭教育亲子冥想 · 核心要点？
  answer: '* 课程按「呼吸入门—生活实践—学术深度—生活应用」递进设计，下午聚焦家庭教育亲子场景，原理对人际沟通、情绪管理同样通用

    * 儿童无法像成年人一样打坐冥想，需通过正念游戏培养专注力与觉察力，符合儿童认知发展特点

    * 冥想的核心是止观：止=专注，观=觉察，冥想就是基于专注和觉察的心智训练

    * 孩子上课走神、写作业磨蹭，核心原因都是专注力不足；小学知识难度不高，专注力足够成绩就不会差

    * 正念问心冥想：想象走到草原湖边，挑选一颗代表自己的鹅卵石，向内心反复提问，将问题随鹅卵石沉入湖底，等待答案自然浮现

    * 直接认知在亲子中的应用：不对孩子贴标签、不赋予额外故事，接受孩子本来的样子就是直接认知

    * 所有亲子烦恼的本质都不是来自孩子本身，而是来自家长对孩子行为赋予的故事和标签

    * 孩子抠橡皮的例子：直接认知是「一个孩子正在抠橡皮」没有问题，间接认知是「抠橡皮=不认真=效率低=没前途」引发愤怒

    * 成长就是逐步接受父母是普通人、伴侣是普通人、自己是普通人、孩子是普通人

    * 凡事不能求全责备，小满胜万全，必须有所取舍，什么都想要最后什么都得不到

    * 三圈取舍：学习好+睡觉好=没朋友，社交好+睡觉好'
  source: 02-Mind-Psychology/meditation/course/C1-0-homework.md
  section: C0-9 家庭教育亲子冥想 · 核心要点
- type: concept
  question: 什么是C0-10 瑶伽冥想新生活方式与商业变现 · 核心要点？
  answer: '* 分享人22年瑶伽行业经验，创业13年，曾做到估值1.4亿、25家直营店，2025年主动关闭所有大店，保留培训学院与传媒公司

    * 大型馆连锁预付费复制模型已经没有市场机会，这条路走不通了

    * 180-300平商场店模型不可行，核心原因是租金和人工成本过高，分享人曾单月租金超200万、人工超300万

    * 当下消费习惯已经改变，客户不再偏好大额年卡/终身卡，偏好短平快的周卡、月卡、次卡、10次以内私教，产品定价需要降低门槛

    * 2025年国内关店2.3万家健身瑶伽普拉提馆，同时新开3.1万家，整体消费增长54亿，证明市场需求仍在持续扩大，但商业模式需要迭代

    * 疗愈经济未来市场潜力超3万亿，而目前瑶伽健身市场规模仅600亿，潜力巨大

    * 疗愈赛道核心痛点：没有统一师资认证标准，从业者乱象多，缺少科学性支撑，因此难以规模化落地

    * 直接认知冥想体系拥有香港中文大学HSIDG职业认知研究中心背书，体系打磨17年，师资团队多为院士、博士等专业学者

    * 嵌入式石墨烯远红外热疗舱模型：单个占地不到4平米，可嵌入图书馆、咖啡馆、服装店等场景，完全隔音，透明玻璃可切换雾化保证私密性

    * 热疗舱坐一1小'
  source: 02-Mind-Psychology/meditation/course/C1-0-homework.md
