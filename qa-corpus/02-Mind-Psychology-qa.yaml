- type: concept
  question: 什么是研究质量评估？
  answer: '- **随机化**：大多数 RCT 使用电脑生成随机序列。

    - **盲法**：仅 2 项实现双盲，其他为单盲或开放标签。

    - **随访时长**：6‑12 周为主，缺乏长期 (>6 个月) 数据。

    - **偏倚风险**：报告偏倚较低，但样本量普遍偏小。'
  source: 02-Mind-Psychology/therapy/incense/Incense_Clinical_Evidence.md
  section: 研究质量评估
- type: concept
  question: 什么是综合结论？
  answer: '- **焦虑/抑郁**：檀香疗法在短期内显著降低焦虑与抑郁评分，效应大小中等（Cohen d≈0.6）。

    - **睡眠**：对睡眠质量有一致的正向影响，尤其在失眠患者中效果更佳。

    - **生理指标**：可调节自主神经功能（HRV）并降低炎症标志物（IL‑6、CRP）。

    - **安全性**：未报告严重不良事件，轻度刺激性鼻炎为常见轻微副作用。'
  source: 02-Mind-Psychology/therapy/incense/Incense_Clinical_Evidence.md
  section: 综合结论
- type: concept
  question: 广泛性焦虑障碍 (GAD)的核心要点是什么？
  answer: '方案名称: 檀香-薰衣草方案；主要香料配方: 檀香60% + 薰衣草30% + 乳香10%；给药途径: 吸入 (扩香器)；剂量: 0.3 mL/m³；频次: 每日2次,每次15分钟；疗程: 8周；预期效果: HAM-A降低≥30%；证据等级:
    1b (RCT)'
  source: 02-Mind-Psychology/therapy/incense/Incense_Clinical_Protocols.md
  section: 一、标准化临床方案表
- type: concept
  question: 失眠症的核心要点是什么？
