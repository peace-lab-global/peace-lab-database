- type: concept
  question: 嫉妒信念的核心要点是什么？
  answer: '具体表现: 毫无证据地坚信伴侣不忠；反复检查手机/行踪；☐: ☐有 ☐无；持续时间: ___周/月'
  source: 02-Mind-Psychology/psychology/clinical/disorder/delusional-disorder/Delusional_Self_Assessment.md
  section: 表2.1 偏执性精神病行为观察清单 (Behavioral Observation Checklist)
- type: concept
  question: 钟情信念的核心要点是什么？
  answer: '具体表现: 坚信某个名人或特定人物深爱自己；反复联系对方；☐: ☐有 ☐无；持续时间: ___周/月'
  source: 02-Mind-Psychology/psychology/clinical/disorder/delusional-disorder/Delusional_Self_Assessment.md
  section: 表2.1 偏执性精神病行为观察清单 (Behavioral Observation Checklist)
