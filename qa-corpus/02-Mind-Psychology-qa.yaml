  question: 什么是技能信息？
  answer: '**技能ID**: S_006

    **技能名称**: 慢性疲劳综合征识别

    **功能**: 识别疑似ME/CFS症状，区分普通疲劳与病理性疲劳

    **输入**: 用户疲劳相关症状

    **输出**: 评估报告 + 建议行动'
  source: 02-Mind-Psychology/psychology/stress-hpa/skills/CFS_Recognition_Skill.md
  section: 技能信息
- type: concept
  question: 什么是评估决策树？
  answer: "STEP 1: 疲劳持续时间？\n│\n├─ < 2周\n│   └─ 急性疲劳 → 通常是暂时性的\n│       - 可能原因：感染、急性压力、睡眠不足\n│       - 建议：休息、观察、原因排查\n│\n├─\
    \ 2周-6个月\n│   └─ 亚慢性疲劳 → 需要评估原因\n│       - 评估：睡眠问题/甲状腺/贫血/抑郁等\n│       - 建议：体检排查\n│\n└─ ≥ 6个月\n    └─ 进入ME/CFS筛查\n   \
    \     ↓\nSTEP 2: 有PEM吗？\n    │\n    ├─ 无PEM或不确定\n    │   └─ 可能不是ME/CFS\n    │       - 需排查其他原因\n    │\n    └─ 有PEM（活动后症状恶化）\n\
    \        ↓\nSTEP 3: 睡眠问题+认知障碍+直立不耐受\n    符合几项？"
  source: 02-Mind-Psychology/psychology/stress-hpa/skills/CFS_Recognition_Skill.md
  section: 评估决策树
- type: concept
