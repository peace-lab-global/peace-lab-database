- type: concept
  question: 真实动觉的核心要点是什么？
  answer: '英文名: Authentic Movement；过程描述: 闭眼，跟随内在冲动自发移动；观察者见证。；治疗功能: 访问潜意识资源；将情绪实体化。；专业视角 (Professional Perspective): 提供一个无评判的容器，让“阴影”通过身体发声。；应用场景:
    创伤康复；自我探索。'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Trauma.md
