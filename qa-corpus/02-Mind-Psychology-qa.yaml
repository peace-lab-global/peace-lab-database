  answer: '样本规模: 1,528人；追踪时间: 80年；核心发现: 社交网络预测长寿；发表年份: Friedman & Martin (2011)'
  source: 02-Mind-Psychology/relationships/impact-analysis/Relationship_Impact_Research.md
  section: 社会连接的寿命效应
- type: concept
  question: 创伤来源的核心要点是什么？
  answer: '背叛创伤: 信任的人；其他创伤（如事故、灾害）: 外部事件或陌生人'
  source: 02-Mind-Psychology/relationships/infidelity/Betrayed_Partner_Trauma.md
  section: 1.1 背叛创伤 vs 其他创伤类型
- type: concept
  question: 安全基础的核心要点是什么？
  answer: '背叛创伤: 根本性动摇；其他创伤（如事故、灾害）: 通常保持'
  source: 02-Mind-Psychology/relationships/infidelity/Betrayed_Partner_Trauma.md
  section: 1.1 背叛创伤 vs 其他创伤类型
- type: concept
  question: 认知影响的核心要点是什么？
  answer: '背叛创伤: 世界观、关系观崩塌；其他创伤（如事故、灾害）: 通常较局限'
  source: 02-Mind-Psychology/relationships/infidelity/Betrayed_Partner_Trauma.md
  section: 1.1 背叛创伤 vs 其他创伤类型
- type: concept
  question: 核心症状的核心要点是什么？
  answer: '背叛创伤: 与背叛相关的侵入性思维；抑郁症: 广泛的情绪低落'
  source: 02-Mind-Psychology/relationships/infidelity/Betrayed_Partner_Trauma.md
  section: 2.2 鉴别诊断
- type: concept
  question: 关系主题的核心要点是什么？
  answer: '背叛创伤: 强烈的愤怒和信任问题；抑郁症: 兴趣丧失，社交退缩'
  source: 02-Mind-Psychology/relationships/infidelity/Betrayed_Partner_Trauma.md
  section: 2.2 鉴别诊断
- type: concept
  question: 我不够好，所以他出轨"的核心要点是什么？
  answer: '证据检验: 出轨是他人的选择；我的价值不取决于他的行为；替代思维: 他的出轨反映的是他的问题，不是我的不足'
  source: 02-Mind-Psychology/relationships/infidelity/Betrayed_Partner_Trauma.md
  section: 3.1 治疗阶段模型
- type: concept
  question: 我再也不会幸福了"的核心要点是什么？
  answer: '证据检验: 痛苦会随时间减轻；我有能力重建生活；替代思维: 虽然现在很痛苦，但未来有恢复的可能'
  source: 02-Mind-Psychology/relationships/infidelity/Betrayed_Partner_Trauma.md
  section: 3.1 治疗阶段模型
- type: concept
  question: 频率标准的核心要点是什么？
  answer: '临床标准: 三次或以上独立的出轨事件；评估方法: 结构化临床访谈；区分要点: 排除单次长期出轨'
  source: 02-Mind-Psychology/relationships/infidelity/Chronic_Infidelity.md
  section: 1.1 重复出轨的临床定义
- type: concept
  question: 模式性的核心要点是什么？
  answer: '临床标准: 出现可识别的重复行为模式；评估方法: 行为时间线分析；区分要点: 区分偶然失误与系统性模式'
  source: 02-Mind-Psychology/relationships/infidelity/Chronic_Infidelity.md
  section: 1.1 重复出轨的临床定义
- type: concept
  question: 承诺破坏的核心要点是什么？
  answer: '临床标准: 每次均涉及对现有关系承诺的违反；评估方法: 关系史评估；区分要点: 排除开放式关系中的协议违反'
  source: 02-Mind-Psychology/relationships/infidelity/Chronic_Infidelity.md
  section: 1.1 重复出轨的临床定义
- type: concept
  question: 动机结构的核心要点是什么？
  answer: '单次出轨: 情境因素驱动为主；重复出轨: 深层人格与需求结构驱动；临床意义: 干预需从表面行为深入到人格层面'
  source: 02-Mind-Psychology/relationships/infidelity/Chronic_Infidelity.md
  section: 1.2 重复出轨与单次出轨的关键差异
- type: concept
  question: 悔过质量的核心要点是什么？
  answer: '单次出轨: 通常伴随深刻悔恨；重复出轨: 悔过可能真实也可能表演性；临床意义: 需仔细鉴别悔过的真诚性'
  source: 02-Mind-Psychology/relationships/infidelity/Chronic_Infidelity.md
  section: 1.2 重复出轨与单次出轨的关键差异
- type: concept
  question: 改变能力的核心要点是什么？
  answer: '单次出轨: 行为调整可能足够；重复出轨: 需要深层的心理结构改变；临床意义: 单纯的承诺和约束通常无效'
  source: 02-Mind-Psychology/relationships/infidelity/Chronic_Infidelity.md
  section: 1.2 重复出轨与单次出轨的关键差异
