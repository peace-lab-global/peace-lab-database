- type: concept
  question: 攻击性的核心要点是什么？
  answer: '英文名: Aggression；原始语言/词源: 拉丁语: *Aggressio* (接近、袭击) < *Ad-* (朝向) + *Gredi* (行走)；词源含义: "走向...的行为"；精确定义: 针对目标的有意伤害行为或意图；区分要点:
    目的性 vs 冲动性；专业视角: 工具性攻击 vs 冲动性攻击'
  source: 02-Mind-Psychology/psychology/emotions/Aggressive_Emotion_Professional_Analysis.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 愤怒的核心要点是什么？
  answer: '英文名: Anger；原始语言/词源: 古英语: *Anger* (痛苦、愤怒) < 古诺尔斯语: *Angr* (悲伤、痛苦)；词源含义: "因痛苦而产生的情绪"；精确定义: 对感知不公或威胁的情绪反应，伴生理激活；区分要点:
    愤怒是指向性的情绪；专业视角: 愤怒≠攻击行为'
  source: 02-Mind-Psychology/psychology/emotions/Aggressive_Emotion_Professional_Analysis.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 敌意的核心要点是什么？
  answer: '英文名: Hostility；原始语言/词源: 拉丁语: *Hostis* (敌人)；词源含义: "敌对、不友善的态度"；精确定义: 持续的负面态度，包括怀疑、怨恨和贬低；区分要点: 认知成分为主，弥漫性；专业视角: 敌意认知三元素：猜疑、怨恨、贬低'
  source: 02-Mind-Psychology/psychology/emotions/Aggressive_Emotion_Professional_Analysis.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 间歇性爆发障碍的核心要点是什么？
  answer: 'ICD-11代码: 6A01.0；核心特征: 反复的冲动性攻击爆发；攻击性表现: 言语或身体攻击，程度与诱因不成比例；病程要求: 1年内多次发作'
  source: 02-Mind-Psychology/psychology/emotions/Aggressive_Emotion_Professional_Analysis.md
  section: 2.1 DSM-5相关诊断分类
- type: concept
  question: 破坏性心境失调障碍的核心要点是什么？
  answer: 'ICD-11代码: 6A01.1；核心特征: 严重的持续性易激惹；攻击性表现: 频繁发脾气、频繁愤怒、经常沮丧；病程要求: ≥1年'
  source: 02-Mind-Psychology/psychology/emotions/Aggressive_Emotion_Professional_Analysis.md
  section: 2.1 DSM-5相关诊断分类
- type: concept
  question: 对立违抗障碍的核心要点是什么？
  answer: 'ICD-11代码: 6A10.0；核心特征: 消极抵抗和敌意行为；攻击性表现: 愤怒/易激惹情绪、报复行为；病程要求: ≥6月'
  source: 02-Mind-Psychology/psychology/emotions/Aggressive_Emotion_Professional_Analysis.md
  section: 2.1 DSM-5相关诊断分类
- type: concept
  question: 按动机的核心要点是什么？
  answer: '类型: 反应性/情感性攻击；英文: Reactive/Hostile Aggression；核心特征: 情绪驱动、冲动、防御性；典型情境: 被挑衅后的愤怒爆发；神经机制: 杏仁核主导'
  source: 02-Mind-Psychology/psychology/emotions/Aggressive_Emotion_Professional_Analysis.md
  section: 2.2 攻击行为的分类维度
- type: concept
  question: 按动机的核心要点是什么？
  answer: '类型: 工具性攻击；英文: Instrumental Aggression；核心特征: 目标导向、计划性、冷静；典型情境: 商业竞争、政治谋杀；神经机制: 前额叶参与'
  source: 02-Mind-Psychology/psychology/emotions/Aggressive_Emotion_Professional_Analysis.md
  section: 2.2 攻击行为的分类维度
- type: concept
  question: 职业倦怠的核心要点是什么？
  answer: '英文名: Burnout / Burnout Syndrome；原始语言/词源: 德语: *Ausbrennung* (燃尽)；词源含义: "从内部烧尽"；精确定义: 长期工作压力未被成功管理导致的综合征，表现为情绪耗竭、去人格化与成就感降低；区分要点:
    职业现象，非精神疾病；专业视角: ICD-11 QD85'
  source: 02-Mind-Psychology/psychology/emotions/Occupational_Burnout_Professional_Analysis.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 情绪耗竭的核心要点是什么？
  answer: '英文名: Emotional Exhaustion (EE)；原始语言/词源: 英语心理学术语；词源含义: 情感资源枯竭；精确定义: 感觉情感资源完全透支，无法再给予的极度疲惫状态；区分要点: 倦怠核心维度，不等于简单疲劳；专业视角:
    Maslach三维度之首'
  source: 02-Mind-Psychology/psychology/emotions/Occupational_Burnout_Professional_Analysis.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 去人格化的核心要点是什么？
  answer: '英文名: Depersonalization (DP)；原始语言/词源: 拉丁语: *de-* + *persona* (面具)；词源含义: "摘掉面具"；精确定义: 对服务对象、同事或工作本身产生冷漠、疏离、物化的态度；区分要点:
    不同于解离障碍的去人格化；专业视角: 倦怠中期表现'
  source: 02-Mind-Psychology/psychology/emotions/Occupational_Burnout_Professional_Analysis.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 1974的核心要点是什么？
  answer: '里程碑: 首次正式提出；关键人物: Herbert Freudenberger；核心贡献: 《Staff Burn-Out》描述助人行业情感枯竭；局限性: 偏临床观察，缺乏系统测量'
  source: 02-Mind-Psychology/psychology/emotions/Occupational_Burnout_Professional_Analysis.md
  section: 2.1 定义演变史
- type: concept
  question: 1976的核心要点是什么？
  answer: '里程碑: 社会心理学视角；关键人物: Christina Maslach；核心贡献: 从社会心理学角度研究人际互动中的情感耗竭；局限性: 初期局限于服务行业'
  source: 02-Mind-Psychology/psychology/emotions/Occupational_Burnout_Professional_Analysis.md
  section: 2.1 定义演变史
- type: concept
  question: 1981的核心要点是什么？
  answer: '里程碑: 测量工具标准化；关键人物: Maslach & Jackson；核心贡献: 发布MBI，确立三维度模型；局限性: 测量争议持续至今'
  source: 02-Mind-Psychology/psychology/emotions/Occupational_Burnout_Professional_Analysis.md
  section: 2.1 定义演变史
- type: concept
  question: 能量耗竭的核心要点是什么？
  answer: 'ICD-11原文: Feelings of energy depletion or exhaustion；中文翻译: 能量枯竭或极度疲惫；日常表现: 早上起床就觉得精疲力竭，怎么睡都不够'
  source: 02-Mind-Psychology/psychology/emotions/Occupational_Burnout_Professional_Analysis.md
  section: 2.2 ICD-11定义与诊断标准
- type: concept
  question: 心理距离增大的核心要点是什么？
  answer: 'ICD-11原文: Increased mental distance from one''s job, or feelings of negativism or cynicism related to one''s job；中文翻译:
    与工作的心理距离增大，或对工作产生消极和犬儒态度；日常表现: 从热情变成麻木，从认真变成"混日子"'
  source: 02-Mind-Psychology/psychology/emotions/Occupational_Burnout_Professional_Analysis.md
  section: 2.2 ICD-11定义与诊断标准
- type: concept
  question: 羞耻的核心要点是什么？
  answer: '英文名: Shame；原始语言/词源: 古英语: *Scamu* (羞耻、尴尬)；词源含义: "自我暴露后的不适感"；精确定义: 对整体自我价值的负面判断，伴随想要隐藏或消失的冲动；区分要点: 羞耻=自我整体贬值；专业视角:
    心理健康核心议题'
  source: 02-Mind-Psychology/psychology/emotions/Shame_Emotion_Professional_Analysis.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 内疚的核心要点是什么？
  answer: '英文名: Guilt；原始语言/词源: 古英语: *Gylt* (犯罪、过错)；词源含义: "违反道德规范后的自我谴责"；精确定义: 对特定行为的负面评价，伴随修复动机；区分要点: 内疚=行为有问题，可修复；专业视角: 羞耻指向"我"；内疚指向"行为"'
  source: 02-Mind-Psychology/psychology/emotions/Shame_Emotion_Professional_Analysis.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 尴尬的核心要点是什么？
  answer: '英文名: Embarrassment；原始语言/词源: 法语: *Embarras* (障碍、困窘) < 意大利语: *Imbarazzare* (阻挡)；词源含义: "被阻挡、被暴露的窘迫感"；精确定义: 因意外曝光而产生的短暂不适；区分要点:
    尴尬较轻且短暂；专业视角: 羞耻程度更严重、持续更久'
  source: 02-Mind-Psychology/psychology/emotions/Shame_Emotion_Professional_Analysis.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 核心羞耻的核心要点是什么？
  answer: '英文名: Core/Basal Shame；核心特征: 自我整体的负面感知；典型表现: "我本身就是坏的、有缺陷的"；治疗难度: 高'
  source: 02-Mind-Psychology/psychology/emotions/Shame_Emotion_Professional_Analysis.md
  section: 2.1 羞耻的形态分类
- type: concept
  question: 人际羞耻的核心要点是什么？
  answer: '英文名: Relational Shame；核心特征: 关系中体验的羞耻；典型表现: 在亲密关系中的羞耻感；治疗难度: 中'
  source: 02-Mind-Psychology/psychology/emotions/Shame_Emotion_Professional_Analysis.md
  section: 2.1 羞耻的形态分类
- type: concept
  question: 表现羞耻的核心要点是什么？
  answer: '英文名: Performance Shame；核心特征: 成就/表现情境中的羞耻；典型表现: 工作、考试、社交表现中的羞耻；治疗难度: 中'
  source: 02-Mind-Psychology/psychology/emotions/Shame_Emotion_Professional_Analysis.md
  section: 2.1 羞耻的形态分类
- type: concept
  question: 羞耻的核心要点是什么？
  answer: '指向对象: 整体自我；核心问题: "我有什么问题？"；行动倾向: 隐藏、消失、回避；典型情境: 被发现缺点、公开羞辱'
  source: 02-Mind-Psychology/psychology/emotions/Shame_Emotion_Professional_Analysis.md
  section: 2.2 羞耻与其他情绪的鉴别
- type: concept
  question: 内疚的核心要点是什么？
  answer: '指向对象: 特定行为；核心问题: "我做了什么？"；行动倾向: 道歉、修复、弥补；典型情境: 伤害他人、违反道德'
  source: 02-Mind-Psychology/psychology/emotions/Shame_Emotion_Professional_Analysis.md
  section: 2.2 羞耻与其他情绪的鉴别
