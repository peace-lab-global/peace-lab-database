  answer: '内容概要: 复燃/复发/慢性化概念界定、复发风险分层评估模型、残留症状预测价值、循证干预方法汇总（MBCT降低43%、维持药物、CBT巩固、IPT、行为激活、运动、睡眠、社会节奏）、个体化复发预防计划模板、分级危机应对预案、不同人群策略、监测随访体系、整合预防模型；适用读者:
    复发性抑郁患者、临床工作者、家属；体量: 332行'
