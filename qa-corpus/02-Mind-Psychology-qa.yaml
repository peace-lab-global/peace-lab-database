- type: concept
  question: 觉知本质的核心要点是什么？
  answer: '直接认知: 本自清净、无需修整；间接认知: 需要净化、渐次显现；隐喻说明: 镜子本明vs镜子积尘；实修意义: 认识vs清洁'
