  question: 系统排列技术的核心要点是什么？
  answer: '操作流程: 1. 选择代表系统成员的卡片<br>2. 排列空间关系<br>3. 探索系统动力；整合要点: 家庭/组织系统理解；临床应用: 家庭治疗整合；风险控制: 尊重系统边界；督导建议: 谨慎处理敏感关系'
  source: 02-Mind-Psychology/therapy/oh-cards-therapy/OH_Cards_Techniques_Methods.md
  section: 表1.2 高级整合技术 (Advanced Integration Techniques)
