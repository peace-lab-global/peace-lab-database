- type: concept
  question: 植物神经系统的核心要点是什么？
  answer: '英文名 (English Term): Autonomic Nervous System (ANS)；原始语言/术语 (Original Language): 希: *Autos* (自) + *Nomos* (法则)；精确定义:
    无需意识参与即可调节内脏功能的神经系统，包括交感、副交感与肠神经系统；易混概念: 不等同于“神经衰弱”；专业视角: 建议在科普时使用“自主神经系统”一词，减少“植物人”联想'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Autonomic_Dysfunction.md
  section: 核心术语与三语对照表 (Core Terminology)
- type: concept
  question: 自主神经失调/紊乱的核心要点是什么？
  answer: '英文名 (English Term): Autonomic Dysregulation / Dysautonomia；原始语言/术语 (Original Language): -；精确定义: 自主神经平衡被打破，导致心率、血压、消化、出汗等调节异常；易混概念:
    可由器质性病因（糖尿病神经病变）或功能性因素（焦虑）引起；专业视角: 临床需区分“结构性损害”与“可逆性功能紊乱”'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Autonomic_Dysfunction.md
  section: 核心术语与三语对照表 (Core Terminology)
- type: concept
  question: 交感神经的核心要点是什么？
  answer: '英文名 (English Term): Sympathetic Nervous System；原始语言/术语 (Original Language): 希: *Sympatheia* (共同感受)；精确定义: 负责“战或逃”反应，提高心率、血压、血糖等；易混概念:
    与焦虑症状高度相关；专业视角: 慢性过度激活可导致“交感亢进综合征”体验'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Autonomic_Dysfunction.md
  section: 核心术语与三语对照表 (Core Terminology)
- type: concept
  question: 交感神经的核心要点是什么？
  answer: '中文: 交感；英文: Sympathetic；主要功能: 动员能量，提升警觉与行动力；激活时的身体表现: 心率加快、血压升高、瞳孔扩大、出汗、口干；与焦虑/躯体化的关系: 焦虑与惊恐时交感过度激活，产生“心慌胸闷手抖”等体验'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Autonomic_Dysfunction.md
  section: 自主神经系统功能表 (ANS Functional Overview)
- type: concept
  question: 副交感神经-迷走背侧的核心要点是什么？
  answer: '中文: 副交感（背侧）；英文: Dorsal Vagal Complex；主要功能: 极端防御（冻结、解离）；激活时的身体表现: 乏力、头晕、胃肠蠕动减慢、低血压；与焦虑/躯体化的关系: 创伤与严重抑郁可激活，表现为“虚脱、想躺下”'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Autonomic_Dysfunction.md
  section: 自主神经系统功能表 (ANS Functional Overview)
- type: concept
  question: 副交感神经-迷走腹侧的核心要点是什么？
  answer: '中文: 副交感（腹侧）；英文: Ventral Vagal Complex；主要功能: 社交参与系统，促进安全感与连结；激活时的身体表现: 心率适度、呼吸柔和、面部表情丰富；与焦虑/躯体化的关系: 安全感与联结是缓解自主神经紊乱的关键资源'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Autonomic_Dysfunction.md
  section: 自主神经系统功能表 (ANS Functional Overview)
- type: concept
  question: 心脏型的核心要点是什么？
  answer: '典型主诉（中文）: 心跳快、胸闷、心前区刺痛、怕心脏出问题；英文对应: Cardiac-type autonomic symptoms；可能ANS机制: 交感亢进、心率变异性降低；首要排查: 心电图、心肌酶、超声心动图；心理/身心机制:
    健康焦虑、惊恐敏感性；治疗切入点: 心率变异性训练、呼吸调节、惊恐教育'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Autonomic_Dysfunction.md
  section: 常见“植物神经紊乱”症状与机制表 (Common Symptom Clusters)
- type: concept
  question: 呼吸型的核心要点是什么？
  answer: '典型主诉（中文）: 喘不过气、需要深呼吸、叹气、喉咙堵；英文对应: Respiratory-type；可能ANS机制: 呼吸中枢对CO₂过度敏感、过度换气；首要排查: 排除哮喘、肺功能异常、肺栓塞；心理/身心机制: 对“窒息”灾难性解释；治疗切入点:
    过度换气训练、纸袋呼吸、正念感受气流'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Autonomic_Dysfunction.md
  section: 常见“植物神经紊乱”症状与机制表 (Common Symptom Clusters)
- type: concept
  question: 疑病症（旧称）的核心要点是什么？
  answer: '英文名 (English Term): Hypochondriasis；原始语言/术语 (Original Language): 希: *Hypo* (下) + *Chondros* (软骨)；词源含义: 古希腊认为“肋软骨下方”区域（腹部）产生忧郁与多疑；精确定义:
    过度关注身体功能，持续担心患有严重疾病，医学检查反复正常；专业视角: DSM-5已不再使用此词，大部分被“疾病焦虑障碍”与“躯体症状障碍”吸收'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Illness_Anxiety.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 疾病焦虑障碍的核心要点是什么？
  answer: '英文名 (English Term): Illness Anxiety Disorder；原始语言/术语 (Original Language): DSM-5 术语；词源含义: -；精确定义: 轻微或几乎没有躯体症状，却对患严重疾病有持续性、过度焦虑与恐惧；专业视角:
    关键在“疾病担忧”而非“症状本身”，属于躯体症状及相关障碍谱系'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Illness_Anxiety.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 健康焦虑的核心要点是什么？
  answer: '英文名 (English Term): Health Anxiety；原始语言/术语 (Original Language): -；词源含义: -；精确定义: 泛指对健康状况的持续过度担心，可见于多种诊断（IAD、SSD、OCD等）；专业视角:
    实务中“健康焦虑”作为较少污名化的通俗表述更易被患者接受'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Illness_Anxiety.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 疾病焦虑障碍 (IAD)的核心要点是什么？
  answer: '核心焦点: “我可能有严重疾病”；信念强度: 高焦虑，但仍能部分修正；典型行为: 频繁就医、自检、查资料或极端回避；与IAD的区别: 躯体症状轻或缺如，焦点在疾病本身；提示性问题: “如果医生反复说没事，你能否暂时安心？”'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Illness_Anxiety.md
  section: 疑病症与相关障碍鉴别诊断表 (Differential Diagnosis)
- type: concept
  question: 躯体症状障碍 (SSD)的核心要点是什么？
  answer: '核心焦点: “我的症状很严重”；信念强度: 对症状本身的关注更高；典型行为: 专注疼痛、疲劳等症状本身；与IAD的区别: 症状负担更重，功能受损多与症状相关；提示性问题: “你最困扰的是症状本身还是背后有什么大病？”'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Illness_Anxiety.md
  section: 疑病症与相关障碍鉴别诊断表 (Differential Diagnosis)
- type: concept
  question: 强迫症 (健康相关强迫)的核心要点是什么？
  answer: '核心焦点: “我必须不断检查/询问以确保安全”；信念强度: 强迫观念，患者知其不合理；典型行为: 反复检查身体、查资料以减轻焦虑；与IAD的区别: 行为更符合“仪式感”，焦点是缓解强迫观念；提示性问题: “你是否觉得自己检查行为有点过头，但就是停不下来？”'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Illness_Anxiety.md
  section: 疑病症与相关障碍鉴别诊断表 (Differential Diagnosis)
- type: concept
  question: 身体感觉的核心要点是什么？
  answer: '中文描述: 正常或轻微身体感觉；英文名: Bodily Sensations；示例: 心跳略快、偶尔刺痛；治疗靶点: 通过内感受训练区分“危险信号”与“噪音”'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Illness_Anxiety.md
  section: 疑病认知模型表 (Cognitive Model of Health Anxiety)
- type: concept
  question: 注意选择性放大的核心要点是什么？
  answer: '中文描述: 将注意力集中在特定部位；英文名: Selective Attention；示例: 反复关注胸口每一次跳动；治疗靶点: 训练注意力转移与外向专注'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Illness_Anxiety.md
  section: 疑病认知模型表 (Cognitive Model of Health Anxiety)
- type: concept
  question: 躯体化的核心要点是什么？
  answer: '英文名 (English Term): Somatization；原始语言/术语 (Original Language): 希: *Sōma* (σῶμα, 身体)；精确定义: 情绪与心理冲突通过身体症状表达的过程，症状本身无法完全用器质性疾病解释；区分与备注:
    不等于“装病”或“想太多”，症状主观上真实存在；专业视角 (Professional Perspective): 是一种常见的心理防御与神经-内分泌-免疫反应模式，在东亚文化尤为常见'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Somatization.md
  section: 核心术语与定义表 (Core Terminology)
- type: concept
  question: 躯体症状障碍的核心要点是什么？
  answer: '英文名 (English Term): Somatic Symptom Disorder；原始语言/术语 (Original Language): DSM-5正式诊断；精确定义: 有一个或多个令人困扰的躯体症状，伴持续过度的思考、情绪或行为反应（对症状的担忧、焦虑）；区分与备注:
    DSM-5不再要求“医学无法解释”，而强调“过度反应”；专业视角 (Professional Perspective): 更尊重身心一体，避免“全是你想出来的”这种污名化表述'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Somatization.md
  section: 核心术语与定义表 (Core Terminology)
- type: concept
  question: 转换障碍/功能性神经症状的核心要点是什么？
  answer: '英文名 (English Term): Conversion Disorder / Functional Neurological Symptom Disorder；原始语言/术语 (Original Language):
    拉: *Conversio* (转变)；精确定义: 运动或感觉功能症状，但与已知神经疾病不符；区分与备注: 典型如心因性癫痫、心因性瘫痪；专业视角 (Professional Perspective): 需要与器质性疾病仔细鉴别，建议神经科+心理科协作'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Somatization.md
  section: 核心术语与定义表 (Core Terminology)
- type: concept
  question: 心血管系统的核心要点是什么？
  answer: '常见症状（中文）: 心悸、胸闷、心慌、心前区刺痛；英文名: Palpitations, Chest tightness, Atypical chest pain；可能机制: 交感神经兴奋、呼吸性碱中毒、肌肉紧张；首要鉴别:
    心绞痛、心律失常、肺栓塞；提示性问题: “运动时或静息时更明显？”“活动耐量如何？”；专业洞察: 典型焦虑性心悸多见于静息或入睡前，检查多正常；但首次发作仍需心电图排查'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Somatization.md
  section: 焦虑与躯体系统映射表 (Anxiety–Body System Mapping)
- type: concept
  question: 呼吸系统的核心要点是什么？
  answer: '常见症状（中文）: 喘不过气、叹息样呼吸、喉咙堵塞感；英文名: Dyspnea, Sighing respiration, Globus sensation；可能机制: 过度换气、膈肌紧张、喉咙肌肉紧绷；首要鉴别: 哮喘、COPD、肺炎、气胸；提示性问题:
    “平躺时还是活动时更严重？”；专业洞察: 焦虑性气短常伴“叹气补偿”，肺功能检查多正常'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Somatization.md
  section: 焦虑与躯体系统映射表 (Anxiety–Body System Mapping)
- type: concept
  question: 消化系统的核心要点是什么？
  answer: '常见症状（中文）: 胃胀、恶心、反酸、腹泻或便秘、肠鸣；英文名: Nausea, Bloating, IBS-like symptoms；可能机制: 肠脑轴激活、迷走神经调节异常、5-HT改变；首要鉴别: 消化性溃疡、炎症性肠病、肿瘤；提示性问题:
    “是否与压力/情绪波动相关？”；专业洞察: 功能性消化不良与肠易激综合征中，焦虑和抑郁共病率极高'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Somatization.md
  section: 焦虑与躯体系统映射表 (Anxiety–Body System Mapping)
- type: concept
  question: 东亚（含中国）的核心要点是什么？
  answer: '典型呈现形式: 胸闷、心慌、胃胀、乏力、头晕；常见用语（中文）: “气堵住了”“心里不舒服说不上来”；可能含义: 情绪表达被内化为身体感觉；临床风险: 容易在内科反复就诊，延误心理治疗；治疗建议: 使用“身心一体”框架解释，避免“都是心理问题”式否定'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Somatization.md
  section: 焦虑躯体化与文化差异表 (Cultural Patterns of Somatization)
- type: concept
  question: 欧美的核心要点是什么？
  answer: '典型呈现形式: 焦虑、抑郁、惊恐发作；常见用语（中文）: "Anxiety attack", "Panic"；可能含义: 较多直接情绪用语；临床风险: 躯体化相对较少但仍存在；治疗建议: 以认知行为语言沟通较容易'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Somatization.md
  section: 焦虑躯体化与文化差异表 (Cultural Patterns of Somatization)
- type: concept
  question: 医学评估的核心要点是什么？
  answer: '主要目标: 排除危重器质性疾病，建立“安全边界”；关键问题: “是否有红旗症状？”；干预模块: 基本查体+必要的影像/实验室检查；明确何时需要转专科；专业洞察: 一次充分评估比多次零散检查更能降低健康焦虑'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Treatment.md
  section: 综合治疗框架表 (Integrated Treatment Framework)
- type: concept
  question: 身心解释的核心要点是什么？
  answer: '主要目标: 建立“身心一体”的疾病模型；关键问题: “为什么检查正常我还难受？”；干预模块: 使用脑-自主神经-内分泌-免疫连结图示与隐喻；专业洞察: 避免“你就是心理问题”句式，用科学语言解释'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Treatment.md
  section: 综合治疗框架表 (Integrated Treatment Framework)
- type: concept
  question: 心理治疗的核心要点是什么？
  answer: '主要目标: 改变灾难化解释与安全行为；关键问题: “我如何停止反复查病/检查？”；干预模块: CBT、ERP、正念、ACT 等；专业洞察: 对疑病/健康焦虑尤为关键'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Treatment.md
  section: 综合治疗框架表 (Integrated Treatment Framework)
- type: concept
  question: 症状日志与触发链分析的核心要点是什么？
  answer: '英文名: Symptom Log & Chain Analysis；适用对象: 躯体化广泛的患者；核心步骤: 记录症状发生的时间、情境、情绪、想法与行为；典型作业: “本周记录5次胸闷：发生前在做什么？当时在想什么？”'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Treatment.md
  section: 焦虑躯体化 CBT 技术表 (CBT for Anxiety Somatization)
- type: concept
  question: 认知重构（灾难化挑战）的核心要点是什么？
  answer: '英文名: Cognitive Restructuring；适用对象: 灾难性解释明显者；核心步骤: 找出自动化想法→证据支持/反对→生成平衡想法；典型作业: 把“心跳快=心梗”改为“可能是我刚爬楼+紧张”'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Treatment.md
  section: 焦虑躯体化 CBT 技术表 (CBT for Anxiety Somatization)
- type: concept
  question: 身体感觉暴露的核心要点是什么？
  answer: '英文名: Interoceptive Exposure；适用对象: 怕心悸、头晕、窒息等；核心步骤: 安全环境中刻意诱发身体感觉（原地跑、快呼吸等），练习不逃避；典型作业: 让患者体验“心跳快并不等于心脏病发作”'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Treatment.md
  section: 焦虑躯体化 CBT 技术表 (CBT for Anxiety Somatization)
- type: concept
  question: 节律呼吸训练的核心要点是什么？
  answer: '英文名: Rhythmic Breathing；主要目标: 提升迷走神经张力，稳定心率；生理基础: 心率变异性(HRV)训练理论；使用建议: 推荐 4-6 次/分钟呼吸，每天10-20分钟'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Treatment.md
  section: 自主神经调节与身心技术表 (Body-Based Regulation)
- type: concept
  question: 渐进性肌肉放松的核心要点是什么？
  answer: '英文名: Progressive Muscle Relaxation (PMR)；主要目标: 减少肌肉紧张、降低交感激活；生理基础: 肌肉张力与焦虑的双向关系；使用建议: 依次紧绷-放松身体各部位'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Anxiety_Treatment.md
  section: 自主神经调节与身心技术表 (Body-Based Regulation)
- type: concept
  question: Titration的核心要点是什么？
  answer: '概念 (中文): 滴定；描述 (Description): 将创伤的处理过程放慢到可管理的量。；治疗目标 (Therapeutic Goal): 防止二次创伤；建立容纳能力。；专业视角 (Professional Perspective):
    与暴露疗法 (Flooding) 不同，SE 处理微小的激活以避免压垮神经系统。；引用来源 (Citation): Levine, P. A. (1997). *Waking the Tiger*.'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Experiencing.md
  section: Somatic Experiencing (SE) Core Concepts (躯体体验核心概念)
- type: concept
  question: Pendulation的核心要点是什么？
  answer: '概念 (中文): 摆荡；描述 (Description): 在资源（安全感）和激活状况（创伤）之间移动注意力。；治疗目标 (Therapeutic Goal): 重新建立神经系统的自然节奏。；专业视角 (Professional
    Perspective): 恢复创伤期间被卡住的扩张/收缩振荡（如冻结反应）。；引用来源 (Citation): Levine, P. A. (2010). *In an Unspoken Voice*.'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Experiencing.md
  section: Somatic Experiencing (SE) Core Concepts (躯体体验核心概念)
- type: concept
  question: Discharge的核心要点是什么？
  answer: '概念 (中文): 释放；描述 (Description): 被卡住的生存能量的生物性释放（震颤、发热、流泪）。；治疗目标 (Therapeutic Goal): 完成防御性反应。；专业视角 (Professional Perspective):
    完成被挫败的“战斗或逃跑”循环，允许自主神经系统 (ANS) 回到稳态。；引用来源 (Citation): Scaer, R. (2005). *The Trauma Spectrum*.'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Experiencing.md
  section: Somatic Experiencing (SE) Core Concepts (躯体体验核心概念)
- type: concept
  question: Ventral Vagal的核心要点是什么？
  answer: '行为/特征 (Behavior): 社会参与 (Social Engagement)；生理标记 (Physiological Marker): 高心率变异性 (HRV)；亲社会声音。；治疗干预 (Intervention):
    共同调节 (Co-regulation)；目光接触；游戏。；专业视角 (Professional Perspective): 治疗的目标状态；能够促进神经塑造性和安全感。；引用来源 (Citation): Porges, S. W. (2011).
    *The Polyvagal Theory*.'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Experiencing.md
  section: Polyvagal Applications in Therapy (多迷走神经理论应用)
- type: concept
  question: Sympathetic的核心要点是什么？
  answer: '行为/特征 (Behavior): 动员 (Mobilization)；生理标记 (Physiological Marker): 心率增加；出汗；高度警觉。；治疗干预 (Intervention): 节律性运动；接地推力
    (Grounding push)。；专业视角 (Professional Perspective): 需要“受控的动员”而不仅仅是放松（放松有时会让其感到不安全）。；引用来源 (Citation): Dana, D. (2018). *The
    Polyvagal Theory in Therapy*.'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Experiencing.md
  section: Polyvagal Applications in Therapy (多迷走神经理论应用)
- type: concept
  question: Dorsal Vagal的核心要点是什么？
  answer: '行为/特征 (Behavior): 离断 (Immobilization)；生理标记 (Physiological Marker): 心动过缓；麻木；解离 (Dissociation)。；治疗干预 (Intervention):
    轻微摇晃；发声；温暖。；专业视角 (Professional Perspective): 需要微妙的安全信号来攀爬自主神经阶梯，通常绕过交感神经动员带来的风险。；引用来源 (Citation): Porges, S. W. (2017).
    *Clinical Advancements*.'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Experiencing.md
  section: Polyvagal Applications in Therapy (多迷走神经理论应用)
- type: concept
  question: Feldenkrais的核心要点是什么？
  answer: '核心焦点 (Core Focus): 通过动作产生的觉察 (ATM)；关键方法 (Key Method): 微小动作；非习惯性模式。；结果 (Outcome): 神经重映射；疼痛缓解。；专业视角 (Professional
    Perspective): 利用韦伯-费希纳定律 (Weber-Fechner law)：较小的刺激允许运动皮层进行更精细的区分和学习。；引用来源 (Citation): Feldenkrais, M. (1972). *Awareness
    Through Movement*.'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Experiencing.md
  section: Feldenkrais & Alexander Technique (费登奎斯与亚历山大技巧)
- type: concept
  question: Alexander Tech的核心要点是什么？
  answer: '核心焦点 (Core Focus): 抑制与定向；关键方法 (Key Method): 在反应前“暂停”；头-颈-背的关系。；结果 (Outcome): 姿势效率；性能提升。；专业视角 (Professional Perspective):
    专注于“首要控制” (Primary Control)（头颈关系）以减少惊吓反应模式的干扰。；引用来源 (Citation): Alexander, F. M. (1932). *The Use of the Self*.'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Experiencing.md
  section: Feldenkrais & Alexander Technique (费登奎斯与亚历山大技巧)
- type: concept
  question: 躯体体验疗法的核心要点是什么？
  answer: '英文术语: Somatic Experiencing (SE)；源头语言: English；定义: 由Peter Levine开发的身体导向创伤疗法,通过追踪和释放储存在神经系统中的创伤能量来治愈创伤；临床意义: 强调神经生物学机制,重新谈判而非重新体验创伤'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Experiencing_Therapy.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 调节窗口的核心要点是什么？
  answer: '英文术语: Window of Tolerance；源头语言: English；定义: 自主神经系统可承受的最佳唤醒区间,在此范围内个体可处理信息和情绪而不失调；临床意义: 创伤治疗的核心目标是扩大调节窗口'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Experiencing_Therapy.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 滴定法的核心要点是什么？
  answer: '英文术语: Titration；源头语言: English；定义: 以微小、可管理的剂量逐步接近创伤材料,避免淹没神经系统；临床意义: 防止再创伤化,确保治疗过程安全'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Experiencing_Therapy.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 1969的核心要点是什么？
  answer: '里程碑事件: Peter Levine开始研究动物应激反应；关键人物: Peter Levine；理论贡献: 观察到野生动物在捕食者攻击后通过震颤释放应激能量；社会影响: 奠定SE生物学基础'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Experiencing_Therapy.md
  section: 历史发展表 (Historical Development)
- type: concept
  question: 1970s的核心要点是什么？
  answer: '里程碑事件: 研究创伤的神经生物学机制；关键人物: Peter Levine；理论贡献: 整合神经生理学、动物行为学、压力研究；社会影响: 建立创伤的躯体理论框架'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Experiencing_Therapy.md
  section: 历史发展表 (Historical Development)
- type: concept
  question: 1976的核心要点是什么？
  answer: '里程碑事件: 首次成功治疗恐慌症案例(Nancy)；关键人物: Peter Levine；理论贡献: 通过引导身体完成"逃跑"反应治愈创伤；社会影响: 验证躯体导向方法的有效性'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Experiencing_Therapy.md
  section: 历史发展表 (Historical Development)
- type: concept
  question: 创伤是生理事件的核心要点是什么？
  answer: '核心假设: 创伤存储在神经系统而非记忆中；神经生物学基础: 边缘系统和脑干的过度激活；临床应用: 通过身体而非认知工作'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Experiencing_Therapy.md
  section: 核心理论原则
- type: concept
  question: 不完整防御反应的核心要点是什么？
  answer: '核心假设: 被打断的战斗/逃跑反应导致创伤固化；神经生物学基础: 交感神经系统的持续激活；临床应用: 完成未完成的防御动作'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Experiencing_Therapy.md
  section: 核心理论原则
- type: concept
  question: Superficial Back Line的核心要点是什么？
  answer: '对应解剖结构: 足底筋膜-腓肠肌-脊柱旁肌-额骨。；运动功能: 伸展、维持站立姿态。；情绪/心理关联: 持续的警觉态；承担责任的重压。；疗愈性运动策略: 前屈拉伸；泡沫轴足底滚压。；专业视角 (Professional Perspective):
    典型的“后侧防御”线，慢性张力常指向对未知的恐惧。；引用来源 (Citation): Myers, T. W. (2014). *Anatomy Trains*.'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Functional.md
  section: Fascial Meridians & Emotional Armor (筋膜经线与情绪装甲表)
- type: concept
  question: Superficial Front Line的核心要点是什么？
  answer: '对应解剖结构: 足背-股四头肌-腹直肌-胸锁乳突肌。；运动功能: 屈曲、收缩、保护。；情绪/心理关联: 惊恐反应 (Startle reflex) 的物理核心。；疗愈性运动策略: 后弯练习；深层侧向呼吸。；专业视角 (Professional
    Perspective): 前侧紧缩代表了生理上的“自我保护”意志，常伴随浅呼吸。；引用来源 (Citation): -'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Functional.md
  section: Fascial Meridians & Emotional Armor (筋膜经线与情绪装甲表)
- type: concept
  question: Deep Front Line的核心要点是什么？
  answer: '对应解剖结构: 胫骨后肌-大腿内收肌-盆底肌-膈肌-喉。；运动功能: 核心稳定性；内外沟通。；情绪/心理关联: 自我身份认知的核心；生存意志。；疗愈性运动策略: 骨盆底动员；深层核心连接。；专业视角 (Professional
    Perspective): 它是“存在”的轴线，处理不安全感和深度创伤的必经之路。；引用来源 (Citation): -'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Functional.md
  section: Fascial Meridians & Emotional Armor (筋膜经线与情绪装甲表)
- type: concept
  question: Feldenkrais (ATM)的核心要点是什么？
  answer: '核心理念 (Core Concept): 觉察即疗愈。；操作方式 (Method): 通过极微小的非习惯性动作进行探索。；神经科学机制: 神经可塑性 (Weber-Fechner Law)。；治疗益处: 改善动作模式；缓解慢性疼痛。；专业视角
    (Professional Perspective): 目标不是物理训练，而是大脑皮层动作映射的丰富化与精确化。'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Functional.md
  section: Somatic Re-education Modalities (躯体重新教育技术表)
- type: concept
  question: Alexander Technique的核心要点是什么？
  answer: '核心理念 (Core Concept): 抑制与重定向。；操作方式 (Method): 识别有害的张力习惯；维持首要控制。；神经科学机制: 抑制控制 (Inhibitory Control)。；治疗益处: 提升姿势效率；减少性能焦虑。；专业视角
    (Professional Perspective): 强调在大脑发出动作指令前的“暂停”，是认知介入动作的典范。'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Functional.md
  section: Somatic Re-education Modalities (躯体重新教育技术表)
- type: concept
  question: Hanna Somatics的核心要点是什么？
  answer: '核心理念 (Core Concept): 感觉运动失忆症 (SMA)。；操作方式 (Method): 慢速拮抗收缩 (Pandiculation)。；神经科学机制: 重置 Alpha 运动神经元。；治疗益处: 永久性逆转由于习惯或创伤导致的肌肉僵硬。；专业视角
    (Professional Perspective): 通过主观的“颤点”探索，重新夺回被植物神经占领的控制权。'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Functional.md
  section: Somatic Re-education Modalities (躯体重新教育技术表)
- type: concept
  question: Frc (Functional Range Conditioning)的核心要点是什么？
  answer: '技术重点: 关节包囊旋转 (CARs)；末端等长收缩。；心理功能: 建立对身体边缘的控制感。；生理效应: 增加活动范围；强化结缔组织。；专业视角 (Professional Perspective): 将“被动柔韧性”转化为“主动控制力”，是预防运动损伤的高阶标准。；推荐场景:
    晨间活动；伤后康复。'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Functional.md
  section: Mobility & Proprioceptive Refinement (移动性与本能觉知训练表)
- type: concept
  question: Animal Flow的核心要点是什么？
  answer: '技术重点: 地面爬行；封闭动力链。；心理功能: 激活原始本能；去社会化焦虑。；生理效应: 提升跨对侧协调；动态力量。；专业视角 (Professional Perspective): 重建身体的整体性，通过四肢着地恢复“接地”的原始感。；推荐场景:
    减压；高强度体能整合。'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Functional.md
  section: Mobility & Proprioceptive Refinement (移动性与本能觉知训练表)
- type: concept
  question: 跨侧爬行的核心要点是什么？
  answer: '技术细节: 异侧手足协调移动（如四足爬行）。；机制说明 (Mechanism): 刺激胼胝体，增强左右半球通信。；认知益处: 提升统筹能力；缓解学习障碍。；专业视角 (Professional Perspective):
    大脑最基础的物理发育模板，是所有高级认知的底座。；推荐场景: 儿童康复；老年预防痴呆。'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Neuro.md
  section: 'Neuro-Reeducation: Cross-Lateral & Brain Logic (神经重塑：跨侧整合与大脑逻辑表)'
- type: concept
  question: 8字环绕练习的核心要点是什么？
  answer: '技术细节: 眼睛或肢体画横向无限符号 (Lazy 8s)。；机制说明 (Mechanism): 跨越视觉中线。；认知益处: 改善阅读流畅性；平衡眼球肌肉。；专业视角 (Professional Perspective):
    视觉系统的“物理对焦”，减少由于视觉失衡带来的焦虑。；推荐场景: 学习前压力缓解。'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Neuro.md
  section: 'Neuro-Reeducation: Cross-Lateral & Brain Logic (神经重塑：跨侧整合与大脑逻辑表)'
- type: concept
  question: 复杂节奏敲击的核心要点是什么？
  answer: '技术细节: 双手异节拍敲击桌子或身体。；机制说明 (Mechanism): 颞叶与执行功能的统合。；认知益处: 强化工作记忆。；专业视角 (Professional Perspective): 对抗由于多任务下产生的信息处理过载。；推荐场景:
    职场间歇。'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Neuro.md
  section: 'Neuro-Reeducation: Cross-Lateral & Brain Logic (神经重塑：跨侧整合与大脑逻辑表)'
- type: concept
  question: 莫罗反射 (Moro)的核心要点是什么？
  answer: '正常整合期: 2-4个月。；成人未整合表现: 易受惊；情感过敏；视觉系统紧张。；疗愈性运动干预: 星形扩展练习；深压感触觉。；心理隐喻: “世界是不安全的”，始终处于战斗状态。；专业视角 (Professional Perspective):
    原始生存脑对外界刺激的过度解释。'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Neuro.md
  section: Primitive Reflex Integration (原始反射整合与成人影响表)
- type: concept
  question: ATNR (不对称颈紧张)的核心要点是什么？
  answer: '正常整合期: 6个月。；成人未整合表现: 左右不分；手眼协调差；书写困难。；疗愈性运动干预: 蜥蜴爬行；视觉-动作同步。；心理隐喻: “自我与他人”的边界模糊，难以维持重心。；专业视角 (Professional Perspective):
    直接限制了双侧大脑的独立发展。'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Neuro.md
  section: Primitive Reflex Integration (原始反射整合与成人影响表)
- type: concept
  question: 迷路紧张反射 (TLR)的核心要点是什么？
  answer: '正常整合期: 4个月。；成人未整合表现: 空间感差；晕动症；姿势懒散（低张力）。；疗愈性运动干预: 婴儿姿势滚动；俯卧位背部伸展。；心理隐喻: 缺乏重力感支持，内心漂浮。；专业视角 (Professional Perspective):
    影响平衡感，由此导致对环境的深度不信任。'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Neuro.md
  section: Primitive Reflex Integration (原始反射整合与成人影响表)
- type: concept
  question: 视觉追踪 (Pursuits)的核心要点是什么？
  answer: '练习项目: 跟踪平稳移动的目标。；训练逻辑 (Logic): Fovea (黄斑) 持续锁定。；预期转变: 提升深度注意力的稳定性。；专业视角 (Professional Perspective): 视觉稳定性直接决定了自主神经系统的安全感级别。'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Neuro.md
  section: 'Neuro-Athletics: Visual & Vestibular Training (神经体育：视觉与前庭训练表)'
- type: concept
  question: 扫视训练 (Saccades)的核心要点是什么？
  answer: '练习项目: 视线在两个固定点间快速跳转。；训练逻辑 (Logic): 提升大脑刷新信息的频率。；预期转变: 处理突发状况的反应灵活性。；专业视角 (Professional Perspective): 减少感知延迟导致的惊恐反应。'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Neuro.md
  section: 'Neuro-Athletics: Visual & Vestibular Training (神经体育：视觉与前庭训练表)'
- type: concept
  question: 听劲的核心要点是什么？
  answer: '英文/拼音名: Ting Jin / Listening；描述 (Description): 对微小外力变化的敏锐觉知。；心理/存在主义隐喻: 人际间的深层共情与非评判观察。；专业视角 (Professional Perspective):
    极低阈值的触觉与本体感觉反馈训练。；引用来源 (Citation): *Taiji Classics*.'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Oriental.md
  section: Tai Chi & Internal Dynamics (太极拳与内劲疗法表)
- type: concept
  question: 化劲的核心要点是什么？
  answer: '英文/拼音名: Hua Jin / Neutralizing；描述 (Description): 顺势引导压力，不迎不拒。；心理/存在主义隐喻: 心理灵活性；解决冲突的智慧。；专业视角 (Professional Perspective):
    基于液体动力学的肢体传导，减少结构性冲击。；引用来源 (Citation): -'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Oriental.md
  section: Tai Chi & Internal Dynamics (太极拳与内劲疗法表)
- type: concept
  question: 抽丝 (缠丝劲)的核心要点是什么？
  answer: '英文/拼音名: Chan Si Gong / Silk Reeling；描述 (Description): 全身性的螺旋、持续的运动。；心理/存在主义隐喻: 生命的连续性与无死角的自我关照。；专业视角 (Professional
    Perspective): 强化多维度的筋膜张力，实现力的一体化。；引用来源 (Citation): *Chen Style Taijiquan*.'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Oriental.md
  section: Tai Chi & Internal Dynamics (太极拳与内劲疗法表)
- type: concept
  question: 走圈的核心要点是什么？
  answer: '英文名: Circle Walking；技术要点: 泥步行走，不断变换方向。；疗愈指向: 突破线性思维；在变化中寻找不变。；专业视角 (Professional Perspective): 极佳的前庭系统挑战，提升大脑处理复杂动态环境的能力。'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Oriental.md
  section: Bagua Zhang & Circular Dynamics (八卦掌与环形动力学表)
- type: concept
  question: 拧旋的核心要点是什么？
  answer: '英文名: Twisting；技术要点: 身体极度螺旋扭转。；疗愈指向: 深度按摩内脏；释放躯干被卡住的能量。；专业视角 (Professional Perspective): 针对性地松解核心区域的肌肉保护机制。'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Oriental.md
  section: Bagua Zhang & Circular Dynamics (八卦掌与环形动力学表)
- type: concept
  question: 变势的核心要点是什么？
  answer: '英文名: Change；技术要点: 动作间如云流水，不留痕迹。；疗愈指向: 提升心理适应性 (Adaptability)。；专业视角 (Professional Perspective): 训练前额叶与运动系统的快速切换与适应能力。'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Oriental.md
  section: Bagua Zhang & Circular Dynamics (八卦掌与环形动力学表)
- type: concept
  question: 慢性疲劳/自主神经紊乱的核心要点是什么？
  answer: '疗愈性序列逻辑: 倒置与极度修复，激活迷走神经。；关键阿萨纳 (Asanas): 仰卧倒箭式。；梵文名: Viparita Karani；神经生理机制: 改善静脉回流；降低心率。；专业视角 (Professional Perspective):
    对抗由重力激发的持续性交感神经压力。'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Oriental.md
  section: Yoga Therapy Protocols (瑜伽疗愈：临床路径表)
- type: concept
  question: 消化性焦虑 (肠胃不适)的核心要点是什么？
  answer: '疗愈性序列逻辑: 开放与扭转，促进蠕动。；关键阿萨纳 (Asanas): 半腹轮转式。；梵文名: Ardha Matsyendrasana；神经生理机制: 产生“挤压-释放”效应，改善腹腔血供。；专业视角 (Professional
    Perspective): 肠脑轴的物理干扰策略。'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Oriental.md
  section: Yoga Therapy Protocols (瑜伽疗愈：临床路径表)
- type: concept
  question: 挑战-技能平衡的核心要点是什么？
  answer: '类别: 认知；具体机制 (Mechanism): 任务难度刚好超出舒适区 (4% 黄金法则)。；心理/绩效表现: 极度的专注与低焦虑。；专业视角 (Professional Perspective): 防止因太难导致惊恐或太易导致无聊。；引用来源
    (Citation): Csikszentmihalyi, M. (1990). *Flow*.'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Performance.md
  section: 'Flow State (The Zone): Neuro-Performance (进入“心流”状态：神经性能表)'
- type: concept
  question: 明确目标/实时反馈的核心要点是什么？
  answer: '类别: 信息；具体机制 (Mechanism): 神经递质持续释放以维持闭环。；心理/绩效表现: “我在正确轨道上”的安全感。；专业视角 (Professional Perspective): 减少前额叶处理歧义的能量消耗。；引用来源
    (Citation): Kotler, S. (2014). *Rise of Superman*.'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Performance.md
  section: 'Flow State (The Zone): Neuro-Performance (进入“心流”状态：神经性能表)'
- type: concept
  question: 瞬时风险 (High Stakes)的核心要点是什么？
  answer: '类别: 环境；具体机制 (Mechanism): 激活适度去甲肾上腺素。；心理/绩效表现: 时间感知扭曲；自我感消失。；专业视角 (Professional Perspective): 迫使系统将所有资源分配给当前任务，进入“行动中沉思”态。；引用来源
    (Citation): -'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Performance.md
  section: 'Flow State (The Zone): Neuro-Performance (进入“心流”状态：神经性能表)'
- type: concept
  question: “冻结”式发挥失常的核心要点是什么？
  answer: '心理成因: 边缘系统接管，额叶瘫痪。；运动干预策略: 大肌肉群爆发性收缩（如冲刺、大声呼喊）。；认知重构思路: 将威胁解读为“兴奋”信号。；专业视角 (Professional Perspective): 通过物理上的“动员”解除生理上的“冰封”。'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Performance.md
  section: Managing Performance Anxiety & Choking (应对表现焦虑与“噎住”现象表)
- type: concept
  question: 过度分析产生的僵硬的核心要点是什么？
  answer: '心理成因: 意识介入原本自动化的运动图式。；运动干预策略: 外部关注焦点训练（盯着目标而非手部）。；认知重构思路: 相信身体的自动驾驶系统。；专业视角 (Professional Perspective): 将执行控制权交回小脑，回归“无心”状态。'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Performance.md
  section: Managing Performance Anxiety & Choking (应对表现焦虑与“噎住”现象表)
- type: concept
  question: 决策犹豫的核心要点是什么？
  answer: '心理成因: 对失败的恐惧导致动力受阻。；运动干预策略: 快速决策小游戏（如接球反应）。；认知重构思路: 拥抱过程中的不确定性。；专业视角 (Professional Perspective): 这种犹豫常源于对“完美”的强迫症式追求。'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Performance.md
  section: Managing Performance Anxiety & Choking (应对表现焦虑与“噎住”现象表)
- type: concept
  question: HRV (心率变异性) 降低的核心要点是什么？
  answer: '预警信号 (Warning): 交感神经持续主导；无法放松。；专家级恢复方案: 复律呼吸 (Coherent Breathing)；森林浴；低强度拉伸。；心理机制 (Mechanism): 建立自主神经系统的韧性。；专业视角
    (Professional Perspective): HRV 是预测神经系统崩溃最敏感的生理指标。'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Performance.md
  section: Recovery, Overtraining & HRV (恢复、过度训练与心率变异性表)
- type: concept
  question: 睡眠架构改变的核心要点是什么？
  answer: '预警信号 (Warning): 半夜易醒；无法进入深睡。；专家级恢复方案: 镁盐浴；减少晚间高强度运动。；心理机制 (Mechanism): 调节褪黑素与皮质醇的昼夜平衡。；专业视角 (Professional Perspective):
    睡眠是身体唯一的离线深度修复窗口。'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Performance.md
  section: Recovery, Overtraining & HRV (恢复、过度训练与心率变异性表)
- type: concept
  question: 步骤1-6 (疲劳诱导)的核心要点是什么？
  answer: '操作动作 (Exercises): 踝关节、小腿、股四头肌、髂腰肌。；生效心理学机制: 物理性诱导肌肉群进入“震颤阈值”。；身体反馈特征: 腿部轻微抖动、温热感。；专业视角 (Professional Perspective):
    利用神经源性震颤 (Neurogenic Tremors) 本能来释放 Psoas (腰大肌) 积压的压力。；引用来源 (Citation): Berceli, D. (2008). *The Revolutionary Trauma
    Release Process*.'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Trauma.md
  section: 'TRE: Tension & Trauma Releasing (TRE：张力与创伤释放技术表)'
- type: concept
  question: 步骤7 (地面震颤)的核心要点是什么？
  answer: '操作动作 (Exercises): 仰卧，脚掌相对（蝴蝶式），臀部抬离。；生效心理学机制: 自主神经系统的自发性重置。；身体反馈特征: 身体各部位出现的节奏性、非受控震颤。；专业视角 (Professional Perspective):
    这是一个“自下而上”的修复，绕过额叶防御，直接让 ANS 复位。；引用来源 (Citation): -'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Trauma.md
  section: 'TRE: Tension & Trauma Releasing (TRE：张力与创伤释放技术表)'
- type: concept
  question: 自我调节期 (Self-Reg)的核心要点是什么？
  answer: '操作动作 (Exercises): 深呼吸，放平双腿，停止震颤。；生效心理学机制: 培养对“不可控”体验的控制力。；身体反馈特征: 极度的放松感、可能伴随情绪流（流泪）。；专业视角 (Professional Perspective):
    能够自主开关震颤是安全治疗的核心，防止意识解离。；引用来源 (Citation): -'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Trauma.md
  section: 'TRE: Tension & Trauma Releasing (TRE：张力与创伤释放技术表)'
- type: concept
  question: 镜像技术的核心要点是什么？
  answer: '英文名: Mirroring；过程描述: 与治疗师或同伴进行实时动作模仿。；治疗功能: 增强同理心与社会归属感。；专业视角 (Professional Perspective): 激活镜像神经元，建立非语言的“共同存在感”。；应用场景:
    社交焦虑；亲密关系修复。'
  source: 02-Mind-Psychology/psychology/somatic-body/somatic/Somatic_Movement_Trauma.md
