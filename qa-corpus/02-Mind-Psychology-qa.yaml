- type: best_practice
  question: 选用建议（30 分钟单场版）的最佳实践是什么？
  answer: '本人为系列演讲中的其中一场，时间限定在 30 分钟以内，因此**建议聚焦单一主题，不做全景式综述**。

    - **首推主轴 · 补 10 / 人机心法的边界**：30 分钟最具记忆点的收束型主题，呼应论坛"心身—直接认知—心力—环境"四词，能在大咖云集的场合一句话立住主讲人位置。可把 补 1（脑波）、补 2（数字人）、补 5（KPI）作为三个一分钟微案例支撑。

    - **次选 · 补 2 / 冥想导师数字人**：技术叙事最具体、对台下老师最有用，30 分钟可完整讲清"一个数字人如何陪练一位学员"，并附 2 分钟现场 demo 视频。'
  source: 02-Mind-Psychology/meditation/keynotes/mocici.md
  section: 选用建议（30 分钟单场版）
- type: concept
  question: 什么是演讲稿全文 · 补 10《AI 加持的认知工程——守住主体性的最后疆域》？
  answer: '**时长**：30 分钟｜**主题**：AI 加持下的认知工程与主体性守护｜**主轴**：心力六层模型｜**收束句**：可以外包思考，但不能外包理解——理解不被外包，主体性才有最后的疆域。

