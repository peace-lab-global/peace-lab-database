    1b (RCT)'
  source: 02-Mind-Psychology/therapy/incense/Incense_Clinical_Protocols.md
  section: 一、标准化临床方案表
- type: concept
  question: 轻中度抑郁的核心要点是什么？
  answer: '方案名称: 抗郁香方；主要香料配方: 佛手柑40% + 依兰30% + 乳香30%；给药途径: 吸入 + 按摩；剂量: 吸入0.25 mL/m³ + 按摩油3%；频次: 每日1次；疗程: 12周；预期效果: BDI降低≥20%；证据等级:
    2a (对照研究)'
