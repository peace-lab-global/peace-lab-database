  question: 入睡能力的核心要点是什么？
  answer: '传统入睡困难: 入睡潜伏期延长；睡眠意愿低/拖延: 上床后通常能较快入睡'
  source: 02-Mind-Psychology/psychology/somatic-body/insomnia/Insomnia_Low_Sleep_Motivation.md
