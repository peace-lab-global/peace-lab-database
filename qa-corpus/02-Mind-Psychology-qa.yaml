- type: concept
  question: 社交型职场孤独的核心要点是什么？
  answer: '定义: 缺乏归属感，感觉自己是局外人；核心体验: "团建时我不知道该和谁坐一起"；典型情境: 新入职、跨部门、文化差异'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Workplace.md
  section: 1.2 职场孤独的三种类型
- type: concept
  question: 存在型职场孤独的核心要点是什么？
  answer: '定义: 工作缺乏意义感，感觉自己的存在不被看见；核心体验: "我做的一切似乎没人真正在乎"；典型情境: 高度分工化、重复性工作、价值观冲突'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Workplace.md
