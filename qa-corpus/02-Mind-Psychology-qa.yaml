  section: 关系素养的培养体系
- type: concept
  question: 心理灵活性的核心要点是什么？
  answer: '核心概念: 适应性应对生活挑战的能力；理论来源: 功能 contextual 行为理论；作用机制: 通过六个核心过程提高心理适应性；临床应用: 改善各种心理问题；实证支持: 强烈证据支持；专业洞察: 心理灵活性是ACT的核心目标'
  source: 02-Mind-Psychology/therapy/act-therapy/ACT_Acceptance_and_Commitment_Therapy_Overview.md
  section: ACT核心理论模型表 (Core Theoretical Model)
- type: concept
  question: 认知融合的核心要点是什么？
  answer: '核心概念: 思维与现实的过度认同；理论来源: Relational Frame Theory；作用机制: 通过认知解离减少思维控制；临床应用: 减少认知困扰；实证支持: 中等强度证据；专业洞察: 认知融合维持心理痛苦'
  source: 02-Mind-Psychology/therapy/act-therapy/ACT_Acceptance_and_Commitment_Therapy_Overview.md
  section: ACT核心理论模型表 (Core Theoretical Model)
- type: concept
  question: 经验回避的核心要点是什么？
  answer: '核心概念: 回避不想要的内在体验；理论来源: 功能行为理论；作用机制: 通过接纳减少回避行为；临床应用: 改善情绪调节；实证支持: 强烈证据支持；专业洞察: 经验回避加剧心理问题'
  source: 02-Mind-Psychology/therapy/act-therapy/ACT_Acceptance_and_Commitment_Therapy_Overview.md
  section: ACT核心理论模型表 (Core Theoretical Model)
- type: concept
  question: 接纳(Acceptance)的核心要点是什么？
  answer: '核心内容: 接纳不想要的内在体验；操作方法: 正念觉察、呼吸练习；临床应用: 减少经验回避、提高情绪调节；疗效机制: 接纳减少二次痛苦；专业洞察: 接纳不是被动忍受而是主动拥抱'
  source: 02-Mind-Psychology/therapy/act-therapy/ACT_Acceptance_and_Commitment_Therapy_Overview.md
  section: ACT六大核心过程表 (Six Core Processes)
- type: concept
  question: 身体感觉接纳的核心要点是什么？
  answer: '核心内容: 身体扫描、感觉观察；操作方法: 接纳身体不适感；临床应用: 减少身体相关的焦虑；疗效机制: 身体觉察是接纳的基础'
  source: 02-Mind-Psychology/therapy/act-therapy/ACT_Acceptance_and_Commitment_Therapy_Overview.md
  section: ACT六大核心过程表 (Six Core Processes)
- type: concept
  question: 情绪接纳的核心要点是什么？
  answer: '核心内容: 情绪觉察、情感标签；操作方法: 接纳负性情绪体验；临床应用: 减少情绪挣扎；疗效机制: 情绪接纳促进情绪processing'
  source: 02-Mind-Psychology/therapy/act-therapy/ACT_Acceptance_and_Commitment_Therapy_Overview.md
  section: ACT六大核心过程表 (Six Core Processes)
- type: concept
  question: 隐喻技术的核心要点是什么？
  answer: '具体技术: 各种治疗隐喻；操作要点: 使用生动的比喻解释概念；临床应用: 增强理解和接受；疗效机制: 提供新的认知框架；专业洞察: 隐喻是ACT的标志性技术'
  source: 02-Mind-Psychology/therapy/act-therapy/ACT_Acceptance_and_Commitment_Therapy_Overview.md
  section: ACT治疗技术方法表 (Therapeutic Techniques and Methods)
- type: concept
  question: 控制悖论隐喻的核心要点是什么？
  answer: '具体技术: 情绪控制的反效果；操作要点: "越想控制越失控"；临床应用: 减少控制努力；疗效机制: 控制悖论揭示问题本质'
  source: 02-Mind-Psychology/therapy/act-therapy/ACT_Acceptance_and_Commitment_Therapy_Overview.md
  section: ACT治疗技术方法表 (Therapeutic Techniques and Methods)
- type: concept
  question: 有价值的生活方向的核心要点是什么？
  answer: '核心评估问题: "在你生命中真正重要的是什么？"；评估方法: 价值卡片、价值访谈；典型答案(痛苦模式): 价值模糊、被痛苦挤占；典型答案(健康模式): 清晰的价值方向'
  source: 02-Mind-Psychology/therapy/act-therapy/ACT_Practical_Guide.md
  section: 1.1 ACT六边形个案概念化 (ACT Matrix)
- type: concept
  question: 价值导向的行动的核心要点是什么？
  answer: '核心评估问题: "你正在做什么来走向那个方向？"；评估方法: 行为分析；典型答案(痛苦模式): 回避、退缩、安全行为；典型答案(健康模式): 承诺行动、暴露练习'
  source: 02-Mind-Psychology/therapy/act-therapy/ACT_Practical_Guide.md
  section: 1.1 ACT六边形个案概念化 (ACT Matrix)
- type: concept
  question: 内部障碍的核心要点是什么？
  answer: '核心评估问题: "什么想法和感受出现在你内部？"；评估方法: 思维记录、情绪追踪；典型答案(痛苦模式): 焦虑、恐惧、自我怀疑；典型答案(健康模式): 同样的想法但影响更小'
  source: 02-Mind-Psychology/therapy/act-therapy/ACT_Practical_Guide.md
  section: 1.1 ACT六边形个案概念化 (ACT Matrix)
- type: concept
  question: 回避行为的核心要点是什么？
  answer: '功能分析: 逃离或回避不想要的内在体验；短期效果: 即时缓解(负强化)；长期后果: 生活空间持续缩小；ACT干预点: 接纳+暴露'
  source: 02-Mind-Psychology/therapy/act-therapy/ACT_Practical_Guide.md
  section: 1.2 功能性分析框架
- type: concept
  question: 控制策略的核心要点是什么？
  answer: '功能分析: 试图压制或改变内在体验；短期效果: 短期感觉可控；长期后果: 控制悖论：越控制越失控；ACT干预点: 放下控制→接纳'
  source: 02-Mind-Psychology/therapy/act-therapy/ACT_Practical_Guide.md
  section: 1.2 功能性分析框架
- type: concept
  question: 认知融合的核心要点是什么？
  answer: '功能分析: 将想法当作事实而非心理事件；短期效果: 感觉"了解真相"；长期后果: 思维的暴政：被念头统治；ACT干预点: 认知解离'
  source: 02-Mind-Psychology/therapy/act-therapy/ACT_Practical_Guide.md
  section: 1.2 功能性分析框架
- type: concept
  question: 我注意到"练习的核心要点是什么？
  answer: '操作步骤: 1.识别痛苦念头 2.在前面加上"我注意到我有一个想法..." 3.注意体验的变化；适用思维类型: 反复出现的负性自动思维；治疗师话术: "试试在''我很失败''前面加上''我注意到我有一个想法...''"；来访者常见反应:
    感觉念头的影响力减弱；进阶变体: "我注意到我注意到我有一个想法..."'
  source: 02-Mind-Psychology/therapy/act-therapy/ACT_Practical_Guide.md
  section: 2.1 认知解离技术详解
- type: concept
  question: 电脑屏幕技术的核心要点是什么？
  answer: '操作步骤: 1.想象电脑屏幕 2.将念头打在屏幕上 3.改变字体、颜色、大小 4.注意效果；适用思维类型: 视觉化的强迫思维；治疗师话术: "想象把这个想法放在电脑屏幕上，用不同字体显示"；来访者常见反应: 增加了对念头的距离感；进阶变体:
    加入动画效果和声音'
  source: 02-Mind-Psychology/therapy/act-therapy/ACT_Practical_Guide.md
