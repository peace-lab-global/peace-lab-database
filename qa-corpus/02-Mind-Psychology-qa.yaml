  question: Cloud of Forgetting的核心要点是什么？
  answer: '原文表述: "A cloud of forgetting beneath you"；现代理解: 放下一切受造物的执着，包括自己的灵修成就'
  source: 02-Mind-Psychology/meditation/christian-contemplative/Christian_Contemplative_Overview.md
