- type: concept
  question: 主诉的核心要点是什么？
  answer: '信息: 持续加班却不敢拒绝额外任务，焦虑、失眠、身体频繁生病'
  source: 02-Mind-Psychology/psychology/foundations/adlerian-task-separation/Adlerian_Task_Separation_Case_Studies.md
  section: 案例 1：职场讨好型人格——"我不能让任何人失望"
- type: concept
  question: 6岁时妈妈生病了，我帮她倒水，她夸我'真懂事'。那一刻我觉得自己很有价值"的核心要点是什么？
  answer: '课题分析: 自我价值 = 他人认可 = "照顾他人的课题"被内化为"我的课题"；生活风格线索: 核心信念："我有用才有价值"'
  source: 02-Mind-Psychology/psychology/foundations/adlerian-task-separation/Adlerian_Task_Separation_Case_Studies.md
  section: 案例 1：职场讨好型人格——"我不能让任何人失望"
- type: concept
  question: 10岁时考了第二名，父亲没说话。我知道他失望了"的核心要点是什么？
  answer: '课题分析: 父亲的情绪 = "我应该管理的课题"；生活风格线索: 隐性要求：我必须读懂他人未表达的期望'
  source: 02-Mind-Psychology/psychology/foundations/adlerian-task-separation/Adlerian_Task_Separation_Case_Studies.md
  section: 案例 1：职场讨好型人格——"我不能让任何人失望"
- type: concept
  question: 关系建立的核心要点是什么？
  answer: '次数: 1-2次；关键治疗事件: 来访者描述工作压力，多次强调"我不想让团队失望"；课题分离工作: 治疗师识别讨好模式但暂不挑战；来访者反应: 感到被理解，建立信任'
  source: 02-Mind-Psychology/psychology/foundations/adlerian-task-separation/Adlerian_Task_Separation_Case_Studies.md
  section: 案例 1：职场讨好型人格——"我不能让任何人失望"
- type: concept
  question: 评估分析的核心要点是什么？
  answer: '次数: 3-5次；关键治疗事件: 早期记忆分析，家庭星座（独生女，父亲情感冷淡，母亲过度依赖）；课题分离工作: 绘制"课题纠缠地图"：来访者承担了哪些不属于她的课题；来访者反应: 初步惊讶："我从来没想过这些不是我应该做的"'
  source: 02-Mind-Psychology/psychology/foundations/adlerian-task-separation/Adlerian_Task_Separation_Case_Studies.md
  section: 案例 1：职场讨好型人格——"我不能让任何人失望"
- type: concept
  question: 洞察获得的核心要点是什么？
  answer: '次数: 6-9次；关键治疗事件: 引入课题分离概念；课题分离工作: 苏格拉底式对话："同事的deadline是谁的课题？""你加班帮他完成后，他学到了什么？"；来访者反应: 阻抗："但如果我不帮，他们会觉得我不好" → 追问："他们怎么看你，是谁的课题？"'
  source: 02-Mind-Psychology/psychology/foundations/adlerian-task-separation/Adlerian_Task_Separation_Case_Studies.md
  section: 案例 1：职场讨好型人格——"我不能让任何人失望"
- type: concept
  question: 第一阶段的核心要点是什么？
  answer: '英文名: Establishing the Relationship；核心任务: 建立平等的治疗联盟；课题分离的切入点: 治疗师示范课题分离：来访者的问题是来访者的课题，治疗师不"拯救"；典型技术: 共情、鼓励、平等对话；建议时长:
    1-3次'
  source: 02-Mind-Psychology/psychology/foundations/adlerian-task-separation/Adlerian_Task_Separation_Clinical_Application.md
  section: 1.1 四阶段治疗模型
- type: concept
  question: 第二阶段的核心要点是什么？
  answer: '英文名: Assessment & Analysis；核心任务: 评估来访者的生活风格与课题纠缠模式；课题分离的切入点: 通过早期记忆、家庭星座分析，识别核心纠缠模式；典型技术: 生活风格问卷、早期记忆分析、家庭星座图；建议时长:
    3-5次'
  source: 02-Mind-Psychology/psychology/foundations/adlerian-task-separation/Adlerian_Task_Separation_Clinical_Application.md
  section: 1.1 四阶段治疗模型
- type: concept
  question: 第三阶段的核心要点是什么？
  answer: '英文名: Insight & Interpretation；核心任务: 帮助来访者获得洞察；课题分离的切入点: 将课题纠缠模式呈现给来访者，引导其识别"这是谁的课题？"；典型技术: 苏格拉底式提问、模式识别、生活风格解读；建议时长:
    5-10次'
  source: 02-Mind-Psychology/psychology/foundations/adlerian-task-separation/Adlerian_Task_Separation_Clinical_Application.md
  section: 1.1 四阶段治疗模型
- type: concept
  question: 治疗目标的核心要点是什么？
  answer: '治疗师的课题: 提供专业的治疗环境和工具；来访者的课题: 是否愿意改变、何时改变；警示信号: 治疗师因来访者"不改变"而焦虑'
  source: 02-Mind-Psychology/psychology/foundations/adlerian-task-separation/Adlerian_Task_Separation_Clinical_Application.md
  section: 1.2 治疗师的课题分离意识
- type: concept
  question: 治疗进度的核心要点是什么？
  answer: '治疗师的课题: 调整技术和策略；来访者的课题: 投入程度和执行程度；警示信号: 治疗师比来访者更"着急"'
  source: 02-Mind-Psychology/psychology/foundations/adlerian-task-separation/Adlerian_Task_Separation_Clinical_Application.md
  section: 1.2 治疗师的课题分离意识
- type: concept
  question: 治疗关系的核心要点是什么？
  answer: '治疗师的课题: 保持专业边界；来访者的课题: 是否继续治疗；警示信号: 治疗师在会谈外过度担心来访者'
  source: 02-Mind-Psychology/psychology/foundations/adlerian-task-separation/Adlerian_Task_Separation_Clinical_Application.md
  section: 1.2 治疗师的课题分离意识
- type: concept
  question: 工作课题的核心要点是什么？
  answer: '探查问题（半结构化）: "当上司对你的工作不满意时，你通常怎么想/怎么做？"；高纠缠指标: "我总是在猜他想要什么" / 过度加班迎合；低纠缠指标: "我会确认反馈然后改进自己能改进的部分"'
  source: 02-Mind-Psychology/psychology/foundations/adlerian-task-separation/Adlerian_Task_Separation_Clinical_Application.md
  section: 2.1 课题纠缠模式评估表 (Task Entanglement Pattern Assessment)
- type: concept
  question: 交友课题的核心要点是什么？
  answer: '探查问题（半结构化）: "当朋友没有回复你的消息时，你的反应是？"；高纠缠指标: 反复查看手机 / 猜测对方是否生气；低纠缠指标: "他可能忙，我先做自己的事"'
  source: 02-Mind-Psychology/psychology/foundations/adlerian-task-separation/Adlerian_Task_Separation_Clinical_Application.md
  section: 2.1 课题纠缠模式评估表 (Task Entanglement Pattern Assessment)
- type: concept
  question: 术语全称的核心要点是什么？
  answer: '内容: 课题分离 / 课题的分离；英文术语: Separation of Tasks；德文原文: Aufgabentrennung'
  source: 02-Mind-Psychology/psychology/foundations/adlerian-task-separation/Adlerian_Task_Separation_Overview.md
  section: 1.1 核心定义表
- type: concept
  question: 核心定义的核心要点是什么？
  answer: '内容: 明确区分"谁的课题"——即谁承担该行为选择的最终后果——从而划定心理边界，拒绝干涉他人课题，也不允许他人干涉自己的课题；英文术语: Clarifying whose task it is by identifying
    who bears the ultimate consequences of a choice；德文原文: —'
  source: 02-Mind-Psychology/psychology/foundations/adlerian-task-separation/Adlerian_Task_Separation_Overview.md
  section: 1.1 核心定义表
- type: concept
  question: 判断准则的核心要点是什么？
  answer: '内容: "这件事情的后果最终由谁来承担？"——承担后果者即课题所有者；英文术语: "Who ultimately bears the consequences of this decision?"；德文原文: —'
  source: 02-Mind-Psychology/psychology/foundations/adlerian-task-separation/Adlerian_Task_Separation_Overview.md
  section: 1.1 核心定义表
- type: concept
  question: 1902-1911的核心要点是什么？
  answer: '关键事件: Adler参与弗洛伊德的"心理星期三协会"，后因理论分歧退出；代表人物: Alfred Adler；理论贡献: 奠定个体心理学（Individual Psychology）独立方向'
  source: 02-Mind-Psychology/psychology/foundations/adlerian-task-separation/Adlerian_Task_Separation_Overview.md
  section: 1.2 概念演化时间线
- type: concept
  question: 1912的核心要点是什么？
  answer: '关键事件: 出版《神经性格》(*Über den nervösen Charakter*)；代表人物: Adler；理论贡献: 提出"生活风格"（Lifestyle）与"社会兴趣"（Gemeinschaftsgefühl）概念'
  source: 02-Mind-Psychology/psychology/foundations/adlerian-task-separation/Adlerian_Task_Separation_Overview.md
  section: 1.2 概念演化时间线
- type: concept
  question: 1927的核心要点是什么？
  answer: '关键事件: 出版《理解人性》(*Menschenkenntnis*)；代表人物: Adler；理论贡献: 系统化人际关系中的权力动力与自卑补偿理论'
  source: 02-Mind-Psychology/psychology/foundations/adlerian-task-separation/Adlerian_Task_Separation_Overview.md
  section: 1.2 概念演化时间线
- type: concept
  question: 核心驱力的核心要点是什么？
  answer: 'Freud: 性本能 (Libido)；Jung: 个体化 (Individuation)；Adler（课题分离视角）: 社会兴趣 (Gemeinschaftsgefühl)'
  source: 02-Mind-Psychology/psychology/foundations/adlerian-task-separation/Adlerian_Task_Separation_Overview.md
  section: 1.3 与弗洛伊德及荣格的关键分野
- type: concept
  question: 人际痛苦归因的核心要点是什么？
  answer: 'Freud: 潜意识冲突投射；Jung: 阴影与原型投射；Adler（课题分离视角）: 课题纠缠（越界干涉他人课题）'
  source: 02-Mind-Psychology/psychology/foundations/adlerian-task-separation/Adlerian_Task_Separation_Overview.md
  section: 1.3 与弗洛伊德及荣格的关键分野
- type: concept
  question: 卡尔·荣格 (Carl Jung)的核心要点是什么？
  answer: '所属领域: 心理学；生平或成立背景: 瑞士精神病学家（1875-1961），分析心理学创始人。；主要贡献: 提出集体无意识、原型、阴影、阿尼玛/阿尼姆斯、个性化 (Individuation)。；代表作品或资源: 《心理类型》（1921）、《红书》、《人及其象征》。；对心理疗愈的影响:
    深度心理疗愈，梦的工作，强调整合阴影以实现完整性。；联系方式或资源链接: 无（逝世）；CG Jung Institute。；专业视角 (Professional Perspective): 荣格心理学超越了弗洛伊德的泛性论，强调心灵的自我调节功能和对意义的追求。；引用来源
    (Citation): Jung, C. G. (1969). *The Archetypes and the Collective Unconscious*.；网页地址 (URL): [IAAP: International Association
    for Analytical Psychology](https://iaap.org/)'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Authorities_Lineage.md
  section: 权威表
- type: concept
  question: 乔·卡巴金 (Jon Kabat-Zinn)的核心要点是什么？
  answer: '所属领域: 冥想/医学；生平或成立背景: 美国分子生物学家（1944-），麻省大学医学院荣誉教授。；主要贡献: 创立MBSR（正念减压疗法），将东方禅修世俗化、科学化。；代表作品或资源: 《正念疗愈力》（1990）、《此刻，是一枝花》。；对心理疗愈的影响:
    使正念成为主流医学和心理治疗公认的干预手段。；联系方式或资源链接: UMass Memorial Health。；专业视角 (Professional Perspective): 他的工作标志着“参与医学” (Participatory
    Medicine) 的兴起，强调患者利用自身资源进行疗愈。；引用来源 (Citation): Kabat-Zinn, J. (1982). An outpatient program... *General Hospital Psychiatry*.；网页地址
    (URL): [Mindfulness-Based Stress Reduction](https://www.ummhealth.org/mindfulness-based-stress-reduction)'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Authorities_Lineage.md
  section: 权威表
- type: concept
  question: 铃木俊隆 (Shunryu Suzuki)的核心要点是什么？
  answer: '所属领域: 禅修；生平或成立背景: 日本曹洞宗禅师（1904-1971），旧金山禅中心创始人。；主要贡献: 将正统禅宗传入美国，强调“初心” (Beginner''s Mind)。；代表作品或资源: 《禅者的初心》（1970）。；对心理疗愈的影响:
    极大地影响了西方对禅的理解，特别是乔布斯等人。；联系方式或资源链接: San Francisco Zen Center。；专业视角 (Professional Perspective): 他的教导核心是“只管打坐” (Shikantaza)
    和在这个充满了二元对立的世界中保持非二元的觉知。；引用来源 (Citation): Chadwick, D. (1999). *Crooked Cucumber: The Life and Zen Teaching of Shunryu
    Suzuki*.；网页地址 (URL): [San Francisco Zen Center](https://www.sfzc.org/)'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Authorities_Lineage.md
  section: 权威表
- type: concept
  question: Viktor Frankl的核心要点是什么？
  answer: '生平背景: 奥地利神经学家（1905-1997），大屠杀幸存者。；主要贡献: 创立意义疗法 (Logotherapy)，强调“求意义的意志”。；代表作品: 《活出生命的意义》（1946）。；对职场疗愈影响: 帮助职场人在逆境和倦怠中寻找存在的意义和目的。；联系方式或资源:
    Viktor Frankl Institute。；注意事项: 并非简单的“积极思维”，而是直面苦难。；专业视角 (Professional Perspective): 他的理论基于存在主义，认为人类主要动力不是快乐（弗洛伊德）或权力（阿德勒），而是意义。；引用来源
    (Citation): Frankl, V. E. (1985). *Man''s Search for Meaning*.；网页地址 (URL): [Viktor Frankl Institute](https://www.viktorfrankl.org/)'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Authorities_Lineage.md
  section: 心理学权威人物扩展表
- type: concept
  question: Abraham Maslow的核心要点是什么？
  answer: '生平背景: 美国心理学家（1908-1970），人本主义心理学之父。；主要贡献: 需求层次理论，自我实现，高峰体验。；代表作品: 《动机与人格》、《存在心理学探索》。；对职场疗愈影响: 为人才发展和组织行为学提供了基础框架，强调成长需求。；联系方式或资源:
    Maslow Foundation。；注意事项: 高层需求建立在基础需求满足之上，但也有例外。；专业视角 (Professional Perspective): 晚年他修正了理论，增加了“自我超越” (Self-Transcendence)
    作为最高层级，超越了自我实现。；引用来源 (Citation): Maslow, A. H. (1943). A theory of human motivation. *Psychological Review*.；网页地址 (URL):
    [Simply Psychology: Maslow](https://www.simplypsychology.org/maslow.html)'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Authorities_Lineage.md
  section: 心理学权威人物扩展表
- type: concept
  question: Elizabeth Kübler-Ross的核心要点是什么？
  answer: '生平背景: 瑞士裔美国精神科医生（1926-2004）。；主要贡献: 临终关怀运动，哀伤五阶段模型 (DABDA)。；代表作品: 《论死亡与临终》（1969）。；对职场疗愈影响: 帮助理解职场中的丧失（裁员、项目失败）和变革管理中的心理过程。；联系方式或资源:
    EKR Foundation。；注意事项: 阶段并非线性，个体差异巨大。；专业视角 (Professional Perspective): 她的工作使死亡和哀伤成为可讨论的医疗和心理话题，彻底改变了临终护理。；引用来源 (Citation):
    Kübler-Ross, E. (1969). *On Death and Dying*.；网页地址 (URL): [EKR Foundation](https://www.ekrfoundation.org/)'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Authorities_Lineage.md
  section: 心理学权威人物扩展表
- type: concept
  question: 释迦牟尼 (Gautama Buddha)的核心要点是什么？
  answer: '生平背景: 约公元前563-483年，古印度迦毗罗卫国太子。；主要贡献: 觉悟者，发现缘起法与四圣谛，创立佛教。；代表作品: 《巴利三藏》（弟子结集）。；对疗愈影响: 正念与心理治疗的源头，提供了彻底止息痛苦 (Dukkha)
    的路径。；自助启发: 观察“苦”的起因是“集”（渴望与执着）。；资源链接: accesstoinsight.org。；专业视角 (Professional Perspective): 历史佛陀不仅是宗教领袖，更是伟大的心理学家，其教导核心是现象学式的自我观察。；引用来源
    (Citation): Gethin, R. (1998). *The Foundations of Buddhism*.；网页地址 (URL): [Access to Insight](https://www.accesstoinsight.org/)'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Authorities_Lineage.md
  section: 禅修历史人物表
- type: concept
  question: 菩提达摩 (Bodhidharma)的核心要点是什么？
  answer: '生平背景: 约5-6世纪，南天竺香至王三子，中国禅宗初祖。；主要贡献: “直指人心，见性成佛”，壁观婆罗门。；代表作品: 《二入四行论》（传）。；对疗愈影响: 强调“理入”与“行入”，在逆境中修忍辱。；自助启发: 面对职场冷板凳（壁观），磨练心性。；资源链接:
    thezen.or.kr。；专业视角 (Professional Perspective): 他的“壁观” (Wall-gazing) 确立了禅宗强调直接体验、不立文字的传统，是坚毅 (Grit) 的极致体现。；引用来源 (Citation):
    Broughton, J. L. (1999). *The Bodhidharma Anthology*.；网页地址 (URL): [Zen Buddhism WWW](https://www.zen-buddhism.net/)'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Authorities_Lineage.md
  section: 禅修历史人物表
- type: concept
  question: 认知行为疗法 (CBT)的核心要点是什么？
  answer: '主要益处: 减少焦虑与抑郁复发。；支持证据: Meta-analyses显示其疗效等同于抗抑郁药。；潜在风险: 短期内焦虑可能因暴露练习而增加。；风险缓解策略: 渐进式暴露，治疗联盟支持。；专业视角 (Professional
    Perspective): 心理治疗的“金标准”，强调技能习得而非仅仅宣泄。；引用来源 (Citation): Butler, A. C., et al. (2006). The empirical status of CBT... *Clinical
    Psychology Review*.；网页地址 (URL): [APA: CBT](https://www.apa.org/ptsd-guideline/patients-and-families/cognitive-behavioral)'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Benefits_Risks.md
  section: 益处与风险表
- type: concept
  question: 正念减压 (MBSR)的核心要点是什么？
  answer: '主要益处: 降低压力、改善慢性疼痛管理。；支持证据: 广泛的RCT研究支持其对生活质量的提升。；潜在风险: 可能会引发被压抑的创伤记忆。；风险缓解策略: 建立创伤知情 (Trauma-Informed) 的指导环境。；专业视角
    (Professional Perspective): 虽非灵丹妙药，但为慢性病患者提供了一种赋权的自我管理工具。；引用来源 (Citation): Kabat-Zinn, J. (1982). An outpatient program...
    *Gen Hosp Psychiatry*.；网页地址 (URL): [UMass MBSR](https://www.ummhealth.org/mindfulness-based-stress-reduction)'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Benefits_Risks.md
  section: 益处与风险表
- type: concept
  question: 昆达里尼瑜伽 (Kundalini)的核心要点是什么？
  answer: '主要益处: 快速提升能量，改善情绪。；支持证据: 研究显示其能显著降低皮质醇并改善抗压能力。；潜在风险: 强烈的呼吸法可能导致头晕或焦虑发作。；风险缓解策略: 遵循合格导师，不强迫屏息。；专业视角 (Professional
    Perspective): 被称为“觉知的瑜伽”，通过神经内分泌系统的调节产生快速的身心效应。；引用来源 (Citation): García-Sesnich, J. N., et al. (2017). ...Kundalini Yoga
    on Salivary Cortisol... *Int J Yoga*.；网页地址 (URL): [KRI Research](https://kundaliniresearchinstitute.org/)'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Benefits_Risks.md
  section: 益处与风险表
- type: concept
  question: 免疫增强的核心要点是什么？
  answer: '详细描述与证据: 正念训练增加了流感疫苗的抗体反应。；职场应用: 减少病假，提升流感季抵抗力。；专业视角 (Professional Perspective): 证明了脑-免疫轴 (Brain-Immune Axis) 的可塑性。；引用来源
    (Citation): Davidson, R. J., et al. (2003). Alterations in brain and immune function... *Psychosomatic Medicine*.；网页地址
    (URL): [PubMed: 12883106](https://pubmed.ncbi.nlm.nih.gov/12883106/)'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Benefits_Risks.md
  section: 冥想益处生理证据表
- type: concept
  question: 大脑灰质增加的核心要点是什么？
  answer: '详细描述与证据: 长期冥想与与前额叶和脑岛（负责注意力和内感受）的皮层增厚相关。；职场应用: 提升认知耐力，延缓大脑衰老。；专业视角 (Professional Perspective): 冥想不仅改变软件（思维），也升级硬件（脑结构）。；引用来源
    (Citation): Lazar, S. W., et al. (2005). Meditation experience is associated with increased cortical thickness. *Neuroreport*.；网页地址
    (URL): [Harvard Gazette: Meditation](https://news.harvard.edu/gazette/story/2011/01/eight-weeks-to-a-better-brain/)'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Benefits_Risks.md
  section: 冥想益处生理证据表
- type: concept
  question: 降低皮质醇的核心要点是什么？
  answer: '详细描述与证据: 昆达里尼瑜伽练习显著降低了唾液皮质醇水平。；职场应用: 高压项目期间的生理调节。；专业视角 (Professional Perspective): 皮质醇是主要的压力生物标志物，其降低直接意味生理压力的减轻。；引用来源
    (Citation): García-Sesnich, J. N., et al. (2017). ...Salivary Cortisol... *Int J Yoga*.；网页地址 (URL): [NCBI: PMC5433116](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5433116/)'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Benefits_Risks.md
  section: 冥想益处生理证据表
- type: concept
  question: 焦虑水平的核心要点是什么？
  answer: '测量工具: GAD-7量表；典型变化 (基于研究): 效应量 (Effect Size) 约 0.3-0.4 (中等)。；自助追踪应用: 每周五自测一次。；专业视角: 对焦虑的缓解效果即便在无药物情况下也具有临床意义。；引用来源:
    Goyal, M., et al. (2014). Meditation programs for psychological stress... *JAMA Internal Medicine*.'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Benefits_Risks.md
  section: 禅修益处量化表
- type: concept
  question: 专注力的核心要点是什么？
  answer: '测量工具: 持续注意力测试 (CPT)；典型变化 (基于研究): 走神频率显著降低，反应时变快。；自助追踪应用: 记录番茄钟内分心次数。；专业视角: 改善了默认模式网络 (DMN) 的过度活跃。；引用来源: MacLean,
    K. A., et al. (2010). Intensive meditation training improves perceptual discrimination... *Psychological Science*.'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Benefits_Risks.md
  section: 禅修益处量化表
- type: concept
  question: 正念冥想的核心要点是什么？
  answer: '定义: 关注当下的非评判觉察。；职场应用: 快速减压 (Grounding)。；疗愈益处 (Evidence-Based): 降低抑郁复发风险与抗抑郁药相当 (Relapse Prevention)。；自助策略: 5分钟呼吸锚定。；专业视角
    (Professional Perspective): 最广泛研究的冥想形式，是MBSR和MBCT的核心。；引用来源 (Citation): Goyal, M., et al. (2014). ...Meditation programs...
    *JAMA Internal Medicine*.；网页地址 (URL): [JAMA: Meditation](https://jamanetwork.com/journals/jamainternalmedicine/fullarticle/1809754)'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Cross_Comparisons.md
  section: 冥想类型比较表
- type: concept
  question: 慈心冥想 (LKM)的核心要点是什么？
  answer: '定义: 培养对他人的善意。；职场应用: 缓解人际冲突。；疗愈益处 (Evidence-Based): 显著增加积极情绪和社会连接感，效应量中等 (Effect Size d=0.34)。；自助策略: 默念愿语。；专业视角
    (Professional Perspective): 针对性治疗“自我批评”和“社会疏离”的首选。；引用来源 (Citation): Galante, J., et al. (2014). Kindness-based meditation...
    *J Consult Clin Psychol*.；网页地址 (URL): [Oxford LKM Study](https://www.psych.ox.ac.uk/research/mindfulness)'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Cross_Comparisons.md
  section: 冥想类型比较表
- type: concept
  question: 观想冥想的核心要点是什么？
  answer: '定义: 视觉化平静场景或目标。；职场应用: 增强动机与绩效。；疗愈益处 (Evidence-Based): 激活与实际行为重叠的运动皮层区域 (Functional Equivalence)。；自助策略: 视觉化成功场景。；专业视角
    (Professional Perspective): 体育心理学的核心工具，证明大脑无法从神经层面完全区分生动的想象与现实。；引用来源 (Citation): Driskell, J. E., et al. (1994). Does
    mental practice enhance performance? *JAP*.；网页地址 (URL): [Sport Psych: Imagery](https://appliedsportpsych.org/resources/resources-for-athletes/mental-imagery/)'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Cross_Comparisons.md
  section: 冥想类型比较表
- type: concept
  question: 核心机制的核心要点是什么？
  answer: '禅修 (Zen): 认知控制 (Top-down)。；瑜伽 (Yoga): 身体调控 (Bottom-up)。；相似点: 都调节自主神经系统。；差异点: 禅修侧重脑网络 (DMN)；瑜伽侧重体液/甚至。；专业视角: 理想的干预应结合两者：通过身体进入（瑜伽）达到心理状态（禅）。；引用来源:
    Gard, T., et al. (2014). Potential self-regulatory mechanisms... *Frontiers in Human Neuroscience*.'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Cross_Comparisons.md
  section: 禅修与瑜伽比较表
- type: concept
  question: 益处侧重的核心要点是什么？
  answer: '禅修 (Zen): 情绪调节，洞察力。；瑜伽 (Yoga): 柔韧性，心血管健康。；相似点: 均提升抗压能力 (Resilience)。；差异点: 瑜伽不仅是冥想，也是已被证实的有氧/无氧运动。；专业视角: Ross, A.,
    & Thomas, S. (2010). The health benefits of yoga and exercise... *JACM*.'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Cross_Comparisons.md
  section: 禅修与瑜伽比较表
- type: concept
  question: 脑区影响的核心要点是什么？
  answer: '禅修 (Zen): 前额叶 (PFC)，前扣带回 (ACC)。；瑜伽 (Yoga): 脑岛 (Insula)，杏仁核 (Amygdala)。；相似点: 均增加灰质密度。；差异点: 瑜伽更多增加海马体体积（记忆与空间）。；专业视角:
    Villemure, C., et al. (2015). Neuroprotective effects... *Frontiers*.'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Cross_Comparisons.md
  section: 禅修与瑜伽比较表
- type: concept
  question: 自我 (Self)的核心要点是什么？
  answer: '西方心理学视角: 一个需要构建、增强和整合的实体 (Ego Strength)。；东方式 (禅/瑜伽) 视角: 一个需要解构的幻觉 (Anatta/No-self)。；整合建议: 拥有健康的自我 (Western) 才能放下自我
    (Eastern)。；专业视角: 心理治疗先建立自我（治愈创伤），灵性修行再超越自我（Transpersonal）。；引用来源: Epstein, M. (1995). *Thoughts Without a Thinker*.'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Cross_Comparisons.md
  section: 文化比较表
- type: concept
  question: 痛苦 (Suffering)的核心要点是什么？
  answer: '西方心理学视角: 病理性的，需要消除或管理的症状。；东方式 (禅/瑜伽) 视角: 普世的 (Dukkha)，源于执着，是觉醒的契机。；整合建议: 接纳痛苦的必然性 (ACT)，减少对痛苦的次级反应。；专业视角: 现代CBT开始采纳佛教观点：痛苦不可避免，但苦难
    (Suffering) 是可选的。；引用来源: Hayes, S. C. (2002). Buddhism and ACT. *Journal of Cognitive Psychotherapy*.'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Cross_Comparisons.md
  section: 文化比较表
- type: concept
  question: 职场心理健康制度化的核心要点是什么？
  answer: '描述: 企业将心理健康纳入KPI。；驱动因素: 倦怠成本上升 (Global Burnout Crisis)。；行业报告/数据支持: Deloitte 2024报告：心理健康投资回报率 (ROI) 达 1:5.3。；职场影响:
    强制休假、EAP升级。；专业视角: 从“福利”转向“核心战略”。；引用来源: Deloitte. (2024). *Mental Health ROI*.'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Industry_Trends.md
  section: 心理学与身心健康趋势 (2025-2026)
- type: concept
  question: 创伤知情护理 (TIC) 普及的核心要点是什么？
  answer: '描述: 承认创伤的普遍性。；驱动因素: 全球性创伤事件 (疫情/冲突)。；行业报告/数据支持: SAMHSA 指南：TIC成为组织标准。；职场影响: 减少触发，建立心理安全感。；专业视角: 视角从“你怎么了？”转变为“你经历了什么？”。；引用来源:
    CDC / SAMHSA.'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Industry_Trends.md
  section: 心理学与身心健康趋势 (2025-2026)
- type: concept
  question: 数字疗法 (DTx) 处方化的核心要点是什么？
  answer: '描述: 医生开具App处方。；驱动因素: 医疗资源短缺。；行业报告/数据支持: FDA批准首个游戏疗法 (EndeavorRx) 用于ADHD。；职场影响: 保险覆盖冥想App。；专业视角: 软件作为医疗器械 (SaMD)
    的时代到来。；引用来源: FDA News Release (2020).'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Industry_Trends.md
  section: 心理学与身心健康趋势 (2025-2026)
- type: concept
  question: 脑机接口 (BCI) 冥想的核心要点是什么？
  answer: '描述: 直接神经反馈调节情绪。；潜在风险: 隐私泄露 (Neuro-rights)。；准备策略: 关注神经伦理学。'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Industry_Trends.md
  section: 未来展望 (2030+)
- type: concept
  question: AI 情感伴侣的核心要点是什么？
  answer: '描述: 完美的数字倾听者。；潜在风险: 真实人际能力退化。；准备策略: 保持现实社交平衡。'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Industry_Trends.md
  section: 未来展望 (2030+)
- type: concept
  question: 虚拟现实 (VR) 暴露疗法的核心要点是什么？
  answer: '描述: 沉浸式战胜恐惧。；潜在风险: 现实解离感。；准备策略: 在专业指导下使用。'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Industry_Trends.md
  section: 未来展望 (2030+)
- type: concept
  question: 生物黑客 (Biohacking)的核心要点是什么？
  answer: '核心驱动技术: CRISPR, 表观遗传时钟。；市场估值 (Est. 2026): $50B+；核心参与方示例: Bryan Johnson (Blueprint), Altos Labs.；专家预测 (Expert Forecast):
    寿命延长 (Longevity) 将从边缘亚文化变成高端医疗标准。'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Industry_Trends.md
  section: 行业投资与核心研发方向 (Investment & R&D Directives)
- type: concept
  question: 精准神经调制的核心要点是什么？
  answer: '核心驱动技术: tDCS, 高清经颅磁刺激 (TMS)。；市场估值 (Est. 2026): $12B；核心参与方示例: Neuralink, Kernel.；专家预测 (Expert Forecast): 家庭版神经调节设备将普及，类似现在的按摩仪。'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Industry_Trends.md
  section: 行业投资与核心研发方向 (Investment & R&D Directives)
- type: concept
  question: 渐进式肌肉放松 (Progressive Muscle Relaxation)的核心要点是什么？
  answer: '所属领域: 心理学；详细步骤: 1. 找安静地方坐或躺下；2. 从脚趾开始，紧张肌肉5秒；3. 突然放松，感受差异；4. 向上移动到腿、腹、臂、脸；5. 结束时深呼吸。；推荐时长和频率: 10-20分钟，每天1-2次。；适用场景:
    职场焦虑发作，如会议前。；疗愈益处: 降低皮质醇水平，缓解肌肉紧张，调节自主神经系统。；自助提示: 在家沙发或办公室椅子上实践，结合耳机音乐。；注意事项: 初学者避免过度紧张；有损伤者跳过部位。；专业视角 (Professional Perspective):
    PMR通过系统性地紧张和放松主要肌肉群，直接对抗“战斗或逃跑”反应引起的肌肉紧张，被APA认可为失眠和焦虑的循证疗法。；引用来源 (Citation): Jacobson, E. (1938). *Progressive Relaxation*.
    University of Chicago Press.；网页地址 (URL): [APA Dictionary: Progressive Relaxation](https://dictionary.apa.org/progressive-relaxati'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Integrated_Methods.md
  section: 方法表
- type: concept
  question: 慈心冥想 (Metta Meditation)的核心要点是什么？
  answer: '所属领域: 冥想；详细步骤: 1. 舒适坐姿，闭眼；2. 对自己默念“愿我快乐、安康”；3. 扩展到亲人、朋友；4. 包括中性人、难相处者；5. 结束时感受温暖。；推荐时长和频率: 10-15分钟，每日。；适用场景: 职场人际冲突，自我批评严重时。；疗愈益处:
    提升催产素 (oxytocin)，减少敌意，增加脑岛和颞顶联合区（与同理心相关）的灰质体积。；自助提示: 办公室午休时，用手机计时器。；注意事项: 若情绪波动大，从自我开始；避免强迫感受，意图更重要。；专业视角 (Professional
    Perspective): 神经科学研究表明，长期练习Metta可增强积极情绪调节能力，并与迷走神经张力增加相关，具有神经保护作用。；引用来源 (Citation): Hutcherson, C. A., et al. (2008).
    Loving-kindness meditation increases social connectedness. *Emotion*.；网页地址 (URL): [Oxford Academic: LKM Study](https://academic.oup'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Integrated_Methods.md
  section: 方法表
- type: concept
  question: 坐禅 (Zazen)的核心要点是什么？
  answer: '所属领域: 禅修；详细步骤: 1. 坐垫上盘腿或跪坐；2. 手置膝上，眼睛半睁；3. 关注呼吸或墙壁；4. 思绪飘来时轻轻放回；5. 铃声结束。；推荐时长和频率: 20-40分钟，每日。；适用场景: 职场 burnout
    缓解，需要深度内省时。；疗愈益处: 改善前额叶皮层灰质密度，减缓大脑老化，增强情绪调节。；自助提示: 家中角落或公园实践，早晨最佳。；注意事项: 背痛者用椅；初学者从5分钟起，重点是“只管打坐”(Shikantaza)。；专业视角 (Professional
    Perspective): 研究发现禅修者的壳核(putamen)灰质体积未随年龄减少，表明禅修可能对注意力相关脑区有神经保护作用。；引用来源 (Citation): Pagnoni, G., & Cekic, M. (2007). Age
    effects on gray matter volume and attentional performance in Zen meditation. *Neurobiology of Aging*.；网页地址 (URL): [NIH:
    Zazen Study](https'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Integrated_Methods.md
  section: 方法表
- type: concept
  question: 认知行为疗法 (CBT)的核心要点是什么？
  answer: '所属分支: 认知；详细步骤: 1. 识别触发；2. 记录自动想法；3. 挑战证据；4. 重构平衡；5. 行为实验。；推荐时长/频率: 15-30min/周3；适用职场场景: 职场负面循环；疗愈益处: 减少抑郁50%（meta-analysis），提升问题解决能力。；自助提示:
    用App日志，在家或通勤实践。；注意事项: 需坚持练习；严重抑郁时需专业辅助。；专业视角 (Professional Perspective): 强调“认知三角”（想法、情绪、行为）的相互作用，通过改变认知评估来调节情绪反应。；引用来源
    (Citation): Beck, J. S. (2011). *Cognitive Behavior Therapy: Basics and Beyond*.；网页地址 (URL): [Beck Institute: What is
    CBT](https://beckinstitute.org/about/intro-to-cbt/)'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Integrated_Methods.md
  section: 心理学疗法方法表
- type: concept
  question: 接受与承诺疗法 (ACT)的核心要点是什么？
  answer: '所属分支: 行为；详细步骤: 1. 觉察想法；2. 接受不斗；3. 澄清价值；4. 承诺行动；5. 评估。；推荐时长/频率: 20min/周2；适用职场场景: 职场价值冲突；疗愈益处: 提升心理灵活性，减少因回避导致的痛苦。；自助提示:
    价值工作表，自导在家。；注意事项: 重点在于行动；接纳不等于放弃改变。；专业视角 (Professional Perspective): 第三浪潮CBT的代表，引入正念和接纳成分，不以症状消除为目标，而以丰富、有意义的生活为目标。；引用来源
    (Citation): Hayes, S. C. (2004). Acceptance and commitment therapy... *Behavior Therapy*.；网页地址 (URL): [ACBS: ACT](https://contextualscience.org/act)'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Integrated_Methods.md
  section: 心理学疗法方法表
- type: concept
  question: 辩证行为疗法 (DBT)基础的核心要点是什么？
  answer: '所属分支: 行为/认知；详细步骤: 1. 正念技能；2. 情绪调节；3. 痛苦耐受；4. 人际效能。；推荐时长/频率: 10-20min/日；适用职场场景: 职场情绪爆发；疗愈益处: 减少冲动行为，提升情绪稳定性。；自助提示:
    日志追踪情绪，办公室快速息。；注意事项: 原为边缘型人格设计；简版适合一般情绪调节。；专业视角 (Professional Perspective): 结合了CBT的改变策略和禅宗的接纳策略（dialectic），特别强调情绪调节技能的习得。；引用来源
    (Citation): Linehan, M. M. (1993). *Cognitive-Behavioral Treatment of Borderline Personality Disorder*.；网页地址 (URL): [Behavioral
    Tech: DBT](https://behavioraltech.org/resources/faqs/dialectical-behavior-therapy-dbt/)'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Integrated_Methods.md
  section: 心理学疗法方法表
- type: concept
  question: 自我效能评估的核心要点是什么？
  answer: '描述: Bandura量表；步骤: 1. 列任务；2. 评分信念（0-100）；3. 平均；4. 反思低分。；频率: 月1；职场益处: 职自信监测，提升目标设。；自助工具: Online模板。；注意事项: 具体任务具体分析；诚实。；专业视角
    (Professional Perspective): 评估个体对自己完成特定任务能力的信念，是预测绩效和动机的关键指标。；引用来源 (Citation): Bandura, A. (1977). Self-efficacy: Toward
    a unifying theory... *Psychological Review*.；网页地址 (URL): [PositivePsychology: Self-Efficacy Scales](https://positivepsychology.com/self-efficacy-scales/)'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Integrated_Methods.md
  section: 心理学评估方法表 (额外扩展)
- type: concept
  question: 时间视角库存 (ZPTI)的核心要点是什么？
  answer: '描述: Zimbardo表；步骤: 1. 答48项；2. 算五视角分；3. 平衡分析；4. 调整。；频率: 季1；职场益处: 职时间管优化，减拖延。；自助工具: 免费PDF。；注意事项: 需文化适应；最好有解读指导。；专业视角
    (Professional Perspective): 衡量个体对过去、现在和未来的认知偏好，平衡的时间视角（Balanced Time Perspective）与心理健康高度相关。；引用来源 (Citation): Zimbardo,
    P. G., & Boyd, J. N. (1999). Putting time in perspective... *J Pers Soc Psychol*.；网页地址 (URL): [The Time Paradox: ZTPI](https://www.thetimeparadox.com/zimbardo-time-perspective-inventory/)'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Integrated_Methods.md
  section: 心理学评估方法表 (额外扩展)
- type: concept
  question: 神经科学的核心要点是什么？
  answer: '与所属领域融合: 冥想/心理学；描述: 脑成像验证。；示例应用: fMRI正念研究。；益处: 科学背书。；自助策略: 阅读科普书。；专业视角 (Professional Perspective): 神经可塑性 (Neuroplasticity)
    是身心练习的生物学基础。；引用来源 (Citation): Davidson, R. J. & McEwen, B. S. (2012).'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Interdisciplinary_Logic.md
  section: 跨学科整合表
- type: concept
  question: 营养学的核心要点是什么？
  answer: '与所属领域融合: 瑜伽；描述: 饮食支持实践。；示例应用: 阿育吠陀餐 + 序列。；益处: 能量优化。；自助策略: 补充Omega-3。；专业视角 (Professional Perspective): “肠-脑轴” (Gut-Brain
    Axis) 连接饮食与心理健康。；引用来源 (Citation): Mayer, E. A. (2011).'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Interdisciplinary_Logic.md
  section: 跨学科整合表
- type: concept
  question: 体育科学的核心要点是什么？
  answer: '与所属领域融合: 瑜伽/禅修；描述: 运动生理。；示例应用: 瑜伽心率变研究。；益处: 性能升。；自助策略: 结合跑步。；专业视角 (Professional Perspective): 迷走神经张力 (Vagal Tone)
    作为身心灵活性的指标。；引用来源 (Citation): Porges, S. W. (2001).'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Interdisciplinary_Logic.md
  section: 跨学科整合表
- type: concept
  question: 术语翻译的核心要点是什么？
  answer: '语言学视角 (Linguistic): 萨丕尔-沃尔夫假说：语言塑造思维。；现象学视角 (Phenomenological): 词语作为存在的显现。；心理映射: 翻译不仅是转码，更是认知重构。；专家解析 (Expert Insight):
    在翻译“空性” (Emptiness) 时，必须区分“虚无”与“潜能”。'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Interdisciplinary_Logic.md
  section: 语言学与思维地图：跨学科映射逻辑 (Linguistic & Cognitive Mapping)
- type: concept
  question: 隐喻分析的核心要点是什么？
  answer: '语言学视角 (Linguistic): 概念隐喻理论 (Lakoff)。；现象学视角 (Phenomenological): 具身认知的象征表达。；心理映射: 找出潜意识中的支配性隐喻。；专家解析 (Expert Insight):
    疗愈过程常被隐喻为“旅程”或“战斗”，这决定了治疗的底色。'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Interdisciplinary_Logic.md
  section: 语言学与思维地图：跨学科映射逻辑 (Linguistic & Cognitive Mapping)
- type: concept
  question: 非对等词汇的核心要点是什么？
  answer: '语言学视角 (Linguistic): 跨文化语用学的不对称。；现象学视角 (Phenomenological): 纯粹体验的不可言说性。；心理映射: 识别认知图式中的空白点。；专家解析 (Expert Insight):
    梵文中的 *Citta*, *Manas*, *Vijnana* 在英文中通常都译为 Mind，造成了极大的认知塌缩。'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Interdisciplinary_Logic.md
  section: 语言学与思维地图：跨学科映射逻辑 (Linguistic & Cognitive Mapping)
- type: concept
  question: 中医经络 / 气的核心要点是什么？
  answer: '现代对应的学理逻辑: **物理生物学 / 筋膜学**；关键连接机制 (Linking Mechanism): 细胞外基质 (ECM) 的机械敏感性。；知识深度: 系统论层级的通信。；专业整合建议: 将“理气”理解为对张力整合组织
    (Tensegrity) 的应力调节。'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Interdisciplinary_Logic.md
  section: 科学与传统的学理重构：合成矩阵 (Scientific-Traditional Synthesis)
- type: concept
  question: 阿特曼 vs. 梵的核心要点是什么？
  answer: '现代对应的学理逻辑: **全息原理 (Holographic Principle)**；关键连接机制 (Linking Mechanism): 局部信息包含全局结构的物理逻辑。；知识深度: 宇宙学级别的自相似。；专业整合建议:
    个体意志与普遍规律的非关联性统一。'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Interdisciplinary_Logic.md
  section: 科学与传统的学理重构：合成矩阵 (Scientific-Traditional Synthesis)
- type: concept
  question: GAD-7 (焦虑量表)的核心要点是什么？
  answer: '描述: 7项焦虑筛查。；心理测量学指标 (Validity/Reliability): Cronbach''s α = 0.92; 与诊断一致性高 (Sensitivity 89%)。；推荐频率: 每2周；职场应用: 监测职场高压下的焦虑水平。；专业视角:
    广泛认可的一级筛查工具，分数>10建议专业评估。；引用来源: Spitzer, R. L., et al. (2006). *Arch Intern Med*.；网页地址: [GAD-7 Online](https://patient.info/doctor/generalized-anxiety-disorder-scale-gad-7)'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Tools_Assessment.md
  section: 心理学自助评估工具表
- type: concept
  question: PHQ-9 (抑郁量表)的核心要点是什么？
  answer: '描述: 9项抑郁筛查。；心理测量学指标 (Validity/Reliability): Sensitivity 88%, Specificity 88% (Score > 10)。；推荐频率: 每月；职场应用: 识别职业倦怠中的抑郁成分。；专业视角:
    不仅评估严重程度，还包括“功能性损害”评估。；引用来源: Kroenke, K., et al. (2001). *J Gen Intern Med*.；网页地址: [PHQ-9 Screen](https://www.mdcalc.com/phq-9-patient-health-questionnaire-9-depression)'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Tools_Assessment.md
  section: 心理学自助评估工具表
- type: concept
  question: Rosenburg自尊量表 (RSES)的核心要点是什么？
  answer: '描述: 全球最通用的自尊评估。；心理测量学指标 (Validity/Reliability): 内部一致性高 (α = 0.77-0.88)。；推荐频率: 季度；职场应用: 评估职场挫折对自我价值感的影响。；专业视角: 区分“特质自尊”
    (Trait) 和“状态自尊” (State)。；引用来源: Rosenberg, M. (1965).；网页地址: [RSES Interp](https://wwnorton.com/college/psych/psychsci/media/rosenberg.htm)'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Tools_Assessment.md
  section: 心理学自助评估工具表
- type: concept
  question: Muse 头带的核心要点是什么？
  answer: '所属领域: 冥想/反馈；用途与机制: EEG脑波实时反馈。；科学验证 (Evidence): 验证研究显示其能准确区分专注与走神状态 (Frontiers in Neurosci, 2017)。；价格: $250+；自助建议:
    适合数据驱动型用户。；专业视角: 利用操作性条件反射 (Operant Conditioning) 训练注意力。；引用来源: Krigolson, O. E., et al. (2017).'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Tools_Assessment.md
  section: 辅助工具与道具表
- type: concept
  question: 情绪日志 App (e.g., Moodpath)的核心要点是什么？
  answer: '所属领域: CBT；用途与机制: 追踪情绪与活动关联。；科学验证 (Evidence): 经验取样法 (ESM) 被证实能减少记忆偏差。；价格: 免费/订阅；自助建议: 每日记录以识别模式。；专业视角: 增强情绪颗粒度 (Emotional
    Granularity)。；引用来源: Kauer, S. D., et al. (2012).'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Tools_Assessment.md
  section: 辅助工具与道具表
- type: concept
  question: 呼吸训练器 (e.g., Resperics)的核心要点是什么？
  answer: '所属领域: 瑜伽/放松；用途与机制: 引导慢速呼吸 (6次/分)。；科学验证 (Evidence): 慢速呼吸显著增加HRV并降低血压。；价格: $50-100；自助建议: 焦虑发作时使用。；专业视角: 通过物理反馈强制调节自主神经。；引用来源:
    Ma, X., et al. (2017).'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Tools_Assessment.md
  section: 辅助工具与道具表
- type: concept
  question: 人格障碍倾向的核心要点是什么？
  answer: '核心工具 (Primary Tool): **PCL-R** (精神病态校验表)；现代变体 (Modern Variant): **PID-5** (DSM-5 人格清单)；针对性症状 (Target): 边缘性、反社会、自恋型。；专家解读关键点
    (Expert Key): 关注“特质”而非“状态”。'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Tools_Assessment.md
  section: 专家级临床诊断与筛查矩阵 (Professional Diagnostic & Screening Matrix)
- type: concept
  question: 创伤深度评估的核心要点是什么？
  answer: '核心工具 (Primary Tool): **PCL-5** (PTSD 检查表)；现代变体 (Modern Variant): **DES-II** (离解体验量表)；针对性症状 (Target): 创伤后应激、解离状态。；专家解读关键点
    (Expert Key): 离解得分 > 30 提示可能存在 C-PTSD。'
  source: 02-Mind-Psychology/psychology/foundations/framework/Framework_Tools_Assessment.md
  section: 专家级临床诊断与筛查矩阵 (Professional Diagnostic & Screening Matrix)
