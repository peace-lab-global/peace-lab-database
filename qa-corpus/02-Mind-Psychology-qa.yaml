  question: 什么是1. 森林浴（Shinrin-yoku）标准2小时流程？
  answer: Shinrin-yoku（森林浴）起源于1980年代的日本，是一种通过感官沉浸于森林氛围来促进身心健康的自然疗法。核心不是运动或锻炼，而是"在"（being）于森林之中。
  source: 02-Mind-Psychology/meditation/nature-meditation/Nature_Practical_Guide.md
  section: 1. 森林浴（Shinrin-yoku）标准2小时流程
- type: concept
  question: 准备的核心要点是什么？
  answer: '时长: 5-10分钟；核心行动: 到达森林边缘，放下手机，转换心态；关键心态: 从"做"切换到"在"'
  source: 02-Mind-Psychology/meditation/nature-meditation/Nature_Practical_Guide.md
  section: 1.2 各阶段详解
- type: concept
  question: 缓行的核心要点是什么？
  answer: '时长: 20-30分钟；核心行动: 极慢步行，打开所有感官；关键心态: 不追求目的地，只追求当下的觉察'
  source: 02-Mind-Psychology/meditation/nature-meditation/Nature_Practical_Guide.md
  section: 1.2 各阶段详解
- type: concept
  question: 静止的核心要点是什么？
  answer: '时长: 20-30分钟；核心行动: 找一个地方坐下或站立，不动；关键心态: 让身体静止，让森林的讯息进来'
  source: 02-Mind-Psychology/meditation/nature-meditation/Nature_Practical_Guide.md
  section: 1.2 各阶段详解
- type: concept
  question: 速度的核心要点是什么？
  answer: '建议: 比平时慢50-70%，每步有意识地感受脚底与地面的接触'
  source: 02-Mind-Psychology/meditation/nature-meditation/Nature_Practical_Guide.md
  section: 1.2 各阶段详解
- type: concept
  question: 视线的核心要点是什么？
  answer: '建议: 不固定于前方，让视线自然漫游——上望树冠，下看地面，环顾四周'
  source: 02-Mind-Psychology/meditation/nature-meditation/Nature_Practical_Guide.md
  section: 1.2 各阶段详解
