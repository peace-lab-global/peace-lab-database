  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Indirect_Recognition.md
  section: 表1.2 主要传统中的直接/间接术语对应
- type: concept
  question: 大手印的核心要点是什么？
  answer: '直接路径术语: 无修瑜伽；间接路径术语: 专一瑜伽起；原文: སྒོམ་མེད vs རྩེ་གཅིག；传统解释: 终点vs起点'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Indirect_Recognition.md
