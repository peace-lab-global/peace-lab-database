  question: 什么是概述 (Overview)？
  answer: 安迪·普迪科姆（Andy Puddicombe，1972-）是冥想应用程序 Headspace 的联合创始人，也是将冥想推向全球数字化主流的最关键人物之一。他拥有十年的佛教出家修行经历（包括在缅甸、尼泊尔、泰国、澳大利亚、俄罗斯等地的寺院修行），是一位正式授戒的藏传佛教僧人。还俗后，他将深度的传统冥想训练转化为现代人可以接受的、去宗教化的冥想产品，通过
    Headspace 触达了全球超过7000万用户。
