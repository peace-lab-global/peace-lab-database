  question: 什么是概述 (Overview)？
  answer: 僧团（Sangha）是佛教"三宝"（佛、法、僧）之一，也是冥想修行中最容易被忽视却极其关键的支持系统。在传统语境中，僧团指的是出家修行者的团体；在当代语境中，它已扩展为包括所有共同修行者的社群。无论是传统的寺院僧团、现代的冥想中心、还是在线修行社区，社群支持都是持续冥想修行的关键因素之一。
