  question: 一致性的核心要点是什么？
  answer: '英文术语: Congruence；词源/其他语言: 拉丁语: *Congruere* (相遇)；定义: 内在感受、意识与外在表达和谐统一的健康沟通状态；专业视角 (Professional Perspective): Rogers与萨提亚都使用此概念，但萨提亚更强调身体层面'
  source: 02-Mind-Psychology/meditation/satir-model/Satir_Communication_Stances.md
  section: 核心术语词源表 (Core Terminology & Etymology)
- type: concept
  question: 讨好的核心要点是什么？
  answer: '英文: Placating；关注焦点: 他人、情境；忽略焦点: 自我；内在信念: "我不重要"；身体姿势: 跪地、低头、手心向上恳求；典型语言: "都是我的错""你说什么都对""对不起"；自我价值感: 极低'
  source: 02-Mind-Psychology/meditation/satir-model/Satir_Communication_Stances.md
  section: 五种沟通姿态核心对照表
- type: concept
  question: 指责的核心要点是什么？
  answer: '英文: Blaming；关注焦点: 自我；忽略焦点: 他人、情境；内在信念: "只有我重要"；身体姿势: 站立、手指指人、身体前倾；典型语言: "都是你的错""你从不...""你总是..."；自我价值感: 表面高，实际低'
  source: 02-Mind-Psychology/meditation/satir-model/Satir_Communication_Stances.md
  section: 五种沟通姿态核心对照表
- type: concept
  question: 超理智的核心要点是什么？
  answer: '英文: Super-Reasonable；关注焦点: 情境、逻辑；忽略焦点: 自我、他人；内在信念: "感受不重要"；身体姿势: 僵直、双手交叉或背后、面无表情；典型语言: "客观来说...""数据显示...""理性分析..."；自我价值感:
    隐藏'
