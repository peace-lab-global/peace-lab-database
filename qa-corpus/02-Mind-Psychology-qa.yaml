- type: concept
  question: 产后忧郁 (Baby Blues)的核心要点是什么？
  answer: '发生率: 50-80%；核心特征: 产后3-5天情绪波动；2周内自限；处理: 支持；教育；监测'
  source: 02-Mind-Psychology/psychology/clinical/depression/peripartum-depression/INDEX.md
  section: 围产期情绪障碍谱系速查
- type: concept
  question: 围产期抑郁 (PPD)的核心要点是什么？
  answer: '发生率: 10-20%；核心特征: 符合MDD标准；功能损害；母婴互动受损；处理: **专业治疗**'
  source: 02-Mind-Psychology/psychology/clinical/depression/peripartum-depression/INDEX.md
  section: 围产期情绪障碍谱系速查
- type: concept
  question: 产后强迫症的核心要点是什么？
  answer: '发生率: 3-5%；核心特征: 伤害婴儿闯入思维；极度痛苦；无实施意图；处理: ERP；SSRI；教育'
  source: 02-Mind-Psychology/psychology/clinical/depression/peripartum-depression/INDEX.md
  section: 围产期情绪障碍谱系速查
