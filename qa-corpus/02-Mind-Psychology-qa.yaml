- type: concept
  question: 什么是儒释道现代整合路径？
  answer: 中国文化的深层结构中，儒释道三家并非割裂，而是构成了一个完整的精神生态系统。现代修行者不必强行"三教合一"，而是根据人生的不同阶段、不同需求，灵活选择对应的修习法门。
  source: 02-Mind-Psychology/meditation/chinese-traditions/Chinese_Meditation_Practical.md
  section: 儒释道现代整合路径
- type: concept
  question: 核心关切的核心要点是什么？
  answer: '儒家: 如何做一个好人；道家: 如何顺应自然；佛家: 如何超越苦'
  source: 02-Mind-Psychology/meditation/chinese-traditions/Chinese_Meditation_Practical.md
  section: 三家定位与功能对照
- type: concept
  question: 人生阶段的核心要点是什么？
  answer: '儒家: 青年-中年（建立期）；道家: 中年（调适期）；佛家: 中年-晚年（超越期）'
  source: 02-Mind-Psychology/meditation/chinese-traditions/Chinese_Meditation_Practical.md
  section: 三家定位与功能对照
- type: concept
  question: 主要功能的核心要点是什么？
  answer: '儒家: 人格塑造、社会责任；道家: 压力调节、身心平衡；佛家: 终极关怀、生死解脱'
  source: 02-Mind-Psychology/meditation/chinese-traditions/Chinese_Meditation_Practical.md
  section: 三家定位与功能对照
- type: concept
  question: 感到人生无方向、缺乏价值感的核心要点是什么？
  answer: '对应传统: 儒家；推荐法门: 省察功夫+立志；修习时长: 持续日常'
  source: 02-Mind-Psychology/meditation/chinese-traditions/Chinese_Meditation_Practical.md
  section: 根据需求选择：非混合式修习
- type: concept
  question: 工作压力极大、身心紧绷的核心要点是什么？
  answer: '对应传统: 道家；推荐法门: 吐纳/站桩+自然冥想；修习时长: 每日20-40分钟'
  source: 02-Mind-Psychology/meditation/chinese-traditions/Chinese_Meditation_Practical.md
  section: 根据需求选择：非混合式修习
