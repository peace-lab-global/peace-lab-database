- type: concept
  question: 什么是概述 (Overview)？
  answer: 本文档系统比较直接认知 (Direct Recognition / Pratyabhijñā / प्रत्यभिज्ञा) 与间接认知/渐修 (Indirect Recognition / Kramic Path / क्रमिकमार्ग)
    两大修行路径。这两种路径代表了人类追求觉醒的两种根本策略：一种强调瞬间的辨识与认持，另一种强调渐进的净化与培养。二者各有适用场景、优势与风险，深度理解其差异与互补是成熟修行者的必备素养。
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Indirect_Recognition.md
  section: 概述 (Overview)
- type: concept
  question: 路径名称的核心要点是什么？
  answer: '直接认知术语: 直接路径 (Direct Path)；间接认知术语: 渐进路径 (Progressive/Kramic Path)；梵语/源语对照: **Pratyabhijñā-mārga** (प्रत्यभिज्ञामार्ग)
    vs **Krama-mārga** (क्रममार्ग)；含义差异: 瞬间vs阶梯；专家解析: 终点相同，策略不同'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Indirect_Recognition.md
  section: 表1.1 直接与间接认知核心术语对照表
- type: concept
  question: 核心动作的核心要点是什么？
  answer: '直接认知术语: 辨识 (Recognition)；间接认知术语: 培养 (Cultivation)；梵语/源语对照: **Pratyabhijñā** (प्रत्यभिज्ञा) vs **Bhāvanā** (भावना)；含义差异:
    发现vs建立；专家解析: 已有vs需建'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Indirect_Recognition.md
  section: 表1.1 直接与间接认知核心术语对照表
