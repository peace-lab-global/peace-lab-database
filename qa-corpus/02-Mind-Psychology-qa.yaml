  section: 目录
- type: concept
  question: 急性危机期的核心要点是什么？
  answer: '时间: 0-6个月；特征: 情绪剧烈波动、日常功能受损、现实压力涌来'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Family_Rebuilding.md
  section: 离婚后适应的时间线
- type: concept
  question: 调整适应期的核心要点是什么？
  answer: '时间: 6个月-2年；特征: 开始建立新的日常节奏，但仍会有反复'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Family_Rebuilding.md
  section: 离婚后适应的时间线
- type: concept
  question: 重组稳定期的核心要点是什么？
  answer: '时间: 2-3年；特征: 新的生活模式基本建立，情绪趋于稳定'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Family_Rebuilding.md
  section: 离婚后适应的时间线
- type: concept
  question: 信念系统的核心要点是什么？
  answer: '内容: 对困境的理解和赋予意义；生活中的样子: "这段婚姻教会了我什么"'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Family_Rebuilding.md
  section: 适应的决定因素
- type: concept
  question: 组织模式的核心要点是什么？
  answer: '内容: 灵活性、连接性、资源；生活中的样子: 能够重新安排家庭生活的能力'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Family_Rebuilding.md
  section: 适应的决定因素
- type: concept
  question: 沟通过程的核心要点是什么？
  answer: '内容: 清晰表达、情感共享、问题解决；生活中的样子: 跟孩子坦诚地谈论变化'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Family_Rebuilding.md
  section: 适应的决定因素
- type: concept
  question: 自我惩罚的核心要点是什么？
  answer: '表现: "都是我的错"；为什么有害: 瘫痪行动力；怎么办: 区分"我的责任部分"和"整体是双方的事"'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Family_Rebuilding.md
  section: 常见的心理陷阱
- type: concept
  question: 依恋安全的核心要点是什么？
  answer: '具体影响: 主要照顾者的情绪状态直接影响依恋质量——妈妈焦虑抑郁时，孩子感受到的不是"离婚"，而是"妈妈不一样了"；孩子的"语言": 更粘人、更容易哭、难以被安抚、睡眠紊乱；父母常犯的错: "TA还不到一岁，什么都不懂"——于是忽略了自己情绪对孩子的传导；研究依据:
    Bowlby依恋理论；Solomon & George (1999)'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Impact_Children_Development.md
  section: 2.1 婴幼儿期（0-3岁）
- type: concept
  question: 生理节律的核心要点是什么？
  answer: '具体影响: 家庭环境的剧变（搬家、更换照顾者、作息混乱）直接打乱生理节律；孩子的"语言": 睡眠倒退、进食困难、频繁生病；父母常犯的错: 在处理离婚事务的混乱中忽略了孩子的基本需求节律；研究依据: Gunnar & Quevedo
    (2007)'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Impact_Children_Development.md
  section: 2.1 婴幼儿期（0-3岁）
- type: concept
  question: 压力反应的核心要点是什么？
  answer: '具体影响: 即使不理解发生了什么，婴幼儿的HPA轴会对环境中的紧张气氛做出反应；孩子的"语言": 皮质醇水平异常升高、更容易惊跳、难以放松；父母常犯的错: 在孩子面前吵架、冷战——"TA听不懂的"——但TA感受得到；研究依据:
    Tronick (2007) 面无表情实验'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Impact_Children_Development.md
  section: 2.1 婴幼儿期（0-3岁）
- type: concept
  question: 自我归因的核心要点是什么？
  answer: '具体影响: "是不是因为我不乖，爸爸才走的？""如果我再听话一点，他们就不会离婚了"；孩子的"语言": 突然变得特别"乖"、讨好大人、或者反过来故意闹以"测试"是否会被抛弃；需要格外注意的: 必须明确、反复告诉孩子："爸爸妈妈的事不是你的错"；研究依据:
    Wallerstein & Kelly (1980)'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Impact_Children_Development.md
  section: 2.2 学龄前期（3-6岁）
- type: concept
  question: 分离焦虑的核心要点是什么？
  answer: '具体影响: 已经"走了"一个家长——"另一个会不会也走？"；孩子的"语言": 不让妈妈/爸爸出门、上幼儿园哭闹加剧、晚上怕黑、不敢一个人待着；需要格外注意的: 不要用"不听话就把你送到爸爸/妈妈那里"来威胁；研究依据: Bowlby依恋理论'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Impact_Children_Development.md
  section: 2.2 学龄前期（3-6岁）
- type: concept
  question: 退行行为的核心要点是什么？
  answer: '具体影响: 压力下回到更早的发展阶段；孩子的"语言": 已经不尿床的又开始尿了、已经会说话的又开始用婴儿语、吃手指；需要格外注意的: 退行不是"退步"而是求助信号——需要更多安全感而非批评；研究依据: Anna Freud退行防御理论'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Impact_Children_Development.md
  section: 2.2 学龄前期（3-6岁）
- type: concept
  question: 忠诚冲突的核心要点是什么？
  answer: '具体影响: 觉得喜欢爸爸就是背叛妈妈，反过来也是——被撕成了两半；孩子的"语言": "妈妈，你是不是不希望我去爸爸家？" 或者两边都表现得"很开心"以不让任何一方难过；性别差异: 这个年龄段最痛苦的经历之一——从来没有人教过他们怎么同时爱两个对立的人；研究依据:
    Buchanan, Maccoby & Dornbusch (1991)'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Impact_Children_Development.md
  section: 2.3 学龄期（6-12岁）
