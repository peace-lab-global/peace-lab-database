  question: 创伤暴露理论的核心要点是什么？
  answer: '核心概念: 安全暴露于创伤记忆；理论基础: 暴露疗法理论；作用机制: 通过安全暴露减少创伤相关的恐惧和回避；临床应用: 减少创伤回忆的痛苦强度；实证支持: 强烈证据支持；专业洞察: 暴露是创伤治疗的核心机制'
  source: 02-Mind-Psychology/therapy/tf-cbt-therapy/TF_CBT_Trauma_Focused_Cognitive_Behavioral_Therapy_Overview.md
