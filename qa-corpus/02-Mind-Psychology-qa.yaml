  question: Fana的核心要点是什么？
  answer: '阿拉伯文: فناء；含义: 寂灭、消融、自我消亡；对应阶段: 个体自我在真主中的消融；所有非真主之物的消逝'
  source: 02-Mind-Psychology/meditation/sufism-meditation/Sufism_Meditation_Overview.md
  section: 2.2 Fana 与 Baqa：寂灭与永存
- type: concept
  question: Baqa的核心要点是什么？
  answer: '阿拉伯文: بقاء；含义: 永存、存续、在真主中存活；对应阶段: 在 Fana 之后，以真主的生命为生命而存活'
  source: 02-Mind-Psychology/meditation/sufism-meditation/Sufism_Meditation_Overview.md
