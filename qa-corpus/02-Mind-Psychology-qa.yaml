- type: concept
  question: 上床时间的核心要点是什么？
  answer: '传统入睡困难: 通常按时或提前上床；睡眠意愿低/拖延: 显著推迟上床时间'
  source: 02-Mind-Psychology/psychology/somatic-body/insomnia/Insomnia_Low_Sleep_Motivation.md
  section: 与传统失眠的本质区别
