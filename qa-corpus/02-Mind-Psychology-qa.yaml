  question: 礼佛的核心要点是什么？
  answer: '时长: 5-8分钟；核心内容: 三拜或108拜（简化版）；念诵；身心状态: 以身体行动表达恭敬与皈依'
  source: 02-Mind-Psychology/meditation/korean-seon/Korean_Seon_Practical.md
  section: 1.1 九十分钟标准流程
- type: concept
  question: 第一段坐禅的核心要点是什么？
  answer: '时长: 30-40分钟；核心内容: 主要修行时段；可用话头或默照；身心状态: 深化专注力，面对内心浮现的一切'
  source: 02-Mind-Psychology/meditation/korean-seon/Korean_Seon_Practical.md
  section: 1.1 九十分钟标准流程
