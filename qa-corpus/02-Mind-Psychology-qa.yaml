  answer: '心理基础: 体验开放促进主关系；表现形式: 通过外部体验带回新能量；健康度评估: 中-高；潜在风险: 可能发展为逃避主关系问题'
  source: 02-Mind-Psychology/relationships/infidelity/Open_Relationship_Boundaries.md
  section: 2.1 选择开放式关系的动机分析
- type: concept
  question: 0-2周的核心要点是什么？
  answer: '心理状态: 情绪风暴期：震惊、愤怒、否认交替；决策能力评估: 决策能力严重受损；建议行动: 仅处理必要事务，不做关系决定；风险: 情绪驱动的冲动决定'
  source: 02-Mind-Psychology/relationships/infidelity/Post_Infidelity_Decision.md
  section: 1.1 急性期不宜做重大决定
- type: concept
  question: 2-6周的核心要点是什么？
  answer: '心理状态: 初步消化期：情绪仍剧烈波动；决策能力评估: 决策能力部分恢复；建议行动: 收集信息、寻求专业帮助；风险: 仍可能受强烈情绪影响'
  source: 02-Mind-Psychology/relationships/infidelity/Post_Infidelity_Decision.md
  section: 1.1 急性期不宜做重大决定
- type: concept
  question: 6-12周的核心要点是什么？
  answer: '心理状态: 理性回归期：开始能多角度思考；决策能力评估: 决策能力基本恢复；建议行动: 开始系统评估关系前景；风险: 可能过早乐观或悲观'
  source: 02-Mind-Psychology/relationships/infidelity/Post_Infidelity_Decision.md
  section: 1.1 急性期不宜做重大决定
- type: concept
  question: 沉没成本效应的核心要点是什么？
  answer: '在出轨决策中的表现: "我已经投入了这么多年，不能白费"；可能导致的错误决定: 留在应该离开的关系中；纠正策略: 评估未来而非过去投入'
  source: 02-Mind-Psychology/relationships/infidelity/Post_Infidelity_Decision.md
  section: 1.2 影响决策的心理偏差
- type: concept
  question: 损失厌恶的核心要点是什么？
  answer: '在出轨决策中的表现: "离婚我会失去太多"；可能导致的错误决定: 因恐惧损失而放弃更好的可能；纠正策略: 平衡评估保留和离开的真实得失'
  source: 02-Mind-Psychology/relationships/infidelity/Post_Infidelity_Decision.md
  section: 1.2 影响决策的心理偏差
- type: concept
  question: 现状偏差的核心要点是什么？
  answer: '在出轨决策中的表现: "至少我知道现在的痛苦，不确定的未来更可怕"；可能导致的错误决定: 拒绝改变的可能性；纠正策略: 想象两种未来的详细图景'
  source: 02-Mind-Psychology/relationships/infidelity/Post_Infidelity_Decision.md
  section: 1.2 影响决策的心理偏差
- type: concept
  question: 出轨方的态度的核心要点是什么？
  answer: '积极指标: 真诚悔过、完全透明、主动承担责任；消极指标: 否认最小化、继续欺骗、外归因；评分(1-10): ___；权重: 高'
  source: 02-Mind-Psychology/relationships/infidelity/Post_Infidelity_Decision.md
  section: 2.1 修复可行性评估
