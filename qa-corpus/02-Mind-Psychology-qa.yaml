  question: '[Depression Self-Help Guide](Depression_Self_Help_Guide.md)的核心要点是什么？'
  answer: '内容概要: 自助适用边界与安全声明、行为激活六步方案与分级活动库、认知偏差识别与思维记录表、正念分级练习、循证生活方式干预（运动/睡眠/光照/营养/社交/自然）、社会支持激活、危机应对升级路径、数字化自助工具；适用读者:
    轻中度抑郁患者、缓解期患者、家属；体量: 244行'
