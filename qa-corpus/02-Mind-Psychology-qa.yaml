  source: 02-Mind-Psychology/psychology/stress-hpa/skills/Cortisol_Rhythm_Assessment_Skill.md
  section: 正常昼夜节律
- type: concept
  question: 什么是评估决策树？
  answer: 'STEP 1: 评估晨起状态

    │

    ├─ 晨起感觉？

    │   ├─ 困难、疲惫、数小时才清醒 → 可能的CAR缺失/肾上腺低下

    │   ├─ 逐渐清醒，但需要时间 → 轻度低下可能

    │   ├─ 自然醒来，感觉清醒 → 正常CAR可能

    │   └─ 醒来时焦虑、过度警觉 → 可能的过度激活

    │

    STEP 2: 评估日间能量

    │

    ├─ 日间能量模式？

    │   ├─ 上午最差，逐渐改善 → 晨峰缺失

    │   ├─ 持续稳定 → 正常

    │   ├─ 上午好，下午崩溃 → 皮质醇下降过快

    │   ├─ 全天疲劳 → 肾上腺功能问题

    │   └─ 波动大 → 节律紊乱

    │

    STEP 3: 评估晚间状态

    │

    ├─ 夜间和睡前状态？

    │   ├─ 入睡困难、躺下后脑子停不下来 → 夜间皮质醇高

    │   ├─ 正常困倦入睡 → 正常

    │   ├─ 凌晨易醒、难以再睡 → 可能是夜间低谷异常

    │   └─ 嗜睡、早睡 → 可能的节律相位提前

    │

    STEP 4: 综合判断

    ```'
  source: 02-Mind-Psychology/psychology/stress-hpa/skills/Cortisol_Rhythm_Assessment_Skill.md
  section: 评估决策树
