  question: 第3周的核心要点是什么？
  answer: '主题: 身体中的愉悦与不愉悦；核心练习: 瑜伽 + 坐禅；家庭作业: 觉察不愉悦事件日记'
  source: 02-Mind-Psychology/meditation/masters/western-pioneers/Jon_Kabat_Zinn.md
  section: 2. MBSR 八周课程结构
- type: concept
  question: 身体扫描** (Body Scan)的核心要点是什么？
  answer: '时长: 45分钟；描述: 系统地将注意力从脚到头逐一扫过身体各部位'
  source: 02-Mind-Psychology/meditation/masters/western-pioneers/Jon_Kabat_Zinn.md
  section: 2. MBSR 八周课程结构
- type: concept
  question: 什么是概述 (Overview)？
  answer: 约瑟夫·戈尔茨坦（Joseph Goldstein，1944-）是西方内观冥想（Vipassana/Insight Meditation）运动最重要的奠基人之一。他与杰克·康菲尔德、莎伦·萨尔兹伯格共同创立了内观冥想协会（IMS），被公认为西方世界对上座部佛教阿毗达摩（Abhidhamma）和正念修行理解最深入的教师之一。戈尔茨坦的教学以精确、严谨和对传统佛法的忠实著称，在西方内观界被视为"教师的教师"。
  source: 02-Mind-Psychology/meditation/masters/western-pioneers/Joseph_Goldstein.md
  section: 概述 (Overview)
- type: concept
  question: 《内观禅修》的核心要点是什么？
  answer: '英文原名: The Experience of Insight；出版年: 1976；核心内容: 早期内观禅修实录'
  source: 02-Mind-Psychology/meditation/masters/western-pioneers/Joseph_Goldstein.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《正念之道》的核心要点是什么？
  answer: '英文原名: Insight Meditation；出版年: 1993；核心内容: 内观冥想入门'
  source: 02-Mind-Psychology/meditation/masters/western-pioneers/Joseph_Goldstein.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《一法》的核心要点是什么？
  answer: '英文原名: One Dharma；出版年: 2002；核心内容: 跨传统佛教修行整合'
  source: 02-Mind-Psychology/meditation/masters/western-pioneers/Joseph_Goldstein.md
  section: 主要著作 (Major Works)
- type: concept
  question: 重点的核心要点是什么？
  answer: '戈尔茨坦: 精确正念、佛法教义；康菲尔德: 心理整合、全人发展；萨尔兹伯格: 慈悲、情感疗愈'
  source: 02-Mind-Psychology/meditation/masters/western-pioneers/Joseph_Goldstein.md
  section: 与康菲尔德和萨尔兹伯格的对比
- type: concept
  question: 什么是概述 (Overview)？
  answer: 拉姆·达斯（Ram Dass，1931-2019），原名理查德·阿尔珀特（Richard Alpert），是美国心理学家、灵性导师、作家，1960-70年代美国东方灵性运动的核心人物之一。他与蒂莫西·利里（Timothy Leary）在哈佛大学共同进行迷幻药研究，后赴印度追寻灵性道路，在喜马拉雅山遇见恩师尼姆·卡罗利·巴巴（Neem
    Karoli Baba），获得法名"拉姆·达斯"（意为"上帝的仆人"）。1971年出版的《Be Here Now》成为美国灵性出版史上最畅销的书籍之一，深刻影响了一代人的灵性觉醒。晚年他致力于临终关怀事业，将冥想与死亡教育结合，留下了深远的灵性遗产。
  source: 02-Mind-Psychology/meditation/masters/western-pioneers/Ram_Dass.md
  section: 概述 (Overview)
- type: concept
  question: 什么是概述 (Overview)？
  answer: 瑞克·汉森（Rick Hanson，1953-）是美国神经心理学家、冥想教师、畅销书作家，以将神经科学、积极心理学与佛教冥想整合而闻名。他提出的"神经可塑性（Neuroplasticity）"通俗化理念——特别是"一起激发的神经元，连接在一起（Neurons
    that fire together, wire together）"——深刻影响了当代冥想和心理健康领域。他是加州大学伯克利分校至善科学中心（Greater Good Science Center）的资深研究员，创办了"智慧之心基金会（Wellspring
    Institute for Neuroscience and Contemplative Wisdom）"，致力于将古老的冥想智慧与现代的脑科学结合，帮助人们培养持久的内在力量、韧性和幸福感。
  source: 02-Mind-Psychology/meditation/masters/western-pioneers/Rick_Hanson.md
  section: 概述 (Overview)
- type: concept
  question: Jack Kornfield的核心要点是什么？
  answer: '传承: 南传上座部/西方内观；学习重点: 内观冥想；慈心冥想'
  source: 02-Mind-Psychology/meditation/masters/western-pioneers/Rick_Hanson.md
  section: 遇见佛法
- type: concept
  question: Tara Brach的核心要点是什么？
  answer: '传承: 西方内观/藏传佛教；学习重点: RAIN方法；自我慈悲'
  source: 02-Mind-Psychology/meditation/masters/western-pioneers/Rick_Hanson.md
  section: 遇见佛法
- type: concept
  question: 专注（Concentration）的核心要点是什么？
  answer: '对应的神经机制: 前额叶皮层对注意网络的调控；大脑变化: 前扣带皮层和前岛叶增厚'
  source: 02-Mind-Psychology/meditation/masters/western-pioneers/Rick_Hanson.md
  section: 2. 神经可塑性与"佛陀的大脑"
- type: concept
  question: 什么是概述 (Overview)？
  answer: 萨特亚·纳拉扬·葛印卡（Satya Narayan Goenka, 1924年1月30日—2013年9月29日）是缅甸出生的印度裔企业家转冥想导师，20世纪最成功的冥想全球化传播者之一。他将缅甸上座部佛教传统中的内观（Vipassanā）冥想技术从东南亚带到了全球，建立了一个遍布90多个国家、拥有200多个冥想中心的庞大网络，其标志性的"十日内观闭关"（10-Day
    Vipassanā Course）已成为全球最广泛参与的冥想培训项目之一。
  source: 02-Mind-Psychology/meditation/masters/western-pioneers/SN_Goenka.md
  section: 概述 (Overview)
- type: concept
  question: Vipassanā的核心要点是什么？
  answer: '含义: 洞见/内观——穿透现象表面看到其无常本质；与正念运动的区别: 比"正念"（Sati）更深——正念是基础，内观是通过正念达到的洞见'
  source: 02-Mind-Psychology/meditation/masters/western-pioneers/SN_Goenka.md
  section: 1. 内观——如实观察 (Vipassanā — Seeing Things as They Really Are)
- type: concept
  question: Vedanā的核心要点是什么？
  answer: '含义: 身体感受——修行的核心观察对象；与正念运动的区别: MBSR以呼吸为主要锚点，葛印卡体系以全身感受扫描为核心'
  source: 02-Mind-Psychology/meditation/masters/western-pioneers/SN_Goenka.md
  section: 1. 内观——如实观察 (Vipassanā — Seeing Things as They Really Are)
- type: concept
  question: Saṅkhāra的核心要点是什么？
  answer: '含义: 习性反应/业力印记——冥想要"根除"的目标；与正念运动的区别: 不仅仅是"觉察"习性，而是通过不反应来消融深层习性'
  source: 02-Mind-Psychology/meditation/masters/western-pioneers/SN_Goenka.md
  section: 1. 内观——如实观察 (Vipassanā — Seeing Things as They Really Are)
- type: concept
  question: 第1-3天的核心要点是什么？
  answer: '技术: **Ānāpāna**（观息法）；目标: 通过观察鼻孔处自然呼吸来集中注意力，发展心的锐利度'
  source: 02-Mind-Psychology/meditation/masters/western-pioneers/SN_Goenka.md
  section: 2. 十日课程结构
- type: concept
  question: 什么是概述 (Overview)？
  answer: 莎伦·萨尔兹伯格（Sharon Salzberg，1952-）是美国最具影响力的冥想教师之一，与杰克·康菲尔德、约瑟夫·戈尔茨坦并称为将内观冥想（Vipassana/Insight Meditation）引入西方的"三驾马车"。她是内观冥想协会（Insight
    Meditation Society, IMS）的联合创始人，被公认为将慈心冥想（Loving-Kindness / Metta Meditation）推广至西方主流世界的最重要人物。
  source: 02-Mind-Psychology/meditation/masters/western-pioneers/Sharon_Salzberg.md
  section: 概述 (Overview)
- type: concept
  question: 《慈心冥想》的核心要点是什么？
  answer: '英文原名: Lovingkindness: The Revolutionary Art of Happiness；出版年: 1995；核心内容: 系统介绍慈心冥想的经典之作'
  source: 02-Mind-Psychology/meditation/masters/western-pioneers/Sharon_Salzberg.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《信心》的核心要点是什么？
  answer: '英文原名: Faith: Trusting Your Own Deepest Experience；出版年: 2002；核心内容: 探讨灵性修行中的信心'
  source: 02-Mind-Psychology/meditation/masters/western-pioneers/Sharon_Salzberg.md
  section: 主要著作 (Major Works)
- type: concept
  question: 《真正的幸福》的核心要点是什么？
  answer: '英文原名: Real Happiness: The Power of Meditation；出版年: 2010；核心内容: 28天冥想入门指南'
  source: 02-Mind-Psychology/meditation/masters/western-pioneers/Sharon_Salzberg.md
  section: 主要著作 (Major Works)
