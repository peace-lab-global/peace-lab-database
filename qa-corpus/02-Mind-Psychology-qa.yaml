- type: concept
  question: 1. 君臣佐使的核心要点是什么？
  answer: '原则: 主香明确；中文/梵文术语: 君香 / प्रधान (pradhāna)；具体要求: 君香占30-50%,确立主题；常见错误: 多种主香导致混乱'
  source: 02-Mind-Psychology/therapy/incense/Incense_Preparation_Formulation.md
  section: 二、配方设计原则表
- type: concept
  question: 2. 三调平衡的核心要点是什么？
  answer: '原则: 前中后调协调；中文/梵文术语: 三段香；具体要求: 前调15-25%、中调30-40%、后调35-50%；常见错误: 后调不足香气不持久'
  source: 02-Mind-Psychology/therapy/incense/Incense_Preparation_Formulation.md
  section: 二、配方设计原则表
- type: concept
  question: 3. 阴阳调和的核心要点是什么？
  answer: '原则: 寒热平衡；中文/梵文术语: 阴阳 / शीत-उष्ण (śīta-uṣṇa)；具体要求: 温性香料≤60%,避免过燥；常见错误: 全用温热香导致上火'
  source: 02-Mind-Psychology/therapy/incense/Incense_Preparation_Formulation.md
  section: 二、配方设计原则表
- type: concept
  question: 线香制作的核心要点是什么？
  answer: '适用香型: 日常供佛、冥想；步骤: 1.粉碎香料→2.过筛→3.加粘合剂→4.搅拌→5.挤压成型→6.干燥→7.包装；关键参数: 粒径<100 mesh,水分12-15%,干燥72h；设备: 球磨机、挤出机、干燥室；质量控制:
    抗折强度、燃烧时间'
  source: 02-Mind-Psychology/therapy/incense/Incense_Preparation_Formulation.md
  section: 三、制备工艺流程表
- type: concept
  question: 锥香制作的核心要点是什么？
  answer: '适用香型: 快速香氛；步骤: 1.粉碎→2.混合→3.加水→4.压制成型→5.干燥；关键参数: 粒径<80 mesh,压力5-10 MPa,水分<10%；设备: 粉碎机、液压机；质量控制: 燃烧速率、烟雾量'
  source: 02-Mind-Psychology/therapy/incense/Incense_Preparation_Formulation.md
  section: 三、制备工艺流程表
