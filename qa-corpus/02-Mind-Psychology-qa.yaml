  question: 修行态度的核心要点是什么？
  answer: '直接认知术语: 无修 (Non-practice)；间接认知术语: 有修 (Practice)；梵语/源语对照: **Abhāvanā** (अभावना) vs **Sādhana** (साधना)；含义差异: 放下vs投入；专家解析:
    无努力vs有努力'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Indirect_Recognition.md
  section: 表1.1 直接与间接认知核心术语对照表
