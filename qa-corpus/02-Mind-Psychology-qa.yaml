  question: 什么是概述 (Overview)？
  answer: 虚云老和尚（1840-1959），法名古岩，字德清，号虚云，是近代中国佛教史上最伟大的禅师之一，也是中国禅宗近现代复兴的核心人物。他一生横跨清朝、民国和新中国三个时期，活了整整120岁（一说117岁），以其漫长的修行生涯、极端的苦行经历、以及对中国禅宗五家（临济、曹洞、沩仰、云门、法眼）传承的单手复兴而闻名于世。
  source: 02-Mind-Psychology/meditation/masters/chinese/Xuyun.md
