- type: concept
  question: 产后忧郁/ baby blues的核心要点是什么？
  answer: '英文: Postpartum Blues / Maternity Blues；发生时间: 产后3-5天开始，2周内消退；核心特征: 情绪波动、易哭、焦虑、失眠；自知力完整；患病率: 50-80%；临床意义: 正常生理-心理调整；自限性'
  source: 02-Mind-Psychology/psychology/clinical/depression/peripartum-depression/Peripartum_Depression.md
  section: 表1.1 围产期情绪障碍谱系
- type: concept
  question: 围产期抑郁的核心要点是什么？
  answer: '英文: Peripartum Depression (PPD) / Postpartum Depression；发生时间: 妊娠期或产后4周内发作（可延续至产后1年）；核心特征: 符合重性抑郁诊断标准；伴母婴功能损害；患病率:
    10-20%；临床意义: 需专业治疗；影响母婴依恋和儿童发育'
  source: 02-Mind-Psychology/psychology/clinical/depression/peripartum-depression/Peripartum_Depression.md
  section: 表1.1 围产期情绪障碍谱系
- type: concept
  question: 产前抑郁的核心要点是什么？
  answer: '英文: Antenatal / Prenatal Depression；发生时间: 妊娠期；核心特征: 同PPD，但发生在孕期；患病率: 10-20%；临床意义: PPD最强预测因子；影响胎儿发育'
  source: 02-Mind-Psychology/psychology/clinical/depression/peripartum-depression/Peripartum_Depression.md
  section: 表1.1 围产期情绪障碍谱系
- type: concept
  question: 生物因素的核心要点是什么？
  answer: '因素类别: 激素变化；具体因素: 孕酮/雌激素急剧下降；HPA轴再适应；相对风险 (RR/OR): 机制；可干预性: 中（激素治疗研究中）'
  source: 02-Mind-Psychology/psychology/clinical/depression/peripartum-depression/Peripartum_Depression.md
  section: 表2.1 围产期抑郁风险因素
- type: concept
  question: 甲状腺变化的核心要点是什么？
  answer: '因素类别: 产后甲状腺炎；具体因素: OR 2-3；相对风险 (RR/OR): **高**（甲状腺替代）'
  source: 02-Mind-Psychology/psychology/clinical/depression/peripartum-depression/Peripartum_Depression.md
  section: 表2.1 围产期抑郁风险因素
- type: concept
  question: 遗传易感性的核心要点是什么？
  answer: '因素类别: 家族史；5-HTTLPR短等位基因；具体因素: RR 2-3；相对风险 (RR/OR): 低'
  source: 02-Mind-Psychology/psychology/clinical/depression/peripartum-depression/Peripartum_Depression.md
  section: 表2.1 围产期抑郁风险因素
- type: concept
  question: 既往抑郁/焦虑史的核心要点是什么？
  answer: 'PPD风险: 30-50%；建议筛查频率: 孕早/中/晚期 + 产后1/2/4/6月；预防策略: 预防性IPT/CBT；药物维持'
  source: 02-Mind-Psychology/psychology/clinical/depression/peripartum-depression/Peripartum_Depression.md
  section: 表2.2 高危人群识别
- type: concept
  question: 产前抑郁/焦虑的核心要点是什么？
  answer: 'PPD风险: 40-60%；建议筛查频率: 每月；预防策略: 产前治疗延续至产后'
  source: 02-Mind-Psychology/psychology/clinical/depression/peripartum-depression/Peripartum_Depression.md
  section: 表2.2 高危人群识别
