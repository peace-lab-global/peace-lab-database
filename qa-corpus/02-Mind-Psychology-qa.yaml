  section: 多层次干预模型
- type: concept
  question: 初级预防的核心要点是什么？
  answer: '目标: 预防发生；策略: 健康教育、压力管理培训；适用情况: 低风险人群'
  source: 02-Mind-Psychology/psychology/stress-hpa/skills/Chronic_Stress_Intervention_Skill.md
  section: 干预时机选择
