  answer: '研究者/年份: Johnson & Lee, 2020；样本特征: n=85<br>轻中度抑郁患者；干预方案: 8次团体OH卡治疗；主要发现: BDI-II评分改善显著<br>(p<0.01, d=0.65)；效应量: 中等效应；方法学质量:
    CONSORT符合'
  source: 02-Mind-Psychology/therapy/oh-cards-therapy/OH_Cards_Research_Evidence.md
