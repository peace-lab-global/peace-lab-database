  question: 次级预防的核心要点是什么？
  answer: '目标: 早期识别干预；策略: 筛查、高危人群项目；适用情况: 中等压力'
  source: 02-Mind-Psychology/psychology/stress-hpa/skills/Chronic_Stress_Intervention_Skill.md
  section: 干预时机选择
