  question: 什么是概述？
  answer: 本条目属于 Peace Lab 知识体系，目前处于待建设状态。
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_CBTI.md
  section: 概述
- type: concept
  question: 刺激控制疗法的核心要点是什么？
  answer: '英文名: Stimulus Control Therapy (SCT)；理论基础: 经典条件反射理论(Pavlov)；核心机制: 切断床/卧室与觉醒的条件性联系；实施要点: 床仅用于睡眠与性；20分钟不睡即离床；疗效: 单独疗效中等，联合效果显著；难度:
    中；专业洞察: CBT-I最关键组件，效应量d=0.5-0.7'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_CBT.md
  section: CBT-I核心组件表 (Core Components)
- type: concept
  question: 睡眠限制疗法的核心要点是什么？
  answer: '英文名: Sleep Restriction Therapy (SRT)；理论基础: 双过程睡眠调节模型(Borbély)；核心机制: 限制在床时间提升睡眠驱动力(Process S)；实施要点: 根据睡眠效率动态调整在床时间；疗效:
    效果最快(2-4周)，但依从性挑战大；难度: 高；专业洞察: 最强效但最艰难的技术，效应量d=0.6-0.8'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_CBT.md
  section: CBT-I核心组件表 (Core Components)
- type: concept
  question: 认知重构的核心要点是什么？
  answer: '英文名: Cognitive Restructuring；理论基础: 认知行为理论(Beck)；核心机制: 识别并挑战关于睡眠的非理性信念；实施要点: 灾难化思维替换为现实评估；疗效: 中等，减少睡眠焦虑；难度: 中；专业洞察:
    改变"必须睡8小时"等认知偏差'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_CBT.md
  section: CBT-I核心组件表 (Core Components)
- type: concept
  question: 规则1的核心要点是什么？
  answer: '核心规则: 仅在困倦时上床；英文表述: Go to bed only when sleepy；理论依据: 避免在床上清醒等待；操作细节: 区分疲劳(Tired)与困倦(Sleepy)，困倦标志：打哈欠、眼皮沉重；常见违反:
    固定时间上床但不困；纠正策略: 晚15-30分钟上床；专业洞察: 困倦≠疲劳，睡眠驱动力的识别是关键'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_CBT.md
  section: 刺激控制疗法详细规则表 (Stimulus Control Rules)
- type: concept
  question: 规则2的核心要点是什么？
  answer: '核心规则: 床仅用于睡眠与性；英文表述: Use bed only for sleep and sex；理论依据: 切断床与非睡眠活动的联系；操作细节: 禁止在床上看书、看手机、工作、吃东西；常见违反: 睡前看手机；纠正策略:
    建立床外阅读区；专业洞察: 床=睡眠的强关联是核心'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_CBT.md
  section: 刺激控制疗法详细规则表 (Stimulus Control Rules)
- type: concept
  question: 规则3的核心要点是什么？
  answer: '核心规则: 20分钟不睡立即离床；英文表述: Leave bed if not asleep in 20min；理论依据: 防止床与清醒状态关联强化；操作细节: 不看钟（估计即可），起身做安静活动；常见违反: 躺床上"努力入睡"；纠正策略:
    坐椅上读枯燥书；专业洞察: "20分钟"非严格，以感觉为准'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_CBT.md
  section: 刺激控制疗法详细规则表 (Stimulus Control Rules)
- type: concept
  question: 1. 基线评估的核心要点是什么？
  answer: '步骤: 睡眠日记；时间点: 第1-2周；操作内容: 记录7-14天实际总睡眠时间(TST)与在床时间(TIB)；计算公式: 计算平均TST；调整标准: -；注意事项: 如实记录，不理想化；专业洞察: 建立个体化基线数据'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_CBT.md
  section: 睡眠限制疗法操作流程表 (Sleep Restriction Protocol)
- type: concept
  question: 2. 初始时间窗设定的核心要点是什么？
  answer: '步骤: 计算睡眠窗；时间点: 第3周开始；操作内容: TIB=平均TST+30分钟（但不少于5小时）；计算公式: 示例：TST 5.5h → TIB 6h；调整标准: 最低5h保证安全；注意事项: 计算要准确；专业洞察:
    核心是压缩在床时间'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_CBT.md
  section: 睡眠限制疗法操作流程表 (Sleep Restriction Protocol)
- type: concept
  question: 儿童(6-12岁)的核心要点是什么？
  answer: '特点: 发育期，神经可塑性强；常见原因: 行为性失眠、焦虑、ADHD；治疗调整: 睡眠卫生、行为疗法、家长培训；禁忌: 避免药物，特别BZDs；疗效预期: 75%改善；专业建议: 建立规律作息最关键'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_Clinical.md
  section: 特殊人群失眠管理表 (Special Populations)
- type: concept
  question: 青少年(13-17岁)的核心要点是什么？
  answer: '特点: 生物钟后移，学业压力；常见原因: 昼夜节律后移、压力、电子设备；治疗调整: CBT-I、晨光疗法、限制屏幕时间；禁忌: 谨慎使用药物；疗效预期: 65%改善；专业建议: 周末睡眠补偿加重问题'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_Clinical.md
  section: 特殊人群失眠管理表 (Special Populations)
- type: concept
  question: 孕妇的核心要点是什么？
  answer: '特点: 激素变化，躯体不适；常见原因: 孕激素、尿频、不安腿综合征；治疗调整: 左侧卧位、孕妇枕、CBT-I；禁忌: 禁用BZDs、Z-drugs；疗效预期: 50%改善；专业建议: 孕晚期失眠最常见'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_Clinical.md
  section: 特殊人群失眠管理表 (Special Populations)
- type: concept
  question: 抑郁症的核心要点是什么？
  answer: '失眠特点: 早醒、睡眠维持困难；双向关系: 失眠↑抑郁风险2-3倍<br>抑郁↑失眠80%；治疗原则: 同时治疗失眠与抑郁；一线治疗: SSRI+CBT-I；特殊考虑: 治疗失眠降低抑郁复发率；循证等级: A级；专业洞察:
    失眠是抑郁核心症状与预测因子'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_Clinical.md
  section: 共病失眠临床管理表 (Comorbid Insomnia Management)
- type: concept
  question: 焦虑障碍的核心要点是什么？
  answer: '失眠特点: 入睡困难、过度警觉；双向关系: 失眠↑焦虑1.5-2倍<br>焦虑↑失眠50-70%；治疗原则: 降低过度警觉；一线治疗: CBT-I+MBCT或ACT；特殊考虑: 认知重构+正念接纳；循证等级: A级；专业洞察:
    过度警觉是共同病理通路'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_Clinical.md
  section: 共病失眠临床管理表 (Comorbid Insomnia Management)
- type: concept
  question: PTSD的核心要点是什么？
  answer: '失眠特点: 噩梦、频繁觉醒；双向关系: 失眠维持PTSD症状；治疗原则: 创伤处理+睡眠改善；一线治疗: EMDR/PE+CBT-I+意象重演(IRT)；特殊考虑: 噩梦需IRT专门治疗；循证等级: B级；专业洞察: 睡眠是创伤整合关键时期'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_Clinical.md
  section: 共病失眠临床管理表 (Comorbid Insomnia Management)
- type: concept
  question: 1. 初步筛查的核心要点是什么？
  answer: '临床任务: 识别失眠症状；关键决策点: 是否符合DSM-5失眠障碍标准？；推荐工具: ISI筛查(≥8分)；分流路径: 是→步骤2<br>否→睡眠卫生教育；时间节点: 首次就诊；专业建议: 所有就诊者常规筛查失眠'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_Clinical.md
  section: 失眠治疗流程与决策树表 (Treatment Algorithm)
- type: concept
  question: 2. 全面评估的核心要点是什么？
  answer: '临床任务: 排除其它睡眠障碍与共病；关键决策点: OSA？RLS？共病精神障碍？；推荐工具: 睡眠日记、PSQI、ESS、抑郁/焦虑筛查；分流路径: OSA疑似→PSG<br>精神障碍→精神科协诊<br>单纯失眠→步骤3；时间节点:
    第1-2周；专业建议: 共病识别是治疗成功关键'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_Clinical.md
  section: 失眠治疗流程与决策树表 (Treatment Algorithm)
- type: concept
  question: 苯二氮䓬类(BZDs)的核心要点是什么？
  answer: '代表药物: 安定、劳拉西泮；作用机制: GABA-A受体激动；起效时间: 15-30分钟；剂量: 2.5-10mg；适应症: 短期急性失眠；优势: 快速有效；副作用: 认知损害、跌倒、宿醉；依赖性: 高；专业评价: 不推荐长期，老年人禁忌'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_Interventions.md
  section: 失眠药物治疗详表 (Pharmacological Treatments)
- type: concept
  question: Z-drugs的核心要点是什么？
  answer: '代表药物: 唑吡坦、佐匹克隆；作用机制: 选择性GABA-A受体激动；起效时间: 15-30分钟；剂量: 5-10mg；适应症: 入睡困难；优势: 较BZDs依赖性低；副作用: 复杂睡眠行为、宿醉；依赖性: 中；专业评价:
    短期使用<4周'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_Interventions.md
  section: 失眠药物治疗详表 (Pharmacological Treatments)
- type: concept
  question: 褪黑素受体激动剂的核心要点是什么？
  answer: '代表药物: Ramelteon；作用机制: MT1/MT2受体激动；起效时间: 30分钟；剂量: 8mg；适应症: 入睡困难，昼夜节律障碍；优势: 无依赖性；副作用: 头晕、疲劳；依赖性: 无；专业评价: 适用老年人、长期使用安全'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_Interventions.md
  section: 失眠药物治疗详表 (Pharmacological Treatments)
- type: concept
  question: 晨光疗法的核心要点是什么？
  answer: '内容: 早晨明亮光照；英文名: Bright Light Therapy (BLT)；参数设置: 10,000 lux, 30-60分钟；使用时机: 起床后1小时内；适应症: 入睡困难、昼夜节律后移、季节性抑郁；机制: 抑制褪黑素、前移生物钟；循证等级:
    A级；专业洞察: 结合固定起床时间效果最佳'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_Interventions.md
  section: 光疗法详表 (Light Therapy)
- type: concept
  question: 傍晚光照避免的核心要点是什么？
  answer: '内容: 睡前避免蓝光；英文名: Blue Light Avoidance；参数设置: <10 lux, 睡前2-3小时；使用时机: 傍晚至睡前；适应症: 所有失眠类型；机制: 保护褪黑素分泌；循证等级: A级；专业洞察:
    电子设备蓝光是现代失眠主因'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_Interventions.md
  section: 光疗法详表 (Light Therapy)
- type: concept
  question: 光照强度的核心要点是什么？
  answer: '内容: 照度标准；英文名: Illuminance；参数设置: 室内<200 lux，室外>1,000 lux；使用时机: 依时段；适应症: -；机制: 昼夜对比调节SCN；循证等级: B级；专业洞察: 光照对比度比绝对强度更重要'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_Interventions.md
  section: 光疗法详表 (Light Therapy)
- type: concept
  question: 正念减压(MBSR)的核心要点是什么？
  answer: '英文名: Mindfulness-Based Stress Reduction；梵语术语: *Sati* (念)；核心技术: 身体扫描、正念呼吸、正念冥想；疗程: 8周，每周2.5小时；失眠应用机制: 降低过度警觉，接纳失眠体验；疗效:
    ISI降低6-8分；循证等级: B级；专业洞察: 通用正念技术，效果中等'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_Interventions.md
  section: 正念与冥想疗法详表 (Mindfulness & Meditation)
- type: concept
  question: 正念认知疗法(MBCT)的核心要点是什么？
  answer: '英文名: Mindfulness-Based Cognitive Therapy；梵语术语: *Vipassanā* (观)；核心技术: 正念+认知重构；疗程: 8周，每周2小时；失眠应用机制: 切断失眠-焦虑恶性循环；疗效:
    ISI降低7-9分；循证等级: B级；专业洞察: 特别适用焦虑伴发失眠'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_Interventions.md
  section: 正念与冥想疗法详表 (Mindfulness & Meditation)
- type: concept
  question: 失眠障碍的核心要点是什么？
  answer: '英文名 (English Term): Insomnia Disorder；原始语言/术语 (Original Language): 拉: *Insomnia* (无法入睡)；精确定义: 持续性入睡困难、睡眠维持困难或早醒，伴日间功能损害，每周至少3次，持续3月以上；区分与备注:
    不同于偶发性睡眠不足或睡眠剥夺；专业视角 (Professional Perspective): 失眠是症状也是独立障碍，需区分原发性与继发性'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_Overview.md
  section: 核心术语与定义表 (Core Terminology)
- type: concept
  question: 睡眠卫生的核心要点是什么？
  answer: '英文名 (English Term): Sleep Hygiene；原始语言/术语 (Original Language): 希: *Hygieia* (健康女神)；精确定义: 促进良好睡眠的行为与环境习惯的集合；区分与备注:
    基础但非充分条件，单独疗效有限；专业视角 (Professional Perspective): 睡眠卫生是CBT-I的必要基础但非核心'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_Overview.md
  section: 核心术语与定义表 (Core Terminology)
- type: concept
  question: 睡眠效率的核心要点是什么？
  answer: '英文名 (English Term): Sleep Efficiency (SE)；原始语言/术语 (Original Language): 英: *Efficiency*；精确定义: 实际睡眠时间/在床时间×100%，正常值>85%；区分与备注:
    核心睡眠评估指标；专业视角 (Professional Perspective): SE低于80%是慢性失眠的标志性特征'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_Overview.md
  section: 核心术语与定义表 (Core Terminology)
- type: concept
  question: 按病程的核心要点是什么？
  answer: '类型名称: 短期失眠；英文名: Short-term Insomnia；诊断标准: <3个月，常有明确诱因；流行率: 15-20%；典型人群: 应激事件后；专业洞察: 多可自然缓解，预防是关键'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_Overview.md
  section: 失眠分类体系表 (Insomnia Classification)
- type: concept
  question: 按病程的核心要点是什么？
  answer: '类型名称: 慢性失眠；英文名: Chronic Insomnia Disorder；诊断标准: ≥3个月，≥3次/周，伴日间损害；流行率: 10-15%；典型人群: 中老年、焦虑者；专业洞察: 需积极干预，自然缓解率<20%'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_Overview.md
  section: 失眠分类体系表 (Insomnia Classification)
- type: concept
  question: 按病因的核心要点是什么？
  answer: '类型名称: 原发性失眠；英文名: Primary Insomnia；诊断标准: 无可识别的躯体或精神疾病；流行率: 25-30%失眠；典型人群: 过度警觉体质；专业洞察: 现代倾向不再强调原发/继发区分'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_Overview.md
  section: 失眠分类体系表 (Insomnia Classification)
- type: concept
  question: HPA轴过度激活的核心要点是什么？
  answer: '英文名: HPA Axis Hyperactivation；神经生物学基础: 皮质醇分泌昼夜节律紊乱，24小时皮质醇升高；测量指标: 唾液皮质醇、ACTH；临床表现: 日间疲劳但"累而不困"；治疗靶点: 放松训练、正念；专业洞察:
    失眠者皮质醇觉醒反应(CAR)升高50%'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_Overview.md
  section: 失眠病理生理学表 (Pathophysiology)
- type: concept
  question: 交感神经激活的核心要点是什么？
  answer: '英文名: Sympathetic Overactivity；神经生物学基础: 心率变异性(HRV)降低，皮肤电反应增强；测量指标: HRV、心率、血压；临床表现: 心悸、躁动；治疗靶点: 生物反馈、迷走神经刺激；专业洞察:
    失眠者睡眠中心率高10-15次/分'
  source: 02-Mind-Psychology/psychology/somatic-body/sleep/Sleep_Insomnia_Overview.md
  section: 失眠病理生理学表 (Pathophysiology)
- type: concept
