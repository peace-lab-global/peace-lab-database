- type: concept
  question: 什么是1.1 ICD-11 官方定义？
  answer: '**WHO ICD-11 (QD85) 原文**：

    > "Burn-out is a syndrome conceptualized as resulting from chronic workplace stress that has not been successfully managed.
    It is characterized by three dimensions:"'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/01-Definition-and-Model.md
  section: 1.1 ICD-11 官方定义
- type: concept
  question: ① 能量耗竭的核心要点是什么？
  answer: 'ICD-11 英文表述: feelings of energy depletion or exhaustion；中文精译: 能量枯竭或精疲力竭感；日常体验描述: "早上起床就觉得被卡车碾过""下班后连说话的力气都没有"'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/01-Definition-and-Model.md
  section: 1.1 ICD-11 官方定义
- type: concept
  question: ② 心理距离的核心要点是什么？
  answer: 'ICD-11 英文表述: increased mental distance from one''s job, or feelings of negativism or cynicism related to one''s
    job；中文精译: 与工作的心理距离增大，或对工作产生消极/犬儒态度；日常体验描述: "我以前热爱这份工作，现在只是混日子""看到客户的邮件就本能地厌恶"'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/01-Definition-and-Model.md
  section: 1.1 ICD-11 官方定义
- type: concept
  question: ③ 职业效能降低的核心要点是什么？
  answer: 'ICD-11 英文表述: reduced professional efficacy；中文精译: 职业效能感降低；日常体验描述: "我做什么都没用""换个人来做肯定比我好"'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/01-Definition-and-Model.md
  section: 1.1 ICD-11 官方定义
- type: concept
  question: 什么是1.2 Maslach 职业倦怠量表（MBI）三维度模型？
  answer: Christina Maslach 与 Susan Jackson 于 1981 年开发的 MBI 是倦怠研究中使用最广泛的测量工具，其理论框架至今仍是临床评估的基石。
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/01-Definition-and-Model.md
  section: 1.2 Maslach 职业倦怠量表（MBI）三维度模型
- type: concept
  question: 情绪耗竭（EE）的核心要点是什么？
  answer: '核心特征: 情感资源被耗尽，无法再给予他人或工作任何情感投入；身体极度疲惫；发展时序: **最早出现**，是倦怠的"入口"；正念干预靶点: 呼吸调控、身体扫描、能量觉察、 grounding、自我慈悲'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/01-Definition-and-Model.md
  section: 1.2.1 维度详解与正念干预靶点
- type: concept
  question: 去人格化（DP）的核心要点是什么？
  answer: '核心特征: 对工作对象、同事或工作本身产生冷漠、疏离、物化的态度；讽刺、玩世不恭；发展时序: **中期发展**，是耗竭的"心理防御"；正念干预靶点: 慈心冥想、关系正念、工作意义重建、情绪劳动觉察'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/01-Definition-and-Model.md
  section: 1.2.1 维度详解与正念干预靶点
- type: concept
  question: 低个人成就感（PA）的核心要点是什么？
  answer: '核心特征: 对自身工作能力和贡献价值的消极评价；感觉 incompetent；发展时序: **晚期出现**，是前两个维度的"认知后果"；正念干预靶点: 价值澄清、优势识别、小胜记录、成长型思维正念'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/01-Definition-and-Model.md
  section: 1.2.1 维度详解与正念干预靶点
- type: concept
  question: 急性高负荷期的核心要点是什么？
  answer: '皮质醇模式: 全天皮质醇升高，晨峰极高；临床表现: 亢奋、失眠、焦虑、易怒；正念干预靶点: 呼气延长呼吸、共振呼吸降低 HPA 轴激活'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/02-Neurobiology-and-Stress.md
  section: 2.1.1 HPA 轴功能失调
- type: concept
  question: 慢性耗竭期的核心要点是什么？
  answer: '皮质醇模式: 晨峰消失，全天平坦或低下；临床表现: 疲劳、动力丧失、认知迟钝；正念干预靶点: 光照疗法（恢复晨峰）+ 温和身体扫描'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/02-Neurobiology-and-Stress.md
  section: 2.1.1 HPA 轴功能失调
- type: concept
  question: 恢复过渡期的核心要点是什么？
  answer: '皮质醇模式: 波动不稳，偶发峰值；临床表现: 情绪不稳定、易崩溃；正念干预靶点: 规律作息 + grounding + 渐进负荷'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/02-Neurobiology-and-Stress.md
  section: 2.1.1 HPA 轴功能失调
- type: concept
  question: 背外侧前额叶皮层（dlPFC）的核心要点是什么？
  answer: '正常功能: 执行功能、工作记忆、认知控制；倦怠中的改变: 葡萄糖代谢降低；灰质密度减少；行为表现: 决策困难、注意力分散、计划能力下降'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/02-Neurobiology-and-Stress.md
  section: 2.2.1 前额叶皮层功能下降
- type: concept
  question: 前扣带皮层（ACC）的核心要点是什么？
  answer: '正常功能: 冲突监测、情绪调节、错误检测；倦怠中的改变: 激活降低，与杏仁核连接减弱；行为表现: 对错误的过度敏感或完全麻木；情绪调节失效'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/02-Neurobiology-and-Stress.md
  section: 2.2.1 前额叶皮层功能下降
- type: concept
  question: 眶额皮层（OFC）的核心要点是什么？
  answer: '正常功能: 奖赏加工、价值评估；倦怠中的改变: 对自然奖赏的反应降低；行为表现: 工作不再有成就感；连爱好也提不起兴趣'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/02-Neurobiology-and-Stress.md
  section: 2.2.1 前额叶皮层功能下降
- type: concept
  question: 健康休息的核心要点是什么？
  answer: 'DMN 活动: 适度活跃，可被任务网络抑制；与倦怠的关联: —'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/02-Neurobiology-and-Stress.md
  section: 2.2.2 默认模式网络（DMN）的过度活跃
- type: concept
  question: 工作反刍的核心要点是什么？
  answer: 'DMN 活动: 过度活跃，无法被抑制；与倦怠的关联: 下班后大脑仍在"工作"，无法恢复'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/02-Neurobiology-and-Stress.md
  section: 2.2.2 默认模式网络（DMN）的过度活跃
- type: concept
  question: 什么是3.5 正念干预的"剂量-反应"关系？
  answer: '**关键原则**：

    > 对倦怠者而言，**一致性 > 强度**。每天 10 分钟的规律练习 > 每周一次 1 小时的突击练习。因为倦怠的核心是"能量管理"，而非"意志力挑战"。'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/03-Mindfulness-Mechanisms.md
  section: 3.5 正念干预的"剂量-反应"关系
- type: concept
  question: 微剂量的核心要点是什么？
  answer: '形式: 工作中的 STOP、呼吸、 grounding；频率: 每日数次；适用倦怠阶段: 预防期/轻度；预期效果时间: 数分钟至数小时'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/03-Mindfulness-Mechanisms.md
  section: 3.5 正念干预的"剂量-反应"关系
- type: concept
  question: 低剂量的核心要点是什么？
  answer: '形式: 每日10-15分钟正式练习；频率: 每日1次；适用倦怠阶段: 轻度/中度；预期效果时间: 2-4周'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/03-Mindfulness-Mechanisms.md
  section: 3.5 正念干预的"剂量-反应"关系
- type: concept
  question: 中剂量的核心要点是什么？
  answer: '形式: MBSR/MBCT 标准课程；频率: 每周1次团体+每日练习；适用倦怠阶段: 中度；预期效果时间: 4-8周'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/03-Mindfulness-Mechanisms.md
  section: 3.5 正念干预的"剂量-反应"关系
- type: concept
  question: 什么是4.1 关键荟萃分析与系统综述？
  answer: '**核心结论**：

    1. 正念干预对倦怠的效应量为**中小到中等**（d = 0.30-0.55），与 CBT 相当。

    2. **MBSR** 对**情绪耗竭（EE）**效果最强。

    3. **ACT** 对**去人格化/犬儒（DP）**和**意义感恢复**效果突出。

    4. **MSC（正念自我慈悲）** 对**助人行业的同情疲劳**有独特优势。

    5. 效果通常在干预结束后**维持 3-6 个月**，长期维持需持续练习。'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/04-Evidence-Based-Interventions.md
  section: 4.1 关键荟萃分析与系统综述
- type: concept
  question: Luken & Sammons (2016）的核心要点是什么？
  answer: '设计: 元分析, 13项RCT；样本/情境: 医护人员为主；结论: 正念干预显著降低情绪耗竭（EE）和个人苦恼；效应量: d = 0.38-0.52'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/04-Evidence-Based-Interventions.md
  section: 4.1 关键荟萃分析与系统综述
- type: concept
  question: Spinelli & Wisener（2021）的核心要点是什么？
  answer: '设计: 系统综述, 29项研究；样本/情境: 多职业领域；结论: MBSR 和 ACT 对倦怠三维度均有改善；MBSR 对 EE 最强，ACT 对犬儒最强；效应量: —'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/04-Evidence-Based-Interventions.md
  section: 4.1 关键荟萃分析与系统综述
- type: concept
  question: Dreison et al.（2018）的核心要点是什么？
  answer: '设计: 元分析, 27项RCT；样本/情境: 一般工作人群；结论: 以工作为中心的干预（含正念）显著降低倦怠；效应量: g = 0.29'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/04-Evidence-Based-Interventions.md
  section: 4.1 关键荟萃分析与系统综述
- type: concept
  question: 8周课程，每周2.5小时的核心要点是什么？
  answer: '倦怠适配调整: 可缩短为 6 周，每周 1.5-2 小时；理由: 倦怠者时间/精力有限；过长课程增加负担'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/04-Evidence-Based-Interventions.md
  section: 4.2.1 标准 MBSR 的倦怠适配
- type: concept
  question: 一日静默 retreat（6小时）的核心要点是什么？
  answer: '倦怠适配调整: 缩短为半日（3小时）或完全静默的 2 小时；理由: 重度倦怠者可能对长时间静默感到焦虑或反刍加剧'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/04-Evidence-Based-Interventions.md
  section: 4.2.1 标准 MBSR 的倦怠适配
- type: concept
  question: 身体扫描（45分钟）的核心要点是什么？
  answer: '倦怠适配调整: 提供 20 分钟和 45 分钟两个版本；理由: 让患者根据当天能量选择'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/04-Evidence-Based-Interventions.md
  section: 4.2.1 标准 MBSR 的倦怠适配
- type: concept
  question: 什么是4.3 ACT 在职业倦怠中的应用？
  answer: ACT（接纳承诺疗法）对倦怠有独特的理论优势——它直接针对"价值-行动脱节"这一倦怠核心。
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/04-Evidence-Based-Interventions.md
  section: 4.3 ACT 在职业倦怠中的应用
- type: concept
  question: 什么是5.1 工作日微恢复工具（Micro-Recovery）？
  answer: 微恢复是指在工作日中插入的极短恢复活动（1-5分钟），防止能量持续透支。Trougakos et al.（2014）的研究表明，午餐后的微恢复活动可显著降低下午的疲劳感。
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/05-Emotional-Exhaustion-Toolkit.md
  section: 5.1 工作日微恢复工具（Micro-Recovery）
- type: concept
  question: 3次呼吸重置的核心要点是什么？
  answer: '时长: 30秒；操作步骤: 鼻吸3秒→呼气5秒，重复3次；感受肩膀下沉；最佳时机: 会议间隙、收到压力邮件后'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/05-Emotional-Exhaustion-Toolkit.md
  section: 5.1.1 呼吸锚定系列
- type: concept
  question: STOP 工作版的核心要点是什么？
  answer: '时长: 1分钟；操作步骤: S(停下手头事)→T(深呼吸1次)→O(扫描身体-情绪-想法)→P(选择下一步)；最佳时机: 情绪升级前、任务切换时'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/05-Emotional-Exhaustion-Toolkit.md
  section: 5.1.1 呼吸锚定系列
- type: concept
  question: 箱式呼吸的核心要点是什么？
  answer: '时长: 2分钟；操作步骤: 吸4秒→屏4秒→呼4秒→空肺4秒，重复8次；最佳时机: 需要保持清醒专注时（如汇报前）'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/05-Emotional-Exhaustion-Toolkit.md
  section: 5.1.1 呼吸锚定系列
- type: concept
  question: 脚底接地的核心要点是什么？
  answer: '时长: 1分钟；操作步骤: 站立，双脚与肩同宽，感受脚底与地面的全部接触面；微屈膝，感受重量转移；最佳时机: 久坐后、焦虑时'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/05-Emotional-Exhaustion-Toolkit.md
  section: 5.1.2 身体 grounding 系列
- type: concept
  question: 手掌按压的核心要点是什么？
  answer: '时长: 30秒；操作步骤: 双手用力互压，或按压桌面，感受肌肉张力和反作用力；最佳时机: 打字/写字后'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/05-Emotional-Exhaustion-Toolkit.md
  section: 5.1.2 身体 grounding 系列
- type: concept
  question: 肩颈释放的核心要点是什么？
  answer: '时长: 2分钟；操作步骤: 双肩耸起→保持5秒→猛然放下；配合呼气发出"哈"声；重复3次；最佳时机: 长时间伏案后'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/05-Emotional-Exhaustion-Toolkit.md
  section: 5.1.2 身体 grounding 系列
- type: concept
  question: 窗外凝视的核心要点是什么？
  answer: '时长: 2分钟；操作步骤: 看向窗外最远处的物体，缓慢眨眼；让视线"休息"在远处；最佳时机: 长时间屏幕工作后'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/05-Emotional-Exhaustion-Toolkit.md
  section: 5.1.3 感官转移系列
- type: concept
  question: 什么是6.3 慈心冥想（Metta）倦怠专用版？
  answer: 标准慈心冥想从"自己"开始，然后扩展。但对严重去人格化的倦怠者，**从"恩人"开始可能更容易**——先激活温暖感，再转向自己，最后转向困难者。
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/06-Depersonalization-Transformation.md
  section: 6.3 慈心冥想（Metta）倦怠专用版
- type: concept
  question: 触觉慈心的核心要点是什么？
  answer: '适用情境: 情感麻木严重；操作要点: 蝴蝶拍 + "愿我平安"；触觉先于语言'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/06-Depersonalization-Transformation.md
  section: 6.3.2 慈心冥想的变体
- type: concept
  question: 书写慈心的核心要点是什么？
  answer: '适用情境: 反刍型思维；操作要点: 在纸上写祝福语，不发送；书写过程即疗愈'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/06-Depersonalization-Transformation.md
  section: 6.3.2 慈心冥想的变体
- type: concept
  question: 什么是6.5 犬儒主义的正念转化？
  answer: 犬儒主义（Cynicism）是对工作意义和价值的深层质疑——"一切都是虚伪的/无意义的/被操纵的"。
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/06-Depersonalization-Transformation.md
  section: 6.5 犬儒主义的正念转化
- type: concept
  question: 我失败了。"的核心要点是什么？
  answer: '成长型（正念重构）: "我注意到这个结果不符合我的期待。这是一个学习的数据点。"'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/07-Personal-Efficacy-Recovery.md
  section: 7.4.2 正念化的成长型语句
- type: concept
  question: 我不擅长公开演讲。"的核心要点是什么？
  answer: '成长型（正念重构）: "我注意到公开演讲让我紧张。每一次练习，我的神经系统都在适应。"'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/07-Personal-Efficacy-Recovery.md
  section: 7.4.2 正念化的成长型语句
- type: concept
  question: 这个反馈说明我很差。"的核心要点是什么？
  answer: '成长型（正念重构）: "我收到了反馈。反馈是关于我的行为，不是关于我的全部。"'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/07-Personal-Efficacy-Recovery.md
  section: 7.4.2 正念化的成长型语句
- type: concept
  question: 生死责任的核心要点是什么？
  answer: '具体表现: 决策直接影响患者生死；医疗差错的文化是"问责"而非"学习"'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/08-High-Risk-Professions.md
  section: 8.1.1 特殊性
- type: concept
  question: 情绪劳动极端的核心要点是什么？
  answer: '具体表现: 面对痛苦、死亡、家属崩溃；需要"专业冷静"与"人性温暖"的平衡'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/08-High-Risk-Professions.md
  section: 8.1.1 特殊性
- type: concept
  question: 交接班前的核心要点是什么？
  answer: '正念工具: 3分钟呼吸空间 + 意图设定；操作要点: "我现在放下上一班的事情，准备迎接新的责任"'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/08-High-Risk-Professions.md
  section: 8.1.2 正念适配方案
- type: concept
  question: 查房/问诊中的核心要点是什么？
  answer: '正念工具: 短暂目光接触正念；操作要点: 每位患者互动前，1次呼吸，提醒自己"这是一个完整的人"'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/08-High-Risk-Professions.md
  section: 8.1.2 正念适配方案
- type: concept
  question: ' witnessing 死亡后的核心要点是什么？'
  answer: '正念工具: 慈心冥想（对患者+对自己）；操作要点: "愿TA安详。愿我有力量继续。愿我被 replenished。"'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/08-High-Risk-Professions.md
  section: 8.1.2 正念适配方案
- type: concept
  question: 角色过载的核心要点是什么？
  answer: '具体表现: 不仅是知识传授者，还是辅导员、纪律管理者、家长沟通者'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/08-High-Risk-Professions.md
  section: 8.2.1 特殊性
- type: concept
  question: 什么是9.1 个体正念 vs 组织改变的协同模型？
  answer: '**核心原则**：

    > 个体正念是"在无法改变环境时，改变自己与环境的接口"。它不能替代组织层面的健康措施，但可以让个体在不良环境中保持更长时间的功能，并在组织改善时更快地恢复。'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/09-Organization-Integration.md
  section: 9.1 个体正念 vs 组织改变的协同模型
- type: concept
  question: 什么是9.2 正念化的工作再设计（Job Crafting）？
  answer: Job Crafting 是员工主动调整工作任务、关系和认知边界的过程。正念可以增强 Job Crafting 的质量和效果。
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/09-Organization-Integration.md
  section: 9.2 正念化的工作再设计（Job Crafting）
- type: concept
  question: 增加有挑战性的任务的核心要点是什么？
  answer: '正念元素: 意图设定："我选择这个挑战，因为它符合我成长的价值"；示例: 主动申请一个新项目，而非被动等待分配'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/09-Organization-Integration.md
  section: 9.2.1 任务再设计 × 正念
- type: concept
  question: 减少耗竭性任务的核心要点是什么？
  answer: '正念元素: 觉察："这个任务消耗多少能量？是否必须我做？"；示例: 将部分行政工作委托给助理或自动化工具'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/09-Organization-Integration.md
  section: 9.2.1 任务再设计 × 正念
- type: concept
  question: 改变任务顺序的核心要点是什么？
  answer: '正念元素: 能量觉察："何时我的能量最高？"；示例: 将创造性工作放在上午，行政工作放在下午'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/09-Organization-Integration.md
  section: 9.2.1 任务再设计 × 正念
- type: concept
  question: 增加积极互动的核心要点是什么？
  answer: '正念元素: 慈心冥想 + 目光接触正念；示例: 每天主动与一位同事进行1分钟非工作对话'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/09-Organization-Integration.md
  section: 9.2.2 关系再设计 × 正念
- type: concept
  question: 减少毒性互动的核心要点是什么？
  answer: '正念元素: 认知解离 + 边界设定；示例: 对消极同事，保持礼貌但不过度卷入；使用"我现在需要集中精力"'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/09-Organization-Integration.md
  section: 9.2.2 关系再设计 × 正念
- type: concept
  question: 寻求导师/支持者的核心要点是什么？
  answer: '正念元素: 共同 humanity；示例: 识别一位可以倾诉的前辈；建立定期咖啡时间'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/09-Organization-Integration.md
  section: 9.2.2 关系再设计 × 正念
- type: concept
  question: 引导冥想 APP的核心要点是什么？
  answer: '代表产品: Headspace, Calm, Insight Timer, 小睡眠；核心功能: 音频引导、计时器、进度追踪；倦怠适配: 微恢复、睡眠辅助、通勤正念；证据等级: B；优势: 随时可用、低成本、可重复；局限:
    依从性低、质量参差'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/10-Digital-and-Remote.md
  section: 10.1 数字正念工具全景
- type: concept
  question: HRV 生物反馈的核心要点是什么？
  answer: '代表产品: EliteHRV, Kubios, Oura Ring, Apple Watch；核心功能: 实时 HRV 监测 + 呼吸反馈；倦怠适配: 共振呼吸训练、恢复监测；证据等级: B；优势: 客观数据、连续监测；局限:
    可能增加焦虑、设备成本'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/10-Digital-and-Remote.md
  section: 10.1 数字正念工具全景
- type: concept
  question: 在线正念课程的核心要点是什么？
  answer: '代表产品: Mindfulness Based Cognitive Therapy Online, 暂停实验室；核心功能: 结构化课程、作业、社区；倦怠适配: 标准 MBSR/MBCT 的远程替代；证据等级: A；优势:
    标准化、可扩展、匿名性；局限: 缺乏人际温度'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/10-Digital-and-Remote.md
  section: 10.1 数字正念工具全景
- type: concept
  question: 预防期的核心要点是什么？
  answer: '首选工具: 每日微正念 APP（Headspace/Calm）；辅助工具: HRV 监测；避免: 过度复杂的工具'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/10-Digital-and-Remote.md
  section: 10.2.1 按倦怠阶段选择
- type: concept
  question: 轻度倦怠的核心要点是什么？
  answer: '首选工具: 在线 MBSR 课程 + HRV 生物反馈；辅助工具: 情绪追踪日记 APP；避免: 纯自助（需一定人际支持）'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/10-Digital-and-Remote.md
  section: 10.2.1 按倦怠阶段选择
- type: concept
  question: 中度倦怠的核心要点是什么？
  answer: '首选工具: 同步视频正念团体 + AI 助手；辅助工具: 睡眠追踪；避免: 异步录播（依从性不足）'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/10-Digital-and-Remote.md
  section: 10.2.1 按倦怠阶段选择
- type: concept
  question: 医护人员的核心要点是什么？
  answer: '推荐工具组合: 短音频微正念（3-10分钟）+ 智能手表呼吸提醒；使用场景: 交接班间隙、夜班休息室、通勤'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/10-Digital-and-Remote.md
  section: 10.2.2 按职业场景选择
- type: concept
  question: 教师的核心要点是什么？
  answer: '推荐工具组合: 在线 MSC 课程 + 课堂管理 APP；使用场景: 课后恢复、寒暑假深化'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/10-Digital-and-Remote.md
  section: 10.2.2 按职业场景选择
- type: concept
  question: 试用1的核心要点是什么？
  answer: '时长: 第1-2周；工作量: 25-50%；工作内容: 低压力、高熟悉度的任务；正念支持: 每日2次微恢复；下班严格仪式'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/11-Recovery-and-Relapse-Prevention.md
  section: 11.2.1 渐进式复工
- type: concept
  question: 试用2的核心要点是什么？
  answer: '时长: 第3-4周；工作量: 50-75%；工作内容: 逐步增加复杂度；正念支持: 每日1次正式练习（15分钟）'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/11-Recovery-and-Relapse-Prevention.md
  section: 11.2.1 渐进式复工
- type: concept
  question: 过渡的核心要点是什么？
  answer: '时长: 第2-3月；工作量: 75-100%；工作内容: 接近正常，但保留20%缓冲；正念支持: 维持每日练习；每周1次团体'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/11-Recovery-and-Relapse-Prevention.md
  section: 11.2.1 渐进式复工
- type: concept
  question: 3-6个月的核心要点是什么？
  answer: '每日练习: 15-20分钟正式练习；每周练习: 1次团体/同伴练习；每月/季度: —'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/11-Recovery-and-Relapse-Prevention.md
  section: 11.4.1 维持期正念剂量
- type: concept
  question: 6-12个月的核心要点是什么？
  answer: '每日练习: 10-15分钟正式练习；每周练习: 1次团体；每月/季度: 1次督导/咨询'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/11-Recovery-and-Relapse-Prevention.md
  section: 11.4.1 维持期正念剂量
- type: concept
  question: 1-2年的核心要点是什么？
  answer: '每日练习: 5-10分钟正式练习 + 微练习；每周练习: 按需；每月/季度: 1次 retreat'
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/11-Recovery-and-Relapse-Prevention.md
  section: 11.4.1 维持期正念剂量
