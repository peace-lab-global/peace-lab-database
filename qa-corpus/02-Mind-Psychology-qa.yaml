  question: 第1层的核心要点是什么？
  answer: '中文名称: 行为；英文名称: Behavior；位置: 水面以上（可见）；定义: 外在可观察的言行、表情、动作；探索问题: "你做了什么？别人看到什么？"；专业视角 (Professional Perspective):
    这是他人可见的部分，但只是冰山一角'
