- type: concept
  question: 基础觉知即疗愈的核心要点是什么？
  answer: '定义 (Definition): 识别出觉知本身是从未受损的。；治疗效果 (Therapeutic Effect): 提供一个绝对安全的锚点，超越创伤。；专业视角 (Expert Perspective): 疗愈不是修复一个“破碎的自我”，而是识别出那个“未碎的部分”。'
  source: 02-Mind-Psychology/therapy/therapy-direct-recognition/Therapy_Direct_Recognition_Healing.md
  section: 'Unconditioned Healing: The Core Principle (无条件疗愈：核心原则表)'
- type: concept
  question: 无抵抗原则的核心要点是什么？
  answer: '定义 (Definition): 彻底接纳当下的所有感受，不加评判。；治疗效果 (Therapeutic Effect): 能量的自然释放，中止心理内耗。；专业视角 (Expert Perspective): 抵抗是痛苦的润滑剂；不抵抗则痛苦失去抓手。'
  source: 02-Mind-Psychology/therapy/therapy-direct-recognition/Therapy_Direct_Recognition_Healing.md
  section: 'Unconditioned Healing: The Core Principle (无条件疗愈：核心原则表)'
- type: concept
  question: 去中心化的核心要点是什么？
  answer: '定义 (Definition): 认识到“我”只是念头的一员，而非念头的拥有者。；治疗效果 (Therapeutic Effect): 减轻对自我的过度关注 (Hyper-self-awareness)。；专业视角 (Expert
    Perspective): 将心理痛苦视为“云”，而我是“虚空”。'
  source: 02-Mind-Psychology/therapy/therapy-direct-recognition/Therapy_Direct_Recognition_Healing.md
  section: 'Unconditioned Healing: The Core Principle (无条件疗愈：核心原则表)'
- type: concept
  question: 核心羞耻感 (Shame)的核心要点是什么？
  answer: '二元视角的纠缠: “我本质上是坏的/不足的。”；不二视角的识别 (Recognition): “羞耻感只是觉知中浮现的一个念头。”；转变后的心理状态: 基本存在价值的恢复。；专业对策: 识别出羞耻感是被观察的对象，而非观察者。'
  source: 02-Mind-Psychology/therapy/therapy-direct-recognition/Therapy_Direct_Recognition_Healing.md
  section: Healing Identity-Based Suffering (针对身份化痛苦的干预矩阵)
- type: concept
  question: 生存焦虑 (Anxiety)的核心要点是什么？
  answer: '二元视角的纠缠: “我必须保护我的存在不受威胁。”；不二视角的识别 (Recognition): “觉知本身是不可被摧毁的。”；转变后的心理状态: 终极的安全感与稳健。；专业对策: 将注意力从预期未来移向当下的背景觉知。'
  source: 02-Mind-Psychology/therapy/therapy-direct-recognition/Therapy_Direct_Recognition_Healing.md
  section: Healing Identity-Based Suffering (针对身份化痛苦的干预矩阵)
- type: concept
  question: 受害者情结的核心要点是什么？
  answer: '二元视角的纠缠: “世界不公平地伤害了我。”；不二视角的识别 (Recognition): “故事只是记忆的堆叠，觉知是清净的。”；转变后的心理状态: 责任感的自然流起，不再依恋故事。；专业对策: 看到“受害者”身份只是一个自传体记忆的标签。'
  source: 02-Mind-Psychology/therapy/therapy-direct-recognition/Therapy_Direct_Recognition_Healing.md
  section: Healing Identity-Based Suffering (针对身份化痛苦的干预矩阵)
- type: concept
  question: ACT (接纳承诺)的核心要点是什么？
  answer: '不二论整合点: 进一步加强“自我作为观察者” (Self-as-context)。；技术改进: 引导至无边界的开放觉知。；针对性症状: 强迫思维、情感回避。；专家建议: 突破术语限制，进入直接体验。'
  source: 02-Mind-Psychology/therapy/therapy-direct-recognition/Therapy_Direct_Recognition_Healing.md
  section: 'Clinical Integration: Non-dual Psychotherapy (临床整合：不二论心理咨询)'
- type: concept
  question: IFS (家庭系统)的核心要点是什么？
  answer: '不二论整合点: “Self” (大我) 与觉知的等同。；技术改进: 识别出所有“零件” (Parts) 皆在觉知中升起。；针对性症状: 内部人格冲突、创伤。；专家建议: 强调 Self 不是一个实体，而是认识的基础。'
  source: 02-Mind-Psychology/therapy/therapy-direct-recognition/Therapy_Direct_Recognition_Healing.md
  section: 'Clinical Integration: Non-dual Psychotherapy (临床整合：不二论心理咨询)'
