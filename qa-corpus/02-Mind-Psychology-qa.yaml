  section: 'Week 1: 发现慈心的本质（Discovering the Nature of Metta）'
- type: concept
  question: 与他人的关系的核心要点是什么？
  answer: '自怜（Self-Pity）: 疏远、比较、抱怨；自我关怀（Self-Compassion）: 连接、平等、善意'
  source: 02-Mind-Psychology/meditation/metta-lovingkindness/Metta_Self_Compassion_Program.md
  section: 'Week 1: 发现慈心的本质（Discovering the Nature of Metta）'
- type: concept
  question: 每日慈心锚点练习的核心要点是什么？
  answer: '时间: 10 分钟/天；说明: 使用课程录音，专注于安全对象'
  source: 02-Mind-Psychology/meditation/metta-lovingkindness/Metta_Self_Compassion_Program.md
  section: 'Week 1: 发现慈心的本质（Discovering the Nature of Metta）'
- type: concept
  question: 慈心日志的核心要点是什么？
  answer: '时间: 5 分钟/天；说明: 记录当天对自己或他人自然生起的善意瞬间'
  source: 02-Mind-Psychology/meditation/metta-lovingkindness/Metta_Self_Compassion_Program.md
  section: 'Week 1: 发现慈心的本质（Discovering the Nature of Metta）'
- type: concept
  question: 杏仁核的核心要点是什么？
  answer: '正常功能: 威胁检测、恐惧学习；PTSD 中的改变: 过度活跃、阈值降低、对中性刺激也反应；Metta 的影响: 长期 Metta 练习可降低杏仁核反应性（Kral et al., 2018）'
  source: 02-Mind-Psychology/meditation/metta-lovingkindness/Metta_Trauma_Healing.md
  section: 1.1 PTSD 的神经生物学基础
- type: concept
  question: 前额叶皮层 (PFC)的核心要点是什么？
  answer: '正常功能: 情绪调节、决策、自我参照；PTSD 中的改变: 活动降低、对杏仁核的抑制减弱；Metta 的影响: Metta 增强 PFC 与杏仁核之间的功能连接'
  source: 02-Mind-Psychology/meditation/metta-lovingkindness/Metta_Trauma_Healing.md
  section: 1.1 PTSD 的神经生物学基础
- type: concept
  question: 岛叶的核心要点是什么？
  answer: '正常功能: 内感受觉察（身体感觉）；PTSD 中的改变: 高警觉者的岛叶可能过度活跃或解离性降低；Metta 的影响: Metta 培养"温暖觉察"，重建安全的内感受'
  source: 02-Mind-Psychology/meditation/metta-lovingkindness/Metta_Trauma_Healing.md
  section: 1.1 PTSD 的神经生物学基础
- type: concept
  question: 威胁系统的核心要点是什么？
  answer: '功能: 检测危险、触发保护反应；神经化学基础: 皮质醇、肾上腺素；Metta 中的对应: Metta 不否认威胁，但提供"安全的背景"'
  source: 02-Mind-Psychology/meditation/metta-lovingkindness/Metta_Trauma_Healing.md
  section: 1.3 Paul Gilbert 的慈悲聚焦疗法（CFT）
- type: concept
  question: 驱动系统的核心要点是什么？
  answer: '功能: 追求目标、获取资源；神经化学基础: 多巴胺；Metta 中的对应: Metta 转化"我必须做得更好"为"我已足够"'
  source: 02-Mind-Psychology/meditation/metta-lovingkindness/Metta_Trauma_Healing.md
  section: 1.3 Paul Gilbert 的慈悲聚焦疗法（CFT）
- type: concept
  question: 安抚系统的核心要点是什么？
  answer: '功能: 平静、连接、安全；神经化学基础: 催产素、内啡肽；Metta 中的对应: **Metta 的核心目标——激活此系统**'
  source: 02-Mind-Psychology/meditation/metta-lovingkindness/Metta_Trauma_Healing.md
  section: 1.3 Paul Gilbert 的慈悲聚焦疗法（CFT）
- type: concept
  question: 0. 准备期的核心要点是什么？
  answer: '对象: 纯呼吸觉察，建立身体安全感；建议停留时间: 1-4 周；预警信号（暂停并回到前一阶段）: 任何解离或过度唤起'
  source: 02-Mind-Psychology/meditation/metta-lovingkindness/Metta_Trauma_Healing.md
  section: 2.2 创伤知情 Metta 阶梯
- type: concept
  question: 1. 自然/宠物的核心要点是什么？
  answer: '对象: 对一棵树、一只宠物发送 Metta；建议停留时间: 1-3 周；预警信号（暂停并回到前一阶段）: 感到孤独、悲伤'
  source: 02-Mind-Psychology/meditation/metta-lovingkindness/Metta_Trauma_Healing.md
  section: 2.2 创伤知情 Metta 阶梯
