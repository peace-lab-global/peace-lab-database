  question: '[冲突神经科学](Marriage_Conflict_Neuroscience.md)的核心要点是什么？'
  answer: '涉及依恋内容: Coan 手握实验、依恋安全感对杏仁核反应的调节；交叉关联: → Psychology（依恋类型）、Mindfulness_Conflict（共同调节练习）'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Knowledge_Network.md
  section: 1. 依恋理论知识网络
- type: concept
  question: '[婚姻沟通](Marriage_Communication.md)的核心要点是什么？'
  answer: '涉及沟通内容: Gottman 四骑士、NVC 完整框架、元沟通、冲突后修复对话、婚姻阶段沟通；交叉关联: → Conflict_Resolution（冲突中的沟通技巧）、Passive_Aggression（石墙的沟通维度）'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Knowledge_Network.md
  section: 2. 沟通模式知识网络
- type: concept
  question: '[冲突解决](Marriage_Conflict_Resolution.md)的核心要点是什么？'
  answer: '涉及沟通内容: 冲突中的沟通技巧表、Gottman "冲突中的梦想"完整脚本；交叉关联: → Communication（技术来源）、Mindfulness_Conflict（正念沟通）'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Knowledge_Network.md
  section: 2. 沟通模式知识网络
- type: concept
  question: '[隐性攻击](Marriage_Passive_Aggression.md)的核心要点是什么？'
  answer: '涉及沟通内容: 石墙（Stonewalling）作为沟通阻断、六种间接敌意形式；交叉关联: → Communication（四骑士中的石墙）、Anger_Management（压抑愤怒的沟通表达）'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Knowledge_Network.md
  section: 2. 沟通模式知识网络
- type: concept
  question: '[冲突解决](Marriage_Conflict_Resolution.md)的核心要点是什么？'
  answer: '涉及冲突内容: 六步技术、Thomas-Kilmann 冲突风格、干预脚本示范、案例分析；交叉关联: → 所有冲突领域文件、Conflict_Neuroscience（冲突的生理基础）'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Knowledge_Network.md
  section: 3. 冲突处理知识网络（扩展版）
- type: concept
  question: 浪漫融合期的核心要点是什么？
  answer: '时间范围: 结婚0-2年；核心任务: 建立亲密连接，融合两个生活系统；主要挑战: 期望落差，边界模糊，角色适应；成长机会: 学习真正看见和理解对方；维护重点: 情感聚焦，建立安全基地体验；引用来源 (Citation):
    Fisher, H. (2004).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Long_Term_Maintenance.md
  section: 关系生命周期各阶段特点表
- type: concept
  question: 现实适应期的核心要点是什么？
  answer: '时间范围: 结婚2-7年；核心任务: 处理差异，建立权力平衡，发展沟通技能；主要挑战: 幻灭感，权力斗争，日常琐碎；成长机会: 发展成熟的爱的能力；维护重点: 依恋修复，技能训练，冲突管理；引用来源 (Citation):
    Hendrix, H. (1988).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Long_Term_Maintenance.md
  section: 关系生命周期各阶段特点表
- type: concept
  question: 稳定深化期的核心要点是什么？
  answer: '时间范围: 结婚7-15年；核心任务: 深化承诺，实现共同目标，育儿合作；主要挑战: 亲密疏远，例行公事，激情消退；成长机会: 重新发现彼此深度，创造新连接；维护重点: 共同意义创造，激情重建，深度对话；引用来源 (Citation):
    Hatfield, E. (1988).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Long_Term_Maintenance.md
  section: 关系生命周期各阶段特点表
- type: concept
  question: 情感存款账户的核心要点是什么？
  answer: '核心原理: 积累积极互动资本；实践方法: 日常赞美、感谢、关爱行为；关键频率: 每日至少5次积极互动；成功指标: 积极/消极比率≥5:1；理论基础: 投资模型；引用来源 (Citation): Gottman, J. M.
    (1999).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Long_Term_Maintenance.md
  section: 长期满意度维持机制表
- type: concept
  question: 定期深度对话的核心要点是什么？
  answer: '核心原理: 维持心理亲密；实践方法: 每周90分钟无干扰深度交流；关键频率: 每周1次；成功指标: 对方理解程度和情感连接感；理论基础: 自我表露理论；引用来源 (Citation): Reis, H. T. & Shaver,
    P. (1988).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Long_Term_Maintenance.md
  section: 长期满意度维持机制表
- type: concept
  question: 共同成长计划的核心要点是什么？
  answer: '核心原理: 同步个人发展；实践方法: 制定年度共同目标和学习计划；关键频率: 每季度回顾调整；成功指标: 共同进步感和成就感；理论基础: 成长促进理论；引用来源 (Citation): Deci, E. L. & Ryan,
    R. M. (2000).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Long_Term_Maintenance.md
  section: 长期满意度维持机制表
- type: concept
  question: 职业发展的核心要点是什么？
  answer: '变化类型: 工作转换、晋升、失业；适应策略: 支持对方职业选择，协调时间安排；沟通要点: 开诚布公讨论职业规划和影响；成功要素: 相互理解，灵活调整；引用来源 (Citation): Repetti, R. L. et al.
    (2002).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Long_Term_Maintenance.md
  section: 共同成长和变化适应表
- type: concept
  question: 身体健康的核心要点是什么？
  answer: '变化类型: 疾病、衰老、残疾；适应策略: 建立照顾者支持系统，调整生活方式；沟通要点: 共同面对健康挑战，分担责任；成功要素: 同舟共济，专业协助；引用来源 (Citation): Given, B. A. et al.
    (1994).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Long_Term_Maintenance.md
  section: 共同成长和变化适应表
- type: concept
  question: 抑郁症** (Depression)的核心要点是什么？
  answer: '对婚姻的影响 (Impact on Marriage): 退缩、低正性情感、性欲下降、消极归因、对伴侣请求缺乏回应；婚姻对障碍的影响 (Marriage Impact on Disorder): 婚姻不满是抑郁发作的强预测因子；批评与拒绝加重症状；双向循环机制
    (Bidirectional Cycle): 抑郁退缩 → 伴侣批评 → 更多退缩 → 更多批评(需求-退缩循环)；引用来源 (Citation): Whisman, M. A. (2007).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Mental_Health_Comorbidity.md
  section: 心理障碍-婚姻冲突双向影响概览表
- type: concept
  question: 焦虑障碍** (Anxiety Disorders)的核心要点是什么？
  answer: '对婚姻的影响 (Impact on Marriage): 过度寻求确认、回避行为限制夫妻活动、担忧占据心理空间；婚姻对障碍的影响 (Marriage Impact on Disorder): 婚姻冲突激活焦虑系统、伴侣批评强化核心恐惧；双向循环机制
    (Bidirectional Cycle): 焦虑寻求确认 → 伴侣疲惫/不耐烦 → 确认信号减少 → 焦虑升级；引用来源 (Citation): Whisman, M. A. et al. (2000).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Mental_Health_Comorbidity.md
  section: 心理障碍-婚姻冲突双向影响概览表
- type: concept
  question: 创伤后应激障碍** (PTSD)的核心要点是什么？
  answer: '对婚姻的影响 (Impact on Marriage): 情感麻木、过度警觉、闪回触发攻击性、亲密回避；婚姻对障碍的影响 (Marriage Impact on Disorder): 伴侣冲突触发创伤反应、缺乏安全基地阻碍恢复；双向循环机制
    (Bidirectional Cycle): 情感麻木 → 伴侣感到被拒绝 → 愤怒/距离 → 触发过度警觉 → 更多麻木；引用来源 (Citation): Monson, C. M. & Fredman, S. J. (2012).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Mental_Health_Comorbidity.md
  section: 心理障碍-婚姻冲突双向影响概览表
- type: concept
  question: 什么是抑郁症与婚姻 (Depression & Marriage)？
  answer: 抑郁症是与婚姻质量关联最充分、研究最深入的心理障碍。Whisman (2001) 的大型流行病学数据表明，**处于不满意婚姻中的人患抑郁症的风险是满意婚姻中的人的 2.7 到 3.6 倍**。这一数据本身就说明了婚姻关系对心理健康的巨大影响力。
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Mental_Health_Comorbidity.md
  section: 抑郁症与婚姻 (Depression & Marriage)
- type: concept
  question: 退缩与回避** (Withdrawal)的核心要点是什么？
  answer: '具体表现: 减少言语交流、回避眼神接触、身体远离、拒绝社交活动；对伴侣的影响: 伴侣感到被忽视、被拒绝、不重要；对关系的影响: 情感距离扩大、需求-退缩循环(Demand-Withdraw)恶化；治疗靶点: 行为激活(Behavioral
    Activation)中加入关系互动任务；引用来源 (Citation): Katz, J. & Beach, S. R. H. (1997).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Mental_Health_Comorbidity.md
  section: 抑郁特异性沟通模式
- type: concept
  question: 低正性情感** (Low Positive Affect)的核心要点是什么？
  answer: '具体表现: 缺乏笑容、赞美、身体接触、兴趣表达；互动中平淡、缺乏热情；对伴侣的影响: 伴侣感到不被欣赏、不被爱；对关系的影响: 正性情感储备(Emotional Bank Account)持续透支；治疗靶点: 刻意安排积极互动、Gottman的"爱情地图"练习；引用来源
    (Citation): Johnson, S. L. & Jacob, T. (1997).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Mental_Health_Comorbidity.md
  section: 抑郁特异性沟通模式
- type: concept
  question: 消极归因** (Negative Attribution)的核心要点是什么？
  answer: '具体表现: 将伴侣行为归因为恶意、自私、不关心；"你从来不在乎我"；对伴侣的影响: 伴侣感到被误解、被不公平对待；对关系的影响: 信任侵蚀、防御性升级；治疗靶点: 认知重构、检验消极假设；引用来源 (Citation):
    Baucom, D. H. et al. (1989).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Mental_Health_Comorbidity.md
  section: 抑郁特异性沟通模式
- type: concept
  question: 什么是焦虑障碍与婚姻 (Anxiety Disorders & Marriage)？
  answer: 焦虑障碍对婚姻的影响往往比抑郁更为隐蔽，但同样具有破坏性。焦虑个体的核心体验是**对威胁的过度估计(Overestimation of Threat)和对自身应对能力的低估(Underestimation of Coping)**，这两个认知偏差在亲密关系中被放大为对被拒绝、被抛弃和失控的持续恐惧。
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Mental_Health_Comorbidity.md
  section: 焦虑障碍与婚姻 (Anxiety Disorders & Marriage)
- type: concept
  question: 什么是核心概念：个人正念与关系正念？
  answer: 正念在婚姻冲突中的应用，不能简单地将个人正念练习"移植"到关系中。需要发展一种更为复杂的能力——**关系正念(Relational Mindfulness)**。
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Mindfulness_Conflict.md
  section: 核心概念：个人正念与关系正念
- type: concept
  question: 觉察对象的核心要点是什么？
  answer: '个人正念 (Individual Mindfulness): 自身的思维、情绪、身体感受；关系正念 (Relational Mindfulness): 自身状态 + 伴侣状态 + 互动过程本身；婚姻冲突中的应用: 冲突中同时觉察"我在生气"和"他/她在害怕"；引用来源
    (Citation): Kabat-Zinn, M. & Kabat-Zinn, J. (1997).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Mindfulness_Conflict.md
  section: 核心概念：个人正念与关系正念
- type: concept
  question: 注意品质的核心要点是什么？
  answer: '个人正念 (Individual Mindfulness): 非评判的、接纳的、好奇的；关系正念 (Relational Mindfulness): 在对两个人的体验保持非评判的同时，对互动模式保持好奇；婚姻冲突中的应用:
    观察"我们又进入了追逃模式"而不是"都是你的错"；引用来源 (Citation): Kozlowski, A. (2013).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Mindfulness_Conflict.md
  section: 核心概念：个人正念与关系正念
- type: concept
  question: 时间维度的核心要点是什么？
  answer: '个人正念 (Individual Mindfulness): 当下此刻；关系正念 (Relational Mindfulness): 当下此刻的互动 + 对互动模式的历时觉察；婚姻冲突中的应用: 意识到"这个争吵其实不是关于碗，而是关于被重视"；引用来源
    (Citation): Gambrel, L. E. & Keeling, M. L. (2010).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Mindfulness_Conflict.md
  section: 核心概念：个人正念与关系正念
- type: concept
  question: Carson et al. (2004)的核心要点是什么？
  answer: '参与者: 44对关系满意的夫妻；干预方式: 8周 MBSR 改编版(Mindfulness-Based Relationship Enhancement)；核心发现: 关系满意度↑、亲密度↑、接纳度↑、关系压力↓；效果在3个月随访时维持；效应量:
    中到大 (d=0.5-0.8)；临床意义: 正念训练对非临床夫妻具有预防性保护作用；引用来源 (Citation): Carson, J. W. et al. (2004).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Mindfulness_Conflict.md
  section: 正念减少婚姻冲突的循证研究
- type: concept
  question: Barnes et al. (2007)的核心要点是什么？
  answer: '参与者: 大学情侣；干预方式: 简短正念诱导(15分钟正念呼吸) vs 对照；核心发现: 正念组在冲突讨论中表现出更低的情绪压力和更高的沟通质量；效应量: 中等；临床意义: 即使短暂的正念练习也能影响冲突质量；引用来源 (Citation):
    Barnes, S. et al. (2007).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Mindfulness_Conflict.md
  section: 正念减少婚姻冲突的循证研究
- type: concept
  question: Wachs & Cordova (2007)的核心要点是什么？
  answer: '参与者: 社区夫妻样本；干预方式: 特质正念(MAAS量表)与婚姻质量关联研究；核心发现: 高特质正念预测更高的婚姻满意度、更强的沟通能力、更低的冲突焦虑；效应量: —；临床意义: 正念作为人格特质是婚姻保护因素；引用来源
    (Citation): Wachs, K. & Cordova, J. V. (2007).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Mindfulness_Conflict.md
  section: 正念减少婚姻冲突的循证研究
- type: concept
  question: S — 停的核心要点是什么？
  answer: '英文: Stop；操作要点: 无论正在说什么或做什么，完全停下来；冲突情境示例: 意识到声音在升高时，中断正在说的话；神经机制: 激活前额叶抑制功能，中断杏仁核自动反应链；引用来源 (Citation): Kabat-Zinn,
    J. (1990).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Mindfulness_Conflict.md
  section: S.T.O.P. 技术（适配婚姻冲突版）
- type: concept
  question: 婚姻的核心要点是什么？
  answer: '中文释义: 两人间法律/社会认可的结合；英文术语: Marriage；源头语言: Matrimonium (拉丁)；定义与内涵: 两个成年人之间建立的亲密伴侣关系，具有法律、情感、经济和社会功能。；专业视角 (Professional
    Perspective): 现代婚姻从制度性婚姻(Institutional)演变为伴侣式婚姻(Companionate)再到自我表达式婚姻(Self-expressive)。；引用来源 (Citation): Cherlin, A.
    J. (2004).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Overview.md
  section: 核心概念与定义表
- type: concept
  question: 婚姻满意度的核心要点是什么？
  answer: '中文释义: 对婚姻质量的主观评价；英文术语: Marital Satisfaction；源头语言: —；定义与内涵: 个体对婚姻关系整体质量的认知与情感评估。；专业视角 (Professional Perspective):
    婚姻满意度呈U形曲线：蜜月期高→育儿期低→空巢期回升。；引用来源 (Citation): Bradbury, T. N. et al. (2000).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Overview.md
  section: 核心概念与定义表
- type: concept
  question: 婚姻稳定性的核心要点是什么？
  answer: '中文释义: 婚姻持续vs解体的倾向；英文术语: Marital Stability；源头语言: —；定义与内涵: 婚姻关系持续存在的可能性，与满意度相关但不等同。；专业视角 (Professional Perspective):
    高满意度促进稳定，但低满意度不必然导致离婚（承诺、障碍因素）。；引用来源 (Citation): Karney, B. R. & Bradbury, T. N. (1995).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Overview.md
  section: 核心概念与定义表
- type: concept
  question: 浪漫期的核心要点是什么？
  answer: '中文名称: 蜜月/热恋期；英文术语: Romantic/Honeymoon Phase；典型时期: 结婚初期1-2年；核心任务: 建立亲密、理想化伴侣、融合身份；常见挑战: 现实冲击、差异显现、边界模糊；专业视角 (Professional
    Perspective): 多巴胺驱动的激情状态；理想化投射阶段。；引用来源 (Citation): Fisher, H. (2004).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Overview.md
  section: 婚姻发展阶段表
- type: concept
  question: 现实期的核心要点是什么？
  answer: '中文名称: 权力斗争期；英文术语: Power Struggle Phase；典型时期: 2-7年；核心任务: 处理差异、建立权力平衡、发展冲突解决模式；常见挑战: 失望、权力斗争、沟通障碍；专业视角 (Professional
    Perspective): "幻灭"是正常过程，非病理；需发展成熟的爱。；引用来源 (Citation): Hendrix, H. (1988).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Overview.md
  section: 婚姻发展阶段表
- type: concept
  question: 稳定期的核心要点是什么？
  answer: '中文名称: 承诺巩固期；英文术语: Commitment/Stability Phase；典型时期: 7-15年；核心任务: 深化承诺、共同目标、育儿合作；常见挑战: 育儿压力、职业发展、亲密疏远；专业视角 (Professional
    Perspective): 伴侣式爱情(Companionate Love)取代激情式爱情。；引用来源 (Citation): Hatfield, E. (1988).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Overview.md
  section: 婚姻发展阶段表
- type: concept
  question: 依恋理论的核心要点是什么？
  answer: '中文名称: 成人依恋理论；创始人: Bowlby, Hazan & Shaver；核心观点: 早期依恋模式影响成人亲密关系；关键概念: 安全型/焦虑型/回避型依恋；临床应用: EFT情绪聚焦疗法；引用来源 (Citation):
    Hazan, C. & Shaver, P. (1987).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Overview.md
  section: 婚姻理论流派表
- type: concept
  question: 社会交换理论的核心要点是什么？
  answer: '中文名称: 交换理论；创始人: Thibaut & Kelley；核心观点: 关系是成本-收益的理性计算；关键概念: 比较水平、替代选择比较水平；临床应用: 行为婚姻疗法；引用来源 (Citation): Thibaut,
    J. W. & Kelley, H. H. (1959).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Overview.md
  section: 婚姻理论流派表
- type: concept
  question: 什么是育儿冲突类型分类表？
  answer: 育儿冲突涵盖的领域极为广泛，从日常琐事（"该不该穿外套"）到根本性的教育哲学分歧（"要不要送孩子出国"）。研究者通常将育儿冲突分为两大类：**表层冲突**（surface conflict）——关于具体行为和操作的分歧，通常通过信息交流和协商即可解决；**深层冲突**（deep
    conflict）——关于价值观、信念和身份认同的分歧，需要更深入的对话和相互理解。Gottman等人（1997）的研究发现，约69%的夫妻冲突属于"永恒性问题"（perpetual problems）——即基于双方人格和价值观差异而无法被"解决"、只能被"管理"的议题。育儿冲突中的许多核心议题恰好属于这一类型。下表列出了六种最常见的育儿冲突类型及其心理动力分析。
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Parenting_Conflict.md
  section: 育儿冲突类型分类表
- type: concept
  question: 管教哲学冲突** (Discipline Philosophy)的核心要点是什么？
  answer: '核心分歧: 严厉管教vs温和引导；惩罚vs自然后果；典型场景: 孩子在公共场合发脾气时，一方主张立即制止，另一方认为应允许情绪表达；深层心理因素: 原生家庭管教模式的代际传递；"好父母"身份认同的差异；处理策略: 讨论各自童年管教经历；共同学习发展心理学知识；建立统一的管教原则框架；引用来源
    (Citation): Baumrind, D. (1991). *The influence of parenting style on adolescent competence and substance use*.'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Parenting_Conflict.md
  section: 育儿冲突类型分类表
- type: concept
  question: 屏幕时间冲突** (Screen Time)的核心要点是什么？
  answer: '核心分歧: 屏幕使用时长与内容的标准不一致；典型场景: 父亲允许孩子长时间看动画片以获得安静，母亲认为这损害发育；深层心理因素: 对科技的态度差异；育儿疲劳导致的妥协；对"现代童年"的不同理解；处理策略: 参考AAP（美国儿科学会）指南制定家庭媒体计划；区分教育性内容与娱乐性内容；建立替代活动清单；引用来源
    (Citation): American Academy of Pediatrics. (2016). *Media and Young Minds*.'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Parenting_Conflict.md
  section: 育儿冲突类型分类表
- type: concept
  question: 教育决策冲突** (Education Decisions)的核心要点是什么？
  answer: '核心分歧: 公立vs私立vs国际学校；课外辅导的种类和强度；典型场景: 母亲坚持报名三个培训班，父亲认为应保留自由玩耍时间；深层心理因素: 教育焦虑的代际传递；阶层流动的期望投射；对"成功"的不同定义；处理策略: 以儿童发展需求为中心而非父母焦虑；定期评估孩子的压力水平；夫妻共同参加家长教育课程；引用来源
    (Citation): Lareau, A. (2003). *Unequal Childhoods*.'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Parenting_Conflict.md
  section: 育儿冲突类型分类表
- type: concept
  question: 孕期与新生儿期的核心要点是什么？
  answer: '孩子年龄: 孕期-12个月；满意度变化趋势: 急剧下降（下降幅度最大）；主要冲突焦点: 睡眠剥夺、喂养方式、育儿劳动分配、产后情绪；核心挑战: 角色重组、亲密感丧失、身体恢复；保护性因素: 父亲早期参与、社会支持网络、产后心理筛查；引用来源
    (Citation): Cowan, C. P. & Cowan, P. A. (2000).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Parenting_Conflict.md
  section: 各育儿阶段婚姻满意度变化表
- type: concept
  question: 幼儿期的核心要点是什么？
  answer: '孩子年龄: 1-3岁；满意度变化趋势: 持续下降；主要冲突焦点: 管教方式、安全观差异、如厕训练、断奶；核心挑战: 自主性需求与安全需求的平衡、"可怕的两岁"；保护性因素: 统一管教理念、相互支持的育儿联盟；引用来源 (Citation):
    Belsky, J. & Kelly, J. (1994).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Parenting_Conflict.md
  section: 各育儿阶段婚姻满意度变化表
- type: concept
  question: 学龄前期的核心要点是什么？
  answer: '孩子年龄: 3-6岁；满意度变化趋势: 触底或缓慢回升；主要冲突焦点: 教育选择、社交能力培养、屏幕时间；核心挑战: 隔代教养介入加深、教育焦虑开始显现；保护性因素: 共同教育规划、保持夫妻独处时间；引用来源 (Citation):
    Twenge, J. M. et al. (2003).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Parenting_Conflict.md
  section: 各育儿阶段婚姻满意度变化表
- type: concept
  question: 替罪羊型** (Scapegoating)的核心要点是什么？
  answer: '表现形式: 孩子的行为问题成为夫妻关注焦点，转移了婚姻冲突；对儿童的影响: 外化行为问题（攻击、叛逆）、自我价值感低下、被标记为"问题儿童"；对婚姻的影响: 暂时缓解夫妻直接冲突，但根本问题被掩盖，长期关系更加僵化；干预方向:
    重新聚焦夫妻子系统的问题；为孩子去标签化；结构式家庭治疗；引用来源 (Citation): Minuchin, S. (1974). *Families and Family Therapy*.'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Parenting_Conflict.md
  section: 三角化模式分析表
- type: concept
  question: 什么是被动攻击核心概念表？
  answer: 以下表格梳理了婚姻中隐性攻击的核心术语及其学术定义。这些概念之间存在相互重叠但各有侧重——"被动攻击"是总括性术语，而沉默处理、情感撤回等则是其具体的行为表现形式。理解这些术语的精确含义有助于临床工作者和来访者准确识别和命名他们在关系中所经历的现象。
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Passive_Aggression.md
  section: 被动攻击核心概念表
- type: concept
  question: 被动攻击的核心要点是什么？
  answer: '英文术语: Passive Aggression；定义: 通过间接、隐蔽的方式表达敌意、不满或愤怒的行为模式，通常伴随对攻击意图的否认；婚姻中的典型表现: 拖延承诺的事、故意"忘记"重要日期、表面顺从但暗中抵制；与显性攻击的区别:
    显性攻击直接表达愤怒(如吼叫)；被动攻击通过不作为或间接行为表达；引用来源 (Citation): Wetzler, S. (1992). *Living with the Passive-Aggressive Man*.'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Passive_Aggression.md
  section: 被动攻击核心概念表
- type: concept
  question: 石墙/筑墙的核心要点是什么？
  answer: '英文术语: Stonewalling；定义: 在冲突中完全关闭情感通道，拒绝言语和非言语互动，表现为沉默、目光回避、身体僵硬；婚姻中的典型表现: 伴侣提出问题时面无表情、不回应、转身离开、假装忙碌；与显性攻击的区别: 显性攻击主动升级冲突；石墙是主动或被动地终止互动；引用来源
    (Citation): Gottman, J. M. (1994). *What Predicts Divorce?*'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Passive_Aggression.md
  section: 被动攻击核心概念表
- type: concept
  question: 沉默处理的核心要点是什么？
  answer: '英文术语: Silent Treatment；定义: 有意识地以拒绝沟通作为惩罚手段，通过剥夺对方的互动来施加控制和痛苦；婚姻中的典型表现: 连续数天不说话、在场但完全无视对方存在、只通过第三方(如孩子)传话；与显性攻击的区别:
    显性攻击使对方知道你在生气；沉默处理让对方不确定发生了什么；引用来源 (Citation): Williams, K. D. (2001). *Ostracism: The Power of Silence*.'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Passive_Aggression.md
  section: 被动攻击核心概念表
- type: concept
  question: 核心机制的核心要点是什么？
  answer: '情感泛滥性石墙 (Flooding-Based Stonewalling): 自主神经系统(ANS)过度激活导致的生理性关闭；心率超过100 bpm时认知功能严重受损；惩罚性沉默处理 (Punitive Silent Treatment):
    有意识地选择以沉默作为惩罚和控制手段；心率通常在正常范围内；引用来源 (Citation): Gottman, J. M. (1994).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Passive_Aggression.md
  section: 情感泛滥性石墙 vs. 惩罚性沉默处理
- type: concept
  question: 主观体验的核心要点是什么？
  answer: '情感泛滥性石墙 (Flooding-Based Stonewalling): "我不是不想说话，是真的说不出来"——无助、淹没、大脑空白；惩罚性沉默处理 (Punitive Silent Treatment): "我就是不想理你"——愤怒、报复、控制感；引用来源
    (Citation): Gottman, J. M. & Silver, N. (1999).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Passive_Aggression.md
  section: 情感泛滥性石墙 vs. 惩罚性沉默处理
- type: concept
  question: 目的的核心要点是什么？
  answer: '情感泛滥性石墙 (Flooding-Based Stonewalling): 无目的性；是自我保护的自动反应(Automatic Protective Response)；惩罚性沉默处理 (Punitive Silent
    Treatment): 有目的性；目标是惩罚对方、迫使对方改变或让步；引用来源 (Citation): Williams, K. D. (2001).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Passive_Aggression.md
  section: 情感泛滥性石墙 vs. 惩罚性沉默处理
- type: concept
  question: 什么是间接敌意的六种表现形式？
  answer: 被动攻击在婚姻中的表现远不止沉默处理。以下六种形式涵盖了临床中最常见的间接敌意模式，每一种都具有共同的结构特征：**表面上合理甚至无害，但反复出现时形成一种系统性的消耗(Systemic Erosion)。**
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Passive_Aggression.md
  section: 间接敌意的六种表现形式
- type: concept
  question: 什么是权力理论基础表？
  answer: French 和 Raven (1959) 提出的社会权力基础理论(Bases of Social Power)是权力研究领域最经典的框架。该理论最初识别了五种权力基础，后由 Raven (1965) 补充了第六种——信息权力(Informational
    Power)。这一理论的核心洞察在于：**权力不是一种单一的属性，而是多维度的、可叠加的、且依赖于关系情境的**。在婚姻中，同一个人可能在某些领域拥有权力优势(如经济决策)，而在另一些领域处于权力弱势(如情感影响力)。
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Power_Control.md
  section: 权力理论基础表
- type: concept
  question: 合法权力的核心要点是什么？
  answer: '英文术语: Legitimate Power；定义: 基于角色、地位或社会规范所赋予的权力；婚姻中的表现: 传统文化中"丈夫为一家之主"的角色期待；家庭分工中的决策权分配；健康vs不健康使用: **健康：** 基于协商的角色分工，如"你负责财务决策，我负责教育决策"。**不健康：**
    以"我是丈夫/妻子所以你必须听我的"为由单方面主导所有决策；引用来源 (Citation): French, J. R. P., & Raven, B. (1959).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Power_Control.md
  section: 权力理论基础表
- type: concept
  question: 奖赏权力的核心要点是什么？
  answer: '英文术语: Reward Power；定义: 通过提供正面奖励(物质或情感)来影响对方行为；婚姻中的表现: 给予赞美、关注、礼物、性亲密、经济支持；健康vs不健康使用: **健康：** 真诚地欣赏和回报伴侣的积极行为。**不健康：**
    将关爱、性、经济支持作为"交换筹码"，条件性地给予或撤回；引用来源 (Citation): French, J. R. P., & Raven, B. (1959).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Power_Control.md
  section: 权力理论基础表
- type: concept
  question: 强制权力的核心要点是什么？
  answer: '英文术语: Coercive Power；定义: 通过威胁、惩罚或制造恐惧来迫使对方服从；婚姻中的表现: 冷暴力、威胁离婚、情感撤回、经济惩罚、言语攻击、身体暴力；健康vs不健康使用: **健康：** 不存在健康的强制权力使用——任何以恐惧为基础的影响力都是不健康的。**不健康：**
    所有形式的强制权力在亲密关系中都具有破坏性；引用来源 (Citation): French, J. R. P., & Raven, B. (1959); Johnson, M. P. (2008).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Power_Control.md
  section: 权力理论基础表
- type: concept
  question: 什么是隐性控制模式识别？
  answer: 显性暴力(Physical Violence)通常容易被识别和介入，但**隐性控制(Covert Control)**往往更加隐蔽、更加持久、也更加具有心理破坏性。研究表明，隐性控制的心理损害可能等于甚至超过身体暴力(Dutton,
    2007)——因为身体暴力至少留下可见的证据，而隐性控制侵蚀的是受害者的内在现实(Internal Reality)——这是无法被他人直接观察到的。更为棘手的是，许多隐性控制行为在社会文化层面被"正常化"(Normalized)——"他只是性格强势"、"她只是比较敏感"、"这就是婚姻的样子"——这种正常化使得受害者更难以命名(Name)自己的体验，也更难以获得社会支持。
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Power_Control.md
  section: 隐性控制模式识别
- type: concept
  question: 煤气灯效应的核心要点是什么？
  answer: '英文术语: Gaslighting；表现形式: 否认对方的记忆和感知；歪曲事实；声称对方"太敏感"或"疯了"；对受害者的影响: 自我怀疑、现实检验能力下降、慢性焦虑、决策瘫痪、习得性无助；识别标志: 频繁自我怀疑；不断道歉；感觉自己"不够好"或"记忆力出了问题"；引用来源
    (Citation): Stern, R. (2007). *The Gaslight Effect*.'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Power_Control.md
  section: 情感操控策略 (Emotional Manipulation Tactics)
- type: concept
  question: 强制控制的核心要点是什么？
  answer: '英文术语: Coercive Control；表现形式: 微观管理日常行为；监控通讯和社交；经济控制；恐吓威胁；隔离社交支持网络；对受害者的影响: 自由丧失、身份侵蚀、习得性无助、创伤后应激障碍(PTSD)、自我概念瓦解；识别标志:
    行为自由受限(穿着/社交/工作)；感觉"必须请示"所有事情；与朋友家人日渐疏离；引用来源 (Citation): Stark, E. (2007). *Coercive Control*.'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Power_Control.md
  section: 情感操控策略 (Emotional Manipulation Tactics)
- type: concept
  question: 自恋型虐待的核心要点是什么？
  answer: '英文术语: Narcissistic Abuse；表现形式: 理想化-贬低-抛弃-回收循环；爱轰炸(Love Bombing)；投射(Projection)；未来虚构(Future Faking)；对受害者的影响: 创伤性联结(Trauma
    Bonding)；自我价值感崩塌；认知失调；分离后持续自我怀疑；识别标志: 关系中极端的"高峰与低谷"交替；对伴侣的行为感到"上瘾"般的依赖；朋友和家人表达担忧；引用来源 (Citation): Arabi, S. (2017). *Becoming
    the Narcissist''s Nightmare*.'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Power_Control.md
  section: 情感操控策略 (Emotional Manipulation Tactics)
- type: concept
  question: 沟通技能训练的核心要点是什么？
  answer: '核心内容: 表达技巧、倾听能力、冲突处理；学习目标: 建立有效沟通基础；实施方式: 角色扮演、技能练习；时长建议: 6-8小时；引用来源 (Citation): Markman, H. J. et al. (2010).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Prevention_Preparation.md
  section: 婚前教育核心模块表
- type: concept
  question: 财务管理规划的核心要点是什么？
  answer: '核心内容: 预算制定、消费观念、债务处理；学习目标: 预防财务冲突；实施方式: 案例分析、规划练习；时长建议: 4-6小时；引用来源 (Citation): Dew, J. & Xiao, J. J. (2013).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Prevention_Preparation.md
  section: 婚前教育核心模块表
- type: concept
  question: 角色期待澄清的核心要点是什么？
  answer: '核心内容: 家务分工、职业发展、家庭责任；学习目标: 减少期望落差；实施方式: 价值观探索、协商练习；时长建议: 4-6小时；引用来源 (Citation): Olson, D. H. (2002).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Prevention_Preparation.md
  section: 婚前教育核心模块表
- type: concept
  question: PREPARE的核心要点是什么？
  answer: '评估维度: 12个风险领域(沟通、财务管理、性等)；预测效度: 预测离婚准确率80%；适用阶段: 决定结婚前；解释要点: 识别高风险领域，制定预防计划；引用来源 (Citation): Olson, D. H. (2002).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Prevention_Preparation.md
  section: 婚前评估工具矩阵表
- type: concept
  question: FOCCES的核心要点是什么？
  answer: '评估维度: 五个核心关系领域；预测效度: 良好预测效度；适用阶段: 婚前6个月内；解释要点: 重点关注核心功能领域；引用来源 (Citation): Funk, L. O. & Rogge, R. D. (2007).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Prevention_Preparation.md
  section: 婚前评估工具矩阵表
- type: concept
  question: RELATE的核心要点是什么？
  answer: '评估维度: 12个关系维度；预测效度: 中等预测效度；适用阶段: 婚前评估；解释要点: 全面了解关系现状；引用来源 (Citation): Olson, D. H. (2000).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Prevention_Preparation.md
  section: 婚前评估工具矩阵表
- type: concept
  question: 个人风险的核心要点是什么？
  answer: '具体风险因子: 未处理的心理创伤；识别指标: 创伤筛查阳性、情绪不稳定；干预策略: 个人治疗先行、创伤处理；预防效果: 显著降低关系冲突；引用来源 (Citation): Whisman, M. A. (2007).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Prevention_Preparation.md
  section: 风险因素识别与干预表
- type: concept
  question: 关系风险的核心要点是什么？
  answer: '具体风险因子: 沟通模式问题；识别指标: 负性互动频繁、修复困难；干预策略: 沟通技能训练、模式改变；预防效果: 提高关系稳定性；引用来源 (Citation): Gottman, J. M. (1999).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Prevention_Preparation.md
  section: 风险因素识别与干预表
- type: concept
  question: 婚姻满意度的下降通常在离婚前5-8年已开始的核心要点是什么？
  answer: '数据来源: Gottman & Levenson (2002)；核心结论: 危机不是突然出现的，而是长期退化的结果；对实践的启示: 早期干预远比危机处理更有效'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Prevention_Prevention.md
  section: 1.1 为什么需要预防性维护
- type: concept
  question: 参加婚前教育的夫妇离婚率降低30%的核心要点是什么？
  answer: '数据来源: Markman et al. (2010)；核心结论: 预防性教育具有显著的长期保护效应；对实践的启示: 婚前教育应成为标准实践'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Prevention_Prevention.md
  section: 1.1 为什么需要预防性维护
- type: concept
  question: 关系中的积极互动与消极互动比例低于5:1时，关系处于高风险的核心要点是什么？
  answer: '数据来源: Gottman (1999)；核心结论: 日常互动质量比重大事件更能预测关系走向；对实践的启示: 持续培养积极的互动习惯'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Prevention_Prevention.md
  section: 1.1 为什么需要预防性维护
- type: concept
  question: 一级预防的核心要点是什么？
  answer: '目标人群: 所有已婚或即将结婚的伴侣；核心策略: 婚前教育、关系技能培养、健康习惯建立；时间节点: 婚前或婚后早期；干预强度: 低强度、广覆盖'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Prevention_Prevention.md
  section: 1.2 预防性维护的三个层次
- type: concept
  question: 二级预防的核心要点是什么？
  answer: '目标人群: 出现早期风险信号的伴侣；核心策略: 定期关系检查、风险因素筛查、早期干预；时间节点: 关系出现压力信号时；干预强度: 中等强度、针对性'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Prevention_Prevention.md
  section: 1.2 预防性维护的三个层次
- type: concept
  question: 三级预防的核心要点是什么？
  answer: '目标人群: 已经出现明显问题的伴侣；核心策略: 专业咨询介入、危机干预、关系重建；时间节点: 冲突升级或疏离明显时；干预强度: 高强度、专业化'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Prevention_Prevention.md
  section: 1.2 预防性维护的三个层次
- type: concept
  question: 金钱观的核心要点是什么？
  answer: '核心问题: 消费与储蓄理念、财务目标、财产管理方式；为什么重要: 金钱冲突是婚姻矛盾的Top 3来源；不讨论的潜在后果: 婚后因消费观念差异频繁冲突；推荐讨论方式: 各自列出月度开支清单和财务目标'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Prevention_Prevention.md
  section: 2.1 婚前必谈话题清单
- type: concept
  question: 生育计划的核心要点是什么？
  answer: '核心问题: 是否要孩子、何时要、要几个、教育理念；为什么重要: 生育是最不可逆的婚姻决定；不讨论的潜在后果: 对方不想生孩子但你不知道；推荐讨论方式: 坦诚分享各自的生育意愿和恐惧'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Prevention_Prevention.md
  section: 2.1 婚前必谈话题清单
- type: concept
  question: 安全型的核心要点是什么？
  answer: '中文名称: 安全依恋；英文术语: Secure Attachment；内在工作模式: 自我正向+他人正向；关系中的表现: 信任伴侣、舒适亲密、有效沟通、适当依赖；伴侣互动特点: 能表达需求、接受伴侣需求、建设性冲突；改变可能性:
    约55-60%成人；最稳定；引用来源 (Citation): Hazan, C. & Shaver, P. (1987).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Psychology.md
  section: 成人依恋类型详解表
- type: concept
  question: 焦虑型的核心要点是什么？
  answer: '中文名称: 焦虑-矛盾型依恋；英文术语: Anxious-Preoccupied；内在工作模式: 自我负向+他人正向；关系中的表现: 过度担心被抛弃、寻求确认、情绪反应强烈；伴侣互动特点: 抗议行为、过度解读、嫉妒、粘人；改变可能性:
    约20%成人；通过关系可改善；引用来源 (Citation): Bartholomew, K. (1990).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Psychology.md
  section: 成人依恋类型详解表
- type: concept
  question: 回避型的核心要点是什么？
  answer: '中文名称: 疏离-回避型依恋；英文术语: Dismissive-Avoidant；内在工作模式: 自我正向+他人负向；关系中的表现: 重视独立、压抑情感需求、避免亲密；伴侣互动特点: 情感距离、退缩、自给自足姿态；改变可能性:
    约25%成人；改变较难；引用来源 (Citation): Bartholomew, K. (1990).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Psychology.md
  section: 成人依恋类型详解表
- type: concept
  question: 安全+安全的核心要点是什么？
  answer: '互动特点: 最稳定、高满意度、有效沟通；常见冲突模式: 冲突能及时修复；关系挑战: 可能过于舒适而缺乏成长刺激；改善方向: 保持成长、避免停滞；专业视角 (Professional Perspective): 理想配对；占稳定婚姻多数。'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Psychology.md
  section: 依恋互动模式表
- type: concept
  question: 安全+焦虑的核心要点是什么？
  answer: '互动特点: 安全方提供稳定、焦虑方逐渐安全化；常见冲突模式: 焦虑方需要更多确认；关系挑战: 安全方可能感到被消耗；改善方向: 安全方保持耐心；焦虑方发展自我安抚；专业视角 (Professional Perspective):
    焦虑方有机会"获得安全"(Earned Security)。'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Psychology.md
  section: 依恋互动模式表
- type: concept
  question: 安全+回避的核心要点是什么？
  answer: '互动特点: 安全方尝试连接、回避方设限；常见冲突模式: 追求vs撤退的轻度版本；关系挑战: 安全方可能感到被拒绝；改善方向: 回避方渐进开放；安全方尊重节奏；专业视角 (Professional Perspective):
    安全方可能逐渐"拉近"回避方。'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Psychology.md
  section: 依恋互动模式表
- type: concept
  question: 归因偏差的核心要点是什么？
  answer: '中文名称: 负面归因偏向；英文术语: Negative Attribution Bias；婚姻中的表现: 将伴侣负面行为归因于人格特质而非情境；对关系的影响: 增加负面情绪、降低修复意愿；认知重构方向: 考虑情境因素；给予善意解读空间；引用来源
    (Citation): Bradbury, T. N. & Fincham, F. D. (1990).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Psychology.md
  section: 认知偏差与婚姻关系表
- type: concept
  question: 确认偏差的核心要点是什么？
  answer: '中文名称: 验证性偏见；英文术语: Confirmation Bias；婚姻中的表现: 选择性注意符合既有信念的信息；对关系的影响: 强化负面看法；忽略正面行为；认知重构方向: 有意识寻找反例；记录正面事件；引用来源 (Citation):
    Baucom, D. H. & Epstein, N. (1990).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Psychology.md
  section: 认知偏差与婚姻关系表
- type: concept
  question: AAMFT的核心要点是什么？
  answer: '中文名称: 美国婚姻家庭治疗协会；地区: 美国/国际；主要功能: 行业标准、伦理、倡导；认证类型: LMFT执照支持；网站: aamft.org'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Resources.md
  section: 专业组织与认证机构表
- type: concept
  question: IAMFC的核心要点是什么？
  answer: '中文名称: 国际婚姻家庭咨询协会；地区: 国际；主要功能: 咨询师专业发展；认证类型: 继续教育；网站: iamfconline.org'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Resources.md
  section: 专业组织与认证机构表
- type: concept
  question: ICEEFT的核心要点是什么？
  answer: '中文名称: 国际EFT卓越中心；地区: 国际；主要功能: EFT培训与认证；认证类型: EFT认证；网站: iceeft.com'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Resources.md
  section: 专业组织与认证机构表
- type: concept
  question: Journal of Marriage and Family的核心要点是什么？
  answer: '出版机构: NCFR/Wiley；影响因子/级别: SSCI, IF~2.5；主要内容: 婚姻家庭研究旗舰期刊；投稿类型: 实证研究'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Resources.md
  section: 学术期刊表
- type: concept
  question: Family Process的核心要点是什么？
  answer: '出版机构: Family Process Institute；影响因子/级别: SSCI, IF~2.8；主要内容: 家庭治疗过程研究；投稿类型: 研究、理论'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Resources.md
  section: 学术期刊表
- type: concept
  question: Journal of Marital and Family Therapy的核心要点是什么？
  answer: '出版机构: AAMFT/Wiley；影响因子/级别: SSCI, IF~2.3；主要内容: 婚姻家庭治疗研究；投稿类型: 临床研究'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Resources.md
  section: 学术期刊表
- type: concept
  question: The Seven Principles for Making Marriage Work的核心要点是什么？
  answer: '作者: J. Gottman；出版年: 1999；主要内容: Gottman研究的普及版；适合人群: 大众、临床入门'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Resources.md
  section: 经典文献与必读书目表
- type: concept
  question: Hold Me Tight的核心要点是什么？
  answer: '作者: S. Johnson；出版年: 2008；主要内容: EFT普及版；适合人群: 大众、临床入门'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Resources.md
  section: 经典文献与必读书目表
- type: concept
  question: 冷战的核心要点是什么？
  answer: '英文术语 (English Term): Silent Treatment；精确定义: 在冲突或不满后，一方或双方通过拒绝言语沟通、情感回应和互动参与来表达敌意或施加控制的行为模式；与相关概念的区分: 与"健康暂停"不同：冷战是单方面的、无预告的、无回归承诺的；暂停是协商的、有时限的、有修复意图的；临床意义:
    被Gottman列为婚姻"四骑士"之一（石墙），是离婚的强力预测因子；引用来源 (Citation): Gottman, J. M. (1994). *What Predicts Divorce?*'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Silent_Treatment.md
  section: 一、核心概念与术语体系 (Core Concepts & Terminology)
- type: concept
  question: 石墙行为的核心要点是什么？
  answer: '英文术语 (English Term): Stonewalling；精确定义: 在互动中情感性关闭、拒绝参与对话、表现为表情空白、沉默不语或离开现场；与相关概念的区分: 石墙侧重描述互动中的即时关闭行为；冷战侧重描述冲突后持续性的沉默惩罚；临床意义:
    Gottman研究中85%的石墙行为由男性发起，与弥漫性生理唤起(DPA)相关；引用来源 (Citation): Gottman, J. M. & Levenson, R. W. (1988).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Silent_Treatment.md
  section: 一、核心概念与术语体系 (Core Concepts & Terminology)
- type: concept
  question: 沉默惩罚的核心要点是什么？
  answer: '英文术语 (English Term): Ostracism / Social Exclusion；精确定义: 通过蓄意排斥、忽视和沉默来惩罚对方的行为，让对方感到被孤立和被拒绝；与相关概念的区分: 比一般冷战更具主动惩罚性和操控意图；临床意义:
    Williams的研究表明，社会排斥在神经层面激活与物理疼痛相同的脑区（背侧前扣带回皮质）；引用来源 (Citation): Williams, K. D. (2001). *Ostracism: The Power of Silence.*'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Silent_Treatment.md
  section: 一、核心概念与术语体系 (Core Concepts & Terminology)
- type: concept
  question: 惩罚型冷战的核心要点是什么？
  answer: '中文名称: Punitive Silent Treatment；核心动机: 通过沉默让对方感到痛苦以作为惩罚；典型行为表现: 完全拒绝交流、冷脸对待、故意在对方面前与他人热情互动；持续时间: 数小时至数周；破坏性评级: ★★★★★；干预策略:
    识别控制动机；设定边界；必要时寻求专业干预'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Silent_Treatment.md
  section: 2.1 按动机与功能分类
- type: concept
  question: 防御型冷战的核心要点是什么？
  answer: '中文名称: Defensive Silent Treatment；核心动机: 因情感泛滥或恐惧而关闭，是自我保护反应；典型行为表现: 沉默、回避目光、离开房间、沉浸手机或工作；持续时间: 数小时至数天；破坏性评级: ★★★☆☆；干预策略:
    识别DPA信号；学习健康暂停技术；自我安抚训练'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Silent_Treatment.md
  section: 2.1 按动机与功能分类
- type: concept
  question: 操控型冷战的核心要点是什么？
  answer: '中文名称: Manipulative Silent Treatment；核心动机: 通过沉默迫使对方让步、道歉或改变行为；典型行为表现: 有条件地恢复沟通（仅在对方满足要求后）、暗示"你知道自己做错了什么"；持续时间: 取决于对方是否妥协；破坏性评级:
    ★★★★★；干预策略: 拒绝在胁迫下妥协；命名操控模式；边界设定'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Silent_Treatment.md
  section: 2.1 按动机与功能分类
- type: concept
  question: 完全沉默型的核心要点是什么？
  answer: '描述: 彻底拒绝一切言语交流；具体行为: 不说话、不回消息、不接电话、不回应任何对话尝试；对接收方的影响: 极度焦虑、自我怀疑、被遗弃感；隐性信号: 最直接也最容易被识别的形式'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Silent_Treatment.md
  section: 2.2 按表现形式分类
- type: concept
  question: 选择性回应型的核心要点是什么？
  answer: '描述: 只回应功能性事务，拒绝情感交流；具体行为: 回答"孩子几点放学"但忽略"我们能谈谈吗"；对接收方的影响: 困惑、挫败、觉得"我疯了吗"；隐性信号: 容易被外界误读为"挺正常的"'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Silent_Treatment.md
  section: 2.2 按表现形式分类
- type: concept
  question: 残障人士夫妻的核心要点是什么？
  answer: '核心特征: 身体或心智功能受限；关系挑战: 适应性需求、照顾负担、社会偏见；适应需求: 无障碍环境、特殊支持服务；专业考量: 医疗资源整合、权益保障意识；引用来源 (Citation): Olkin, R. (1999).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Special_Populations.md
  section: 特殊人群分类与特点表
- type: concept
  question: LGBTQ+夫妻的核心要点是什么？
  answer: '核心特征: 性少数群体身份；关系挑战: 社会歧视、家庭接纳、法律保障；适应需求: 身份认同支持、社群连接；专业考量: 文化敏感性、法律知识；引用来源 (Citation): Kurdek, L. A. (2004).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Special_Populations.md
  section: 特殊人群分类与特点表
- type: concept
  question: 跨文化夫妻的核心要点是什么？
  answer: '核心特征: 不同文化背景结合；关系挑战: 价值观冲突、沟通障碍、家庭压力；适应需求: 文化适应支持、双语能力；专业考量: 跨文化胜任力、翻译服务；引用来源 (Citation): Falicov, C. J. (1995).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Special_Populations.md
  section: 特殊人群分类与特点表
- type: concept
  question: 日常生活的核心要点是什么？
  answer: '具体挑战: 移动、自理、家务困难；创新解决方案: 辅助技术设备、环境改造、服务犬；专业支持: 职业治疗师、无障碍设计师；成功指标: 独立性提升30%以上；引用来源 (Citation): Olkin, R. (1999).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Special_Populations.md
  section: 身体残障适应策略
- type: concept
  question: 性亲密的核心要点是什么？
  answer: '具体挑战: 身体限制影响性表达；创新解决方案: 适应性性技巧、辅助器具、开放沟通；专业支持: 性治疗师、适应性性教育专家；成功指标: 性满意度维持或提升；引用来源 (Citation): Plummer, S. B. &
    Makadon, H. J. (2012).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Special_Populations.md
  section: 身体残障适应策略
- type: concept
  question: 社会参与的核心要点是什么？
  answer: '具体挑战: 无障碍设施缺乏、歧视；创新解决方案: 残障友好社区、权益倡导、同伴支持；专业支持: 残障权益组织、社会工作者；成功指标: 社交活动频率增加；引用来源 (Citation): Livneh, H. (2002).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Special_Populations.md
  section: 身体残障适应策略
- type: concept
  question: 沟通方式的核心要点是什么？
  answer: '轻度智力障碍: 可以学习复杂概念；中重度智力障碍: 需要简化语言和视觉辅助；支持策略: 使用图片交流、重复确认理解；专业资源: 语言治疗师、特殊教育老师；引用来源 (Citation): Luckasson, R. et
    al. (1992).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Special_Populations.md
  section: 心智残障特殊考虑
- type: concept
  question: 决策能力的核心要点是什么？
  answer: '轻度智力障碍: 能参与简单决策；中重度智力障碍: 需要监护人协助重要决定；支持策略: 渐进式决策参与、支持性决策模式；专业资源: 法律监护专家、社工；引用来源 (Citation): Stancliffe, R. J. et
    al. (2011).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Special_Populations.md
  section: 心智残障特殊考虑
- type: concept
  question: EFT的核心要点是什么？
  answer: '中文名称: 情绪聚焦疗法；创始人: Sue Johnson；理论基础: 依恋理论、人本主义；核心技术: 识别负面循环、接触脆弱情绪、重塑依恋联结；循证支持: 强(多项RCT)；适用问题: 情感疏离、不安全依恋、创伤；引用来源
    (Citation): Johnson, S. M. (2004).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Therapy_Methods.md
  section: 主流婚姻治疗流派比较表
- type: concept
  question: Gottman Method的核心要点是什么？
  answer: '中文名称: Gottman方法疗法；创始人: John Gottman；理论基础: Gottman婚姻理论；核心技术: 建立友谊、管理冲突、创造共同意义；循证支持: 强(大量研究)；适用问题: 沟通问题、冲突升级、缺乏亲密；引用来源
    (Citation): Gottman, J. M. (1999).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Therapy_Methods.md
  section: 主流婚姻治疗流派比较表
- type: concept
  question: IBCT的核心要点是什么？
  answer: '中文名称: 整合行为婚姻疗法；创始人: Jacobson & Christensen；理论基础: 行为疗法+接纳；核心技术: 行为改变技术+情感接纳技术；循证支持: 强(RCT支持)；适用问题: 慢性冲突、行为模式僵化；引用来源
    (Citation): Jacobson, N. S. & Christensen, A. (1998).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Therapy_Methods.md
  section: 主流婚姻治疗流派比较表
- type: concept
  question: 阶段一的核心要点是什么？
  answer: '中文名称: 循环降级；英文术语: De-escalation；目标: 识别并中断负面互动循环；主要步骤: 步骤1-4：评估、识别循环、接触依恋情绪、重新框架；治疗师角色: 追踪情绪、反映循环、创造安全；引用来源 (Citation):
    Johnson, S. M. (2004).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Therapy_Methods.md
  section: EFT情绪聚焦疗法详解表
- type: concept
  question: 阶段二的核心要点是什么？
  answer: '中文名称: 重塑互动；英文术语: Restructuring；目标: 创造新的依恋体验与互动；主要步骤: 步骤5-7：接触深层需求、接纳伴侣体验、表达需求与回应；治疗师角色: 促进脆弱表达、编排纠正体验；引用来源 (Citation):
    Johnson, S. M. (2004).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Therapy_Methods.md
  section: EFT情绪聚焦疗法详解表
- type: concept
  question: 阶段三的核心要点是什么？
  answer: '中文名称: 巩固整合；英文术语: Consolidation；目标: 巩固新模式、解决旧问题；主要步骤: 步骤8-9：建立安全联结的新循环、用新视角解决旧问题；治疗师角色: 支持整合、预防复发；引用来源 (Citation):
    Johnson, S. M. (2004).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Therapy_Methods.md
  section: EFT情绪聚焦疗法详解表
- type: concept
  question: 负面循环的核心要点是什么？
  answer: '中文名称: 恶性互动舞蹈；英文术语: Negative Cycle/Dance；定义: 伴侣间自动化的负面互动模式(如追逃)；治疗应用: 外化为"我们的敌人"；共同对抗；引用来源 (Citation): Johnson,
    S. M. (2004).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Therapy_Methods.md
  section: EFT核心概念表
- type: concept
  question: 依恋伤害的核心要点是什么？
  answer: '中文名称: 依恋创伤；英文术语: Attachment Injury；定义: 关键时刻伴侣未能提供支持造成的信任破裂；治疗应用: 需要特别处理的"旧伤"；引用来源 (Citation): Johnson, S. M. et
    al. (2001).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Therapy_Methods.md
  section: EFT核心概念表
- type: concept
  question: 孩子不是来访者的问题的核心要点是什么？
  answer: '意思是: 大多数情况下，孩子的问题是对家庭系统问题的反应——修复系统比修复孩子更重要；反面教材: 把孩子送去咨询而自己什么都不改变'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Children_Support_Intervention.md
  section: 一、干预的基本原则 (Foundational Principles)
- type: concept
  question: 支持父母=支持孩子的核心要点是什么？
  answer: '意思是: 父母的心理健康和照顾质量是孩子适应的最强预测因子；反面教材: 只关注孩子的症状而忽视父母的状态'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Children_Support_Intervention.md
  section: 一、干预的基本原则 (Foundational Principles)
- type: concept
  question: 不是所有孩子都需要专业干预的核心要点是什么？
  answer: '意思是: 大约75-80%的孩子会自然适应——你要做的是识别那20%真正需要帮助的；反面教材: 过度干预本身也可以是一种问题——"你需要看心理医生"可能强化了"我有问题"的自我认知'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Children_Support_Intervention.md
  section: 一、干预的基本原则 (Foundational Principles)
- type: concept
  question: 情绪处理的核心要点是什么？
  answer: '具体做法: 为自己找一个安全的出口——咨询师、好朋友、支持团体；为什么对孩子重要: 你处理好了自己的情绪，才不会把情绪泄洪到孩子身上'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Children_Support_Intervention.md
  section: 2.1 父母自身的心理支持
- type: concept
  question: 照顾质量维护的核心要点是什么？
  answer: '具体做法: 即使自己状态很差，也要保住孩子的基本节律——按时吃饭、按时睡觉、按时上学；为什么对孩子重要: 日常结构是孩子安全感的锚点——一切都在变，但饭还是那个时间吃，觉还是那个时间睡'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Children_Support_Intervention.md
  section: 2.1 父母自身的心理支持
- type: concept
  question: 避免三角化的核心要点是什么？
  answer: '具体做法: 绝对不在孩子面前说对方坏话、不通过孩子传话、不让孩子做"裁判"；为什么对孩子重要: 忠诚冲突是对孩子最具破坏力的因素——比离婚本身更伤人'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Children_Support_Intervention.md
  section: 2.1 父母自身的心理支持
- type: concept
  question: 3-5岁的核心要点是什么？
  answer: '怎么说: "爸爸妈妈决定不住在一起了，但我们都非常爱你，这一点永远不会变。你以后会有两个家。"；不要说: "你以后可能见不到爸爸/妈妈了" 或任何含糊不清让孩子瞎猜的说法；核心信息: 我们爱你、不是你的错、你会被照顾好'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Children_Support_Intervention.md
  section: 2.2 给不同年龄段孩子的告知模板
- type: concept
  question: 6-9岁的核心要点是什么？
  answer: '怎么说: "爸爸妈妈试了很多办法想让我们的关系变好，但我们决定分开住会对大家都更好。我们不再是夫妻，但永远是你的爸爸妈妈。"；不要说: "爸爸做了很不好的事"或任何让孩子选边站的暗示；核心信息: 我们尝试过了、这是大人的决定、你的生活不会被毁掉'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Children_Support_Intervention.md
  section: 2.2 给不同年龄段孩子的告知模板
- type: concept
