- type: concept
  question: 孤独的核心要点是什么？
  answer: '英文名 (English Term): Loneliness；原始语言/术语 (Original Language): 源自 *Alone* + *-ness*; 相关: 拉: *Solitudo*；词源含义: “与他人脱节”的主观体验,即使身边有人仍感到无人真正理解或看见自己；精确定义:
    一种主观情绪状态,不等同于客观“是否有人在身边”；区分与备注: 孤独是一种“感知到的关系缺失”,是心理痛苦与健康风险的核心变量'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Overview.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 社交孤立的核心要点是什么？
  answer: '英文名 (English Term): Social Isolation；原始语言/术语 (Original Language): 拉: *Isolatio* (隔离)；词源含义: 客观层面的社会联系稀少或缺乏；精确定义:
    以社交网络规模、互动频率等客观指标衡量；区分与备注: 可以社交孤立但不孤独(偏好独处),也可以人际很多却非常孤独'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Overview.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 情绪性孤独的核心要点是什么？
  answer: '英文名 (English Term): Emotional Loneliness；原始语言/术语 (Original Language): 拉: *Emovere* (动起来,情绪)；词源含义: 缺乏“关键情感对象”(如亲密伴侣、挚友或心灵同伴)的孤独；精确定义:
    即使社交圈大,若缺少深度亲密关系,仍会出现情绪性孤独；区分与备注: 在婚内孤独中尤为突出:形式上有伴侣,情绪上却无人可依'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Overview.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 时间维度的核心要点是什么？
  answer: '类型 (中文): 短暂孤独；英文名: Transient Loneliness；典型情境: 搬家初期、短期单身、换工作、留学初期；临床表现: 情绪波动、短期睡眠受影响,但能逐渐适应；风险重点: 一般风险较低,多可自发恢复；干预方向:
    帮助正常化体验,提供临时支持与适应策略'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Overview.md
  section: 孤独类型与临床图谱表 (Types & Clinical Patterns of Loneliness)
- type: concept
  question: 情境性孤独的核心要点是什么？
  answer: '类型 (中文): Situational Loneliness；英文名: 丧亲、离婚、失业、重大疾病后；典型情境: 悲伤、退缩、对关系失望；临床表现: 抑郁、自我价值感下降；风险重点: 结合哀伤/创伤工作,重建安全关系网络'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Overview.md
  section: 孤独类型与临床图谱表 (Types & Clinical Patterns of Loneliness)
- type: concept
  question: 慢性孤独的核心要点是什么？
  answer: '类型 (中文): Chronic Loneliness；英文名: 长期缺乏满足关系,从童年或青少年持续；典型情境: 社交焦虑、自我否定、关系回避或过度依附；临床表现: 抑郁、自杀、物质使用、慢性疾病风险显著上升；风险重点:
    深度心理治疗+关系重建,需长期介入'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Overview.md
  section: 孤独类型与临床图谱表 (Types & Clinical Patterns of Loneliness)
- type: concept
  question: 脑回路的核心要点是什么？
  answer: '关键发现: 孤独与社会疼痛共享部分神经基础；典型机制 (Mechanisms): 前扣带回(ACC)、岛叶、腹侧纹状体涉及“被拒绝”体验；临床/健康后果: 情绪痛苦、社交威胁过度警觉；专业洞察: “心理的痛”在大脑中与身体疼痛高度重叠,解释“被忽视像被刺痛”体验'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Overview.md
  section: 孤独的神经生物学与身心影响表 (Neurobiology & Health Impact)
- type: concept
  question: 压力系统的核心要点是什么？
  answer: '关键发现: 长期孤独激活HPA轴和交感系统；典型机制 (Mechanisms): 皮质醇长期偏高、交感亢进、睡眠结构受扰；临床/健康后果: 心血管疾病、代谢综合征、免疫功能下降；专业洞察: 孤独应被视为慢性压力源(chronic
    stressor),需要与高血压、糖尿病同级别重视'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Overview.md
  section: 孤独的神经生物学与身心影响表 (Neurobiology & Health Impact)
