  question: 留守老人的核心要点是什么？
  answer: '英文: Left-Behind Elderly；定义: 子女外出务工，独自或与配偶留在农村的老年人；中国标准: 子女外出≥6个月，≥60岁；全球对应现象: 跨国移民老年父母'
  source: 02-Mind-Psychology/psychology/social/rural-psychology/Rural_Left_Behind_Psychology.md
  section: 1.1 术语与定义
- type: concept
  question: 依恋发展的核心要点是什么？
  answer: '影响表现: 不安全依恋比例增高；影响机制: 早期分离破坏安全基地；严重程度: ★★★★★；保护因素: 稳定的替代照护者'
  source: 02-Mind-Psychology/psychology/social/rural-psychology/Rural_Left_Behind_Psychology.md
