  source: 02-Mind-Psychology/psychology/foundations/personality/Dark_Triad_Personality.md
  section: 1.1 定义与框架
- type: concept
  question: 精神病态 (Psychopathy)的核心要点是什么？
  answer: '核心特征: 无情、冲动、反社会；临床对应: 反社会人格障碍 (ASPD)'
  source: 02-Mind-Psychology/psychology/foundations/personality/Dark_Triad_Personality.md
  section: 1.1 定义与框架
- type: concept
  question: 共情缺陷的核心要点是什么？
  answer: '自恋: 情感共情低, 认知共情保留；马基雅维利: 情感共情低, 认知共情高；精神病态: 双重缺陷'
