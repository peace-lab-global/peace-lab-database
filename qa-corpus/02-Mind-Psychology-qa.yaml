  answer: '巴利文: Kāyānupassanā；对象: 身体；情绪相关内容: 情绪的身体感受；修习方法: 身体扫描、呼吸觉察；临床应用: 内感受觉察'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Cultural_Wisdom.md
  section: 表1.4 正念与情绪(四念处) (Mindfulness & Emotion in Satipaṭṭhāna)
- type: concept
  question: 受念处的核心要点是什么？
  answer: '巴利文: Vedanānupassanā；对象: 感受；情绪相关内容: 乐受、苦受、舍受；修习方法: 觉察感受的生灭；临床应用: 情绪觉察基础'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Cultural_Wisdom.md
  section: 表1.4 正念与情绪(四念处) (Mindfulness & Emotion in Satipaṭṭhāna)
- type: concept
  question: 心念处的核心要点是什么？
  answer: '巴利文: Cittānupassanā；对象: 心/情绪；情绪相关内容: 有贪/无贪、有嗔/无嗔等心；修习方法: 觉察心的状态；临床应用: 情绪命名与觉察'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Cultural_Wisdom.md
  section: 表1.4 正念与情绪(四念处) (Mindfulness & Emotion in Satipaṭṭhāna)
- type: concept
  question: 悲/忧的核心要点是什么？
  answer: '英文: Grief；对应脏: 肺；五行: 金；过度表现: 悲伤、忧愁；伤及脏腑: 伤肺(气消)；调节方法: 宣肺理气；相克制约: 喜(火)克悲'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Cultural_Wisdom.md
  section: 表2.1 五志与脏腑对应 (Five Emotions & Organ Correspondence)
- type: concept
  question: 恐/惊的核心要点是什么？
  answer: '英文: Fear；对应脏: 肾；五行: 水；过度表现: 恐惧、惊恐；伤及脏腑: 伤肾(气下)；调节方法: 补肾定志；相克制约: 思(土)克恐'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Cultural_Wisdom.md
  section: 表2.1 五志与脏腑对应 (Five Emotions & Organ Correspondence)
- type: concept
  question: 来访者正在尽其所能的核心要点是什么？
  answer: '英文: Patients are doing the best they can；内容: 在当前条件下，来访者已尽最大努力；临床意义: 避免指责，理解行为功能'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_DBT_Skills.md
  section: 表1.1 DBT核心假设 (Core Assumptions of DBT)
- type: concept
  question: 来访者想要改善的核心要点是什么？
  answer: '英文: Patients want to improve；内容: 即使行为适应不良，来访者也想改善；临床意义: 寻找改变动机'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_DBT_Skills.md
  section: 表1.1 DBT核心假设 (Core Assumptions of DBT)
- type: concept
  question: 来访者需要做得更好的核心要点是什么？
  answer: '英文: Patients need to do better, try harder；内容: 改善需要付出努力；临床意义: 推动改变'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_DBT_Skills.md
  section: 表1.1 DBT核心假设 (Core Assumptions of DBT)
- type: concept
  question: 接纳 vs 改变的核心要点是什么？
  answer: '一极: 接纳现状；另一极: 推动改变；整合/平衡: 激进接纳+坚定改变；临床表现: 治疗核心张力'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_DBT_Skills.md
  section: 表1.2 DBT辩证原则 (Dialectical Principles in DBT)
- type: concept
  question: 验证 vs 挑战的核心要点是什么？
  answer: '一极: 验证来访者体验；另一极: 挑战适应不良行为；整合/平衡: 两者交替进行；临床表现: 治疗关系风格'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_DBT_Skills.md
  section: 表1.2 DBT辩证原则 (Dialectical Principles in DBT)
- type: concept
  question: 情绪 vs 理性的核心要点是什么？
  answer: '一极: 感性心智；另一极: 理性心智；整合/平衡: 智慧心智；临床表现: 决策时的整合'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_DBT_Skills.md
  section: 表1.2 DBT辩证原则 (Dialectical Principles in DBT)
- type: concept
  question: 情绪脆弱性(生物)的核心要点是什么？
  answer: '英文: Emotional Vulnerability；内容: 先天的高情绪敏感性和反应性；表现: 情绪阈值低、反应强度高、回复慢；治疗意义: 验证脆弱性，教授调节技能'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_DBT_Skills.md
  section: 表1.3 DBT生物社会理论 (Biosocial Theory of DBT)
- type: concept
  question: 无效环境(社会)的核心要点是什么？
  answer: '英文: Invalidating Environment；内容: 情绪体验被否认、惩罚或忽视；表现: 环境不匹配情绪需求；治疗意义: 提供验证性环境'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_DBT_Skills.md
  section: 表1.3 DBT生物社会理论 (Biosocial Theory of DBT)
- type: concept
  question: 情绪是适应性的的核心要点是什么？
  answer: '英文: Emotions are Adaptive；内容: 情绪提供关于需求和行动方向的重要信息；临床意义: 不是消除情绪，而是利用情绪智慧；与其他疗法比较: 不同于早期CBT视情绪为认知结果'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Focused_Therapy.md
  section: 表1.1 EFT核心理论假设 (Core Theoretical Assumptions of EFT)
- type: concept
  question: 情绪具有首要性的核心要点是什么？
  answer: '英文: Primacy of Emotion；内容: 情绪反应先于且独立于认知，可直接激活；临床意义: 直接在情绪层面工作；与其他疗法比较: 不同于认知优先的观点'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Focused_Therapy.md
  section: 表1.1 EFT核心理论假设 (Core Theoretical Assumptions of EFT)
- type: concept
  question: 情绪是改变的机制的核心要点是什么？
  answer: '英文: Emotion as Mechanism of Change；内容: 情绪体验和转化是治疗改变的核心；临床意义: 聚焦于体验而非仅仅谈论情绪；与其他疗法比较: 强调体验性处理'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Focused_Therapy.md
  section: 表1.1 EFT核心理论假设 (Core Theoretical Assumptions of EFT)
- type: concept
  question: 情绪图式的核心要点是什么？
  answer: '英文: Emotion Scheme；定义: 组织情绪体验的内隐记忆结构；组成成分: 情境+情绪+身体感觉+行动倾向+需求+意义；临床表现: 自动激活的情绪反应模式；治疗目标: 激活并转化不适应图式'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Focused_Therapy.md
  section: 表1.2 情绪图式理论 (Emotion Scheme Theory)
- type: concept
  question: 核心情绪图式的核心要点是什么？
  answer: '英文: Core Emotion Scheme；定义: 早期形成的关于自我和他人的情绪记忆；组成成分: 依恋体验、创伤记忆、核心信念；临床表现: 核心痛苦、自我批评、羞耻；治疗目标: 触及核心体验'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Focused_Therapy.md
  section: 表1.2 情绪图式理论 (Emotion Scheme Theory)
- type: concept
  question: 适应性图式的核心要点是什么？
  answer: '英文: Adaptive Scheme；定义: 健康的、功能性的情绪组织；组成成分: 安全、自尊、能力感；临床表现: 正性情绪、适应性行动；治疗目标: 激活和强化'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Focused_Therapy.md
  section: 表1.2 情绪图式理论 (Emotion Scheme Theory)
- type: concept
  question: 原发适应性情绪的核心要点是什么？
  answer: '英文: Primary Adaptive Emotion；特征: 对情境的直接、适应性反应；治疗态度: 接触、表达、信任；治疗策略: 支持表达、引导行动；示例: 对不公正的愤怒、对丧失的悲伤'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Focused_Therapy.md
  section: 表1.3 情绪类型分类 (Classification of Emotion Types in EFT)
- type: concept
  question: 原发不适应性情绪的核心要点是什么？
  answer: '英文: Primary Maladaptive Emotion；特征: 对情境的直接但失功能反应，源于过去；治疗态度: 接触、探索、转化；治疗策略: 深化体验、激活新情绪；示例: 核心羞耻、被抛弃的恐惧'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Focused_Therapy.md
  section: 表1.3 情绪类型分类 (Classification of Emotion Types in EFT)
- type: concept
  question: 当下觉察的核心要点是什么？
  answer: '英文: Present-Moment Awareness；巴利语/梵语: Sati (念)；定义: 注意力放在当前体验；情绪相关作用: 减少对过去/未来的反刍/担忧；临床应用: 情绪觉察训练'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Mindfulness_Approaches.md
  section: 表1.1 正念定义与核心要素 (Definition & Core Elements of Mindfulness)
- type: concept
  question: 非评判的核心要点是什么？
  answer: '英文: Non-Judgment；巴利语/梵语: Avyāpāda (无嗔)；定义: 观察体验而不评价好坏；情绪相关作用: 减少对情绪的二次反应；临床应用: 接纳情绪存在'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Mindfulness_Approaches.md
  section: 表1.1 正念定义与核心要素 (Definition & Core Elements of Mindfulness)
- type: concept
  question: 接纳的核心要点是什么？
  answer: '英文: Acceptance；巴利语/梵语: Upekkhā (舍)；定义: 允许体验存在而不抗拒；情绪相关作用: 减少情绪斗争；临床应用: 情绪接纳训练'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Mindfulness_Approaches.md
  section: 表1.1 正念定义与核心要素 (Definition & Core Elements of Mindfulness)
- type: concept
  question: 去中心化的核心要点是什么？
  answer: '英文: Decentering；定义: 将想法和情绪视为心理事件而非现实；神经基础: PFC-杏仁核连接增强；情绪效果: 减少情绪反应性；研究支持: MBCT研究'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Mindfulness_Approaches.md
  section: 表1.2 正念改变情绪的机制 (Mechanisms of Mindfulness in Emotion Change)
- type: concept
  question: 元认知觉察的核心要点是什么？
  answer: '英文: Metacognitive Awareness；定义: 觉察到自己在想什么、感什么；神经基础: 岛叶、前扣带回激活；情绪效果: 增加情绪觉察和距离；研究支持: 多项研究'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Mindfulness_Approaches.md
  section: 表1.2 正念改变情绪的机制 (Mechanisms of Mindfulness in Emotion Change)
- type: concept
  question: 暴露的核心要点是什么？
  answer: '英文: Exposure；定义: 面对情绪而非回避；神经基础: 杏仁核习惯化；情绪效果: 减少情绪回避；研究支持: 暴露机制研究'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Mindfulness_Approaches.md
  section: 表1.2 正念改变情绪的机制 (Mechanisms of Mindfulness in Emotion Change)
- type: concept
  question: 正念接纳的核心要点是什么？
  answer: '目标: 改变与情绪的关系；对情绪态度: 接纳、允许；主要机制: 去中心化、暴露；适用情境: 各种情绪、不可控情境；潜在局限: 需要练习，初期可能困难'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Mindfulness_Approaches.md
  section: 表1.3 正念与情绪调节策略比较 (Mindfulness vs. Other Emotion Regulation Strategies)
- type: concept
  question: 认知重评的核心要点是什么？
  answer: '目标: 改变情绪本身；对情绪态度: 认为可以改变；主要机制: 改变评估；适用情境: 可重新解读的情境；潜在局限: 可能变成压抑'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Mindfulness_Approaches.md
  section: 表1.3 正念与情绪调节策略比较 (Mindfulness vs. Other Emotion Regulation Strategies)
- type: concept
  question: 杏仁核的核心要点是什么？
  answer: '英文名称: Amygdala；拉丁名: Corpus amygdaloideum；解剖位置: 颞叶内侧，海马前方；主要功能: 威胁检测、情绪记忆；情绪相关作用: 恐惧学习与表达、情绪显著性标记；损伤后果: 恐惧识别障碍、社会情绪判断受损；临床意义:
    焦虑障碍、PTSD的核心脑区'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Neuroscience.md
  section: 表1.1 情绪相关核心脑区 (Core Brain Regions for Emotion)
- type: concept
  question: 前额叶皮层的核心要点是什么？
  answer: '英文名称: Prefrontal Cortex (PFC)；拉丁名: Cortex praefrontalis；解剖位置: 额叶前部；主要功能: 执行功能、决策、抑制；情绪相关作用: 情绪调节、认知重评、冲动控制；损伤后果:
    情绪失调、冲动行为；临床意义: 情绪调节训练的神经靶点'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Neuroscience.md
  section: 表1.1 情绪相关核心脑区 (Core Brain Regions for Emotion)
- type: concept
  question: 眶额皮层的核心要点是什么？
  answer: '英文名称: Orbitofrontal Cortex (OFC)；拉丁名: Cortex orbitofrontalis；解剖位置: 额叶底部，眼眶上方；主要功能: 奖赏评估、决策；情绪相关作用: 情绪价值编码、社会情绪判断；损伤后果:
    社会行为不当、情绪决策受损；临床意义: 成瘾、冲动控制障碍'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Neuroscience.md
  section: 表1.1 情绪相关核心脑区 (Core Brain Regions for Emotion)
- type: concept
  question: 恐惧回路的核心要点是什么？
  answer: '英文: Fear Circuit；核心脑区: 杏仁核-下丘脑-脑干-PAG；功能: 威胁检测、恐惧反应；神经递质: 谷氨酸、GABA、去甲肾上腺素；情绪类型: 恐惧、焦虑；相关障碍: 焦虑障碍、PTSD、恐惧症；临床干预靶点:
    暴露疗法、正念、药物'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Neuroscience.md
  section: 表1.2 情绪神经回路 (Emotional Neural Circuits)
- type: concept
  question: 奖赏回路的核心要点是什么？
  answer: '英文: Reward Circuit；核心脑区: VTA-伏隔核-PFC；功能: 奖赏预期、愉悦体验；神经递质: 多巴胺、内啡肽；情绪类型: 快乐、期待、满足；相关障碍: 抑郁(快感缺乏)、成瘾；临床干预靶点: 行为激活、正性情绪培养'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Neuroscience.md
  section: 表1.2 情绪神经回路 (Emotional Neural Circuits)
- type: concept
  question: 厌恶回路的核心要点是什么？
  answer: '英文: Aversion Circuit；核心脑区: 杏仁核-岛叶-ACC；功能: 厌恶检测、回避学习；神经递质: 5-HT、去甲肾上腺素；情绪类型: 厌恶、恶心、排斥；相关障碍: 强迫症、饮食障碍；临床干预靶点: 认知重评、暴露'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Neuroscience.md
  section: 表1.2 情绪神经回路 (Emotional Neural Circuits)
- type: concept
  question: 基底外侧核群的核心要点是什么？
  answer: '英文: Basolateral Complex (BLA)；主要功能: 情绪学习、联想形成；输入连接: 感觉皮层、海马、PFC；输出连接: 中央核、皮层；情绪相关作用: 恐惧条件化学习、情绪记忆形成；临床相关性: 焦虑障碍的核心机制'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Neuroscience.md
  section: 表1.3 杏仁核功能详解 (Amygdala Functions in Detail)
- type: concept
  question: 中央核的核心要点是什么？
  answer: '英文: Central Nucleus (CeA)；主要功能: 恐惧反应输出；输入连接: 基底外侧核；输出连接: 下丘脑、脑干、PAG；情绪相关作用: 恐惧行为和生理反应的表达；临床相关性: PTSD的过度反应'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Neuroscience.md
  section: 表1.3 杏仁核功能详解 (Amygdala Functions in Detail)
- type: concept
  question: 情境选择的核心要点是什么？
  answer: '英文: Situation Selection；发生时机: 情绪发生前；调节策略: 选择/回避特定情境；神经基础: PFC决策系统；效果: 最有效的前期预防；临床应用: 回避触发情境、建立支持环境'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Regulation_Methods.md
  section: 表1.1 Gross情绪调节过程模型 (Gross's Process Model)
- type: concept
  question: 情境修改的核心要点是什么？
  answer: '英文: Situation Modification；发生时机: 情绪发生前；调节策略: 改变情境以调整情绪影响；神经基础: PFC执行功能；效果: 主动应对；临床应用: 问题解决、环境调整'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Regulation_Methods.md
  section: 表1.1 Gross情绪调节过程模型 (Gross's Process Model)
- type: concept
  question: 注意部署的核心要点是什么？
  answer: '英文: Attentional Deployment；发生时机: 情绪产生中；调节策略: 引导注意力方向；神经基础: 背外侧PFC、顶叶；效果: 中等效果；临床应用: 分散注意、专注、反刍控制'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Regulation_Methods.md
  section: 表1.1 Gross情绪调节过程模型 (Gross's Process Model)
- type: concept
  question: 前因聚焦的核心要点是什么？
  answer: '英文: Antecedent-Focused；时机: 情绪完全产生前；典型策略: 认知重评、情境选择；心理效果: 减少负性情绪体验；生理效果: 减少生理反应；社会效果: 社交更真实；长期影响: 心理健康良好'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Regulation_Methods.md
  section: 表1.2 前因聚焦vs反应聚焦调节 (Antecedent-Focused vs. Response-Focused Regulation)
- type: concept
  question: 反应聚焦的核心要点是什么？
  answer: '英文: Response-Focused；时机: 情绪产生后；典型策略: 表达抑制、行为控制；心理效果: 不减少主观体验；生理效果: 增加交感激活；社会效果: 社交不真实、记忆受损；长期影响: 可能损害心理健康'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Regulation_Methods.md
  section: 表1.2 前因聚焦vs反应聚焦调节 (Antecedent-Focused vs. Response-Focused Regulation)
- type: concept
  question: 认知重评的核心要点是什么？
  answer: '具体策略: 重新解读；英文: Reappraisal；定义: 改变对情境的解读以改变情绪；短期效果: 减少负性情绪；长期效果: 心理健康良好；适用情境: 可控或可重新解读的情境；不适用情境: 需要快速反应时'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Regulation_Methods.md
  section: 表1.3 情绪调节策略分类与效果 (Emotion Regulation Strategies Classification)
- type: concept
  question: 接纳的核心要点是什么？
  answer: '具体策略: 允许情绪存在；英文: Acceptance；定义: 以开放态度允许情绪存在；短期效果: 减少情绪斗争；长期效果: 心理灵活性提升；适用情境: 不可控情境；不适用情境: 需要行动改变时'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Regulation_Methods.md
  section: 表1.3 情绪调节策略分类与效果 (Emotion Regulation Strategies Classification)
- type: concept
  question: 问题解决的核心要点是什么？
  answer: '具体策略: 解决问题来源；英文: Problem-Solving；定义: 直接解决引发情绪的问题；短期效果: 情绪改善；长期效果: 掌控感提升；适用情境: 可控、可解决的问题；不适用情境: 不可控或已发生的事件'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Regulation_Methods.md
  section: 表1.3 情绪调节策略分类与效果 (Emotion Regulation Strategies Classification)
- type: concept
  question: 认知维度的核心要点是什么？
  answer: '表现: 担忧、灾难化、注意偏向威胁；神经机制: PFC-杏仁核过度激活；功能: 预测和准备应对威胁；病理性指标: 担忧失控、入侵性；评估工具: PSWQ、GAD-7'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Specific_Interventions.md
  section: 表1.1 焦虑的多维度分析 (Multi-dimensional Analysis of Anxiety)
- type: concept
  question: 情绪维度的核心要点是什么？
  answer: '表现: 紧张、不安、恐惧、烦躁；神经机制: 杏仁核、前扣带回；功能: 警报信号；病理性指标: 强度过高、持续过久；评估工具: STAI、BAI'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Specific_Interventions.md
  section: 表1.1 焦虑的多维度分析 (Multi-dimensional Analysis of Anxiety)
- type: concept
  question: 生理维度的核心要点是什么？
  answer: '表现: 心悸、出汗、肌肉紧张、呼吸浅快；神经机制: 交感神经激活、HPA轴；功能: 身体准备行动；病理性指标: 躯体症状持续、影响功能；评估工具: 生理监测'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Specific_Interventions.md
  section: 表1.1 焦虑的多维度分析 (Multi-dimensional Analysis of Anxiety)
- type: concept
  question: 生理调节的核心要点是什么？
  answer: '具体技术: 膈式呼吸；英文: Diaphragmatic Breathing；机制: 激活副交感神经；适用阶段: 急性焦虑；操作要点: 腹式呼吸，呼气长于吸气；证据等级: A级'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Specific_Interventions.md
  section: 表1.2 焦虑处理核心技术 (Core Techniques for Anxiety)
- type: concept
  question: 生理调节的核心要点是什么？
  answer: '具体技术: 渐进肌肉放松；英文: PMR；机制: 降低肌肉张力；适用阶段: 持续紧张；操作要点: 系统紧张-放松各肌群；证据等级: A级'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Specific_Interventions.md
  section: 表1.2 焦虑处理核心技术 (Core Techniques for Anxiety)
- type: concept
  question: 认知技术的核心要点是什么？
  answer: '具体技术: 认知重评；英文: Cognitive Reappraisal；机制: 改变威胁评估；适用阶段: 担忧反刍；操作要点: 检验证据、替代解释；证据等级: A级'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Specific_Interventions.md
  section: 表1.2 焦虑处理核心技术 (Core Techniques for Anxiety)
- type: concept
  question: 阶段1：稳定化的核心要点是什么？
  answer: '目标: 降低急性焦虑、建立安全感；技术: 呼吸训练、放松、扎根；时长: 1-2周；关键任务: 掌握即时镇静技能；注意事项: 不要急于暴露'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Specific_Interventions.md
  section: 表1.3 焦虑处理分阶段方案 (Staged Anxiety Intervention Protocol)
- type: concept
  question: 阶段2：心理教育的核心要点是什么？
  answer: '目标: 理解焦虑、建立治疗框架；技术: 焦虑模型教育、正常化；时长: 1次；关键任务: 理解焦虑功能和维持因素；注意事项: 减少对焦虑的恐惧'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Specific_Interventions.md
  section: 表1.3 焦虑处理分阶段方案 (Staged Anxiety Intervention Protocol)
- type: concept
  question: 生理维度的核心要点是什么？
  answer: '定义: 情绪是身体对刺激的自动生理反应；英文术语: Physiological Response；拉丁/希腊词源: Motus (拉丁: 运动)；核心要素: 自主神经激活、激素分泌、肌肉紧张；代表学者: William James,
    Carl Lange；专业视角: James-Lange理论：身体反应先于情绪体验，"我们哭所以悲伤"'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Therapy_Overview.md
  section: 表1.1 情绪定义的多维度解析 (Multi-dimensional Definitions of Emotion)
- type: concept
  question: 认知维度的核心要点是什么？
  answer: '定义: 情绪是对事件意义的认知评估结果；英文术语: Cognitive Appraisal；拉丁/希腊词源: Cognitio (拉丁: 认知)；核心要素: 初级评估、次级评估、意义建构；代表学者: Richard Lazarus,
    Magda Arnold；专业视角: 认知评估理论：同一事件因评估不同而产生不同情绪'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Therapy_Overview.md
  section: 表1.1 情绪定义的多维度解析 (Multi-dimensional Definitions of Emotion)
- type: concept
  question: 体验维度的核心要点是什么？
  answer: '定义: 情绪是主观感受的意识状态；英文术语: Subjective Experience；拉丁/希腊词源: Affectus (拉丁: 影响)；核心要素: 效价(愉悦-不悦)、唤醒度、主观感受；代表学者: Wilhelm
    Wundt；专业视角: 情感核心(Affect Core)是所有情绪体验的基础维度'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Therapy_Overview.md
  section: 表1.1 情绪定义的多维度解析 (Multi-dimensional Definitions of Emotion)
- type: concept
  question: 情绪的核心要点是什么？
  answer: '中文: 情绪；英文: Emotion；持续时间: 秒-分钟；强度: 中-高；对象性: 有明确对象；意识性: 清晰意识；典型例子: 对考试失败的愤怒；专业区分: 有明确触发事件，指向特定对象'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Therapy_Overview.md
  section: 表1.2 情绪与相关概念辨析 (Emotion vs. Related Concepts)
- type: concept
  question: 情感的核心要点是什么？
  answer: '中文: 情感；英文: Affect；持续时间: 瞬时-持续；强度: 低-高；对象性: 可有可无；意识性: 可意识可不意识；典型例子: 基础的愉悦或不悦感；专业区分: 最广泛的上位概念，包含所有感受状态'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Therapy_Overview.md
  section: 表1.2 情绪与相关概念辨析 (Emotion vs. Related Concepts)
- type: concept
  question: 心境的核心要点是什么？
  answer: '中文: 心境/情调；英文: Mood；持续时间: 小时-数周；强度: 低-中；对象性: 无明确对象；意识性: 背景性；典型例子: 持续的郁闷感；专业区分: 弥漫性的背景情感状态，影响认知倾向'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Therapy_Overview.md
  section: 表1.2 情绪与相关概念辨析 (Emotion vs. Related Concepts)
- type: concept
  question: 六种基本情绪的核心要点是什么？
  answer: '提出者: Paul Ekman；基本情绪列表: 快乐(Happiness)、悲伤(Sadness)、愤怒(Anger)、恐惧(Fear)、厌恶(Disgust)、惊讶(Surprise)；分类依据: 面部表情的跨文化普遍性；跨文化证据:
    巴布亚新几内亚等前文化接触研究；临床意义: 情绪识别训练的基础框架；专业评价: 最广泛接受的基本情绪模型，但近年受到文化建构主义挑战'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Therapy_Overview.md
  section: 表1.3 基本情绪分类系统 (Basic Emotion Classification Systems)
- type: concept
  question: 八种基本情绪的核心要点是什么？
  answer: '提出者: Robert Plutchik；基本情绪列表: 喜悦、信任、恐惧、惊讶、悲伤、厌恶、愤怒、期待；分类依据: 进化适应功能与对立组织；跨文化证据: 基于进化理论推导；临床意义: 情绪轮模型用于情绪词汇训练；专业评价:
    强调情绪的进化功能和混合情绪的可能性'
  source: 02-Mind-Psychology/psychology/somatic-body/emotion/Emotion_Therapy_Overview.md
  section: 表1.3 基本情绪分类系统 (Basic Emotion Classification Systems)
