- type: concept
  question: 不伤害 (Non-maleficence)的核心要点是什么？
  answer: '定义: 避免对学员造成身体或心理伤害；在冥想教学中的应用: 识别禁忌症、监测不良反应、适时停止；违反示例: 忽视学员的解离信号继续引导深度冥想；专业视角: 希波克拉底"首先，不造成伤害"(Primum non nocere)'
  source: 02-Mind-Psychology/meditation/practitioner-training/Practitioner_Ethics_Standards.md
  section: 1.1 伦理框架
- type: concept
  question: 行善 (Beneficence)的核心要点是什么？
  answer: '定义: 积极促进学员的福祉；在冥想教学中的应用: 提供循证有效的冥想方法、个性化调整；违反示例: 推广未经验证的"灵性疗法"替代正规医疗；专业视角: 善意不等于能力——必须在能力范围内行善'
  source: 02-Mind-Psychology/meditation/practitioner-training/Practitioner_Ethics_Standards.md
  section: 1.1 伦理框架
- type: concept
  question: 自主 (Autonomy)的核心要点是什么？
  answer: '定义: 尊重学员的自主选择权；在冥想教学中的应用: 知情同意、随时退出的权利、不施压；违反示例: 暗示"坚持不下去是因为你不够努力"；专业视角: 冥想不是"吃药"——学员有权选择和拒绝'
  source: 02-Mind-Psychology/meditation/practitioner-training/Practitioner_Ethics_Standards.md
  section: 1.1 伦理框架
- type: concept
  question: 1. 识别的核心要点是什么？
  answer: '行动: 识别伦理议题的存在；问自己的问题: "这里有伦理问题吗？"；工具/资源: 伦理敏感性训练'
  source: 02-Mind-Psychology/meditation/practitioner-training/Practitioner_Ethics_Standards.md
  section: 1.2 伦理决策模型
- type: concept
  question: 2. 收集的核心要点是什么？
  answer: '行动: 收集相关事实与信息；问自己的问题: "发生了什么？涉及哪些人？"；工具/资源: 事实核查'
  source: 02-Mind-Psychology/meditation/practitioner-training/Practitioner_Ethics_Standards.md
  section: 1.2 伦理决策模型
- type: concept
  question: 引导词的核心要点是什么？
  answer: '英文名: Guided Script / Instruction；精确定义: 冥想引导者用于带领学员进入冥想状态的语言文本；专业视角: 好的引导词是"邀请"而非"命令"，使用"你可以…"而非"你必须…"'
  source: 02-Mind-Psychology/meditation/practitioner-training/Practitioner_Teaching_Methodology.md
  section: 核心术语表 (Core Terms)
- type: concept
  question: 治疗性嗓音的核心要点是什么？
  answer: '英文名: Therapeutic Voice；精确定义: 经过训练的、能传递安全感与平静的说话方式；专业视角: 语速放慢30-40%、音调降低、加入有意义的停顿'
  source: 02-Mind-Psychology/meditation/practitioner-training/Practitioner_Teaching_Methodology.md
  section: 核心术语表 (Core Terms)
- type: concept
  question: 场域的核心要点是什么？
  answer: '英文名: Container / Field；精确定义: 引导者通过物理环境与心理氛围创造的安全空间；专业视角: Rogers"无条件积极关注"在冥想教学中的体现'
  source: 02-Mind-Psychology/meditation/practitioner-training/Practitioner_Teaching_Methodology.md
  section: 核心术语表 (Core Terms)
- type: concept
  question: 落定层 (Settling)的核心要点是什么？
  answer: '功能: 帮助学员从日常模式过渡到冥想状态；时长占比: 15-20%；语言特征: 温和、缓慢、接地；示例: "找到一个让你感觉舒适和稳定的坐姿……让身体的重量交给大地……"'
  source: 02-Mind-Psychology/meditation/practitioner-training/Practitioner_Teaching_Methodology.md
  section: 1.1 引导词的四层结构模型
- type: concept
  question: 锚定层 (Anchoring)的核心要点是什么？
  answer: '功能: 建立注意力的锚点（如呼吸、身体感觉）；时长占比: 30-40%；语言特征: 具体、感官化、引导注意；示例: "将注意力轻轻地带到鼻尖……感受空气进出时的温度变化……"'
  source: 02-Mind-Psychology/meditation/practitioner-training/Practitioner_Teaching_Methodology.md
  section: 1.1 引导词的四层结构模型
- type: concept
  question: 深化层 (Deepening)的核心要点是什么？
  answer: '功能: 引导注意力深入、扩展或探索；时长占比: 30-40%；语言特征: 开放、邀请、留白多；示例: "（长停顿）……如果念头升起……只是注意到……然后温柔地回到呼吸……"'
  source: 02-Mind-Psychology/meditation/practitioner-training/Practitioner_Teaching_Methodology.md
  section: 1.1 引导词的四层结构模型
- type: concept
  question: 邀请而非命令的核心要点是什么？
  answer: '说明: 使用"你可以""你被邀请"而非"你必须""你应该"；正确示例: "你可以选择闭上眼睛，或者轻轻低垂目光"；错误示例: "现在闭上眼睛"；专业视角: 尊重学员的自主权(Autonomy)是安全感的基础'
  source: 02-Mind-Psychology/meditation/practitioner-training/Practitioner_Teaching_Methodology.md
  section: 1.2 引导词编写原则
- type: concept
  question: 感官化而非概念化的核心要点是什么？
  answer: '说明: 引导具体的感官体验而非抽象概念；正确示例: "感受腹部随呼吸起伏的感觉"；错误示例: "体会呼吸的本质"；专业视角: 感官语言激活体感皮层，促进具身体验'
  source: 02-Mind-Psychology/meditation/practitioner-training/Practitioner_Teaching_Methodology.md
  section: 1.2 引导词编写原则
- type: concept
  question: 冥想执行师的核心要点是什么？
  answer: '英文名 (English Term): Meditation Facilitator / Practitioner；原始语言: 英: Facilitator；精确定义: 经过系统培训，具备引导他人进行冥想练习能力的专业人员；专业视角:
    区别于"冥想教师(Teacher)"——执行师侧重引导与陪伴，教师侧重教学与传承'
  source: 02-Mind-Psychology/meditation/practitioner-training/Practitioner_Training_Overview.md
  section: 核心术语表 (Core Terms)
- type: concept
  question: 正念教师的核心要点是什么？
  answer: '英文名 (English Term): Mindfulness Teacher；原始语言: 英: Mindfulness Teacher；精确定义: 专注于世俗化正念干预（如MBSR/MBCT）的教学者；专业视角: MBI-TAC（正念干预教学评估标准）是国际通用评估框架'
  source: 02-Mind-Psychology/meditation/practitioner-training/Practitioner_Training_Overview.md
  section: 核心术语表 (Core Terms)
- type: concept
  question: 冥想教练的核心要点是什么？
  answer: '英文名 (English Term): Meditation Coach；原始语言: 英: Meditation Coach；精确定义: 以一对一或小组形式提供个性化冥想指导的专业人员；专业视角: 更接近教练模式(Coaching)而非治疗模式(Therapy)'
  source: 02-Mind-Psychology/meditation/practitioner-training/Practitioner_Training_Overview.md
  section: 核心术语表 (Core Terms)
- type: concept
  question: 冥想引导者 (Guide)的核心要点是什么？
  answer: '定位: 按照既定脚本引导冥想体验；核心能力: 朗读引导词、时间管理、基本应急；服务形式: 团体引导课；培训时长: 40-80小时；资质要求: 基础培训证书'
  source: 02-Mind-Psychology/meditation/practitioner-training/Practitioner_Training_Overview.md
  section: 1.1 角色光谱
- type: concept
  question: 冥想执行师 (Facilitator)的核心要点是什么？
  answer: '定位: 根据学员状态灵活调整引导策略；核心能力: 临场应变、学员觉察、初级评估；服务形式: 团体课 + 小组；培训时长: 200-300小时；资质要求: 专业培训 + 督导实习'
  source: 02-Mind-Psychology/meditation/practitioner-training/Practitioner_Training_Overview.md
  section: 1.1 角色光谱
- type: concept
  question: 冥想教师 (Teacher)的核心要点是什么？
  answer: '定位: 教授冥想理论与实践的完整体系；核心能力: 理论讲授、课程设计、深度评估；服务形式: 系统课程 + 培训；培训时长: 500-1000小时；资质要求: 资深培训 + 认证'
  source: 02-Mind-Psychology/meditation/practitioner-training/Practitioner_Training_Overview.md
  section: 1.1 角色光谱
- type: concept
  question: 冥想传统与历史的核心要点是什么？
  answer: '核心内容: 佛教、瑜伽、道家、基督教默观等传统的冥想体系；深度要求: 了解主要传统的核心方法与目标差异；评估方式: 笔试 + 论文；专业视角: 知其源方能守其本，避免"无根正念"'
  source: 02-Mind-Psychology/meditation/practitioner-training/Practitioner_Training_Overview.md
  section: 2.1 知识维度 (Knowledge Competencies)
- type: concept
  question: 冥想类型学的核心要点是什么？
  answer: '核心内容: FA/OM/Affective/Non-dual/Movement五大类型；深度要求: 理解注意力机制差异与适应症匹配；评估方式: 案例分析；专业视角: Lutz等(2008)的分类框架是科学基础'
  source: 02-Mind-Psychology/meditation/practitioner-training/Practitioner_Training_Overview.md
  section: 2.1 知识维度 (Knowledge Competencies)
- type: concept
  question: 我要用力把气吸到腹部"的核心要点是什么？
  answer: '生理事实: 腹部隆起是横膈膜下降挤压内脏的**被动结果**，不是主动"推气"'
  source: 02-Mind-Psychology/meditation/pranayama-breath/diaphragmatic-breathing-masterclass.md
  section: 1.1 横膈膜的解剖位置与功能
- type: concept
  question: 腹式呼吸比胸式呼吸更好"的核心要点是什么？
  answer: '生理事实: 健康的自然呼吸本就是**横膈膜主导 + 胸腹腔协同**，不应割裂'
  source: 02-Mind-Psychology/meditation/pranayama-breath/diaphragmatic-breathing-masterclass.md
  section: 1.1 横膈膜的解剖位置与功能
- type: concept
  question: 呼吸越深越好"的核心要点是什么？
  answer: '生理事实: 过度深呼吸会导致**低碳酸血症**（头晕、手脚发麻），应追求**舒缓**而非**深大**'
  source: 02-Mind-Psychology/meditation/pranayama-breath/diaphragmatic-breathing-masterclass.md
  section: 1.1 横膈膜的解剖位置与功能
- type: concept
  question: 中央腱（Central Tendon）的核心要点是什么？
  answer: '解剖描述: 位于横膈膜中央的三角形腱性区域，不含肌纤维；功能意义: 是横膈膜收缩时的**固定锚点**，肌纤维向中央腱汇聚，收缩时将中央腱向下拉平'
  source: 02-Mind-Psychology/meditation/pranayama-breath/diaphragmatic-breathing-masterclass.md
  section: 1.2 横膈膜的精细解剖结构
- type: concept
  question: 肌性部（Muscular Part）的核心要点是什么？
  answer: '解剖描述: 分为胸骨部、肋部、腰部三个附着区域；功能意义: 提供收缩力量，不同部位的紧张度影响呼吸的均匀性'
  source: 02-Mind-Psychology/meditation/pranayama-breath/diaphragmatic-breathing-masterclass.md
  section: 1.2 横膈膜的精细解剖结构
- type: concept
  question: 膈脚（Crura）的核心要点是什么？
  answer: '解剖描述: 左、右膈脚附着于腰椎前缘（L1–L3）；功能意义: 右侧膈脚跨越食管裂孔，与食管下括约肌协同；**膈脚张力异常与胃食管反流相关**'
  source: 02-Mind-Psychology/meditation/pranayama-breath/diaphragmatic-breathing-masterclass.md
  section: 1.2 横膈膜的精细解剖结构
- type: concept
  question: 呼吸频率的核心要点是什么？
  answer: '成人安静状态: 12–16 次/分钟；运动/深呼吸: 可达 40–60 次/分钟；备注: 冥想深入时可降至 4–6 次/分钟'
  source: 02-Mind-Psychology/meditation/pranayama-breath/diaphragmatic-breathing-masterclass.md
  section: 1.3 呼吸的生理学参数参考
- type: concept
  question: 潮气量（Tidal Volume）的核心要点是什么？
  answer: '成人安静状态: 400–600 ml；运动/深呼吸: 可达 2000–3000 ml；备注: 每次正常呼吸的通气量'
  source: 02-Mind-Psychology/meditation/pranayama-breath/diaphragmatic-breathing-masterclass.md
  section: 1.3 呼吸的生理学参数参考
