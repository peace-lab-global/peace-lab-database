- type: concept
  question: Mask Making的核心要点是什么？
  answer: '描述 (Description): 面具制作；心理目标 (Psychological Goal): 探索阴影 (Shadow)；人格面具。；投射机制 (Mechanism): 将内在冲突具像化到外部物体。；专业视角 (Professional
    Perspective): 允许来访者“佩戴”或脱离其创伤身份，提供安全的叙事距离。；引用来源 (Citation): Malchiodi, C. A. (2003). *Handbook of Art Therapy*.'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Arts_Nature.md
  section: Art Therapy Techniques (艺术治疗技术)
- type: concept
  question: Collage Work的核心要点是什么？
  answer: '描述 (Description): 剪贴画；心理目标 (Psychological Goal): 整合碎片化的自我感。；投射机制 (Mechanism): 重新编排现有元素形成新叙事。；专业视角 (Professional
    Perspective): 对创伤来访者特别有效，因为无需高超绘画技巧即可表达复杂的抽象感受。；引用来源 (Citation): Linesch, D. G. (1988). *Art Therapy with Adolescents*.'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Arts_Nature.md
  section: Art Therapy Techniques (艺术治疗技术)
- type: concept
  question: Mirroring的核心要点是什么？
  answer: '应用场景 (Application): 镜像练习；实现机制 (Mechanism): 建立同理心和人际同步。；专业视角 (Professional Perspective): 激活镜像神经元系统 (MNS)。；引用来源 (Citation):
    建立一种非言语的调谐 (Attunement)，对依恋创伤的修复至关重要。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Arts_Nature.md
  section: Dance/Movement Therapy (舞动治疗)
- type: concept
  question: Effort-Shape Analysis的核心要点是什么？
  answer: '应用场景 (Application): 动作努力-形状分析；实现机制 (Mechanism): 增加动作质量的范围（柔和/强力）。；专业视角 (Professional Perspective): 拓展情感表达范围。；引用来源
    (Citation): 基于拉班动作分析 (Laban Movement Analysis)，通过改变动作动态来改变内在情绪状态。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Arts_Nature.md
  section: Dance/Movement Therapy (舞动治疗)
- type: concept
  question: Embodied Metaphor的核心要点是什么？
  answer: '应用场景 (Application): 具身隐喻；实现机制 (Mechanism): 动作作为抽象问题（如“穿墙”）的化身。；专业视角 (Professional Perspective): 物理化并解决象征性障碍。；引用来源
    (Citation): 将心理上的“被困”在生理维度上演练突围，增强自我效能。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Arts_Nature.md
  section: Dance/Movement Therapy (舞动治疗)
- type: concept
  question: Shinrin-yoku的核心要点是什么？
  answer: '机制 (Mechanism): 森林浴；生理影响 (Physiological Impact): 抗病杀菌素 (Phytoncides) 的吸入。；心理效益 (Psychological Benefit): 提高 NK 细胞活性。；专业视角
    (Professional Perspective): 显著降低血压和脉搏速率，这被称为“森林效应”。；引用来源 (Citation): Li, Q. (2018). *Shinrin-Yoku*.'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Arts_Nature.md
  section: Eco-therapy & Forest Bathing (生态疗法与森林浴)
- type: concept
  question: Grounding/Earthing的核心要点是什么？
  answer: '机制 (Mechanism): 接地；生理影响 (Physiological Impact): 直接接触地球表面的电子。；心理效益 (Psychological Benefit): 中和自由基；减少炎症。；专业视角 (Professional
    Perspective): 与地球的生物节律（舒曼共振）同步有助于稳定睡眠。；引用来源 (Citation): Ober, C., et al. (2010). *Earthing*.'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Arts_Nature.md
  section: Eco-therapy & Forest Bathing (生态疗法与森林浴)
- type: concept
  question: Delta (δ)的核心要点是什么？
  answer: '频率范围 (Hz): 0.5 – 4；意识状态: 深度无梦睡眠；无意识修复态。；生理特征: 生长激素 (GH) 分泌高峰；免疫细胞活性增强；细胞修复级联启动。；心理/认知功能: 身体自我修复；无意识深层整合。；对应疗愈场景:
    慢性疲劳恢复；术后康复；深度睡眠引导。；专业视角 (Professional Perspective): Delta 是人体自愈力最强的脑波态；在清醒状态下刻意引导 Delta 需谨慎（可能导致过度嗜睡）。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Brainwave_Entrainment.md
  section: Brainwave Bands & Consciousness States (脑波频段与意识状态对照表)
- type: concept
  question: Theta (θ)的核心要点是什么？
  answer: '频率范围 (Hz): 4 – 8；意识状态: 深度冥想；浅睡/入睡前态；催眠态。；生理特征: 海马体长时程增强 (LTP) 活跃；边缘系统情绪处理增强；默认模式网络 (DMN) 活性改变。；心理/认知功能: 创造性洞见；潜意识记忆检索；情绪加工窗口；"心流"入口。；对应疗愈场景:
    创伤处理 (EMDR 辅助)；冥想深化；创意工作准备；潜意识重构。；专业视角 (Professional Perspective): Theta 态被称为"大脑可塑性窗口"——神经突触重塑效率在此频段最高，是所有脑波引导技术的核心目标。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Brainwave_Entrainment.md
  section: Brainwave Bands & Consciousness States (脑波频段与意识状态对照表)
- type: concept
  question: Alpha (α)的核心要点是什么？
  answer: '频率范围 (Hz): 8 – 13；意识状态: 清醒放松；冥想初期；闭眼静息态。；生理特征: 丘脑皮层节律同步化；副交感神经张力提升；皮质醇水平下降。；心理/认知功能: 压力缓冲；注意力松弛但不涣散；身心协调；学习准备态。；对应疗愈场景:
    压力管理；焦虑缓解；考试/演出前放松；正念入门。；专业视角 (Professional Perspective): Alpha 是最"友好"的脑波态——引导难度最低、副作用最少，适合所有人群的安全起点。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Brainwave_Entrainment.md
  section: Brainwave Bands & Consciousness States (脑波频段与意识状态对照表)
- type: concept
  question: 基本原理的核心要点是什么？
  answer: '详细说明 (Details): 左耳接收频率 f1、右耳接收 f2，大脑感知到一个等于；科学机制: f1-f2；临床/实践应用: 的"虚拟音"。；参数建议: 下丘内侧上橄榄核 (MSO) 进行双耳频率差的神经计算，产生频率跟随反应
    (FFR)。；专业视角 (Professional Perspective): 利用双耳频率差引导脑波进入目标频段。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Brainwave_Entrainment.md
  section: 'Binaural Beats: Mechanism & Clinical Application (双耳节拍：机制与临床应用表)'
- type: concept
  question: Delta 引导的核心要点是什么？
  answer: '详细说明 (Details): 左耳 200Hz + 右耳 203Hz = 3Hz 节拍。；科学机制: 引导脑波进入 0.5-4Hz Delta 频段。；临床/实践应用: 深度睡眠辅助；身体修复支持。；参数建议: 入睡前
    30 分钟开始聆听；音量 30-40dB；持续 45-60 分钟。；专业视角 (Professional Perspective): Delta 双耳节拍不适合日间使用——可能导致日间过度嗜睡和认知功能下降。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Brainwave_Entrainment.md
  section: 'Binaural Beats: Mechanism & Clinical Application (双耳节拍：机制与临床应用表)'
- type: concept
  question: Theta 引导的核心要点是什么？
  answer: '详细说明 (Details): 左耳 200Hz + 右耳 206Hz = 6Hz 节拍。；科学机制: 引导脑波进入 4-8Hz Theta 频段。；临床/实践应用: 深度冥想；创伤加工；创意激发。；参数建议: 冥想前 10
    分钟建立 Theta 场，全程不超过 45 分钟。；专业视角 (Professional Perspective): Theta 引导中可能出现情绪释放——疗愈师需做好情绪支持准备。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Brainwave_Entrainment.md
  section: 'Binaural Beats: Mechanism & Clinical Application (双耳节拍：机制与临床应用表)'
- type: concept
  question: 等时音 (Isochronic Tones)的核心要点是什么？
  answer: '原理: 单一音源以精确间隔开关，产生节奏性脉冲。；声学特征: 方波/正弦波的间歇性开关；脉冲上升沿极其陡峭。；引导效能: ★★★★★ — 研究显示 FFR 响应强于双耳节拍。；优势: 无需耳机；单声道即可生效；频率引导范围更广。；局限:
    音色不够"悦耳"；部分人报告脉冲音令人不适。；适用场景: Gamma 引导 (40Hz)；认知训练；不需要耳机设备的团体场景。；专业视角 (Professional Perspective): 等时音是目前研究中最强的脑波引导信号形式——但其"机械感"音质需要叠加自然音景来改善接受度。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Brainwave_Entrainment.md
  section: Isochronic Tones & Monaural Beats (等时音与单耳节拍技术表)
- type: concept
  question: 单耳节拍 (Monaural Beats)的核心要点是什么？
  answer: '原理: 两个频率在空气中混合后产生的振幅调制 (AM) 信号。；声学特征: 正弦波叠加产生的拍频波形；可通过扬声器播放。；引导效能: ★★★☆☆ — 弱于等时音和双耳节拍。；优势: 不需要耳机；比双耳节拍更容易实现。；局限:
    引导深度较浅；容易与背景噪声混淆。；适用场景: 背景放松音乐中的隐性引导；不戴耳机的冥想辅助。；专业视角 (Professional Perspective): 适合嵌入到环境音乐中作为"隐性"脑波引导——使用者不会意识到节拍的存在。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Brainwave_Entrainment.md
  section: Isochronic Tones & Monaural Beats (等时音与单耳节拍技术表)
- type: concept
  question: 动机访谈** (MI)的核心要点是什么？
  answer: '核心逻辑 (Logic): 合作、唤出、自主。；关键问句/技术: “这种改变对你有多重要？”；适用心理韧性阶段: 改变初期的矛盾期 (Ambivalence)。；专业视角 (Professional Perspective):
    核心是“不进行辩论”，利用个体内在的需求推动改变。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Clinical_Dialogue.md
  section: Clinical Interviewing Models (临床访谈模型对比分析表)
- type: concept
  question: 苏格拉底对话的核心要点是什么？
  answer: '核心逻辑 (Logic): 逻辑审视与解构。；关键问句/技术: “你这个想法背后的证据是什么？”；适用心理韧性阶段: 认知扭曲的辨识期。；专业视角 (Professional Perspective): 通过引导性的自发发现，让客户意识到认知的逻辑瑕疵。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Clinical_Dialogue.md
  section: Clinical Interviewing Models (临床访谈模型对比分析表)
- type: concept
  question: 叙事访谈的核心要点是什么？
  answer: '核心逻辑 (Logic): 故事外化、去中心化。；关键问句/技术: “这个‘恐惧’什么时候会变得更强大？”；适用心理韧性阶段: 身份认同重建期。；专业视角 (Professional Perspective): 将问题与人分离，赋予客户重新编写自己生命故事的权力。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Clinical_Dialogue.md
  section: Clinical Interviewing Models (临床访谈模型对比分析表)
- type: concept
  question: 共情式倾听的核心要点是什么？
  answer: '具体执行方式: 眼神调节、微反馈、情感镜像。；心理学效应: 降低客户杏仁核唤醒；建立安全基底。；专家建议 (Professional Advice): 倾听不仅仅是安静，而是一种“充满活力的接纳”。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Clinical_Dialogue.md
  section: Microskills for High-Depth Dialogue (高深访谈微技能表)
- type: concept
  question: 核心反馈** (Reflecting)的核心要点是什么？
  answer: '具体执行方式: 重复客户词语中的核心语义或情感词。；心理学效应: 帮助客户“听到”自己，产生元认知觉察。；专家建议 (Professional Advice): 尽量使用客户原词，而非经过治疗师二次编译的词汇。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Clinical_Dialogue.md
  section: Microskills for High-Depth Dialogue (高深访谈微技能表)
- type: concept
  question: 重构** (Reframing)的核心要点是什么？
  answer: '具体执行方式: 将同一事件置于不同的认知框架下。；心理学效应: 产生新的视角，消除死胡同感。；专家建议 (Professional Advice): 重构必须基于真实事实，而非简单的职业性安慰。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Clinical_Dialogue.md
  section: Microskills for High-Depth Dialogue (高深访谈微技能表)
- type: concept
  question: 正向移情的核心要点是什么？
  answer: '定义 (Definition): 客户将早期的依赖或爱转移到治疗师身上。；识别信号 (Signals): 过度的讨好、英雄化、咨询外的联系企图。；临床对策: 保持界限，将这种动力转化为成长的动力。；专业视角 (Professional
    Perspective): 移情是通往客户潜意识模式的最短路径。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Clinical_Dialogue.md
  section: Relational Dynamics & Field Theory (关系动力与场域分析表)
- type: concept
  question: 负向移情的核心要点是什么？
  answer: '定义 (Definition): 针对治疗师的莫名愤怒、恐惧或蔑视。；识别信号 (Signals): 贬低、爽约、对技术的无端怀疑。；临床对策: 接纳并探索，不要带个人色彩地反击。；专业视角 (Professional Perspective):
    移情反映的是客户过去的投射，而非真实的你。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Clinical_Dialogue.md
  section: Relational Dynamics & Field Theory (关系动力与场域分析表)
- type: concept
  question: 空间** (Space)的核心要点是什么？
  answer: '英文名: Spatial Intent；核心两极 (Polarities): 直接 (Direct) vs 间接 (Indirect)；对应的心理状态: 专注、目标明确 vs 多维度觉察、柔韧。；疗愈性转变重点: 增强边界感或提升开放性。；专业视角
    (Professional Perspective): 空间的使用质量反映了个体在社会环境中的认知宽度。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Dance_Expressive.md
  section: Laban/Bartenieff Fundamentals (LBF) & Psychological Archetypes (拉班/巴特妮芙动作分析与心理原型表)
- type: concept
  question: 重量** (Weight)的核心要点是什么？
  answer: '英文名: Weight Sensing；核心两极 (Polarities): 沉重 (Strong/Deep) vs 轻盈 (Light)；对应的心理状态: 意志力、接地感 vs 敏感度、精神化。；疗愈性转变重点: 从沉重的负担转向轻盈的自由。；专业视角
    (Professional Perspective): 重量感是“自我真实性”的物理量化表现。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Dance_Expressive.md
  section: Laban/Bartenieff Fundamentals (LBF) & Psychological Archetypes (拉班/巴特妮芙动作分析与心理原型表)
- type: concept
  question: 时间** (Time)的核心要点是什么？
  answer: '英文名: Time Urgency；核心两极 (Polarities): 突然 (Sudden) vs 持续 (Sustained)；对应的心理状态: 冲动、警觉 vs 耐心、延时满足。；疗愈性转变重点: 调节情绪爆发力或培养稳定性。；专业视角
    (Professional Perspective): 时间维度直接关联到杏仁核的唤醒速度。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Dance_Expressive.md
  section: Laban/Bartenieff Fundamentals (LBF) & Psychological Archetypes (拉班/巴特妮芙动作分析与心理原型表)
- type: concept
  question: 环绕与拥抱的核心要点是什么？
  answer: '技术描述: 向内的螺旋动作，双臂环抱。；象征意义 (Symbolism): 自我接纳、边界保护。；心理/临床价值: 处理依恋创伤；建立自爱。；专业视角 (Professional Perspective): 模拟安全的子宫环境，重塑本体感觉的安全边界。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Dance_Expressive.md
  section: 'Choreographic Psychology: Symbolic Archetypes (编舞心理学：动作符号与原型表)'
- type: concept
  question: 推与抗拒的核心要点是什么？
  answer: '技术描述: 强力的向外推挤，躯干稳定。；象征意义 (Symbolism): 主权宣言、反抗压迫。；心理/临床价值: 增强自我效能感；处理被动攻击。；专业视角 (Professional Perspective): 通过物理上的抗拒感，完成被阻断的战斗反应。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Dance_Expressive.md
  section: 'Choreographic Psychology: Symbolic Archetypes (编舞心理学：动作符号与原型表)'
- type: concept
  question: 颤抖与破碎的核心要点是什么？
  answer: '技术描述: 高频的不规则颤动。；象征意义 (Symbolism): 释放积压张力、打破僵局。；心理/临床价值: 自主神经系统重启 (Reset)。；专业视角 (Professional Perspective): 不同于
    TRE 的被动震颤，舞动中的颤抖更具表现性倾向。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Dance_Expressive.md
  section: 'Choreographic Psychology: Symbolic Archetypes (编舞心理学：动作符号与原型表)'
- type: concept
  question: 集体涌现的核心要点是什么？
  answer: '描述 (Description): Collective Effervescence；心理功能: 群体在同步节奏中产生的一致性愉悦感。；生态学意义: 消除孤独感；建立超个人的连接。；专业视角 (Professional Perspective):
    社会大脑的共振模式，能显著降低个体的孤立焦虑。；推荐场景: 社区建设；创伤后群体修复。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Dance_Expressive.md
  section: Group Dynamics in Movement Therapy (舞动治疗中的群体动力学表)
- type: concept
  question: 动作见证的核心要点是什么？
  answer: '描述 (Description): Witnessing；心理功能: 一组人移动，另一组人静默观察并共情。；生态学意义: 提升观察性自我 (Observing Self)；认可。；专业视角 (Professional Perspective):
    “被看见”是疗愈的核心，动作见证提供了一种无评判的接纳。；推荐场景: 深度心理探索。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Dance_Expressive.md
  section: Group Dynamics in Movement Therapy (舞动治疗中的群体动力学表)
- type: concept
  question: Binaural Beats的核心要点是什么？
  answer: '描述 (Description): 双耳节拍；预期效应 (Intended Effect): 脑波同步 (Entrainment)。；心理状态 (Mental State): 深度放松；专注。；专业视角 (Professional
    Perspective): 两耳听到的轻微频率差由大脑合成一个幻觉音（如 10Hz 与 12Hz 差异产生 Alpha 波）。；引用来源 (Citation): Oster, G. (1973). *Scientific American*.'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Energy_Sound.md
  section: Sound Healing Frequencies & Brainwaves (声音疗愈频率与脑波)
- type: concept
  question: Solfeggio 528 Hz的核心要点是什么？
  answer: '描述 (Description): 索尔费里奥 528Hz；预期效应 (Intended Effect): DNA修复（理论上）；爱的频率。；心理状态 (Mental State): 减少压力皮质醇。；专业视角 (Professional
    Perspective): 这类特定频率被认为能够调和细胞共振；多见于替代疗法。；引用来源 (Citation): Akimoto, K., et al. (2018). *Effect of 528 Hz Sound*.'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Energy_Sound.md
  section: Sound Healing Frequencies & Brainwaves (声音疗愈频率与脑波)
- type: concept
  question: Singing Bowls的核心要点是什么？
  answer: '描述 (Description): 颂钵；预期效应 (Intended Effect): 谐波超声波。；心理状态 (Mental State): 减压；身体放松。；专业视角 (Professional Perspective):
    协同多种泛音 (Overtone) 直接刺激听觉通路，诱导副交感神经活动。；引用来源 (Citation): Goldsby, T. L., et al. (2017). *Journal of Evidence-Based Medicine*.'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Energy_Sound.md
  section: Sound Healing Frequencies & Brainwaves (声音疗愈频率与脑波)
- type: concept
  question: Reiki的核心要点是什么？
  answer: '主流假设 (Key Hypothesis): 灵气；机制 (Mechanism): 宇宙生命能量 (Prana/Qi) 的传递。；临床证据 (Clinical Evidence): 改善自主神经系统稳态。；专业视角 (Professional
    Perspective): 多项研究显示灵气有助于减少手术焦虑和疼痛感知。；引用来源 (Citation): Jain, S., & Mills, P. J. (2010). *Biofield Therapies*.'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Energy_Sound.md
  section: Reiki & Biofield Therapies (灵气与生物场疗法)
- type: concept
  question: Therapeutic Touch的核心要点是什么？
  answer: '主流假设 (Key Hypothesis): 治疗性触摸；机制 (Mechanism): 能量场的相互作用。；临床证据 (Clinical Evidence): 加速伤口愈合；缓解焦虑。；专业视角 (Professional
    Perspective): 即使不直接接触皮肤，对生理平衡的影响也有记录，尽管其生物学机制尚存争议。；引用来源 (Citation): Krieger, D. (1979). *The Therapeutic Touch*.'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Energy_Sound.md
  section: Reiki & Biofield Therapies (灵气与生物场疗法)
- type: concept
  question: Healing Touch的核心要点是什么？
  answer: '主流假设 (Key Hypothesis): 疗愈性触摸；机制 (Mechanism): 恢复生物场的和谐平衡。；临床证据 (Clinical Evidence): 改善癌症患者生活质量。；专业视角 (Professional
    Perspective): 作为辅助治疗广泛应用于医院及姑息治疗中。；引用来源 (Citation): Wardell, D. W., et al. (2014). *Healing Touch*.'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Energy_Sound.md
  section: Reiki & Biofield Therapies (灵气与生物场疗法)
- type: concept
  question: Vata的核心要点是什么？
  answer: '核心元素 (Elements): 空与风；情绪失衡特征 (Imbalance): 恐惧，焦虑，优柔寡断。；心理/身体症状 (Symptom): 失眠，思维跳跃，焦虑症。；专业视角 (Professional Perspective):
    需要接地 (Grounding) 和规律性。重点在于安抚敏感的神经系统。；引用来源 (Citation): Lad, V. (1984). *Ayurveda: Science of Healing*.'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Energy_Sound.md
  section: Ayurveda Constitution (Doshas) (阿育吠陀体质)
- type: concept
  question: Pitta的核心要点是什么？
  answer: '核心元素 (Elements): 火与水；情绪失衡特征 (Imbalance): 愤怒，批评，急躁。；心理/身体症状 (Symptom): 炎症，烧心，强迫控制倾向。；专业视角 (Professional Perspective):
    需要冷却 (Cooling) 环境和宽容练习。重点在于平衡火能，减少竞争意识。；引用来源 (Citation): Frawley, D. (1999). *Yoga & Ayurveda*.'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Energy_Sound.md
  section: Ayurveda Constitution (Doshas) (阿育吠陀体质)
- type: concept
  question: 甘松的核心要点是什么？
  answer: '拉丁名 (Latin): Nardostachys jatamansi；核心化学成分指向: 倍半萜酮、甘松醇。；针对性心理动力学: 深度恐惧的根除；临终关怀、灵魂安息。；临床专家评价: 极其强大的下沉力，是处理深度地基不稳型创伤的“定海神针”。；引用来源:
    *Aromatherapy for Health Professionals*.'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Essential_Oils.md
  section: 'Materia Aromatica: Rare & Specific Gems (珍稀精油临床深潜表)'
- type: concept
  question: 香蜂草的核心要点是什么？
  answer: '拉丁名 (Latin): Melissa officinalis；核心化学成分指向: 柠檬醛、牻牛儿醛。；针对性心理动力学: 彻底的震慑后安抚（如接到噩耗、剧烈惊恐）。；临床专家评价: “强心剂”与“镇静剂”的矛盾统一，对心脏节律紊乱的情绪源有奇效。；引用来源:
    Lawless, J., *The Encyclopedia of Essential Oils*.'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Essential_Oils.md
  section: 'Materia Aromatica: Rare & Specific Gems (珍稀精油临床深潜表)'
- type: concept
  question: 橙花的核心要点是什么？
  answer: '拉丁名 (Latin): Citrus aurantium var. amara；核心化学成分指向: 单萜醇、酯类、吲哚。；针对性心理动力学: 慢性惊恐障碍 (Panic Disorder) 的长期支持；优雅的脆弱。；临床专家评价:
    最具“高阶神经调节”特征的精油，能显著降低交感神经的兴奋阈值。；引用来源: -'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Essential_Oils.md
  section: 'Materia Aromatica: Rare & Specific Gems (珍稀精油临床深潜表)'
- type: concept
  question: 经前期综合征 (PMS) - 愤怒/水肿型的核心要点是什么？
  answer: '核心精油配方 (Drop Count in 10ml): 快乐鼠尾草 (4) + 甜茴香 (2) + 葡萄柚 (4)；基础媒介建议: 甜杏仁油；作用机制 (Action Logic): 模拟雌激素平衡，协同利尿，调节血清素。；专业建议
    (Professional Tips): 经前10天开始腹部及下腰部涂抹。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Essential_Oils.md
  section: 'Clinical Formulations: Case-Specific Protocols (临床针对性配方与配比表)'
- type: concept
  question: 高管压力性失眠 - 脑力过度/无法关机的核心要点是什么？
  answer: '核心精油配方 (Drop Count in 10ml): 乳香 (3) + 岩兰草 (2) + 甜橙 (5)；基础媒介建议: 荷荷巴油；作用机制 (Action Logic): 岩兰草提供重力感，乳香深度平喘，甜橙给予由于疲劳缺失的愉悦。；专业建议
    (Professional Tips): 建议滴在枕边或睡前进行足底按压。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Essential_Oils.md
  section: 'Clinical Formulations: Case-Specific Protocols (临床针对性配方与配比表)'
- type: concept
  question: 注意力缺陷/多动趋势 (ADHD-like)的核心要点是什么？
  answer: '核心精油配方 (Drop Count in 10ml): 欧洲赤松 (3) + 迷迭香 (4) + 侧柏 (2)；基础媒介建议: 分馏椰子油；作用机制 (Action Logic): 蒎烯成分提升警觉性，同时建立一种“森林般的稳定秩序感”。；专业建议
    (Professional Tips): 早晨使用，避免晚上可能导致的过度兴奋。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Essential_Oils.md
  section: 'Clinical Formulations: Case-Specific Protocols (临床针对性配方与配比表)'
- type: concept
  question: 强烈排斥花香类的核心要点是什么？
  answer: '潜在心理映射 (Mapping): 可能存在对女性本能或柔弱特质的抗拒。；对应的神经内分泌倾向: 雌激素平衡可能受压。；临床对策: 尝试从带有森林气息的花类（如依兰微量）开始脱敏。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Essential_Oils.md
  section: Olfactory Diagnostics & Scent Preferences (嗅觉诊断与心理映射表)
- type: concept
  question: 极度偏好木质类的核心要点是什么？
  answer: '潜在心理映射 (Mapping): 追求绝对的安全感与掌控；深度匮乏资源支撑。；对应的神经内分泌倾向: 皮质醇水平长期处于临界。；临床对策: 给予高浓度的木质支撑，先满足其安全感，再谈转化。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Essential_Oils.md
  section: Olfactory Diagnostics & Scent Preferences (嗅觉诊断与心理映射表)
- type: concept
  question: 中心点的核心要点是什么？
  answer: '英文/梵文 (Eng/Skt): Bindu (中心/点)；心理映射象征意义: 自性的核心；存在的源点。；临床观察点: 是否偏移、空虚或过于拥挤。；专业视角 (Professional Perspective): 代表人格的整合中心，是平衡的基础。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Mandala_Jungian.md
  section: 'Mandala Structure: The Geometry of the Self (曼陀罗结构：自我的几何学表)'
- type: concept
  question: 圆环区域的核心要点是什么？
  answer: '英文/梵文 (Eng/Skt): Circle (圆)；心理映射象征意义: 心理保护界限；容纳性的容器。；临床观察点: 线条的厚度体现了边界的强弱。；专业视角 (Professional Perspective): 模拟受精卵或子宫的安全感，提供退行性的深度修复。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Mandala_Jungian.md
  section: 'Mandala Structure: The Geometry of the Self (曼陀罗结构：自我的几何学表)'
- type: concept
  question: 十字分割的核心要点是什么？
  answer: '英文/梵文 (Eng/Skt): Quadrants (四象限)；心理映射象征意义: 理性、情感、直觉、感观的平衡。；临床观察点: 不同象限的丰富程度揭露了个体的压抑面。；专业视角 (Professional Perspective):
    对应荣格的“四种心理功能”，表现了意识的取向。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Mandala_Jungian.md
  section: 'Mandala Structure: The Geometry of the Self (曼陀罗结构：自我的几何学表)'
- type: concept
  question: 红色的核心要点是什么？
  answer: '情感象征意义: 生命力、热情、愤怒。；能量特质 (Energy): 扩张、火元素。；潜在的病理指向 (过度使用时): 激进、不受控的冲动、高皮质醇。；疗愈功能: 激活虚弱者的生命动能。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Mandala_Jungian.md
  section: Color Psychology in Therapeutic Mandala (曼陀罗医疗色谱心理表)
- type: concept
  question: 蓝色的核心要点是什么？
  answer: '情感象征意义: 宁静、深度、悲伤、灵性。；能量特质 (Energy): 下沉、冷、水元素。；潜在的病理指向 (过度使用时): 抑郁、疏离、过度理性化。；疗愈功能: 降温与深度情绪平复。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Mandala_Jungian.md
  section: Color Psychology in Therapeutic Mandala (曼陀罗医疗色谱心理表)
- type: concept
  question: 黄色的核心要点是什么？
  answer: '情感象征意义: 阳光、快乐、权力、清晰。；能量特质 (Energy): 明亮、扩张、中心感。；潜在的病理指向 (过度使用时): 焦虑、过度敏感。；疗愈功能: 提振自信心与消化系统功能。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Mandala_Jungian.md
  section: Color Psychology in Therapeutic Mandala (曼陀罗医疗色谱心理表)
- type: concept
  question: 自性 (Self)的核心要点是什么？
  answer: '表现形式 (Manifestation): 曼陀罗整体的圆满与和谐。；心理整合目标: 实现人格的圆满。；专家建议 (Professional Tips): 观察创作过程中自发产生的秩序。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Mandala_Jungian.md
  section: Jungian Archetypes in Mandala Creation (曼陀罗创作中的荣格原型表)
- type: concept
  question: 阿尼玛/阿尼姆斯的核心要点是什么？
  answer: '表现形式 (Manifestation): 内部元素的阴阳对称与纠缠。；心理整合目标: 统合性别的对立面。；专家建议 (Professional Tips): 在构图中寻找柔美与刚劲的平衡。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Mandala_Jungian.md
  section: Jungian Archetypes in Mandala Creation (曼陀罗创作中的荣格原型表)
- type: concept
  question: LAM的核心要点是什么？
  answer: '梵文 (Sanskrit): लं；英文发音 (Phonetics): Lum；关联脉轮/身体部位: 海底轮 (Muladhara)；心理/能量特质: 接地气、安全感、生存本能。；专业视角 (Professional Perspective):
    对应括约肌区域，发音时的闭合闭气能稳固盆底肌群。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Mantra_Sacred_Sound.md
  section: 'Sanskrit Bija Mantras: The Seed Sounds (梵文种子字真言表)'
- type: concept
  question: VAM的核心要点是什么？
  answer: '梵文 (Sanskrit): वं；英文发音 (Phonetics): Vum；关联脉轮/身体部位: 生殖轮 (Svadhisthana)；心理/能量特质: 创造力、流动性、情感连接。；专业视角 (Professional
    Perspective): 引导呼吸至下腹部，激活骨盆区域的循环。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Mantra_Sacred_Sound.md
  section: 'Sanskrit Bija Mantras: The Seed Sounds (梵文种子字真言表)'
- type: concept
  question: RAM的核心要点是什么？
  answer: '梵文 (Sanskrit): रं；英文发音 (Phonetics): Rum；关联脉轮/身体部位: 太阳神经丛 (Manipura)；心理/能量特质: 意志力、转化、内在力量之火。；专业视角 (Professional
    Perspective): 发音时的卷舌音有助于刺激舌下神经，激活代谢系统。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Mantra_Sacred_Sound.md
  section: 'Sanskrit Bija Mantras: The Seed Sounds (梵文种子字真言表)'
- type: concept
  question: 六字大明咒** (Mani)的核心要点是什么？
  answer: '梵文/藏文全文: Oṃ Maṇi Padme Hūṃ；语义/核心概念 (Concept): 莲花上的明珠；慈悲。；心理/精神功能: 清净六道烦恼；培养大慈大悲。；实践频率建议: 108遍为基数进行持诵。；专业视角 (Professional
    Perspective): 这是一个典型的由全频段元音组成的咒语，覆盖了从喉部到鼻部的闭合动作。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Mantra_Sacred_Sound.md
  section: Major Transformative Mantras (主要转化性长咒详表)
- type: concept
  question: 伽耶特黎真言** (Gayatri)的核心要点是什么？
  answer: '梵文/藏文全文: Oṃ bhūr bhuvaḥ svaḥ...；语义/核心概念 (Concept): 祈祷神圣智慧启发心智。；心理/精神功能: 启迪直觉；智慧的净化。；实践频率建议: 黎明或黄昏时分，朝向东方。；专业视角
    (Professional Perspective): 被认为是最古老的 Vedic Mantra，其节律遵循特定的 24 节拍波长。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Mantra_Sacred_Sound.md
  section: Major Transformative Mantras (主要转化性长咒详表)
- type: concept
  question: 药师佛心咒的核心要点是什么？
  answer: '梵文/藏文全文: Tayata Om Bekanze...；语义/核心概念 (Concept): 疗愈之王；清除病苦。；心理/精神功能: 疗愈身心疾病；消除业障。；实践频率建议: 配合蓝色光的内观。；专业视角 (Professional
    Perspective): 咒语中的“Bekanze”发音能诱导出深度的副交感神经放松态。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Mantra_Sacred_Sound.md
  section: Major Transformative Mantras (主要转化性长咒详表)
- type: concept
  question: 迷走神经耳支刺激的核心要点是什么？
  answer: '生物物理描述: 哼鸣产生的振动通过颅骨传导至内耳。；对神经系统的影响: 激活副交感神经系统 (PNS)。；心理学对应项: 瞬间降低焦虑感与防御性。；专业视角 (Professional Perspective): 咒语末尾的“M”或“N”长音是迷走神经调谐的关键（Humming
    Effect）。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Mantra_Sacred_Sound.md
  section: Neuro-acoustic Mechanism of Chanting (咒语持诵的神经声学机制表)
- type: concept
  question: DMN (默认模式网络) 抑制的核心要点是什么？
  answer: '生物物理描述: 重复性的音节占据了认知资源。；对神经系统的影响: 减少“反刍思考” (Rumination)。；心理学对应项: 停止内耗性自我对话。；专业视角 (Professional Perspective): 类似于脑科学中的“任务诱发状态”，将大脑从过度自我监控中解放出来。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Mantra_Sacred_Sound.md
  section: Neuro-acoustic Mechanism of Chanting (咒语持诵的神经声学机制表)
- type: concept
  question: 定义的核心要点是什么？
  answer: '关键细节 (Key Details): Music Thanatology（音乐死亡学/音乐临终关怀）是在临终床畔使用预设竖琴与人声为濒死者提供音乐陪伴的专门领域。；历史与理论: 由 Therese Schroeder-Sheker
    于 1991 年在科罗拉多大学创立；源自中世纪本笃会修道院的"死者之歌"(Office of the Dead) 传统。；与一般音乐疗法的区别: 一般音乐疗法以"改善功能"为目标；Music Thanatology 以"陪伴与安抚"为唯一目标——不追求疗效，追求存在性的临在
    (Presence)。；与声音疗愈的关系: 颂钵、音叉等声音疗愈工具也可用于临终场景，但 Music Thanatology 严格限定使用竖琴与人声。；专业视角 (Professional Perspective): 这是声音疗愈领域中最具人文深度、最需要灵性敏感度的专门方向。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Music_Thanatology.md
  section: 'Music Thanatology: Foundations & Philosophy (音乐临终关怀基础与哲学表)'
- type: concept
  question: 核心哲学的核心要点是什么？
  answer: '关键细节 (Key Details): "音乐不是给濒死者的治疗，而是与他们一同呼吸的伴侣。"；历史与理论: Schroeder-Sheker 的"音乐-死亡学"理论认为，声音可以在意识转化的最后阶段提供非语言的"桥梁"。；与一般音乐疗法的区别:
    与姑息治疗 (Palliative Care) 的理念高度一致——不治愈，但关怀。；与声音疗愈的关系: 频率疗法的"修复"范式在此不适用——取而代之的是"陪伴"范式。；专业视角 (Professional Perspective): 音疗师在临终场景中需要从"技术操作者"转变为"存在陪伴者"。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Music_Thanatology.md
  section: 'Music Thanatology: Foundations & Philosophy (音乐临终关怀基础与哲学表)'
- type: concept
  question: Chalice of Repose Project的核心要点是什么？
  answer: '关键细节 (Key Details): Schroeder-Sheker 创建的培训项目，至今仍是全球 Music Thanatology 的黄金标准。；历史与理论: 项目位于蒙大拿州 Missoula，为期 2 年的严格培训，包含
    80+ 课时临床实习。；与一般音乐疗法的区别: 培训涵盖音乐技能、死亡学、灵性关怀、自我照顾四个模块。；与声音疗愈的关系: 其他声音疗愈师可借鉴其临床实习与督导模式。；专业视角 (Professional Perspective): 目前全球仅约
    100 名经过 Chalice 认证的音乐临终关怀师——供给严重不足。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Music_Thanatology.md
  section: 'Music Thanatology: Foundations & Philosophy (音乐临终关怀基础与哲学表)'
- type: concept
  question: 预设竖琴 (Concert Harp)的核心要点是什么？
  answer: '技术参数: 47 弦；全踏板系统；频率范围 31Hz-4186Hz。；在临终场景中的使用方式: 根据患者的呼吸节奏、面部表情与生命体征实时即兴演奏。；声学特性与疗愈功能: 竖琴的衰减时间极长（低音弦可达 8-12 秒），产生持续的"声音场"包裹患者。；与其他声疗工具的对比:
    竖琴的衰减特性类似颂钵但更可控——每次拨弦都精确响应患者的即时状态。；专业视角 (Professional Perspective): 预设竖琴的踏板系统允许在演奏中无缝切换调性——这对于跟随患者状态变化的即兴演奏至关重要。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Music_Thanatology.md
  section: 'Harp & Voice: Instruments of Contemplative Music (竖琴与人声：沉思性音乐的核心工具表)'
- type: concept
  question: 治疗性人声的核心要点是什么？
  answer: '技术参数: 低音量、无颤音 (Straight Tone)、自然音阶为主。；在临终场景中的使用方式: 与竖琴并行或单独使用；哼鸣、长元音、轻柔吟唱。；声学特性与疗愈功能: 人声的 500Hz-1kHz 频段精确落在 Porges
    多迷走神经理论中的"社会参与系统"敏感区域。；与其他声疗工具的对比: 人声在临终场景中比任何乐器都更"有人味"——这是生命与生命之间的直接共鸣。；专业视角 (Professional Perspective): 颤音 (Vibrato)
    在临终场景中应避免——直音 (Straight Tone) 更能提供稳定感和安全感。参见 [Vocal Therapy](Sensory_Vocal_Therapy.md)。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Music_Thanatology.md
  section: 'Harp & Voice: Instruments of Contemplative Music (竖琴与人声：沉思性音乐的核心工具表)'
- type: concept
  question: 静默 (Silence)的核心要点是什么？
  answer: '技术参数: 无声。；在临终场景中的使用方式: 在音符之间、段落之间、以及整个会话的结尾留出充分的静默空间。；声学特性与疗愈功能: 静默让患者的意识自行整合；过度填充声音反而是一种"入侵"。；与其他声疗工具的对比: 静默是
    Music Thanatology 中最重要的"乐器"——参见 [Sound Medicine](Sensory_Sound_Medicine.md) 的 Sunyata 概念。；专业视角 (Professional Perspective):
    短期培训的音疗师最容易犯的错误是"声音太多"——学会在适当时机停止演奏是最高级的技艺。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Music_Thanatology.md
  section: 'Harp & Voice: Instruments of Contemplative Music (竖琴与人声：沉思性音乐的核心工具表)'
- type: concept
  question: 疼痛与不适管理的核心要点是什么？
  answer: '实施方案: 以竖琴低音弦持续拨奏，节奏与患者呼吸同步；逐渐将节奏引导至更缓慢的模式。；音乐选择原则: 无固定曲目；完全即兴——音乐是患者的"呼吸镜像"。；预期效果: 疼痛评分降低；面部肌肉松弛；呼吸频率下降。；监测指标:
    NRS 疼痛评分（如患者可表达）；面部表情编码 (FACS)；呼吸频率。；专业视角 (Professional Perspective): 临终疼痛管理中，音乐不是止痛药——但它是止痛药的"增效剂"。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Music_Thanatology.md
  section: Clinical Applications in End-of-Life Care (临终关怀临床应用表)
- type: concept
  question: 呼吸困难 (Dyspnea)的核心要点是什么？
  answer: '实施方案: 以竖琴中音区缓慢拨弦，节奏跟随呼吸周期（吸-停-呼各 4 拍）。；音乐选择原则: 模拟患者当前的呼吸节奏，然后极缓慢地延长呼气相。；预期效果: 呼吸频率从 25+ 次/分降至 15-18 次/分；焦虑感降低。；监测指标:
    呼吸频率；SpO2（如可监测）；患者面部表情。；专业视角 (Professional Perspective): "呼吸镜像"技术是 Music Thanatology 的核心——先跟随，再引导。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Music_Thanatology.md
  section: Clinical Applications in End-of-Life Care (临终关怀临床应用表)
- type: concept
  question: 定义的核心要点是什么？
  answer: '关键细节 (Key Details): Nada Yoga（नादयोग）即"声音瑜伽"，通过聆听内在与外在的声音实现意识转化与灵性觉醒。；经典来源: *Nada Bindu Upanishad*, *Hatha Yoga
    Pradipika* 第四章。；核心概念: 宇宙由声音 (Nada) 振动构成；个体意识可通过声音回归源头。；与现代声音疗愈的关系: Nada Yoga 为现代频率疗法提供了古老的哲学框架与实践方法。；专业视角 (Professional
    Perspective): Nada Yoga 是唯一将"声音作为冥想对象"系统化的古典瑜伽传统。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Nada_Yoga.md
  section: 'Nada Yoga: Historical & Philosophical Foundations (纳达瑜伽历史与哲学基础表)'
- type: concept
  question: 四阶段声音的核心要点是什么？
  answer: '关键细节 (Key Details): Vaikhari（外在声）→ Madhyama（内在语）→ Pashyanti（直觉意象）→ Para（宇宙元音）。；经典来源: *Nada Bindu Upanishad* 第 24-30
    节。；核心概念: 从可听见的物理声波逐层内化至超越频率的"原初之音"。；与现代声音疗愈的关系: 对应现代声学：物理声波 → 神经编码 → 认知意象 → 意识基底。；专业视角 (Professional Perspective): 这四阶段模型为声音疗愈中的"由外向内"引导序列提供了古老的认知科学框架。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Nada_Yoga.md
  section: 'Nada Yoga: Historical & Philosophical Foundations (纳达瑜伽历史与哲学基础表)'
- type: concept
  question: 内外之声的核心要点是什么？
  answer: '关键细节 (Key Details): Ahata Nada（击打之声/外在声）与 Anahata Nada（无击之声/内在声）。；经典来源: *Hatha Yoga Pradipika* 4.81-103。；核心概念:
    Ahata 是一切可被物理测量的声振动；Anahata 是冥想中听见的"内在音"。；与现代声音疗愈的关系: 颂钵、音叉属于 Ahata Nada 疗法；深度冥想中的"天音"属于 Anahata Nada 体验。；专业视角 (Professional
    Perspective): 音疗师处理的是 Ahata 层面，但理解 Anahata 的存在有助于深化疗愈意图。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Nada_Yoga.md
  section: 'Nada Yoga: Historical & Philosophical Foundations (纳达瑜伽历史与哲学基础表)'
- type: concept
  question: 一、外在声聆听的核心要点是什么？
  answer: '梵文名: Bahir Nada；实践方法: 聆听外在乐器声（坦布拉、西塔琴、颂钵），将注意力锚定在声音上。；感知对象: 乐器的物理声波、泛音列、音色变化。；神经/心理机制: 听觉注意网络 (AAN) 激活；默认模式网络 (DMN)
    开始抑制。；预期体验: 深度沉浸感；时间感模糊。；专业视角 (Professional Perspective): 这是 Nada Yoga 的入门阶段——与现代"声浴"体验高度重叠。参见 [Sound Medicine](Sensory_Sound_Medicine.md)。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Nada_Yoga.md
  section: Nada Yoga Practice Stages (纳达瑜伽实修阶段详表)
- type: concept
  question: 二、内在声感知的核心要点是什么？
  answer: '梵文名: Antar Nada；实践方法: 闭合双耳（用拇指轻压耳屏），在静默中聆听身体内部的声音。；感知对象: 耳鸣般的高频音、心跳声、血流声、自发性脑鸣。；神经/心理机制: 骨传导增强；听觉皮层在缺乏外部输入时自发产生听觉幻觉（Tinnitus
    Spectrum）。；预期体验: 持续的"嗡鸣"或"铃声"——Nada Yoga 称为 Anahata Nada。；专业视角 (Professional Perspective): 内在声的感知需要 15-20 分钟的静默积累——切忌在嘈杂环境中尝试。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Nada_Yoga.md
  section: Nada Yoga Practice Stages (纳达瑜伽实修阶段详表)
- type: concept
  question: 三、精细声辨别的核心要点是什么？
  answer: '梵文名: Nada Svaras；实践方法: 在内在声中辨别不同"音色"——如铃声、笛声、雷鸣、海浪。；感知对象: 更精细的内在声层次；情绪记忆与声音的关联。；神经/心理机制: 岛叶 (Insula) 的内感受功能增强；听觉皮层与边缘系统的耦合加深。；预期体验:
    声音变得"有情绪"——可能触发特定的视觉或情感联想。；专业视角 (Professional Perspective): 传统文献描述了 10 种内在声，从大海声到雷声到七弦琴声——这可能是听觉系统自发组织的声景。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Nada_Yoga.md
  section: Nada Yoga Practice Stages (纳达瑜伽实修阶段详表)
- type: concept
  question: 坦布拉的核心要点是什么？
  answer: '梵文名: Tambura；声学特性: 四弦持续低音 (Drone)；丰富的泛音列；C# 或 D 基音常见。；在 Nada Yoga 中的角色: Nada Yoga 冥想的核心伴奏乐器——提供持续的"音场基底"。；疗愈价值:
    其持续的 Drone 诱导 Alpha-Theta 脑波；泛音列模拟 Anahata Nada。；与现代设备的关系: 电子坦布拉 App 可替代实体乐器。；专业视角 (Professional Perspective): 坦布拉的泛音是"可听的寂静"——声音与静默的边界在此模糊。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Nada_Yoga.md
  section: Nada Yoga Instruments & Tools (纳达瑜伽乐器与工具表)
- type: concept
  question: 西塔琴的核心要点是什么？
  answer: '梵文名: Sitar；声学特性: 18-21 弦（6-7 主弦 + 共振弦）；极其丰富的泛音；滑音 (Meend) 特性。；在 Nada Yoga 中的角色: 用于表达 Raga（拉格）的情感色彩——将特定情绪编码入旋律。；疗愈价值:
    特定 Raga 被用于特定时间段与情绪状态的调节。；与现代设备的关系: 无法用电子设备完全替代——共振弦的物理泛音不可合成。；专业视角 (Professional Perspective): 西塔琴的共振弦系统是 Nada Yoga"泛音疗愈"的物理体现。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Nada_Yoga.md
  section: Nada Yoga Instruments & Tools (纳达瑜伽乐器与工具表)
- type: concept
  question: 瑞典式按摩的核心要点是什么？
  answer: '核心手法特征: 滑法 (Effleurage)、揉法、敲击。；生理作用机制: 促进淋巴回流；降低静息心率。；心理效应: 舒缓、回归、全面的放松感。；专业视角 (Professional Perspective): 最经典的基础手法，适合初次接触触觉疗愈的客户，建立信任。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_SPA_Bodywork.md
  section: 'Western Manual Systems: Technical Parameters (西方手工疗法系统详表)'
- type: concept
  question: 深层组织按摩的核心要点是什么？
  answer: '核心手法特征: 缓而深的定点加压；肘推法。；生理作用机制: 针对受限的肌节与慢性粘连。；心理效应: 宣泄深层积压的“愤怒”或僵硬。；专业视角 (Professional Perspective): 不同于暴力拆解，强调“等待肌肉融化”的过程。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_SPA_Bodywork.md
  section: 'Western Manual Systems: Technical Parameters (西方手工疗法系统详表)'
- type: concept
  question: 淋巴引流 (MLD)的核心要点是什么？
  answer: '核心手法特征: 极轻的螺旋式定向刷。；生理作用机制: 激活淋巴管瓣膜，消除代谢废物。；心理效应: 净化感、轻盈、减少沉重感。；专业视角 (Professional Perspective): 技术性极强，力量必须保持在 40g
    以下，过重则压扁淋巴管。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_SPA_Bodywork.md
  section: 'Western Manual Systems: Technical Parameters (西方手工疗法系统详表)'
- type: concept
  question: 泰式按摩的核心要点是什么？
  answer: '传统名称: Nuad Boran；核心技术逻辑: 强调拉伸、关节动员与能量线 (Sen) 压迫。；对气血的影响: 强力疏通全局气机；类似于“被动瑜伽”。；专业视角 (Professional Perspective): 注意不可过度拉伸，其动作包含大量的结构性杠杆原理。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_SPA_Bodywork.md
  section: Oriental Bodywork & Meridian Therapy (东方手工与经耳/经络疗法表)
- type: concept
  question: 推拿 (TCM)的核心要点是什么？
  answer: '传统名称: Tui Na；核心技术逻辑: 点案、滚法、揉捏、正骨。；对气血的影响: 调节脏腑功能，通经活络。；专业视角 (Professional Perspective): 直接作用于穴位，结合了物理治疗与内在气化调节。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_SPA_Bodywork.md
  section: Oriental Bodywork & Meridian Therapy (东方手工与经耳/经络疗法表)
- type: concept
  question: 指压 (Shiatsu)的核心要点是什么？
  answer: '传统名称: Shiatsu；核心技术逻辑: 基于五行理论，利用身体重量进行定点垂直按压。；对气血的影响: 回归身体中线，平衡表里状态。；专业视角 (Professional Perspective): 极简、深刻，通常在垫子上完成，更具仪式感与下沉感。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_SPA_Bodywork.md
  section: Oriental Bodywork & Meridian Therapy (东方手工与经耳/经络疗法表)
- type: concept
  question: 水疗** (Hydro)的核心要点是什么？
  answer: '设计维度: 温度（冷、热）、浮力、压力。；对自主神经系统的诱导: 温度梯度产生的强烈迷走神经波动。；心理隐喻: 纯净、重生、洗涤。；专业视角 (Professional Perspective): 冷热交替是增强神经系统血管韧性的核心手段。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_SPA_Bodywork.md
  section: SPA Rituals & Environmental Psychology (SPA仪式感与环境心理学建模表)
- type: concept
  question: 感官景观的核心要点是什么？
  answer: '设计维度: 柔和灯光 (Low-Lux)；环境自然原声。；对自主神经系统的诱导: 降低视觉负载，唤醒内感受。；心理隐喻: 避难所、远离尘嚣。；专业视角 (Professional Perspective): 光线直接影响褪黑素与皮质醇的实时比例。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_SPA_Bodywork.md
  section: SPA Rituals & Environmental Psychology (SPA仪式感与环境心理学建模表)
- type: concept
  question: 中世纪起源的核心要点是什么？
  answer: '关键细节 (Key Details): 源自 11 世纪本笃会修士 Guido d''Arezzo 发明的六音阶视唱体系 (Hexachord)：UT-RE-MI-FA-SOL-LA。；数理/历史机制: 赞美诗 *Ut Queant
    Laxis* 的每行首音节依次升高，形成六声调阶。；与现代声学的关系: 后经演变成为现代 Do-Re-Mi-Fa-Sol-La-Si 唱名系统。；专业视角 (Professional Perspective): 原始六声阶并非精确频率定义，而是相对音程关系；现代
    Solfeggio 频率由 Horowitz & Puleo 于 1999 年重新"解码"。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Solfeggio_Frequencies.md
  section: Solfeggio Historical Origins & Mathematical Foundation (索尔菲吉奥历史起源与数论基础表)
- type: concept
  question: 数根还原法的核心要点是什么？
  answer: '关键细节 (Key Details): 将每个频率的各位数字反复相加至个位数 (Digital Root)。；数理/历史机制: 174→1+7+4=12→3；285→15→6；396→18→9；417→12→3；528→15→6；639→18→9；741→12→3；852→15→6；963→18→9。；与现代声学的关系:
    形成 **3-6-9** 循环三元组，被 Tesla 称为"宇宙的钥匙"。；专业视角 (Professional Perspective): 数根还原法在数论中属模 9 运算；3-6-9 循环是否具有物理意义仍为开放问题。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Solfeggio_Frequencies.md
  section: Solfeggio Historical Origins & Mathematical Foundation (索尔菲吉奥历史起源与数论基础表)
- type: concept
  question: 频率间隔规律的核心要点是什么？
  answer: '关键细节 (Key Details): 相邻 Solfeggio 频率之间的比值接近但不完全相等。；数理/历史机制: UT→RE (174→285) 比 1.638；RE→MI (285→396) 比 1.389；MI→FA
    (396→417) 比 1.053。；与现代声学的关系: 不符合十二平均律或纯律的任何标准音程。；专业视角 (Professional Perspective): 这种"不规则"间距被支持者解读为"非线性疗愈"特征，但尚无物理声学证据。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Solfeggio_Frequencies.md
  section: Solfeggio Historical Origins & Mathematical Foundation (索尔菲吉奥历史起源与数论基础表)
- type: concept
  question: UT的核心要点是什么？
  answer: '频率 (Hz): **174 Hz**；数根: 3；主题与功能: 安全基础 / 止痛 (Security Foundation / Pain Relief)；生理/心理机制 (Mechanism): 低频振动通过机械刺激激活
    Pacini 小体，触发脊髓后角的疼痛闸门关闭机制 (Gate Control Theory)。；临床应用场景: 急慢性疼痛管理；术后康复；身体创伤后的安全感重建。；推荐乐器/工具: 加权音叉（174Hz）；低频颂钵。；对应脉轮: 海底轮
    (Root)；专业视角 (Professional Perspective): 作为最低频的 Solfeggio 音，174Hz 起到"频率地基"作用，适合在声浴序列的最开始使用以建立安全感。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Solfeggio_Frequencies.md
  section: Complete Solfeggio Nine-Frequency System (索尔菲吉奥九频完整体系表)
- type: concept
  question: RE的核心要点是什么？
  answer: '频率 (Hz): **396 Hz**；数根: 9；主题与功能: 释放恐惧 / 解除愧疚 (Liberation from Fear / Guilt Dissolution)；生理/心理机制 (Mechanism): 通过中频共振影响杏仁核
    (Amygdala) 的恐惧回路，降低其过度激活状态；同时调节下丘脑-垂体-肾上腺 (HPA) 轴。；临床应用场景: PTSD 辅助干预；焦虑障碍的底层恐惧处理；低自尊与内疚感的释放。；推荐乐器/工具: 396Hz 调律颂钵；人声梵唱。；对应脉轮:
    太阳轮 (Solar Plexus)；专业视角 (Professional Perspective): 恐惧释放是声浴疗愈中最常见的核心诉求；396Hz 常被作为从"安全建立"(174Hz) 到"变革"(417Hz) 的过渡频率。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Solfeggio_Frequencies.md
  section: Complete Solfeggio Nine-Frequency System (索尔菲吉奥九频完整体系表)
- type: concept
  question: MI的核心要点是什么？
  answer: '频率 (Hz): **417 Hz**；数根: 3；主题与功能: 促进变革 / 清除障碍 (Facilitating Change / Removing Blockages)；生理/心理机制 (Mechanism): 417Hz
    的振动模式被认为能"松解"僵化的认知图式与行为模式，其机制可能与前额叶皮层 theta 波增强相关。；临床应用场景: 生活重大转变期支持；职业倦怠恢复；打破成瘾循环；空间能量清理。；推荐乐器/工具: 417Hz 音叉；电子频率发生器。；对应脉轮:
    心轮 (Heart) — 侧重心轮与太阳轮之间的桥梁；专业视角 (Professional Perspective): 417Hz 是 Solfeggio 体系中"运动性"最强的频率——适合在疗愈序列中创造动能和突破感。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Solfeggio_Frequencies.md
  section: Complete Solfeggio Nine-Frequency System (索尔菲吉奥九频完整体系表)
- type: concept
  question: 432 Hz的核心要点是什么？
  answer: '名称/来源: 韦尔第调律 (Verdi''s A) / "宇宙频率"；核心功能: 整体和谐；与自然数理对齐。；生理/心理机制: A=432Hz 调律使八度关系完全基于 2 的幂次（432 = 2⁴ × 3³）；其泛音结构被认为更"圆融"。；临床应用:
    减压音乐制作；瑜伽课堂伴奏；冥想背景音。；与 Solfeggio 的关系: 432Hz 调律下 C5≈512Hz（非 Solfeggio 频率），与 Solfeggio 体系无直接数学桥接。；专业视角 (Professional Perspective):
    Calamassi & Pomponi (2019) 系统综述显示 432Hz 对减压有正向趋势，但证据质量参差。与 444Hz 形成互补选择。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Solfeggio_Frequencies.md
  section: Extended Healing Frequencies Beyond Solfeggio (拓展疗愈频率表)
- type: concept
  question: 136.1 Hz的核心要点是什么？
  answer: '名称/来源: OM 频率 / 印度古典音阶 Sa；核心功能: 宇宙基频；印度音乐体系中的绝对音高。；生理/心理机制: 136.1Hz 据称为地球绕太阳公转一周的振动频率的八度上移（365.25 天 → 1/年频率 → 31.56
    octaves up）。；临床应用: 深度冥想；脉轮对齐；声音疗愈的"基础音"。；与 Solfeggio 的关系: 独立于 Solfeggio 体系；常与 528Hz 叠加使用形成"OM + 爱"组合。；专业视角 (Professional
    Perspective): OM 频率在印度音乐传统中有数千年使用历史，是少有的跨文化共识频率。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Solfeggio_Frequencies.md
  section: Extended Healing Frequencies Beyond Solfeggio (拓展疗愈频率表)
- type: concept
  question: 颂钵 (手工)的核心要点是什么？
  answer: '英文名: Himalayan Singing Bowl；材质与声学特性: 七金合金；产生复杂的泛音 (Overtones)。；关键频率范围: 70Hz - 2000Hz 叠加。；临床/心理应用: 深度放松、平衡脉轮；通过物理振动按摩骨骼与液体。；专业视角
    (Professional Perspective): 其不协调音程能够快速打破大脑的逻辑防御，进入 Theta 波状态。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Sound_Medicine.md
  section: Vibrational Healing Instruments (声频疗愈乐器：技术与意图表)
- type: concept
  question: 水晶钵的核心要点是什么？
  answer: '英文名: Crystal Singing Bowl；材质与声学特性: 99% 纯石英硅；产生纯净的、强振幅的单频音。；关键频率范围: 200Hz - 800Hz。；临床/心理应用: 能量场清理；针对内分泌系统的精准介入。；专业视角
    (Professional Perspective): 物理共振更强，能够有效调节身体内的含水量组织（结晶结构）。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Sound_Medicine.md
  section: Vibrational Healing Instruments (声频疗愈乐器：技术与意图表)
- type: concept
  question: 音叉的核心要点是什么？
  answer: '英文名: Tuning Fork；材质与声学特性: 铝合金或钢；极其精准的单一固定频率。；关键频率范围: 128Hz, 528Hz, OM (136.1Hz)。；临床/心理应用: 穴位激活 (Sonopuncture)；缓解局部疼痛与神经紧张。；专业视角
    (Professional Perspective): 属于“声波外科手术”，具有极高的指向性和穿透力。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Sound_Medicine.md
  section: Vibrational Healing Instruments (声频疗愈乐器：技术与意图表)
