  question: 转化的核心要点是什么？
  answer: '英文术语: Transformation；词源/其他语言: 拉丁语: *Transformare* (改变形态)；定义: 深层的内在重构，不同于表面的行为改变；专业视角 (Professional Perspective):
    萨提亚模式的核心目标；涉及信念、感知、自我关系的根本性改变'
  source: 02-Mind-Psychology/meditation/satir-model/Satir_Transformation_Process.md
  section: 核心术语词源表 (Core Terminology & Etymology)
- type: concept
  question: 改变历程的核心要点是什么？
  answer: '英文术语: Change Process；词源/其他语言: —；定义: 人在面对新信息时经历的内在过程阶段；专业视角 (Professional Perspective): 萨提亚描述了从现状到整合的六个阶段'
  source: 02-Mind-Psychology/meditation/satir-model/Satir_Transformation_Process.md
  section: 核心术语词源表 (Core Terminology & Etymology)
- type: concept
  question: 家庭规条的核心要点是什么？
  answer: '英文术语: Family Rules；词源/其他语言: —；定义: 家庭中代际传递的隐性规则与信念；专业视角 (Professional Perspective): 规条往往是无意识的，控制着我们的行为与选择'
  source: 02-Mind-Psychology/meditation/satir-model/Satir_Transformation_Process.md
  section: 核心术语词源表 (Core Terminology & Etymology)
- type: concept
  question: 第1阶段的核心要点是什么？
  answer: '中文名称: 现状；英文名称: Status Quo；状态描述: 旧有的、熟悉的状态，即使不舒服但可预测；来访者体验: 安全感（即使是假性的）、阻抗、"还好"；治疗师任务: 建立关系、理解现状、植入希望；专业视角 (Professional
    Perspective): 来访者往往不清楚自己处于"现状"中'
  source: 02-Mind-Psychology/meditation/satir-model/Satir_Transformation_Process.md
  section: 萨提亚改变历程六阶段表
- type: concept
  question: 第2阶段的核心要点是什么？
  answer: '中文名称: 外来元素；英文名称: Foreign Element；状态描述: 新信息/体验进入系统，打破平衡；来访者体验: 不适、困惑、威胁感、可能的抗拒；治疗师任务: 温和引入新视角、提供安全容器；专业视角 (Professional
    Perspective): 外来元素可以是新信息、新体验、危机事件'
  source: 02-Mind-Psychology/meditation/satir-model/Satir_Transformation_Process.md
  section: 萨提亚改变历程六阶段表
- type: concept
  question: 第3阶段的核心要点是什么？
  answer: '中文名称: 混乱；英文名称: Chaos；状态描述: 旧秩序被打破，新秩序尚未建立；来访者体验: 焦虑、恐惧、失控、混乱、可能想逃回现状；治疗师任务: 正常化混乱、保持陪伴、不急于解决；专业视角 (Professional
    Perspective): 混乱是必经阶段，不能跳过；治疗师需要耐受'
  source: 02-Mind-Psychology/meditation/satir-model/Satir_Transformation_Process.md
  section: 萨提亚改变历程六阶段表
- type: concept
  question: 情感规条的核心要点是什么？
  answer: '常见规条内容: "男人不应该哭"；英文表述: "Men shouldn''t cry"；来源: 性别角色规条；影响: 压抑悲伤、情感隔离；转化方向: "我可以表达我的感受"'
  source: 02-Mind-Psychology/meditation/satir-model/Satir_Transformation_Process.md
  section: 家庭规条详解表
- type: concept
  question: 情感规条的核心要点是什么？
  answer: '常见规条内容: "生气是不好的"；英文表述: "Anger is bad"；来源: 家庭情感压制；影响: 压抑愤怒、被动攻击；转化方向: "愤怒是信息，我可以选择如何表达"'
  source: 02-Mind-Psychology/meditation/satir-model/Satir_Transformation_Process.md
  section: 家庭规条详解表
