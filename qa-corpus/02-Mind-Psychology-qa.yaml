  question: 出轨方的行动的核心要点是什么？
  answer: '积极指标: 立即断绝出轨关系、接受监督、主动寻求治疗；消极指标: 口头承诺但无行动、不愿接受监督；评分(1-10): ___；权重: 高'
  source: 02-Mind-Psychology/relationships/infidelity/Post_Infidelity_Decision.md
  section: 2.1 修复可行性评估
