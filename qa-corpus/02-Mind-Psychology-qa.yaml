  question: 什么是概述 (Overview)？
  answer: 塔拉·布拉赫（Tara Brach，1953-）是当代美国最具影响力的冥想教师和临床心理学家之一。她独特地融合了南传佛教正念修行与西方心理学，尤其在将慈悲冥想应用于情感疗愈方面做出了开创性贡献。她创建的 RAIN 冥想方法（Recognition,
    Allowance, Investigation, Nurturing）已成为全球最广泛使用的正念情绪调节工具之一。她的播客是冥想领域下载量最大的播客之一，每周听众超过200万人。
  source: 02-Mind-Psychology/meditation/masters/contemporary-spiritual/Tara_Brach.md
