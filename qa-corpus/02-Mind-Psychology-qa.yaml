  question: 心理评估的核心要点是什么？
  answer: '英文术语: Psychological Assessment；来源语言/词源: 希腊语 *ψυχή* (psyche = 灵魂)；定义: 系统收集信息以理解个体心理功能的过程；临床意义: 诊断与干预的基础'
