- type: concept
  question: 专注冥想的核心要点是什么？
  answer: '英文名 (English Term): Focused Attention Meditation (FA)；原始语言/术语 (Original Language): 梵: *Ekāgratā* (एकाग्रता, 一境性)；精确定义:
    将注意力持续集中在单一对象(如呼吸、咒语、意象)上的冥想方式；历史渊源: 瑜伽经第三章三摩地分(Samādhi Pāda)；专业视角 (Professional Perspective): 训练注意力的选择性维持(sustained attention),激活背外侧前额叶(DLPFC)与前扣带回(ACC)'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Types_Classification.md
  section: 核心术语表 (Core Terms)
- type: concept
  question: 开放监控的核心要点是什么？
  answer: '英文名 (English Term): Open Monitoring Meditation (OM)；原始语言/术语 (Original Language): 梵: *Vipassanā* (विपश्यना, 内观)；精确定义:
    不加判断地觉察当下所有升起的内容(思绪、情绪、感受)；历史渊源: 佛陀在《念处经》(Satipaṭṭhāna Sutta)中教授；专业视角 (Professional Perspective): 培养元认知觉察(metacognitive
    awareness),减少默认模式网络(DMN)活动'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Types_Classification.md
  section: 核心术语表 (Core Terms)
- type: concept
  question: 慈心冥想的核心要点是什么？
  answer: '英文名 (English Term): Loving-Kindness Meditation (LKM)；原始语言/术语 (Original Language): 梵/巴利: *Mettā* (मैत्री/मेत्ता,
    慈)；精确定义: 系统性地向自己、他人、一切众生发送善意与祝福的冥想；历史渊源: 佛教《慈经》(Metta Sutta)；专业视角 (Professional Perspective): 激活与共情相关的脑区(脑岛insula、TPJ颞顶联合区),增加迷走神经张力'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Types_Classification.md
  section: 核心术语表 (Core Terms)
- type: concept
  question: 瑜伽冥想的核心要点是什么？
  answer: '代表传统: 帕坦伽利《瑜伽经》；核心方法: 八支瑜伽(Ashtanga):制感、执持、禅那、三摩地；理论基础: 制止心念变化(Chitta Vritti Nirodha)；目标状态: Samādhi(三摩地):纯粹意识；神经科学发现:
    增加灰质密度(海马、PCC后扣带回)；专业视角: 从Yama/Niyama伦理基础逐步深入,是系统完整的修行路径'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Types_Classification.md
  section: 冥想流派分类表 (Classification by Tradition)
- type: concept
  question: 佛教禅修的核心要点是什么？
  answer: '代表传统: 南传、藏传、禅宗；核心方法: 止观双运(Samatha-Vipassana)、公案参究、大手印；理论基础: 四念处、八正道、缘起性空；目标状态: 涅槃(Nirvāṇa):苦的止息；神经科学发现: 前扣带回(ACC)活动增强,杏仁核反应性降低；专业视角:
    最多样化的冥想体系,从渐修到顿悟各有路径'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Types_Classification.md
  section: 冥想流派分类表 (Classification by Tradition)
- type: concept
  question: 道家内丹的核心要点是什么？
  answer: '代表传统: 全真道、正一派；核心方法: 存思守一、周天运转、胎息；理论基础: 道法自然、返本归真；目标状态: 得道成真、长生久视；神经科学发现: 慢波睡眠增加,HRV(心率变异性)提升；专业视角: 强调"性命双修",身心能量的炼化与转化'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Types_Classification.md
  section: 冥想流派分类表 (Classification by Tradition)
- type: concept
  question: 专注型 (FA)的核心要点是什么？
  answer: '代表方法: 观息、咒语、观想、数息；注意力训练: 选择性注意(selective attention)、注意力稳定性；神经网络: 背外侧前额叶(DLPFC)、前扣带回(ACC)、顶叶注意网络；临床应用: ADHD、认知衰退、执行功能障碍；适合人群:
    初学者、注意力涣散者；专业视角: 最基础的冥想类型,是所有高级冥想的前提("定"是"慧"的基础)'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Types_Classification.md
  section: 按注意力机制分类表 (Classification by Attentional Mechanism)
- type: concept
  question: 监控型 (OM)的核心要点是什么？
  answer: '代表方法: 内观、正念、开放觉察；注意力训练: 分配性注意(divided attention)、元认知监控；神经网络: 脑岛(insula)、前额叶、感觉皮层；临床应用: 焦虑、抑郁、情绪调节困难；适合人群: 有一定定力基础者；专业视角:
    从"做什么"转向"观察正在发生什么",培养观察者视角'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Types_Classification.md
  section: 按注意力机制分类表 (Classification by Attentional Mechanism)
