- type: concept
  question: 核心主诉的核心要点是什么？
  answer: '典型抑郁（成年期）: 情绪低落、兴趣丧失；老年抑郁: **躯体症状**（疼痛、疲劳、头晕）、认知下降；临床意义: 患者常首诊于综合医院非精神科'
  source: 02-Mind-Psychology/psychology/clinical/depression/geriatric-depression/Geriatric_Depression.md
  section: 表1.1 老年抑郁与典型抑郁的差异
- type: concept
  question: 情绪表达的核心要点是什么？
  answer: '典型抑郁（成年期）: 悲伤、绝望明显；老年抑郁: **情感淡漠、迟钝**多于悲伤；易激惹；临床意义: 易被误认为「性格改变」'
  source: 02-Mind-Psychology/psychology/clinical/depression/geriatric-depression/Geriatric_Depression.md
  section: 表1.1 老年抑郁与典型抑郁的差异
- type: concept
  question: 焦虑共病的核心要点是什么？
  answer: '典型抑郁（成年期）: 常见；老年抑郁: **更常见**；常为主要表现；临床意义: 焦虑可能是抑郁的「面具」'
  source: 02-Mind-Psychology/psychology/clinical/depression/geriatric-depression/Geriatric_Depression.md
  section: 表1.1 老年抑郁与典型抑郁的差异
- type: concept
  question: 起病的核心要点是什么？
  answer: '假性痴呆（抑郁性认知下降）: 相对急性（数周至数月）；真性痴呆（如阿尔茨海默病）: 隐匿、渐进'
  source: 02-Mind-Psychology/psychology/clinical/depression/geriatric-depression/Geriatric_Depression.md
  section: 表1.2 假性痴呆 vs 真性痴呆鉴别
- type: concept
  question: 病程的核心要点是什么？
  answer: '假性痴呆（抑郁性认知下降）: 波动性；日间可变化；真性痴呆（如阿尔茨海默病）: 持续进展'
  source: 02-Mind-Psychology/psychology/clinical/depression/geriatric-depression/Geriatric_Depression.md
  section: 表1.2 假性痴呆 vs 真性痴呆鉴别
- type: concept
  question: 主诉的核心要点是什么？
  answer: '假性痴呆（抑郁性认知下降）: 患者主动抱怨记忆力差；真性痴呆（如阿尔茨海默病）: 家属发现，患者常否认或掩饰'
  source: 02-Mind-Psychology/psychology/clinical/depression/geriatric-depression/Geriatric_Depression.md
  section: 表1.2 假性痴呆 vs 真性痴呆鉴别
- type: concept
  question: 生物因素的核心要点是什么？
  answer: '具体因素: 脑血管病变（小血管病、白质病变）；OR/RR: OR 2-4；机制: 血管性抑郁假说；前额叶-纹状体环路受损；可干预性: 中（血管风险管理）'
  source: 02-Mind-Psychology/psychology/clinical/depression/geriatric-depression/Geriatric_Depression.md
  section: 表2.1 老年抑郁风险因素
- type: concept
  question: 神经退行性疾病的核心要点是什么？
  answer: '具体因素: OR 3-5；OR/RR: 共同病理（如AD与抑郁共享炎症/神经营养因子）；机制: 低'
  source: 02-Mind-Psychology/psychology/clinical/depression/geriatric-depression/Geriatric_Depression.md
  section: 表2.1 老年抑郁风险因素
- type: concept
  question: 主诉的核心要点是什么？
  answer: '假性痴呆（抑郁性）: 患者主动抱怨；真性痴呆（如AD）: 家属发现'
  source: 02-Mind-Psychology/psychology/clinical/depression/geriatric-depression/INDEX.md
  section: 假性痴呆 vs 真性痴呆速查
- type: concept
  question: 认知测验的核心要点是什么？
  answer: '假性痴呆（抑郁性）: 「我不知道」；不努力；真性痴呆（如AD）: 努力尝试但做错'
  source: 02-Mind-Psychology/psychology/clinical/depression/geriatric-depression/INDEX.md
  section: 假性痴呆 vs 真性痴呆速查
