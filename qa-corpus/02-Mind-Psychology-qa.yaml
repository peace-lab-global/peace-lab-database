  source: 02-Mind-Psychology/therapy/incense/Incense_Preparation_Formulation.md
  section: 一、经典配方表
- type: concept
  question: 吠陀祭火香 (Vedic Havan)的核心要点是什么？
  answer: '中文/源语: यज्ञ धूप；起源: 印度 (吠陀时期)；成分配比: 乳香30% + 檀香25% + 安息香20% + 芒果木25%；功效: 净化、祈福；适用场景: 火祭仪式；历史文献: 《阿闼婆吠陀》'
