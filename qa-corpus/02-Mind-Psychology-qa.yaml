- type: concept
  question: 功能分析的核心要点是什么？
  answer: '英文: Functional Analysis；内容: 担忧通过减少不愉快的躯体反应而被负强化；研究证据: 行为分析框架'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/gad/GAD_Cognitive_Models.md
  section: 表2.1 理论核心要素 (Core Elements)
- type: concept
  question: 意象抑制的核心要点是什么？
  answer: '描述: 语言化担忧替代了具体的威胁性意象；临床意义: 担忧暴露需要增加意象成分'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/gad/GAD_Cognitive_Models.md
  section: 表2.2 担忧作为认知回避的机制 (Worry as Cognitive Avoidance)
- type: concept
  question: 躯体激活抑制的核心要点是什么？
  answer: '描述: 抽象思维减少了自主神经系统的激活；临床意义: 虽然感觉更"可控"，但阻止了习惯化'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/gad/GAD_Cognitive_Models.md
  section: 表2.2 担忧作为认知回避的机制 (Worry as Cognitive Avoidance)
- type: concept
  question: 广泛性焦虑障碍的核心要点是什么？
  answer: '英文名 (English Term): Generalized Anxiety Disorder (GAD)；原始语言/词源 (Original Language): 拉丁语: *Generalis* (普遍的) + *Anxietas*
    (焦虑)；词源含义: "普遍的、非特定的焦虑状态"；精确定义: 以过度、难以控制的担忧为核心，伴躯体紧张症状，持续≥6月；临床要点: 担忧内容涵盖多个生活领域'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/gad/GAD_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 病理性担忧的核心要点是什么？
  answer: '英文名 (English Term): Pathological Worry；原始语言/词源 (Original Language): 古英语: *Wyrgan* (勒紧、扼住)；词源含义: "被持续扼住喉咙的感觉"；精确定义:
    过度、持续、难以控制、与威胁程度不成比例的担忧；临床要点: GAD的核心症状'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/gad/GAD_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 自由浮动焦虑的核心要点是什么？
  answer: '英文名 (English Term): Free-floating Anxiety；原始语言/词源 (Original Language): 德语: *Frei flottierend* (Freud术语)；词源含义: "无特定依附对象的焦虑"；精确定义:
    非指向特定对象或情境的弥漫性焦虑；临床要点: 经典精神分析描述'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/gad/GAD_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: A. 过度焦虑和担忧的核心要点是什么？
  answer: '内容: 对多种事件或活动(如工作、学业)的过度焦虑和担忧，发生频率超过不发生频率，持续至少6个月；临床解读: "多种"通常指≥2个生活领域；评估要点: 使用担忧日记评估频率'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/gad/GAD_Overview.md
  section: 表2.1 DSM-5广泛性焦虑障碍诊断标准 (DSM-5 Criteria for GAD)
- type: concept
  question: B. 难以控制担忧的核心要点是什么？
  answer: '内容: 个体发现难以控制担忧；临床解读: "控制困难"是区分正常担忧的关键；评估要点: 询问"能否停止担忧？"'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/gad/GAD_Overview.md
  section: 表2.1 DSM-5广泛性焦虑障碍诊断标准 (DSM-5 Criteria for GAD)
- type: concept
  question: C. 伴随症状(≥3项)的核心要点是什么？
  answer: '内容: 坐立不安/紧张不安、易疲劳、注意力难集中、易激惹、肌肉紧张、睡眠障碍；临床解读: 成人需≥3项；儿童仅需1项；评估要点: 系统评估每项症状'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/gad/GAD_Overview.md
  section: 表2.1 DSM-5广泛性焦虑障碍诊断标准 (DSM-5 Criteria for GAD)
- type: concept
  question: 核心症状的核心要点是什么？
  answer: 'ICD-11标准: 持续的广泛性焦虑，不限于特定情境；与DSM-5差异: 强调"不限于特定情境"'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/gad/GAD_Overview.md
  section: 表2.2 ICD-11广泛性焦虑障碍诊断标准 (ICD-11 Criteria)
- type: concept
  question: 担忧特征的核心要点是什么？
  answer: 'ICD-11标准: 对多种日常事件的忧虑性预期；与DSM-5差异: 与DSM-5一致'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/gad/GAD_Overview.md
  section: 表2.2 ICD-11广泛性焦虑障碍诊断标准 (ICD-11 Criteria)
- type: concept
  question: 认知行为疗法的核心要点是什么？
  answer: '英文名 (English Term): Cognitive Behavioral Therapy (CBT)；原始语言/词源 (Original Language): 拉丁语: *Cognitio* (认知) + 行为学；精确定义:
    针对认知和行为的结构化心理治疗；临床应用: GAD一线治疗'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/gad/GAD_Treatment.md
  section: 1. 治疗术语表 (Treatment Terminology)
- type: concept
  question: 元认知治疗的核心要点是什么？
  answer: '英文名 (English Term): Metacognitive Therapy (MCT)；原始语言/词源 (Original Language): 希腊语: *Meta* (μετά) + *Cognitio*；精确定义:
    针对元认知信念的心理治疗；临床应用: Wells发展的专项方法'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/gad/GAD_Treatment.md
  section: 1. 治疗术语表 (Treatment Terminology)
- type: concept
  question: 接纳承诺疗法的核心要点是什么？
  answer: '英文名 (English Term): Acceptance and Commitment Therapy (ACT)；原始语言/词源 (Original Language): 拉丁语: *Acceptare* (接纳)；精确定义:
    基于接纳和价值的行为疗法；临床应用: 第三波CBT'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/gad/GAD_Treatment.md
  section: 1. 治疗术语表 (Treatment Terminology)
- type: concept
  question: 循证实践的核心要点是什么？
  answer: '英文: Evidence-Based Practice；内涵: 选择有研究支持的治疗方法；实践要点: 优先推荐A级证据治疗'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/gad/GAD_Treatment.md
  section: 表2.1 GAD治疗核心原则 (Core Treatment Principles)
- type: concept
  question: 心理治疗优先的核心要点是什么？
  answer: '英文: Psychotherapy First；内涵: 轻中度GAD首选心理治疗；实践要点: CBT是一线选择'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/gad/GAD_Treatment.md
  section: 表2.1 GAD治疗核心原则 (Core Treatment Principles)
- type: concept
  question: 共同决策的核心要点是什么？
  answer: '英文: Shared Decision-Making；内涵: 与患者共同制定治疗计划；实践要点: 考虑患者偏好'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/gad/GAD_Treatment.md
  section: 表2.1 GAD治疗核心原则 (Core Treatment Principles)
- type: concept
  question: 亚阈值焦虑的核心要点是什么？
  answer: '一线治疗: 心理教育；自助书籍/APP；二线治疗: 引导自助；治疗设置: 自助/初级保健；疗程: 4-8周'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/gad/GAD_Treatment.md
  section: 表2.2 分层治疗模型 (Stepped Care Model)
- type: concept
  question: 轻度GAD的核心要点是什么？
  answer: '一线治疗: 引导自助；低强度心理干预(LICBT)；二线治疗: 面对面CBT；治疗设置: 初级保健；疗程: 6-12周'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/gad/GAD_Treatment.md
  section: 表2.2 分层治疗模型 (Stepped Care Model)
- type: concept
