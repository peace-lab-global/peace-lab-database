- type: concept
  question: 安东尼** St. Anthony的核心要点是什么？
  answer: '核心教导: 心是属灵争战的战场；通过**警醒**（Nepsis, νῆψις）和**默念**守护心灵；对后世的影响: 为整个基督教灵修奠定了"心之战"的框架'
  source: 02-Mind-Psychology/meditation/christian-contemplative/Christian_Contemplative_Overview.md
  section: 1.1 早期沙漠教父与教母（3–5 世纪）
- type: concept
  question: 艾瓦格利乌斯** Evagrius的核心要点是什么？
  answer: '核心教导: 系统提出**八邪念**（贪食、淫欲、贪财、忧愁、愤怒、懈怠、虚荣、骄傲），主张以**静观**（Theoria, θεωρία）超越思想；对后世的影响: 其思想经伪狄奥尼修斯伪托，深刻影响中世纪神秘主义'
  source: 02-Mind-Psychology/meditation/christian-contemplative/Christian_Contemplative_Overview.md
  section: 1.1 早期沙漠教父与教母（3–5 世纪）
- type: concept
  question: 玛喀里** Macarius的核心要点是什么？
  answer: '核心教导: 强调**心**（Kardia, καρδία）作为圣灵临在的殿；心灵是可以被圣火净化的；对后世的影响: 为后来的"归心祈祷"提供了神学根基'
  source: 02-Mind-Psychology/meditation/christian-contemplative/Christian_Contemplative_Overview.md
  section: 1.1 早期沙漠教父与教母（3–5 世纪）
- type: concept
  question: 圣伯尔纳铎** St. Bernard of Clairvaux的核心要点是什么？
  answer: '年代: 1090–1153；核心贡献: 将**雅歌**（Song of Songs）解释为灵魂与基督之间的神秘之爱的对话；发展出"**爱的知识**"（Scientia Amoris）——爱本身就是认识上帝的方式'
  source: 02-Mind-Psychology/meditation/christian-contemplative/Christian_Contemplative_Overview.md
  section: 1.3 12 世纪熙笃会改革与爱的神学
- type: concept
  question: 圣方济各·撒肋爵** St. Francis de Sales的核心要点是什么？
  answer: '年代: 1567–1622；核心贡献: 《虔修生活的入门》（*Introduction to the Devout Life*）将修道院灵修带入平信徒生活'
  source: 02-Mind-Psychology/meditation/christian-contemplative/Christian_Contemplative_Overview.md
  section: 1.3 12 世纪熙笃会改革与爱的神学
- type: concept
  question: 圣十字若望** St. John of the Cross的核心要点是什么？
  answer: '年代: 1542–1591；核心贡献: 与圣女大德兰共同改革加尔默罗会；《心灵的黑夜》（*Dark Night of the Soul*）系统阐述了默观进阶中的净化阶段'
  source: 02-Mind-Psychology/meditation/christian-contemplative/Christian_Contemplative_Overview.md
  section: 1.3 12 世纪熙笃会改革与爱的神学
- type: concept
  question: Cloud of Unknowing的核心要点是什么？
  answer: '原文表述: "A cloud of unknowing between you and God"；现代理解: 理性认知的极限；超越概念和语言的上帝临在'
  source: 02-Mind-Psychology/meditation/christian-contemplative/Christian_Contemplative_Overview.md
