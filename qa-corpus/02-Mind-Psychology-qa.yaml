- type: concept
  question: 安全型的核心要点是什么？
  answer: '英文名 (English): Secure；内在工作模式 (Internal Working Model): 自我正向 + 他人正向；恋爱行为特征 (Dating Behavior): 舒适表达需求、信任对方、适度依赖、自主且亲密。；关系中的焦虑点
    (Relationship Anxieties): 较少;可容忍模糊与分离。；改善路径 (Improvement Pathways): 已较健康;继续深化亲密。；专业视角 (Professional Perspective): 恋爱中最适应;约50-60%成人;关系满意度最高。'
  source: 02-Mind-Psychology/relationships/love/Love_Attachment_Intimacy.md
  section: Adult Attachment in Romantic Love (恋爱中的成人依恋表)
- type: concept
  question: 焦虑型的核心要点是什么？
  answer: '英文名 (English): Anxious-Preoccupied；内在工作模式 (Internal Working Model): 自我负向 + 他人正向；恋爱行为特征 (Dating Behavior): 过度寻求确认、频繁联系、对分离敏感、情绪强烈。；关系中的焦虑点
    (Relationship Anxieties): "TA还爱我吗?""TA会离开我吗?"；改善路径 (Improvement Pathways): 发展自我价值、情绪自我调节、安全关系经历。；专业视角 (Professional Perspective):
    约20%;易陷入"追逃"模式;需学习自我安抚。'
  source: 02-Mind-Psychology/relationships/love/Love_Attachment_Intimacy.md
  section: Adult Attachment in Romantic Love (恋爱中的成人依恋表)
- type: concept
  question: 回避-疏离型的核心要点是什么？
  answer: '英文名 (English): Dismissive-Avoidant；内在工作模式 (Internal Working Model): 自我正向 + 他人负向；恋爱行为特征 (Dating Behavior): 重视独立、情感距离、回避亲密、压抑需求。；关系中的焦虑点
    (Relationship Anxieties): 害怕被吞没、失去自主、情感脆弱。；改善路径 (Improvement Pathways): 识别脆弱性的价值、渐进开放、挑战"不需要他人"信念。；专业视角 (Professional
    Perspective): 约20-25%;常被误解为"不爱";实为防御机制。'
  source: 02-Mind-Psychology/relationships/love/Love_Attachment_Intimacy.md
  section: Adult Attachment in Romantic Love (恋爱中的成人依恋表)
- type: concept
  question: 认知亲密的核心要点是什么？
  answer: '英文名 (English): Cognitive Intimacy；初级亲密 (Early Intimacy): 分享观点、兴趣、日常信息。；中级亲密 (Moderate Intimacy): 分享价值观、信念、人生哲学。；深度亲密
    (Deep Intimacy): 思维方式透明、深度理解对方逻辑。；发展障碍 (Barriers): 价值观冲突、沟通障碍。；专业视角 (Professional Perspective): 认知亲密是"理解对方如何看世界"。'
  source: 02-Mind-Psychology/relationships/love/Love_Attachment_Intimacy.md
  section: Intimacy Development Stages (亲密关系发展阶段表)
- type: concept
  question: 情感亲密的核心要点是什么？
  answer: '英文名 (English): Emotional Intimacy；初级亲密 (Early Intimacy): 分享快乐、兴奋等积极情绪。；中级亲密 (Moderate Intimacy): 分享悲伤、失望等脆弱情绪。；深度亲密
    (Deep Intimacy): 无保留情感表达、被完全接纳。；发展障碍 (Barriers): 情感回避、批判、情绪洪流。；专业视角 (Professional Perspective): 核心是"情绪的相互调节";不只是表达,更是被接住。'
  source: 02-Mind-Psychology/relationships/love/Love_Attachment_Intimacy.md
  section: Intimacy Development Stages (亲密关系发展阶段表)
- type: concept
  question: 性亲密的核心要点是什么？
  answer: '英文名 (English): Sexual Intimacy；初级亲密 (Early Intimacy): 身体吸引、初步性接触。；中级亲密 (Moderate Intimacy): 性沟通、探索偏好、逐渐舒适。；深度亲密
    (Deep Intimacy): 深度性连接、脆弱与力量共存。；发展障碍 (Barriers): 性羞耻、创伤、沟通缺失。；专业视角 (Professional Perspective): 性亲密不仅是技巧,更是情感与身体的整合。'
  source: 02-Mind-Psychology/relationships/love/Love_Attachment_Intimacy.md
  section: Intimacy Development Stages (亲密关系发展阶段表)
- type: concept
  question: 失恋的核心要点是什么？
  answer: '英文名 (English Term): Romantic Breakup / Love Loss；原始语言/术语 (Original Language): 英: *Breakup*; 拉: *Separatio* (分离)；词源含义:
    浪漫关系被一方或双方终止,原有亲密与承诺关系不再持续；精确定义: 特指浪漫/恋爱关系的终止,而非一般友谊或家庭关系的疏远；区分与备注: 与"失婚"(离婚)不同,不涉及法律婚姻解体;也不同于一般"吵架冷战"；专业视角 (Professional
    Perspective): 失恋常兼具依恋丧失、身份认同动摇与未来图景崩塌三重冲击,不应被简化为"矫情"'
  source: 02-Mind-Psychology/relationships/love/Love_Breakup_Heartbreak.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 情感丧失的核心要点是什么？
  answer: '英文名 (English Term): Affective Loss / Loss of Attachment Figure；原始语言/术语 (Original Language): 拉: *Affectus* (情感),
    *Lossus* (丧失)；词源含义: 对重要依恋对象(伴侣/暗恋对象/情感支柱)的关系失去或质变；精确定义: 包括单恋破灭、暧昧失败、长期关系变质等；区分与备注: 部分个案在形式上未"正式在一起",但主观丧失程度与失恋相当甚至更重；专业视角
    (Professional Perspective): 临床上更关注主观情感强度与依恋深度,而非关系法律/形式标签'
  source: 02-Mind-Psychology/relationships/love/Love_Breakup_Heartbreak.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 分手的核心要点是什么？
  answer: '英文名 (English Term): Relationship Breakup；原始语言/术语 (Original Language): 英: *To break up*；词源含义: 一段已经确立的关系由一方或双方宣布结束；精确定义:
    包括短期约会关系到长期稳定关系的终止；区分与备注: 分手方式(当面/短信/消失式)显著影响创伤感与恢复难度；专业视角 (Professional Perspective): 治疗中需评估分手过程本身是否带来次级创伤(如当众羞辱、被集体攻击)'
  source: 02-Mind-Psychology/relationships/love/Love_Breakup_Heartbreak.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 1. 震惊与麻木期的核心要点是什么？
  answer: '中文描述: 难以置信、恍惚、身体发冷或空空的感觉；英文名: Shock & Numbness；典型体验: "怎么会这样?" "像做梦一样"；潜在风险: 可能出现危险行为(追车、极端挽回)、注意力涣散而发生意外；临床/自助提示:
    先保障安全与基本生活节律,暂不急于哲学讨论;允许麻木存在,以稳定为优先'
  source: 02-Mind-Psychology/relationships/love/Love_Breakup_Heartbreak.md
  section: 失恋哀伤阶段与模式表 (Stages & Patterns of Breakup Grief)
- type: concept
  question: 2. 否认与幻想期的核心要点是什么？
  answer: '中文描述: 不愿承认关系已结束,幻想对方会回头；英文名: Denial & Fantasy；典型体验: 频繁查看社交媒体、编造对方仍在乎的解释；潜在风险: 容易陷入自我欺骗和反复被现实刺痛的循环；临床/自助提示: 温和地帮助区分"希望"与"现实证据",保持同理而非强行"叫醒"'
  source: 02-Mind-Psychology/relationships/love/Love_Breakup_Heartbreak.md
  section: 失恋哀伤阶段与模式表 (Stages & Patterns of Breakup Grief)
- type: concept
  question: 3. 愤怒与指责期的核心要点是什么？
  answer: '中文描述: 对对方或自己产生强烈愤怒与怨恨；英文名: Anger & Blame；典型体验: "都是他/她的错" 或 "都是我不够好"；潜在风险: 若只停留在指责,难以进入整合阶段;可能发展为报复行为；临床/自助提示: 协助识别隐藏在愤怒背后的哀伤与恐惧,引导用安全方式表达情绪(写信、咨询而非骚扰)'
  source: 02-Mind-Psychology/relationships/love/Love_Breakup_Heartbreak.md
  section: 失恋哀伤阶段与模式表 (Stages & Patterns of Breakup Grief)
- type: concept
  question: 依恋焦虑型个体的核心要点是什么？
  answer: '风险特点: 很难承受被抛弃感,容易过度自责与挽回；典型表现: 反复道歉、跪求复合、容忍严重不尊重；误区/常见评价: 容易被评价为"太黏人/没自尊"；专业视角: 需从依恋创伤角度理解,协助建立自我价值与边界,而非简单劝"别爱得太卑微"'
  source: 02-Mind-Psychology/relationships/love/Love_Breakup_Heartbreak.md
  section: 高危人群与复杂反应表 (High-Risk Populations & Complications)
- type: concept
  question: 童年有抛弃/忽视经历者的核心要点是什么？
  answer: '风险特点: 失恋触发旧有被抛弃创伤；典型表现: 反应强度远超这段关系本身,出现童年记忆涌现；误区/常见评价: 周围人难以理解其"反应为何这么大"；专业视角: 需要创伤敏感视角,识别"此刻"与"从前"的叠加,可能需要专业创伤治疗'
  source: 02-Mind-Psychology/relationships/love/Love_Breakup_Heartbreak.md
  section: 高危人群与复杂反应表 (High-Risk Populations & Complications)
- type: concept
  question: 自我呈现的核心要点是什么？
  answer: '英文名 (English): Self-Presentation；早期策略 (Early Strategy): 平衡真实性与吸引力;突出优点同时保持真实。；目标 (Goals): 吸引对方同时筛选兼容性。；常见错误 (Common
    Mistakes): 过度包装、虚假人设、过早深度披露。；高效实践 (Best Practices): 渐进真实;先展示真实兴趣与价值观。；专业视角 (Professional Perspective): "做最好的真实自己"而非"完美虚假版本"。'
  source: 02-Mind-Psychology/relationships/love/Love_Communication_Conflict.md
  section: Early Dating Communication Dynamics (早期约会沟通动力表)
- type: concept
  question: 问询与倾听的核心要点是什么？
  answer: '英文名 (English): Inquiry & Listening；早期策略 (Early Strategy): 开放性问题、好奇探索、积极倾听。；目标 (Goals): 了解对方、表达兴趣、建立连接。；常见错误 (Common
    Mistakes): 审讯式提问、打断、等待说话机会而非倾听。；高效实践 (Best Practices): 跟进问题、反映情感、非言语反馈。；专业视角 (Professional Perspective): "约会是相互采访";倾听质量比说话内容更重要。'
  source: 02-Mind-Psychology/relationships/love/Love_Communication_Conflict.md
  section: Early Dating Communication Dynamics (早期约会沟通动力表)
- type: concept
  question: 自我披露节奏的核心要点是什么？
  answer: '英文名 (English): Self-Disclosure Pacing；早期策略 (Early Strategy): 匹配对方披露深度;逐步递进。；目标 (Goals): 建立互惠信任、避免过快或过慢。；常见错误 (Common
    Mistakes): 第一次约会谈创伤、保持神秘过度、单方面倾倒。；高效实践 (Best Practices): "相互交替披露";监测对方舒适度。；专业视角 (Professional Perspective): Altman & Taylor的"社会渗透理论":从浅到深,从广到窄。'
  source: 02-Mind-Psychology/relationships/love/Love_Communication_Conflict.md
  section: Early Dating Communication Dynamics (早期约会沟通动力表)
- type: concept
  question: 追逃模式的核心要点是什么？
  answer: '英文名 (English): Pursuer-Distancer；模式描述 (Pattern Description): 一方追求连接,另一方退缩;越追越逃。；依恋基础 (Attachment Basis): 焦虑型追+回避型逃。；短期后果:
    双方都不满;追者更焦虑,逃者更回避。；长期风险: 关系破裂或固化为慢性模式。；转化策略: 追者自我安抚、暂停追逐;逃者主动连接、小步开放。；专业视角 (Professional Perspective): 最常见求助模式;双方需同时改变。'
  source: 02-Mind-Psychology/relationships/love/Love_Communication_Conflict.md
  section: Conflict Patterns in Dating (恋爱中的冲突模式表)
- type: concept
  question: 竞争升级的核心要点是什么？
  answer: '英文名 (English): Competitive Escalation；模式描述 (Pattern Description): 双方竞相证明自己对、对方错;冲突升级。；依恋基础 (Attachment Basis):
    可能双方都焦虑型或自恋特质。；短期后果: 伤害性语言、关系破坏。；长期风险: 蔑视、关系毒化。；转化策略: 识别"输赢"框架;转向"我们vs问题"。；专业视角 (Professional Perspective): Gottman"四骑士"之一;最具破坏性。'
  source: 02-Mind-Psychology/relationships/love/Love_Communication_Conflict.md
  section: Conflict Patterns in Dating (恋爱中的冲突模式表)
- type: concept
  question: 回避僵持的核心要点是什么？
  answer: '英文名 (English): Mutual Avoidance；模式描述 (Pattern Description): 双方都回避冲突;问题积累未解决。；依恋基础 (Attachment Basis): 可能双方都回避型。；短期后果:
    表面和平、实则疏远。；长期风险: 情感死寂、缺乏亲密。；转化策略: 安全环境中练习表达;从小议题开始。；专业视角 (Professional Perspective): "假和平";比显性冲突更隐蔽危险。'
  source: 02-Mind-Psychology/relationships/love/Love_Communication_Conflict.md
  section: Conflict Patterns in Dating (恋爱中的冲突模式表)
- type: concept
  question: 软化开启的核心要点是什么？
  answer: '英文名 (English): Soft Startup；具体技巧 (Specific Techniques): 以"我"陈述开始;描述行为而非攻击人格;表达需求而非指责。；应用示例 (Examples): "我感到被忽视当你..."
    vs "你总是不在乎我!"；避免事项 (Avoid): 指责、批评、"你从来/总是"。；专业视角 (Professional Perspective): Gottman研究:对话前3分钟决定结果;软开启成功率高。'
  source: 02-Mind-Psychology/relationships/love/Love_Communication_Conflict.md
  section: Healthy Dating Conflict Resolution (健康恋爱冲突解决表)
- type: concept
  question: 接受影响的核心要点是什么？
  answer: '英文名 (English): Accept Influence；具体技巧 (Specific Techniques): 认真对待对方观点;愿意被说服;妥协而非固执。；应用示例 (Examples): "你说得有道理,我没考虑到..."；避免事项
    (Avoid): 驳回、轻视对方观点。；专业视角 (Professional Perspective): 男性接受伴侣影响预测婚姻成功(Gottman);不是"输"是"智慧"。'
  source: 02-Mind-Psychology/relationships/love/Love_Communication_Conflict.md
  section: Healthy Dating Conflict Resolution (健康恋爱冲突解决表)
- type: concept
  question: 注意/吸引的核心要点是什么？
  answer: '英文名 (English): Noticing / Attraction；核心任务 (Core Tasks): 感知对方、产生兴趣、评估吸引力。；典型持续时间: 瞬间至数周；心理动力 (Psychological Dynamics):
    生物本能驱动;外貌吸引为主。；常见挑战 (Common Challenges): 单向吸引、错误线索解读。；成功标志 (Success Indicators): 双向兴趣确认。；专业视角 (Professional Perspective):
    "一见钟情"通常是强烈吸引而非真爱;需后续验证。'
  source: 02-Mind-Psychology/relationships/love/Love_Dating_Stages.md
  section: Pre-Relationship Stages (恋爱前阶段表)
- type: concept
  question: 接触/了解的核心要点是什么？
  answer: '英文名 (English): Contact / Acquaintance；核心任务 (Core Tasks): 建立初步联系、试探互动。；典型持续时间: 数周至数月；心理动力 (Psychological Dynamics):
    自我展示vs真实性;焦虑管理。；常见挑战 (Common Challenges): 社交焦虑、拒绝恐惧、过度自我监控。；成功标志 (Success Indicators): 舒适互动、自然对话。；专业视角 (Professional Perspective):
    现代约会应用改变此阶段:在线沟通降低初期焦虑但可能延迟真实连接。'
  source: 02-Mind-Psychology/relationships/love/Love_Dating_Stages.md
  section: Pre-Relationship Stages (恋爱前阶段表)
- type: concept
  question: 约会/试探的核心要点是什么？
  answer: '英文名 (English): Dating / Exploration；核心任务 (Core Tasks): 明确浪漫意图、深化了解、评估兼容性。；典型持续时间: 数月；心理动力 (Psychological Dynamics):
    "面试式"相互评估;呈现理想自我。；常见挑战 (Common Challenges): 标准过高、过早判断、游戏心态。；成功标志 (Success Indicators): 相互兴趣升级、约会频率增加。；专业视角 (Professional
    Perspective): 此阶段是"关系求职面试";需平衡真实性与吸引力。'
  source: 02-Mind-Psychology/relationships/love/Love_Dating_Stages.md
  section: Pre-Relationship Stages (恋爱前阶段表)
- type: concept
  question: 热恋期的核心要点是什么？
  answer: '英文名 (English): Honeymoon / Infatuation Phase；核心任务 (Core Tasks): 理想化、激情融合、忽略差异。；典型持续时间: 3-18个月；心理体验 (Psychological
    Experience): 欣快、专注、失眠、食欲变化、强迫性思维。；关系里程碑 (Relationship Milestones): 第一次亲密接触、"我爱你"、独家关系确认。；危机点 (Crisis Points): 过快承诺、忽视红旗、失去自我。；专业视角
    (Professional Perspective): 神经化学基础决定此阶段必然消退;不是"爱消失"而是"进化"。'
  source: 02-Mind-Psychology/relationships/love/Love_Dating_Stages.md
  section: Early Relationship Development (早期关系发展阶段表)
- type: concept
  question: 现实检验期的核心要点是什么？
  answer: '英文名 (English): Reality Check / Differentiation；核心任务 (Core Tasks): 差异浮现、理想化破灭、个体性重新出现。；典型持续时间: 6-24个月；心理体验 (Psychological
    Experience): 失望、困惑、"TA变了"的感觉。；关系里程碑 (Relationship Milestones): 第一次重大冲突、见家长、价值观分歧显现。；危机点 (Crisis Points): 失望导致分手、回避冲突、责怪对方。；专业视角
    (Professional Perspective): 最危险阶段:60%关系在此期终结;需理解"幻灭是正常的"。'
  source: 02-Mind-Psychology/relationships/love/Love_Dating_Stages.md
  section: Early Relationship Development (早期关系发展阶段表)
- type: concept
  question: 承诺协商期的核心要点是什么？
  answer: '英文名 (English): Commitment Negotiation；核心任务 (Core Tasks): 明确关系定义、长期意图讨论、未来规划。；典型持续时间: 变化极大；心理体验 (Psychological Experience):
    焦虑、不确定、"TA到底怎么想"。；关系里程碑 (Relationship Milestones): 同居、订婚、明确排他性。；危机点 (Crisis Points): 承诺恐惧、进度不一致、压力逼婚。；专业视角 (Professional
    Perspective): 承诺进度不同步是关系破裂的主要原因之一。'
  source: 02-Mind-Psychology/relationships/love/Love_Dating_Stages.md
  section: Early Relationship Development (早期关系发展阶段表)
- type: concept
  question: 确立独家关系的核心要点是什么？
  answer: '英文名 (English): Defining the Relationship (DTR)；触发因素 (Triggers): 时间积累、情感投入、外部压力。；决策点 (Decision Points): "我们是情侣吗?""你还在约别人吗?"；成功转型要素
    (Success Factors): 直接沟通、意图一致、双方准备好。；失败风险 (Failure Risks): 假设一致、回避对话、进度不同步。；专业建议 (Professional Advice): 避免"situationship";明确关系边界减少焦虑。'
  source: 02-Mind-Psychology/relationships/love/Love_Dating_Stages.md
  section: Key Relationship Transitions (关键关系转折点表)
- type: concept
  question: 第一次见家长的核心要点是什么？
  answer: '英文名 (English): Meeting the Parents；触发因素 (Triggers): 关系深化、节假日、家庭事件。；决策点 (Decision Points): 是否获得家庭认可?如何处理家庭差异?；成功转型要素
    (Success Factors): 伴侣支持、尊重双方家庭、现实期待。；失败风险 (Failure Risks): 家庭反对、文化冲突、忠诚撕裂。；专业建议 (Professional Advice): 伴侣联盟优先于原生家庭;但需尊重而非切断。'
  source: 02-Mind-Psychology/relationships/love/Love_Dating_Stages.md
  section: Key Relationship Transitions (关键关系转折点表)
- type: concept
  question: 生殖价值信号的核心要点是什么？
  answer: '英文名 (English): Reproductive Value Cues；理论基础: 亲代投资理论 (Parental Investment Theory)；男性偏好倾向: 青春、健康、腰臀比0.7、皮肤光滑等生育力信号。；女性偏好倾向:
    资源获取能力、社会地位、雄心、年龄稳定性。；跨文化证据: 高度跨文化一致性。；专业视角 (Professional Perspective): 进化压力塑造了基本偏好模板,但文化与个体经验调节表达。'
  source: 02-Mind-Psychology/relationships/love/Love_Mate_Selection.md
  section: Evolutionary Psychology of Mate Selection (择偶进化心理学表)
- type: concept
  question: 性选择的核心要点是什么？
  answer: '英文名 (English): Sexual Selection；理论基础: 达尔文性选择理论；男性偏好倾向: 注重外貌、年轻、对称性。；女性偏好倾向: 注重能力、地位、资源控制。；跨文化证据: David Buss 37文化研究证实基本模式。；专业视角
    (Professional Perspective): 两性在择偶标准上的分化源于不同的繁殖策略与风险。'
  source: 02-Mind-Psychology/relationships/love/Love_Mate_Selection.md
  section: Evolutionary Psychology of Mate Selection (择偶进化心理学表)
- type: concept
  question: 好基因假说的核心要点是什么？
  answer: '英文名 (English): Good Genes Hypothesis；理论基础: 性选择理论；男性偏好倾向: 面部对称、身体对称性、第二性征(如下颌)。；女性偏好倾向: 健康指标、免疫力标志(如体味MHC兼容性)。；跨文化证据:
    实验支持面部对称性普遍吸引力。；专业视角 (Professional Perspective): 对称性被视为发育稳定性与基因质量的诚实信号。'
  source: 02-Mind-Psychology/relationships/love/Love_Mate_Selection.md
  section: Evolutionary Psychology of Mate Selection (择偶进化心理学表)
- type: concept
  question: 面部对称性的核心要点是什么？
  answer: '英文名 (English): Facial Symmetry；科学机制 (Scientific Mechanism): 发育稳定性与基因质量的指标;对称面孔激活奖赏回路。；性别差异 (Gender Differences):
    男女均偏好对称面孔,但男性对女性面孔对称性更敏感。；文化差异 (Cultural Variations): 跨文化普遍一致。；专业视角 (Professional Perspective): 对称性是"硬接线"偏好,但可被其他因素调节。'
  source: 02-Mind-Psychology/relationships/love/Love_Mate_Selection.md
  section: Physical Attraction Factors (身体吸引力因素表)
- type: concept
  question: 平均化面孔的核心要点是什么？
  answer: '英文名 (English): Averageness；科学机制 (Scientific Mechanism): 平均面孔代表"典型",可能信号遗传多样性与健康。；性别差异 (Gender Differences): 两性均偏好;极端特征可能减分。；文化差异
    (Cultural Variations): 高度跨文化。；专业视角 (Professional Perspective): 平均并非平庸,而是"最优平衡"的信号。'
  source: 02-Mind-Psychology/relationships/love/Love_Mate_Selection.md
  section: Physical Attraction Factors (身体吸引力因素表)
- type: concept
  question: 性别化特征的核心要点是什么？
  answer: '英文名 (English): Sexual Dimorphism；科学机制 (Scientific Mechanism): 高睾酮(男性化下颌/眉骨)或高雌激素(饱满嘴唇/大眼睛)信号生育力。；性别差异 (Gender Differences):
    女性偏好适度男性化;男性偏好女性化特征。；文化差异 (Cultural Variations): 在资源稀缺环境,女性可能偏好更男性化面孔。；专业视角 (Professional Perspective): 过度男性化可能信号攻击性,需权衡利弊。'
  source: 02-Mind-Psychology/relationships/love/Love_Mate_Selection.md
  section: Physical Attraction Factors (身体吸引力因素表)
- type: concept
  question: 相似性的核心要点是什么？
  answer: '英文名 (English): Similarity；定义与机制: 态度、价值观、背景、兴趣的相似性。；影响力 (Impact): 强正向;相似性预测初期吸引与长期满意度。；研究证据 (Evidence): "相似性-吸引范式"(Byrne)大量实证支持。；专业视角
    (Professional Perspective): "物以类聚";相似性降低沟通成本,提供验证感。'
  source: 02-Mind-Psychology/relationships/love/Love_Mate_Selection.md
  section: Psychological & Social Attraction (心理与社会吸引力因素表)
- type: concept
  question: 互补性的核心要点是什么？
  answer: '英文名 (English): Complementarity；定义与机制: 需求、人格特质的互补(如主导-顺从)。；影响力 (Impact): 弱至中等;主要在人格维度而非态度。；研究证据 (Evidence): 证据混合;互补在特定维度有效。；专业视角
    (Professional Perspective): 互补需谨慎:需求互补可能掩盖深层不兼容。'
  source: 02-Mind-Psychology/relationships/love/Love_Mate_Selection.md
  section: Psychological & Social Attraction (心理与社会吸引力因素表)
- type: concept
  question: 多巴胺的核心要点是什么？
  answer: '英文名 (English): Dopamine；化学结构/来源: 儿茶酚胺类;腹侧被盖区(VTA)释放。；在恋爱中的作用: 奖赏、动机、渴望;驱动追求行为。；阶段特异性 (Stage Specificity): 热恋期最高;长期关系下降。；行为表现
    (Behavioral Manifestations): 侵入性思维、专注对象、欣快感、失眠、食欲下降。；专业视角 (Professional Perspective): "爱情成瘾"的神经基础;激活与可卡因相同的奖赏回路。'
  source: 02-Mind-Psychology/relationships/love/Love_Neuroscience_Biology.md
  section: Neurotransmitters & Hormones in Love (恋爱中的神经递质与激素表)
- type: concept
  question: 去甲肾上腺素的核心要点是什么？
  answer: '英文名 (English): Norepinephrine；化学结构/来源: 儿茶酚胺类;蓝斑核释放。；在恋爱中的作用: 唤起、警觉、心跳加速、出汗。；阶段特异性 (Stage Specificity): 初期吸引与早期恋爱。；行为表现
    (Behavioral Manifestations): "见到TA心跳加速"、紧张、兴奋、失眠。；专业视角 (Professional Perspective): 与压力反应重叠;解释"恋爱的紧张感"。'
  source: 02-Mind-Psychology/relationships/love/Love_Neuroscience_Biology.md
  section: Neurotransmitters & Hormones in Love (恋爱中的神经递质与激素表)
- type: concept
  question: 血清素的核心要点是什么？
  answer: '英文名 (English): Serotonin (5-HT)；化学结构/来源: 吲哚胺类;中缝核释放。；在恋爱中的作用: 热恋期显著下降;与强迫思维相关。；阶段特异性 (Stage Specificity): 热恋期低水平。；行为表现
    (Behavioral Manifestations): 对对象的强迫性思维、无法停止想念。；专业视角 (Professional Perspective): 低5-HT与强迫症(OCD)相似;热恋如"良性强迫症"。'
  source: 02-Mind-Psychology/relationships/love/Love_Neuroscience_Biology.md
  section: Neurotransmitters & Hormones in Love (恋爱中的神经递质与激素表)
- type: concept
  question: 腹侧被盖区的核心要点是什么？
  answer: '英文名 (English): Ventral Tegmental Area (VTA)；解剖位置: 中脑腹侧。；在恋爱中的功能: 多巴胺奖赏系统的起源;驱动动机与渴望。；激活模式 (Activation Pattern):
    看到爱人照片时强烈激活。；fMRI 研究发现: 热恋者 VTA 激活类似成瘾者看到毒品。；专业视角 (Professional Perspective): VTA激活解释"爱情如毒品";戒断时产生渴望。'
  source: 02-Mind-Psychology/relationships/love/Love_Neuroscience_Biology.md
  section: Brain Regions & Neural Circuits (大脑区域与神经回路表)
- type: concept
  question: 尾状核的核心要点是什么？
  answer: '英文名 (English): Caudate Nucleus；解剖位置: 基底神经节;纹状体的一部分。；在恋爱中的功能: 奖赏检测、目标导向行为、习惯形成。；激活模式 (Activation Pattern): 恋爱相关刺激强烈激活;与奖赏预期相关。；fMRI
    研究发现: 激活程度与热恋强度正相关。；专业视角 (Professional Perspective): 尾状核富含多巴胺受体;处理"奖赏期待"。'
  source: 02-Mind-Psychology/relationships/love/Love_Neuroscience_Biology.md
  section: Brain Regions & Neural Circuits (大脑区域与神经回路表)
- type: concept
  question: 伏隔核的核心要点是什么？
  answer: '英文名 (English): Nucleus Accumbens；解剖位置: 腹侧纹状体。；在恋爱中的功能: 快乐、奖赏、欲望;成瘾的核心区域。；激活模式 (Activation Pattern): 与爱人互动、看照片时激活。；fMRI
    研究发现: 激活强度预测关系满意度。；专业视角 (Professional Perspective): "快乐中枢";所有成瘾物质均激活此区。'
  source: 02-Mind-Psychology/relationships/love/Love_Neuroscience_Biology.md
  section: Brain Regions & Neural Circuits (大脑区域与神经回路表)
- type: concept
  question: 欲望/性欲的核心要点是什么？
  answer: '英文名 (English): Lust；主导神经化学: 睾酮、雌激素。；演化功能 (Evolutionary Function): 促进性行为,寻求任何合适对象。；心理体验 (Psychological Experience):
    泛化性欲、寻求性满足。；典型持续时间: 持续存在;不针对特定对象。；转变条件: 可独立于后续阶段。；专业视角 (Professional Perspective): 性欲与浪漫爱可分离;无性恋者可体验浪漫爱。'
  source: 02-Mind-Psychology/relationships/love/Love_Neuroscience_Biology.md
  section: 'Three Stages of Love: Fisher''s Model (爱情三阶段：Fisher 模型)'
- type: concept
  question: 吸引/热恋的核心要点是什么？
  answer: '英文名 (English): Attraction (Romantic Love)；主导神经化学: 多巴胺、去甲肾上腺素、低血清素。；演化功能 (Evolutionary Function): 聚焦单一对象,促进配对形成。；心理体验
    (Psychological Experience): 欣快、专注、侵入性思维、失眠、理想化。；典型持续时间: 12–18 个月(最多3年)。；转变条件: 时间、现实检验、亲密发展或破裂。；专业视角 (Professional Perspective):
    "热恋期"生理上不可能长期维持;需转化。'
  source: 02-Mind-Psychology/relationships/love/Love_Neuroscience_Biology.md
  section: 'Three Stages of Love: Fisher''s Model (爱情三阶段：Fisher 模型)'
- type: concept
  question: 恋爱的核心要点是什么？
  answer: '英文名 (English Term): Romantic Love；原始语言/术语 (Sanskrit/Greek/Latin): 梵: **Prema** (प्रेम); 希: **Eros** (ἔρως); 拉:
    *Amor*；精确定义 (Technical Definition): 以情感亲密、性吸引与承诺潜力为特征的强烈人际连接,通常包含理想化与激情。；区分与备注 (Differentiation & Notes): 不同于友爱(Philia)、亲情(Storge)或慈爱(Agape);特指浪漫伴侣关系。；专业视角
    (Professional Perspective): 恋爱是生物、心理与社会文化多重因素交织的复杂现象,具有阶段性演变特征。'
  source: 02-Mind-Psychology/relationships/love/Love_Psychology_Overview.md
  section: Core Terminology of Romantic Love (恋爱核心术语总览表)
- type: concept
  question: 吸引的核心要点是什么？
  answer: '英文名 (English Term): Attraction；原始语言/术语 (Sanskrit/Greek/Latin): 拉: *Attractio*；精确定义 (Technical Definition): 个体对另一个体产生接近、了解与互动愿望的初始倾向,包括身体、心理与社会吸引。；区分与备注
    (Differentiation & Notes): 吸引是恋爱的前提但不等于恋爱;可能单向或双向。；专业视角 (Professional Perspective): 吸引涉及进化、文化与个人历史的多重决定因素,具有主观性与情境性。'
  source: 02-Mind-Psychology/relationships/love/Love_Psychology_Overview.md
  section: Core Terminology of Romantic Love (恋爱核心术语总览表)
- type: concept
  question: 激情的核心要点是什么？
  answer: '英文名 (English Term): Passion；原始语言/术语 (Sanskrit/Greek/Latin): 希: *Pathos* (πάθος,受难/强烈情感)；精确定义 (Technical Definition):
    以强烈生理唤起、性欲望与专注于对象为特征的恋爱成分。；区分与备注 (Differentiation & Notes): Sternberg 三角理论的三要素之一;通常在关系初期最强。；专业视角 (Professional Perspective):
    激情由多巴胺与去甲肾上腺素驱动,随时间自然下降,需转化为其他连接形式。'
  source: 02-Mind-Psychology/relationships/love/Love_Psychology_Overview.md
  section: Core Terminology of Romantic Love (恋爱核心术语总览表)
- type: concept
  question: 爱欲式的核心要点是什么？
  answer: '英文名 (English): Eros；希腊词源: Eros (ἔρως)；核心特征 (Core Features): 强烈身体吸引、激情、浪漫理想化。；关系模式 (Relationship Pattern): 快速投入、高度性吸引、追求完美伴侣。；优势与风险
    (Strengths & Risks): 优势:激情强烈、浪漫体验丰富;风险:理想化后失望、激情消退后迷失。；专业视角 (Professional Perspective): 最接近"热恋"原型;需发展亲密与承诺以维持关系。'
  source: 02-Mind-Psychology/relationships/love/Love_Psychology_Overview.md
  section: 'Types of Love: Lee''s Love Styles (爱情类型：李氏爱情风格表)'
- type: concept
  question: 友爱式的核心要点是什么？
  answer: '英文名 (English): Storge；希腊词源: Storge (στοργή)；核心特征 (Core Features): 基于友谊的温和情感、逐渐发展的亲密。；关系模式 (Relationship Pattern):
    缓慢建立、稳定、舒适、基于共同价值观。；优势与风险 (Strengths & Risks): 优势:稳定持久、冲突少;风险:缺乏激情、可能被视为"无聊"。；专业视角 (Professional Perspective): 常见于青梅竹马或长期友谊转化;老年恋爱中常见。'
  source: 02-Mind-Psychology/relationships/love/Love_Psychology_Overview.md
  section: 'Types of Love: Lee''s Love Styles (爱情类型：李氏爱情风格表)'
- type: concept
  question: 游戏式的核心要点是什么？
  answer: '英文名 (English): Ludus；希腊词源: Ludus (λῦδος,游戏)；核心特征 (Core Features): 将恋爱视为游戏、避免承诺、多重关系。；关系模式 (Relationship Pattern):
    情感距离、享乐主义、避免深度投入。；优势与风险 (Strengths & Risks): 优势:自由、少受伤;风险:无法建立深度连接、孤独、伤害他人。；专业视角 (Professional Perspective): 可能与回避依恋或害怕亲密相关;需评估是否为防御机制。'
  source: 02-Mind-Psychology/relationships/love/Love_Psychology_Overview.md
  section: 'Types of Love: Lee''s Love Styles (爱情类型：李氏爱情风格表)'
- type: concept
  question: 无爱的核心要点是什么？
  answer: '英文名 (English): Non-Love；亲密 (Intimacy): 无；激情 (Passion): 无；承诺 (Commitment): 无；典型情境 (Typical Context): 陌生人关系或纯功能性互动。；发展方向
    (Development Path): 不适用。；专业视角 (Professional Perspective): 非恋爱关系的基线状态。'
  source: 02-Mind-Psychology/relationships/love/Love_Psychology_Overview.md
  section: 'Sternberg''s Triangular Theory: Love Types (Sternberg 三角理论：爱情类型表)'
- type: concept
  question: 喜欢的核心要点是什么？
  answer: '英文名 (English): Liking；亲密 (Intimacy): 有；激情 (Passion): 无；承诺 (Commitment): 无；典型情境 (Typical Context): 友谊、熟人、无浪漫成分的亲近。；发展方向
    (Development Path): 可能发展为恋爱,也可能保持友谊。；专业视角 (Professional Perspective): 友谊与恋爱的区别在于激情与浪漫承诺的存在。'
  source: 02-Mind-Psychology/relationships/love/Love_Psychology_Overview.md
  section: 'Sternberg''s Triangular Theory: Love Types (Sternberg 三角理论：爱情类型表)'
- type: concept
  question: 什么是愤怒类型与功能表？
  answer: 并非所有的愤怒都是相同的。理解愤怒的不同类型有助于我们辨识自己在婚姻中经历的是哪种愤怒，从而采取更精准的应对策略。
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Anger_Management.md
  section: 愤怒类型与功能表
- type: concept
  question: 适应性愤怒的核心要点是什么？
  answer: '英文术语: Adaptive Anger；功能描述: 对真实的边界侵犯或不公正的合理反应；驱动个体保护自己和维护关系公平；婚姻中的典型表现: 伴侣反复忽视已达成的约定，当事人感到愤怒并提出需要重新讨论；引用来源 (Citation):
    Greenberg, L. S. (2015). *Emotion-Focused Therapy.*'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Anger_Management.md
  section: 愤怒类型与功能表
- type: concept
  question: 非适应性愤怒的核心要点是什么？
  answer: '英文术语: Maladaptive Anger；功能描述: 由早期创伤或未愈合的情绪伤口触发的过度愤怒反应；强度与当前情境不匹配；婚姻中的典型表现: 伴侣小小的迟到引发极度愤怒，实际触发的是童年被遗弃的创伤记忆；引用来源
    (Citation): Greenberg, L. S. & Goldman, R. N. (2019).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Anger_Management.md
  section: 愤怒类型与功能表
- type: concept
  question: 工具性愤怒的核心要点是什么？
  answer: '英文术语: Instrumental Anger；功能描述: 被有意或无意地用作控制手段，通过愤怒的威慑力迫使他人顺从；婚姻中的典型表现: 一方通过发脾气让另一方不敢表达不同意见，以愤怒维持权力不对等；引用来源 (Citation):
    Averill, J. R. (1983).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Anger_Management.md
  section: 愤怒类型与功能表
- type: concept
  question: 安全型的核心要点是什么？
  answer: '英文术语: Secure Attachment；典型愤怒模式: 能够感到愤怒并直接表达需求，愤怒强度与情境匹配，冲突后能有效修复；底层情绪动力: 信任伴侣能承接自己的愤怒；不怕表达不满会导致关系破裂；引用来源 (Citation):
    Mikulincer, M. & Shaver, P. R. (2016).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Anger_Management.md
  section: 愤怒与依恋风格 (Anger and Attachment Styles)
- type: concept
  question: 焦虑型的核心要点是什么？
  answer: '英文术语: Anxious-Preoccupied；典型愤怒模式: 愤怒强烈且频繁，伴随高度的情绪表达；常在愤怒和焦虑之间快速切换；追逐行为；底层情绪动力: 愤怒是对分离焦虑的抗议反应；"如果我足够大声，你就不会离开我"；引用来源
    (Citation): Johnson, S. M. (2008).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Anger_Management.md
  section: 愤怒与依恋风格 (Anger and Attachment Styles)
- type: concept
  question: 回避型的核心要点是什么？
  answer: '英文术语: Dismissive-Avoidant；典型愤怒模式: 压抑愤怒表达，倾向于撤退和沉默；当愤怒最终爆发时，往往极其猛烈；底层情绪动力: 情绪表达被内化为"危险的"；愤怒威胁到自主性的防御壁垒；引用来源 (Citation):
    Mikulincer, M. & Shaver, P. R. (2016).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Anger_Management.md
  section: 愤怒与依恋风格 (Anger and Attachment Styles)
- type: concept
  question: 什么是愤怒风格分类表？
  answer: 每个人在婚姻中都倾向于发展出一种主导的愤怒表达风格。识别自己和伴侣的风格，是改变的第一步。
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Anger_Management.md
  section: 愤怒风格分类表
- type: concept
  question: 关系质量评估的核心要点是什么？
  answer: '核心内容: 整体满意度、稳定性、承诺水平；评估方法: 标准化量表、结构化访谈；重要性等级: 高；临床应用: 初始评估、进展监测；引用来源 (Citation): Spanier, G. B. (1976).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Assessment_Diagnosis.md
  section: 专业评估框架表
- type: concept
  question: 沟通模式分析的核心要点是什么？
  answer: '核心内容: 表达方式、倾听质量、冲突处理；评估方法: 行为观察、互动编码；重要性等级: 极高；临床应用: 诊断核心问题、制定干预计划；引用来源 (Citation): Gottman, J. M. (1994).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Assessment_Diagnosis.md
  section: 专业评估框架表
- type: concept
  question: 依恋风格评估的核心要点是什么？
  answer: '核心内容: 安全性、焦虑性、回避性维度；评估方法: 自评量表、临床访谈；重要性等级: 高；临床应用: 理解互动模式、预测治疗反应；引用来源 (Citation): Fraley, R. C. et al. (2000).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Assessment_Diagnosis.md
  section: 专业评估框架表
- type: concept
  question: DAS-II的核心要点是什么？
  answer: '中文名称: 婚姻调适量表第二版；评估内容: 满意度、沟通、性格相容等7维度；适用人群: 一般夫妻群体；信效度指标: α=0.85-0.92，良好重测信度；使用建议: 全面评估，临床研究首选；引用来源 (Citation):
    Spanier, G. B. (1976).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Assessment_Diagnosis.md
  section: 标准化评估工具详表
- type: concept
  question: Gottman比率编码的核心要点是什么？
  answer: '中文名称: 实时互动观察系统；评估内容: 积极/消极互动比率；适用人群: 夫妻互动观察；信效度指标: 预测离婚准确率87%；使用建议: 专业观察，金标准评估；引用来源 (Citation): Gottman, J. M.
    (1994).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Assessment_Diagnosis.md
  section: 标准化评估工具详表
- type: concept
  question: ECR-R的核心要点是什么？
  answer: '中文名称: 亲密关系经历量表修订版；评估内容: 成人依恋焦虑和回避维度；适用人群: 成人恋爱情侣；信效度指标: α=0.86-0.91，良好结构效度；使用建议: 快速筛查依恋风格；引用来源 (Citation): Fraley,
    R. C. et al. (2000).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Assessment_Diagnosis.md
  section: 标准化评估工具详表
- type: concept
  question: 情感连接的核心要点是什么？
  answer: '评分标准 (1-10分): 1=极度疏离 10=深度连接；今日得分: ___；昨日对比: ↑/↓/→；改善建议: ________________'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Assessment_Diagnosis.md
  section: 简易关系温度计 (Relationship Thermometer)
- type: concept
  question: 沟通质量的核心要点是什么？
  answer: '评分标准 (1-10分): 1=完全误解 10=完美理解；今日得分: ___；昨日对比: ↑/↓/→；改善建议: ________________'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Assessment_Diagnosis.md
  section: 简易关系温度计 (Relationship Thermometer)
- type: concept
  question: 批评的核心要点是什么？
  answer: '中文名称: 人格批评；英文术语: Criticism；定义: 对伴侣人格或品格的攻击，而非针对具体行为；行为表现: "你总是..."、"你从不..."、人身攻击；对关系的影响: 触发防御；累积怨恨；解毒剂: 温和开场(Soft
    Start-up)：使用"我"陈述；引用来源 (Citation): Gottman, J. M. (1994).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Communication.md
  section: Gottman四骑士详解表
- type: concept
  question: 防御的核心要点是什么？
  answer: '中文名称: 自我防卫；英文术语: Defensiveness；定义: 面对批评时为自己辩护，否认责任；行为表现: 否认、反击、扮演受害者、找借口；对关系的影响: 升级冲突；阻止修复；解毒剂: 承担部分责任；真诚道歉；引用来源
    (Citation): Gottman, J. M. (1994).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Communication.md
  section: Gottman四骑士详解表
- type: concept
  question: 蔑视的核心要点是什么？
  answer: '中文名称: 轻蔑/鄙视；英文术语: Contempt；定义: 从优越感出发的贬低、羞辱、嘲讽；行为表现: 翻白眼、讽刺、嘲笑、侮辱性称呼；对关系的影响: 最毒骑士；预测离婚最强；损害健康；解毒剂: 建立欣赏与尊重文化；引用来源
    (Citation): Gottman, J. M. (1994).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Communication.md
  section: Gottman四骑士详解表
- type: concept
  question: 温和开场的核心要点是什么？
  answer: '中文名称: 软化启动；英文术语: Soft Start-up；操作步骤: 1.描述情境 2.表达感受 3.表达需求(非指责)；适用场景: 提出问题/需求时；效果: 避免触发防御；保持对话开放；引用来源 (Citation):
    Gottman, J. M. (1999).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Communication.md
  section: 健康沟通技术表
- type: concept
  question: 我信息的核心要点是什么？
  answer: '中文名称: "我"陈述句；英文术语: I-Statement；操作步骤: "我感到...当...因为...我需要..."；适用场景: 表达情绪或需求时；效果: 减少指责感；促进倾听；引用来源 (Citation): Gordon,
    T. (1970).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Communication.md
  section: 健康沟通技术表
- type: concept
  question: 主动倾听的核心要点是什么？
  answer: '中文名称: 反映式倾听；英文术语: Active Listening；操作步骤: 1.全神贯注 2.反映内容 3.反映情感 4.不打断；适用场景: 伴侣表达时；效果: 感到被理解；减少误解；引用来源 (Citation):
    Rogers, C. R. (1951).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Communication.md
  section: 健康沟通技术表
- type: concept
  question: 可解决问题的核心要点是什么？
  answer: '中文名称: 解题型冲突；英文术语: Solvable Problems；特点: 具体情境性问题；有客观解决方案；解决可能性: 高；处理策略: 问题解决技术；妥协；协商；专业视角 (Professional Perspective):
    约30%婚姻冲突属此类。'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Communication.md
  section: 冲突类型与处理策略表
- type: concept
  question: 永久性问题的核心要点是什么？
  answer: '中文名称: 持续型冲突；英文术语: Perpetual Problems；特点: 源于性格/价值观差异；反复出现；解决可能性: 无法"解决"但可管理；处理策略: 接纳差异；对话理解；幽默共处；专业视角 (Professional
    Perspective): 约70%冲突是永久性的；接受是关键。'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Communication.md
  section: 冲突类型与处理策略表
- type: concept
  question: 杏仁核的核心要点是什么？
  answer: '英文术语 (English Term): Amygdala；神经结构/机制: 颞叶内侧的杏仁状结构，恐惧和威胁检测中枢；婚姻冲突中的角色: 在感知到伴侣的批评、蔑视或威胁时迅速激活，触发战斗/逃跑反应；临床意义: 杏仁核反应速度(12ms)远快于前额叶理性评估(数百ms)，解释了"冲动反应"；引用来源
    (Citation): LeDoux, J. E. (1996).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Conflict_Neuroscience.md
  section: 核心神经科学术语表
- type: concept
  question: 前额叶皮质的核心要点是什么？
  answer: '英文术语 (English Term): Prefrontal Cortex (PFC)；神经结构/机制: 额叶前部，负责执行功能、决策、情绪调节；婚姻冲突中的角色: 负责冲突中的理性思考、共情、冲动抑制；高度唤起时功能受损；临床意义:
    前额叶功能受损时，伴侣无法进行建设性沟通；引用来源 (Citation): Siegel, D. J. (2012).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Conflict_Neuroscience.md
  section: 核心神经科学术语表
- type: concept
  question: 默认模式网络的核心要点是什么？
  answer: '英文术语 (English Term): Default Mode Network (DMN)；神经结构/机制: 内侧前额叶-后扣带回-角回网络；婚姻冲突中的角色: 冲突后的反刍思维、负面想象、"脑内电影"的神经基础；临床意义:
    冥想训练可降低DMN过度活跃；引用来源 (Citation): Raichle, M. E. (2001).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Conflict_Neuroscience.md
  section: 核心神经科学术语表
- type: concept
  question: 什么是杏仁核劫持与情感淹没？
  answer: '**杏仁核劫持(Amygdala Hijack)** 是理解婚姻冲突的关键概念。这个由 Daniel Goleman 普及的术语，描述了一个神经学事实：**当大脑将伴侣的行为解读为威胁时，杏仁核会在前额叶皮质来得及做出理性评估之前就已经发出了警报。**'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Conflict_Neuroscience.md
  section: 杏仁核劫持与情感淹没
- type: concept
  question: 心率的核心要点是什么？
  answer: '基线状态: 60-80 BPM；中度唤起: 80-100 BPM；情感淹没阈值: >100 BPM；行为表现: 无法有效倾听、言语攻击或石墙；性别差异: 男性更快达到阈值，恢复更慢；引用来源 (Citation): Gottman,
    J. M. (1994).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Conflict_Neuroscience.md
  section: 情感淹没的神经生物学
- type: concept
  question: 皮质醇水平的核心要点是什么？
  answer: '基线状态: 基线水平；中度唤起: 轻度升高；情感淹没阈值: 显著升高(>2倍基线)；行为表现: 认知功能受损、记忆偏差、免疫抑制；性别差异: 女性皮质醇反应模式更复杂；引用来源 (Citation): Ditzen, B.
    et al. (2009).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Conflict_Neuroscience.md
  section: 情感淹没的神经生物学
- type: concept
  question: 皮肤电导的核心要点是什么？
  answer: '基线状态: 稳定低水平；中度唤起: 轻度波动；情感淹没阈值: 显著升高；行为表现: 汗腺活跃、手心出汗、焦虑感；性别差异: 男性皮肤电导反应更强；引用来源 (Citation): Levenson, R. W. & Gottman,
    J. M. (1983).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Conflict_Neuroscience.md
  section: 情感淹没的神经生物学
- type: concept
  question: 什么是多迷走神经理论与婚姻安全感？
  answer: Stephen Porges (2011) 的**多迷走神经理论(Polyvagal Theory)** 为理解婚姻互动中的安全感与威胁感提供了精细的自主神经框架。该理论提出，哺乳动物的自主神经系统有三个层级反应，按进化顺序从新到旧排列：
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Conflict_Neuroscience.md
  section: 多迷走神经理论与婚姻安全感
- type: concept
  question: 可解决冲突的核心要点是什么？
  answer: '核心特征: 具体行为或习惯差异；表现形式: 家务分工、金钱管理、育儿方式；根本原因: 价值观、偏好、生活方式差异；处理策略: 问题解决技巧，协商妥协；引用来源 (Citation): Gottman, J. M. (1999).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Conflict_Resolution.md
  section: 冲突类型识别与分类表
- type: concept
  question: 永久性差异的核心要点是什么？
  answer: '核心特征: 根本性格或价值观不同；表现形式: 完美主义vs随意性、内向vs外向；根本原因: 深层人格特质差异；处理策略: 接纳差异，发展互补策略；引用来源 (Citation): Johnson, S. M. (2004).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Conflict_Resolution.md
  section: 冲突类型识别与分类表
- type: concept
  question: 依恋相关冲突的核心要点是什么？
  answer: '核心特征: 情感安全感需求未满足；表现形式: 追逃模式、过度依赖、情感疏离；根本原因: 早期依恋创伤的重现；处理策略: 依恋修复，安全感重建；引用来源 (Citation): Mikulincer, M. & Shaver,
    P. (2007).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Conflict_Resolution.md
  section: 冲突类型识别与分类表
- type: concept
  question: 情绪基调的核心要点是什么？
  answer: '建设性冲突特征: 尊重、好奇、解决问题导向；破坏性冲突特征: 攻击、防御、赢输思维；转化关键点: 从评判转向理解；神经机制: 前额叶皮质激活vs杏仁核主导；引用来源 (Citation): Gottman, J. M. (1999).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Conflict_Resolution.md
  section: 建设性vs破坏性冲突模式对比表
- type: concept
  question: 沟通方式的核心要点是什么？
  answer: '建设性冲突特征: 我信息、具体描述、软化语调；破坏性冲突特征: 你信息、泛化批评、强硬语调；转化关键点: 学习表达技巧；神经机制: 镜像神经元促进共情；引用来源 (Citation): Markman, H. J. et
    al. (2010).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Conflict_Resolution.md
  section: 建设性vs破坏性冲突模式对比表
- type: concept
  question: 目标导向的核心要点是什么？
  answer: '建设性冲突特征: 寻求双赢解决方案；破坏性冲突特征: 证明自己正确或让对方屈服；转化关键点: 重新定义冲突目标；神经机制: 奖励系统激活；引用来源 (Citation): Deutsch, M. (1973).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Conflict_Resolution.md
  section: 建设性vs破坏性冲突模式对比表
- type: concept
  question: 批评(Criticism)的核心要点是什么？
  answer: '表现特征: 攻击对方人格而非具体行为；破坏机制: 破坏对方自我价值感，引发防御；建设性转化: 转化为具体抱怨和需求表达；应对技巧: 使用"我信息"，描述具体行为影响；引用来源 (Citation): Gottman, J.
    M. (1999).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Conflict_Resolution.md
  section: Gottman四骑士识别与应对表
- type: concept
  question: 蔑视(Contempt)的核心要点是什么？
  answer: '表现特征: 表现出优越感，嘲笑贬低对方；破坏机制: 最具破坏性，传达"你毫无价值"；建设性转化: 转化为尊重和欣赏；应对技巧: 停止蔑视行为，练习感恩表达；引用来源 (Citation): Gottman, J. M. (1999).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Conflict_Resolution.md
  section: Gottman四骑士识别与应对表
- type: concept
  question: 关系性质的核心要点是什么？
  answer: '中文名称: 亲密伴侣关系；英文术语: Intimate Partnership；核心内涵: 两个独立个体间深度情感、身体、精神连接的承诺关系；发展规律: 从激情驱动→伴侣驱动→成熟驱动；专业洞察: 现代婚姻从制度性向个人实现性演变；引用来源
    (Citation): Cherlin, A. J. (2004).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Couple_Relationship.md
  section: 夫妻关系本质特征表
- type: concept
  question: 发展阶段的核心要点是什么？
  answer: '中文名称: 关系演化阶段；英文术语: Relational Evolution；核心内涵: 经历浪漫期、现实期、稳定期、成熟期的螺旋上升过程；发展规律: U型曲线：初期高满意度→中年挑战→后期回升；专业洞察: 每个阶段都有其发展任务和成长机会；引用来源
    (Citation): Gottman, J. M. (1999).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Couple_Relationship.md
  section: 夫妻关系本质特征表
- type: concept
  question: 功能整合的核心要点是什么？
  answer: '中文名称: 多维度整合；英文术语: Multi-dimensional Integration；核心内涵: 情感支持、经济合作、性满足、社会认同、精神成长等功能融合；发展规律: 互补性整合优于完全重叠；专业洞察: 健康关系需要保留适度个体空间；引用来源
    (Citation): Karney, B. R. & Bradbury, T. N. (1995).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Couple_Relationship.md
  section: 夫妻关系本质特征表
- type: concept
  question: 情感表达的核心要点是什么？
  answer: '安全型表现: 自然表达需求和感受；焦虑型表现: 过度寻求确认和安慰；回避型表现: 压抑情感需求，表现独立；恐惧型表现: 情感混乱，既渴望又恐惧；治疗干预重点: 安全型：维持；其他类型：发展安全工作模型；引用来源 (Citation):
    Hazan, C. & Shaver, P. (1987).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Couple_Relationship.md
  section: 依恋理论在夫妻关系中的应用表
- type: concept
  question: 冲突处理的核心要点是什么？
  answer: '安全型表现: 建设性沟通，及时修复；焦虑型表现: 情绪激烈，担心被抛弃；回避型表现: 退缩回避，理性化处理；恐惧型表现: 矛盾反复，情绪不稳定；治疗干预重点: 焦虑型：发展自我安抚；回避型：学习情感表达；引用来源 (Citation):
    Mikulincer, M. & Shaver, P. (2007).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Couple_Relationship.md
  section: 依恋理论在夫妻关系中的应用表
- type: concept
  question: 亲密需求的核心要点是什么？
  answer: '安全型表现: 舒适的亲密和独立空间；焦虑型表现: 需要高度亲密和频繁确认；回避型表现: 偏好适度亲密和较多独立；恐惧型表现: 对亲密既渴望又抗拒；治疗干预重点: 恐惧型：处理创伤；建立渐进式亲密；引用来源 (Citation):
    Bartholomew, K. (1990).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Couple_Relationship.md
  section: 依恋理论在夫妻关系中的应用表
- type: concept
  question: 情感连接的核心要点是什么？
  answer: '关键指标: 情感亲密度、理解程度；健康标准: 每日情感在场，深度理解对方内在体验；预警信号: 情感疏离，感觉像室友而非伴侣；影响权重: 高(35%)；改善策略: 情感聚焦对话，每日情感检查；引用来源 (Citation):
    Gottman, J. M. (1999).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Couple_Relationship.md
  section: 夫妻关系满意度核心要素表
- type: concept
  question: 沟通质量的核心要点是什么？
  answer: '关键指标: 表达清晰度、倾听质量；健康标准: 开放、尊重、建设性的双向沟通；预警信号: 批评、防御、蔑视、石墙；影响权重: 极高(40%)；改善策略: Gottman沟通技巧，积极倾听训练；引用来源 (Citation):
    Markman, H. J. et al. (2010).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Couple_Relationship.md
  section: 夫妻关系满意度核心要素表
- type: concept
  question: 机会型外遇的核心要点是什么？
  answer: '中文名称: 情境性外遇；英文术语: Opportunistic Affair；特点: 偶然机会、酒精影响、一次性；关系意义: 边界问题而非关系深层问题；处理重点: 边界强化、责任承担；引用来源 (Citation): Glass,
    S. P. (2003).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Crisis_Intervention.md
  section: 外遇类型分类表
- type: concept
  question: 冲突回避型的核心要点是什么？
  answer: '中文名称: 逃避冲突型；英文术语: Conflict-Avoidant Affair；特点: 通过外遇逃避婚姻冲突；关系意义: 关系中有未解决冲突；处理重点: 处理婚姻冲突能力；引用来源 (Citation): Brown,
    E. M. (1999).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Crisis_Intervention.md
  section: 外遇类型分类表
- type: concept
  question: 亲密回避型的核心要点是什么？
  answer: '中文名称: 逃避亲密型；英文术语: Intimacy-Avoidant Affair；特点: 通过外遇保持情感距离；关系意义: 亲密恐惧、依恋回避；处理重点: 依恋工作、亲密能力；引用来源 (Citation): Brown,
    E. M. (1999).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Crisis_Intervention.md
  section: 外遇类型分类表
- type: concept
  question: 危机阶段的核心要点是什么？
  answer: '中文名称: 急性创伤期；主要任务: 稳定化、安全、决定是否继续；治疗焦点: 情绪containment、实际安排、短期承诺；时间框架: 1-4周；注意事项: 不要求宽恕；允许愤怒和悲伤'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Crisis_Intervention.md
  section: 外遇危机处理阶段表
- type: concept
  question: 理解阶段的核心要点是什么？
  answer: '中文名称: 意义建构期；主要任务: 理解外遇的意义与背景；治疗焦点: 探索双方视角、关系历史、个人因素；时间框架: 2-6个月；注意事项: 避免责怪；理解≠原谅'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Crisis_Intervention.md
  section: 外遇危机处理阶段表
- type: concept
  question: 重建阶段的核心要点是什么？
  answer: '中文名称: 信任重建期；主要任务: 重建信任与关系；治疗焦点: 行为改变、情感重连、预防复发；时间框架: 6个月-2年；注意事项: 信任重建需要时间和一致行为'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Crisis_Intervention.md
  section: 外遇危机处理阶段表
- type: concept
  question: 侵入症状的核心要点是什么？
  answer: '中文名称: 闯入性思维；表现: 反复想象外遇场景、强迫性检查；正常/病理边界: 初期正常；6个月后持续需关注；支持策略: 正常化；必要时EMDR'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Crisis_Intervention.md
  section: 外遇后创伤反应表
- type: concept
  question: 过度警觉的核心要点是什么？
  answer: '中文名称: 高度警戒；表现: 监视行为、猜疑、无法放松；正常/病理边界: 初期适应性；持续过度则病理；支持策略: 透明度协议、渐进信任'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Crisis_Intervention.md
  section: 外遇后创伤反应表
- type: concept
  question: 婚姻目的的核心要点是什么？
  answer: '西方现代婚姻观: 个人幸福、爱情实现；东亚传统婚姻观: 家族延续、社会稳定；南亚传统婚姻观: 社会-宗教义务(Dharma)；当代融合趋势: 爱情与家庭责任平衡'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Cultural_Perspectives.md
  section: 东西方婚姻观比较表
- type: concept
  question: 伴侣选择的核心要点是什么？
  answer: '西方现代婚姻观: 个人自由选择；东亚传统婚姻观: 家庭介入+个人意愿；南亚传统婚姻观: 家族安排为主；当代融合趋势: 自主选择+家庭认可'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Cultural_Perspectives.md
  section: 东西方婚姻观比较表
- type: concept
  question: 爱与婚姻的核心要点是什么？
  answer: '西方现代婚姻观: 先爱后婚；东亚传统婚姻观: 先婚后爱(培养)；南亚传统婚姻观: 爱在婚姻中发展；当代融合趋势: 两种路径均被接受'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Cultural_Perspectives.md
  section: 东西方婚姻观比较表
- type: concept
  question: 基督教的核心要点是什么？
  answer: '婚姻定义: 神圣盟约(Covenant)；核心价值: 爱、忠诚、牺牲、服务；对离婚态度: 传统反对；现代教派有差异；性的地位: 婚内性是神圣的；疗愈资源: 祷告、牧师辅导、教会支持；引用来源 (Citation): Ephesians
    5:21-33.'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Cultural_Perspectives.md
  section: 主要宗教婚姻观表
- type: concept
  question: 天主教的核心要点是什么？
  answer: '婚姻定义: 圣礼(Sacrament)；核心价值: 不可解除、一夫一妻；对离婚态度: 原则上不离婚；可废婚；性的地位: 开放生育的性；疗愈资源: 婚前准备、修和圣事；引用来源 (Citation): Catechism of
    Catholic Church.'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Cultural_Perspectives.md
  section: 主要宗教婚姻观表
- type: concept
  question: 犹太教的核心要点是什么？
  answer: '婚姻定义: 契约(Brit/Kiddushin)；核心价值: 圣洁、家庭、传承；对离婚态度: 允许(Get)但不鼓励；性的地位: 性是诫命(Onah)；疗愈资源: 拉比辅导、Mikvah仪式；引用来源 (Citation):
    Lamm, M. (1980).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Cultural_Perspectives.md
  section: 主要宗教婚姻观表
- type: concept
  question: 夫妇之伦的核心要点是什么？
  answer: '中文术语: 五伦之一；英文对应: Husband-Wife Relation；内涵: 婚姻是基本人伦关系；当代应用: 重视婚姻的社会意义；经典来源: 《孟子》'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Cultural_Perspectives.md
  section: 儒家婚姻伦理详解表
- type: concept
  question: 相敬如宾的核心要点是什么？
  answer: '中文术语: 夫妻相敬；英文对应: Mutual Respect；内涵: 以礼相待、保持尊重；当代应用: 日常礼貌与尊重；经典来源: 《左传》'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Cultural_Perspectives.md
  section: 儒家婚姻伦理详解表
- type: concept
  question: 积极启动的核心要点是什么？
  answer: '具体实践: 以赞美或感谢开始对话；避免行为: 批评式开场、抱怨开头；神经科学机制: 激活奖励系统，降低防御；效果验证: 提高对话成功率86%；引用来源 (Citation): Gottman, J. M. (1999).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Daily_Practices.md
  section: 日常沟通黄金法则表
- type: concept
  question: 我信息表达的核心要点是什么？
  answer: '具体实践: "我觉得..."而非"你总是..."；避免行为: 你信息指责、标签化；神经科学机制: 减少对方防御反应；效果验证: 降低冲突升级风险；引用来源 (Citation): Gordon, T. (1970).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Daily_Practices.md
  section: 日常沟通黄金法则表
- type: concept
  question: 软化语调的核心要点是什么？
  answer: '具体实践: 温和语气，避免尖锐音调；避免行为: 提高音量、讽刺语调；神经科学机制: 激活副交感神经系统；效果验证: 促进理解和接纳；引用来源 (Citation): Siegel, D. J. (2012).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Daily_Practices.md
  section: 日常沟通黄金法则表
- type: concept
  question: 每日情感检查的核心要点是什么？
  answer: '实施频率: 每晚睡前5分钟；具体做法: 分享当日最高光和最低谷时刻；关键要素: 真诚、无评判、全神贯注；神经生物学效应: 催产素释放，增强安全感；引用来源 (Citation): Johnson, S. M. (2004).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Daily_Practices.md
  section: 情感连接日常习惯表
- type: concept
  question: 早晨连接仪式的核心要点是什么？
  answer: '实施频率: 每天起床后；具体做法: 眼神接触+拥抱+一句关爱话语；关键要素: 身体接触、温暖语调；神经生物学效应: 启动一天的积极情绪；引用来源 (Citation): Fredrickson, B. L. (2001).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Daily_Practices.md
  section: 情感连接日常习惯表
- type: concept
  question: 专注倾听时光的核心要点是什么？
  answer: '实施频率: 每日至少15分钟；具体做法: 放下设备，全神贯注倾听对方分享；关键要素: 无干扰、眼神接触、点头回应；神经生物学效应: 激活腹侧迷走神经，促进放松；引用来源 (Citation): Porges, S. W.
    (2007).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Daily_Practices.md
  section: 情感连接日常习惯表
- type: concept
  question: 浪漫约会夜的核心要点是什么？
  answer: '营造方法: 每周固定一次专属二人时光；实施建议: 提前计划，精心准备，专注彼此；注意事项: 避免谈论工作或孩子；心理机制: 重新激活浪漫神经回路；引用来源 (Citation): Aron, A. et al. (2000).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Daily_Practices.md
  section: 亲密时光营造策略表
- type: concept
  question: 深度对话时间的核心要点是什么？
  answer: '营造方法: 每周安排90分钟深度交流；实施建议: 使用开放式问题，探索内心世界；注意事项: 选择安静私密环境；心理机制: 促进心理亲密和理解；引用来源 (Citation): Reis, H. T. & Shaver, P.
    (1988).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Daily_Practices.md
  section: 亲密时光营造策略表
- type: concept
  question: 什么是核心术语表？
  answer: 以下术语表涵盖了婚姻财务冲突领域中最核心的六个概念。这些术语贯穿本文档的各个章节，建议在深入阅读之前先熟悉这些定义和它们在婚姻关系中的临床含义。
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Financial_Conflict.md
  section: 核心术语表
- type: concept
  question: 财务亲密的核心要点是什么？
  answer: '英文术语: Financial Intimacy；定义: 伴侣之间关于金钱话题的开放、诚实、无防御性沟通状态；婚姻中的表现: 能自在讨论收入、债务、恐惧和梦想；共同制定财务计划；临床意义: 财务亲密是关系满意度的重要保护因素，缺失时预示冲突升级；引用来源
    (Citation): Archuleta, K. L. et al. (2011).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Financial_Conflict.md
  section: 核心术语表
- type: concept
  question: 财务不忠的核心要点是什么？
  answer: '英文术语: Financial Infidelity；定义: 对伴侣隐瞒或歪曲重要财务信息的行为；婚姻中的表现: 秘密账户、隐瞒债务、私藏收入、暗中大额消费；临床意义: 与情感背叛具有同等的信任破坏力；发现后引发类似PTSD的应激反应；引用来源
    (Citation): NEFE (2018); Garbinsky et al. (2020).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Financial_Conflict.md
  section: 核心术语表
- type: concept
  question: 金钱脚本的核心要点是什么？
  answer: '英文术语: Money Scripts；定义: 童年期形成的关于金钱的无意识信念系统；婚姻中的表现: 伴侣双方携带不同的金钱脚本进入婚姻，产生价值观碰撞；临床意义: 识别金钱脚本是财务治疗(Financial Therapy)的核心第一步；引用来源
    (Citation): Klontz, B. et al. (2011).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Financial_Conflict.md
  section: 核心术语表
- type: concept
  question: 什么是财务冲突为何是离婚首要预测因子？
  answer: Dew (2011) 在对美国4500对夫妻进行长达数年的追踪研究中发现，财务分歧的频率和强度对离婚的预测力显著高于其他所有冲突领域。具体而言，报告"经常因金钱争吵"的夫妻，其离婚概率是"很少因金钱争吵"的夫妻的约30倍。这一发现在控制了收入水平(Income
    Level)、教育程度(Education Level)、婚龄(Marriage Duration)等混杂变量之后依然稳健。
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Financial_Conflict.md
  section: 财务冲突为何是离婚首要预测因子
- type: concept
  question: 什么是金钱心理学：Klontz 四种金钱脚本？
  answer: '**关键概念提示：** 金钱脚本(Money Scripts)是理解婚姻财务冲突的最重要理论工具之一。如果夫妻只能做一件事来改善财务关系，那就是各自识别并向对方分享自己的金钱脚本。'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Financial_Conflict.md
  section: 金钱心理学：Klontz 四种金钱脚本
- type: concept
  question: 金钱回避的核心要点是什么？
  answer: '英文名称: Money Avoidance；核心信念: 金钱是肮脏的、邪恶的；有钱人不道德；我不配拥有金钱；婚姻中的表现: 逃避理财、不关注账户余额、拖延缴费、无意识地破坏财务稳定；与伴侣冲突模式: 与金钱崇拜型伴侣冲突最剧烈；被批评为"不负责任"；改变方向:
    认识到金钱是中性工具；建立积极的财务自我效能感；引用来源 (Citation): Klontz, B. et al. (2011).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Financial_Conflict.md
  section: 金钱心理学：Klontz 四种金钱脚本
- type: concept
  question: 金钱崇拜的核心要点是什么？
  answer: '英文名称: Money Worship；核心信念: 更多的钱能解决一切问题；金钱能带来幸福和安全；婚姻中的表现: 过度工作(Workaholism)、冲动消费、永远觉得不够；与伴侣冲突模式: 因过度工作忽略关系；消费冲动导致债务累积；配偶感到被忽视；改变方向:
    区分"足够"与"更多"；发展非物质的安全感来源；引用来源 (Citation): Klontz, B. et al. (2011).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Financial_Conflict.md
  section: 金钱心理学：Klontz 四种金钱脚本
- type: concept
  question: 宽恕的核心要点是什么？
  answer: '中文名称: 宽恕/饶恕；英文术语: Forgiveness；精确定义: 受伤者主动放下对施害者的报复和怨恨欲望，尽管有权保持这些情绪；与宽恕的区别: —；临床要点: 宽恕是过程不是事件；可能需要数月至数年；引用来源 (Citation):
    Enright, R. D. (2001).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Forgiveness_Repair.md
  section: 宽恕核心概念辨析表
- type: concept
  question: 和解的核心要点是什么？
  answer: '中文名称: 关系修复；英文术语: Reconciliation；精确定义: 双方重新建立信任和互动关系；与宽恕的区别: 宽恕可以单方面完成；和解需要双方参与；临床要点: 宽恕是和解的必要非充分条件；引用来源 (Citation):
    Worthington, E. L. (2006).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Forgiveness_Repair.md
  section: 宽恕核心概念辨析表
- type: concept
  question: 遗忘的核心要点是什么？
  answer: '中文名称: 遗忘/忘记；英文术语: Forgetting；精确定义: 伤害记忆从意识中消失；与宽恕的区别: 宽恕不要求忘记；记住是保护自己的合理需要；临床要点: "我可以不再被这件事折磨，但我不需要假装它没发生过"；引用来源
    (Citation): Enright, R. D. (2001).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Forgiveness_Repair.md
  section: 宽恕核心概念辨析表
- type: concept
  question: 什么是Enright 宽恕过程模型？
  answer: Robert Enright (2001) 提出了心理学领域最系统的宽恕模型——**四阶段20单元过程模型(Process Model of Forgiveness)**。这不是一个线性流程，而是一个可能反复迭代的深度心理过程。
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Forgiveness_Repair.md
  section: Enright 宽恕过程模型
- type: concept
  question: 第一阶段的核心要点是什么？
  answer: '中文名称: 揭露阶段；英文术语: Uncovering Phase；核心心理任务: 充分面对伤害的现实及其全部影响；婚姻伤害中的应用: 承认"是的，这件事真的发生了，它真的很伤人"；治疗师角色: 安全的陪伴者、情绪的验证者；预期时间:
    数周至数月；引用来源 (Citation): Enright, R. D. (2001).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Forgiveness_Repair.md
  section: 四阶段总览
- type: concept
  question: 第二阶段的核心要点是什么？
  answer: '中文名称: 决定阶段；英文术语: Decision Phase；核心心理任务: 从认知上理解宽恕并做出宽恕的初步决定；婚姻伤害中的应用: "我选择尝试走宽恕的道路，不是因为他值得，而是因为我不想继续被怨恨囚禁"；治疗师角色:
    教育者、选择的见证者；预期时间: 数周；引用来源 (Citation): Enright, R. D. (2001).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Forgiveness_Repair.md
  section: 四阶段总览
- type: concept
  question: 第三阶段的核心要点是什么？
  answer: '中文名称: 工作阶段；英文术语: Work Phase；核心心理任务: 通过认知重评和共情发展对施害者的新理解；婚姻伤害中的应用: 开始看到伴侣行为背后的脆弱和痛苦(不是为其开脱)；治疗师角色: 共情促进者、认知重构引导者；预期时间:
    数月；引用来源 (Citation): Enright, R. D. (2001).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Forgiveness_Repair.md
  section: 四阶段总览
- type: concept
  question: 什么是Worthington REACH 宽恕模型？
  answer: Everett Worthington (2003, 2006) 提出了另一个被广泛使用的宽恕干预模型——**REACH 模型**。这个模型更侧重于将宽恕作为一种情绪转化过程，而非纯粹的认知决定。
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Forgiveness_Repair.md
  section: Worthington REACH 宽恕模型
- type: concept
  question: 三角化的核心要点是什么？
  answer: '中文名称: 三角关系化；英文术语: Triangulation；定义: 当两人关系出现张力时，第三方被卷入以缓解焦虑或转移冲突；婚姻中的表现: 丈夫在妻子与母亲之间被拉扯，或婆婆通过孙辈介入夫妻关系；引用来源 (Citation):
    Bowen, M. (1978). *Family Therapy in Clinical Practice*.'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_InLaw_Family_Conflict.md
  section: 核心概念表
- type: concept
  question: 纠缠的核心要点是什么？
  answer: '中文名称: 情感纠缠/过度融合；英文术语: Enmeshment；定义: 家庭成员之间边界模糊，个体自主性被集体意志吞没；婚姻中的表现: 原生家庭过度介入夫妻决策，配偶感到"嫁给了一整个家庭"；引用来源 (Citation):
    Minuchin, S. (1974). *Families and Family Therapy*.'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_InLaw_Family_Conflict.md
  section: 核心概念表
- type: concept
  question: 分化的核心要点是什么？
  answer: '中文名称: 自我分化；英文术语: Differentiation of Self；定义: 个体在保持情感连接的同时维持独立自我的能力；婚姻中的表现: 低分化者在姻亲压力下无法坚持立场，或以情绪切割方式应对；引用来源 (Citation):
    Bowen, M. (1978). *Family Therapy in Clinical Practice*.'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_InLaw_Family_Conflict.md
  section: 核心概念表
- type: concept
  question: 什么是Bowen 理论中的姻亲关系动态？
  answer: Murray Bowen 的家庭系统理论（Family Systems Theory）为理解姻亲冲突提供了最为系统的理论框架。Bowen（1978）认为，家庭是一个情绪系统（emotional system），其中每个成员的功能状态都与整体系统的焦虑水平（anxiety
    level）密切相关。当婚姻形成时，两个原生家庭的情绪系统发生碰撞，姻亲冲突实质上是两个系统争夺情绪平衡的过程。
  source: 02-Mind-Psychology/relationships/marriage/Marriage_InLaw_Family_Conflict.md
  section: Bowen 理论中的姻亲关系动态
- type: concept
  question: 婆-子-媳三角的核心要点是什么？
  answer: '参与者: 婆婆、儿子、儿媳；动态描述: 婆婆与儿媳竞争儿子的情感忠诚，儿子在中间摇摆；功能: 稳定母子依附关系，抵抗权力转移；去三角化策略: 儿子明确与妻子的联盟立场，同时维护与母亲的温暖关系；引用来源 (Citation):
    Bowen, M. (1978).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_InLaw_Family_Conflict.md
  section: Bowen 理论姻亲三角化模式表
- type: concept
  question: 翁-女-婿三角的核心要点是什么？
  answer: '参与者: 岳父、女儿、女婿；动态描述: 岳父对女婿的能力/地位评判，女儿在父亲认可与丈夫自尊之间周旋；功能: 维护父亲的保护者角色和家庭权威；去三角化策略: 女儿帮助父亲和丈夫建立直接关系，而非充当中间人；引用来源 (Citation):
    Fingerman, K. L. (2001).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_InLaw_Family_Conflict.md
  section: Bowen 理论姻亲三角化模式表
- type: concept
  question: 祖-亲-孙三角的核心要点是什么？
  answer: '参与者: 祖父母、父母、孙辈；动态描述: 祖辈通过溺爱孙辈削弱父母权威，孩子学会"绕过父母找爷奶"；功能: 祖辈维持家庭影响力，弥补退休后的价值空缺；去三角化策略: 建立明确的育儿决策层级，祖辈的给予需经父母认可；引用来源
    (Citation): McGoldrick, M. et al. (2005).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_InLaw_Family_Conflict.md
  section: Bowen 理论姻亲三角化模式表
- type: concept
  question: 边界侵入型** (Boundary Invasion)的核心要点是什么？
  answer: '核心张力: 原生家庭过度干预核心家庭事务；典型场景: 公婆不经邀请频繁到访、擅自进入夫妻卧室、翻看私人物品、监控行踪；文化加重因素: 中国文化中"一家人不说两家话"的观念模糊了代际边界；处理策略: 夫妻统一立场，以尊重的方式明确物理和心理边界；使用"我们"语言；引用来源
    (Citation): Minuchin, S. (1974). *Families and Family Therapy*.'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_InLaw_Family_Conflict.md
  section: 姻亲冲突类型分类表
- type: concept
  question: 婚姻出轨/外遇的核心要点是什么？
  answer: '英文名 (English Term): Marital Infidelity / Affair；原始语言/术语 (Original Language): 拉: *Infidelitas* (不忠), *Affaire* (事件)；精确定义:
    在婚姻或承诺关系持续期间,一方与第三者建立秘密或违反约定的亲密/性关系；区分与备注: 可同时包括性出轨与情感出轨;关键在于违背双方约定的排他性/透明度；专业视角 (Professional Perspective): 临床上更关注"违反共同约定"而非单一行为,不同夫妇的界线可能不同'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Infidelity_Betrayal.md
  section: 核心术语与分类表 (Core Terminology & Typology)
- type: concept
  question: 情感出轨的核心要点是什么？
  answer: '英文名 (English Term): Emotional Affair；原始语言/术语 (Original Language): -；精确定义: 与第三者发展出高度情感亲密、分享本应只在伴侣关系中分享的心理空间；区分与备注:
    即使未发生性行为,也可能对原伴侣造成严重背叛感；专业视角 (Professional Perspective): 常被出轨方轻描淡写为"只是聊聊",但对被背叛方伤害不逊于性出轨'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Infidelity_Betrayal.md
  section: 核心术语与分类表 (Core Terminology & Typology)
- type: concept
  question: 性出轨的核心要点是什么？
  answer: '英文名 (English Term): Sexual Infidelity；原始语言/术语 (Original Language): -；精确定义: 在婚姻/承诺关系外发生性行为(线下或线上,包括付费性服务)；区分与备注:
    与情感出轨可重叠或分离；专业视角 (Professional Perspective): 需评估其模式是一次性冲动、长期双重生活,还是与性成瘾/色情依赖相关'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Infidelity_Betrayal.md
  section: 核心术语与分类表 (Core Terminology & Typology)
- type: concept
  question: 认知层面的核心要点是什么？
  answer: '典型表现: 反复想象出轨细节、无法停止"脑内电影"；可能被误解为: 强迫症/自虐倾向；评估与区分要点: 区分: 是否与实际事件直接相关,是否有侵入性影像与强烈痛苦；临床建议: 承认这是创伤性重演而非"自找虐",可用创伤稳定技术与暴露-加工而非简单禁止思考'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Infidelity_Betrayal.md
  section: 被背叛一方的创伤反应表 (Trauma Responses of the Betrayed Partner)
- type: concept
  question: 情绪层面的核心要点是什么？
  answer: '典型表现: 愤怒、屈辱、羞耻、恶心、嫉妒、麻木交替出现；可能被误解为: 情绪不稳定/人格问题；评估与区分要点: 反应强度往往与关系重要性成正比,不是"矫情"；临床建议: 允许多种情绪共存,帮助命名与区分(愤怒之下的哀伤、羞耻中的被背叛感)'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Infidelity_Betrayal.md
  section: 被背叛一方的创伤反应表 (Trauma Responses of the Betrayed Partner)
- type: concept
  question: 生理层面的核心要点是什么？
  answer: '典型表现: 失眠、心悸、惊恐样发作、胃肠不适；可能被误解为: 原发焦虑障碍；评估与区分要点: 若症状在发现出轨后急剧出现,需考虑"情境性PTSD"；临床建议: 使用躯体稳定化、呼吸调节与睡眠卫生,必要时短期药物辅助'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Infidelity_Betrayal.md
  section: 被背叛一方的创伤反应表 (Trauma Responses of the Betrayed Partner)
- type: concept
  question: 个体因素的核心要点是什么？
  answer: '关键因素: 人格特质、依恋风格、自我调节能力；示例: 冲动控制差、自恋特质高、依恋回避、自我价值脆弱；误区: 单纯以"天生花心"解释,忽略成长史与创伤；专业视角: 不是为出轨开脱,而是为了找到可介入的内在模式(如羞耻规避、情感麻木)'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Infidelity_Betrayal.md
  section: 出轨成因多维模型表 (Multi-Dimensional Models of Infidelity)
- type: concept
  question: 关系因素的核心要点是什么？
  answer: '关键因素: 情感疏离、长期冲突、性满意度低；示例: 长期冷战、性沟通缺乏、角色僵化；误区: 误用为"受害者有责任",把出轨合理化；专业视角: 需要区分"关系中有问题"与"选择出轨"两层责任,强调出轨永远是可选项而非必然'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Infidelity_Betrayal.md
  section: 出轨成因多维模型表 (Multi-Dimensional Models of Infidelity)
- type: concept
  question: 情感亲密的核心要点是什么？
  answer: '中文名称: 情感连接；英文术语: Emotional Intimacy；定义: 分享感受、脆弱、被理解；表现形式: 深度对话、情感支持、共情；重要性: 关系满意度核心；引用来源 (Citation): Schaefer,
    M. T. & Olson, D. H. (1981).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Intimacy_Sexuality.md
  section: 亲密类型与维度表
- type: concept
  question: 智性亲密的核心要点是什么？
  answer: '中文名称: 思想交流；英文术语: Intellectual Intimacy；定义: 分享想法、观点、讨论；表现形式: 深度讨论、辩论、学习分享；重要性: 尊重与相互刺激；引用来源 (Citation): Schaefer,
    M. T. & Olson, D. H. (1981).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Intimacy_Sexuality.md
  section: 亲密类型与维度表
- type: concept
  question: 性亲密的核心要点是什么？
  answer: '中文名称: 身体亲密；英文术语: Sexual/Physical Intimacy；定义: 性接触、身体亲近；表现形式: 性生活、触碰、拥抱、亲吻；重要性: 独特的伴侣联结；引用来源 (Citation): Schaefer,
    M. T. & Olson, D. H. (1981).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Intimacy_Sexuality.md
  section: 亲密类型与维度表
- type: concept
  question: 欲望的核心要点是什么？
  answer: '中文名称: 性欲望期；英文术语: Desire Phase；生理表现(男): 性幻想、渴望性活动；生理表现(女): 性幻想、对性接触开放；心理体验: 想要、被吸引；引用来源 (Citation): Kaplan, H. S.
    (1979).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Intimacy_Sexuality.md
  section: 性反应周期表
- type: concept
  question: 唤起的核心要点是什么？
  answer: '中文名称: 性唤起期；英文术语: Arousal/Excitement；生理表现(男): 勃起、睾丸上升、心率加快；生理表现(女): 阴道润滑、阴蒂勃起、充血；心理体验: 兴奋、专注；引用来源 (Citation): Masters,
    W. H. & Johnson, V. E. (1966).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Intimacy_Sexuality.md
  section: 性反应周期表
- type: concept
  question: 平台的核心要点是什么？
  answer: '中文名称: 平台期；英文术语: Plateau Phase；生理表现(男): 勃起稳定、尿道球腺分泌；生理表现(女): 阴道扩张、充血增加；心理体验: 强烈快感积累；引用来源 (Citation): Masters, W.
    H. & Johnson, V. E. (1966).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Intimacy_Sexuality.md
  section: 性反应周期表
- type: concept
  question: 勃起障碍的核心要点是什么？
  answer: '中文名称: 勃起功能障碍；英文术语: Erectile Disorder；DSM-5诊断标准: 持续或反复获得/维持勃起困难；可能原因: 血管、神经、心理、药物；治疗方向: 医学评估+心理治疗+药物；引用来源 (Citation):
    APA DSM-5 (2013).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Intimacy_Sexuality.md
  section: 男性性功能障碍表
- type: concept
  question: 早泄的核心要点是什么？
  answer: '中文名称: 早发性射精；英文术语: Premature Ejaculation；DSM-5诊断标准: 插入后1分钟内射精；可能原因: 焦虑、敏感度、习得；治疗方向: 行为技术+药物；引用来源 (Citation): APA
    DSM-5 (2013).'
  source: 02-Mind-Psychology/relationships/marriage/Marriage_Intimacy_Sexuality.md
  section: 男性性功能障碍表
- type: concept
