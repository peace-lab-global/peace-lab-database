- type: concept
  question: 用户增长的核心要点是什么？
  answer: 'PM 分析: 全球累计下载150M+，2M+条5星评价。增长引擎：名人效应（Harry Styles、Matthew McConaughey配音）+ App Store精选推荐 + B端渠道。；评分: 9'
  source: 02-Mind-Psychology/meditation/professional-handbook/Meditation_Apps_Professional_Analysis.md
  section: 1.1 Calm
- type: concept
  question: 冥想专业性的核心要点是什么？
  answer: 'ME 分析: 内容覆盖面广但深度有限。基础课程（7/21天）是合格的入门引导。师资包括Tamara Levitt、Jay Shetty等，但整体偏"大众健康"而非"冥想传承"。；评分: 6'
  source: 02-Mind-Psychology/meditation/professional-handbook/Meditation_Apps_Professional_Analysis.md
  section: 1.1 Calm
- type: concept
  question: 教学设计的核心要点是什么？
  answer: 'ME 分析: 入门路径清晰（7天→21天→主题课程），但进阶路径模糊。缺少从初学到资深冥想者的系统成长设计。更像"冥想内容超市"而非"冥想学校"。；评分: 5'
  source: 02-Mind-Psychology/meditation/professional-handbook/Meditation_Apps_Professional_Analysis.md
  section: 1.1 Calm
- type: concept
  question: 8-10的核心要点是什么？
  answer: '名称: 欲解脱→审察→行舍；体证特征: 心趋向解脱、平衡、宁静；教学要点: 减少引导，让学员自己探索；注意事项: 保护学员的隐私空间'
  source: 02-Mind-Psychology/meditation/professional-handbook/Professional_Advanced_Techniques.md
  section: 2.1 内观深度阶段
- type: concept
  question: 11的核心要点是什么？
  answer: '名称: 顺道观智；体证特征: 深刻体证无常、苦、无我；教学要点: 不急于确认"悟境"；注意事项: 避免灵性自恋'
  source: 02-Mind-Psychology/meditation/professional-handbook/Professional_Advanced_Techniques.md
  section: 2.1 内观深度阶段
- type: concept
  question: 慈（Metta）的核心要点是什么？
  answer: '对象: 自身→挚爱→中性→困难→一切；核心短语: "愿你平安、快乐、健康、自在"；进阶变体: 从具象到抽象、从个人到众生；主要功效: 减少敌意、增加连接感'
  source: 02-Mind-Psychology/meditation/professional-handbook/Professional_Advanced_Techniques.md
  section: 3.1 四无量心技术矩阵
- type: concept
  question: 悲（Karuna）的核心要点是什么？
