  section: 放松技术分类概览
- type: concept
  question: 什么是决策树：选择合适技术？
  answer: "STEP 1: 你有多少时间？\n│\n├─ < 5分钟（即时缓解）\n│   └─ 【呼吸技术】\n│       ├─ 急性焦虑/惊恐 → 4-7-8呼吸\n│       ├─ 需要镇静 → 慢速深呼吸\n│   \
    \    └─ 快速平复 → 箱式呼吸\n│\n├─ 5-15分钟\n│   └─ 【短时放松】\n│       ├─ 身体紧张 → 快速PMR或身体扫描\n│       ├─ 情绪波动 → 正念呼吸\n│       └─ 准备入睡\
    \ → 引导意象\n│\n├─ 15-30分钟\n│   └─ 【完整放松】\n│       ├─ 慢性压力 → 正念冥想\n│       ├─ 身体疼痛 → 完整PMR\n│       └─ 深度放松 → 瑜伽休息术\n│\n\
    └─ > 30分钟\n    └─ 【综合实践】\n        ├─ 日常维护 → 晨间仪式\n        ├─ 周末深入 → 瑜伽/太极课程\n        └─ 系统训练 → MBSR入门\n```"
  source: 02-Mind-Psychology/psychology/stress-hpa/skills/Relaxation_Techniques_Guide_Skill.md
