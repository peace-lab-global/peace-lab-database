  section: 十个Sefirah详解
- type: concept
  question: 第1日的核心要点是什么？
  answer: '星期: 周日；Sefirah: Keter；主题: 新开始的纯粹意愿；观想操作: 观想头顶上方白色光芒，超越任何形状；对应Affirmation: "愿我的意志与神圣意志合一"'
