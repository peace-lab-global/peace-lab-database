- type: concept
  question: 心理防御机制的核心要点是什么？
  answer: '英文术语: Defense Mechanism；源头语言: 德语 (Abwehrmechanismus)；定义: 无意识或半意识的心理策略,用于应对焦虑、威胁和心理冲突；临床意义: 精神分析核心概念,理解人格功能'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychological_Defense_Mechanisms.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 精神胜利法的核心要点是什么？
  answer: '英文术语: Spiritual Victory Method；源头语言: 中文原创 (鲁迅)；定义: 通过心理上的自我安慰和认知重构,将失败转化为主观胜利感；临床意义: 文学隐喻,映射适应性和病理性防御'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychological_Defense_Mechanisms.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 阿Q精神的核心要点是什么？
  answer: '英文术语: Ah Q Spirit；源头语言: 中文原创 (鲁迅)；定义: 极端的精神胜利法,自欺欺人以逃避现实；临床意义: 病理性防御的文化隐喻'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychological_Defense_Mechanisms.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 1894的核心要点是什么？
  answer: '里程碑事件: 首次描述"防御"概念；关键人物: Sigmund Freud；理论贡献: 防御作为自我保护机制；影响: 精神分析基础'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychological_Defense_Mechanisms.md
  section: 历史发展表 (Historical Development)
- type: concept
  question: 1896的核心要点是什么？
  answer: '里程碑事件: 压抑概念系统化；关键人物: Sigmund Freud；理论贡献: 压抑作为基本防御；影响: 神经症理论'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychological_Defense_Mechanisms.md
  section: 历史发展表 (Historical Development)
- type: concept
  question: 1921的核心要点是什么？
  answer: '里程碑事件: 鲁迅《阿Q正传》发表；关键人物: 鲁迅；理论贡献: "精神胜利法"文学概念；影响: 中国文化对防御的独特描绘'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychological_Defense_Mechanisms.md
  section: 历史发展表 (Historical Development)
- type: concept
  question: 本我 (Id)的核心要点是什么？
  answer: '德文术语: Es；功能: 原始冲动、本能欲望；与防御的关系: 防御保护自我免受本我冲动；临床表现: 冲动行为、原始焦虑'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychological_Defense_Mechanisms.md
  section: 弗洛伊德结构模型与防御
- type: concept
  question: 自我 (Ego)的核心要点是什么？
  answer: '德文术语: Ich；功能: 现实检验、调节功能；与防御的关系: 防御机制的执行者；临床表现: 防御的灵活性决定适应'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychological_Defense_Mechanisms.md
  section: 弗洛伊德结构模型与防御
- type: concept
  question: 安全感的核心要点是什么？
  answer: '英文名 (English Term): Sense of Security；原始语言/词源 (Original Language): 拉丁语: *Securus* (无忧虑的) < *Se-* (没有) + *Cura*
    (忧虑)；词源含义: "没有忧虑的状态"；精确定义: 个体对自身和环境安全性的主观感知与信念；相关概念: 安全≠安全感；客观安全≠主观感知；专业视角 (Professional Perspective): 安全感是主观建构，而非客观状态的简单反映'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychological_Security.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 心理安全的核心要点是什么？
  answer: '英文名 (English Term): Psychological Safety；原始语言/词源 (Original Language): -；词源含义: 心理层面的安全状态；精确定义: 能够展示真实自我而不担心负面后果的信念；相关概念:
    组织心理学中的团队心理安全；专业视角 (Professional Perspective): Edmondson提出的组织概念；个体心理学中指内在安全'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychological_Security.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 依恋安全的核心要点是什么？
  answer: '英文名 (English Term): Attachment Security；原始语言/词源 (Original Language): -；词源含义: 依恋关系中的安全体验；精确定义: 在依恋关系中感到被接纳、可依靠和受保护；相关概念:
    安全型依恋；专业视角 (Professional Perspective): 依恋理论的核心概念'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychological_Security.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 依恋理论的核心要点是什么？
  answer: '提出者: John Bowlby, Mary Ainsworth；核心观点: 早期照料者关系塑造安全感基础；安全感来源: 可获得性、敏感性、一致性的照料；安全感缺失后果: 不安全依恋(焦虑型、回避型、混乱型)；临床意义:
    依恋修复是治疗核心'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychological_Security.md
  section: 表2.1 安全感的主要心理学理论 (Major Psychological Theories)
- type: concept
  question: 心理社会发展理论的核心要点是什么？
  answer: '提出者: Erik Erikson；核心观点: 生命周期各阶段有特定安全感发展任务；安全感来源: 婴儿期：基本信任；后续阶段的相应满足；安全感缺失后果: 基本不信任；发展危机；临床意义: 发展视角理解安全感'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychological_Security.md
  section: 表2.1 安全感的主要心理学理论 (Major Psychological Theories)
- type: concept
  question: 需要层次理论的核心要点是什么？
  answer: '提出者: Abraham Maslow；核心观点: 安全需要是基本需要之一；安全感来源: 身体安全、资源安全、健康、稳定；安全感缺失后果: 无法追求更高层次需要；临床意义: 满足基本安全是成长前提'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychological_Security.md
  section: 表2.1 安全感的主要心理学理论 (Major Psychological Theories)
- type: concept
  question: 安全型的核心要点是什么？
  answer: '英文: Secure；内在工作模型: 自我:值得被爱；他人:可靠可信赖；安全感特点: 稳定的内在安全感；能够在关系中获得安慰；关系模式: 亲密与自主平衡；信任他人；情绪调节: 有效调节；能够寻求支持；成因: 敏感、一致的照料'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychological_Security.md
  section: 表2.2 依恋理论与安全感 (Attachment Theory & Security)
- type: concept
  question: 焦虑型的核心要点是什么？
  answer: '英文: Anxious/Preoccupied；内在工作模型: 自我:不确定自身价值；他人:不可预测；安全感特点: 安全感依赖他人确认；高度警觉于拒绝信号；关系模式: 过度依赖；黏附；嫉妒；情绪调节: 情绪波动大；难以自我安慰；成因:
    不一致的照料'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychological_Security.md
  section: 表2.2 依恋理论与安全感 (Attachment Theory & Security)
- type: concept
  question: 项目失败后的集体习得性无助的核心要点是什么？
  answer: '心理学现象: 习得性无助 (Learned Helplessness)；表现特征: 失去动力，认为尝试无用，"反正也就这样"。；疗愈/应对建议: 设定极小目标（微胜利）；复盘归因（转向可控因素）。；自助工具: "微进步"日志；ABC归因。；专业视角
    (Professional Perspective): 关键在于打破"不可控性"的认知定势。；引用来源 (Citation): Seligman, M. E. P. (1975).'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Applications.md
  section: Workplace Psychology Crisis Cases (心理学职场危机案例表)
- type: concept
  question: 高管转型的冒充者综合症的核心要点是什么？
  answer: '心理学现象: 冒充者综合症 (Impostor Syndrome)；表现特征: 担心被揭穿，将成功归功于运气，过度准备。；疗愈/应对建议: 识别认知扭曲；分享脆弱；证据核实（列出真实成就）。；自助工具: 成功证据清单；核心信念挑战。；专业视角
    (Professional Perspective): 涉及高成就者的自我效能感与内部归因偏差。；引用来源 (Citation): Clance, P. R. (1978).'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Applications.md
  section: Workplace Psychology Crisis Cases (心理学职场危机案例表)
- type: concept
  question: 突发裁员后的创伤后压力反应的核心要点是什么？
  answer: '心理学现象: 急性应激反应 (ASR)；表现特征: 震动、麻木、焦虑、失眠、回避社交。；疗愈/应对建议: 建立安全感；社会支持；表达性书写。；自助工具: 安全计划工作表；呼吸锚定。；专业视角 (Professional Perspective):
    需要防止其演变为慢性的创伤后应激障碍 (PTSD)。；引用来源 (Citation): Herman, J. L. (1992).'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Applications.md
  section: Workplace Psychology Crisis Cases (心理学职场危机案例表)
- type: concept
  question: 职场冷暴力 (Mobbing)的核心要点是什么？
  answer: '心理动力/机制: 权力不平衡与替代攻击。；典型对话/行为: 被排除在邮件外；被忽视。；调整策略: 记录事实；寻求外部正义；心理脱离。；预期益处: 保护自尊，减少创伤。；专业视角 (Professional Perspective):
    这是一个组织系统性问题，不仅是个人沟通问题。；引用来源 (Citation): Leymann, H. (1996).'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Applications.md
  section: Case Analysis Extension (案例分析扩展表)
- type: concept
  question: 职业倦怠 (Burnout)的核心要点是什么？
  answer: '心理动力/机制: 资源与需求不匹配 (JD-R Model)。；典型对话/行为: 每天起床都感到耗竭。；调整策略: 增加资源（支持/自主）；平衡边界。；预期益处: 能量恢复，防止崩溃。；专业视角 (Professional
    Perspective): 涉及耗竭 (Exhaustion)、去人格化 (Cynicism) 和低效能感。；引用来源 (Citation): Maslach, C. (2001).'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Applications.md
  section: Case Analysis Extension (案例分析扩展表)
- type: concept
  question: 数字成瘾与碎片化的核心要点是什么？
  answer: '心理动力/机制: 间歇性强化 (Variable Ratio Schedule)。；典型对话/行为: 强迫性检查通知。；调整策略: 限制感官输入；定时排毒。；预期益处: 深度工作能力恢复。；专业视角 (Professional
    Perspective): 社交媒体算法利用了类似于赌博的多巴胺奖赏回路。；引用来源 (Citation): Alter, A. (2017). *Irresistible*.'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Applications.md
  section: Case Analysis Extension (案例分析扩展表)
- type: concept
  question: 什么是结论与建议？
  answer: 职场心理学应用已从传统的EAP（员工援助计划）发展为涵盖预防、干预、发展的综合性体系。面对日益复杂的职场环境和多样化的员工需求，组织需要建立系统性的心理健康管理体系，将心理学原理融入人力资源管理的各个环节。同时，个体也需要掌握科学的心理调适技能，在快速变化的职业生涯中保持心理健康和持续成长。
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Applications.md
  section: 结论与建议
- type: best_practice
  question: 结论与建议的最佳实践是什么？
  answer: '职场心理学应用已从传统的EAP（员工援助计划）发展为涵盖预防、干预、发展的综合性体系。面对日益复杂的职场环境和多样化的员工需求，组织需要建立系统性的心理健康管理体系，将心理学原理融入人力资源管理的各个环节。同时，个体也需要掌握科学的心理调适技能，在快速变化的职业生涯中保持心理健康和持续成长。

    未来的职场心理学将更加注重个性化、预防性和技术融合，通过科学的方法帮助组织和个人实现更好的工作体验和人生价值。'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Applications.md
  section: 结论与建议
- type: concept
  question: 心理测量学的核心要点是什么？
  answer: '英文名 (English Term): Psychometrics；原始语言/术语 (Original Language): 希腊: Psychometria (心理测量)；精确定义: 研究心理测验的理论、方法与应用的学科，关注信度、效度、常模；历史渊源:
    Francis Galton于1880s开创；专业视角: 心理学科学化的基石，将主观体验量化'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Assessment_Tools.md
  section: 核心术语表
- type: concept
  question: 信度 (Reliability)的核心要点是什么？
  answer: '英文名 (English Term): Reliability；原始语言/术语 (Original Language): 拉丁: Reliabilitas (可靠性)；精确定义: 测量结果的一致性与稳定性，包括重测信度、内部一致性、评分者信度；历史渊源:
    Spearman于1904年提出经典测量理论；专业视角: Cronbach''s α > 0.70为可接受，> 0.90为优秀'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Assessment_Tools.md
  section: 核心术语表
- type: concept
  question: 效度 (Validity)的核心要点是什么？
  answer: '英文名 (English Term): Validity；原始语言/术语 (Original Language): 拉丁: Validitas (有效性)；精确定义: 测量工具是否测量了其声称测量的构念，包括内容效度、构念效度、效标效度；历史渊源:
    Cronbach & Meehl于1955年系统化；专业视角: "效度是测验的灵魂"，无效的测验毫无意义'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Assessment_Tools.md
  section: 核心术语表
- type: concept
  question: 韦氏成人智力量表 (WAIS)的核心要点是什么？
  answer: '英文名: Wechsler Adult Intelligence Scale (WAIS-IV)；测量维度: 言语理解 (VCI)、知觉推理 (PRI)、工作记忆 (WMI)、加工速度 (PSI)、全量表IQ (FSIQ)；适用年龄:
    16-90岁；施测时长: 60-90分钟；信度/效度: α > 0.90；常模更新: 2008 (WAIS-IV)；专业视角: "智力测验之王"，Wechsler于1939年创立，强调"智力是一种整体能力"'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Assessment_Tools.md
  section: 智力与认知能力测评表
- type: concept
  question: 韦氏儿童智力量表 (WISC)的核心要点是什么？
  answer: '英文名: Wechsler Intelligence Scale for Children (WISC-V)；测量维度: 同WAIS，增加流体推理 (FRI)；适用年龄: 6-16岁；施测时长: 45-65分钟；信度/效度:
    α > 0.90；常模更新: 2014 (WISC-V)；专业视角: 全球最广泛使用的儿童智力测验'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Assessment_Tools.md
  section: 智力与认知能力测评表
- type: concept
  question: 斯坦福-比奈智力量表的核心要点是什么？
  answer: '英文名: Stanford-Binet Intelligence Scales (SB-5)；测量维度: 流体推理、知识、定量推理、视觉空间处理、工作记忆；适用年龄: 2-85岁；施测时长: 45-75分钟；信度/效度:
    α > 0.95；常模更新: 2003 (SB-5)；专业视角: 最古老的智力测验 (1905 Binet)，强调发展性评估'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Assessment_Tools.md
  section: 智力与认知能力测评表
- type: concept
  question: 明尼苏达多相人格问卷 (MMPI)的核心要点是什么？
  answer: '英文名: Minnesota Multiphasic Personality Inventory (MMPI-2)；理论基础: 经验取向，临床诊断；维度数量: 10个临床量表 + 效度量表；题目数: 567题；适用人群:
    18岁以上；信度/效度: α = 0.70-0.85；专业视角: "临床人格评估之王"，1943年开发，用于精神病理筛查'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Assessment_Tools.md
  section: 人格测评表
- type: concept
  question: 大五人格问卷 (NEO-PI-R)的核心要点是什么？
  answer: '英文名: NEO Personality Inventory-Revised；理论基础: 五因素模型 (Big Five)；维度数量: 5个因素 + 30个小面 (Facets)；题目数: 240题；适用人群: 17岁以上；信度/效度:
    α > 0.90；专业视角: Costa & McCrae于1992年，学术界最认可的人格模型'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Assessment_Tools.md
  section: 人格测评表
- type: concept
  question: 确认偏见 (Confirmation Bias)的核心要点是什么？
  answer: '定义: 倾向于寻找支持已有信念的信息，忽略反证。；起源或理论基础: Peter Wason 1960s实验。；职场影响: 职场决策忽略风险，导致错误投资或招聘。；疗愈益处: 提升客观性，减少决策焦虑。；自助策略: 日日志记录反面证据，如会议后反思相反观点。；注意事项:
    需主动挑战舒适区；结合数据验证。；专业视角 (Professional Perspective): 这种"动机性推理" (Motivated Reasoning) 保护了自我认同，但牺牲了准确性。CBT 中的认知重构是关键。；引用来源
    (Citation): Nickerson, R. S. (1998). *Review of General Psychology*.'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Cognition.md
  section: 心理学偏见类型表
- type: concept
  question: 锚定偏见 (Anchoring Bias)的核心要点是什么？
  answer: '定义: 过度依赖第一个信息作为参考。；起源或理论基础: Tversky/Kahneman 1974。；职场影响: 谈判薪资时，受初报价影响，导致低估价值。；疗愈益处: 改善谈判技能，减 regret。；自助策略: 准备多锚点，如研究市场数据前决策。；注意事项:
    职场谈判练习；避免匆忙决定。；专业视角 (Professional Perspective): 初始值在工作记忆中设定了标准，调整过程往往不足 (Adjustment Insufficiency)。；引用来源 (Citation): Tversky,
    A. & Kahneman, D. (1974). *Science*.'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Cognition.md
  section: 心理学偏见类型表
- type: concept
  question: 可用性启发式 (Availability Heuristic)的核心要点是什么？
  answer: '定义: 基于易回忆信息判断概率。；起源或理论基础: Tversky/Kahneman 1973。；职场影响: 过估稀有事件风险，如媒体报道导致职场 paranoia。；疗愈益处: 理性评估风险，减 unnecessary
    stress。；自助策略: 列事实数据对比回忆，如风险日志。；注意事项: 媒体消费限；统计学辅助。；专业视角 (Professional Perspective): 情绪显著性 (Emotional Salience) 增强了记忆提取，扭曲了风险评估。需要系统2思维介入。；引用来源
    (Citation): Sunstein, C. R. (2005). *Laws of Fear*.'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Cognition.md
  section: 心理学偏见类型表
- type: concept
  question: 杏仁核 (Amygdala)的核心要点是什么？
  answer: '脑区/神经递质: 情绪中心，恐惧响应。；描述: 处理情绪刺激，触发 fight-flight。；职场相关疗愈: 职压时过度活，焦虑增。；益处: 调节减恐，平静升。；自助干预: 正念息降低活。；注意事项: 创伤史注；fMRI非自。；专业视角
    (Professional Perspective): "杏仁核劫持" (Amygdala Hijack) 解释了职场中的非理性爆发，通过前额叶训练可缓解。；引用来源 (Citation): LeDoux, J. (1996). *The
    Emotional Brain*.'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Cognition.md
  section: 心理学神经基础表
- type: concept
  question: 前额叶 (Prefrontal Cortex)的核心要点是什么？
  answer: '脑区/神经递质: 多巴胺，执行功能。；描述: 决策、抑制、规划。；职场相关疗愈: 职多任务时疲，效降。；益处: 增强控制，专注升。；自助干预: 认知训游戏。；注意事项: 睡眠足；无过载。；专业视角 (Professional
    Perspective): 执行功能总部，负责"踩刹车"（冲动控制）和方向盘（规划），易受压力损伤。；引用来源 (Citation): Arnsten, A. F. T. (2009). *Nature Reviews Neuroscience*.'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Cognition.md
  section: 心理学神经基础表
- type: concept
  question: 海马体 (Hippocampus)的核心要点是什么？
  answer: '脑区/神经递质: 记忆形成， stress影响。；描述: 长期记忆存储，受 cortisol缩。；职场相关疗愈: 职 burnout时忆衰，学难。；益处: 保护忆， resilience。；自助干预: 运动+冥想增密。；注意事项:
    慢性压医；测。；专业视角 (Professional Perspective): 对糖皮质激素极度敏感，长期压力导致神经发生受损和体积缩小，影响学习。；引用来源 (Citation): Sapolsky, R. M. (2004). *Why
    Zebras Don''t Get Ulcers*.'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Cognition.md
  section: 心理学神经基础表
- type: concept
  question: 视觉风格 (Visual)的核心要点是什么？
  answer: '描述: 通过图像/图表学最佳。；优势: 记忆图强，空间好。；职场训练应用: 职训用PPT/视频，提升忆。；疗愈益处: 减抽象焦虑，视觉疗。；自助识别: 自察偏好图像测试。；注意事项: 结合多感；无排他。；专业视角 (Professional
    Perspective): 双重编码理论支持图像辅助记忆，但纯粹的"学习风格"假说证据不足。；引用来源 (Citation): Paivio, A. (1971); Pashler, H. et al. (2008).'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Cognition.md
  section: 心理学学习风格表
- type: concept
  question: 听觉风格 (Auditory)的核心要点是什么？
  answer: '描述: 通过听讲/讨论学。；优势: 忆声强，语言好。；职场训练应用: 职播客/会议训，提升懂。；疗愈益处: 语音疗愈，减孤。；自助识别: 偏好听书测试。；注意事项: 录音自学；环境静。；专业视角 (Professional
    Perspective): 声音处理涉及语音回路，社交讨论增强学习的社会性。；引用来源 (Citation): Baddeley, A. D. (1986).'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Cognition.md
  section: 心理学学习风格表
- type: concept
  question: 信任 vs 不信任的核心要点是什么？
  answer: '年龄范围: 0-1.5岁；核心任务/冲突: 基本信任建立。；理论来源: Erikson心理社会发展（1950）。；职场相关疗愈: 职场信任基础，减 paranoia。；自助应用: 反思童信任模式，建安全网。；注意事项: 早期影响深；疗改。；专业视角
    (Professional Perspective): 依恋理论基础，职场中的心理安全感 (Psychological Safety) 源于此阶段的成功解决。；引用来源 (Citation): Erikson, E. H. (1950).
    *Childhood and Society*.'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Development.md
  section: 心理学发展阶段表
- type: concept
  question: 自主 vs 羞愧的核心要点是什么？
  answer: '年龄范围: 1.5-3岁；核心任务/冲突: 独立感发展。；理论来源: Erikson。；职场相关疗愈: 职场 initiative，减 self-doubt。；自助应用: 练习小自主决策日志。；注意事项: 过度控制避；鼓励。；专业视角
    (Professional Perspective): 这个阶段的失败可能导致成年后的冒充者综合症 (Imposter Syndrome)。；引用来源 (Citation): Erikson, E. H. (1950).'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Development.md
  section: 心理学发展阶段表
- type: concept
  question: 主动 vs 内疚的核心要点是什么？
  answer: '年龄范围: 3-5岁；核心任务/冲突: 探索与 guilt平衡。；理论来源: Erikson。；职场相关疗愈: 职场 creativity，减 inhibition。；自助应用: 创意项目自试，反思 guilt。；注意事项:
    孩玩融；无责。；专业视角 (Professional Perspective): 目标导向行为的发展期，职场微观管理会触发此阶段的退行。；引用来源 (Citation): Erikson, E. H. (1950).'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Development.md
  section: 心理学发展阶段表
- type: concept
  question: 受益与无害 (Beneficence/Nonmaleficence)的核心要点是什么？
  answer: '定义: 最大益处，最小伤害。；应用示例: 疗中避创伤重现。；职场相关: 职咨询无害建议。；疗愈益处: 安全疗，提升信任。；自助遵守: 自助时觉不适停。；注意事项: 风险评估；专业界。；专业视角 (Professional
    Perspective): 希波克拉底誓言的核心，通过风险/收益分析指导道德决策。；引用来源 (Citation): APA Ethics Code Principle A.'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Development.md
  section: 心理学道德原则表
- type: concept
  question: 自主性 (Autonomy)的核心要点是什么？
  answer: '定义: 尊重个体选择权。；应用示例: 获知情同意。；职场相关: 职决策自主。；疗愈益处: 赋权自助，减依赖。；自助遵守: 自选技，日志同意自。；注意事项: 能力限；信息全。；专业视角 (Professional Perspective):
    强调自决权 (Self-determination)，在治疗中从家长式作风转向合作模式。；引用来源 (Citation): Beauchamp, T. L. & Childress, J. F. (2001).'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Development.md
  section: 心理学道德原则表
- type: concept
  question: 正义 (Justice)的核心要点是什么？
  answer: '定义: 公平分配资源/益处。；应用示例: 多元群体服务。；职场相关: 职包容多样。；疗愈益处: 减偏，平等疗。；自助遵守: 自察偏见日志。；注意事项: 文化敏；资源限。；专业视角 (Professional Perspective):
    程序正义 (Procedural Justice) 和分配正义影响职场满意度和组织承诺。；引用来源 (Citation): Rawls, J. (1971). *A Theory of Justice*.'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Development.md
  section: 心理学道德原则表
- type: concept
  question: 大五人格 (Big Five)的核心要点是什么？
  answer: '基础理论: Costa & McCrae；维度/类型: 开放、外向、宜人、尽责、神经过敏。；如何自测: Online免费问卷，答项评分。；职场应用: 职匹配角色，如外向销售。；疗愈益处: 自知升，减不适。；注意事项: 连续谱；文化适。；专业视角
    (Professional Perspective): 心理学界最受支持的特质模型，具有高信效度和跨文化稳定性。；引用来源 (Citation): McCrae, R. R. & Costa, P. T. (1987). *JPSP*.'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Development.md
  section: 心理学人格评估表
- type: concept
  question: MBTI的核心要点是什么？
  answer: '基础理论: Jung类型；维度/类型: 16型，如INTJ（内向、直觉、思考、判断）。；如何自测: 官方或免费版测试，类型解读。；职场应用: 职沟通风格适，提升团队。；疗愈益处: 优势玩，减冲突。；注意事项: 非科学；娱乐用。；专业视角
    (Professional Perspective): 学术界广受批评（信效度低），但在企业培训中作为沟通启发工具仍有实用价值。；引用来源 (Citation): Myers, I. B. (1962); Pittenger, D. J.
    (1993).'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Development.md
  section: 心理学人格评估表
- type: concept
  question: 深呼吸放松的核心要点是什么？
  answer: '原理: 激活副交感神经；详细步骤: 1. 坐直；2. 鼻吸4s持4s呼4s；3. 重复4轮；4. 觉身松。；推荐时长/频率: 2-5min/随时；职场场景: 会议前焦虑；疗愈益处: 降低心率，减皮质醇（证据：APA）。；自助提示:
    手机计时，办公室桌下练。；注意事项: 肺弱改浅；孕妇咨。；专业视角 (Professional Perspective): 盒子呼吸法 (Box Breathing)，通过调节迷走神经张力，快速对抗交感神经唤醒。；引用来源 (Citation):
    Lehrer, P. M. et al. (2000). *Appl. Psychophysiol. Biofeedback*.'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Emotion.md
  section: 心理学压力管理技巧表
- type: concept
  question: 时间管理矩阵的核心要点是什么？
  answer: '原理: 优先级分类（Eisenhower）；详细步骤: 1. 列任务；2. 分紧急/重要四象；3. 优先重要非急；4. 委托/删。；推荐时长/频率: 10min/周；职场场景: 职 overload；疗愈益处: 减 procrastination，提升控制。；自助提示:
    Excel或App矩阵。；注意事项: 灵活审；避免完美。；专业视角 (Professional Perspective): 通过认知卸载 (Cognitive Offloading) 和执行控制，减少前额叶负担和决策疲劳。；引用来源 (Citation):
    Covey, S. R. (1989). *7 Habits*.'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Emotion.md
  section: 心理学压力管理技巧表
- type: concept
  question: 渐进肌肉放松的核心要点是什么？
  answer: '原理: Jacobson紧张-释；详细步骤: 1. 从脚紧5s释；2. 上移到头；3. 深息结束；4. 觉差。；推荐时长/频率: 10-15min/日；职场场景: 下班疲惫；疗愈益处: 释身体紧，改善睡眠。；自助提示: 家沙发或椅，耳机导。；注意事项:
    伤处跳；开车避。；专业视角 (Professional Perspective): 系统性消除残留肌肉紧张，打破身心紧张的焦虑循环。；引用来源 (Citation): Jacobson, E. (1938). *Progressive
    Relaxation*.'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Emotion.md
  section: 心理学压力管理技巧表
- type: concept
  question: 感恩练习的核心要点是什么？
  answer: '原理: 积极焦点移；步骤: 1. 日列3感恩；2. 详为什么；3. 觉情绪；4. 分享可选。；推荐频率: 日1次；职场场景: 职低落期；疗愈益处: 幸福感升20%（Emmons RCT）。；自助提示: 手机备忘或jar。；注意事项:
    真实；多样。；专业视角 (Professional Perspective): 对抗享乐适应 (Hedonic Adaptation)，通过重新关注正面事物提升基线幸福感。；引用来源 (Citation): Emmons, R. A.
    & McCullough, M. E. (2003).'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Emotion.md
  section: 心理学幸福干预表
- type: concept
  question: 善行干预的核心要点是什么？
  answer: '原理: 利他行为；步骤: 1. 日一善行；2. 觉喜悦；3. 反思影响；4. 持续。；推荐频率: 周5次；职场场景: 职团队低；疗愈益处: altruism升福祉。；自助提示: 帮同事小事日志。；注意事项: 无期待；自然。；专业视角
    (Professional Perspective): 激活大脑奖励系统，这种"助人者高潮" (Helper''s High) 提升社会连接和意义感。；引用来源 (Citation): Lyubomirsky, S. et al. (2005).
    *Review of General Psychology*.'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Emotion.md
  section: 心理学幸福干预表
- type: concept
  question: 优势使用的核心要点是什么？
  answer: '原理: 优势导向；步骤: 1. 识顶优势；2. 日职用；3. 反思满足；4. 扩展。；推荐频率: 日；职场场景: 职无感；疗愈益处: 从事升，生产。；自助提示: VIA测试后日志。；注意事项: 补弱；平衡。；专业视角 (Professional
    Perspective): 签名优势 (Signature Strengths) 的新颖使用是提升幸福感和降低抑郁的强效干预。；引用来源 (Citation): Seligman, M. E. P. et al. (2005). *American
    Psychologist*.'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Emotion.md
  section: 心理学幸福干预表
- type: concept
  question: 掌握经验的核心要点是什么？
  answer: '描述: 通过成功建信念。；步骤: 1. 设小目标；2. 达成；3. 反思；4. 渐难。；推荐频率: 周3-5；职场场景: 职新任务畏；疗愈益处: 自信累积，减回避。；自助示例: 小报告成日志。；注意事项: 渐进；庆祝。；专业视角
    (Professional Perspective): 最强大的效能来源 (Performance Accomplishments)，通过逐级掌握建立。；引用来源 (Citation): Bandura, A. (1977). *Self-efficacy*.'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Emotion.md
  section: 心理学自我效能构建表
- type: concept
  question: 替代经验的核心要点是什么？
  answer: '描述: 观察他人成功。；步骤: 1. 选类似模型；2. 观过程；3. 仿；4. 适自。；推荐频率: 周2；职场场景: 职新人学；疗愈益处: 动机升，学快。；自助示例: 导师影或视频。；注意事项: 相似模；无抄。；专业视角
    (Professional Perspective): 榜样作用 (Vicarious Experience)，前提是观察者认为榜样与自己相似。；引用来源 (Citation): Schunk, D. H. (1987).'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Emotion.md
  section: 心理学自我效能构建表
- type: concept
  question: 《自卑与超越》的核心要点是什么？
  answer: '作者: Alfred Adler；推荐理由: 理解生活风格。；重点章节: 职业合作。；职场应用: 改善团队协作。；疗愈益处: 自卑感升华为动力。；专业视角 (Professional Perspective): 个体心理学的核心，强调社会兴趣和克服自卑。；网页地址
    (URL): [Goodreads](https://www.goodreads.com/book/show/159414.Understanding_Human_Nature)'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_General_Resources.md
  section: core Psychology Books (核心书籍表 - 心理学)
- type: concept
  question: 《被讨厌的勇气》的核心要点是什么？
  answer: '作者: 岸见一郎；推荐理由: 阿德勒心理学通俗版。；重点章节: 课题分离。；职场应用: 解决职场人际越界难题。；疗愈益处: 获得自由感，减少焦虑。；专业视角 (Professional Perspective): “课题分离”是情绪调节的高级认知策略。→
    [课题分离专题](../adlerian-task-separation/Adlerian_Task_Separation_Overview.md)；网页地址 (URL): [Amazon](https://www.amazon.com/Courage-Be-Disliked-Phenomenon-Happiness/dp/1501197274)'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_General_Resources.md
  section: core Psychology Books (核心书籍表 - 心理学)
- type: concept
  question: 《终身成长》的核心要点是什么？
  answer: '作者: Carol Dweck；推荐理由: 成功心理学：成长心态。；重点章节: 心态的影响。；职场应用: 面对失败后的复原力。；疗愈益处: 建立自我效能感。；专业视角 (Professional Perspective):
    基于神经可塑性的心理学干预。；网页地址 (URL): [Carol Dweck](https://www.mindsetworks.com/science/)'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_General_Resources.md
  section: core Psychology Books (核心书籍表 - 心理学)
- type: concept
  question: 《身体从未忘记》的核心要点是什么？
  answer: '作者: Bessel van der Kolk；针对问题: 创伤 (Trauma)；核心工具: 躯体疗法、EMDR；推荐理由: 创伤领域的圣经。；疗愈应用: 重建身体安全感。；专业视角: 强调创伤在生理结构中的存储。'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_General_Resources.md
  section: Psychology Self-Help Extended List (心理学自助书籍扩展表)
- type: concept
  question: 《焦虑的意义》的核心要点是什么？
  answer: '作者: Rollo May；针对问题: 焦虑、存在感；核心工具: 存在主义分析；推荐理由: 深入理解焦虑的正面作用。；疗愈应用: 将焦虑转化为创造力。；专业视角: 存在主义心理学的早期代表作。'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_General_Resources.md
  section: Psychology Self-Help Extended List (心理学自助书籍扩展表)
- type: concept
  question: 《非暴力沟通》的核心要点是什么？
  answer: '作者: Marshall Rosenberg；针对问题: 人际冲突；核心工具: NVC四步法；推荐理由: 最实用的沟通工具。；疗愈应用: 提升同理心和关系。；专业视角: 减少冲突中的杏仁核劫持。'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_General_Resources.md
  section: Psychology Self-Help Extended List (心理学自助书籍扩展表)
- type: concept
  question: PERMA模型的核心要点是什么？
  answer: '英文: **PERMA Model**；定义: 积极情绪(P)、投入(E)、关系(R)、意义(M)、成就(A)五个幸福要素；理论基础: Seligman的幸福理论；实践应用: 幸福干预和生活质量提升'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Positive_Psychology.md
  section: 核心概念 (Core Concepts)
- type: concept
  question: 品格优势的核心要点是什么？
  answer: '英文: **Character Strengths**；定义: 24种普遍存在的积极人格特质；理论基础: VIA性格分类体系；实践应用: 优势识别和发挥'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Positive_Psychology.md
  section: 核心概念 (Core Concepts)
- type: concept
  question: 心流体验的核心要点是什么？
  answer: '英文: **Flow Experience**；定义: 完全沉浸于活动中的最佳体验状态；理论基础: Csikszentmihalyi理论；实践应用: 创造力提升和表现优化'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Positive_Psychology.md
  section: 核心概念 (Core Concepts)
- type: concept
  question: 马丁·塞利格曼的核心要点是什么？
  answer: '贡献: 积极心理学之父，PERMA模型创始人；核心著作: 《真实的幸福》(2002)；研究领域: 幸福理论、习得性乐观'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Positive_Psychology.md
  section: 主要理论家 (Key Theorists)
- type: concept
  question: 米哈里·契克森米哈赖的核心要点是什么？
  answer: '贡献: 心流理论创始人；核心著作: 《心流：最优体验心理学》(1990)；研究领域: 心流体验、创造力'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Positive_Psychology.md
  section: 主要理论家 (Key Theorists)
- type: concept
  question: 克里斯·彼得森的核心要点是什么？
  answer: '贡献: 品格优势理论共同开发者；核心著作: 《品格优势与美德手册》(2004)；研究领域: 性格分类、积极特质'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Positive_Psychology.md
  section: 主要理论家 (Key Theorists)
- type: concept
  question: 三件好事练习的核心要点是什么？
  answer: '理论基础: 感恩理论；实施步骤: 每晚记录三件好事及原因；效果证据: 显著提升幸福感和减少抑郁症状；适用人群: 一般人群'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Positive_Psychology.md
  section: 实践干预方法 (Practical Interventions)
- type: concept
  question: 优势识别问卷的核心要点是什么？
  answer: '理论基础: 品格优势理论；实施步骤: 完成VIA-IS量表，识别前五大优势；效果证据: 增强自我认知和自信；适用人群: 个人发展'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Positive_Psychology.md
  section: 实践干预方法 (Practical Interventions)
- type: concept
  question: 抑郁障碍的核心要点是什么？
  answer: '核心临床特征 (Clinical Traits): 持续情绪低落、意志减退、迟滞。；神经回路/生化基础: 5-HT, DA, NE 递质失衡；HPA轴功能障碍。；躯体/中医/能量映射: **气机郁滞**；心阳不振。；整体疗愈建议
    (Holistic Strategy): 激活行为 (BA)、有氧运动、光照疗法、益生菌。'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Psychopathology_Atlas.md
  section: 'Major Clinical Disorders: Holistic Profile (核心精神障碍：多维剖析表)'
- type: concept
  question: 焦虑障碍的核心要点是什么？
  answer: '核心临床特征 (Clinical Traits): 过度担忧、肌肉紧张、警觉性增高。；神经回路/生化基础: 杏仁核过度激活；GABA 抑制不足。；躯体/中医/能量映射: **虚火扰心**；肾水不济。；整体疗愈建议 (Holistic
    Strategy): 多迷走神经调节 (SE)、呼吸技术、镁补充。'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Psychopathology_Atlas.md
  section: 'Major Clinical Disorders: Holistic Profile (核心精神障碍：多维剖析表)'
- type: concept
  question: 双相障碍的核心要点是什么？
  answer: '核心临床特征 (Clinical Traits): 抑郁与躁狂/轻躁狂交替出现。；神经回路/生化基础: 昼夜节律紊乱；氧化应激增加。；躯体/中医/能量映射: **阴阳失调**；能量极端波动。；整体疗愈建议 (Holistic
    Strategy): 节律管理 (IPSRT)、欧米伽-3、稳定化练习。'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Psychopathology_Atlas.md
  section: 'Major Clinical Disorders: Holistic Profile (核心精神障碍：多维剖析表)'
- type: concept
  question: 偏执型的核心要点是什么？
  answer: '防御机制 (Defense): 投射 (Projection)；躯体装甲表现 (Somatic Armor): 肩颈极度僵硬；眼神警惕。；核心匮乏与恐惧: 恐惧被控制或被侵犯。；专家解析 (Expert Insight):
    建立“透明”的信任边界。'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Psychopathology_Atlas.md
  section: Personality Styles & Character Armor (人格风格与性格装甲表)
- type: concept
  question: 边缘型的核心要点是什么？
  answer: '防御机制 (Defense): 分裂 (Splitting)；躯体装甲表现 (Somatic Armor): 能量极端不稳；自伤痕迹。；核心匮乏与恐惧: 恐惧被抛弃与吞噬。；专家解析 (Expert Insight): 辩证行为疗法
    (DBT) 是黄金标准。'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Psychopathology_Atlas.md
  section: Personality Styles & Character Armor (人格风格与性格装甲表)
- type: concept
  question: 自恋型的核心要点是什么？
  answer: '防御机制 (Defense): 理想化/贬低；躯体装甲表现 (Somatic Armor): 胸部过度挺拔（假性自信）；缺乏核心温度。；核心匮乏与恐惧: 恐惧无价值与平庸。；专家解析 (Expert Insight): 核心是个体化过程中的自恋损伤。'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Psychopathology_Atlas.md
  section: Personality Styles & Character Armor (人格风格与性格装甲表)
- type: concept
  question: 喉咙紧缩感的核心要点是什么？
  answer: '潜在心理隐喻 (Metaphor): 有话难言；自我表达受阻。；关联情绪: 委屈、恐惧。；针对性技术: 吼叫练习；声乐疗法。；备注: “梅核气”。'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Psychopathology_Atlas.md
  section: Somatic Expression of Psychic Distress (心理痛苦的躯体化索引表)
- type: concept
  question: 胸口压迫感的核心要点是什么？
  answer: '潜在心理隐喻 (Metaphor): 沉重的责任；未经处理的悲哀。；关联情绪: 压抑、悲叹。；针对性技术: 扩胸导引；长呼气。；备注: 建立“心胸”的空间感。'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Psychopathology_Atlas.md
  section: Somatic Expression of Psychic Distress (心理痛苦的躯体化索引表)
- type: concept
  question: 心理学的核心要点是什么？
  answer: '英文名 (English Term): Psychology；原始语言/术语 (Original Language): 希腊: *Psychologia* (Ψυχολογία, 灵魂学)；精确定义: 研究人类与动物心理现象发生、发展及其规律的科学；历史渊源:
    1879年冯特在莱比锡建立第一个心理学实验室；专业视角 (Professional Perspective): 从哲学思辨到实验科学的转变,是现代心理学的标志'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Schools_Theories.md
  section: 核心术语表 (Core Terms)
- type: concept
  question: 行为主义的核心要点是什么？
  answer: '英文名 (English Term): Behaviorism；原始语言/术语 (Original Language): 英: Behaviorism；精确定义: 只研究可观察的行为,排斥意识与内省的心理学流派；历史渊源:
    Watson 1913年《行为主义者眼中的心理学》；专业视角 (Professional Perspective): "黑箱理论":不关心内部过程,只关注刺激-反应(S-R)'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Schools_Theories.md
  section: 核心术语表 (Core Terms)
- type: concept
  question: 精神分析的核心要点是什么？
  answer: '英文名 (English Term): Psychoanalysis；原始语言/术语 (Original Language): 德: *Psychoanalyse*；精确定义: 通过探索潜意识冲突与童年经验来理解与治疗心理障碍；历史渊源:
    Freud 1896年首次使用该术语；专业视角 (Professional Perspective): "冰山理论":意识只是表层,潜意识才是主宰'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Schools_Theories.md
  section: 核心术语表 (Core Terms)
- type: concept
  question: 构造主义的核心要点是什么？
  answer: '创立者: Wundt, Titchener；核心观点: 意识由基本元素构成,通过内省分析；研究对象: 意识的结构；研究方法: 内省法；对人性的假设: 心智如同化学元素可分解；专业视角: 心理学的"元素周期表"梦想,因主观性而衰落'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Schools_Theories.md
  section: 心理学主要流派分类表 (Major Schools of Psychology)
- type: concept
  question: 机能主义的核心要点是什么？
  answer: '创立者: James, Dewey；核心观点: 关注意识的功能与适应性作用；研究对象: 意识的功能；研究方法: 实用主义；对人性的假设: 心智帮助生物适应环境；专业视角: 美国心理学的实用主义传统源头'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Schools_Theories.md
  section: 心理学主要流派分类表 (Major Schools of Psychology)
- type: concept
  question: 行为主义的核心要点是什么？
  answer: '创立者: Watson, Skinner；核心观点: 只研究可观察行为,S-R联结与强化；研究对象: 外显行为；研究方法: 实验法、操作性条件反射；对人性的假设: 人是环境塑造的产物(白板论)；专业视角: "给我一打婴儿":环境决定论的极致'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Schools_Theories.md
  section: 心理学主要流派分类表 (Major Schools of Psychology)
- type: concept
  question: 经典条件反射理论的核心要点是什么？
  answer: '代表人物: Pavlov；核心概念: CS-UCS配对、条件反应；应用领域: 恐惧症、习惯形成；循证基础: A级(大量实验验证)；局限性: 忽略认知因素；专业视角: 解释简单学习,但无法解释复杂行为'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Schools_Theories.md
  section: 心理学理论体系表 (Theoretical Systems)
- type: concept
  question: 操作性条件反射理论的核心要点是什么？
  answer: '代表人物: Skinner；核心概念: 强化、惩罚、消退；应用领域: 行为矫正、教育；循证基础: A级；局限性: 低估生物预备性、忽略内在动机；专业视角: "行为工程学"基础,但将人视为"鸽子"'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Schools_Theories.md
  section: 心理学理论体系表 (Theoretical Systems)
- type: concept
  question: STOP的核心要点是什么？
  answer: '全称/定义 (Full Name): Stop, Take a breath, Observe, Proceed；操作细节 (How-to): 停下、深呼吸、观察内部平衡、再行动。；生理/心理机制: 建立“反应空间”，防止冲动行为。；推荐场景:
    想要做出自毁/伤人行为的冲动时刻。'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Self_Help_Protocols.md
  section: 'DBT Crisis Survival Skills: TIPP & STOP (DBT危机生存：生理与认知调节表)'
- type: concept
  question: 物理边界的核心要点是什么？
  answer: '侵犯信号 (Violation Signs): 过度的肢体接触；不经允许进入私人空间。；维护话术建议: “我很重视我的隐私空间，请先敲门。”；心理底层逻辑: 身体自主权与安全感。；备注: 物理安全是心理安全的基础。'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Self_Help_Protocols.md
  section: Relational Boundaries & Assertiveness (人际边界与断言式沟通表)
- type: concept
  question: 情绪边界的核心要点是什么？
  answer: '侵犯信号 (Violation Signs): 接收他人的情绪垃圾；被他人情绪左右。；维护话术建议: “我很关心你，但我现在没有带宽处理这些，我们晚点谈。”；心理底层逻辑: 区分“我”的情感与“他”的情感。；备注: 解决共情疲劳。'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Self_Help_Protocols.md
  section: Relational Boundaries & Assertiveness (人际边界与断言式沟通表)
- type: concept
  question: 时间边界的核心要点是什么？
  answer: '侵犯信号 (Violation Signs): 无意义的加班请求；休息时间被工作侵占。；维护话术建议: “我在非工作时间不处理此类事务，明天我第一时间处理。”；心理底层逻辑: 自我价值的保全与角色分离。；备注: 防治职业倦怠的关键。'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Self_Help_Protocols.md
  section: Relational Boundaries & Assertiveness (人际边界与断言式沟通表)
- type: concept
  question: 自我慈悲的核心要点是什么？
  answer: '技术/练习名称: 三元素模型；核心步骤: 1. 觉察痛苦；2. 承认痛苦是人类共性；3. 对自己展现温柔。；心理效应: 降低自我评判，停止二次创伤。；专家建议: 想象你是在安慰一个受惊的小孩。'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Self_Help_Protocols.md
  section: Resilience Building & Self-Compassion (韧性建设与自我慈悲框架表)
- type: concept
  question: 内在小孩的核心要点是什么？
  answer: '技术/练习名称: 链接对话；核心步骤: 闭上眼，寻找内在那个受伤的孩子，进行对话。；心理效应: 修复早年的依恋缺失，整合人格碎片。；专家建议: 是深度疗愈复杂性创伤 (C-PTSD) 的核心工具。'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Self_Help_Protocols.md
  section: Resilience Building & Self-Compassion (韧性建设与自我慈悲框架表)
- type: concept
  question: 感恩日记的核心要点是什么？
  answer: '技术/练习名称: 3-Good-Things；核心步骤: 每天记下三件微小的美好事物，并分析原因。；心理效应: 重塑大脑的“威胁扫描模式”为“资源发现模式”。；专家建议: 具有显著提升多巴胺和催眠成功率的效果。'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Self_Help_Protocols.md
  section: Resilience Building & Self-Compassion (韧性建设与自我慈悲框架表)
- type: concept
  question: 晨间笔记的核心要点是什么？
  answer: '描述 (Description): Morning Pages；适用场景: 清晨醒来不加思索地手写三页纸（流式记录）。；疗愈机制: 清理潜意识杂物，打开创造力。；专业视角: 艺术家与创作者的必修课（朱莉娅·卡梅隆）。'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Self_Help_Protocols.md
  section: Journaling Frameworks for Mental Clarity (心理清晰度书写框架表)
- type: concept
  question: 个人主义 vs 集体主义的核心要点是什么？
  answer: '西方视角: 强调自主（Hofstede）。；东方式视角: 强调和谐（儒家）。；差异影响: 西职独立，东团队先。；职场疗愈融合: 平衡自主与合，减冲突。；自助策略: 文化自评日志，适风格。；注意事项: 全球化职注；无 stereotype。；专业视角
    (Professional Perspective): 本我概念差异：独立自我 (Independent Self) vs 互依自我 (Interdependent Self)。；引用来源 (Citation): Markus, H.
    R. & Kitayama, S. (1991). *Psychological Review*.'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Social.md
  section: 心理学跨文化视角表
- type: concept
  question: 时间导向的核心要点是什么？
  answer: '西方视角: 未来导向，规划。；东方式视角: 循环观，无常。；差异影响: 西 deadline紧，东灵活。；职场疗愈融合: 减压，适变。；自助策略: 时间视角调日志。；注意事项: 文化混职；平衡。；专业视角 (Professional
    Perspective): 线性时间 (Monochronic) 与多重时间 (Polychronic) 观念的冲突，影响压力感知。；引用来源 (Citation): Hall, E. T. (1983). *The Dance of
    Life*.'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Social.md
  section: 心理学跨文化视角表
- type: concept
  question: 情绪表达的核心要点是什么？
  answer: '西方视角: 直接外化。；东方式视角: 含蓄内化。；差异影响: 西职反馈直，东回避。；职场疗愈融合: Empathy升，沟通好。；自助策略: 表达风格自练。；注意事项: 文化敏；训。；专业视角 (Professional Perspective):
    显示规则 (Display Rules) 决定了情绪表达的适当性，跨文化误解常源于此。；引用来源 (Citation): Ekman, P. (1972).'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Social.md
  section: 心理学跨文化视角表
- type: concept
  question: 社会惰化 (Social Loafing)的核心要点是什么？
  answer: '定义: 团体中个体努力减。；研究基础: Ringelmann 1913拉绳实验。；职场影响: 职团队项目偷懒。；疗愈益处: 提升责任，减不公。；自助应对: 自察贡献日志，明确分工。；注意事项: 团体小；动机升。；专业视角
    (Professional Perspective): 责任分散 (Diffusion of Responsibility) 和可评估性降低导致，通过个人绩效透明化可减少。；引用来源 (Citation): Latané, B. et
    al. (1979). *JPSP*.'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Social.md
  section: 心理学社会心理现象表
- type: concept
  question: 旁观者效应的核心要点是什么？
  answer: '定义: 多人时责任扩散。；研究基础: Kitty Genovese案，Latané/Darley 1968。；职场影响: 职危机无人助。；疗愈益处: 促主动，减孤。；自助应对: 训练“指名助”，自先行动。；注意事项: 紧急训；文化。；专业视角
    (Professional Perspective): 即使在职场，这也能解释为什么没人指出明显的问题（沉默的螺旋）。；引用来源 (Citation): Darley, J. M. & Latané, B. (1968). *JPSP*.'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Social.md
  section: 心理学社会心理现象表
- type: concept
  question: 从众压力的核心要点是什么？
  answer: '定义: 随多数行为。；研究基础: Asch 1951线段实验。；职场影响: 职会议盲从。；疗愈益处: 独立思，减 groupthink。；自助应对: 预独立意见日志。；注意事项: 自信建；异议鼓励。；专业视角 (Professional
    Perspective): 规范性社会影响 (Normative Social Influence) 驱使人们为了被接纳而随大流。；引用来源 (Citation): Asch, S. E. (1951).'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Social.md
  section: 心理学社会心理现象表
- type: concept
  question: 互补关系的核心要点是什么？
  answer: '描述: 差异互补，如主导-顺从。；理论基础: Sullivan人际理论。；职场影响: 职团队互补效升。；疗愈益处: 平衡关，减冲突。；自助干预: 关系图自绘，补缺。；注意事项: 过度依避；沟通。；专业视角 (Professional
    Perspective): 基于人际环形模型 (Interpersonal Circumplex)，互补行为（如支配对顺从）确减少了即时焦虑。；引用来源 (Citation): Kiesler, D. J. (1983).'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Social.md
  section: 心理学关系动态表
- type: concept
  question: 镜像关系的核心要点是什么？
  answer: '描述: 类似者吸引。；理论基础: Byrne相似吸引。；职场影响: 职同质团队和谐，但创新低。；疗愈益处: 舒适疗，支持。；自助干预: 相似值日志寻友。；注意事项: 多样补；无排异。；专业视角 (Professional
    Perspective): 相似性吸引假说，验证了彼此的观点，提升自尊。；引用来源 (Citation): Byrne, D. (1971).'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Social.md
  section: 心理学关系动态表
- type: concept
  question: 精神分析理论的核心要点是什么？
  answer: '创始人: Sigmund Freud；核心概念: 无意识、本我/自我/超我、防御机制。；起源背景: 19世纪末维也纳。；心理疗愈益处: 揭示潜意识冲突。；职场自助应用: 反思童年模式影响当前决策（如移情）。；专业视角 (Professional
    Perspective): 虽其实证性受质疑，但“无意识”概念深刻影响了现代心理学，特别是对防御机制的理解。；引用来源 (Citation): Freud, S. (1923). *The Ego and the Id*.；网页地址 (URL):
    [APA: Psychoanalysis](https://www.apa.org/ed/graduate/specialize/psychoanalysis)'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Theories_Experiments.md
  section: 心理学理论表
- type: concept
  question: 人本主义理论的核心要点是什么？
  answer: '创始人: Carl Rogers；核心概念: 自我实现、无条件积极关注。；起源背景: 20世纪中美国，第三势力。；心理疗愈益处: 促进自我接纳。；职场自助应用: 练习自我同情，提供无评判空间。；专业视角 (Professional
    Perspective): 强调人的潜能和主观体验，是现代咨询（以人为中心）的基石。；引用来源 (Citation): Rogers, C. R. (1961). *On Becoming a Person*.；网页地址 (URL):
    [Center for Studies of the Person](https://www.centerfortheperson.org/)'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Theories_Experiments.md
  section: 心理学理论表
- type: concept
  question: 行为主义理论的核心要点是什么？
  answer: '创始人: B.F. Skinner；核心概念: 操作性条件反射、强化。；起源背景: 20世纪初美国。；心理疗愈益处: 修改不良习惯。；职场自助应用: 设定奖励系统来建立新习惯（如Atomic Habits原理）。；专业视角
    (Professional Perspective): 提供了最实用的行为改变技术，但常被批评忽视了认知过程。；引用来源 (Citation): Skinner, B. F. (1953). *Science and Human Behavior*.；网页地址
    (URL): [BF Skinner Foundation](https://www.bfskinner.org/)'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Theories_Experiments.md
  section: 心理学理论表
- type: concept
  question: 自我决定理论 (SDT)的核心要点是什么？
  answer: '创始人: Deci & Ryan；核心概念: 自主、胜任、关系。；职场应用: 提升内在动机。；专业视角 (Professional Perspective): 当代最权威的动机理论，证实了为了外部奖励（金钱）工作往往不可持续。；引用来源
    (Citation): Ryan, R. M., & Deci, E. L. (2000). Self-determination theory... *American Psychologist*.；网页地址 (URL): [SDT
    Org](https://selfdeterminationtheory.org/)'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Theories_Experiments.md
  section: 心理学动机与社会影响理论表
- type: concept
  question: 期望理论的核心要点是什么？
  answer: '创始人: Victor Vroom；核心概念: 期望 x 效价 x 工具性。；职场应用: 绩效激励。；专业视角 (Professional Perspective): 提供了理性的动机计算公式，强调个体的认知评估过程。；引用来源
    (Citation): Vroom, V. H. (1964). *Work and Motivation*. Wiley.；网页地址 (URL): [Management Study Guide: Expectancy](https://www.managementstudyguide.com/expectancy-theory-motivation.htm)'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Theories_Experiments.md
  section: 心理学动机与社会影响理论表
- type: concept
  question: 目标设置理论的核心要点是什么？
  answer: '创始人: Locke & Latham；核心概念: SMART目标。；职场应用: 项目规划。；专业视角 (Professional Perspective): 实证研究最多的I/O心理学理论之一，确立了“具体困难目标”优于“尽力而为”。；引用来源
    (Citation): Locke, E. A., & Latham, G. P. (1990). *A Theory of Goal Setting*. Prentice Hall.；网页地址 (URL): [MindTools: Goal
    Setting](https://www.mindtools.com/pages/article/newHTE_87.htm)'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Theories_Experiments.md
  section: 心理学动机与社会影响理论表
- type: concept
  question: 经典条件反射的核心要点是什么？
  answer: '核心概念: 关联学习。；创始人/起源: Pavlov (1900s)。；职场应用: 克服演讲恐惧（去条件化）。；专业视角 (Professional Perspective): 解释了许多自动的情绪反应（如看到老板就紧张）。；引用来源
    (Citation): Pavlov, I. P. (1927). *Conditioned Reflexes*.；网页地址 (URL): [Nobel Prize: Pavlov](https://www.nobelprize.org/prizes/medicine/1904/pavlov/biographical/)'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Theories_Experiments.md
  section: 心理学学习理论表
- type: concept
  question: 操作性条件反射的核心要点是什么？
  answer: '核心概念: 结果控制行为。；创始人/起源: Skinner (1930s)。；职场应用: 绩效奖励系统。；专业视角 (Professional Perspective): 行为分析 (ABA) 的基础，强调环境后果对行为的塑造力。；引用来源
    (Citation): Skinner, B. F. (1938). *The Behavior of Organisms*.；网页地址 (URL): [Simple Psych: Operant Conditioning](https://www.simplypsychology.org/operant-conditioning.html)'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Theories_Experiments.md
  section: 心理学学习理论表
- type: concept
  question: 认知行为疗法 (CBT)的核心要点是什么？
  answer: '英文名 (English Term): Cognitive Behavioral Therapy；原始语言/术语 (Original Language): 英: CBT；精确定义: 整合认知重构与行为改变的短程结构化心理疗法；历史渊源:
    Beck于1960s开发；专业视角: 循证医学金标准，针对"认知三角" (思维-情绪-行为)'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Therapy_Techniques.md
  section: 核心术语表
- type: concept
  question: 认知重构的核心要点是什么？
  answer: '英文名 (English Term): Cognitive Restructuring；原始语言/术语 (Original Language): 英: Cognitive Restructuring；精确定义: 识别、挑战并替换认知扭曲
    (Cognitive Distortions) 的技术；历史渊源: Beck认知疗法核心技术；专业视角: 改变"自动化思维" (Automatic Thoughts) 是关键'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Therapy_Techniques.md
  section: 核心术语表
- type: concept
  question: 行为激活 (BA)的核心要点是什么？
  answer: '英文名 (English Term): Behavioral Activation；原始语言/术语 (Original Language): 英: BA；精确定义: 通过增加愉快活动打破抑郁的回避循环；历史渊源: Lewinsohn于1970s，Jacobson于1990s系统化；专业视角:
    针对抑郁的"行为陷阱" (Behavioral Trap)，简单高效'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Therapy_Techniques.md
  section: 核心术语表
- type: concept
  question: 认知重构的核心要点是什么？
  answer: '英文名: Cognitive Restructuring；核心原理: 识别并挑战认知扭曲 (如灾难化、全或无思维)；操作步骤: 1. 识别情境与情绪；2. 捕捉自动化思维；3. 检验证据；4. 生成替代想法；5. 重新评估情绪；适应症:
    抑郁、焦虑、愤怒；预期效果: 减少情绪困扰，增强理性思维；注意事项: 需大量练习，初期可能增加焦虑；专业视角: Beck的"认知三角"：思维驱动情绪与行为'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Therapy_Techniques.md
  section: 认知行为疗法 (CBT) 技术表
- type: concept
  question: 苏格拉底式提问的核心要点是什么？
  answer: '英文名: Socratic Questioning；核心原理: 通过提问引导患者自我发现，而非直接告知；操作步骤: 1. "这个想法的证据是什么？"；2. "有没有其他解释？"；3. "最坏/最好/最可能的结果是什么？"；4.
    "如果朋友这样想，你会怎么说？"；适应症: 所有CBT适应症；预期效果: 增强洞察力，促进认知灵活性；注意事项: 避免过度Socratic变成审问；专业视角: 引导性发现 (Guided Discovery)，而非说教'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Therapy_Techniques.md
  section: 认知行为疗法 (CBT) 技术表
- type: concept
  question: 行为实验的核心要点是什么？
  answer: '英文名: Behavioral Experiments；核心原理: 设计实验检验灾难化预测是否成真；操作步骤: 1. 识别灾难化想法 (如"我会晕倒")；2. 设计可测试实验；3. 执行并记录结果；4. 修正信念；适应症:
    社交焦虑、惊恐障碍、强迫症；预期效果: 用经验证据替代主观恐惧；注意事项: 实验需可行且安全；专业视角: "实验室"搬到真实生活，检验"假设" (Hypothesis)'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Therapy_Techniques.md
  section: 认知行为疗法 (CBT) 技术表
- type: concept
  question: 系统脱敏的核心要点是什么？
  answer: '英文名: Systematic Desensitization；核心原理: 在放松状态下逐步暴露于恐惧等级；操作步骤: 1. 建立焦虑等级层次 (SUDS 0-100)；2. 学习放松技术；3. 从最低等级开始想象暴露；4.
    逐步升级；适应症: 特定恐惧症、社交焦虑；预期效果: 习惯化 (Habituation)，焦虑降低；注意事项: 速度需适中，避免跳级；专业视角: Wolpe于1958年，基于"交互抑制" (Reciprocal Inhibition)'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Therapy_Techniques.md
  section: 暴露疗法技术表
- type: concept
  question: 洪水法 (Flooding)的核心要点是什么？
  answer: '英文名: Flooding / Implosion Therapy；核心原理: 直接暴露于高强度恐惧刺激，直到焦虑自然消退；操作步骤: 1. 直接进入高SUDS情境 (80-100)；2. 持续暴露直到焦虑下降50%；适应症:
    特定恐惧症、PTSD (谨慎)；预期效果: 快速消退，适合愿意承受高强度的患者；注意事项: 高风险：可能增敏 (Sensitization)、退出率高；专业视角: "一次性跳入深水区"，需严格评估'
  source: 02-Mind-Psychology/psychology/foundations/overview/Psychology_Therapy_Techniques.md
  section: 暴露疗法技术表
- type: concept
  question: 1936的核心要点是什么？
  answer: '里程碑: 词汇假说 (Lexical Hypothesis): 重要个体差异编码在自然语言中；贡献者: Allport & Odbert'
  source: 02-Mind-Psychology/psychology/foundations/personality/Big_Five_Model.md
