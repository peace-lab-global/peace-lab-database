  question: 什么是概述 (Overview)？
  answer: 阿迪亚香提（Adyashanti，1962-），原名斯蒂芬·格雷（Steven Gray），是当代美国最受尊敬的非宗派觉醒教师之一。他出身于禅宗传统，在跟随禅宗老师修行14年后经历了深刻的觉醒，随后被老师授权教学。但他很快超越了禅宗的形式框架，发展出自己独特的、超越宗派的教学方式。他的教导以直接、清晰和不妥协著称，被认为是当代"新不二论"（Neo-Advaita）运动中最有深度和传统根基的声音之一。
  source: 02-Mind-Psychology/meditation/masters/contemporary-spiritual/Adyashanti.md
