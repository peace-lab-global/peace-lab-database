  question: 双向责任的核心要点是什么？
  answer: '内涵: 婚后孤独是系统问题，不是某一方的错；错误做法: 指责对方"你让我孤独"；正确做法: "我们的互动模式让我们都感到不被连接"'
  source: 02-Mind-Psychology/relationships/marriage/marital-loneliness/Marital_Loneliness_Relief.md
  section: 1.1 婚后孤独缓释的四项基本原则
- type: concept
  question: 小步渐进的核心要点是什么？
  answer: '内涵: 修复关系是马拉松，不是短跑；错误做法: 期望一次深谈解决所有问题；正确做法: 每天一个微小的连接尝试'
  source: 02-Mind-Psychology/relationships/marriage/marital-loneliness/Marital_Loneliness_Relief.md
  section: 1.1 婚后孤独缓释的四项基本原则
- type: concept
  question: 安全优先的核心要点是什么？
  answer: '内涵: 在安全感不足时不强求深度暴露；错误做法: "你必须告诉我你的感受"；正确做法: "当你准备好的时候，我在这里"'
  source: 02-Mind-Psychology/relationships/marriage/marital-loneliness/Marital_Loneliness_Relief.md
  section: 1.1 婚后孤独缓释的四项基本原则
- type: concept
  question: 1. 暂停的核心要点是什么？
  answer: '操作: 不要立即指责或退缩，先让自己暂停 10 秒；目的: 中断自动化反应（追逐或石墙）'
  source: 02-Mind-Psychology/relationships/marriage/marital-loneliness/Marital_Loneliness_Relief.md
  section: 2.1 婚后孤独的急救步骤
- type: concept
  question: 2. 命名的核心要点是什么？
  answer: '操作: 对自己说："我现在感到在这段关系里的孤独"；目的: 精确命名降低情绪强度'
  source: 02-Mind-Psychology/relationships/marriage/marital-loneliness/Marital_Loneliness_Relief.md
  section: 2.1 婚后孤独的急救步骤
- type: concept
  question: 深夜翻旧账的核心要点是什么？
  answer: '为什么: 疲劳+情绪化=升级冲突；替代行为: 记下来，约定白天清醒时讨论'
  source: 02-Mind-Psychology/relationships/marriage/marital-loneliness/Marital_Loneliness_Relief.md
