  question: 森林浴/森林疗法的核心要点是什么？
  answer: '英文名 (English Term): Shinrin-Yoku / Forest Bathing / Forest Therapy；原始语言/术语 (Original Language): 日: *森林浴* (Shinrin-Yoku)；词源含义:
    "沐浴于森林氛围中",日本1982年提出的公共健康概念；精确定义: 在森林环境中进行慢速漫步、静坐、感官觉察与呼吸练习；区分与备注: 不同于徒步或运动,强调"在"而非"做",是感官沉浸而非体能锻炼；专业视角 (Professional
    Perspective): 结合正念、生态心理学与自然医学,有循证支持的身心干预'
  source: 02-Mind-Psychology/therapy/forest-therapy/Forest_Therapy_Tree_Hugging.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 抱树疗愈的核心要点是什么？
  answer: '英文名 (English Term): Tree Hugging / Dendro-Therapy；原始语言/术语 (Original Language): 希: *Dendron* (树) + *Therapeia* (治疗)；词源含义:
    通过身体接触树木(拥抱、倚靠、触摸)获得情绪与能量调节；精确定义: 包括物理层面(质感、温度)与象征层面(生命力、稳定感)；区分与备注: 常被误解为"迷信",但确有触觉安抚与自然连接效应；专业视角 (Professional Perspective):
    可作为躯体疗法与依恋修复的一种形式,树作为"安全客体"'
  source: 02-Mind-Psychology/therapy/forest-therapy/Forest_Therapy_Tree_Hugging.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 植物精气/芬多精的核心要点是什么？
  answer: '英文名 (English Term): Phytoncides；原始语言/术语 (Original Language): 俄: *Фитонциды* (杀菌植物素)；词源含义: 树木释放的挥发性有机化合物,具有抗菌作用；精确定义:
    如松树/柏树的萜烯类(terpenes)；区分与备注: 吸入后可调节自主神经、降低皮质醇、增强NK细胞；专业视角 (Professional Perspective): 为森林浴生理效应提供部分生化解释,但不应夸大为"万能"'
  source: 02-Mind-Psychology/therapy/forest-therapy/Forest_Therapy_Tree_Hugging.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 压力降低的核心要点是什么？
  answer: '具体表现: 皮质醇下降、主观压力感减少；生理机制: 植物精气吸入、自主神经副交感激活；心理机制: 注意力恢复理论(ART):自然环境不需努力注意,大脑得以休息；循证支持: 日本多项RCT显示森林浴15-30分钟显著降低皮质醇(中等证据)；专业视角:
    效应量虽非巨大,但作为低成本、无副作用干预具有公共卫生价值'
  source: 02-Mind-Psychology/therapy/forest-therapy/Forest_Therapy_Tree_Hugging.md
  section: 森林浴的身心效应与机制表 (Psychophysiological Effects & Mechanisms)
- type: concept
  question: 情绪改善的核心要点是什么？
  answer: '具体表现: 焦虑、抑郁、愤怒评分下降;活力与平静感上升；生理机制: 血清素与多巴胺调节、HRV改善；心理机制: 感官复苏、审美体验、存在性连接感；循证支持: 多项横断面与短期干预研究支持(中等证据)；专业视角: 对轻-中度情绪障碍有辅助作用,不能替代专业治疗'
  source: 02-Mind-Psychology/therapy/forest-therapy/Forest_Therapy_Tree_Hugging.md
  section: 森林浴的身心效应与机制表 (Psychophysiological Effects & Mechanisms)
- type: concept
  question: 免疫增强的核心要点是什么？
  answer: '具体表现: NK细胞(自然杀伤细胞)数量与活性增加；生理机制: 植物精气吸入(萜烯类)、压力降低；心理机制: 放松与安全感促进免疫功能；循证支持: 日本研究显示森林浴后NK细胞活性提升持续数周(小样本)；专业视角: 机制尚未完全明确,需更大样本与长期追踪'
  source: 02-Mind-Psychology/therapy/forest-therapy/Forest_Therapy_Tree_Hugging.md
  section: 森林浴的身心效应与机制表 (Psychophysiological Effects & Mechanisms)
- type: concept
  question: 触觉与躯体层面的核心要点是什么？
  answer: '解释: 树皮的质感、树干的温度与稳固感为皮肤与本体感觉提供刺激；治疗性功能: 触觉安抚(类似抚摸宠物/拥抱)、躯体锚定；适用人群: 触觉敏感、创伤个案(安全前提下)、孤独者；文化/象征意义: 树作为"不会离开"的陪伴对象,提供无条件稳定性'
  source: 02-Mind-Psychology/therapy/forest-therapy/Forest_Therapy_Tree_Hugging.md
  section: 抱树疗愈的多维理解表 (Multi-Dimensional Understanding of Tree Hugging)
- type: concept
  question: 呼吸与共振层面的核心要点是什么？
  answer: '解释: 靠近树木时调整呼吸节奏,感受树的"呼吸"(氧气释放与二氧化碳吸收)；治疗性功能: 呼吸同步、副交感激活、正念锚定；适用人群: 焦虑、惊恐、呼吸障碍者；文化/象征意义: 树的"生命节奏"象征恒久与缓慢,对抗现代快节奏'
  source: 02-Mind-Psychology/therapy/forest-therapy/Forest_Therapy_Tree_Hugging.md
