  question: 社交焦虑障碍 (SAD)的核心要点是什么？
  answer: '终身患病率（全球）: 7-13%；核心特征: 对社交评价的显著恐惧；冥想干预适用性: ★★★★☆ 中高'
  source: 02-Mind-Psychology/meditation/clinical-conditions/Meditation_Anxiety_Disorders.md
