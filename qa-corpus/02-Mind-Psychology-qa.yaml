- type: concept
  question: 严重精神障碍的核心要点是什么？
  answer: '英文名 (English Term): Severe Mental Illness (SMI)；原始语言/词源 (Original Language): 拉丁语: *Mentalis* (心智的) + *Gravis* (严重)；词源含义:
    "严重的心智疾病"；精确定义: 症状严重、功能损害显著、需长期治疗的精神疾病群组；历史演变: 1980年代概念形成；中国2004年纳入公共卫生管理；专业视角 (Professional Perspective): 强调疾病严重度与管理需求'
  source: 02-Mind-Psychology/psychology/clinical/disorder/Severe_Mental_Illness_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 精神病性症状的核心要点是什么？
  answer: '英文名 (English Term): Psychotic Symptoms；原始语言/词源 (Original Language): 希腊语: *Psychē* (ψυχή, 灵魂) + *-osis* (异常状态)；词源含义:
    "心灵的异常状态"；精确定义: 包括幻觉、妄想、思维形式障碍等脱离现实的体验；历史演变: Jaspers (1913) 系统描述精神病理学；专业视角 (Professional Perspective): 是多种严重精神障碍的共同特征'
  source: 02-Mind-Psychology/psychology/clinical/disorder/Severe_Mental_Illness_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 阳性症状的核心要点是什么？
  answer: '英文名 (English Term): Positive Symptoms；原始语言/词源 (Original Language): 拉丁语: *Positivus* (附加的)；词源含义: 正常体验之上的"多余"表现；精确定义:
    幻觉、妄想、言语紊乱、行为紊乱；历史演变: Crow (1980) 二分法；专业视角 (Professional Perspective): 通常对抗精神病药反应较好'
  source: 02-Mind-Psychology/psychology/clinical/disorder/Severe_Mental_Illness_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 精神病性症状的核心要点是什么？
  answer: '精神分裂症: 持续且多样；分裂情感性: 伴心境发作；偏执性精神病: 系统性妄想为主；双相障碍: 仅心境发作期；癫痫所致精神障碍: 与癫痫发作相关；精发迟滞伴精神障碍: 表现可能不典型'
  source: 02-Mind-Psychology/psychology/clinical/disorder/Severe_Mental_Illness_Overview.md
  section: 表2.2 六类障碍核心鉴别要点 (Key Differentiating Features)
- type: concept
  question: 心境症状的核心要点是什么？
  answer: '精神分裂症: 短暂/次要；分裂情感性: 显著；偏执性精神病: 无或轻微；双相障碍: 核心特征；癫痫所致精神障碍: 可有；精发迟滞伴精神障碍: 可有'
  source: 02-Mind-Psychology/psychology/clinical/disorder/Severe_Mental_Illness_Overview.md
  section: 表2.2 六类障碍核心鉴别要点 (Key Differentiating Features)
- type: concept
  question: 认知功能的核心要点是什么？
  answer: '精神分裂症: 广泛损害；分裂情感性: 中度损害；偏执性精神病: 相对保留；双相障碍: 发作间期可恢复；癫痫所致精神障碍: 可能受癫痫影响；精发迟滞伴精神障碍: 基线已有损害'
  source: 02-Mind-Psychology/psychology/clinical/disorder/Severe_Mental_Illness_Overview.md
  section: 表2.2 六类障碍核心鉴别要点 (Key Differentiating Features)
- type: concept
  question: 精神分裂症的核心要点是什么？
  answer: 'DSM-5 分类: 精神分裂症谱系障碍 295.90；ICD-11 分类: 精神分裂症 6A20；CCMD-3 分类: 精神分裂症 20；差异说明: DSM-5取消亚型；ICD-11保留亚型'
  source: 02-Mind-Psychology/psychology/clinical/disorder/Severe_Mental_Illness_Overview.md
  section: 表3.1 DSM-5 vs ICD-11 vs CCMD-3 分类对照
- type: concept
  question: 分裂情感性障碍的核心要点是什么？
  answer: 'DSM-5 分类: 精神分裂症谱系障碍 295.70；ICD-11 分类: 分裂情感性障碍 6A21；CCMD-3 分类: 分裂情感性精神病 25；差异说明: DSM-5强调Criterion C（2周精神病性症状独立于心境）'
  source: 02-Mind-Psychology/psychology/clinical/disorder/Severe_Mental_Illness_Overview.md
  section: 表3.1 DSM-5 vs ICD-11 vs CCMD-3 分类对照
- type: concept
  question: 注意缺陷多动障碍的核心要点是什么？
  answer: '英文名 (English Term): Attention-Deficit/Hyperactivity Disorder (ADHD)；原始语言/词源 (Original Language): 拉丁语: *Attendere*
    (关注) + 希腊语: *Hyper-* (过度) + *Kinesis* (运动)；词源含义: "注意不足+过度活动"；精确定义: 以注意力不集中、多动和/或冲动为核心特征的神经发育障碍；历史演变: 1902年Still首次描述；1980年DSM-III命名ADD；1987年改为ADHD；专业视角
    (Professional Perspective): 从"道德缺陷"到神经发育障碍的认知进化'
  source: 02-Mind-Psychology/psychology/clinical/disorder/adhd/ADHD_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 注意缺陷障碍的核心要点是什么？
  answer: '英文名 (English Term): Attention Deficit Disorder (ADD)；原始语言/词源 (Original Language): -；词源含义: 强调注意力缺陷；精确定义: DSM-III(1980)使用的历史术语；现已被ADHD取代；历史演变:
    1980-1987年使用；后被ADHD统一；专业视角 (Professional Perspective): 社区仍常用ADD指代注意力不集中型'
  source: 02-Mind-Psychology/psychology/clinical/disorder/adhd/ADHD_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 执行功能的核心要点是什么？
  answer: '英文名 (English Term): Executive Function (EF)；原始语言/词源 (Original Language): 拉丁语: *Executio* (执行)；词源含义: 高级认知控制功能；精确定义:
    包括工作记忆、抑制控制、认知灵活性、计划和组织等高级认知功能；历史演变: 1970s神经心理学概念；Barkley将其作为ADHD核心缺陷；专业视角 (Professional Perspective): ADHD的核心认知缺陷模型'
  source: 02-Mind-Psychology/psychology/clinical/disorder/adhd/ADHD_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 注意力不集中为主型的核心要点是什么？
  answer: '英文名: Predominantly Inattentive (ADHD-PI)；核心特征: 注意力不集中症状≥6项；多动-冲动<6项；性别倾向: 女性更常见；诊断难点: 易被忽视（"安静的ADHD"）；功能损害模式: 学业/工作效率低；组织困难'
  source: 02-Mind-Psychology/psychology/clinical/disorder/adhd/ADHD_Overview.md
  section: 表2.4 ADHD亚型分类 (ADHD Presentations)
- type: concept
  question: 多动-冲动为主型的核心要点是什么？
  answer: '英文名: Predominantly Hyperactive-Impulsive (ADHD-PH)；核心特征: 多动-冲动症状≥6项；注意力不集中<6项；性别倾向: 男性更常见；儿童为主；诊断难点: 较少见于成人；功能损害模式:
    行为问题；社交冲突'
  source: 02-Mind-Psychology/psychology/clinical/disorder/adhd/ADHD_Overview.md
  section: 表2.4 ADHD亚型分类 (ADHD Presentations)
- type: concept
  question: 混合型的核心要点是什么？
  answer: '英文名: Combined (ADHD-C)；核心特征: 两类症状均≥6项；性别倾向: 男性略多；诊断难点: 最常见的亚型；功能损害模式: 广泛功能损害'
  source: 02-Mind-Psychology/psychology/clinical/disorder/adhd/ADHD_Overview.md
  section: 表2.4 ADHD亚型分类 (ADHD Presentations)
- type: concept
  question: 多巴胺系统的核心要点是什么？
  answer: '异常表现: DA传递效率降低；DAT密度可能增高；相关脑区: 前额叶皮层、纹状体、伏隔核；功能关联: 奖赏加工、动机、执行功能；药物靶点: 哌甲酯（阻断DAT）；苯丙胺（促DA释放）；证据等级: A级'
  source: 02-Mind-Psychology/psychology/clinical/disorder/adhd/ADHD_Overview.md
  section: 表3.1 ADHD的神经递质异常 (Neurotransmitter Abnormalities)
- type: concept
  question: 去甲肾上腺素系统的核心要点是什么？
  answer: '异常表现: NE信号不足；相关脑区: 前额叶皮层、蓝斑核；功能关联: 警觉性、注意力调节、工作记忆；药物靶点: 托莫西汀（选择性NRI）；胍法辛（α2A激动）；证据等级: A级'
  source: 02-Mind-Psychology/psychology/clinical/disorder/adhd/ADHD_Overview.md
  section: 表3.1 ADHD的神经递质异常 (Neurotransmitter Abnormalities)
- type: concept
  question: 目的的核心要点是什么？
  answer: '自我评估: 识别可能的ADHD倾向；决定是否寻求专业评估；专业诊断: 确认或排除ADHD诊断；制定治疗方案'
  source: 02-Mind-Psychology/psychology/clinical/disorder/adhd/ADHD_Self_Assessment.md
  section: 表1.1 自我评估vs.专业诊断 (Self-Assessment vs. Professional Diagnosis)
- type: concept
  question: 工具的核心要点是什么？
  answer: '自我评估: 标准化自评量表、症状检核表；专业诊断: 结构化访谈、多来源评估、神经心理测验'
  source: 02-Mind-Psychology/psychology/clinical/disorder/adhd/ADHD_Self_Assessment.md
  section: 表1.1 自我评估vs.专业诊断 (Self-Assessment vs. Professional Diagnosis)
- type: concept
  question: 准确性的核心要点是什么？
  answer: '自我评估: 敏感性较好但特异性有限（假阳性较高）；专业诊断: 更全面和准确'
  source: 02-Mind-Psychology/psychology/clinical/disorder/adhd/ADHD_Self_Assessment.md
  section: 表1.1 自我评估vs.专业诊断 (Self-Assessment vs. Professional Diagnosis)
- type: concept
  question: 症状重叠广泛的核心要点是什么？
  answer: '解释: 焦虑、抑郁、睡眠障碍、甲状腺功能异常、创伤等均可产生类似ADHD的症状'
  source: 02-Mind-Psychology/psychology/clinical/disorder/adhd/ADHD_Self_Assessment.md
  section: 表1.2 为什么需要专业诊断 (Why Professional Diagnosis Matters)
- type: concept
  question: 共病复杂的核心要点是什么？
  answer: '解释: ADHD很少单独存在，约60-80%有至少一种共病，需要全面评估'
  source: 02-Mind-Psychology/psychology/clinical/disorder/adhd/ADHD_Self_Assessment.md
  section: 表1.2 为什么需要专业诊断 (Why Professional Diagnosis Matters)
- type: concept
  question: 确认偏误的核心要点是什么？
  answer: '解释: 自我评估容易受到先入为主观念的影响，倾向于确认自己的假设'
  source: 02-Mind-Psychology/psychology/clinical/disorder/adhd/ADHD_Self_Assessment.md
  section: 表1.2 为什么需要专业诊断 (Why Professional Diagnosis Matters)
- type: concept
  question: 什么是2. 成人ADHD自评量表 (Adult ADHD Self-Report Scale / ASRS v1.1)？
  answer: '**WHO成人ADHD自评量表**是国际上最广泛使用的成人ADHD筛查工具，由世界卫生组织(WHO)与纽约大学合作开发。'
  source: 02-Mind-Psychology/psychology/clinical/disorder/adhd/ADHD_Self_Assessment.md
  section: 2. 成人ADHD自评量表 (Adult ADHD Self-Report Scale / ASRS v1.1)
- type: concept
  question: 10的核心要点是什么？
  answer: '问题: 你有多频繁地在家中或工作中放错东西？；评估维度: 注意力'
  source: 02-Mind-Psychology/psychology/clinical/disorder/adhd/ADHD_Self_Assessment.md
  section: 表2.2 ASRS-v1.1 Part B（补充12题完整版）
- type: concept
  question: 多模式治疗的核心要点是什么？
  answer: '英文: Multimodal Treatment；内涵: 药物+行为+教育+环境的综合干预；实践要点: 不应仅依赖单一手段；常见误区: 只用药不做行为干预'
  source: 02-Mind-Psychology/psychology/clinical/disorder/adhd/ADHD_Treatment_Interventions.md
  section: 表1.1 ADHD治疗核心原则 (Core Treatment Principles)
- type: concept
  question: 个体化方案的核心要点是什么？
  answer: '英文: Individualized Approach；内涵: 根据年龄、亚型、共病、需求调整；实践要点: 无"一刀切"方案；常见误区: 照搬他人方案'
  source: 02-Mind-Psychology/psychology/clinical/disorder/adhd/ADHD_Treatment_Interventions.md
  section: 表1.1 ADHD治疗核心原则 (Core Treatment Principles)
- type: concept
  question: 长期管理视角的核心要点是什么？
  answer: '英文: Chronic Disease Model；内涵: ADHD是慢性发展性障碍；实践要点: 需长期随访和调整；常见误区: 期望"治愈"'
  source: 02-Mind-Psychology/psychology/clinical/disorder/adhd/ADHD_Treatment_Interventions.md
  section: 表1.1 ADHD治疗核心原则 (Core Treatment Principles)
- type: concept
  question: 精心药物管理的核心要点是什么？
  answer: '内容: 优化剂量的兴奋剂药物；核心症状改善: +++；功能改善: ++；长期(3-8年)结果: 优势随时间减弱'
  source: 02-Mind-Psychology/psychology/clinical/disorder/adhd/ADHD_Treatment_Interventions.md
  section: 表1.2 MTA研究核心发现 (MTA Study Key Findings)
- type: concept
  question: 密集行为治疗的核心要点是什么？
  answer: '内容: 家长培训+学校干预+儿童训练；核心症状改善: ++；功能改善: ++；长期(3-8年)结果: 持续获益'
  source: 02-Mind-Psychology/psychology/clinical/disorder/adhd/ADHD_Treatment_Interventions.md
  section: 表1.2 MTA研究核心发现 (MTA Study Key Findings)
- type: concept
  question: 联合治疗的核心要点是什么？
  answer: '内容: 药物+行为；核心症状改善: +++；功能改善: +++；长期(3-8年)结果: 最全面改善'
  source: 02-Mind-Psychology/psychology/clinical/disorder/adhd/ADHD_Treatment_Interventions.md
  section: 表1.2 MTA研究核心发现 (MTA Study Key Findings)
- type: concept
  question: 哌甲酯速释的核心要点是什么？
  answer: '英文名: Methylphenidate IR (Ritalin)；类别: 兴奋剂；作用机制: 阻断DAT和NET再摄取；起效时间: 20-30分钟；持续时间: 3-5小时；效应量(Cohen''s d): 0.8-1.0；FDA批准:
    6岁+'
  source: 02-Mind-Psychology/psychology/clinical/disorder/adhd/ADHD_Treatment_Interventions.md
  section: 表2.1 ADHD一线药物 (First-Line Medications)
- type: concept
  question: 哌甲酯缓释的核心要点是什么？
  answer: '英文名: Methylphenidate ER (Concerta/专注达)；类别: 兴奋剂；作用机制: 阻断DAT和NET再摄取；起效时间: 30-60分钟；持续时间: 8-12小时；效应量(Cohen''s d): 0.8-1.0；FDA批准:
    6岁+'
  source: 02-Mind-Psychology/psychology/clinical/disorder/adhd/ADHD_Treatment_Interventions.md
  section: 表2.1 ADHD一线药物 (First-Line Medications)
- type: concept
