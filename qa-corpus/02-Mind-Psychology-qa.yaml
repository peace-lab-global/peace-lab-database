  answer: '为什么没用: 如果你不信，大脑会说"你在骗谁呢"；应该怎么做: 不需要觉得自己最棒，只需要"虽然怕但愿意试"'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Building_Practice.md
  section: 1.1 自信不是"想"出来的
- type: concept
  question: 要先自信才能行动"的核心要点是什么？
  answer: '为什么没用: 搞反了——是行动产生自信，不是自信产生行动；应该怎么做: 先做，做完了自信自然来'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Building_Practice.md
  section: 1.1 自信不是"想"出来的
- type: concept
  question: 找到你的优点就自信了"的核心要点是什么？
  answer: '为什么没用: 低自信的人就算知道优点也会打折；应该怎么做: 不只是发现优点，而是积累"我做到了"的证据'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Building_Practice.md
  section: 1.1 自信不是"想"出来的
- type: concept
  question: 行动先于感觉的核心要点是什么？
  answer: '意思: 不等"准备好"了才动手，带着不确定感去做；操作方向: 每天做一件"有点怕但想做的事"'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Building_Practice.md
  section: 1.2 四条核心原则
- type: concept
  question: 证据胜过口号的核心要点是什么？
  answer: '意思: 真实的成功经验>任何形式的自我肯定；操作方向: 记录"我做到了"的事，哪怕很小'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Building_Practice.md
  section: 1.2 四条核心原则
- type: concept
  question: 过程重于结果的核心要点是什么？
  answer: '意思: 关注"我在进步"而非"我必须成功"；操作方向: 用成长型思维替代固定型思维'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Building_Practice.md
  section: 1.2 四条核心原则
- type: concept
  question: 我不够好"的核心要点是什么？
  answer: '可能的来源: 长期被批评；挑战方式: 问自己：谁说的？什么标准？"够好"到底是什么意思？；替代信念: "我在有些方面强有些方面弱，这是正常的"'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Building_Practice.md
  section: 2.1 识别并挑战核心信念
- type: concept
  question: 我不值得"的核心要点是什么？
  answer: '可能的来源: 被忽视/被虐待；挑战方式: 如果你的好朋友这么说自己，你会怎么回应？；替代信念: "我和其他人一样值得被善待"'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Building_Practice.md
  section: 2.1 识别并挑战核心信念
- type: concept
  question: 婴儿期的核心要点是什么？
  answer: '年龄: 0-1.5岁；自信的核心任务: 基本信任——"世界是安全的，我值得被照顾"；关键影响者: 主要照顾者；成功时的样子: 安全依恋、敢于探索；受挫时的样子: 回避型/焦虑型依恋、对世界不信任'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Development_Damage.md
  section: 1.1 全生命周期的自信发展
- type: concept
  question: 幼儿期的核心要点是什么？
  answer: '年龄: 1.5-3岁；自信的核心任务: 自主性——"我可以自己做事"；关键影响者: 父母；成功时的样子: "我来！""我自己！"的自豪感；受挫时的样子: 过度羞耻、怀疑自己'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Development_Damage.md
  section: 1.1 全生命周期的自信发展
- type: concept
  question: 学前期的核心要点是什么？
  answer: '年龄: 3-6岁；自信的核心任务: 主动性——"我可以计划和发起行动"；关键影响者: 父母+老师；成功时的样子: 主动尝试新事物、有想法有行动；受挫时的样子: 过度内疚、害怕犯错、不敢主动'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Development_Damage.md
  section: 1.1 全生命周期的自信发展
- type: concept
  question: 信任 vs. 不信任的核心要点是什么？
  answer: '核心冲突: 世界是安全的吗？；成功结果: **希望**；对自信的影响: "我值得被回应" → 自信的根基；如果在这个阶段受挫: 深层的不安全感，觉得自己"不配"'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Development_Damage.md
  section: 1.2 Erik Erikson的心理社会发展与自信
- type: concept
  question: 自主 vs. 羞耻怀疑的核心要点是什么？
  answer: '核心冲突: 我能自己做吗？；成功结果: **意志**；对自信的影响: "我能控制一些事" → 自我效能的萌芽；如果在这个阶段受挫: 过度依赖、害怕做决定'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Development_Damage.md
  section: 1.2 Erik Erikson的心理社会发展与自信
- type: concept
  question: 主动 vs. 内疚的核心要点是什么？
  answer: '核心冲突: 我可以有自己的想法吗？；成功结果: **目的**；对自信的影响: "我的想法有价值" → 敢想敢做；如果在这个阶段受挫: 过度压抑主动性、等别人安排'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Development_Damage.md
  section: 1.2 Erik Erikson的心理社会发展与自信
- type: concept
  question: 无条件接纳的核心要点是什么？
  answer: '对自信的影响: 最强的保护因素；机制: "不管你考多少分，我们都爱你" → 自我价值感稳固；长大后的样子: 失败了难过但不崩溃——"我做错了事，但我不是坏人"'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Development_Damage.md
  section: 2.1 家庭环境
- type: concept
  question: 有条件接纳的核心要点是什么？
  answer: '对自信的影响: 培养出"脆弱的高自尊"；机制: "考100分妈妈才高兴" → 自我价值=成绩；长大后的样子: 赢了很自信，输了就崩溃——自信像坐过山车'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Development_Damage.md
  section: 2.1 家庭环境
- type: concept
  question: 自信的核心要点是什么？
  answer: '英文名: Self-Confidence；原始语言/词源: 拉丁语: *Con-* (一起) + *Fidere* (信任)；词源含义: "对自己的信任"；精确定义: 对自身能力和判断的整体信任感，相信自己能够应对生活中的挑战；区分要点:
    指向"我行不行"的整体感觉；专业视角: 不是人格特质，而是可变的心理状态'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 自尊的核心要点是什么？
  answer: '英文名: Self-Esteem；原始语言/词源: 拉丁语: *Aestimare* (评估价值)；词源含义: "给自己估价"；精确定义: 个体对自身价值和重要性的主观评价——"我值不值得被爱/被尊重"；区分要点: 指向"我值不值得"的价值判断；专业视角:
    Rosenberg (1965) 经典定义'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 自我效能的核心要点是什么？
  answer: '英文名: Self-Efficacy；原始语言/词源: 拉丁语: *Efficere* (产生效果)；词源含义: "能产生结果"；精确定义: 对自己在特定情境中能否成功完成某项任务的信念；区分要点: 指向"这件具体的事我能不能做到"；专业视角:
    Bandura (1977) 社会认知理论'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 自我概念的核心要点是什么？
  answer: '回答的问题: "我是谁？"；比喻: 整面镜子；例子: "我是个内向的、喜欢读书的、数学不太好的人"；来源: 经验积累；稳定性: 中等'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Overview.md
  section: 2.1 自信家族的关系图
- type: concept
  question: 自尊的核心要点是什么？
  answer: '回答的问题: "我值不值得？"；比喻: 对镜子里的自己打分；例子: "虽然有缺点，但我觉得自己是有价值的人"；来源: 被爱/被接纳的经验；稳定性: 较稳定'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Overview.md
  section: 2.1 自信家族的关系图
- type: concept
  question: 自信的核心要点是什么？
  answer: '回答的问题: "我行不行？"；比喻: 相信自己能应对；例子: "这件事有点难，但我觉得自己可以搞定"；来源: 成功经验+社会反馈；稳定性: 中等偏变'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Overview.md
  section: 2.1 自信家族的关系图
- type: concept
  question: 认知层面的核心要点是什么？
  answer: '什么意思: 对自己能力的评估——"我觉得我能行"；生活中的样子: 面试前想"我准备得还行，应该没问题"；摇晃时的样子: "我肯定会搞砸""人家一看就知道我不行"'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Overview.md
  section: 2.2 自信的三个层面
- type: concept
  question: 情感层面的核心要点是什么？
  answer: '什么意思: 面对挑战时的情绪状态——安心还是恐惧；生活中的样子: 被叫到台上讲话，紧张但不害怕；摇晃时的样子: 被叫到名字心跳加速、手心出汗、想逃跑'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Overview.md
  section: 2.2 自信的三个层面
- type: concept
  question: 进入场景的核心要点是什么？
  answer: '社交自信高的样子: 走进一个房间，即使不认识人也不会太紧张；社交自信低的样子: 到了门口犹豫要不要进去；区分要点: 不是"热情"，是"不害怕"'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Special_Topics.md
  section: 1.1 社交自信的核心
- type: concept
  question: 表达观点的核心要点是什么？
  answer: '社交自信高的样子: 不同意时能说出自己的看法；社交自信低的样子: 什么都附和，不敢提不同意见；区分要点: 不是"强势"，是"有存在感"'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Special_Topics.md
  section: 1.1 社交自信的核心
- type: concept
  question: 接受沉默的核心要点是什么？
  answer: '社交自信高的样子: 聊天中偶尔沉默不会焦虑；社交自信低的样子: 一旦冷场就觉得"是不是我太无聊了"；区分要点: 不是"能说会道"，是"沉默也自在"'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Special_Topics.md
  section: 1.1 社交自信的核心
- type: concept
  question: 过度准备的核心要点是什么？
  answer: '内心逻辑: "如果话题冷了我必须有东西可以说"；后果: 社交变得像考试，累而不享受；干预方向: 允许即兴、接受沉默'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Special_Topics.md
  section: 1.2 社交自信不足的常见表现
- type: concept
  question: 事后反刍的核心要点是什么？
  answer: '内心逻辑: "我刚才那句话是不是说错了"；后果: 社交后精疲力尽；干预方向: 设立"反刍截止时间"——10分钟后不再想'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Special_Topics.md
  section: 1.2 社交自信不足的常见表现
- type: concept
  question: 安全行为的核心要点是什么？
  answer: '内心逻辑: 只和认识的人待在一起、一直看手机；后果: 永远不会扩大舒适区；干预方向: 逐步减少安全行为'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Special_Topics.md
  section: 1.2 社交自信不足的常见表现
- type: concept
  question: 3秒规则"的核心要点是什么？
  answer: '怎么做: 想和谁说话就在3秒内行动，不给大脑犹豫的时间；为什么有效: 犹豫越久越怕，快速行动绕过恐惧'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Special_Topics.md
  section: 1.3 社交自信提升方法
- type: concept
  question: 好奇心替代表演的核心要点是什么？
  answer: '怎么做: 把注意力从"我要表现好"转到"我对他们好奇"；为什么有效: 焦点从自己转到对方→自然放松'
  source: 02-Mind-Psychology/psychology/self-regulation/self-confidence/Self_Confidence_Special_Topics.md
  section: 1.3 社交自信提升方法
- type: concept
  question: 什么是内容索引 | Contents？
  answer: '- [Self Soothing Techniques](Self_Soothing_Techniques.md)'
  source: 02-Mind-Psychology/psychology/self-regulation/self-soothing/INDEX.md
  section: 内容索引 | Contents
- type: concept
  question: 自我安抚的核心要点是什么？
  answer: '英文术语: Self-Soothing；源头语言: English；定义: 使用感官体验和自我关怀行为来平静神经系统和调节情绪；临床意义: DBT痛苦承受技能核心,情绪调节基础'
  source: 02-Mind-Psychology/psychology/self-regulation/self-soothing/Self_Soothing_Techniques.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 感官安抚的核心要点是什么？
  answer: '英文术语: Sensory Soothing；源头语言: English；定义: 通过五感(视、听、嗅、味、触)的愉悦刺激实现安抚；临床意义: 最直接、最原始的安抚方式'
  source: 02-Mind-Psychology/psychology/self-regulation/self-soothing/Self_Soothing_Techniques.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 自我照顾的核心要点是什么？
  answer: '英文术语: Self-Care；源头语言: English；定义: 有意识地照顾自己身体、情绪和精神需求的行为；临床意义: 预防性心理健康维护'
  source: 02-Mind-Psychology/psychology/self-regulation/self-soothing/Self_Soothing_Techniques.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 1951的核心要点是什么？
  answer: '里程碑事件: 过渡性客体概念提出；关键人物: Donald Winnicott；理论贡献: 婴儿通过物品自我安抚；影响: 依恋与自我安抚连接'
  source: 02-Mind-Psychology/psychology/self-regulation/self-soothing/Self_Soothing_Techniques.md
  section: 历史发展表 (Historical Development)
- type: concept
  question: 1958的核心要点是什么？
  answer: '里程碑事件: 依恋理论形成；关键人物: John Bowlby；理论贡献: 安全依恋是自我调节基础；影响: 理解安抚的发展起源'
  source: 02-Mind-Psychology/psychology/self-regulation/self-soothing/Self_Soothing_Techniques.md
  section: 历史发展表 (Historical Development)
- type: concept
  question: 1969的核心要点是什么？
  answer: '里程碑事件: 陌生情境实验；关键人物: Mary Ainsworth；理论贡献: 依恋类型影响自我安抚能力；影响: 不安全依恋与安抚困难'
  source: 02-Mind-Psychology/psychology/self-regulation/self-soothing/Self_Soothing_Techniques.md
  section: 历史发展表 (Historical Development)
- type: concept
  question: 安全型的核心要点是什么？
  answer: '自我安抚能力: 强；典型表现: 能有效自我安抚,也能寻求他人支持；神经生理学: 平衡的自主神经系统；治疗重点: 维护和深化'
  source: 02-Mind-Psychology/psychology/self-regulation/self-soothing/Self_Soothing_Techniques.md
  section: 自我安抚的依恋基础
- type: concept
  question: 焦虑型的核心要点是什么？
  answer: '自我安抚能力: 困难；典型表现: 过度依赖他人安抚,难以自我安抚；神经生理学: 交感神经过度激活；治疗重点: 建立内在安全感'
  source: 02-Mind-Psychology/psychology/self-regulation/self-soothing/Self_Soothing_Techniques.md
  section: 自我安抚的依恋基础
