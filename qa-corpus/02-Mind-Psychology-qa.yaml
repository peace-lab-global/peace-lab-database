  question: 财产分割的核心要点是什么？
  answer: '中国《民法典》: 照顾无过错方；美国各州法律: 社区财产州50/50；欧盟国家法律: 各国差异大；日本《民法》: 贡献比例制'
  source: 02-Mind-Psychology/relationships/legal-ethics/Relationship_Law_Ethics_Deep_Dive.md
  section: 亲密关系的法律维度
