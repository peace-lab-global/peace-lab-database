  question: 什么是1. 三种 Obligatory Prayer 完整操作指南？
  answer: 巴哈伊信仰规定，年满十五岁的信徒每日须履行一次义务祈祷（Obligatory Prayer）。共有三种形式可选：短篇、中篇与长篇。选择其中一种后应在固定时间内持续使用，不宜频繁更换。
  source: 02-Mind-Psychology/meditation/bahai-meditation/Bahai_Practical_Guide.md
  section: 1. 三种 Obligatory Prayer 完整操作指南
- type: concept
  question: 时间要求的核心要点是什么？
  answer: '短篇义务祈祷: 日出前与日落后之间任意时间；中篇义务祈祷: 日出前、正午、日落后三个时段；长篇义务祈祷: 24小时内任意时间'
  source: 02-Mind-Psychology/meditation/bahai-meditation/Bahai_Practical_Guide.md
  section: 1.1 三种祈祷对比总览
- type: concept
  question: 时长的核心要点是什么？
  answer: '短篇义务祈祷: 约1-2分钟；中篇义务祈祷: 约5-10分钟；长篇义务祈祷: 约15-25分钟'
  source: 02-Mind-Psychology/meditation/bahai-meditation/Bahai_Practical_Guide.md
  section: 1.1 三种祈祷对比总览
- type: concept
  question: 身体姿态的核心要点是什么？
  answer: '短篇义务祈祷: 站立，面向吉卜拉（巴哈欧拉陵寝方向）；中篇义务祈祷: 站立、鞠躬、跪拜、叩首；长篇义务祈祷: 跪拜、叩首、坐姿'
  source: 02-Mind-Psychology/meditation/bahai-meditation/Bahai_Practical_Guide.md
  section: 1.1 三种祈祷对比总览
- type: concept
  question: 准备的核心要点是什么？
  answer: '操作: 净洗手脸；面向吉卜拉；细节说明: 吉卜拉方向：从各地指向以色列阿卡（Akka）的巴哈欧拉陵寝。可使用指南针或手机应用确认'
  source: 02-Mind-Psychology/meditation/bahai-meditation/Bahai_Practical_Guide.md
  section: 1.2 短篇义务祈祷（Short Obligatory Prayer）
- type: concept
  question: 姿态的核心要点是什么？
  answer: '操作: 站立，双脚自然分开，双手可交叠于腹部或自然下垂；细节说明: 保持脊柱挺直但不僵硬；目光可微闭或平视前方'
  source: 02-Mind-Psychology/meditation/bahai-meditation/Bahai_Practical_Guide.md
  section: 1.2 短篇义务祈祷（Short Obligatory Prayer）
- type: concept
  question: 念诵的核心要点是什么？
  answer: '操作: 以阿拉伯语原文或翻译语念诵短篇祈祷文；细节说明: 建议背诵原文以达致最大效力；初学时可对照文本'
  source: 02-Mind-Psychology/meditation/bahai-meditation/Bahai_Practical_Guide.md
