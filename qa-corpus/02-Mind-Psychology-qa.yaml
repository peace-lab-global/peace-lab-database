  question: 什么是概述 (Overview)？
  answer: 丹·哈里斯（Dan Harris，1971-）是美国ABC新闻前主播、畅销书作家、冥想APP "10% Happier" 的创始人。他的独特价值在于以一个"持怀疑态度的新闻人"的身份进入冥想世界，用毫不矫饰的、自嘲式的语言将冥想介绍给那些对"灵性"话语持抵触态度的人群——"怀疑论者的冥想布道者"。
