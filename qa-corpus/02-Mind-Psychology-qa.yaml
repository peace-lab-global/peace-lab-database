  question: 七金成分的核心要点是什么？
  answer: '关键细节 (Key Details): 金(太阳)、银(月亮)、汞(水星)、铜(金星)、铁(火星)、锡(木星)、铅(土星)。；疗愈功能与机制: 代表行星能量的整合；产生极其丰富的多层泛音。；判定标准/专家建议: 只有手工锻造的七金钵才能产生真正的长效共振与不规则波形（更有利于大脑放松）。；专业视角
    (Professional Perspective): 材料中的杂质比率决定了音色的沉稳度。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Vibrational_Instruments.md
  section: 'Singing Bowls: Composition & Resonance (佛音钵：材质、频率与能量映射表)'
- type: concept
  question: 音阶与脉轮的核心要点是什么？
  answer: '关键细节 (Key Details): C (海底轮)、D (生殖轮)、E (太阳轮)、F (心轮)、G (喉轮)、A (眉心轮)、B (顶轮)。；疗愈功能与机制: 通过特定频率实现能量中心的“共振调律”。；判定标准/专家建议:
    疗愈师需根据个体的能量阻塞部位选择相应频率。；专业视角 (Professional Perspective): 物理学上，这是波的相干性原理的应用。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Vibrational_Instruments.md
  section: 'Singing Bowls: Composition & Resonance (佛音钵：材质、频率与能量映射表)'
- type: concept
  question: 物理震频 (Hz)的核心要点是什么？
  answer: '关键细节 (Key Details): 低频 (30-100Hz) 深沉下沉；高频 (200Hz+) 清脆上扬。；疗愈功能与机制: 低频促进组织深层松弛；高频提升意识清晰度。；判定标准/专家建议: 优质钵的泛音列应延伸数分钟不退。；专业视角
    (Professional Perspective): 频率的稳定性（无漂移）是顶级钵的标志。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Vibrational_Instruments.md
  section: 'Singing Bowls: Composition & Resonance (佛音钵：材质、频率与能量映射表)'
- type: concept
  question: 钵上身法的核心要点是什么？
  answer: '技术描述: 直接将钵放置在脊柱、腹部或脚底进行敲击。；应用目的: 直接通过骨传导将振动深入脏腑与骨骼。；操作要领: 需控制敲击力度，观察客户的躯体反应（如颤动）。；专业建议: 处理深层物理疼痛与创伤记忆的高效手段。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Vibrational_Instruments.md
  section: Therapeutic Implementation of Singing Bowls (钵疗临床操作详表)
- type: concept
  question: 环绕音场的核心要点是什么？
  answer: '技术描述: 多钵围绕客户身体形成特定的几何阵法。；应用目的: 构建一个全包围式的共振胶囊（Vibrational Capsule）。；操作要领: 保证声音从四面八方平坦涌入，无死角。；专业建议: 极易引导客户进入 Theta/Delta
    深层脑波态。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Vibrational_Instruments.md
  section: Therapeutic Implementation of Singing Bowls (钵疗临床操作详表)
- type: concept
  question: 水钵疗法的核心要点是什么？
  answer: '技术描述: 在钵中注水，敲击产生细密水花并饮用或涂抹。；应用目的: 利用水的记忆性与微观结构重排进行宣泄。；操作要领: 观察水花的波纹样式（曼陀罗图形）。；专业建议: 研究表明，这种振动能将水分子的微簇结构优化。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Vibrational_Instruments.md
  section: Therapeutic Implementation of Singing Bowls (钵疗临床操作详表)
- type: concept
  question: 全息声场的核心要点是什么？
  answer: '详细描述 (Description): 产生几乎覆盖整个人耳听域的频谱分布。；心理/生理效应: 产生一种“淹没感”，强制关闭分析性思维（大脑过载后的自动放松）。；专业视角 (Professional Perspective):
    铜锣浴是目前已知最强的“声音洗涤”技术之一。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Vibrational_Instruments.md
  section: 'Gong Therapy: The Cosmic Sound Current (铜锣疗法：全频谱振动表)'
- type: concept
  question: 白噪音效应的核心要点是什么？
  answer: '详细描述 (Description): 密集的频率交织形成类似白噪音的质感。；心理/生理效应: 掩盖内部杂念；缓解耳鸣；稳定神经系统。；专业视角 (Professional Perspective): 具有显著的降压与镇痛效果。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Vibrational_Instruments.md
  section: 'Gong Therapy: The Cosmic Sound Current (铜锣疗法：全频谱振动表)'
- type: concept
  question: 定义与起源的核心要点是什么？
  answer: '关键细节 (Key Details): 由挪威教育家 Olav Skille 于 1968 年创立；将低频正弦波 (30-120Hz) 通过专用设备直接传递至身体组织。；科学机制: 低频声波通过物理振动直接作用于肌肉、筋膜与内脏，产生深层组织按摩效应。；与其他声音疗法的区别:
    区别于空气传导的声浴——VAT 通过床/椅/垫的表面振动实现"体感声音" (Somatosound)。；专业视角 (Professional Perspective): VAT 是目前所有声音疗愈技术中循证等级最高的方法之一，拥有超过
    50 年的临床研究积累。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Vibroacoustic_Therapy.md
  section: 'Vibroacoustic Therapy: Foundations & Evidence (振动声学疗法基础与循证证据表)'
- type: concept
  question: 核心设备的核心要点是什么？
  answer: '关键细节 (Key Details): Vibroacoustic 床/椅/垫：内置低频换能器 (Transducer) 的专用设备。；科学机制: 换能器将电信号转换为机械振动，通过接触面均匀传递至身体。；与其他声音疗法的区别:
    普通音响系统无法产生足够振幅的低频体感振动。；专业视角 (Professional Perspective): 专业级 VAT 设备（如 NextErgo, Sound Massage 床）价格 ¥5,000-50,000；简易版为振动垫/背心。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Vibroacoustic_Therapy.md
  section: 'Vibroacoustic Therapy: Foundations & Evidence (振动声学疗法基础与循证证据表)'
- type: concept
  question: 频率窗口的核心要点是什么？
  answer: '关键细节 (Key Details): 治疗核心频率范围：40-80Hz（低频振动）；120Hz 以上逐渐转为听觉感知为主。；科学机制: 40-80Hz 的机械振动与人体骨骼肌的固有频率接近，产生最佳共振吸收。；与其他声音疗法的区别:
    颂钵的振动频率范围更广但振幅不可控；VAT 可精确调控频率与振幅。；专业视角 (Professional Perspective): 不同频率靶向不同组织：40-50Hz 靶向深层肌肉，60-80Hz 靶向浅表筋膜。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Vibroacoustic_Therapy.md
  section: 'Vibroacoustic Therapy: Foundations & Evidence (振动声学疗法基础与循证证据表)'
- type: concept
  question: 慢性疼痛的核心要点是什么？
  answer: '频率参数: 40-60Hz 持续正弦波 + 脉冲式振幅调制。；治疗方案: 每次 20-30 分钟；每周 2-3 次；连续 4-8 周。；临床证据: Wigram (1996) 系统研究显示 VAT 显著降低慢性腰背痛 VAS
    评分。；核心机制: 振动激活 Pacini 小体→脊髓闸门关闭→疼痛信号抑制；同时促进内啡肽释放。；专业视角 (Professional Perspective): VAT 对纤维肌痛 (Fibromyalgia) 的效果尤为突出——可能是由于其同时作用于肌肉与中枢敏化。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Vibroacoustic_Therapy.md
  section: Clinical Evidence & Applications (临床证据与应用表)
- type: concept
  question: 帕金森病的核心要点是什么？
  answer: '频率参数: 40Hz 持续振动。；治疗方案: 每次 30 分钟；每周 3 次。；临床证据: 初步研究显示 VAT 可改善帕金森患者的步态冻结与震颤。；核心机制: 40Hz 振动可能通过节奏性刺激基底节-运动皮层环路，补偿多巴胺信号的缺失。；专业视角
    (Professional Perspective): 与 40Hz Gamma 脑波刺激形成互补——参见 [Brainwave Entrainment](Sensory_Brainwave_Entrainment.md)。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Vibroacoustic_Therapy.md
  section: Clinical Evidence & Applications (临床证据与应用表)
- type: concept
  question: 脑性瘫痪 (CP)的核心要点是什么？
  answer: '频率参数: 40-60Hz 混合频率扫描。；治疗方案: 每次 20 分钟；每周 2 次。；临床证据: Skille & Wigram 的多项研究证实 VAT 改善 CP 患儿的肌张力与运动范围。；核心机制: 低频振动降低肌梭
    (Muscle Spindle) 的过度放电，缓解痉挛状态。；专业视角 (Professional Perspective): 儿科 VAT 是该领域最成熟的应用方向——适合 3 岁以上儿童。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Vibroacoustic_Therapy.md
  section: Clinical Evidence & Applications (临床证据与应用表)
- type: concept
  question: 适应期 (Intro)的核心要点是什么？
  answer: '频率/参数: 40Hz，低振幅 (30%)；时长: 3-5 分钟；目的: 让身体适应振动感觉，降低防御反应。；监测指标: 客户主观舒适度；肌肉张力触诊。；专业视角 (Professional Perspective): 首次体验者可能对振动感到不安——需提前说明"振动感"并确保客户可随时终止。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Vibroacoustic_Therapy.md
  section: VAT Session Protocol Design (VAT 疗程设计方案表)
- type: concept
  question: 深入期 (Deep)的核心要点是什么？
  answer: '频率/参数: 40-80Hz 频率扫描，中振幅 (50-70%)；时长: 10-15 分钟；目的: 核心治疗窗口；频率扫描覆盖不同组织深度。；监测指标: 心率、呼吸频率、肌电图 (EMG)。；专业视角 (Professional
    Perspective): 频率扫描优于固定频率——不同组织对特定频率有不同的共振响应峰。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Vibroacoustic_Therapy.md
  section: VAT Session Protocol Design (VAT 疗程设计方案表)
- type: concept
  question: 横膈膜的核心要点是什么？
  answer: '英文名: Diaphragm；功能描述: 呼吸的原动力。；心理/生理影响: 控制唤醒水平；情绪稳定的底座。；专业视角 (Professional Perspective): 迷走神经穿过横膈膜裂孔，深长呼吸是直接的迷走神经物理刺激。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Vocal_Therapy.md
  section: Anatomy of the Therapeutic Voice (疗愈声纹：解剖与神经关联表)
- type: concept
  question: 共鸣腔的核心要点是什么？
  answer: '英文名: Resonance Chambers；功能描述: 颅腔、鼻腔、咽腔、胸腔。；心理/生理影响: 建立自我表现力与空间感。；专业视角 (Professional Perspective): 不同位置的谐振能通过骨导反馈改善特定的内部感受。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Vocal_Therapy.md
  section: Anatomy of the Therapeutic Voice (疗愈声纹：解剖与神经关联表)
- type: concept
  question: 声带 (喉部)的核心要点是什么？
  answer: '英文名: Vocal Folds；功能描述: 声音产生的核心。；心理/生理影响: 表达的“守门人”；处理压抑感。；专业视角 (Professional Perspective): 在生物学上是极度敏感的压力反应器，紧张的情绪会瞬间体现为喉部痉挛。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Vocal_Therapy.md
  section: Anatomy of the Therapeutic Voice (疗愈声纹：解剖与神经关联表)
- type: concept
  question: 原始发声的核心要点是什么？
  answer: '技术描述: Primal Sounding；心理功能: 类似于婴儿的自发叫喊、呻吟或长啸。；生理效应: 释放被冻结的创伤能量。；专业视角 (Professional Perspective): 直接激活脊髓丘脑束，促进内啡肽分泌。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Vocal_Therapy.md
  section: Psychological Release Through Sound (声波心理释放技术表)
- type: concept
  question: 谐波唱法的核心要点是什么？
  answer: '技术描述: Overtone Singing；心理功能: 在一个基音上同时发出多个高频率泛音。；生理效应: 产生超然感；提升认知清晰度。；专业视角 (Professional Perspective): 丰富的大脑皮层听觉刺激，诱导
    Alpha 和 Theta 波。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Vocal_Therapy.md
  section: Psychological Release Through Sound (声波心理释放技术表)
- type: concept
  question: 情感回旋的核心要点是什么？
  answer: '技术描述: Vocal Circling；心理功能: 多人围绕，通过声波的起伏进行情感共振。；生理效应: 修复社会孤立；建立归属感。；专业视角 (Professional Perspective): 通过声音进行“共同调节”
    (Co-regulation)。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Vocal_Therapy.md
  section: Psychological Release Through Sound (声波心理释放技术表)
- type: concept
  question: 吠陀吟诵的核心要点是什么？
  answer: '核心特征 (Features): Vedic Chanting；关键频率与模式: 严格控制的音高 (Svara) 与重音。；心理核心指向: 秩序感、神圣连接。；专业视角 (Professional Perspective):
    极度精准的韵律感能训练大脑的“预测能力”，减少不安全感。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Vocal_Therapy.md
  section: Sacred & Cultural Chanting Traditions (全球歌唱/吟诵传统疗愈价值表)
- type: concept
  question: 格列高利圣咏的核心要点是什么？
  answer: '核心特征 (Features): Gregorian Chant；关键频率与模式: 单旋律、自由节奏、中世纪音阶。；心理核心指向: 安稳、永恒、去自我化。；专业视角 (Professional Perspective):
    具有典型的减慢呼吸和降低心率的效果，产生“大洋感”或融合感。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Vocal_Therapy.md
  section: Sacred & Cultural Chanting Traditions (全球歌唱/吟诵传统疗愈价值表)
- type: concept
  question: 基础协议** (Pennebaker)的核心要点是什么？
  answer: '操作指南 (Operational Guide): 连续4天，每天20分钟，写下最深层的痛苦。；核心规则 (Rules): 停止自我审查；不纠结语法；保持流畅。；疗愈机制: 叙事整合；情感标记；增强免疫功能。；专业视角 (Professional
    Perspective): 将零碎的创伤记忆转化为连贯的叙事。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Writing_Journaling.md
  section: Expressive Writing Protocols (表达性书写流程表)
- type: concept
  question: 自传体改写的核心要点是什么？
  answer: '操作指南 (Operational Guide): 重新编写一段不愉快经历的结局，加入新的资源。；核心规则 (Rules): 保持现实感，同时加入象征性的支持。；疗愈机制: 重塑自我效能感；认知的重新评估。；专业视角 (Professional
    Perspective): 通过改变过去故事的“滤镜”来改变现状。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Writing_Journaling.md
  section: Expressive Writing Protocols (表达性书写流程表)
- type: concept
  question: 角色置换书写的核心要点是什么？
  answer: '操作指南 (Operational Guide): 站在伤害过你的人、或未来的你、或智者的视角写信给自己。；核心规则 (Rules): 深度移情观察。；疗愈机制: 认知解离；视角的广度扩展。；专业视角 (Professional
    Perspective): 打破受害者叙事的“单一视角”陷阱。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Writing_Journaling.md
  section: Expressive Writing Protocols (表达性书写流程表)
- type: concept
  question: 情绪追踪日记的核心要点是什么？
  answer: '英文名称: Mood Logs；核心结构 (Structure): 记录日期、事件、情绪及其 0-10 分值。；适用心理问题: 双相、抑郁、广泛性焦虑。；备注: 识别情绪周期的“气象图”。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Writing_Journaling.md
  section: Types of Therapeutic Journaling (治疗性日记分类详表)
- type: concept
  question: 资源/感恩日记的核心要点是什么？
  answer: '英文名称: Gratitude Journal；核心结构 (Structure): 每天5件微小好事及其对自我的意义。；适用心理问题: 低自尊、消极偏见。；备注: 强制训练大脑的“寻找美好”通路。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Writing_Journaling.md
  section: Types of Therapeutic Journaling (治疗性日记分类详表)
- type: concept
  question: 子弹日记 (疗愈版)的核心要点是什么？
  answer: '英文名称: Bullet Journaling；核心结构 (Structure): 利用符号标记当日的焦虑、完成感与灵感。；适用心理问题: ADHD、执行功能障碍。；备注: 提供外部支架，缓解认知负荷。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Writing_Journaling.md
  section: Types of Therapeutic Journaling (治疗性日记分类详表)
- type: concept
  question: 自我宽恕的核心要点是什么？
  answer: '触发句式 (Prompts): “我原谅自己曾经...，因为当时的我也在努力生存。”；挖掘深度: 情绪/深层。；预期效果: 减轻病理性愧疚。；专业视角: 必须基于对当时局限性的真实识别。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Writing_Journaling.md
  section: 'Scriptotherapy: The Power of Specific Prompts (脚本疗法：高效引导语表)'
- type: concept
  question: 愤怒宣泄的核心要点是什么？
  answer: '触发句式 (Prompts): “我最恨的是...，因为这侵犯了我的...。”；挖掘深度: 本能/中等。；预期效果: 处理边界缺失带来的被动攻击。；专业视角: 将愤怒能量“视觉化”后有助于释放。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Writing_Journaling.md
  section: 'Scriptotherapy: The Power of Specific Prompts (脚本疗法：高效引导语表)'
- type: concept
  question: 几何型** (Cubic)的核心要点是什么？
  answer: '特征 (Features): 直线、方块、精确感。；心理调性 (Tone): 秩序、稳定、掌控。；适用临床诉求: 缓解强迫症状；建立虚弱自我的结构。；专业视角 (Professional Perspective): 逻辑脑的参与，帮助情感平复。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Zentangle_Art.md
  section: Zentangle Pattern Archetypes (缠绕画图样原型分类表)
- type: concept
  question: 有机型** (Organic)的核心要点是什么？
  answer: '特征 (Features): 曲线、叶片、星形、自发延伸。；心理调性 (Tone): 流动、生长、自然连接。；适用临床诉求: 增强创造力；处理生命停滞感。；专业视角 (Professional Perspective):
    模拟自然界的非线性增长逻辑。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Zentangle_Art.md
  section: Zentangle Pattern Archetypes (缠绕画图样原型分类表)
- type: concept
  question: 边界型** (Border)的核心要点是什么？
  answer: '特征 (Features): 带状、延伸、重复。；心理调性 (Tone): 连贯性、安全支撑。；适用临床诉求: 处理分离焦虑；增强关系稳定性。；专业视角 (Professional Perspective): 建立一种持续不断的时空感。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Zentangle_Art.md
  section: Zentangle Pattern Archetypes (缠绕画图样原型分类表)
- type: concept
  question: 非语言宣泄的核心要点是什么？
  answer: '现象描述 (Phenomena): 通过线条的粗细、疏密表达无法言说的情绪。；神经/认知科学对应: 右脑半球的深层激活。；疗愈功能: 开启由于语言匮乏而被阻断的治愈。；备注: 特别适合创伤后的“失语”期。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Zentangle_Art.md
  section: Psychological Mechanisms of Zentangle (缠绕画的心理机制映射表)
- type: concept
  question: 错误容忍度的核心要点是什么？
  answer: '现象描述 (Phenomena): “缠绕画没有错误”理念。；神经/认知科学对应: 降低完美主义倾向。；疗愈功能: 减少由于自我评判引起的焦虑。；备注: 将“意外”重构为“设计的机会”。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Zentangle_Art.md
  section: Psychological Mechanisms of Zentangle (缠绕画的心理机制映射表)
- type: concept
  question: 小切口进入的核心要点是什么？
  answer: '现象描述 (Phenomena): 3.5英寸的小纸砖设计。；神经/认知科学对应: 减少完成任务的任务压力。；疗愈功能: 提升自我效能感。；备注: 与“微习惯”策略一致。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Zentangle_Art.md
  section: Psychological Mechanisms of Zentangle (缠绕画的心理机制映射表)
- type: concept
  question: 慢性疼痛患者的核心要点是什么？
  answer: '核心实施方案 (Protocol): 每日两次 15 分钟填充。；预期效果 (Effect): 疼痛带宽感降低（门控理论）。；专家评价: 创造性的专注产生天然的内源性阿片类物质。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Zentangle_Art.md
  section: Clinical Implementation & Target Groups (临床实施与目标人群表)
- type: concept
  question: 临终关怀/安宁疗护的核心要点是什么？
  answer: '核心实施方案 (Protocol): 感恩步骤的深化与共同创作。；预期效果 (Effect): 缓解死亡恐惧；留下生命印记。；专家评价: 通过艺术创作实现生命的叙事完结感。'
  source: 02-Mind-Psychology/therapy/sensory/Sensory_Zentangle_Art.md
  section: Clinical Implementation & Target Groups (临床实施与目标人群表)
