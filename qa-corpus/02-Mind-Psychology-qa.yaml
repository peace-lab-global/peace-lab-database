  section: 1.3 法律与伦理框架
- type: concept
  question: 日1的核心要点是什么？
  answer: '时段: 晨；活动/实践: 坐禅20min；觉察记录: 息浅思多。；洞见/情绪: 初平静涌。；体感/挑战: 腿微麻。；自助反思: 职压初释。；调整: 加垫。；专业视角 (Professional Perspective):
    初期 "Monkey Mind" 是正常的，反映了默认模式网络的惯性。；引用来源 (Citation): Suzuki, S. (1970).'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Advanced.md
  section: 禅修退修日记模板表
- type: concept
  question: 日1的核心要点是什么？
  answer: '时段: 午；活动/实践: 行走30min；觉察记录: 步环境融。；洞见/情绪: 连接感升。；体感/挑战: 热出汗。；自助反思: 日融入启。；调整: 水多。；专业视角 (Professional Perspective):
    动态冥想促进身心同步，缓解久坐带来的感官迟钝。；引用来源 (Citation): Kabat-Zinn (1990).'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Advanced.md
  section: 禅修退修日记模板表
- type: concept
  question: 日1的核心要点是什么？
  answer: '时段: 晚；活动/实践: 公案思15min；觉察记录: 谜绕脑。；洞见/情绪: 顿一闪。；体感/挑战: 头微疼。；自助反思: 决思移。；调整: 早睡。；专业视角 (Professional Perspective): 认知负荷增加可能导致短暂不适，是突破思维定势的前兆。；引用来源
    (Citation): Kapleau, P. (1965).'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Advanced.md
  section: 禅修退修日记模板表
- type: concept
  question: 赵州狗子的核心要点是什么？
  answer: '描述: “狗有佛性？无！”；思步骤: 1. 坐思佛性；2. 觉“无”深；3. 超有无；4. 住。；预期顿悟: 无分别本。；益处: 释二元，决清。；自助深思: 日默“无”。；注意事项: 语境；无字析。；专业视角 (Professional
    Perspective): 打破二元对立思维 (Binary Thinking)，超越逻辑分类，进入非概念性觉察。；引用来源 (Citation): Mumonkan (Gateless Gate), Case 1.'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Advanced.md
  section: 禅修高级公案表
- type: concept
  question: 牛过窗棂的核心要点是什么？
  answer: '描述: “牛身过，角尾何不？”；思步骤: 1. 观整体；2. 觉执余；3. 放角尾；4. 全过。；预期顿悟: 释残留。；益处: 过去疗，职释。；自助深思: 回忆坐放。；注意事项: 喻深；渐。；专业视角 (Professional
    Perspective): 隐喻执念 (Attachment)，探讨为何在大部分问题解决后仍滞留于小细节。；引用来源 (Citation): Mumonkan, Case 38.'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Advanced.md
  section: 禅修高级公案表
- type: concept
  question: 风动幡动的核心要点是什么？
  answer: '描述: “非风非幡，心动。”；思步骤: 1. 观动源；2. 觉心主；3. 内转；4. 静心。；预期顿悟: 心控实。；益处: 外压内化。；自助深思: 职压观心。；注意事项: 主观；应用。；专业视角 (Professional
    Perspective): 根本的建构主义观点 (Constructivism) —— 我们构建了自己的现实体验。；引用来源 (Citation): Platform Sutra of Huineng.'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Advanced.md
  section: 禅修高级公案表
- type: concept
  question: 急性创伤的核心要点是什么？
  answer: '描述: 单次冲击。；职场关联: 职场意外。；疗愈方向: 稳，处。；自助注意: 息，求。；专业视角 (Professional Perspective): 正常的应激反应，如未处理可能发展为 PTSD。；引用来源 (Citation):
    DSM-5 (2013).'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Advanced.md
  section: 心理学创伤与障碍表
- type: concept
  question: 慢性创伤的核心要点是什么？
  answer: '描述: 长期累。；职场关联: 职场霸凌。；疗愈方向: 破圈，复。；自助注意: 界，离。；专业视角 (Professional Perspective): 累积效应可能比单一事件更具破坏性（C-PTSD）。；引用来源 (Citation):
    Herman, J. L. (1992).'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Advanced.md
  section: 心理学创伤与障碍表
- type: concept
  question: N1 入睡期的核心要点是什么？
  answer: '英文: Light Sleep；脑电特征: θ波（4-7Hz）；功能: 过渡阶段；占比: 5%'
  source: 02-Mind-Psychology/meditation/overview/Meditation_And_Sleep.md
  section: 1.1 睡眠结构概述
- type: concept
  question: N2 浅睡期的核心要点是什么？
  answer: '英文: Stable Sleep；脑电特征: 睡眠纺锤波、K复合波；功能: 记忆巩固；占比: 45-55%'
  source: 02-Mind-Psychology/meditation/overview/Meditation_And_Sleep.md
  section: 1.1 睡眠结构概述
- type: concept
  question: N3 深睡期的核心要点是什么？
  answer: '英文: Deep/SWS；脑电特征: δ波（0.5-2Hz）；功能: 身体修复、免疫调节；占比: 15-25%'
  source: 02-Mind-Psychology/meditation/overview/Meditation_And_Sleep.md
  section: 1.1 睡眠结构概述
- type: concept
  question: 易感因素的核心要点是什么？
  answer: '英文: Predisposing；描述: 个体基础易感性；示例: 高觉醒特质、焦虑人格、家族史'
  source: 02-Mind-Psychology/meditation/overview/Meditation_And_Sleep.md
  section: 1.3 失眠的3P模型
- type: concept
  question: 促发因素的核心要点是什么？
  answer: '英文: Precipitating；描述: 触发失眠的事件；示例: 生活压力、疾病、环境变化'
  source: 02-Mind-Psychology/meditation/overview/Meditation_And_Sleep.md
  section: 1.3 失眠的3P模型
- type: concept
  question: 维持因素的核心要点是什么？
  answer: '英文: Perpetuating；描述: 使失眠慢性化的行为/认知；示例: 补觉、卧床时间过长、灾难化思维'
  source: 02-Mind-Psychology/meditation/overview/Meditation_And_Sleep.md
  section: 1.3 失眠的3P模型
- type: concept
  question: 蓝斑-去甲肾上腺素系统的核心要点是什么？
  answer: '冥想影响: 降低基线活性；睡眠相关效应: 减少过度觉醒；研究证据: Jacobs et al., 2004'
  source: 02-Mind-Psychology/meditation/overview/Meditation_And_Sleep.md
  section: 2.1 冥想对觉醒系统的调节
- type: concept
  question: HPA轴皮质醇节律的核心要点是什么？
  answer: '冥想影响: 恢复正常昼夜节律；睡眠相关效应: 改善入睡困难；研究证据: Brand et al., 2012'
  source: 02-Mind-Psychology/meditation/overview/Meditation_And_Sleep.md
  section: 2.1 冥想对觉醒系统的调节
- type: concept
  question: 高管压力管理的核心要点是什么？
  answer: '禅修/冥想干预: 全天候觉察 (Mindful Leadership)；实践步骤: 晨起5min坐禅；决策前3次深呼吸；晚间反思。；结果/转变: 反应性降低，决策质量提升。；职场益处: 提升领导韧性，管理情绪爆发；建立冷静威信。；专业视角
    (Professional Perspective): 专注于"觉察空间" (Gap between stimulus and response)。；引用来源 (Citation): Frankl, V. E. / Goleman, D.'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Applications.md
  section: Workplace Meditation Cases (冥想职场案例研究表)
- type: concept
  question: 团队冲突化解的核心要点是什么？
  answer: '禅修/冥想干预: 慈心禅 (Metta for Teams)；实践步骤: 团队成员在周会前进行3min互祝安康。；结果/转变: 同理心增强，防御性降低。；职场益处: 改善团队气氛，提升协作效率；减少人际摩擦。；专业视角 (Professional
    Perspective): 激活社会连接奖赏系统，减少外群偏见。；引用来源 (Citation): Salzberg, S. / Hutcherson, C. (2008).'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Applications.md
  section: Workplace Meditation Cases (冥想职场案例研究表)
- type: concept
  question: 创意枯竭突破的核心要点是什么？
  answer: '禅修/冥想干预: 公案坐 (Koan for Creativity)；实践步骤: 带着一个逻辑无法解决的难题静坐。；结果/转变: 打破线性思维，产生顿悟。；职场益处: 获得新视角，解决长期陷阱；激发创新潜力。；专业视角 (Professional
    Perspective): 迫使系统一与系统二之外的直觉加工介入。；引用来源 (Citation): Csikszentmihalyi, M. (1990).'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Applications.md
  section: Workplace Meditation Cases (冥想职场案例研究表)
- type: concept
  question: 什么是结论与展望？
  answer: 职场冥想应用已从边缘实践发展为主流管理工具。随着神经科学研究的深入和数字化技术的发展，未来的职场冥想将更加个性化、智能化和系统化。组织和个人都应该积极拥抱这一趋势，通过科学的冥想实践来提升工作效能和生活质量。
  source: 02-Mind-Psychology/meditation/overview/Meditation_Applications.md
  section: 结论与展望
