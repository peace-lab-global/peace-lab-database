  source: 02-Mind-Psychology/relationships/prevention/Prevention_Intervention_Guide.md
  section: 关系层面强化策略
- type: concept
  question: 沟通训练的核心要点是什么？
  answer: '核心内容: 说话者-倾听者技术(Speaker-Listener Technique)；技能目标: 清晰表达和积极倾听；教学方法: 角色扮演、录像反馈；效果证据: Markman et al. (1993)'
  source: 02-Mind-Psychology/relationships/prevention/Relationship_Prevention_Programs.md
