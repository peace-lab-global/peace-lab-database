  question: 约会的核心要点是什么？
  answer: '英文名 (English Term): Dating；原始语言/术语 (Original Language): 英: Courtship 的现代形式；精确定义 (Technical Definition): 两个个体为了探索潜在浪漫关系而进行的有目的性的社交互动过程。；区分与备注
    (Differentiation & Notes): 不同于一般社交(纯友谊)和正式求爱(明确结婚意图)；介于朋友和恋人之间。；专业视角 (Professional Perspective): 约会是现代社会恋爱关系形成的主要途径，具有阶段性、试探性和双向选择特征。'
  source: 02-Mind-Psychology/relationships/dating/Dating_Psychology_Overview.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 人际吸引的核心要点是什么？
  answer: '英文名 (English Term): Interpersonal Attraction；原始语言/术语 (Original Language): 拉: *Attrahere*(拉向)；精确定义 (Technical Definition):
    个体对另一个体产生接近、了解和建立关系愿望的心理倾向和行为驱动力。；区分与备注 (Differentiation & Notes): 包括物理吸引、社会吸引和任务吸引三个维度；是约会的起点和基础。；专业视角 (Professional
    Perspective): 吸引力遵循"接近-熟悉-好感"的心理规律，受生物、心理、社会多重因素影响。'
  source: 02-Mind-Psychology/relationships/dating/Dating_Psychology_Overview.md
