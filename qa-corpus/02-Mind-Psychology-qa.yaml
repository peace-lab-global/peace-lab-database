  question: Headspace的核心要点是什么？
  answer: '类型: App；内容描述: 结构化冥想课程。；科学验证/专业评价: **强证据支持**：25+发表研究。一项RCT显示使用10天可减少压力14% (Economides, 2018)。；职场应用: 每日"Focus"模块提升工作专注。；用户评价:
    4.9/5 (App Store)。；引用来源: Champion, L., et al. (2018). *PLoS One*.；网页地址: [Headspace Science](https://www.headspace.com/science)'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/Media_Resources_Overview.md
  section: 媒体资源推荐表
- type: concept
  question: Calm的核心要点是什么？
  answer: '类型: App；内容描述: 睡眠故事与呼吸。；科学验证/专业评价: **中等证据**：以改善睡眠质量著称。针对睡眠障碍的RCT显示显著改善 (Huberty, 2021)。；职场应用: 午休"Power Nap"或睡前使用。；用户评价:
    4.8/5，"Sleep Stories"最受欢迎。；引用来源: Huberty, J., et al. (2021). *PLoS One*.；网页地址: [Calm Research](https://www.calm.com/blog/research)'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/Media_Resources_Overview.md
  section: 媒体资源推荐表
- type: concept
  question: Waking Up的核心要点是什么？
  answer: '类型: App；内容描述: 哲学导向的冥想。；科学验证/专业评价: **理论深度**：基于Sam Harris的神经科学背景，强调"无我" (Non-duality) 的直接体验。；职场应用: 适合理性思考者解决职场存在主义焦虑。；用户评价:
    "改变人生"的深度评价。；引用来源: Harris, S. (2014). *Waking Up*.；网页地址: [Waking Up](https://wakingup.com/)'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/Media_Resources_Overview.md
  section: 媒体资源推荐表
