  question: 个人主义文化的核心要点是什么？
  answer: '独处观: 独处是正常、健康的；是自我发展的必要条件；典型社会: 北欧、北美、澳大利亚；对个人的影响: 高独处接受度；但孤独率不低'
  source: 02-Mind-Psychology/psychology/social/solitude/Solitude_Sociology.md
  section: 1.1 独处不是普世概念
- type: concept
  question: 集体主义文化的核心要点是什么？
  answer: '独处观: 独处可能被视为异常、危险或自私；典型社会: 东亚、拉美、非洲传统社会；对个人的影响: 低独处接受度；独处常伴随羞耻'
  source: 02-Mind-Psychology/psychology/social/solitude/Solitude_Sociology.md
  section: 1.1 独处不是普世概念
- type: concept
  question: 灵性传统的核心要点是什么？
  answer: '独处观: 独处是神圣的、转化的、通向智慧的；典型社会: 佛教、道教、基督教修道传统、苏菲；对个人的影响: 独处被仪式化、崇高化'
  source: 02-Mind-Psychology/psychology/social/solitude/Solitude_Sociology.md
  section: 1.1 独处不是普世概念
- type: concept
  question: 日本的核心要点是什么？
  answer: '允许的独处场景: 茶道、花道、自然观赏(侘寂)；禁止/羞耻的独处: 长期独自生活(引きこもり污名)；仪式化独处: 禅宗坐禅、遍路(朝圣)'
  source: 02-Mind-Psychology/psychology/social/solitude/Solitude_Sociology.md
  section: 1.2 文化脚本：何时、何地、如何独处
- type: concept
  question: 中国的核心要点是什么？
  answer: '允许的独处场景: 书法、古琴、山水游览；禁止/羞耻的独处: "不合群"、"没有朋友"；仪式化独处: 闭关、辟谷、隐居'
  source: 02-Mind-Psychology/psychology/social/solitude/Solitude_Sociology.md
  section: 1.2 文化脚本：何时、何地、如何独处
- type: concept
  question: 印度的核心要点是什么？
  answer: '允许的独处场景: 瑜伽、冥想、森林隐居(vanaprastha)；禁止/羞耻的独处: 完全脱离家庭责任；仪式化独处: 苦行(sadhana)、出家人'
  source: 02-Mind-Psychology/psychology/social/solitude/Solitude_Sociology.md
  section: 1.2 文化脚本：何时、何地、如何独处
- type: concept
  question: 传统社会（机械团结）的核心要点是什么？
  answer: '社会结构: 同质化；集体规范强；独处位置: 几乎没有独处空间；孤独/独处特征: 孤独概念几乎不存在'
  source: 02-Mind-Psychology/psychology/social/solitude/Solitude_Sociology.md
