  question: 角色分工的核心要点是什么？
  answer: '同性关系: 更平等、灵活；异性关系: 常受性别角色影响；研究发现: Kurdek (2005): 同性关系更平等'
  source: 02-Mind-Psychology/relationships/diverse-populations/Relationships_Diverse_Populations_Guide.md
  section: 性少数群体亲密关系的独特模式
- type: concept
  question: 冲突解决的核心要点是什么？
  answer: '同性关系: 更少回避、更直接；异性关系: 存在性别差异；研究发现: 同性伴侣冲突频率更低但处理更积极'
  source: 02-Mind-Psychology/relationships/diverse-populations/Relationships_Diverse_Populations_Guide.md
  section: 性少数群体亲密关系的独特模式
- type: concept
  question: 亲密质量的核心要点是什么？
  answer: '同性关系: 情感连接强度相当；异性关系: 情感连接强度相当；研究发现: 关系满意度无显著差异'
  source: 02-Mind-Psychology/relationships/diverse-populations/Relationships_Diverse_Populations_Guide.md
  section: 性少数群体亲密关系的独特模式
- type: concept
  question: 身份否定的核心要点是什么？
  answer: '具体描述: 被视为"过渡阶段"；对关系的影响: 伴侣怀疑忠诚度；应对策略: 身份肯定沟通'
  source: 02-Mind-Psychology/relationships/diverse-populations/Relationships_Diverse_Populations_Guide.md
  section: 双性恋与泛性恋的关系经验
- type: concept
  question: 文化隐形的核心要点是什么？
  answer: '具体描述: 媒体中缺乏代表；对关系的影响: 关系不被认可；应对策略: 社区支持建立'
  source: 02-Mind-Psychology/relationships/diverse-populations/Relationships_Diverse_Populations_Guide.md
  section: 双性恋与泛性恋的关系经验
- type: concept
  question: 健康差异的核心要点是什么？
  answer: '具体描述: 医疗系统忽视；对关系的影响: 健康风险增加；应对策略: 主动医疗倡导'
  source: 02-Mind-Psychology/relationships/diverse-populations/Relationships_Diverse_Populations_Guide.md
  section: 双性恋与泛性恋的关系经验
- type: concept
  question: 语言沟通的核心要点是什么？
  answer: '挑战表现: 语义误解、情感表达受限；成功策略: 双语学习、情感词汇共享；失败模式: 假设对方理解、拒绝学习'
  source: 02-Mind-Psychology/relationships/diverse-populations/Relationships_Diverse_Populations_Guide.md
  section: 文化差异对关系的影响机制
- type: concept
  question: 饮食文化的核心要点是什么？
  answer: '挑战表现: 饮食习惯、餐桌礼仪冲突；成功策略: 轮流体验、创新融合；失败模式: 贬低对方文化饮食'
  source: 02-Mind-Psychology/relationships/diverse-populations/Relationships_Diverse_Populations_Guide.md
  section: 文化差异对关系的影响机制
