  question: 第2层的核心要点是什么？
  answer: '中文名称: 应对姿态；英文名称: Coping Stance；位置: 水面线；定义: 在压力下采用的自动化沟通模式；探索问题: "你用什么方式应对这个情境？"；专业视角 (Professional Perspective):
    连接外在行为与内在体验的桥梁'
  source: 02-Mind-Psychology/meditation/satir-model/Satir_Iceberg_Model.md
  section: 冰山七层次结构表
