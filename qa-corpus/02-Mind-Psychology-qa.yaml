  section: 内容索引 | Contents
- type: concept
  question: 分裂情感性障碍的核心要点是什么？
  answer: '英文名 (English Term): Schizoaffective Disorder；原始语言/词源 (Original Language): 希腊语 *Schizein* + 拉丁语 *Affectus* (情感)；词源含义:
    "分裂的心智+情感障碍"；精确定义: 同时满足精神分裂症和心境发作标准的精神障碍；历史演变: 1933年Kasanin首次命名；专业视角 (Professional Perspective): 诊断信度较低的"中间地带"诊断'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizoaffective/Schizoaffective_Disorder_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 双相型的核心要点是什么？
  answer: '英文名 (English Term): Bipolar Type；原始语言/词源 (Original Language): 拉丁语: *Bi-* + *Polus*；词源含义: "两极的"；精确定义: 分裂情感性障碍中包含躁狂发作的亚型；历史演变:
    DSM-III-R开始区分亚型；专业视角 (Professional Perspective): 治疗需兼顾情感稳定与精神病'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizoaffective/Schizoaffective_Disorder_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 抑郁型的核心要点是什么？
  answer: '英文名 (English Term): Depressive Type；原始语言/词源 (Original Language): 拉丁语: *Deprimere* (向下压)；词源含义: "被压下的"；精确定义: 分裂情感性障碍中仅有抑郁发作（无躁狂史）的亚型；历史演变:
    DSM-III-R开始区分亚型；专业视角 (Professional Perspective): 预后通常较双相型差'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizoaffective/Schizoaffective_Disorder_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 双相型的核心要点是什么？
  answer: '英文名: Bipolar Type；ICD-11代码: 6A21.0；核心心境特征: 病程中包含≥1次躁狂发作（可伴/不伴抑郁发作）；终生患病率: ~0.15%；性别比: 男女相当；预后对比: 相对较好'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizoaffective/Schizoaffective_Disorder_Overview.md
  section: 表2.2 DSM-5 分裂情感性障碍亚型 (Subtypes)
- type: concept
  question: 抑郁型的核心要点是什么？
  answer: '英文名: Depressive Type；ICD-11代码: 6A21.1；核心心境特征: 病程中仅有重性抑郁发作（无躁狂史）；终生患病率: ~0.15%；性别比: 女性多见；预后对比: 相对较差；慢性化倾向更高'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizoaffective/Schizoaffective_Disorder_Overview.md
  section: 表2.2 DSM-5 分裂情感性障碍亚型 (Subtypes)
- type: concept
  question: 精神病性症状的核心要点是什么？
  answer: '分裂情感性障碍: 持续存在（含独立期）；精神分裂症: 持续存在；双相障碍伴精神病性: 仅心境发作期；重性抑郁伴精神病性: 仅心境发作期'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizoaffective/Schizoaffective_Disorder_Overview.md
  section: 表2.3 分裂情感性障碍 vs 相近疾病的关键鉴别 (Differential Diagnosis)
- type: concept
  question: 心境症状的核心要点是什么？
  answer: '分裂情感性障碍: 占病程主要部分；精神分裂症: 短暂/次要；双相障碍伴精神病性: 核心特征；重性抑郁伴精神病性: 核心特征'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizoaffective/Schizoaffective_Disorder_Overview.md
  section: 表2.3 分裂情感性障碍 vs 相近疾病的关键鉴别 (Differential Diagnosis)
- type: concept
  question: 独立精神病期（≥2周无心境症状）的核心要点是什么？
  answer: '分裂情感性障碍: **有**（Criterion B）；精神分裂症: 是（精神病为主）；双相障碍伴精神病性: **无**；重性抑郁伴精神病性: **无**'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizoaffective/Schizoaffective_Disorder_Overview.md
  section: 表2.3 分裂情感性障碍 vs 相近疾病的关键鉴别 (Differential Diagnosis)
- type: concept
  question: 双重靶向的核心要点是什么？
  answer: '内涵: 同时治疗精神病性症状和心境症状；实践要点: 抗精神病药+心境稳定剂/抗抑郁药联合；常见误区: 只治疗一个维度'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizoaffective/Schizoaffective_Disorder_Treatment.md
  section: 表1.1 核心治疗原则 (Core Treatment Principles)
- type: concept
  question: 亚型导向的核心要点是什么？
  answer: '内涵: 双相型和抑郁型治疗策略不同；实践要点: 双相型需心境稳定剂；抑郁型可用抗抑郁药；常见误区: 忽视亚型差异'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizoaffective/Schizoaffective_Disorder_Treatment.md
  section: 表1.1 核心治疗原则 (Core Treatment Principles)
- type: concept
  question: 分期治疗的核心要点是什么？
  answer: '内涵: 急性期控制症状、维持期预防复发；实践要点: 急性期可能需住院；常见误区: 急性期好转即停药'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizoaffective/Schizoaffective_Disorder_Treatment.md
  section: 表1.1 核心治疗原则 (Core Treatment Principles)
- type: concept
  question: 急性躁狂+精神病的核心要点是什么？
  answer: '双相型目标: 控制躁狂和精神病性症状；抑郁型目标: -；共同目标: 确保安全'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizoaffective/Schizoaffective_Disorder_Treatment.md
  section: 表1.2 治疗阶段与目标 (Treatment Phases)
- type: concept
  question: 急性抑郁+精神病的核心要点是什么？
  answer: '双相型目标: -；抑郁型目标: 缓解抑郁和精神病性症状；共同目标: 自杀风险管理'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizoaffective/Schizoaffective_Disorder_Treatment.md
  section: 表1.2 治疗阶段与目标 (Treatment Phases)
- type: concept
  question: 急性精神病（无显著心境）的核心要点是什么？
  answer: '双相型目标: 控制精神病性症状；抑郁型目标: 控制精神病性症状；共同目标: 评估心境基线'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizoaffective/Schizoaffective_Disorder_Treatment.md
  section: 表1.2 治疗阶段与目标 (Treatment Phases)
- type: concept
  question: 急性躁狂+精神病（双相型）的核心要点是什么？
  answer: '一线推荐: 抗精神病药(SGA) + 锂盐或丙戊酸钠；二线选择: 抗精神病药单药（如奥氮平、喹硫平）；避免/慎用: 单用抗抑郁药'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizoaffective/Schizoaffective_Disorder_Treatment.md
  section: 表2.1 分裂情感性障碍药物治疗策略 (Pharmacotherapy Strategies)
- type: concept
  question: 急性抑郁+精神病（双相型）的核心要点是什么？
  answer: '一线推荐: 喹硫平或鲁拉西酮 + 锂盐；二线选择: 拉莫三嗪 + 抗精神病药；避免/慎用: 单用抗抑郁药（转躁风险）'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizoaffective/Schizoaffective_Disorder_Treatment.md
  section: 表2.1 分裂情感性障碍药物治疗策略 (Pharmacotherapy Strategies)
- type: concept
  question: 症状交叠的核心要点是什么？
  answer: '原因: 精神病性和心境症状常同时出现，难以区分；应对建议: 记录症状日记，分别追踪两类症状'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizoaffective/Schizoaffective_Self_Assessment.md
  section: 表1.1 为什么分裂情感性障碍难以自我识别
- type: concept
  question: 诊断不稳定的核心要点是什么？
  answer: '原因: 36-54%的患者在随访中被重新诊断；应对建议: 接受诊断可能随病程调整的事实'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizoaffective/Schizoaffective_Self_Assessment.md
  section: 表1.1 为什么分裂情感性障碍难以自我识别
- type: concept
  question: 缺乏自知力的核心要点是什么？
  answer: '原因: 精神病性症状期间可能不认为自己有病；应对建议: 照护者观察尤为重要'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizoaffective/Schizoaffective_Self_Assessment.md
  section: 表1.1 为什么分裂情感性障碍难以自我识别
- type: concept
  question: 1. 标记心境发作的核心要点是什么？
  answer: '具体操作: 在时间轴上标出每次躁狂/抑郁发作的起止时间；记录要点: 起始日期、结束日期、发作类型（躁狂/抑郁/混合）'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizoaffective/Schizoaffective_Self_Assessment.md
  section: 表2.1 时间线制图方法 (Timeline Mapping Method)
- type: concept
  question: 2. 标记精神病性症状的核心要点是什么？
  answer: '具体操作: 在时间轴上标出精神病性症状（幻觉/妄想）出现的时间；记录要点: 起始日期、结束日期、症状类型'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizoaffective/Schizoaffective_Self_Assessment.md
  section: 表2.1 时间线制图方法 (Timeline Mapping Method)
- type: concept
  question: 3. 标记用药变化的核心要点是什么？
  answer: '具体操作: 记录药物调整时间；记录要点: 药物名称、剂量、开始/停止日期'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizoaffective/Schizoaffective_Self_Assessment.md
  section: 表2.1 时间线制图方法 (Timeline Mapping Method)
