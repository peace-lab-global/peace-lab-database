- type: concept
  question: 动机的核心要点是什么？
  answer: '治疗性游戏: 特定治疗目标有意识选择；病理性游戏成瘾: 逃避现实填补空虚强迫性；区分标准: 游戏是手段还是逃避；干预策略: 探索逃避核心议题替代应对策略；专业视角 (Professional Perspective): 问题不是游戏本身而是为何需要逃避'
