  question: 什么是概述 (Overview)？
  answer: 迪巴·马（Dipa Ma，1911-1989），本名尼帕·巴尼·巴鲁阿（Nani Bala Barua），是20世纪最具影响力的女性冥想大师之一。她是一位普通的孟加拉家庭妇女，却在短短几年内通过密集的冥想修行达到了佛教传统中极高的证悟境界。她以将深度冥想与日常生活完全融合而闻名——做饭、照顾孩子、洗衣时都在修行。作为第一位将系统的内观禅修（Vipassana）传授给西方女性的南亚导师，她深刻影响了莎伦·萨尔茨伯格（Sharon
    Salzberg）、杰克·康菲尔德（Jack Kornfield）、约瑟夫·戈德斯坦（Joseph Goldstein）等西方正念运动的奠基人。她的一生是对"修行不必出离世俗生活"这一理念最有力的证明。
  source: 02-Mind-Psychology/meditation/masters/western-pioneers/Dipa_Ma.md
