  question: 什么是概述 (Overview)？
  answer: 托马斯·许布尔（Thomas Hübl，1971-）是当代德国灵性导师、冥想教师和社会疗愈活动家。他以将深层冥想实践、 mystical traditions 与集体创伤疗愈（Collective Trauma Healing）整合而闻名。他是"透明沟通"（Transparent
    Communication）和"集体创伤整合"方法的创始人，通过全球性的" Celebrate Life Festival "和" Pocket Project "等项目，致力于推动个人与社会的深度转化。他是当代将冥想从个人修行扩展到社会疗愈领域最具影响力的声音之一。
  source: 02-Mind-Psychology/meditation/masters/contemporary-spiritual/Thomas_Hubl.md
