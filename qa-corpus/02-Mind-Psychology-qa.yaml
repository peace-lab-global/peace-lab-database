- type: concept
  question: 严肃游戏 (Serious Games)的核心要点是什么？
  answer: '核心机制: 教育目标嵌入游戏玩法；治疗目标: 心理教育技能训练症状管理；代表游戏: SPARX治疗抑郁EndeavorRx治疗ADHD；适用症状: 抑郁焦虑ADHD慢性病管理；专业视角 (Professional Perspective):
