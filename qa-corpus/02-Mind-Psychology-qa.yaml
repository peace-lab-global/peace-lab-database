  question: 语义鸿沟的核心要点是什么？
  answer: '具体表现: 问卷条目依赖语言表征，而高阶体验常超越语言；在冥想研究中的典型问题: NADA量表中的"自我边界消融"条目，L4以下练习者可能以想象填充而非真实体验回应；证据等级: B'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Assessment_Methodology_Supplement.md
  section: 1.1 为什么冥想研究需要混合方法
- type: concept
  question: 回顾性偏差的核心要点是什么？
  answer: '具体表现: 特质量表要求回忆"一般情况"，而冥想状态具有高度情境变异；在冥想研究中的典型问题: FFMQ的"不评判"维度与ESM实时测量相关性仅r=0.30-0.40（Goldberg et al., 2022）；证据等级:
    A'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Assessment_Methodology_Supplement.md
  section: 1.1 为什么冥想研究需要混合方法
- type: concept
  question: 天花板/地板效应的核心要点是什么？
  answer: '具体表现: 量表设计针对普通人群，高阶练习者快速触顶；在冥想研究中的典型问题: NADA-T在L6+人群中呈现地板效应消失、分布左偏（Hanley et al., 2018）；证据等级: B'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Assessment_Methodology_Supplement.md
  section: 1.1 为什么冥想研究需要混合方法
- type: concept
  question: 样本量限制的核心要点是什么？
  answer: '具体表现: 质性研究通常n<30，统计推广力弱；在冥想研究中的典型问题: 现象学访谈发现"白光体验"，无法判断其在总体中的发生率；证据等级: C'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Assessment_Methodology_Supplement.md
  section: 1.1 为什么冥想研究需要混合方法
- type: concept
  question: 研究者偏差的核心要点是什么？
  answer: '具体表现: 解释过程受研究者理论预设影响；在冥想研究中的典型问题: 佛教背景研究者可能将体验解释为"禅相"，而现象学家描述为"知觉改变"；证据等级: C'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Assessment_Methodology_Supplement.md
  section: 1.1 为什么冥想研究需要混合方法
- type: concept
  question: 记忆重构的核心要点是什么？
  answer: '具体表现: 叙述是对体验的二次建构，非体验本身；在冥想研究中的典型问题: 纵向研究显示，练习者对3个月前冥想体验的报告与当日ESM记录一致性仅κ=0.45；证据等级: B'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Assessment_Methodology_Supplement.md
  section: 1.1 为什么冥想研究需要混合方法
