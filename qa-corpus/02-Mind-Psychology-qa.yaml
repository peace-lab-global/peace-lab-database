- type: concept
  question: 高血压的核心要点是什么？
  answer: '与慢性压力的关系: 慢性压力显著增加高血压风险；证据强度: ★★★；关键机制: 交感激活、血管重塑、盐敏感性增加'
  source: 02-Mind-Psychology/psychology/stress-hpa/chronic-stress/Chronic_Stress_Health_Effects.md
  section: 2.1 心血管疾病风险总表
- type: concept
  question: 冠心病的核心要点是什么？
  answer: '与慢性压力的关系: 心理社会压力是独立风险因素；证据强度: ★★★；关键机制: 动脉粥样硬化、内皮功能障碍、炎症'
  source: 02-Mind-Psychology/psychology/stress-hpa/chronic-stress/Chronic_Stress_Health_Effects.md
  section: 2.1 心血管疾病风险总表
- type: concept
  question: 心肌梗死的核心要点是什么？
  answer: '与慢性压力的关系: 急/慢性压力均可触发；证据强度: ★★★；关键机制: 斑块破裂、血栓形成、心律失常'
  source: 02-Mind-Psychology/psychology/stress-hpa/chronic-stress/Chronic_Stress_Health_Effects.md
  section: 2.1 心血管疾病风险总表
- type: concept
  question: 交感神经持续激活的核心要点是什么？
  answer: '描述: 心率加快、血压升高、血管收缩；后果: 心脏负荷增加、内皮损伤'
  source: 02-Mind-Psychology/psychology/stress-hpa/chronic-stress/Chronic_Stress_Health_Effects.md
  section: 2.2 心血管影响机制详解
- type: concept
  question: 个体层面的核心要点是什么？
  answer: '目标: 增强应对能力、调节生理反应；干预类型: 心理治疗、放松训练、生活方式干预'
  source: 02-Mind-Psychology/psychology/stress-hpa/chronic-stress/Chronic_Stress_Interventions.md
  section: 1.1 多层次干预模型
- type: concept
  question: 人际层面的核心要点是什么？
  answer: '目标: 改善社会支持、减少关系压力；干预类型: 人际治疗、家庭治疗、支持小组'
  source: 02-Mind-Psychology/psychology/stress-hpa/chronic-stress/Chronic_Stress_Interventions.md
  section: 1.1 多层次干预模型
- type: concept
  question: 组织层面的核心要点是什么？
  answer: '目标: 减少职业压力、改善工作环境；干预类型: 组织干预、EAP、工作重新设计'
  source: 02-Mind-Psychology/psychology/stress-hpa/chronic-stress/Chronic_Stress_Interventions.md
  section: 1.1 多层次干预模型
- type: concept
  question: 初级预防的核心要点是什么？
  answer: '目标: 预防慢性压力发生；策略: 健康教育、压力管理培训、工作场所预防'
  source: 02-Mind-Psychology/psychology/stress-hpa/chronic-stress/Chronic_Stress_Interventions.md
  section: 1.2 干预时机
- type: concept
  question: 次级预防的核心要点是什么？
  answer: '目标: 早期识别和干预；策略: 筛查、早期干预、高危人群项目'
  source: 02-Mind-Psychology/psychology/stress-hpa/chronic-stress/Chronic_Stress_Interventions.md
  section: 1.2 干预时机
- type: concept
  question: 三级预防的核心要点是什么？
  answer: '目标: 减少已有慢性压力的影响；策略: 综合治疗、康复、复发预防'
  source: 02-Mind-Psychology/psychology/stress-hpa/chronic-stress/Chronic_Stress_Interventions.md
  section: 1.2 干预时机
- type: concept
  question: 下丘脑的核心要点是什么？
  answer: '英文术语: Hypothalamus；拉丁语/希腊语词源: 希腊语 ὑπό (hypó, 下方) + θάλαμος (thálamos, 内室)；定义: 控制内分泌和自主功能的脑区'
  source: 02-Mind-Psychology/psychology/stress-hpa/chronic-stress/Chronic_Stress_Mechanisms.md
  section: 1.1 HPA轴术语表
- type: concept
  question: 室旁核的核心要点是什么？
  answer: '英文术语: Paraventricular Nucleus (PVN)；拉丁语/希腊语词源: 拉丁语 *para* (旁边) + *ventriculus* (小腔)；定义: 下丘脑中合成CRH的核团'
  source: 02-Mind-Psychology/psychology/stress-hpa/chronic-stress/Chronic_Stress_Mechanisms.md
  section: 1.1 HPA轴术语表
- type: concept
  question: 垂体的核心要点是什么？
  answer: '英文术语: Pituitary；拉丁语/希腊语词源: 拉丁语 *pituita* (黏液)；定义: "主腺"，分泌多种激素'
  source: 02-Mind-Psychology/psychology/stress-hpa/chronic-stress/Chronic_Stress_Mechanisms.md
  section: 1.1 HPA轴术语表
- type: concept
  question: 代谢的核心要点是什么？
  answer: '急性效应: 糖原分解、糖异生、蛋白质分解、脂肪分解；慢性过度效应: 内脏脂肪堆积、胰岛素抵抗、高血糖'
  source: 02-Mind-Psychology/psychology/stress-hpa/chronic-stress/Chronic_Stress_Mechanisms.md
  section: 1.3 皮质醇功能与作用
- type: concept
  question: 免疫的核心要点是什么？
  answer: '急性效应: 急性免疫增强后抑制；慢性过度效应: 慢性免疫抑制、感染风险增加'
  source: 02-Mind-Psychology/psychology/stress-hpa/chronic-stress/Chronic_Stress_Mechanisms.md
  section: 1.3 皮质醇功能与作用
- type: concept
  question: 心血管的核心要点是什么？
  answer: '急性效应: 增加心输出量、血管张力；慢性过度效应: 高血压、内皮功能障碍'
  source: 02-Mind-Psychology/psychology/stress-hpa/chronic-stress/Chronic_Stress_Mechanisms.md
  section: 1.3 皮质醇功能与作用
- type: concept
  question: 皮质醇节律紊乱的核心要点是什么？
  answer: '表现: 晨峰降低、傍晚升高、夜间皮质醇升高；机制: 中枢调控失调；临床意义: 睡眠障碍、疲劳'
  source: 02-Mind-Psychology/psychology/stress-hpa/chronic-stress/Chronic_Stress_Mechanisms.md
  section: 1.4 慢性压力导致的HPA轴改变
- type: concept
  question: 负反馈受损的核心要点是什么？
  answer: '表现: 地塞米松抑制试验阳性率降低；机制: GR下调、海马损伤；临床意义: HPA持续激活'
  source: 02-Mind-Psychology/psychology/stress-hpa/chronic-stress/Chronic_Stress_Mechanisms.md
  section: 1.4 慢性压力导致的HPA轴改变
- type: concept
  question: 慢性压力的核心要点是什么？
  answer: '英文术语: Chronic Stress；原始语言/词源: 拉丁语 *chronicus* (χρονικός/chronikós, 时间的) + 拉丁语 *stringere* (拉紧、束缚)；定义与内涵: 持续超过数周至数月的应激状态，导致神经内分泌系统持续激活与失调'
  source: 02-Mind-Psychology/psychology/stress-hpa/chronic-stress/Chronic_Stress_Overview.md
  section: 1. 核心术语与词源 (Core Terminology & Etymology)
- type: concept
  question: 应激的核心要点是什么？
  answer: '英文术语: Stress；原始语言/词源: 拉丁语 *stringere* (拉紧)；定义与内涵: 有机体对威胁或挑战的非特异性反应，包括生理、心理和行为层面'
  source: 02-Mind-Psychology/psychology/stress-hpa/chronic-stress/Chronic_Stress_Overview.md
  section: 1. 核心术语与词源 (Core Terminology & Etymology)
- type: concept
  question: 应激源/压力源的核心要点是什么？
  answer: '英文术语: Stressor；原始语言/词源: 拉丁语 *stringere* + *-or*；定义与内涵: 引发应激反应的内外部刺激，可为物理、心理或社会性质'
  source: 02-Mind-Psychology/psychology/stress-hpa/chronic-stress/Chronic_Stress_Overview.md
  section: 1. 核心术语与词源 (Core Terminology & Etymology)
- type: concept
  question: 持续时间的核心要点是什么？
  answer: '急性压力 (Acute Stress): 数分钟至数小时，最长数天；慢性压力 (Chronic Stress): 数周、数月至数年'
  source: 02-Mind-Psychology/psychology/stress-hpa/chronic-stress/Chronic_Stress_Overview.md
  section: 2.1 基本特征对比
- type: concept
  question: 激活模式的核心要点是什么？
  answer: '急性压力 (Acute Stress): 快速激活，快速恢复；慢性压力 (Chronic Stress): 持续激活或反复激活，恢复不完全'
  source: 02-Mind-Psychology/psychology/stress-hpa/chronic-stress/Chronic_Stress_Overview.md
  section: 2.1 基本特征对比
- type: concept
  question: 生理反应的核心要点是什么？
  answer: '急性压力 (Acute Stress): SAM系统主导，肾上腺素骤升；慢性压力 (Chronic Stress): HPA轴主导，皮质醇持续升高或节律紊乱'
  source: 02-Mind-Psychology/psychology/stress-hpa/chronic-stress/Chronic_Stress_Overview.md
  section: 2.1 基本特征对比
