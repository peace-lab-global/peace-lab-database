- type: concept
  question: 1. 评估的核心要点是什么？
  answer: '操作内容: 病史采集、过敏测试、禁忌症筛查；时间: 20分钟；注意事项: 使用标准化问卷 (见附录)；质控要点: 记录基线数据 (HAM-A/PSQI等)'
