- type: concept
  question: 手臂的核心要点是什么？
  answer: '执行方式: 双臂过头伸直，掌心相贴或平行，食指指向上方；要点: 手臂尽量靠近耳侧，不弯曲'
  source: 02-Mind-Psychology/meditation/kundalini-meditation/Kundalini_Kriya_Sequences.md
  section: 2.5 Sat Kriya（Sat Kriya：核心练习）
- type: concept
  question: 手印的核心要点是什么？
  answer: '执行方式: 所有手指交叉，食指伸直并指向上（女性右手拇指在外，男性左手拇指在外——传统说法）；要点: 食指代表木星（扩展与智慧）'
  source: 02-Mind-Psychology/meditation/kundalini-meditation/Kundalini_Kriya_Sequences.md
  section: 2.5 Sat Kriya（Sat Kriya：核心练习）
- type: concept
  question: 保持手臂高举的核心要点是什么？
  answer: '说明: 手臂酸痛是正常的，这是 Kriya 的一部分。但若肩部有伤，可短暂放下再举起'
  source: 02-Mind-Psychology/meditation/kundalini-meditation/Kundalini_Kriya_Sequences.md
  section: 2.5 Sat Kriya（Sat Kriya：核心练习）
