  question: 第十章的核心要点是什么？
  answer: '原文: "载营魄抱一，能无离乎？专气致柔，能如婴儿乎？"；冥想意涵: **抱一**——身心合一的早期表述；**专气致柔**——调息与身体柔化的结合'
  source: 02-Mind-Psychology/meditation/taoist-meditation/Taoist_Meditation_Overview.md
  section: 1.1 先秦道家的冥想雏形
- type: concept
  question: 第十六章的核心要点是什么？
  answer: '原文: "致虚极，守静笃。万物并作，吾以观复。"；冥想意涵: **虚静观照**——道家冥想的核心方法：心至虚、守于静，观万物循环'
  source: 02-Mind-Psychology/meditation/taoist-meditation/Taoist_Meditation_Overview.md
  section: 1.1 先秦道家的冥想雏形
- type: concept
  question: 第四十八章的核心要点是什么？
  answer: '原文: "为学日益，为道日损。损之又损，以至于无为。"；冥想意涵: **日损**——减法式的冥想进路，与佛家"放下"相通'
  source: 02-Mind-Psychology/meditation/taoist-meditation/Taoist_Meditation_Overview.md
  section: 1.1 先秦道家的冥想雏形
- type: concept
  question: 东汉**（张道陵、魏伯阳）的核心要点是什么？
  answer: '代表经典/人物: 《周易参同契》——"万古丹经王"；冥想发展: 将《周易》卦象、阴阳五行与炼丹术结合，奠定**内丹学的理论框架**'
  source: 02-Mind-Psychology/meditation/taoist-meditation/Taoist_Meditation_Overview.md
  section: 1.2 道教形成与修习体系化
- type: concept
  question: 魏晋**（葛洪）的核心要点是什么？
  answer: '代表经典/人物: 《抱朴子·内篇》；冥想发展: 系统整理**存思法**（存思体内神明）、**守一法**、**胎息法**；区分内养（养神）与外养（养形）'
  source: 02-Mind-Psychology/meditation/taoist-meditation/Taoist_Meditation_Overview.md
  section: 1.2 道教形成与修习体系化
- type: concept
  question: 南北朝**（陶弘景、寇谦之）的核心要点是什么？
  answer: '代表经典/人物: 《真诰》《养性延命录》；冥想发展: 上清派强调**存思上清境**与体内神真；寇谦之改革天师道，引入礼拜与斋戒的冥想维度'
  source: 02-Mind-Psychology/meditation/taoist-meditation/Taoist_Meditation_Overview.md
  section: 1.2 道教形成与修习体系化
- type: concept
  question: 核心经典的核心要点是什么？
  answer: '**全真道**: 《道德经》《清静经》《周易参同契》《悟真篇》；**正一道（天师道）**: 《正一经》《太平经》《黄庭经》'
  source: 02-Mind-Psychology/meditation/taoist-meditation/Taoist_Meditation_Overview.md
  section: 1.3 全真道与正一道的冥想取向差异
- type: concept
  question: 冥想取向的核心要点是什么？
  answer: '**全真道**: **清修内丹**——以静坐、打坐为主要形式，追求"明心见性"；**正一道（天师道）**: **斋醮符箓**——以仪式、存思、感召神明为主要形式'
  source: 02-Mind-Psychology/meditation/taoist-meditation/Taoist_Meditation_Overview.md
  section: 1.3 全真道与正一道的冥想取向差异
