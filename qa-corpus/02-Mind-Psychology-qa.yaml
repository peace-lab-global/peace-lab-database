- type: concept
  question: 呈现问题的核心要点是什么？
  answer: '核心要素 (Core Elements): 来访者主诉、症状表现、持续时间；评估重点 (Assessment Focus): 表层问题与深层系统动力的关联'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Case_Analysis.md
  section: 案例分析框架 (Case Analysis Framework)
- type: concept
  question: 家庭系统图谱的核心要点是什么？
  answer: '核心要素 (Core Elements): 家族成员构成、重大事件、排斥成员；评估重点 (Assessment Focus): 被遗忘者、代际创伤、秘密'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Case_Analysis.md
  section: 案例分析框架 (Case Analysis Framework)
- type: concept
  question: 系统动力假设的核心要点是什么？
  answer: '核心要素 (Core Elements): 归属法则、序位法则、平衡法则的违反；评估重点 (Assessment Focus): 纠葛类型、隐藏忠诚、替代承担'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Case_Analysis.md
  section: 案例分析框架 (Case Analysis Framework)
- type: concept
  question: 代际创伤传递理论的核心要点是什么？
  answer: '提出者/研究者: Rachel Yehuda et al. (2016)；核心观点: 创伤经历通过表观遗传机制跨代传递，大屠杀幸存者后代皮质醇水平显著异常；与系统排列的关联: 提供了"代际纠葛"的生物学基础——创伤不仅在心理层面传递；关键文献:
    *Biological Psychiatry*, 80(5), 372-380'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Case_Analysis.md
  section: 核心理论支撑 (Core Theoretical Support)
- type: concept
  question: 隐性家庭忠诚的核心要点是什么？
  answer: '提出者/研究者: Ivan Boszormenyi-Nagy (1973)；核心观点: 家庭成员间存在无意识的忠诚纽带与"功过账本"，子代无意识地偿还父代的"心理债务"；与系统排列的关联: 海灵格"盲目之爱"与"隐藏忠诚"概念的理论先驱；关键文献:
    *Invisible Loyalties*, Harper & Row'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Case_Analysis.md
  section: 核心理论支撑 (Core Theoretical Support)
- type: concept
  question: 家庭系统理论的核心要点是什么？
  answer: '提出者/研究者: Murray Bowen (1978)；核心观点: 核心家庭情绪系统通过"多代传递过程"影响后代的分化水平与症状表现；与系统排列的关联: 系统排列中的"跟随动力"与Bowen的"融合-分化"连续体一致；关键文献:
    *Family Therapy in Clinical Practice*, Aronson'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Case_Analysis.md
  section: 核心理论支撑 (Core Theoretical Support)
- type: concept
  question: RCT的核心要点是什么？
  answer: '研究者/年份: Weinhold et al. (2013)；样本量: N=208；主要发现: 系统排列组在心理困扰、目标达成方面显著优于对照组（d=0.57）；证据等级: Level II；局限性: 盲法困难、活性对照缺乏'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Case_Analysis.md
  section: 循证研究现状 (Current Evidence Base)
- type: concept
  question: 前瞻性队列的核心要点是什么？
  answer: '研究者/年份: Cohen (2006)；样本量: N=190；主要发现: 参与者在排列后6个月身心症状显著改善；证据等级: Level III；局限性: 无对照组、自我报告'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Case_Analysis.md
  section: 循证研究现状 (Current Evidence Base)
- type: concept
  question: 家庭关系的核心要点是什么？
  answer: '适用议题 (Suitable Issues): 亲子冲突、代际创伤、家族纠葛；循证等级 (Evidence Level): 中等；注意事项 (Notes): 核心应用领域'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Clinical.md
  section: 临床应用总览 (Clinical Applications Overview)
- type: concept
  question: 伴侣关系的核心要点是什么？
  answer: '适用议题 (Suitable Issues): 婚姻困难、离婚影响、前任纠葛；循证等级 (Evidence Level): 中等；注意事项 (Notes): 可与伴侣治疗整合'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Clinical.md
  section: 临床应用总览 (Clinical Applications Overview)
- type: concept
  question: 心身症状的核心要点是什么？
  answer: '适用议题 (Suitable Issues): 慢性疾病、不明原因症状；循证等级 (Evidence Level): 有限；注意事项 (Notes): 不能替代医学治疗'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Clinical.md
  section: 临床应用总览 (Clinical Applications Overview)
- type: concept
  question: 亲子冲突的核心要点是什么？
  answer: '系统动力分析 (Systemic Dynamics): 序位错乱、角色颠倒、隐藏忠诚；常见纠葛 (Common Entanglements): 孩子替代父母配偶、孩子认同被排斥者；干预方向 (Intervention Direction):
    恢复序位、解除纠葛'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Clinical.md
  section: 亲子关系 (Parent-Child Relationships)
- type: concept
  question: 亲职化的核心要点是什么？
  answer: '系统动力分析 (Systemic Dynamics): 孩子承担父母功能；常见纠葛 (Common Entanglements): 照顾生病/情绪低落的父母；干预方向 (Intervention Direction): 让父母做父母，孩子做孩子'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Clinical.md
  section: 亲子关系 (Parent-Child Relationships)
- type: concept
  question: 断裂与疏离的核心要点是什么？
  answer: '系统动力分析 (Systemic Dynamics): 未处理的创伤、误解、排斥；常见纠葛 (Common Entanglements): 与一方父母断裂；干预方向 (Intervention Direction): 重建连接、处理创伤'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Clinical.md
  section: 亲子关系 (Parent-Child Relationships)
- type: concept
  question: 看见真相的核心要点是什么？
  answer: '内在工作 (Internal Work): 看见父母的限制与他们所给的；仪式性语句 (Ritual Sentences): "我看见你本来的样子"'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Clinical.md
  section: 亲子关系 (Parent-Child Relationships)
- type: concept
  question: 放下期待的核心要点是什么？
  answer: '内在工作 (Internal Work): 放下对完美父母的期待；仪式性语句 (Ritual Sentences): "你给我的，我收下了"'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Clinical.md
  section: 亲子关系 (Parent-Child Relationships)
- type: concept
  question: 归属法则的核心要点是什么？
  answer: '中文: 归属/隶属权；德文: Zugehörigkeit；英文: Belonging；核心原则 (Core Principle): 家庭系统中的每个成员都有平等归属的权利；违反后果 (Consequences of Violation):
    排斥成员会在后代中被无意识代表'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Laws.md
  section: 三大基本法则概览 (Three Fundamental Laws Overview)
- type: concept
  question: 序位法则的核心要点是什么？
  answer: '中文: 秩序/位序；德文: Ordnung；英文: Order；核心原则 (Core Principle): 家庭成员有基于时间先后的自然位序；违反后果 (Consequences of Violation): 序位混乱导致角色错位与功能紊乱'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Laws.md
  section: 三大基本法则概览 (Three Fundamental Laws Overview)
- type: concept
  question: 平衡法则的核心要点是什么？
  answer: '中文: 平衡/施受平衡；德文: Ausgleich；英文: Balance；核心原则 (Core Principle): 给予与接受之间需要保持动态平衡；违反后果 (Consequences of Violation):
    失衡导致罪疚、怨恨或纠葛'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Laws.md
  section: 三大基本法则概览 (Three Fundamental Laws Overview)
- type: concept
  question: 普遍归属权的核心要点是什么？
  answer: '说明 (Description): 每个家庭成员无论发生什么，都拥有不可剥夺的归属权；临床意涵 (Clinical Implications): 即使是"坏人"也属于系统'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Laws.md
  section: 核心原则 (Core Principles)
- type: concept
  question: 系统完整性的核心要点是什么？
  answer: '说明 (Description): 家庭系统需要所有成员被承认才能完整；临床意涵 (Clinical Implications): 排斥导致系统失衡'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Laws.md
  section: 核心原则 (Core Principles)
- type: concept
  question: 无条件纳入的核心要点是什么？
  answer: '说明 (Description): 归属权不因行为、命运或选择而丧失；临床意涵 (Clinical Implications): 区分行为与归属'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Laws.md
  section: 核心原则 (Core Principles)
- type: concept
  question: 血亲的核心要点是什么？
  answer: '包括 (Includes): 父母、祖父母、曾祖父母、兄弟姐妹、子女等；说明 (Notes): 无论是否相识'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Laws.md
  section: 谁属于家庭系统 (Who Belongs to the Family System)
- type: concept
  question: 同胞的核心要点是什么？
  answer: '包括 (Includes): 流产、堕胎、夭折的兄弟姐妹；说明 (Notes): 常被遗忘但仍属于系统'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Laws.md
  section: 谁属于家庭系统 (Who Belongs to the Family System)
- type: concept
  question: 家庭系统排列的核心要点是什么？
  answer: '中文: 家排/家族排列；英文: Family Constellation；德文 (German): Familienaufstellung；定义 (Definition): 由伯特·海灵格(Bert Hellinger)发展的系统性心理治疗方法，通过空间排列揭示家庭系统动力；专业应用
    (Professional Application): 用于处理家庭纠葛、代际创伤、关系困扰'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Overview.md
  section: 核心概念与术语 (Core Concepts & Terminology)
- type: concept
  question: 知觉场的核心要点是什么？
  answer: '中文: 认知场/形态共振场；英文: Knowing Field；德文 (German): Wissendes Feld；定义 (Definition): 排列过程中代表们感知到的集体信息场域，超越个人认知的系统性信息来源；专业应用
    (Professional Application): 代表通过身体感知获取系统信息，揭示隐藏动力'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Overview.md
  section: 核心概念与术语 (Core Concepts & Terminology)
- type: concept
  question: 代表的核心要点是什么？
  answer: '中文: 代理人；英文: Representative；德文 (German): Stellvertreter；定义 (Definition): 在排列中代替家庭成员或抽象元素的参与者；专业应用 (Professional
    Application): 通过身体感知传达系统信息'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Overview.md
  section: 核心概念与术语 (Core Concepts & Terminology)
- type: concept
  question: 先驱阶段的核心要点是什么？
  answer: '时期 (Period): 1950s-1960s；关键人物 (Key Figures): Virginia Satir, Ivan Boszormenyi-Nagy, Bert Hellinger早期；主要发展 (Key
    Developments): 家庭雕塑、代际忠诚、系统思维萌芽；理论贡献 (Theoretical Contributions): Satir家庭雕塑、忠诚理论基础'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Overview.md
  section: 历史发展与创始人 (History & Founders)
- type: concept
  question: 创立阶段的核心要点是什么？
  answer: '时期 (Period): 1970s-1980s；关键人物 (Key Figures): Bert Hellinger；主要发展 (Key Developments): 结合祖鲁文化、现象学、家庭治疗形成系统排列；理论贡献
    (Theoretical Contributions): 秩序法则、良心理论、知觉场概念'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Overview.md
  section: 历史发展与创始人 (History & Founders)
- type: concept
  question: 经典阶段的核心要点是什么？
  answer: '时期 (Period): 1990s；关键人物 (Key Figures): Bert Hellinger, Gunthard Weber；主要发展 (Key Developments): 系统化理论框架、工作坊模式推广；理论贡献
    (Theoretical Contributions): 归属、序位、平衡三大法则'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Overview.md
  section: 历史发展与创始人 (History & Founders)
- type: concept
  question: 生平背景的核心要点是什么？
  answer: '内容 (Content): 德国天主教神父→南非祖鲁族传教士(16年)→精神分析训练→家庭治疗师'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Overview.md
  section: 伯特·海灵格 (Bert Hellinger, 1925-2019)
- type: concept
  question: 主要影响来源的核心要点是什么？
  answer: '内容 (Content): 祖鲁族祖先崇拜、Arthur Janov原始疗法、家庭治疗(Satir/Boszormenyi-Nagy)、Eric Berne交流分析、Milton Erickson催眠、现象学'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Overview.md
  section: 伯特·海灵格 (Bert Hellinger, 1925-2019)
- type: concept
  question: 团体排列的核心要点是什么？
  answer: '中文: 工作坊排列；德文: Gruppenaufstellung；英文: Group Constellation；特点 (Characteristics): 使用真人代表，团体场域能量强；适用情境 (Applications):
    标准形式，适合大多数议题'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Techniques.md
  section: 排列形式分类 (Types of Constellation Work)
- type: concept
  question: 一对一排列的核心要点是什么？
  answer: '中文: 个案排列；德文: Einzelaufstellung；英文: Individual Constellation；特点 (Characteristics): 使用物件/地面锚点代替代表；适用情境 (Applications):
    私密议题、无法参加团体'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Techniques.md
  section: 排列形式分类 (Types of Constellation Work)
- type: concept
  question: 远程排列的核心要点是什么？
  answer: '中文: 在线排列；德文: Online-Aufstellung；英文: Online Constellation；特点 (Characteristics): 通过视频进行，使用虚拟代表；适用情境 (Applications):
    地理限制、疫情期间'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Techniques.md
  section: 排列形式分类 (Types of Constellation Work)
- type: concept
  question: 场域建立的核心要点是什么？
  answer: '内容 (Content): 创造安全、尊重的空间；治疗师任务 (Facilitator Tasks): 介绍规则，建立信任氛围'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Techniques.md
  section: 阶段一：准备阶段 (Preparation Phase)
- type: concept
  question: 议题收集的核心要点是什么？
  answer: '内容 (Content): 了解参与者的议题；治疗师任务 (Facilitator Tasks): 简短访谈，筛选适合排列的议题'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Techniques.md
  section: 阶段一：准备阶段 (Preparation Phase)
- type: concept
  question: 选择当事人的核心要点是什么？
  answer: '内容 (Content): 确定本场要做排列的人；治疗师任务 (Facilitator Tasks): 评估准备度、议题适切性'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Techniques.md
  section: 阶段一：准备阶段 (Preparation Phase)
- type: concept
  question: 核心议题的核心要点是什么？
  answer: '问题方向 (Questions): 你想处理什么？你想要什么不同？；注意事项 (Notes): 聚焦，不深入分析'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Techniques.md
  section: 阶段二：访谈阶段 (Interview Phase)
- type: concept
  question: 家庭基本信息的核心要点是什么？
  answer: '问题方向 (Questions): 家庭成员有谁？有无特殊事件？；注意事项 (Notes): 简洁收集关键信息'
  source: 02-Mind-Psychology/psychology/special-topics/family-constellation/Family_Constellation_Techniques.md
