- type: concept
  question: 危险信号的核心要点是什么？
  answer: '核心内容: 四骑士行为识别和阻断；技能目标: 防止消极互动升级；教学方法: 行为观察练习；效果证据: 离婚/不满降低30-50%'
  source: 02-Mind-Psychology/relationships/prevention/Relationship_Prevention_Programs.md
  section: 预防与关系增强项目(PREP)的理论与实践
- type: concept
  question: 问题解决的核心要点是什么？
  answer: '核心内容: COAL策略(Calm, Open, Acknowledge, Listen)；技能目标: 建设性处理分歧；教学方法: 结构化练习册；效果证据: 长期跟踪效果持续'
