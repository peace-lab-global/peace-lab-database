  source: 02-Mind-Psychology/psychology/social/rural-psychology/Rural_Psychological_Stressors.md
  section: 1.1 多维压力源总览
- type: concept
  question: 自然维度的核心要点是什么？
  answer: '具体压力源: 洪灾、旱灾、地震、虫害、疫病；影响人群: 农业从业者；严重程度: ★★★★；慢性/急性: 急性+慢性；可控性: 不可控'
  source: 02-Mind-Psychology/psychology/social/rural-psychology/Rural_Psychological_Stressors.md
  section: 1.1 多维压力源总览
- type: concept
  question: 收入不稳定的核心要点是什么？
  answer: '具体表现: 靠天吃饭、市场价格波动、季节性失业；心理影响路径: 不确定性→持续焦虑→决策困难；高危群体: 纯农业户；常见心理后果: 焦虑、失眠、躯体化'
  source: 02-Mind-Psychology/psychology/social/rural-psychology/Rural_Psychological_Stressors.md
  section: 2.1 农村经济压力的多层面
- type: concept
  question: 因病返贫的核心要点是什么？
  answer: '具体表现: 大病致贫、慢性病治疗费用；心理影响路径: 经济崩塌→无助感→绝望；高危群体: 大病家庭；常见心理后果: 抑郁、自杀意念'
  source: 02-Mind-Psychology/psychology/social/rural-psychology/Rural_Psychological_Stressors.md
  section: 2.1 农村经济压力的多层面
- type: concept
  question: 教育支出的核心要点是什么？
  answer: '具体表现: 子女上学费用、培训班花销；心理影响路径: 教育期望与经济现实冲突；高危群体: 多子女家庭；常见心理后果: 内疚、自我否定'
  source: 02-Mind-Psychology/psychology/social/rural-psychology/Rural_Psychological_Stressors.md
  section: 2.1 农村经济压力的多层面
- type: concept
  question: 彩礼金额的核心要点是什么？
  answer: '现状: 部分地区达到15-30万甚至更高；心理影响: 极端经济负担导致家庭焦虑；影响群体: 有适婚男性的家庭'
  source: 02-Mind-Psychology/psychology/social/rural-psychology/Rural_Psychological_Stressors.md
  section: 2.2 "彩礼压力"——农村特有的经济-心理交叉压力
- type: concept
  question: 攀比压力的核心要点是什么？
  answer: '现状: 熟人社会中的面子竞争；心理影响: 社会比较→自卑→愤怒；影响群体: 经济条件较差家庭'
  source: 02-Mind-Psychology/psychology/social/rural-psychology/Rural_Psychological_Stressors.md
  section: 2.2 "彩礼压力"——农村特有的经济-心理交叉压力
- type: concept
  question: 农村心理学的核心要点是什么？
  answer: '英文名 (English Term): Rural Psychology；原始语言/词源: 拉丁语: *Ruralis* (乡间的) + 希腊语: *Psychologia*；词源含义: "乡间的灵魂之学"；精确定义: 研究农村环境中人类心理现象、心理健康及其干预的心理学分支；区分要点:
    不仅是"城市心理学的延伸"，而是独立研究领域；专业视角: 强调生态-文化-经济交互作用'
  source: 02-Mind-Psychology/psychology/social/rural-psychology/Rural_Psychology_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 农村性的核心要点是什么？
  answer: '英文名 (English Term): Rurality；原始语言/词源: 拉丁语: *Ruralis*；词源含义: "属于乡间的"；精确定义: 包含地理偏远性、人口密度低、农业经济依赖、社区紧密度等多维特征的综合概念；区分要点:
    非简单的城乡二分法，而是连续谱；专业视角: 影响心理健康服务可及性的核心变量'
  source: 02-Mind-Psychology/psychology/social/rural-psychology/Rural_Psychology_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 留守的核心要点是什么？
  answer: '英文名 (English Term): Left-Behind；原始语言/词源: 现代社会学术语；词源含义: "被留下的"；精确定义: 因家庭成员外出务工而留在原籍的群体状态，包括留守儿童、妇女和老人；区分要点: 中国特色的社会现象，但全球移民社区均有类似问题；专业视角:
    分离与依恋理论的现实应用'
  source: 02-Mind-Psychology/psychology/social/rural-psychology/Rural_Psychology_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 生态系统理论的核心要点是什么？
  answer: '提出者: Bronfenbrenner (1979)；核心观点: 人的发展受多层嵌套系统影响；关键概念: 微观-中间-外层-宏观-时间系统；对农村心理的启示: 农村心理健康需要从个体到政策多层分析'
  source: 02-Mind-Psychology/psychology/social/rural-psychology/Rural_Psychology_Overview.md
  section: 2.1 核心理论模型
- type: concept
  question: 社会生态模型的核心要点是什么？
  answer: '提出者: McLeroy et al. (1988)；核心观点: 健康行为受个人、人际、组织、社区、政策五层影响；关键概念: 多层次影响因素；对农村心理的启示: 农村心理健康干预需多层协同'
  source: 02-Mind-Psychology/psychology/social/rural-psychology/Rural_Psychology_Overview.md
  section: 2.1 核心理论模型
- type: concept
  question: 乡村压力模型的核心要点是什么？
  answer: '提出者: Conger & Elder (1994)；核心观点: 经济压力通过家庭过程影响心理健康；关键概念: 经济压力→家庭冲突→心理问题；对农村心理的启示: 解释农村经济困难如何传导为心理障碍'
  source: 02-Mind-Psychology/psychology/social/rural-psychology/Rural_Psychology_Overview.md
  section: 2.1 核心理论模型
- type: concept
  question: 地理环境的核心要点是什么？
  answer: '农村特征: 偏远、交通不便、自然灾害频发；与城市的关键差异: 城市基础设施完善、交通便利；对心理健康的影响: 服务可及性低、灾后心理重建困难'
  source: 02-Mind-Psychology/psychology/social/rural-psychology/Rural_Psychology_Overview.md
  section: 2.2 农村心理健康的独特性
- type: concept
  question: 经济结构的核心要点是什么？
  answer: '农村特征: 农业为主、收入不稳定、季节性；与城市的关键差异: 城市产业多元、收入相对稳定；对心理健康的影响: 经济压力大、经济不确定性焦虑'
  source: 02-Mind-Psychology/psychology/social/rural-psychology/Rural_Psychology_Overview.md
  section: 2.2 农村心理健康的独特性
- type: concept
  question: 冲动性的核心要点是什么？
  answer: '农村自杀: 高冲动性比例更高（40-60%）；城市自杀: 计划性相对更高；差异的关键原因: 致命手段唾手可得（农药）'
  source: 02-Mind-Psychology/psychology/social/rural-psychology/Rural_Suicide_Prevention.md
  section: 1.1 农村自杀与城市自杀的核心差异
- type: concept
  question: 主要手段的核心要点是什么？
  answer: '农村自杀: 农药、上吊、溺水；城市自杀: 跳楼、服药、烧炭；差异的关键原因: 环境可及性决定手段'
  source: 02-Mind-Psychology/psychology/social/rural-psychology/Rural_Suicide_Prevention.md
  section: 1.1 农村自杀与城市自杀的核心差异
- type: concept
  question: 致死率的核心要点是什么？
  answer: '农村自杀: 更高（农药致死率高）；城市自杀: 相对较低；差异的关键原因: 农药致死率远超药物过量'
