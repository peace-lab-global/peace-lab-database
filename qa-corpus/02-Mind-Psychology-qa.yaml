- type: concept
  question: 什么是生理机制概述？
  answer: '1. **呼吸系统**：燃烧产生的微粒进入肺部，刺激鼻腔嗅觉受体（OR2J3），激活嗅觉-边缘系统通路，提升情绪调节。

    2. **神经调节**：活性成分通过血脑屏障，调节GABAergic 与 5‑HT 系统，产生镇静与抗焦虑效果。

    3. **免疫调节**：芳香化合物抑制 NF‑κB 通路，降低炎症因子（IL‑6、TNF‑α）水平。

    4. **内分泌影响**：提升皮质醇昼夜节律，改善睡眠质量。'
  source: 02-Mind-Psychology/therapy/incense/Incense_Mechanisms.md
  section: 生理机制概述
- type: concept
  question: 什么是心理机制概述？
  answer: '- **注意力恢复**：芳香刺激提升前额叶皮层的注意网络活性，帮助冥想进入深层状态。

    - **情绪调节**：通过杏仁核的抑制作用，降低负性情绪的感受强度。

    - **仪式感**：香气与仪式行为形成条件反射，强化心理暗示效应。'
  source: 02-Mind-Psychology/therapy/incense/Incense_Mechanisms.md
