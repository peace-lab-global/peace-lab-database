  question: 风险评估的核心要点是什么？
  answer: '英文术语: Risk Assessment；来源语言/词源: 英语；定义: 评估个体对自己或他人造成伤害可能性的过程；临床意义: 安全决策的核心'
  source: 02-Mind-Psychology/psychology/clinical/crisis-assessment/Crisis_Assessment_Tools.md
  section: 核心术语表 (Core Terminology)
