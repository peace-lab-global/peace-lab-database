  question: 什么是概述 (Overview)？
  answer: 萨姆·哈里斯（Sam Harris，1967-）是美国神经科学家、哲学家、畅销书作家，以及冥想应用程序 Waking Up 的创始人。他是"新无神论四骑士"之一（与理查德·道金斯、克里斯托弗·希钦斯、丹尼尔·丹内特并列），但与其他三位不同的是，他积极主张冥想和意识探索是完全理性的、不需要宗教信仰的人类活动。哈里斯代表了"理性主义冥想"的极端——完全剥离宗教和灵性语言，将冥想定位为意识科学的实证探索。
