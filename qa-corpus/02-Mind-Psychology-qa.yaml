- type: concept
  question: 带宽税 (Bandwidth Tax)的核心要点是什么？
  answer: '定义: 贫困相关的忧虑持续占用认知资源；日常表现: 开会时脑子里还在算房租够不够交，孩子的学费怎么凑；研究证据: 贫困状态下IQ表现降低相当于13-14分 (Mani et al., 2013)'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Cognitive_Behavioral_Impact.md
  section: 1.1 心智带宽理论 (Mental Bandwidth Theory)
- type: concept
  question: 隧道效应 (Tunneling)的核心要点是什么？
  answer: '定义: 匮乏导致注意力聚焦在最紧迫的需求上；日常表现: 只能看到这个月的账单，完全顾不上半年后的体检；研究证据: 对紧迫问题的专注反而增强，但忽略其他重要事项'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Cognitive_Behavioral_Impact.md
  section: 1.1 心智带宽理论 (Mental Bandwidth Theory)
- type: concept
  question: 借用未来 (Borrowing)的核心要点是什么？
  answer: '定义: 用未来的资源解决当前的匮乏；日常表现: 借高利贷交房租，不存养老金用来交学费；研究证据: 短期合理但长期加剧匮乏'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Cognitive_Behavioral_Impact.md
  section: 1.1 心智带宽理论 (Mental Bandwidth Theory)
- type: concept
  question: 注意力的核心要点是什么？
  answer: '受影响方式: 经济忧虑不断侵入，注意力难以集中；生活中的样子: 上课/开会时反复想到欠款数字，看不进书；机制: 贫困相关思维自动激活，俘获注意资源'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Cognitive_Behavioral_Impact.md
  section: 1.2 认知功能的具体损害
- type: concept
  question: 工作记忆的核心要点是什么？
  answer: '受影响方式: 需要同时处理太多事务，工作记忆超载；生活中的样子: 记不住新学的东西，做事丢三落四；机制: 认知负荷超出处理容量'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Cognitive_Behavioral_Impact.md
  section: 1.2 认知功能的具体损害
- type: concept
  question: 执行功能的核心要点是什么？
  answer: '受影响方式: 自我控制和计划能力下降；生活中的样子: 知道应该存钱但忍不住买了便宜的零食来安慰自己；机制: 决策疲劳+自控资源耗竭'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Cognitive_Behavioral_Impact.md
  section: 1.2 认知功能的具体损害
- type: concept
  question: 研究对象的核心要点是什么？
  answer: '收获前 (贫困期): 印度泰米尔纳德邦甘蔗农民；收获后 (富裕期): 同一批农民；差异: 自身对照'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Cognitive_Behavioral_Impact.md
  section: 1.3 印度甘蔗农民研究 (经典实验)
- type: concept
  question: 经济状况的核心要点是什么？
  answer: '收获前 (贫困期): 甘蔗未收获，负债累累；收获后 (富裕期): 甘蔗售出，有了一笔收入；差异: 年收入在一两个月内到账'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Cognitive_Behavioral_Impact.md
  section: 1.3 印度甘蔗农民研究 (经典实验)
- type: concept
  question: 抑郁症的核心要点是什么？
  answer: '贫困人群 vs. 非贫困人群: 风险高1.5-3倍；数据来源: Lancet Psychiatry (2020)；说明: 收入每增加一个标准差，抑郁风险降低约20%'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Mental_Health_Impact.md
  section: 1.1 流行病学数据
- type: concept
  question: 焦虑症的核心要点是什么？
  answer: '贫困人群 vs. 非贫困人群: 风险高1.2-2.5倍；数据来源: WHO Global Health Estimates；说明: 经济不确定性是焦虑的强预测因子'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Mental_Health_Impact.md
  section: 1.1 流行病学数据
- type: concept
  question: 自杀的核心要点是什么？
  answer: '贫困人群 vs. 非贫困人群: 低收入区域自杀率更高；数据来源: Global Burden of Disease (2019)；说明: 经济危机期间自杀率显著上升'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Mental_Health_Impact.md
  section: 1.1 流行病学数据
- type: concept
  question: 社会因果模型 (Social Causation)的核心要点是什么？
  answer: '核心主张: 贫困导致心理疾病——是贫穷让人生病；证据: 收入改善后心理健康指标好转；经济危机时心理疾病增加；比喻: 贫穷是一种"慢性中毒"环境'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Mental_Health_Impact.md
  section: 1.2 两种理论模型
- type: concept
  question: 社会选择/漂移模型 (Social Selection/Drift)的核心要点是什么？
  answer: '核心主张: 心理疾病导致贫困——是生病让人变穷；证据: 精神障碍患者向下流动的概率更高；发病后收入通常下降；比喻: 精神疾病是一个"社会电梯向下键"'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Mental_Health_Impact.md
  section: 1.2 两种理论模型
- type: concept
  question: 整合观点的核心要点是什么？
  answer: '核心主张: 两者是双向因果关系，形成恶性循环；证据: 纵向研究支持双向影响；比喻: 贫穷和心理疾病是"两条互相拧紧的绳子"'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Mental_Health_Impact.md
  section: 1.2 两种理论模型
- type: concept
  question: 经济压力持续不断的核心要点是什么？
  answer: '抑郁机制: 慢性压力→HPA轴过度激活→神经递质失衡；生活中的表现: 整天提心吊胆，睡不好，吃不下，什么都不想干；区分要点: 不是"想不开"，是压力真的太大'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Mental_Health_Impact.md
  section: 2.1 抑郁与贫困
- type: concept
  question: 反复的失败体验的核心要点是什么？
  answer: '抑郁机制: 习得性无助→消极归因→动机丧失；生活中的表现: "算了，怎么努力都没用""我就是这个命"；区分要点: 不是懒，是被反复"教会"了放弃'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Mental_Health_Impact.md
  section: 2.1 抑郁与贫困
- type: concept
  question: 先解决生存，再谈发展的核心要点是什么？
  answer: '含义: 马斯洛层次不是摆设；错误示范: 一个人还在为房租发愁，你让他"冥想放松"；正确做法: 先协助解决住房问题，再引入心理支持'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Suffering_Intervention.md
  section: 1.1 不要倒着来
- type: concept
  question: 减少负担，而非增加任务的核心要点是什么？
  answer: '含义: 贫困者的认知带宽已经超载；错误示范: 给穷人一堆表格要填、一堆流程要走；正确做法: 简化申请流程、一站式服务、主动上门'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Suffering_Intervention.md
  section: 1.1 不要倒着来
- type: concept
  question: 恢复选择权，而非替人做主的核心要点是什么？
  answer: '含义: 尊严感比物质更重要；错误示范: 你觉得他应该把钱花在"正事"上；正确做法: 无条件现金转移让人自己决定怎么花'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Suffering_Intervention.md
  section: 1.1 不要倒着来
- type: concept
  question: 个体层面的核心要点是什么？
  answer: '干预目标: 认知、情绪、行为；具体策略: 心理咨询、技能培训、韧性建设；例子: 认知行为疗法、意义治疗、情绪调节训练'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Suffering_Intervention.md
  section: 1.2 干预的生态层次模型
- type: concept
  question: 家庭层面的核心要点是什么？
  answer: '干预目标: 家庭功能、养育质量；具体策略: 家庭治疗、养育支持、喘息服务；例子: 亲职教育、家庭经济规划、代际创伤修复'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Suffering_Intervention.md
  section: 1.2 干预的生态层次模型
- type: concept
  question: 社区层面的核心要点是什么？
  answer: '干预目标: 社会网络、社区资源；具体策略: 社区组织、互助团体、邻里支持；例子: 社区厨房、互助托儿、就业合作社'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Suffering_Intervention.md
  section: 1.2 干预的生态层次模型
- type: concept
  question: 固定时间预约的核心要点是什么？
  answer: '贫困人群的现实: 工作时间不固定、可能临时加班；需要的调适: 灵活预约、允许改期、提供多个时段'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Suffering_Intervention.md
  section: 2.1 适用于贫困群体的心理治疗调适
- type: concept
  question: 诊室内进行的核心要点是什么？
  answer: '贫困人群的现实: 交通不便、没有安静的空间；需要的调适: 上门服务、社区场所、电话/视频'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Suffering_Intervention.md
  section: 2.1 适用于贫困群体的心理治疗调适
- type: concept
  question: 贫困的核心要点是什么？
  answer: '英文名 (English Term): Poverty；原始语言/词源: 拉丁语: *Paupertas* (贫乏)；词源含义: "拥有得少"；精确定义: 个体或群体缺乏满足基本生存和发展需求的物质资源与社会机会的状态；区分要点:
    绝对贫困 vs. 相对贫困；专业视角: 不仅是经济问题，更是心理和社会问题'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Suffering_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 匮乏的核心要点是什么？
  answer: '英文名 (English Term): Scarcity；原始语言/词源: 拉丁语: *Ex-carpere* (摘取)；词源含义: "只能摘到很少"；精确定义: 主观感受到的资源不足，会俘获注意力并影响认知功能；区分要点:
    客观贫困 vs. 主观匮乏感；专业视角: Mullainathan & Shafir的核心概念'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Suffering_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 苦难的核心要点是什么？
  answer: '英文名 (English Term): Suffering；原始语言/词源: 拉丁语: *Sufferre* (承受、忍耐)；词源含义: "从下方承受重压"；精确定义: 对痛苦、丧失或困境的深层主观体验，包含身体、心理和存在三个维度；区分要点:
    苦难比痛苦更深层、更持久；专业视角: 跨学科核心议题'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Suffering_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 经济维度的核心要点是什么？
  answer: '具体表现: 收入不足、资产匮乏、负债；生活中长什么样: 月底数着硬币过日子，一笔意外开销就能把整个月计划打乱；心理影响: 持续性焦虑、安全感缺失'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Suffering_Overview.md
  section: 2.1 贫困不只是"没钱"
- type: concept
  question: 时间维度的核心要点是什么？
  answer: '具体表现: 通勤长、打多份工、无休息日；生活中长什么样: 早上6点出门晚上10点到家，周末还得兼职，连坐下来想想以后的时间都没有；心理影响: 疲惫感、对生活失去掌控'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Suffering_Overview.md
  section: 2.1 贫困不只是"没钱"
- type: concept
  question: 社会维度的核心要点是什么？
  answer: '具体表现: 社交圈窄、人脉资源少、信息差；生活中长什么样: 别人聊出国旅行你插不上嘴，找工作靠投简历不靠关系；心理影响: 羞耻感、社会排斥感'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Suffering_Overview.md
  section: 2.1 贫困不只是"没钱"
- type: concept
  question: 按标准的核心要点是什么？
  answer: '类型: 绝对贫困；定义: 无法满足基本生存需求（食物、住所、衣物）；典型场景: 世界银行标准：日均收入低于2.15美元；心理特征: 生存焦虑为主'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Suffering_Overview.md
  section: 2.2 贫困的分类体系
- type: concept
  question: 相对贫困的核心要点是什么？
  answer: '类型: 生活水平显著低于所在社会的中位数；定义: 中国城市低保线以下；典型场景: 比较焦虑和羞耻感为主'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Poverty_Suffering_Overview.md
  section: 2.2 贫困的分类体系
- type: concept
  question: 痛苦 (Pain)的核心要点是什么？
  answer: '定义: 身体或心理上的不适感受；特征: 信号性的、往往短暂的、可定位的；例子: 被锤子砸到手指、听到坏消息的刺痛'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Suffering_Meaning_Transformation.md
  section: 1.1 苦难不等于痛苦
- type: concept
  question: 苦难 (Suffering)的核心要点是什么？
  answer: '定义: 对痛苦的深层心理回应，涉及意义解读；特征: 持续的、弥漫的、关乎存在的；例子: "为什么偏偏是我""这一切到底有什么意义"'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Suffering_Meaning_Transformation.md
  section: 1.1 苦难不等于痛苦
- type: concept
  question: 折磨 (Torment)的核心要点是什么？
  answer: '定义: 极端的、无法逃避的苦难；特征: 压倒性的、可能导致心理崩溃；例子: 酷刑、极端虐待、不可治愈的剧痛'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Suffering_Meaning_Transformation.md
  section: 1.1 苦难不等于痛苦
- type: concept
  question: 身体苦难的核心要点是什么？
  answer: '来源: 疾病、伤痛、饥饿、疲劳；特征: 可以被测量，有生物学基础；人类对此的典型反应: 求医、忍耐、适应'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Suffering_Meaning_Transformation.md
  section: 1.2 苦难的类型学
- type: concept
  question: 心理苦难的核心要点是什么？
  answer: '来源: 丧失、背叛、羞辱、恐惧；特征: 主观性强，个体差异大；人类对此的典型反应: 哀悼、愤怒、退缩、求助'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Suffering_Meaning_Transformation.md
  section: 1.2 苦难的类型学
- type: concept
  question: 社会苦难的核心要点是什么？
  answer: '来源: 歧视、排斥、不公、压迫；特征: 有明确的社会结构原因；人类对此的典型反应: 抗争、顺从、逃离'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Suffering_Meaning_Transformation.md
  section: 1.2 苦难的类型学
- type: concept
  question: 苦谛 (Dukkha)的核心要点是什么？
  answer: '内容: 一切有为法皆苦：苦苦（明显的痛苦）、坏苦（快乐的无常）、行苦（存在本身的不满足）；日常语言翻译: 生活本来就不会一直舒服。不是因为哪里出了错，而是"不满足"是存在的底色；对苦难的启示: 接受苦的存在是第一步'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Suffering_Meaning_Transformation.md
  section: 2.1 佛教：苦是觉醒的入口
- type: concept
  question: 集谛 (Samudaya)的核心要点是什么？
  answer: '内容: 苦的根源是贪、嗔、痴——对愉悦的执着、对痛苦的抗拒、对实相的无知；日常语言翻译: 苦不只是因为"坏事发生了"，更是因为我们抓着不放、拼命逃避、看不清楚；对苦难的启示: 不是消除外在痛苦，而是改变内在回应方式'
  source: 02-Mind-Psychology/psychology/special-topics/poverty-suffering/Suffering_Meaning_Transformation.md
  section: 2.1 佛教：苦是觉醒的入口
