  question: 老年冥想课程的核心要点是什么？
  answer: '目标人群: 65岁以上老人；核心价值: 预防老年痴呆、增加脑容量'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Brain_Science_Foundations.md
  section: 冥想可以怎么推广
- type: concept
  question: 正念减压疗法 (MBSR)的核心要点是什么？
  answer: '英文名 (English Term): Mindfulness-Based Stress Reduction；原始语言/术语 (Original Language): 英: Mindfulness-Based Stress
    Reduction；精确定义: 由Kabat-Zinn于1979年创立的8周结构化冥想干预程序，整合正念冥想、身体扫描、瑜伽；历史渊源: 马萨诸塞大学医学院疼痛中心；专业视角: 最早的循证正念临床干预，开创了正念医学化 (Medicalization
    of Mindfulness) 的先河'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Clinical_Applications.md
  section: 核心术语表
- type: concept
  question: 正念认知疗法 (MBCT)的核心要点是什么？
  answer: '英文名 (English Term): Mindfulness-Based Cognitive Therapy；原始语言/术语 (Original Language): 英: MBCT；精确定义: 结合MBSR与CBT的8周抑郁复发预防程序；历史渊源:
    Segal、Teasdale、Williams于1995年开发；专业视角: 针对抑郁症复发的一线心理干预，被NICE推荐'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Clinical_Applications.md
  section: 核心术语表
- type: concept
  question: 接受承诺疗法 (ACT)的核心要点是什么？
  answer: '英文名 (English Term): Acceptance and Commitment Therapy；原始语言/术语 (Original Language): 英: ACT；精确定义: 基于关系框架理论 (RFT)，使用正念与价值观引导的行为改变疗法；历史渊源:
    Hayes于1980s开发；专业视角: 第三代认知行为疗法，强调"心理灵活性" (Psychological Flexibility)'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Clinical_Applications.md
  section: 核心术语表
- type: concept
  question: 广泛性焦虑障碍 (GAD)的核心要点是什么？
  answer: '推荐冥想类型: MBSR、观息禅；核心技术: 正念呼吸、身体扫描、去中心化 (Decentering)；作用机制: 降低杏仁核反应性，增强前额叶调控，打破担忧链 (Worry Chains)；疗程建议: 8周MBSR +
    日常练习；循证等级: A级 (多项RCT支持)；注意事项: 焦虑过高时先稳定化，避免加剧；专业视角: 针对"未来导向的认知评估" (Future-Oriented Appraisals)，正念将注意力锚定当下'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Clinical_Applications.md
  section: 冥想治疗焦虑障碍应用表
- type: concept
  question: 社交焦虑障碍 (SAD)的核心要点是什么？
  answer: '推荐冥想类型: 慈心冥想 (LKM)、自我慈悲；核心技术: 对自己、他人发送善意，降低自我批评；作用机制: 激活内侧前额叶 (mPFC)，减少社交威胁感知；疗程建议: 12周LKM + 暴露练习；循证等级: B级；注意事项:
    初期可能加剧羞耻感，需心理治疗师支持；专业视角: 针对"负面自我评价" (Negative Self-Evaluation)，慈悲是解药'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Clinical_Applications.md
  section: 冥想治疗焦虑障碍应用表
- type: concept
  question: 惊恐障碍 (Panic Disorder)的核心要点是什么？
  answer: '推荐冥想类型: 呼吸调节、内感受暴露；核心技术: 腹式呼吸、觉察身体感觉而不逃避；作用机制: 重新调节自主神经系统，打破"灾难化解释" (Catastrophic Misinterpretation)；疗程建议: 10-16周CBT
    + 正念；循证等级: A级；注意事项: 避免过度呼吸控制，强调"接纳焦虑"；专业视角: 克服"恐惧的恐惧" (Fear of Fear)，内感受暴露是关键'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Clinical_Applications.md
  section: 冥想治疗焦虑障碍应用表
- type: concept
  question: 重度抑郁障碍 (MDD)的核心要点是什么？
  answer: '推荐冥想类型: MBCT、行为激活 + 正念；核心技术: 去中心化、观察"抑郁模式" (Depression Patterns)；作用机制: 打破反刍 (Rumination)，降低DMN过度活跃；疗程建议: 8周MBCT
    (缓解期)；循证等级: A级 (复发预防)；注意事项: 急性期不适用，需先药物稳定；专业视角: 针对"认知反应性" (Cognitive Reactivity)，是复发的关键机制'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Clinical_Applications.md
  section: 冥想治疗抑郁障碍应用表
- type: concept
  question: 持续性抑郁障碍 (PDD)的核心要点是什么？
  answer: '推荐冥想类型: 慈心冥想、自我慈悲；核心技术: 对抗"习得性无助" (Learned Helplessness)，培养自我关怀；作用机制: 激活奖赏系统，增强多巴胺通路；疗程建议: 12-16周 + 长期维持；循证等级:
    B级；注意事项: 需结合心理治疗，单用冥想不足；专业视角: 慢性抑郁常伴"自我憎恨" (Self-Loathing)，慈悲是解药'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Clinical_Applications.md
  section: 冥想治疗抑郁障碍应用表
- type: concept
  question: 禅需空脑的核心要点是什么？
  answer: '事实: 觉察思不战；原因解释: 误思禅=无思；纠正方式: 标记放过练；益处了解: 释挫，疗深。；自助验证: 坐中试觉。；注意事项: 正常思；无抑。；专业视角 (Professional Perspective): 正念是关于注意力的调节，而非思维的消除
    (Thought Suppression)。抑制反会导致反弹。；引用来源 (Citation): Wegner, D. M. (1994). *White Bears*.'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Core.md
  section: 禅修常见误解表
- type: concept
  question: 禅只僧人的核心要点是什么？
  answer: '事实: 世俗日用；原因解释: 误禅=出家；纠正方式: 日融入如走；益处了解: 职疗，便。；自助验证: 通勤禅验。；注意事项: 源敬；适现。；专业视角 (Professional Perspective): MBSR 等世俗化项目已证明对普通人群有效，无需宗教皈依。；引用来源
    (Citation): Kabat-Zinn, J. (1982).'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Core.md
  section: 禅修常见误解表
- type: concept
  question: 禅宗教的核心要点是什么？
  answer: '事实: 哲实践；原因解释: 误绑佛；纠正方式: 世俗版坐；益处了解: 包容疗，无排。；自助验证: 非教书读。；注意事项: 信兼容；无强。；专业视角 (Professional Perspective): 冥想作为一种认知训练
    (Mental Training)，可独立于宗教背景存在。；引用来源 (Citation): Harris, S. (2014). *Waking Up*.'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Core.md
  section: 禅修常见误解表
- type: concept
  question: 职高压的核心要点是什么？
  answer: '主要需求: 快速释；禅修起点: 椅息5min；周路径: 日间隙息，周长坐。；预期效果: 压降，效升。；自助调整: 压峰加时。；注意事项: 职融；无over。；专业视角 (Professional Perspective):
    针对高皮质醇水平，利用短时正念干预 (Brief Mindfulness Intervention) 快速激活副交感神经。；引用来源 (Citation): Creswell, J. D. (2017). *Annual Review
    of Psychology*.'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Core.md
  section: 禅修个性化路径表
- type: concept
  question: 初学者的核心要点是什么？
  answer: '主要需求: 基础建；禅修起点: 数息椅；周路径: 周增2min，日坐。；预期效果: 习惯成，觉入。；自助调整: App导起。；注意事项: 短持；耐心。；专业视角 (Professional Perspective): 基于习惯形成理论，从微习惯
    (Micro-habits) 开始，降低认知门槛。；引用来源 (Citation): Fogg, B. J. (2019). *Tiny Habits*.'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Core.md
  section: 禅修个性化路径表
- type: concept
  question: 情绪型的核心要点是什么？
  answer: '主要需求: 调稳；禅修起点: 慈禅愿；周路径: 日自慈，周扩展。；预期效果: Mood衡，关好。；自助调整: 情绪日志调。；注意事项: 涌备；专业。；专业视角 (Professional Perspective): 针对情绪调节困难，利用慈心禅增强与情绪调节相关的大脑回路连接。；引用来源
    (Citation): Hofmann, S. G. et al. (2011). *Clinical Psychology Review*.'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Core.md
  section: 禅修个性化路径表
- type: concept
  question: 禅需小时坐的核心要点是什么？
  answer: '事实扩展: 微禅效如5min；证据/解释: 研示短坐脑变；纠正实践: 日间隙息；益处澄清: 职便疗，无时限。；自助验证: 短坐周效记。；注意事项: 质重长；渐。；专业视角 (Professional Perspective):
    剂量效应研究显示，即使短板正念也能改善执行功能和情绪。；引用来源 (Citation): Tang, Y. Y. et al. (2007). *PNAS*.'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Core.md
  section: 禅修常见神话debunk扩展表
- type: concept
  question: 禅消极被动的核心要点是什么？
  answer: '事实扩展: 行动觉合一；证据/解释: Engaged禅社变；纠正实践: 职中觉行；益处澄清: 积极疗，效升。；自助验证: 决中坐验。；注意事项: 行融；无逃。；专业视角 (Professional Perspective):
    正念增强主动应对 (Active Coping) 资源，而非逃避问题。；引用来源 (Citation): Lazarus, R. S. & Folkman, S. (1984).'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Core.md
  section: 禅修常见神话debunk扩展表
- type: concept
  question: 日本曹洞的核心要点是什么？
  answer: '差异点: 强调坐无求；实践调整: 西职短坐融入。；益处: 简疗，职稳。；自助融合: 日坐初心。；职场应用: 会议前无求。；注意事项: 严适西松。；专业视角 (Professional Perspective): 强调 "Shikantaza"
    (只是打坐)，由于无目标性，有助于打破西方的成就导向焦虑。；引用来源 (Citation): Dogen Zenji (1200-1253); Suzuki, S. (1970). *Zen Mind, Beginner''s Mind*.'
  source: 02-Mind-Psychology/meditation/overview/Meditation_General.md
  section: 禅修文化差异表
- type: concept
  question: 中国临济的核心要点是什么？
  answer: '差异点: 公案棒喝；实践调整: 温和自问变。；益处: 顿疗，决快。；自助融合: 职谜自思。；职场应用: 阻塞时顿。；注意事项: 喻懂；无暴。；专业视角 (Professional Perspective): 利用认知失调
    (Cognitive Dissonance) 和双重束缚 (Double Bind) 突破逻辑思维局限，激发顿悟。；引用来源 (Citation): Bateson, G. (1972); Linji Yixuan (d. 866).'
  source: 02-Mind-Psychology/meditation/overview/Meditation_General.md
  section: 禅修文化差异表
- type: concept
  question: 越南一行的核心要点是什么？
  answer: '差异点: Engaged行动；实践调整: 职走禅融。；益处: 社疗，职融。；自助融合: 步觉工作。；职场应用: 通勤社觉。；注意事项: 行动；非逃。；专业视角 (Professional Perspective): 入世佛教
    (Engaged Buddhism) 强调正念在日常生活和社会责任中的应用，适合现代伦理。；引用来源 (Citation): Thich Nhat Hanh. *The Miracle of Mindfulness*.'
  source: 02-Mind-Psychology/meditation/overview/Meditation_General.md
  section: 禅修文化差异表
- type: concept
  question: 专注决策的核心要点是什么？
  answer: '禅修支持: 坐禅定；实践方式: 长坐觉选项。；职场示例: 会议决前坐。；益处: 清明减错。；自助练习: 日坐思决。；注意事项: 无急；息锚。；专业视角 (Professional Perspective): 提升这种 "Executive
    Control" (执行控制)，减少决策疲劳和 impulsivity。；引用来源 (Citation): Reb, J. et al. (2014). *Mindfulness*.'
  source: 02-Mind-Psychology/meditation/overview/Meditation_General.md
  section: 禅修与领导力表
- type: concept
  question: Empathy领的核心要点是什么？
  answer: '禅修支持: 慈禅；实践方式: 愿语队觉。；职场示例: 反馈时慈。；益处: 团队忠，关好。；自助练习: 默愿下属。；注意事项: 真行；界设。；专业视角 (Professional Perspective): 增强心理理论 (Theory
    of Mind)，提升理解他人意图和情感的能力，促进变革型领导。；引用来源 (Citation): Tan, C.-M. (2012). *Search Inside Yourself*.'
  source: 02-Mind-Psychology/meditation/overview/Meditation_General.md
  section: 禅修与领导力表
- type: concept
  question: Resilience的核心要点是什么？
  answer: '禅修支持: 无常观；实践方式: 挫坐观变。；职场示例: 失败后坐释。；益处: 回弹快，稳。；自助练习: 职挫坐。；注意事项: 哲融；支持。；专业视角 (Professional Perspective): 建立心理弹性 (Resilience)，通过接受变化减少创伤后压力，促进复原。；引用来源
    (Citation): Southwick, S. M. & Charney, D. S. (2012).'
  source: 02-Mind-Psychology/meditation/overview/Meditation_General.md
  section: 禅修与领导力表
- type: concept
  question: 习惯锚定的核心要点是什么？
  answer: '描述: 日固定时禅；实施方法: 晨咖啡后坐。；频率: 日；益处: 自动练，持效。；自助工具: App提醒锚。；注意事项: 锚选稳；无变。；专业视角 (Professional Perspective): 实现意图 (Implementation
    Intentions) 和习惯叠加 (Habit Stacking) 策略。；引用来源 (Citation): Gollwitzer, P. M. (1999).'
  source: 02-Mind-Psychology/meditation/overview/Meditation_General.md
  section: 禅修长期维护策略表
- type: concept
  question: 社区续的核心要点是什么？
  answer: '描述: 组支持；实施方法: 周在线/线下坐。；频率: 周/月；益处: 动维持，分享。；自助工具: 组建或加。；注意事项: 正组；贡献。；专业视角 (Professional Perspective): 群体规范 (Social
    Norms) 和社会责任感增强坚持动力。；引用来源 (Citation): Cialdini, R. B. (2007).'
  source: 02-Mind-Psychology/meditation/overview/Meditation_General.md
  section: 禅修长期维护策略表
