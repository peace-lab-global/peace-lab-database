  question: 情感发展的核心要点是什么？
  answer: '具体表现: 依恋需求强烈；影响机制: 容易被情感操控；预防策略: 情感教育、边界训练'
  source: 02-Mind-Psychology/relationships/diverse-populations/Diverse_Populations_Perspectives.md
  section: 青少年群体的特殊关注
