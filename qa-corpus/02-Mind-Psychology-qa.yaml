  section: 七日循环修习法
- type: concept
  question: 第2日的核心要点是什么？
  answer: '星期: 周一；Sefirah: Chokhmah + Binah；主题: 智慧与理解；观想操作: 观想左右脑被银白与深蓝光照亮；对应Affirmation: "愿直觉与理性在我内和谐"'
  source: 02-Mind-Psychology/meditation/jewish-meditation/Jewish_Practical_Guide.md
  section: 七日循环修习法
- type: concept
  question: 第3日的核心要点是什么？
  answer: '星期: 周二；Sefirah: Chesed + Gevurah；主题: 慈悲与严厉；观想操作: 观想右臂白光（给予）、左臂红光（界限）；对应Affirmation: "愿我的爱有智慧，我的界限有爱"'
  source: 02-Mind-Psychology/meditation/jewish-meditation/Jewish_Practical_Guide.md
  section: 七日循环修习法
