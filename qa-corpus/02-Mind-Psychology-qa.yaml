  question: 精神损害赔偿的核心要点是什么？
  answer: '中国《民法典》: 明确规定；美国各州法律: 多数州允许；欧盟国家法律: 普遍承认；日本《民法》: 精神抚慰金'
  source: 02-Mind-Psychology/relationships/legal-ethics/Relationship_Law_Ethics_Deep_Dive.md
  section: 亲密关系的法律维度
