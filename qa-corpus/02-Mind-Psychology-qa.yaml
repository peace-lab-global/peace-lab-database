  answer: '英文术语: Self-Worth / Self-Esteem；其他语言/词源: 拉丁语: *Aestimare* (评估、估价)；定义: 个人对自我价值的整体评价与感受，萨提亚模式的核心治疗目标；专业视角 (Professional
    Perspective): 萨提亚认为低自我价值是所有问题行为的根源；高自我价值使人能够做出一致性选择'
  source: 02-Mind-Psychology/meditation/satir-model/Satir_Model_Overview.md
  section: 核心术语词源表 (Core Terminology & Etymology)
- type: concept
  question: 一致性的核心要点是什么？
  answer: '英文术语: Congruence；其他语言/词源: 拉丁语: *Congruere* (相遇、一致)；定义: 内在感受、意识觉察与外在表达三者和谐统一的状态；专业视角 (Professional Perspective):
    Rogers的一致性概念被萨提亚整合入家庭治疗；是健康沟通的核心指标'
  source: 02-Mind-Psychology/meditation/satir-model/Satir_Model_Overview.md
  section: 核心术语词源表 (Core Terminology & Etymology)
- type: concept
  question: 1916年的核心要点是什么？
  answer: '事件: 出生于威斯康星州农场；重要性: 原生家庭经历；影响: 早年疾病与家庭困难塑造了她对家庭系统的敏感性'
  source: 02-Mind-Psychology/meditation/satir-model/Satir_Model_Overview.md
  section: Virginia Satir生平与贡献表
- type: concept
  question: 1936年的核心要点是什么？
  answer: '事件: 获得教育学学士学位；重要性: 教育者背景；影响: 奠定了她作为教育者与培训师的能力'
  source: 02-Mind-Psychology/meditation/satir-model/Satir_Model_Overview.md
  section: Virginia Satir生平与贡献表
- type: concept
  question: 1948年的核心要点是什么？
  answer: '事件: 开始私人执业，接待第一个家庭案例；重要性: 家庭治疗先驱；影响: 被认为是家庭治疗领域的奠基人之一'
  source: 02-Mind-Psychology/meditation/satir-model/Satir_Model_Overview.md
  section: Virginia Satir生平与贡献表
- type: concept
  question: 提升自我价值感的核心要点是什么？
  answer: '英文术语: Enhance Self-Worth；描述: 从低自我价值到高自我价值的转化；评估指标: 自我接纳程度、自我肯定能力、内在稳定性；专业视角 (Professional Perspective): 自我价值感是萨提亚模式的核心治疗目标，影响所有其他领域'
  source: 02-Mind-Psychology/meditation/satir-model/Satir_Model_Overview.md
  section: 萨提亚模式治疗目标表
- type: concept
  question: 发展一致性沟通的核心要点是什么？
  answer: '英文术语: Develop Congruent Communication；描述: 从防御性沟通姿态转向一致性；评估指标: 能否在压力下保持内外一致、表达真实感受与需求；专业视角 (Professional Perspective):
    一致性不是技术而是存在状态；需要内在工作作为基础'
  source: 02-Mind-Psychology/meditation/satir-model/Satir_Model_Overview.md
  section: 萨提亚模式治疗目标表
