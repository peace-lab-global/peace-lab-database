  question: 什么是Nitnem五段祈祷的冥想维度？
  answer: Nitnem（ਨਿਤਨੇਮ）意为"日常义务"，是每一位受过洗礼的锡克教徒（Amritdhari）每日必须诵读的五段祈祷。对于非洗礼者或初学者，可以从Japji Sahib开始，逐步扩展。
  source: 02-Mind-Psychology/meditation/sikh-meditation/Sikh_Practical_Guide.md
  section: Nitnem五段祈祷的冥想维度
- type: concept
  question: 黎明的核心要点是什么？
  answer: '祈祷名称: Japji Sahib；含义: 致胜之颂；大致时长: 15-25分钟；核心冥想焦点: 宇宙秩序、独一神性、灵魂旅程'
  source: 02-Mind-Psychology/meditation/sikh-meditation/Sikh_Practical_Guide.md
  section: Nitnem五段概览
- type: concept
  question: 清晨的核心要点是什么？
  answer: '祈祷名称: Jaap Sahib；含义: 神圣之名颂；大致时长: 10-15分钟；核心冥想焦点: 神的无限属性、敬畏与惊叹'
  source: 02-Mind-Psychology/meditation/sikh-meditation/Sikh_Practical_Guide.md
  section: Nitnem五段概览
- type: concept
  question: 上午的核心要点是什么？
  answer: '祈祷名称: Tav-Prasad Savaiye；含义: 恩典十颂；大致时长: 5分钟；核心冥想焦点: 神的慈悲、弃绝虚假依附'
  source: 02-Mind-Psychology/meditation/sikh-meditation/Sikh_Practical_Guide.md
  section: Nitnem五段概览
- type: concept
  question: Mool Mantar的核心要点是什么？
  answer: '编号: 引言；核心主题: 一神的本质定义；冥想焦点: 反复观想 Ik Onkar（一神）的绝对一元性；现代对应: 存在的根本统一'
  source: 02-Mind-Psychology/meditation/sikh-meditation/Sikh_Practical_Guide.md
  section: Japji Sahib：38个Pauri的冥想焦点
- type: concept
  question: 2-4的核心要点是什么？
  answer: '编号: 业力法则；核心主题: 因果与恩典；冥想焦点: 观察自己行为背后的动机；现代对应: 觉察意图的力量'
  source: 02-Mind-Psychology/meditation/sikh-meditation/Sikh_Practical_Guide.md
  section: Japji Sahib：38个Pauri的冥想焦点
- type: concept
  question: 6-10的核心要点是什么？
  answer: '编号: 神圣属性；核心主题: 神的不可描述性；冥想焦点: 在冥想中放下概念，进入惊叹；现代对应: 超越语言的觉知'
  source: 02-Mind-Psychology/meditation/sikh-meditation/Sikh_Practical_Guide.md
  section: Japji Sahib：38个Pauri的冥想焦点
