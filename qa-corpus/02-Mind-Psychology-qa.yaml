  question: 前提条件的核心要点是什么？
  answer: '约炮行为: 无承诺关系预期；出轨行为: 存在承诺关系；核心差异: 是否违背约定'
  source: 02-Mind-Psychology/relationships/impact-analysis/Relationship_Impact_Comparison.md
  section: 核心概念的区别与联系
- type: concept
  question: 知情同意的核心要点是什么？
  answer: '约炮行为: 双方明确同意；出轨行为: 一方隐瞒欺骗；核心差异: 透明度差异'
  source: 02-Mind-Psychology/relationships/impact-analysis/Relationship_Impact_Comparison.md
  section: 核心概念的区别与联系
- type: concept
  question: 关系状态的核心要点是什么？
  answer: '约炮行为: 独立的性关系；出轨行为: 附属的背叛行为；核心差异: 关系性质不同'
  source: 02-Mind-Psychology/relationships/impact-analysis/Relationship_Impact_Comparison.md
  section: 核心概念的区别与联系
- type: concept
  question: 动机纯洁性的核心要点是什么？
  answer: '约炮行为特征: 相对单纯(主要是性)；出轨行为特征: 复杂混合(多种需求)；心理复杂度: 出轨更高'
  source: 02-Mind-Psychology/relationships/impact-analysis/Relationship_Impact_Comparison.md
  section: 心理机制的相似性与差异
- type: concept
  question: 道德冲突的核心要点是什么？
  answer: '约炮行为特征: 相对较少内在冲突；出轨行为特征: 显著的价值观冲突；心理复杂度: 出轨更高'
  source: 02-Mind-Psychology/relationships/impact-analysis/Relationship_Impact_Comparison.md
  section: 心理机制的相似性与差异
- type: concept
  question: 关系影响的核心要点是什么？
  answer: '约炮行为特征: 独立关系，影响有限；出轨行为特征: 破坏原有关系基础；心理复杂度: 出轨更严重'
  source: 02-Mind-Psychology/relationships/impact-analysis/Relationship_Impact_Comparison.md
  section: 心理机制的相似性与差异
- type: concept
  question: 情绪稳定性的核心要点是什么？
  answer: '缓冲作用: 更好地处理挫折；加剧作用: 更强烈的负面反应；机制解释: 情绪调节能力差异'
  source: 02-Mind-Psychology/relationships/impact-analysis/Relationship_Impact_Comparison.md
  section: 个体差异的调节作用
- type: concept
  question: 开放性的核心要点是什么？
  answer: '缓冲作用: 更灵活的适应；加剧作用: 更容易合理化；机制解释: 认知灵活性影响'
  source: 02-Mind-Psychology/relationships/impact-analysis/Relationship_Impact_Comparison.md
  section: 个体差异的调节作用
- type: concept
  question: 心血管的核心要点是什么？
  answer: '研究发现: 婚姻质量与冠心病风险负相关；效应量: HR=0.71；关键研究: Eaker et al. (2007)；作用机制: 压力缓冲+健康行为'
  source: 02-Mind-Psychology/relationships/impact-analysis/Relationship_Impact_Research.md
  section: 亲密关系与身体健康
- type: concept
  question: 免疫的核心要点是什么？
  answer: '研究发现: 关系满意度与抗体反应正相关；效应量: d=0.45；关键研究: Cohen et al. (2003)；作用机制: 神经-免疫通路'
  source: 02-Mind-Psychology/relationships/impact-analysis/Relationship_Impact_Research.md
  section: 亲密关系与身体健康
- type: concept
  question: 癌症的核心要点是什么？
  answer: '研究发现: 已婚患者生存率更高；效应量: HR=0.80；关键研究: Aizer et al. (2013)；作用机制: 早期发现+治疗依从'
  source: 02-Mind-Psychology/relationships/impact-analysis/Relationship_Impact_Research.md
  section: 亲密关系与身体健康
- type: concept
  question: 高质量婚姻的核心要点是什么？
  answer: '抑郁发生率: 12%；焦虑水平: 低；生活满意度: 最高；自我报告健康: 最高；社会功能: 最佳'
  source: 02-Mind-Psychology/relationships/impact-analysis/Relationship_Impact_Research.md
  section: 关系与心理健康
- type: concept
  question: 低质量婚姻的核心要点是什么？
  answer: '抑郁发生率: 28%；焦虑水平: 高；生活满意度: 较低；自我报告健康: 较差；社会功能: 受损'
  source: 02-Mind-Psychology/relationships/impact-analysis/Relationship_Impact_Research.md
  section: 关系与心理健康
- type: concept
  question: 稳定同居的核心要点是什么？
  answer: '抑郁发生率: 15%；焦虑水平: 中低；生活满意度: 较高；自我报告健康: 良好；社会功能: 良好'
  source: 02-Mind-Psychology/relationships/impact-analysis/Relationship_Impact_Research.md
  section: 关系与心理健康
- type: concept
  question: Alameda County Study的核心要点是什么？
  answer: '样本规模: 6,928人；追踪时间: 9年；核心发现: 社会连接降低50%死亡风险；发表年份: Berkman & Syme (1979)'
  source: 02-Mind-Psychology/relationships/impact-analysis/Relationship_Impact_Research.md
