- type: concept
  question: 攻击类型的核心要点是什么？
  answer: '自恋: 被激怒时反应性；马基雅维利: 预谋性/工具性；精神病态: 均有'
  source: 02-Mind-Psychology/psychology/foundations/personality/Dark_Triad_Personality.md
  section: 1.2 三者的关系
- type: concept
