- type: concept
  question: MBI的核心要点是什么？
  answer: '英文全称: Maslach Burnout Inventory；开发者/年份: Maslach & Jackson (1981)；维度: EE/DP/PA；题目数: 22题；适用场景: 服务行业（金标准）；信效度: α >
    0.85；版权: 需付费'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Assessment_Diagnosis.md
  section: 1.1 主要量表对比总览
- type: concept
  question: MBI-GS的核心要点是什么？
  answer: '英文全称: MBI-General Survey；开发者/年份: Schaufeli et al. (1996)；维度: 耗竭/犬儒/效能；题目数: 16题；适用场景: 所有行业；信效度: α > 0.80；版权: 需付费'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Assessment_Diagnosis.md
  section: 1.1 主要量表对比总览
- type: concept
  question: MBI-ES的核心要点是什么？
  answer: '英文全称: MBI-Educators Survey；开发者/年份: Maslach et al. (1986)；维度: EE/DP/PA；题目数: 22题；适用场景: 教育行业；信效度: α > 0.84；版权: 需付费'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Assessment_Diagnosis.md
  section: 1.1 主要量表对比总览
- type: concept
  question: 情绪耗竭 (EE)的核心要点是什么？
  answer: '英文: Emotional Exhaustion；题目数: 9题；评分范围: 0-54；低倦怠: ≤ 16；中等倦怠: 17-26；高倦怠: ≥ 27；临界分数: 27+ 需关注'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Assessment_Diagnosis.md
  section: 1.2 MBI 详细解读
- type: concept
  question: 去人格化 (DP)的核心要点是什么？
  answer: '英文: Depersonalization；题目数: 5题；评分范围: 0-30；低倦怠: ≤ 6；中等倦怠: 7-12；高倦怠: ≥ 13；临界分数: 13+ 需关注'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Assessment_Diagnosis.md
  section: 1.2 MBI 详细解读
- type: concept
  question: 个人成就感 (PA)的核心要点是什么？
  answer: '英文: Personal Accomplishment；题目数: 8题；评分范围: 0-48；低倦怠: ≥ 39；中等倦怠: 32-38；高倦怠: ≤ 31；临界分数: 31- 需关注'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Assessment_Diagnosis.md
  section: 1.2 MBI 详细解读
- type: concept
  question: EE的核心要点是什么？
  answer: '示例题目: "我在工作中感到情感上已经被耗尽"；评分方式: 0(从不) ~ 6(每天)'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Assessment_Diagnosis.md
  section: 1.2 MBI 详细解读
- type: concept
  question: EE的核心要点是什么？
  answer: '示例题目: "一整天和人打交道让我真的很疲惫"；评分方式: 0(从不) ~ 6(每天)'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Assessment_Diagnosis.md
  section: 1.2 MBI 详细解读
- type: concept
  question: 持续注意力的核心要点是什么？
  answer: '定义: 长时间保持对任务的集中；正常状态: 能专注45-90分钟；倦怠状态: 10-15分钟就走神；日常表现: 开会发呆、读文档看了几遍不知道说什么；神经基础: 右侧前额叶+顶叶注意网络功能减退'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Cognitive_Impact.md
  section: 1.1 三种注意力类型的受损
- type: concept
  question: 选择性注意力的核心要点是什么？
  answer: '定义: 在干扰中聚焦目标信息；正常状态: 能忽略无关干扰；倦怠状态: 容易被无关刺激分心；日常表现: 办公室一有声音就走神，Slack弹窗一响就看；神经基础: 前扣带皮层冲突监控功能下降'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Cognitive_Impact.md
  section: 1.1 三种注意力类型的受损
- type: concept
  question: 分配性注意力的核心要点是什么？
  answer: '定义: 同时处理多项任务；正常状态: 能有效多任务切换；倦怠状态: 任务切换成本飙升；日常表现: 一边写报告一边回邮件，两样都做不好；神经基础: 背外侧前额叶工作记忆容量降低'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Cognitive_Impact.md
  section: 1.1 三种注意力类型的受损
- type: concept
  question: 早期（代偿期）的核心要点是什么？
  answer: '表现: 需要更多努力才能维持同等注意力水平；持续时间: 数周~数月；可逆性: 高度可逆'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Cognitive_Impact.md
  section: 1.2 注意力损害的进展模式
- type: concept
  question: 中期（失代偿期）的核心要点是什么？
  answer: '表现: 明显走神、遗漏信息增多；持续时间: 数月；可逆性: 需干预恢复'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Cognitive_Impact.md
  section: 1.2 注意力损害的进展模式
- type: concept
  question: 晚期（认知迷雾）的核心要点是什么？
  answer: '表现: 持续的"脑雾"，无法集中于任何事；持续时间: 数月~数年；可逆性: 恢复缓慢'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Cognitive_Impact.md
  section: 1.2 注意力损害的进展模式
- type: concept
  question: 认知速度的核心要点是什么？
  answer: '描述: 思维变慢，反应迟钝；患者原话: "以前秒回的东西，现在要想半天"'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Cognitive_Impact.md
  section: 1.3 "脑雾" (Brain Fog) 的主观体验
- type: concept
  question: 清晰度的核心要点是什么？
  answer: '描述: 头脑不清醒，像隔着一层雾；患者原话: "感觉大脑被棉花塞住了"'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Cognitive_Impact.md
  section: 1.3 "脑雾" (Brain Fog) 的主观体验
- type: concept
  question: 定义的核心要点是什么？
  answer: '慢性压力: 持续超出应对能力的压力；职业倦怠: 长期工作压力未被管理的综合征；关系: 倦怠是慢性职业压力的特定结局'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Cross_Reference_Analysis.md
  section: 1.1 关联分析
- type: concept
  question: HPA轴的核心要点是什么？
  answer: '慢性压力: 通常过度激活；职业倦怠: 从过度激活到功能低下；关系: 倦怠代表HPA轴的更晚期阶段'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Cross_Reference_Analysis.md
  section: 1.1 关联分析
- type: concept
  question: 皮质醇的核心要点是什么？
  answer: '慢性压力: 持续高水平；职业倦怠: 从高水平到曲线平坦化；关系: 平坦化是倦怠特征性标志'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Cross_Reference_Analysis.md
  section: 1.1 关联分析
- type: concept
  question: 慢性压力概览的核心要点是什么？
  answer: '路径: [chronic-stress/](../../stress-hpa/chronic-stress/)；核心关联: 压力的基础机制'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Cross_Reference_Analysis.md
  section: 1.2 知识库导航
- type: concept
  question: 皮质醇研究的核心要点是什么？
  answer: '路径: [cortisol/](../../stress-hpa/cortisol/)；核心关联: 内分泌失调的详细机制'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Cross_Reference_Analysis.md
  section: 1.2 知识库导航
- type: concept
  question: HPA轴概览的核心要点是什么？
  answer: '路径: [stress-hpa/](../../stress-hpa/)；核心关联: 应激反应系统的全面解析'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Cross_Reference_Analysis.md
  section: 1.2 知识库导航
- type: concept
  question: 核心情感的核心要点是什么？
  answer: '倦怠: 耗竭+冷漠；抑郁症: 悲伤+绝望；焦虑症: 恐惧+担忧；三者关系: 倦怠可演变为抑郁或焦虑'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Cross_Reference_Analysis.md
  section: 2.1 三角关系分析
- type: concept
  question: 情境性的核心要点是什么？
  answer: '倦怠: 高（工作特异）；抑郁症: 低（弥漫性）；焦虑症: 中（可特定也可弥漫）；三者关系: 情境性是关键鉴别点'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Cross_Reference_Analysis.md
  section: 2.1 三角关系分析
- type: concept
  question: 医疗护理的核心要点是什么？
  answer: '倦怠率范围: 42-63%；最高倦怠维度: 情绪耗竭；特殊风险因素: 死亡暴露、轮班、道德伤害；行业趋势: COVID-19后显著恶化'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_High_Risk_Professions.md
  section: 1.1 行业倦怠率对比
- type: concept
  question: 教育行业的核心要点是什么？
  answer: '倦怠率范围: 44-52%；最高倦怠维度: 情绪耗竭+低效能；特殊风险因素: 行政负担、学生行为、低薪；行业趋势: 离职率持续走高'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_High_Risk_Professions.md
  section: 1.1 行业倦怠率对比
- type: concept
  question: IT/科技的核心要点是什么？
  answer: '倦怠率范围: 58-62%；最高倦怠维度: 犬儒主义+耗竭；特殊风险因素: 随时在线、冲刺文化、技术债；行业趋势: "大辞职"潮影响显著'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_High_Risk_Professions.md
  section: 1.1 行业倦怠率对比
- type: concept
  question: 死亡暴露的核心要点是什么？
  answer: '具体表现: 频繁面对患者死亡；为什么特别伤人: 持续面对人类最根本的痛苦，同理心消耗巨大；严重程度: 极高'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_High_Risk_Professions.md
  section: 2.1 独特风险因素
- type: concept
  question: 道德伤害的核心要点是什么？
  answer: '具体表现: 资源不足时被迫做出"谁先救"的决定；为什么特别伤人: 违背了"救死扶伤"的核心价值信念；严重程度: 极高'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_High_Risk_Professions.md
  section: 2.1 独特风险因素
- type: concept
  question: 轮班制度的核心要点是什么？
  answer: '具体表现: 12小时轮班、夜班、节假日值班；为什么特别伤人: 打破昼夜节律，皮质醇节律紊乱；严重程度: 高'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_High_Risk_Professions.md
  section: 2.1 独特风险因素
- type: concept
  question: 同情疲劳的核心要点是什么？
  answer: '特殊表现: 不再能对患者的痛苦产生共情；对患者的影响: 冷漠对待、医患沟通质量下降；预警信号: "又一个癌症患者，反正都那样"'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_High_Risk_Professions.md
  section: 2.2 医护人员倦怠的特殊表现
- type: concept
  question: 道德痛苦的核心要点是什么？
  answer: '特殊表现: 知道该怎么做但制度不允许；对患者的影响: 可能做出次优决策；预警信号: "我已经不在乎了，反正说了也没用"'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_High_Risk_Professions.md
  section: 2.2 医护人员倦怠的特殊表现
- type: concept
  question: 晨间皮质醇觉醒反应 (CAR)的核心要点是什么？
  answer: '正常状态: 醒后30分钟内升高50-75%；倦怠早期: 升高幅度增大（过度激活）；倦怠晚期/慢性: 升高幅度减小甚至消失（钝化）'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Neurobiological_Mechanisms.md
  section: 1.1 正常HPA轴 vs 倦怠状态HPA轴
- type: concept
  question: 日间皮质醇节律的核心要点是什么？
  answer: '正常状态: 晨高暮低的正常昼夜节律；倦怠早期: 全天水平偏高；倦怠晚期/慢性: 曲线平坦化，昼夜差异减小'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Neurobiological_Mechanisms.md
  section: 1.1 正常HPA轴 vs 倦怠状态HPA轴
- type: concept
  question: 应激反应性的核心要点是什么？
  answer: '正常状态: 对急性应激快速升高后恢复；倦怠早期: 反应过度，恢复延迟；倦怠晚期/慢性: 反应钝化，"烧不起来了"'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Neurobiological_Mechanisms.md
  section: 1.1 正常HPA轴 vs 倦怠状态HPA轴
- type: concept
  question: 超负荷期的核心要点是什么？
  answer: '皮质醇模式: 整体水平升高；生理含义: HPA轴过度激活；临床表现: 焦虑、失眠、警觉性增高'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Neurobiological_Mechanisms.md
  section: 1.2 皮质醇曲线平坦化的临床意义
- type: concept
  question: 抵抗期的核心要点是什么？
  answer: '皮质醇模式: 开始出现波动紊乱；生理含义: 调节系统疲劳；临床表现: 情绪不稳、时亢奋时疲惫'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Neurobiological_Mechanisms.md
  section: 1.2 皮质醇曲线平坦化的临床意义
- type: concept
  question: 耗竭期的核心要点是什么？
  answer: '皮质醇模式: 曲线平坦化、整体水平偏低；生理含义: HPA轴功能低下；临床表现: 深度疲劳、动力丧失、"起不来"'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Neurobiological_Mechanisms.md
  section: 1.2 皮质醇曲线平坦化的临床意义
- type: concept
  question: 工作记忆的核心要点是什么？
  answer: '正常状态: 同时处理多项信息；倦怠状态: 容量降低，易"忘词"；功能影响: 会议中跟不上讨论，丢三落四；神经机制: 背外侧PFC灰质密度降低'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Neurobiological_Mechanisms.md
  section: 2.1 前额叶皮层 (PFC) 功能受损
- type: concept
  question: 抑制控制的核心要点是什么？
  answer: '正常状态: 抑制不当反应和冲动；倦怠状态: 控制力下降；功能影响: 容易发脾气、说错话；神经机制: 眶额叶与前扣带回连接减弱'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Neurobiological_Mechanisms.md
  section: 2.1 前额叶皮层 (PFC) 功能受损
- type: concept
  question: 职业倦怠的核心要点是什么？
  answer: '英文名 (English Term): Burnout / Burnout Syndrome；原始语言/词源: 德语: *Ausbrennung* (燃尽)；词源含义: "从内部烧尽"；精确定义: 长期工作压力未被成功管理导致的综合征，表现为情绪耗竭、去人格化与成就感降低；区分要点:
    职业现象，非精神疾病；专业视角: ICD-11编码QD85'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 情绪耗竭的核心要点是什么？
  answer: '英文名 (English Term): Emotional Exhaustion (EE)；原始语言/词源: 英语心理学术语；词源含义: 情绪资源被耗尽；精确定义: 感觉情感资源已经完全透支，无法再给予他人任何东西的极度疲惫状态；区分要点:
    倦怠的核心维度，不等于简单的"累"；专业视角: Maslach三维度模型的首要指标'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 去人格化的核心要点是什么？
  answer: '英文名 (English Term): Depersonalization (DP)；原始语言/词源: 拉丁语: *de-* + *persona* (面具)；词源含义: "摘掉面具、不再以人相待"；精确定义: 对服务对象、同事或工作本身产生冷漠、疏离、物化的态度；区分要点:
    不同于解离障碍的去人格化；专业视角: 倦怠中期核心症状'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 1974的核心要点是什么？
  answer: '里程碑: 首次正式提出；关键人物: Herbert Freudenberger；核心贡献: 在《Staff Burn-Out》中描述助人行业工作者的情感资源枯竭现象；局限性: 偏临床观察，缺乏系统测量'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Overview.md
  section: 2.1 从隐喻到诊断：倦怠概念的学术化历程
- type: concept
  question: 1976的核心要点是什么？
  answer: '里程碑: 社会心理学视角；关键人物: Christina Maslach；核心贡献: 从社会心理学角度研究人际互动中的情感耗竭，发现"去人格化"现象；局限性: 初期局限于服务行业'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Overview.md
  section: 2.1 从隐喻到诊断：倦怠概念的学术化历程
- type: concept
  question: 1981的核心要点是什么？
  answer: '里程碑: 测量工具标准化；关键人物: Maslach & Jackson；核心贡献: 发布 MBI（马斯拉赫职业倦怠量表），确立三维度模型；局限性: 测量争议持续至今'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Overview.md
  section: 2.1 从隐喻到诊断：倦怠概念的学术化历程
- type: concept
  question: 能量耗竭的核心要点是什么？
  answer: 'ICD-11 原文: Feelings of energy depletion or exhaustion；中文翻译: 能量枯竭或极度疲惫的感觉；日常表现: 早上起床就觉得精疲力竭，好像怎么睡都不够'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Overview.md
  section: 2.2 ICD-11 对职业倦怠的定义
- type: concept
  question: 心理距离的核心要点是什么？
  answer: 'ICD-11 原文: Increased mental distance from one''s job, or feelings of negativism or cynicism related to one''s job；中文翻译:
    与工作的心理距离增大，或对工作产生消极和犬儒态度；日常表现: 对工作从热情变成麻木，从认真变成"混日子"'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Overview.md
  section: 2.2 ICD-11 对职业倦怠的定义
- type: concept
  question: 初级预防的核心要点是什么？
  answer: '目标人群: 所有员工；目标: 防止倦怠发生；核心策略: 健康的工作环境设计、压力管理教育；时机: 倦怠前；责任主体: 组织/管理层'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Prevention_Intervention.md
  section: 1.1 倦怠预防的层级体系
- type: concept
  question: 二级预防的核心要点是什么？
  answer: '目标人群: 高风险个体；目标: 早期发现与干预；核心策略: 筛查、EAP、短期干预；时机: 倦怠早期；责任主体: HR/EAP/管理者'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Prevention_Intervention.md
  section: 1.1 倦怠预防的层级体系
- type: concept
  question: 三级预防的核心要点是什么？
  answer: '目标人群: 已倦怠个体；目标: 治疗与康复；核心策略: 临床干预、工作调整、复工支持；时机: 倦怠中晚期；责任主体: 临床专业人员'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Prevention_Intervention.md
  section: 1.1 倦怠预防的层级体系
- type: concept
  question: 效果大小的核心要点是什么？
  answer: '仅靠个体干预: 小~中 (d = 0.22-0.43)；仅靠组织干预: 中 (d = 0.29-0.51)；双管齐下: 大 (d = 0.55+)'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Prevention_Intervention.md
  section: 1.2 组织 vs 个体干预的协同
- type: concept
  question: 持续性的核心要点是什么？
  answer: '仅靠个体干预: 短期有效，易复发；仅靠组织干预: 更持久但个体差异大；双管齐下: 最持久'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Prevention_Intervention.md
  section: 1.2 组织 vs 个体干预的协同
- type: concept
  question: 伦理问题的核心要点是什么？
  answer: '仅靠个体干预: 有"归咎个人"风险；仅靠组织干预: 可能忽视个体需求；双管齐下: 最公平'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Prevention_Intervention.md
  section: 1.2 组织 vs 个体干预的协同
- type: concept
  question: 认知行为疗法 (CBT)的核心要点是什么？
  answer: '核心原理: 识别和改变与工作相关的功能失调认知；适用对象: 有认知扭曲的个体；效果维度: EE↓ 犬儒↓；证据等级: A；典型疗程: 8-16次'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Prevention_Intervention.md
  section: 2.1 循证心理干预方法
- type: concept
  question: 正念减压 (MBSR)的核心要点是什么？
  answer: '核心原理: 提升当下觉知，减少反刍思维；适用对象: 轻~中度倦怠；效果维度: EE↓ 情绪调节↑；证据等级: A；典型疗程: 8周课程'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Prevention_Intervention.md
  section: 2.1 循证心理干预方法
- type: concept
  question: 第一阶段的核心要点是什么？
  answer: '名称: 急性休息期 (Acute Rest)；时间范围: 1-4周；核心任务: 停止消耗，允许彻底休息；标志性特征: 从"不得不休息"到"我需要休息"；主要风险: 急于复工、内疚感强烈'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Recovery_Followup.md
  section: 1.1 四阶段恢复路径
- type: concept
  question: 第二阶段的核心要点是什么？
  answer: '名称: 修复重建期 (Repair)；时间范围: 1-3个月；核心任务: 恢复基本功能，开始心理工作；标志性特征: 睡眠改善、能量开始回升；主要风险: 恢复过早，高估自己'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Recovery_Followup.md
  section: 1.1 四阶段恢复路径
- type: concept
  question: 第三阶段的核心要点是什么？
  answer: '名称: 意义重构期 (Reconstruction)；时间范围: 2-6个月；核心任务: 重新审视价值观和职业方向；标志性特征: "我到底想要什么样的工作和生活？"；主要风险: 回避深层探索'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Recovery_Followup.md
  section: 1.1 四阶段恢复路径
- type: concept
  question: 身体休息的核心要点是什么？
  answer: '具体做法: 充足睡眠、不设闹钟、散步；要避免的: 强迫自己运动、补偿性忙碌；可能的感受: "什么都不做好罪恶"'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Recovery_Followup.md
  section: 1.2 每个阶段的详细任务
- type: concept
  question: 心理减压的核心要点是什么？
  answer: '具体做法: 暂停工作思维、限制工作信息；要避免的: 反复查看工作邮件/消息；可能的感受: "离开了团队会怎样"'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Recovery_Followup.md
  section: 1.2 每个阶段的详细任务
- type: concept
  question: 社会退缩的核心要点是什么？
  answer: '具体做法: 允许自己不社交，只见想见的人；要避免的: 强迫自己"正常社交"；可能的感受: "我是不是太自私了"'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Recovery_Followup.md
  section: 1.2 每个阶段的详细任务
- type: concept
  question: 生理恢复的核心要点是什么？
  answer: '具体做法: 规律作息、适度运动、营养调整；关键指标: 睡眠质量改善、精力回升；专业支持: 必要时内分泌检查'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Recovery_Followup.md
  section: 1.2 每个阶段的详细任务
- type: concept
  question: 情绪处理的核心要点是什么？
  answer: '具体做法: 允许悲伤和愤怒的表达；关键指标: 情绪波动减少、稳定性增加；专业支持: 心理咨询/治疗'
  source: 02-Mind-Psychology/psychology/applied/occupational-burnout/Occupational_Burnout_Recovery_Followup.md
  section: 1.2 每个阶段的详细任务
