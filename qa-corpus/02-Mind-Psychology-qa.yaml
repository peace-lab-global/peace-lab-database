- type: concept
  question: 什么是引言？
  answer: 系统化的治疗监测和长期随访是焦虑障碍治疗成功的关键保障。常规结局监测（ROM）可以提高治疗反应率 20-30%（Lambert et al., 2018），降低治疗脱落率，并帮助临床医生及时识别治疗中的困难。焦虑障碍的慢性化倾向（10
    年复发率 40-60%）更凸显了长期随访管理的重要性。
  source: 02-Mind-Psychology/psychology/clinical/anxiety/Anxiety_Treatment_Monitoring_Followup.md
  section: 引言
