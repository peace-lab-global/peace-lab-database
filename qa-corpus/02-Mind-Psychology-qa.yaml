  answer: '方法: 任何幻觉、妄想、怪异行为、激越、困惑；记录模板: 症状：___ 开始时间：___ 持续时间：___'
  source: 02-Mind-Psychology/psychology/clinical/disorder/epileptic-psychosis/Epileptic_Psychosis_Self_Assessment.md
