  question: 自我聚焦的核心要点是什么？
  answer: '英文: Self-Focused Attention；描述: 将注意力过度指向自身内在体验和外在表现；典型思维举例: "我的脸一定红得像番茄"；临床意义: Clark模型核心；注意力训练靶点'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/social-anxiety/Social_Anxiety_Clinical_Features.md
  section: 表1.1 社交焦虑的核心认知偏差 (Core Cognitive Biases)
- type: concept
  question: 心灵读取的核心要点是什么？
  answer: '英文: Mind Reading；描述: 确信知道他人在想什么(通常是负面的)；典型思维举例: "他们一定觉得我很蠢"；临床意义: 认知重构靶点'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/social-anxiety/Social_Anxiety_Clinical_Features.md
  section: 表1.1 社交焦虑的核心认知偏差 (Core Cognitive Biases)
- type: concept
  question: 预言家谬误的核心要点是什么？
  answer: '英文: Fortune Telling；描述: 确信负面结果会发生；典型思维举例: "我一定会出丑"；临床意义: 行为实验检验'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/social-anxiety/Social_Anxiety_Clinical_Features.md
  section: 表1.1 社交焦虑的核心认知偏差 (Core Cognitive Biases)
- type: concept
  question: 身体监控的核心要点是什么？
  answer: '内容: 监控脸红/出汗/颤抖/声音；后果: 放大感知到的"异常"'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/social-anxiety/Social_Anxiety_Clinical_Features.md
  section: 表1.2 自我聚焦注意的多层面分析 (Self-Focused Attention Layers)
- type: concept
  question: 表现评估的核心要点是什么？
  answer: '内容: 持续评价自己"说了什么""表情如何"；后果: 占用认知资源→实际表现下降'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/social-anxiety/Social_Anxiety_Clinical_Features.md
  section: 表1.2 自我聚焦注意的多层面分析 (Self-Focused Attention Layers)
- type: concept
  question: 观察者视角的核心要点是什么？
  answer: '内容: 从第三人称视角"看"自己(通常是扭曲的负面形象)；后果: 确认负面自我信念'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/social-anxiety/Social_Anxiety_Clinical_Features.md
  section: 表1.2 自我聚焦注意的多层面分析 (Self-Focused Attention Layers)
- type: concept
  question: 定义的核心要点是什么？
  answer: '内容: 社交事件结束后数小时到数天内，反复回顾事件细节，尤其是自认为的"失败"之处'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/social-anxiety/Social_Anxiety_Clinical_Features.md
  section: 表1.3 事后反刍(PEP)详解 (Post-Event Processing)
- type: concept
  question: 特征的核心要点是什么？
  answer: '内容: 以观察者视角回顾；选择性关注负面细节；随时间推移记忆越来越负面(偏差加大)'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/social-anxiety/Social_Anxiety_Clinical_Features.md
  section: 表1.3 事后反刍(PEP)详解 (Post-Event Processing)
- type: concept
  question: 社交焦虑障碍的核心要点是什么？
  answer: '英文名 (English Term): Social Anxiety Disorder (SAD)；原始语言/词源: 拉丁语: *Socius* (同伴) + *Anxietas* (焦虑)；词源含义: "与同伴相处时的焦虑"；精确定义:
    对社交情境中被负面评价、尴尬或羞辱的显著、持续恐惧；临床要点: DSM-5首选名称(取代社交恐惧症)'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/social-anxiety/Social_Anxiety_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 社交恐惧症的核心要点是什么？
  answer: '英文名 (English Term): Social Phobia；原始语言/词源: 希腊语: *Phobos* (φόβος, 恐惧)；词源含义: "对社交的恐惧"；精确定义: 社交焦虑障碍的旧称(DSM-III-R至DSM-IV)；临床要点:
    ICD-11仍使用此术语(6B04)'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/social-anxiety/Social_Anxiety_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 评价恐惧的核心要点是什么？
  answer: '英文名 (English Term): Fear of Evaluation；原始语言/词源: 拉丁语: *Evaluare* (评估)；词源含义: "对被评估的恐惧"；精确定义: 对他人负面评价(批评、嘲笑、拒绝)的核心恐惧；临床要点:
    SAD的核心构念'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/social-anxiety/Social_Anxiety_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: A. 社交情境恐惧的核心要点是什么？
  answer: '内容: 对一种或多种社交情境有显著恐惧或焦虑(社交互动、被观察、在他人面前表演)；临床解读: 恐惧核心是被负面评价；评估要点: 询问具体恐惧情境'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/social-anxiety/Social_Anxiety_Overview.md
  section: 表2.1 DSM-5社交焦虑障碍诊断标准 (DSM-5 Criteria for SAD)
- type: concept
  question: B. 恐惧负面评价的核心要点是什么？
  answer: '内容: 害怕以某种方式行事或表现出焦虑症状而被负面评价(尴尬、拒绝、冒犯他人)；临床解读: "别人会觉得我..."；评估要点: 评估核心认知'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/social-anxiety/Social_Anxiety_Overview.md
  section: 表2.1 DSM-5社交焦虑障碍诊断标准 (DSM-5 Criteria for SAD)
- type: concept
  question: C. 几乎总是引发焦虑的核心要点是什么？
  answer: '内容: 恐惧的社交情境几乎总是引起焦虑或恐惧(儿童可能表现为哭泣、发脾气、冻结)；临床解读: "几乎总是"排除偶发；评估要点: 评估一致性'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/social-anxiety/Social_Anxiety_Overview.md
  section: 表2.1 DSM-5社交焦虑障碍诊断标准 (DSM-5 Criteria for SAD)
- type: concept
  question: 核心恐惧的核心要点是什么？
  answer: 'ICD-11标准: 对社交情境中被负面评价的显著恐惧；与DSM-5差异: 基本一致'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/social-anxiety/Social_Anxiety_Overview.md
  section: 表2.2 ICD-11社交焦虑障碍标准 (ICD-11, 6B04)
- type: concept
  question: 回避/忍受的核心要点是什么？
  answer: 'ICD-11标准: 回避或极度焦虑中忍受；与DSM-5差异: 基本一致'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/social-anxiety/Social_Anxiety_Overview.md
  section: 表2.2 ICD-11社交焦虑障碍标准 (ICD-11, 6B04)
