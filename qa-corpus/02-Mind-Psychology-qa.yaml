  question: 什么是概述 (Overview)？
  answer: 佩玛·丘卓（Pema Chödrön，1936-）是藏传佛教宁玛派和噶举派最知名的西方女性导师之一。她以将藏传佛教中"无常"、"痛苦"和"困难情境"转化为觉醒契机的智慧，深深影响了西方世界的冥想实践。她长期担任加拿大新斯科舍省甘波修道院（Gampo
    Abbey）的首席驻院导师，是将藏传佛教核心教义以现代、通俗、且充满慈悲的方式传递给西方受众的关键桥梁人物。
