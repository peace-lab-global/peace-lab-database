- type: concept
  question: 恐惧症的核心要点是什么？
  answer: '英文名 (English Term): Phobia；原始语言/术语 (Original Language): 希: *Phobos* (φόβος/恐惧)；精确定义: 对特定对象或情境的标志性、非理性、持续恐惧，导致显著痛苦或功能损害；区分与备注:
    不同于正常恐惧（适度、有理由、不损害功能）；专业视角 (Professional Perspective): DSM-5将恐惧症分为特定恐惧症、社交焦虑障碍、广场恐惧症三大类'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Overview.md
  section: 核心术语与定义表 (Core Terminology)
- type: concept
  question: 特定恐惧症的核心要点是什么？
  answer: '英文名 (English Term): Specific Phobia；原始语言/术语 (Original Language): 英: *Specific Phobia*；精确定义: 对特定对象或情境的恐惧（动物、自然环境、血液注射、情境、其他）；区分与备注:
    与广泛性焦虑不同，恐惧有明确对象；专业视角 (Professional Perspective): 最常见的焦虑障碍，终生患病率约7-9%'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Overview.md
  section: 核心术语与定义表 (Core Terminology)
- type: concept
  question: 社交焦虑障碍的核心要点是什么？
  answer: '英文名 (English Term): Social Anxiety Disorder (SAD)；原始语言/术语 (Original Language): 拉: *Anthropophobia* (人类恐惧)；精确定义:
    对社交或表现情境的强烈恐惧，害怕负面评价；区分与备注: 曾称"社交恐惧症"(Social Phobia)；专业视角 (Professional Perspective): 典型发病于青春期，与回避型人格障碍有连续性'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Overview.md
  section: 核心术语与定义表 (Core Terminology)
- type: concept
  question: 特定恐惧症的核心要点是什么？
  answer: '英文名: Specific Phobia；ICD-11编码: 6B03；主要亚型: 动物型、自然环境型、血液-注射-损伤型、情境型、其他型；典型发病年龄: 儿童期(7-11岁)；终生患病率: 7-9%；性别比例(女:男):
    2:1；专业洞察: 最常见焦虑障碍，但就诊率低（除非严重损害功能）'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Overview.md
  section: 恐惧症分类体系表 (Phobia Classification System)
- type: concept
  question: 社交焦虑障碍的核心要点是什么？
  answer: '英文名: Social Anxiety Disorder；ICD-11编码: 6B04；主要亚型: 表现型（仅表现情境）、广泛型（多数社交情境）；典型发病年龄: 青春期(13岁左右)；终生患病率: 7-13%；性别比例(女:男):
    1.5:1；专业洞察: 慢性化率高，易共病抑郁、物质滥用'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Overview.md
  section: 恐惧症分类体系表 (Phobia Classification System)
- type: concept
  question: 广场恐惧症的核心要点是什么？
  answer: '英文名: Agoraphobia；ICD-11编码: 6B02；主要亚型: 伴恐慌障碍、不伴恐慌障碍；典型发病年龄: 成年早期(20-30岁)；终生患病率: 1.7%；性别比例(女:男): 2:1；专业洞察: 功能损害严重，可导致完全无法离家'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Overview.md
  section: 恐惧症分类体系表 (Phobia Classification System)
- type: concept
  question: 动物型的核心要点是什么？
  answer: '英文名: Animal Type；典型恐惧对象: 蛇、蜘蛛、狗、昆虫、鸟类；发病年龄: 童年早期(5-7岁)；性别差异: 女性明显多于男性；神经生物学特点: 进化准备性（快速习得、难以消退）；治疗难度: 中等（暴露疗法有效）；专业洞察:
    可能有进化基础（祖先威胁）'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Overview.md
  section: 特定恐惧症五大亚型详表 (Five Subtypes of Specific Phobia)
- type: concept
  question: 自然环境型的核心要点是什么？
  answer: '英文名: Natural Environment；典型恐惧对象: 高处、雷暴、水、黑暗；发病年龄: 童年中期(7-9岁)；性别差异: 女性多于男性；神经生物学特点: 与生存威胁相关的原始恐惧；治疗难度: 中等；专业洞察:
    恐高症(Acrophobia)最常见'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Overview.md
  section: 特定恐惧症五大亚型详表 (Five Subtypes of Specific Phobia)
- type: concept
  question: 社交焦虑障碍的核心要点是什么？
  answer: '英文名 (English Term): Social Anxiety Disorder (SAD)；原始语言/术语 (Original Language): 拉: *Anthropophobia* (人类恐惧)；精确定义:
    对一种或多种社交情境的显著恐惧，害怕被负面评价；区分与备注: DSM-5改名（旧称"社交恐惧症"）；专业视角 (Professional Perspective): 全球第三常见精神障碍，仅次于抑郁和物质滥用'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Social_Agoraphobia.md
  section: 社交焦虑障碍核心术语表 (Social Anxiety Disorder Core Terms)
- type: concept
  question: 表现焦虑的核心要点是什么？
  answer: '英文名 (English Term): Performance Anxiety；原始语言/术语 (Original Language): 英: *Performance Anxiety*；精确定义: 仅在表演或演讲情境中的焦虑（如公开演讲、音乐演奏）；区分与备注:
    社交焦虑的"仅表现型"亚型；专业视角 (Professional Perspective): 与广泛型区别：不泛化至日常社交'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Social_Agoraphobia.md
  section: 社交焦虑障碍核心术语表 (Social Anxiety Disorder Core Terms)
- type: concept
  question: 负面评价恐惧的核心要点是什么？
  answer: '英文名 (English Term): Fear of Negative Evaluation (FNE)；原始语言/术语 (Original Language): 英: *Fear of Negative Evaluation*；精确定义:
    对他人负面判断的过度担忧；区分与备注: 社交焦虑的核心认知成分；专业视角 (Professional Perspective): Watson & Friend开发FNE量表评估'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Social_Agoraphobia.md
  section: 社交焦虑障碍核心术语表 (Social Anxiety Disorder Core Terms)
- type: concept
  question: 仅表现型的核心要点是什么？
  answer: '英文名: Performance Only；典型情境: 公开演讲、舞台表演、音乐演奏、考试；发病年龄: 青春期至成年；患病率: 社交焦虑中20-30%；功能损害: 轻到中度；治疗难度: 容易到中等；专业洞察: 可能终生不就诊，仅在职业需求时寻求帮助'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Social_Agoraphobia.md
  section: 社交焦虑障碍亚型与表现表 (SAD Subtypes & Presentations)
- type: concept
  question: 广泛型的核心要点是什么？
  answer: '英文名: Generalized SAD；典型情境: 多数或所有社交情境（对话、聚会、约会、会议、进食）；发病年龄: 青春期(11-15岁)；患病率: 社交焦虑中70-80%；功能损害: 重度；治疗难度: 难；专业洞察:
    严重功能损害，易共病抑郁、物质滥用'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Social_Agoraphobia.md
  section: 社交焦虑障碍亚型与表现表 (SAD Subtypes & Presentations)
- type: concept
  question: 回避型人格障碍(AvPD)共病型的核心要点是什么？
  answer: '英文名: SAD with AvPD；典型情境: 全面社交回避、自卑、对批评过度敏感；发病年龄: 儿童晚期至青春期；患病率: 社交焦虑中30-50%；功能损害: **极重度**；治疗难度: **极难**；专业洞察: AvPD与广泛型SAD可能是连续谱系，AvPD更严重、更慢性'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Social_Agoraphobia.md
  section: 社交焦虑障碍亚型与表现表 (SAD Subtypes & Presentations)
- type: concept
  question: 社交情境触发的核心要点是什么？
  answer: '英文名: Social Situation Trigger；内容: 进入或预期社交情境；维持机制: 激活负性信念；治疗靶点: 情境暴露；专业洞察: 预期焦虑可能高于实际焦虑'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Social_Agoraphobia.md
  section: Clark & Wells (1995) 认知模型核心要素
- type: concept
  question: 自我聚焦注意的核心要点是什么？
  answer: '英文名: Self-Focused Attention；内容: 注意力转向内部（自己的焦虑症状、表现）；维持机制: 忽视外部积极线索；治疗靶点: 注意力训练（外部聚焦）；专业洞察: 自我聚焦导致"观众视角"扭曲'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Social_Agoraphobia.md
  section: Clark & Wells (1995) 认知模型核心要素
- type: concept
  question: 什么是动物型恐惧症详表 (Animal Type Phobias)？
  answer: '**动物型恐惧症核心特征**:

    - **进化准备性**: 蛇、蜘蛛等"准备性刺激"快速习得、难以消退

    - **习得途径**: 直接创伤、观察学习（父母恐惧）、信息传递

    - **神经机制**: 杏仁核对威胁线索的过度反应

    - **治疗**: 暴露疗法（现场暴露、VR暴露）效果优异

    - **预后**: 早期干预效果最好；成年后慢性化'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Specific_Types.md
  section: 动物型恐惧症详表 (Animal Type Phobias)
- type: concept
  question: 蛇恐惧症的核心要点是什么？
  answer: '英文名: Ophidiophobia；希腊/拉丁词源: 希: *Ophis* (蛇) + *Phobos*；恐惧对象: 蛇类（包括图片、视频）；患病率: 特定恐惧症中最常见(30-40%)；典型发病年龄: 3-7岁；进化准备性:
    **极高**；治疗难度: 中等；专业洞察: 进化准备性最强，快速习得、难消退；跨文化普遍'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Specific_Types.md
  section: 动物型恐惧症详表 (Animal Type Phobias)
- type: concept
  question: 蜘蛛恐惧症的核心要点是什么？
  answer: '英文名: Arachnophobia；希腊/拉丁词源: 希: *Arachne* (蜘蛛) + *Phobos*；恐惧对象: 蜘蛛（包括蜘蛛网）；患病率: 高(20-30%)；典型发病年龄: 4-8岁；进化准备性: **极高**；治疗难度:
    中等；专业洞察: 女性发病率显著高于男性；可能与祖先毒蜘蛛威胁相关'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Specific_Types.md
  section: 动物型恐惧症详表 (Animal Type Phobias)
- type: concept
  question: 狗恐惧症的核心要点是什么？
  answer: '英文名: Cynophobia；希腊/拉丁词源: 希: *Kýōn* (狗) + *Phobos*；恐惧对象: 狗（尤其大型犬、吠叫）；患病率: 中等(5-10%)；典型发病年龄: 5-9岁；进化准备性: 中等；治疗难度:
    中等；专业洞察: 常源于童年被狗咬或追赶；可泛化至所有犬类'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Specific_Types.md
  section: 动物型恐惧症详表 (Animal Type Phobias)
- type: concept
  question: 什么是自然环境型恐惧症详表 (Natural Environment Type Phobias)？
  answer: '**自然环境型恐惧症核心特征**:

    - **原始恐惧**: 与人类祖先的生存威胁直接相关

    - **发展性**: 许多（如黑暗恐惧）是正常发展阶段，多数自然消退

    - **情境不可控**: 无法完全预测或控制自然环境，增加恐惧

    - **治疗**: 渐进暴露（从照片→视频→现场）；VR技术辅助

    - **共病**: 常与广泛性焦虑、恐慌障碍共病'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Specific_Types.md
  section: 自然环境型恐惧症详表 (Natural Environment Type Phobias)
- type: concept
  question: 恐高症的核心要点是什么？
  answer: '英文名: Acrophobia；希腊/拉丁词源: 希: *Acron* (顶点) + *Phobos*；恐惧对象: 高处（楼梯、阳台、山崖、摩天轮等）；患病率: 自然环境型中最常见(5-10%)；典型发病年龄: 7-12岁；生存威胁关联:
    **极高**；治疗难度: 中到难；专业洞察: 与前庭系统和深度知觉相关；可能有进化基础'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Specific_Types.md
  section: 自然环境型恐惧症详表 (Natural Environment Type Phobias)
- type: concept
  question: 雷暴恐惧症的核心要点是什么？
  answer: '英文名: Astraphobia/Brontophobia；希腊/拉丁词源: 希: *Astrapē* (闪电)/*Brontē* (雷) + *Phobos*；恐惧对象: 雷电、闪电、雷暴天气；患病率: 中等(10-15%)；典型发病年龄:
    5-10岁；生存威胁关联: 高；治疗难度: 中等；专业洞察: 儿童期常见；声音和视觉双重刺激；可与狗的雷暴恐惧并行'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Specific_Types.md
  section: 自然环境型恐惧症详表 (Natural Environment Type Phobias)
- type: concept
  question: 水恐惧症的核心要点是什么？
  answer: '英文名: Aquaphobia；希腊/拉丁词源: 拉: *Aqua* (水) + *Phobos*；恐惧对象: 水（游泳池、湖泊、海洋）、深水、溺水；患病率: 中等(5-10%)；典型发病年龄: 5-10岁；生存威胁关联:
    **极高**；治疗难度: 中等；专业洞察: 可能源于溺水经历或缺乏游泳技能；需结合游泳训练'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Specific_Types.md
  section: 自然环境型恐惧症详表 (Natural Environment Type Phobias)
- type: concept
  question: 恐惧消退的核心要点是什么？
  answer: '英文名: Fear Extinction；理论基础: 重复无伤害暴露→恐惧反应减弱；神经机制: mPFC抑制杏仁核，新学习"安全"；临床应用: 所有恐惧症的核心治疗机制；循证基础: A级（大量动物与人类研究）；专业洞察:
    消退不是"删除"恐惧记忆，而是"抑制"恐惧表达'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Treatment.md
  section: 暴露疗法核心原理表 (Exposure Therapy Principles)
- type: concept
  question: 习惯化的核心要点是什么？
  answer: '英文名: Habituation；理论基础: 重复刺激→反应强度自然下降；神经机制: 感觉适应，神经元放电减少；临床应用: 长时间暴露促进习惯化；循证基础: A级；专业洞察: 需足够长的暴露时间（至少30-45分钟）'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Treatment.md
  section: 暴露疗法核心原理表 (Exposure Therapy Principles)
- type: concept
  question: 违背预期的核心要点是什么？
  answer: '英文名: Expectancy Violation；理论基础: 预期恐惧后果不发生→信念修正；神经机制: 认知重评，预测误差学习；临床应用: 暴露需挑战灾难化预期；循证基础: A级；专业洞察: 暴露的认知成分，强化学习"没有想象的那么糟"'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Treatment.md
  section: 暴露疗法核心原理表 (Exposure Therapy Principles)
- type: concept
  question: 现场暴露的核心要点是什么？
  answer: '英文名: In Vivo Exposure；具体方法: 真实情境中直接暴露（触摸蜘蛛、乘坐飞机）；适用恐惧症: 所有特定恐惧症、广场恐惧症；优势: **最有效**，泛化好；劣势: 成本高、不易控制；效果大小: d=1.0-1.5（极大）；专业建议:
    金标准，首选方法'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Treatment.md
  section: 暴露疗法类型与技术表 (Types of Exposure Therapy)
- type: concept
  question: 想象暴露的核心要点是什么？
  answer: '英文名: Imaginal Exposure；具体方法: 想象恐惧情境并详细描述；适用恐惧症: 难以现场暴露的恐惧（创伤记忆）；优势: 成本低、安全、可控；劣势: 效果弱于现场暴露；效果大小: d=0.60-0.80；专业建议:
    作为现场暴露前的准备'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Treatment.md
  section: 暴露疗法类型与技术表 (Types of Exposure Therapy)
- type: concept
  question: 虚拟现实暴露(VR)的核心要点是什么？
  answer: '英文名: Virtual Reality Exposure；具体方法: VR头盔模拟恐惧情境（飞行、高处、社交）；适用恐惧症: 飞行、恐高、社交、PTSD；优势: 可控、安全、可重复、沉浸感强；劣势: 设备成本、技术限制；效果大小:
    d=0.80-1.20；专业建议: 效果接近现场暴露，技术快速进步'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Treatment.md
  section: 暴露疗法类型与技术表 (Types of Exposure Therapy)
- type: concept
  question: 1. 心理教育的核心要点是什么？
  answer: '英文名: Psychoeducation；具体任务: 解释恐惧症机制、暴露原理、治疗预期；时间: 第1次；关键要点: 建立治疗联盟，降低治疗恐惧；常见错误: 跳过教育直接暴露；专业建议: 患者理解暴露原理才能配合'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Treatment.md
  section: 暴露疗法实施步骤表 (Exposure Therapy Implementation Steps)
- type: concept
  question: 2. 建立恐惧层级表的核心要点是什么？
  answer: '英文名: Fear Hierarchy；具体任务: 列出10-15个恐惧情境，评分0-100；时间: 第1-2次；关键要点: 覆盖从低到高，间隔合理；常见错误: 间隔过大、项目过少；专业建议: 需详细、具体、可操作的情境'
  source: 02-Mind-Psychology/psychology/clinical/phobia/Phobia_Treatment.md
  section: 暴露疗法实施步骤表 (Exposure Therapy Implementation Steps)
- type: concept
