- type: concept
  question: 发作期精神病的核心要点是什么？
  answer: '关键识别特征: 发作期间出现的异常行为（自动症、凝视+恐惧/幻觉）；照护者需观察的信号: 发作形式改变；"发呆"时伴有恐惧表情或自言自语；紧急程度: 紧急——可能是NCSE'
  source: 02-Mind-Psychology/psychology/clinical/disorder/epileptic-psychosis/Epileptic_Psychosis_Self_Assessment.md
  section: 表3.1 如何识别不同类型的癫痫精神病
- type: concept
  question: 分型治疗的核心要点是什么？
  answer: '内涵: 发作期、发作后、发作间期精神病治疗策略不同；实践要点: 明确精神病与癫痫发作的时间关系'
  source: 02-Mind-Psychology/psychology/clinical/disorder/epileptic-psychosis/Epileptic_Psychosis_Treatment.md
  section: 表1.1 核心治疗原则
- type: concept
  question: 癫痫控制优先的核心要点是什么？
  answer: '内涵: 优化抗癫痫治疗是基础；实践要点: 发作期和发作后精神病的根本是控制癫痫'
  source: 02-Mind-Psychology/psychology/clinical/disorder/epileptic-psychosis/Epileptic_Psychosis_Treatment.md
  section: 表1.1 核心治疗原则
- type: concept
  question: 癫痫阈值意识的核心要点是什么？
  answer: '内涵: 抗精神病药可降低癫痫发作阈值；实践要点: 选择低癫痫风险的抗精神病药'
  source: 02-Mind-Psychology/psychology/clinical/disorder/epileptic-psychosis/Epileptic_Psychosis_Treatment.md
  section: 表1.1 核心治疗原则
- type: concept
  question: 非惊厥性癫痫持续状态(NCSE)的核心要点是什么？
  answer: '治疗策略: 抗癫痫药（苯二氮卓类→丙戊酸钠IV/劳拉西泮IV）；注意事项: EEG监测确认；勿误诊为原发精神病'
  source: 02-Mind-Psychology/psychology/clinical/disorder/epileptic-psychosis/Epileptic_Psychosis_Treatment.md
  section: 表2.1 发作期精神病治疗 (Ictal Psychosis Treatment)
- type: concept
  question: 部分复杂发作频繁的核心要点是什么？
  answer: '治疗策略: 优化AED方案；注意事项: 控制发作即控制精神病性症状'
  source: 02-Mind-Psychology/psychology/clinical/disorder/epileptic-psychosis/Epileptic_Psychosis_Treatment.md
  section: 表2.1 发作期精神病治疗 (Ictal Psychosis Treatment)
- type: concept
  question: 诊断关键的核心要点是什么？
  answer: '治疗策略: 视频EEG监测；注意事项: 区分发作期症状与发作后/发作间期'
  source: 02-Mind-Psychology/psychology/clinical/disorder/epileptic-psychosis/Epileptic_Psychosis_Treatment.md
  section: 表2.1 发作期精神病治疗 (Ictal Psychosis Treatment)
- type: concept
  question: 急性期的核心要点是什么？
  answer: '治疗策略: 短期低剂量抗精神病药或苯二氮卓；药物: 劳拉西泮1-2mg口服/IM；或利培酮1-2mg；注意事项: 多数PIP自限性；避免过度治疗'
  source: 02-Mind-Psychology/psychology/clinical/disorder/epileptic-psychosis/Epileptic_Psychosis_Treatment.md
  section: 表2.2 发作后精神病治疗 (Postictal Psychosis Treatment)
- type: concept
  question: 安全管理的核心要点是什么？
  answer: '治疗策略: 若有激越/攻击风险，确保安全环境；药物: 必要时住院观察；注意事项: PIP期间可能有暴力行为'
  source: 02-Mind-Psychology/psychology/clinical/disorder/epileptic-psychosis/Epileptic_Psychosis_Treatment.md
  section: 表2.2 发作后精神病治疗 (Postictal Psychosis Treatment)
