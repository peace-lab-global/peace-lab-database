  question: 什么是概述 (Overview)？
  answer: 瑞吉·雷（Reginald A. "Reggie" Ray，1946-）是美国藏传佛教导师、冥想教师、学者，以及"萨满了知"（Somatic Meditation / Somatic Descent）方法的主要倡导者。他曾是科罗拉多州那洛巴大学（Naropa
    University）的佛教教授和教务长，也是秋吉·创巴仁波切（Chögyam Trungpa Rinpoche）的亲密弟子之一。瑞吉·雷以其对藏传佛教、深度身体工作的独特整合而闻名，他主张真正的灵性觉醒必须通过身体——而非仅仅通过心智——来实现。他创立并领导了科罗拉多州博尔德的
    Dharma Ocean 基金会，致力于保存和传播藏传佛教噶举派的深层修行传统。
  source: 02-Mind-Psychology/meditation/masters/contemporary-spiritual/Reggie_Ray.md
