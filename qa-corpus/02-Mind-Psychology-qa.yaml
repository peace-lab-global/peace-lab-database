  source: 02-Mind-Psychology/therapy/ipt-therapy/IPT_Interpersonal_Psychotherapy_Overview.md
  section: IPT核心治疗焦点表 (Core Treatment Foci)
- type: concept
  question: 第1-3节的核心要点是什么？
  answer: '时间: 评估与建立联盟；核心任务: 全面评估、建立治疗关系；技术重点: 症状评估、人际关系评估；预期目标: 明确诊断、确定治疗焦点；常见挑战: 阻抗、期望过高；应对策略: 心理教育、现实期望设定；专业洞察: 准确评估和良好关系是治疗基础'
  source: 02-Mind-Psychology/therapy/ipt-therapy/IPT_Interpersonal_Psychotherapy_Overview.md
  section: IPT治疗结构化流程表 (Structured Treatment Protocol)
