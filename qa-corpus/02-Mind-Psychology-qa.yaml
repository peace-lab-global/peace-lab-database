  answer: '表现形式: 各自擅长不同技能领域；心理价值: 相互学习、共同成长'
  source: 02-Mind-Psychology/psychology/social/friendship/Same_Gender_Friendship_Psychology.md
  section: 2.1 吸引力建立机制
- type: concept
  question: 性格互补的核心要点是什么？
  answer: '表现形式: 内向与外向特质平衡；心理价值: 丰富互动模式多样性'
  source: 02-Mind-Psychology/psychology/social/friendship/Same_Gender_Friendship_Psychology.md
  section: 2.1 吸引力建立机制
- type: concept
  question: 三角仇恨量表的核心要点是什么？
  answer: '英文名/缩写: Triangular Hate Scale (THS)；开发者: Sternberg (2003)；评估内容: 仇恨三成分：否定亲密、激情、承诺；条目数: 36；用途: 研究+临床筛查；信效度: 良好；专业视角:
    基于Sternberg仇恨理论，最系统的仇恨测量工具'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Clinical_Assessment.md
  section: 表1.1 标准化量表与问卷 (Standardized Scales & Questionnaires)
- type: concept
  question: Cook-Medley敌意量表的核心要点是什么？
  answer: '英文名/缩写: Cook-Medley Hostility Scale (CMHS)；开发者: Cook & Medley (1954)；评估内容: 敌意、愤世嫉俗、不信任；条目数: 50；用途: 临床+研究；信效度: 良好；专业视角:
    测量特质性敌意，与心血管疾病风险相关'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Clinical_Assessment.md
  section: 表1.1 标准化量表与问卷 (Standardized Scales & Questionnaires)
- type: concept
  question: 攻击性问卷的核心要点是什么？
  answer: '英文名/缩写: Buss-Perry Aggression Questionnaire (BPAQ)；开发者: Buss & Perry (1992)；评估内容: 身体攻击、言语攻击、愤怒、敌意；条目数: 29；用途: 临床+研究；信效度:
    良好；专业视角: 多维攻击性评估，敌意子量表与仇恨最相关'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Clinical_Assessment.md
  section: 表1.1 标准化量表与问卷 (Standardized Scales & Questionnaires)
- type: concept
  question: 主题统觉测验的核心要点是什么？
  answer: '英文: TAT；评估内容: 潜意识仇恨主题；操作方式: 看图讲故事；适用场景: 深度临床评估；优势: 绕过防御机制；局限: 主观评分'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Clinical_Assessment.md
  section: 表1.2 投射性与叙事评估方法 (Projective & Narrative Methods)
- type: concept
  question: 罗夏墨迹测验的核心要点是什么？
  answer: '英文: Rorschach；评估内容: 攻击性与敌意指标；操作方式: 墨迹联想；适用场景: 法医/临床评估；优势: 标准化评分(R-PAS)；局限: 需要专业训练'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Clinical_Assessment.md
  section: 表1.2 投射性与叙事评估方法 (Projective & Narrative Methods)
- type: concept
  question: 画人测验的核心要点是什么？
  answer: '英文: Draw-A-Person；评估内容: 攻击性特征表达；操作方式: 画人物图；适用场景: 儿童/青少年评估；优势: 非言语表达；局限: 解释需谨慎'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Clinical_Assessment.md
  section: 表1.2 投射性与叙事评估方法 (Projective & Narrative Methods)
- type: concept
  question: 仇恨的存在与强度的核心要点是什么？
  answer: '关键问题 (中文): "你心中有没有对某个人或某群人有特别强烈的负面感受？"；英文: "Is there someone you feel a particularly strong negative feeling toward?"；评估目的:
    筛查仇恨的存在；注意事项: 使用中性语言，避免过早标签化'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Clinical_Assessment.md
  section: 表2.1 仇恨评估关键问题 (Key Assessment Questions)
- type: concept
  question: 仇恨的对象的核心要点是什么？
  answer: '关键问题 (中文): "你最恨的人是谁？能告诉我关于他们的事情吗？"；英文: "Who do you hate the most? Can you tell me about them?"；评估目的: 了解仇恨的指向和背景；注意事项:
    注意是否有泛化趋势'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Clinical_Assessment.md
  section: 表2.1 仇恨评估关键问题 (Key Assessment Questions)
- type: concept
  question: 三毒之嗔的核心要点是什么？
  answer: '佛教术语: 嗔恚；梵语/巴利语: Dveṣa / Dosa；核心教义: 嗔恚是三毒之一，是轮回苦因；对治方法: 慈心禅(Mettā Bhāvanā)；修行次第: 戒→定→慧次第对治；专业视角: 佛教将仇恨视为心的"毒"而非个性特征'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Cultural_Historical.md
  section: 表1.1 佛教对仇恨的理解与对治 (Buddhist Understanding of Hatred)
- type: concept
  question: 因缘观的核心要点是什么？
  answer: '佛教术语: 缘起；梵语/巴利语: Pratītyasamutpāda；核心教义: 仇恨有因有缘，非自性固有；对治方法: 观察仇恨的因缘生灭；修行次第: 四念处→缘起观；专业视角: 仇恨无自性，了知即可解脱'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Cultural_Historical.md
  section: 表1.1 佛教对仇恨的理解与对治 (Buddhist Understanding of Hatred)
- type: concept
  question: 慈悲对治的核心要点是什么？
  answer: '佛教术语: 四无量心；梵语/巴利语: Catvāri Apramāṇāni；核心教义: 慈(Maitrī)、悲(Karuṇā)、喜(Muditā)、舍(Upekṣā)；对治方法: 从自我→亲人→中性人→怨敌；修行次第: 慈→悲→喜→舍循序渐进；专业视角:
    对仇恨对象修慈悲是高阶实践'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Cultural_Historical.md
  section: 表1.1 佛教对仇恨的理解与对治 (Buddhist Understanding of Hatred)
- type: concept
  question: 以直报怨的核心要点是什么？
  answer: '原典出处: 《论语·宪问》；核心观点: 以公正回应怨恨，而非以德报怨或以怨报怨；实践指导: 不纵容、不报复、保持正直；与现代心理学的对话: 与"健康边界"理念相通；专业视角: 儒家拒绝无条件宽恕，强调公正'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Cultural_Historical.md
  section: 表1.2 儒家对仇恨的理解 (Confucian Understanding)
- type: concept
  question: 仁者爱人的核心要点是什么？
  answer: '原典出处: 《论语·颜渊》；核心观点: 仁是爱人的能力，是对治仇恨的根本；实践指导: 修身→齐家→治国→平天下；与现代心理学的对话: 与慈悲聚焦疗法理念一致；专业视角: 仁是人类关系的理想状态'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Cultural_Historical.md
  section: 表1.2 儒家对仇恨的理解 (Confucian Understanding)
- type: concept
  question: 克己复礼的核心要点是什么？
  answer: '原典出处: 《论语·颜渊》；核心观点: 通过自我约束恢复社会和谐；实践指导: 克制仇恨冲动，回归礼仪秩序；与现代心理学的对话: 与情绪调节理论对应；专业视角: 强调个人修养对社会和谐的贡献'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Cultural_Historical.md
  section: 表1.2 儒家对仇恨的理解 (Confucian Understanding)
- type: concept
  question: 报怨以德的核心要点是什么？
  answer: '原典出处: 《道德经》第63章；核心观点: 以善德回应怨恨；实践指导: 不与恶人对抗，以柔克刚；与仇恨转化的关系: 与宽恕疗法理念相通；专业视角: 老子比孔子更激进的宽恕立场'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Cultural_Historical.md
  section: 表1.3 道家对仇恨的理解 (Daoist Understanding)
- type: concept
  question: 不争的核心要点是什么？
  answer: '原典出处: 《道德经》第8章；核心观点: 上善若水，利万物而不争；实践指导: 放下对抗和竞争心态；与仇恨转化的关系: 化解竞争性仇恨；专业视角: 不争≠软弱，是更高层次的力量'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Cultural_Historical.md
  section: 表1.3 道家对仇恨的理解 (Daoist Understanding)
- type: concept
  question: 虐待与暴力的核心要点是什么？
  answer: '英文: Abuse & Violence；影响机制: 内化攻击者模式；"世界是危险的"信念；仇恨表现形式: 对施虐者的仇恨→泛化至类似对象；关键中介变量: 不安全依恋、创伤后应激；长期后果: 人际暴力循环、慢性敌意；专业视角:
    受虐儿童约30%发展出攻击性模式'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Etiology_Mechanisms.md
  section: 表1.1 早期经历与仇恨形成 (Early Experiences & Hatred Formation)
- type: concept
  question: 情感忽视的核心要点是什么？
  answer: '英文: Emotional Neglect；影响机制: 核心自我价值感缺失；"我不值得被爱"；仇恨表现形式: 对父母/世界的隐性仇恨；关键中介变量: 回避型依恋、情绪识别困难；长期后果: 自我仇恨、关系回避；专业视角: 忽视比虐待更隐蔽，更难被识别'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Etiology_Mechanisms.md
  section: 表1.1 早期经历与仇恨形成 (Early Experiences & Hatred Formation)
- type: concept
  question: 羞耻性体验的核心要点是什么？
  answer: '英文: Shaming Experiences；影响机制: 核心羞耻感内化→转化为外向攻击；仇恨表现形式: 自恋暴怒、对"使我羞耻者"的仇恨；关键中介变量: 羞耻-愤怒循环、自恋脆弱；长期后果: 关系破坏、社交退缩/攻击；专业视角:
    羞耻是仇恨最被低估的根源之一'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Etiology_Mechanisms.md
  section: 表1.1 早期经历与仇恨形成 (Early Experiences & Hatred Formation)
- type: concept
  question: 不安全依恋的核心要点是什么？
  answer: '英文: Insecure Attachment；作用机制: 内在工作模型中他人不可信、不可靠；仇恨易感性: 高(尤其回避-恐惧型)；保护性因素: 安全依恋修复；干预靶点: 长期关系性治疗'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Etiology_Mechanisms.md
  section: 表1.2 心理脆弱性因素 (Psychological Vulnerability Factors)
- type: concept
  question: 低自尊的核心要点是什么？
  answer: '英文: Low Self-Esteem；作用机制: 通过贬低他人维持自尊平衡；仇恨易感性: 中-高；保护性因素: 健康自尊建设；干预靶点: 慈悲聚焦疗法'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Etiology_Mechanisms.md
  section: 表1.2 心理脆弱性因素 (Psychological Vulnerability Factors)
- type: concept
  question: 情绪调节困难的核心要点是什么？
  answer: '英文: Emotion Dysregulation；作用机制: 无法处理强烈情绪→转化为攻击；仇恨易感性: 高；保护性因素: 情绪调节技能；干预靶点: DBT技能训练'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Etiology_Mechanisms.md
  section: 表1.2 心理脆弱性因素 (Psychological Vulnerability Factors)
- type: concept
  question: 亲密关系背叛的核心要点是什么？
  answer: '英文: Intimate Betrayal；仇恨的触发机制: 信任+安全感的根本性破碎；典型表现: 对前伴侣的极端仇恨；心理动力: 依恋创伤+自恋伤害+身份危机；关系后果: 持久性怨恨、后续关系障碍；临床处理方向: 依恋创伤修复+宽恕准备度评估'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Etiology_Mechanisms.md
  section: 2. 仇恨的人际与关系来源 (Interpersonal & Relational Sources)
- type: concept
  question: 家庭暴力的核心要点是什么？
  answer: '英文: Domestic Violence；仇恨的触发机制: 长期暴力下的恐惧→反应性仇恨；典型表现: 对施暴者的仇恨，同时可能有创伤性联结；心理动力: 斯德哥尔摩综合征+习得性无助→愤怒觉醒；关系后果: 复杂情感：仇恨+依赖+自责；临床处理方向:
    安全计划+创伤治疗+赋权'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Etiology_Mechanisms.md
  section: 2. 仇恨的人际与关系来源 (Interpersonal & Relational Sources)
- type: concept
  question: 认知行为疗法的核心要点是什么？
  answer: '英文: CBT；创始人/代表: Beck, Ellis；对仇恨的理解: 仇恨源于认知歪曲和非理性信念；核心干预技术: 认知重构、行为实验、暴露；适用仇恨类型: 反应性仇恨、怨恨；证据等级: A级；专业视角: 擅长处理仇恨的认知成分'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Intervention_Techniques.md
  section: 表1.1 主要治疗流派与仇恨干预 (Major Therapeutic Approaches)
- type: concept
  question: 慈悲聚焦疗法的核心要点是什么？
  answer: '英文: CFT；创始人/代表: Paul Gilbert；对仇恨的理解: 仇恨是威胁系统过度激活+安抚系统不足；核心干预技术: 慈悲心训练、安全感建立、自我慈悲；适用仇恨类型: 自我仇恨、羞耻驱动仇恨；证据等级: B级；专业视角:
    对自我仇恨最有效的方法之一'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Intervention_Techniques.md
  section: 表1.1 主要治疗流派与仇恨干预 (Major Therapeutic Approaches)
- type: concept
  question: 情绪聚焦疗法的核心要点是什么？
  answer: '英文: EFT；创始人/代表: Leslie Greenberg；对仇恨的理解: 仇恨下面藏着未被触及的原发情绪；核心干预技术: 椅子技术、情绪觉察、情绪转化；适用仇恨类型: 个体仇恨、关系仇恨；证据等级: A级；专业视角:
    善于触及仇恨下的底层脆弱情感'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Intervention_Techniques.md
  section: 表1.1 主要治疗流派与仇恨干预 (Major Therapeutic Approaches)
- type: concept
  question: 认知重构的核心要点是什么？
  answer: '英文: Cognitive Restructuring；来源: CBT；目标: 识别和挑战仇恨相关认知歪曲；操作要点: 识别自动思维→检验证据→替代思维；适应症: 去人性化认知、灾难化思维；注意事项: 不可强制来访者放弃仇恨'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Intervention_Techniques.md
  section: 表1.2 核心干预技术详解 (Core Intervention Techniques)
- type: concept
  question: 椅子技术的核心要点是什么？
  answer: '英文: Chair Work；来源: EFT/Gestalt；目标: 直接表达对仇恨对象的情感；操作要点: 来访者面对空椅(代表仇恨对象)说话；适应症: 未表达的仇恨/悲伤；注意事项: 需要治疗联盟稳固'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Intervention_Techniques.md
  section: 表1.2 核心干预技术详解 (Core Intervention Techniques)
- type: concept
  question: 慈悲冥想的核心要点是什么？
  answer: '英文: Loving-Kindness Meditation；来源: CFT/Buddhist；目标: 培育对自我和他人的慈悲心；操作要点: 从自我→亲人→中性人→困难人→所有人；适应症: 自我仇恨、泛化仇恨；注意事项:
    不可过早将仇恨对象纳入'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Intervention_Techniques.md
  section: 表1.2 核心干预技术详解 (Core Intervention Techniques)
- type: concept
  question: Enright宽恕过程模型的核心要点是什么？
  answer: '提出者: Robert Enright；核心观点: 宽恕是一个可被促进的四阶段过程；阶段/步骤: 揭示→决定→工作→深化；关键区分: 宽恕≠遗忘≠和解≠纵容；证据支持: A级(20+RCT)；专业视角: 最系统化的宽恕干预模型'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Intervention_Techniques.md
  section: 表2.1 宽恕模型与方法 (Forgiveness Models)
- type: concept
  question: Worthington REACH模型的核心要点是什么？
  answer: '提出者: Everett Worthington；核心观点: 情感宽恕是核心改变；阶段/步骤: Recall→Empathize→Altruistic Gift→Commit→Hold；关键区分: 区分决策宽恕和情感宽恕；证据支持:
    A级；专业视角: 结合认知和情感双通道'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Intervention_Techniques.md
  section: 表2.1 宽恕模型与方法 (Forgiveness Models)
- type: concept
  question: 仇恨的核心要点是什么？
  answer: '英文名 (English Term): Hatred；原始语言/词源 (Original Language): 古英语: *Hete* / 古挪威语: *Hatr*；词源含义: "强烈的敌意与厌恶"；精确定义: 对特定对象（个人、群体、事物）持久且强烈的负面情感态度，包含认知贬低、情感厌恶与行为攻击倾向；区分要点:
    仇恨是持久的情感态度，非短暂情绪；专业视角 (Professional Perspective): 仇恨兼具情绪与认知成分，具有稳定性和指向性'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 憎恶的核心要点是什么？
  answer: '英文名 (English Term): Hate；原始语言/词源 (Original Language): 同上；词源含义: 仇恨的动词/名词形式；精确定义: 对某人或某事物的强烈反感和排斥；区分要点: 比仇恨更口语化，可指短暂厌恶；专业视角
    (Professional Perspective): 临床中需区分"我讨厌..."与真正的病理性仇恨'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 敌意的核心要点是什么？
  answer: '英文名 (English Term): Hostility；原始语言/词源 (Original Language): 拉丁语: *Hostilis* (敌人的)；词源含义: "属于敌人的"；精确定义: 一种持续性的攻击倾向和负面认知评估模式；区分要点:
    敌意更偏重认知-态度成分；专业视角 (Professional Perspective): Cook-Medley敌意量表是主要测量工具'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 仇恨的核心要点是什么？
  answer: '中文: 仇恨；英文: Hatred；持续时间: 持久(月-年-终生)；强度: 极高；对象指向性: 高度指向特定对象；认知成分: 对象的本质被贬低；行为倾向: 消灭/伤害对象；核心体验: 强烈排斥+消灭愿望；临床区分要点:
    有稳定的认知贬低结构'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Overview.md
  section: 2. 仇恨与相关概念精确辨析 (Hatred vs. Related Concepts)
- type: concept
  question: 愤怒的核心要点是什么？
  answer: '中文: 愤怒；英文: Anger；持续时间: 短暂(秒-分-小时)；强度: 中-极高；对象指向性: 有明确触发对象；认知成分: 对象的行为被评判；行为倾向: 攻击/对抗；核心体验: 界限被侵犯感；临床区分要点: 短暂状态，可消退'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Overview.md
  section: 2. 仇恨与相关概念精确辨析 (Hatred vs. Related Concepts)
- type: concept
  question: 怨恨的核心要点是什么？
  answer: '中文: 怨恨；英文: Resentment；持续时间: 持久(月-年)；强度: 中-高；对象指向性: 指向伤害源；认知成分: 不公正归因；行为倾向: 消极抵抗/疏远；核心体验: 苦涩+受害感；临床区分要点: 带有受害者认同'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Overview.md
  section: 2. 仇恨与相关概念精确辨析 (Hatred vs. Related Concepts)
- type: concept
  question: 个体仇恨的核心要点是什么？
  answer: '英文名: Interpersonal Hatred；典型情境: 背叛、虐待、深度伤害后；临床表现: 反复回想伤害、复仇幻想、回避或跟踪；心理机制: 创伤记忆固化+无法宽恕；风险等级: 中-高；干预方向: 创伤处理、宽恕疗法、认知重构'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Overview.md
  section: 表3.1 按对象分类的仇恨类型 (Types by Target)
- type: concept
  question: 自我仇恨的核心要点是什么？
  answer: '英文名: Self-Hatred；典型情境: 童年虐待、内化批评、核心羞耻感；临床表现: 自我惩罚、自伤、成瘾、过度自我批评；心理机制: 内化的攻击者认同+核心不配得感；风险等级: 极高(自杀风险)；干预方向: 慈悲聚焦疗法、内在批评者工作、创伤修复'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Overview.md
  section: 表3.1 按对象分类的仇恨类型 (Types by Target)
- type: concept
  question: 什么是概述？
  answer: 本条目属于 Peace Lab 知识体系，目前处于待建设状态。
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Psychology_Overview.md
  section: 概述
- type: concept
  question: 偏见阶梯模型的核心要点是什么？
  answer: '提出者: Gordon Allport；年代: 1954；核心观点: 偏见从轻微到极端分为五个层级；对仇恨的解释: 仇恨是偏见连续体的极端；干预启示: 在早期阶段干预可防止升级；专业视角: 最具影响力的偏见理论'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Social_Political.md
  section: 表1.1 核心社会心理学理论 (Core Social Psychological Theories)
- type: concept
  question: 社会认同理论的核心要点是什么？
  answer: '提出者: Henri Tajfel；年代: 1979；核心观点: 人们通过群体身份获得自尊；对仇恨的解释: 贬低外群体是提升内群体地位的方式；干预启示: 建构包容性身份；专业视角: 最小群体实验证明偏见可无中生有'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Social_Political.md
  section: 表1.1 核心社会心理学理论 (Core Social Psychological Theories)
- type: concept
  question: 现实群体冲突理论的核心要点是什么？
  answer: '提出者: Muzafer Sherif；年代: 1966；核心观点: 资源竞争导致群体间冲突；对仇恨的解释: 真实或感知到的资源竞争引发仇恨；干预启示: 建立超级目标(Superordinate Goals)；专业视角:
    罗伯斯洞穴实验经典示范'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Social_Political.md
  section: 表1.1 核心社会心理学理论 (Core Social Psychological Theories)
- type: concept
  question: Level 1的核心要点是什么？
  answer: '名称: 反对言论；英文: Antilocution；行为表现: 仇恨笑话、贬义称呼、刻板言论；心理机制: 偏见态度+群体规范；社会影响: 正常化偏见、降低敏感度；升级风险因素: 社会容忍+领导者纵容；干预方向: 反偏见教育+言论规范'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Social_Political.md
  section: 表1.2 Allport偏见阶梯 (Allport's Scale of Prejudice)
- type: concept
  question: Level 2的核心要点是什么？
  answer: '名称: 回避；英文: Avoidance；行为表现: 主动避免与目标群体接触；心理机制: 厌恶+恐惧+刻板印象；社会影响: 社会隔离、信息隔断；升级风险因素: 隔离制度化；干预方向: 接触干预+破除刻板印象'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Social_Political.md
  section: 表1.2 Allport偏见阶梯 (Allport's Scale of Prejudice)
- type: concept
  question: Level 3的核心要点是什么？
  answer: '名称: 歧视；英文: Discrimination；行为表现: 系统性排斥就业、教育、住房等；心理机制: 制度化偏见+权力不对称；社会影响: 系统性不平等；升级风险因素: 法律支持歧视；干预方向: 反歧视立法+平权行动'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Social_Political.md
  section: 表1.2 Allport偏见阶梯 (Allport's Scale of Prejudice)
- type: concept
  question: 社会分类的核心要点是什么？
  answer: '英文: Social Categorization；定义: 自动将人分为"我们"和"他们"；在仇恨中的表现: 群体边界的建构和维持；影响因素: 文化、情境、突显性；干预方法: 重新分类+交叉分类'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Social_Political.md
  section: 表2.1 偏见的认知机制 (Cognitive Mechanisms)
- type: concept
  question: 刻板印象的核心要点是什么？
  answer: '英文: Stereotyping；定义: 对群体成员的过度概括化信念；在仇恨中的表现: "他们都是..."的固定认知；影响因素: 媒体、教育、文化传递；干预方法: 反刻板印象训练+个体化'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Social_Political.md
  section: 表2.1 偏见的认知机制 (Cognitive Mechanisms)
- type: concept
  question: 本能与死亡驱力理论的核心要点是什么？
  answer: '提出者: Sigmund Freud；年代: 1920；核心观点: Thanatos(死亡驱力)是攻击和破坏的根本来源；仇恨的定位: 仇恨是死亡驱力外向投射的表现；对干预的启示: 通过分析使潜意识仇恨意识化；现代评价: 概念影响深远但缺乏实证'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Theoretical_Framework.md
  section: 表1.1 仇恨理论演进 (Evolution of Hatred Theories)
- type: concept
  question: 挫折-攻击假说的核心要点是什么？
  answer: '提出者: Dollard, Miller et al.；年代: 1939；核心观点: 挫折总是导致攻击，攻击总是来源于挫折；仇恨的定位: 仇恨是长期挫折累积的产物；对干预的启示: 减少挫折来源；提供替代性发泄；现代评价:
    修订版承认挫折非攻击的唯一原因'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Theoretical_Framework.md
  section: 表1.1 仇恨理论演进 (Evolution of Hatred Theories)
- type: concept
  question: 社会学习理论的核心要点是什么？
  answer: '提出者: Albert Bandura；年代: 1961-1977；核心观点: 攻击行为通过观察学习获得；仇恨的定位: 仇恨是习得的态度和行为模式；对干预的启示: 改变榜样；去学习仇恨模式；现代评价: 解释仇恨的社会传递机制'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Theoretical_Framework.md
  section: 表1.1 仇恨理论演进 (Evolution of Hatred Theories)
- type: concept
  question: 否定亲密的核心要点是什么？
  answer: '英文: Negation of Intimacy；对应爱的成分: 亲密(Intimacy)的反面；核心内容: 通过厌恶与反感寻求远离对象；表现形式: 回避、排斥、社会隔离；情感基础: 厌恶(Disgust)；临床识别要点:
    来访者表达"看到他就恶心""不想跟他有任何关系"'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Theoretical_Framework.md
  section: 表1.2 Sternberg仇恨三角理论详解 (Duplex Theory of Hatred)
- type: concept
  question: 否定激情的核心要点是什么？
  answer: '英文: Passion (Anger/Fear)；对应爱的成分: 激情(Passion)的负面版；核心内容: 因威胁或愤怒产生的强烈情绪驱力；表现形式: 愤怒爆发、攻击冲动、恐惧回避；情感基础: 愤怒/恐惧(Anger/Fear)；临床识别要点:
    强烈的生理激活：心跳加速、肌肉紧张、攻击冲动'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Theoretical_Framework.md
  section: 表1.2 Sternberg仇恨三角理论详解 (Duplex Theory of Hatred)
- type: concept
  question: 贬低承诺的核心要点是什么？
  answer: '英文: Commitment (Devaluation)；对应爱的成分: 承诺(Commitment)的负面版；核心内容: 通过认知贬低将对象非人化；表现形式: 去人性化言论、刻板印象固化；情感基础: 蔑视(Contempt)；临床识别要点:
    稳定的认知结构："他们就是劣等的""不值得被当人看"'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Theoretical_Framework.md
  section: 表1.2 Sternberg仇恨三角理论详解 (Duplex Theory of Hatred)
- type: concept
  question: 冷漠仇恨的核心要点是什么？
  answer: '英文: Cool Hatred；否定亲密: ✓；激情: ×；贬低承诺: ×；典型表现: 厌恶和回避，但无攻击冲动；危险等级: 低'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Theoretical_Framework.md
  section: 表1.3 Sternberg仇恨类型学 (Types of Hatred by Component Combination)
- type: concept
  question: 激情仇恨的核心要点是什么？
  answer: '英文: Hot Hatred；否定亲密: ×；激情: ✓；贬低承诺: ×；典型表现: 强烈愤怒和攻击冲动，但无深层贬低；危险等级: 中'
  source: 02-Mind-Psychology/psychology/social/hatred/Hatred_Theoretical_Framework.md
  section: 表1.3 Sternberg仇恨类型学 (Types of Hatred by Component Combination)
