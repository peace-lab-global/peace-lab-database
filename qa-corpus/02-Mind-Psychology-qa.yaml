  question: 拉班分析 (LMA)的核心要点是什么？
  answer: '英文名: Laban Movement Analysis；过程描述: 针对动力 (Effort) 与空间 (Space) 的定量分析。；治疗功能: 扩展行为库，改善情感表达。；专业视角 (Professional Perspective):
    通过量化的身体指标（轻/重、快/慢）来识别心理防御模式。；应用场景: 领导力培训；抑郁干预。'
