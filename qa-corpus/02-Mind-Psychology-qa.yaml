  answer: '具体情况: 孕早期(前3个月)；注意事项: 禁用腰骶部和腹部穴位；安全措施: 谨慎选择安全穴位'
  source: 02-Mind-Psychology/therapy/incense/moxibustion/Moxibustion_Safety_Guidelines.md
  section: 1.1 艾灸禁忌症
- type: concept
