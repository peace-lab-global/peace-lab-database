- type: concept
  question: 什么是概述 (Overview)？
  answer: 蒋维乔（1873-1958），字竹庄，号因是子，是中国近代"静坐运动"的奠基人和最重要的推广者。他不是一位宗教人物，而是一位教育家、学者和社会活动家，以现代科学和卫生学的视角重新诠释了中国传统的静坐（冥想）修行，将其从宗教和秘传的领域带入了大众教育的范畴。他的《因是子静坐法》(1914)
    是中国第一部以白话文写成的系统性冥想修行指南，影响了整个20世纪中国人对静坐/冥想的理解。
  source: 02-Mind-Psychology/meditation/masters/chinese/Jiang_Weiqiao.md
  section: 概述 (Overview)
- type: concept
  question: 什么是《因是子静坐法续编》 (Continuation)？
  answer: '1920年代出版的续编进一步深化了教学：

    - 更深入的调息技术

    - 佛教止观方法的现代解读

    - 道家内丹学的参考

    - 修行中更高级阶段的身心变化

    - 对"走火入魔"等风险的理性分析'
  source: 02-Mind-Psychology/meditation/masters/chinese/Jiang_Weiqiao.md
  section: 《因是子静坐法续编》 (Continuation)
- type: concept
  question: 什么是概述 (Overview)？
  answer: 净慧长老（1933-2013），俗名黄崇裕，是中国当代最重要的禅宗大师之一，虚云老和尚的嫡传弟子，"生活禅"（Living Chan）运动的创始人。他是中国大陆改革开放以来佛教复兴的核心推动者之一，创办了《法音》杂志、柏林禅寺"生活禅夏令营"，并提出了将传统禅修与现代社会生活深度融合的"生活禅"理念——这是中国本土最重要的冥想现代化实践。
  source: 02-Mind-Psychology/meditation/masters/chinese/Jing_Hui.md
  section: 概述 (Overview)
- type: concept
  question: 什么是概述 (Overview)？
  answer: 圣严法师（1931-2009）是20世纪下半叶至21世纪初最具国际影响力的华人禅师之一。他同时继承了中国禅宗的临济宗和曹洞宗两大法脉，创立了法鼓山（Dharma Drum Mountain）佛教教育体系，并在全球推广"中华禅法鼓宗"。圣严法师的独特之处在于他将深厚的禅宗修证与现代学术训练（日本立正大学文学博士）完美结合，以"心灵环保"的理念将禅修带入现代社会。
  source: 02-Mind-Psychology/meditation/masters/chinese/Sheng_Yen.md
  section: 概述 (Overview)
