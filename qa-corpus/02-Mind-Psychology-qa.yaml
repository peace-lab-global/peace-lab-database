  question: 什么是1. Dhikr 齐克尔完整实操？
  answer: Dhikr（ذِكْر，齐克尔）意为"记念"，是苏菲修行中最核心的实践——通过反复念诵安拉的美名或清真言，使心灵持续与神圣临在联结。
  source: 02-Mind-Psychology/meditation/sufism-meditation/Sufi_Practical_Guide.md
