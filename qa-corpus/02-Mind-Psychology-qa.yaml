- type: concept
  question: 外感受（Exteroception）的核心要点是什么？
  answer: '信息来源: 外部环境；示例: 视觉、听觉、触觉、嗅觉、味觉；主要脑区: 初级感觉皮层（V1, A1, S1）'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Interoception_Guide.md
  section: 1.1 什么是内感受
- type: concept
  question: 本体感觉（Proprioception）的核心要点是什么？
  answer: '信息来源: 身体在空间中的位置；示例: 关节位置、肌肉长度、运动方向；主要脑区: 小脑、顶叶皮层'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Interoception_Guide.md
  section: 1.1 什么是内感受
- type: concept
  question: 内感受（Interoception）的核心要点是什么？
  answer: '信息来源: 身体内部环境；示例: 心跳、呼吸、饥饿、内脏不适、体温；主要脑区: 岛叶、前扣带回（ACC）、躯体感觉皮层'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Interoception_Guide.md
  section: 1.1 什么是内感受
- type: concept
  question: 内感受准确性的核心要点是什么？
  answer: '英文全称: Interoceptive Accuracy；定义: 客观判断身体内部状态的精确程度；测量方式: 心跳计数任务（HCT）、呼吸阻力辨别'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Interoception_Guide.md
  section: 1.2 内感受的多维模型（Garfinkel et al., 2015）
- type: concept
  question: 内感受觉知的核心要点是什么？
  answer: '英文全称: Interoceptive Awareness；定义: 对身体内部信号的有意识关注和觉察；测量方式: MAIA量表（多维内感受觉知评估）、自我报告'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Interoception_Guide.md
  section: 1.2 内感受的多维模型（Garfinkel et al., 2015）
- type: concept
  question: 内感受敏感性的核心要点是什么？
  answer: '英文全称: Interoceptive Sensibility；定义: 对身体感觉的主观重视程度和情绪反应；测量方式: 心跳知觉信心评分、焦虑敏感性指数'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Interoception_Guide.md
  section: 1.2 内感受的多维模型（Garfinkel et al., 2015）
- type: concept
  question: 后脑岛的核心要点是什么？
  answer: '功能: 原始内感受信号的初级表征；冥想相关性: 冥想增强其觉察精度'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Interoception_Guide.md
  section: 2.1 内感受神经通路
