- type: concept
  question: 惊恐发作频率的核心要点是什么？
  answer: '英文名: Panic Attack Frequency；精确定义: 单位时间内惊恐发作的次数；临床应用: 严重度指标；疗效指标'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/panic-disorder/Panic_Disorder_Assessment.md
  section: 1. 评估术语表 (Assessment Terminology)
- type: concept
  question: 焦虑敏感性的核心要点是什么？
  answer: '英文名: Anxiety Sensitivity；精确定义: 对焦虑症状本身有害性的信念；临床应用: 认知脆弱性评估'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/panic-disorder/Panic_Disorder_Assessment.md
  section: 1. 评估术语表 (Assessment Terminology)
- type: concept
  question: 内感受准确性的核心要点是什么？
  answer: '英文名: Interoceptive Accuracy；精确定义: 对身体内部信号的感知精度；临床应用: 内感受暴露基线'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/panic-disorder/Panic_Disorder_Assessment.md
  section: 1. 评估术语表 (Assessment Terminology)
- type: concept
  question: 全称的核心要点是什么？
  answer: '内容: Panic Disorder Severity Scale (惊恐障碍严重度量表)'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/panic-disorder/Panic_Disorder_Assessment.md
  section: 表2.1 惊恐障碍严重度量表 (PDSS)
- type: concept
  question: 评估维度的核心要点是什么？
  answer: '内容: (1)发作频率 (2)发作期痛苦 (3)预期焦虑严重度 (4)广场恐惧回避 (5)内感受回避 (6)工作功能损害 (7)社交功能损害'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/panic-disorder/Panic_Disorder_Assessment.md
  section: 表2.1 惊恐障碍严重度量表 (PDSS)
- type: concept
  question: 全称的核心要点是什么？
  answer: '内容: Anxiety Sensitivity Index-3 (焦虑敏感性指数第3版)'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/panic-disorder/Panic_Disorder_Assessment.md
  section: 表2.2 焦虑敏感性指数-3 (ASI-3)
- type: concept
  question: 症状限制性发作的核心要点是什么？
  answer: '英文名 (English Term): Limited Symptom Attack (LSA)；原始语言/词源: —；精确定义: 满足<4项惊恐发作症状的亚阈值发作；临床要点: 常见；可能是惊恐障碍的前驱或残余'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/panic-disorder/Panic_Disorder_Clinical_Features.md
  section: 1. 核心临床术语 (Core Clinical Terminology)
- type: concept
  question: 夜间惊恐的核心要点是什么？
  answer: '英文名 (English Term): Nocturnal Panic Attack；原始语言/词源: —；精确定义: 从睡眠中突然醒来的惊恐发作；临床要点: 非梦魇；发生于非REM睡眠期'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/panic-disorder/Panic_Disorder_Clinical_Features.md
  section: 1. 核心临床术语 (Core Clinical Terminology)
- type: concept
  question: 预期焦虑的核心要点是什么？
  answer: '英文名 (English Term): Anticipatory Anxiety；原始语言/词源: 拉丁语: *Anticipare*；精确定义: 对下次发作的持续性焦虑等待；临床要点: 常为患者最痛苦的症状'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/panic-disorder/Panic_Disorder_Clinical_Features.md
  section: 1. 核心临床术语 (Core Clinical Terminology)
- type: concept
  question: 心悸/心跳加速的核心要点是什么？
  answer: '英文: Palpitations；发生率: 85-95%；生理机制: 交感激活→肾上腺素→心率↑；患者主观体验: "心脏在胸腔里猛跳"；灾难化解释: "心脏病发作"；医学排除: ECG、troponin'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/panic-disorder/Panic_Disorder_Clinical_Features.md
  section: 表2.1 心血管症状群 (Cardiovascular Symptoms)
- type: concept
  question: 胸痛/胸部不适的核心要点是什么？
  answer: '英文: Chest Pain；发生率: 40-70%；生理机制: 胸壁肌肉紧张；食管痉挛；患者主观体验: "胸口被压住/刺痛"；灾难化解释: "心肌梗死"；医学排除: ECG、冠脉造影'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/panic-disorder/Panic_Disorder_Clinical_Features.md
  section: 表2.1 心血管症状群 (Cardiovascular Symptoms)
- type: concept
  question: 气短/呼吸困难的核心要点是什么？
  answer: '英文: Shortness of Breath；发生率: 70-85%；生理机制: 过度换气→CO₂↓→碱中毒；患者主观体验: "喘不上气"；灾难化解释: "我要窒息死了"'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/panic-disorder/Panic_Disorder_Clinical_Features.md
  section: 表2.2 呼吸症状群 (Respiratory Symptoms)
- type: concept
  question: 窒息感的核心要点是什么？
  answer: '英文: Choking Sensation；发生率: 30-55%；生理机制: 喉部肌肉紧张；咽反射增强；患者主观体验: "喉咙被掐住"；灾难化解释: "气管在关闭"'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/panic-disorder/Panic_Disorder_Clinical_Features.md
  section: 表2.2 呼吸症状群 (Respiratory Symptoms)
- type: concept
  question: 头晕/眩晕的核心要点是什么？
  answer: '英文: Dizziness；发生率: 60-80%；生理机制: 过度换气→脑血管收缩→脑灌注↓；患者主观体验: "天旋地转"；灾难化解释: "我要晕倒/中风"'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/panic-disorder/Panic_Disorder_Clinical_Features.md
  section: 表2.3 神经系统症状群 (Neurological Symptoms)
- type: concept
  question: 惊恐发作的核心要点是什么？
  answer: '英文名 (English Term): Panic Attack；原始语言/词源 (Original Language): 希腊语: *Panikos* (Πανικός, 源自森林之神 Pan)；词源含义: "被潘神惊吓的突然恐惧"；精确定义:
    突然涌现的强烈恐惧或不适，伴≥4项躯体/认知症状，通常10分钟内达峰；临床要点: 惊恐发作≠惊恐障碍；可出现在多种精神障碍中'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/panic-disorder/Panic_Disorder_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 惊恐障碍的核心要点是什么？
  answer: '英文名 (English Term): Panic Disorder；原始语言/词源 (Original Language): 同上 + 拉丁语: *Dis-* (异常) + *Ordinem* (秩序)；词源含义: "因惊恐而秩序失常"；精确定义:
    反复出现的意外惊恐发作，伴持续担忧和/或行为改变，持续≥1月；临床要点: DSM-5独立诊断；ICD-11编码6B01'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/panic-disorder/Panic_Disorder_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 预期焦虑的核心要点是什么？
  answer: '英文名 (English Term): Anticipatory Anxiety；原始语言/词源 (Original Language): 拉丁语: *Anticipare* (提前行动)；词源含义: "对未来的预期恐惧"；精确定义:
    对下次惊恐发作何时/何地发生的持续性焦虑；临床要点: "对恐惧的恐惧"(fear of fear)'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/panic-disorder/Panic_Disorder_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: A. 反复意外惊恐发作的核心要点是什么？
  answer: '内容: 突然涌现的强烈恐惧或不适，数分钟内达到高峰，期间出现≥4项症状(见表2.2)；临床解读: "意外"指无明显触发因素；评估要点: 需区分"意外"vs"预期"发作'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/panic-disorder/Panic_Disorder_Overview.md
  section: 表2.1 DSM-5惊恐障碍诊断标准 (DSM-5 Criteria for Panic Disorder)
- type: concept
  question: B. 发作后持续担忧/行为改变(≥1项)的核心要点是什么？
  answer: '内容: (1)对再次发作或其后果的持续担忧；(2)与发作相关的显著适应不良行为改变；临床解读: 担忧可涉及"发疯""心脏病发作""失控"；评估要点: 至少持续1个月'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/panic-disorder/Panic_Disorder_Overview.md
  section: 表2.1 DSM-5惊恐障碍诊断标准 (DSM-5 Criteria for Panic Disorder)
- type: concept
  question: C. 排除物质/躯体原因的核心要点是什么？
  answer: '内容: 症状非物质(药物)或躯体疾病的生理效应所致；临床解读: 需排除甲亢、嗜铬细胞瘤等；评估要点: 实验室检查、用药史'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/panic-disorder/Panic_Disorder_Overview.md
  section: 表2.1 DSM-5惊恐障碍诊断标准 (DSM-5 Criteria for Panic Disorder)
- type: concept
  question: 10的核心要点是什么？
  answer: '症状: **感觉异常(麻木/刺痛)**；英文: Paresthesias；类别: 神经；生理机制: 过度换气→血钙变化；常见灾难化解释: "我在中风"'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/panic-disorder/Panic_Disorder_Overview.md
  section: 表2.2 惊恐发作13项症状清单 (DSM-5 Panic Attack Symptoms)
- type: concept
  question: 11的核心要点是什么？
  answer: '症状: **现实解体/人格解体**；英文: Derealization/Depersonalization；类别: 认知；生理机制: 过度换气+焦虑→解离；常见灾难化解释: "我在发疯"'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/panic-disorder/Panic_Disorder_Overview.md
  section: 表2.2 惊恐发作13项症状清单 (DSM-5 Panic Attack Symptoms)
- type: concept
  question: 惊恐控制疗法的核心要点是什么？
  answer: '英文名: Panic Control Treatment (PCT)；精确定义: Barlow开发的惊恐障碍专项CBT方案；临床应用: 一线心理治疗'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/panic-disorder/Panic_Disorder_Treatment.md
  section: 1. 治疗术语表 (Treatment Terminology)
- type: concept
  question: 内感受暴露的核心要点是什么？
  answer: '英文名: Interoceptive Exposure；精确定义: 故意诱发恐惧的躯体感觉以促进习惯化/新学习；临床应用: PCT核心技术'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/panic-disorder/Panic_Disorder_Treatment.md
  section: 1. 治疗术语表 (Treatment Terminology)
- type: concept
  question: 灾难化解释挑战的核心要点是什么？
  answer: '英文名: Challenging Catastrophic Misinterpretations；精确定义: 识别并修正对躯体感觉的灾难化解读；临床应用: 认知重构核心'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/panic-disorder/Panic_Disorder_Treatment.md
  section: 1. 治疗术语表 (Treatment Terminology)
- type: concept
  question: CBT是金标准的核心要点是什么？
  answer: '英文: CBT as Gold Standard；内涵: CBT(特别是PCT)是惊恐障碍一线治疗；实践要点: 证据等级A级；NNT约2-3'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/panic-disorder/Panic_Disorder_Treatment.md
  section: 表2.1 惊恐障碍治疗核心原则 (Core Principles)
- type: concept
  question: 暴露是核心的核心要点是什么？
  answer: '英文: Exposure is Central；内涵: 内感受暴露+现实暴露是治疗的关键机制；实践要点: 不暴露的治疗效果有限'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/panic-disorder/Panic_Disorder_Treatment.md
  section: 表2.1 惊恐障碍治疗核心原则 (Core Principles)
- type: concept
  question: 认知改变的核心要点是什么？
  answer: '英文: Cognitive Change；内涵: 改变对躯体感觉的灾难化解释；实践要点: 认知重构贯穿全程'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/panic-disorder/Panic_Disorder_Treatment.md
  section: 表2.1 惊恐障碍治疗核心原则 (Core Principles)
- type: concept
  question: 轻度(无广场恐惧)的核心要点是什么？
  answer: '一线治疗: CBT(个体或团体)；二线治疗: 引导自助CBT；治疗设置: 门诊；预期疗程: 8-12次'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/panic-disorder/Panic_Disorder_Treatment.md
  section: 表2.2 分层治疗策略 (Stepped Care Model)
- type: concept
  question: 中度的核心要点是什么？
  answer: '一线治疗: CBT；二线治疗: CBT+SSRI；治疗设置: 门诊；预期疗程: 12-16次'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/panic-disorder/Panic_Disorder_Treatment.md
  section: 表2.2 分层治疗策略 (Stepped Care Model)
