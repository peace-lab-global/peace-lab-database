- type: concept
  question: 癫痫所致精神障碍的核心要点是什么？
  answer: '英文名 (English Term): Psychosis of Epilepsy (POE)；原始语言/词源 (Original Language): 希腊语: *Epilepsia* (ἐπιληψία, 抓住)；词源含义:
    "被抓住的状态"；精确定义: 在癫痫病程中出现的精神病性症状；历史演变: 古希腊即有癫痫与精神异常的记载；专业视角 (Professional Perspective): 需神经科-精神科联合管理'
  source: 02-Mind-Psychology/psychology/clinical/disorder/epileptic-psychosis/Epileptic_Psychosis_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 发作期精神病的核心要点是什么？
  answer: '英文名 (English Term): Ictal Psychosis；原始语言/词源 (Original Language): 拉丁语: *Ictus* (打击/发作)；词源含义: "发作时的"；精确定义: 癫痫发作期间出现的精神病性症状（部分复杂发作/非惊厥性癫痫持续状态）；历史演变:
    常被误诊为原发性精神病；专业视角 (Professional Perspective): 需EEG确认；治疗以控制发作为主'
  source: 02-Mind-Psychology/psychology/clinical/disorder/epileptic-psychosis/Epileptic_Psychosis_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 发作后精神病的核心要点是什么？
  answer: '英文名 (English Term): Postictal Psychosis (PIP)；原始语言/词源 (Original Language): 拉丁语: *Post-* (之后) + *Ictus*；词源含义: "发作之后的"；精确定义:
    癫痫发作（尤其丛集发作）后出现的精神病性症状，通常有明确间期；历史演变: Logsdail & Toone (1988) 系统描述；专业视角 (Professional Perspective): 有特征性"清醒间期"（24-72小时）'
  source: 02-Mind-Psychology/psychology/clinical/disorder/epileptic-psychosis/Epileptic_Psychosis_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 与发作的时间关系的核心要点是什么？
  answer: '发作期精神病 (Ictal): 发作期间；发作后精神病 (Postictal/PIP): 发作后24-72小时（有清醒间期）；发作间期精神病 (Interictal/IIP): 与发作无直接时间关联'
  source: 02-Mind-Psychology/psychology/clinical/disorder/epileptic-psychosis/Epileptic_Psychosis_Overview.md
  section: 表2.1 癫痫所致精神障碍三大类型 (Three Types of Epileptic Psychosis)
- type: concept
  question: 持续时间的核心要点是什么？
  answer: '发作期精神病 (Ictal): 数秒-数分钟（发作持续时间）；发作后精神病 (Postictal/PIP): 数天-2周；发作间期精神病 (Interictal/IIP): 数周-数月-慢性'
  source: 02-Mind-Psychology/psychology/clinical/disorder/epileptic-psychosis/Epileptic_Psychosis_Overview.md
  section: 表2.1 癫痫所致精神障碍三大类型 (Three Types of Epileptic Psychosis)
- type: concept
  question: 发生率的核心要点是什么？
  answer: '发作期精神病 (Ictal): 癫痫患者中7-10%；发作后精神病 (Postictal/PIP): 癫痫患者中2-7.8%；发作间期精神病 (Interictal/IIP): 癫痫患者中2-7%'
  source: 02-Mind-Psychology/psychology/clinical/disorder/epileptic-psychosis/Epileptic_Psychosis_Overview.md
  section: 表2.1 癫痫所致精神障碍三大类型 (Three Types of Epileptic Psychosis)
- type: concept
  question: DSM-5的核心要点是什么？
  answer: '分类: 由其他医学状况引起的精神病性障碍；代码: 293.81/293.82；要求: 有癫痫诊断+精神病性症状+因果关系证据'
  source: 02-Mind-Psychology/psychology/clinical/disorder/epileptic-psychosis/Epileptic_Psychosis_Overview.md
  section: 表2.2 诊断标准 (Diagnostic Criteria)
- type: concept
  question: 精神病发生率的核心要点是什么？
  answer: '数据: 癫痫患者中2-7%；临床意义: 是一般人群的5-10倍'
  source: 02-Mind-Psychology/psychology/clinical/disorder/epileptic-psychosis/Epileptic_Psychosis_Self_Assessment.md
  section: 表1.1 癫痫与精神障碍的关联
- type: concept
  question: 抑郁共病率的核心要点是什么？
  answer: '数据: 癫痫患者中20-30%；临床意义: 最常见的精神共病'
  source: 02-Mind-Psychology/psychology/clinical/disorder/epileptic-psychosis/Epileptic_Psychosis_Self_Assessment.md
  section: 表1.1 癫痫与精神障碍的关联
- type: concept
  question: 1. 记录每次发作的核心要点是什么？
  answer: '方法: 日期、时间、发作类型、持续时间、丛集情况；记录模板: 日期：___ 时间：___ 类型：___ 持续：___分钟'
