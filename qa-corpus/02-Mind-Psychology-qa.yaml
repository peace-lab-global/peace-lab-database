  question: 什么是1. 鼓之旅完整引导协议？
  answer: 鼓之旅（Drum Journey）是萨满实践中最核心、最普遍的技术。单调的鼓声（130-220 BPM）改变意识状态（Altered State of Consciousness, ASC），使从业者能够进入非 ordinary
    现实（Non-Ordinary Reality, NOR），与灵性向导、力量动物、祖先或更高智慧建立连接。
  source: 02-Mind-Psychology/meditation/shamanic-traditions/Shamanic_Practical_Guide.md
  section: 1. 鼓之旅完整引导协议
- type: concept
  question: 下界的核心要点是什么？
  answer: '特征: 洞穴、地底、根系、水域深处；典型入口: 树洞、洞穴、地下河流入口；主要接触对象: 力量动物、自然灵、大地母亲；常见目的: 找回力量、治疗身体、 grounding'
  source: 02-Mind-Psychology/meditation/shamanic-traditions/Shamanic_Practical_Guide.md
  section: 1.1 鼓之旅三领域模型
- type: concept
  question: 中间界的核心要点是什么？
  answer: '特征: 与物质世界平行但不可见；典型入口: 镜子、水面、雾中；主要接触对象: 地方灵、祖先、迷失灵魂；常见目的: 寻回灵魂碎片、与祖先对话、解决当下问题'
  source: 02-Mind-Psychology/meditation/shamanic-traditions/Shamanic_Practical_Guide.md
  section: 1.1 鼓之旅三领域模型
- type: concept
  question: 上界的核心要点是什么？
  answer: '特征: 云端之上、星辰之间、光之领域；典型入口: 攀爬、飞行、光束；主要接触对象: 灵性导师、星辰存在、扬升大师；常见目的: 获取高层智慧、未来洞见、灵性进化'
  source: 02-Mind-Psychology/meditation/shamanic-traditions/Shamanic_Practical_Guide.md
  section: 1.1 鼓之旅三领域模型
- type: concept
  question: 空间准备的核心要点是什么？
  answer: '操作: 安静、安全、不受打扰的空间；详细说明: 关闭手机；告知他人你需要30-60分钟不被打扰；拉上窗帘或调暗灯光'
  source: 02-Mind-Psychology/meditation/shamanic-traditions/Shamanic_Practical_Guide.md
  section: 1.2 准备阶段
- type: concept
  question: 身体准备的核心要点是什么？
  answer: '操作: 舒适的躺姿；详细说明: 平躺于地板或床上，头部略高（可用枕头），膝盖下可垫支撑；盖好毯子（意识改变时体温可能变化）'
  source: 02-Mind-Psychology/meditation/shamanic-traditions/Shamanic_Practical_Guide.md
  section: 1.2 准备阶段
- type: concept
  question: 眼罩的核心要点是什么？
  answer: '操作: 遮挡视觉；详细说明: 使用眼罩或布条；减少视觉输入有助于听觉聚焦'
  source: 02-Mind-Psychology/meditation/shamanic-traditions/Shamanic_Practical_Guide.md
  section: 1.2 准备阶段
- type: concept
  question: 入迷 Ecstasy的核心要点是什么？
  answer: '定义: 意识离开日常身体，进入灵性领域的状态；现代理解: 神经科学视角下对应前额叶皮层活动降低、默认模式网络（DMN）解耦'
  source: 02-Mind-Psychology/meditation/shamanic-traditions/Shamanic_Traditions_Overview.md
  section: 1.1 Eliade 的经典定义
- type: concept
  question: 登天 Ascent的核心要点是什么？
  answer: '定义: 萨满向上飞升至上界；现代理解: 与濒死体验（NDE）中的"隧道-光"现象有神经机制重叠'
  source: 02-Mind-Psychology/meditation/shamanic-traditions/Shamanic_Traditions_Overview.md
  section: 1.1 Eliade 的经典定义
- type: concept
  question: 入地 Descent的核心要点是什么？
  answer: '定义: 萨满向下进入下界；现代理解: 对应深度催眠、引导意象中的地下旅程'
  source: 02-Mind-Psychology/meditation/shamanic-traditions/Shamanic_Traditions_Overview.md
  section: 1.1 Eliade 的经典定义
- type: concept
  question: β 波 Beta的核心要点是什么？
  answer: '频率范围: 13–30 Hz；萨满实践中的对应状态: 日常清醒意识；分析性思维'
  source: 02-Mind-Psychology/meditation/shamanic-traditions/Shamanic_Traditions_Overview.md
  section: 1.3 改变的意识状态 Altered States of Consciousness
- type: concept
  question: α 波 Alpha的核心要点是什么？
  answer: '频率范围: 8–13 Hz；萨满实践中的对应状态: 放松、闭眼后数分钟内出现；萨满准备阶段的过渡'
  source: 02-Mind-Psychology/meditation/shamanic-traditions/Shamanic_Traditions_Overview.md
  section: 1.3 改变的意识状态 Altered States of Consciousness
- type: concept
  question: θ 波 Theta的核心要点是什么？
  answer: '频率范围: 4–8 Hz；萨满实践中的对应状态: **鼓之旅程的核心频段**；梦境与深层意象；记忆与情绪的浮现'
  source: 02-Mind-Psychology/meditation/shamanic-traditions/Shamanic_Traditions_Overview.md
  section: 1.3 改变的意识状态 Altered States of Consciousness
- type: concept
  question: 上界 Upper World的核心要点是什么？
  answer: '典型象征: 太阳、星辰、云端宫殿、彩虹；常见灵性存在: 祖先、高位导师、光明存有；功能与目的: 获取智慧、预见未来、宇宙法则的学习'
  source: 02-Mind-Psychology/meditation/shamanic-traditions/Shamanic_Traditions_Overview.md
  section: 1.4 三界宇宙观 Upper / Middle / Lower Worlds
- type: concept
  question: 中界 Middle World的核心要点是什么？
  answer: '典型象征: 森林、河流、山脉、日常景观之镜像；常见灵性存在: 土地灵、自然灵、亡者灵魂；功能与目的: 寻回失落的灵魂碎片、与自然调和'
  source: 02-Mind-Psychology/meditation/shamanic-traditions/Shamanic_Traditions_Overview.md
