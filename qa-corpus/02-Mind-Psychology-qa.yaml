  question: 7-10岁的核心要点是什么？
  answer: '发展特点: 具体逻辑发展；技术调整: 角色扮演游戏<br>简单主题引导；媒材选择: 中等复杂度卡片<br>熟悉主题内容；注意事项: 允许创造性表达<br>避免评判；效果评估: 叙述连贯性'
  source: 02-Mind-Psychology/therapy/oh-cards-therapy/OH_Cards_Techniques_Methods.md
  section: 表2.1 儿童青少年技术调整 (Children & Adolescents Technical Adaptations)
- type: concept
  question: OH卡疗法的核心要点是什么？
  answer: '英文名 (English Term): OH Cards Therapy；原始语言/术语 (Original Language): 德: **OH-Karten Methode**；精确定义 (Technical Definition):
    基于图像与文字卡片的心理投射技术，通过自由联想和象征性表达促进自我觉察、情感表达和心理成长的专业治疗方法。；区分与备注 (Differentiation & Notes): 不同于塔罗牌占卜(预测导向)和艺术治疗(创作导向)，OH卡强调结构化投射和意义建构。；专业视角
    (Professional Perspective): 融合投射心理学、人本主义治疗和表达性艺术治疗的综合性干预方法。'
  source: 02-Mind-Psychology/therapy/oh-cards-therapy/OH_Cards_Terminology_Concepts.md
  section: 表1.1 基础概念术语表 (Fundamental Concept Terminology)
- type: concept
  question: 投射技术的核心要点是什么？
  answer: '英文名 (English Term): Projective Technique；原始语言/术语 (Original Language): 英: Projective Method；精确定义 (Technical Definition):
    个体将内在心理内容(情感、冲突、愿望)投射到外部刺激上的心理过程和相应的技术方法集合。；区分与备注 (Differentiation & Notes): 包括罗夏墨迹、主题统觉测验、OH卡等多种形式，各有其特定的应用场景和理论基础。；专业视角
    (Professional Perspective): 是探索无意识内容、绕过心理防御的重要临床工具。'
  source: 02-Mind-Psychology/therapy/oh-cards-therapy/OH_Cards_Terminology_Concepts.md
  section: 表1.1 基础概念术语表 (Fundamental Concept Terminology)
- type: concept
  question: 图像卡的核心要点是什么？
  answer: '英文名 (English Term): Image Cards；原始语言/术语 (Original Language): 英: Picture Cards；精确定义 (Technical Definition): OH卡系统中88张视觉图像卡片，每张包含精心设计的场景、人物或抽象图案，作为投射刺激材料。；区分与备注
    (Differentiation & Notes): 与文字卡配对使用可产生更丰富的象征意义；图像选择考虑了文化普适性和心理象征性。；专业视角 (Professional Perspective): 图像是右脑加工的主要媒介，能够激活直觉思维和情感体验。'
  source: 02-Mind-Psychology/therapy/oh-cards-therapy/OH_Cards_Terminology_Concepts.md
  section: 表1.1 基础概念术语表 (Fundamental Concept Terminology)
- type: concept
  question: 双卡组合的核心要点是什么？
  answer: '英文名 (English Term): Dual Card Combination；精确定义 (Technical Definition): 同时使用一张图像卡和一张文字卡，探索两者之间的内在联系和整合意义的技术方法。；应用场景:
