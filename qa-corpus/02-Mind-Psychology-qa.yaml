  question: 诊断标准的核心要点是什么？
  answer: '英文: Diagnostic Criteria；原始语言/词源: 希腊语: διάγνωσις (diagnosis, 辨别) + 拉丁语: criterium (标准)；定义: 确立诊断的必要条件'
