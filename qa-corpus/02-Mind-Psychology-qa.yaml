- type: concept
  question: 叙事冒险 (Narrative Adventure)的核心要点是什么？
  answer: '核心机制: 故事驱动选择影响结局；治疗目标: 决策训练价值澄清共情提升；代表游戏: 底特律变人奇异人生极乐迪斯科；适用症状: 道德困惑身份探索决策瘫痪；专业视角 (Professional Perspective): 互动叙事是参与式电影;玩家=主角'
