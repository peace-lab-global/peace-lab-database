  question: 什么是概述 (Overview)？
  answer: 杰克·康菲尔德（Jack Kornfield，1945-）是将南传上座部佛教（Theravada Buddhism）冥想传统系统引入西方世界的最重要人物之一。他与约瑟夫·戈尔茨坦（Joseph Goldstein）、莎伦·萨尔兹伯格（Sharon
    Salzberg）共同创立了内观冥想协会（Insight Meditation Society, IMS），并独立创建了灵岩冥想中心（Spirit Rock Meditation Center）。康菲尔德的独特贡献在于将南传佛教正念修行与西方心理治疗整合，开创了"冥想与心理学对话"的先河。
