- type: concept
  question: 认知重构理论的核心要点是什么？
  answer: '核心概念: 创伤相关认知改变；理论基础: 认知行为理论；作用机制: 识别和改变创伤相关的负性认知；临床应用: 减少创伤相关的认知扭曲；实证支持: 强烈证据支持；专业洞察: 认知改变巩固暴露效果'
  source: 02-Mind-Psychology/therapy/tf-cbt-therapy/TF_CBT_Trauma_Focused_Cognitive_Behavioral_Therapy_Overview.md
  section: TF-CBT核心理论模型表 (Core Theoretical Model)
- type: concept
  question: 情感调节理论的核心要点是什么？
  answer: '核心概念: 情绪管理和调节技能；理论基础: 情绪调节理论；作用机制: 教授情绪识别和调节技能；临床应用: 提高情绪管理能力；实证支持: 中等强度证据；专业洞察: 情绪调节技能是治疗的重要组成部分'
  source: 02-Mind-Psychology/therapy/tf-cbt-therapy/TF_CBT_Trauma_Focused_Cognitive_Behavioral_Therapy_Overview.md
  section: TF-CBT核心理论模型表 (Core Theoretical Model)
- type: concept
  question: 创伤反应教育的核心要点是什么？
  answer: '全称: 解释常见的创伤反应；核心内容: 正常化创伤反应；实施要点: 减少自我责怪；临床应用: 理解促进接纳；疗效机制: 正常化帮助减少羞耻感'
  source: 02-Mind-Psychology/therapy/tf-cbt-therapy/TF_CBT_Trauma_Focused_Cognitive_Behavioral_Therapy_Overview.md
  section: TF-CBT核心治疗组件表 (Core Treatment Components - PRACTICE)
- type: concept
  question: 预警信号识别的核心要点是什么？
  answer: '全称: 识别创伤反应的触发信号；核心内容: 早期预警系统；实施要点: 预防症状恶化；临床应用: 预警提高自我管理能力；疗效机制: 预警系统增强自我控制感'
  source: 02-Mind-Psychology/therapy/tf-cbt-therapy/TF_CBT_Trauma_Focused_Cognitive_Behavioral_Therapy_Overview.md
  section: TF-CBT核心治疗组件表 (Core Treatment Components - PRACTICE)
- type: concept
  question: 生理放松的核心要点是什么？
  answer: '全称: 身体紧张释放技术；核心内容: 渐进肌肉放松、深呼吸；实施要点: 减少躯体化症状；临床应用: 生理平静促进心理平静；疗效机制: 身心连接是治疗的重要途径'
  source: 02-Mind-Psychology/therapy/tf-cbt-therapy/TF_CBT_Trauma_Focused_Cognitive_Behavioral_Therapy_Overview.md
  section: TF-CBT核心治疗组件表 (Core Treatment Components - PRACTICE)
- type: concept
  question: 第1-3节的核心要点是什么？
  answer: '时间: 评估与建立关系；核心任务: 全面评估、建立治疗联盟；技术重点: 创伤史评估、家庭功能评估；预期目标: 建立信任、明确治疗目标；常见挑战: 创伤回忆引发痛苦；应对策略: 渐进暴露、安全保障；专业洞察: 准确评估和良好关系是治疗基础'
  source: 02-Mind-Psychology/therapy/tf-cbt-therapy/TF_CBT_Trauma_Focused_Cognitive_Behavioral_Therapy_Overview.md
  section: TF-CBT治疗阶段结构表 (Treatment Phase Structure)
- type: concept
  question: 创伤评估的核心要点是什么？
  answer: '时间: 详细了解创伤经历；核心任务: 创伤清单、影响评估；技术重点: 确定治疗重点；预期目标: 回忆困难、否认；常见挑战: 建立安全感、验证经验；应对策略: 完整评估指导个性化治疗'
  source: 02-Mind-Psychology/therapy/tf-cbt-therapy/TF_CBT_Trauma_Focused_Cognitive_Behavioral_Therapy_Overview.md
  section: TF-CBT治疗阶段结构表 (Treatment Phase Structure)
- type: concept
  question: 背景觉知引导的核心要点是什么？
  answer: '操作步骤: 1.闭眼注意声音 2.注意注意者 3.安住于觉知本身；适用症状: 广泛性焦虑、身份困惑；神经机制: 默认模式网络(DMN)活动降低；难度等级: 中；注意事项: 不追求特殊体验，仅识别"已经在这里的觉知"'
  source: 02-Mind-Psychology/therapy/therapy-direct-recognition/Direct_Recognition_Therapy_Applications.md
  section: 1.1 觉知锚定技术 (Awareness Anchoring Techniques)
- type: concept
  question: 见证者定位的核心要点是什么？
  answer: '操作步骤: 1.观察念头 2.识别"观察者" 3.稳定在观察者位置；适用症状: 强迫性思维、反刍思维；神经机制: 前额叶与后扣带回解耦合；难度等级: 中-高；注意事项: 避免将观察者实体化为另一个"我"'
  source: 02-Mind-Psychology/therapy/therapy-direct-recognition/Direct_Recognition_Therapy_Applications.md
  section: 1.1 觉知锚定技术 (Awareness Anchoring Techniques)
- type: concept
  question: 觉知扫描的核心要点是什么？
  answer: '操作步骤: 1.从身体感觉开始 2.扩展到情绪 3.扩展到思维 4.注意觉知本身；适用症状: 身心解离、情感麻木；神经机制: 躯体-岛叶-前额叶通路激活；难度等级: 低-中；注意事项: 以温和的方式扫描，不评判任何体验'
  source: 02-Mind-Psychology/therapy/therapy-direct-recognition/Direct_Recognition_Therapy_Applications.md
  section: 1.1 觉知锚定技术 (Awareness Anchoring Techniques)
- type: concept
  question: 视角转换提问的核心要点是什么？
  answer: '治疗师问法: "如果这个念头是一个经过的客人，你会对它说什么？"；预期反应: 从认同念头转变为观察念头；治疗机制: 认知解离+元认知；适用情境: 当来访者被念头完全卷入时'
  source: 02-Mind-Psychology/therapy/therapy-direct-recognition/Direct_Recognition_Therapy_Applications.md
  section: 1.2 去中心化对话技术 (Decentering Dialogue Techniques)
- type: concept
  question: 永恒之问的核心要点是什么？
  answer: '治疗师问法: "在你所有变化的体验中，有什么是始终不变的？"；预期反应: 接触到觉知本身的连续性；治疗机制: 自我作为背景(Self-as-context)；适用情境: 存在焦虑、身份危机'
  source: 02-Mind-Psychology/therapy/therapy-direct-recognition/Direct_Recognition_Therapy_Applications.md
  section: 1.2 去中心化对话技术 (Decentering Dialogue Techniques)
- type: concept
  question: 反向追踪的核心要点是什么？
  answer: '治疗师问法: "是谁在注意这个痛苦？"→"那个''谁''可以被痛苦吗？"；预期反应: 从痛苦的内容退回到觉知本身；治疗机制: 不二论的核心指向；适用情境: 慢性疼痛、顽固性情绪困扰'
  source: 02-Mind-Psychology/therapy/therapy-direct-recognition/Direct_Recognition_Therapy_Applications.md
  section: 1.2 去中心化对话技术 (Decentering Dialogue Techniques)
- type: concept
  question: 灵性探索者的核心要点是什么？
  answer: '适用原因: 已有冥想/正念经验，容易理解觉知概念；预期疗效: 高；治疗调整: 可直接使用不二论术语；禁忌考量: 避免灵性逃避'
  source: 02-Mind-Psychology/therapy/therapy-direct-recognition/Direct_Recognition_Therapy_Applications.md
  section: 2.1 适用人群特征矩阵
- type: concept
  question: 高功能焦虑者的核心要点是什么？
  answer: '适用原因: 认知能力强，但思维过度活跃导致痛苦；预期疗效: 中-高；治疗调整: 从认知入口切入；禁忌考量: 区分焦虑症状与灵性危机'
  source: 02-Mind-Psychology/therapy/therapy-direct-recognition/Direct_Recognition_Therapy_Applications.md
  section: 2.1 适用人群特征矩阵
