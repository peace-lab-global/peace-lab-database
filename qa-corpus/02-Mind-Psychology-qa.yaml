  question: 审美的核心要点是什么？
  answer: '子维度 (Facets): Aesthetics；高分特征: 对美敏感、艺术倾向；低分特征: 对艺术不感兴趣'
  source: 02-Mind-Psychology/psychology/foundations/personality/Big_Five_Model.md
  section: 2.1 OCEAN 全面解析
- type: concept
  question: 情感的核心要点是什么？
  answer: '子维度 (Facets): Feelings；高分特征: 情感体验丰富；低分特征: 情感范围较窄'
  source: 02-Mind-Psychology/psychology/foundations/personality/Big_Five_Model.md
  section: 2.1 OCEAN 全面解析
- type: concept
  question: 自恋 (Narcissism)的核心要点是什么？
  answer: '核心特征: 夸大、特权感、钦慕需求；临床对应: 自恋型人格障碍 (NPD)'
  source: 02-Mind-Psychology/psychology/foundations/personality/Dark_Triad_Personality.md
  section: 1.1 定义与框架
- type: concept
