  question: 赌博障碍的核心要点是什么？
  answer: '英文名 (English Term): Gambling Disorder；原始语言/术语 (Original Language): 希: *Gaulos* (赌具)；核心定义: 持续且反复的赌博行为，导致明显功能损害；DSM-5/ICD-11状态:
    DSM-5正式诊断，归类为"物质相关与成瘾障碍"；专业视角 (Professional Perspective): 行为成瘾中唯一被DSM-5正式承认的诊断'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Behavioral.md
  section: 核心术语与分类表 (Core Terminology & Classification)
- type: concept
  question: 游戏障碍的核心要点是什么？
  answer: '英文名 (English Term): Gaming Disorder；原始语言/术语 (Original Language): 英: *Gaming Disorder*；核心定义: 持续或反复的数字/视频游戏行为，失控、优先级升高、尽管后果严重仍持续；DSM-5/ICD-11状态:
    ICD-11正式诊断；DSM-5列入附录（需进一步研究）；专业视角 (Professional Perspective): 亚洲地区患病率较高，青少年高危'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Behavioral.md
  section: 核心术语与分类表 (Core Terminology & Classification)
- type: concept
  question: 核心诊断的核心要点是什么？
  answer: '内容: 赌博障碍；英文名: Gambling Disorder；专业细节: DSM-5将其从"冲动控制障碍"移至"成瘾障碍"章节；临床要点: 标志着行为成瘾与物质成瘾的同源性'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Behavioral.md
  section: 诊断与特征 (Diagnosis & Features)
- type: concept
  question: 核心特征的核心要点是什么？
  answer: '内容: 失控、耐受、戒断、追损（chasing losses）、撒谎、功能损害；英文名: -；专业细节: 至少符合DSM-5 9条标准中的4条；临床要点: 标准与物质使用障碍高度相似'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Behavioral.md
  section: 诊断与特征 (Diagnosis & Features)
- type: concept
  question: 结构特征的核心要点是什么？
  answer: '内容: 高频率、高赔率、快速反馈、接近中奖；英文名: Structural Characteristics of Gambling；专业细节: 老虎机、网络赌博风险最高；临床要点: 结构设计本身具有"诱导成瘾"特性'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Behavioral.md
  section: 诊断与特征 (Diagnosis & Features)
- type: concept
  question: CBT的核心要点是什么？
  answer: '英文名: Cognitive Behavioral Therapy；循证等级: A级；核心机制: 识别认知扭曲、行为替代、财务控制；适用人群: 中-重度赌博障碍；专业洞察: 一线治疗，个体或团体形式'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Behavioral.md
  section: 赌博障碍治疗方法表
- type: concept
  question: 动机访谈的核心要点是什么？
  answer: '英文名: Motivational Interviewing (MI)；循证等级: A级；核心机制: 处理矛盾心态，增强改变动机；适用人群: 抵抗改变者；专业洞察: 赌博者常处于"沉思阶段"'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Behavioral.md
  section: 赌博障碍治疗方法表
- type: concept
  question: 咖啡因使用障碍的核心要点是什么？
  answer: '英文名 (English Term): Caffeine Use Disorder (CUD)；原始语言/术语 (Original Language): 英: *Caffeine Use Disorder*；精确定义: DSM-5列为"需进一步研究的诊断"，指持续或反复的咖啡因使用导致临床显著痛苦或功能损害；区分与备注:
    未被正式承认的正式诊断，但有明确临床表现；专业视角 (Professional Perspective): 代表咖啡因问题使用的最严重形式，需专业评估'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Caffeine_Coffee.md
  section: 核心术语与定义表 (Core Terminology & Definitions)
- type: concept
  question: 咖啡因依赖的核心要点是什么？
  answer: '英文名 (English Term): Caffeine Dependence；原始语言/术语 (Original Language): 英: *Caffeine Dependence*；精确定义: 身体对咖啡因的适应性改变，停用时出现戒断症状；区分与备注:
    与"成瘾"不同，更强调生理适应；专业视角 (Professional Perspective): 大多数咖啡饮用者存在轻度依赖，但不一定构成障碍'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Caffeine_Coffee.md
  section: 核心术语与定义表 (Core Terminology & Definitions)
- type: concept
  question: 咖啡因戒断综合征的核心要点是什么？
  answer: '英文名 (English Term): Caffeine Withdrawal Syndrome；原始语言/术语 (Original Language): 英: *Caffeine Withdrawal*；精确定义: 停止或减少咖啡因摄入后出现的特征性症状群；区分与备注:
    DSM-5正式承认的诊断；专业视角 (Professional Perspective): 最常见症状为头痛，影响约50-75%的使用者'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Caffeine_Coffee.md
  section: 核心术语与定义表 (Core Terminology & Definitions)
- type: concept
  question: 10的核心要点是什么？
  answer: '诊断标准（改编自DSM-5物质使用障碍框架）: 耐受性：需要增加剂量达到同样效果；英文标准: Tolerance；所属维度: 生理适应；临床示例: "需要越来越多咖啡才能提神"；评估要点: 神经适应性改变'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Caffeine_Coffee.md
  section: DSM-5标准框架 (DSM-5 Framework)
- type: concept
  question: 11的核心要点是什么？
  answer: '诊断标准（改编自DSM-5物质使用障碍框架）: 戒断症状：停用出现特征性症状；英文标准: Withdrawal；所属维度: 生理依赖；临床示例: "停止饮用后出现头痛、疲劳"；评估要点: 身体依赖的标志'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Caffeine_Coffee.md
  section: DSM-5标准框架 (DSM-5 Framework)
- type: concept
  question: 2-3项的核心要点是什么？
  answer: '严重程度: 轻度；英文: Mild；临床意义: 轻微功能损害；干预建议: 健康教育、自我监测'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Caffeine_Coffee.md
  section: 严重程度分级 (Severity Classification)
- type: concept
  question: 4-5项的核心要点是什么？
  answer: '严重程度: 中度；英文: Moderate；临床意义: 明显功能损害；干预建议: 专业咨询、行为干预'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Caffeine_Coffee.md
  section: 严重程度分级 (Severity Classification)
- type: concept
  question: 6项或以上的核心要点是什么？
  answer: '严重程度: 重度；英文: Severe；临床意义: 严重功能损害；干预建议: 专业治疗、可能需要医疗监督'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Caffeine_Coffee.md
  section: 严重程度分级 (Severity Classification)
- type: concept
  question: 什么是1. 预防框架与理论基础 (Prevention Framework & Theoretical Foundation)？
  answer: '**专业交叉引用**：关于咖啡因神经药理学机制、心理健康影响和临床应用的详细信息，请参考 [咖啡神经科学与药理学](../../../../03-Bio-Science/foods/coffee/Coffee_Neuroscience_Pharmacology.md)
    和 [咖啡心理健康应用](../../../../03-Bio-Science/foods/coffee/Coffee_Mental_Health_Applications.md) 文档。'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Caffeine_Prevention.md
  section: 1. 预防框架与理论基础 (Prevention Framework & Theoretical Foundation)
- type: concept
  question: 青少年群体的核心要点是什么？
  answer: '风险特征: 神经发育期、同伴影响、实验性使用；风险等级: 高风险；预防重点: 教育引导、家庭监督'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Caffeine_Prevention.md
  section: 2.1 高危人群分类 (High-risk Population Categories)
- type: concept
  question: 大学生群体的核心要点是什么？
  answer: '风险特征: 学业压力、熬夜文化、社交需求；风险等级: 高风险；预防重点: 压力管理、替代策略'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Caffeine_Prevention.md
  section: 2.1 高危人群分类 (High-risk Population Categories)
- type: concept
  question: 职场人群的核心要点是什么？
  answer: '风险特征: 工作压力、绩效要求、竞争环境；风险等级: 中高风险；预防重点: 工作生活平衡、健康习惯'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Caffeine_Prevention.md
  section: 2.1 高危人群分类 (High-risk Population Categories)
- type: concept
  question: 完美主义倾向的核心要点是什么？
  answer: '评估指标: Frost多维完美主义量表≥85分；风险阈值: 中风险；干预建议: 认知重构、压力管理'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Caffeine_Prevention.md
  section: 2.1 高危人群分类 (High-risk Population Categories)
- type: concept
  question: 冲动控制困难的核心要点是什么？
  answer: '评估指标: BIS-11冲动性量表≥2.5分；风险阈值: 高风险；干预建议: 执行功能训练、延迟满足'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Caffeine_Prevention.md
  section: 2.1 高危人群分类 (High-risk Population Categories)
- type: concept
  question: 情绪调节障碍的核心要点是什么？
  answer: '评估指标: DERS情绪调节问卷≥90分；风险阈值: 中风险；干预建议: 情绪技能训练、替代策略'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Caffeine_Prevention.md
  section: 2.1 高危人群分类 (High-risk Population Categories)
- type: concept
  question: 日摄入量的核心要点是什么？
  answer: '年龄适宜标准: ≤100mg (约1杯咖啡)；超标警示: >100mg；干预级别: 一级干预'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Caffeine_Prevention.md
  section: 2.2 风险评估工具 (Risk Assessment Tools)
- type: concept
  question: 成瘾的核心要点是什么？
  answer: '英文名 (English Term): Addiction；原始语言/术语 (Original Language): 拉: *Addictio* (奴役、臣服)；精确定义: 对物质或行为的强迫性使用，伴随失控、持续使用尽管有害、戒断症状；区分与备注:
    不同于"习惯"（可控）或"依赖"（生理适应）；专业视角 (Professional Perspective): 成瘾是一种慢性复发性脑疾病，涉及奖赏、动机、记忆回路的功能失调'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Overview.md
  section: 核心术语与定义表 (Core Terminology)
- type: concept
  question: 物质使用障碍的核心要点是什么？
  answer: '英文名 (English Term): Substance Use Disorder (SUD)；原始语言/术语 (Original Language): 英: *Substance Use Disorder*；精确定义:
    DSM-5统一诊断：轻度、中度、重度，基于11项标准；区分与备注: 取代DSM-IV的"滥用"与"依赖"二分法；专业视角 (Professional Perspective): DSM-5强调连续谱系而非类别诊断，更符合临床现实'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Overview.md
  section: 核心术语与定义表 (Core Terminology)
- type: concept
  question: 行为成瘾的核心要点是什么？
  answer: '英文名 (English Term): Behavioral Addiction；原始语言/术语 (Original Language): 英: *Behavioral Addiction*；精确定义: 对非物质行为的强迫性从事（如赌博、性、游戏、购物）；区分与备注:
    DSM-5仅承认"赌博障碍"，其他尚在研究；专业视角 (Professional Perspective): ICD-11新增"游戏障碍"，行为成瘾领域正快速发展'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Overview.md
  section: 核心术语与定义表 (Core Terminology)
- type: concept
  question: 酒精的核心要点是什么？
  answer: '英文名: Alcohol；ICD-11编码: 6C40；主要成瘾物质: 乙醇（Ethanol）；使用率（全球）: 约43%成年人过去一年使用；依赖风险: 中-高（约15%使用者成瘾）；戒断危险性: **高**（可致命）；专业洞察:
    全球最常见的合法成瘾物质，社会文化接受度高，戒断需医疗监督'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Overview.md
  section: DSM-5物质使用障碍分类体系表 (DSM-5 Substance Use Disorders Classification)
- type: concept
  question: 尼古丁/烟草的核心要点是什么？
  answer: '英文名: Tobacco/Nicotine；ICD-11编码: 6C4A；主要成瘾物质: 尼古丁（Nicotine）；使用率（全球）: 约20%全球成人吸烟；依赖风险: **极高**（约32%尝试者成瘾）；戒断危险性: 低（主要为心理不适）；专业洞察:
    成瘾速度最快的物质之一，致死率最高（间接），戒烟困难'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Overview.md
  section: DSM-5物质使用障碍分类体系表 (DSM-5 Substance Use Disorders Classification)
- type: concept
  question: 大麻的核心要点是什么？
  answer: '英文名: Cannabis；ICD-11编码: 6C41；主要成瘾物质: THC（四氢大麻酚）；使用率（全球）: 约4%全球成年人使用；依赖风险: 低-中（约9%使用者成瘾）；戒断危险性: 低（轻度心理不适）；专业洞察:
    传统认为依赖性低，但近年THC浓度增加，青少年使用风险更高'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Overview.md
  section: DSM-5物质使用障碍分类体系表 (DSM-5 Substance Use Disorders Classification)
- type: concept
  question: 什么是DSM-5物质使用障碍诊断标准表 (DSM-5 SUD Diagnostic Criteria)？
  answer: '**诊断原则**：过去12个月内出现以下**11项标准中至少2项**，即可诊断物质使用障碍。

    - **轻度**：2-3项

    - **中度**：4-5项

    - **重度**：6项或以上'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Overview.md
  section: DSM-5物质使用障碍诊断标准表 (DSM-5 SUD Diagnostic Criteria)
- type: concept
  question: 10的核心要点是什么？
  answer: '诊断标准（DSM-5）: 耐受性（需增加剂量或效果减弱）；英文标准: Tolerance；所属维度: 药理适应；临床示例: "需要喝更多才能感觉放松"；评估要点: 神经适应标志'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Overview.md
  section: DSM-5物质使用障碍诊断标准表 (DSM-5 SUD Diagnostic Criteria)
- type: concept
  question: 色情依赖的核心要点是什么？
  answer: '英文名 (English Term): Pornography Dependence / Porn Addiction；原始语言/术语 (Original Language): 希: *Pornographos* (描写娼妓/性)
    + *-logia*；精确定义: 在主观体验上对色情内容(图片、视频、文字)产生持续渴求与失控使用,即使带来负面后果仍难以停止；目前诊断位置: DSM-5尚未单列"色情成瘾"诊断,多归入"其他特定的冲动控制或行为成瘾"；专业视角 (Professional
    Perspective): 临床上更关心功能损害与失控程度,而非是否满足某一正式诊断标签'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Pornography_Compulsive_Sexual_Behavior.md
  section: 核心术语与诊断框架表 (Core Terminology & Diagnostic Framework)
- type: concept
  question: 强迫性性行为障碍的核心要点是什么？
  answer: '英文名 (English Term): Compulsive Sexual Behavior Disorder (CSBD)；原始语言/术语 (Original Language): ICD-11诊断名；精确定义: 持续数月的性相关行为失控:
    反复失败的控制尝试、占用大量时间、影响功能,即使有负面后果仍持续；目前诊断位置: ICD-11将其归入"冲动控制障碍"类别,可包括色情、手淫、性伴等模式；专业视角 (Professional Perspective): 对部分个案而言,色情依赖是CSBD的一种主要表现形式'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Pornography_Compulsive_Sexual_Behavior.md
  section: 核心术语与诊断框架表 (Core Terminology & Diagnostic Framework)
- type: concept
  question: 问题性色情使用的核心要点是什么？
  answer: '英文名 (English Term): Problematic Pornography Use (PPU)；原始语言/术语 (Original Language): -；精确定义: 不一定达到成瘾/障碍程度,但在频率、时长、内容或情境上造成困扰；目前诊断位置:
    可能主要表现为罪咎感、道德冲突,而非客观功能严重受损；专业视角 (Professional Perspective): 需要区分"道德不一致"(moral incongruence)与真正的失控行为,以免过度病理化'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Pornography_Compulsive_Sexual_Behavior.md
  section: 核心术语与诊断框架表 (Core Terminology & Diagnostic Framework)
- type: concept
  question: 渴求与预期快感的核心要点是什么？
  answer: '典型表现: 一想到有空独处就开始期待看片/手淫；神经/心理机制: 奖赏系统(伏隔核、多巴胺)对色情线索高度敏感化(sensitization)；区分要点: 类似物质成瘾中对线索的渴求反应；专业视角: 说明"想要"并不等于"真正喜欢",许多个案在事后并不满足但仍反复行为'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Pornography_Compulsive_Sexual_Behavior.md
  section: 色情依赖的行为特征与神经机制表 (Behavioral Features & Neurobiology)
- type: concept
  question: 耐受/升级的核心要点是什么？
  answer: '典型表现: 内容逐渐需要更强刺激、更新奇或更极端；神经/心理机制: 奖赏系统耐受性(tolerance)上升,同一强度刺激带来快感降低；区分要点: 表现为观看时长增加或内容升级；专业视角: 需评估升级是否跨越伦理/法律边界,如涉及未成年人或暴力内容'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Pornography_Compulsive_Sexual_Behavior.md
  section: 色情依赖的行为特征与神经机制表 (Behavioral Features & Neurobiology)
- type: concept
  question: 失控与时间占用的核心要点是什么？
  answer: '典型表现: 原计划看10分钟,结果几个小时过去；神经/心理机制: 执行功能与抑制控制受渴求牵制,前额叶调节能力下降；区分要点: 即使每次时长不长,但频繁打断日常生活也可构成功能损害；专业视角: 治疗中关注"失控"和"后悔"而非单次时长本身'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Pornography_Compulsive_Sexual_Behavior.md
  section: 色情依赖的行为特征与神经机制表 (Behavioral Features & Neurobiology)
- type: concept
  question: 情绪障碍的核心要点是什么？
  answer: '常见共病/风险: 抑郁、焦虑、双相障碍；说明: 色情使用可作为情绪自我药疗(self-medication)；评估要点: 需评估色情行为在情绪周期中的位置；治疗启示: 同步处理情绪障碍,否则单纯"戒断"容易复燃'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Pornography_Compulsive_Sexual_Behavior.md
  section: 共病与风险因素表 (Comorbidities & Risk Factors)
- type: concept
  question: 注意力与冲动控制的核心要点是什么？
  answer: '常见共病/风险: ADHD、冲动控制障碍；说明: 冲动性高、延迟满足困难；评估要点: 电玩/网络成瘾常伴随；治疗启示: 可借鉴ADHD与行为成瘾的结构化时间管理与外在约束策略'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Pornography_Compulsive_Sexual_Behavior.md
  section: 共病与风险因素表 (Comorbidities & Risk Factors)
- type: concept
  question: 急性解毒期的核心要点是什么？
  answer: '英文名 (English Term): Detoxification / Stabilization；时间范围（大致）: 几天-数周；心理任务: 安全戒断、缓解戒断症状、建立初步联盟；典型风险: 医学并发症、过早离院、转向其他物质；支持重点:
    医疗监护、家属教育、危机干预；专业洞察: 目标是“稳定”而非解决所有问题'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Recovery.md
  section: 成瘾康复阶段模型表 (Stages of Recovery)
- type: concept
  question: 早期康复期的核心要点是什么？
  answer: '英文名 (English Term): Early Recovery；时间范围（大致）: 0-6个月；心理任务: 建立无物质/行为的生活模式，学习应对技能；典型风险: 强烈渴求、社交圈压力、情绪波动；支持重点: 密集心理治疗、团体支持、结构化日程；专业洞察:
    复发风险最高，多数复发发生在前3个月'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Recovery.md
  section: 成瘾康复阶段模型表 (Stages of Recovery)
- type: concept
  question: 中期康复期的核心要点是什么？
  answer: '英文名 (English Term): Middle Recovery；时间范围（大致）: 6-24个月；心理任务: 重建职业、关系、身份，修复损害；典型风险: 倦怠、过度自信（“我好了”）、情感空虚；支持重点: 职业与家庭重建、深入创伤与人格工作；专业洞察:
    从“戒除”走向“活出价值”'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Recovery.md
  section: 成瘾康复阶段模型表 (Stages of Recovery)
- type: concept
  question: 情境触发的核心要点是什么？
  answer: '英文名: High-Risk Situation；核心内容: 出现在高危情境（场所、人群、情绪）；典型例子: 酒精成瘾者受邀参加喝酒聚会；干预策略: 事先计划、避免或准备应对策略'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Recovery.md
  section: 复发过程模型表 (Relapse Process Model - Marlatt)
- type: concept
  question: 应对能力的核心要点是什么？
  answer: '英文名: Coping Response；核心内容: 是否拥有有效应对技能；典型例子: 有：拒绝酒精；无：尴尬应付；干预策略: 技能训练（拒绝技巧、情绪调节）'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Recovery.md
  section: 复发过程模型表 (Relapse Process Model - Marlatt)
- type: concept
  question: 结果预期的核心要点是什么？
  answer: '英文名: Outcome Expectancies；核心内容: 对使用/不使用结果的想法；典型例子: “喝一点也没关系” vs “我喝了可能失控”；干预策略: 认知重构、复发预演'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Recovery.md
  section: 复发过程模型表 (Relapse Process Model - Marlatt)
- type: concept
  question: 性瘾/CSBD的核心要点是什么？
  answer: '典型内在触发: 孤独、羞耻、压力、无聊、情感被拒绝；典型外在触发: 独处、夜晚、手机在手、色情网站/APP推送；即时应对策略: 延迟10-20分钟、冲动冲浪、离开卧室、更换环境；长期策略: 建立亲密关系、学习情绪调节、减少色情易得性；专业洞察:
    性欲本身不是问题，关键是“用性来逃避感受”'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Recovery.md
  section: 性瘾、烟瘾、酒瘾常见触发因素与应对表 (Triggers & Coping for Sex, Nicotine, Alcohol)
- type: concept
  question: 烟瘾（尼古丁）的核心要点是什么？
  answer: '典型内在触发: 焦虑、紧张、疲惫、习惯性联结（咖啡后、饭后）；典型外在触发: 同伴吸烟、酒精、特定场所（阳台、楼下）；即时应对策略: 用口香糖/水代替、改变环境、深呼吸3分钟；长期策略: 打破情境联结、重建生活节奏、运动训练；专业洞察:
    戒烟成功关键在于打断“情境-香烟”链条'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Recovery.md
  section: 性瘾、烟瘾、酒瘾常见触发因素与应对表 (Triggers & Coping for Sex, Nicotine, Alcohol)
- type: concept
  question: 核心术语的核心要点是什么？
  answer: '内容: 酒精使用障碍；英文名: Alcohol Use Disorder (AUD)；临床细节: DSM-5统一诊断，取代"酒精滥用"与"酒精依赖"；专业洞察: 全球最常见的物质使用障碍'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Substance.md
  section: 酒精使用障碍详表 (Alcohol Use Disorder)
- type: concept
  question: 主要物质的核心要点是什么？
  answer: '内容: 乙醇（酒精）；英文名: Ethanol (C₂H₅OH)；临床细节: 中枢神经系统抑制剂；专业洞察: 合法但致死率高（全球每年300万人死于酒精相关疾病）'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Substance.md
  section: 酒精使用障碍详表 (Alcohol Use Disorder)
- type: concept
  question: 作用机制的核心要点是什么？
  answer: '内容: GABA_A受体激动，NMDA受体拮抗；英文名: GABA agonist, NMDA antagonist；临床细节: 增强抑制性神经传递，抑制兴奋性传递；专业洞察: 解释酒精的镇静、肌肉松弛、记忆损害效果'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Substance.md
  section: 酒精使用障碍详表 (Alcohol Use Disorder)
- type: concept
  question: 医疗监督戒断的核心要点是什么？
  answer: '英文名: Medically-supervised detox；作用机制: 苯二氮䓬类递减，预防癫痫与DTs；循证等级: A级；适用阶段: 急性戒断期；专业洞察: 重度酒精依赖必须医疗戒断，社区戒断危险'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Substance.md
  section: 酒精使用障碍治疗方法表
- type: concept
  question: 双硫仑的核心要点是什么？
  answer: '英文名: Disulfiram (Antabuse)；作用机制: 阻断乙醛脱氢酶，饮酒后产生恶心；循证等级: B级；适用阶段: 维持戒断；专业洞察: 需高动机，依从性是关键'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Substance.md
  section: 酒精使用障碍治疗方法表
- type: concept
  question: 纳曲酮的核心要点是什么？
  answer: '英文名: Naltrexone；作用机制: μ阿片受体拮抗剂，减少渴求与快感；循证等级: A级；适用阶段: 减少饮酒，预防复发；专业洞察: FDA批准，可减少饮酒日50%'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Substance.md
  section: 酒精使用障碍治疗方法表
- type: concept
  question: 核心术语的核心要点是什么？
  answer: '内容: 烟草使用障碍；英文名: Tobacco Use Disorder；临床细节: 尼古丁是主要成瘾物质；专业洞察: 全球致死率最高的合法成瘾物质（间接）'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Substance.md
  section: 尼古丁/烟草使用障碍详表 (Nicotine/Tobacco Use Disorder)
- type: concept
  question: 主要物质的核心要点是什么？
  answer: '内容: 尼古丁；英文名: Nicotine (C₁₀H₁₄N₂)；临床细节: 烟碱型乙酰胆碱受体激动剂；专业洞察: 烟草含7000+化学物质，70+种致癌物'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Substance.md
  section: 尼古丁/烟草使用障碍详表 (Nicotine/Tobacco Use Disorder)
- type: concept
  question: 慢性病模型的核心要点是什么？
  answer: '英文名 (English Term): Chronic Disease Model；核心内涵: 成瘾类似糖尿病、高血压，是慢性复发性疾病；神经/心理基础: 奖赏、压力、执行控制回路长期改变；临床含义: 需要长期随访与多次干预，而非一次性“治愈”；专业洞察:
    复发是病程的一部分，不代表治疗失败'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Treatment.md
  section: 成瘾治疗总体原则表 (General Principles of Addiction Treatment)
- type: concept
  question: 综合治疗的核心要点是什么？
  answer: '英文名 (English Term): Integrated Treatment；核心内涵: 药物+心理+家庭+社会支持系统；神经/心理基础: 多系统共同作用；临床含义: 单一方法往往不足，需多学科团队合作；专业洞察: 生物-心理-社会模式的典型应用'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Treatment.md
  section: 成瘾治疗总体原则表 (General Principles of Addiction Treatment)
- type: concept
  question: 阶段化干预的核心要点是什么？
  answer: '英文名 (English Term): Stage-Based Intervention；核心内涵: 不同阶段采用不同策略（解毒、早期康复、维持、复发预防）；神经/心理基础: 神经适应与心理任务随时间变化；临床含义: 戒断期侧重安全与症状控制，维持期侧重生活重建；专业洞察:
    避免“一刀切”方案'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Treatment.md
  section: 成瘾治疗总体原则表 (General Principles of Addiction Treatment)
- type: concept
  question: 认知行为疗法的核心要点是什么？
  answer: '英文名: Cognitive Behavioral Therapy；原始理论/术语: Beck CBT；核心机制: 识别并修正成瘾信念、建立应对技能、暴露与渴求管理；适用成瘾类型: 酒精、尼古丁、阿片类、兴奋剂、行为成瘾；循证等级:
    A级；专业洞察: 成瘾心理治疗的“工作马”，与药物治疗联用效果最佳'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Treatment.md
  section: 核心心理治疗方法表 (Core Psychotherapies for Addiction)
- type: concept
  question: 复发预防模型的核心要点是什么？
  answer: '英文名: Relapse Prevention (RP)；原始理论/术语: Marlatt & Gordon；核心机制: 识别高危情境、增强应对技能、重新定义“失足”；适用成瘾类型: 所有成瘾；循证等级: A级；专业洞察:
    将一次“失足”视作学习机会而非彻底失败'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Treatment.md
  section: 核心心理治疗方法表 (Core Psychotherapies for Addiction)
- type: concept
  question: 动机性访谈的核心要点是什么？
  answer: '英文名: Motivational Interviewing (MI)；原始理论/术语: Miller & Rollnick；核心机制: 通过共情与引导，增强内在改变动机；适用成瘾类型: 低动机或矛盾心理明显者；循证等级:
    A级；专业洞察: 特别适合早期接触成瘾者，避免对抗'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Treatment.md
  section: 核心心理治疗方法表 (Core Psychotherapies for Addiction)
- type: concept
  question: 酒精使用障碍的核心要点是什么？
  answer: '一线药物: 纳曲酮；英文名: Naltrexone；作用机制: μ阿片受体拮抗剂，减少饮酒快感与渴求；循证等级: A级；关键注意点: 适用于仍在饮酒者；需监测肝功能'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Treatment.md
  section: 成瘾药物治疗对照表 (Pharmacotherapies by Addiction Type)
- type: concept
  question: 阿坎酸的核心要点是什么？
  answer: '一线药物: Acamprosate；英文名: 调节谷氨酸-GABA平衡，减轻戒断性焦虑；作用机制: A级；循证等级: 适合已戒断者，需良好依从性'
  source: 02-Mind-Psychology/psychology/behavioral/addiction/Addiction_Treatment.md
  section: 成瘾药物治疗对照表 (Pharmacotherapies by Addiction Type)
