  answer: '- [杰克·康菲尔德](Jack_Kornfield.md) - IMS共同创始人

    - [约瑟夫·戈尔茨坦](Joseph_Goldstein.md) - IMS共同创始人

    - [S.N. 葛印卡](SN_Goenka.md) - 早期核心老师

