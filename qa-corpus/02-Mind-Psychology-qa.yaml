  question: 接纳（Acceptance）的核心要点是什么？
  answer: '描述: 允许情绪存在而不抗拒；对应抑郁病理: 减少"对抑郁的抑郁"（二级情绪）'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/03-Core-Mechanisms.md
  section: 3.1 反刍的打断机制
- type: concept
  question: 目标的核心要点是什么？
  answer: 'CBT: 改变负性思维内容；正念/MBCT: 改变与思维的关系'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/03-Core-Mechanisms.md
  section: 3.2 正念 vs. CBT：关键区分与互补
- type: concept
  question: 对反刍的策略的核心要点是什么？
  answer: 'CBT: 认知重构（挑战想法）；正念/MBCT: 去中心化（观察想法而不卷入）'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/03-Core-Mechanisms.md
  section: 3.2 正念 vs. CBT：关键区分与互补
- type: concept
  question: 对情绪的态度的核心要点是什么？
  answer: 'CBT: 识别情绪背后的想法；正念/MBCT: 直接觉察和接纳情绪'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/03-Core-Mechanisms.md
  section: 3.2 正念 vs. CBT：关键区分与互补
- type: concept
  question: Hofmann et al. (2010）的核心要点是什么？
  answer: '设计: 元分析, 39项RCT；结论: 正念对焦虑和抑郁有中到大效应；效应量: g = 0.63'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/04-Evidence-Based-Protocols.md
  section: 4.1 关键荟萃分析
- type: concept
  question: Piet & Hougaard (2011）的核心要点是什么？
  answer: '设计: MBCT 元分析, 6项RCT；结论: MBCT 显著降低抑郁复发风险；效应量: HR = 0.66'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/04-Evidence-Based-Protocols.md
  section: 4.1 关键荟萃分析
- type: concept
  question: Kuyken et al. (2016）的核心要点是什么？
  answer: '设计: RCT, MBCT vs 维持药物；结论: MBCT 非劣效于维持药物；成本更低；效应量: —'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/04-Evidence-Based-Protocols.md
  section: 4.1 关键荟萃分析
- type: concept
  question: W1的核心要点是什么？
  answer: '主题: 自动导航与觉察；核心正念练习: 身体扫描；葡萄干练习；认知元素: 识别自动化模式'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/05-MBCT-Relapse-Prevention.md
  section: 5.2 八周课程结构
- type: concept
  question: W2的核心要点是什么？
  answer: '主题: 障碍的存在；核心正念练习: 身体扫描；坐姿冥想；认知元素: "另一个视角"——去中心化'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/05-MBCT-Relapse-Prevention.md
  section: 5.2 八周课程结构
- type: concept
  question: W3的核心要点是什么？
  answer: '主题: 呼吸作为锚点；核心正念练习: 呼吸觉察（3分钟呼吸空间引入）；认知元素: 将觉察带入日常'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/05-MBCT-Relapse-Prevention.md
  section: 5.2 八周课程结构
- type: concept
  question: 工作出错的核心要点是什么？
  answer: '自动化想法: "我是个彻底的失败者"；MBCT 回应: "我注意到我有一个''我是个失败者''的想法"'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/05-MBCT-Relapse-Prevention.md
  section: 5.3 核心认知技术："想法不是事实"
- type: concept
  question: 朋友没回消息的核心要点是什么？
  answer: '自动化想法: "他讨厌我了"；MBCT 回应: "我注意到我在猜测别人的想法"'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/05-MBCT-Relapse-Prevention.md
  section: 5.3 核心认知技术："想法不是事实"
- type: concept
  question: 感到疲倦的核心要点是什么？
  answer: '自动化想法: "我的抑郁又回来了"；MBCT 回应: "我注意到我感到疲倦，这是当下的感受"'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/05-MBCT-Relapse-Prevention.md
  section: 5.3 核心认知技术："想法不是事实"
- type: concept
  question: 正在服用抗抑郁药的核心要点是什么？
  answer: '策略: 可在维持用药同时进行MBCT；MBCT后可谨慎减药（需医生指导）'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/06-Subtypes.md
  section: 6.1 复发性抑郁（MBCT核心适应症）
- type: concept
  question: 抑郁严重程度的核心要点是什么？
  answer: '工具: PHQ-9, BDI-II, MADRS；目的: 确定是否适合正念干预'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/07-Implementation-Framework.md
  section: 7.2 筛查与评估
- type: concept
  question: 反刍倾向的核心要点是什么？
  answer: '工具: RRS（Ruminative Responses Scale）；目的: 识别高反刍个体（MBCT特别受益）'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/07-Implementation-Framework.md
  section: 7.2 筛查与评估
- type: concept
  question: 什么是8. 实操工具包？
  answer: '**使用原则**：以下工具按"即时稳定 → 日常练习 → 深度转化 → 复发预防"四级组织。建议根据当前状态选择对应工具，而非一次性使用全部。'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/08-Practical-Toolkit.md
  section: 8. 实操工具包
- type: concept
  question: L1 危机稳定的核心要点是什么？
  answer: '状态描述: 强烈自杀意念、解离、惊恐发作；核心目标: 安全第一，恢复基本稳定；推荐工具: 接地技术、外部求助、停止冥想'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/08-Practical-Toolkit.md
  section: 8.1 四级应对工具箱
- type: concept
  question: L2 急性低落的核心要点是什么？
  answer: '状态描述: 反刍加剧、情绪低落、精力枯竭；核心目标: 打断恶性循环，恢复当下感；推荐工具: 3分钟呼吸空间、STOP、 grounding'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/08-Practical-Toolkit.md
  section: 8.1 四级应对工具箱
- type: concept
  question: L3 日常维护的核心要点是什么？
  answer: '状态描述: 轻度症状或缓解期；核心目标: 重建神经可塑性，培养觉察习惯；推荐工具: 身体扫描、愉悦觉察、慈心冥想'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/08-Practical-Toolkit.md
  section: 8.1 四级应对工具箱
- type: concept
  question: 默认模式网络（DMN）的核心要点是什么？
  answer: '病理状态: 抑郁/解离时 DMN 过度活跃，自我参照反刍加剧；Grounding 的调节作用: 将注意力强制导向外部刺激，抑制 DMN 活动，恢复 DMN-CEN（中央执行网络）动态平衡'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/08-Practical-Toolkit.md
  section: 8.2 即时稳定工具（L1-L2）
- type: concept
  question: 前额叶-杏仁核通路的核心要点是什么？
  answer: '病理状态: 情绪淹没时杏仁核高激活，前额叶调控失效；Grounding 的调节作用: 感觉输入经丘脑-体感皮层通路激活前额叶执行功能，"重启"认知控制'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/08-Practical-Toolkit.md
  section: 8.2 即时稳定工具（L1-L2）
- type: concept
  question: 迷走神经张力的核心要点是什么？
  answer: '病理状态: 交感神经过度激活（战斗/逃跑/僵住）；Grounding 的调节作用: 深呼吸、冷水刺激、节律性触觉输入增强迷走神经副交感分支，降低心率与皮质醇'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/08-Practical-Toolkit.md
  section: 8.2 即时稳定工具（L1-L2）
- type: concept
  question: 感官 Grounding的核心要点是什么？
  answer: '核心策略: 外部感官输入锚定；典型技术: 5-4-3-2-1、冷水刺激、嗅觉锚、听觉定向；适用状态: 轻-中度解离、反刍、焦虑唤起'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/08-Practical-Toolkit.md
  section: 8.2 即时稳定工具（L1-L2）
- type: concept
  question: 急性重度抑郁的核心要点是什么？
  answer: '风险: 注意力困难；自责加重；建议: 优先药物/CBT；延迟正念至缓解期'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/10-Contraindications.md
  section: 10.1 相对禁忌症
- type: concept
  question: 活跃自杀风险的核心要点是什么？
  answer: '风险: 独处冥想可能恶化反刍；建议: 仅在专业人员密切监督下进行'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/10-Contraindications.md
  section: 10.1 相对禁忌症
- type: concept
  question: 精神病性抑郁的核心要点是什么？
  answer: '风险: 妄想/幻觉可能受冥想影响；建议: 禁忌；优先药物治疗'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/10-Contraindications.md
  section: 10.1 相对禁忌症
- type: concept
  question: 冥想后情绪显著恶化的核心要点是什么？
  answer: '可能含义: 未处理的情绪材料涌现；行动: 减少强度；增加支持性会谈'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/10-Contraindications.md
  section: 10.2 不良反应监测
- type: concept
  question: 反刍在冥想中加剧的核心要点是什么？
  answer: '可能含义: "元反刍"（对反刍的反刍）；行动: 教授注意力转移；缩短时长'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/10-Contraindications.md
  section: 10.2 不良反应监测
- type: concept
  question: 感到更加自责的核心要点是什么？
  answer: '可能含义: "我应该能正念"；行动: 重新教育；强调自我慈悲'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/10-Contraindications.md
  section: 10.2 不良反应监测
- type: concept
  question: 什么是11. 特定人群抑郁正念干预指南？
  answer: '**说明**：不同生命阶段、性别、躯体健康状况的抑郁患者，其症状表达、认知特点、社会处境和干预需求存在显著差异。"一刀切"的正念方案可能事倍功半，甚至造成二次伤害。本章提供四大特定人群的差异化干预框架。'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/11-Special-Populations.md
  section: 11. 特定人群抑郁正念干预指南
- type: concept
  question: 患病率的核心要点是什么？
  answer: '数据/表现: 全球约 4-5%，近年上升趋势；干预 implication: 学校场景嵌入是可达性最高的途径'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/11-Special-Populations.md
  section: 11.1 青少年抑郁（12-18岁）
- type: concept
  question: 性别差异的核心要点是什么？
  answer: '数据/表现: 青春期前男>女，青春期后女>男（2:1）；干预 implication: 女生群体需更多身体意象与关系主题'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/11-Special-Populations.md
  section: 11.1 青少年抑郁（12-18岁）
- type: concept
  question: 症状特点的核心要点是什么？
  answer: '数据/表现: 易激惹（irritability）常替代/叠加情绪低落；躯体化突出（腹痛、头痛）；干预 implication: 不强行要求"静坐"，允许动态正念'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/11-Special-Populations.md
  section: 11.1 青少年抑郁（12-18岁）
- type: concept
  question: 雌激素骤降的核心要点是什么？
  answer: '神经影响: 下调血清素（5-HT）受体敏感性；降低 BDNF；抑郁表现: 情绪低落、易哭、情绪波动'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/11-Special-Populations.md
  section: 11.2 围绝经期/更年期女性抑郁
- type: concept
  question: 孕激素下降的核心要点是什么？
  answer: '神经影响: GABA-A 受体功能减弱；抑郁表现: 焦虑、失眠、易激惹'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/11-Special-Populations.md
  section: 11.2 围绝经期/更年期女性抑郁
- type: concept
  question: 睾酮降低的核心要点是什么？
  answer: '神经影响: 多巴胺-奖赏通路功能下降；抑郁表现: 快感缺失、性欲减退、动力不足'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/11-Special-Populations.md
  section: 11.2 围绝经期/更年期女性抑郁
- type: concept
  question: 潮热的核心要点是什么？
  answer: '正念策略: 潮热正念：在热潮来临前觉察身体前兆信号（心跳加速、皮肤刺痛），以"欢迎"而非抗拒的姿态经历潮热，记录潮热的"开始-高峰-消退"曲线；理论依据: 抗拒加剧痛苦（Arntz, 1991 疼痛研究）；觉察打断"潮热→恐惧→焦虑→更多潮热"的恶性循环'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/11-Special-Populations.md
  section: 11.2 围绝经期/更年期女性抑郁
- type: concept
  question: 什么是12. 睡眠正念与失眠认知行为疗法（CBT-I）整合？
  answer: '**说明**：抑郁与失眠存在双向因果关系——失眠是抑郁发作的独立风险因素，也是抑郁复发的最强预测指标之一。正念与 CBT-I（失眠认知行为疗法，一线循证治疗）的整合，可同时打破"抑郁→失眠→更抑郁"的恶性循环。'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/12-Sleep-CBT-I.md
  section: 12. 睡眠正念与失眠认知行为疗法（CBT-I）整合
- type: concept
  question: 固定就寝时间的核心要点是什么？
  answer: '正念增强版: **觉察身体的睡眠信号**：不是"到点了必须睡"，而是学会识别自己的困倦信号（眼皮沉重、眨眼变慢、思维模糊）；抑郁特定调整: 抑郁患者常伴"晨重夜轻"，就寝时间不应过早（防止床上反刍），建议固定起床时间而非固定入睡时间'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/12-Sleep-CBT-I.md
  section: 12.2 睡眠卫生正念版
- type: concept
  question: 卧室只用于睡眠的核心要点是什么？
  answer: '正念增强版: **建立床的"睡眠条件反射"**：如果躺20分钟未入睡，起床到另一个房间进行 grounding/呼吸，有睡意再回床；抑郁特定调整: 避免"床 = 反刍场所"的负面联结；抑郁期尤其重要'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/12-Sleep-CBT-I.md
  section: 12.2 睡眠卫生正念版
- type: concept
  question: 睡前放松的核心要点是什么？
  answer: '正念增强版: **睡前30分钟正念过渡仪式**：渐进式身体放松 + 呼吸觉察 + 感恩回顾3件事；抑郁特定调整: 抑郁患者对"感恩"可能有抵抗，改为"今天我有3个瞬间没有很痛苦"'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/12-Sleep-CBT-I.md
  section: 12.2 睡眠卫生正念版
- type: concept
  question: 什么是13. 危机干预与安全计划？
  answer: '**说明**：抑郁患者可能在任何阶段出现自杀意念或自伤冲动。正念干预者——无论是精神科医生、心理治疗师还是正念教师——必须具备识别危机信号和启动安全计划的能力。本章提供临床标准的安全计划框架（Stanley & Brown,
    2012），以及正念在危机中的边界与角色。'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/13-Crisis-Safety.md
  section: 13. 危机干预与安全计划
- type: concept
  question: 轻度-中度（PHQ-9 5-14）的核心要点是什么？
  answer: '正念的角色: 可作为核心干预或辅助治疗；禁忌与注意事项: 标准正念方案适用'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/13-Crisis-Safety.md
  section: 13.3 急性重度抑郁期的正念使用边界
- type: concept
  question: 中度-重度（PHQ-9 15-19），无自杀意念的核心要点是什么？
  answer: '正念的角色: 可作为辅助治疗，需与药物/心理治疗并行；禁忌与注意事项: 缩短时长；增加 grounding；避免长时间静默'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/13-Crisis-Safety.md
  section: 13.3 急性重度抑郁期的正念使用边界
- type: concept
  question: 重度（PHQ-9 20-27），伴被动自杀意念的核心要点是什么？
  answer: '正念的角色: **仅作为稳定期的辅助**；急性期以药物和安全为主；禁忌与注意事项: 禁止独处冥想；禁止闭室静坐；所有练习需在有人知情或可及的环境中进行'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/13-Crisis-Safety.md
  section: 13.3 急性重度抑郁期的正念使用边界
- type: concept
  question: 言语的核心要点是什么？
  answer: '具体表现: "我不想活了""没有我大家会更好""我想离开""我希望自己不再醒来"；行动: 不要争论或说教；直接询问"你有自杀的计划吗？"；如有计划，立即联系危机服务'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/13-Crisis-Safety.md
  section: 13.4 家属/照护者的危机应对指南
- type: concept
  question: 行为的核心要点是什么？
  answer: '具体表现: 分发珍贵物品、写遗书、搜索自杀方法、购买危险物品、突然"好转"（决定后释然）；行动: 不要离开患者独处；移除环境中危险物品；陪同就医'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/13-Crisis-Safety.md
  section: 13.4 家属/照护者的危机应对指南
- type: concept
  question: 情绪的核心要点是什么？
  answer: '具体表现: 突然的平静（决定后的"解脱感"）、极度的绝望、剧烈的愤怒后崩溃；行动: 保持陪伴；倾听而非解决；联系专业支持'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/13-Crisis-Safety.md
  section: 13.4 家属/照护者的危机应对指南
- type: concept
  question: 什么是14. 运动-正念整合处方（Movement-Based Mindfulness）？
  answer: '**说明**：运动是抑郁干预中循证等级最高、成本最低、副作用最少的非药物干预之一。将正念觉察嵌入运动，可同时获得运动的神经生化益处（BDNF、内啡肽、炎症降低）和正念的觉察-接纳益处，且运动为抑郁患者提供了"从头脑回到身体"的自然通道。'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/14-Movement-Mindfulness.md
  section: 14. 运动-正念整合处方（Movement-Based Mindfulness）
- type: concept
  question: BDNF（脑源性神经营养因子）的核心要点是什么？
  answer: '机制: 有氧运动促进海马和前额叶 BDNF 表达；对抑郁的意义: 抑郁患者海马体积缩小、神经发生减少；BDNF 是抗抑郁的"肥料"'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/14-Movement-Mindfulness.md
  section: 14.1 运动抗抑郁的循证基础
- type: concept
  question: 炎症调节的核心要点是什么？
  answer: '机制: 运动降低 IL-6、TNF-α、CRP 等促炎因子；对抑郁的意义: 抑郁的"炎症假说"；慢性炎症与抑郁症状正相关'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/14-Movement-Mindfulness.md
  section: 14.1 运动抗抑郁的循证基础
- type: concept
  question: 内源性大麻素/内啡肽的核心要点是什么？
  answer: '机制: 中等强度运动激活内源性阿片系统；对抑郁的意义: 自然的情绪提升和镇痛效应'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/14-Movement-Mindfulness.md
  section: 14.1 运动抗抑郁的循证基础
- type: concept
  question: Frequency（频率）的核心要点是什么？
  answer: '一般健康人群: 每周5次中等强度；抑郁患者适配: **每周3-5次**，但允许灵活性（"今天只能走5分钟也算一次"）'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/14-Movement-Mindfulness.md
  section: 14.2 FITT 原则与抑郁适配
- type: concept
  question: Intensity（强度）的核心要点是什么？
  answer: '一般健康人群: 中等强度（最大心率60-70%）；抑郁患者适配: **从低强度开始**（最大心率50-60%）；重度抑郁可从"站立""缓慢走动"开始'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/14-Movement-Mindfulness.md
  section: 14.2 FITT 原则与抑郁适配
- type: concept
  question: Time（时长）的核心要点是什么？
  answer: '一般健康人群: 每次30分钟；抑郁患者适配: **初始10-15分钟即可**；逐步增加至30-45分钟'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/14-Movement-Mindfulness.md
  section: 14.2 FITT 原则与抑郁适配
- type: concept
  question: L1 极慢觉察的核心要点是什么？
  answer: '速度: 比平时慢50%；正念焦点: 脚底与地面的接触感；脚跟→足弓→脚趾的重量转移；手臂摆动；适用状态: 重度抑郁、焦虑共病、解离'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/14-Movement-Mindfulness.md
  section: 14.3 正念行走（Walking Meditation）抑郁分级方案
- type: concept
  question: 什么是15. 文化与跨文化适配？
  answer: '**说明**：正念起源于东方传统，现代化于西方心理学，应用于全球多元文化语境。抑郁的症状表达、对正念的理解、对治疗的期待，均深受文化背景影响。作为临床工作者，必须具备文化敏感性，避免将某种文化框架强加于患者。'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/15-Culture-Adaptation.md
  section: 15. 文化与跨文化适配
- type: concept
  question: 正念的核心要点是什么？
  answer: '文化联想: 佛教术语；"八正道"之一；临床优势: 有深厚的文化和哲学根基；与禅修传统自然对接；潜在误解: 患者可能以为是"正确的念头"或宗教修行'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/15-Culture-Adaptation.md
  section: 15.1 正念概念的中文文化翻译
- type: concept
  question: 静观的核心要点是什么？
  answer: '文化联想: 香港、台湾常用译法；临床优势: 更中性，减少宗教联想；"静"字传达 calm；潜在误解: "静"可能被误解为"不能动""不能想"'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/15-Culture-Adaptation.md
  section: 15.1 正念概念的中文文化翻译
- type: concept
  question: 觉知的核心要点是什么？
  answer: '文化联想: 更接近 phenomenology；临床优势: 强调觉察本身，而非道德正确性；潜在误解: 较抽象，患者不易理解'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/15-Culture-Adaptation.md
  section: 15.1 正念概念的中文文化翻译
- type: concept
  question: 东亚文化（中国/日本/韩国）的核心要点是什么？
  answer: '抑郁的典型表达: 躯体化突出（头痛、胃痛、胸闷、疲劳）；情绪词汇匮乏；"没病"的耻感强；正念干预的调整: 从身体扫描和感官 grounding 入手，而非情绪命名；强调"养身""调气"而非"心理治疗"；避免过度自我暴露'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/15-Culture-Adaptation.md
  section: 15.2 不同文化背景下的抑郁表达差异
- type: concept
  question: 南亚文化（印度/巴基斯坦/孟加拉）的核心要点是什么？
  answer: '抑郁的典型表达: 可能与"厄运""业力"关联；家庭决策权重高；性别角色严格；正念干预的调整: 尊重家庭参与决策；将正念与瑜伽传统对接（对印度患者）；注意性别隔离的团体设置'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/15-Culture-Adaptation.md
  section: 15.2 不同文化背景下的抑郁表达差异
- type: concept
  question: 拉美文化的核心要点是什么？
  answer: '抑郁的典型表达: 情绪表达外放；家庭/社区依赖强；"忧郁"（la tristeza）可能被正常化；正念干预的调整: 利用强烈的家庭联结进行家庭正念；强调社区支持；允许更长的团体互动'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/15-Culture-Adaptation.md
  section: 15.2 不同文化背景下的抑郁表达差异
- type: concept
  question: 吃苦是福的核心要点是什么？
  answer: '患者表达: "我痛苦说明我在努力""对自己太好会懈怠"；临床应对: 重构："对自己温和不是懈怠，而是可持续努力的前提。机器也需要保养。"'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/15-Culture-Adaptation.md
  section: 15.3 集体主义文化中的自我慈悲障碍
- type: concept
  question: 什么是16. 疗效评估与正念特异性量表？
  answer: '**说明**：评估不仅是为了"证明有效"，更是为了**精准调整干预方案**。抑郁患者常伴随"认知偏差"（低估进步、高估失败），客观量表可以提供矫正性反馈。本章提供抑郁通用量表与正念特异性量表的整合使用方案。'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/16-Assessment-Scales.md
  section: 16. 疗效评估与正念特异性量表
- type: concept
  question: PHQ-9的核心要点是什么？
  answer: '题数: 9；评估维度: DSM-5抑郁症状（含自杀意念第9题）；适用场景: 筛查、追踪、初级医疗；临界值: 5-9轻度；10-14中度；15-19中重度；20-27重度'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/16-Assessment-Scales.md
  section: 16.1 抑郁严重程度评估
- type: concept
  question: BDI-II的核心要点是什么？
  answer: '题数: 21；评估维度: 认知、躯体、情感多维抑郁；适用场景: 临床深度评估、研究；临界值: 0-13极轻；14-19轻度；20-28中度；29-63重度'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/16-Assessment-Scales.md
  section: 16.1 抑郁严重程度评估
- type: concept
  question: MADRS的核心要点是什么？
  answer: '题数: 10；评估维度: 核心抑郁症状（由临床医生评定）；适用场景: 精神科临床、药物试验；临界值: 0-6正常；7-19轻度；20-34中度；35-60重度'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/16-Assessment-Scales.md
  section: 16.1 抑郁严重程度评估
- type: concept
  question: 观察（Observing）的核心要点是什么？
  answer: '定义: 觉察内外部经验（感觉、情绪、想法）；抑郁关联: 抑郁患者常降低；但过度观察伴反刍时需鉴别'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/16-Assessment-Scales.md
  section: 16.2 正念特异性量表
- type: concept
  question: 描述（Describing）的核心要点是什么？
  answer: '定义: 用文字标记经验；抑郁关联: 抑郁患者情绪词汇匮乏，描述能力下降'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/16-Assessment-Scales.md
  section: 16.2 正念特异性量表
- type: concept
  question: 不反应（Non-reacting）的核心要点是什么？
  answer: '定义: 允许经验存在而不过度反应；抑郁关联: 抑郁患者情绪反应性高，此维度通常最低'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/16-Assessment-Scales.md
  section: 16.2 正念特异性量表
- type: concept
  question: 什么是17. 家属与照护者支持工具？
  answer: '**说明**：抑郁患者的正念练习效果，高度依赖家庭环境的支持。家属的无意识破坏（如"你 meditate 了怎么还抑郁"）、过度保护或情感疏离，都可能抵消治疗进展。同时，照护者自身面临极高的耗竭风险。本章提供双向支持框架：既帮助家属有效支持患者，也保护家属自身的心理健康。'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/17-Family-Caregiver.md
  section: 17. 家属与照护者支持工具
- type: concept
  question: 正念就是不想事情"的核心要点是什么？
  answer: '家属表达: "你学了正念，怎么还在想那些负面的？"；正确理解: 正念不是停止思考，而是改变与想法的关系——"看到想法而不被卷走"'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/17-Family-Caregiver.md
  section: 17.1 家属正念教育手册
- type: concept
  question: 正念就是放松"的核心要点是什么？
  answer: '家属表达: " meditate 完你应该觉得轻松才对"；正确理解: 正念有时会带来不舒适的情绪或躯体感受（被压抑的材料涌现），这是正常的疗愈过程'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/17-Family-Caregiver.md
  section: 17.1 家属正念教育手册
- type: concept
  question: 正念可以替代药物/治疗"的核心要点是什么？
  answer: '家属表达: "既然正念有用，你为什么不停药？"；正确理解: 正念是辅助治疗，不是替代。停药决定必须由医生做出'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/17-Family-Caregiver.md
  section: 17.1 家属正念教育手册
- type: concept
  question: 你看看你， meditate 了也没用"的核心要点是什么？
  answer: '✅ 替代话术: "我注意到你一直在练习，这需要很大的毅力。"'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/17-Family-Caregiver.md
  section: 17.1 家属正念教育手册
- type: concept
  question: 别人比你惨多了"的核心要点是什么？
  answer: '✅ 替代话术: "你的痛苦是真实的。我不需要比较才能理解你很难受。"'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/17-Family-Caregiver.md
  section: 17.1 家属正念教育手册
- type: concept
  question: 你就是想太多了"的核心要点是什么？
  answer: '✅ 替代话术: "你的大脑现在就像一台过载的电脑，正念是在帮你清理缓存。"'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/17-Family-Caregiver.md
  section: 17.1 家属正念教育手册
- type: concept
  question: 情绪的核心要点是什么？
  answer: '轻度耗竭: 偶尔烦躁、担忧；中度耗竭: 频繁焦虑、无助感、易怒；重度耗竭: 抑郁症状、情感麻木、绝望'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/17-Family-Caregiver.md
  section: 17.2 照护者耗竭预防
- type: concept
  question: 什么是18. 数字疗法与远程正念干预？
  answer: '**说明**：后疫情时代，远程心理健康服务（Telehealth）和数字化干预（Digital Mental Health, DMH）已成为不可忽视的交付模式。对抑郁患者而言，数字正念降低了地理、时间、病耻感的门槛；但同时也带来新的挑战（数字鸿沟、隐私、疗效维持）。本章提供远程正念的循证现状与临床实施指南。'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/18-Digital-Therapy.md
  section: 18. 数字疗法与远程正念干预
- type: concept
  question: Kral et al. (2018）的核心要点是什么？
  answer: '设计: 远程正念神经影像研究；结论: 远程引导的正念练习可产生与面对面相似的神经可塑性改变（杏仁核反应性降低）'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/18-Digital-Therapy.md
  section: 18.1 远程 MBCT 的循证现状
- type: concept
  question: Spijkerman et al. (2016）的核心要点是什么？
  answer: '设计: 元分析，15项RCT；结论: 在线正念干预对抑郁和焦虑有中小效应（g = 0.29-0.41），效应低于面对面但仍显著'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/18-Digital-Therapy.md
  section: 18.1 远程 MBCT 的循证现状
- type: concept
  question: Bostock et al. (2019）的核心要点是什么？
  answer: '设计: RCT，在线 MBCT vs 等待组；结论: 在线 MBCT 显著降低失眠和焦虑；对轻中度抑郁有效'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/18-Digital-Therapy.md
  section: 18.1 远程 MBCT 的循证现状
- type: concept
  question: 同步视频团体的核心要点是什么？
  answer: '定义: 实时视频会议，带领者+多个患者；优势: 保留团体动力；实时互动和答疑；局限: 技术要求；网络不稳定；隐私顾虑；抑郁适配: 中高功能抑郁患者的首选远程模式'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/18-Digital-Therapy.md
  section: 18.2 数字化正念的交付模式
- type: concept
  question: 异步录播课程的核心要点是什么？
  answer: '定义: 预录视频/音频，患者自主学习；优势: 灵活性高；可重复观看；成本低；局限: 缺乏互动；依从性低；无个性化反馈；抑郁适配: 轻中度抑郁；作为面对面课程的辅助'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/18-Digital-Therapy.md
  section: 18.2 数字化正念的交付模式
- type: concept
  question: APP 自助的核心要点是什么？
  answer: '定义: 商业正念 APP（Headspace/Insight Timer等）；优势: 极高的可及性；游戏化；提醒功能；局限: 质量参差不齐；无临床监督；可能加重自责；抑郁适配: 日常维护；不适合急性期'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/18-Digital-Therapy.md
  section: 18.2 数字化正念的交付模式
- type: concept
  question: 团体凝聚力的核心要点是什么？
  answer: '远程替代策略: 开场时每人用1个词描述今天的状态；使用"虚拟击掌"或"聊天框表情"'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/18-Digital-Therapy.md
  section: 18.3 远程正念团体带领技术
- type: concept
  question: 什么是19. 困难体验与不良事件监测？
  answer: '**说明**：正念并非总是"安全"的。在特定条件下，正念练习可能引发或加重困难的心理体验——从短暂的不适到严重的解离、惊恐发作、甚至精神病性症状。作为负责任的临床工作者，必须能够识别、分类、监测这些不良事件，并知道何时需要暂停正念、转介精神科。'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/19-Adverse-Events.md
  section: 19. 困难体验与不良事件监测
- type: concept
  question: 认知类的核心要点是什么？
  answer: '具体表现: 思维加速、强迫性自我监控、思维空白、记忆侵入；发生情境: 开放觉察练习、长时间静默；临床意义: 通常是暂时的；但若持续，可能加重焦虑或 OCD'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/19-Adverse-Events.md
  section: 19.1 不良体验的分类框架
- type: concept
  question: 情绪类的核心要点是什么？
  answer: '具体表现: 恐慌、悲伤涌现、愤怒、麻木、情绪失控；发生情境: 身体扫描、情绪觉察、慈心冥想；临床意义: 被压抑的情绪材料释放；需要容器和支持'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/19-Adverse-Events.md
  section: 19.1 不良体验的分类框架
- type: concept
  question: 躯体类的核心要点是什么？
  answer: '具体表现: 疼痛加剧、头晕、颤抖、心跳异常、感知扭曲；发生情境: 身体扫描、呼吸练习；临床意义: 需先排除躯体疾病；可能是躯体化或过度通气'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/19-Adverse-Events.md
  section: 19.1 不良体验的分类框架
- type: concept
  question: 自我感的核心要点是什么？
  answer: '正念去中心化（健康）: "我觉察到我的想法"——观察者稳定；病理性解离（需关注）: "我不知道我是谁"——观察者不稳定或消失'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/19-Adverse-Events.md
  section: 19.2 去中心化与解离的鉴别诊断
- type: concept
  question: 现实感的核心要点是什么？
  answer: '正念去中心化（健康）: 现实检验能力完整；病理性解离（需关注）: 现实感改变（世界不真实、自己像机器人）'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/19-Adverse-Events.md
  section: 19.2 去中心化与解离的鉴别诊断
- type: concept
  question: 控制感的核心要点是什么？
  answer: '正念去中心化（健康）: 可以选择是否卷入想法；病理性解离（需关注）: 感到被想法/经验控制，无法脱身'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/19-Adverse-Events.md
  section: 19.2 去中心化与解离的鉴别诊断
- type: concept
  question: 创伤后应激障碍（PTSD）的核心要点是什么？
  answer: '预防策略: 创伤知情正念；保持睁眼；从 grounding 开始；患者掌控练习节奏；需避免的技术: 长时间闭眼静默、开放觉察、身体扫描（尤其从内脏开始）'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/19-Adverse-Events.md
  section: 19.4 高风险人群的预防性调整
- type: concept
  question: 什么是20. 治疗师自我照顾与督导？
  answer: '**说明**：带领抑郁患者的正念团体或进行个体正念治疗，是一项高度消耗情感资源的工作。抑郁患者的绝望感、自我批评和存在性痛苦，可能通过反移情机制影响治疗师。本章不是"附加项"，而是**维持临床工作质量和可持续性的必需基础设施**。'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/20-Therapist-Self-Care.md
  section: 20. 治疗师自我照顾与督导
- type: concept
  question: 过度拯救的核心要点是什么？
  answer: '表现: 感到必须"治好"患者；对进步缓慢感到挫败和愤怒；过度投入；对治疗的危害: 患者感到被控制；治疗师耗竭；模糊专业边界'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/20-Therapist-Self-Care.md
  section: 20.1 次级创伤与耗竭风险
- type: concept
  question: 无力感认同的核心要点是什么？
  answer: '表现: 被患者的绝望感淹没；开始怀疑正念/治疗的价值；职业倦怠；对治疗的危害: 治疗动力下降；传递给患者"你也无能为力"的隐性信息'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/20-Therapist-Self-Care.md
  section: 20.1 次级创伤与耗竭风险
- type: concept
  question: 回避的核心要点是什么？
  answer: '表现: 对某位患者感到不耐，希望取消会谈；在团体中忽视某位成员；对治疗的危害: 患者感到被抛弃（尤其抑郁患者对拒绝高度敏感）'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/20-Therapist-Self-Care.md
  section: 20.1 次级创伤与耗竭风险
- type: concept
  question: 对工作的态度的核心要点是什么？
  answer: '轻度预警: 偶尔不想上班；中度预警: dread 大多数会谈；重度预警（需立即休假/督导）: 完全无法面对患者'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/20-Therapist-Self-Care.md
  section: 20.1 次级创伤与耗竭风险
- type: concept
  question: 对患者的感受的核心要点是什么？
  answer: '轻度预警: 对某位患者感到挑战；中度预警: 对多位患者感到烦躁；重度预警（需立即休假/督导）: 对所有患者感到麻木或厌恶'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/20-Therapist-Self-Care.md
  section: 20.1 次级创伤与耗竭风险
- type: concept
  question: 躯体信号的核心要点是什么？
  answer: '轻度预警: 轻度疲劳；中度预警: 睡眠问题、免疫力下降；重度预警（需立即休假/督导）: 严重躯体化、需要医疗介入'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/20-Therapist-Self-Care.md
  section: 20.1 次级创伤与耗竭风险
- type: concept
  question: 个人正式练习的核心要点是什么？
  answer: '最低要求: 每日15分钟；理想状态: 每日30-45分钟；目的: 维持自身的觉察能力和情绪容纳空间'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/20-Therapist-Self-Care.md
  section: 20.2 个人正念练习要求
- type: concept
  question: 什么是21. 参考文献？
  answer: '1. Segal, Z. V., Williams, J. M. G., & Teasdale, J. D. (2018). *Mindfulness-Based Cognitive Therapy for Depression*
    (2nd ed.). Guilford Press.

    2. Kuyken, W., Warren, F. C., Taylor, R. S., et al. (2016). Efficacy of mindfulness-based cognitive therapy in prevention
    of depressive relapse: An individual patient data meta-analysis from randomized trials. *JAMA Psychiatry, 73*(6), 565-574.

    3. Kuyken, W., Hayes, R., Barrett, B., et al. (2015). Effectiveness and cost-effectiveness of mindfulness-based'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/21-References.md
  section: 21. 参考文献
- type: concept
  question: 大型RCT的核心要点是什么？
  answer: '代表研究: Kuyken et al. (2015), PREVENT；核心发现: MBCT = 维持药物；424名患者；2年随访；临床信心: 高'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/22-Research-Critical-Review.md
  section: 13.1 现有证据的优势
- type: concept
  question: 个体患者数据元分析(IPD-MA)的核心要点是什么？
  answer: '代表研究: Kuyken et al. (2016)；核心发现: MBCT 显著降低复发风险；HR = 0.66；临床信心: 高'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/22-Research-Critical-Review.md
  section: 13.1 现有证据的优势
- type: concept
  question: 神经影像的核心要点是什么？
  answer: '代表研究: Hölzel et al. (2011); Farb et al. (2007)；核心发现: 前额叶、海马、岛叶灰质密度增加；临床信心: 中-高'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/22-Research-Critical-Review.md
  section: 13.1 现有证据的优势
- type: concept
  question: 相关≠因果的核心要点是什么？
  answer: '表现: fMRI 显示正念者杏仁核激活降低，但无法确定是正念"导致"降低，还是低焦虑者更容易坚持正念；改进方向: 纵向设计、随机化、机制特异性检验'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/22-Research-Critical-Review.md
  section: 13.2.3 机制研究的因果推断局限
- type: concept
  question: 多重机制混淆的核心要点是什么？
  answer: '表现: 正念同时改变注意力、情绪调节、自我慈悲——哪个是主要机制？；改进方向: 中介分析、拆解研究（dismantling studies）'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/22-Research-Critical-Review.md
  section: 13.2.3 机制研究的因果推断局限
- type: concept
  question: 神经可塑性的持久性的核心要点是什么？
  answer: '表现: Hölzel 的灰质变化在 8 周后发现，但 1-2 年后是否维持？；改进方向: 长期随访的神经影像研究'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/22-Research-Critical-Review.md
  section: 13.2.3 机制研究的因果推断局限
- type: concept
  question: 西方中心的核心要点是什么？
  answer: '表现: 绝大多数 RCT 在欧美进行；现状: 亚洲研究快速增长，但仍不足'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/22-Research-Critical-Review.md
  section: 13.2.4 文化普适性疑问
- type: concept
  question: 概念翻译的核心要点是什么？
  answer: '表现: "Mindfulness"在中文语境中的文化负载；现状: 正在探索本土化测量和干预'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/22-Research-Critical-Review.md
  section: 13.2.4 文化普适性疑问
- type: concept
  question: 病史的核心要点是什么？
  answer: '内容: 首次发作22岁（大学毕业）；第二次发作29岁（产后）；均无自杀企图'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/23-Case-Conceptualizations.md
  section: 背景
- type: concept
  question: 稳定期的核心要点是什么？
  answer: '周次: 1-2；核心干预: 药物调整（精神科）； grounding + 呼吸；睡眠卫生；目标: 降低急性症状；建立安全感'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/23-Case-Conceptualizations.md
  section: 干预方案
- type: concept
  question: MBCT导入的核心要点是什么？
  answer: '周次: 3-4；核心干预: 身体扫描；3分钟呼吸空间；反刍标签化；目标: 建立觉察基础；打断反刍'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/23-Case-Conceptualizations.md
  section: 干预方案
- type: concept
  question: 什么是15.1 正念教师的核心能力框架？
  answer: 基于**英国正念网络（British Association of Mindfulness-Based Approaches, BAMBA）**和**牛津正念中心（Oxford Mindfulness Centre）**的标准，正念教师需具备以下能力：
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/24-Teaching-Manual.md
  section: 15.1 正念教师的核心能力框架
- type: concept
  question: 个人正念练习的核心要点是什么？
  answer: '具体标准: 至少2年每日正式练习；完成至少一次静默 retreat；培养路径: 每日练习 + 年度 retreat'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/24-Teaching-Manual.md
  section: 15.1 正念教师的核心能力框架
- type: concept
  question: 专业培训的核心要点是什么？
  answer: '具体标准: 完成MBCT/MBSR教师培训（通常1-2年）；培养路径: 牛津/UCSD/UMass认证课程'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/24-Teaching-Manual.md
  section: 15.1 正念教师的核心能力框架
- type: concept
  question: 督导的核心要点是什么？
  answer: '具体标准: 在督导下带领至少2轮完整课程；培养路径: 个体督导 + 团体督导'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/24-Teaching-Manual.md
  section: 15.1 正念教师的核心能力框架
- type: concept
  question: 开场的核心要点是什么？
  answer: '时长: 10分钟；内容: 签到；简短呼吸觉察；回顾上周作业；教学法要点: 创造安全容器；不评判作业完成度'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/24-Teaching-Manual.md
  section: 15.2.1 MBCT 抑郁课程的课堂结构
- type: concept
  question: 主题讲解的核心要点是什么？
  answer: '时长: 15分钟；内容: 本周主题（如"自动导航""去中心化"）；教学法要点: 用隐喻和故事，少用抽象术语'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/24-Teaching-Manual.md
  section: 15.2.1 MBCT 抑郁课程的课堂结构
- type: concept
  question: 引导练习的核心要点是什么？
  answer: '时长: 20-30分钟；内容: 身体扫描/呼吸空间/慈心冥想；教学法要点: 声音平稳、缓慢、温暖；允许沉默'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/24-Teaching-Manual.md
  section: 15.2.1 MBCT 抑郁课程的课堂结构
- type: concept
  question: 学员哭泣的核心要点是什么？
  answer: '表现: 练习中情绪涌现；应对策略: 不急于干预；保持沉默陪伴；课后个别会谈；确保有支持资源'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/24-Teaching-Manual.md
  section: 15.2.2 常见教学困难与应对
- type: concept
  question: RedCap的核心要点是什么？
  answer: '功能: 研究数据管理；电子问卷；适用场景: 临床研究、RCT；优势: 免费、符合FDA 21 CFR Part 11、多中心协作；注意: 需机构支持设置'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/25-Digital-Assessment-Tools.md
  section: 16.1 电子化量表平台
- type: concept
  question: Qualtrics的核心要点是什么？
  answer: '功能: 高级问卷设计；逻辑跳转；适用场景: 研究、大规模筛查；优势: 用户友好；强大的数据分析功能；注意: 付费；学术版有折扣'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/25-Digital-Assessment-Tools.md
  section: 16.1 电子化量表平台
- type: concept
  question: Limesurvey的核心要点是什么？
  answer: '功能: 开源问卷；适用场景: 小型研究、社区项目；优势: 免费开源；自托管保护隐私；注意: 界面较老旧'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/25-Digital-Assessment-Tools.md
  section: 16.1 电子化量表平台
- type: concept
  question: 什么是16.2 患者自评与追踪 APP？
  answer: '**临床使用建议**：

    - 不推荐依赖未经验证的 APP 进行诊断。

    - 可将 APP 作为**辅助工具**：患者每日记录情绪，治疗时共同回顾趋势。

    - 注意数字鸿沟：部分患者（尤其老年、低教育水平）可能难以使用 APP。'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/25-Digital-Assessment-Tools.md
  section: 16.2 患者自评与追踪 APP
- type: concept
  question: Moodfit的核心要点是什么？
  answer: '核心功能: 情绪追踪；CBT工具；目标设定；抑郁相关: PHQ-9; GAD-7; 情绪日记；正念相关: 无；证据等级: 未经验证'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/25-Digital-Assessment-Tools.md
  section: 16.2 患者自评与追踪 APP
- type: concept
  question: Daylio的核心要点是什么？
  answer: '核心功能: 微日记；情绪追踪；活动关联；抑郁相关: 情绪-活动关联分析；正念相关: 无；证据等级: 用户友好；可识别个人触发因素'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/25-Digital-Assessment-Tools.md
  section: 16.2 患者自评与追踪 APP
- type: concept
  question: MindDoc的核心要点是什么？
  answer: '核心功能: 心理健康监测；AI反馈；抑郁相关: PHQ-9; 症状追踪；正念相关: 无；证据等级: 部分验证；德国开发'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/25-Digital-Assessment-Tools.md
  section: 16.2 患者自评与追踪 APP
- type: concept
  question: 什么是16.3 可穿戴设备与生物标志物？
  answer: '**临床建议**：

    - 可穿戴设备的数据应作为**辅助信息**，而非诊断依据。

    - HRV 趋势（而非单次测量）更有价值。

    - 需教育患者避免"数据焦虑"——不要每天盯着数字评分。'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/25-Digital-Assessment-Tools.md
  section: 16.3 可穿戴设备与生物标志物
- type: concept
  question: 童慧琦等（2018）的核心要点是什么？
  answer: '设计: RCT，上海；样本: 癌症患者；结论: 中文版 MBSR 显著降低焦虑和抑郁'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/26-Cross-Cultural-Evidence.md
  section: 17.1.1 大陆地区
- type: concept
  question: 李波等（2015）的核心要点是什么？
  answer: '设计: RCT，北京；样本: 大学生；结论: 正念训练降低抑郁和反刍'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/26-Cross-Cultural-Evidence.md
  section: 17.1.1 大陆地区
- type: concept
  question: 张卫东等（2019）的核心要点是什么？
  answer: '设计: 元分析；样本: 多研究汇总；结论: 正念对中国人群抑郁有中等到大效应量'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/26-Cross-Cultural-Evidence.md
  section: 17.1.1 大陆地区
- type: concept
  question: Chan et al.（2020）的核心要点是什么？
  answer: '设计: RCT；样本: 台湾大学生；结论: 正念降低抑郁和压力；效果维持3个月'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/26-Cross-Cultural-Evidence.md
  section: 17.1.2 台湾地区
- type: concept
  question: Lee et al.（2019）的核心要点是什么？
  answer: '设计: 质性研究；样本: 台湾抑郁患者；结论: 参与者报告"正念帮助我从情绪中抽离"，但部分人对"慈心冥想"有文化抵抗'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/26-Cross-Cultural-Evidence.md
  section: 17.1.2 台湾地区
- type: concept
  question: Ng et al.（2021）的核心要点是什么？
  answer: '设计: RCT；样本: 香港中学生；结论: 学校正念项目降低抑郁症状；但高压力亚组效果更显著'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/26-Cross-Cultural-Evidence.md
  section: 17.1.3 香港地区
- type: concept
  question: 什么是17.2 日本研究？
  answer: '**文化观察**：

    > 日本的研究常将正念与**森田疗法**（Morita Therapy）整合，因为两者都强调"接纳"和"顺其自然"。这提示本土化不必从零开始，可以与本土心理治疗传统对话。'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/26-Cross-Cultural-Evidence.md
  section: 17.2 日本研究
- type: concept
  question: Miyoshi et al.（2019）的核心要点是什么？
  answer: '设计: RCT；样本: 日本护士；结论: 基于森田疗法的正念干预降低倦怠和抑郁'
  source: 02-Mind-Psychology/meditation/clinical-conditions/depression/26-Cross-Cultural-Evidence.md
  section: 17.2 日本研究
