  section: 剂量与频次建议
- type: concept
  question: 什么是安全注意事项？
  answer: '- **过敏测试**：首次使用前在前臂进行 5 min 暴露测试，观察皮肤红斑或呼吸不适。

    - **通风要求**：密闭空间使用后必须通风 10‑15 min，防止 CO₂ 累积。

    - **火源管理**：使用防火垫，避免直接接触可燃材料。

    - **儿童监管**：确保儿童在使用期间远离香炉。'
  source: 02-Mind-Psychology/therapy/incense/Incense_Practices.md
  section: 安全注意事项
