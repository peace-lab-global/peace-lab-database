  question: 焦虑的核心要点是什么？
  answer: '英文名 (English Term): Anxiety；原始语言/词源 (Original Language): 拉丁语: *Anxietas* (忧虑、不安) < *Angere* (压迫、勒紧)；词源含义: "被压迫、束缚的感觉"；精确定义:
    对未来威胁的预期性情绪反应，伴认知、生理和行为成分；区分要点: 焦虑是指向未来的；恐惧是指向当下的；专业视角 (Professional Perspective): 适度焦虑有适应功能；过度焦虑成为障碍'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/Anxiety_Disorder_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 恐惧的核心要点是什么？
  answer: '英文名 (English Term): Fear；原始语言/词源 (Original Language): 古英语: *Fǣr* (危险、灾难)；词源含义: 面对危险的反应；精确定义: 对即刻威胁的情绪反应，激活战斗-逃跑反应；区分要点:
    恐惧是对当下、具体威胁的反应；专业视角 (Professional Perspective): 恐惧的神经回路以杏仁核为核心'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/Anxiety_Disorder_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 担忧的核心要点是什么？
  answer: '英文名 (English Term): Worry；原始语言/词源 (Original Language): 古英语: *Wyrgan* (勒紧、扼住)；词源含义: "被扼住喉咙的感觉"；精确定义: 反复出现的、难以控制的负性思维链；区分要点:
    担忧是焦虑的认知成分；专业视角 (Professional Perspective): 广泛性焦虑的核心特征'
  source: 02-Mind-Psychology/psychology/clinical/anxiety/Anxiety_Disorder_Overview.md
