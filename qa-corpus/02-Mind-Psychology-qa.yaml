  question: 理论框架的核心要点是什么？
  answer: '内容: 将昆达里尼、脉轮、Nadi（能量通道）系统化，与哈他瑜伽的体式（Asana）、清洁法（Shatkarma）、呼吸法（Pranayama）整合'
  source: 02-Mind-Psychology/meditation/kundalini-meditation/Kundalini_Meditation_Overview.md
