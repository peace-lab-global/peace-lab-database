- type: concept
  question: 什么是一、引言：为什么要有一张"世界冥想地图"？
  answer: 冥想（Meditation）并非单一的技术，而是人类在数千年的文明演进中，在不同地理、文化、宗教和科学语境下发展出的**一系列心智训练方法的集合**。从喜马拉雅的洞穴到日本的禅堂，从埃及的沙漠到亚马逊的雨林，从印度的恒河边到硅谷的写字楼——人类一直在寻找让心安静下来的方法。
  source: 02-Mind-Psychology/meditation/Meditation_World_Panorama.md
  section: 一、引言：为什么要有一张"世界冥想地图"
