- type: concept
  question: 第一人称的核心要点是什么？
  answer: '英文: First-Person；评估方法: 结构化现象学访谈、体验日记、量表自评、经验采样法(ESM)；适用层级: 所有层级；局限: 报告偏差、语言局限、回忆偏差；证据等级: B-C'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Level_Ability_Assessment_Standard.md
  section: 1.1 四重本体论整合立场
- type: concept
  question: 第二人称的核心要点是什么？
  answer: '英文: Second-Person；评估方法: 导师验证、同行评议、督导反馈、协同现象学(co-phenomenology)；适用层级: 中高级；局限: 依赖评估者能力、传承封闭性；证据等级: C-D'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Level_Ability_Assessment_Standard.md
  section: 1.1 四重本体论整合立场
- type: concept
  question: 第三人称的核心要点是什么？
  answer: '英文: Third-Person；评估方法: 生理测量、行为实验、神经影像、可穿戴设备；适用层级: 初-高级；局限: 无法捕获体验的质性特征、生态效度有限；证据等级: A-B'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Level_Ability_Assessment_Standard.md
  section: 1.1 四重本体论整合立场
- type: concept
  question: 累计练习时长的核心要点是什么？
  answer: '操作化定义: 正式坐姿冥想的累计小时数；与效果的关联: 与FFMQ变化呈对数曲线关系，r=0.35-0.50；证据等级: A'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Level_Ability_Assessment_Standard.md
  section: 1.3 剂量-反应关系循证模型
- type: concept
  question: 练习频率的核心要点是什么？
  answer: '操作化定义: 每周练习天数；与效果的关联: 每周≥5天比≤3天效果更优，d=0.30-0.45；证据等级: A'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Level_Ability_Assessment_Standard.md
  section: 1.3 剂量-反应关系循证模型
- type: concept
  question: 单次时长的核心要点是什么？
  answer: '操作化定义: 每次练习的平均时长；与效果的关联: 20-45分钟为最佳窗口，<15分钟效果减弱；证据等级: B'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Level_Ability_Assessment_Standard.md
  section: 1.3 剂量-反应关系循证模型
- type: concept
  question: MBI-TAC** (Crane et al., 2012, 2021)的核心要点是什么？
  answer: '核心贡献: 正念教学胜任力六域模型；评估者间ICC=0.73-0.85；引用标识: [MBI-TAC]；证据等级: A'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Level_Ability_Assessment_Standard.md
  section: 1.4 行业最佳实践来源
- type: concept
  question: 什么是冥想到底在干什么？
  answer: 很多人一听"冥想"，脑子里浮现的画面是盘腿闭眼、仙气飘飘。要么觉得它是放松术，泡完澡点个香那种；要么觉得是心灵鸡汤，"你要想开一点"那种；要么直接归类为神秘主义，跟算命差不多。
  source: 02-Mind-Psychology/meditation/overview/Meditation_Mind_Management.md
  section: 冥想到底在干什么
- type: concept
  question: 什么是四步方法论：看见、了解、接纳、转化？
  answer: 课程把冥想拆成了四个清晰的步骤，不是鸡汤式的建议，而是可以一步一步练的内在工程。
  source: 02-Mind-Psychology/meditation/overview/Meditation_Mind_Management.md
  section: 四步方法论：看见、了解、接纳、转化
- type: concept
  question: 什么是四步之上还有什么：明觉？
  answer: 课程特别强调，贯穿这四步还有一个更深层的要求——**明觉**。
  source: 02-Mind-Psychology/meditation/overview/Meditation_Mind_Management.md
  section: 四步之上还有什么：明觉
- type: concept
  question: 觉察的核心要点是什么？
  answer: '所属: 止；核心内容: 培养回归当下的能力；练什么: 从惯性模式中抽离，积蓄内在安稳'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Mind_Management.md
  section: 止观五阶段：从坐不住到不需要坐
- type: concept
  question: 设法的核心要点是什么？
  answer: '所属: 止；核心内容: 主动收回对外在的注意力；练什么: 将注意力导向身体感知，划分内外边界'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Mind_Management.md
  section: 止观五阶段：从坐不住到不需要坐
- type: concept
  question: 专注的核心要点是什么？
  answer: '所属: 止；核心内容: 用呼吸训练让注意力稳定在锚点；练什么: 达到"住心一处"的状态'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Mind_Management.md
  section: 止观五阶段：从坐不住到不需要坐
- type: concept
  question: 什么是冥想的完整进阶路径？
  answer: 课程给出了一个很形象的比喻：冥想就像跟一个人建立深度沟通。你得先安静下来（止息散乱），然后专心听对方说话（专注），最后放下你的预设和偏见，让对方的真实信息自然流到你这里（直接认知）。
  source: 02-Mind-Psychology/meditation/overview/Meditation_Mind_Management.md
  section: 冥想的完整进阶路径
- type: concept
  question: 神经可塑性的核心要点是什么？
  answer: '英文名 (English Term): Neuroplasticity；原始语言 (Original Language): 希腊: *Plastikós* (πλαστικός, 可塑的)；精确定义: 大脑通过经验改变结构与功能的能力；发现历史:
    Hebb 1949年"一起发放的神经元连在一起"；专业视角: 冥想的核心机制:重复练习重塑大脑'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Neuroscience_Mechanisms.md
  section: 核心术语表 (Core Terms)
- type: concept
  question: 灰质密度的核心要点是什么？
  answer: '英文名 (English Term): Gray Matter Density；原始语言 (Original Language): 拉丁: *Substantia Grisea*；精确定义: 神经元细胞体集中区域的浓度；发现历史:
    MRI技术发展后可量化；专业视角: 冥想者在特定脑区灰质增加(如海马、前额叶)'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Neuroscience_Mechanisms.md
  section: 核心术语表 (Core Terms)
- type: concept
  question: 白质完整性的核心要点是什么？
  answer: '英文名 (English Term): White Matter Integrity；原始语言 (Original Language): 拉丁: *Substantia Alba*；精确定义: 神经纤维束的髓鞘化程度与连接质量；发现历史:
    DTI扩散张量成像测量；专业视角: 冥想增强脑区间信息传输效率'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Neuroscience_Mechanisms.md
  section: 核心术语表 (Core Terms)
- type: concept
  question: 前额叶皮层 (PFC)的核心要点是什么？
  answer: '结构变化: 灰质密度增加、皮层增厚(尤其左侧)；功能意义: 执行功能、情绪调节、冲动控制增强；冥想类型: 正念、禅定；训练时长: 8周MBSR可见效；研究证据: Lazar 2005, Hölzel 2011；专业视角:
    对抗年龄相关的前额叶萎缩,长期冥想者50岁仍保持年轻人的前额叶厚度'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Neuroscience_Mechanisms.md
  section: 冥想神经解剖变化表 (Neuroanatomical Changes)
- type: concept
  question: 海马体 (Hippocampus)的核心要点是什么？
  answer: '结构变化: 灰质浓度增加、体积增大；功能意义: 学习记忆增强、应激恢复力提升；冥想类型: 正念、慈心；训练时长: 8周MBSR；研究证据: Hölzel 2011, Luders 2013；专业视角: 对抗慢性压力导致的海马萎缩,抑郁症的神经保护'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Neuroscience_Mechanisms.md
  section: 冥想神经解剖变化表 (Neuroanatomical Changes)
- type: concept
  question: 后扣带回 (PCC)的核心要点是什么？
  answer: '结构变化: 功能连接减弱(与mPFC)；功能意义: 自我参照思维减少、反刍降低；冥想类型: 正念、内观；训练时长: 长期修习；研究证据: Brewer 2011, Garrison 2015；专业视角: DMN核心节点,其下调是"去自我中心化"的标志'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Neuroscience_Mechanisms.md
  section: 冥想神经解剖变化表 (Neuroanatomical Changes)
- type: concept
  question: γ波 (Gamma)的核心要点是什么？
  answer: '频率范围: 40-100 Hz；冥想状态: 慈心冥想高峰、顿悟时刻；主观体验: 高度整合、统一感、洞见；神经意义: 长距离神经同步、意识绑定；测量方法: EEG高密度记录（含便携脑电贴片设备，无需到院上机，后台实时观测脑波）；专业视角:
    Lutz 2004:藏传僧人慈心禅时γ波振幅是新手25倍；冥想者出现特征性伽马波的时间因人而异——最短7分钟，一般18分钟，最长可达48分钟，该脑波特征无法造假'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Neuroscience_Mechanisms.md
  section: 冥想脑波特征表 (Brainwave Patterns)
- type: concept
  question: β波 (Beta)的核心要点是什么？
  answer: '频率范围: 13-30 Hz；冥想状态: 专注冥想、警觉状态；主观体验: 清醒专注、认知投入；神经意义: 皮层激活、任务执行；测量方法: EEG；专业视角: 低频β(13-20Hz)与放松性警觉相关,冥想者可维持而不紧张'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Neuroscience_Mechanisms.md
  section: 冥想脑波特征表 (Brainwave Patterns)
- type: concept
  question: 什么是人的理性能走多远？
  answer: 冥想为什么存在？不是因为古人吃饱了没事干喜欢闭眼坐着，而是因为人类最聪明的脑袋们花了几千年时间，发现了一件让人不太舒服的事——**靠理性思考，你永远没法彻底搞明白这个世界。**
  source: 02-Mind-Psychology/meditation/overview/Meditation_Philosophical_Foundations.md
  section: 人的理性能走多远
- type: concept
  question: 种族假象的核心要点是什么？
  answer: '意思: 人类这个物种天生的认知局限；举个例子: 你的眼睛只能看到可见光，蜜蜂看到的世界跟你完全不同'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Philosophical_Foundations.md
  section: 培根：你脑子里有四种出厂自带的bug
- type: concept
  question: 洞穴假象的核心要点是什么？
  answer: '意思: 每个人因为自己的经历形成的偏见；举个例子: 一个从小被狗咬过的人，看到所有狗都觉得危险'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Philosophical_Foundations.md
  section: 培根：你脑子里有四种出厂自带的bug
- type: concept
  question: 市场假象的核心要点是什么？
  answer: '意思: 语言和概念本身带来的误导；举个例子: "成功"这个词，十个人有十个不同的理解，但大家都以为说的是同一件事'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Philosophical_Foundations.md
  section: 培根：你脑子里有四种出厂自带的bug
- type: concept
  question: 什么是"科学尽头是神学"到底在说什么？
  answer: 课程引用了朱清时的一句话："科学家千辛万苦爬到山顶，才发现佛已经在那里等候多时。"
  source: 02-Mind-Psychology/meditation/overview/Meditation_Philosophical_Foundations.md
  section: '"科学尽头是神学"到底在说什么'
- type: concept
  question: 什么是冥想这个词从哪来的？
  answer: 英文 meditation 的词根 med 跟 medical（医疗）是同源的——冥想从词源上就跟"治愈"绑在一起。这个词在西方至少可追溯到12-13世纪，多数考证认为出现于13世纪。
  source: 02-Mind-Psychology/meditation/overview/Meditation_Philosophical_Foundations.md
  section: 冥想这个词从哪来的
