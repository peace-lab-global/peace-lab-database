  answer: '英文: Fatigue；原始语言/词源: 拉丁语: fatigare (使疲倦)；临床定义: 持续的、压倒性的疲惫感，非单纯体力不足'
  source: 02-Mind-Psychology/psychology/stress-hpa/cfs/CFS_Clinical_Features.md
  section: 1.1 核心症状术语
- type: concept
  question: 劳后不适的核心要点是什么？
  answer: '英文: Post-Exertional Malaise (PEM)；原始语言/词源: 拉丁语: post + exertio + 法语: malaise；临床定义: 活动后症状系统性恶化，延迟出现'
  source: 02-Mind-Psychology/psychology/stress-hpa/cfs/CFS_Clinical_Features.md
  section: 1.1 核心症状术语
- type: concept
  question: 崩溃的核心要点是什么？
  answer: '英文: Crash / Flare；原始语言/词源: 古英语: cræsc；临床定义: 症状急剧恶化期'
  source: 02-Mind-Psychology/psychology/stress-hpa/cfs/CFS_Clinical_Features.md
  section: 1.1 核心症状术语
- type: concept
  question: 肌痛的核心要点是什么？
  answer: '英文: Myalgia；原始语言/词源: 希腊语: μῦς (mys, 肌肉) + ἄλγος (algos, 痛)；定义: 肌肉疼痛'
  source: 02-Mind-Psychology/psychology/stress-hpa/cfs/CFS_Clinical_Features.md
  section: 1.2 疼痛相关术语
- type: concept
  question: 关节痛的核心要点是什么？
  answer: '英文: Arthralgia；原始语言/词源: 希腊语: ἄρθρον (arthron, 关节) + ἄλγος；定义: 关节疼痛(非炎症性)'
  source: 02-Mind-Psychology/psychology/stress-hpa/cfs/CFS_Clinical_Features.md
  section: 1.2 疼痛相关术语
- type: concept
  question: 头痛的核心要点是什么？
  answer: '英文: Cephalalgia；原始语言/词源: 希腊语: κεφαλή (kephale, 头) + ἄλγος；定义: 头部疼痛，ME/CFS中常见新型或加重头痛'
  source: 02-Mind-Psychology/psychology/stress-hpa/cfs/CFS_Clinical_Features.md
  section: 1.2 疼痛相关术语
- type: concept
  question: 体位性心动过速综合征的核心要点是什么？
  answer: '英文: POTS；词源: —；定义: 站立时HR↑≥30bpm(成人)或≥40bpm(青少年)'
  source: 02-Mind-Psychology/psychology/stress-hpa/cfs/CFS_Clinical_Features.md
  section: 1.3 自主神经相关术语
- type: concept
  question: 神经介导性低血压的核心要点是什么？
  answer: '英文: Neurally Mediated Hypotension (NMH)；词源: —；定义: 长时间站立后血压下降'
  source: 02-Mind-Psychology/psychology/stress-hpa/cfs/CFS_Clinical_Features.md
