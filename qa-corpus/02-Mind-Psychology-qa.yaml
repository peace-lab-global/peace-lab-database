- type: concept
  question: 镜像自我对话的核心要点是什么？
  answer: '操作流程: 1. 选择代表"理想自我"的卡片<br>2. 与"现实自我"卡片对话<br>3. 探索差距与成长路径；理论依据: 自我概念理论；适应情境: 社交场合前预演；效果预期: 自信心提升20-30%；风险控制: 避免完美主义陷阱'
  source: 02-Mind-Psychology/therapy/oh-cards-therapy/OH_Cards_Clinical_Applications.md
  section: 表1.2 社交焦虑针对性技术 (Social Anxiety Specific Techniques)
- type: concept
  question: 社交场景模拟的核心要点是什么？
  answer: '操作流程: 1. 抽取社交情境卡片<br>2. 角色扮演不同应对方式<br>3. 评估效果选择最佳策略；理论依据: 行为 rehearsal理论；适应情境: 特定社交技能训练；效果预期: 社交回避减少40-50%；风险控制:
    控制暴露强度梯度'
  source: 02-Mind-Psychology/therapy/oh-cards-therapy/OH_Cards_Clinical_Applications.md
  section: 表1.2 社交焦虑针对性技术 (Social Anxiety Specific Techniques)
- type: concept
  question: 内在批评者转化的核心要点是什么？
  answer: '操作流程: 1. 识别内在批判声音(文字卡)<br>2. 寻找反驳证据(图像卡)<br>3. 建立新的自我对话模式；理论依据: 认知行为理论；适应情境: 自我贬低思维模式；效果预期: 自我接纳度显著提高；风险控制: 防止二次创伤激活'
  source: 02-Mind-Psychology/therapy/oh-cards-therapy/OH_Cards_Clinical_Applications.md
  section: 表1.2 社交焦虑针对性技术 (Social Anxiety Specific Techniques)
- type: concept
  question: 恐慌发作时的核心要点是什么？
  answer: '核心技术: 5-4-3-2-1接地技术；实施要点: 选择5张具体物品图像卡<br>依次描述看到、触摸、听到、闻到、尝到的感觉；预期效果: 快速转移注意力<br>降低生理唤醒；持续时间: 5-10分钟；后续跟进: 记录触发因素'
  source: 02-Mind-Psychology/therapy/oh-cards-therapy/OH_Cards_Clinical_Applications.md
  section: 表1.3 恐慌障碍应急干预 (Panic Disorder Emergency Intervention)
- type: concept
  question: 发作后处理的核心要点是什么？
  answer: '核心技术: 情绪风暴平复法；实施要点: 使用平静自然景观卡片<br>引导深呼吸配合视觉化；预期效果: 情绪稳定化<br>安全感重建；持续时间: 15-20分钟；后续跟进: 安排危机随访'
  source: 02-Mind-Psychology/therapy/oh-cards-therapy/OH_Cards_Clinical_Applications.md
  section: 表1.3 恐慌障碍应急干预 (Panic Disorder Emergency Intervention)
