  question: 什么是二、生平（Biography）？
  answer: '- 16 岁时经历了自发的"死亡体验"——躺下模拟死亡，突然领悟到"我"不是身体

    - 这次体验后离家前往圣山 Arunachala

    - 在山洞中沉默修行多年

    - 逐渐有求道者前来请教

    - 终身未离开 Arunachala 地区

    - 以极简的方式生活和教学

    - 大部分时间保持沉默，以"在场"（Presence）教导'
  source: 02-Mind-Psychology/meditation/masters/hindu-vedantic/Ramana_Maharshi.md
