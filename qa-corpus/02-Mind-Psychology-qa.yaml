  question: 什么是1. 七支坐法的生物力学详解？
  answer: 七支坐法（ Seven-Point Posture of Vairocana / 毘卢七支坐 ）是汉传、藏传、东密共通的上座禅修坐姿。每一"支"不仅具有宗教象征意义，更蕴含深刻的**生物力学原理**。
  source: 02-Mind-Psychology/meditation/zazen/Zazen_Practice_Guide.md
  section: 1. 七支坐法的生物力学详解
- type: concept
  question: 双跏趺**（Full Lotus）的核心要点是什么？
  answer: '操作要点: 右脚放左大腿根，左脚放右大腿根，两膝贴垫；解剖学意义: 骨盆最稳定，坐骨结节垂直向下，脊柱自然拔直；股骨外旋极限，髋外展肌群充分伸展；常见错误: 强行扳腿导致膝盖内扣；纠正方法: 先做束角式（Baddha Konasana）热身，逐步外旋'
  source: 02-Mind-Psychology/meditation/zazen/Zazen_Practice_Guide.md
  section: 1.1 第一支：足——跏趺坐/半跏坐
- type: concept
  question: 单跏趺**（Half Lotus）的核心要点是什么？
  answer: '操作要点: 一脚放对侧大腿根，另一脚放臀下或腿前；解剖学意义: 单侧骨盆略高，可用薄垫调整；较双跏易行，稳定性佳；常见错误: 悬空膝盖未支撑；纠正方法: 悬空膝下垫方形 cushion'
  source: 02-Mind-Psychology/meditation/zazen/Zazen_Practice_Guide.md
  section: 1.1 第一支：足——跏趺坐/半跏坐
- type: concept
  question: 散盘**（Burmese）的核心要点是什么？
  answer: '操作要点: 两脚一前一后，小腿交叉于前方；解剖学意义: 髋外旋要求最低，适合初学者；坐骨承重直接；常见错误: 骨盆后倾，脊柱弓背；纠正方法: 臀部垫高 5–10 cm，使髋高于膝'
  source: 02-Mind-Psychology/meditation/zazen/Zazen_Practice_Guide.md
  section: 1.1 第一支：足——跏趺坐/半跏坐
- type: concept
  question: 位置的核心要点是什么？
  answer: '标准操作: 肚脐下约 4 横指处，悬空或轻放大腿上；生物力学原理: 避免压迫腹腔，横膈膜活动不受限'
  source: 02-Mind-Psychology/meditation/zazen/Zazen_Practice_Guide.md
