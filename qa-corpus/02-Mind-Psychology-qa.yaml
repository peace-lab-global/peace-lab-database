  question: 三级预防的核心要点是什么？
  answer: '目标: 减少已有影响；策略: 综合治疗、康复；适用情况: 严重/慢性压力'
  source: 02-Mind-Psychology/psychology/stress-hpa/skills/Chronic_Stress_Intervention_Skill.md
  section: 干预时机选择
- type: concept
  question: 什么是干预选择决策树？
  answer: 'STEP 1: 评估严重程度

    │

    ├─ PSS < 14（低压力）？

    │   └─ 是 → 【初级预防】

    │       - 健康生活方式教育

    │       - 压力预防知识

    │       - 维护建议

    │

    ├─ PSS 14-19（中低）？

    │   └─ 是 → 【自我调节方案】

    │       - 基础放松技术

    │       - 睡眠优化

    │       - 运动建议

    │

    ├─ PSS 20-26（中高）？

    │   └─ 是 → 【主动干预】

    │       ├─ 压力源明确可解决？

    │       │   └─ 是 → 【问题解决+CBT技术】

    │       │           - 问题定义

    │       │           - 方案生成

    │       │           - 行动计划

    │       │           - 评估调整

    │       │   └─ 否 → 【综合干预】

    │       │           - CBT + 放松技术

    │       │           - 行为激活

    │       │           - 社会'
  source: 02-Mind-Psychology/psychology/stress-hpa/skills/Chronic_Stress_Intervention_Skill.md
  section: 干预选择决策树
