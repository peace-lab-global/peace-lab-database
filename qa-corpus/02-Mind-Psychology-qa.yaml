  section: 1.1 数据揭示的实践困境
- type: concept
  question: 无即时反馈的核心要点是什么？
  answer: '具体表现: 冥想后没有明显的"完成感"；行为科学解释: 缺乏正向强化（Positive Reinforcement）'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Habit_Formation_Guide.md
  section: 1.2 冥想习惯独有的挑战
- type: concept
  question: 收益延迟的核心要点是什么？
  answer: '具体表现: 需要数周甚至数月才感到变化；行为科学解释: 与未来自我的时间折扣（Temporal Discounting）'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Habit_Formation_Guide.md
  section: 1.2 冥想习惯独有的挑战
- type: concept
  question: 反直觉性的核心要点是什么？
  answer: '具体表现: 越想放松越紧张；越追求平静越焦躁；行为科学解释: ironic process theory（反弹效应）'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Habit_Formation_Guide.md
  section: 1.2 冥想习惯独有的挑战
- type: concept
  question: 健康焦虑的核心要点是什么？
  answer: '类型: 外在；可靠性: 低；使用策略: 转化为具体目标，但不依赖'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Habit_Formation_Guide.md
  section: 3.2 动机（Motivation）：如何有效利用
- type: concept
  question: 什么是目录？
  answer: '1. [内感受的核心概念](#1-内感受的核心概念)

    2. [内感受的神经科学基础](#2-内感受的神经科学基础)

    3. [内感受与冥想的关系](#3-内感受与冥想的关系)

    4. [内感受训练阶梯模型](#4-内感受训练阶梯模型)

    5. [分技术的内感受效应](#5-分技术的内感受效应)

    6. [临床整合：病症适配](#6-临床整合病症适配)

    7. [内感受障碍与冥想风险](#7-内感受障碍与冥想风险)

    8. [评估工具与测量方法](#8-评估工具与测量方法)

    9. [前沿研究与未来方向](#9-前沿研究与未来方向)

    10. [参考文献](#10-参考文献)'
