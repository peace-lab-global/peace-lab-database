  question: 生存姿态的核心要点是什么？
  answer: '英文术语: Survival Stances；词源/其他语言: —；定义: 四种防御性沟通姿态：讨好、指责、超理智、打岔；专业视角 (Professional Perspective): 这些姿态在童年习得，用于保护自我价值感免受威胁'
