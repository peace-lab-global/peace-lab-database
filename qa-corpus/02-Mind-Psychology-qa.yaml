  answer: '英文术语: Emotional Bank Account；简要定义: 关系中信任与善意的累积储备系统'
  source: 02-Mind-Psychology/relationships/emotional-bank-account/Emotional_Bank_Account_Overview.md
  section: Core Terminology
- type: concept
  question: 情感存款的核心要点是什么？
  answer: '英文术语: Emotional Deposit；简要定义: 增进关系信任与亲密度的积极行为'
  source: 02-Mind-Psychology/relationships/emotional-bank-account/Emotional_Bank_Account_Overview.md
  section: Core Terminology
- type: concept
  question: 情感取款的核心要点是什么？
  answer: '英文术语: Emotional Withdrawal；简要定义: 损害关系、消耗信任的消极行为'
  source: 02-Mind-Psychology/relationships/emotional-bank-account/Emotional_Bank_Account_Overview.md
  section: Core Terminology
- type: concept
  question: 什么是Identifying and Controlling Withdrawals？
  answer: '1. **言语攻击**: 批评、讽刺、贬低、羞辱

    2. **情感冷漠**: 忽视、冷战、拒绝沟通

    3. **违背承诺**: 食言、迟到、遗忘重要事项

    4. **不尊重界限**: 侵犯隐私、强迫、控制

    5. **背叛信任**: 泄露秘密、撒谎、不忠

    6. **自私自利**: 只关心自己需求,忽视对方

    7. **防御性反应**: 拒绝承认错误,推卸责任

    8. **被动攻击**: 拖延、敷衍、阴阳怪气'
  source: 02-Mind-Psychology/relationships/emotional-bank-account/Emotional_Bank_Account_Overview.md
  section: Identifying and Controlling Withdrawals
- type: concept
  question: 什么是The Magic Ratio of 5:1？
  answer: Gottman发现,稳定幸福的伴侣关系中,积极互动与消极互动的比率约为5:1。即每一次批评、防御、冷漠或蔑视,需要至少五次赞美、幽默、兴趣、支持等积极互动来平衡。
  source: 02-Mind-Psychology/relationships/emotional-bank-account/Emotional_Bank_Account_Overview.md
  section: The Magic Ratio of 5:1
- type: concept
  question: 什么是结语？
  answer: 情感银行账户是理解与管理人际关系的强大隐喻。它将抽象的"关系质量"转化为具体可感的"账户余额",将模糊的"关系改善"转化为明确的"存款行为"。
  source: 02-Mind-Psychology/relationships/emotional-bank-account/Emotional_Bank_Account_Overview.md
  section: 结语
- type: concept
  question: 跨种族吸引力的核心要点是什么？
  answer: '英文术语: Cross-Racial/Interracial Attraction；定义: 个体对不同种族/族裔群体成员产生的性吸引或浪漫兴趣；区分与备注: 属于正常的人类性吸引变异范围；心理学视角: 需从进化、文化、个体三个层面理解'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Cross_Racial_Attraction_Psychology.md
  section: 核心术语与概念界定 (Core Terminology & Conceptual Framework)
- type: concept
  question: 种族化性偏好的核心要点是什么？
  answer: '英文术语: Racialized Sexual Preference；定义: 基于种族特征的系统性择偶偏好；区分与备注: 与"个人偏好"的辩护需批判性审视——偏好可能被社会建构；心理学视角: 偏好不等于偏见，但可能包含偏见成分'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Cross_Racial_Attraction_Psychology.md
  section: 核心术语与概念界定 (Core Terminology & Conceptual Framework)
- type: concept
  question: 异域化的核心要点是什么？
  answer: '英文术语: Exoticization；定义: 将特定种族的人视为"异国情调"的性/浪漫对象；区分与备注: 将他者简化为"奇异/刺激"的来源；心理学视角: 是物化的一种形式——将人简化为种族符号'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Cross_Racial_Attraction_Psychology.md
  section: 核心术语与概念界定 (Core Terminology & Conceptual Framework)
- type: concept
  question: 基因多样性的核心要点是什么？
  answer: '理论解释: 选择基因差异大的伴侣增加后代免疫多样性；实证发现: MHC差异性与吸引力的部分相关；局限性: 不能解释为何特定种族被偏好'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Cross_Racial_Attraction_Psychology.md
  section: 进化心理学视角 (Evolutionary Psychology Perspective)
- type: concept
  question: 新奇偏好的核心要点是什么？
  answer: '理论解释: 对不熟悉刺激的好奇心是进化适应；实证发现: 新奇刺激激活多巴胺奖赏系统；局限性: 新奇效应可能随熟悉度增加而消退'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Cross_Racial_Attraction_Psychology.md
  section: 进化心理学视角 (Evolutionary Psychology Perspective)
- type: concept
  question: 性选择理论的核心要点是什么？
  answer: '理论解释: 不同环境下性选择偏好的差异化；实证发现: 跨文化择偶偏好存在共性与差异；局限性: 文化因素往往压倒"本能"因素'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Cross_Racial_Attraction_Psychology.md
  section: 进化心理学视角 (Evolutionary Psychology Perspective)
- type: concept
  question: 殖民主义遗产的核心要点是什么？
  answer: '影响机制: 种族等级→性权力等级→择偶等级；具体表现: 白人=吸引力标准的隐性假设；批判分析: 殖民主义不仅征服了领土，也征服了欲望'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Cross_Racial_Attraction_Psychology.md
  section: 社会文化视角 (Sociocultural Perspective)
- type: concept
  question: 媒体建构的核心要点是什么？
  answer: '影响机制: 持续建构特定种族的性吸引力叙事；具体表现: 黑人男性被建构为"原始性感"、亚洲女性被建构为"温顺顺从"；批判分析: 媒体形象变成自我实现的预言'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Cross_Racial_Attraction_Psychology.md
  section: 社会文化视角 (Sociocultural Perspective)
- type: concept
  question: 媚女的核心要点是什么？
  answer: '英文术语: Female-Pandering / Pick-Me Boy；定义: 个体（多为男性）过度迎合女性需求、价值观或审美标准，以获取女性认可、好感或性关系的行为模式；区分与备注: 非诊断性概念；与"绅士风度"或"尊重女性"有本质区别——后者基于真实价值观而非工具性动机；心理学视角:
    需区分真诚尊重与策略性讨好'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Female_Pandering_Psychology.md
  section: 核心术语与概念界定 (Core Terminology & Conceptual Framework)
- type: concept
  question: 白骑士综合征的核心要点是什么？
  answer: '英文术语: White Knight Syndrome；定义: 习惯性扮演"拯救者"角色以获取女性好感的行为模式；区分与备注: 表面高尚实则服务于自身心理需求；心理学视角: 与自恋性给予、隐性契约关系密切'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Female_Pandering_Psychology.md
  section: 核心术语与概念界定 (Core Terminology & Conceptual Framework)
- type: concept
  question: 隐性契约的核心要点是什么？
  answer: '英文术语: Covert Contract；定义: 未明示的交易期待——"我对你好，你就应该喜欢我/跟我在一起"；区分与备注: Robert Glover在《No More Mr. Nice Guy》中提出的核心概念；心理学视角:
    导致挫败、怨恨与关系困境'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Female_Pandering_Psychology.md
  section: 核心术语与概念界定 (Core Terminology & Conceptual Framework)
- type: concept
  question: 条件性男性价值感的核心要点是什么？
  answer: '核心过程: "我只有被女性需要/认可才有男性价值"；行为表现: 过度帮助、经济付出、情感劳动不对等；维持因素: 将男性价值等同于"被女性选择"；干预靶点: 建立内在价值感、男性认同重构'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Female_Pandering_Psychology.md
  section: 个体心理层面 (Individual Psychology)
- type: concept
  question: 隐性契约心理的核心要点是什么？
  answer: '核心过程: 以善行"购买"情感或性关系；行为表现: 无条件付出→期待回报→未获回报→怨恨；维持因素: "公平世界"信念的扭曲应用；干预靶点: 觉察隐性契约、学习直接表达需求'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Female_Pandering_Psychology.md
  section: 个体心理层面 (Individual Psychology)
- type: concept
  question: 回避冲突的核心要点是什么？
  answer: '核心过程: 通过顺从避免被拒绝的恐惧；行为表现: 从不表达不同意见、回避冲突、过度妥协；维持因素: 冲突=被抛弃的童年模型；干预靶点: 冲突管理技能训练'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Female_Pandering_Psychology.md
  section: 个体心理层面 (Individual Psychology)
- type: concept
  question: 母子关系模式的核心要点是什么？
  answer: '影响路径: 母亲情感不稳定→儿子学会讨好以稳定母亲；行为后果: 将女性=需要被安抚的人，关系=讨好任务；发展任务: 与母亲去纠葛、发展独立关系模式'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Female_Pandering_Psychology.md
  section: 发展心理学视角 (Developmental Perspective)
- type: concept
  question: 父亲缺席或弱势的核心要点是什么？
  answer: '影响路径: 缺乏健康男性角色模型；行为后果: 不知如何自信地做男人；发展任务: 男性认同发展、正面男性模型'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Female_Pandering_Psychology.md
  section: 发展心理学视角 (Developmental Perspective)
- type: concept
  question: 媚男的核心要点是什么？
  answer: '英文术语: Male-Pandering / Pick-Me Behavior；定义: 个体（多为女性）过度迎合男性审美、价值观或需求，以获取男性认可与关注的行为模式；区分与备注: 非诊断性标签，而是描述一种社会行为模式；程度从轻微到病理性不等；心理学视角:
    需从依恋、自尊、社会化多维度理解，避免简单道德评判；关键研究: Sanchez & Crocker (2005) 条件性自尊研究'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Male_Pandering_Psychology.md
  section: 核心术语与概念界定 (Core Terminology & Conceptual Framework)
- type: concept
  question: Pick-Me Girl的核心要点是什么？
  answer: '英文术语: Pick-Me Girl；定义: 源自网络文化的术语，指通过贬低同性、标榜自己"不像其他女孩"来获取异性好感的女性；区分与备注: 带有贬义，学术分析中需去污名化处理；心理学视角: 反映内化性别歧视与同性竞争的心理机制；关键研究:
    Bearman et al. (2009) 内化性别歧视量表'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Male_Pandering_Psychology.md
  section: 核心术语与概念界定 (Core Terminology & Conceptual Framework)
- type: concept
  question: 讨好型人格的核心要点是什么？
  answer: '英文术语: People-Pleasing Personality；定义: 习惯性优先满足他人需求、压抑自身感受以维护关系的人格特征；区分与备注: 媚男是讨好型人格在性别关系中的特定表现形式；心理学视角: 与焦虑型依恋、低自尊、童年条件性关爱高度相关；关键研究:
    Bartholomew & Horowitz (1991) 四类型依恋模型'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Male_Pandering_Psychology.md
  section: 核心术语与概念界定 (Core Terminology & Conceptual Framework)
- type: concept
  question: 依恋焦虑的核心要点是什么？
  answer: '核心过程: 对关系丧失的过度恐惧→过度讨好以维系连接；行为表现: 过度关注伴侣需求、压抑自身不满、回避冲突；维持因素: 早期依恋创伤的内在工作模型未修正；干预靶点: 安全依恋体验修复、内在工作模型重构'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Male_Pandering_Psychology.md
  section: 个体心理层面 (Individual Psychology)
- type: concept
  question: 条件性自尊的核心要点是什么？
  answer: '核心过程: 自我价值完全建立在外部认可上；行为表现: 持续寻求异性验证、外貌焦虑、社交媒体展示；维持因素: 自尊来源单一化、缺乏内在价值感；干预靶点: 建立多元自尊来源、发展内在价值感'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Male_Pandering_Psychology.md
  section: 个体心理层面 (Individual Psychology)
- type: concept
  question: 认知图式的核心要点是什么？
  answer: '核心过程: "我只有被男性喜欢才有价值"的核心信念；行为表现: 将自身定位为"被选择的客体"而非主体；维持因素: 童年期获得的条件性关爱强化；干预靶点: 认知重构、核心信念松动'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Male_Pandering_Psychology.md
  section: 个体心理层面 (Individual Psychology)
- type: concept
  question: 婴幼儿期(0-3岁)的核心要点是什么？
  answer: '关键经历: 不安全依恋、母亲情感不可得；对媚男行为的影响: 形成"我需要讨好才能获得爱"的内在工作模型；发展任务: 安全依恋修复'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Male_Pandering_Psychology.md
  section: 发展心理学视角 (Developmental Perspective)
- type: concept
  question: 儿童期(4-12岁)的核心要点是什么？
  answer: '关键经历: 父亲关注缺失或条件性关爱；对媚男行为的影响: 将"获得男性认可"等同于"获得爱与安全"；发展任务: 非条件性自我价值的建立'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Male_Pandering_Psychology.md
  section: 发展心理学视角 (Developmental Perspective)
- type: concept
  question: 厌男的核心要点是什么？
  answer: '英文术语: Misandry；定义: 对男性群体的偏见、不信任或敌意态度，范围从温和的不满到极端的仇恨；区分与备注: 与"厌女(Misogyny)"对称的概念，但社会权力背景与影响机制不同；心理学视角: 需区分合理愤怒与泛化偏见，避免将正当诉求病理化'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Misandry_Psychology.md
  section: 核心术语与概念界定 (Core Terminology & Conceptual Framework)
- type: concept
  question: 性别创伤的核心要点是什么？
  answer: '英文术语: Gender-Based Trauma；定义: 因性别身份或性别关系而经历的创伤事件（如性暴力、家暴、性骚扰）；区分与备注: 厌男情绪可能是性别创伤的心理后果而非原因；心理学视角: 创伤知情的视角比道德评判更有助于理解与疗愈'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Misandry_Psychology.md
  section: 核心术语与概念界定 (Core Terminology & Conceptual Framework)
- type: concept
  question: 泛化愤怒的核心要点是什么？
  answer: '英文术语: Generalized Anger；定义: 将对特定男性个体的负面体验扩展为对整个男性群体的愤怒；区分与备注: 心理防御机制——泛化降低了个案评估的认知成本；心理学视角: 需帮助来访者区分合理愤怒与泛化偏见'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Misandry_Psychology.md
  section: 核心术语与概念界定 (Core Terminology & Conceptual Framework)
- type: concept
  question: 直接创伤的核心要点是什么？
  answer: '典型经历: 遭受男性施加的性暴力、家暴、性骚扰；心理机制: 创伤后认知重构——"男性=危险"；厌男情绪表现: 对所有男性的恐惧与愤怒；临床关注点: 优先处理创伤，厌男是症状而非核心问题'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Misandry_Psychology.md
  section: 个体经历层面 (Individual Experience)
- type: concept
  question: 关系创伤的核心要点是什么？
  answer: '典型经历: 父亲缺席/虐待、被男性伴侣背叛/操控；心理机制: 内在工作模型——"男性不值得信赖"；厌男情绪表现: 回避亲密关系、测试性行为；临床关注点: 依恋修复、关系信任重建'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Misandry_Psychology.md
  section: 个体经历层面 (Individual Experience)
- type: concept
  question: 累积微创伤的核心要点是什么？
  answer: '典型经历: 日常性别歧视、职场性别偏见、街头骚扰；心理机制: 慢性应激反应——疲惫与愤怒累积；厌男情绪表现: 对"男性特权"的持续敏感与怨恨；临床关注点: 慢性压力管理、情绪调节'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Misandry_Psychology.md
  section: 个体经历层面 (Individual Experience)
- type: concept
  question: 制度性性别不平等的核心要点是什么？
  answer: '影响机制: 薪酬差距、晋升天花板、法律保护不足；情绪反应: 正当的结构性愤怒；分析视角: 社会正义层面的合理回应'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Misandry_Psychology.md
  section: 社会结构层面 (Structural Factors)
- type: concept
  question: 性别暴力流行率的核心要点是什么？
  answer: '影响机制: 高比例的性别暴力加深群体恐惧；情绪反应: 群体性防御反应；分析视角: 公共健康与安全议题'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Misandry_Psychology.md
  section: 社会结构层面 (Structural Factors)
- type: concept
  question: 厌女的核心要点是什么？
  answer: '英文术语: Misogyny；定义: 对女性或女性气质的系统性偏见、贬低、物化或敌意；区分与备注: 从个体态度到制度性歧视的连续谱；可能存在于任何性别个体中；心理学视角: 包含显性厌女（公开敌意）与隐性厌女（无意识偏见）'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Misogyny_Psychology.md
  section: 核心术语与概念界定 (Core Terminology & Conceptual Framework)
- type: concept
  question: 内化厌女的核心要点是什么？
  answer: '英文术语: Internalized Misogyny；定义: 女性无意识采纳社会对女性的贬低标准来评判自己和其他女性；区分与备注: 女性对女性的苛刻评判往往源于内化厌女；心理学视角: 是社会结构性问题的心理内化'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Misogyny_Psychology.md
  section: 核心术语与概念界定 (Core Terminology & Conceptual Framework)
- type: concept
  question: 善意性别歧视的核心要点是什么？
  answer: '英文术语: Benevolent Sexism；定义: 以"保护""赞美"为外衣的性别偏见——"女人需要被保护""女人更纯洁"；区分与备注: 表面正面实则限制女性自主权；心理学视角: Peter Glick与Susan Fiske的矛盾性别偏见理论'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Misogyny_Psychology.md
  section: 核心术语与概念界定 (Core Terminology & Conceptual Framework)
- type: concept
  question: 宗教传统的核心要点是什么？
  answer: '历史表现: 多种宗教中女性被定义为"从属""诱惑者"；现代延续: 道德纯洁标准的双重标准；心理内化机制: 内化为"女性本质上不如男性"的信念'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Misogyny_Psychology.md
  section: 历史文化维度 (Historical & Cultural Dimensions)
- type: concept
  question: 法律制度的核心要点是什么？
  answer: '历史表现: 历史上女性长期缺乏法律人格；现代延续: 部分地区仍存在法律不平等；心理内化机制: "女性权利是特权而非基本权利"的认知'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Misogyny_Psychology.md
  section: 历史文化维度 (Historical & Cultural Dimensions)
- type: concept
  question: 经济结构的核心要点是什么？
  answer: '历史表现: 女性经济依附的历史传统；现代延续: 薪酬差距、晋升障碍；心理内化机制: "女性的经济价值不如男性"的无意识信念'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Misogyny_Psychology.md
  section: 历史文化维度 (Historical & Cultural Dimensions)
- type: concept
  question: 社会学习的核心要点是什么？
  answer: '原理: 通过观察与模仿习得态度；在厌女中的表现: 从家庭、同伴、媒体中习得厌女态度；干预方向: 正面角色模型、媒体素养教育'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Misogyny_Psychology.md
  section: 社会心理机制 (Social Psychological Mechanisms)
- type: concept
  question: 社会身份理论的核心要点是什么？
  answer: '原理: 通过贬低外群体提升自群体价值；在厌女中的表现: 贬低女性以维护男性群体优越感；干预方向: 多元社会身份发展'
  source: 02-Mind-Psychology/relationships/gender-dynamics/Gender_Misogyny_Psychology.md
  section: 社会心理机制 (Social Psychological Mechanisms)
- type: concept
  question: 个体心理的核心要点是什么？
  answer: '涵盖内容: 依恋模式、自尊机制、认知图式；理论基础: 依恋理论、自体心理学、认知心理学'
  source: 02-Mind-Psychology/relationships/gender-dynamics/INDEX.md
  section: 核心研究视角
- type: concept
  question: 社会文化的核心要点是什么？
  answer: '涵盖内容: 性别社会化、媒体建构、权力结构；理论基础: 社会学习理论、女性主义心理学、批判理论'
  source: 02-Mind-Psychology/relationships/gender-dynamics/INDEX.md
  section: 核心研究视角
- type: concept
  question: 进化视角的核心要点是什么？
  answer: '涵盖内容: 择偶策略、性别差异、适应机制；理论基础: 进化心理学、性选择理论'
  source: 02-Mind-Psychology/relationships/gender-dynamics/INDEX.md
  section: 核心研究视角
