  source: 02-Mind-Psychology/therapy/ipt-therapy/IPT_Interpersonal_Psychotherapy_Overview.md
  section: IPT核心理论基础表 (Core Theoretical Foundations)
- type: concept
  question: 依恋理论的核心要点是什么？
  answer: '核心概念: 早期依恋经历对成人关系的影响；理论来源: 依恋理论；作用机制: 理解当前关系模式的形成基础；临床应用: 识别和改变不健康的依恋模式；实证支持: 中等强度证据；专业洞察: 依恋模式影响人际功能'
  source: 02-Mind-Psychology/therapy/ipt-therapy/IPT_Interpersonal_Psychotherapy_Overview.md
  section: IPT核心理论基础表 (Core Theoretical Foundations)
- type: concept
  question: 社会支持理论的核心要点是什么？
  answer: '核心概念: 社会支持对心理健康的作用；理论来源: 社会支持理论；作用机制: 增强社会支持网络改善心理功能；临床应用: 扩展和加强支持系统；实证支持: 强烈证据支持；专业洞察: 社会支持是重要的保护因素'
  source: 02-Mind-Psychology/therapy/ipt-therapy/IPT_Interpersonal_Psychotherapy_Overview.md
  section: IPT核心理论基础表 (Core Theoretical Foundations)
- type: concept
  question: 悲伤反应的核心要点是什么？
  answer: '核心问题: 丧失和哀伤处理；临床表现: 亲人去世、关系结束后的抑郁；治疗策略: 哀伤工作、情感表达；疗效机制: 促进哀伤过程完成；专业洞察: 哀伤是正常但需要处理的过程'
  source: 02-Mind-Psychology/therapy/ipt-therapy/IPT_Interpersonal_Psychotherapy_Overview.md
  section: IPT核心治疗焦点表 (Core Treatment Foci)
- type: concept
  question: 丧失识别的核心要点是什么？
  answer: '核心问题: 识别各种类型的丧失；临床表现: 丧亲、失恋、失业等；治疗策略: 明确治疗焦点；疗效机制: 丧失形式多样需要细致识别'
  source: 02-Mind-Psychology/therapy/ipt-therapy/IPT_Interpersonal_Psychotherapy_Overview.md
