  question: 第一：专一瑜伽的核心要点是什么？
  answer: '藏文原名: rTse-gcig；梵文对应: Ekagrata；英文译名: One-pointedness；核心特征: 觉知能稳固于心性；认知成熟度: 高执行控制；障碍与对治: 执着于"好"状态；现代评估要点: 能否稳定15分钟以上；ANT执行控制网络效率；9LM:
    L4'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Assessment_Stages.md
  section: 表2.2 大手印四瑜伽 (Mahamudra Four Yogas)
- type: concept
  question: 职场沟通的核心要点是什么？
  answer: '整合策略 (Strategy): 识别出言语与觉知的互即。；认知转换点: 不再被言语背后的“攻击性”钩住。；心理平衡益处: 极大地降低社会评价焦虑。；专业视角 (Expert Perspective): 并非变得麻木，而是反应更加精准且无残留。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Daily_Integration.md
  section: 'Post-Meditation State: Maintaining the View (后得位：行住坐卧的见地维持)'
- type: concept
  question: 行走/运动的核心要点是什么？
  answer: '整合策略 (Strategy): 体验万物皆在觉知中移动。；认知转换点: 打破“我在移动”的错觉，转为“世界在流转”。；心理平衡益处: 增强动作的优雅感与本体觉知。；专业视角 (Expert Perspective): 将运动视为觉知的动态舞蹈。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Daily_Integration.md
  section: 'Post-Meditation State: Maintaining the View (后得位：行住坐卧的见地维持)'
- type: concept
  question: 冲突处理的核心要点是什么？
  answer: '整合策略 (Strategy): 识别出情绪是觉知的“自显现”。；认知转换点: 不再站在情绪的对立面，而是容纳它。；心理平衡益处: 瞬间中止情绪的极化升级。；专业视角 (Expert Perspective): 慈悲源于对“对方也是受困于相同机制”的认知。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Daily_Integration.md
  section: 'Post-Meditation State: Maintaining the View (后得位：行住坐卧的见地维持)'
- type: concept
  question: 慈悲 (Karuna)的核心要点是什么？
  answer: '传统规则 (Rules): 必须爱他人。；不二论视角 (Non-dual View): 自他无二，爱他人即是爱自性。；动机来源: **一体感** (Oneness)。；专家解析: 慈悲不是一种责任，而是一种由于没有界限而产生的自然流露。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Daily_Integration.md
  section: Ethics of Non-Duality (不二论伦理：超越规则的自觉)
- type: concept
  question: 诚实 (Satya)的核心要点是什么？
  answer: '传统规则 (Rules): 不可说谎。；不二论视角 (Non-dual View): 谎言建立了虚假的分割，损害透明性。；动机来源: **实相的维护**。；专家解析: 诚实是为了维持觉知的“不被遮蔽性”。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Daily_Integration.md
  section: Ethics of Non-Duality (不二论伦理：超越规则的自觉)
- type: concept
  question: 贪欲控制的核心要点是什么？
  answer: '传统规则 (Rules): 戒除贪念。；不二论视角 (Non-dual View): 认识到对象并不能真正增加觉知的圆满感。；动机来源: **本自具足**。；专家解析: 对物的拥有不再能产生“补全自我”的幻想。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Daily_Integration.md
  section: Ethics of Non-Duality (不二论伦理：超越规则的自觉)
- type: concept
  question: 反应间隔延长的核心要点是什么？
  answer: '描述 (Description): 刺激与反应之间有了自然的空隙。；误区 (Pitfall): 误认为反应变慢或迟钝。；本质提升点: 获得了选择如何反应的绝对自由。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Daily_Integration.md
  section: Signs of Mature Integration (转化标志：日常生活的量表)
- type: concept
  question: 幽默感提升的核心要点是什么？
  answer: '描述 (Description): 能够从容面对自我的尴尬与失败。；误区 (Pitfall): 表现为一种冷漠的虚无主义。；本质提升点: 识别出“自我剧场”的荒诞性与如幻性。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Daily_Integration.md
  section: Signs of Mature Integration (转化标志：日常生活的量表)
- type: concept
  question: 术语 (Original)的核心要点是什么？
  answer: '显现/内容 (Appearances/Content): **Dṛśya** / 所见 (The Seen)；觉知/本体 (Awareness/Essence): **Dṛg** / 见者 (The Seer)；哲学/本体论意义:
    主客体分立的基础。；专业视角 (Expert Perspective): 认识路径的第一步是识别出“觉知”不等于“所见”。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Foundations.md
  section: 'Awareness vs. Appearance: The Primary Distinction (觉知与显现：核心辨析表)'
- type: concept
  question: 特性 (Property)的核心要点是什么？
  answer: '显现/内容 (Appearances/Content): 变化、瞬时、有生灭、有边界。；觉知/本体 (Awareness/Essence): 恒常、共在、无生灭、无边际。；哲学/本体论意义: 存在 vs. 生成。；专业视角
    (Expert Perspective): 觉知如虚空，显现如云烟。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Foundations.md
  section: 'Awareness vs. Appearance: The Primary Distinction (觉知与显现：核心辨析表)'
- type: concept
  question: 存在形态的核心要点是什么？
  answer: '显现/内容 (Appearances/Content): 受因缘约束 (Conditioned)。；觉知/本体 (Awareness/Essence): 离于因缘 (Unconditioned)。；哲学/本体论意义: 只有觉知是绝对的真实
    (Paramarthika)。；专业视角 (Expert Perspective): 所见之物的真实性是借由觉知的照明而获得的。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Foundations.md
  section: 'Awareness vs. Appearance: The Primary Distinction (觉知与显现：核心辨析表)'
- type: concept
  question: 二元阶段的核心要点是什么？
  answer: '术语 (Term): **Duality**；状态描述 (State): 我在这里观察一个在那里的对象。；认知转变: 分离感产生。；专业解析 (Expert Analysis): 这是普通意识状态，也是大多数渐修冥想的起点。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Foundations.md
  section: The Non-Dual Mechanism (不二机制：主客融合矩阵)
- type: concept
  question: 间隙体验的核心要点是什么？
  answer: '术语 (Term): **The Gap**；状态描述 (State): 念头与念头之间的寂静瞬间。；认知转变: 识别出背景。；专业解析 (Expert Analysis): 觉知开始“看到”自己，而不只是看到对象。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Foundations.md
  section: The Non-Dual Mechanism (不二机制：主客融合矩阵)
- type: concept
  question: 塌缩/互即的核心要点是什么？
  answer: '术语 (Term): **Non-Duality**；状态描述 (State): 觉知与对象之间没有距离，两者互即。；认知转变: 主客体界限彻底消失。；专业解析 (Expert Analysis): 所谓“能所双亡”，即觉知本身即是显现。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Foundations.md
  section: The Non-Dual Mechanism (不二机制：主客融合矩阵)
- type: concept
  question: 大圆满的核心要点是什么？
  answer: '核心概念 (Term): **本觉**；梵文/藏文 (Original): **Rigpa**；定义解析: 觉性本身，离于修饰与习气。；对应心理状态/神经机制: 高亮度的元认知觉察，无中介感。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Foundations.md
  section: Core Concept Mapping (核心概念映射：跨传统对照表)
- type: concept
  question: 大手印的核心要点是什么？
  answer: '核心概念 (Term): **俱生智**；梵文/藏文 (Original): **Sahaja-jnana**；定义解析: 与生俱来的、非人造的智慧。；对应心理状态/神经机制: 自然放松下的全息觉察。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Foundations.md
  section: Core Concept Mapping (核心概念映射：跨传统对照表)
- type: concept
  question: 什么是概述 (Overview)？
  answer: 直接认知 (Direct Recognition / Pratyabhijñā / प्रत्यभिज्ञा) 作为灵性修持的核心路径，其历史源远流长，横跨印度、西藏、中国、日本等多元文化传统。本文档系统梳理直接认知教法的历史发展、核心传承人物、经典文献及跨文化演变轨迹。
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_History_Lineage.md
  section: 概述 (Overview)
- type: concept
  question: 传承的核心要点是什么？
  answer: '英文术语: Lineage；梵语 (Sanskrit): **Paramparā** (परम्परा)；藏语 (Tibetan): **brGyud-pa** (བརྒྱུད་པ)；其他语言: 日：**法系** (ほうけい)；定义与背景:
    教法从师到徒的连续传递'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_History_Lineage.md
  section: 表1.1 直接认知历史核心术语词源表
- type: concept
  question: 祖师的核心要点是什么？
  answer: '英文术语: Patriarch/Master；梵语 (Sanskrit): **Ācārya** (आचार्य) / **Guru** (गुरु)；藏语 (Tibetan): **bLa-ma** (བླ་མ)；其他语言:
    日：**祖師** (そし)；定义与背景: 传承中的核心导师'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_History_Lineage.md
  section: 表1.1 直接认知历史核心术语词源表
- type: concept
  question: 口传的核心要点是什么？
  answer: '英文术语: Oral Transmission；梵语 (Sanskrit): **Vaktra-āmnāya** (वक्त्राम्नाय)；藏语 (Tibetan): **bKa''-ma** (བཀའ་མ)；其他语言:
    —；定义与背景: 口头传授的教法'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_History_Lineage.md
  section: 表1.1 直接认知历史核心术语词源表
- type: concept
  question: 吠陀时期的核心要点是什么？
  answer: '年代 (约): 1500-500 BCE；主要发展: 梵我合一思想萌芽；代表人物/文献: 《奥义书》(Upaniṣads)；核心贡献: "Tat tvam asi"(汝即彼)；影响范围: 印度全境'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_History_Lineage.md
  section: 表2.1 印度直接认知传统发展时间线
- type: concept
  question: 早期不二论的核心要点是什么？
  answer: '年代 (约): 500 BCE-500 CE；主要发展: 不二思想系统化；代表人物/文献: 《梵经》(Brahma Sūtra)；核心贡献: 建立不二论框架；影响范围: 印度哲学'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_History_Lineage.md
  section: 表2.1 印度直接认知传统发展时间线
- type: concept
  question: 克什米尔希瓦派的核心要点是什么？
  answer: '年代 (约): 850-1100 CE；主要发展: 识别论(Pratyabhijñā)确立；代表人物/文献: Somānanda、Utpaladeva、Abhinavagupta；核心贡献: 直接认知哲学体系化；影响范围:
    克什米尔、印度北部'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_History_Lineage.md
  section: 表2.1 印度直接认知传统发展时间线
- type: concept
  question: 不二论 (Advaita Vedanta)的核心要点是什么？
  answer: '创始人/核心人物: **Śaṅkarācārya** (商羯罗)；年代: 788-820 CE；核心教法: 梵我不二、无明遮蔽、智慧解脱；关键著作: 《梵经注》《奥义书注》；传承特色: 智力分析与直接体验结合'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_History_Lineage.md
  section: 表2.2 印度直接认知核心传承脉络
- type: concept
  question: 什么是概述 (Overview)？
  answer: 直接认知 (Direct Recognition / Pratyabhijñā / प्रत्यभिज्ञा) 是指瞬间、非渐进地辨识出纯粹觉知 (Pure Awareness / Śuddha-cit / शुद्ध-चित्)
    本身的经验状态。本文档从神经科学视角系统解析直接认知的神经机制、脑区变化、神经递质效应及与渐修冥想的神经差异。
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Neuroscience.md
  section: 概述 (Overview)
- type: concept
  question: 默认模式网络的核心要点是什么？
  answer: '英文术语: Default Mode Network；缩写: DMN；梵语/巴利语/藏语: 无；定义与功能: 自我参照、心智漫游、自传式记忆的神经网络；与直接认知的关联: 直接认知时DMN活动显著降低，自我感解构'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Neuroscience.md
  section: 表1.1 直接认知相关神经概念词源表
- type: concept
  question: 任务正网络的核心要点是什么？
  answer: '英文术语: Task-Positive Network；缩写: TPN；梵语/巴利语/藏语: 无；定义与功能: 外部注意、目标导向行为的神经网络；与直接认知的关联: 渐修时激活，直接认知时趋向静默'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Neuroscience.md
  section: 表1.1 直接认知相关神经概念词源表
- type: concept
  question: 突显网络的核心要点是什么？
  answer: '英文术语: Salience Network；缩写: SN；梵语/巴利语/藏语: 无；定义与功能: 检测突显刺激、切换DMN与TPN；与直接认知的关联: 直接认知时协调内外觉知的整合'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Neuroscience.md
  section: 表1.1 直接认知相关神经概念词源表
- type: concept
  question: DMN抑制的核心要点是什么？
  answer: '英文术语: DMN Suppression；现象学表现: 自我感消融，叙事停止；神经基底: mPFC、PCC活动降低；与渐修差异: 渐修通过努力抑制，直接认知自然消融；研究证据: Brewer et al. (2011)：长期禅修者PCC活动降低'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Neuroscience.md
  section: 表2.1 直接认知神经机制核心矩阵
- type: concept
  question: 反相关解耦的核心要点是什么？
  answer: '英文术语: Anti-correlation Decoupling；现象学表现: 内外界限模糊，主客合一；神经基底: DMN与TPN反相关减弱；与渐修差异: 渐修保持反相关，直接认知趋于统一；研究证据: Josipovic
    et al. (2012)：非二元冥想中反相关消失'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Neuroscience.md
  section: 表2.1 直接认知神经机制核心矩阵
- type: concept
  question: 全域γ同步的核心要点是什么？
  answer: '英文术语: Global Gamma Synchrony；现象学表现: 清晰度极高，全息觉知；神经基底: 广泛皮层γ波(25-100Hz)同步；与渐修差异: 渐修局部同步，直接认知全域整合；研究证据: Lutz et al.
    (2004)：长期冥想者γ波增强'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Neuroscience.md
  section: 表2.1 直接认知神经机制核心矩阵
- type: concept
  question: DMN活动的核心要点是什么？
  answer: '传统冥想(渐修): 通过努力逐渐降低；直接认知(顿悟): 瞬间大幅降低或"归零"；神经动力学解释: 自我参照回路断开；现象学对应: "我"作为实体感消失'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Neuroscience.md
  section: 表2.2 直接认知中的脑网络动态
- type: concept
  question: 瞬间中断的核心要点是什么？
  answer: '术语 (Term): **Sudden Stop**；具体意图 (Intention): 打断连续的思维流。；心理/现象学效应: 产生一种“逻辑真空”，背景觉知在此刻显色。；专业视角 (Expert Perspective):
    必须是突发性的，不给大脑合理化的时间。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Pointing_Out.md
  section: 'The Nature of "Pointing-out": Upaya (方便：直指教法的本质详表)'
- type: concept
  question: 直接指向的核心要点是什么？
  answer: '术语 (Term): **Direct Pointing**；具体意图 (Intention): 将注意力从对内容的关注移向背景。；心理/现象学效应: 识别出“正在观者”本身。；专业视角 (Expert Perspective):
    不寻找“觉知是什么”，而是识别出“我在觉知”。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Pointing_Out.md
  section: 'The Nature of "Pointing-out": Upaya (方便：直指教法的本质详表)'
- type: concept
  question: 无所求态的核心要点是什么？
  answer: '术语 (Term): **Non-seeking**；具体意图 (Intention): 终止一切试图达到某种状态的努力。；心理/现象学效应: 人造的张力消失，自然本性显现。；专业视角 (Expert Perspective):
    所谓“踏破铁鞋无觅处”，放下即是。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Pointing_Out.md
  section: 'The Nature of "Pointing-out": Upaya (方便：直指教法的本质详表)'
- type: concept
  question: 寻找观察者的核心要点是什么？
  answer: '核心指令 (Key Instruction): “去看看那个正在不悦的人在哪里？”；状态特征 (Phenomenology): 发现“我”作为一个实体的虚幻。；适用场景: 强烈的负面情绪中。；专家建议: 寻找者即是被寻找者，此时寻找消失，觉知显现。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Pointing_Out.md
  section: 'Recognition Techniques: The "Short Moments" (识别技术：短瞬间的练习表格)'
- type: concept
  question: 间隙停留的核心要点是什么？
  answer: '核心指令 (Key Instruction): “在两个念头之间，那里有什么？”；状态特征 (Phenomenology): 体验纯粹的寂静背景。；适用场景: 冥想的中期稳定。；专家建议: 重点不在于延长间隙，而在于识别出间隙的性质。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Pointing_Out.md
  section: 'Recognition Techniques: The "Short Moments" (识别技术：短瞬间的练习表格)'
- type: concept
  question: 目光定位的核心要点是什么？
  answer: '核心指令 (Key Instruction): **不聚焦观**。眼神虚灵，涵盖180度视野。；状态特征 (Phenomenology): 视觉的主体化消失，世界如画卷展开。；适用场景: 动态禅修、行走。；专家建议: 视觉是建立“分离感”的主要感官，不聚焦可瓦解之。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Pointing_Out.md
  section: 'Recognition Techniques: The "Short Moments" (识别技术：短瞬间的练习表格)'
- type: concept
  question: 清晰度的核心要点是什么？
  answer: '描述 (Description): 极其敏锐，没有昏沉。；误区 (Pitfall): 误认为是一种空白的无意识状态。；本质洞察 (Insight): 意识在没有内容时依然是高亮的。；专业视角: 所谓“灵明”。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Pointing_Out.md
  section: 'The "Gap" Experience: Deep Analysis (间隙体验深度剖析表)'
- type: concept
  question: 无边际感的核心要点是什么？
  answer: '描述 (Description): 找不到觉察力的边缘在哪里。；误区 (Pitfall): 试图在空间中去“测量”它。；本质洞察 (Insight): 觉知不在空间内，空间存在于觉知中。；专业视角: 所谓“量周沙界”。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Pointing_Out.md
  section: 'The "Gap" Experience: Deep Analysis (间隙体验深度剖析表)'
- type: concept
  question: 大圆满 (Dzogchen)的核心要点是什么？
  answer: '核心概念 (Key Term): **Rigpa** (本觉)；操作技术 (Core Technique): **不修之修** (Non-meditation)。；认识指向 (Pointing-out): **直指心性**
    (Pointing-out the nature of mind)。；最终状态描述: **虹光身** (Rainbow Body) 或 纯净觉知。；专业视角 (Expert Perspective): 强调觉知如虚空，不需要任何造作。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Traditions.md
  section: Lineage Technical Matrix (主要不二论流派技术对比矩阵)
- type: concept
  question: 大手印 (Mahamudra)的核心要点是什么？
  answer: '核心概念 (Key Term): **Sahaja** (俱生)；操作技术 (Core Technique): **四瑜伽** (Four Yogas) 为阶梯。；认识指向 (Pointing-out): **无间休息**
    (Unceasing Rest)。；最终状态描述: **法身** (Dharmakaya) 的现前。；专业视角 (Expert Perspective): 侧重于将念头视为水上的波纹，不离不弃。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Traditions.md
  section: Lineage Technical Matrix (主要不二论流派技术对比矩阵)
- type: concept
  question: 不二论 (Advaita)的核心要点是什么？
  answer: '核心概念 (Key Term): **Self** (Atman)；操作技术 (Core Technique): **自我探究** (Self-Inquiry)。；认识指向 (Pointing-out): **我是谁?**
    (Who am I?)。；最终状态描述: **萨齐阿难陀** (Sat-Chit-Ananda)。；专业视角 (Expert Perspective): 极其深刻的智力摧毁过程，直接切断个体身份。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Traditions.md
  section: Lineage Technical Matrix (主要不二论流派技术对比矩阵)
- type: concept
  question: 第一要的核心要点是什么？
  answer: '藏文 (Original): **Tse-Chig**；中文解析: **直指心性**。；现代现象学描述: 瞬间识别出“当下正在观者”的清净本质。；专家解析: 打破寻找的假象，识别出寻找者背后的觉知。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Traditions.md
  section: 'Dzogchen: The Three Statements of Garab Dorje (大圆满：椎击三问深度表)'
- type: concept
  question: 第二要的核心要点是什么？
  answer: '藏文 (Original): **Tse-Chig**；中文解析: **确立无疑**。；现代现象学描述: 对这一识别产生的坚定信心。；专家解析: 这种确认不是智力的，而是本质性的“回家”感。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Traditions.md
  section: 'Dzogchen: The Three Statements of Garab Dorje (大圆满：椎击三问深度表)'
- type: concept
  question: 第三要的核心要点是什么？
  answer: '藏文 (Original): **Tse-Chig**；中文解析: **解脱自如**。；现代现象学描述: 在一切念头起伏中维持这一状态。；专家解析: 所谓“念起即觉，觉之即无”，不留痕迹。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Traditions.md
  section: 'Dzogchen: The Three Statements of Garab Dorje (大圆满：椎击三问深度表)'
- type: concept
  question: 身体层的核心要点是什么？
  answer: '否定逻辑 (Neti-Neti): 我观察身体。；剥离物 (The Object): 肉体、感官、疼痛。；最终剩余 (The Remainder): 观察者。；心理获益: 减轻对衰老与病痛的恐惧。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Traditions.md
  section: 'Advaita Vedanta: The Art of Neti-Neti (不二论：否定之道的逻辑)'
- type: concept
  question: 生理层的核心要点是什么？
  answer: '否定逻辑 (Neti-Neti): 我觉察呼吸。；剥离物 (The Object): 能量、脉搏、生命力。；最终剩余 (The Remainder): 我。；心理获益: 摆脱对生物本能的焦虑。'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Traditions.md
  section: 'Advaita Vedanta: The Art of Neti-Neti (不二论：否定之道的逻辑)'
- type: concept
  question: 什么是概述 (Overview)？
  answer: 本文档系统对比直接认知冥想 (Direct Recognition Meditation / Pratyabhijñā / प्रत्यभिज्ञा) 与正念冥想 (Mindfulness Meditation / Sati
    / सति)。在冥想传统的分类中，正念冥想属于间接认知/渐修路径 (Kramic Path) 的典型代表，而直接认知冥想属于顿悟路径 (Direct Path)。两者代表了觉醒修行的两种根本策略：直接认知强调瞬间辨识纯粹觉知本身，正念强调渐进培养当下非评判性觉察。本文从哲学基础、技术操作、神经科学、心理学机制、临床应用等维度展开全面对比，并提出整合运用策略。
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_vs_Mindfulness.md
  section: 概述 (Overview)
- type: concept
  question: 定义的核心要点是什么？
  answer: '直接认知冥想: 瞬间、非渐进地辨识出纯粹觉知 (Pure Awareness / Śuddha-cit) 本身；正念冥想: 以特定方式觉察：有目的地、在当下、不加评判 (Kabat-Zinn, 1994)；核心差异: 辨识觉知本体
    vs 培养觉察态度'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_vs_Mindfulness.md
  section: 表1.1 核心定义对照表
- type: concept
  question: 梵语/巴利语的核心要点是什么？
  answer: '直接认知冥想: Pratyabhijñā (प्रत्यभिज्ञा) — 再认知、辨识；正念冥想: Sati (सति) — 忆念、觉察；核心差异: 辨识已有 vs 持续觉察'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_vs_Mindfulness.md
  section: 表1.1 核心定义对照表
- type: concept
  question: 传统归属的核心要点是什么？
  answer: '直接认知冥想: 大圆满 (Dzogchen)、大手印 (Mahamudra)、不二论 (Advaita)、禅宗 (Zen)、希瓦哲学 (Trika)；正念冥想: 南传四念处 (Satipaṭṭhāna)、MBSR、MBCT、DBT正念模块、ACT；核心差异:
    不二论传统 vs 佛教渐修传统+现代世俗化'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_vs_Mindfulness.md
  section: 表1.1 核心定义对照表
- type: concept
  question: 传统定义的核心要点是什么？
  answer: '直接认知操作定义: "识别出觉知本身，觉知照见觉知" (Rigpa recognizing Rigpa)；正念操作定义: "四念处：身受心法的觉察" (Satipaṭṭhāna)；范式差异: 觉知觉知 vs 觉察对象'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_vs_Mindfulness.md
  section: 表1.2 操作定义差异
- type: concept
  question: 现代定义的核心要点是什么？
  answer: '直接认知操作定义: "纯粹觉知的非概念性辨识" (Non-conceptual recognition of pure awareness)；正念操作定义: "自我调节注意于当下经验，以好奇、开放、接纳的态度" (Bishop
    et al., 2004)；范式差异: 无概念 vs 有态度'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_vs_Mindfulness.md
  section: 表1.2 操作定义差异
- type: concept
  question: 元认知层面的核心要点是什么？
  answer: '直接认知操作定义: 元认知"塌缩"为觉知本身 — 观察者与被观察者合一；正念操作定义: 元认知觉察 — 对认知过程的觉察 (Kabat-Zinn, 2015: "觉察的觉察")；范式差异: 塌缩/消融 vs 建立/培养'
