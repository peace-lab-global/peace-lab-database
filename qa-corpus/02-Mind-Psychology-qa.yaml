- type: concept
  question: 第一相：法性现前的核心要点是什么？
  answer: '藏文原名: Chos-nyid mngon-sum；英文译名: Manifest Dharmata；现象学特征: 觉知的本性首次稳定显现；神经对应: DMN活动显著降低；PCC-ACC解耦；生活表现: 日常中能短暂维持觉知；现代评估标准:
    NADA-T>=3.0；单次静坐维持10-30分钟；9LM: L4'
  source: 02-Mind-Psychology/meditation/direct-recognition/Meditation_Direct_Recognition_Assessment_Stages.md
