- type: concept
  question: 什么是概述 (Overview)？
  answer: 慧能（Huìnéng, 638年—713年），唐代禅宗僧人，中国禅宗第六代祖师，被尊为"六祖大师"。他出生于岭南新州（今广东新兴县），俗姓卢，父亲早亡，家境贫寒。与其他五位禅宗祖师（从达摩到弘忍）不同，慧能出身寒微、目不识丁，却成为中国佛教史上影响最深远的人物之一。
  source: 02-Mind-Psychology/meditation/masters/ancient-buddhist/Huineng.md
  section: 概述 (Overview)
- type: concept
  question: 心的本质的核心要点是什么？
  answer: '神秀（渐修）: 心如镜子，会被灰尘覆盖；慧能（顿悟）: 心不是实体，无可覆盖'
  source: 02-Mind-Psychology/meditation/masters/ancient-buddhist/Huineng.md
  section: 1. 顿悟——即心即佛 (Sudden Awakening)
- type: concept
  question: 修行方向的核心要点是什么？
  answer: '神秀（渐修）: 需要持续清扫——修行是"做加法"；慧能（顿悟）: 认识到无需清扫——修行是"做减法"'
  source: 02-Mind-Psychology/meditation/masters/ancient-buddhist/Huineng.md
  section: 1. 顿悟——即心即佛 (Sudden Awakening)
- type: concept
  question: 觉悟路径的核心要点是什么？
  answer: '神秀（渐修）: 经由渐进修行最终达到觉悟；慧能（顿悟）: 当下直接认识，觉悟不在未来'
  source: 02-Mind-Psychology/meditation/masters/ancient-buddhist/Huineng.md
  section: 1. 顿悟——即心即佛 (Sudden Awakening)
- type: concept
  question: 无念** (Wú Niàn)的核心要点是什么？
  answer: '含义: 不是没有念头，而是念头来去不被粘着；修行要旨: 于念而不念——在有念头的同时保持不执着'
  source: 02-Mind-Psychology/meditation/masters/ancient-buddhist/Huineng.md
  section: 3. 无念、无相、无住——三无法门
- type: concept
  question: 无相** (Wú Xiàng)的核心要点是什么？
  answer: '含义: 不是否认现象，而是不被现象的外在形式所困；修行要旨: 于相而离相——在现象中不被现象绑架'
  source: 02-Mind-Psychology/meditation/masters/ancient-buddhist/Huineng.md
  section: 3. 无念、无相、无住——三无法门
- type: concept
  question: 无住** (Wú Zhù)的核心要点是什么？
  answer: '含义: 不是什么都不做，而是不在任何境界上停留执着；修行要旨: 于法而不住——心如流水，不在任何一处滞留'
  source: 02-Mind-Psychology/meditation/masters/ancient-buddhist/Huineng.md
  section: 3. 无念、无相、无住——三无法门
- type: concept
  question: 什么是四、文化影响？
  answer: '- 密勒日巴是西藏文化中最受爱戴的人物之一

    - 他的故事证明了"即使最大的罪人也能觉悟"

    - 对噶举派四大支派和八小支派的建立奠定了基础

    - 他的修行精神影响了整个藏传佛教

    - 在西方也有广泛影响（多部传记被翻译）'
