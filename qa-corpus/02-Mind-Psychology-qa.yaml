- type: concept
  question: 入睡困难型的核心要点是什么？
  answer: '核心表现: 躺在床上 > 30 分钟无法入睡；典型人群: 年轻人、焦虑型；首选干预方向: 刺激控制 + 认知重构'
  source: 02-Mind-Psychology/psychology/somatic-body/insomnia/Insomnia_Self_Assessment.md
  section: 第二步：我的失眠属于什么类型？
- type: concept
  question: 睡眠维持困难型的核心要点是什么？
  answer: '核心表现: 夜间频繁醒来（≥2次），总觉醒 > 30 分钟；典型人群: 中老年、疼痛患者；首选干预方向: 睡眠限制 + 排除共病'
  source: 02-Mind-Psychology/psychology/somatic-body/insomnia/Insomnia_Self_Assessment.md
  section: 第二步：我的失眠属于什么类型？
- type: concept
  question: 早醒型的核心要点是什么？
  answer: '核心表现: 比预期早醒 ≥ 1-2 小时且无法再入睡；典型人群: 抑郁症患者、老年人；首选干预方向: 排查抑郁 + 光照治疗'
  source: 02-Mind-Psychology/psychology/somatic-body/insomnia/Insomnia_Self_Assessment.md
  section: 第二步：我的失眠属于什么类型？
- type: concept
  question: 0-7 分的核心要点是什么？
  answer: '严重程度: 无临床意义的失眠；建议: 无需特殊处理，维持良好睡眠习惯'
  source: 02-Mind-Psychology/psychology/somatic-body/insomnia/Insomnia_Self_Assessment.md
  section: 评分与解读
- type: concept
  question: 8-14 分的核心要点是什么？
  answer: '严重程度: 亚临床失眠/轻度失眠；建议: 可通过睡眠卫生教育和自助策略改善'
