- type: concept
  question: 杏仁核 (Amygdala)的核心要点是什么？
  answer: '在焦虑中的角色: 威胁检测过度敏感，反应阈值降低；冥想的调节作用: 长期冥想降低杏仁核反应性；增加杏仁核-前额叶连接'
  source: 02-Mind-Psychology/meditation/clinical-conditions/Meditation_Anxiety_Disorders.md
  section: 2.1 焦虑相关的脑网络
- type: concept
  question: 前额叶皮层 (PFC)的核心要点是什么？
  answer: '在焦虑中的角色: 情绪调节、认知重评功能减弱；冥想的调节作用: 增强背外侧PFC和腹内侧PFC的调控功能'
  source: 02-Mind-Psychology/meditation/clinical-conditions/Meditation_Anxiety_Disorders.md
  section: 2.1 焦虑相关的脑网络
- type: concept
  question: 前扣带皮层 (ACC)的核心要点是什么？
  answer: '在焦虑中的角色: 冲突监测、错误检测过度活跃；冥想的调节作用: 降低ACC对威胁相关冲突的过度反应'
  source: 02-Mind-Psychology/meditation/clinical-conditions/Meditation_Anxiety_Disorders.md
  section: 2.1 焦虑相关的脑网络
- type: concept
  question: 注意力重定向 (Attentional Redirection)的核心要点是什么？
  answer: '描述: 将注意力从威胁性思维转移到当下锚点（呼吸、身体感受）；对应焦虑病理: 打破反刍思维和担忧循环'
  source: 02-Mind-Psychology/meditation/clinical-conditions/Meditation_Anxiety_Disorders.md
