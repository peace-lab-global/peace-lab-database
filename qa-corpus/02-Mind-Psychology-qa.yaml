  section: 概述
- type: concept
  question: 单次发作后复发率的核心要点是什么？
  answer: '数据: 约50%在首发后2-3年内复发；来源: Hardeveld et al. (2010)'
  source: 02-Mind-Psychology/meditation/mbct-program/MBCT_Depression_Relapse_Prevention.md
  section: 1.1 复发的流行病学数据
- type: concept
  question: 两次发作后第三次发作概率的核心要点是什么？
  answer: '数据: 约70-80%；来源: Kupfer (1991); Soloman et al. (2000)'
  source: 02-Mind-Psychology/meditation/mbct-program/MBCT_Depression_Relapse_Prevention.md
  section: 1.1 复发的流行病学数据
- type: concept
  question: 复燃的核心要点是什么？
  answer: '英文: Relapse；定义: 同一抑郁发作的恢复过程中症状再现（通常在治疗6个月内）；临床意义: 提示当前治疗未充分'
  source: 02-Mind-Psychology/meditation/mbct-program/MBCT_Depression_Relapse_Prevention.md
  section: 1.1 复发的流行病学数据
- type: concept
  question: 复发的核心要点是什么？
  answer: '英文: Recurrence / Relapse（广义）；定义: 完全缓解后发生的新发作（通常指6个月后）；临床意义: 提示需要预防性干预'
  source: 02-Mind-Psychology/meditation/mbct-program/MBCT_Depression_Relapse_Prevention.md
  section: 1.1 复发的流行病学数据
- type: concept
  question: 再发的核心要点是什么？
  answer: '英文: Recurrence；定义: 新的抑郁发作（狭义上区别于复燃）；临床意义: 发作次数累积，神经可塑性改变'
  source: 02-Mind-Psychology/meditation/mbct-program/MBCT_Depression_Relapse_Prevention.md
  section: 1.1 复发的流行病学数据
- type: concept
  question: 海马体（Hippocampus）的核心要点是什么？
  answer: '改变: 体积缩小；神经发生减少；与复发的关系: 记忆与情境调节受损；压力反应增强；关键研究: Sapolsky (2000); Sheline et al. (1996)'
  source: 02-Mind-Psychology/meditation/mbct-program/MBCT_Depression_Relapse_Prevention.md
  section: 1.2 复发的神经生物学基础
- type: concept
  question: 前额叶皮层（PFC）的核心要点是什么？
  answer: '改变: 背外侧PFC（dlPFC）活动降低；腹内侧PFC（vmPFC）活动异常；与复发的关系: 认知控制与情绪调节功能下降；关键研究: Davidson et al. (2002)'
  source: 02-Mind-Psychology/meditation/mbct-program/MBCT_Depression_Relapse_Prevention.md
  section: 1.2 复发的神经生物学基础
