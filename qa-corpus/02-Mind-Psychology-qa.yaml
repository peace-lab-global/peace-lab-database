  question: 什么是关于本专题？
  answer: 职业倦怠（Occupational Burnout）在 **ICD-11** 中被正式编码为 **QD85**，定义为"因长期工作场所压力未被成功管理而产生的综合征"。尽管倦怠不被归类为精神疾病，但其与抑郁、焦虑、躯体化障碍的共病率极高，且对个人健康、组织效能和社会经济造成巨大损失。
  source: 02-Mind-Psychology/meditation/clinical-conditions/occupational-burnout/INDEX.md
