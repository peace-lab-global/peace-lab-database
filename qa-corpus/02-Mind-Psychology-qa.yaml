  question: 盘腿坐的核心要点是什么？
  answer: '描述: 双腿交叉，脊柱挺直，双手置于膝上或心口；适用场景: 日常固定修习'
  source: 02-Mind-Psychology/meditation/sufism-meditation/Sufi_Practical_Guide.md
  section: 1.1 个体 Dhikr
- type: concept
  question: 跪坐（Tahiyat 姿）的核心要点是什么？
  answer: '描述: 跪姿臀部坐于脚跟上，脊柱挺直；适用场景: 传统苏菲修习'
  source: 02-Mind-Psychology/meditation/sufism-meditation/Sufi_Practical_Guide.md
  section: 1.1 个体 Dhikr
- type: concept
  question: 椅上坐的核心要点是什么？
  answer: '描述: 坐于椅子前缘，双脚平放地面，脊柱挺直；适用场景: 膝盖不适者'
  source: 02-Mind-Psychology/meditation/sufism-meditation/Sufi_Practical_Guide.md
  section: 1.1 个体 Dhikr
- type: concept
  question: 吸气的核心要点是什么？
  answer: '念诵内容: "安拉"（Allah）；操作: 深缓吸气，在心中或微声念诵'
  source: 02-Mind-Psychology/meditation/sufism-meditation/Sufi_Practical_Guide.md
  section: 1.1 个体 Dhikr
- type: concept
  question: 屏息的核心要点是什么？
  answer: '念诵内容: 观想光从心轮升起；操作: 短暂屏息，观想安拉之光充满心胸'
  source: 02-Mind-Psychology/meditation/sufism-meditation/Sufi_Practical_Guide.md
  section: 1.1 个体 Dhikr
- type: concept
  question: 呼气的核心要点是什么？
  answer: '念诵内容: "乎"（Hu）；操作: 缓慢呼气，发出"乎——"的音，释放一切执着'
  source: 02-Mind-Psychology/meditation/sufism-meditation/Sufi_Practical_Guide.md
  section: 1.1 个体 Dhikr
- type: concept
  question: 知识论的核心要点是什么？
  answer: '具体内容: 区分了启示知识（`Ilm al-Yaqin`）、眼见知识（`Ayn al-Yaqin`）和亲证知识（`Haqq al-Yaqin`）——苏菲的 Dhawq（品尝）属于最高层'
  source: 02-Mind-Psychology/meditation/sufism-meditation/Sufism_Meditation_Overview.md
