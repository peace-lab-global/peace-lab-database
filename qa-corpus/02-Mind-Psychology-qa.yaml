- type: concept
  question: 什么是课程总览？
  answer: '**MBCT课程核心设计原则**：

    1. **体验优先**：通过直接体验而非说教来传达正念

    2. **认知整合**：将正念体验与CBT对思维-情绪-身体关系的理解结合

    3. **去中心化训练**：系统培养"将体验视为心理事件"的元认知能力

    4. **复发预防导向**：始终围绕"识别并退出抑郁模式"这一核心目标'
  source: 02-Mind-Psychology/meditation/mbct-program/MBCT_Weekly_Curriculum.md
