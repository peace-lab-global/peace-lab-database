  answer: '英文术语: Postvention；来源语言/词源: 英语 *post-* + *prevention*；定义: 危机事件发生后对受影响者的干预措施；临床意义: 预防连锁反应、促进康复'
  source: 02-Mind-Psychology/psychology/clinical/crisis-postvention/Crisis_Postvention.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 危机后康复的核心要点是什么？
  answer: '英文术语: Post-Crisis Recovery；来源语言/词源: 英语；定义: 危机事件后个体或系统恢复功能的过程；临床意义: 长期目标'
  source: 02-Mind-Psychology/psychology/clinical/crisis-postvention/Crisis_Postvention.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 心理减压的核心要点是什么？
  answer: '英文术语: Psychological Debriefing；来源语言/词源: 英语；定义: 危机事件后促进情绪表达的结构化谈话；临床意义: 争议：可能有害'
  source: 02-Mind-Psychology/psychology/clinical/crisis-postvention/Crisis_Postvention.md
  section: 核心术语表 (Core Terminology)
- type: concept
  question: 接触与参与的核心要点是什么？
  answer: '英文名称: Contact and Engagement；核心内容: 以尊重、非侵入的方式接触；具体做法: 自我介绍、询问需求、保持平静；目标: 建立信任'
  source: 02-Mind-Psychology/psychology/clinical/crisis-postvention/Crisis_Postvention.md
  section: 心理急救(PFA)核心行动表
- type: concept
  question: 安全与舒适的核心要点是什么？
  answer: '英文名称: Safety and Comfort；核心内容: 确保即时安全与基本需求；具体做法: 提供安全环境、满足生理需求；目标: 稳定化'
  source: 02-Mind-Psychology/psychology/clinical/crisis-postvention/Crisis_Postvention.md
  section: 心理急救(PFA)核心行动表
- type: concept
  question: 稳定化的核心要点是什么？
  answer: '英文名称: Stabilization；核心内容: 帮助情绪失控者平复；具体做法: 接地技术、呼吸练习、陪伴；目标: 情绪调节'
  source: 02-Mind-Psychology/psychology/clinical/crisis-postvention/Crisis_Postvention.md
  section: 心理急救(PFA)核心行动表
- type: concept
  question: 时机的核心要点是什么？
  answer: '心理急救(PFA): 危机后即时（数小时-数天）；心理减压(Debriefing): 危机后24-72小时'
  source: 02-Mind-Psychology/psychology/clinical/crisis-postvention/Crisis_Postvention.md
  section: PFA与心理减压(Debriefing)对比表
- type: concept
  question: 形式的核心要点是什么？
  answer: '心理急救(PFA): 灵活、个别化；心理减压(Debriefing): 结构化、常为团体'
  source: 02-Mind-Psychology/psychology/clinical/crisis-postvention/Crisis_Postvention.md
  section: PFA与心理减压(Debriefing)对比表
- type: concept
  question: 什么是内容索引 | Contents？
  answer: '- [Crisis Postvention](Crisis_Postvention.md)'
  source: 02-Mind-Psychology/psychology/clinical/crisis-postvention/INDEX.md
  section: 内容索引 | Contents
- type: concept
  question: 双相 I 型的核心要点是什么？
  answer: '核心特征: 至少1次完全躁狂发作；抑郁发作: 通常存在（非必需）；躁狂/轻躁狂: 完全躁狂（≥7天或需住院）；临床意义: 最严重；精神病性特征常见；功能损害大'
  source: 02-Mind-Psychology/psychology/clinical/depression/Bipolar_Depression_Management.md
  section: 表1.1 双相障碍分类（DSM-5）
- type: concept
  question: 双相 II 型的核心要点是什么？
  answer: '核心特征: 至少1次轻躁狂 + 至少1次重性抑郁；抑郁发作: 必须存在；躁狂/轻躁狂: 轻躁狂（≥4天，无精神病性，功能无严重损害）；临床意义: 抑郁更严重、更慢性；自杀风险高'
  source: 02-Mind-Psychology/psychology/clinical/depression/Bipolar_Depression_Management.md
  section: 表1.1 双相障碍分类（DSM-5）
- type: concept
  question: 环性心境障碍的核心要点是什么？
  answer: '核心特征: 2年以上多次轻躁狂和轻抑郁交替；抑郁发作: 未达重性抑郁标准；躁狂/轻躁狂: 未达轻躁狂标准；临床意义: 慢性波动；可进展为双相I/II'
  source: 02-Mind-Psychology/psychology/clinical/depression/Bipolar_Depression_Management.md
  section: 表1.1 双相障碍分类（DSM-5）
- type: concept
  question: 发病年龄的核心要点是什么？
  answer: '双相抑郁: 较早（通常 < 25岁）；首次发作多为抑郁；单相抑郁: 较广；任何年龄'
  source: 02-Mind-Psychology/psychology/clinical/depression/Bipolar_Depression_Management.md
  section: 表1.2 双相抑郁 vs 单相抑郁：鉴别要点
- type: concept
  question: 发作突然性的核心要点是什么？
  answer: '双相抑郁: 更急骤（数小时至数天）；单相抑郁: 较渐进（数周）'
  source: 02-Mind-Psychology/psychology/clinical/depression/Bipolar_Depression_Management.md
  section: 表1.2 双相抑郁 vs 单相抑郁：鉴别要点
- type: concept
  question: 发作频率的核心要点是什么？
  answer: '双相抑郁: 发作次数更多；更短（平均 3-6月）；单相抑郁: 较少；更长（平均 6-12月）'
  source: 02-Mind-Psychology/psychology/clinical/depression/Bipolar_Depression_Management.md
  section: 表1.2 双相抑郁 vs 单相抑郁：鉴别要点
- type: concept
  question: MDQ (Mood Disorder Questionnaire)的核心要点是什么？
  answer: '条目: 13项症状 + 2个功能问题；切点: ≥7项 + 功能损害；灵敏度: 0.73；特异度: 0.90；用途: 广泛筛查；注意: 敏感性中等；假阴性常见于双相II'
  source: 02-Mind-Psychology/psychology/clinical/depression/Bipolar_Depression_Management.md
  section: 表2.1 双相谱系筛查工具
- type: concept
  question: HCL-32 (Hypomania Checklist)的核心要点是什么？
  answer: '条目: 32项轻躁狂症状；切点: ≥14项；灵敏度: 0.80；特异度: 0.76；用途: 筛查轻躁狂；注意: 对双相II更敏感'
  source: 02-Mind-Psychology/psychology/clinical/depression/Bipolar_Depression_Management.md
  section: 表2.1 双相谱系筛查工具
- type: concept
  question: 对自我的核心要点是什么？
  answer: '负性核心信念示例: "我不可爱" "我无能" "我是负担"；中间信念示例: "如果我表现不完美，就说明我是失败者"；自动思维示例: "我又搞砸了" "我不值得被帮助"'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_CBT_Manual.md
  section: 1.2 抑郁认知三联征 (Cognitive Triad)
- type: concept
  question: 对世界/他人的核心要点是什么？
  answer: '负性核心信念示例: "世界是危险的" "他人不可信" "别人总是批评我"；中间信念示例: "如果别人真正了解我，就会拒绝我"；自动思维示例: "大家都在评判我" "没人理解我"'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_CBT_Manual.md
  section: 1.2 抑郁认知三联征 (Cognitive Triad)
- type: concept
  question: 对未来的核心要点是什么？
  answer: '负性核心信念示例: "未来是绝望的" "事情永远不会变好"；中间信念示例: "如果一件事可能出错，它就一定会出错"；自动思维示例: "努力也没用" "我不会好起来的"'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_CBT_Manual.md
  section: 1.2 抑郁认知三联征 (Cognitive Triad)
- type: concept
  question: 回避-退缩循环的核心要点是什么？
  answer: '描述: 抑郁导致活动减少，活动减少导致正性体验减少，从而维持抑郁；示例: 因情绪低落取消社交→更加孤独→情绪更低落；CBT干预: 行为激活；活动计划'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_CBT_Manual.md
  section: 1.3 行为维持机制
- type: concept
  question: 快感缺失-动机下降的核心要点是什么？
  answer: '描述: 奖赏系统功能降低→活动减少→进一步降低奖赏体验；示例: 不再从事爱好→失去快乐来源→更无动力；CBT干预: 行为实验；渐进愉悦活动'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_CBT_Manual.md
  section: 1.3 行为维持机制
- type: concept
  question: 反刍-情绪恶化的核心要点是什么？
  answer: '描述: 反复思考负面内容→情绪加重→更多反刍；示例: 反复想「我为什么这么失败」→更加抑郁；CBT干预: 正念；注意力转移； worry time'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_CBT_Manual.md
  section: 1.3 行为维持机制
- type: concept
  question: 评估期的核心要点是什么？
  answer: '会谈次数: 1-2次；核心任务: 全面评估；建立关系；心理教育；设定目标；引入CBT模型；目标: 建立治疗联盟；理解问题'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_CBT_Manual.md
  section: 表2.1 标准CBT疗程结构
- type: concept
  question: 急性期的核心要点是什么？
  answer: '会谈次数: 6-12次；核心任务: 识别自动思维；认知重构；行为激活；问题解决；目标: 症状减轻50%+'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_CBT_Manual.md
  section: 表2.1 标准CBT疗程结构
- type: concept
  question: 纤维肌痛综合征 (FMS)的核心要点是什么？
  answer: '人群患病率: 2-4%；伴抑郁率: 20-80%；抑郁相对风险: RR 3-5；主要特征: 广泛性疼痛 + 疲劳 + 睡眠障碍 + 认知困难'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Chronic_Pain_Comorbidity.md
  section: 表1.1 常见慢性疼痛类型与抑郁共病率
- type: concept
  question: 慢性腰背痛的核心要点是什么？
  answer: '人群患病率: 10-20%；伴抑郁率: 30-50%；抑郁相对风险: RR 2-3；主要特征: 最常见慢性疼痛；功能受限显著'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Chronic_Pain_Comorbidity.md
  section: 表1.1 常见慢性疼痛类型与抑郁共病率
- type: concept
  question: 紧张型头痛/偏头痛的核心要点是什么？
  answer: '人群患病率: 10-15%；伴抑郁率: 40-50%；抑郁相对风险: RR 2-3；主要特征: 5-HT系统功能障碍；发作-缓解模式'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Chronic_Pain_Comorbidity.md
  section: 表1.1 常见慢性疼痛类型与抑郁共病率
- type: concept
  question: 前扣带回皮层 (ACC)的核心要点是什么？
  answer: '疼痛功能: 疼痛的情绪/厌恶成分；抑郁功能: 情绪调节；错误监测；共病中的改变: 活动异常；灰质体积变化；治疗靶点: rTMS；药物'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Chronic_Pain_Comorbidity.md
  section: 表2.1 疼痛-抑郁共享的神经解剖与递质系统
- type: concept
  question: 前额叶皮层 (PFC)的核心要点是什么？
  answer: '疼痛功能: 下行疼痛抑制；疼痛认知评估；抑郁功能: 执行功能；情绪调节；共病中的改变: 功能连接异常；体积减小；治疗靶点: CBT；rTMS；药物'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Chronic_Pain_Comorbidity.md
  section: 表2.1 疼痛-抑郁共享的神经解剖与递质系统
- type: concept
  question: 岛叶的核心要点是什么？
  answer: '疼痛功能: 疼痛的内感受觉察；抑郁功能: 情绪意识；内感受；共病中的改变: 活动增强；与ACC连接增强；治疗靶点: 正念；药物'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Chronic_Pain_Comorbidity.md
  section: 表2.1 疼痛-抑郁共享的神经解剖与递质系统
- type: concept
  question: IL-6的核心要点是什么？
  answer: '疼痛作用: 中枢敏化；痛觉过敏；抑郁作用: HPA轴激活；5-HT合成抑制；快感缺失；来源: 巨噬细胞、脂肪细胞、免疫细胞'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Chronic_Pain_Comorbidity.md
  section: 表2.2 炎症：疼痛与抑郁的共同土壤
- type: concept
  question: TNF-α的核心要点是什么？
  answer: '疼痛作用: 神经病理性疼痛；痛觉过敏；抑郁作用: 神经发生抑制；抑郁样行为；来源: 巨噬细胞、小胶质细胞'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Chronic_Pain_Comorbidity.md
  section: 表2.2 炎症：疼痛与抑郁的共同土壤
- type: concept
  question: 计算机化CBT的核心要点是什么？
  answer: '英文: cCBT / iCBT (computerized/internet-based CBT)；定义: 通过网站或软件交付结构化CBT；代表产品/平台: MoodGYM、Beating the Blues、SilverCloud、This
    Way Up、iFightDepression；证据等级: **A级**'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Digital_Interventions.md
  section: 表1.1 按技术类型分类
- type: concept
  question: 智能手机App的核心要点是什么？
  answer: '英文: Mental Health Apps；定义: 手机应用提供心理干预、监测或支持；代表产品/平台: Headspace、Calm、Moodfit、Sanvello、Daylio；证据等级: **B级**'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Digital_Interventions.md
  section: 表1.1 按技术类型分类
- type: concept
  question: 可穿戴监测的核心要点是什么？
  answer: '英文: Wearable Monitoring；定义: 通过智能手表/手环持续监测生理和行为指标；代表产品/平台: Apple Watch、Fitbit、Garmin、Oura Ring；证据等级: **C级**（监测）；**B级**（反馈干预）'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Digital_Interventions.md
  section: 表1.1 按技术类型分类
- type: concept
  question: 筛查与评估的核心要点是什么？
  answer: '描述: 数字化问卷、语音分析、行为模式识别；证据: B级；典型应用: PHQ-9 App；语音情绪分析'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Digital_Interventions.md
  section: 表1.2 按功能分类
- type: concept
  question: 症状监测的核心要点是什么？
  answer: '描述: 连续追踪情绪、睡眠、活动、社交；证据: B级；典型应用: Daylio、eMoods'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Digital_Interventions.md
  section: 表1.2 按功能分类
- type: concept
  question: 心理教育的核心要点是什么？
  answer: '描述: 提供疾病知识、应对策略信息；证据: B级；典型应用: 网站、App内模块'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Digital_Interventions.md
  section: 表1.2 按功能分类
- type: concept
  question: 完全自助的核心要点是什么？
  answer: '治疗师参与: 无；效果量: d=0.5-0.7；脱落率: 高（30-50%）；适用情境: 资源有限；轻症；偏好自主'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Digital_Interventions.md
  section: 2.1 计算机化/网络化CBT (cCBT / iCBT)
- type: concept
  question: 引导式（异步）的核心要点是什么？
  answer: '治疗师参与: 定期邮件/消息反馈；效果量: d=0.7-1.0；脱落率: 中（15-25%）；适用情境: **推荐模式**；轻中度'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Digital_Interventions.md
  section: 2.1 计算机化/网络化CBT (cCBT / iCBT)
- type: concept
  question: 前驱期的核心要点是什么？
  answer: '英文: Prodromal Phase；定义: 抑郁全面发作前出现亚临床症状的阶段；持续时间: 数天至数月；临床意义: 干预的黄金窗口期'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Early_Warning_Signals.md
  section: 表1.1 前驱期与预警信号术语定义
- type: concept
  question: 早期预警信号的核心要点是什么？
  answer: '英文: Early Warning Signal (EWS)；定义: 可预测抑郁发作或恶化的可观察变化；持续时间: 数小时至数周；临床意义: 触发预防性干预的指标'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Early_Warning_Signals.md
  section: 表1.1 前驱期与预警信号术语定义
- type: concept
  question: 触发因素的核心要点是什么？
  answer: '英文: Trigger / Precipitant；定义: 直接诱发症状加重的生活事件或生物变化；持续时间: 急性或慢性；临床意义: 帮助理解信号出现的背景'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Early_Warning_Signals.md
  section: 表1.1 前驱期与预警信号术语定义
- type: concept
  question: 持续时间的核心要点是什么？
  answer: '正常情绪波动: 数小时至1-2天；抑郁预警信号: ≥3-5天，且持续存在'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Early_Warning_Signals.md
  section: 表1.2 预警信号 vs 正常情绪波动
- type: concept
  question: 强度的核心要点是什么？
  answer: '正常情绪波动: 中等；可控；抑郁预警信号: 显著；难以自我调节'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Early_Warning_Signals.md
  section: 表1.2 预警信号 vs 正常情绪波动
- type: concept
  question: 功能影响的核心要点是什么？
  answer: '正常情绪波动: 轻微；不影响日常职责；抑郁预警信号: 可观察到工作效率、社交或自理能力下降'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Early_Warning_Signals.md
  section: 表1.2 预警信号 vs 正常情绪波动
- type: concept
  question: 情绪低落加重的核心要点是什么？
  answer: '具体表现: 悲伤、空虚、绝望感增加；「心里堵」；严重度分级: 🟡→🔴；出现频率（复发患者中）: 90%+；识别难度: 低'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Early_Warning_Signals.md
  section: 2.1 情绪维度信号 (Emotional Signals)
- type: concept
  question: 易激惹性增高的核心要点是什么？
  answer: '具体表现: 小事即怒；对他人不耐烦；脾气变差；严重度分级: 🟡；出现频率（复发患者中）: 60-70%（尤其青少年/男性）；识别难度: 中'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Early_Warning_Signals.md
  section: 2.1 情绪维度信号 (Emotional Signals)
- type: concept
  question: 迷走神经的核心要点是什么？
  answer: '机制: 肠道信号直接传递至脑干→边缘系统；抑郁中的改变: 迷走神经张力降低；可干预性: **高**（深呼吸、冥想可激活）'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Nutritional_Interventions.md
  section: 表1.1 肠脑轴通信通路
- type: concept
  question: 免疫-炎症的核心要点是什么？
  answer: '机制: 肠道通透性增加→LPS入血→系统性炎症；抑郁中的改变: 肠漏、LPS↑、IL-6/CRP↑；可干预性: **高**（饮食、益生菌）'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Nutritional_Interventions.md
  section: 表1.1 肠脑轴通信通路
- type: concept
  question: 神经递质合成的核心要点是什么？
  answer: '机制: 肠道菌群产生5-HT前体、GABA、DA；抑郁中的改变: 菌群多样性降低；5-HT合成减少；可干预性: **高**（益生菌、膳食纤维）'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Nutritional_Interventions.md
  section: 表1.1 肠脑轴通信通路
- type: concept
  question: 菌群多样性降低的核心要点是什么？
  answer: '研究证据: 多项研究一致；可能机制: 生态失衡致功能下降；干预方向: 膳食纤维、多样性饮食'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Nutritional_Interventions.md
  section: 表1.2 抑郁相关肠道菌群特征
- type: concept
  question: 普雷沃氏菌↓的核心要点是什么？
  answer: '研究证据: 中等；可能机制: 产SCFAs能力下降；干预方向: 特定益生菌'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Nutritional_Interventions.md
  section: 表1.2 抑郁相关肠道菌群特征
- type: concept
  question: 双歧杆菌↓的核心要点是什么？
  answer: '研究证据: 较强；可能机制: 抗炎、产GABA、保护屏障；干预方向: 双歧杆菌益生菌'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Nutritional_Interventions.md
  section: 表1.2 抑郁相关肠道菌群特征
- type: concept
  question: Omega-3 (EPA)的核心要点是什么？
  answer: '作用机制: 抗炎；膜流动性；神经可塑性；5-HT/DA功能；证据等级: **A**；推荐剂量: EPA 1-2g/日（EPA:DHA ≥ 2:1）；起效时间: 2-4周；适用人群: 高炎症者；炎症性饮食者；主要食物来源:
    深海鱼（三文鱼、沙丁鱼、鲭鱼）、亚麻籽、核桃；注意事项: 高剂量出血风险；与抗凝药交互'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Nutritional_Interventions.md
  section: 表2.1 核心营养素循证汇总
- type: concept
  question: 维生素D的核心要点是什么？
  answer: '作用机制: 免疫调节；神经保护；5-HT合成；证据等级: **B**；推荐剂量: 2000-4000 IU/日（根据基线）；起效时间: 4-8周；适用人群: 缺乏者；日照不足者；冬季；主要食物来源: 日晒、鱼肝油、蛋黄、强化食品；注意事项:
    检测25-OH-D；避免过量（>4000 IU需监测）'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Nutritional_Interventions.md
  section: 表2.1 核心营养素循证汇总
- type: concept
  question: 抑郁的核心要点是什么？
  answer: '英文名 (English Term): Depression；原始语言/词源 (Original Language): 拉丁语: *Deprimere* (向下压)；词源含义: "被压低、被压下去"的状态；精确定义: 一种以持续性情绪低落、兴趣减退、精力下降为核心的情感状态；历史演变:
    19世纪前称为"忧郁症"(Melancholia)，20世纪采用Depression；专业视角 (Professional Perspective): 抑郁是一种神经生物学改变，非意志力软弱'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 重性抑郁障碍的核心要点是什么？
  answer: '英文名 (English Term): Major Depressive Disorder (MDD)；原始语言/词源 (Original Language): -；词源含义: 符合DSM/ICD标准的抑郁症临床诊断；精确定义:
    至少2周持续存在5项以上症状，包括情绪低落或兴趣丧失；历史演变: DSM-III(1980)首次规范化MDD诊断；专业视角 (Professional Perspective): 是抑郁症最常见的临床形式'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 忧郁症的核心要点是什么？
  answer: '英文名 (English Term): Melancholia；原始语言/词源 (Original Language): 希腊语: *Melaina chole* (μελαινα χολή, 黑胆汁)；词源含义: 古希腊四体液学说中的"黑胆汁过剩"；精确定义:
    以精神运动性改变、晨重夜轻、早醒为特征的抑郁亚型；历史演变: 希波克拉底时代的忧郁概念，现代医学中为抑郁特征；专业视角 (Professional Perspective): 忧郁型抑郁对药物反应更敏感，需积极治疗'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 重性抑郁障碍的核心要点是什么？
  answer: '英文名: Major Depressive Disorder；ICD-11代码: 6A70；核心特征: 情绪低落或兴趣丧失为核心，伴多种症状；病程要求: ≥2周；严重程度: 轻/中/重；与MDD鉴别要点: 基准诊断；临床意义:
    最常见的抑郁诊断，需要系统治疗'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Overview.md
  section: 表2.1 DSM-5抑郁障碍分类 (DSM-5 Depressive Disorders Classification)
- type: concept
  question: 持续性抑郁障碍的核心要点是什么？
  answer: '英文名: Persistent Depressive Disorder；ICD-11代码: 6A72；核心特征: 慢性轻度抑郁，可伴重性发作；病程要求: ≥2年；严重程度: 轻度为主；与MDD鉴别要点: 病程更长，症状更慢性化；临床意义:
    需长期治疗，关注功能损害累积'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Overview.md
  section: 表2.1 DSM-5抑郁障碍分类 (DSM-5 Depressive Disorders Classification)
- type: concept
  question: 经前期烦躁障碍的核心要点是什么？
  answer: '英文名: Premenstrual Dysphoric Disorder；ICD-11代码: GA34.41；核心特征: 经前期显著情绪波动；病程要求: 月经周期相关；严重程度: 中度；与MDD鉴别要点: 与月经周期严格相关；临床意义:
    女性特有，可用SSRI或激素干预'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Overview.md
  section: 表2.1 DSM-5抑郁障碍分类 (DSM-5 Depressive Disorders Classification)
- type: concept
  question: 伴焦虑痛苦的核心要点是什么？
  answer: '英文: With Anxious Distress；核心表现: 紧张、坐立不安、担心、害怕失控；临床意义: 自杀风险增加；治疗影响: 可能需要抗焦虑药物辅助；预后特点: 治疗反应可能较慢'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Overview.md
  section: 表2.2 重性抑郁障碍的特征标注 (MDD Specifiers)
- type: concept
  question: 伴混合特征的核心要点是什么？
  answer: '英文: With Mixed Features；核心表现: 抑郁发作期间出现躁狂/轻躁狂症状；临床意义: 需警惕双相障碍可能；治疗影响: 慎用抗抑郁药单药治疗；预后特点: 转相风险增加'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Overview.md
  section: 表2.2 重性抑郁障碍的特征标注 (MDD Specifiers)
- type: concept
  question: 复发的核心要点是什么？
  answer: '英文: Recurrence；定义: 缓解期后出现的全新抑郁发作；时间框架: 完全缓解后 ≥ 4-6 个月；临床意义: 标志慢性化进程；需长期管理策略'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Relapse_Prevention.md
  section: 表1.1 复发相关术语精确定义
- type: concept
  question: 复燃的核心要点是什么？
  answer: '英文: Relapse；定义: 急性期治疗中或刚结束时症状的再度加重；时间框架: 缓解后 < 4-6 个月；临床意义: 提示急性期治疗不充分；需强化原治疗'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Relapse_Prevention.md
  section: 表1.1 复发相关术语精确定义
- type: concept
  question: 残留症状的核心要点是什么？
  answer: '英文: Residual Symptoms；定义: 急性期治疗后持续存在的亚临床症状；时间框架: 治疗全程；临床意义: 最强复发预测因子；需针对性干预'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Relapse_Prevention.md
  section: 表1.1 复发相关术语精确定义
- type: concept
  question: 发生时机的核心要点是什么？
  answer: '复燃 (Relapse): 急性/巩固期；复发 (Recurrence): 维持期或停药后；慢性化 (Chronicity): 整个病程'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Relapse_Prevention.md
  section: 表1.2 复燃、复发与慢性化的鉴别
- type: concept
  question: 诱因的核心要点是什么？
  answer: '复燃 (Relapse): 治疗不足、过早减药；复发 (Recurrence): 生活事件、生物脆弱性；慢性化 (Chronicity): 多重因素累积'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Relapse_Prevention.md
  section: 表1.2 复燃、复发与慢性化的鉴别
- type: concept
  question: 症状特点的核心要点是什么？
  answer: '复燃 (Relapse): 类似原发作；复发 (Recurrence): 可能形式不同；慢性化 (Chronicity): 症状持续波动'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Relapse_Prevention.md
  section: 表1.2 复燃、复发与慢性化的鉴别
- type: concept
  question: 不可改变的核心要点是什么？
  answer: '因素类别: 病史因素；具体因素: 既往发作次数 ≥ 3 次；相对风险 (RR): RR 4-6；可干预性: 低'
  source: 02-Mind-Psychology/psychology/clinical/depression/Depression_Relapse_Prevention.md
  section: 表2.1 复发风险因素分层模型
