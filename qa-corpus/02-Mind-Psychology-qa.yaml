  question: Kesh的核心要点是什么？
  answer: '名称: 不剪头发；外在意义: 顺服神的创造；保留原初形态；内在冥想意义: 身体作为神圣临在的居所；头发是灵性的天线（3HO 解释）'
  source: 02-Mind-Psychology/meditation/sikh-meditation/Sikh_Meditation_Overview.md
  section: 1.4 Khalsa（ਖਾਲਸਾ）制度：神圣的社群
- type: concept
  question: Kangha的核心要点是什么？
  answer: '名称: 木梳；外在意义: 保持头发整洁；内在冥想意义: 每日梳理时是一个正念时刻；梳理身体也是在梳理心灵'
  source: 02-Mind-Psychology/meditation/sikh-meditation/Sikh_Meditation_Overview.md
  section: 1.4 Khalsa（ਖਾਲਸਾ）制度：神圣的社群
