  section: 1.1 农村自杀与城市自杀的核心差异
- type: concept
  question: 精神疾病的核心要点是什么？
  answer: '传统认知: 自杀者约90%有精神疾病；中国农村数据: 约63%有精神疾病（费立鹏）；解释: 冲动性自杀不完全由疾病驱动'
  source: 02-Mind-Psychology/psychology/social/rural-psychology/Rural_Suicide_Prevention.md
  section: 1.2 中国农村自杀的"费立鹏悖论"
- type: concept
  question: 性别的核心要点是什么？
  answer: '传统认知: 男性自杀率高于女性；中国农村数据: 历史上女性高于男性；解释: 农村女性社会地位低+农药可及'
  source: 02-Mind-Psychology/psychology/social/rural-psychology/Rural_Suicide_Prevention.md
  section: 1.2 中国农村自杀的"费立鹏悖论"
- type: concept
  question: 城乡的核心要点是什么？
  answer: '传统认知: 城市自杀率高于农村；中国农村数据: 农村远高于城市；解释: 经济压力+手段可及+服务缺乏'
  source: 02-Mind-Psychology/psychology/social/rural-psychology/Rural_Suicide_Prevention.md
  section: 1.2 中国农村自杀的"费立鹏悖论"
