    - [塔拉·布拉赫](../contemporary-spiritual/Tara_Brach.md) - 慈悲冥想传承者'
  source: 02-Mind-Psychology/meditation/masters/western-pioneers/Sharon_Salzberg.md
  section: 关联主题 (Related Topics)
- type: concept
  question: 什么是概述 (Overview)？
  answer: 新禅·杨（Shinzen Young，1944-）是美国最具原创性的冥想教师之一，被称为"冥想界的科学家"。他独特地融合了日本禅宗、上座部内观和真言密教的修行经验，创建了"统一正念系统"（Unified Mindfulness
    System）——一个高度系统化、可量化的冥想训练框架。他是最早与神经科学家合作研究冥想的教师之一，其数学式的修行方法论对冥想的科学化和可教学化做出了重要贡献。
  source: 02-Mind-Psychology/meditation/masters/western-pioneers/Shinzen_Young.md
  section: 概述 (Overview)
- type: concept
  question: 视觉的核心要点是什么？
  answer: '外在: See Out（眼见的外在景象）；内在: See In（内在心像/想象）'
  source: 02-Mind-Psychology/meditation/masters/western-pioneers/Shinzen_Young.md
  section: 感知领域地图 (Sensory Experience Map)
- type: concept
  question: 听觉的核心要点是什么？
  answer: '外在: Hear Out（耳听的外在声音）；内在: Hear In（内在对话/思维）'
  source: 02-Mind-Psychology/meditation/masters/western-pioneers/Shinzen_Young.md
  section: 感知领域地图 (Sensory Experience Map)
- type: concept
  question: 触觉的核心要点是什么？
  answer: '外在: Feel Out（身体表面感觉）；内在: Feel In（内在情绪/身体感受）'
  source: 02-Mind-Psychology/meditation/masters/western-pioneers/Shinzen_Young.md
  section: 感知领域地图 (Sensory Experience Map)
