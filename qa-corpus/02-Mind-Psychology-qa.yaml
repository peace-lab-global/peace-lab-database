- type: concept
  question: 坐姿的核心要点是什么？
  answer: '执行方式: 金刚坐（Vajrasana），臀部坐脚跟，脊柱挺直；要点: 若膝盖不适，可在臀部下放枕头；若仍不适，可改为简易坐（ cross-legged），但效果稍减'
  source: 02-Mind-Psychology/meditation/kundalini-meditation/Kundalini_Kriya_Sequences.md
