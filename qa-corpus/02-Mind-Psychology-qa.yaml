- type: concept
  question: 什么是第1-2章：工作场景评估量表系统与日常正念评估？
  answer: "**文档类型**：学术级评估标准 | Academic Assessment Standard  \n> **适用范围**：职场正念干预效果评估、员工心理健康基线测量、组织发展调研、高压岗位筛查、日常正念生活化追踪  \n\
    > **编制原则**：循证医学（Evidence-Based）、工作情境嵌入（Context-Embedded）、多方法三角验证（Multi-Method Triangulation）、生态瞬时评估优先（EMA-First）  \n>\
    \ **证据等级**：A（系统综述/Meta分析）、B（RCT/队列研究）、C（横断面/病例对照）、D（专家共识/传统文献）  \n> **版本**：v1.0  \n> **最后更新**：2026-05  \n> **修订说明**：本指南在《冥想水平与能力评估标准总纲》（7DCM/9LM\
    \ v3.0）基础上，聚焦工作场景与日常生活情境，整合职业健康心理学（Occupational Health Psychology）与组织行为学（Organizational Behavior）研究成果，建立职场专用量表体系与非正式练习评估框架。所有核心论断均标注证据"
  source: 02-Mind-Psychology/meditation/meditation-workplace/Meditation_Workplace_Life_Assessment_Guide.md
