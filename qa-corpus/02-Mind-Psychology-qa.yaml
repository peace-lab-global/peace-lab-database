  section: Jīva（灵魂）与 Ajīva（非灵魂）
- type: concept
  question: Ajīva** (अजीव)的核心要点是什么？
  answer: '定义: 无生命的物质与空间；特征: 五种类型：Dharma（运动介质）、Adharma（静止介质）、Ākāśa（空间）、Pudgala（物质）、Kāla（时间）；与冥想的关系: 冥想中需要超越的对境'
  source: 02-Mind-Psychology/meditation/jain-meditation/Jain_Meditation_Overview.md
  section: Jīva（灵魂）与 Ajīva（非灵魂）
