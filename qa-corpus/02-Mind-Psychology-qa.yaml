  question: 3-6岁的核心要点是什么？
  answer: '发展特点: 具体运算思维；技术调整: 游戏化投射<br>故事接龙形式；媒材选择: 大尺寸图像卡<br>鲜艳色彩为主；注意事项: 保持趣味性<br>时间不宜过长；效果评估: 情绪表达丰富度'
  source: 02-Mind-Psychology/therapy/oh-cards-therapy/OH_Cards_Techniques_Methods.md
