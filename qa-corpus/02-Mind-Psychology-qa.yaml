- type: concept
  question: 自闭症的核心要点是什么？
  answer: '英文名 (English Term): Autism；原始语言/词源 (Original Language): 希腊语: *Autos* (αὐτός, 自己) + *-ismos* (状态)；词源含义: "自我状态"，指向内的注意；精确定义:
    一种神经发育障碍，以社交沟通困难和限制性重复行为为特征；历史演变: 1943年Kanner首次描述；1944年Asperger独立描述；专业视角 (Professional Perspective): 从"精神分裂症症状"到独立诊断实体'
  source: 02-Mind-Psychology/psychology/clinical/disorder/autism/Autism_Spectrum_Disorder.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 自闭症谱系障碍的核心要点是什么？
  answer: '英文名 (English Term): Autism Spectrum Disorder (ASD)；原始语言/词源 (Original Language): -；词源含义: 谱系强调表现的连续性；精确定义: DSM-5统一诊断，取代之前的多个亚型；历史演变:
    DSM-5(2013)将Asperger、PDD-NOS等合并为ASD；专业视角 (Professional Perspective): 谱系概念反映异质性'
  source: 02-Mind-Psychology/psychology/clinical/disorder/autism/Autism_Spectrum_Disorder.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 阿斯伯格综合征的核心要点是什么？
  answer: '英文名 (English Term): Asperger Syndrome；原始语言/词源 (Original Language): 以Hans Asperger命名；词源含义: 历史诊断名称；精确定义: 高功能自闭症的历史术语；DSM-5已取消；历史演变:
    1944年Asperger描述；1994年纳入DSM-IV；专业视角 (Professional Perspective): 现归入ASD；社区仍常用此称呼'
  source: 02-Mind-Psychology/psychology/clinical/disorder/autism/Autism_Spectrum_Disorder.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 社会情感互惠的核心要点是什么？
  answer: '典型表现示例: 对话中轮换困难；分享兴趣/情感/情绪减少；社交主动性低；对他人情绪反应不典型；从轻度到重度的连续谱: 轻度：对话技巧笨拙 → 重度：极少社交主动'
  source: 02-Mind-Psychology/psychology/clinical/disorder/autism/Autism_Spectrum_Disorder.md
  section: 表2.2 社交沟通和社交互动缺陷详解 (Social Communication Deficits)
- type: concept
  question: 非言语沟通的核心要点是什么？
  answer: '典型表现示例: 眼神接触和身体语言异常；理解/使用手势困难；面部表情和非言语沟通有限或缺失；从轻度到重度的连续谱: 轻度：眼神接触不自然 → 重度：几乎无非言语沟通'
  source: 02-Mind-Psychology/psychology/clinical/disorder/autism/Autism_Spectrum_Disorder.md
  section: 表2.2 社交沟通和社交互动缺陷详解 (Social Communication Deficits)
- type: concept
  question: 建立和维持关系的核心要点是什么？
  answer: '典型表现示例: 调整行为以适应不同社交情境困难；分享想象性游戏困难；交友困难；对同龄人缺乏兴趣；从轻度到重度的连续谱: 轻度：交友困难 → 重度：对人无兴趣'
  source: 02-Mind-Psychology/psychology/clinical/disorder/autism/Autism_Spectrum_Disorder.md
  section: 表2.2 社交沟通和社交互动缺陷详解 (Social Communication Deficits)
- type: concept
  question: 刻板或重复的动作、使用物体或言语的核心要点是什么？
  answer: '典型表现示例: 简单运动刻板（拍手、摇晃）；排列玩具；回声言语；特异性短语；从轻度到重度的连续谱: 轻度：特定重复短语 → 重度：明显刻板动作'
  source: 02-Mind-Psychology/psychology/clinical/disorder/autism/Autism_Spectrum_Disorder.md
  section: 表2.3 限制性重复行为详解 (Restricted Repetitive Behaviors)
- type: concept
  question: 对相同性的坚持、刻板遵守程序的核心要点是什么？
  answer: '典型表现示例: 对微小变化极度痛苦；需要固定路线/程序；刻板思维模式；仪式化行为；从轻度到重度的连续谱: 轻度：偏好固定 → 重度：变化引发严重困扰'
  source: 02-Mind-Psychology/psychology/clinical/disorder/autism/Autism_Spectrum_Disorder.md
  section: 表2.3 限制性重复行为详解 (Restricted Repetitive Behaviors)
- type: concept
  question: 什么是内容索引 | Contents？
  answer: '- [Autism Spectrum Disorder](Autism_Spectrum_Disorder.md)'
  source: 02-Mind-Psychology/psychology/clinical/disorder/autism/INDEX.md
  section: 内容索引 | Contents
- type: concept
  question: 双相情感障碍的核心要点是什么？
  answer: '英文名 (English Term): Bipolar Disorder；原始语言/词源 (Original Language): 拉丁语: *Bi-* (双) + *Polus* (极)；词源含义: "两极的"，指情绪的两极性波动；精确定义:
    以躁狂/轻躁狂发作和抑郁发作交替出现为特征的情感障碍；历史演变: 1980年DSM-III首次使用"双相障碍"取代"躁郁症"；专业视角 (Professional Perspective): 强调情感两极性，区别于单相抑郁'
  source: 02-Mind-Psychology/psychology/clinical/disorder/bipolar/Bipolar_Disorder_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 躁郁症的核心要点是什么？
  answer: '英文名 (English Term): Manic-Depressive Illness；原始语言/词源 (Original Language): 希腊语: *Mania* (μανία, 疯狂) + 拉丁语: *Deprimere*
    (向下压)；词源含义: 躁狂与抑郁并存的疾病；精确定义: 历史术语，现多用"双相障碍"；历史演变: 1899年Kraepelin确立概念；2013年ICD-11仍保留；专业视角 (Professional Perspective): 经典命名，强调两种发作状态'
  source: 02-Mind-Psychology/psychology/clinical/disorder/bipolar/Bipolar_Disorder_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 躁狂的核心要点是什么？
  answer: '英文名 (English Term): Mania；原始语言/词源 (Original Language): 希腊语: *Mania* (μανία)；词源含义: "疯狂"、"狂热"；精确定义: 异常且持续的情绪高涨、夸大或易激惹，伴活动/能量增加；历史演变:
    古希腊已有描述；19世纪精神病学经典概念；专业视角 (Professional Perspective): 是双相I型的诊断必要条件'
  source: 02-Mind-Psychology/psychology/clinical/disorder/bipolar/Bipolar_Disorder_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 双相I型障碍的核心要点是什么？
  answer: '英文名: Bipolar I Disorder；ICD-11代码: 6A60；核心特征: 至少1次躁狂发作；发作要求: ≥1次躁狂发作(≥7天或需住院)；严重程度: 可轻可重；终生患病率: 0.6-1%；临床意义: 经典双相；躁狂是诊断标志'
  source: 02-Mind-Psychology/psychology/clinical/disorder/bipolar/Bipolar_Disorder_Overview.md
  section: 表2.1 双相障碍诊断分类 (Bipolar Disorder Diagnostic Classification)
- type: concept
  question: 双相II型障碍的核心要点是什么？
  answer: '英文名: Bipolar II Disorder；ICD-11代码: 6A61；核心特征: 轻躁狂+抑郁发作；发作要求: ≥1次轻躁狂(≥4天)+≥1次重性抑郁；严重程度: 多为中度；终生患病率: 0.4-1.1%；临床意义:
    不能有躁狂史；抑郁为主要负担'
  source: 02-Mind-Psychology/psychology/clinical/disorder/bipolar/Bipolar_Disorder_Overview.md
  section: 表2.1 双相障碍诊断分类 (Bipolar Disorder Diagnostic Classification)
- type: concept
  question: 环性心境障碍的核心要点是什么？
  answer: '英文名: Cyclothymic Disorder；ICD-11代码: 6A62；核心特征: 慢性情绪波动；发作要求: 2年反复轻躁狂+轻度抑郁症状；严重程度: 轻度；终生患病率: 0.4-1%；临床意义: 双相谱系；可能进展为双相I/II型'
  source: 02-Mind-Psychology/psychology/clinical/disorder/bipolar/Bipolar_Disorder_Overview.md
  section: 表2.1 双相障碍诊断分类 (Bipolar Disorder Diagnostic Classification)
- type: concept
  question: 轻度的核心要点是什么？
  answer: '症状特征: 症状轻微；社会功能基本保持；功能损害: 轻微；精神病性症状: 无；自知力: 部分保留；治疗设置: 门诊；YMRS分数参考: 12-19'
  source: 02-Mind-Psychology/psychology/clinical/disorder/bipolar/Bipolar_Disorder_Overview.md
  section: 表2.2 躁狂发作严重程度分级 (Mania Severity Classification)
- type: concept
  question: 中度的核心要点是什么？
  answer: '症状特征: 症状明显；社会功能受损；功能损害: 中等；精神病性症状: 无；自知力: 受损；治疗设置: 门诊或住院；YMRS分数参考: 20-30'
  source: 02-Mind-Psychology/psychology/clinical/disorder/bipolar/Bipolar_Disorder_Overview.md
  section: 表2.2 躁狂发作严重程度分级 (Mania Severity Classification)
- type: concept
  question: 心境稳定优先的核心要点是什么？
  answer: '英文: Mood Stabilization First；内涵: 稳定心境是治疗基础；实践要点: 心境稳定剂为核心；慎用抗抑郁药；常见误区: 单用抗抑郁药治疗双相抑郁'
  source: 02-Mind-Psychology/psychology/clinical/disorder/bipolar/Bipolar_Disorder_Treatment.md
  section: 表1.1 双相障碍治疗核心原则 (Core Treatment Principles)
- type: concept
  question: 急性期-维持期连续的核心要点是什么？
  answer: '英文: Continuous Care；内涵: 从急性期到维持期的连续管理；实践要点: 急性期控制症状；维持期预防复发；常见误区: 症状好转即停药'
  source: 02-Mind-Psychology/psychology/clinical/disorder/bipolar/Bipolar_Disorder_Treatment.md
  section: 表1.1 双相障碍治疗核心原则 (Core Treatment Principles)
- type: concept
  question: 终生管理视角的核心要点是什么？
  answer: '英文: Lifelong Management；内涵: 双相是慢性复发性疾病；实践要点: 长期用药维持；定期监测；常见误区: 认为"治愈"可停药'
  source: 02-Mind-Psychology/psychology/clinical/disorder/bipolar/Bipolar_Disorder_Treatment.md
  section: 表1.1 双相障碍治疗核心原则 (Core Treatment Principles)
- type: concept
  question: 主要目标的核心要点是什么？
  answer: '躁狂急性期: 控制躁狂症状；抑郁急性期: 缓解抑郁症状；维持期: 预防复发'
  source: 02-Mind-Psychology/psychology/clinical/disorder/bipolar/Bipolar_Disorder_Treatment.md
  section: 表1.2 治疗阶段与目标 (Treatment Phases & Goals)
- type: concept
  question: 时间框架的核心要点是什么？
  answer: '躁狂急性期: 数周；抑郁急性期: 8-12周；维持期: 长期/终生'
  source: 02-Mind-Psychology/psychology/clinical/disorder/bipolar/Bipolar_Disorder_Treatment.md
  section: 表1.2 治疗阶段与目标 (Treatment Phases & Goals)
- type: concept
  question: 一线药物的核心要点是什么？
  answer: '躁狂急性期: 心境稳定剂/抗精神病药；抑郁急性期: 心境稳定剂+抗精神病药；维持期: 心境稳定剂'
  source: 02-Mind-Psychology/psychology/clinical/disorder/bipolar/Bipolar_Disorder_Treatment.md
  section: 表1.2 治疗阶段与目标 (Treatment Phases & Goals)
- type: concept
  question: 锂盐的核心要点是什么？
  answer: '英文名: Lithium；作用机制: 多重机制：GSK-3β抑制、神经保护；躁狂疗效: +++（A级）；抑郁疗效: ++（B级）；维持疗效: +++（A级）；主要副作用: 震颤、甲状腺功能低下、肾功能影响、多尿；监测要求:
    血锂浓度、甲功、肾功'
  source: 02-Mind-Psychology/psychology/clinical/disorder/bipolar/Bipolar_Disorder_Treatment.md
  section: 表2.1 心境稳定剂 (Mood Stabilizers)
- type: concept
  question: 丙戊酸钠的核心要点是什么？
  answer: '英文名: Valproate/Divalproex；作用机制: GABA增强、离子通道调节；躁狂疗效: +++（A级）；抑郁疗效: +（C级）；维持疗效: ++（A级）；主要副作用: 体重增加、脱发、肝功能异常、PCOS；监测要求:
    血药浓度、肝功、血常规'
  source: 02-Mind-Psychology/psychology/clinical/disorder/bipolar/Bipolar_Disorder_Treatment.md
  section: 表2.1 心境稳定剂 (Mood Stabilizers)
- type: concept
  question: 目的的核心要点是什么？
  answer: '自我评估: 识别可能的双相障碍倾向；决定是否寻求专业评估；专业诊断: 确认或排除双相障碍诊断；制定治疗方案'
  source: 02-Mind-Psychology/psychology/clinical/disorder/bipolar/Bipolar_Self_Assessment.md
  section: 表1.1 自我评估vs.专业诊断 (Self-Assessment vs. Professional Diagnosis)
- type: concept
  question: 工具的核心要点是什么？
  answer: '自我评估: 标准化自评量表、症状检核表；专业诊断: 结构化访谈(DIVA-5/SCID)、多来源评估、知情者访谈'
  source: 02-Mind-Psychology/psychology/clinical/disorder/bipolar/Bipolar_Self_Assessment.md
  section: 表1.1 自我评估vs.专业诊断 (Self-Assessment vs. Professional Diagnosis)
- type: concept
  question: 准确性的核心要点是什么？
  answer: '自我评估: 敏感性较好但特异性有限（假阳性较高）；专业诊断: 更全面和准确'
  source: 02-Mind-Psychology/psychology/clinical/disorder/bipolar/Bipolar_Self_Assessment.md
  section: 表1.1 自我评估vs.专业诊断 (Self-Assessment vs. Professional Diagnosis)
- type: concept
  question: 轻躁狂难以自我识别的核心要点是什么？
  answer: '解释: 患者常将轻躁狂视为"最佳状态"或"正常"，不认为是病态'
  source: 02-Mind-Psychology/psychology/clinical/disorder/bipolar/Bipolar_Self_Assessment.md
  section: 表1.2 为什么双相障碍特别需要专业诊断 (Why Professional Diagnosis is Crucial)
- type: concept
  question: 与单相抑郁混淆的核心要点是什么？
  answer: '解释: 约40%的双相患者首诊被误诊为单相抑郁，误诊平均延迟5-10年'
  source: 02-Mind-Psychology/psychology/clinical/disorder/bipolar/Bipolar_Self_Assessment.md
  section: 表1.2 为什么双相障碍特别需要专业诊断 (Why Professional Diagnosis is Crucial)
- type: concept
  question: 什么是2. 心境障碍问卷 (Mood Disorder Questionnaire / MDQ)？
  answer: '**MDQ**是国际上最广泛使用的双相障碍筛查工具，由Hirschfeld等人开发，已被翻译成多种语言。'
  source: 02-Mind-Psychology/psychology/clinical/disorder/bipolar/Bipolar_Self_Assessment.md
  section: 2. 心境障碍问卷 (Mood Disorder Questionnaire / MDQ)
- type: concept
  question: 10的核心要点是什么？
  answer: '问题: 有没有一段时间，您比平时更善于社交或外向，比如半夜打电话给朋友？；是: ☐；否: ☐'
  source: 02-Mind-Psychology/psychology/clinical/disorder/bipolar/Bipolar_Self_Assessment.md
  section: 表2.1 MDQ完整版 (MDQ Full Version)
- type: concept
  question: '[Bipolar Disorder Overview](Bipolar_Disorder_Overview.md)的核心要点是什么？'
  answer: '内容概要: 核心术语、DSM-5/ICD-11分类、躁狂严重程度分级、病程模式、神经生物学机制、诊断标准、鉴别诊断、评估工具、流行病学、风险因素、特殊人群、预后；体量: 295行'
  source: 02-Mind-Psychology/psychology/clinical/disorder/bipolar/INDEX.md
  section: 核心文档
- type: concept
  question: '[Bipolar Disorder Treatment](Bipolar_Disorder_Treatment.md)的核心要点是什么？'
  answer: '内容概要: 急性躁狂治疗、急性抑郁治疗、维持治疗策略、药物治疗（锂盐/丙戊酸/卡马西平/拉莫三嗪/第二代抗精神病药）、物理治疗（ECT）、心理治疗（心理教育/家庭治疗/IPSRT/CBT）、特殊人群；体量: 180行'
  source: 02-Mind-Psychology/psychology/clinical/disorder/bipolar/INDEX.md
  section: 核心文档
- type: concept
  question: '[Bipolar Self-Assessment](Bipolar_Self_Assessment.md)的核心要点是什么？'
  answer: '内容概要: MDQ、HCL-32、BSDS筛查工具使用指南、自我监测方法、就医准备；体量: 269行'
  source: 02-Mind-Psychology/psychology/clinical/disorder/bipolar/INDEX.md
  section: 核心文档
- type: concept
  question: '[Bipolar Depression Management](../../depression/Bipolar_Depression_Management.md)的核心要点是什么？'
  answer: '位置: `clinical/depression/`；内容概要: 双相抑郁vs单相抑郁18维度鉴别、轻躁狂识别要点、双相抑郁治疗原则（心境稳定剂为基础/抗抑郁药谨慎）、混合特征/快速循环/产后管理、自杀风险、长期维持'
  source: 02-Mind-Psychology/psychology/clinical/disorder/bipolar/INDEX.md
  section: 与抑郁专题的交叉
- type: concept
  question: 双相 II 型的核心要点是什么？
  answer: '核心特征: 轻躁狂 + 重性抑郁；诊断门槛: ≥4天轻躁狂；无完全躁狂'
  source: 02-Mind-Psychology/psychology/clinical/disorder/bipolar/INDEX.md
  section: 双相障碍类型速查
- type: concept
  question: 环性心境的核心要点是什么？
  answer: '核心特征: 慢性波动；诊断门槛: 2年以上反复轻躁狂+轻度抑郁'
  source: 02-Mind-Psychology/psychology/clinical/disorder/bipolar/INDEX.md
  section: 双相障碍类型速查
- type: concept
  question: 偏执性精神病的核心要点是什么？
  answer: '英文名 (English Term): Delusional Disorder / Paranoid Psychosis；原始语言/词源 (Original Language): 希腊语: *Paranoia* (παράνοια,
    超越理性)；词源含义: "超出正常思维"；精确定义: 以持续的非奇异性妄想为核心，功能相对保留的精神障碍；历史演变: 19世纪Kraepelin描述为"偏执狂(Paranoia)"；专业视角 (Professional Perspective):
    中国传统称"偏执性精神病"；DSM/ICD称"妄想性障碍"'
  source: 02-Mind-Psychology/psychology/clinical/disorder/delusional-disorder/Delusional_Disorder_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 非奇异性妄想的核心要点是什么？
  answer: '英文名 (English Term): Non-Bizarre Delusion；原始语言/词源 (Original Language): -；词源含义: 内容在现实中可能发生；精确定义: 妄想内容涉及现实中可能发生的情境（如被跟踪、中毒、配偶不忠）；历史演变:
    Jaspers区分了奇异性与非奇异性；专业视角 (Professional Perspective): 区别于精分中的奇异性妄想（如思维被控制）'
  source: 02-Mind-Psychology/psychology/clinical/disorder/delusional-disorder/Delusional_Disorder_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 系统性妄想的核心要点是什么？
  answer: '英文名 (English Term): Systematized Delusion；原始语言/词源 (Original Language): -；词源含义: 结构完整的妄想体系；精确定义: 妄想围绕一个中心主题形成逻辑连贯的信念系统；历史演变:
    偏执性精神病的特征性表现；专业视角 (Professional Perspective): 逻辑性强但前提错误'
  source: 02-Mind-Psychology/psychology/clinical/disorder/delusional-disorder/Delusional_Disorder_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 被害型的核心要点是什么？
  answer: '英文名: Persecutory Type；ICD-11: 6A24.0；核心妄想内容: 被跟踪、监视、投毒、陷害；患病比例: ~50%（最常见）；性别倾向: 男女相当；特殊风险: 可能因"自卫"而攻击"迫害者"'
  source: 02-Mind-Psychology/psychology/clinical/disorder/delusional-disorder/Delusional_Disorder_Overview.md
  section: 表2.2 妄想性障碍亚型 (Subtypes of Delusional Disorder)
- type: concept
  question: 嫉妒型的核心要点是什么？
  answer: '英文名: Jealous Type；ICD-11: 6A24.1；核心妄想内容: 配偶/伴侣不忠；患病比例: ~5-10%；性别倾向: 男性多见；特殊风险: **暴力风险高**——需评估伴侣安全'
  source: 02-Mind-Psychology/psychology/clinical/disorder/delusional-disorder/Delusional_Disorder_Overview.md
  section: 表2.2 妄想性障碍亚型 (Subtypes of Delusional Disorder)
- type: concept
  question: 钟情型的核心要点是什么？
  answer: '英文名: Erotomanic Type；ICD-11: 6A24.2；核心妄想内容: 某人（通常地位较高）深爱自己；患病比例: ~5%；性别倾向: 女性多见；特殊风险: 跟踪骚扰行为；法律问题'
  source: 02-Mind-Psychology/psychology/clinical/disorder/delusional-disorder/Delusional_Disorder_Overview.md
  section: 表2.2 妄想性障碍亚型 (Subtypes of Delusional Disorder)
- type: concept
  question: 妄想类型的核心要点是什么？
  answer: '偏执性精神病: 非奇异性（现实可能发生）；精神分裂症: 可为奇异性（如思维被植入）'
  source: 02-Mind-Psychology/psychology/clinical/disorder/delusional-disorder/Delusional_Disorder_Overview.md
  section: 表3.1 偏执性精神病 vs 精神分裂症 (Delusional Disorder vs. Schizophrenia)
- type: concept
  question: 妄想结构的核心要点是什么？
  answer: '偏执性精神病: 系统化、逻辑连贯；精神分裂症: 可能零散、不连贯'
  source: 02-Mind-Psychology/psychology/clinical/disorder/delusional-disorder/Delusional_Disorder_Overview.md
  section: 表3.1 偏执性精神病 vs 精神分裂症 (Delusional Disorder vs. Schizophrenia)
- type: concept
  question: 治疗联盟优先的核心要点是什么？
  answer: '内涵: 建立信任关系是一切治疗的前提；实践要点: 不直接否定妄想；从患者痛苦入手；特殊挑战: 患者常不认为自己有病；可能视治疗者为"敌人"'
  source: 02-Mind-Psychology/psychology/clinical/disorder/delusional-disorder/Delusional_Disorder_Treatment.md
  section: 表1.1 核心治疗原则 (Core Principles)
- type: concept
  question: 低剂量起始的核心要点是什么？
  answer: '内涵: 对抗精神病药通常比精分需要更低剂量；实践要点: 从最低有效剂量开始；特殊挑战: 高剂量可能破坏治疗联盟'
  source: 02-Mind-Psychology/psychology/clinical/disorder/delusional-disorder/Delusional_Disorder_Treatment.md
  section: 表1.1 核心治疗原则 (Core Principles)
- type: concept
  question: 目标务实的核心要点是什么？
  answer: '内涵: 目标是减轻痛苦和改善功能，而非"消除妄想"；实践要点: 妄想可能持续但不再主导生活；特殊挑战: 完全消除妄想的预期不切实际'
  source: 02-Mind-Psychology/psychology/clinical/disorder/delusional-disorder/Delusional_Disorder_Treatment.md
  section: 表1.1 核心治疗原则 (Core Principles)
- type: concept
  question: 利培酮的核心要点是什么？
  answer: '推荐剂量范围: 1-4mg/d；证据级别: C级（开放研究）；优势: 低剂量有效；催乳素需关注；注意事项: 偏执患者可能更敏感于EPS'
  source: 02-Mind-Psychology/psychology/clinical/disorder/delusional-disorder/Delusional_Disorder_Treatment.md
  section: 表2.1 抗精神病药在偏执性精神病中的应用 (Antipsychotics)
- type: concept
  question: 奥氮平的核心要点是什么？
  answer: '推荐剂量范围: 5-15mg/d；证据级别: C级；优势: 镇静作用可缓解焦虑；注意事项: 代谢风险'
  source: 02-Mind-Psychology/psychology/clinical/disorder/delusional-disorder/Delusional_Disorder_Treatment.md
  section: 表2.1 抗精神病药在偏执性精神病中的应用 (Antipsychotics)
- type: concept
  question: 阿立哌唑的核心要点是什么？
  answer: '推荐剂量范围: 5-15mg/d；证据级别: C级；优势: 代谢风险低；注意事项: 部分患者对激活作用耐受差'
  source: 02-Mind-Psychology/psychology/clinical/disorder/delusional-disorder/Delusional_Disorder_Treatment.md
  section: 表2.1 抗精神病药在偏执性精神病中的应用 (Antipsychotics)
- type: concept
  question: 抗抑郁药的核心要点是什么？
  answer: '适应症: 伴随的抑郁/焦虑；药物选择: SSRI（如舍曲林50-100mg）；注意事项: 不能单用治疗妄想'
  source: 02-Mind-Psychology/psychology/clinical/disorder/delusional-disorder/Delusional_Disorder_Treatment.md
  section: 表2.2 其他药物 (Other Medications)
- type: concept
  question: 苯二氮卓类的核心要点是什么？
  answer: '适应症: 急性焦虑/激越；药物选择: 劳拉西泮1-2mg PRN；注意事项: 短期使用；避免依赖'
  source: 02-Mind-Psychology/psychology/clinical/disorder/delusional-disorder/Delusional_Disorder_Treatment.md
  section: 表2.2 其他药物 (Other Medications)
- type: concept
  question: 自知力完全缺乏的核心要点是什么？
  answer: '原因: 患者对妄想坚信不疑，不认为是病态；应对: 家属/照护者观察是主要识别途径'
  source: 02-Mind-Psychology/psychology/clinical/disorder/delusional-disorder/Delusional_Self_Assessment.md
  section: 表1.1 为什么偏执性精神病极难自我识别
- type: concept
  question: 功能表面正常的核心要点是什么？
  answer: '原因: 除妄想涉及领域外，患者生活/工作可能正常；应对: 周围人可能长期不察觉'
  source: 02-Mind-Psychology/psychology/clinical/disorder/delusional-disorder/Delusional_Self_Assessment.md
  section: 表1.1 为什么偏执性精神病极难自我识别
- type: concept
  question: 妄想"合理"的核心要点是什么？
  answer: '原因: 非奇异性妄想内容现实中可能发生；应对: 关注信念的固定性和证据基础'
  source: 02-Mind-Psychology/psychology/clinical/disorder/delusional-disorder/Delusional_Self_Assessment.md
  section: 表1.1 为什么偏执性精神病极难自我识别
- type: concept
  question: 被害信念的核心要点是什么？
  answer: '具体表现: 反复表达被跟踪、被监视、被下毒、被陷害的信念；☐: ☐有 ☐无；持续时间: ___周/月'
  source: 02-Mind-Psychology/psychology/clinical/disorder/delusional-disorder/Delusional_Self_Assessment.md
