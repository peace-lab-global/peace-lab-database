  question: 什么是剂量与频次建议？
  answer: '- **单次剂量**：约 2‑3 g 森林檀香木块。

    - **频次**：每周 2‑3 次；对焦虑患者可每日一次（不超过 15 min）。

    - **特殊人群**：孕妇、哮喘患者建议降低剂量至 1 g，或改用低刺激性精油替代。'
  source: 02-Mind-Psychology/therapy/incense/Incense_Practices.md
  section: 剂量与频次建议
- type: best_practice
  question: 剂量与频次建议的最佳实践是什么？
  answer: '- **单次剂量**：约 2‑3 g 森林檀香木块。

    - **频次**：每周 2‑3 次；对焦虑患者可每日一次（不超过 15 min）。

    - **特殊人群**：孕妇、哮喘患者建议降低剂量至 1 g，或改用低刺激性精油替代。'
