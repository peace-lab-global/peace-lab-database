- type: concept
  question: 森田疗法的核心要点是什么？
  answer: '英文名 (English Term): Morita Therapy；原始语言/术语 (Original Language): 日: *森田療法* (Morita Ryōhō)；词源含义: 由日本精神科医生森田正马(Morita
    Masatake, 1874-1938)创立；精确定义: 通过"顺应自然"原则,接纳症状并转向建设性行动,治疗神经质症；区分与备注: 与精神分析、行为疗法不同,强调"症状与行动脱钩"；专业视角 (Professional Perspective):
    可视为ACT(接受与承诺疗法)与禅宗思想的东方先驱'
  source: 02-Mind-Psychology/therapy/morita-therapy/Morita_Therapy.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 神经质症的核心要点是什么？
  answer: '英文名 (English Term): Shinkeishitsu / Neurasthenia；原始语言/术语 (Original Language): 日: *神経質* (Shinkeishitsu)；词源含义: 森田定义的一类心理障碍:对身心感觉过度敏感与固着；精确定义:
    包括焦虑、强迫、恐惧症、疑病等,核心是"对症状的症状"；区分与备注: 与DSM焦虑障碍重叠,但强调"完美主义-自我关注"模式；专业视角 (Professional Perspective): 不等于西方的神经衰弱(Neurasthenia),更接近焦虑谱系'
  source: 02-Mind-Psychology/therapy/morita-therapy/Morita_Therapy.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 顺应自然的核心要点是什么？
  answer: '英文名 (English Term): Arugamama (As It Is)；原始语言/术语 (Original Language): 日: *あるがまま* (Arugamama)；词源含义: "顺其自然""本来如是",接纳事物原本面貌；精确定义:
    不试图控制或消除症状,允许焦虑/恐惧存在的同时,做该做的事；区分与备注: 与"无为""放弃"不同,是"接纳+行动"的整合；专业视角 (Professional Perspective): 类似ACT的"接纳与脱钩",禅宗的"放下执着"'
  source: 02-Mind-Psychology/therapy/morita-therapy/Morita_Therapy.md
  section: 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 症状即正常的核心要点是什么？
  answer: '中文解释: 焦虑、恐惧等症状是人类保护性反应,本身无病理；英文表述: "Symptoms are normal protective responses"；临床意义: 去病理化,减少羞耻与抗拒；与西方理论对比: 与疾病模型不同,接近ACT的"症状非敌人"；禅宗/东方思想关联:
    禅宗:"烦恼即菩提",无需排斥妄念'
  source: 02-Mind-Psychology/therapy/morita-therapy/Morita_Therapy.md
  section: 森田疗法的理论基础表 (Theoretical Foundations of Morita Therapy)
- type: concept
  question: 注意即强化的核心要点是什么？
  answer: '中文解释: 越关注症状,症状越明显(精神交互作用)；英文表述: "Attention reinforces symptoms"；临床意义: 治疗中需转移注意,而非分析症状；与西方理论对比: 与暴露疗法不同,不是"面对恐惧直至消退",而是"不理会,去行动"；禅宗/东方思想关联:
    禅宗:"不思善不思恶",不与念头纠缠'
  source: 02-Mind-Psychology/therapy/morita-therapy/Morita_Therapy.md
  section: 森田疗法的理论基础表 (Theoretical Foundations of Morita Therapy)
- type: concept
  question: 行动与症状脱钩的核心要点是什么？
  answer: '中文解释: 可以焦虑地去做事,不等待焦虑消失再行动；英文表述: "Action independent of symptoms"；临床意义: "带症状生活"是康复,而非"无症状"才算康复；与西方理论对比: 与行为激活(BA)、暴露疗法(ERP)相似,但更强调"目的导向"而非"症状消退"；禅宗/东方思想关联:
    禅宗公案:"饥来吃饭,困来即眠",该做就做'
  source: 02-Mind-Psychology/therapy/morita-therapy/Morita_Therapy.md
  section: 森田疗法的理论基础表 (Theoretical Foundations of Morita Therapy)
- type: concept
  question: 第一阶段的核心要点是什么？
  answer: '名称: 绝对卧床期/隔离期；时长: 4-7天；核心活动: 独自在房间卧床,禁止交谈/阅读/娱乐,仅允许进食/如厕；治疗目标: 体验无聊与焦虑,认识到症状的次要性,激发"生的欲望"；患者体验: 极度无聊→焦虑难忍→逐渐平静→渴望活动；现代调整:
    住院式传统森田已罕见,现代多缩短为2-3天,或用"数字排毒周末"替代'
  source: 02-Mind-Psychology/therapy/morita-therapy/Morita_Therapy.md
  section: 森田疗法的四阶段治疗结构表 (Four-Stage Treatment Structure)
- type: concept
  question: 第二阶段的核心要点是什么？
  answer: '名称: 轻作业期；时长: 5-7天；核心活动: 开始简单手工劳动(折纸/抄经/园艺),仍禁止社交与娱乐；治疗目标: 重新连接外部世界,体验"做"的满足,而非"想"的痛苦；患者体验: 初步活动感到吃力→逐渐投入→症状在活动中被忽略；现代调整:
    可用家务、手工艺、园艺等替代,关键是"身体参与"'
  source: 02-Mind-Psychology/therapy/morita-therapy/Morita_Therapy.md
  section: 森田疗法的四阶段治疗结构表 (Four-Stage Treatment Structure)
