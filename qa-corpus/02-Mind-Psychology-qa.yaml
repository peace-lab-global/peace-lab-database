  question: 辩证行为疗法的核心要点是什么？
  answer: '英文术语: Dialectical Behavior Therapy (DBT)；源头语言: English；定义: 由Marsha Linehan开发的认知行为疗法,整合辩证哲学、正念和行为改变策略；临床意义: 治疗边缘性人格障碍和情绪失调的金标准'
