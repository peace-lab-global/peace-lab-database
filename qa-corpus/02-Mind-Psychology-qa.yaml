  section: 内容索引 | Contents
- type: concept
  question: 精神分裂症的核心要点是什么？
  answer: '英文名 (English Term): Schizophrenia；原始语言/词源 (Original Language): 希腊语: *Schizein* (σχίζειν, 分裂) + *Phrēn* (φρήν, 心智)；词源含义:
    "心智的分裂"；精确定义: 以阳性症状、阴性症状和认知损害为特征的慢性精神障碍；历史演变: 1908年Bleuler命名，取代Kraepelin的"早发性痴呆"；专业视角 (Professional Perspective): 强调思维、情感与行为的不协调，非人格分裂'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizophrenia/Schizophrenia_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 阳性症状的核心要点是什么？
  answer: '英文名 (English Term): Positive Symptoms；原始语言/词源 (Original Language): 拉丁语: *Positivus* (附加的)；词源含义: 正常功能之上的"多余"体验；精确定义:
    幻觉、妄想、思维形式障碍、行为紊乱；历史演变: Crow (1980) 提出阳性/阴性二分法；专业视角 (Professional Perspective): 通常对抗精神病药反应较好'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizophrenia/Schizophrenia_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 阴性症状的核心要点是什么？
  answer: '英文名 (English Term): Negative Symptoms；原始语言/词源 (Original Language): 拉丁语: *Negativus* (缺失的)；词源含义: 正常功能的"减少/缺失"；精确定义:
    情感平淡、意志缺乏、言语贫乏、快感缺乏、社交退缩；历史演变: 原发性 vs 继发性阴性症状的区分日益重要；专业视角 (Professional Perspective): 治疗难度大；是功能预后的主要决定因素'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizophrenia/Schizophrenia_Overview.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 精神分裂症的核心要点是什么？
  answer: '英文名: Schizophrenia；ICD-11代码: 6A20；核心特征: ≥2项核心症状（含≥1项阳性症状）；病程要求: ≥6个月（含前驱/残留）；终生患病率: 0.7-1.0%；与精神分裂症的关系: 典型诊断'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizophrenia/Schizophrenia_Overview.md
  section: 表2.1 精神分裂症谱系障碍 (DSM-5/ICD-11)
- type: concept
  question: 分裂情感性障碍的核心要点是什么？
  answer: '英文名: Schizoaffective Disorder；ICD-11代码: 6A21；核心特征: 精神病性症状+心境发作；病程要求: 精神病性症状≥2周独立于心境发作；终生患病率: 0.3%；与精神分裂症的关系: 精分与双相的中间状态'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizophrenia/Schizophrenia_Overview.md
  section: 表2.1 精神分裂症谱系障碍 (DSM-5/ICD-11)
- type: concept
  question: 分裂型人格障碍的核心要点是什么？
  answer: '英文名: Schizotypal Personality Disorder；ICD-11代码: 6D10.5；核心特征: 社交焦虑、古怪信念、奇异行为；病程要求: 持久的人格模式；终生患病率: 3-4%；与精神分裂症的关系:
    遗传相关；谱系轻端'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizophrenia/Schizophrenia_Overview.md
  section: 表2.1 精神分裂症谱系障碍 (DSM-5/ICD-11)
- type: concept
  question: 偏执型的核心要点是什么？
  answer: '英文名: Paranoid Type；核心特征: 以妄想和幻听为主，认知和情感相对保留；DSM-5/ICD-11 现状: 已取消亚型分类；现代维度替代: 阳性症状维度（高）'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizophrenia/Schizophrenia_Overview.md
  section: 表2.2 历史亚型与现代维度 (Historical Subtypes vs. Modern Dimensions)
- type: concept
  question: 青春型的核心要点是什么？
  answer: '英文名: Disorganized/Hebephrenic；核心特征: 思维和行为紊乱、情感不协调；DSM-5/ICD-11 现状: ICD-11保留"青春型" (6A20.1)；现代维度替代: 紊乱维度（高）'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizophrenia/Schizophrenia_Overview.md
  section: 表2.2 历史亚型与现代维度 (Historical Subtypes vs. Modern Dimensions)
- type: concept
  question: 目的的核心要点是什么？
  answer: '自我评估/照护者观察: 识别可能的精神病风险信号；决定是否寻求专业评估；专业诊断: 确认或排除精神分裂症诊断；制定治疗方案'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizophrenia/Schizophrenia_Self_Assessment.md
  section: 表1.1 自我评估 vs 专业诊断 (Self-Assessment vs. Professional Diagnosis)
- type: concept
  question: 工具的核心要点是什么？
  answer: '自我评估/照护者观察: 前驱期筛查量表(PQ-16)、照护者观察清单；专业诊断: 结构化临床访谈(SCID-5)、PANSS、CAARMS/SIPS'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizophrenia/Schizophrenia_Self_Assessment.md
  section: 表1.1 自我评估 vs 专业诊断 (Self-Assessment vs. Professional Diagnosis)
- type: concept
  question: 准确性的核心要点是什么？
  answer: '自我评估/照护者观察: 敏感性较好但特异性有限（假阳性较高）；专业诊断: 更全面和准确'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizophrenia/Schizophrenia_Self_Assessment.md
  section: 表1.1 自我评估 vs 专业诊断 (Self-Assessment vs. Professional Diagnosis)
- type: concept
  question: 自知力缺乏的核心要点是什么？
  answer: '解释: 50-80%的精神分裂症患者对自己的症状缺乏认识，不认为自己有病'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizophrenia/Schizophrenia_Self_Assessment.md
  section: 表1.2 精神分裂症为何特别依赖他人观察 (Why Observer Reports Are Crucial)
- type: concept
  question: 什么是2. 前驱期筛查：PQ-16 (Prodromal Questionnaire-16)？
  answer: '**PQ-16** 是一个由Loewy等人开发的16题自评量表，用于筛查精神病风险综合征（前驱期）。适用于青少年和年轻成人（12-35岁）。'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizophrenia/Schizophrenia_Self_Assessment.md
  section: 2. 前驱期筛查：PQ-16 (Prodromal Questionnaire-16)
- type: concept
  question: 10的核心要点是什么？
  answer: '问题: 我有过奇怪的感觉，如被触摸、拉扯或有什么东西在我身体里移动；是/否: ☐是 ☐否；困扰程度(0-3): ___'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizophrenia/Schizophrenia_Self_Assessment.md
  section: 表2.1 PQ-16 筛查量表 (PQ-16 Screening Questionnaire)
- type: concept
  question: 早期干预的核心要点是什么？
  answer: '英文: Early Intervention；内涵: 缩短未治疗精神病期(DUP)；实践要点: DUP每缩短1个月，预后改善显著；常见误区: 等待症状"确诊"后才开始治疗'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizophrenia/Schizophrenia_Treatment.md
  section: 表1.1 精神分裂症治疗核心原则 (Core Treatment Principles)
- type: concept
  question: 足量足疗程的核心要点是什么？
  answer: '英文: Adequate Dose & Duration；内涵: 确保药物达到治疗浓度并维持足够时间；实践要点: 急性期至少4-6周评估疗效；常见误区: 过早判定无效或频繁换药'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizophrenia/Schizophrenia_Treatment.md
  section: 表1.1 精神分裂症治疗核心原则 (Core Treatment Principles)
- type: concept
  question: 单药治疗优先的核心要点是什么？
  answer: '英文: Monotherapy First；内涵: 首选单一抗精神病药；实践要点: 避免无指征的联合用药；常见误区: 初始即多药联合'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizophrenia/Schizophrenia_Treatment.md
  section: 表1.1 精神分裂症治疗核心原则 (Core Treatment Principles)
- type: concept
  question: 急性期的核心要点是什么？
  answer: '时间范围: 发病-症状控制（4-8周）；主要目标: 控制阳性症状、确保安全；一线干预: 抗精神病药（起始剂量→治疗剂量）；评估指标: PANSS减分≥50%为显效'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizophrenia/Schizophrenia_Treatment.md
  section: 表1.2 治疗阶段与目标 (Treatment Phases & Goals)
- type: concept
  question: 巩固期的核心要点是什么？
  answer: '时间范围: 症状控制后3-6个月；主要目标: 巩固疗效、预防早期复发；一线干预: 继续原有效药物、心理教育；评估指标: 症状稳定、功能开始恢复'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizophrenia/Schizophrenia_Treatment.md
  section: 表1.2 治疗阶段与目标 (Treatment Phases & Goals)
- type: concept
  question: 维持期的核心要点是什么？
  answer: '时间范围: 巩固期后长期；主要目标: 预防复发、促进功能恢复；一线干预: 维持药物（可适当减量）+ 心理社会康复；评估指标: 无复发、功能持续改善'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizophrenia/Schizophrenia_Treatment.md
  section: 表1.2 治疗阶段与目标 (Treatment Phases & Goals)
- type: concept
  question: 氯丙嗪的核心要点是什么？
  answer: '英文名: Chlorpromazine；等效剂量(mg): 100；D2亲和力: 中；镇静作用: 强；EPS风险: 中；其他主要副作用: 低血压、光敏感、胆汁淤积；临床特点: 历史上第一个抗精神病药'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizophrenia/Schizophrenia_Treatment.md
  section: 表2.1 第一代（典型）抗精神病药 (First-Generation Antipsychotics / FGA)
- type: concept
  question: 氟哌啶醇的核心要点是什么？
  answer: '英文名: Haloperidol；等效剂量(mg): 2；D2亲和力: 高；镇静作用: 弱；EPS风险: 高；其他主要副作用: 迟发性运动障碍、QTc延长；临床特点: 急性激越常用；IM起效快'
  source: 02-Mind-Psychology/psychology/clinical/disorder/schizophrenia/Schizophrenia_Treatment.md
  section: 表2.1 第一代（典型）抗精神病药 (First-Generation Antipsychotics / FGA)
