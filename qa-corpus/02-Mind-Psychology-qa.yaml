  section: 目录
- type: concept
  question: 育儿支持的核心要点是什么？
  answer: '说明: 互相认可对方作为父母的角色；生活中的样子: 不在孩子面前说"你爸/妈不行"'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Coparenting_Communication.md
  section: 什么是共同育儿（Coparenting）
- type: concept
  question: 育儿一致性的核心要点是什么？
  answer: '说明: 对基本规则达成共识；生活中的样子: 作业、睡觉时间两边差不多'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Coparenting_Communication.md
  section: 什么是共同育儿（Coparenting）
- type: concept
  question: 分工协调的核心要点是什么？
  answer: '说明: 谁负责什么，说清楚；生活中的样子: 接送、辅导、看病各管哪些'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Coparenting_Communication.md
  section: 什么是共同育儿（Coparenting）
- type: concept
  question: 什么是共同育儿的类型？
  answer: Ahrons（1994）根据对98对离婚夫妻的20年追踪，提出了五种共同育儿关系类型：
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Coparenting_Communication.md
  section: 共同育儿的类型
- type: concept
  question: 简短的核心要点是什么？
  answer: '英文: Brief；含义: 说重点，别展开情绪；实例: "周六下午3点我来接" 而不是长篇大论'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Coparenting_Communication.md
  section: BIFF沟通模型
- type: concept
  question: 信息性的核心要点是什么？
  answer: '英文: Informative；含义: 只传递事实信息；实例: "小明周三发烧了38.5度，吃了美林"'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Coparenting_Communication.md
  section: BIFF沟通模型
- type: concept
  question: 友善的核心要点是什么？
  answer: '英文: Friendly；含义: 语气平和，哪怕内心翻涌；实例: "谢谢你告诉我"'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Coparenting_Communication.md
  section: BIFF沟通模型
- type: concept
  question: 什么是一、离婚决策的核心概念 (Core Concepts)？
  answer: 很多人以为离婚是某个瞬间的决定——吵了一架、发现对方出轨、忍无可忍了。但研究告诉我们，绝大多数离婚其实是一个漫长的心理过程，从第一次冒出"离婚"这个念头，到真正走进民政局，中间可能隔了好几年。
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Decision_Psychology.md
  section: 一、离婚决策的核心概念 (Core Concepts)
- type: concept
  question: 离婚意念的核心要点是什么？
  answer: '英文术语: Divorce Ideation；通俗解释: 脑子里开始出现"要不就离了吧"的想法，可能在堵车时、被气到时、深夜睡不着时冒出来；为什么重要: 这是一个早期信号——就像身体的疼痛在提醒你注意，离婚意念在提醒关系出了问题；引用来源:
    Amato, P. R. (2010).'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Decision_Psychology.md
  section: 一、离婚决策的核心概念 (Core Concepts)
- type: concept
  question: 离婚阈值的核心要点是什么？
  answer: '英文术语: Divorce Threshold；通俗解释: 每个人心里都有一条线——"过了这条线我就走"。有人线很高（几乎什么都能忍），有人线很低（一点不如意就想走）；为什么重要: 阈值受原生家庭、文化背景、经济独立程度、有没有孩子等因素影响；引用来源:
    Levinger, G. (1976).'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Decision_Psychology.md
  section: 一、离婚决策的核心概念 (Core Concepts)
- type: concept
  question: 障碍因素的核心要点是什么？
  answer: '英文术语: Barriers to Divorce；通俗解释: 那些让你想走却走不了的东西：孩子、房子、怕丢人、经济依赖、宗教信仰、"为了孩子忍忍吧"；为什么重要: 很多人不离婚不是因为幸福，而是因为走的代价太高——这种婚姻最容易产生婚内孤独；引用来源:
    Levinger, G. (1976).'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Decision_Psychology.md
  section: 一、离婚决策的核心概念 (Core Concepts)
- type: concept
  question: 情感离婚的核心要点是什么？
  answer: '核心内容: 心慢慢从关系里撤出来了——不想吵了，不想努力了，甚至连失望都懒得感到；你可能的感受: "我对你已经没有感觉了"、冷漠比愤怒更可怕；常被忽视的部分: 常被双方误读为"关系稳定了""不吵架了"；卡住的信号: 对伴侣完全没有情绪反应——好事坏事都无所谓'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Decision_Psychology.md
  section: 2.1 Bohannon六阶段模型
- type: concept
  question: 法律离婚的核心要点是什么？
  answer: '核心内容: 处理法律程序、财产分割、孩子抚养权；你可能的感受: 焦虑、愤怒、无力感、被控制感；常被忽视的部分: 法律过程本身可以是新的创伤来源；卡住的信号: 反复纠缠于法律细节不肯让步，或完全放弃争取'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Decision_Psychology.md
  section: 2.1 Bohannon六阶段模型
- type: concept
  question: 经济离婚的核心要点是什么？
  answer: '核心内容: 从"共同财产"变成"各人各的"——钱怎么分、房子怎么办、以后怎么养活自己；你可能的感受: 恐惧、不安全感，尤其是经济依赖的一方；常被忽视的部分: 经济焦虑可能导致一方接受极不公平的条件只为"快点结束"；卡住的信号:
    离婚后持续陷入经济困境而无法向前'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Decision_Psychology.md
  section: 2.1 Bohannon六阶段模型
- type: concept
  question: 批评→防御→蔑视→石墙的核心要点是什么？
  answer: '行为特征: Gottman"四骑士"反复出现并固化；内心体验: "跟TA说什么都没用"；关系中的表现: 修复尝试(repair attempt)越来越少且越来越失败；还能挽回吗？: 需要高强度专业干预'
  source: 02-Mind-Psychology/relationships/marriage/divorce-psychology/Divorce_Decision_Psychology.md
  section: 2.2 Gottman "情感衰退级联"模型
- type: concept
