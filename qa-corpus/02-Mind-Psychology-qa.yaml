- type: concept
  question: 什么是一、历史渊源？
  answer: 内观（Naikan / 内観）是一种独特的日本自我反省方法，由日本商人 **吉本伊信（Yoshimoto Ishin, 1916–1988）** 于 20 世纪中叶创立。它融合了佛教净土真宗的修行传统与现代心理治疗的需求，从个人灵修实践发展为具有全球影响力的治疗方法。
  source: 02-Mind-Psychology/meditation/naikan-meditation/Naikan_Meditation_Overview.md
  section: 一、历史渊源
- type: concept
  question: 1930s的核心要点是什么？
  answer: '事件: 在母亲引导下接触净土真宗的"身观"（mishirabe）修行——一种严厉的自责式忏悔修行'
  source: 02-Mind-Psychology/meditation/naikan-meditation/Naikan_Meditation_Overview.md
  section: 1.1 吉本伊信（Yoshimoto Ishin）的生平与创立
- type: concept
  question: 核心目的的核心要点是什么？
  answer: '净土真宗身观: 认识自身的罪恶，激发对阿弥陀佛的皈依；吉本伊信内观: 认识人际关系中的接受与给予，激发感恩与责任感'
  source: 02-Mind-Psychology/meditation/naikan-meditation/Naikan_Meditation_Overview.md
  section: 1.2 日本净土真宗背景
- type: concept
  question: 修行方式的核心要点是什么？
  answer: '净土真宗身观: 极端的自责、禁食、不眠；吉本伊信内观: 结构化的回忆，正常饮食睡眠'
  source: 02-Mind-Psychology/meditation/naikan-meditation/Naikan_Meditation_Overview.md
  section: 1.2 日本净土真宗背景
- type: concept
  question: 时间长度的核心要点是什么？
  answer: '净土真宗身观: 通常 3–7 天；吉本伊信内观: 灵活：从日常 15 分钟到集中 7 天'
  source: 02-Mind-Psychology/meditation/naikan-meditation/Naikan_Meditation_Overview.md
