- type: concept
  question: 悲伤的核心要点是什么？
  answer: '英文名 (English Term): Grief；原始语言/词源 (Original Language): 拉丁语: *Gravare* (重压) / 古法语: *Grever*；词源含义: "沉重的负担"；精确定义:
    对丧失的多维度情感反应，包括情绪、认知、行为和躯体成分；区分要点: 悲伤是内在体验；专业视角 (Professional Perspective): 悲伤是自然反应，非病理状态'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Bereavement.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 哀悼的核心要点是什么？
  answer: '英文名 (English Term): Mourning；原始语言/词源 (Original Language): 古英语: *Murnan* (悲伤、哀悼)；词源含义: 表达悲伤的过程；精确定义: 悲伤的外在表达和社会过程；适应丧失的心理工作；区分要点:
    哀悼是外在过程和表达；专业视角 (Professional Perspective): 哀悼是文化塑造的'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Bereavement.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 丧亲的核心要点是什么？
  answer: '英文名 (English Term): Bereavement；原始语言/词源 (Original Language): 古英语: *Bereafian* (被剥夺)；词源含义: "被剥夺所爱之物"；精确定义: 因死亡而失去亲人或重要关系的状态；区分要点:
    特指因死亡导致的丧失；专业视角 (Professional Perspective): 丧亲是客观状态'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Bereavement.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 悲伤工作理论的核心要点是什么？
  answer: '提出者: Sigmund Freud；年代: 1917；核心观点: 悲伤是撤回对逝者投注的心理能量的过程；需要"放下"；对干预的启示: 促进情感释放和脱离；现代评价: 影响深远但"放下"观念受质疑'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Bereavement.md
  section: 表2.1 主要悲伤理论演变 (Evolution of Grief Theories)
- type: concept
  question: 依恋与丧失理论的核心要点是什么？
  answer: '提出者: John Bowlby；年代: 1969-1980；核心观点: 悲伤是依恋行为的表现；经历寻找、绝望、重组阶段；对干预的启示: 依恋视角理解悲伤；现代评价: 奠基性理论；整合依恋与悲伤'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Bereavement.md
  section: 表2.1 主要悲伤理论演变 (Evolution of Grief Theories)
- type: concept
  question: 悲伤阶段模型的核心要点是什么？
  answer: '提出者: Elisabeth Kübler-Ross；年代: 1969；核心观点: 否认→愤怒→讨价还价→抑郁→接受；对干预的启示: 正常化各种反应；现代评价: 广泛传播但被误用；非线性证据不足'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Bereavement.md
  section: 表2.1 主要悲伤理论演变 (Evolution of Grief Theories)
- type: concept
  question: 焦点的核心要点是什么？
  answer: '丧失导向 (Loss-Oriented): 逝者和丧失本身；恢复导向 (Restoration-Oriented): 生活的改变和新角色'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Bereavement.md
  section: 表2.2 双过程模型详解 (Dual Process Model)
- type: concept
  question: 活动的核心要点是什么？
  answer: '丧失导向 (Loss-Oriented): 悲伤工作、情感表达、与逝者的联系；恢复导向 (Restoration-Oriented): 重建日常生活、新身份、新活动'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Bereavement.md
  section: 表2.2 双过程模型详解 (Dual Process Model)
- type: concept
  question: 文化性悲伤的核心要点是什么？
  answer: '英文名 (English Term): Cultural Grief；原始语言/词源 (Original Language): 拉丁语: *Cultura* (耕种)；词源含义: 由文化塑造的悲伤；精确定义: 受特定文化规范、信仰和实践影响的悲伤表达与体验；专业视角
    (Professional Perspective): 悲伤是文化建构的'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Cultural_Spiritual.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 哀悼仪式的核心要点是什么？
  answer: '英文名 (English Term): Mourning Rituals；原始语言/词源 (Original Language): 古英语: *Murnan* (悲伤)；词源含义: 悲伤的仪式化表达；精确定义: 文化规定的悼念死者和表达悲伤的行为规范；专业视角
    (Professional Perspective): 跨文化差异显著'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Cultural_Spiritual.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 死亡态度的核心要点是什么？
  answer: '英文名 (English Term): Death Attitudes；原始语言/词源 (Original Language): 拉丁语: *Aptitudo* (倾向)；词源含义: 对死亡的态度倾向；精确定义: 个人或群体对死亡和临终的认知、情感和行为倾向；专业视角
    (Professional Perspective): 文化和宗教塑造'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Cultural_Spiritual.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 情感表达的核心要点是什么？
  answer: '文化差异范围: 强烈宣泄 ↔ 克制内敛；临床意义: 不能以单一标准评判"健康"表达'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Cultural_Spiritual.md
  section: 表2.1 悲伤文化差异的主要维度 (Major Dimensions of Cultural Differences)
- type: concept
  question: 哀悼期长度的核心要点是什么？
  answer: '文化差异范围: 数天 ↔ 数年；临床意义: 尊重文化规定的时间框架'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Cultural_Spiritual.md
  section: 表2.1 悲伤文化差异的主要维度 (Major Dimensions of Cultural Differences)
- type: concept
  question: 社会支持模式的核心要点是什么？
  answer: '文化差异范围: 个体应对 ↔ 社区集体；临床意义: 识别文化期望的支持方式'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Cultural_Spiritual.md
  section: 表2.1 悲伤文化差异的主要维度 (Major Dimensions of Cultural Differences)
- type: concept
  question: 代表文化的核心要点是什么？
  answer: '个人主义文化: 北美、西欧、澳大利亚；集体主义文化: 东亚、南亚、非洲、拉美'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Cultural_Spiritual.md
  section: 表2.2 个人主义vs.集体主义文化中的悲伤 (Grief in Individualist vs. Collectivist Cultures)
- type: concept
  question: 悲伤视角的核心要点是什么？
  answer: '个人主义文化: 个人心理过程；集体主义文化: 家庭/社区事件'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Cultural_Spiritual.md
  section: 表2.2 个人主义vs.集体主义文化中的悲伤 (Grief in Individualist vs. Collectivist Cultures)
- type: concept
  question: 悲伤辅导的核心要点是什么？
  answer: '英文名 (English Term): Grief Counseling；原始语言/词源 (Original Language): 拉丁语: *Consilium* (建议)；词源含义: 给予建议；精确定义: 帮助正常悲伤过程的支持性干预；专业视角
    (Professional Perspective): 适用于大多数丧亲者'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Intervention_Techniques.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 悲伤治疗的核心要点是什么？
  answer: '英文名 (English Term): Grief Therapy；原始语言/词源 (Original Language): 希腊语: *Therapeia* (治疗)；词源含义: 治愈的服务；精确定义: 针对复杂性/延长哀伤的专业心理治疗；专业视角
    (Professional Perspective): 适用于病理性悲伤'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Intervention_Techniques.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 复杂性悲伤治疗的核心要点是什么？
  answer: '英文名 (English Term): Complicated Grief Treatment (CGT)；原始语言/词源 (Original Language): -；词源含义: Katherine Shear开发的疗法；精确定义:
    针对延长哀伤障碍的结构化循证治疗；专业视角 (Professional Perspective): A级证据支持'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Intervention_Techniques.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 一级：普遍性支持的核心要点是什么？
  answer: '目标人群: 所有丧亲者；干预目标: 正常化；信息；基本支持；干预者: 社区、家人、非专业人员；设置: 自然环境'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Intervention_Techniques.md
  section: 表2.1 悲伤干预层级 (Levels of Grief Intervention)
- type: concept
  question: 二级：支持性辅导的核心要点是什么？
  answer: '目标人群: 需要额外支持的丧亲者；干预目标: 促进健康悲伤过程；干预者: 受训志愿者、悲伤辅导员；设置: 社区机构、支持小组'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Intervention_Techniques.md
  section: 表2.1 悲伤干预层级 (Levels of Grief Intervention)
- type: concept
  question: 三级：悲伤咨询的核心要点是什么？
  answer: '目标人群: 高风险或困难悲伤；干预目标: 预防复杂化；处理困难；干预者: 心理咨询师、社工；设置: 专业咨询机构'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Intervention_Techniques.md
  section: 表2.1 悲伤干预层级 (Levels of Grief Intervention)
- type: concept
  question: 症状严重度的核心要点是什么？
  answer: '低强度干预指征: 正常范围悲伤反应；高强度干预指征: 符合PGD/复杂性悲伤诊断'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Intervention_Techniques.md
  section: 表2.2 干预指征评估 (Assessment for Intervention Level)
- type: concept
  question: 发展性悲伤的核心要点是什么？
  answer: '英文名 (English Term): Developmental Grief；原始语言/词源 (Original Language): 拉丁语: *Developare* (展开)；词源含义: 随发展展开的悲伤；精确定义:
    悲伤理解和表达随认知发展阶段而变化的现象；专业视角 (Professional Perspective): 需要发展敏感的干预'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Lifespan_Developmental.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 丧亲儿童的核心要点是什么？
  answer: '英文名 (English Term): Bereaved Child；原始语言/词源 (Original Language): 古英语: *Bereafian* (被剥夺)；词源含义: 被剥夺亲人的儿童；精确定义: 经历重要依恋对象死亡的未成年人；专业视角
    (Professional Perspective): 高脆弱性群体'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Lifespan_Developmental.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 童年丧亲的核心要点是什么？
  answer: '英文名 (English Term): Childhood Bereavement；原始语言/词源 (Original Language): -；词源含义: 童年时期的丧亲；精确定义: 在童年期(0-18岁)经历父母或重要他人死亡；专业视角
    (Professional Perspective): 长期发展影响'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Lifespan_Developmental.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 不可逆性的核心要点是什么？
  answer: '英文: Irreversibility / Permanence；定义: 死亡是永久的，不能恢复；发展特征: 约5-7岁理解'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Lifespan_Developmental.md
  section: 表2.1 死亡概念的核心维度 (Core Dimensions of Death Concept)
- type: concept
  question: 普遍性的核心要点是什么？
  answer: '英文: Universality；定义: 所有生物都会死亡；发展特征: 约5-9岁理解'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Lifespan_Developmental.md
  section: 表2.1 死亡概念的核心维度 (Core Dimensions of Death Concept)
- type: concept
  question: 非功能性的核心要点是什么？
  answer: '英文: Non-functionality / Cessation；定义: 死后所有身体功能停止；发展特征: 约5-7岁理解'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Lifespan_Developmental.md
  section: 表2.1 死亡概念的核心维度 (Core Dimensions of Death Concept)
- type: concept
  question: 0-2岁的核心要点是什么？
  answer: '死亡理解: 无概念；感受分离；认知特征: 前语言；感觉运动；常见误解: -；支持要点: 保持稳定；一致照料'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Lifespan_Developmental.md
  section: 表2.2 死亡概念随年龄的发展 (Death Concept by Age)
- type: concept
  question: 2-4岁的核心要点是什么？
  answer: '死亡理解: 死亡=离开/睡觉；认知特征: 前运算；自我中心；常见误解: 可逆的；会回来；支持要点: 简单诚实；具体'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Lifespan_Developmental.md
  section: 表2.2 死亡概念随年龄的发展 (Death Concept by Age)
- type: concept
  question: 自杀丧亲的核心要点是什么？
  answer: '英文名 (English Term): Suicide Bereavement / Suicide Loss；原始语言/词源 (Original Language): 拉丁语: *Sui* (自己) + *Cidium*
    (杀)；词源含义: 自我杀害后的丧亲；精确定义: 因亲人自杀而经历的丧亲状态，具有独特的悲伤反应模式；专业视角 (Professional Perspective): 需要专项支持；高污名化'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Special_Loss_Types.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 自杀丧亲者的核心要点是什么？
  answer: '英文名 (English Term): Suicide Loss Survivor / Survivor of Suicide Loss；原始语言/词源 (Original Language): -；词源含义: 经历自杀丧失的存活者；精确定义:
    失去亲人于自杀的人，不包括自杀未遂存活者；专业视角 (Professional Perspective): 术语区分至关重要'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Special_Loss_Types.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 围产期丧失的核心要点是什么？
  answer: '英文名 (English Term): Perinatal Loss；原始语言/词源 (Original Language): 希腊语: *Peri* (周围) + 拉丁语: *Natalis* (出生)；词源含义: 围绕出生期的丧失；精确定义:
    包括流产、死产、新生儿死亡的丧失；专业视角 (Professional Perspective): 常被社会低估'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Special_Loss_Types.md
  section: 1. 核心术语与词源表 (Core Terminology & Etymology)
- type: concept
  question: 为什么"问题的核心要点是什么？
  answer: '自杀丧亲特征: 强烈且持续地寻求答案和解释；与其他丧亲的区别: 比其他丧失更强烈、更难找到答案；临床意义: 接受不确定性是核心任务'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Special_Loss_Types.md
  section: 表2.1 自杀丧亲的独特特征 (Unique Features of Suicide Bereavement)
- type: concept
  question: 内疚与自责的核心要点是什么？
  answer: '自杀丧亲特征: 严重的"如果我当时...""为什么没发现..."；与其他丧亲的区别: 程度更深、更持久；临床意义: 认知重构是关键'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Special_Loss_Types.md
  section: 表2.1 自杀丧亲的独特特征 (Unique Features of Suicide Bereavement)
- type: concept
  question: 污名化的核心要点是什么？
  answer: '自杀丧亲特征: 社会污名、自我污名、感知到的污名；与其他丧亲的区别: 独特存在于自杀丧亲；临床意义: 降低污名至关重要'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Special_Loss_Types.md
  section: 表2.1 自杀丧亲的独特特征 (Unique Features of Suicide Bereavement)
- type: concept
  question: 震惊持续时间的核心要点是什么？
  answer: '自杀丧亲: 较长；其他意外死亡丧亲: 较长；自然死亡丧亲: 较短(若预期)'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Special_Loss_Types.md
  section: 表2.2 自杀丧亲者的悲伤反应比较 (Grief Responses Comparison)
- type: concept
  question: 内疚强度的核心要点是什么？
  answer: '自杀丧亲: 极高；其他意外死亡丧亲: 中高；自然死亡丧亲: 中等'
  source: 02-Mind-Psychology/psychology/special-topics/grief/Grief_Special_Loss_Types.md
  section: 表2.2 自杀丧亲者的悲伤反应比较 (Grief Responses Comparison)
