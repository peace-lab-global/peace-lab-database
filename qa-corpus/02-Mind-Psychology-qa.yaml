  question: 核心期** (第5-10次)的核心要点是什么？
  answer: '核心技术: 焦虑图式重构；操作要点: 双卡组合技术，探索焦虑根源；疗程安排: 每周2次，共6次；效果指标: 焦虑认知模式改变；注意事项: 监控情绪波动幅度'
