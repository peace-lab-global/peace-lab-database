- type: concept
  question: 冥想相关不良效应 (MAE)的核心要点是什么？
  answer: '英文名: Meditation-Related Adverse Effects；精确定义: 由冥想练习引发或加剧的负面心理、躯体或社会功能影响；专业视角: Britton(2021)提出的标准化框架，区别于"修行困难"'
  source: 02-Mind-Psychology/meditation/safety/Meditation_Adverse_Effects.md
  section: 核心术语表
- type: concept
  question: 修行黑夜的核心要点是什么？
  answer: '英文名: Dark Night of the Soul；精确定义: 深度冥想修习中出现的痛苦性心理体验（恐惧、绝望、解离等）；专业视角: 源于十字架的圣约翰，在佛教传统中对应"观智的苦恼"'
  source: 02-Mind-Psychology/meditation/safety/Meditation_Adverse_Effects.md
  section: 核心术语表
- type: concept
  question: 灵性急症的核心要点是什么？
  answer: '英文名: Spiritual Emergency；精确定义: 灵性体验引发的心理危机，表现为现实感丧失、极端情绪等；专业视角: Grof夫妇(1989)提出，区别于精神病性障碍'
  source: 02-Mind-Psychology/meditation/safety/Meditation_Adverse_Effects.md
  section: 核心术语表
- type: concept
  question: 认知域的核心要点是什么？
  answer: '具体表现: 思维内容改变、现实感丧失、认知扭曲、注意力过度/不足；发生率: 中等；风险因素: 高强度练习、缺乏指导；机制假说: DMN过度抑制导致自我参照功能障碍；专业视角: "去自我中心化"过度可能导致"去自我"'
  source: 02-Mind-Psychology/meditation/safety/Meditation_Adverse_Effects.md
  section: 1.1 按症状域分类（Britton MAE框架）
- type: concept
  question: 感知域的核心要点是什么？
  answer: '具体表现: 幻觉样体验（光、声音、身体感觉异常）、时空扭曲；发生率: 低-中；风险因素: 长时间闭关、感觉剥夺；机制假说: 感觉皮层在低输入条件下的自发放电；专业视角: 在佛教传统中称为"禅相"(Nimitta)，本身不是问题'
  source: 02-Mind-Psychology/meditation/safety/Meditation_Adverse_Effects.md
  section: 1.1 按症状域分类（Britton MAE框架）
- type: concept
  question: 情感域的核心要点是什么？
  answer: '具体表现: 恐惧、焦虑、恐慌、抑郁、情感麻木、无法控制的哭泣；发生率: 高；风险因素: 创伤史、情绪压抑；机制假说: 被压抑情绪的涌现、杏仁核激活；专业视角: 最常见的不良反应类型'
  source: 02-Mind-Psychology/meditation/safety/Meditation_Adverse_Effects.md
  section: 1.1 按症状域分类（Britton MAE框架）
- type: concept
  question: 1级 (轻度)的核心要点是什么？
  answer: '定义: 暂时不适，不影响日常功能，自行缓解；示例: 冥想中短暂焦虑、轻微头痛、肌肉酸痛；处理: 正常化、继续练习、微调技术；专业视角: 大多数不良反应属此级别，是"成长痛"'
  source: 02-Mind-Psychology/meditation/safety/Meditation_Adverse_Effects.md
  section: 1.2 按严重程度分级
- type: concept
  question: 2级 (中度)的核心要点是什么？
  answer: '定义: 持续不适，部分影响日常功能，需调整练习；示例: 持续数日的情绪波动、睡眠紊乱、注意力难以集中；处理: 减量练习、切换冥想类型、寻求指导；专业视角: 需要教师/执行师的关注与个性化调整'
  source: 02-Mind-Psychology/meditation/safety/Meditation_Adverse_Effects.md
  section: 1.2 按严重程度分级
- type: concept
  question: 什么是1. 概述？
  answer: 冥想危机（Meditation Crisis）指在冥想练习过程中或之后出现的急性心理或躯体反应，导致个体功能严重受损或出现安全风险。本方案为冥想教师、闭关组织者和执行师提供系统化的识别、评估和应对框架。
  source: 02-Mind-Psychology/meditation/safety/Meditation_Crisis_Protocol.md
  section: 1. 概述
- type: concept
  question: Level 1的核心要点是什么？
  answer: '名称: 轻度不适（Mild Distress）；特征描述: 短暂的情绪波动、轻微身体不适，练习后自行缓解；响应级别: 教师常规支持'
  source: 02-Mind-Psychology/meditation/safety/Meditation_Crisis_Protocol.md
  section: 2.1 四级危机分级系统
- type: concept
  question: Level 2的核心要点是什么？
  answer: '名称: 中度困扰（Moderate Difficulty）；特征描述: 持续数小时至数天的焦虑/情绪涌现/睡眠困难，功能轻度受影响；响应级别: 教师深度支持 + 练习调整'
  source: 02-Mind-Psychology/meditation/safety/Meditation_Crisis_Protocol.md
  section: 2.1 四级危机分级系统
- type: concept
  question: Level 3的核心要点是什么？
  answer: '名称: 严重危机（Severe Crisis）；特征描述: 持续解离、严重焦虑/恐慌、现实感丧失、无法维持日常功能；响应级别: 专业评估 + 可能转介'
  source: 02-Mind-Psychology/meditation/safety/Meditation_Crisis_Protocol.md
  section: 2.1 四级危机分级系统
