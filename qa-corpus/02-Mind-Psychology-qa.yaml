  question: 辩证法的核心要点是什么？
  answer: '英文术语: Dialectics；源头语言: Greek (dialektikḗ)；定义: 通过整合对立面(正题和反题)达到综合(合题)的哲学方法；临床意义: DBT核心思维方式:接纳与改变的平衡'
