  answer: '独处表现: 可以独处但有焦虑；需要确认；关系表现: 独立但时常摇摆；典型语句: "我可以独处，但你会想我吗？"'
  source: 02-Mind-Psychology/psychology/social/solitude/Solitude_Relationships.md
  section: 1.3 自我分化(Differentiation of Self)
- type: concept
  question: 高分化的核心要点是什么？
  answer: '独处表现: 独处是自然的、滋养的；关系表现: 亲密而不融合；独立而不疏离；典型语句: "我爱你，我也需要我自己的空间"'
  source: 02-Mind-Psychology/psychology/social/solitude/Solitude_Relationships.md
  section: 1.3 自我分化(Differentiation of Self)
- type: concept
  question: 自我整合的核心要点是什么？
  answer: '说明: 将关系体验整合进自我叙事；缺乏独处的后果: 失去自我感；"我变成了我们"'
  source: 02-Mind-Psychology/psychology/social/solitude/Solitude_Relationships.md
  section: 2.1 为什么即使是热恋中的人也需要独处
- type: concept
  question: 25-36的核心要点是什么？
  answer: '等级: 发展中；建议起点: 从第3章"短独处"开始，回顾第1-2章'
