  question: 什么是1. 前行五加行的完整框架？
  answer: 前行（Ngondro / sNgon Gro）是藏传佛教（特别是宁玛派、噶举派、萨迦派、格鲁派）进入正行（本尊瑜伽、大圆满、大手印）之前必须完成的基础修持。其总量通常为各加行十万遍（共约五十万遍），故称**五十万加行**。
