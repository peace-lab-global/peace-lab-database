  question: 症状评估的核心要点是什么？
  answer: '时间: 详细症状和功能评估；核心任务: 结构化临床访谈；技术重点: 明确症状严重程度；预期目标: 回避谈论症状；常见挑战: 渐进暴露、验证支持；应对策略: 全面评估指导治疗规划'
  source: 02-Mind-Psychology/therapy/ipt-therapy/IPT_Interpersonal_Psychotherapy_Overview.md
