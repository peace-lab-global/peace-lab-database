- type: concept
  question: 第一孕期（1-12周）的核心要点是什么？
  answer: '生理变化: 激素剧变；疲劳；恶心；心理变化: 兴奋与焦虑交织；对胎儿健康的担忧；冥想切入点: 应对恶心；焦虑管理；与胎儿建立连接'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Pregnancy.md
  section: 1.1 孕期各阶段的核心变化
- type: concept
  question: 第二孕期（13-27周）的核心要点是什么？
  answer: '生理变化: 体力恢复；腹部隆起；胎动开始；心理变化: 情绪相对稳定；身体形象变化；冥想切入点: 身体接纳；胎动觉察；感恩练习'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Pregnancy.md
  section: 1.1 孕期各阶段的核心变化
- type: concept
  question: 第三孕期（28-40周）的核心要点是什么？
  answer: '生理变化: 身体负担加重；睡眠困难；假性宫缩；心理变化: 对分娩的焦虑增加； nesting 本能；冥想切入点: 分娩准备；疼痛预演；放松练习'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Pregnancy.md
  section: 1.1 孕期各阶段的核心变化
- type: concept
  question: 产前抑郁的核心要点是什么？
  answer: '发生率: 10-15%；冥想干预: MBCT改良版；自我慈悲'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Pregnancy.md
  section: 1.2 孕期常见心理挑战
- type: concept
  question: 分娩恐惧（Tokophobia）的核心要点是什么？
  answer: '发生率: 10-22%；冥想干预: 分娩正念课程；暴露-接纳'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Pregnancy.md
  section: 1.2 孕期常见心理挑战
- type: concept
  question: 《正念父母，压力下的禅师》的核心要点是什么？
  answer: '作者: Jon Kabat-Zinn；推荐理由: 将禅修用于减轻生活压力。；重点章节: 彻底放松。；职场应用: 职场与生活平衡。；疗愈益处: 显著降低皮质醇。；专业视角 (Professional Perspective):
    正念减压 (MBSR) 的临床基础。；网页地址 (URL): [Full Catastrophe Living](https://www.amazon.com/Full-Catastrophe-Living-Revised-Mindfulness/dp/0345536932)'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Resources.md
  section: core Meditation Books (核心书籍表 - 冥想/禅修)
- type: concept
  question: 《觉察的艺术》的核心要点是什么？
  answer: '作者: Thich Nhat Hanh；推荐理由: 生活禅的最佳入门。；重点章节: 吃橘子禅。；职场应用: 职场正念饮食、正念工作。；疗愈益处: 体验当下的奇迹与平静。；专业视角 (Professional Perspective):
    强调即刻的一行三昧。；网页地址 (URL): [Plum Village](https://plumvillage.org/)'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Resources.md
  section: core Meditation Books (核心书籍表 - 冥想/禅修)
- type: concept
  question: 《禅者的初心》的核心要点是什么？
  answer: '作者: 铃木大拙；推荐理由: 理解禅修的真谛。；重点章节: 初心、不动心。；职场应用: 培养面对职场剧变的稳定性。；疗愈益处: 消除功利心导致的紧张。；专业视角 (Professional Perspective): 经典禅宗语录的现代解读。；网页地址
    (URL): [Shunryu Suzuki](https://shunryusuzuki.com/)'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Resources.md
  section: core Meditation Books (核心书籍表 - 冥想/禅修)
- type: concept
  question: 《当下力量》的核心要点是什么？
  answer: '作者: Eckhart Tolle；禅修流派: 现代灵性；核心观点: 只有当下是真实的。；适合人群: 脑中杂念多者。；疗愈应用: 终止强迫性反刍思考。；专业视角: DMN 网络抑制的通俗实践。'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Resources.md
  section: Zen & Meditation Recommended List (禅修书籍推荐表)
- type: concept
  question: 《当下的修行》的核心要点是什么？
  answer: '作者: Pema Chödrön；禅修流派: 藏传佛教；核心观点: 欢迎困难环境。；适合人群: 面临职业危机者。；疗愈应用: 培养勇气与自慈悲。；专业视角: 认知再评估 (Reappraisal) 的灵性版本。'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Resources.md
  section: Zen & Meditation Recommended List (禅修书籍推荐表)
- type: concept
  question: 《万象禅心》的核心要点是什么？
  answer: '作者: Ajahn Chah；禅修流派: 原始佛教；核心观点: 一切如其所属。；适合人群: 顺其自然追随者。；疗愈应用: 解除控制欲。；专业视角: 接纳与承诺疗法 (ACT) 的源泉。'
  source: 02-Mind-Psychology/meditation/overview/Meditation_Resources.md
  section: Zen & Meditation Recommended List (禅修书籍推荐表)
