  section: 目录导航
- type: concept
  question: 个体内部的核心要点是什么？
  answer: '核心机制: 依恋模式、认知偏差、神经易感性；典型表现: 长期自我否定、社交威胁过敏；持续时间倾向: 慢性为主；干预主攻方向: 心理治疗、依恋修复'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Sources_Etiology.md
  section: 1.2 来源类型学总览
- type: concept
  question: 关系与人际的核心要点是什么？
  answer: '核心机制: 亲密缺失、网络断裂、角色丧失；典型表现: 无人倾诉、被排斥感、归属感缺失；持续时间倾向: 情境性或慢性；干预主攻方向: 关系重建、社交技能'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Sources_Etiology.md
  section: 1.2 来源类型学总览
- type: concept
  question: 社会结构的核心要点是什么？
  answer: '核心机制: 城市化、阶层固化、社区瓦解；典型表现: 邻里陌生化、流动性过高；持续时间倾向: 结构性慢性；干预主攻方向: 社区干预、政策改善'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Sources_Etiology.md
  section: 1.2 来源类型学总览
- type: concept
  question: 焦虑型依恋的核心要点是什么？
  answer: '形成条件: 养育者回应不一致；孤独产生机制: 过度渴望亲密却反复感到不够；典型内心独白: "TA 是不是不爱我了？"；关系中的表现: 追逐、索取、过度警觉'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Sources_Etiology.md
  section: 2.1 依恋模式与早期经验
- type: concept
  question: 回避型依恋的核心要点是什么？
  answer: '形成条件: 养育者冷淡或拒绝；孤独产生机制: 压抑需求导致深层孤立；典型内心独白: "我不需要任何人"；关系中的表现: 退缩、情感关闭、假性独立'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Sources_Etiology.md
  section: 2.1 依恋模式与早期经验
- type: concept
  question: 恐惧型依恋的核心要点是什么？
  answer: '形成条件: 养育者既是安全又是威胁；孤独产生机制: 渴望又恐惧，进退两难；典型内心独白: "我想靠近但我怕受伤"；关系中的表现: 反复在亲密与退缩间摇摆'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Sources_Etiology.md
  section: 2.1 依恋模式与早期经验
- type: concept
  question: 高神经质的核心要点是什么？
  answer: '与孤独的关联机制: 情绪不稳定导致关系摩擦增多；表现特征: 过度敏感、灾难化解读；风险程度: 高'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Sources_Etiology.md
  section: 2.2 人格特质与心理倾向
- type: concept
  question: 孤独的核心要点是什么？
  answer: '英文标准术语: Loneliness；定义: 一种主观的情绪状态，指个体感知到的实际社会关系与其期望的社会关系之间的差距，表现为被孤立、不被理解和缺乏有意义连接的感受；操作化指标: UCLA孤独量表得分、主观孤独体验报告；使用场景:
    临床诊断、研究测量、干预评估；相关文献: Weiss (1973), Cacioppo & Patrick (2008)'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Terminology_Standards.md
  section: 一、基础术语体系
- type: concept
  question: 社交孤立的核心要点是什么？
  answer: '英文标准术语: Social Isolation；定义: 客观层面的社会联系缺乏，指个体实际拥有的社会关系网络规模小、互动频率低、社会参与度不足的状态；操作化指标: 社交网络规模、互动频率、参与活动数量；使用场景: 流行病学调查、公共卫生评估；相关文献:
    House et al. (1988)'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Terminology_Standards.md
  section: 一、基础术语体系
- type: concept
  question: 独处的核心要点是什么？
  answer: '英文标准术语: Solitude；定义: 个体主动选择的、具有积极意义的独自状态，通常伴随着内心的平静、创造力激发或自我反思；操作化指标: 独处时间、独处满意度、独处动机；使用场景: 心理健康促进、创造力研究；相关文献:
    Long & Averill (2003)'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Terminology_Standards.md
  section: 一、基础术语体系
- type: concept
  question: 情绪性孤独的核心要点是什么？
  answer: '中文名称: 情感孤独；英文术语: Emotional Loneliness；核心特征: 缺乏深度情感连接和亲密关系；典型表现: 缺少知心朋友、亲密伴侣；测量工具: De Jong Gierveld量表(情感维度)'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Terminology_Standards.md
  section: 一、基础术语体系
- type: concept
  question: 社交性孤独的核心要点是什么？
  answer: '中文名称: 社交孤独；英文术语: Social Loneliness；核心特征: 缺乏稳定的社交网络和群体归属；典型表现: 缺少社交圈子、群体活动参与；测量工具: De Jong Gierveld量表(社交维度)'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Terminology_Standards.md
  section: 一、基础术语体系
- type: concept
  question: 存在性孤独的核心要点是什么？
  answer: '中文名称: 存在孤独；英文术语: Existential Loneliness；核心特征: 对人类存在本质孤独的哲学体验；典型表现: 面对死亡、自由、无意义的焦虑；测量工具: 存在主义心理测量工具'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Terminology_Standards.md
  section: 一、基础术语体系
- type: concept
  question: UCLA孤独量表的核心要点是什么？
  answer: '英文全称: UCLA Loneliness Scale；标准缩写: UCLA-LS；开发年份: 1980；条目数: 20项；信度系数: α=0.89-0.94'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Terminology_Standards.md
  section: 二、测量工具标准化术语
- type: concept
  question: 孤独体验量表的核心要点是什么？
  answer: '英文全称: Loneliness Experience Scale；标准缩写: LES；开发年份: 1981；条目数: 35项；信度系数: α=0.85-0.90'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Terminology_Standards.md
  section: 二、测量工具标准化术语
- type: concept
  question: 个体层面(内在)的核心要点是什么？
  answer: '主要目标: 识别并修正与孤独相关的核心信念与情绪模式；关键问题: “我是不是天生不讨人喜欢?”；干预模块: CBT认知重构、情绪调节训练、自我慈悲练习；专业视角 (Professional Perspective): 若不处理自我图式,单纯增加社交活动容易重演失败经验'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Treatment.md
  section: 综合治疗框架表 (Integrated Treatment Framework for Loneliness)
- type: concept
  question: 关系层面(人际)的核心要点是什么？
  answer: '主要目标: 提升建立与维持亲密关系的能力；关键问题: “我想要亲近,但一靠近就乱套/退缩”；干预模块: 人际治疗(IPT)、依恋取向治疗、社交技能训练；专业视角 (Professional Perspective): 孤独本质上是关系议题,需在真实关系中修复,而非仅在头脑中'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Treatment.md
  section: 综合治疗框架表 (Integrated Treatment Framework for Loneliness)
- type: concept
  question: 系统层面(家庭/婚姻)的核心要点是什么？
  answer: '主要目标: 修复婚内孤独、增强伴侣间情感安全；关键问题: “我们如何从室友回到伴侣?”；干预模块: EFT情绪聚焦夫妻治疗、Gottman方法、结构式家庭治疗；专业视角 (Professional Perspective):
    婚内孤独常是系统问题,责任不在单一方,需共同工作'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Treatment.md
  section: 综合治疗框架表 (Integrated Treatment Framework for Loneliness)
- type: concept
  question: 孤独信念识别与重构的核心要点是什么？
  answer: '英文名 (English Term): Cognitive Restructuring of Loneliness Beliefs；适用对象: 慢性孤独、自我否定显著者；核心步骤: 识别典型自动想法(如“没人会喜欢真实的我”)→收集证据→发展更平衡信念；典型作业:
    记录一周内所有“被拒绝”想法,区分事实与推测'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Treatment.md
  section: 孤独的认知行为疗法技术表 (CBT for Loneliness)
- type: concept
  question: 社交行为实验的核心要点是什么？
  answer: '英文名 (English Term): Behavioral Experiments in Social Contexts；适用对象: 害怕社交、预期最坏结果者；核心步骤: 设计“小步试探”社交行为(如向同事打招呼)→事前预测→事后检验；典型作业:
    每日一次小社交尝试,记录预期 vs 实际反馈'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Treatment.md
  section: 孤独的认知行为疗法技术表 (CBT for Loneliness)
- type: concept
  question: 暴露与回避减少的核心要点是什么？
  answer: '英文名 (English Term): Exposure & Avoidance Reduction；适用对象: 长期退缩、社交焦虑伴孤独者；核心步骤: 制定“社交回避层级”,从中低难度场景逐步暴露；典型作业: 参加一个线下小组活动,允许自己只在场不必表现完美'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Treatment.md
  section: 孤独的认知行为疗法技术表 (CBT for Loneliness)
- type: concept
  question: 人际心理治疗的核心要点是什么？
  answer: '中文名称: 人际治疗(IPT)；英文名: Interpersonal Psychotherapy；主要焦点: 角色转变、哀伤、角色冲突、人际缺陷；典型应用: 丧亲后孤独、离婚后重建社交、自我价值受损；专业要点: 通过“谁在你的生命圈中”图示,识别支持缺口,逐步填补'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Treatment.md
  section: 人际与关系取向干预表 (Interpersonal & Relational Interventions)
- type: concept
  question: 依恋取向个体治疗的核心要点是什么？
  answer: '中文名称: 依恋修复；英文名: Attachment-Based Individual Therapy；主要焦点: 早期关系模式如何影响当前孤独；典型应用: 反复进入不健康关系或长期单身者；专业要点: 将“孤独”视为未满足的依恋需求信号,而非人格缺陷'
  source: 02-Mind-Psychology/psychology/social/loneliness/Loneliness_Treatment.md
  section: 人际与关系取向干预表 (Interpersonal & Relational Interventions)
- type: concept
