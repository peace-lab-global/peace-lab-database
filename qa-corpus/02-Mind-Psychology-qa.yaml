  question: C-SSRS的核心要点是什么？
  answer: '英文全称: Columbia-Suicide Severity Rating Scale；类型: 结构化访谈；题目/时间: 6+项/10-15分钟；评估内容: 意念类型、强度、行为；适用场景: 临床、研究、筛查；培训要求:
    1-2小时；信效度: 金标准'
