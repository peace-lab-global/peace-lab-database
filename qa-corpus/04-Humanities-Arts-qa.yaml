- type: concept
  question: 第二交响曲"复活"的核心要点是什么？
  answer: '创作年份: 1894；调性/时长: c小调/80分钟；核心主题: 死亡、审判、复活；疗愈功能: 深度转化、意义重建、存在肯定；适应症: 丧亲、存在危机、濒死体验；使用阶段: 高峰体验；循证等级: B；专业洞察: GIM深度程序核心曲目'
