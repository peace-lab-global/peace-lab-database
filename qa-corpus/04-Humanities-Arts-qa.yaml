- type: concept
  question: 什么是一、总体评价？
  answer: 莱恩的书是20世纪精神医学的里程碑——他反对当时主流的"生物医学模型"，提出了一种**存在主义的精神病学**：精神病患者的"疯狂"不是大脑的故障，而是**对"虚假自我"和"真实自我"之间不可调和冲突的回应**。
  source: 04-Humanities-Arts/literature/world-nonfiction/psychology-existential/the-divided-self.md
  section: 一、总体评价
- type: concept
  question: 什么是三、阅读体验？
  answer: '**评分：9.0/10** — 莱恩的书改变了整个精神医学的 landscape。即使在他去世几十年后，他的洞察仍然是深刻的。对于任何对"精神病的本质"有兴趣的人来说，这是必读书。对于普通人来说，它也能帮助你理解自己的"分裂"——我们都有的那种"在社会面具和真实自我之间摇摆"的经验。'
  source: 04-Humanities-Arts/literature/world-nonfiction/psychology-existential/the-divided-self.md
  section: 三、阅读体验
- type: concept
  question: 什么是一、总体评价？
  answer: 如果你认为对死亡的恐惧是现代人的"专利"，读读《吉尔伽美什史诗》。四千年前的人就已经在问同样的问题："我为什么会死？有没有办法不死？"吉尔伽美什的故事是人类对死亡最早的文学回应——不是宗教的、不是哲学的，而是**赤裸裸的、情感性的、个人的**。
  source: 04-Humanities-Arts/literature/world-nonfiction/psychology-existential/the-epic-of-gilgamesh.md
  section: 一、总体评价
- type: concept
  question: 什么是三、阅读体验？
  answer: '**评分：8.5/10** — 这本书的伟大之处在于它的"古老"——四千年前的文字仍然能击中你的心脏。Stephen Mitchell 的现代英译本是最佳选择——它保留了史诗的力量，同时让语言变得 accessible。对于任何对"人类如何面对死亡"有兴趣的人来说，这是起源性的文本。'
  source: 04-Humanities-Arts/literature/world-nonfiction/psychology-existential/the-epic-of-gilgamesh.md
  section: 三、阅读体验
- type: concept
  question: 什么是一、总体评价？
  answer: 即使你不是心理治疗师，这本书也值得阅读——因为亚隆讨论的每一个"临床主题"，本质上都是**人际关系的核心主题**。他教你如何倾听、如何提问、如何在亲密关系中保持边界、如何面对冲突——这些技能对任何人都有用。
  source: 04-Humanities-Arts/literature/world-nonfiction/psychology-existential/the-gift-of-therapy.md
  section: 一、总体评价
- type: concept
  question: 什么是三、阅读体验？
  answer: '**评分：8.7/10** — 这本书的结构（85封短小的信）非常适合碎片化阅读——你可以在地铁上读一封，然后在一天中慢慢消化。亚隆的写作一如既往地温暖、智慧、不做作。对于任何对"如何帮助他人"有兴趣的人，这是必读书。'
  source: 04-Humanities-Arts/literature/world-nonfiction/psychology-existential/the-gift-of-therapy.md
  section: 三、阅读体验
- type: concept
  question: 什么是一、总体评价？
  answer: 坎贝尔的书回答了一个人类学上的核心问题：**为什么相隔万里的不同文化会讲出如此相似的故事？** 他的答案是：因为这些故事不是某个文化的"发明"，而是人类心灵的"发现"——它们反映了意识深处的普遍结构，荣格所说的"集体无意识"中的"原型"。
  source: 04-Humanities-Arts/literature/world-nonfiction/psychology-existential/the-hero-with-a-thousand-faces.md
  section: 一、总体评价
- type: concept
  question: 什么是三、阅读体验？
  answer: '**评分：8.5/10** — 坎贝尔的书是神话学的"圣经"，但它的写作有时候过于 encyclopedic——大量的神话故事罗列可能会让非专业读者感到 overwhelm。建议结合他后期的通俗作品（如《神话的力量》《追随直觉之路》）一起阅读，以获得更流畅的体验。对于作家、电影制作人、心理治疗师和任何对"叙事结构"有兴趣的人来说，这是必读书。'
  source: 04-Humanities-Arts/literature/world-nonfiction/psychology-existential/the-hero-with-a-thousand-faces.md
  section: 三、阅读体验
- type: concept
  question: 什么是总体评价？
  answer: 《人的境况》是汉娜·阿伦特最系统、最深刻的政治哲学著作，也是20世纪政治思想领域最具影响力的文本之一。阿伦特在这部著作中，以惊人的原创性和概念 precision，重构了西方政治思想传统中被遗忘和扭曲的核心维度——"行动"(action)与人的复数性(plurality)。在一个极权主义的创伤刚刚过去、消费社会正在兴起的时代，阿伦特以一位流亡思想家的深邃眼光，追问着最本原的问题：人作为复数的存在者，在公共世界中共同生活的条件是什么？何种生活方式配得上人之尊严？何种政治形态能够容纳人的自由与差异？
  source: 04-Humanities-Arts/literature/world-nonfiction/psychology-existential/the-human-condition.md
  section: 总体评价
- type: concept
  question: 什么是阅读体验？
  answer: 阅读《人的境况》是一次智识上的脱胎换骨。阿伦特的文本以其概念的密度和论证的精确而著称，每一个段落都需要缓慢地咀嚼。但正是这种"缓慢"，使阅读变成了一种思想上的修行——阿伦特不是在向读者"传达"现成的结论，而是在邀请读者与她一起进行概念的重构。
  source: 04-Humanities-Arts/literature/world-nonfiction/psychology-existential/the-human-condition.md
  section: 阅读体验
