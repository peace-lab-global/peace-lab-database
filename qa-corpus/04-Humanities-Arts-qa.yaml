- type: concept
  question: 什么是概述 (Overview)？
  answer: 唐诗是中国古典文学史上最为辉煌的诗歌时期，历时近三百年(618-907年)，涌现了两千多位诗人，创作了五万余首诗歌。唐代诗歌以其题材广泛、风格多样、技巧精湛、意境深远而著称，代表了中国古典诗歌艺术的最高成就，对后世文学产生了深远影响。
  source: 04-Humanities-Arts/literature/chinese-classical-literature/tang-poetry/Tang_Poetry_Overview.md
  section: 概述 (Overview)
- type: concept
  question: 什么是概述 (Overview)？
  answer: 杜甫(712-770)，字子美，自号少陵野老，祖籍襄阳(今湖北襄樊)，出生于河南巩县，是盛唐向中唐过渡时期最杰出的现实主义诗人，被后世尊称为"诗圣"。其诗歌以"沉郁顿挫"为主要风格特征，内容广泛涉及社会现实、民生疾苦、政治得失等方面，体现了深厚的忧国忧民情怀和高度的社会责任感，代表了中国古代现实主义诗歌的最高成就。
  source: 04-Humanities-Arts/literature/chinese-classical-literature/tang-poetry/authors/Du_Fu_Complete_Profile.md
  section: 概述 (Overview)
- type: concept
