- type: concept
  question: 创伤重现的核心要点是什么？
  answer: '易感人群: PTSD患者性侵幸存者暴力目击者；潜在后果: Flashback解离惊恐发作重新创伤；预防策略: 详细内容警告分段观看准备安全计划；应急预案: 立即停止接地技术联系治疗师；专业视角 (Professional
    Perspective): 创伤重现是真实神经生物学事件;需专业处理'
  source: 04-Humanities-Arts/media/media-therapy/Media_Safety_Ethics.md
  section: Media Trigger Warnings (媒体触发警示表)
- type: concept
  question: 自杀触发的核心要点是什么？
  answer: '易感人群: 自杀意念史抑郁症青少年；潜在后果: 自杀意念增强模仿行为维特效应；预防策略: 避免详细方法呈现提供资源强调希望；应急预案: 自杀风险评估联系危机热线；专业视角 (Professional Perspective):
    维特效应真实存在;媒体有社会责任'
  source: 04-Humanities-Arts/media/media-therapy/Media_Safety_Ethics.md
  section: Media Trigger Warnings (媒体触发警示表)
- type: concept
  question: 饮食障碍触发的核心要点是什么？
  answer: '易感人群: 饮食障碍史身体意象障碍；潜在后果: 限制增加清洗行为复发；预防策略: 避免Thinspiration内容警告身体相关场景；应急预案: 停止观看联系支持系统；专业视角 (Professional Perspective):
    媒体是身体意象主要影响源;需批判性观看'
  source: 04-Humanities-Arts/media/media-therapy/Media_Safety_Ethics.md
  section: Media Trigger Warnings (媒体触发警示表)
- type: concept
  question: 暴力的核心要点是什么？
  answer: '儿童3-12: 仅卡通暴力无后果呈现；青少年13-17: 可有暴力但需后果呈现；成人18+: 可接受但避免过度美化；创伤幸存者: 避免直接呈现;使用隐喻；老年人65+: 避免图形化暴力；专业视角 (Professional
    Perspective): 暴力呈现需考虑发展阶段与创伤史'
  source: 04-Humanities-Arts/media/media-therapy/Media_Safety_Ethics.md
  section: Content Rating & Adaptation (内容分级与适配表)
- type: concept
  question: 性内容的核心要点是什么？
  answer: '儿童3-12: 完全避免；青少年13-17: 教育性呈现;避免露骨；成人18+: 可接受成人内容；创伤幸存者: 性侵幸存者慎用;需评估；老年人65+: 文化敏感;尊重价值观；专业视角 (Professional Perspective):
    性内容是文化与发展依赖;需个体化'
  source: 04-Humanities-Arts/media/media-therapy/Media_Safety_Ethics.md
  section: Content Rating & Adaptation (内容分级与适配表)
- type: concept
  question: 物质使用的核心要点是什么？
  answer: '儿童3-12: 完全避免或负面呈现；青少年13-17: 真实呈现后果;不美化；成人18+: 可呈现但需平衡视角；创伤幸存者: 成瘾史者慎用;可能触发；老年人65+: 避免美化;健康教育；专业视角 (Professional
    Perspective): 物质使用呈现影响态度;需负责任'
  source: 04-Humanities-Arts/media/media-therapy/Media_Safety_Ethics.md
  section: Content Rating & Adaptation (内容分级与适配表)
- type: concept
  question: 时间管理的核心要点是什么？
  answer: '风险因素识别: 失控使用熬夜功能受损；健康界限设定: 每日屏幕时间限制设定停止时间；自我监测工具: 屏幕时间追踪App设置提醒；家庭/治疗师策略: 家庭媒体计划无屏幕区域；专业视角 (Professional Perspective):
    时间限制需个体化;2小时规则过时'
  source: 04-Humanities-Arts/media/media-therapy/Media_Safety_Ethics.md
  section: Digital Addiction Prevention (数字成瘾预防表)
- type: concept
  question: 内容多元性的核心要点是什么？
  answer: '风险因素识别: 单一内容沉迷其他兴趣丧失；健康界限设定: 交替不同媒体类型平衡线上线下；自我监测工具: 兴趣清单每周新体验；家庭/治疗师策略: 鼓励多元兴趣提供替代活动；专业视角 (Professional Perspective):
    单一兴趣过度投入成瘾信号'
  source: 04-Humanities-Arts/media/media-therapy/Media_Safety_Ethics.md
  section: Digital Addiction Prevention (数字成瘾预防表)
