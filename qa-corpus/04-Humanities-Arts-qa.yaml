  question: 什么是概述 (Overview)？
  answer: 宋词是中国古典文学史上继唐诗之后的又一高峰，历时三百余年(960-1279年)，涌现出一千五百多位词人，创作了两万多首词作。宋词以其音乐性强、情感细腻、意境优美、形式灵活等特点著称，形成了豪放与婉约两大主流风格，代表了中国古典词学艺术的最高成就，对后世文学产生了深远影响。
