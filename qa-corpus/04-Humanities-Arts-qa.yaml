  question: 聚焦聆听的核心要点是什么？
  answer: '中文名称: 专注性聆听；操作步骤: 1.舒适坐姿 2.闭眼 3.全神贯注于音乐细节 4.跟随音乐元素变化；时长: 10-20分钟；适应症: 注意力训练、冥想入门；禁忌/注意: 严重焦虑者先稳定；专业视角 (Professional
    Perspective): 训练听觉注意力，为更深层技术奠定基础。；引用来源 (Citation): Grocke, D. & Wigram, T. (2007).'
