  question: 自由联想绘画的核心要点是什么？
  answer: '操作流程: 1. 提供大幅画纸<br>2. 不设任何限制<br>3. 连续创作不停顿；分析要点: 分析创作冲动、停顿、修改行为；移情处理: 通过作品风格变化识别移情；梦境工作: 将梦境转化为视觉形象；阻抗突破: 绘画过程本身就是阻抗表达'
  source: 04-Humanities-Arts/arts/arts-therapy/Art_Therapy_Clinical_Integration.md
