  question: 什么是摘要 (Abstract)？
  answer: 本文采用历史创伤理论、种族研究与见证文学的交叉分析框架，深入剖析Steve McQueen执导的《为奴十二年》(2013)。作为当代最具历史责任感的传记电影之一，该片通过所罗门·诺萨普的真实经历，深刻揭示了美国奴隶制的残酷现实和历史创伤的代际传递。研究重点关注历史创伤的电影再现机制、种族不平等的制度性根源、以及见证叙事的记忆政治学意义。通过创伤理论阐释、种族研究分析与见证文学解读，本文揭示了该片在历史书写、种族批判和文化记忆领域的重大价值。
  source: 04-Humanities-Arts/media/cinema/film-criticism/12_Years_a_Slave_Professional_Critique.md
