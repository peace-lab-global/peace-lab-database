  section: 内容索引 | Contents
- type: concept
  question: 什么是概述 (Overview)？
  answer: 海子(1964-1989)，原名查海生，安徽怀宁人，是中国当代最杰出的诗人之一，被誉为"诗歌烈士"。他以其纯真的诗性品格、宏大的史诗气质和深刻的哲学思辨，在短短的创作生涯中留下了大量震撼人心的诗篇。其作品充满了对生命、土地、民族文化的深沉思考，以及对理想世界的执着追求，代表了中国当代诗歌的最高成就之一。
  source: 04-Humanities-Arts/literature/chinese-poetry/modern/representative-poets/Hai_Zi_Complete_Profile.md
  section: 概述 (Overview)
