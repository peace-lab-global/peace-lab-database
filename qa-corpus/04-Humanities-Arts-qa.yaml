  question: 角色陪伴 (Character Companionship)的核心要点是什么？
  answer: '英文名: Parasocial Companionship；心理学原理: 寄生社交关系 (Horton & Wohl 1956);依恋理论；神经生物学基础: 催产素释放;社会脑网络激活；治疗优势: 缓解孤独;提供稳定情感支持;跨越数月/年的"心理陪伴"；潜在风险:
    现实社交替代;结局后空虚感;过度依赖虚拟关系；专业视角 (Professional Perspective): 剧集角色是"数字朋友";每周相见,建立"仪式化联结"'
  source: 04-Humanities-Arts/media/tv/television-therapy/Television_Therapy.md
  section: Long-Term Narrative Companionship (长期叙事陪伴机制表)
