  question: 放松聆听的核心要点是什么？
  answer: '中文名称: 放松性聆听；操作步骤: 1.躺卧或斜躺 2.渐进放松引导 3.播放舒缓音乐 4.自然呼吸；时长: 20-30分钟；适应症: 压力缓解、失眠、术前焦虑；禁忌/注意: 急性精神病状态避免；专业视角 (Professional
    Perspective): 利用ISO原则从中等能量开始，渐入深度放松。；引用来源 (Citation): Nilsson, U. (2008).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Therapeutic_Methods.md
  section: 接受性聆听技术表
- type: concept
  question: GIM完整疗程的核心要点是什么？
  answer: '中文名称: 引导意象与音乐；操作步骤: 1.前奏(放松+主题设定) 2.音乐聆听(30-45min) 3.意象引导 4.后奏(整合讨论)；时长: 90-120分钟；适应症: 深度心理探索、创伤处理；禁忌/注意: 急性精神病、严重解离；专业视角
    (Professional Perspective): 需认证GIM治疗师；古典音乐曲目有专门编排。；引用来源 (Citation): Bonny, H. L. (2002).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Therapeutic_Methods.md
  section: 接受性聆听技术表
- type: concept
  question: 即兴演奏的核心要点是什么？
  answer: '中文名称: 临床即兴；操作步骤: 1.建立安全空间 2.选择乐器 3.自由或主题即兴 4.言语处理；所需器材: 多种打击乐、键盘、弦乐；适应症: 情感表达、关系建立；技能要求: 治疗师需即兴能力；专业视角 (Professional
