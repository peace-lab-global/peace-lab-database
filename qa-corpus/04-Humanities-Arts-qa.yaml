  section: 概述
- type: concept
  question: 宣泄释放型的核心要点是什么？
  answer: '英文名: Cathartic Cinema；治疗机制: 通过观看强烈情感场景,安全释放压抑情绪 (Catharsis/κάθαρσις)；代表电影: 《美丽人生》《辛德勒名单》《遗愿清单》；适用症状: 悲伤、失落、压抑情感、丧亲；观影后整合技术:
    引导哭泣;写"致角色的信";情感命名练习；专业视角 (Professional Perspective): 亚里士多德的catharsis理论;哭泣是神经系统重置'
  source: 04-Humanities-Arts/media/cinema/cinema-therapy/Cinema_Therapy_Overview.md
  section: Cinema Therapy Typology (电影疗法类型学表)
- type: concept
  question: 认知重构型的核心要点是什么？
  answer: '英文名: Cognitive Reframing Cinema；治疗机制: 通过角色的认知转变,重构来访者的非理性信念；代表电影: 《美丽心灵》《心灵捕手》《国王的演讲》；适用症状: 抑郁、焦虑、低自尊、认知扭曲；观影后整合技术:
    CBT三栏技术;识别角色认知转变点;应用到自身；专业视角 (Professional Perspective): 电影是"活的CBT案例";看到"角色改变信念"=可能性'
  source: 04-Humanities-Arts/media/cinema/cinema-therapy/Cinema_Therapy_Overview.md
  section: Cinema Therapy Typology (电影疗法类型学表)
- type: concept
  question: 榜样学习型的核心要点是什么？
  answer: '英文名: Vicarious Learning Cinema；治疗机制: 观察角色成功应对困境,习得新策略 (Bandura社会学习理论)；代表电影: 《阿甘正传》《当幸福来敲门》《摔跤吧爸爸》；适用症状: 低自我效能、习得性无助、缺乏应对策略；观影后整合技术:
    角色应对策略清单;自我效能评估;行动计划；专业视角 (Professional Perspective): Bandura:看到"与我相似的人成功"最能提升自我效能'
  source: 04-Humanities-Arts/media/cinema/cinema-therapy/Cinema_Therapy_Overview.md
  section: Cinema Therapy Typology (电影疗法类型学表)
- type: concept
  question: 镜像神经元系统的核心要点是什么？
  answer: '涉及脑区: 前运动皮层、下顶叶；电影技术如何激活: 特写镜头捕捉角色微表情;动作场景激活运动皮层；治疗应用: 提升共情;社交技能学习;自闭症谱系干预；研究证据: Gallese (2009): 观影时镜像神经元活跃度与共情相关；专业视角
    (Professional Perspective): "特写=强制共情";大脑被迫"模拟"角色情感'
  source: 04-Humanities-Arts/media/cinema/cinema-therapy/Cinema_Therapy_Overview.md
  section: Film Neuroscience Mechanisms (电影神经科学机制表)
- type: concept
  question: 默认模式网络 (DMN)的核心要点是什么？
  answer: '涉及脑区: 内侧前额叶、后扣带回；电影技术如何激活: 沉浸式叙事抑制DMN(停止自我反刍);结束后DMN激活(整合)；治疗应用: 中断抑郁反刍;促进自我反思;整合新叙事；研究证据: Sestir & Green (2010):
    高叙事传输=DMN抑制；专业视角 (Professional Perspective): 电影是"强制正念";2小时内无法反刍过去'
  source: 04-Humanities-Arts/media/cinema/cinema-therapy/Cinema_Therapy_Overview.md
  section: Film Neuroscience Mechanisms (电影神经科学机制表)
- type: concept
  question: 杏仁核情绪调节的核心要点是什么？
  answer: '涉及脑区: 杏仁核、前额叶；电影技术如何激活: 恐怖/悬疑片激活杏仁核;前额叶抑制(知道是虚构)；治疗应用: 情绪暴露训练;焦虑脱敏;情绪耐受提升；研究证据: Cantor & Sparks (1984): 观看恐怖片=安全的恐惧暴露；专业视角
    (Professional Perspective): 恐怖片是"情绪健身房";在安全中练习恐惧'
  source: 04-Humanities-Arts/media/cinema/cinema-therapy/Cinema_Therapy_Overview.md
  section: Film Neuroscience Mechanisms (电影神经科学机制表)
