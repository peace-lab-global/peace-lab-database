  question: 什么是摘要 (Abstract)？
  answer: 本文采用叙事伦理学、存在主义心理学与家庭系统理论的交叉分析框架，深入剖析Vince Gilligan创作的AMC经典美剧《绝命毒师》。该剧讲述了一位高中化学教师Walter White在得知罹患肺癌后，逐步转变为毒品制造商"海森堡"的心路历程。研究重点关注道德边界的模糊化、存在焦虑的具象化表达、家庭系统动力学变化，以及美国梦神话的当代解构。通过伦理学分析、心理动力学阐释与社会批判理论，本文揭示了该剧如何在犯罪类型剧包装下承载深刻的人性哲学思辨。
  source: 04-Humanities-Arts/media/tv/breaking-bad/Breaking_Bad_Professional_Critique.md
