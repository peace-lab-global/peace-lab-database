  answer: '评分: ★★★★★；说明: 对极权主义、官僚化暴力、集体狂热的诊断具有持续的紧迫性'
  source: 04-Humanities-Arts/literature/world-nonfiction/psychology-existential/the-anatomy-of-human-destructiveness.md
  section: 评分
- type: concept
  question: 什么是一、总体评价？
  answer: 弗洛姆在1956年就诊断出了现代爱情病的核心症状：**我们把爱当作"被爱"的问题，而不是"去爱"的能力问题。** 我们专注于如何让自己变得更有吸引力、更值得被爱，却忽视了最关键的问题：我是否有能力去爱另一个人？
  source: 04-Humanities-Arts/literature/world-nonfiction/psychology-existential/the-art-of-loving.md
  section: 一、总体评价
- type: concept
  question: 尊重（Respect）的核心要点是什么？
  answer: '含义: 按照对方本来的样子看待他，而不是我希望他成为的样子；反面: 占有、改造'
  source: 04-Humanities-Arts/literature/world-nonfiction/psychology-existential/the-art-of-loving.md
  section: 爱的四要素
- type: concept
  question: 什么是三、阅读体验？
  answer: '**评分：8.5/10** — 这本书的某些章节（特别是对父权制爱情的分析）在今天看来已经过时，但它对"爱作为艺术"的核心论点是永恒的。如果你正在一段关系中感到困惑，或者一直在"寻找对的人"却从未找到，这本书会给你一个完全不同的视角：问题可能不在"对的人"身上，而在你"爱的能力"上。'
  source: 04-Humanities-Arts/literature/world-nonfiction/psychology-existential/the-art-of-loving.md
  section: 三、阅读体验
- type: concept
  question: 什么是一、总体评价？
  answer: 《约伯记》是圣经中最"存在主义"的一卷——它直面了一个其他宗教文本往往回避的问题：**如果上帝是善的和全能的，为什么好人会受苦？** 这个问题的提出本身，比任何"答案"都更加勇敢。
  source: 04-Humanities-Arts/literature/world-nonfiction/psychology-existential/the-book-of-job.md
  section: 一、总体评价
- type: concept
  question: 什么是三、阅读体验？
  answer: '**评分：9.0/10** — 《约伯记》是文学史上最伟大的"苦难文本"之一。它的诗歌力量、哲学深度和情感诚实，在四千年后仍然无与伦比。对于正在经历"无缘无故的苦难"的人来说，这本书提供了一种奇怪的安慰——不是因为它给出了答案，而是因为它证明了你不是第一个问这个问题的人。'
  source: 04-Humanities-Arts/literature/world-nonfiction/psychology-existential/the-book-of-job.md
  section: 三、阅读体验
- type: concept
  question: 什么是总体评价？
  answer: 《存在的勇气》是20世纪神学-哲学领域最具影响力的著作之一，也是存在主义思想从欧洲大陆传统向英美世界传播的关键文本。作者保罗·蒂利希是一位独特的思想者——他既是路德宗的神学家，又是存在主义哲学的深度参与者；他既保持着对超越性维度的开放，又拒绝将信仰简化为教条或仪式；他既深入对话海德格尔、萨特、雅斯贝尔斯，又始终从神学的视角提出自己的修正与批判。这种跨学科的立场，使《存在的勇气》成为一部真正"无法归类"的经典——它既是神学著作，又是哲学论述，也是对现代精神危机的诊断书。
  source: 04-Humanities-Arts/literature/world-nonfiction/psychology-existential/the-courage-to-be.md
  section: 总体评价
- type: concept
  question: 什么是阅读体验？
  answer: 阅读《存在的勇气》是一次智识上的攀登，也是一次精神上的探险。蒂利希的文本并不容易进入——他大量使用黑格尔式的辩证语言、海德格尔式的存在论术语、以及基督教神学的概念体系。初读时，我常常需要停下来，反复咀嚼某个句子，才能把握其含义。但一旦进入了蒂利希的思维方式，就会发现他的论证具有强大的内在连贯性和思想吸引力。
  source: 04-Humanities-Arts/literature/world-nonfiction/psychology-existential/the-courage-to-be.md
  section: 阅读体验
