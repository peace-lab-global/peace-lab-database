- type: concept
  question: 分格/画格的核心要点是什么？
  answer: '日文/英文: コマ (Koma) / Panel；定义: 漫画的基本叙事单元，每一格构成一个视觉-时间单位；叙事功能: 控制叙事节奏、视角切换、时间流动；格的大小=时间权重；与西方漫画的对比: 日漫更常使用不规则画格与无边框画格（Borderless
    Panel）；专业视角: 格的排列方式本身就是一种"无声的叙事"——阅读路径=情感路径'
  source: 04-Humanities-Arts/media/anime-manga/Manga_Narrative_Analysis.md
  section: 漫画叙事学核心术语表 (Manga Narratology Core Terms)
- type: concept
  question: 分镜/构图的核心要点是什么？
  answer: '日文/英文: ネーム (Name) / Storyboard / Layout；定义: 画格在页面上的整体排布设计，包括格形、大小、留白、节奏；叙事功能: 控制阅读速度、制造悬念、创造视觉冲击或宁静感；与西方漫画的对比:
    日漫从右到左、从上到下的阅读顺序影响构图逻辑；专业视角: 分镜是漫画的"导演工作"——同等重要的还有"留白"（Negative Space）'
  source: 04-Humanities-Arts/media/anime-manga/Manga_Narrative_Analysis.md
  section: 漫画叙事学核心术语表 (Manga Narratology Core Terms)
- type: concept
  question: 效果线的核心要点是什么？
  answer: '日文/英文: 集中線 (Shūchūsen) / Speed Lines / Effect Lines；定义: 围绕焦点放射的线条，表示运动、冲击、心理聚焦；叙事功能: 强化动态感、引导视线、表达心理状态；与西方漫画的对比:
    日漫独有（美漫用运动模糊Motion Blur替代）；专业视角: 效果线是"情感的视觉化"——不同的线型传达不同的情绪强度'
  source: 04-Humanities-Arts/media/anime-manga/Manga_Narrative_Analysis.md
  section: 漫画叙事学核心术语表 (Manga Narratology Core Terms)
- type: concept
  question: 节奏控制的核心要点是什么？
  answer: '具体手法: 小格密排→快节奏；大格/跨页→慢节奏/高潮；留白→停顿/反思；视觉效果: 格的大小与密度直接影响阅读速度；叙事效果: 模仿心理时间感知：紧张时时间变快（小格密排），震撼时时间凝固（大格静止）；代表作品/场景:
    《海贼王》战斗场景的格渐变；《虫师》大量留白的缓慢节奏；心理影响: 读者不自觉地将生理节奏与叙事节奏同步'
  source: 04-Humanities-Arts/media/anime-manga/Manga_Narrative_Analysis.md
  section: 视觉叙事技术分析表 (Visual Storytelling Techniques Analysis)
- type: concept
  question: 视角转换的核心要点是什么？
  answer: '具体手法: 主观视角（POV shot）/ 全知视角 / 背面视角 / 俯瞰 / 仰视；视觉效果: 不同视角传达不同心理距离与权力关系；叙事效果: 控制读者的信息量与情感距离；限制视角制造悬念；代表作品/场景: 《怪物》的受限视角制造恐怖悬念；《浪客行》的宏大俯瞰表达"道"；心理影响:
    视角=权力；读者被"放置"在作者选择的位置'
  source: 04-Humanities-Arts/media/anime-manga/Manga_Narrative_Analysis.md
  section: 视觉叙事技术分析表 (Visual Storytelling Techniques Analysis)
- type: concept
  question: 无声叙事的核心要点是什么？
  answer: '具体手法: 连续画面无文字/无对话，仅用画面推进叙事；视觉效果: 纯视觉叙事，读者必须主动"读取"画面信息；叙事效果: 最强沉浸感；读者成为"合作叙事者"（Co-narrator）；代表作品/场景: 《20世纪少年》的无声奔跑；《浪客行》的武藏决斗；心理影响:
    无声场景=强制正念；大脑被迫100%处理视觉信息'
  source: 04-Humanities-Arts/media/anime-manga/Manga_Narrative_Analysis.md
  section: 视觉叙事技术分析表 (Visual Storytelling Techniques Analysis)
- type: concept
  question: 叙事深度的核心要点是什么？
  answer: '漫画表现形式: 长篇连载（数百至数千话）可构建极其复杂的角色发展与世界观；与纯文学的对比: 顶级长篇漫画的叙事复杂度可媲美长篇小说（如《怪物》vs陀思妥耶夫斯基）；与电影的对比: TV动画/电影受限于时长，漫画可无限延展；代表性作品:
    《浪客行》（井上雄彦）：宫本武藏的哲学旅程；学术评价: 井上雄彦的《浪客行》被法国艺术界认可为"当代视觉文学"'
  source: 04-Humanities-Arts/media/anime-manga/Manga_Narrative_Analysis.md
  section: '漫画作为文学的形式分析表 (Manga as Literature: Formal Analysis)'
- type: concept
  question: 心理描写的核心要点是什么？
  answer: '漫画表现形式: 内心独白+视觉隐喻+表情符号的三重表达系统；与纯文学的对比: 文学仅靠文字；漫画增加视觉维度，心理描写更直观；与电影的对比: 电影依赖演员表演；漫画可直接展示内心世界；代表性作品: 《恶之华》：青春期阴暗心理的精确描绘；学术评价:
    漫画的心理描写是"文字与图像的协同效应"'
  source: 04-Humanities-Arts/media/anime-manga/Manga_Narrative_Analysis.md
  section: '漫画作为文学的形式分析表 (Manga as Literature: Formal Analysis)'
