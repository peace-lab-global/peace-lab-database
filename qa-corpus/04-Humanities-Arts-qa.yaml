  question: 移情分析绘画的核心要点是什么？
  answer: '操作流程: 1. 选择代表治疗师的图像<br>2. 表达对此人的感受<br>3. 探讨关系模式迁移；分析要点: 分析位置安排、色彩选择、互动方式；移情处理: 直接呈现移情关系动态；梦境工作: 梦中人物关系可视化；阻抗突破:
    通过创作距离表达阻抗'
  source: 04-Humanities-Arts/arts/arts-therapy/Art_Therapy_Clinical_Integration.md
