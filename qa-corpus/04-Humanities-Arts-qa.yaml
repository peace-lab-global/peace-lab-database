- type: concept
  question: 什么是概述 (Overview)？
  answer: 国外经典诗歌是指从古代到近现代各个历史时期，在世界文学史上具有重要地位和深远影响的诗歌作品。这些作品涵盖了古希腊罗马史诗、中世纪谣曲、文艺复兴抒情诗、古典主义诗歌、浪漫主义诗歌等多个历史阶段和文学流派，代表了人类诗歌艺术的最高成就。从荷马史诗到莎士比亚十四行诗，从但丁《神曲》到歌德《浮士德》，这些经典作品不仅具有极高的文学价值，也是了解西方文明发展历程的重要窗口。
  source: 04-Humanities-Arts/literature/world-poetry/classical/World_Classical_Poetry_Overview.md
  section: 概述 (Overview)
- type: concept
  question: 什么是内容索引 | Contents？
  answer: '- [World Modern Poetry Overview](World_Modern_Poetry_Overview.md)'
  source: 04-Humanities-Arts/literature/world-poetry/modern/INDEX.md
  section: 内容索引 | Contents
- type: concept
  question: 什么是概述 (Overview)？
  answer: 国外现代诗歌是指20世纪以来世界各国的现代诗歌创作，涵盖了欧美现代主义诗歌、拉美魔幻现实主义诗歌、东欧诗歌、非洲诗歌等多个地区和流派。现代诗歌以其反传统的革命精神、形式技法的创新探索、以及对现代人精神世界的深刻关注而著称，涌现出了叶芝、艾略特、聂鲁达、帕斯、塞弗尔特、布罗茨基等众多世界级诗人，创作了大量具有重要影响的优秀作品，为世界文学的发展做出了重要贡献。
  source: 04-Humanities-Arts/literature/world-poetry/modern/World_Modern_Poetry_Overview.md
  section: 概述 (Overview)
- type: concept
  question: 动漫的核心要点是什么？
  answer: '日文: アニメ (Anime)；英文翻译: Animation（特指日本动画）；定义: 日语中"animation"的缩略词，国际上特指日本风格的动画作品；文化语境: 1960年代手塚治虫开创有限动画（Limited Animation）模式，降低成本实现电视连载；专业视角:
    独特的视觉语言（大眼、符号化表情、速度线）构成"anime style"全球辨识度'
  source: 04-Humanities-Arts/media/anime-manga/Anime_Manga_Overview.md
  section: 动漫核心术语表 (Core Anime & Manga Terminology)
- type: concept
  question: 漫画的核心要点是什么？
  answer: '日文: 漫画 (Manga)；英文翻译: Japanese Comics；定义: 日式叙事漫画，以分格（Panel）、对话框（Speech Bubble）、效果线（Effect Line）构成视觉叙事；文化语境: 葛饰北斋《北斋漫画》（1814）首次使用"漫画"一词；现代意义由手塚治虫确立；专业视角:
    全球第三大出版品类（仅次于学术期刊与商业杂志），年产值超6000亿日元'
  source: 04-Humanities-Arts/media/anime-manga/Anime_Manga_Overview.md
  section: 动漫核心术语表 (Core Anime & Manga Terminology)
- type: concept
  question: 御宅族的核心要点是什么？
  answer: '日文: オタク (Otaku)；英文翻译: Geek / Nerd（特指动漫爱好者）；定义: 对特定亚文化（动漫、游戏、偶像）极度热衷的粉丝群体；文化语境: 1983年中森明夫赋予贬义；1990年代宫崎勤事件导致社会污名；21世纪逐步去污名化；专业视角:
    Otaku身份从边缘到主流的演变本身就是社会心理学研究样本'
  source: 04-Humanities-Arts/media/anime-manga/Anime_Manga_Overview.md
  section: 动漫核心术语表 (Core Anime & Manga Terminology)
- type: concept
  question: 萌芽期的核心要点是什么？
  answer: '年代: 12-19世纪；里程碑事件: 鸟兽戏绘（Choju-giga）、浮世绘、北斋漫画；关键人物/作品: 鸟羽僧正、葛饰北斋；对动漫发展的影响: 日本"绘画叙事"传统的源头'
  source: 04-Humanities-Arts/media/anime-manga/Anime_Manga_Overview.md
  section: 动漫历史发展年表 (Historical Timeline of Anime & Manga)
- type: concept
  question: 黎明期的核心要点是什么？
  answer: '年代: 1910s-1940s；里程碑事件: 日本最早动画短片；战时 propaganda 动画；关键人物/作品: 下川凹天、政冈宪三；对动漫发展的影响: 动画技术从西方引入并本土化'
  source: 04-Humanities-Arts/media/anime-manga/Anime_Manga_Overview.md
  section: 动漫历史发展年表 (Historical Timeline of Anime & Manga)
- type: concept
  question: 漫画革命的核心要点是什么？
  answer: '年代: 1947-1960s；里程碑事件: 《新宝岛》（手塚治虫）开创电影式漫画分镜；虫制作所制作《铁臂阿童木》TV动画；关键人物/作品: 手塚治虫（"漫画之神"）；对动漫发展的影响: 确立现代漫画语法（分格、镜头语言、长篇叙事）；TV动画产业诞生'
  source: 04-Humanities-Arts/media/anime-manga/Anime_Manga_Overview.md
  section: 动漫历史发展年表 (Historical Timeline of Anime & Manga)
- type: concept
  question: 少年漫画的核心要点是什么？
  answer: '日文名: 少年漫画 (Shōnen)；英文名: Boys'' Manga；核心特征: 友情、努力、胜利；热血战斗；成长叙事；代表作品: 《龙珠》《海贼王》《火影忍者》《我的英雄学院》；目标受众: 12-18岁男性（实际受众远超）；心理学主题:
    自我效能、归属感、延迟满足、韧性'
  source: 04-Humanities-Arts/media/anime-manga/Anime_Manga_Overview.md
  section: 主要动漫类型学表 (Major Anime & Manga Genres)
- type: concept
  question: 少女漫画的核心要点是什么？
  answer: '日文名: 少女漫画 (Shōjo)；英文名: Girls'' Manga；核心特征: 情感细腻、人际关系、恋爱、自我发现；代表作品: 《美少女战士》《花样男子》《NANA》；目标受众: 12-18岁女性；心理学主题: 身份认同、关系中的自我、情感表达'
  source: 04-Humanities-Arts/media/anime-manga/Anime_Manga_Overview.md
  section: 主要动漫类型学表 (Major Anime & Manga Genres)
- type: concept
  question: 虚拟陪伴的核心要点是什么？
  answer: '英文名: Virtual Companionship；日文术语: Tomodachi (友達)；理论基础: 寄生社交关系;依恋理论；治疗作用: 缓解孤独;提供无条件接纳;降低社交焦虑；独特性: 角色永不背叛;二次元是绝对安全空间；专业视角
    (Professional Perspective): 孤独流行病时代的数字伴侣;但需警惕现实逃避'
  source: 04-Humanities-Arts/media/anime-manga/Anime_Manga_Therapy.md
  section: Core Anime Psychology (动漫核心心理学表)
- type: concept
  question: 亚文化归属的核心要点是什么？
  answer: '英文名: Subcultural Belonging；日文术语: Otaku Bunka (オタク文化)；理论基础: 社会认同理论;边缘认同；治疗作用: 找到同类;对抗主流排斥;身份接纳；独特性: Otaku身份从污名到自豪;亚文化提供替代认同；专业视角
    (Professional Perspective): 边缘青年的部落;在这里怪异是常态'
  source: 04-Humanities-Arts/media/anime-manga/Anime_Manga_Therapy.md
  section: Core Anime Psychology (动漫核心心理学表)
- type: concept
  question: 情感夸张表达的核心要点是什么？
  answer: '英文名: Exaggerated Emotional Expression；日文术语: Kawai-sa (可爱さ)；理论基础: 情感表达训练;非语言沟通；治疗作用: 学习情感识别;降低情感表达抑制;情感教育；独特性: 汗滴、颜艺、SD化极度外化的内心；专业视角
    (Professional Perspective): 动漫是情感放大器;教会情感迟钝者读懂情感'
  source: 04-Humanities-Arts/media/anime-manga/Anime_Manga_Therapy.md
  section: Core Anime Psychology (动漫核心心理学表)
- type: concept
  question: 日常系的核心要点是什么？
  answer: '日文名: Nichijokei；核心特征: 低冲突日常琐事温暖人际平淡美学；治疗机制: 正念;接纳当下;降低焦虑;对抗追求刺激；代表作品: 轻音少女悠哉日常大王小林家的龙女仆；适用人群: 高压力者焦虑者完美主义者；专业视角
    (Professional Perspective): 日常系教导平凡即美好;对抗现代社会的刺激成瘾'
  source: 04-Humanities-Arts/media/anime-manga/Anime_Manga_Therapy.md
  section: Healing Anime Typology (治愈系动漫类型学表)
- type: concept
  question: 治愈系的核心要点是什么？
  answer: '日文名: Iyashikei；核心特征: 极度平和自然元素静谧氛围几乎无冲突；治疗机制: 副交感神经激活;皮质醇降低;情绪调节；代表作品: 夏目友人帐虫师非非日和；适用人群: 创伤幸存者高唤醒者需深度放松者；专业视角 (Professional
    Perspective): 治愈系动画版ASMR;观看时心率可降低10-15%'
  source: 04-Humanities-Arts/media/anime-manga/Anime_Manga_Therapy.md
  section: Healing Anime Typology (治愈系动漫类型学表)
- type: concept
  question: 热血励志的核心要点是什么？
  answer: '日文名: Nekketsu；核心特征: 奋斗友情胜利永不放弃；治疗机制: 自我效能提升;动机激活;希望灌注；代表作品: 排球少年我的英雄学院钢之炼金术师；适用人群: 低自我效能者抑郁者需要动力者；专业视角 (Professional
    Perspective): 热血番是心理维生素B;注射希望与动力'
  source: 04-Humanities-Arts/media/anime-manga/Anime_Manga_Therapy.md
  section: Healing Anime Typology (治愈系动漫类型学表)
- type: concept
  question: 社交功能的核心要点是什么？
  answer: '适应性Otaku: 在线+线下社交;参加展会;有真实朋友；病理性Hikikomori: 完全社交退缩;仅线上互动;无真人联系；区分标准: 是否有真实社会联结；干预策略: 渐进暴露;社交技能训练;在线到线下过渡；专业视角 (Professional
    Perspective): Otaku可以很健康;Hikikomori是病理状态'
  source: 04-Humanities-Arts/media/anime-manga/Anime_Manga_Therapy.md
  section: Otaku Identity & Mental Health (御宅身份与心理健康表)
- type: concept
  question: 现实功能的核心要点是什么？
  answer: '适应性Otaku: 工作/学习正常;自理能力良好；病理性Hikikomori: 无法工作/学业;依赖父母;房间不出；区分标准: 日常功能是否受损；干预策略: 行为激活;职业康复;家庭治疗；专业视角 (Professional
    Perspective): Hikikomori日本独特现象;但全球化趋势'
  source: 04-Humanities-Arts/media/anime-manga/Anime_Manga_Therapy.md
  section: Otaku Identity & Mental Health (御宅身份与心理健康表)
- type: concept
  question: 准社会关系的核心要点是什么？
  answer: '英文名: Parasocial Relationship；心理学理论基础: 依恋理论（Attachment Theory）；准社会互动理论（Horton & Wohl, 1956）；动漫独特性: 动漫角色永不背叛、永不死亡（连载中）、永不评判——形成"完美依恋对象"；临床应用:
    为缺乏安全依恋的来访者提供"过渡性依恋"（Transitional Attachment）；专业视角: 虚拟依恋可以是通向真实依恋的桥梁，但不应成为终点'
  source: 04-Humanities-Arts/media/anime-manga/Anime_Therapy.md
  section: 动漫疗法核心机制表 (Core Mechanisms of Anime Therapy)
- type: concept
  question: 隐喻性情感处理的核心要点是什么？
  answer: '英文名: Metaphorical Emotional Processing；心理学理论基础: 隐喻治疗（Metaphor Therapy）；叙事治疗（Narrative Therapy）；动漫独特性: 动漫的幻想设定允许用"象征距离"（Symbolic
    Distance）处理真实创伤——比直接面对更安全；临床应用: 创伤幸存者可通过动漫中的"怪物""战斗""重生"隐喻处理自身经历；专业视角: 隐喻是"心理防火墙"——既保护又允许情感流动'
  source: 04-Humanities-Arts/media/anime-manga/Anime_Therapy.md
  section: 动漫疗法核心机制表 (Core Mechanisms of Anime Therapy)
- type: concept
  question: 身份实验的核心要点是什么？
  answer: '英文名: Identity Experimentation；心理学理论基础: Erikson身份发展阶段论；Marcia身份状态模型；动漫独特性: 动漫角色经常经历剧烈的身份转变（变身、觉醒、黑化）——提供丰富的身份探索素材；临床应用:
    青少年与年轻成人通过角色探索自我认同、性别认同、职业认同；专业视角: 动漫提供"实验室条件下的身份实验"——无现实后果'
  source: 04-Humanities-Arts/media/anime-manga/Anime_Therapy.md
  section: 动漫疗法核心机制表 (Core Mechanisms of Anime Therapy)
- type: concept
  question: 《新世纪福音战士》的核心要点是什么？
  answer: '日文名: 新世紀エヴァンゲリオン (Evangelion)；存在主义主题: 自我认同、他人之墙、存在的价值、孤独与融合；Yalom四大终极关怀: 死亡、自由、孤独、无意义；关键场景/台词: "不能只逃避而已"；人类补完计划=对绝对联结的渴望与恐惧；治疗应用:
    探索"真实的自我"vs"他人期望的自我"；理解回避行为的代价；专业视角: 庵野秀明的抑郁症经验直接注入作品；EVA是"心理治疗的镜像"——看见自己的回避'
  source: 04-Humanities-Arts/media/anime-manga/Anime_Therapy.md
  section: 存在主义动漫深度分析表 (Existential Themes in Anime)
- type: concept
  question: 《攻壳机动队》的核心要点是什么？
  answer: '日文名: 攻殻機動隊 (Ghost in the Shell)；存在主义主题: 灵魂与身体、意识的本质、记忆与身份、技术与人性的边界；Yalom四大终极关怀: 自由、无意义；关键场景/台词: "是什么让我成为我？是记忆？是身体？还是Ghost（灵魂）？"；治疗应用:
    探索"自我"的定义；身体意象困扰；技术时代的身份焦虑；专业视角: 押井守将哲学文本（笛卡尔、帕斯卡）编织入科幻叙事——"动画版的《存在与虚无》"'
  source: 04-Humanities-Arts/media/anime-manga/Anime_Therapy.md
  section: 存在主义动漫深度分析表 (Existential Themes in Anime)
- type: concept
  question: 《虫师》的核心要点是什么？
  answer: '日文名: 蟲師 (Mushishi)；存在主义主题: 与自然共存、生与死的流动、执念与放下；Yalom四大终极关怀: 死亡、无意义；关键场景/台词: "不要被拥有生命的幻觉所束缚"；治疗应用: 接纳无常（Impermanence）；放下执念；与"不可控"和解；专业视角:
    银古是"禅宗治疗师"——不治愈，而是帮助人与"虫"（自然/症状）共存'
  source: 04-Humanities-Arts/media/anime-manga/Anime_Therapy.md
  section: 存在主义动漫深度分析表 (Existential Themes in Anime)
- type: concept
  question: 《你的名字。》的核心要点是什么？
  answer: '主角成长弧: 从迷茫的高中生→承担责任→主动寻找命运之人；Erikson发展阶段: 身份认同vs角色混乱；关键心理冲突: "我是谁？我属于哪里？我与他人的联结是什么？"；治疗应用: 身份认同困惑、命运感缺失、联结的渴望；观看建议:
    适合身份探索期的青少年与年轻成人'
  source: 04-Humanities-Arts/media/anime-manga/Anime_Therapy.md
  section: 成长叙事与心理发展阶段表 (Coming-of-Age Narratives and Developmental Stages)
- type: concept
  question: 《鬼灭之刃》的核心要点是什么？
  answer: '主角成长弧: 从失去家人的少年→接受悲痛→在战斗中成长→保护他人；Erikson发展阶段: 亲密vs孤立；关键心理冲突: "失去后如何继续活着？如何将悲痛转化为力量？"；治疗应用: 丧亲处理、创伤后成长、家庭意义的重建；观看建议:
    温和地触及丧失主题；战斗场面提供情感宣泄出口'
  source: 04-Humanities-Arts/media/anime-manga/Anime_Therapy.md
  section: 成长叙事与心理发展阶段表 (Coming-of-Age Narratives and Developmental Stages)
