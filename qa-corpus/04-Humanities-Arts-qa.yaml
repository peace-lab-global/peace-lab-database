- type: concept
  question: 约翰·塞巴斯蒂安·巴赫的核心要点是什么？
  answer: '生卒年: 1685-1750；国籍: 德国；疗愈特质关键词: 秩序、神圣、数学美、宇宙和谐；代表性疗愈作品: 《哥德堡变奏曲》《G弦上的咏叹调》《大提琴组曲》；适用情境: 焦虑、失眠、冥想、临终；专业视角 (Professional
    Perspective): 巴赫音乐的对位法结构提供认知锚定，和谐感带来安全感。'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Composers_Works.md
  section: 作曲家疗愈特质总览表
- type: concept
  question: 沃尔夫冈·阿玛多伊斯·莫扎特的核心要点是什么？
  answer: '生卒年: 1756-1791；国籍: 奥地利；疗愈特质关键词: 清澈、优雅、平衡、愉悦；代表性疗愈作品: 钢琴协奏曲K.467、单簧管协奏曲K.622、弦乐小夜曲K.525；适用情境: 认知增强、焦虑缓解、儿童；专业视角
    (Professional Perspective): 莫扎特音乐的清晰结构与和谐比例常用于"莫扎特效应"研究。'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Composers_Works.md
  section: 作曲家疗愈特质总览表
- type: concept
  question: 路德维希·范·贝多芬的核心要点是什么？
  answer: '生卒年: 1770-1827；国籍: 德国；疗愈特质关键词: 挣扎与超越、英雄叙事、深刻情感；代表性疗愈作品: 《月光奏鸣曲》慢板、《田园交响曲》、《第九交响曲》；适用情境: 逆境应对、生命意义、激励；专业视角 (Professional
    Perspective): 贝多芬晚期作品的超越性为GIM深度探索常用。'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Composers_Works.md
  section: 作曲家疗愈特质总览表
- type: concept
  question: G弦上的咏叹调 (Air on G String)的核心要点是什么？
  answer: '作曲家: J.S. Bach；调性/速度: D大调, 缓慢；时长: 5-6分钟；BPM: ~60；疗愈机制: 稳定低音、规律节奏、和谐和声；使用建议: 焦虑急性发作稳定；睡前放松；引用来源 (Citation): Nilsson,
    U. (2008).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Composers_Works.md
  section: 焦虑缓解与放松曲目
- type: concept
  question: 吉姆诺佩迪第一号 (Gymnopédie No.1)的核心要点是什么？
  answer: '作曲家: E. Satie；调性/速度: D大调, 缓慢而忧郁；时长: 3-4分钟；BPM: ~60；疗愈机制: 极简织体、开放空间、低张力；使用建议: 冥想入门；过渡音乐；引用来源 (Citation): Grocke,
    D. (2007).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Composers_Works.md
  section: 焦虑缓解与放松曲目
- type: concept
  question: 月光 (Clair de Lune)的核心要点是什么？
  answer: '作曲家: C. Debussy；调性/速度: 降D大调, 行板；时长: 5分钟；BPM: ~66；疗愈机制: 流动和声、梦幻意象、无紧张高潮；使用建议: 深度放松结束曲；失眠辅助；引用来源 (Citation): Bonny,
    H. L. (2002).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Composers_Works.md
  section: 焦虑缓解与放松曲目
- type: concept
  question: 未完成交响曲第一乐章 (Unfinished Symphony, I)的核心要点是什么？
  answer: '作曲家: F. Schubert；调性/速度: b小调, 中庸的快板；ISO原则应用: 匹配期：镜像忧郁；疗愈机制: 小调忧郁、叹息音型、戏剧张力；使用阶段: 情绪匹配；允许悲伤存在；专业视角 (Professional
    Perspective): 不宜用于急性严重抑郁；需后续过渡曲目。'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Composers_Works.md
  section: 抑郁与情绪低落曲目
- type: concept
  question: 间奏曲 Op.118 No.2 (Intermezzo Op.118 No.2)的核心要点是什么？
  answer: '作曲家: J. Brahms；调性/速度: A大调, 温柔行板；ISO原则应用: 过渡期：温暖内省；疗愈机制: 温暖大调、内省性、成熟接纳；使用阶段: 从低落向平静过渡；专业视角 (Professional Perspective):
    勃拉姆斯晚期作品适合中年以上抑郁患者。'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Composers_Works.md
  section: 抑郁与情绪低落曲目
- type: concept
  question: 正念冥想 (Mindfulness)的核心要点是什么？
  answer: '中文名称: 正念觉察；整合方式: 音乐作为觉察对象；声音冥想；推荐曲目: 巴赫《无伴奏大提琴组曲》、德彪西印象派；技术要点: 觉察音乐元素变化；非判断聆听；效果增强机制: 外部锚定辅助注意力稳定；引用来源 (Citation):
    Kabat-Zinn, J. (1990).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Integration.md
  section: 古典音乐与冥想整合表
- type: concept
  question: 专注冥想 (Concentration)的核心要点是什么？
  answer: '中文名称: 定心冥想；整合方式: 单一音乐元素作为专注对象；推荐曲目: 巴赫单旋律作品；持续音作品；技术要点: 跟随单一旋律线；分心时回归；效果增强机制: 音乐提供持续的专注锚点；引用来源 (Citation): Thaut,
    M. H. (2005).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Integration.md
  section: 古典音乐与冥想整合表
- type: concept
  question: 开放觉察 (Open Awareness)的核心要点是什么？
  answer: '中文名称: 无执觉察；整合方式: 音乐作为整体场域体验；推荐曲目: 帕特《镜中镜》、萨蒂极简；技术要点: 不追随特定元素；整体临在；效果增强机制: 音乐创造意识容器；引用来源 (Citation): Bonny, H. L.
    (2002).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Integration.md
  section: 古典音乐与冥想整合表
- type: concept
  question: 哈他瑜伽 (Hatha)的核心要点是什么？
  answer: '整合方式: 体式保持时的背景；推荐曲目类型: 缓慢弦乐、印象派；BPM范围: 50-70；练习阶段匹配: 热身→流动→静止→休息；注意事项: 避免节奏过强干扰体式专注；专业视角 (Professional Perspective):
    传统观点倾向静默练习；音乐可作入门辅助。'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Integration.md
  section: 古典音乐与瑜伽整合表
- type: concept
  question: 流瑜伽 (Vinyasa)的核心要点是什么？
  answer: '整合方式: 节奏配合流动；推荐曲目类型: 有明确节奏的慢板；BPM范围: 60-80；练习阶段匹配: 随呼吸流动的音乐选择；注意事项: 节奏需与呼吸协调；专业视角 (Professional Perspective): 音乐-呼吸-动作三位一体整合。'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Integration.md
  section: 古典音乐与瑜伽整合表
- type: concept
  question: 阴瑜伽 (Yin Yoga)的核心要点是什么？
  answer: '整合方式: 长时间保持的陪伴；推荐曲目类型: 极缓、极简、环境性；BPM范围: 40-60；练习阶段匹配: 萨蒂、帕特、德彪西；注意事项: 3-5分钟保持需持续支持；专业视角 (Professional Perspective):
    阴瑜伽的静止特性与极简音乐高度契合。'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Integration.md
  section: 古典音乐与瑜伽整合表
- type: concept
  question: 精神分析/动力学的核心要点是什么？
  answer: '整合方式: 自由联想的音乐诱发；古典音乐角色: 音乐激发潜意识内容；技术示例: GIM深度聆听+言语处理；临床应用: 童年记忆、防御觉察；引用来源 (Citation): Bonny, H. L. (2002).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Integration.md
  section: 古典音乐与心理治疗整合表
- type: concept
  question: 认知行为(CBT)的核心要点是什么？
  answer: '整合方式: 行为激活、认知重构辅助；古典音乐角色: 音乐作为奖励、情绪调节工具；技术示例: 活动安排中的音乐聆听；认知重构后放松；临床应用: 抑郁、焦虑；引用来源 (Citation): Hanser, S. B. (1999).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Integration.md
  section: 古典音乐与心理治疗整合表
- type: concept
  question: 听觉皮层的核心要点是什么？
  answer: '中文名称: 初级/次级听觉皮层；英文术语: Auditory Cortex (A1, A2)；功能角色: 音高、音色、节奏的基础处理；古典音乐激活特点: 复杂和声结构激活更广泛区域；临床相关性: 听觉训练可增强皮层可塑性；引用来源
    (Citation): Zatorre, R. J. et al. (2002).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Neuroscience.md
  section: 大脑音乐处理网络表
- type: concept
  question: 前额叶皮层的核心要点是什么？
  answer: '中文名称: 前额叶；英文术语: Prefrontal Cortex (PFC)；功能角色: 工作记忆、注意力、情绪调节；古典音乐激活特点: 聆听复杂结构时显著激活；即兴时背外侧PFC抑制；临床相关性: 音乐训练增强执行功能；引用来源
    (Citation): Limb, C. J. & Braun, A. R. (2008).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Neuroscience.md
  section: 大脑音乐处理网络表
- type: concept
  question: 眶额皮层的核心要点是什么？
  answer: '中文名称: 眶额叶；英文术语: Orbitofrontal Cortex (OFC)；功能角色: 奖赏评估、审美愉悦；古典音乐激活特点: "颤栗"体验时活动峰值；临床相关性: 与多巴胺奖赏通路协同；引用来源 (Citation):
    Blood, A. J. & Zatorre, R. J. (2001).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Neuroscience.md
  section: 大脑音乐处理网络表
- type: concept
  question: 多巴胺的核心要点是什么？
  answer: '中文名称: 多巴胺；英文术语: Dopamine；功能作用: 奖赏、动机、愉悦；音乐诱发机制: 音乐高潮时纹状体释放增加；期待阶段尾状核激活；疗愈意义: 解释音乐愉悦的成瘾性与治疗动机；引用来源 (Citation): Salimpoor,
    V. N. et al. (2011).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Neuroscience.md
  section: 神经递质与音乐反应表
- type: concept
  question: 血清素的核心要点是什么？
  answer: '中文名称: 五羟色胺；英文术语: Serotonin (5-HT)；功能作用: 情绪稳定、幸福感；音乐诱发机制: 舒缓音乐可能调节5-HT系统；疗愈意义: 音乐辅助抑郁治疗的可能机制；引用来源 (Citation): Evers,
    S. & Suhr, B. (2000).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Neuroscience.md
  section: 神经递质与音乐反应表
- type: concept
  question: 皮质醇的核心要点是什么？
  answer: '中文名称: 皮质醇；英文术语: Cortisol；功能作用: 压力激素；音乐诱发机制: 聆听古典音乐后显著降低；疗愈意义: 音乐抗压、免疫调节效果的指标；引用来源 (Citation): Khalfa, S. et al.
    (2003).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Neuroscience.md
  section: 神经递质与音乐反应表
- type: concept
  question: Delta (δ)的核心要点是什么？
  answer: '频率范围: 0.5-4 Hz；意识状态: 深睡眠、无意识修复；音乐诱发特征: 极慢节奏、低频泛音、持续音；推荐曲目类型: 缓慢钟声、管风琴持续音、极简主义；临床应用: 睡眠障碍、深度放松；引用来源 (Citation):
    Thaut, M. H. (2005).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Neuroscience.md
  section: 脑波状态与音乐对应表
- type: concept
  question: Theta (θ)的核心要点是什么？
  answer: '频率范围: 4-8 Hz；意识状态: 深度放松、冥想、创意、REM睡眠；音乐诱发特征: 60 BPM以下、冥想性旋律、开放和声；推荐曲目类型: 萨蒂《吉姆诺佩迪》、部分德彪西；临床应用: 冥想辅助、创伤处理、内省；引用来源
    (Citation): Lagopoulos, J. et al. (2009).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Neuroscience.md
  section: 脑波状态与音乐对应表
- type: concept
  question: 音乐疗法的核心要点是什么？
  answer: '中文释义: 通过音乐实现治疗目标的临床干预；英文术语: Music Therapy；源头语言: Musiktherapie (德)；定义与内涵: 由认证音乐治疗师使用音乐干预来达成个体化治疗目标的循证健康专业。；专业视角
    (Professional Perspective): 区别于音乐医学 (Music Medicine)：后者由非音乐治疗师使用预录音乐，前者强调治疗关系与即兴互动。；引用来源 (Citation): Bruscia, K. E. (2014).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Overview.md
  section: 核心概念与定义表
- type: concept
  question: 接受性音乐疗法的核心要点是什么？
  answer: '中文释义: 聆听为主的疗愈方式；英文术语: Receptive Music Therapy；源头语言: Rezeptive Musiktherapie (德)；定义与内涵: 患者作为聆听者，通过选定音乐体验引发生理、情绪与认知反应。；专业视角
    (Professional Perspective): 包括引导意象与音乐 (GIM)、振动声学疗法等子方法。；引用来源 (Citation): Grocke, D. & Wigram, T. (2007).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Overview.md
  section: 核心概念与定义表
- type: concept
  question: 主动性音乐疗法的核心要点是什么？
  answer: '中文释义: 演奏/创作为主的疗愈；英文术语: Active Music Therapy；源头语言: Aktive Musiktherapie (德)；定义与内涵: 患者主动参与演奏、歌唱或即兴创作，促进表达与整合。；专业视角
    (Professional Perspective): Nordoff-Robbins 创造性音乐疗法为代表性方法。；引用来源 (Citation): Nordoff, P. & Robbins, C. (2007).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Overview.md
  section: 核心概念与定义表
- type: concept
  question: 古希腊音乐疗愈的核心要点是什么？
  answer: '年代: 公元前6世纪；代表人物: 毕达哥拉斯 (Pythagoras)；核心理念: 音乐比例反映宇宙和谐，可调节灵魂；主要贡献: 建立音乐与数学、宇宙秩序的关联；"音乐净化"概念；当代影响: 音乐频率疗愈、调式理论的哲学根基；引用来源
    (Citation): Godwin, J. (1987).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Overview.md
  section: 历史发展与学派表
- type: concept
  question: 柏拉图音乐教育的核心要点是什么？
  answer: '年代: 公元前4世纪；代表人物: 柏拉图 (Plato)；核心理念: 特定调式塑造品格与情绪；主要贡献: 《理想国》中论述调式对性格影响；多利安调式培养勇气；当代影响: 音乐处方的调式选择理论基础；引用来源 (Citation):
    Plato. Republic, Book III.'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Overview.md
  section: 历史发展与学派表
- type: concept
  question: 阿拉伯音乐医学的核心要点是什么？
  answer: '年代: 9-13世纪；代表人物: 阿尔法拉比 (Al-Farabi)、伊本·西那 (Ibn Sina)；核心理念: 木卡姆调式对应体液与器官；主要贡献: 系统化音乐-身体对应关系；医院音乐治疗实践；当代影响: 音乐与身体能量的对应思想；引用来源
    (Citation): Shiloah, A. (1995).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Overview.md
  section: 历史发展与学派表
- type: concept
  question: 情绪调节的核心要点是什么？
  answer: '作用机制: 唤起、释放、转化情绪；古典音乐特点: 丰富的动态变化、戏剧性张力、情感深度；代表性应用: 抑郁症辅助治疗、悲伤处理；神经生理基础: 边缘系统激活、多巴胺释放；专业视角 (Professional Perspective):
    古典音乐的复杂性允许更细腻的情绪镜像与引导。；引用来源 (Citation): Koelsch, S. (2014).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Overview.md
  section: 古典音乐的疗愈维度表
- type: concept
  question: 认知增强的核心要点是什么？
  answer: '作用机制: 注意力、记忆、执行功能；古典音乐特点: 复杂结构、主题发展、对位法；代表性应用: 阿尔茨海默症、ADHD辅助；神经生理基础: 前额叶激活、工作记忆强化；专业视角 (Professional Perspective):
    "莫扎特效应"虽被简化解读，但复杂音乐确能短期提升空间推理。；引用来源 (Citation): Rauscher, F. H. et al. (1993).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Overview.md
  section: 古典音乐的疗愈维度表
- type: concept
  question: 文艺复兴的核心要点是什么？
  answer: '年代: 1400-1600；核心美学: 和谐、均衡、人文主义；主要特征: 复调音乐、纯净人声、宗教主题；疗愈优势: 冥想性、神圣感、纯净音色；疗愈局限: 对现代听众可能陌生；代表作曲家: 帕莱斯特里纳、伯德、拉索；专业视角
    (Professional Perspective): 早期音乐的简洁性适合深度静默与灵性探索。'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Periods_Styles.md
  section: 音乐史时期疗愈特质总览表
- type: concept
  question: 巴洛克的核心要点是什么？
  answer: '年代: 1600-1750；核心美学: 情感论、戏剧性、对比；主要特征: 对位法、通奏低音、情感表达；疗愈优势: 结构清晰、可预测、秩序感；疗愈局限: 部分作品过于复杂；代表作曲家: 巴赫、亨德尔、维瓦尔第；专业视角 (Professional
    Perspective): 巴洛克的规律性提供安全的认知框架，常用于GIM。'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Periods_Styles.md
  section: 音乐史时期疗愈特质总览表
- type: concept
  question: 古典的核心要点是什么？
  answer: '年代: 1750-1820；核心美学: 清晰、平衡、典雅；主要特征: 主调和声、奏鸣曲式、对称结构；疗愈优势: 平衡感、清晰度、愉悦感；疗愈局限: 情感深度较浅；代表作曲家: 莫扎特、海顿、早期贝多芬；专业视角 (Professional
    Perspective): 古典时期的平衡比例常用于认知增强与焦虑缓解。'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Periods_Styles.md
  section: 音乐史时期疗愈特质总览表
- type: concept
  question: 赋格 (Fugue)的核心要点是什么？
  answer: '结构特点: 主题模仿、对位复杂；疗愈机制: 认知参与、注意力训练、秩序感；代表作品: 巴赫《平均律》赋格；适用情境: 专注力训练、冥想进阶；专业视角 (Professional Perspective): 赋格的追踪多声部要求高度注意力。；引用来源
    (Citation): Hallam, S. (2010).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Periods_Styles.md
  section: 巴洛克时期疗愈详解表
- type: concept
  question: 组曲 (Suite)的核心要点是什么？
  answer: '结构特点: 舞曲序列、多乐章；疗愈机制: 渐进变化、整体性、时间结构；代表作品: 巴赫《大提琴组曲》《管弦乐组曲》；适用情境: 完整疗程、ISO序列；专业视角 (Professional Perspective): 组曲的多乐章允许自然情绪过渡。；引用来源
    (Citation): Grocke, D. (2007).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Periods_Styles.md
  section: 巴洛克时期疗愈详解表
- type: concept
  question: 协奏曲 (Concerto)的核心要点是什么？
  answer: '结构特点: 独奏与合奏对话；疗愈机制: 个体与群体、张力与解决；代表作品: 维瓦尔第《四季》、巴赫《勃兰登堡》；适用情境: 能量调节、社交隐喻；专业视角 (Professional Perspective): 独奏-乐队对话可映射人际动力。；引用来源
    (Citation): Bonny, H. L. (2002).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Periods_Styles.md
  section: 巴洛克时期疗愈详解表
- type: concept
  question: 奏鸣曲式 (Sonata Form)的核心要点是什么？
  answer: '结构特点: 呈示-发展-再现；疗愈机制: 叙事结构、期待-满足、认知框架；代表作品: 莫扎特、海顿钢琴奏鸣曲；适用情境: 认知训练、情绪理解；专业视角 (Professional Perspective): 奏鸣曲式教导冲突与解决的模式。；引用来源
    (Citation): Huron, D. (2006).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Periods_Styles.md
  section: 古典时期疗愈详解表
- type: concept
  question: 交响曲 (Symphony)的核心要点是什么？
  answer: '结构特点: 多乐章、大规模；疗愈机制: 完整旅程、情绪多样性；代表作品: 莫扎特40/41、海顿94/104；适用情境: 完整疗程(选择乐章)；专业视角 (Professional Perspective): 交响曲提供情绪全景，需选择性使用。；引用来源
