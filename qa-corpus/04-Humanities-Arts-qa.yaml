- type: concept
  question: 什么是概述 (Overview)？
  answer: 克劳德·莫奈(Claude Monet, 1840-1926)是法国印象派运动的奠基人和核心人物，以其对光线和色彩的革命性探索而闻名于世。他通过一系列开创性的户外写生实践，彻底改变了西方绘画对自然的表现方式，为现代艺术的发展开辟了新的道路。从《日出·印象》到《睡莲》系列，莫奈用画笔捕捉了光与色的瞬息万变。
  source: 04-Humanities-Arts/arts/artists/modern/Monet.md
  section: 概述 (Overview)
- type: concept
  question: 什么是概述 (Overview)？
  answer: 克劳德·莫奈(Claude Monet, 1840-1926)一生创作了约2900件作品，涵盖了风景画、人物画、静物画等多个领域。这些作品以其革命性的光线表现、创新的色彩运用和独特的笔触技法，成为印象派艺术的经典代表。本文对其最具代表性的作品进行深度分析。
  source: 04-Humanities-Arts/arts/artists/modern/Monet_Works_Analysis.md
  section: 概述 (Overview)
- type: concept
  question: 什么是概述 (Overview)？
  answer: 巴勃罗·毕加索(Pablo Picasso, 1881-1973)是20世纪最具革命性的艺术家之一，以其开创性的立体主义风格彻底改变了现代艺术的发展轨迹。从蓝色时期到玫瑰时期，从非洲艺术影响到立体主义突破，再到超现实主义探索，毕加索的艺术生涯体现了对传统的大胆颠覆和对创新的不懈追求。
  source: 04-Humanities-Arts/arts/artists/modern/Picasso.md
  section: 概述 (Overview)
- type: concept
  question: 什么是概述 (Overview)？
  answer: 巴勃罗·毕加索(Pablo Picasso, 1881-1973)一生创作了超过50,000件作品，涵盖了绘画、雕塑、版画、陶瓷等多个艺术门类。这些作品不仅展现了他卓越的艺术才华，更体现了20世纪艺术发展的轨迹和人类精神探索的深度。本文精选其最具代表性的作品进行深度分析。
  source: 04-Humanities-Arts/arts/artists/modern/Picasso_Works_Analysis.md
  section: 概述 (Overview)
- type: concept
  question: 什么是概述 (Overview)？
  answer: 文森特·梵高(Vincent van Gogh, 1853-1890)是后印象派的杰出代表，以其炽热的情感表达、强烈的色彩运用和独特的笔触风格成为现代艺术史上最具感染力的艺术家之一。尽管生前只卖出过一幅画作，但他的艺术成就和精神追求对20世纪艺术发展产生了深远影响，被誉为表现主义的先驱。
  source: 04-Humanities-Arts/arts/artists/modern/VanGogh.md
  section: 概述 (Overview)
- type: concept
  question: 什么是概述 (Overview)？
  answer: 文森特·梵高(Vincent van Gogh, 1853-1890)虽然创作生涯只有短短十年，却留下了约2100件作品，包括860幅油画和1300多幅素描。这些作品以其独特的色彩语言、强烈的情感表达和个性化的笔触风格，成为现代艺术史上的不朽经典。本文对其最具代表性的作品进行深度分析。
  source: 04-Humanities-Arts/arts/artists/modern/VanGogh_Works_Analysis.md
  section: 概述 (Overview)
