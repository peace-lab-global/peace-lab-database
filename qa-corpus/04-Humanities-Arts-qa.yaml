  question: 什么是概述 (Overview)？
  answer: 约翰·塞巴斯蒂安·巴赫(Johann Sebastian Bach, 1685-1750)是德国巴洛克时期最伟大的作曲家，被誉为"西方音乐之父"和"音乐史上的旧约全书"。他在对位法、赋格技术、和声体系等方面的成就，为后世音乐发展奠定了坚实基础。巴赫的作品融合了德国、意大利、法国等多种音乐风格，将巴洛克音乐推向艺术巅峰。
  source: 04-Humanities-Arts/media/music/musician/composers/Bach.md
  section: 概述 (Overview)
- type: concept
  question: 什么是概述 (Overview)？
  answer: 路德维希·范·贝多芬(Ludwig van Beethoven, 1770-1827)是德国古典音乐史上最伟大的作曲家之一，也是连接古典主义和浪漫主义音乐的关键人物。他以其深刻的情感表达、创新的音乐语言和不屈的精神意志，成为世界音乐史上最具影响力的艺术家之一。
  source: 04-Humanities-Arts/media/music/musician/composers/Beethoven.md
  section: 概述 (Overview)
- type: concept
  question: 什么是概述 (Overview)？
  answer: 约翰内斯·勃拉姆斯(Johannes Brahms, 1833-1897)是德国浪漫主义时期最伟大的作曲家之一，被誉为"古典主义的浪漫主义者"和"贝多芬的继承者"。他将古典主义的严谨结构与浪漫主义的情感表达完美结合，创作了四部交响曲、两部钢琴协奏曲、一部小提琴协奏曲、《德意志安魂曲》等不朽作品。勃拉姆斯的音乐以其深厚的对位技巧、丰富的和声语言、严谨的结构逻辑和深刻的情感内涵著称，成为连接古典与浪漫的重要桥梁。
  source: 04-Humanities-Arts/media/music/musician/composers/Brahms.md
  section: 概述 (Overview)
- type: concept
  question: 什么是概述 (Overview)？
  answer: 弗雷德里克·肖邦(Frédéric Chopin, 1810-1849)是波兰浪漫主义时期最伟大的作曲家和钢琴家，被誉为"钢琴诗人"和"浪漫主义音乐的典型代表"。他一生专注于钢琴创作，几乎只为钢琴而作曲，创作了大量具有高度艺术价值和民族特色的钢琴作品。肖邦的音乐融合了波兰民族音乐元素与浪漫主义的情感表达，将钢琴音乐推向了前所未有的艺术高度，对后世钢琴音乐发展产生了深远影响。
  source: 04-Humanities-Arts/media/music/musician/composers/Chopin.md
  section: 概述 (Overview)
