- type: concept
  question: 什么是一、总体评价？
  answer: 亚隆的小说不如他的非虚构作品著名，但它们有一个独特的优势：**他可以通过虚构的人物来展示存在主义心理治疗在"真实生活"中的运作。** 在《叔本华的治疗》中，他创造了一个完美的教学场景——一个治疗师必须在面对自己的死亡时，继续帮助他的患者。
  source: 04-Humanities-Arts/literature/world-nonfiction/psychology-existential/the-schopenhauer-cure.md
  section: 一、总体评价
- type: concept
  question: 什么是三、阅读体验？
  answer: '**评分：8.5/10** — 亚隆的小说有一种 clinical 的精确和 literary 的温暖的结合。它不是"伟大的文学"，但它是"有效的教学"。对于想要理解"存在主义心理治疗如何在团体中运作"的人来说，这本书比任何教科书都更有效。对于亚隆的忠实读者来说，这是他的作品中不可或缺的一部。'
  source: 04-Humanities-Arts/literature/world-nonfiction/psychology-existential/the-schopenhauer-cure.md
  section: 三、阅读体验
- type: concept
  question: 什么是一、总体评价？
  answer: 波伏娃做了一件前所未有的事：她不是把"女性问题"当作社会学或生理学的问题来处理，而是把它当作**存在论的问题**——"作为女人存在"意味着什么？这种存在方式是如何被建构的？它如何限制了女性的自由？
  source: 04-Humanities-Arts/literature/world-nonfiction/psychology-existential/the-second-sex.md
