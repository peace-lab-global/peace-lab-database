  question: 什么是概述 (Overview)？
  answer: 《三国演义》是中国古典历史小说的开山之作，由元末明初罗贯中创作。作品以东汉末年到西晋统一的历史为背景，通过描写魏、蜀、吴三国的政治军事斗争，展现了中国古代政治智慧和军事谋略的精彩画卷。这部作品以其宏大的历史视野、生动的人物塑造、精彩的战争描写而著称，是中国古典文学中最具影响力的历史小说，在世界文学史上也占有重要地位。
  source: 04-Humanities-Arts/literature/chinese-classical-literature/qing-novels/four-classics/San_Guo_Yan_Yi_Complete_Analysis.md
  section: 概述 (Overview)
- type: concept
  question: 什么是概述 (Overview)？
  answer: 《水浒传》是中国古典英雄传奇小说的代表作，相传为元末明初施耐庵所作。作品以北宋末年宋江领导的梁山好汉起义为背景，通过描写一百零八位好汉聚义梁山的英雄事迹，展现了中国古代社会的复杂面貌和人民的反抗精神。这部作品以其恢弘的气势、生动的人物塑造、曲折的情节安排而著称，是中国古典小说中最具人民性和反抗精神的杰作之一。
  source: 04-Humanities-Arts/literature/chinese-classical-literature/qing-novels/four-classics/Shui_Hu_Zhuan_Complete_Analysis.md
  section: 概述 (Overview)
- type: concept
  question: 什么是概述 (Overview)？
  answer: 《西游记》是中国古典神魔小说的代表作，由明代作家吴承恩创作。这部作品以唐僧师徒西天取经为主线，通过丰富的想象和生动的描写，创造了一个充满神奇色彩的神话世界。作品融合了佛教、道教、儒家思想，体现了深刻的人生哲理和社会理想，是中国古典文学中最具想象力和艺术成就的作品之一，在世界文学史上也占有重要地位。
  source: 04-Humanities-Arts/literature/chinese-classical-literature/qing-novels/four-classics/Xi_You_Ji_Complete_Analysis.md
  section: 概述 (Overview)
