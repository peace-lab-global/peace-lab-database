- type: concept
  question: 什么是概述 (Overview)？
  answer: 马致远(约1250-1321)，字千里，号东篱，大都(今北京)人，是元代最杰出的散曲家和杂剧作家，被誉为"曲状元"，与关汉卿、白朴、郑光祖并称"元曲四大家"。他在散曲创作方面成就卓著，尤其擅长小令，其作品意境深远，语言精练，情感真挚，在中国古典文学史上占有重要地位。
  source: 04-Humanities-Arts/literature/chinese-classical-literature/yuan-drama/playwrights/Ma_Zhiyuan_Complete_Profile.md
  section: 概述 (Overview)
- type: concept
  question: 什么是概述 (Overview)？
  answer: 中国现代诗歌是指1917年胡适发表《文学改良刍议》以来，特别是五四新文化运动以来的新诗创作。现代诗歌以其反传统、求创新的革命精神，白话文的语言形式，以及对现代人精神世界的深刻关注而著称。百年来，中国现代诗歌经历了从草创到成熟、从模仿到创新的发展历程，涌现出了郭沫若、徐志摩、闻一多、戴望舒、艾青、北岛、顾城、海子等众多杰出诗人，创作了大量具有重要影响的优秀作品，为中国现代文学的发展做出了重要贡献。
  source: 04-Humanities-Arts/literature/chinese-poetry/modern/Chinese_Modern_Poetry_Overview.md
  section: 概述 (Overview)
