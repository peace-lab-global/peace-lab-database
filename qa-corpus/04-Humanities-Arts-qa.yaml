  section: 内容索引 | Contents
- type: concept
  question: 什么是概述 (Overview)？
  answer: 现代中国文学是指1919年五四运动至1949年新中国成立这一时期的文学创作，是中国文学从传统向现代转型的关键阶段。这一时期的文学以其反封建、反传统的革命精神，现实主义的创作方法，以及对民族命运的深切关注而著称，涌现出了鲁迅、郭沫若、茅盾、老舍、巴金、沈从文、张爱玲等一大批杰出作家，创作了大量具有深远影响的优秀作品，为中国现代文学的发展奠定了坚实基础。
  source: 04-Humanities-Arts/literature/modern-chinese-literature/near-modern/Near_Modern_Literature_Overview.md
  section: 概述 (Overview)
- type: concept
  question: 什么是概述 (Overview)？
  answer: 巴金(1904-2005)，原名李尧棠，字芾甘，是中国现代著名作家、翻译家、出版家，杰出的社会活动家。作为中国现代文学的重要代表人物，巴金以其激流三部曲《家》《春》《秋》等作品，深刻反映了20世纪前期中国社会的巨大变革和青年一代的觉醒历程。他以炽热的激情、真挚的情感和深刻的思想，为中国现代文学的发展做出了卓越贡献，被誉为"二十世纪中国文学的良心"。
  source: 04-Humanities-Arts/literature/modern-chinese-literature/near-modern/authors/Ba_Jin_Complete_Profile.md
  section: 概述 (Overview)
- type: concept
  question: 什么是内容索引 | Contents？
  answer: '- [Ba Jin Complete Profile](Ba_Jin_Complete_Profile.md)

    - [Lao She Complete Profile](Lao_She_Complete_Profile.md)

    - [Lu Xun Complete Profile](Lu_Xun_Complete_Profile.md)

    - [Mao Dun Complete Profile](Mao_Dun_Complete_Profile.md)'
  source: 04-Humanities-Arts/literature/modern-chinese-literature/near-modern/authors/INDEX.md
  section: 内容索引 | Contents
- type: concept
  question: 什么是概述 (Overview)？
  answer: 老舍(1899-1966)，原名舒庆春，字舍予，是中国现代著名作家、杰出的语言大师、人民艺术家。作为中国现代文学的重要奠基人之一，老舍以其独特的平民视角、浓郁的北京风味、幽默讽刺的艺术风格而著称。他的作品如《骆驼祥子》《四世同堂》《茶馆》等，深刻反映了北京市民阶层的生活状态和精神面貌，为中国现代文学的发展做出了卓越贡献。
  source: 04-Humanities-Arts/literature/modern-chinese-literature/near-modern/authors/Lao_She_Complete_Profile.md
  section: 概述 (Overview)
- type: concept
  question: 什么是概述 (Overview)？
  answer: 鲁迅(1881-1936)，原名周樟寿，后改名周树人，浙江绍兴人，是中国现代文学的奠基人、伟大的思想家和革命家。他以其深刻的思想洞察力、犀利的批判精神和卓越的文学才华，成为中国现代文学史上最重要、影响最深远的作家。其作品涵盖了小说、散文、杂文、诗歌、翻译等多个领域，在思想启蒙、文化批判、文学创新等方面都做出了杰出贡献。
  source: 04-Humanities-Arts/literature/modern-chinese-literature/near-modern/authors/Lu_Xun_Complete_Profile.md
  section: 概述 (Overview)
- type: concept
  question: 什么是概述 (Overview)？
  answer: 茅盾(1896-1981)，原名沈德鸿，字雁冰，是中国现代著名作家、文学评论家、文化活动家，杰出的马克思主义文艺理论家。作为中国现代文学的重要奠基人之一，茅盾以其宏大的现实主义创作、深刻的社会洞察力和卓越的文学理论贡献而著称。他的作品如《子夜》《蚀》三部曲等，深刻反映了20世纪上半叶中国社会的巨大变迁，为中国现代文学的发展做出了不可磨灭的贡献。
  source: 04-Humanities-Arts/literature/modern-chinese-literature/near-modern/authors/Mao_Dun_Complete_Profile.md
  section: 概述 (Overview)
- type: concept
  question: 什么是概述 (Overview)？
  answer: 文学治疗(Literary Therapy/Bibliotherapy)是一种利用文学作品进行心理治疗和精神疗愈的专业方法。通过阅读、创作、讨论文学作品，帮助个体处理情感困扰、促进自我认知、改善心理健康状况。本体系涵盖中国古典文学、现代文学以及世界文学的治疗应用，为心理健康专业人士和文学爱好者提供系统性的指导和参考。
  source: 04-Humanities-Arts/literature/therapy/Comprehensive_Literary_Therapy_System.md
  section: 概述 (Overview)
- type: concept
  question: 什么是Overview？
  answer: Dante Alighieri (1265-1321), the father of Italian literature and one of the greatest poets in world literature,
    created "The Divine Comedy" - an epic masterpiece that serves as both a spiritual journey and a profound psychological
    exploration. His work offers unique therapeutic value for modern readers seeking guidance through life's challenges and
    spiritual growth.
  source: 04-Humanities-Arts/literature/therapy/Dante_Therapy.md
  section: Overview
- type: concept
  question: 什么是Conclusion？
  answer: Dante's literary legacy continues to offer profound therapeutic resources for contemporary readers. Through systematic
    engagement with "The Divine Comedy," individuals can access timeless wisdom for navigating life's challenges, developing
    moral courage, and pursuing meaningful personal transformation. The structured journey from darkness to light provides
    both inspiration and practical guidance for modern psychological and spiritual development.
  source: 04-Humanities-Arts/literature/therapy/Dante_Therapy.md
  section: Conclusion
- type: concept
  question: 什么是内容索引 | Contents？
  answer: '- [Comprehensive Literary Therapy System](Comprehensive_Literary_Therapy_System.md)

    - [Dante Therapy](Dante_Therapy.md)

    - [Shakespeare Therapy](Shakespeare_Therapy.md)

    - [World Literature Therapy](World_Literature_Therapy.md)'
  source: 04-Humanities-Arts/literature/therapy/INDEX.md
  section: 内容索引 | Contents
- type: concept
  question: 什么是Overview？
  answer: William Shakespeare (1564-1616), universally acknowledged as the greatest dramatist in English literature, created
    works that penetrate the deepest complexities of human nature. His plays and sonnets offer unparalleled therapeutic resources
    for understanding emotions, relationships, and the human condition. From the psychological depths of "Hamlet" to the redemptive
    power of "The Tempest," Shakespeare's literary corpus provides rich material for therapeutic exploration and personal
    growth.
  source: 04-Humanities-Arts/literature/therapy/Shakespeare_Therapy.md
  section: Overview
- type: concept
  question: 什么是Conclusion？
  answer: Shakespeare's enduring literary genius continues to provide exceptional therapeutic resources for contemporary audiences.
    His masterful exploration of human nature, combined with his unparalleled linguistic artistry, offers unique pathways
    for psychological healing, emotional growth, and spiritual development. Through thoughtful engagement with his works,
    individuals can gain profound insights into their own lives while connecting with the shared human experience that transcends
    time and culture
  source: 04-Humanities-Arts/literature/therapy/Shakespeare_Therapy.md
  section: Conclusion
- type: concept
  question: 什么是概述 (Overview)？
  answer: 世界文学史上的伟大作家们以其深邃的思想、精湛的文字和永恒的主题，为人类精神世界贡献了宝贵的财富。从但丁的《神曲》到莎士比亚的戏剧，这些文学经典不仅具有极高的艺术价值，更蕴含着深刻的人生智慧和疗愈力量。本指南旨在探索文学作品的心理疗愈价值，帮助读者在阅读中获得心灵的成长和精神的滋养。
  source: 04-Humanities-Arts/literature/therapy/World_Literature_Therapy.md
  section: 概述 (Overview)
- type: concept
  question: 什么是结语？
  answer: 世界文学巨匠们的作品是人类智慧的结晶，为我们提供了宝贵的精神资源和疗愈工具。通过有意识地运用这些文学经典，我们不仅能够获得审美的愉悦和知识的增长，更能在精神层面得到深刻的启发和滋养，实现更加丰富和完善的人生体验。
  source: 04-Humanities-Arts/literature/therapy/World_Literature_Therapy.md
  section: 结语
- type: concept
  question: 什么是关联知识？
  answer: '- [死亡心理学](../../../03-Bio-Science/death/) — 死亡焦虑、临终心理、死亡冥想的科学视角

    - [冥想与心理疗愈](../../../02-Mind-Psychology/meditation/) — 正念、内观、禅修的临床与研究

