  question: 什么是摘要 (Abstract)？
  answer: 本文采用心理动力学、女性主义电影理论与创伤研究的交叉分析框架，深入剖析Paul Feig执导的2026年心理惊悚片《女仆》。影片改编自Freida McFadden畅销小说，在Kim Ki-young 1960年经典作品基础上进行了当代重构。研究重点关注阶级创伤的代际传递、女性主体性的建构与解构、以及创伤叙事中的权力反转机制。通过符号学分析、精神分析阐释与社会批判理论，本文揭示了影片如何在商业类型片包装下承载深刻的心理治疗价值。
