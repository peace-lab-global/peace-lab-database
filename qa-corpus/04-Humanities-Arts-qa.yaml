  question: 行为激活的核心要点是什么？
  answer: '整合技术: 活动日程绘画；操作要点: 1. 用图表形式绘制一周活动<br>2. 标注情绪色彩变化<br>3. 规划积极活动填色；协同机制: 视觉化提高执行动机；适应病症: 抑郁症；效果增强: 行为激活依从性提高'
