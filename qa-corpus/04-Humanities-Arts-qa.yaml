  question: 什么是概述 (Overview)？
  answer: 列奥纳多·达·芬奇(Leonardo da Vinci, 1452-1519)是意大利文艺复兴时期最杰出的代表人物之一，被誉为"文艺复兴人"的完美典范。他在绘画、雕塑、建筑、工程、解剖学、天文学等多个领域都取得了卓越成就，体现了文艺复兴时期对知识全面追求的理想。
  source: 04-Humanities-Arts/arts/artists/renaissance/Leonardo_da_Vinci.md
  section: 概述 (Overview)
- type: concept
  question: 什么是概述 (Overview)？
  answer: 米开朗基罗·博纳罗蒂(Michelangelo Buonarroti, 1475-1564)是意大利文艺复兴时期最伟大的艺术家之一，在雕塑、绘画、建筑和诗歌等多个领域都取得了卓越成就。他以其完美的艺术技巧、深刻的人文主义思想和强烈的个性风格，成为西方艺术史上最具有影响力的艺术家之一。
  source: 04-Humanities-Arts/arts/artists/renaissance/Michelangelo.md
