- type: concept
  question: 什么是概述 (Overview)？
  answer: 清代小说是中国古典长篇小说发展的黄金时期，涌现出了《红楼梦》《西游记》《水浒传》《三国演义》等四大名著以及其他众多优秀的长篇小说作品。清代小说以其题材广泛、结构宏大、人物众多、技法精湛而著称，代表了中国古典小说艺术的最高成就，在世界文学史上也占有重要地位。这些作品不仅具有极高的文学价值，也是研究清代社会历史、文化思想的重要资料。
  source: 04-Humanities-Arts/literature/chinese-classical-literature/qing-novels/Qing_Novels_Overview.md
  section: 概述 (Overview)
- type: concept
  question: 什么是概述 (Overview)？
  answer: 《红楼梦》是中国古典长篇小说的巅峰之作，也是世界文学宝库中的瑰宝。全书一百二十回，前八十回为曹雪芹所作，后四十回一般认为由高鹗续写完成。这部小说以其宏大的结构、丰富的人物、精湛的技法和深刻的思想内容，代表了中国古典小说艺术的最高成就，在世界文学史上占有极其重要的地位。
  source: 04-Humanities-Arts/literature/chinese-classical-literature/qing-novels/four-classics/Hong_Lou_Meng_Complete_Analysis.md
