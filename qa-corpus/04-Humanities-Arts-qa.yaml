    认同"有毒角色";价值观混乱；专业视角 (Professional Perspective): 不同于电影的"瞬间认同",剧集是"慢煮青蛙"式认同'
  source: 04-Humanities-Arts/media/tv/television-therapy/Television_Therapy.md
