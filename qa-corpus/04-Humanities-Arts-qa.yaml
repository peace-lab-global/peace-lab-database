  question: 七弦的核心要点是什么？
  answer: '拼音: Qī xián；英文名 (English): Seven Strings；精确定义: 古琴的七根弦，象征五音与阴阳；疗愈意义: 宇宙秩序的声音化；专业视角: 七弦对应天地人'
