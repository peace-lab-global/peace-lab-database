  question: 古琴的核心要点是什么？
  answer: '拼音: Gǔqín；英文名 (English): Guqin / Chinese Zither；精确定义: 中国传统七弦拨弦乐器，有三千余年历史；疗愈意义: 中国最具灵性的乐器；专业视角: 琴是"圣人治世之器"'
