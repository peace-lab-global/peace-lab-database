  question: 慢性背痛的核心要点是什么？
  answer: '疼痛机制: 中枢敏化、心理因素；音乐干预策略: 放松、情绪调节、认知分散；推荐曲目: 长时长作品：哥德堡变奏曲、组曲；使用时机: 疼痛高峰期、夜间；效果评估: 疼痛日记、功能改善；引用来源 (Citation): Siedliecki,
