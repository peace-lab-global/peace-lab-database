- type: concept
  question: 什么是概述 (Overview)？
  answer: 先锋文学是中国当代文学中最具实验性和创新性的文学流派，兴起于1980年代中后期，以反传统、重实验、求创新为主要特征。这一文学运动以其大胆的形式探索、深刻的哲学思辨和前卫的艺术理念，在中国文学史上留下了浓墨重彩的一笔，对当代文学的发展产生了深远影响。
  source: 04-Humanities-Arts/literature/modern-chinese-literature/avant-garde/Avant-garde_Literature_Overview.md
