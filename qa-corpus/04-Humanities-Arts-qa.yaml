  question: 什么是概述 (Overview)？
  answer: 李清照(1084-约1155)，号易安居士，齐州章丘(今山东济南)人，宋代最杰出的女词人，被誉为"千古第一才女"。她在中国古典文学史上占有独特而重要的地位，不仅因为她是女性作家中的佼佼者，更因为她以卓越的艺术才华将词体推向了前所未有的艺术高度。其词作风格以婉约为主，情感真挚细腻，语言清新自然，在继承传统的基础上又有大胆创新，对后世词学发展产生了深远影响。
  source: 04-Humanities-Arts/literature/chinese-classical-literature/song-lyrics/authors/Li_Qingzhao_Complete_Profile.md
  section: 概述 (Overview)
- type: concept
  question: 什么是概述 (Overview)？
  answer: 苏轼(1037-1101)，字子瞻，号东坡居士，眉州眉山(今四川眉山)人，北宋著名的文学家、书画家、政治家。他是宋代文坛的领袖人物，在诗、词、散文、书法、绘画等领域都有杰出成就，被誉为"全才型"文学艺术家。其词作开创了豪放词派，"以诗为词"的创新理念极大地拓展了词体的表现领域，对中国古典文学发展产生了深远影响。
  source: 04-Humanities-Arts/literature/chinese-classical-literature/song-lyrics/authors/Su_Shi_Complete_Profile.md
  section: 概述 (Overview)
- type: concept
  question: 什么是概述 (Overview)？
  answer: 辛弃疾(1140-1207)，字幼安，号稼轩，历城(今山东济南)人，南宋著名词人、将领。他是豪放词派的集大成者和代表人物，与苏轼并称"苏辛"，与李清照并称"济南二安"。其词作以豪放雄浑、慷慨悲壮为主要风格，内容广泛涉及爱国情怀、人生感慨、田园生活等方面，代表了南宋词坛的最高成就，在中国文学史上占有极其重要的地位。
  source: 04-Humanities-Arts/literature/chinese-classical-literature/song-lyrics/authors/Xin_Qiji_Complete_Profile.md
