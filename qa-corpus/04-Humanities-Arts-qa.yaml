- type: concept
  question: 什么是一、总体评价？
  answer: 莱恩在这本书中把矛头指向了社会本身——不是"病人有问题"，而是**"社会有病，病人只是症状"**。这个论点在1967年是极具争议的，在今天仍然是 provocative 的。
  source: 04-Humanities-Arts/literature/world-nonfiction/psychology-existential/the-politics-of-experience.md
  section: 一、总体评价
- type: concept
  question: 什么是三、阅读体验？
  answer: '**评分：8.5/10** — 这本书比《分裂的自我》更加政治化、更加激进。它不是"治疗手册"，而是"社会批判"。对于对"精神医学的社会建构"有兴趣的人来说，这是必读书。对于寻求"个人疗愈"的读者来说，它可能过于宏观。'
  source: 04-Humanities-Arts/literature/world-nonfiction/psychology-existential/the-politics-of-experience.md
  section: 三、阅读体验
- type: concept
  question: 什么是一、总体评价？
  answer: 如果《千面英雄》是坎贝尔的"学术巨著"，《神话的力量》就是他的"大众讲座"。书中的对话形式让坎贝尔的思想变得更加 accessible——莫耶斯扮演"好奇的门外汉"，不断提出普通观众会问的问题，而坎贝尔则用他标志性的热情和博学来回答。
  source: 04-Humanities-Arts/literature/world-nonfiction/psychology-existential/the-power-of-myth.md
  section: 一、总体评价
- type: concept
  question: 什么是三、阅读体验？
  answer: '**评分：8.8/10** — 这是坎贝尔最容易进入的一本书，也是他最受欢迎的一本。对话形式让它读起来像小说一样流畅。对于任何感到"现代生活缺乏意义"的人来说，这本书提供了一个丰富的替代框架——不是要你"相信"古老的神话，而是要你**理解神话在人类心理中的功能**，并可能在当代生活中找到或创造属于自己的"个人神话"。'
  source: 04-Humanities-Arts/literature/world-nonfiction/psychology-existential/the-power-of-myth.md
  section: 三、阅读体验
- type: concept
  question: 什么是总体评价？
  answer: 《健全的社会》是埃里希·弗洛姆最具社会批判锋芒的著作，也是他将精神分析学说从个体临床拓展到社会诊断的系统性尝试。在这部著作中，弗洛姆向一个看似理所当然的前提发起了挑战：如果一个社会中的大多数人看起来都"正常"——他们有工作、有家庭、有娱乐、没有明显的精神症状——这是否就意味着这个社会是"健全的"？弗洛姆的回答是斩钉截铁的：不。一个社会可以在统计意义上"正常"，同时在存在意义上"病态"——当病态已经成为社会的"常规"时，"正常"本身就是病态的标志。
  source: 04-Humanities-Arts/literature/world-nonfiction/psychology-existential/the-sane-society.md
  section: 总体评价
- type: concept
  question: 什么是阅读体验？
  answer: 阅读《健全的社会》是一次令人不安却又解放性的体验。弗洛姆的文本有一种特殊的"照镜子的"效果——他描述的许多"社会病态"，初读时可能会让人感到"这不是在说我自己吗？"这种自我认知虽然不适，却是改变的开始。
