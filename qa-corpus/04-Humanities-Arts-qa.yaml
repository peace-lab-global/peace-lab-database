  question: 认知重构的核心要点是什么？
  answer: '整合技术: 视觉化认知图式；操作要点: 1. 绘制负面自动思维<br>2. 用不同色彩重新描绘<br>3. 创造替代性认知图像；协同机制: 视觉化增强认知灵活性；适应病症: 抑郁、焦虑障碍；效果增强: 认知改变效果提升30-40%'
  source: 04-Humanities-Arts/arts/arts-therapy/Art_Therapy_Clinical_Integration.md
  section: 表1.1 认知行为疗法整合 (CBT Integration)
