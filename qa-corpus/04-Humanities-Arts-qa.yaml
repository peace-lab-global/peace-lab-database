  question: 十三徽的核心要点是什么？
  answer: '拼音: Shísān huī；英文名 (English): Thirteen Studs；精确定义: 琴面十三个定音标记，对应月数；疗愈意义: 时间的空间化标记；专业视角: 十三徽象征十二月加闰月'
