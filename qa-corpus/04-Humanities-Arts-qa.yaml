- type: concept
  question: 什么是概述 (Overview)？
  answer: 元曲是中国古典文学史上继唐诗、宋词之后的又一重要文学形式，主要包括杂剧和散曲两大类别，活跃于公元13-14世纪的元代。元曲以其通俗性、现实性和艺术性的完美结合，反映了元代社会生活的各个方面，代表了中国古典戏曲文学的最高成就，在中国文学史和戏剧史上都占有极其重要的地位。
  source: 04-Humanities-Arts/literature/chinese-classical-literature/yuan-drama/Yuan_Drama_Overview.md
  section: 概述 (Overview)
- type: concept
  question: 什么是概述 (Overview)？
  answer: 关汉卿(约1220-1300)，号已斋叟，大都(今北京)人，是元代最杰出的戏剧家，被誉为"元曲四大家"之首，有"东方莎士比亚"之美誉。他在中国古典戏曲史上占有极其重要的地位，一生创作了六十余种杂剧，现存十八种，其中《窦娥冤》《救风尘》《单刀会》等作品堪称中国古典悲剧和喜剧的典范，代表了元代杂剧艺术的最高成就。
  source: 04-Humanities-Arts/literature/chinese-classical-literature/yuan-drama/playwrights/Guan_Hanqing_Complete_Profile.md
  section: 概述 (Overview)
