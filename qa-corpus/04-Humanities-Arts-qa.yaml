- type: concept
  question: 媒体疗法的核心要点是什么？
  answer: '英文名 (English Term): Media Therapy；原始语言/术语 (Original Language): 拉: *Therapia Medialis*；精确定义: 利用电影、电视、动漫、游戏等媒体内容作为治疗工具,促进心理健康与情感调节的系统化干预；区分与备注:
    不同于娱乐消费,强调有意识的治疗性选择与专业引导；专业视角 (Professional Perspective): 媒体不仅是"逃避现实",更是"重构现实"的心理工具'
  source: 04-Humanities-Arts/media/media-therapy/Media_Therapy_Overview.md
  section: Core Terminology of Media Therapy (媒体疗法核心术语总览表)
- type: concept
  question: 叙事疗法的核心要点是什么？
  answer: '英文名 (English Term): Narrative Therapy；原始语言/术语 (Original Language): 拉: *Narratio Therapeutica*; 希: *Διήγηση Θεραπευτική*；精确定义:
    通过重构个人生命故事来改变问题意义,由Michael White与David Epston创立；区分与备注: 媒体叙事是"外部化"技术的延伸;虚构故事提供安全的认同空间；专业视角 (Professional Perspective):
    媒体叙事让来访者看到"另一种可能的自己"'
  source: 04-Humanities-Arts/media/media-therapy/Media_Therapy_Overview.md
  section: Core Terminology of Media Therapy (媒体疗法核心术语总览表)
- type: concept
  question: 影视治疗的核心要点是什么？
  answer: '英文名 (English Term): Cinematherapy / Film Therapy；原始语言/术语 (Original Language): 拉: *Cinema Curatio*; 希: *Κινηματογράφος
    Θεραπεία*；精确定义: 使用电影作为心理治疗的辅助工具,包含观影前评估、观影后讨论与整合；区分与备注: 由Gary Solomon于1990s系统化;不同于单纯"推荐电影"；专业视角 (Professional Perspective):
    电影是"安全的情感实验室";可以体验禁忌情感而不承担现实后果'
  source: 04-Humanities-Arts/media/media-therapy/Media_Therapy_Overview.md
  section: Core Terminology of Media Therapy (媒体疗法核心术语总览表)
- type: concept
  question: 古代-戏剧疗法起源的核心要点是什么？
  answer: '代表事件: 古希腊悲剧;亚里士多德《诗学》；理论基础: 卡塔西斯 (Catharsis/κάθαρσις):通过戏剧释放压抑情感；媒体形式: 戏剧、神话叙事；里程碑: 悲剧作为集体心理治疗仪式；专业视角 (Professional
    Perspective): 媒体疗法的原型;共同体验悲剧产生情感净化与社会凝聚'
  source: 04-Humanities-Arts/media/media-therapy/Media_Therapy_Overview.md
  section: Historical Development of Media Therapy (媒体疗法历史发展表)
- type: concept
  question: 1940s-50s 心理剧的核心要点是什么？
  answer: '代表事件: Jacob Moreno创立心理剧 (Psychodrama)；理论基础: 角色扮演、替身技术、即兴创作；媒体形式: 现场戏剧表演；里程碑: 将戏剧从观看转为参与;治疗师成为"导演"；专业视角 (Professional
    Perspective): 后来影响电影/游戏疗法的"角色认同"技术'
  source: 04-Humanities-Arts/media/media-therapy/Media_Therapy_Overview.md
  section: Historical Development of Media Therapy (媒体疗法历史发展表)
- type: concept
  question: 1990s-影视治疗系统化的核心要点是什么？
  answer: '代表事件: Gary Solomon《The Motion Picture Prescription》出版；理论基础: 社会学习理论 (Bandura);认知行为疗法；媒体形式: 电影、纪录片；里程碑: 首次提出"电影处方"
    (Movie Prescription) 概念；专业视角 (Professional Perspective): 将电影从娱乐提升为"结构化治疗工具";附带讨论指南'
  source: 04-Humanities-Arts/media/media-therapy/Media_Therapy_Overview.md
  section: Historical Development of Media Therapy (媒体疗法历史发展表)
- type: concept
  question: 社会学习理论的核心要点是什么？
  answer: '英文名: Social Learning Theory；创始人/来源: Albert Bandura (1977)；核心概念: 观察学习;替代性强化;自我效能；在媒体疗法中的应用: 观众通过电影/剧集角色学习应对策略;看到"角色成功应对"提升自我效能；专业视角
    (Professional Perspective): Bandura的"波波玩偶实验"证明媒体影响行为;治疗中选择"积极榜样"角色'
  source: 04-Humanities-Arts/media/media-therapy/Media_Therapy_Overview.md
  section: Theoretical Foundations of Media Therapy (媒体疗法理论基础表)
- type: concept
  question: 认同理论的核心要点是什么？
  answer: '英文名: Identification Theory；创始人/来源: Kelman (1958)；核心概念: 角色认同;内化;顺从；在媒体疗法中的应用: 观众与角色的情感联结;通过角色体验不同人生;认同"康复角色"促进自身康复；专业视角
    (Professional Perspective): 认同不是"模仿",而是"心理融合";好角色是"理想自我"的投射'
  source: 04-Humanities-Arts/media/media-therapy/Media_Therapy_Overview.md
  section: Theoretical Foundations of Media Therapy (媒体疗法理论基础表)
- type: concept
  question: 媒体疗法的核心要点是什么？
  answer: '英文名 (English Term): Media Therapy；原始语言/术语 (Original Language): 拉: *Therapia Medialis*；精确定义: 利用电影、电视、动漫、游戏等媒体内容作为治疗工具,促进心理健康与情感调节的系统化干预；区分与备注:
    不同于娱乐消费,强调有意识的治疗性选择与专业引导；专业视角 (Professional Perspective): 媒体不仅是"逃避现实",更是"重构现实"的心理工具'
  source: 04-Humanities-Arts/media/media-therapy/Media_Therapy_Overview2.md
  section: Core Terminology of Media Therapy (媒体疗法核心术语总览表)
