  section: 内容索引 | Contents
- type: concept
  question: 什么是概述 (Overview)？
  answer: 李白(701-762)，字太白，号青莲居士，祖籍陇西成纪(今甘肃秦安)，出生于西域碎叶城(今吉尔吉斯斯坦托克马克)，是盛唐时期最杰出的浪漫主义诗人，被誉为"诗仙"。其诗歌以豪放飘逸、想象奇特、语言清新著称，代表了盛唐诗歌的最高艺术成就，在中国文学史上占据着极其重要的地位。
  source: 04-Humanities-Arts/literature/chinese-classical-literature/tang-poetry/authors/Li_Bai_Complete_Profile.md
  section: 概述 (Overview)
- type: concept
  question: 什么是概述 (Overview)？
  answer: 王维(701-761)，字摩诘，号摩诘居士，祖籍太原祁县(今山西祁县)，出生于蒲州(今山西永济)。盛唐时期杰出的诗人、画家、音乐家，被誉为"诗佛"。其诗歌以山水田园为主要题材，意境优美深远，语言清新自然，具有浓厚的禅意和画意，开创了中国古典诗歌山水田园诗派，在中国文学史和艺术史上都占有重要地位。
  source: 04-Humanities-Arts/literature/chinese-classical-literature/tang-poetry/authors/Wang_Wei_Complete_Profile.md
  section: 概述 (Overview)
