- type: concept
  question: 什么是概述 (Overview)？
  answer: 余华(1960-)是中国当代最杰出的小说家之一，也是先锋文学的重要代表作家。他以其独特的"零度写作"风格、冷静客观的叙述语调和对人性黑暗面的深刻揭示而著称。从早期的先锋实验小说到后来的现实主义力作，余华的创作历程体现了中国当代文学从形式探索向内容深度的重要转型，其作品《活着》《许三观卖血记》等已成为现代中国文学的经典之作。
  source: 04-Humanities-Arts/literature/modern-chinese-literature/avant-garde/experimental/Yu_Hua_Complete_Profile.md
  section: 概述 (Overview)
- type: concept
  question: 什么是概述 (Overview)？
  answer: 当代中国文学是指1949年新中国成立以来，特别是改革开放以来的文学创作。这一时期的文学经历了从政治化到多元化、从单一到丰富的发展历程，呈现出百花齐放、百家争鸣的繁荣景象。当代文学以其深刻的思想内容、多样的艺术形式、鲜明的时代特色而著称，涌现出了莫言、余华、王安忆、贾平凹、苏童、毕飞宇等一大批杰出作家，创作了大量具有国际影响力的重要作品，为中国文学走向世界舞台做出了重要贡献。
  source: 04-Humanities-Arts/literature/modern-chinese-literature/contemporary/Contemporary_Literature_Overview.md
