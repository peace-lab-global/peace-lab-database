  answer: '创作年份: 1888；调性/时长: D大调/55分钟；核心主题: 青年英雄、自然、讽刺葬礼进行曲；疗愈功能: 青春活力、讽刺幽默、死亡初探；适应症: 青年危机、能量恢复；使用阶段: 入门作品；循证等级: C；专业洞察: 第三乐章葬礼进行曲的黑色幽默'
  source: 04-Humanities-Arts/media/music/music-therapy/Mahler_Music_Therapy.md
