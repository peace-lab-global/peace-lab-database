  question: 什么是摘要 (Abstract)？
  answer: 本文采用民族主义理论、英雄叙事学与视觉文化研究的交叉分析框架，深入剖析Mel Gibson执导的《勇敢的心》(1995)。作为苏格兰独立战争题材的史诗巨制，该片通过浪漫化的英雄塑造、壮丽的视觉呈现和激昂的自由主题，重新诠释了13-14世纪的苏格兰历史。研究重点关注民族主义电影的建构机制、历史真实与艺术虚构的辩证关系、以及英雄主义叙事的当代意义。通过民族主义理论阐释、英雄叙事学分析与视觉文化研究，本文揭示了该片在民族认同、历史书写和文化政治层面的复杂功能。
