  question: 广泛性焦虑 (GAD)的核心要点是什么？
  answer: '症状表现: 持续担忧、肌肉紧张、易激惹；音乐选择原则: ISO原则：从中等张力开始→渐入平静；60-70BPM；推荐曲目序列: 1.莫扎特K.488第二乐章 2.肖邦夜曲Op.9/2 3.德彪西《月光》；疗程建议: 每日1次，每次20-30分钟，4-8周；效果指标:
    GAD-7评分、HRV改善；引用来源 (Citation): Nilsson, U. (2008).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Clinical_Protocols.md
  section: 焦虑症干预方案表
- type: concept
  question: 恐慌障碍的核心要点是什么？
  answer: '症状表现: 急性恐慌发作、躯体症状；音乐选择原则: 发作时：稳定、可预测；缓解期：渐进暴露；推荐曲目序列: 急性期：巴赫《G弦咏叹调》；缓解期：逐渐引入变化；疗程建议: 急性期按需；长期每日练习；效果指标: 恐慌发作频率、PDSS评分；引用来源
    (Citation): Clark, D. M. (1986).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Clinical_Protocols.md
  section: 焦虑症干预方案表
- type: concept
  question: 社交焦虑的核心要点是什么？
  answer: '症状表现: 社交场合恐惧、回避；音乐选择原则: 暴露前放松；渐进社交音乐体验；推荐曲目序列: 1.萨蒂《吉姆诺佩迪》(放松) 2.逐渐加入合奏曲目；疗程建议: 社交暴露前15分钟；效果指标: LSAS评分、社交回避行为；引用来源
    (Citation): Thaut, M. H. (2005).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Clinical_Protocols.md
  section: 焦虑症干预方案表
- type: concept
  question: 轻度抑郁的核心要点是什么？
  answer: '临床特征: 情绪低落、兴趣减退；音乐选择策略: 从轻度忧郁开始→大调愉悦；推荐ISO序列: 1.舒伯特(小调) 2.莫扎特慢板(大调) 3.维瓦尔第快板；疗程安排: 每日15-20分钟，8-12周；注意事项: 可配合行为激活；引用来源
    (Citation): Maratos, A. (2008).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Clinical_Protocols.md
  section: 抑郁症干预方案表
- type: concept
  question: 中度抑郁的核心要点是什么？
  answer: '临床特征: 显著功能影响、动力不足；音乐选择策略: 匹配情绪深度→渐进提升；推荐ISO序列: 1.勃拉姆斯间奏曲 2.肖邦夜曲 3.贝多芬《田园》；疗程安排: 每日20-30分钟，需配合心理治疗；注意事项: 避免过于欢快起步；引用来源
    (Citation): Erkkilä, J. (2011).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Clinical_Protocols.md
  section: 抑郁症干预方案表
- type: concept
  question: 重度抑郁的核心要点是什么？
  answer: '临床特征: 严重功能损害、自杀观念；音乐选择策略: 以安全、陪伴为主；避免强烈情绪音乐；推荐ISO序列: 稳定期：巴赫、莫扎特简单慢板；疗程安排: 作为辅助治疗；急性期以药物为主；注意事项: 评估自杀风险；避免触发；引用来源
    (Citation): Maratos, A. (2008).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Clinical_Protocols.md
  section: 抑郁症干预方案表
- type: concept
  question: 急性术后疼痛的核心要点是什么？
  answer: '疼痛机制: 组织损伤、炎症；音乐干预策略: 分散注意力、放松、减少焦虑；推荐曲目: 患者偏好慢板曲目；备选：巴赫、莫扎特；使用时机: 术后恢复期、换药时；效果评估: VAS评分、阿片类药物用量；引用来源 (Citation):
    Cepeda, M. S. (2006).'
  source: 04-Humanities-Arts/media/music/classical-music/general/Classical_Music_Clinical_Protocols.md
  section: 疼痛管理方案表
