  answer: '发展/心理特点: 具体运思期;道德发展;模仿学习;恐惧易感；媒体选择原则: 积极榜样;清晰道德;保护性内容;动画优先；推荐内容: 皮克斯动画宫崎骏教育游戏；禁忌内容: 暴力恐怖复杂成人主题；家长/治疗师角色: 共同观看讨论价值观设定界限；专业视角
    (Professional Perspective): 儿童是海绵;媒体是强大的社会化工具'
  source: 04-Humanities-Arts/media/media-therapy/Media_Clinical_Applications.md
  section: Special Population Media Guidelines (特殊人群媒体指南表)
- type: concept
  question: 青少年（13-18岁）的核心要点是什么？
  answer: '发展/心理特点: 身份探索;同伴压力;风险行为;抽象思维发展；媒体选择原则: 身份主题;同伴关系;道德困境;允许探索边界；推荐内容: 成长剧青春动漫叙事游戏；禁忌内容: 美化自杀药物极端暴力；家长/治疗师角色: 尊重自主引导反思开放讨论；专业视角
    (Professional Perspective): 青少年需要镜子;在媒体中看见自己'
  source: 04-Humanities-Arts/media/media-therapy/Media_Clinical_Applications.md
  section: Special Population Media Guidelines (特殊人群媒体指南表)
- type: concept
  question: 老年人（65+）的核心要点是什么？
  answer: '发展/心理特点: 认知老化;孤独;生命回顾;技术焦虑；媒体选择原则: 怀旧主题;节奏慢;简单操作;社交联结；推荐内容: 经典电影怀旧剧集简单游戏；禁忌内容: 过度复杂快节奏恐怖；家长/治疗师角色: 技术支持社交观影认知训练；专业视角
    (Professional Perspective): 老年人需要连接与意义;媒体是生命回顾工具'
  source: 04-Humanities-Arts/media/media-therapy/Media_Clinical_Applications.md
  section: Special Population Media Guidelines (特殊人群媒体指南表)
- type: concept
  question: CBT认知行为疗法的核心要点是什么？
  answer: '媒体整合方式: 识别角色认知扭曲;挑战非理性信念;行为实验；具体技术: 认知三栏技术应用于角色;行为激活清单；治疗目标: 认知重构;行为改变；案例: 美丽心灵中Nash识别幻觉用CBT框架分析；专业视角 (Professional
    Perspective): 媒体是活的CBT案例;角色示范认知重构'
  source: 04-Humanities-Arts/media/media-therapy/Media_Clinical_Applications.md
  section: Media-Therapy Integration Protocols (媒体-心理治疗整合协议表)
- type: concept
  question: EFT情绪聚焦疗法的核心要点是什么？
  answer: '媒体整合方式: 识别角色情感图式;情感深化;未完成事件；具体技术: 角色椅子技术;情感命名;致角色信；治疗目标: 情感觉察;情感接纳；案例: 使用月光男孩探索压抑情感;椅子对话；专业视角 (Professional Perspective):
    媒体角色是外化的情感;安全探索'
  source: 04-Humanities-Arts/media/media-therapy/Media_Clinical_Applications.md
  section: Media-Therapy Integration Protocols (媒体-心理治疗整合协议表)
- type: concept
  question: 抑郁症的核心要点是什么？
  answer: '电影处方: 阿甘正传心灵奇旅美丽人生；剧集处方: Ted Lasso我们这一天小谢尔顿；动漫处方: 三月的狮子宝石之国强风吹拂；游戏处方: Stardew Valley动物森友会Gris；整合建议: 选择希望主题避免黑暗现实主义；专业视角
    (Professional Perspective): 抑郁者需要可能性;媒体提供另一种结局'
  source: 04-Humanities-Arts/media/media-therapy/Media_Clinical_Applications2.md
  section: Pathology-Specific Media Prescriptions (病理专项媒体处方表)
- type: concept
  question: 焦虑障碍的核心要点是什么？
  answer: '电影处方: 龙猫魔女宅急便千与千寻；剧集处方: 小森林深夜食堂北国风光；动漫处方: 夏目友人帐悠哉日常大王摇曳露营；游戏处方: Flower风之旅人Abzu；整合建议: 治愈系低刺激可预测节奏；专业视角 (Professional
    Perspective): 焦虑者需要可预测性;治愈系是认知安全毯'
  source: 04-Humanities-Arts/media/media-therapy/Media_Clinical_Applications2.md
  section: Pathology-Specific Media Prescriptions (病理专项媒体处方表)
- type: concept
  question: PTSD的核心要点是什么？
  answer: '电影处方: 房间聚焦遗落战境（慎选）；剧集处方: 扪心问诊我的名字良医（创伤集）；动漫处方: 紫罗兰永恒花园钢之炼金术师Clannad；游戏处方: VR暴露治疗Celeste旅程；整合建议: 隐喻化创伤专业监督必须；专业视角
    (Professional Perspective): PTSD需隐喻化;直接暴露需专业指导'
  source: 04-Humanities-Arts/media/media-therapy/Media_Clinical_Applications2.md
  section: Pathology-Specific Media Prescriptions (病理专项媒体处方表)
