<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 880" role="img" aria-label="Peace Lab — Cognitive Research Lab (stacked)">
  <title>Peace Lab — Cognitive Research Lab</title>
  <desc>Stacked lockup: instrument-panel mark on top, large wordmark with magenta singularity below, journal-style headers and datum lines.</desc>
  <defs>
    <linearGradient id="sBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1c"/>
      <stop offset="100%" stop-color="#0d1426"/>
    </linearGradient>
    <pattern id="sGrid" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#1a2238" stroke-width="0.6"/>
    </pattern>
    <radialGradient id="sCyanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a5f3fc" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sPinkGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sNodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#a5f3fc" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#22d3ee" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sPetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="sStar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#5eead4" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="sLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="20%" stop-color="#22d3ee" stop-opacity="0.85"/>
      <stop offset="80%" stop-color="#5eead4" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0"/>
    </linearGradient>

    <symbol id="sMark" viewBox="0 0 512 512">
      <rect width="512" height="512" rx="72" fill="#0a0f1c"/>
      <rect width="512" height="512" rx="72" fill="url(#sGrid)" opacity="0.5"/>
      <rect x="0.5" y="0.5" width="511" height="511" rx="71.5" fill="none" stroke="#22d3ee" stroke-opacity="0.22" stroke-width="1"/>
      <g stroke="#22d3ee" stroke-opacity="0.45" stroke-width="1" fill="none">
        <path d="M 28 44 L 28 28 L 44 28"/>
        <path d="M 484 28 L 468 28 L 468 44"/>
        <path d="M 28 468 L 28 484 L 44 484"/>
        <path d="M 484 484 L 484 468 L 468 468"/>
      </g>
      <circle cx="256" cy="256" r="190" fill="url(#sCyanGlow)"/>
      <g fill="#a5f3fc">
        <circle cx="138" cy="118" r="1.2" fill-opacity="0.65"/>
        <circle cx="382" cy="78"  r="1.5" fill-opacity="0.80"/>
        <circle cx="448" cy="164" r="1.0" fill-opacity="0.55"/>
        <circle cx="430" cy="346" r="1.3" fill-opacity="0.70"/>
        <circle cx="222" cy="446" r="1.0" fill-opacity="0.55"/>
        <circle cx="86"  cy="392" r="1.4" fill-opacity="0.75"/>
        <circle cx="56"  cy="248" r="1.0" fill-opacity="0.55"/>
        <circle cx="74"  cy="156" r="1.2" fill-opacity="0.65"/>
      </g>
      <circle cx="256" cy="256" r="200"  fill="none" stroke="#22d3ee" stroke-opacity="0.10" stroke-width="1"/>
      <circle cx="256" cy="256" r="160"  fill="none" stroke="#22d3ee" stroke-opacity="0.55" stroke-width="2"/>
      <circle cx="256" cy="256" r="128"  fill="none" stroke="#5eead4" stroke-opacity="0.22" stroke-width="1" stroke-dasharray="1 5"/>
      <circle cx="256" cy="256" r="98.8" fill="none" stroke="#22d3ee" stroke-opacity="0.18" stroke-width="1"/>
      <circle cx="256" cy="256" r="61"   fill="none" stroke="#5eead4" stroke-opacity="0.28" stroke-width="1" stroke-dasharray="2 4"/>
      <path d="M 256 96 L 350.0 385.4 L 103.8 206.6 L 408.2 206.6 L 162.0 385.4 Z" fill="none" stroke="url(#sStar)" stroke-width="1" stroke-linejoin="round" stroke-opacity="0.85"/>
      <g fill="none" stroke="url(#sPetal)" stroke-width="1.8" stroke-linecap="round">
        <path d="M 256 96     Q 385.3 78  408.2 206.6"/>
        <path d="M 408.2 206.6 Q 465.2 324 350.0 385.4"/>
        <path d="M 350.0 385.4 Q 256 476  162.0 385.4"/>
        <path d="M 162.0 385.4 Q 46.8 324 103.8 206.6"/>
        <path d="M 103.8 206.6 Q 126.7 78 256 96"/>
      </g>
      <g fill="#a5f3fc" fill-opacity="0.65">
        <circle cx="314.1" cy="176.1" r="1.8"/>
        <circle cx="350.0" cy="286.5" r="1.8"/>
        <circle cx="256.0" cy="354.8" r="1.8"/>
        <circle cx="162.0" cy="286.5" r="1.8"/>
        <circle cx="197.9" cy="176.1" r="1.8"/>
      </g>
      <g>
        <circle cx="256" cy="96" r="22" fill="url(#sNodeGlow)"/>
        <circle cx="256" cy="96" r="9.5" fill="#5eead4"/>
        <circle cx="256" cy="96" r="9.5" fill="none" stroke="#a5f3fc" stroke-width="1.4"/>
        <circle cx="256" cy="96" r="3" fill="#f0fdfa"/>
        <circle cx="350.0" cy="385.4" r="22" fill="url(#sNodeGlow)"/>
        <circle cx="350.0" cy="385.4" r="9.5" fill="#5eead4"/>
        <circle cx="350.0" cy="385.4" r="9.5" fill="none" stroke="#a5f3fc" stroke-width="1.4"/>
        <circle cx="350.0" cy="385.4" r="3" fill="#f0fdfa"/>
        <circle cx="162.0" cy="385.4" r="22" fill="url(#sNodeGlow)"/>
        <circle cx="162.0" cy="385.4" r="9.5" fill="#5eead4"/>
        <circle cx="162.0" cy="385.4" r="9.5" fill="none" stroke="#a5f3fc" stroke-width="1.4"/>
        <circle cx="162.0" cy="385.4" r="3" fill="#f0fdfa"/>
        <circle cx="103.8" cy="206.6" r="22" fill="url(#sNodeGlow)"/>
        <circle cx="103.8" cy="206.6" r="9.5" fill="#5eead4"/>
        <circle cx="103.8" cy="206.6" r="9.5" fill="none" stroke="#a5f3fc" stroke-width="1.4"/>
        <circle cx="103.8" cy="206.6" r="3" fill="#f0fdfa"/>
      </g>
      <line x1="256" y1="256" x2="408.2" y2="206.6" stroke="#f472b6" stroke-width="1" stroke-opacity="0.55" stroke-dasharray="2 4"/>
      <circle cx="408.2" cy="206.6" r="36" fill="url(#sPinkGlow)"/>
      <circle cx="408.2" cy="206.6" r="11" fill="#f472b6"/>
      <circle cx="408.2" cy="206.6" r="11" fill="none" stroke="#fbcfe8" stroke-width="1.4"/>
      <circle cx="408.2" cy="206.6" r="3.4" fill="#fdf2f8"/>
      <circle cx="256" cy="256" r="22" fill="none" stroke="#5eead4" stroke-width="1" stroke-opacity="0.40" stroke-dasharray="2 3"/>
      <polygon points="268,256 262,245.61 250,245.61 244,256 250,266.39 262,266.39" fill="none" stroke="#a5f3fc" stroke-width="1.2" stroke-opacity="0.85" stroke-linejoin="round"/>
      <circle cx="256" cy="256" r="2.4" fill="#f8fafc"/>
    </symbol>
  </defs>

  <!-- 背景 -->
  <rect width="720" height="880" fill="url(#sBg)"/>
  <rect width="720" height="880" fill="url(#sGrid)" opacity="0.55"/>

  <!-- 顶部基线 + 端帽 -->
  <line x1="40" y1="48" x2="680" y2="48" stroke="#22d3ee" stroke-opacity="0.30" stroke-width="1"/>
  <rect x="36" y="44" width="8" height="8" fill="#22d3ee" fill-opacity="0.65"/>
  <rect x="676" y="44" width="8" height="8" fill="#22d3ee" fill-opacity="0.65"/>
  <text x="60" y="42" font-family="ui-monospace,'JetBrains Mono','Menlo',monospace" font-size="12" font-weight="600" fill="#22d3ee" fill-opacity="0.80" letter-spacing="3">FIG.01 — COGNITIVE.RESEARCH.LAB</text>
  <text x="660" y="42" font-family="ui-monospace,'JetBrains Mono','Menlo',monospace" font-size="12" font-weight="600" fill="#22d3ee" fill-opacity="0.55" letter-spacing="3" text-anchor="end">VOL.∞ / 2026</text>

  <!-- mark -->
  <use href="#sMark" x="120" y="80" width="480" height="480"/>

  <!-- 中部分隔基线 -->
  <line x1="40" y1="600" x2="680" y2="600" stroke="url(#sLine)" stroke-width="2"/>
  <rect x="36" y="596" width="8" height="8" fill="#22d3ee" fill-opacity="0.85"/>
  <rect x="676" y="596" width="8" height="8" fill="#5eead4" fill-opacity="0.85"/>

  <!-- 主标 PEACE◉LAB -->
  <text x="100" y="700" font-family="'Helvetica Neue','Inter',Arial,sans-serif" font-size="106" font-weight="800" fill="#f8fafc" letter-spacing="-3">PEACE</text>
  <g transform="translate(490,670)">
    <circle r="26" fill="url(#sPinkGlow)"/>
    <circle r="11" fill="#f472b6"/>
    <circle r="11" fill="none" stroke="#fbcfe8" stroke-width="1.5"/>
  </g>
  <text x="524" y="700" font-family="'Helvetica Neue','Inter',Arial,sans-serif" font-size="106" font-weight="800" fill="#f8fafc" letter-spacing="-3">LAB</text>

  <!-- 主标下细线 -->
  <line x1="100" y1="722" x2="620" y2="722" stroke="#22d3ee" stroke-opacity="0.45" stroke-width="1"/>

  <!-- 中文副标 -->
  <text x="360" y="762" font-family="'Noto Sans SC','PingFang SC','Hiragino Sans GB',sans-serif" font-size="22" font-weight="500" fill="#cbd5e1" letter-spacing="6" text-anchor="middle">在孤独中重建自我联结</text>

  <!-- 数据元 -->
  <text x="360" y="800" font-family="ui-monospace,'JetBrains Mono','Menlo',monospace" font-size="13" font-weight="600" fill="#64748b" letter-spacing="3" text-anchor="middle">[ 05 / PILLARS ]   [ 189+ / TOPICS ]   [ 2400+ / DOCS ]</text>

  <!-- 底部基线 + footer -->
  <line x1="40" y1="836" x2="680" y2="836" stroke="#22d3ee" stroke-opacity="0.25" stroke-width="1"/>
  <rect x="36" y="832" width="8" height="8" fill="#22d3ee" fill-opacity="0.55"/>
  <rect x="676" y="832" width="8" height="8" fill="#22d3ee" fill-opacity="0.55"/>
  <text x="60" y="858" font-family="ui-monospace,'JetBrains Mono','Menlo',monospace" font-size="11" font-weight="500" fill="#22d3ee" fill-opacity="0.55" letter-spacing="2">// θ = π / 5    n = ∞</text>
  <text x="660" y="858" font-family="ui-monospace,'JetBrains Mono','Menlo',monospace" font-size="11" font-weight="500" fill="#22d3ee" fill-opacity="0.45" letter-spacing="2" text-anchor="end">PEACE-LAB / GLOBAL</text>
</svg>
